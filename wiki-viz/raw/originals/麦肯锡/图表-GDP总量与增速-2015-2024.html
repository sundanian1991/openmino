<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2015-2024 中国 GDP 总量与增速</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F4F7F9; color: #051c2c; }
        .page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .chart-card { background: #fff; padding: 2.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); position: relative; }
        .chart-header { margin-bottom: 1.5rem; }
        .chart-title { font-size: 20px; font-weight: 600; color: #051c2c; letter-spacing: -0.01em; }
        .chart-subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
        .chart-actions { position: absolute; top: 1.5rem; right: 2rem; display: flex; gap: 8px; }
        .btn { padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 12px; font-weight: 500; color: #051c2c; background: #fff; cursor: pointer; transition: all 0.2s; }
        .btn:hover { border-color: #00A9E0; color: #00A9E0; }
        .watermark { position: absolute; bottom: 1rem; right: 1.5rem; font-size: 11px; color: rgba(5,28,44,0.25); font-weight: 600; letter-spacing: 0.05em; pointer-events: none; }
        .source { font-size: 11px; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="page">
    <div class="chart-card">
        <div class="chart-header">
            <div class="chart-title">2015-2024 中国 GDP 总量与增速</div>
            <div class="chart-subtitle">GDP 总量以万亿元计 | 增长率为同比实际增速</div>
        </div>
        <div class="chart-actions">
            <button class="btn" onclick="exportPNG()">导出 4K PNG</button>
            <button class="btn" onclick="exportSVG()">导出 SVG</button>
        </div>
        <div id="chart" style="width:100%;height:500px;"></div>
        <div class="watermark">McKinsey Style | Strategy Chart</div>
        <div class="source">数据来源：国家统计局</div>
    </div>
</div>

<script>
const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const gdp = [70.3, 76.1, 84.7, 93.6, 100.6, 103.5, 117.4, 123.4, 129.4, 134.9];
const growth = [7.0, 6.8, 6.9, 6.8, 6.1, 2.3, 8.6, 3.1, 5.4, 5.0];

const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

const option = {
    backgroundColor: '#fff',
    tooltip: {
        trigger: 'axis',
        backgroundColor: 'rgba(255,255,255,0.96)',
        borderColor: '#e2e8f0',
        textStyle: { color: '#051c2c', fontSize: 12 },
        formatter: function(params) {
            let s = '<b>' + params[0].axisValue + '年</b><br/>';
            params.forEach(p => {
                const unit = p.seriesName === 'GDP 总量' ? ' 万亿元' : '%';
                s += p.marker + ' ' + p.seriesName + '：<b>' + p.value + unit + '</b><br/>';
            });
            return s;
        }
    },
    legend: {
        bottom: 10,
        icon: 'circle',
        itemWidth: 10,
        itemHeight: 10,
        textStyle: { color: '#64748b', fontSize: 12 }
    },
    grid: { top: 40, bottom: 70, left: 70, right: 70, containLabel: true },
    xAxis: {
        type: 'category',
        data: years,
        axisLabel: { fontSize: 12, interval: 0, color: '#64748b' },
        axisLine: { lineStyle: { color: '#e2e8f0' } },
        axisTick: { show: false }
    },
    yAxis: [
        {
            type: 'value',
            name: '万亿元',
            nameTextStyle: { color: '#94a3b8', fontSize: 11 },
            min: 0,
            axisLabel: { color: '#64748b', fontSize: 11 },
            splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } },
            axisLine: { show: false },
            axisTick: { show: false }
        },
        {
            type: 'value',
            name: '增速 %',
            nameTextStyle: { color: '#94a3b8', fontSize: 11 },
            min: 0,
            max: 10,
            interval: 2,
            axisLabel: { color: '#64748b', fontSize: 11, formatter: '{value}%' },
            splitLine: { show: false },
            axisLine: { show: false },
            axisTick: { show: false }
        }
    ],
    series: [
        {
            name: 'GDP 总量',
            type: 'bar',
            data: gdp,
            barWidth: '42%',
            itemStyle: { color: '#051c2c' },
            label: {
                show: true,
                position: 'top',
                fontSize: 11,
                color: '#051c2c',
                fontWeight: 500,
                formatter: '{c}万亿'
            }
        },
        {
            name: 'GDP 增速',
            type: 'line',
            yAxisIndex: 1,
            data: growth,
            symbol: 'circle',
            symbolSize: 8,
            lineStyle: { width: 3, color: '#00A9E0' },
            itemStyle: { color: '#00A9E0', borderWidth: 2, borderColor: '#fff' },
            label: {
                show: true,
                position: 'top',
                fontSize: 11,
                color: '#00A9E0',
                fontWeight: 500,
                formatter: '{c}%'
            }
        }
    ]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());

function exportPNG() {
    const url = chart.getDataURL({ type: 'png', pixelRatio: 4, backgroundColor: '#fff' });
    const a = document.createElement('a');
    a.download = 'GDP_总量与增速_2015-2024.png';
    a.href = url;
    a.click();
}

function exportSVG() {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;top:-9999px;left:-9999px;width:1200px;height:700px;';
    document.body.appendChild(container);
    const svgChart = echarts.init(container, null, { renderer: 'svg' });
    const svgOption = JSON.parse(JSON.stringify(option));
    svgOption.animation = false;
    svgChart.setOption(svgOption);
    setTimeout(() => {
        const url = svgChart.getDataURL({ type: 'svg' });
        const a = document.createElement('a');
        a.download = 'GDP_总量与增速_2015-2024.svg';
        a.href = url;
        a.click();
        svgChart.dispose();
        document.body.removeChild(container);
    }, 200);
}
</script>
</body>
</html>
