<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01-光晕版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    background: #f2f0eb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .frame {
    background: linear-gradient(135deg, #faf0e6 0%, #f8f4ef 50%, #faf0e6 100%);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    max-width: 560px;
    width: 100%;
  }
  .frame::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(212,165,116,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .frame::after {
    content: '';
    position: absolute;
    top: 20px; right: 30px;
    width: 80px; height: 40px;
    border: 2px solid rgba(194,109,58,0.1);
    border-radius: 50%;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    color: #c26d3a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }
  .tag::before { content: ''; width: 6px; height: 6px; background: #c26d3a; border-radius: 50%; }
  .title { font-size: 22px; font-weight: 600; color: #2e2c2a; margin: 0 0 4px; line-height: 1.3; }
  .title em { font-style: normal; color: #c26d3a; }
  .desc { font-size: 13px; color: #6b3410; margin: 0 0 20px; line-height: 1.6; max-width: 500px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    border: 1px solid rgba(214,210,201,0.6);
  }
  .card .num { font-size: 32px; font-weight: 600; color: #2e2c2a; margin: 0 0 4px; }
  .card .label { font-size: 11px; color: #ada599; margin: 0; }
  .meta { margin-top: 24px; padding-top: 12px; border-top: 1px solid rgba(214,210,201,0.4); }
  .meta h3 { font-size: 12px; font-weight: 600; color: #454240; margin-bottom: 6px; }
  .meta p { font-size: 11px; color: #857d74; }
</style>
</head>
<body>
<div class="frame">
  <div class="tag">DATA STORYTELLING LAB</div>
  <h1 class="title">把 CSV 数据<br/>炼成<em>能驱动决策的故事</em></h1>
  <p class="desc">上传数据，AI 引导你明确受众和目标，自动生成可执行的可视化报告。</p>
  <div class="cards">
    <div class="card"><div class="num">30</div><div class="label">核心技能</div></div>
    <div class="card"><div class="num">3</div><div class="label">幕式叙事</div></div>
    <div class="card"><div class="num">1</div><div class="label">份可导出报告</div></div>
  </div>
  <div class="meta">
    <h3>可定制变量</h3>
    <p>渐变背景：#faf0e6 → #f8f4ef | 光晕颜色：rgba(212,165,116,0.15) | 装饰弧：rgba(194,109,58,0.1) | 卡片：#fff + Stone 边框</p>
    <p>场景：首页 / 落地页 / 核心数据展示</p>
  </div>
</div>
</body>
</html>
