<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haglöfs Line Chart Component</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Haglöfs Token System
       ============================================ */
    :root {
      /* 颜色 */
      --color-offwhite: #F5F5F0;
      --color-cream: #EDE8E0;
      --color-charcoal: #2A2A28;
      --color-black: #1A1A18;
      --color-forest: #2D5A3D;
      --color-moss: #4A7C5C;
      --color-signal-red: #D71921;
      
      /* 文字 */
      --text-primary: #1A1A18;
      --text-secondary: #666660;
      --text-tertiary: #999990;
      --text-inverse: #F5F5F0;
      --text-inverse-2: rgba(245, 245, 240, 0.6);
      
      /* 边框 */
      --border-rest: #E8E4DC;
      
      /* 间距 */
      --s-xs: 4px;
      --s-sm: 8px;
      --s-md: 16px;
      --s-lg: 24px;
      --s-xl: 32px;
      --s-2xl: 48px;
      --s-3xl: 64px;
      --s-4xl: 96px;
    }

    /* ============================================
       Base Styles
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-cream);
      color: var(--text-primary);
      line-height: 1.5;
      padding: var(--s-4xl) var(--s-xl);
    }

    /* ============================================
       Haglöfs Line Chart Component
       ============================================ */
    .haglofs-line-chart {
      width: 100%;
      max-width: 800px;
      background: var(--color-offwhite);
      border: 1px solid var(--border-rest);
      border-radius: 0px; /* 结构件：0px */
      padding: var(--s-lg);
    }

    /* 标题 */
    .haglofs-line-chart__title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--s-md);
    }

    /* 副标题 */
    .haglofs-line-chart__subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: var(--s-lg);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 画布容器 */
    .haglofs-line-chart__canvas {
      width: 100%;
      position: relative;
    }

    /* SVG 图表 */
    .haglofs-line-chart svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    /* 网格线 */
    .haglofs-line-chart .grid-line {
      stroke: var(--border-rest);
      stroke-width: 1px;
      fill: none;
    }

    /* 坐标轴 */
    .haglofs-line-chart .axis {
      stroke: var(--border-rest);
      stroke-width: 1px;
    }

    /* 轴标签 */
    .haglofs-line-chart .axis-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      fill: var(--text-secondary);
    }

    /* 数据线 */
    .haglofs-line-chart .data-line {
      fill: none;
      stroke: var(--color-forest);
      stroke-width: 2px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 数据区域（可选） */
    .haglofs-line-chart .data-area {
      fill: var(--color-forest);
      opacity: 0.1;
    }

    /* 数据点 */
    .haglofs-line-chart .data-point {
      fill: var(--color-offwhite);
      stroke: var(--color-forest);
      stroke-width: 2px;
      transition: all 0.2s ease;
    }

    .haglofs-line-chart .data-point:hover {
      fill: var(--color-forest);
      stroke-width: 0;
    }

    /* 数据点悬停效果 */
    .haglofs-line-chart .data-point-group {
      cursor: pointer;
    }

    .haglofs-line-chart .data-point-group:hover .data-point {
      fill: var(--color-forest);
    }

    .haglofs-line-chart .data-point-group:hover .data-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    /* 数据标签 */
    .haglofs-line-chart .data-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      fill: var(--text-primary);
      text-anchor: middle;
    }

    /* 工具提示 */
    .haglofs-line-chart .data-tooltip {
      opacity: 0;
      transform: translateY(-4px);
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .haglofs-line-chart .tooltip-bg {
      fill: var(--color-charcoal);
      rx: 2px;
    }

    .haglofs-line-chart .tooltip-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: var(--text-inverse);
    }

    /* 图例 */
    .haglofs-line-chart__legend {
      display: flex;
      gap: var(--s-lg);
      margin-top: var(--s-md);
      padding-top: var(--s-md);
      border-top: 1px solid var(--border-rest);
    }

    .haglofs-line-chart__legend-item {
      display: flex;
      align-items: center;
      gap: var(--s-sm);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .haglofs-line-chart__legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-forest);
    }

    /* 注释 */
    .haglofs-line-chart__note {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: var(--s-md);
    }

    /* ============================================
       深底反相（.section--dark 通用机制）
       ============================================ */
    .section--dark .haglofs-line-chart {
      background: var(--color-charcoal);
      border-color: var(--border-rest);
    }

    .section--dark .haglofs-line-chart__title {
      color: var(--text-inverse);
    }

    .section--dark .haglofs-line-chart__subtitle {
      color: var(--text-inverse-2);
    }

    .section--dark .haglofs-line-chart .data-line {
      stroke: var(--color-moss);
    }

    .section--dark .haglofs-line-chart .data-point {
      fill: var(--color-charcoal);
      stroke: var(--color-moss);
    }

    .section--dark .haglofs-line-chart .data-point:hover {
      fill: var(--color-moss);
    }

    /* ============================================
       Demo Layout
       ============================================ */
    .demo-section {
      margin-bottom: var(--s-4xl);
    }

    .demo-section--dark {
      background: var(--color-charcoal);
      padding: var(--s-4xl) var(--s-xl);
      margin: calc(-1 * var(--s-xl));
      margin-top: var(--s-4xl);
    }

    .demo-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--s-sm);
    }

    .demo-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--s-3xl);
    }

    .demo-section--dark .demo-title {
      color: var(--text-inverse);
    }

    .demo-section--dark .demo-subtitle {
      color: var(--text-inverse-2);
    }
  </style>
