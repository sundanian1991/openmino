<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="500" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="350" y="48" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">6家需三套管理策略，不能一刀切</text>
  <line x1="220" y1="62" x2="480" y2="62" stroke="#E5D9CC" stroke-width="1.5"/>

  <!-- Pyramid layers -->
  <g filter="url(#shadow)">
    <!-- Top tier - Warm 500 -->
    <polygon points="310,85 390,85 410,180 290,180" fill="#E8843C" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Middle tier - Warm 300 -->
    <polygon points="250,184 450,184 490,295 210,295" fill="#F5C08A" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Bottom tier - Light stone -->
    <polygon points="170,299 530,299 590,440 110,440" fill="#E5D9CC" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Top tier text (white) -->
  <text x="350" y="114" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">塔尖 · 优秀层</text>
  <text x="350" y="138" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">毅航 · 毛毛虫</text>
  <text x="350" y="162" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="12" fill="#FFFFFF">深化合作 · 扩大份额 · 长期协议</text>

  <!-- Middle tier text (dark) -->
  <text x="350" y="218" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="15" font-weight="700" fill="#6B4226">中层 · 风险层</text>
  <text x="350" y="246" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="14" font-weight="600" fill="#6B4226">伽玛</text>
  <text x="350" y="274" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="12" fill="#6B4226">专项帮扶 · 限期改善 · 月度复盘</text>

  <!-- Bottom tier text (dark) -->
  <text x="350" y="335" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="15" font-weight="700" fill="#6B4226">塔底 · 预警层</text>
  <text x="350" y="363" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="14" font-weight="600" fill="#6B4226">赛维斯 · 岐力 · 翰锐</text>
  <text x="350" y="391" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="12" fill="#6B4226">启动备选 · 份额递减 · 退出评估</text>

  <!-- Right side annotations -->
  <g font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif">
    <!-- Top annotation -->
    <line x1="412" y1="133" x2="600" y2="133" stroke="#E8843C" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="608" y="129" font-size="13" font-weight="600" fill="#E8843C">低强度管理</text>
    <text x="608" y="147" font-size="11" fill="#888888">信任度高，资源倾斜</text>

    <!-- Middle annotation -->
    <line x1="492" y1="240" x2="600" y2="240" stroke="#C4956A" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="608" y="236" font-size="13" font-weight="600" fill="#C4956A">中度管理</text>
    <text x="608" y="254" font-size="11" fill="#888888">专项跟踪，限期整改</text>

    <!-- Bottom annotation -->
    <line x1="562" y1="370" x2="600" y2="370" stroke="#B5A696" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="608" y="366" font-size="13" font-weight="600" fill="#8C7B6B">高强度管理</text>
    <text x="608" y="384" font-size="11" fill="#888888">风险管控，准备退出</text>
  </g>

  <!-- Bottom summary -->
  <text x="350" y="475" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif" font-size="11" fill="#AAAAAA">年度评审 · 2026 · 供应商分级管理策略</text>
</svg>
