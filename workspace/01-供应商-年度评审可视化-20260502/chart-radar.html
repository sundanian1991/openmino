<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2025年度供应商评审雷达图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .card {
    width: 800px;
    height: 550px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    padding: 16px 24px;
  }
  #chart { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="card">
  <div id="chart"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
(function() {
  var chart = echarts.init(document.getElementById('chart'));

  var option = {
    backgroundColor: '#ffffff',
    title: {
      text: '6家供应商呈三梯队分化，毅航综合最优',
      subtext: '2025年度评审 · 四维度雷达对比',
      left: 'center',
      top: 8,
      textStyle: {
        color: '#293C54',
        fontSize: 16,
        fontWeight: 'bold'
      },
      subtextStyle: {
        color: '#98a0ab',
        fontSize: 11
      }
    },
    tooltip: {
      trigger: 'item',
      formatter: function(params) {
        if (params.seriesName === '达标线') {
          return '<b>' + params.name + '</b><br/>' +
            '人效: 75<br/>合规率: 90%<br/>流失率(反向): 85<br/>达成率: 95%';
        }
        var name = params.name;
        var v = params.value;
        var unitMap = ['', '%', '%', '%'];
        var labelMap = ['人效', '合规率', '流失率(反向)', '达成率'];
        var html = '<b>' + name + '</b><br/>';
        for (var i = 0; i < v.length; i++) {
          var actual = i === 2 ? (100 - v[i]) : v[i];
          var arrow = i === 2 ? '↓' : '';
          html += labelMap[i] + ': ' + actual + unitMap[i] + ' ' + arrow + '<br/>';
        }
        return html;
      }
    },
    legend: {
      orient: 'vertical',
      right: 20,
      top: 'middle',
      textStyle: {
        color: '#98a0ab',
        fontSize: 11,
        rich: {
          bold: {
            fontWeight: 'bold',
            color: '#E8843C',
            fontSize: 12
          },
          muted: {
            color: '#B8A99A',
            opacity: 0.5,
            fontSize: 10
          }
        },
        formatter: function(name) {
          if (name === '毅航') {
            return '{bold|毅航}';
          }
          return '{muted|' + name + '}';
        }
      },
      itemWidth: 12,
      itemHeight: 8,
      selected: {
        '毅航': true,
        '毛毛虫': true,
        '伽玛': true,
        '赛维斯': true,
        '岐力': true,
        '翰锐': true
      },
      inactiveColor: '#ddd'
    },
    radar: {
      indicator: [
        { name: '人效', max: 110 },
        { name: '合规率', max: 100 },
        { name: '流失率(反向)', max: 100 },
        { name: '达成率', max: 110 }
      ],
      radius: '60%',
      center: ['42%', '56%'],
      axisName: {
        color: '#293C54',
        fontSize: 12,
        fontWeight: 'bold'
      },
      splitArea: {
        areaStyle: {
          color: ['#FAFAFA', '#F2F2F2', '#FAFAFA', '#F2F2F2', '#FAFAFA']
        }
      },
      axisLine: {
        lineStyle: {
          color: '#E0E0E0'
        }
      },
      splitLine: {
        lineStyle: {
          color: '#E0E0E0'
        }
      }
    },
    series: [
      {
        name: '达标线',
        type: 'radar',
        zlevel: 1,
        symbol: 'none',
        lineStyle: {
          color: '#CDCECD',
          width: 1.5,
          type: 'dashed'
        },
        areaStyle: {
          color: '#CDCECD',
          opacity: 0.05
        },
        itemStyle: {
          color: '#CDCECD'
        },
        data: [{
          value: [75, 90, 85, 95],
          name: '达标线'
        }]
      },
      {
        name: '毛毛虫',
        type: 'radar',
        zlevel: 2,
        symbol: 'none',
        lineStyle: {
          color: '#B8A99A',
          width: 1,
          opacity: 0.25
        },
        areaStyle: {
          color: '#B8A99A',
          opacity: 0.04
        },
        data: [{
          value: [85, 95, 88, 98],
          name: '毛毛虫'
        }]
      },
      {
        name: '伽玛',
        type: 'radar',
        zlevel: 2,
        symbol: 'none',
        lineStyle: {
          color: '#B8A99A',
          width: 1,
          opacity: 0.2
        },
        areaStyle: {
          color: '#B8A99A',
          opacity: 0.03
        },
        data: [{
          value: [78, 91, 82, 93],
          name: '伽玛'
        }]
      },
      {
        name: '赛维斯',
        type: 'radar',
        zlevel: 2,
        symbol: 'none',
        lineStyle: {
          color: '#B8A99A',
          width: 1,
          opacity: 0.18
        },
        areaStyle: {
          color: '#B8A99A',
          opacity: 0.02
        },
        data: [{
          value: [72, 88, 78, 87],
          name: '赛维斯'
        }]
      },
      {
        name: '岐力',
        type: 'radar',
        zlevel: 2,
        symbol: 'none',
        lineStyle: {
          color: '#B8A99A',
          width: 1,
          opacity: 0.15
        },
        areaStyle: {
          color: '#B8A99A',
          opacity: 0.02
        },
        data: [{
          value: [68, 85, 75, 82],
          name: '岐力'
        }]
      },
      {
        name: '翰锐',
        type: 'radar',
        zlevel: 2,
        symbol: 'none',
        lineStyle: {
          color: '#B8A99A',
          width: 1,
          opacity: 0.12
        },
        areaStyle: {
          color: '#B8A99A',
          opacity: 0.01
        },
        data: [{
          value: [65, 82, 72, 78],
          name: '翰锐'
        }]
      },
      {
        name: '毅航',
        type: 'radar',
        zlevel: 3,
        symbol: 'circle',
        symbolSize: 6,
        lineStyle: {
          color: '#E8843C',
          width: 2.5
        },
        areaStyle: {
          color: '#E8843C',
          opacity: 0.18
        },
        itemStyle: {
          color: '#E8843C',
          borderColor: '#fff',
          borderWidth: 2
        },
        label: {
          show: true,
          formatter: '{b}',
          color: '#E8843C',
          fontSize: 11,
          fontWeight: 'bold',
          position: 'top'
        },
        data: [{
          value: [92, 98, 92, 105],
          name: '毅航'
        }]
      }
    ]
  };

  chart.setOption(option);
  window.addEventListener('resize', function() { chart.resize(); });
})();
</script>
</body>
</html>
