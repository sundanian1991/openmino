<style>
:root{--darkgray:#2C2C2C;--olive:#4A5D3A;--earth:#8B7355;--yellow:#FFD100;--orange:#E55B2B;--glacier:#2A4A5A;--bg:#FAFAF8;--surface:#FFFFFF;--surface-raised:#F5F5F0;--border:#E5E5E0;--text-primary:#1A1A1A;--text-secondary:#6B6B6B;--text-disabled:#A0A0A0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:var(--olive);color:#fff}

/* ── Graph area ── */
.graph-section{min-height:100vh;display:flex;flex-direction:column;padding:64px 32px;background:var(--darkgray);color:#fff;position:relative;overflow:hidden}
.graph-header{text-align:center;margin-bottom:40px;position:relative;z-index:2}
.graph-header h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(28px,4vw,48px);font-weight:300;letter-spacing:-1px;margin-bottom:12px}
.graph-header p{font-size:14px;color:rgba(255,255,255,0.5);max-width:560px;margin:0 auto}

/* ── SVG Graph ── */
.graph-container{flex:1;display:flex;justify-content:center;align-items:center;position:relative;z-index:2}
.graph-svg{width:100%;max-width:900px;height:auto}

/* ── Nodes ── */
.node{cursor:pointer;transition:all 0.3s ease}
.node:hover .node-bg{filter:brightness(1.2)}
.node-bg{rx:8;ry:8;transition:all 0.3s ease}
.node-text{font-family:'Inter',sans-serif;fill:#fff;pointer-events:none}
.node-tag{font-family:'JetBrains Mono',monospace;fill:rgba(255,255,255,0.5);pointer-events:none}
.node-highlight .node-bg{stroke:var(--yellow);stroke-width:2}

/* ── Edges ── */
.edge{stroke:rgba(255,255,255,0.2);stroke-width:1.5;fill:none;marker-end:url(#arrow)}
.edge.active{stroke:var(--yellow);stroke-width:2}

/* ── Detail panel ── */
.detail-panel{position:fixed;right:0;top:0;width:420px;height:100vh;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);z-index:200;overflow-y:auto;padding:48px 32px}
.detail-panel.open{transform:translateX(0)}
.detail-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text-secondary);border-radius:4px}
.detail-close:hover{border-color:var(--text-primary);color:var(--text-primary)}
.detail-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--olive);margin-bottom:8px}
.detail-title{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:300;color:var(--text-primary);margin-bottom:16px;line-height:1.2}
.detail-body{font-size:14px;line-height:1.7;color:var(--text-secondary)}
.detail-body strong{color:var(--text-primary);font-weight:500}
.detail-eq{font-family:'Playfair Display',Georgia,serif;font-size:14px;background:var(--surface-raised);border:1px solid var(--border);padding:12px 16px;margin:16px 0;line-height:1.6}
.detail-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.detail-metric{padding:12px;border:1px solid var(--border);text-align:center}
.detail-metric .val{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--olive);line-height:1}
.detail-metric .lbl{font-size:10px;color:var(--text-disabled);margin-top:4px}
.detail-connections{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.detail-conn-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-disabled);margin-bottom:8px}
.detail-conn-item{font-size:12px;color:var(--text-secondary);padding:4px 0;display:flex;align-items:center;gap:6px}
.detail-conn-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:190;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.open{opacity:1;pointer-events:auto}

/* ── Legend ── */
.legend{position:absolute;bottom:32px;left:32px;display:flex;gap:20px;z-index:2}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.5)}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* ── Ghost ── */
.ghost{position:absolute;font-family:'Playfair Display',Georgia,serif;font-size:200px;font-weight:300;color:rgba(255,255,255,0.03);pointer-events:none;user-select:none;right:-40px;bottom:-20px;line-height:1}
</style>

function showDetail(id) {
  const data = nodeData[id];
  if (!data) return;

  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  let html = `<div class="detail-tag">${data.tag}</div>`;
  html += `<div class="detail-title">${data.title}</div>`;
  html += `<div class="detail-body">${data.body}</div>`;

  if (data.metrics) {
    html += '<div class="detail-metrics">';
    data.metrics.forEach(m => {
      html += `<div class="detail-metric"><div class="val">${m.val}</div><div class="lbl">${m.lbl}</div></div>`;
    });
    html += '</div>';
  }

  if (data.connections && data.connections.length > 0) {
    html += '<div class="detail-connections">';
    html += '<div class="detail-conn-title">CONNECTIONS</div>';
    data.connections.forEach(c => {
      html += `<div class="detail-conn-item"><div class="dot" style="background:${c.color}"></div>${c.text}</div>`;
    });
    html += '</div>';
  }

  content.innerHTML = html;
  panel.classList.add('open');
  document.getElementById('overlay').classList.add('open');

  // Highlight connected edges
  document.querySelectorAll('.edge').forEach(e => {
    e.classList.remove('active');
    e.setAttribute('marker-end', 'url(#arrow)');
  });
  document.querySelectorAll(`.edge[data-from="${id}"], .edge[data-to="${id}"]`).forEach(e => {
    e.classList.add('active');
    e.setAttribute('marker-end', 'url(#arrow-active)');
  });
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.edge').forEach(e => {
    e.classList.remove('active');
    e.setAttribute('marker-end', 'url(#arrow)');
  });
}

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
