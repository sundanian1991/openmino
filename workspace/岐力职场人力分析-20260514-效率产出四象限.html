": "MOB1-3", "_level": "C", "_connected": 3250}, {"x": 93.5, "y": 814.95, "r": 9.2, "_name": "刘强", "_mob": "MOB1-3", "_level": "B", "_connected": 2673}, {"x": 115.7, "y": 743.67, "r": 9.5, "_name": "黄素云", "_mob": "MOB1-3", "_level": "B", "_connected": 2714}, {"x": 88.8, "y": 844.68, "r": 10.2, "_name": "刘玉立", "_mob": "MOB1-3", "_level": "B", "_connected": 2806}, {"x": 94.2, "y": 841.09, "r": 10.6, "_name": "吴珍珍", "_mob": "MOB1-3", "_level": "A", "_connected": 2865}, {"x": 90.0, "y": 653.41, "r": 9.8, "_name": "余学伟", "_mob": "MOB1-3", "_level": "B", "_connected": 2746}, {"x": 74.2, "y": 971.56, "r": 14.5, "_name": "徐锦", "_mob": "MOB1-3", "_level": "A", "_connected": 3409}, {"x": 87.4, "y": 756.61, "r": 12.0, "_name": "杨丹丹", "_mob": "MOB1-3", "_level": "B", "_connected": 3055}, {"x": 91.4, "y": 613.45, "r": 8.6, "_name": "龚梅", "_mob": "MOB1-3", "_level": "B", "_connected": 2586}, {"x": 109.6, "y": 466.56, "r": 4.4, "_name": "张爱飞", "_mob": "MOB1-3", "_level": "B", "_connected": 2001}, {"x": 94.1, "y": 1030.0, "r": 11.8, "_name": "彭科", "_mob": "MOB1-3", "_level": "A", "_connected": 3024}], "backgroundColor": "#2e8b6eAA", "borderColor": "#2e8b6e", "borderWidth": 1.5, "hoverBackgroundColor": "#2e8b6eDD", "hoverBorderWidth": 2}, {"label": "MOB3-6", "data": [{"x": 96.8, "y": 849.15, "r": 12.8, "_name": "熊晨", "_mob": "MOB3-6", "_level": "B", "_connected": 3171}, {"x": 91.6, "y": 530.09, "r": 14.9, "_name": "徐志雄", "_mob": "MOB3-6", "_level": "C", "_connected": 3469}, {"x": 75.0, "y": 271.05, "r": 6.2, "_name": "徐乐富", "_mob": "MOB3-6", "_level": "C", "_connected": 2245}, {"x": 73.6, "y": 486.79, "r": 6.6, "_name": "熊仕铭", "_mob": "MOB3-6", "_level": "C", "_connected": 2311}, {"x": 119.7, "y": 811.75, "r": 8.2, "_name": "郑民", "_mob": "MOB3-6", "_level": "A", "_connected": 2528}, {"x": 95.9, "y": 594.71, "r": 12.5, "_name": "罗来江", "_mob": "MOB3-6", "_level": "C", "_connected": 3125}], "backgroundColor": "#c26d3aAA", "borderColor": "#c26d3a", "borderWidth": 1.5, "hoverBackgroundColor": "#c26d3aDD", "hoverBorderWidth": 2}, {"label": "MOB6-12", "data": [{"x": 65.4, "y": 768.93, "r": 15.5, "_name": "刘波波", "_mob": "MOB6-12", "_level": "C", "_connected": 3552}, {"x": 153.9, "y": 886.7, "r": 11.2, "_name": "蔡子虎", "_mob": "MOB6-12", "_level": "A", "_connected": 2946}, {"x": 113.9, "y": 814.22, "r": 10.3, "_name": "邓清清", "_mob": "MOB6-12", "_level": "A", "_connected": 2822}, {"x": 71.3, "y": 419.43, "r": 14.0, "_name": "齐梦华", "_mob": "MOB6-12", "_level": "C", "_connected": 3333}, {"x": 136.2, "y": 639.7, "r": 8.5, "_name": "刘莉莉", "_mob": "MOB6-12", "_level": "A", "_connected": 2567}], "backgroundColor": "#3a7ab8AA", "borderColor": "#3a7ab8", "borderWidth": 1.5, "hoverBackgroundColor": "#3a7ab8DD", "hoverBorderWidth": 2}];

  // 四象限背景插件
  var quadrantBg = {
    id: 'quadrantBg',
    beforeDraw: function(chart) {
      var xAxis = chart.scales.x;
      var yAxis = chart.scales.y;
      var c = chart.ctx;
      var xMid = xAxis.getPixelForValue(100);
      var yMid = yAxis.getPixelForValue(500);

      var left = xAxis.left;
      var right = xAxis.right;
      var top = yAxis.top;
      var bottom = yAxis.bottom;

      // 右上：高效率高产出 — Teal 10%
      c.fillStyle = 'rgba(46,139,110,0.07)';
      c.fillRect(xMid, top, right - xMid, yMid - top);

      // 左上：低效高产出 — Amber 10%
      c.fillStyle = 'rgba(194,109,58,0.07)';
      c.fillRect(left, top, xMid - left, yMid - top);

      // 右下：高效率低产出 — Sky 10%
      c.fillStyle = 'rgba(58,122,184,0.07)';
      c.fillRect(xMid, yMid, right - xMid, bottom - yMid);

      // 左下：低效低产出 — Coral 10%
      c.fillStyle = 'rgba(200,80,60,0.07)';
      c.fillRect(left, yMid, xMid - left, bottom - yMid);
    }
  };

  new Chart(ctx, {
    type: 'bubble',
    data: { datasets: datasets },
    plugins: [quadrantBg],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 8, right: 16 } },
      scales: {
        x: {
          title: {
            display: true,
            text: 'ATT(秒)',
            font: { size: 13, family: 'system-ui' },
            color: '#555'
          },
          min: 55,
          max: 175,
          ticks: {
            stepSize: 20,
            font: { size: 11, family: 'system-ui' },
            color: '#888'
          },
          grid: { color: 'rgba(0,0,0,0.06)' }
        },
        y: {
          title: {
            display: true,
            text: '复贷GMV(万)',
            font: { size: 13, family: 'system-ui' },
            color: '#555'
          },
          min: 0,
          max: 1500,
          ticks: {
            stepSize: 300,
            font: { size: 11, family: 'system-ui' },
            color: '#888'
          },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      },
      plugins: {
        title: {
          display: true,
          text: '效率-产出四象限（参评坐席）',
          font: { size: 16, weight: '600', family: 'system-ui' },
          color: '#333',
          padding: { bottom: 12 }
        },
        legend: {
          position: 'top',
          align: 'end',
          labels: {
            usePointStyle: true,
            pointStyle: 'circle',
            font: { size: 12, family: 'system-ui' },
            color: '#555',
            padding: 16
          }
        },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.96)',
          titleColor: '#333',
          bodyColor: '#555',
          borderColor: '#ddd',
          borderWidth: 1,
          cornerRadius: 6,
          padding: 10,
          titleFont: { size: 13, weight: '600', family: 'system-ui' },
          bodyFont: { size: 12, family: 'system-ui' },
          displayColors: false,
          callbacks: {
            title: function(items) {
              if (!items.length) return '';
              var raw = items[0].raw;
              return raw._name;
            },
            label: function(item) {
              var raw = item.raw;
              return [
                'ATT: ' + raw.x + ' 秒',
                '复贷GMV: ' + raw.y + ' 万',
                '接通用户: ' + raw._connected,
                '司龄: ' + raw._mob,
                '等级: ' + raw._level
              ];
            }
          }
        },
        annotation: {
          annotations: {
            attLine: {
              type: 'line',
              xMin: 100,
              xMax: 100,
              borderColor: 'rgba(0,0,0,0.25)',
              borderWidth: 1.5,
              borderDash: [6, 4],
              label: {
                display: true,
                content: '高效率 ← → 低效率',
                position: 'start',
                backgroundColor: 'rgba(255,255,255,0.85)',
                color: '#777',
                font: { size: 10, family: 'system-ui' },
                padding: { left: 4, right: 4, top: 2, bottom: 2 }
              }
            },
            gmvLine: {
              type: 'line',
              yMin: 500,
              yMax: 500,
              borderColor: 'rgba(0,0,0,0.25)',
              borderWidth: 1.5,
              borderDash: [6, 4],
              label: {
                display: true,
                content: '低产出 ← → 高产出',
                position: 'start',
                backgroundColor: 'rgba(255,255,255,0.85)',
                color: '#777',
                font: { size: 10, family: 'system-ui' },
                padding: { left: 4, right: 4, top: 2, bottom: 2 },
                rotation: -90
              }
            }
          }
        }
      }
    }
  });
})();
</script>
</body>
</html>
