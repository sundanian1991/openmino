<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旧规则·测试</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --olive:#4A5D3A; --orange:#E55B2B; --earth:#8B7355;
  --bg:#FAFAF8; --surface:#FFFFFF;
  --border:#E5E5E0; --border-strong:#C0C0B8;
  --text-display:#2C2C2C; --text-primary:#1A1A1A; --text-secondary:#6B6B6B;
  --font-display:Georgia,'Times New Roman',serif;
  --font-body:'Inter',sans-serif; --font-data:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);color:var(--text-primary);background:var(--bg);padding:64px}
.page{max-width:720px;margin:0 auto}
/* —— 三层规则在 style 里怎么写？查 CRAFT-RULES ——
   Rule 1: 恰好三层（Primary/Secondary/Tertiary）
   Rule 2: 字号≤3/字重≤2/字体≤2
   Rule 3: 非对称
   ———— 现在是旧版模式 —— 凭感觉做 ———— */
.hero-num{font-family:var(--font-display);font-size:64px;color:var(--text-display);line-height:1}
.hero-lbl{font-family:var(--font-data);font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-secondary)}
.sec-title{font-family:var(--font-display);font-size:28px;color:var(--text-display)}
.sec-title strong{color:var(--olive)}
table{width:100%;border-collapse:collapse;margin-top:32px}
th{font-family:var(--font-data);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-disabled);padding:8px 12px;border-bottom:2px solid var(--border-strong);text-align:left;font-weight:400}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:14px}
td:nth-child(2),td:nth-child(3){font-family:var(--font-data);text-align:right}
</style>
</head>
<body>
<div class="page">
  <div class="hero-num">6</div>
  <div class="hero-lbl">Suppliers</div>
  <h2 class="sec-title">Q2 达成率<strong>排名</strong></h2>
  <table>
    <thead><tr><th>供应商</th><th>达成率</th><th>YoY</th></tr></thead>
    <tbody>
      <tr><td>毅航</td><td>108%</td><td>+12%</td></tr>
      <tr><td>伽玛</td><td>94%</td><td>+5%</td></tr>
      <tr><td>毛毛虫</td><td>82%</td><td>-3%</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
