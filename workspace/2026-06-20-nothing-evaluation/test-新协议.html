<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新协议·测试</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --olive:#4A5D3A; --orange:#E55B2B; --earth:#8B7355;
  --bg:#FAFAF8; --surface:#FFFFFF; --surface-raised:#F5F5F0;
  --border:#E5E5E0; --border-strong:#C0C0B8;
  --text-display:#2C2C2C; --text-primary:#1A1A1A; --text-secondary:#6B6B6B; --text-disabled:#A0A0A0;
  --font-display:Georgia,'Times New Roman',serif;
  --font-body:'Inter',sans-serif; --font-data:'JetBrains Mono',monospace;
  --r-md:8px; --pad:32px; --s-lg:24px; --s-sm:8px; --s-md:16px; --s-xl:32px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);color:var(--text-primary);background:var(--bg);padding:64px;line-height:1.6;font-size:15px}
.page{max-width:760px;margin:0 auto}

/* Step 1: Display 锚点锁定 —— "108%" 是这屏唯一的锚点 */
.anchor{
  font-family:var(--font-display);font-size:96px;font-weight:400;line-height:1;
  color:var(--text-display);letter-spacing:-0.03em;margin-bottom:4px
}
.anchor em{font-style:normal;color:var(--olive)}
.anchor-unit{font-family:var(--font-data);font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-secondary)}

/* Step 2: Body 基线固定 —— 15px Inter */
.sec-label{font-family:var(--font-data);font-size:10px;text-transform:uppercase;letter-spacing:0.25em;color:var(--text-disabled);margin-bottom:var(--s-lg)}
.sec-title{font-family:var(--font-display);font-size:28px;font-weight:400;color:var(--text-display);margin-bottom:var(--s-xl);line-height:1.2}
.sec-title strong{color:var(--olive);font-weight:600}
.body-meta{font-size:15px;color:var(--text-secondary);line-height:1.7;max-width:500px;margin-bottom:var(--s-xl)}

/* Step 3: 其余归为 Data 层 */
.bar-wrap{display:flex;flex-direction:column;gap:0}
.bar-row{display:grid;grid-template-columns:90px 1fr 48px;gap:var(--s-md);align-items:center;padding:var(--s-sm) 0;border-bottom:1px solid var(--border)}
.bar-row:last-child{border-bottom:none}
.bar-name{font-size:15px;font-weight:500;color:var(--text-primary)}
.bar-track{height:8px;background:var(--surface-raised);border-radius:var(--r-md);overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:var(--r-md);background:var(--olive)}
.bar-fill.top{background:var(--olive)}.bar-fill.mid{background:var(--earth)}.bar-fill.low{background:var(--rock)}
.bar-val{font-family:var(--font-data);font-size:13px;font-weight:500;text-align:right;color:var(--text-primary)}
.bar-delta{font-family:var(--font-data);font-size:10px;color:var(--text-secondary);margin-top:2px;text-align:right}
.insight{margin-top:var(--s-xl);padding:var(--s-md) var(--s-lg);border-left:2px solid var(--orange);background:var(--surface);border-radius:0 var(--r-md) var(--r-md) 0}
.insight__lbl{font-family:var(--font-data);font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--orange);margin-bottom:var(--s-sm)}
.insight__t{font-size:14px;color:var(--text-secondary);line-height:1.7}
.insight__t strong{color:var(--text-primary)}
</style>
</head>
<body>
<div class="page">

  <!-- Step 1: Display 锚点 —— "108%" 独占视觉入口 -->
  <div class="anchor">108<em>%</em></div>
  <div class="anchor-unit">Q2 达成率 · 毅航</div>

  <!-- Step 2: Body 基线 —— 说明这屏要讲什么 -->
  <div class="sec-label">Suppliers · Q2 排名</div>
  <h2 class="sec-title">头部加速，尾部分化<br><strong>差距在拉大</strong></h2>
  <p class="body-meta">6 家供应商的 Q2 达成率排名。毅航以 108% 居首，头部和尾部的差距从上季度的 30 个百分点扩大到 53 个百分点。</p>

  <!-- Step 3: Data 脚注 —— 排名用 Data 层字号+灰度 -->
  <div class="bar-wrap">
    <div class="bar-row">
      <span class="bar-name">毅航</span>
      <div class="bar-track"><div class="bar-fill top" style="width:100%"></div></div>
      <div><div class="bar-val">108%</div><div class="bar-delta">+12% YoY</div></div>
    </div>
    <div class="bar-row">
      <span class="bar-name">伽玛</span>
      <div class="bar-track"><div class="bar-fill mid" style="width:87%"></div></div>
      <div><div class="bar-val">94%</div><div class="bar-delta">+5% YoY</div></div>
    </div>
    <div class="bar-row">
      <span class="bar-name">毛毛虫</span>
      <div class="bar-track"><div class="bar-fill mid" style="width:76%"></div></div>
      <div><div class="bar-val">82%</div><div class="bar-delta">-3% YoY</div></div>
    </div>
    <div class="bar-row">
      <span class="bar-name">翰锐</span>
      <div class="bar-track"><div class="bar-fill low" style="width:70%"></div></div>
      <div><div class="bar-val">76%</div><div class="bar-delta">持平</div></div>
    </div>
    <div class="bar-row">
      <span class="bar-name">赛维斯</span>
      <div class="bar-track"><div class="bar-fill low" style="width:63%"></div></div>
      <div><div class="bar-val">68%</div><div class="bar-delta">-8% YoY</div></div>
    </div>
    <div class="bar-row">
      <span class="bar-name">岐力</span>
      <div class="bar-track"><div class="bar-fill low" style="width:51%"></div></div>
      <div><div class="bar-val">55%</div><div class="bar-delta">-15% YoY</div></div>
    </div>
  </div>

  <!-- 协议自检点的自然产出：insight 是对"三层是否拉开的验证" -->
  <div class="insight">
    <div class="insight__lbl">Self-Check · 层级验证</div>
    <div class="insight__t">第一眼看到的是 <strong>108%</strong>（锚点成立）。阅读自然流向排名（基线）。最后注意到 YoY 变化和 insight（Data 层）。三层拉开，没有竞争。</div>
  </div>

</div>
</body>
</html>
