<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐力职场参评坐席综合得分排名</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
#chart { width: 900px; height: 700px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

// 数据：从下到上排列（index 0 在图表底部）
// C级(9人) → B级(15人) → A级(13人) → S级(8人)，每组内按分数升序
var names = [
  // C级 index 0-8
  '刘智帆','冯子豪','齐梦华','吴文豪','徐志雄','唐艳琴','张波','易慕康','刘波波',
  // B级 index 9-23
  '徐乐富','邹泽勇','李博闻','程芬芬','熊仕铭','罗来江','王诗琦','陈家伟','罗干','张爱飞','龚洋洋','杨丹丹','刘玉立','胡帅','李勋凯',
  // A级 index 24-36
  '徐鸿宇','余学伟','杨文婷','钱凯平','李文超','黄素云','龚梅','熊晨','刘强','詹焱','颜樱','黎鑫','李佳',
  // S级 index 37-44
  '郑民','蔡子虎','彭科','刘莉莉','徐锦','吴珍珍','邓清清','言莹'
];

var values = [
  3.95,7.77,9.89,14.56,15.64,16.18,20.19,20.31,26.45,
  7.96,8.54,15.69,17.28,18.41,23.84,24.18,28.15,31.03,34.54,35.30,36.93,37.46,43.75,45.55,
  26.43,29.65,31.59,38.22,40.03,41.09,42.74,47.04,48.04,48.88,53.20,55.32,63.90,
  54.22,57.19,57.73,60.24,65.67,66.33,67.42,77.81
];

var grades = [
  'C','C','C','C','C','C','C','C','C',
  'B','B','B','B','B','B','B','B','B','B','B','B','B','B','B',
  'A','A','A','A','A','A','A','A','A','A','A','A','A',
  'S','S','S','S','S','S','S','S'
];

var gradeColors = { S: '#788C5D', A: '#D97757', B: '#C78E3F', C: '#ACA9A2' };
var top5Names = ['言莹','吴珍珍','徐锦','邓清清','李佳'];
// 等级标签位置：每个等级中间的 index
var gradeLabelMap = { 4: 'C', 16: 'B', 30: 'A', 41: 'S' };

var seriesData = values.map(function(v, i) {
  var g = grades[i];
  var isS = g === 'S';
  return {
    value: v,
    itemStyle: {
      color: gradeColors[g],
      borderColor: isS ? '#5A6B47' : 'transparent',
      borderWidth: isS ? 1.2 : 0
    }
  };
});

var option = {
  animation: false,
  title: [
    {
      text: '头部 8 人贡献了 40% 的 GMV——靠谁吃饭一目了然',
      left: 'center',
      top: 8,
      textStyle: {
        fontSize: 16, fontWeight: 600, color: '#4F302D',
        fontFamily: 'system-ui, -apple-system, sans-serif', lineHeight: 22
      },
      subtext: '岐力职场参评坐席综合得分排名 | 2026.05.14',
      subtextStyle: {
        fontSize: 11, fontWeight: 400, color: '#9C9C9C',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    },
    {
      text: '数据来源：岐力职场管户金条复贷线 2026.05.14 | 综合得分=ATT得分+GMV得分+件均得分+T0GMV得分+通时得分',
      left: 'center',
      bottom: 3,
      textStyle: {
        fontSize: 10, fontWeight: 400, color: 'rgba(172,169,162,0.6)',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    }
  ],
  grid: { top: 60, bottom: 28, left: 38, right: 12 },
  xAxis: {
    type: 'value', min: 0, max: 82,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { lineStyle: { color: 'rgba(0,0,0,0.04)' } },
    axisLabel: {
      fontSize: 9, color: '#ACA9A2',
      fontFamily: 'system-ui, -apple-system, sans-serif'
    }
  },
  yAxis: {
    type: 'category',
    data: names,
    inverse: false,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: {
      fontSize: 9,
      fontFamily: 'system-ui, -apple-system, sans-serif',
      formatter: function(name, index) {
        var g = gradeLabelMap[index];
        if (g) return '{' + g + '|' + g + ' 级}';
        return '';
      },
      rich: {
        S: { color: '#788C5D', fontWeight: 700, fontSize: 9, fontFamily: 'system-ui, -apple-system, sans-serif' },
        A: { color: '#D97757', fontWeight: 700, fontSize: 9, fontFamily: 'system-ui, -apple-system, sans-serif' },
        B: { color: '#C78E3F', fontWeight: 700, fontSize: 9, fontFamily: 'system-ui, -apple-system, sans-serif' },
        C: { color: '#ACA9A2', fontWeight: 700, fontSize: 9, fontFamily: 'system-ui, -apple-system, sans-serif' }
      }
    }
  },
  series: [{
    type: 'bar',
    data: seriesData,
    barWidth: 9,
    barCategoryGap: '25%',
    label: {
      show: true,
      position: 'insideLeft',
      fontSize: 8,
      color: '#fff',
      fontFamily: 'system-ui, -apple-system, sans-serif',
      fontWeight: 600,
      formatter: function(params) {
        return top5Names.indexOf(params.name) !== -1 ? params.name : '';
      }
    },
    markLine: {
      symbol: 'none',
      silent: true,
      label: { show: false },
      lineStyle: { color: 'rgba(79,48,45,0.18)', type: [4, 3], width: 0.6 },
      data: [
        { yAxis: '徐乐富' },
        { yAxis: '徐鸿宇' },
        { yAxis: '郑民' }
      ]
    }
  }]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
