<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主贷大额拉新 3月目标达成率</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-bg: #F5F3EF;
    --color-surface: #FFFFFF;
    --color-cream: #E8E4DD;
    --color-sand: #C4B8A8;
    --color-stone: #8A7D6E;
    --color-charcoal: #2D2A26;
    --color-black: #1A1816;
    --color-signal-orange: #E87A3C;
    --color-signal-blue: #3C7AE8;

    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Consolas', monospace;
  }

  body {
    background: var(--color-bg);
    color: var(--color-charcoal);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
  }

  /* --- LAYOUT --- */
  .page {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 48px 80px;
    gap: 0;
  }

  /* --- HEADER --- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--color-cream);
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .header-tag {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--color-stone);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
  }

  .header-stats {
    display: flex;
    gap: 40px;
  }

  .header-stat {
    text-align: right;
  }

  .header-stat-value {
    font-size: 20px;
    font-weight: 300;
    font-family: var(--font-display);
  }

  .header-stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--color-stone);
  }

  /* --- MAIN --- */
  .main {
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 48px;
    padding: 32px 0;
    align-items: start;
  }

  /* --- RANKING --- */
  .ranking {
    display: flex;
    flex-direction: column;
  }

  .ranking-header {
    display: grid;
    grid-template-columns: 32px 80px 1fr 90px;
    gap: 24px;
    padding: 0 0 12px 0;
    border-bottom: 1px solid var(--color-charcoal);
    margin-bottom: 4px;
  }

  .ranking-header span {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--color-stone);
  }

  .ranking-header span:last-child {
    text-align: right;
  }

  .ranking-row {
    display: grid;
    grid-template-columns: 32px 80px 1fr 90px;
    gap: 24px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--color-cream);
  }

  .ranking-row:last-child {
    border-bottom: none;
  }

  .ranking-rank {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--color-stone);
    text-align: center;
  }

  .ranking-name {
    font-size: 14px;
    font-weight: 400;
  }

  .ranking-bar-wrap {
    position: relative;
    height: 24px;
    background: var(--color-cream);
    border-radius: 3px;
  }

  .ranking-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    border-radius: 3px;
  }

  .ranking-bar.exceeded { background: var(--color-charcoal); }
  .ranking-bar.achieved { background: var(--color-stone); }
  .ranking-bar.near { background: var(--color-sand); }
  .ranking-bar.missed { background: var(--color-sand); opacity: 0.6; }

  .ranking-target {
    position: absolute;
    top: -6px;
    bottom: -6px;
    width: 2px;
    background: var(--color-signal-orange);
  }

  .ranking-target-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: var(--color-signal-orange);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  .ranking-value {
    font-size: 13px;
    font-family: var(--font-mono);
    text-align: right;
    color: var(--color-charcoal);
  }

  /* --- SIDEBAR --- */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 28px;
    padding-left: 32px;
    border-left: 1px solid var(--color-cream);
  }

  .sidebar-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sidebar-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--color-stone);
  }

  .sidebar-highlight {
    padding: 20px;
    background: var(--color-charcoal);
    color: var(--color-bg);
    border-radius: 4px;
    border-left: 3px solid var(--color-signal-blue);
  }

  .sidebar-highlight-value {
    font-size: 26px;
    font-weight: 300;
    font-family: var(--font-display);
  }

  .sidebar-highlight-note {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 4px;
  }

  .sidebar-card {
    padding: 16px;
    background: var(--color-surface);
    border: 1px solid var(--color-cream);
    border-radius: 4px;
  }

  .sidebar-card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 6px 0;
  }

  .sidebar-card-row + .sidebar-card-row {
    border-top: 1px solid var(--color-cream);
    margin-top: 6px;
    padding-top: 10px;
  }

  .sidebar-card-name {
    color: var(--color-charcoal);
  }

  .sidebar-card-value {
    font-family: var(--font-mono);
    color: var(--color-stone);
  }

  .sidebar-card-value.highlight {
    color: var(--color-signal-blue);
    font-weight: 500;
  }

  /* --- FOOTER --- */
  .footer {
    display: flex;
    justify-content: space-between;
    padding-top: 20px;
    border-top: 1px solid var(--color-cream);
    font-size: 11px;
    color: var(--color-stone);
    letter-spacing: 0.5px;
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 1024px) {
    .page { padding: 32px 40px; }
    .main { grid-template-columns: 1fr; }
    .sidebar { border-left: none; padding-left: 0; border-top: 1px solid var(--color-cream); padding-top: 24px; }
  }

  @media (max-width: 640px) {
    .page { padding: 24px; }
    .header { flex-direction: column; align-items: flex-start; gap: 16px; }
  }
</style>
</head>
<body>

<div class="page">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-section">

    </aside>
  </main>

  <!-- FOOTER -->
  <footer class="footer">

    <span>目标 2.83 亿 · 实际 2.64 亿 · 差距 -1,866 万</span>
  </footer>
</div>

</body>
</html>
