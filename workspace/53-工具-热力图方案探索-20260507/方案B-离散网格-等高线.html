<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案B · 离散网格 + 等高线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f0;font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;color:#2e2c2a;padding:40px 20px}
.container{max-width:740px;margin:0 auto}
h2{font-size:18px;font-weight:600;color:#1a6b50;margin-bottom:4px;letter-spacing:0.5px}
.sub{font-size:12px;color:#857d74;margin-bottom:20px}
.hm-wrap{position:relative;background:#fff;border-radius:8px;border:1px solid #e0ddd5;padding:16px;overflow-x:auto}
#hm{display:block;margin:0 auto}
.legend-row{display:flex;align-items:center;gap:16px;margin-top:16px;padding:10px 16px;background:#fafaf7;border-radius:6px;border:1px solid #e0ddd5;flex-wrap:wrap}
.legend-swatches{display:flex;gap:6px}
.swatch{width:28px;height:14px;border-radius:2px}
.legend-label{font-size:11px;color:#5f5a54;white-space:nowrap}
.note{font-size:11px;color:#857d74;margin-top:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="container">
  <h2>全量供应商 · 四维诊断网格</h2>
  <div class="sub">离散色块 + 等高线圈定集群</div>
  <div class="hm-wrap">
    <canvas id="hm"></canvas>
  </div>
  <div class="legend-row">
    <div class="legend-swatches">
      <div class="swatch" style="background:#7aaa6a"></div>
      <div class="swatch" style="background:#d4a84a"></div>
      <div class="swatch" style="background:#c27a3a"></div>
      <div class="swatch" style="background:#b85a4a"></div>
    </div>
    <span class="legend-label">健康</span>
    <span class="legend-label">关注</span>
    <span class="legend-label">预警</span>
    <span class="legend-label">危险</span>
    <span style="flex:1"></span>
    <span class="legend-label" style="border-left:2px dashed #7a9a7a;padding-left:6px">等高线 健康</span>
    <span class="legend-label" style="border-left:2px dashed #c0a050;padding-left:6px">等高线 关注</span>
    <span class="legend-label" style="border-left:2px dashed #b87050;padding-left:6px">等高线 预警</span>
  </div>
  <div class="note">▲ 25%灰度网格线区分供应商边界｜等高线标记同色聚集区｜右侧标注整体风险评级</div>
</div>
<script>
// ===== DATA =====
var suppliers = [
  { n:'速讯达', v:[3,2,2,1], r:'重点管理' },
  { n:'华啸',   v:[2,2,2,1], r:'重点管理' },
  { n:'阅文',   v:[3,2,1,1], r:'预警' },
  { n:'艾斯',   v:[2,2,1,0], r:'预警' },
  { n:'创博',   v:[1,2,1,0], r:'预警' },
  { n:'九通',   v:[3,1,1,0], r:'观察' },
  { n:'衍生',   v:[3,1,1,0], r:'观察' },
  { n:'速腾',   v:[3,1,1,0], r:'观察' },
  { n:'保全界', v:[3,1,1,0], r:'观察' },
  { n:'小蜜蜂', v:[3,1,0,0], r:'观察' },
  { n:'拓银',   v:[3,1,0,0], r:'观察' },
  { n:'靖涵',   v:[2,1,1,0], r:'观察' },
  { n:'人和',   v:[2,1,1,0], r:'观察' },
  { n:'中弘',   v:[2,1,1,0], r:'观察' },
  { n:'锦瑞',   v:[2,1,1,0], r:'观察' },
  { n:'新动力', v:[2,1,1,0], r:'观察' },
  { n:'嘉信',   v:[2,1,0,0], r:'观察' },
  { n:'博岳',   v:[2,1,0,0], r:'观察' },
  { n:'广达',   v:[1,1,1,0], r:'观察' },
  { n:'岐力',   v:[1,0,1,1], r:'观察' },
  { n:'汇讯',   v:[1,1,1,0], r:'观察' },
  { n:'零犀',   v:[1,1,0,0], r:'观察' },
  { n:'翰锐',   v:[1,1,0,0], r:'观察' },
  { n:'中乾',   v:[1,1,0,0], r:'观察' },
  { n:'德辰',   v:[1,1,0,0], r:'观察' },
  { n:'赛维斯', v:[1,0,1,0], r:'观察' },
  { n:'伽玛',   v:[1,1,0,0], r:'观察' },
  { n:'毅航',   v:[0,1,0,0], r:'观察' },
  { n:'毛毛虫', v:[0,0,0,0], r:'正常' },
];

var dims = ['人（体质）','绩（功力）','管（内功）','风（盲区）'];
var rows = suppliers.length;
var cols = 4;

// Discrete palette (stronger colors for discrete blocks)
var colors = ['#7aaa6a','#d4a84a','#c27a3a','#b85a4a'];

// Numeric field for contour computation
var dataVals = [];
for (var r = 0; r < rows; r++) {
  dataVals[r] = suppliers[r].v.slice();
}

// ===== RENDER =====
(function(){
  var canvas = document.getElementById('hm');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;

  var cellW = 110, cellH = 22;
  var labelW = 64;
  var gapX = 2, gapY = 1;
  var hmLeft = labelW + 8;
  var hmTop = 28;
  var hmW = cols * (cellW + gapX);
  var hmH = rows * (cellH + gapY);

  var totalW = hmLeft + hmW + 50;
  var totalH = hmTop + hmH + 12;
  canvas.width = totalW * dpr;
  canvas.height = totalH * dpr;
  canvas.style.width = totalW + 'px';
  canvas.style.height = totalH + 'px';
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, totalW, totalH);

  // ---- Discrete cells ----
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var x = hmLeft + c * (cellW + gapX);
      var y = hmTop + r * (cellH + gapY);
      var val = suppliers[r].v[c];
      ctx.fillStyle = colors[val];
      ctx.fillRect(x, y, cellW, cellH);
      // Thin grid border
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cellW, cellH);
    }
  }

  // ---- Contour lines via upsampled field ----
  var upW = 40, upH = 290;
  var field = [];
  for (var fy = 0; fy < upH; fy++) {
    field[fy] = [];
    for (var fx = 0; fx < upW; fx++) {
      var gx = fx / 10, gy = fy / 10;
      var ix = Math.min(Math.floor(gx), cols-2);
      var iy = Math.min(Math.floor(gy), rows-2);
      var fxt = gx - ix, fyt = gy - iy;
      var v00 = suppliers[iy].v[ix];
      var v10 = suppliers[iy].v[Math.min(ix+1,cols-1)];
      var v01 = suppliers[Math.min(iy+1,rows-1)].v[ix];
      var v11 = suppliers[Math.min(iy+1,rows-1)].v[Math.min(ix+1,cols-1)];
      field[fy][fx] = v00*(1-fxt)*(1-fyt) + v10*fxt*(1-fyt) + v01*(1-fxt)*fyt + v11*fxt*fyt;
    }
  }

  var scaleX = hmW / upW;
  var scaleY = hmH / upH;

  function drawContourLines(th, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.8;
    ctx.beginPath();

    for (var fy = 0; fy < upH - 1; fy++) {
      for (var fx = 0; fx < upW - 1; fx++) {
        var v00 = field[fy][fx];
        var v10 = field[fy][fx+1];
        var v11 = field[fy+1][fx+1];
        var v01 = field[fy+1][fx];
        var b00 = v00 >= th;
        var b10 = v10 >= th;
        var b11 = v11 >= th;
        var b01 = v01 >= th;
        var code = (b00?1:0)|(b10?2:0)|(b11?4:0)|(b01?8:0);
        if (code===0||code===15) continue;

        function ia(a,b) { return a===b?0.5:(th-a)/(b-a); }

        var eb = ia(v00,v10);
        var er = ia(v10,v11);
        var et = ia(v01,v11);
        var el = ia(v00,v01);

        function px(xf){return hmLeft + (fx + xf) * scaleX;}
        function py(yf){return hmTop + (fy + yf) * scaleY;}
        function seg(x1,y1,x2,y2){
          ctx.moveTo(px(x1),py(y1));
          ctx.lineTo(px(x2),py(y2));
        }

        switch(code){
          case 1: seg(eb,0, 0,el); break;
          case 2: seg(eb,0, 1,er); break;
          case 3: seg(0,el, 1,er); break;
          case 4: seg(et,1, 1,er); break;
          case 5: seg(eb,0,0,el); seg(et,1,1,er); break;
          case 6: seg(eb,0, et,1); break;
          case 7: seg(0,el, et,1); break;
          case 8: seg(et,1, 0,el); break;
          case 9: seg(eb,0, et,1); break;
          case 10: seg(eb,0,1,er); seg(et,1,0,el); break;
          case 11: seg(1,er, et,1); break;
          case 12: seg(0,el, 1,er); break;
          case 13: seg(eb,0, 1,er); break;
          case 14: seg(eb,0, 0,el); break;
        }
      }
    }
    ctx.stroke();
  }

  // Draw contour lines
  drawContourLines(0.5, 'rgba(80,140,80,0.5)');
  drawContourLines(1.5, 'rgba(180,150,50,0.5)');
  drawContourLines(2.5, 'rgba(180,90,70,0.55)');

  // ---- Labels ----
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.font = '11px system-ui, "PingFang SC", sans-serif';
  ctx.fillStyle = '#5f5a54';
  for (var c = 0; c < cols; c++) {
    var lx = hmLeft + c * (cellW + gapX) + cellW/2;
    ctx.fillText(dims[c], lx, hmTop - 4);
  }

  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.font = '11px system-ui, "PingFang SC", sans-serif';
  ctx.fillStyle = '#454240';
  for (var r = 0; r < rows; r++) {
    var ly = hmTop + r * (cellH + gapY) + cellH/2;
    ctx.fillText(suppliers[r].n, labelW + 4, ly);
  }

  // Risk tags
  for (var r = 0; r < rows; r++) {
    var ly = hmTop + r * (cellH + gapY) + cellH/2;
    var tc = '#857d74';
    if (suppliers[r].r === '重点管理') tc = '#a87060';
    else if (suppliers[r].r === '预警') tc = '#c0a050';
    else if (suppliers[r].r === '正常') tc = '#7a9a7a';
    ctx.fillStyle = tc;
    ctx.font = '9px system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(suppliers[r].r, hmLeft + hmW + 4, ly);
  }
})();
</script>
</body>
</html>
