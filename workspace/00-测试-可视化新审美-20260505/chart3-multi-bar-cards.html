<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>供应商多维能力</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #faf8f5; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; padding: 40px; }
.container { width: 960px; background: #fff; border-radius: 12px; border: 1px solid #e8e4df; overflow: hidden; }
.header { padding: 28px 32px 0; }
.header h1 { font-size: 18px; font-weight: 600; color: #2e4a7a; margin-bottom: 4px; }
.header .subtitle { font-size: 12px; color: #857d74; }
.body { padding: 24px 32px 32px; }
.chart { width: 100%; height: 380px; }
.insight-row { display: flex; gap: 16px; margin-top: 20px; }
.insight-card { flex: 1; background: #faf8f5; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e4df; }
.insight-card .tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
.insight-card .tag.strength { background: #e8f5e9; color: #2e8b6e; }
.insight-card .tag.weakness { background: #fde8e3; color: #c25030; }
.insight-card .tag.risk { background: #fff3e0; color: #c26d3a; }
.insight-card p { font-size: 12px; color: #4a4a4a; line-height: 1.6; }
.footer { padding: 12px 32px; border-top: 1px solid #f2f0eb; font-size: 10px; color: #ada599; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>毅航交付能力全面领先，翰锐合规存短板</h1>
    <div class="subtitle">六大维度能力评分 · 2025年Q4</div>
  </div>
  <div class="body">
    <div class="chart" id="main"></div>
    <div class="insight-row">
      <div class="insight-card">
        <span class="tag strength">优势</span>
        <p><b>毅航</b>在交付(96)、质量(95)双项满分，服务响应速度行业第一，是金条产线的核心支柱</p>
      </div>
      <div class="insight-card">
        <span class="tag weakness">短板</span>
        <p><b>翰锐</b>合规维度仅 62 分，主要受审计整改逾期影响，需限期完成整改否则触发清退</p>
      </div>
      <div class="insight-card">
        <span class="tag risk">关注</span>
        <p><b>伽玛</b>创新能力全行业最低(48)，长期依赖传统交付模式，建议纳入创新赋能计划</p>
      </div>
    </div>
  </div>
  <div class="footer">数据来源：供应商管理系统 · 维度含质量/交付/成本/服务/创新/合规</div>
</div>
<script>
var chart = echarts.init(document.getElementById('main'));
var dims = ['质量', '交付', '成本', '服务', '创新', '合规'];
var suppliers = [
  { name: '毅航', data: [95, 96, 88, 94, 82, 90], highlight: true },
  { name: '毛毛虫', data: [80, 82, 92, 75, 65, 78] },
  { name: '赛维斯', data: [78, 76, 80, 85, 70, 82] },
  { name: '伽玛', data: [72, 70, 75, 68, 48, 74] },
  { name: '翰锐', data: [75, 72, 70, 76, 60, 62] }
];
var series = dims.map(function(dim, i) {
  return {
    name: dim,
    type: 'bar',
    stack: 'dim' + i,
    barGap: '0%',
    barWidth: 14,
    data: suppliers.map(function(s) {
      var isHighlight = s.highlight && s.data[i] >= 90;
      var isLow = s.data[i] <= 65;
      return {
        value: s.data[i],
        itemStyle: { color: isHighlight ? '#2e4a7a' : isLow ? '#c25030' : '#ada599' }
      };
    })
  };
});
chart.setOption({
  animation: false,
  tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
  legend: { show: false },
  grid: { left: 80, right: 24, top: 12, bottom: 28 },
  xAxis: { type: 'value', min: 0, max: 100, axisLine: { lineStyle: { color: '#ada599' } }, splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } }, axisLabel: { color: '#857d74', fontSize: 11 } },
  yAxis: { type: 'category', data: suppliers.map(function(s){ return s.name; }), axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#4a4a4a', fontSize: 12 } },
  series: [
    {
      name: '综合',
      type: 'bar',
      barGap: '20%',
      barWidth: 18,
      data: suppliers.map(function(s) {
        var avg = s.data.reduce(function(a,b){ return a+b; }, 0) / s.data.length;
        return { value: Math.round(avg), itemStyle: { color: s.highlight ? '#2e4a7a' : '#ada599' } };
      }),
      label: { show: true, position: 'right', formatter: '{c}', fontSize: 11, color: '#4a4a4a' }
    }
  ]
});
</script>
</body></html>
