<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Q4 业绩环比持续增长</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; padding: 20px; background: #0d0d1a; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .container { width: 800px; background: #1a1a2e; border-radius: 8px; padding: 32px 24px 16px; }
  .chart { width: 752px; height: 420px; }
  .footer { font-size: 11px; color: #555; margin-top: 8px; padding-left: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="chart" id="chart"></div>
  <div class="footer">Source: 服务组月度营收统计</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
var option = {
  backgroundColor: '#1a1a2e',
  title: {
    text: 'Q4 业绩环比持续增长，12月创月度新高580万',
    subtext: '2025年7月-12月 · 月度营收（万元）',
    left: 0, top: 0,
    textStyle: { fontSize: 16, fontWeight: 'bold', color: '#ffffff' },
    subtextStyle: { fontSize: 12, color: '#a0a0c0' }
  },
  tooltip: { trigger: 'axis' },
  grid: { left: 60, right: 60, top: 70, bottom: 30 },
  xAxis: {
    type: 'category',
    data: ['7月', '8月', '9月', '10月', '11月', '12月'],
    axisLine: { lineStyle: { color: '#333355' } },
    axisTick: { lineStyle: { color: '#333355' } },
    axisLabel: { color: '#a0a0c0', fontSize: 12 }
  },
  yAxis: {
    type: 'value',
    min: 300,
    splitLine: { lineStyle: { color: '#333355', type: 'dashed' } },
    axisLabel: { color: '#a0a0c0', fontSize: 11, formatter: '{value}万' },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [{
    type: 'line',
    data: [380, 410, 395, 460, 520, 580],
    smooth: 0.3,
    symbolSize: 8,
    lineStyle: { color: '#4ade80', width: 3 },
    itemStyle: { color: '#4ade80' },
    areaStyle: {
      color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
        { offset: 0, color: 'rgba(74,222,128,0.35)' },
        { offset: 1, color: 'rgba(74,222,128,0.02)' }
      ])
    },
    markPoint: {
      data: [{ type: 'max', name: '最高', itemStyle: { color: '#4ade80' } }],
      label: { formatter: '580万\n创月度新高', fontSize: 10, color: '#fff' }
    },
    label: {
      show: true,
      position: 'top',
      fontSize: 11,
      color: '#a0a0c0',
      formatter: function(p) {
        if (p.dataIndex === 5) return '+11.5%';
        return p.value + '万';
      }
    },
    animation: false
  }]
};
chart.setOption(option);
</script>
</body>
</html>
