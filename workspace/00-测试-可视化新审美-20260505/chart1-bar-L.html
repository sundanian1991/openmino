<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>供应商排名</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #faf8f5; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; padding: 40px; }
.container { width: 960px; background: #fff; border-radius: 12px; border: 1px solid #e8e4df; overflow: hidden; }
.header { padding: 28px 32px 0; }
.header h1 { font-size: 18px; font-weight: 600; color: #2e4a7a; margin-bottom: 4px; }
.header .subtitle { font-size: 12px; color: #857d74; }
.body { display: flex; padding: 24px 32px 32px; gap: 32px; }
.chart-area { flex: 3; min-width: 0; }
.chart { width: 100%; height: 340px; }
.insight-area { flex: 2; padding-top: 8px; }
.insight-area h3 { font-size: 13px; font-weight: 600; color: #2e4a7a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e8e4df; }
.insight-item { margin-bottom: 14px; }
.insight-item .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #c26d3a; margin-right: 6px; vertical-align: middle; margin-top: -1px; }
.insight-item p { font-size: 12px; color: #4a4a4a; line-height: 1.6; padding-left: 12px; }
.footer { padding: 12px 32px; border-top: 1px solid #f2f0eb; font-size: 10px; color: #ada599; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>毅航综合评分领先，3 家供应商低于基准线</h1>
    <div class="subtitle">金条产线头部供应商 · 2025年Q4综合评估</div>
  </div>
  <div class="body">
    <div class="chart-area">
      <div class="chart" id="main"></div>
    </div>
    <div class="insight-area">
      <h3>核心解读</h3>
      <div class="insight-item">
        <p><span class="dot"></span><b>毅航</b>连续两季度评分第一，交付质量和响应速度双项满分，为金条产线主力供应商</p>
      </div>
      <div class="insight-item">
        <p><span class="dot"></span><b>基准线 75 分</b>为产线准入标准，翰锐/岐力/伽玛三家未达标，需重点关注合规短板</p>
      </div>
      <div class="insight-item">
        <p><span class="dot"></span><b>毛毛虫</b>评分排名第二，成本优势突出但创新能力偏弱，建议加大赋能投入</p>
      </div>
    </div>
  </div>
  <div class="footer">数据来源：供应商管理系统 · 评估维度含质量/交付/成本/服务/创新/合规</div>
</div>
<script>
var chart = echarts.init(document.getElementById('main'));
chart.setOption({
  animation: false,
  grid: { left: 80, right: 24, top: 12, bottom: 24 },
  xAxis: { type: 'value', min: 0, max: 100, axisLine: { lineStyle: { color: '#ada599' } }, splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } }, axisLabel: { color: '#857d74', fontSize: 11 } },
  yAxis: { type: 'category', data: ['伽玛', '岐力', '翰锐', '毛毛虫', '赛维斯', '毅航'], axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#4a4a4a', fontSize: 12 } },
  series: [{
    type: 'bar', barWidth: 20, data: [
      { value: 68, itemStyle: { color: '#ada599' } },
      { value: 71, itemStyle: { color: '#ada599' } },
      { value: 73, itemStyle: { color: '#ada599' } },
      { value: 85, itemStyle: { color: '#c26d3a' } },
      { value: 88, itemStyle: { color: '#c26d3a' } },
      { value: 92, itemStyle: { color: '#2e4a7a' } }
    ],
    label: { show: true, position: 'right', formatter: '{c}', fontSize: 11, color: '#4a4a4a' },
    markLine: {
      silent: true, symbol: 'none',
      data: [{ xAxis: 75, lineStyle: { color: '#c25030', width: 1.5, type: 'dashed' } }],
      label: { formatter: '基准线 75', position: 'insideStartTop', color: '#c25030', fontSize: 10 }
    }
  }]
});
</script>
</body></html>
