<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>供应商能力雷达画像</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; padding: 20px; background: #f0f0f0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .container { width: 800px; background: #fff; border-radius: 8px; padding: 32px 24px 16px; }
  .chart { width: 752px; height: 500px; }
  .footer { font-size: 11px; color: #999; margin-top: 4px; padding-left: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="chart" id="chart"></div>
  <div class="footer">Source: 服务组季度评估 N=6 · 六维能力模型</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
var option = {
  title: {
    text: '毅航交付能力全面领先，翰锐合规存短板',
    subtext: '2025年Q4 · 6家供应商六维能力对比',
    left: 0, top: 0,
    textStyle: { fontSize: 16, fontWeight: 'bold', color: '#1e293b' },
    subtextStyle: { fontSize: 12, color: '#64748b' }
  },
  legend: {
    bottom: 0,
    data: ['毅航', '毛毛虫', '伽玛', '赛维斯', '岐力', '翰锐'],
    itemWidth: 12, itemHeight: 3,
    textStyle: { fontSize: 11, color: '#64748b' }
  },
  radar: {
    center: ['50%', '52%'],
    radius: '60%',
    indicator: [
      { name: '交付质量', max: 100 },
      { name: '响应速度', max: 100 },
      { name: '合规水平', max: 100 },
      { name: '成本控制', max: 100 },
      { name: '创新能力', max: 100 },
      { name: '客户满意度', max: 100 }
    ],
    axisName: { color: '#334155', fontSize: 12, fontWeight: 500 },
    splitLine: { lineStyle: { color: '#e0e0e0', type: 'dashed' } },
    splitArea: {
      areaStyle: { color: ['rgba(245,245,245,0.3)', 'rgba(255,255,255,0.3)'] }
    },
    axisLine: { lineStyle: { color: '#e0e0e0' } }
  },
  series: [{
    type: 'radar',
    // Top 3 with area fill
    data: [
      {
        value: [90, 85, 88, 80, 75, 92],
        name: '毅航',
        lineStyle: { color: '#2563eb', width: 3 },
        areaStyle: { color: 'rgba(37,99,235,0.12)' },
        itemStyle: { color: '#2563eb' },
        label: { show: false }
      },
      {
        value: [82, 88, 76, 85, 70, 80],
        name: '毛毛虫',
        lineStyle: { color: '#059669', width: 1.5 },
        areaStyle: { color: 'rgba(5,150,105,0.10)' },
        itemStyle: { color: '#059669' }
      },
      {
        value: [75, 72, 80, 78, 82, 74],
        name: '伽玛',
        lineStyle: { color: '#d97706', width: 1.5 },
        areaStyle: { color: 'rgba(217,119,6,0.08)' },
        itemStyle: { color: '#d97706' }
      },
      // Bottom 3 lines only
      {
        value: [68, 78, 65, 82, 76, 70],
        name: '赛维斯',
        lineStyle: { color: '#857d74', width: 1 },
        itemStyle: { color: '#857d74' }
      },
      {
        value: [65, 70, 72, 88, 60, 68],
        name: '岐力',
        lineStyle: { color: '#ada599', width: 1 },
        itemStyle: { color: '#ada599' }
      },
      {
        value: [58, 62, 55, 75, 65, 60],
        name: '翰锐',
        lineStyle: { color: '#d6d2c9', width: 1 },
        itemStyle: { color: '#d6d2c9' }
      }
    ],
    animation: false
  }]
};
chart.setOption(option);
</script>
</body>
</html>
