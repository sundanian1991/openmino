<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>金条头部供应商综合评分排名</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; padding: 20px; background: #f5f5f5; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .container { width: 800px; background: #fff; border-radius: 8px; padding: 32px 24px 16px; }
  .chart { width: 752px; height: 420px; }
  .footer { font-size: 11px; color: #999; margin-top: 8px; padding-left: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="chart" id="chart"></div>
  <div class="footer">Source: 服务组季度评估 N=6</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
var option = {
  title: {
    text: '毅航综合评分92分领先，翰锐61分垫底',
    subtext: '2025年Q4 · 服务组评估',
    left: 0, top: 0,
    textStyle: { fontSize: 16, fontWeight: 'bold', color: '#1e293b' },
    subtextStyle: { fontSize: 12, color: '#64748b' }
  },
  grid: { left: 80, right: 40, top: 60, bottom: 20 },
  xAxis: {
    type: 'value',
    min: 40, max: 100,
    splitLine: { show: false },
    axisLabel: { show: false },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'category',
    data: ['翰锐', '岐力', '赛维斯', '伽玛', '毛毛虫', '毅航'],
    inverse: true,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { fontSize: 13, color: '#334155' }
  },
  series: [{
    type: 'bar',
    data: [
      { value: 61, itemStyle: { color: '#2e4a7a' } },
      { value: 68, itemStyle: { color: '#2e4a7a' } },
      { value: 72, itemStyle: { color: '#2e4a7a' } },
      { value: 78, itemStyle: { color: '#2e4a7a' } },
      { value: 85, itemStyle: { color: '#2e4a7a' } },
      { value: 92, itemStyle: { color: '#c26d3a' } }
    ],
    barWidth: 24,
    label: {
      show: true,
      position: 'right',
      formatter: '{c}分',
      fontSize: 12,
      color: '#475569'
    },
    animation: false
  }],
  // Baseline at 75
  graphic: [{
    type: 'line',
    shape: { x1: 80, y1: 210, x2: 712, y2: 210 },
    style: { stroke: '#b0b0b0', lineWidth: 1, lineDash: [4, 4] }
  }, {
    type: 'text',
    style: {
      text: '平均线 75',
      x: 716, y: 206,
      fontSize: 10, fill: '#b0b0b0'
    }
  }]
};
chart.setOption(option);
</script>
</body>
</html>
