<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>营收趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #faf8f5; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; padding: 40px; }
.container { width: 960px; background: #fff; border-radius: 12px; border: 1px solid #e8e4df; overflow: hidden; }
.header { padding: 28px 32px 0; }
.header h1 { font-size: 18px; font-weight: 600; color: #2e4a7a; margin-bottom: 4px; }
.header .subtitle { font-size: 12px; color: #857d74; }
.body { display: flex; padding: 20px 32px 32px; gap: 24px; }
.chart-wrap { flex: 7; min-width: 0; }
.chart { width: 100%; height: 320px; }
.sidebar { flex: 3; display: flex; flex-direction: column; gap: 12px; }
.kpi-card { background: #faf8f5; border-radius: 10px; padding: 16px; border: 1px solid #e8e4df; }
.kpi-card .label { font-size: 11px; color: #857d74; margin-bottom: 4px; }
.kpi-card .value { font-size: 24px; font-weight: 700; color: #2e4a7a; }
.kpi-card .change { font-size: 11px; margin-top: 4px; }
.kpi-card .change.up { color: #2e8b6e; }
.kpi-card .change.down { color: #c25030; }
.insight { background: #fff; border: 1px solid #e8e4df; border-radius: 10px; padding: 14px; margin-top: auto; }
.insight h4 { font-size: 12px; font-weight: 600; color: #2e4a7a; margin-bottom: 8px; }
.insight p { font-size: 11px; color: #4a4a4a; line-height: 1.6; }
.footer { padding: 12px 32px; border-top: 1px solid #f2f0eb; font-size: 10px; color: #ada599; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Q4 营收逐月攀升，12 月达年度峰值</h1>
    <div class="subtitle">金条产线月度营收 · 2025年10-12月</div>
  </div>
  <div class="body">
    <div class="chart-wrap">
      <div class="chart" id="main"></div>
    </div>
    <div class="sidebar">
      <div class="kpi-card">
        <div class="label">Q4 总营收</div>
        <div class="value">1,720万</div>
        <div class="change up">▲ 环比 Q3 +12.3%</div>
      </div>
      <div class="kpi-card">
        <div class="label">峰值月</div>
        <div class="value">580万</div>
        <div class="change up">▲ 12月创年度新高</div>
      </div>
      <div class="kpi-card">
        <div class="label">月均增速</div>
        <div class="value">+5.8%</div>
        <div class="change up">连续三月正增长</div>
      </div>
      <div class="insight">
        <h4>趋势解读</h4>
        <p>10月受季节性波动影响开局偏低，11月起旺季效应叠加新供应商上线，营收进入上行通道，12月受年终冲刺推动达到峰值。</p>
      </div>
    </div>
  </div>
  <div class="footer">数据来源：财务系统 · 营收口径为含税收入</div>
</div>
<script>
var chart = echarts.init(document.getElementById('main'));
chart.setOption({
  animation: false,
  tooltip: { trigger: 'axis' },
  grid: { left: 56, right: 20, top: 20, bottom: 32 },
  xAxis: { type: 'category', data: ['10月', '11月', '12月'], axisLine: { lineStyle: { color: '#ada599' } }, axisTick: { show: false }, axisLabel: { color: '#4a4a4a', fontSize: 12 } },
  yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } }, axisLabel: { color: '#857d74', fontSize: 11, formatter: '{value}万' } },
  series: [{
    type: 'line', smooth: true, symbol: 'circle', symbolSize: 8,
    data: [520, 620, 580],
    lineStyle: { color: '#2e8b6e', width: 3 },
    itemStyle: { color: '#2e8b6e' },
    areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(46,139,110,0.18)' }, { offset: 1, color: 'rgba(46,139,110,0.02)' }] } },
    label: { show: true, position: 'top', formatter: '{c}万', fontSize: 12, fontWeight: 600, color: '#2e4a7a' },
    markPoint: {
      data: [{ type: 'max', name: '峰值', symbol: 'pin', symbolSize: 1, label: { formatter: '年终冲刺推动达峰', fontSize: 10, color: '#2e8b6e', position: 'top', offset: [0, -4] } }]
    }
  }]
});
</script>
</body></html>
