<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 小镜子 v2 - 基于真实镜子的观察 -->
  <!-- 核心改进：镜框厚度、镜面反光、挂环设计 -->
  <!-- 参考：真实镜子的结构分析 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 镜框：矩形，有厚度 -->
    <path d="m84.27 44.27h82.46a11 11 0 0 1 11 11v121a11 11 0 0 1 -11 11h-82.46a11 11 0 0 1 -11-11v-121a11 11 0 0 1 11-11z" fill="#FEFFFE"/>

    <!-- 镜面：内部矩形 -->
    <path d="m94.27 59.27h62.46a9 9 0 0 1 9 9v101a9 9 0 0 1 -9 9h-62.46a9 9 0 0 1 -9-9v-101a9 9 0 0 1 9-9z" fill="#FEFFFE"/>

    <!-- 镜框顶部陶土色装饰 -->
    <path d="m104.3 49.27h42.46a6 6 0 0 1 6 6s-6 6-6 6-6 6-6 6-6 6z" fill="#B03A21"/>

    <!-- 镜框底部陶土色装饰 -->
    <path d="m104.3 189.3h42.46a6 6 0 0 1 6 6s-6 6-6 6-6 6-6 6-6 6z" fill="#B03A21"/>

    <!-- 镜面反光效果：斜条纹 -->
    <path d="m104.3 69.3
             c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5 5 5-2.24 5-5-5z"
          fill="#FEFFFE" opacity="0.3"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 镜框外轮廓：矩形 -->
    <path d="m84.27 44.27h82.46a11 11 0 0 1 11 11v121a11 11 0 0 1 -11 11h-82.46a11 11 0 0 1 -11-11v-121a11 11 0 0 1 11-11" stroke-width="5.2"/>

    <!-- 镜面轮廓：内部矩形 -->
    <path d="m94.27 59.27h62.46a9 9 0 0 1 9 9v101a9 9 0 0 1 -9 9h-62.46a9 9 0 0 1 -9-9v-101a9 9 0 0 1 9-9" stroke-width="4.6"/>

    <!-- 镜框顶部陶土色装饰轮廓 -->
    <path d="m104.3 49.27h42.46a6 6 0 0 1 6 6s-6 6-6 6-6 6-6 6-6 6z" stroke-width="3.5"/>

    <!-- 镜框底部陶土色装饰轮廓 -->
    <path d="m104.3 189.3h42.46a6 6 0 0 1 6 6s-6 6-6 6-6 6-6 6-6 6z" stroke-width="3.5"/>

    <!-- 镜面反光条纹：斜线 -->
    <path d="m104.3 69.3
             c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5 5 5-2.24 5-5-5"
          stroke-width="2.0"/>

    <!-- 镜框厚度：侧边细节 -->
    <path d="m84.27 55.27v100" stroke-width="3.0"/>
    <path d="m166.7 55.27v100" stroke-width="3.0"/>

    <!-- 镜框纹理线：装饰细节 -->
    <path d="m90.27 65.27v10" stroke-width="1.5"/>
    <path d="m160.7 65.27v10" stroke-width="1.5"/>
    <path d="m90.27 180.3v10" stroke-width="1.5"/>
    <path d="m160.7 180.3v10" stroke-width="1.5"/>

    <!-- 挂环：顶部悬挂装置 -->
    <path d="m125.5 44.27v8" stroke-width="3.5"/>
    <path d="m118.3 44.27
             c0-4.14 3.36-7.5 7.5-7.5s7.5 3.36 7.5 7.5"
          stroke-width="3.5"/>
    <path d="m132.7 44.27
             c0-4.14-3.36-7.5-7.5-7.5s-7.5 3.36-7.5 7.5"
          stroke-width="3.5"/>

    <!-- 挂环细节：环形 -->
    <circle cx="125.5" cy="42.27" r="4" fill="#FEFFFE" stroke="#140A05" stroke-width="2.5"/>
  </g>
</svg>
