<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 沙发 v2 - 基于真实沙发的观察 -->
  <!-- 核心改进：靠背与扶手一体化、多个座垫、蓬松抱枕 -->
  <!-- 参考：真实沙发的结构分析 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 沙发主体：低矮宽大的矩形 -->
    <path d="m44.27 88.27h162.46a16 16 0 0 1 16 16v76a16 16 0 0 1 -16 16h-162.46a16 16 0 0 1 -16-16v-76a16 16 0 0 1 16-16z" fill="#FEFFFE"/>

    <!-- 靠背垫：与扶手一体化 -->
    <path d="m54.27 61.27h142.46a12 12 0 0 1 12 12v29a12 12 0 0 1 -12 12h-142.46a12 12 0 0 1 -12-12v-29a12 12 0 0 1 12-12z" fill="#FEFFFE"/>

    <!-- 左扶手：圆润边角 -->
    <path d="m44.27 94.27h25a8 8 0 0 1 8 8v66a8 8 0 0 1 -8 8h-25a8 8 0 0 1 -8-8v-66a8 8 0 0 1 8-8z" fill="#FEFFFE"/>

    <!-- 右扶手：圆润边角 -->
    <path d="m180.7 94.27h25a8 8 0 0 1 8 8v66a8 8 0 0 1 -8 8h-25a8 8 0 0 1 -8-8v-66a8 8 0 0 1 8-8z" fill="#FEFFFE"/>

    <!-- 陶土色抱枕（左）：蓬松椭圆 -->
    <path d="m69.27 105.3
             c-8.28 0-15 6.72-15 15s6.72 15 15 15 15-6.72 15-15-6.72-15-15 0-8.28 6.72-15 15-15z"
          fill="#B03A21"/>

    <!-- 陶土色抱枕（右）：蓬松椭圆 -->
    <path d="m150.7 105.3
             c-8.28 0-15 6.72-15 15s6.72 15 15 15 15-6.72 15-15-6.72-15-15 0-8.28 6.72-15 15-15z"
          fill="#B03A21"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 靠背轮廓：一体化设计 -->
    <path d="m54.27 61.27h142.46a12 12 0 0 1 12 12v29a12 12 0 0 1 -12 12h-142.46a12 12 0 0 1 -12-12v-29a12 12 0 0 1 12-12" stroke-width="5.2"/>

    <!-- 主体轮廓：低矮宽大 -->
    <path d="m44.27 88.27h162.46a16 16 0 0 1 16 16v76a16 16 0 0 1 -16 16h-162.46a16 16 0 0 1 -16-16v-76a16 16 0 0 1 16-16" stroke-width="5.2"/>

    <!-- 左扶手：圆润边角，一体化连接 -->
    <path d="m44.27 94.27h25a8 8 0 0 1 8 8v66a8 8 0 0 1 -8 8h-25a8 8 0 0 1 -8-8v-66a8 8 0 0 1 8-8" stroke-width="4.6"/>

    <!-- 右扶手：圆润边角 -->
    <path d="m180.7 94.27h25a8 8 0 0 1 8 8v66a8 8 0 0 1 -8 8h-25a8 8 0 0 1 -8-8v-66a8 8 0 0 1 8-8" stroke-width="4.6"/>

    <!-- 座垫分割线：2-3 个座垫 -->
    <path d="m83.27 130.3h84.46" stroke-width="2.9"/>
    <path d="m83.27 155.3h84.46" stroke-width="2.9"/>

    <!-- 抱枕轮廓（左）：蓬松椭圆 -->
    <path d="m69.27 105.3
             c-8.28 0-15 6.72-15 15s6.72 15 15 15 15-6.72 15-15-6.72-15-15 0-8.28 6.72-15 15-15z"
          stroke-width="3.5"/>

    <!-- 抱枕轮廓（右）：蓬松椭圆 -->
    <path d="m150.7 105.3
             c-8.28 0-15 6.72-15 15s6.72 15 15 15 15-6.72 15-15-6.72-15-15 0-8.28 6.72-15 15-15z"
          stroke-width="3.5"/>

    <!-- 座垫缝线：蓬松感 -->
    <path d="m84.27 115.3c8.28 0 15 6.72 15 15s6.72 15 15 15" stroke-width="1.8"/>
    <path d="m165.7 115.3c-8.28 0-15 6.72-15 15s-6.72 15-15 15" stroke-width="1.8"/>

    <!-- 腿部：短而细，半隐藏 -->
    <path d="m70.27 170.3v25" stroke-width="4.0"/>
    <path d="m180.7 170.3v25" stroke-width="4.0"/>
    <path d="m75.27 195.3v10" stroke-width="3.5"/>
    <path d="m175.7 195.3v10" stroke-width="3.5"/>
  </g>
</svg>
