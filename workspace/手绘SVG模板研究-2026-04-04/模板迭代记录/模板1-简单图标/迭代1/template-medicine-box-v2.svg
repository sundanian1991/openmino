<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 药品盒子 v2 - 基于真实药盒的观察 -->
  <!-- 核心改进：立方体透视、盖子设计、侧面标签 -->
  <!-- 参考：真实药盒的透视结构 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 盒子主体：立方体透视（可见三个面） -->
    <!-- 正面 -->
    <path d="m94.27 100.3h62.46a10 10 0 0 1 10-10v70a10 10 0 0 1 -10-10h-62.46a10 10 0 0 1 -10 10v70a10 10 0 0 1 10 10z" fill="#FEFFFE"/>

    <!-- 顶面（平行四边形，透视效果） -->
    <path d="m94.27 100.3
             l62.46-12
             a10 10 0 0 0 10-10
             v-70
             a10 10 0 0 0-10 10
             l-62.46 12
             a10 10 0 0 1-10-10
             v70
             a10 10 0 0 1 10 10
             z"
          fill="#E8E8E8" opacity="0.5"/>

    <!-- 侧面（梯形，透视效果） -->
    <path d="m84.27 110.3
             l10 70
             v-70
             l-10 70
             z"
          fill="#D8D8D8" opacity="0.5"/>

    <!-- 盖子：顶面 -->
    <path d="m84.27 100.3
             l82.46 0
             a10 10 0 0 0 10-10
             v-5
             a10 10 0 0 0-10 10
             l-82.46 0
             a10 10 0 0 1-10 10
             v5
             a10 10 0 0 1 10-10
             z"
          fill="#FEFFFE"/>

    <!-- 陶土色十字标志：医疗标识 -->
    <path d="m125.5 85.3
             c-3.59 0-6.51 2.92-6.51 6.51v24.64h-24.64c-3.59 0-6.51 2.92-6.51 6.51s2.92 6.51 6.51 6.51h24.64v24.64c0 3.59 2.92 6.51 6.51 6.51s6.51-2.92 6.51-6.51v-24.64c0-3.59-2.92-6.51-6.51-6.51z"
          fill="#B03A21"/>

    <!-- 侧面标签：矩形 -->
    <path d="m94.27 120.3
             h40
             v35
             h-40
             z"
          fill="#E8E8E8"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 盒子正面轮廓 -->
    <path d="m94.27 100.3h62.46a10 10 0 0 1 10-10v70a10 10 0 0 1 -10-10h-62.46a10 10 0 0 1 -10 10v70a10 10 0 0 1 10 10z" stroke-width="5.2"/>

    <!-- 盖子轮廓：顶面 -->
    <path d="m84.27 100.3
             l82.46 0
             a10 10 0 0 0 10-10
             v-5
             a10 10 0 0 0-10 10
             l-82.46 0
             a10 10 0 0 1-10 10
             v5
             a10 10 0 0 1 10-10"
          stroke-width="5.2"/>

    <!-- 盖子边缘：厚度感 -->
    <path d="m84.27 105.27v-5" stroke-width="4.0"/>
    <path d="m166.7 105.27v-5" stroke-width="4.0"/>
    <path d="m94.27 100.3v-5" stroke-width="3.5"/>
    <path d="m156.7 100.3v-5" stroke-width="3.5"/>

    <!-- 顶面透视线：平行四边形 -->
    <path d="m94.27 100.3
             l62.46-12"
             a10 10 0 0 0 10-10
             v-70
             a10 10 0 0 0-10 10
             l-62.46 12"
          stroke-width="4.0"/>

    <!-- 侧面透视线：梯形 -->
    <path d="m84.27 110.3l10 70" stroke-width="4.0"/>
    <path d="m94.27 110.3l10 70" stroke-width="4.0"/>
    <path d="m94.27 180.3l10 0" stroke-width="4.0"/>

    <!-- 陶土色十字标志轮廓 -->
    <path d="m125.5 85.3
             c-3.59 0-6.51 2.92-6.51 6.51v24.64h-24.64c-3.59 0-6.51 2.92-6.51 6.51s2.92 6.51 6.51 6.51h24.64v24.64c0 3.59 2.92 6.51 6.51 6.51s6.51-2.92 6.51-6.51v-24.64c0-3.59-2.92-6.51-6.51-6.51z"
          stroke-width="3.5"/>

    <!-- 侧面标签轮廓 -->
    <path d="m94.27 120.3
             h40
             v35
             h-40
             z"
          stroke-width="3.0"/>

    <!-- 标签细节：文字区域 -->
    <path d="m99.27 128.3h30" stroke-width="2.0"/>
    <path d="m99.27 138.3h30" stroke-width="2.0"/>
    <path d="m99.27 148.3h20" stroke-width="2.0"/>

    <!-- 盒子底部阴影线：立体感 -->
    <path d="m94.27 180.3h62.46" stroke-width="2.9"/>
    <path d="m84.27 180.3l10 0" stroke-width="2.9"/>
  </g>
</svg>
