<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 椅子 v2 - 有机化版本，基于贝塞尔模式库 -->
  <!-- 核心改进：靠背有机化、线条呼吸感、负空间呼吸 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 靠背：有机矩形（上宽下窄 + 左右微不对称） -->
    <path d="m81.27 50.27
             q10-2 24-1.5
             q14 0.5 28.5 1
             q14-0.5 28-1
             q10 2.5 24 1
             q6.6 0.5 12 5
             v48
             q0 6-5.4 12
             h-90.5
             q-6-6-6-12
             v-48
             q5.5-4.5 12-5
             q14 1.5 28-1
             z"
          fill="#FEFFFE"/>

    <!-- 座垫：有机矩形（微微膨胀） -->
    <path d="m59.27 121.3
             q8-1 32-1.5
             q32.5 0.5 65.5 1.5
             q2.5 5 5 10
             v10
             q-0.5 5-5 10
             h-130.5
             q-4.5-5-5-10
             v-10
             q0.5-5 5-10
             z"
          fill="#FEFFFE"/>

    <!-- 陶土色坐垫装饰（有机填充，土豆形状） -->
    <path d="m94.27 131.3
             c5-3.5 12-4 18-3
             c6 1 12 3 15 7
             c3 4 2 8-2 10
             c-4 2-10 3-16 2
             c-6-1-12-3-15-7
             c-3-4-2-8 2-10
             z"
          fill="#B03A21"/>

    <!-- 腿部连接件（有机直线） -->
    <path d="m70.27 151.3 h110.5" fill="#FEFFFE"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 靠背外轮廓：分段粗细（5.2 → 4.6 → 4.0px），有机直线 -->
    <path d="m81.27 50.27
             q10-2 24-1.5
             q14 0.5 28.5 1"
          stroke-width="5.2"/>
    <path d="m134.77 49.77
             q14-0.5 28-1
             q10 2.5 24 1
             q6.6 0.5 12 5
             v48"
          stroke-width="4.6"/>
    <path d="m169.27 103.27
             q0 6-5.4 12
             h-90.5"
          stroke-width="4.6"/>
    <path d="m73.37 115.27
             q-6-6-6-12
             v-48
             q5.5-4.5 12-5"
          stroke-width="4.0"/>
    <path d="m79.27 62.27
             q14 1.5 28-1"
          stroke-width="4.0"/>

    <!-- 靠背内框：中等线条，有机圆角 -->
    <path d="m91.27 62.27
             q8-1 34-1
             q35 1.5 69 1
             q4 4 8 8
             v30
             q-4 4-8 8
             h-70.5
             q-4-4-8-8
             v-30
             q4-4 8-8
             z"
          stroke-width="3.5"/>

    <!-- 靠背竖条纹：负空间呼吸（间距随机 18-22px） -->
    <!-- 左侧：间距 18px, 21px, 19px -->
    <path d="m106.3 62.27v46" stroke-width="2.9"/>
    <path d="m126.5 61.27v47" stroke-width="3.0"/>
    <path d="m146.7 62.27v45" stroke-width="2.8"/>

    <!-- 右侧：间距 20px, 19px, 21px（独立随机） -->
    <path d="m158.3 62.27v44" stroke-width="2.9"/>
    <path d="m166.7 62.27v43" stroke-width="3.1"/>

    <!-- 座垫外轮廓：分段粗细（5.2 → 4.6px） -->
    <path d="m59.27 121.3
             q8-1 32-1.5
             q32.5 0.5 65.5 1.5"
          stroke-width="5.2"/>
    <path d="m157.27 122.8
             q2.5 5 5 10
             v10"
          stroke-width="4.6"/>
    <path d="m162.27 142.3
             q-0.5 5-5 10
             h-130.5"
          stroke-width="4.6"/>
    <path d="m26.77 152.3
             q-4.5-5-5-10
             v-10
             q0.5-5 5-10"
          stroke-width="5.2"/>

    <!-- 陶土色装饰轮廓：中等线条，有机填充 -->
    <path d="m94.27 131.3
             c5-3.5 12-4 18-3
             c6 1 12 3 15 7
             c3 4 2 8-2 10
             c-4 2-10 3-16 2
             c-6-1-12-3-15-7
             c-3-4-2-8 2-10
             z"
          stroke-width="3.5"/>

    <!-- 前腿：粗线条，转折加粗（5.2 → 5.8 → 5.2px） -->
    <path d="m75.27 151.3v45" stroke-width="5.2"/>
    <circle cx="75.27" cy="196.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m75.27 196.3v10" stroke-width="4.0"/>

    <path d="m175.7 151.3v45" stroke-width="5.2"/>
    <circle cx="175.7" cy="196.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m175.7 196.3v10" stroke-width="4.0"/>

    <!-- 后腿：粗线条，转折加粗 -->
    <path d="m65.27 151.3v55" stroke-width="5.2"/>
    <circle cx="65.27" cy="206.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m65.27 206.3v5" stroke-width="4.0"/>

    <path d="m185.7 151.3v55" stroke-width="5.2"/>
    <circle cx="185.7" cy="206.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m185.7 206.3v5" stroke-width="4.0"/>

    <!-- 腿部横档：中等线条，有机直线 -->
    <path d="m65.27 180.3
             q15 0.5 30 0
             q15-0.5 30 0
             q15 0.5 30-1"
          stroke-width="4.0"/>

    <path d="m70.27 195.3
             q14.5 0.5 29 0
             q14.5-0.5 29-1
             q14.5 0.5 29-1.5"
          stroke-width="3.5"/>
