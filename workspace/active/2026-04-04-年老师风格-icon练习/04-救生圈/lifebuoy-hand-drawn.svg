<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- 救生圈 - 同心圆 -->
  <!-- 外圆 -->
  <circle cx="50" cy="50" r="38"
          fill="#FEFFFE" stroke="#1A1612" stroke-width="4.5"/>
  <!-- 内圆 -->
  <circle cx="50" cy="50" r="18"
          fill="#FEFFFE" stroke="#1A1612" stroke-width="4"/>

  <!-- 横分隔线 - 陶土色 -->
  <line x1="12" y1="50" x2="32" y2="50"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>
  <line x1="68" y1="50" x2="88" y2="50"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>

  <!-- 竖分隔线 - 陶土色 -->
  <line x1="50" y1="12" x2="50" y2="32"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="68" x2="50" y2="88"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>

  <!-- 对角线 - 陶土色 -->
  <line x1="23" y1="23" x2="38" y2="38"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>
  <line x1="62" y1="62" x2="77" y2="77"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>
  <line x1="77" y1="23" x2="62" y2="38"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>
  <line x1="38" y1="62" x2="23" y2="77"
        stroke="#D6654B" stroke-width="5" stroke-linecap="round"/>
</svg>