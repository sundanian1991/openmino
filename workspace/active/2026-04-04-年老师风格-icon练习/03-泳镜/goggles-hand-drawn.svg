<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- 泳镜主体 - 两个椭圆形镜片 -->
  <!-- 左镜片 -->
  <ellipse cx="30" cy="50" rx="20" ry="16"
           fill="#FEFFFE" stroke="#1A1612" stroke-width="4"/>
  <!-- 右镜片 -->
  <ellipse cx="70" cy="50" rx="20" ry="16"
           fill="#FEFFFE" stroke="#1A1612" stroke-width="4"/>

  <!-- 连接带 - 顶部 -->
  <path d="m15 38c5-8 15-12 15-12s10 4 15 12"
        fill="none" stroke="#1A1612" stroke-width="3"
        stroke-linecap="round"/>

  <!-- 连接带 - 底部 -->
  <path d="m15 62c5 8 15 12 15 12s10-4 15-12"
        fill="none" stroke="#1A1612" stroke-width="3"
        stroke-linecap="round"/>

  <!-- 镜片内部细节 - 椭圆形 -->
  <ellipse cx="30" cy="50" rx="12" ry="9" fill="none"
           stroke="#1A1612" stroke-width="2" opacity="0.4"/>
  <ellipse cx="70" cy="50" rx="12" ry="9" fill="none"
           stroke="#1A1612" stroke-width="2" opacity="0.4"/>

  <!-- 镜片高光 - 陶土色小圆点 -->
  <circle cx="24" cy="46" r="2" fill="#D6654B"/>
  <circle cx="64" cy="46" r="2" fill="#D6654B"/>
</svg>