<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- 泳衣 - 两个圆形 + 梯形主体 -->
  <!-- 左肩带 -->
  <circle cx="25" cy="22" r="10"
          fill="#FEFFFE" stroke="#1A1612" stroke-width="3.5"/>
  <!-- 右肩带 -->
  <circle cx="75" cy="22" r="10"
          fill="#FEFFFE" stroke="#1A1612" stroke-width="3.5"/>

  <!-- 主体梯形 -->
  <path d="m18 32c2 1 5 2 7 2s5-1 7-2l10 5 10-5c2 1 5 2 7 2s5-1 7-2l12 55H6L18 32z"
        fill="#FEFFFE" stroke="#1A1612" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 中间连接线 - 陶土色 -->
  <line x1="42" y1="30" x2="42" y2="85"
        stroke="#D6654B" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="30" x2="58" y2="85"
        stroke="#D6654B" stroke-width="3" stroke-linecap="round"/>

  <!-- 边缘细节 -->
  <path d="m20 35c3 1 7 2 10 2" fill="none"
        stroke="#1A1612" stroke-width="2" opacity="0.4"/>
</svg>