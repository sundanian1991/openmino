<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- 手绘三角形 - 粗犷线条，简化形状 -->
  <path d="M50 12 L82 82 L18 82 Z"
        fill="#FEFFFE" stroke="#1A1612" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 感叹号 - 焦点，用陶土色 -->
  <!-- 圆点 -->
  <circle cx="50" cy="46" r="4.5" fill="#D6654B"/>
  <!-- 竖线 - 粗 -->
  <line x1="50" y1="55" x2="50" y2="72"
        stroke="#D6654B" stroke-width="6" stroke-linecap="round"/>
</svg>