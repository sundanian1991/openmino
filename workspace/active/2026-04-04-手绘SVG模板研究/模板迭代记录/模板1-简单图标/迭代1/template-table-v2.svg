<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 小桌子 v2 - 基于真实桌子的观察 -->
  <!-- 核心改进：三层设计、弧形腿部、桌面厚度 -->
  <!-- 参考：真实桌子的三层层架结构 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 桌面：矩形，有厚度 -->
    <path d="m39.27 94.27h172.46a11 11 0 0 1 11 11v15a11 11 0 0 1 -11 11h-172.46a11 11 0 0 1 -11-11v-15a11 11 0 0 1 11-11z" fill="#FEFFFE"/>

    <!-- 桌面侧边（厚度感） -->
    <path d="m39.27 105.27v6h172.46v-6h-172.46z" fill="#FEFFFE"/>

    <!-- 陶土色装饰条（桌面边缘） -->
    <path d="m49.27 99.27h152.46a6 6 0 0 1 6 6s-6 6-6 6-6 6-6 6-6-6z" fill="#B03A21"/>

    <!-- 中层架 -->
    <path d="m59.27 140.3h132.46a8 8 0 0 1 8 8v12a8 8 0 0 1 -8 8h-132.46a8 8 0 0 1 -8-8v-12a8 8 0 0 1 8-8z" fill="#FEFFFE"/>

    <!-- 底层架 -->
    <path d="m69.27 170.3h112.46a6 6 0 0 1 6 6v8a6 6 0 0 1 -6 6h-112.46a6 6 0 0 1 -6-6v-8a6 6 0 0 1 6-6z" fill="#FEFFFE"/>

    <!-- 抽屉：位于中层架 -->
    <path d="m89.27 140.3h72.46a6 6 0 0 1 6 6v4a6 6 0 0 1 -6 6h-72.46a6 6 0 0 1 -6-6v-4a6 6 0 0 1 6-6z" fill="#FEFFFE"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 桌面顶面：矩形 -->
    <path d="m39.27 94.27h172.46a11 11 0 0 1 11 11v15a11 11 0 0 1 -11 11h-172.46a11 11 0 0 1 -11-11v-15a11 11 0 0 1 11-11" stroke-width="5.2"/>

    <!-- 桌面侧边（厚度感） -->
    <path d="m39.27 105.27v6h172.46v-6" stroke-width="4.6"/>

    <!-- 桌面前边缘（厚度细节） -->
    <path d="m39.27 94.27v11" stroke-width="4.0"/>
    <path d="m211.7 94.27v11" stroke-width="4.0"/>

    <!-- 陶土色装饰条：桌面边缘 -->
    <path d="m49.27 99.27h152.46a6 6 0 0 1 6 6s-6 6-6 6-6 6-6 6-6-6z" stroke-width="3.5"/>

    <!-- 桌腿：弧形设计（参考真实桌子的弧形腿） -->
    <!-- 左前腿 -->
    <path d="m54.27 120.3v5" stroke-width="5.2"/>
    <path d="m54.27 125.3
             q0 15 3 30
             q3 15 6 10"
          stroke-width="4.6"/>
    <circle cx="63.27" cy="165.3" r="3" fill="#140A05" stroke="none"/>

    <!-- 右前腿 -->
    <path d="m196.7 120.3v5" stroke-width="5.2"/>
    <path d="m196.7 125.3
             q0 15-3 30
             q-3 15-6 10"
          stroke-width="4.6"/>
    <circle cx="186.7" cy="165.3" r="3" fill="#140A05" stroke="none"/>

    <!-- 左后腿 -->
    <path d="m64.27 170.3v5" stroke-width="5.2"/>
    <path d="m64.27 175.3
             q0 10 2 20
             q2 10 4 6"
          stroke-width="4.6"/>
    <circle cx="70.27" cy="201.3" r="2.5" fill="#140A05" stroke="none"/>

    <!-- 右后腿 -->
    <path d="m186.7 170.3v5" stroke-width="5.2"/>
    <path d="m186.7 175.3
             q0 10-2 20
             q-2 10-4 6"
          stroke-width="4.6"/>
    <circle cx="180.7" cy="201.3" r="2.5" fill="#140A05" stroke="none"/>

    <!-- 中层架：矩形 -->
    <path d="m59.27 140.3h132.46a8 8 0 0 1 8 8v12a8 8 0 0 1 -8 8h-132.46a8 8 0 0 1 -8-8v-12a8 8 0 0 1 8-8" stroke-width="4.0"/>

    <!-- 底层架：矩形 -->
    <path d="m69.27 170.3h112.46a6 6 0 0 1 6 6v8a6 6 0 0 1 -6 6h-112.46a6 6 0 0 1 -6-6v-8a6 6 0 0 1 6-6" stroke-width="3.5"/>

    <!-- 抽屉轮廓：矩形 -->
    <path d="m89.27 140.3h72.46a6 6 0 0 1 6 6v4a6 6 0 0 1 -6 6h-72.46a6 6 0 0 1 -6-6v-4a6 6 0 0 1 6-6" stroke-width="3.5"/>

    <!-- 抽屉把手：小圆点 -->
    <circle cx="125.5" cy="143.3" r="3" fill="#140A05" stroke="none"/>
    <circle cx="125.5" cy="143.3" r="5" stroke="#140A05" stroke-width="2.0" fill="none"/>
  </g>
</svg>
