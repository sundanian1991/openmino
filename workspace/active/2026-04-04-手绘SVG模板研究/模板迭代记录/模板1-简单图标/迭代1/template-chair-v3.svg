<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 椅子 v3 - 基于真实椅子的观察 -->
  <!-- 核心改进：靠背矩形框架、座垫平面矩形、腿部垂直棱柱 -->
  <!-- 参考：真实椅子的几何分析 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 靠背框架：矩形框架，中空设计 -->
    <path d="m79.27 49.27
             h92.46
             a12 12 0 0 1 12 12
             v48
             a12 12 0 0 1 -12 12
             h-92.46
             a12 12 0 0 1 -12-12
             v-48
             a12 12 0 0 1 12-12
             z"
          fill="#FEFFFE"/>

    <!-- 座垫：平面矩形，无弯曲 -->
    <path d="m58.27 121.3
             h133.46
             a10 10 0 0 1 10 10
             v10
             a10 10 0 0 1 -10 10
             h-133.46
             a10 10 0 0 1 -10-10
             v-10
             a10 10 0 0 1 10-10
             z"
          fill="#FEFFFE"/>

    <!-- 陶土色坐垫装饰：矩形条（符合真实坐垫形状） -->
    <path d="m93.27 131.3
             h63.46
             a5 5 0 0 1 5 5
             v10
             a5 5 0 0 1 -5 5
             h-63.46
             a5 5 0 0 1 -5-5
             v-10
             a5 5 0 0 1 5-5
             z"
          fill="#B03A21"/>

    <!-- 腿部连接件 -->
    <path d="m68.27 151.3h113.46" fill="#FEFFFE"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 靠背外轮廓：矩形框架（符合真实椅子的几何结构） -->
    <path d="m79.27 49.27
             h92.46
             a12 12 0 0 1 12 12
             v48
             a12 12 0 0 1 -12 12
             h-92.46
             a12 12 0 0 1 -12-12
             v-48
             a12 12 0 0 1 12-12"
          stroke-width="5.2"/>

    <!-- 靠背内框：矩形框架（中空设计） -->
    <path d="m91.27 61.27
             h68.46
             a6 6 0 0 1 6 6
             v30
             a6 6 0 0 1 -6 6
             h-68.46
             a6 6 0 0 1 -6-6
             v-30
             a6 6 0 0 1 6-6"
          stroke-width="3.5"/>

    <!-- 靠背横档：矩形框架内的横支撑 -->
    <path d="m91.27 88.27h68.46" stroke-width="2.9"/>

    <!-- 座垫外轮廓：平面矩形 -->
    <path d="m58.27 121.3
             h133.46
             a10 10 0 0 1 10 10
             v10
             a10 10 0 0 1 -10 10
             h-133.46
             a10 10 0 0 1 -10-10
             v-10
             a10 10 0 0 1 10-10"
          stroke-width="5.2"/>

    <!-- 陶土色装饰轮廓：矩形条 -->
    <path d="m93.27 131.3
             h63.46
             a5 5 0 0 1 5 5
             v10
             a5 5 0 0 1 -5 5
             h-63.46
             a5 5 0 0 1 -5-5
             v-10
             a5 5 0 0 1 5-5"
          stroke-width="3.5"/>

    <!-- 前腿：垂直棱柱（符合真实椅子的前腿设计） -->
    <path d="m73.27 151.3v45" stroke-width="5.2"/>
    <circle cx="73.27" cy="196.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m73.27 196.3v10" stroke-width="4.0"/>

    <path d="m176.7 151.3v45" stroke-width="5.2"/>
    <circle cx="176.7" cy="196.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m176.7 196.3v10" stroke-width="4.0"/>

    <!-- 后腿：与靠背侧轨合并（符合真实椅子的后腿设计） -->
    <path d="m63.27 151.3v55" stroke-width="5.2"/>
    <circle cx="63.27" cy="206.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m63.27 206.3v5" stroke-width="4.0"/>

    <path d="m186.7 151.3v55" stroke-width="5.2"/>
    <circle cx="186.7" cy="206.3" r="3.5" fill="#140A05" stroke="none"/>
    <path d="m186.7 206.3v5" stroke-width="4.0"/>

    <!-- 腿部横档：水平连接（符合真实木工椅结构） -->
    <path d="m63.27 180.3h123.46" stroke-width="4.0"/>
    <path d="m68.27 195.3h113.46" stroke-width="3.5"/>
  </g>
</svg>
