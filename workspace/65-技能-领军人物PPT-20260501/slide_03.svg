<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">呼叫中心现况</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">3000+人电销团队，35家供应商，年放款2000亿+</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧：基本信息 -->
<rect x="40" y="120" width="600" height="320" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="120" width="4" height="320" fill="var(--brand-primary)"/>
<text x="60" y="156" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">呼叫中心基本信息</text>
<line x1="60" y1="170" x2="620" y2="170" stroke="#E2E2E2" stroke-width="0.5"/>

<rect x="60" y="184" width="240" height="40" rx="3" fill="#F5F5F5"/>
<text x="80" y="208" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">服务渠道</text>
<text x="320" y="208" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">电销渠道（100%）</text>

<rect x="60" y="232" width="240" height="40" rx="3" fill="#F5F5F5"/>
<text x="80" y="256" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">业务范围</text>
<text x="320" y="256" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#1A1A1A">金融营销电销外呼</text>

<rect x="60" y="280" width="240" height="40" rx="3" fill="#F5F5F5"/>
<text x="80" y="304" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">涵盖场景</text>
<text x="320" y="304" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#1A1A1A">拉新、复购全流程</text>

<rect x="60" y="328" width="240" height="40" rx="3" fill="#F5F5F5"/>
<text x="80" y="352" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">四业务产线</text>
<text x="320" y="352" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#1A1A1A">金条、企金、信用卡、财富</text>

<rect x="60" y="376" width="240" height="40" rx="3" fill="#F5F5F5"/>
<text x="80" y="400" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">运营始于</text>
<text x="320" y="400" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">2018年</text>

<!-- 右侧：团队规模 -->
<rect x="660" y="120" width="580" height="320" rx="4" fill="#0A1F3A"/>
<rect x="660" y="120" width="4" height="320" fill="var(--brand-primary)"/>
<text x="680" y="156" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">团队规模</text>
<line x1="680" y1="170" x2="1220" y2="170" stroke="#1A5FA8" stroke-width="0.5"/>

<!-- 前台人员 -->
<rect x="680" y="190" width="160" height="110" rx="4" fill="#162A4A"/>
<text x="760" y="220" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">前台人员</text>
<text x="760" y="270" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="42" font-weight="bold" fill="#FFFFFF">2900+</text>
<text x="760" y="292" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8">人</text>

<!-- 中台人员 -->
<rect x="860" y="190" width="160" height="110" rx="4" fill="#162A4A"/>
<text x="940" y="220" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">中台人员</text>
<text x="940" y="270" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="42" font-weight="bold" fill="var(--brand-primary)">100+</text>
<text x="940" y="292" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8">人</text>

<!-- 后台人员 -->
<rect x="1040" y="190" width="160" height="110" rx="4" fill="#162A4A"/>
<text x="1120" y="220" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">后台人员</text>
<text x="1120" y="270" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="42" font-weight="bold" fill="var(--brand-primary)">50+</text>
<text x="1120" y="292" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8">人</text>

<!-- 教育分布 -->
<rect x="680" y="320" width="520" height="100" rx="4" fill="#162A4A"/>
<text x="700" y="348" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#6B86A8">前台人员教育背景</text>
<!-- 本科60% -->
<rect x="700" y="364" width="200" height="20" rx="10" fill="#2E6B3E"/>
<text x="800" y="378" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">本科及以上 60%</text>
<!-- 大专40% -->
<rect x="920" y="364" width="140" height="20" rx="10" fill="#8A5A00"/>
<text x="990" y="378" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">大专 40%</text>
<text x="700" y="408" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8AAED0">供应商数量：35家 &#x3000; 团队稳定性：100% &#x3000; 营销业务占比：99%</text>

<!-- 底部：三大核心指标 -->
<rect x="40" y="470" width="380" height="200" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="470" width="4" height="200" fill="var(--brand-primary)"/>
<text x="60" y="506" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888" letter-spacing="2">年度GMV</text>
<text x="230" y="560" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="56" font-weight="bold" fill="var(--brand-primary)">2000亿+</text>
<text x="230" y="600" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">放款额</text>

<rect x="450" y="470" width="380" height="200" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="450" y="470" width="4" height="200" fill="var(--brand-primary)"/>
<text x="470" y="506" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888" letter-spacing="2">团队规模</text>
<text x="640" y="560" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="56" font-weight="bold" fill="var(--brand-primary)">3000+</text>
<text x="640" y="600" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">专业营销团队</text>

<rect x="860" y="470" width="380" height="200" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="860" y="470" width="4" height="200" fill="var(--brand-primary)"/>
<text x="880" y="506" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888" letter-spacing="2">合规率</text>
<text x="1050" y="560" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="56" font-weight="bold" fill="#2E6B3E">100%</text>
<text x="1050" y="600" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">零重大合规事件</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">3 / 11</text>
</svg>