<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">组织变革</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">组织架构三级升级为二级部门，直接向事业群汇报</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧：组织变革 -->
<rect x="40" y="120" width="600" height="550" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="120" width="4" height="550" fill="var(--brand-primary)"/>
<text x="60" y="156" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">组织架构变革</text>
<line x1="60" y1="170" x2="620" y2="170" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 变革前 -->
<rect x="60" y="190" width="500" height="100" rx="4" fill="#F5F5F5"/>
<text x="80" y="216" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#888888">变革前：三级部门</text>
<line x1="80" y1="226" x2="540" y2="226" stroke="#CCCCCC" stroke-width="0.5"/>
<text x="80" y="246" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">层级较多，决策链条长，响应速度慢</text>
<text x="80" y="266" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">资源调配效率低，跨部门协同成本高</text>
<text x="80" y="286" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888" font-style="italic">三级部门 → 二级部门（精简扁平）</text>

<!-- 箭头 -->
<polygon points="310,310 304,324 316,324" fill="var(--brand-primary)"/>
<text x="330" y="324" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">升级</text>

<!-- 变革后 -->
<rect x="60" y="350" width="500" height="140" rx="4" fill="#E8F0FA" stroke="var(--brand-primary)" stroke-width="1"/>
<text x="80" y="376" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">变革后：二级部门</text>
<line x1="80" y1="386" x2="540" y2="386" stroke="var(--brand-primary)" stroke-width="0.5"/>

<rect x="80" y="398" width="140" height="36" rx="3" fill="#FFFFFF" stroke="var(--brand-primary)" stroke-width="0.5"/>
<text x="150" y="422" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">电销服务组</text>
<text x="150" y="486" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">2900+人</text>

<rect x="240" y="398" width="140" height="36" rx="3" fill="#FFFFFF" stroke="var(--brand-primary)" stroke-width="0.5"/>
<text x="310" y="422" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">策略运营组</text>
<text x="310" y="486" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">100+人</text>

<rect x="400" y="398" width="140" height="36" rx="3" fill="#FFFFFF" stroke="var(--brand-primary)" stroke-width="0.5"/>
<text x="470" y="422" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">后台管理部</text>
<text x="470" y="486" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">50+人</text>

<!-- 变革成效 -->
<rect x="60" y="520" width="500" height="120" rx="4" fill="#0A1F3A"/>
<text x="80" y="546" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">变革成效</text>
<line x1="80" y1="556" x2="540" y2="556" stroke="#1A5FA8" stroke-width="0.5"/>
<text x="80" y="576" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">决策效率提升：扁平化管理，减少审批层级</text>
<text x="80" y="596" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">资源调配灵活：快速响应市场变化和业务需求</text>
<text x="80" y="616" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">跨部门协同顺畅：职责边界清晰，分工明确</text>

<!-- 右侧：人才培养 -->
<rect x="660" y="120" width="580" height="550" rx="4" fill="#F5F5F5"/>
<rect x="660" y="120" width="4" height="550" fill="var(--brand-primary)"/>
<text x="680" y="156" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">人才培养体系</text>
<line x1="680" y1="170" x2="1220" y2="170" stroke="#CCCCCC" stroke-width="0.5"/>

<!-- 培养路径 -->
<rect x="680" y="190" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：学习 -->
<rect x="696" y="206" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<rect x="702" y="214" width="24" height="20" rx="2" fill="#FFFFFF"/>
<line x1="706" y1="220" x2="722" y2="220" stroke="var(--brand-primary)" stroke-width="1"/>
<line x1="706" y1="226" x2="722" y2="226" stroke="var(--brand-primary)" stroke-width="1"/>
<text x="748" y="222" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">AI辅助降低门槛</text>
<text x="748" y="244" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">新人上手时间缩短67%，培训成本大幅下降</text>
<text x="748" y="264" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI实时话术辅助，降低经验依赖</text>

<!-- 培养路径2 -->
<rect x="680" y="306" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：成长 -->
<rect x="696" y="322" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<polygon points="714,328 708,340 714,336 720,340" fill="#FFFFFF"/>
<text x="748" y="338" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">持续培训体系</text>
<text x="748" y="360" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">季度技能提升培训，合规意识常态化</text>
<text x="748" y="380" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">优秀坐席经验沉淀为知识库，共享复用</text>

<!-- 培养路径3 -->
<rect x="680" y="422" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：人才 -->
<rect x="696" y="438" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<circle cx="714" cy="448" r="6" fill="#FFFFFF"/>
<path d="M706,464 L706,456 C706,452 722,452 722,456 L722,464" fill="#FFFFFF"/>
<text x="748" y="454" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">复合型人才梯队</text>
<text x="748" y="476" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">培养"懂数据+懂AI+懂业务"的复合人才</text>
<text x="748" y="496" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">团队稳定性100%，核心人才零流失</text>

<!-- 培养路径4 -->
<rect x="680" y="538" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：考核 -->
<rect x="696" y="554" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<rect x="702" y="562" width="8" height="20" rx="1" fill="#FFFFFF"/>
<rect x="712" y="568" width="8" height="14" rx="1" fill="#FFFFFF"/>
<rect x="722" y="564" width="8" height="18" rx="1" fill="#FFFFFF"/>
<text x="748" y="570" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">多维考核机制</text>
<text x="748" y="592" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">结果导向+过程管理+客户评价+合规红线</text>
<text x="748" y="612" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">定量与定性结合，兼顾业绩与能力成长</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">9 / 11</text>
</svg>