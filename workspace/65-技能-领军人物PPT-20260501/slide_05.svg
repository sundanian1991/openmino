<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">转型背景</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">从传统电销向数据驱动智能营销转型</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 三大转型驱动力 -->
<!-- 驱动1：客服价值化 -->
<rect x="40" y="120" width="380" height="280" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="120" width="4" height="280" fill="var(--brand-primary)"/>
<!-- 图标：上升箭头 -->
<rect x="60" y="136" width="44" height="44" rx="22" fill="#E8F0FA"/>
<polygon points="82,148 74,162 80,162 80,172 84,172 84,162 90,162" fill="var(--brand-primary)"/>
<text x="116" y="156" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">客服价值化</text>
<text x="116" y="174" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">从成本中心到利润中心</text>

<line x1="60" y1="190" x2="400" y2="190" stroke="#E2E2E2" stroke-width="0.5"/>

<rect x="60" y="200" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="72" y="212" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">传统电销模式效率瓶颈明显</text>
<rect x="60" y="224" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="72" y="236" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">客户识别不准，无效触达多</text>
<rect x="60" y="248" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="72" y="260" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">获客成本持续上升，ROI下降</text>
<rect x="60" y="272" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="72" y="284" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">需从被动服务转向主动营销</text>

<rect x="60" y="320" width="300" height="56" rx="3" fill="#E8F0FA"/>
<text x="210" y="344" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">目标：让客服成为业务增长引擎</text>

<!-- 驱动2：数字智能化 -->
<rect x="450" y="120" width="380" height="280" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="450" y="120" width="4" height="280" fill="var(--brand-primary)"/>
<!-- 图标：AI芯片 -->
<rect x="470" y="136" width="44" height="44" rx="22" fill="#E8F0FA"/>
<rect x="480" y="148" width="24" height="20" rx="2" fill="var(--brand-primary)"/>
<rect x="484" y="152" width="6" height="12" rx="1" fill="#FFFFFF"/>
<rect x="492" y="152" width="6" height="12" rx="1" fill="#FFFFFF"/>
<text x="526" y="156" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">数字智能化</text>
<text x="526" y="174" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">AI赋能全流程提效</text>

<line x1="470" y1="190" x2="810" y2="190" stroke="#E2E2E2" stroke-width="0.5"/>

<rect x="470" y="200" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="482" y="212" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">数据分散，客户画像不完整</text>
<rect x="470" y="224" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="482" y="236" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">缺乏实时智能辅助能力</text>
<rect x="470" y="248" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="482" y="260" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">质检依赖人工，覆盖率不足</text>
<rect x="470" y="272" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="482" y="284" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">新人培训周期长，流失率高</text>

<rect x="470" y="320" width="300" height="56" rx="3" fill="#E8F0FA"/>
<text x="620" y="344" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">目标：AI成为坐席超级助手</text>

<!-- 驱动3：服务营销一体化 -->
<rect x="860" y="120" width="380" height="280" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="860" y="120" width="4" height="280" fill="var(--brand-primary)"/>
<!-- 图标：循环 -->
<rect x="880" y="136" width="44" height="44" rx="22" fill="#E8F0FA"/>
<circle cx="902" cy="158" r="12" fill="none" stroke="var(--brand-primary)" stroke-width="2"/>
<polygon points="902,144 896,152 908,152" fill="var(--brand-primary)"/>
<polygon points="902,172 896,164 908,164" fill="var(--brand-primary)"/>
<text x="936" y="156" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">服务营销一体化</text>
<text x="936" y="174" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">从单次触达到全生命周期</text>

<line x1="880" y1="190" x2="1220" y2="190" stroke="#E2E2E2" stroke-width="0.5"/>

<rect x="880" y="200" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="892" y="212" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">缺乏全生命周期运营能力</text>
<rect x="880" y="224" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="892" y="236" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">合规与效率难以兼顾</text>
<rect x="880" y="248" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="892" y="260" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">数据闭环尚未打通</text>
<rect x="880" y="272" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="892" y="284" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">金融营销合规要求趋严</text>

<rect x="880" y="320" width="300" height="56" rx="3" fill="#E8F0FA"/>
<text x="1030" y="344" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">目标：精准触达，持续增长</text>

<!-- 底部：战略目标 -->
<rect x="40" y="430" width="1200" height="240" rx="4" fill="#0A1F3A"/>
<rect x="40" y="430" width="4" height="240" fill="var(--brand-primary)"/>
<text x="60" y="466" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#FFFFFF">战略目标</text>
<text x="60" y="490" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#8AAED0">打造数据驱动的智能营销中枢，实现从传统电销向AI赋能的服务营销一体化转型</text>
<line x1="60" y1="506" x2="1220" y2="506" stroke="#1A5FA8" stroke-width="0.5"/>

<!-- 战略目标分解 -->
<rect x="60" y="524" width="260" height="120" rx="4" fill="#162A4A"/>
<text x="190" y="552" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">精准客户识别</text>
<text x="190" y="586" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">AI需求识别模型</text>
<text x="190" y="610" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">精准分层，减少无效触达</text>

<rect x="350" y="524" width="260" height="120" rx="4" fill="#162A4A"/>
<text x="480" y="552" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">智能营销辅助</text>
<text x="480" y="586" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">人机协同新模式</text>
<text x="480" y="610" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">实时话术，异议处理</text>

<rect x="640" y="524" width="260" height="120" rx="4" fill="#162A4A"/>
<text x="770" y="552" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">合规提效保障</text>
<text x="770" y="586" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">AI智能质检体系</text>
<text x="770" y="610" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">100%覆盖，实时预警</text>

<rect x="930" y="524" width="270" height="120" rx="4" fill="#162A4A"/>
<text x="1065" y="552" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">全生命周期运营</text>
<text x="1065" y="586" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">持续营销增长</text>
<text x="1065" y="610" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">新客获取到复购激活</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">5 / 11</text>
</svg>