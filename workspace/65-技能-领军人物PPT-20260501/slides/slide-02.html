<!DOCTYPE html>

.content { margin: 20pt 48pt 0; width: calc(100% - 96pt); }

.footer { position: absolute; bottom: 12pt; left: 48pt; right: 48pt; display: flex; justify-content: space-between; font-size: 8pt; color: #999999; }
