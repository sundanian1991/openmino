<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #FFFFFF; font-family: Arial, "Microsoft YaHei", sans-serif; display: flex; }
.content { margin: 20pt 48pt 0; width: calc(100% - 96pt); }
.page-header { position: absolute; top: 12pt; left: 48pt; }
.page-num { font-size: 11pt; font-weight: 700; color: #E2231A; }
.title-bar { margin-bottom: 12pt; padding-bottom: 5pt; border-bottom: 3px solid #E2231A; }
.title-text { font-size: 20pt; font-weight: 700; color: #1A1A1A; }
.org-level { display: flex; justify-content: center; margin-bottom: 8pt; }
.org-node { text-align: center; padding: 8pt 16pt; border: 1px solid #CCCCCC; background: #FFFFFF; min-width: 160pt; }
.org-node.l1 { background: #1A1A1A; color: #FFFFFF; border: none; }
.org-node.l2 { background: #F5F5F5; }
.org-node-name { font-size: 11pt; font-weight: 700; margin-bottom: 2pt; color: inherit; }
.org-node-detail { font-size: 8pt; color: inherit; }
.org-connector { display: flex; justify-content: center; height: 8pt; }
.org-connector-line { width: 2pt; height: 100%; background: #E2231A; }
.org-row { display: flex; justify-content: center; gap: 24pt; margin-bottom: 4pt; }
.footer { position: absolute; bottom: 12pt; left: 48pt; right: 48pt; display: flex; justify-content: space-between; font-size: 8pt; color: #999999; }
</style>
</head>
<body>
<div class="page-header"><p class="page-num">04</p></div>
<div class="content">
<div class="title-bar"><p class="title-text">呼叫中心组织架构</p></div>
<div style="margin-top:16pt; display:flex; flex-direction:column; align-items:center;">
<div class="org-level"><div class="org-node l1"><p class="org-node-name">数据科技业务部</p><p class="org-node-detail">二级部门 · 金融科技事业群</p></div></div>
<div class="org-connector"><div class="org-connector-line"></div></div>
<div class="org-row">
<div class="org-node l2"><p class="org-node-name">策略运营组</p><p class="org-node-detail">策略制定 · 数据分析 · 业务规划</p></div>
<div class="org-node l2"><p class="org-node-name">电销服务组</p><p class="org-node-detail">供应商管理 · 质检培训 · 运营保障</p></div>
</div>
<div class="org-connector"><div class="org-connector-line"></div></div>
<div class="org-row">
<div class="org-node"><p class="org-node-name">业务管理</p><p class="org-node-detail">日常供应商 BPO 沟通</p></div>
<div class="org-node"><p class="org-node-name">质检培训运营</p><p class="org-node-detail">合规管控 · 赋能培训</p></div>
<div class="org-node"><p class="org-node-name">前台运营</p><p class="org-node-detail">2900+ 坐席</p></div>
</div>
</div>
</div>
<div class="footer"><p>京东科技 · 2026新客服节申报材料</p><p>P04</p></div>
</body>
</html>
