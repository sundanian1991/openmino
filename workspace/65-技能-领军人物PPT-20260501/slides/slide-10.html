<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #FFFFFF; font-family: Arial, "Microsoft YaHei", sans-serif; display: flex; }
.content { margin: 16pt 48pt 0; width: calc(100% - 96pt); }
.page-header { position: absolute; top: 12pt; left: 48pt; display: flex; align-items: center; gap: 8pt; }
.page-num { font-size: 11pt; font-weight: 700; color: #E2231A; }
.page-label { font-size: 11pt; font-weight: 500; color: #666666; }
.title-bar { margin-bottom: 10pt; padding-bottom: 5pt; border-bottom: 3px solid #E2231A; }
.title-text { font-size: 18pt; font-weight: 700; color: #1A1A1A; }
.goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10pt; }
.goal-card { border: 1px solid #E0E0E0; padding: 10pt; position: relative; }
.goal-bar { position: absolute; top: 0; left: 0; width: 4pt; height: 100%; background: #E2231A; }
.goal-content { padding-left: 10pt; }
.goal-num { font-size: 18pt; font-weight: 700; color: #E2231A; margin-bottom: 4pt; }
.goal-title { font-size: 10pt; font-weight: 700; color: #1A1A1A; margin-bottom: 3pt; }
.goal-desc { font-size: 8pt; color: #666666; line-height: 1.3; }
.goal-card.highlight { background: #E2231A; color: #FFFFFF; border-color: #E2231A; }
.goal-card.highlight .goal-num { color: rgba(255,255,255,0.7); }
.goal-card.highlight .goal-title { color: #FFFFFF; }
.goal-card.highlight .goal-desc { color: rgba(255,255,255,0.85); }
.footer { position: absolute; bottom: 12pt; left: 48pt; right: 48pt; display: flex; justify-content: space-between; font-size: 8pt; color: #999999; }
</style>
</head>
<body>
<div class="page-header"><p class="page-num">10</p><p class="page-label">下一步计划</p></div>
<div class="content">
<div class="title-bar"><p class="title-text">下一步计划</p></div>
<div class="goals-grid">
<div class="goal-card"><div class="goal-bar"></div><div class="goal-content"><p class="goal-num">01</p><p class="goal-title">精准识别升级</p><p class="goal-desc">通过更精准的客户识别模型，提升 ROI，应对获客成本上升挑战</p></div></div>
<div class="goal-card"><div class="goal-bar"></div><div class="goal-content"><p class="goal-num">02</p><p class="goal-title">合规能力持续强化</p><p class="goal-desc">应对金融营销合规要求持续收紧，建立更完善的合规预警和培训体系</p></div></div>
<div class="goal-card"><div class="goal-bar"></div><div class="goal-content"><p class="goal-num">03</p><p class="goal-title">AI 技术持续迭代</p><p class="goal-desc">跟进 AI、大数据等新技术，持续优化人机协同效率和营销效果</p></div></div>
<div class="goal-card highlight"><div class="goal-bar"></div><div class="goal-content"><p class="goal-num">持续</p><p class="goal-title">确保转型持续成功</p><p class="goal-desc">保持对技术和市场的敏感度，不断优化数据模型、强化合规管控、提升团队能力</p></div></div>
</div>
</div>
<div class="footer"><p>京东科技 · 2026新客服节申报材料</p><p>P10</p></div>
</body>
</html>
