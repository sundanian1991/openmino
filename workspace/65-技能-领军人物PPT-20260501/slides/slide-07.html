<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #FFFFFF; font-family: Arial, "Microsoft YaHei", sans-serif; display: flex; }
.content { margin: 16pt 48pt 0; width: calc(100% - 96pt); }
.page-header { position: absolute; top: 12pt; left: 48pt; display: flex; align-items: center; gap: 8pt; }
.page-num { font-size: 11pt; font-weight: 700; color: #E2231A; }
.page-label { font-size: 11pt; font-weight: 500; color: #666666; }
.title-bar { margin-bottom: 8pt; padding-bottom: 4pt; border-bottom: 3px solid #E2231A; }
.title-text { font-size: 18pt; font-weight: 700; color: #1A1A1A; }
.results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6pt; margin-bottom: 10pt; }
.result-item { text-align: center; padding: 4pt 2pt; }
.result-number { font-size: 20pt; font-weight: 700; color: #E2231A; line-height: 1; }
.result-label { font-size: 8pt; color: #666666; }
.dimensions-row { display: flex; gap: 10pt; }
.dimension-card { flex: 1; padding: 8pt 10pt; background: #F5F5F5; }
.dimension-title { font-size: 10pt; font-weight: 700; color: #1A1A1A; margin-bottom: 3pt; }
.dimension-text { font-size: 8pt; color: #666666; line-height: 1.3; }
.footer { position: absolute; bottom: 12pt; left: 48pt; right: 48pt; display: flex; justify-content: space-between; font-size: 8pt; color: #999999; }
</style>
</head>
<body>
<div class="page-header"><p class="page-num">07</p><p class="page-label">客服转型具体成果</p></div>
<div class="content">
<div class="title-bar"><p class="title-text">客服转型具体成果</p></div>
<div class="results-grid">
<div class="result-item"><p class="result-number">+35%</p><p class="result-label">接通率提升</p></div>
<div class="result-item"><p class="result-number">+25%</p><p class="result-label">转化率提升</p></div>
<div class="result-item"><p class="result-number">+40%</p><p class="result-label">人均效率提升</p></div>
<div class="result-item"><p class="result-number">100%</p><p class="result-label">合规率</p></div>
<div class="result-item"><p class="result-number">+300%</p><p class="result-label">质检效率提升</p></div>
<div class="result-item"><p class="result-number">-67%</p><p class="result-label">新人上手时间缩短</p></div>
</div>
<div class="dimensions-row">
<div class="dimension-card"><p class="dimension-title">客服价值化</p><p class="dimension-text">从成本中心转为利润贡献，年度GMV（放款额）2000亿+，团队规模行业领先</p></div>
<div class="dimension-card"><p class="dimension-title">数字智能化</p><p class="dimension-text">AI需求识别模型+实时话术辅助+智能质检，100%通话覆盖，合规风险降低60%</p></div>
<div class="dimension-card"><p class="dimension-title">服务营销一体化</p><p class="dimension-text">精准触达+全生命周期运营，新客获取效率+28%，客户复购率+30%</p></div>
</div>
</div>
<div class="footer"><p>京东科技 · 2026新客服节申报材料</p><p>P07</p></div>
</body>
</html>
