<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html { background: #FFFFFF; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #FFFFFF; font-family: Arial, "Microsoft YaHei", sans-serif; display: flex; }
.content { margin: 20pt 48pt 0; width: calc(100% - 96pt); }
.page-header { position: absolute; top: 12pt; left: 48pt; }
.page-num { font-size: 11pt; font-weight: 700; color: #E2231A; }
.title-bar { margin-bottom: 12pt; padding-bottom: 5pt; border-bottom: 3px solid #E2231A; }
.title-text { font-size: 20pt; font-weight: 700; color: #1A1A1A; }
.stats-row { display: flex; gap: 24pt; margin-bottom: 12pt; }
.stat-item { flex: 1; text-align: center; padding: 8pt 0; }
.stat-sep { height: 2px; background: #E2231A; }
.stat-number { font-size: 28pt; font-weight: 700; color: #E2231A; line-height: 1; }
.stat-label { font-size: 9pt; color: #666666; margin-top: 4pt; }
table { width: 100%; border-collapse: collapse; margin-bottom: 8pt; }
th { font-size: 9pt; font-weight: 700; text-align: left; padding: 4pt 8pt; background: #F5F5F5; color: #1A1A1A; }
td { font-size: 9pt; padding: 4pt 8pt; color: #1A1A1A; }
.channel-note { padding: 6pt 10pt; background: #F5F5F5; }
.channel-note p { font-size: 9pt; color: #666666; }
.footer { position: absolute; bottom: 12pt; left: 48pt; right: 48pt; display: flex; justify-content: space-between; font-size: 8pt; color: #999999; }
</style>
</head>
<body>

</html>
