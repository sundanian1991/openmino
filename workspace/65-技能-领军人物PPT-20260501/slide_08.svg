<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
    --semantic-success: #2E6B3E;
    --semantic-warning: #8A5A00;
    --semantic-danger:  #9C2B2B;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">成功关键</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">战略定力+技术驱动+组织协同，打造转型成功基石</text>
<line x="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧：挑战与克服 -->
<rect x="40" y="120" width="580" height="550" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="120" width="4" height="550" fill="var(--brand-primary)"/>
<text x="60" y="156" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">挑战与克服</text>
<line x1="60" y1="170" x2="600" y2="170" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 挑战1 -->
<rect x="60" y="186" width="500" height="80" rx="3" fill="#FFF3E0"/>
<rect x="60" y="186" width="4" height="80" fill="var(--semantic-warning)"/>
<!-- 图标：警示 -->
<circle cx="86" cy="214" r="12" fill="var(--semantic-warning)"/>
<text x="86" y="220" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">!</text>
<text x="108" y="210" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--semantic-warning)">客户识别准确度</text>
<text x="108" y="230" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">如何从海量数据中准确识别有真实需求的客户</text>
<text x="108" y="250" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="var(--semantic-success)">解决：AI需求识别模型 + 300+维度画像</text>

<!-- 挑战2 -->
<rect x="60" y="278" width="500" height="80" rx="3" fill="#FFF3E0"/>
<rect x="60" y="278" width="4" height="80" fill="var(--semantic-warning)"/>
<circle cx="86" cy="306" r="12" fill="var(--semantic-warning)"/>
<text x="86" y="312" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">!</text>
<text x="108" y="302" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--semantic-warning)">人机协同平衡</text>
<text x="108" y="322" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI辅助而非替代人工，保持营销温度和信任</text>
<text x="108" y="342" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="var(--semantic-success)">解决：实时话术辅助 + 坐席自主决策权</text>

<!-- 挑战3 -->
<rect x="60" y="370" width="500" height="80" rx="3" fill="#FFF3E0"/>
<rect x="60" y="370" width="4" height="80" fill="var(--semantic-warning)"/>
<circle cx="86" cy="398" r="12" fill="var(--semantic-warning)"/>
<text x="86" y="404" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">!</text>
<text x="108" y="394" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--semantic-warning)">合规与效率平衡</text>
<text x="108" y="414" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">强化合规同时不降低营销效率</text>
<text x="108" y="434" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="var(--semantic-success)">解决：AI实时预警 + 智能质检100%覆盖</text>

<!-- 挑战4 -->
<rect x="60" y="462" width="500" height="80" rx="3" fill="#FFF3E0"/>
<rect x="60" y="462" width="4" height="80" fill="var(--semantic-warning)"/>
<circle cx="86" cy="490" r="12" fill="var(--semantic-warning)"/>
<text x="86" y="496" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">!</text>
<text x="108" y="486" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--semantic-warning)">能力转型挑战</text>
<text x="108" y="506" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">从传统电销向数据驱动、AI辅助的智能营销转型</text>
<text x="108" y="526" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="var(--semantic-success)">解决：AI降低新人门槛 + 持续培训体系</text>

<!-- 右侧：成功关键因素 -->
<rect x="660" y="120" width="580" height="550" rx="4" fill="#F5F5F5"/>
<rect x="660" y="120" width="4" height="550" fill="var(--brand-primary)"/>
<text x="680" y="156" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">成功关键因素</text>
<line x1="680" y1="170" x2="1220" y2="170" stroke="#CCCCCC" stroke-width="0.5"/>

<!-- 关键因素1 -->
<rect x="680" y="186" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：战略 -->
<rect x="696" y="202" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<polygon points="714,208 708,220 720,220" fill="#FFFFFF"/>
<text x="748" y="218" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">战略定力</text>
<text x="748" y="240" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">高层持续支持，战略方向坚定不变</text>
<text x="748" y="260" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">投入资源保障，不因短期波动调整方向</text>

<!-- 关键因素2 -->
<rect x="680" y="298" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：技术 -->
<rect x="696" y="314" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<rect x="702" y="322" width="24" height="16" rx="2" fill="#FFFFFF"/>
<line x1="706" y1="326" x2="706" y2="332" stroke="var(--brand-primary)" stroke-width="1"/>
<line x1="712" y1="326" x2="712" y2="332" stroke="var(--brand-primary)" stroke-width="1"/>
<text x="748" y="330" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">技术驱动</text>
<text x="748" y="352" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI贯穿全流程：识别-触达-质检-优化</text>
<text x="748" y="372" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">数据闭环持续迭代，越用越聪明</text>

<!-- 关键因素3 -->
<rect x="680" y="410" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：协同 -->
<rect x="696" y="426" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<circle cx="708" cy="444" r="5" fill="#FFFFFF"/>
<circle cx="720" cy="444" r="5" fill="#FFFFFF"/>
<line x1="708" y1="444" x2="720" y2="444" stroke="var(--brand-primary)" stroke-width="2"/>
<text x="748" y="442" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">组织协同</text>
<text x="748" y="464" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">三组分工明确：策略+电销+后台管理</text>
<text x="748" y="484" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">跨部门高效协作，职责边界清晰</text>

<!-- 关键因素4 -->
<rect x="680" y="522" width="520" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：合规 -->
<rect x="696" y="538" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<path d="M714,546 L704,552 L704,562 C704,568 708,572 714,574 C720,572 724,568 724,562 L724,552 Z" fill="#FFFFFF"/>
<text x="748" y="554" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">合规底线</text>
<text x="748" y="576" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">合规率100%作为红线指标，一票否决</text>
<text x="748" y="596" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">从事后检查转向事中预警，防患于未然</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">8 / 11</text>
</svg>