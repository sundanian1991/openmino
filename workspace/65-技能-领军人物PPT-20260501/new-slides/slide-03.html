<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 12pt;
    left: 48pt;
    display: flex;
    align-items: center;
  }
  .page-num {
    font-size: 11pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0;
  }
  .page-label {
    font-size: 11pt;
    font-weight: 500;
    color: #666666;
    margin: 0 0 0 8pt;
  }
  .title-bar {
    margin-top: 20pt;
    margin-bottom: 16pt;
    padding-bottom: 6pt;
    border-bottom: 3px solid #E2231A;
  }
  .title-text {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .content {
    margin: 0 48pt;
    width: calc(100% - 96pt);
    display: flex;
    flex-direction: column;
    gap: 14pt;
  }
  .stat-row {
    display: flex;
    gap: 20pt;
  }
  .stat-item {
    flex: 1;
    text-align: center;
    padding: 12pt 0;
    border-bottom: 2px solid #E2231A;
  }
  .stat-number {
    font-size: 28pt;
    font-weight: 700;
    color: #E2231A;
    line-height: 1;
    margin: 0;
  }
  .stat-label {
    font-size: 9pt;
    color: #666666;
    margin-top: 6pt;
    margin: 6pt 0 0 0;
  }
  .table-wrapper {
    display: flex;
    flex-direction: column;
    gap: 8pt;
  }
  .section-label {
    font-size: 10pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: #FAFAFA;
    font-size: 9pt;
    font-weight: 700;
    color: #666666;
    padding: 8pt 10pt;
    text-align: left;
    border-bottom: 2px solid #E0E0E0;
  }
  td {
    font-size: 9pt;
    color: #1A1A1A;
    padding: 8pt 10pt;
    border-bottom: 1px solid #E8E8E8;
  }
  .note-box {
    padding: 8pt 12pt;
    background: #FAFAFA;
    border-left: 3px solid #E0E0E0;
  }
  .note-text {
    font-size: 9pt;
    color: #666666;
    margin: 0;
  }
  .footer {
    position: absolute;
    bottom: 12pt;
    left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="page-header">
    <p class="page-num">03</p>
    <p class="page-label">呼叫中心现况简介</p>
  </div>
  <div class="title-bar">
    <p class="title-text">呼叫中心现况简介</p>
  </div>
  <div class="content">
    <div class="stat-row">
      <div class="stat-item">
        <p class="stat-number">3000+</p>
        <p class="stat-label">团队总人数</p>
      </div>
      <div class="stat-item">
        <p class="stat-number">35</p>
        <p class="stat-label">合作供应商</p>
      </div>
      <div class="stat-item">
        <p class="stat-number">100%</p>
        <p class="stat-label">电销渠道</p>
      </div>
    </div>
    <div class="table-wrapper">
      <p class="section-label">人员结构</p>
      <table>
        <tr><th>岗位</th><th>人数</th><th>占比</th><th>职责</th></tr>
        <tr><td>坐席人员</td><td>2900+</td><td>97%</td><td>外呼营销、客户沟通</td></tr>
        <tr><td>质检人员</td><td>50+</td><td>1.7%</td><td>合规检查、质量监控</td></tr>
        <tr><td>管理人员</td><td>50+</td><td>1.3%</td><td>团队管理、业务规划</td></tr>
      </table>
    </div>
    <div class="note-box">
      <p class="note-text">服务渠道：电销渠道（100%） — 主要负责金融营销电销外呼业务，涵盖拉新、复购等全流程服务</p>
    </div>
  </div>
  <div class="footer">
    <p>京东科技 · 2026新客服节申报材料</p>
    <p>P03</p>
  </div>
</body>
</html>
