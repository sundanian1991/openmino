<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 12pt;
    left: 48pt;
    display: flex;
    align-items: center;
  }
  .page-num {
    font-size: 11pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0;
  }
  .page-label {
    font-size: 11pt;
    font-weight: 500;
    color: #666666;
    margin: 0 0 0 8pt;
  }
  .title-bar {
    margin-top: 18pt;
    margin-bottom: 14pt;
    padding-bottom: 5pt;
    border-bottom: 3px solid #E2231A;
  }
  .title-text {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .content {
    margin: 0 48pt;
    width: calc(100% - 96pt);
    display: flex;
    flex-wrap: wrap;
    gap: 10pt;
  }
  .plan-card {
    flex: 0 0 calc(50% - 6pt);
    border: 1px solid #E8E8E8;
    border-left: 4px solid #E2231A;
    padding: 10pt 12pt;
  }
  .plan-card.highlight {
    background: #E2231A;
    border-color: #E2231A;
  }
  .plan-num {
    font-size: 16pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0 0 2pt 0;
  }
  .highlight .plan-num {
    color: #FFFFFF;
  }
  .plan-title {
    font-size: 10pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0 0 3pt 0;
  }
  .highlight .plan-title {
    color: #FFFFFF;
  }
  .plan-desc {
    font-size: 8pt;
    color: #666666;
    margin: 0;
    line-height: 1.5;
  }
  .highlight .plan-desc {
    color: #F5F5F5;
  }
  .footer {
    position: absolute;
    bottom: 12pt;
    left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="page-header">
    <p class="page-num">10</p>
    <p class="page-label">下一步计划</p>
  </div>
  <div class="title-bar">
    <p class="title-text">下一步计划</p>
  </div>
  <div class="content">
    <div class="plan-card">
      <p class="plan-num">01</p>
      <p class="plan-title">精准识别升级</p>
      <p class="plan-desc">通过更精准的客户识别模型，提升 ROI，应对获客成本上升挑战</p>
    </div>
    <div class="plan-card">
      <p class="plan-num">02</p>
      <p class="plan-title">合规能力持续强化</p>
      <p class="plan-desc">应对金融营销合规要求持续收紧，建立更完善的合规预警和培训体系</p>
    </div>
    <div class="plan-card">
      <p class="plan-num">03</p>
      <p class="plan-title">AI 技术持续迭代</p>
      <p class="plan-desc">跟进 AI、大数据等新技术，持续优化人机协同效率和营销效果</p>
    </div>
    <div class="plan-card highlight">
      <p class="plan-num">04</p>
      <p class="plan-title">持续保障</p>
      <p class="plan-desc">保持对技术和市场的敏感度，不断优化数据模型、强化合规管控、提升团队能力</p>
    </div>
  </div>
  <div class="footer">
    <p>京东科技 · 2026新客服节申报材料</p>
    <p>P10</p>
  </div>
</body>
</html>
