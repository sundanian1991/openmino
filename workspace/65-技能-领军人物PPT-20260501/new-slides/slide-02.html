<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 12pt;
    left: 48pt;
    display: flex;
    align-items: center;
  }
  .page-num {
    font-size: 11pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0;
  }
  .page-label {
    font-size: 11pt;
    font-weight: 500;
    color: #666666;
    margin: 0 0 0 8pt;
  }
  .title-bar {
    margin-top: 20pt;
    margin-bottom: 16pt;
    padding-bottom: 6pt;
    border-bottom: 3px solid #E2231A;
  }
  .title-text {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .content {
    margin: 0 48pt;
    width: calc(100% - 96pt);
    display: flex;
    gap: 36pt;
  }
  .col-left {
    flex: 0 0 220pt;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .col-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .brand-block {
    margin-bottom: 24pt;
  }
  .company-name {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0 0 6pt 0;
  }
  .slogan {
    font-size: 10pt;
    color: #999999;
    margin: 0 0 16pt 0;
  }
  .brand-item {
    margin-bottom: 12pt;
  }
  .brand-item-label {
    font-size: 8pt;
    color: #999999;
    margin: 0 0 2pt 0;
    font-weight: 700;
    text-transform: uppercase;
  }
  .brand-item-text {
    font-size: 9pt;
    color: #1A1A1A;
    margin: 0;
    line-height: 1.5;
  }
  .info-row {
    display: flex;
    padding: 10pt 0;
    border-bottom: 1px solid #E8E8E8;
    align-items: baseline;
  }
  .info-label {
    font-size: 8pt;
    color: #999999;
    width: 70pt;
    flex-shrink: 0;
    margin: 0;
    font-weight: 500;
  }
  .info-value {
    font-size: 9pt;
    color: #1A1A1A;
    margin: 0;
    line-height: 1.5;
  }
  .footer {
    position: absolute;
    bottom: 12pt;
    left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="page-header">
    <p class="page-num">02</p>
    <p class="page-label">企业介绍</p>
  </div>
  <div class="title-bar">
    <p class="title-text">企业介绍</p>
  </div>
  <div class="content">
    <div class="col-left">
      <div class="brand-block">
        <p class="company-name">京东科技股份有限公司</p>
        <p class="slogan">技术为本，让生活更美好</p>
      </div>
      <div class="brand-item">
        <p class="brand-item-label">愿景</p>
        <p class="brand-item-text">成为全球最值得信赖的企业</p>
      </div>
      <div class="brand-item">
        <p class="brand-item-label">价值观</p>
        <p class="brand-item-text">客户为先 · 创新 · 拼搏 · 担当 · 感恩 · 诚信</p>
      </div>
    </div>
    <div class="col-right">
      <div class="info-row">
        <p class="info-label">主营业务</p>
        <p class="info-value">信息技术咨询服务、云计算、人工智能应用、软件开发、数据处理服务</p>
      </div>
      <div class="info-row">
        <p class="info-label">从事行业</p>
        <p class="info-value">金融科技 / 科技服务</p>
      </div>
      <div class="info-row">
        <p class="info-label">企业地址</p>
        <p class="info-value">北京市北京经济技术开发区科创十一街18号院2号楼6层601</p>
      </div>
      <div class="info-row">
        <p class="info-label">客服电话</p>
        <p class="info-value">400-098-8505</p>
      </div>
      <div class="info-row">
        <p class="info-label">企业总机</p>
        <p class="info-value">400-098-8505</p>
      </div>
      <div class="info-row" style="border-bottom: none;">
        <p class="info-label">服务价值观</p>
        <p class="info-value">客户为先、创新、拼搏、担当、感恩、诚信</p>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>京东科技 · 2026新客服节申报材料</p>
    <p>P02</p>
  </div>
</body>
</html>
