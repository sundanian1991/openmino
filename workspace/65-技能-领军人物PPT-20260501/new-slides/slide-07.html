<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 12pt;
    left: 48pt;
    display: flex;
    align-items: center;
  }
  .page-num {
    font-size: 11pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0;
  }
  .page-label {
    font-size: 11pt;
    font-weight: 500;
    color: #666666;
    margin: 0 0 0 8pt;
  }
  .title-bar {
    margin-top: 20pt;
    margin-bottom: 16pt;
    padding-bottom: 6pt;
    border-bottom: 3px solid #E2231A;
  }
  .title-text {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .content {
    margin: 0 48pt;
    width: calc(100% - 96pt);
    display: flex;
    flex-direction: column;
    gap: 14pt;
  }
  .grid-6 {
    display: flex;
    gap: 12pt;
  }
  .metric-card {
    flex: 1;
    text-align: center;
    padding: 12pt 4pt;
  }
  .metric-divider {
    width: 1px;
    background: #E8E8E8;
    align-self: stretch;
  }
  .result-number {
    font-size: 22pt;
    font-weight: 700;
    color: #E2231A;
    line-height: 1;
    margin: 0;
  }
  .result-label {
    font-size: 8pt;
    color: #666666;
    margin-top: 5pt;
    margin: 5pt 0 0 0;
  }
  .dimension-row {
    display: flex;
    gap: 12pt;
  }
  .dimension-card {
    flex: 1;
    padding: 10pt 12pt;
    border-top: 2px solid #E2231A;
    background: #FAFAFA;
  }
  .dim-title {
    font-size: 10pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0 0 4pt 0;
  }
  .dim-text {
    font-size: 8pt;
    color: #666666;
    margin: 0;
    line-height: 1.5;
  }
  .footer {
    position: absolute;
    bottom: 12pt;
    left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="page-header">
    <p class="page-num">07</p>
    <p class="page-label">客服转型具体成果</p>
  </div>
  <div class="title-bar">
    <p class="title-text">客服转型具体成果</p>
  </div>
  <div class="content">
    <div class="grid-6">
      <div class="metric-card">
        <p class="result-number">+35%</p>
        <p class="result-label">接通率提升</p>
      </div>
      <div class="metric-divider"></div>
      <div class="metric-card">
        <p class="result-number">+25%</p>
        <p class="result-label">转化率提升</p>
      </div>
      <div class="metric-divider"></div>
      <div class="metric-card">
        <p class="result-number">+40%</p>
        <p class="result-label">人均效率提升</p>
      </div>
      <div class="metric-divider"></div>
      <div class="metric-card">
        <p class="result-number">100%</p>
        <p class="result-label">合规率</p>
      </div>
      <div class="metric-divider"></div>
      <div class="metric-card">
        <p class="result-number">+300%</p>
        <p class="result-label">质检效率提升</p>
      </div>
      <div class="metric-divider"></div>
      <div class="metric-card">
        <p class="result-number">-67%</p>
        <p class="result-label">新人上手时间缩短</p>
      </div>
    </div>
    <div class="dimension-row">
      <div class="dimension-card">
        <p class="dim-title">客服价值化</p>
        <p class="dim-text">从成本中心转为利润贡献，年度GMV（放款额）2000亿+，团队规模行业领先</p>
      </div>
      <div class="dimension-card">
        <p class="dim-title">数字智能化</p>
        <p class="dim-text">AI需求识别模型+实时话术辅助+智能质检，100%通话覆盖，合规风险降低60%</p>
      </div>
      <div class="dimension-card">
        <p class="dim-title">服务营销一体化</p>
        <p class="dim-text">精准触达+全生命周期运营，新客获取效率+28%，客户复购率+30%</p>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>京东科技 · 2026新客服节申报材料</p>
    <p>P07</p>
  </div>
</body>
</html>
