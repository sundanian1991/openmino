<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  .main-title {
    font-size: 26pt;
    font-weight: 700;
    color: #1A1A1A;
    text-align: center;
    line-height: 1.35;
    margin: 0;
  }
  .accent {
    color: #E2231A;
    font-size: 30pt;
  }
  .sub-title {
    font-size: 12pt;
    color: #999999;
    text-align: center;
    margin-top: 16pt;
    font-weight: 400;
    letter-spacing: 1pt;
  }
  .company {
    font-size: 12pt;
    color: #1A1A1A;
    text-align: center;
    font-weight: 700;
    margin-top: 60pt;
    letter-spacing: 2pt;
  }
  .accent-line {
    width: 60pt;
    height: 3px;
    background: #E2231A;
    margin: 20pt auto 0 auto;
  }
</style>
</head>
<body>
  <p class="main-title">2026年度"新客服节"<br><span class="accent">新客服最佳实践奖</span></p>
  <p class="sub-title">服务营销最佳实践奖 · 申报材料</p>
  <p class="company">京东科技股份有限公司</p>
  <div class="accent-line"></div>
</body>
</html>
