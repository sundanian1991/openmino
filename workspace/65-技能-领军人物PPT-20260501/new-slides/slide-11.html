<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;

  .top-line {
    width: 80pt;
    height: 3px;
    background: #E2231A;
    margin-bottom: 24pt;

  .company-name {
    font-size: 13pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 24pt 0 6pt 0;
    letter-spacing: 2pt;
  }
  .sub-text {
    font-size: 9pt;
    color: #999999;
    margin: 0;
    letter-spacing: 1pt;
  }
  .bottom-line {
    width: 80pt;
    height: 3px;
    background: #E2231A;
    margin-top: 24pt;
  }
</style>
</head>
<body>
  <div class="top-line"></div>
  <p class="thanks-text">THANKS</p>

</html>
