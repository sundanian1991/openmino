<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 12pt;
    left: 48pt;
    display: flex;
    align-items: center;
  }
  .page-num {
    font-size: 11pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0;
  }
  .page-label {
    font-size: 11pt;
    font-weight: 500;
    color: #666666;
    margin: 0 0 0 8pt;
  }
  .title-bar {
    margin-top: 20pt;
    margin-bottom: 16pt;
    padding-bottom: 6pt;
    border-bottom: 3px solid #E2231A;
  }
  .title-text {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .content {
    margin: 0 48pt;
    width: calc(100% - 96pt);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .level-row {
    display: flex;
    justify-content: center;
    gap: 24pt;
    width: 100%;
  }
  .node {
    padding: 10pt 20pt;
    text-align: center;
  }
  .node-l1 {
    background: #1A1A1A;
    padding: 10pt 28pt;
  }
  .node-l1 .node-title {
    font-size: 12pt;
    font-weight: 700;
    color: #FFFFFF;
    margin: 0;
  }
  .node-l1 .node-desc {
    font-size: 8pt;
    color: #CCCCCC;
    margin: 3pt 0 0 0;
  }
  .node-l2 {
    background: #F5F5F5;
    flex: 0 0 200pt;
  }
  .node-l2 .node-title {
    font-size: 11pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .node-l2 .node-desc {
    font-size: 8pt;
    color: #666666;
    margin: 3pt 0 0 0;
  }
  .node-l3 {
    border: 1px solid #E0E0E0;
    flex: 0 0 170pt;
  }
  .node-l3 .node-title {
    font-size: 10pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .node-l3 .node-desc {
    font-size: 8pt;
    color: #666666;
    margin: 3pt 0 0 0;
  }
  .connector {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 16pt;
    position: relative;
  }
  .connector .v-line {
    width: 2px;
    height: 16pt;
    background: #E2231A;
  }
  .connector .h-bar {
    position: absolute;
    top: 0;
    height: 2px;
    background: #E2231A;
  }
  .connector.l2-connector .h-bar {
    left: 25%;
    right: 25%;
  }
  .connector.l3-connector .h-bar {
    left: 17%;
    right: 17%;
  }
  .footer {
    position: absolute;
    bottom: 12pt;
    left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="page-header">
    <p class="page-num">04</p>
    <p class="page-label">呼叫中心组织架构</p>
  </div>
  <div class="title-bar">
    <p class="title-text">呼叫中心组织架构</p>
  </div>
  <div class="content">
    <!-- L1 -->
    <div class="level-row">
      <div class="node node-l1">
        <p class="node-title">数据科技业务部</p>
        <p class="node-desc">二级部门 · 金融科技事业群</p>
      </div>
    </div>
    <!-- Connector L1→L2 -->
    <div class="connector l2-connector">
      <div class="v-line"></div>
      <div class="h-bar"></div>
    </div>
    <!-- L2 -->
    <div class="level-row">
      <div class="node node-l2">
        <p class="node-title">策略运营组</p>
        <p class="node-desc">策略制定 · 数据分析 · 业务规划</p>
      </div>
      <div class="node node-l2">
        <p class="node-title">电销服务组</p>
        <p class="node-desc">供应商管理 · 质检培训 · 运营保障</p>
      </div>
    </div>
    <!-- Connector L2→L3 -->
    <div class="connector l3-connector">
      <div class="v-line"></div>
      <div class="h-bar"></div>
    </div>
    <!-- L3 -->
    <div class="level-row">
      <div class="node node-l3">
        <p class="node-title">业务管理</p>
        <p class="node-desc">日常供应商 BPO 沟通</p>
      </div>
      <div class="node node-l3">
        <p class="node-title">质检培训运营</p>
        <p class="node-desc">合规管控 · 赋能培训</p>
      </div>
      <div class="node node-l3">
        <p class="node-title">前台运营</p>
        <p class="node-desc">2900+ 坐席</p>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>京东科技 · 2026新客服节申报材料</p>
    <p>P04</p>
  </div>
</body>
</html>
