<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 720pt;
    height: 405pt;
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 12pt;
    left: 48pt;
    display: flex;
    align-items: center;
  }
  .page-num {
    font-size: 11pt;
    font-weight: 700;
    color: #E2231A;
    margin: 0;
  }
  .page-label {
    font-size: 11pt;
    font-weight: 500;
    color: #666666;
    margin: 0 0 0 8pt;
  }
  .title-bar {
    margin-top: 20pt;
    margin-bottom: 16pt;
    padding-bottom: 6pt;
    border-bottom: 3px solid #E2231A;
  }
  .title-text {
    font-size: 18pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0;
  }
  .content {
    margin: 0 48pt;
    width: calc(100% - 96pt);
    display: flex;
    gap: 20pt;
  }
  .col-left, .col-right {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .col-header {
    padding: 8pt 14pt;
    margin-bottom: 14pt;
  }
  .col-header-gray {
    background: #FAFAFA;
  }
  .col-header-red {
    background: #E2231A;
  }
  .col-header-text {
    font-size: 12pt;
    font-weight: 700;
    margin: 0;
  }
  .col-header-gray .col-header-text {
    color: #1A1A1A;
  }
  .col-header-red .col-header-text {
    color: #FFFFFF;
  }
  .item-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14pt;
  }
  .item-title {
    font-size: 10pt;
    font-weight: 700;
    color: #1A1A1A;
    margin: 0 0 3pt 0;
  }
  .col-right .item-title {
    color: #E2231A;
  }
  .item-desc {
    font-size: 8pt;
    color: #666666;
    margin: 0;
    line-height: 1.5;
  }
  .footer {
    position: absolute;
    bottom: 12pt;
    left: 48pt;
    right: 48pt;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="page-header">
    <p class="page-num">09</p>
    <p class="page-label">组织变革与人才培养</p>
  </div>
  <div class="title-bar">
    <p class="title-text">组织变革与人才培养</p>
  </div>
  <div class="content">
    <div class="col-left">
      <div class="col-header col-header-gray">
        <p class="col-header-text">组织变革</p>
      </div>
      <div class="item-block">
        <div>
          <p class="item-title">定位升级</p>
          <p class="item-desc">从"客服中心"转为"数据驱动的服务营销中枢"</p>
        </div>
        <div>
          <p class="item-title">架构调整</p>
          <p class="item-desc">策略组与服务组分工明确，业务管理与质检培训运营双线支撑</p>
        </div>
        <div>
          <p class="item-title">供应商生态</p>
          <p class="item-desc">35家供应商统一管理，标准化准入、考核与清退机制</p>
        </div>
      </div>
    </div>
    <div class="col-right">
      <div class="col-header col-header-red">
        <p class="col-header-text">人才培养</p>
      </div>
      <div class="item-block">
        <div>
          <p class="item-title">AI辅助降低门槛</p>
          <p class="item-desc">AI话术推荐让新人上手时间缩短67%，从传统电销向智能营销转型</p>
        </div>
        <div>
          <p class="item-title">复合型能力培养</p>
          <p class="item-desc">培养数据理解、客户沟通、合规意识的复合型营销人才</p>
        </div>
        <div>
          <p class="item-title">考核机制引导</p>
          <p class="item-desc">结果导向+过程管理+客户评价+合规红线，综合评估引导能力成长</p>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>京东科技 · 2026新客服节申报材料</p>
    <p>P09</p>
  </div>
</body>
</html>
