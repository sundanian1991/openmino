<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
    --semantic-success: #2E6B3E;
    --semantic-warning: #8A5A00;
    --semantic-danger:  #9C2B2B;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">转型实施过程</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">四步路径：数据赋能 → 人机协同 → 合规提效 → 全生命周期运营</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 四步时间线 -->
<!-- 时间线主轴 -->
<line x1="100" y1="180" x2="1180" y2="180" stroke="var(--brand-primary)" stroke-width="2" stroke-dasharray="6,4"/>

<!-- 阶段1 -->
<circle cx="160" cy="180" r="28" fill="#E8F0FA" stroke="var(--brand-primary)" stroke-width="2"/>
<text x="160" y="186" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="var(--brand-primary)">01</text>
<rect x="80" y="220" width="160" height="36" rx="3" fill="#E8F0FA" stroke="var(--brand-primary)" stroke-width="1"/>
<text x="160" y="244" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">数据赋能</text>

<!-- 装饰图标：数据 -->
<rect x="124" y="264" width="72" height="72" rx="36" fill="#F5F5F5"/>
<rect x="138" y="290" width="8" height="28" rx="2" fill="var(--brand-primary)"/>
<rect x="150" y="280" width="8" height="38" rx="2" fill="var(--brand-primary)"/>
<rect x="162" y="270" width="8" height="48" rx="2" fill="var(--brand-primary)"/>
