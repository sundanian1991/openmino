<rect x="844" y="264" width="72" height="72" rx="36" fill="var(--brand-primary)"/>
<circle cx="880" cy="300" r="16" fill="none" stroke="#FFFFFF" stroke-width="2"/>
<polygon points="880,282 874,290 886,290" fill="#FFFFFF"/>
<polygon points="880,318 874,310 886,310" fill="#FFFFFF"/>

