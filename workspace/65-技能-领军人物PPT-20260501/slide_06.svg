<rect x="604" y="264" width="72" height="72" rx="36" fill="#F5F5F5"/>
<path d="M640,280 L624,290 L624,306 C624,318 632,328 640,332 C648,328 656,318 656,306 L656,290 Z" fill="var(--brand-primary)"/>
<path d="M634,302 L638,306 L648,296" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>

