<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
    --semantic-success: #2E6B3E;
    --semantic-warning: #8A5A00;
    --semantic-danger:  #9C2B2B;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">转型成果</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">接通率+35%，人均效率+40%，转化率+25%，合规率保持100%</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- KPI看板 2x3 -->
<!-- 卡片1：接通率 -->
<rect x="40" y="120" width="360" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="120" width="4" height="160" fill="#2E6B3E"/>
<text x="56" y="152" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">接通率提升</text>
<text x="56" y="214" font-family="Songti SC,SimSun,serif" font-size="44" font-weight="bold" fill="#2E6B3E">+35%</text>
<text x="56" y="258" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">精准客户识别，减少无效触达</text>

<!-- 卡片2：首拨转化率 -->
<rect x="440" y="120" width="360" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="440" y="120" width="4" height="160" fill="#2E6B3E"/>
<text x="456" y="152" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">首拨转化率提升</text>
<text x="456" y="214" font-family="Songti SC,SimSun,serif" font-size="44" font-weight="bold" fill="#2E6B3E">+28%</text>
<text x="456" y="258" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI辅助话术推荐，精准触达</text>

<!-- 卡片3：人均效率 -->
<rect x="840" y="120" width="400" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="840" y="120" width="4" height="160" fill="var(--brand-primary)"/>
<text x="856" y="152" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">人均效率提升</text>
<text x="856" y="214" font-family="Songti SC,SimSun,serif" font-size="44" font-weight="bold" fill="var(--brand-primary)">+40%</text>
<text x="856" y="258" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI成为坐席超级助手</text>

<!-- 卡片4：新人上手时间 -->
<rect x="40" y="320" width="360" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="320" width="4" height="160" fill="#2E6B3E"/>
<text x="56" y="352" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">新人上手时间缩短</text>
<text x="56" y="414" font-family="Songti SC,SimSun,serif" font-size="44" font-weight="bold" fill="#2E6B3E">-67%</text>
<text x="56" y="458" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI辅助降低新人培训门槛</text>

<!-- 卡片5：营销转化率 -->
<rect x="440" y="320" width="360" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="440" y="320" width="4" height="160" fill="var(--brand-primary)"/>
<text x="456" y="352" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">营销转化率提升</text>
<text x="456" y="414" font-family="Songti SC,SimSun,serif" font-size="44" font-weight="bold" fill="var(--brand-primary)">+25%</text>
<text x="456" y="458" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">个性化产品匹配，数据闭环</text>

<!-- 卡片6：客户复购率 -->
<rect x="840" y="320" width="400" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="840" y="320" width="4" height="160" fill="#2E6B3E"/>
<text x="856" y="352" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">客户复购率提升</text>
<text x="856" y="414" font-family="Songti SC,SimSun,serif" font-size="44" font-weight="bold" fill="#2E6B3E">+30%</text>
<text x="856" y="458" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">全生命周期运营，主动触达</text>

<!-- 底部总结 -->
<rect x="40" y="520" width="1200" height="150" rx="4" fill="#0A1F3A"/>
<rect x="40" y="520" width="4" height="150" fill="var(--brand-primary)"/>
<text x="60" y="556" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">核心贡献</text>
<text x="60" y="586" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#8AAED0">数据驱动的智能电销模式，将3000人团队打造为年放款2000亿+的营销中枢</text>

<rect x="60" y="610" width="180" height="40" rx="20" fill="var(--brand-primary)"/>
<text x="150" y="636" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">年度GMV 2000亿+</text>

<rect x="260" y="610" width="160" height="40" rx="20" fill="var(--brand-primary)"/>
<text x="340" y="636" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">合规率 100%</text>

<rect x="440" y="610" width="180" height="40" rx="20" fill="var(--brand-primary)"/>
<text x="530" y="636" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">质检效率 +300%</text>

<rect x="640" y="610" width="180" height="40" rx="20" fill="var(--brand-primary)"/>
<text x="730" y="636" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">合规风险 -60%</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">7 / 11</text>
</svg>