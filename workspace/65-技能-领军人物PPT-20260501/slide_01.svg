<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
    --semantic-success: #2E6B3E;
    --semantic-warning: #8A5A00;
    --semantic-danger:  #9C2B2B;
  }
</style></defs>

<!-- 深色背景 -->
<rect width="1280" height="720" fill="#0A1F3A"/>

<!-- 顶部品牌线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 左上标注 -->
<text x="80" y="80" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="3">2026年度评选申报</text>

<!-- 主标题 -->
<text x="120" y="280" font-family="Songti SC,SimSun,serif" font-size="38" font-weight="bold" fill="#FFFFFF">2026年度&#x201C;新客服最佳实践奖&#x201D;</text>
<text x="120" y="340" font-family="Songti SC,SimSun,serif" font-size="38" font-weight="bold" fill="#FFFFFF">申报方案</text>

<!-- 副标题 -->
<text x="120" y="420" font-family="Microsoft YaHei,sans-serif" font-size="20" fill="#8AAED0">京东科技 &#x2014; 金融科技事业群 &#x2014; 数据科技业务部</text>

<!-- 分隔线 -->
<line x1="120" y1="460" x2="420" y2="460" stroke="#1A5FA8" stroke-width="1"/>

<!-- 底部信息 -->
<text x="120" y="500" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#6B86A8">申报人：孙大年 &#x3000; 高级经理 &#x3000; sundanian@jd.com</text>
<text x="120" y="528" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#6B86A8">讲解时间 30 分钟 &#x3000; Q&amp;A 15 分钟</text>

<!-- 底部装饰线 -->
<rect x="0" y="710" width="1280" height="10" fill="var(--brand-primary)"/>
</svg>