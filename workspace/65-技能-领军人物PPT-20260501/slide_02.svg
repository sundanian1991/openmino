<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
    --semantic-success: #2E6B3E;
    --semantic-warning: #8A5A00;
    --semantic-danger:  #9C2B2B;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">企业介绍</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">京东科技以技术为本，承载集团金融营销服务职能</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧主区域：三大信息卡 -->
<!-- 卡片1：企业定位 -->
<rect x="40" y="100" width="600" height="200" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<!-- 图标：定位图标（简化的建筑/公司图标） -->
<rect x="72" y="120" width="56" height="56" rx="8" fill="#E8F0FA"/>
<rect x="84" y="142" width="32" height="30" rx="2" fill="var(--brand-primary)"/>
<rect x="88" y="146" width="10" height="8" rx="1" fill="#FFFFFF"/>
<rect x="102" y="146" width="10" height="8" rx="1" fill="#FFFFFF"/>
<rect x="88" y="158" width="10" height="8" rx="1" fill="#FFFFFF"/>
<rect x="102" y="158" width="10" height="8" rx="1" fill="#FFFFFF"/>
<polygon points="100,136 84,144 116,144" fill="var(--brand-primary)"/>

<text x="144" y="136" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="var(--brand-primary)" letter-spacing="2">企业定位</text>
<text x="144" y="168" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#1A1A1A">金融科技 / 科技服务</text>
<text x="144" y="192" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">主营业务：信息技术咨询服务、人工智能应用、</text>
<text x="144" y="212" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">云计算、软件开发、数据处理服务</text>

<!-- 卡片2：服务使命 -->
<rect x="40" y="316" width="290" height="360" rx="4" fill="#F5F5F5"/>
<rect x="40" y="316" width="4" height="360" fill="var(--brand-primary)"/>
<!-- 图标：心形（使命图标） -->
<rect x="160" y="340" width="56" height="56" rx="8" fill="var(--brand-primary)"/>
<path d="M188,354 C188,350 184,348 180,350 C176,352 174,356 174,360 C174,366 180,372 188,378 C196,372 202,366 202,360 C202,356 200,352 196,350 C192,348 188,350 188,354 Z" fill="#FFFFFF"/>

<text x="60" y="420" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">服务使命</text>
<text x="60" y="450" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">技术为本，让生活更美好</text>
<line x1="60" y1="468" x2="310" y2="468" stroke="#CCCCCC" stroke-width="0.5"/>
<text x="60" y="492" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">以技术驱动服务升级，</text>
<text x="60" y="512" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">为用户提供专业、高效的</text>
<text x="60" y="532" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">金融服务体验</text>

<line x1="60" y1="562" x2="310" y2="562" stroke="#CCCCCC" stroke-width="0.5"/>

<text x="60" y="590" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">服务愿景</text>
<text x="60" y="616" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">成为全球最值得信赖的企业</text>
<text x="60" y="640" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">建立长期信任关系，持续</text>
<text x="60" y="658" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">为客户创造价值</text>

<!-- 卡片3：价值观 -->
<rect x="350" y="316" width="290" height="360" rx="4" fill="#F5F5F5"/>
<rect x="350" y="316" width="4" height="360" fill="var(--brand-primary)"/>
<!-- 图标：星星（价值观图标） -->
<rect x="470" y="340" width="56" height="56" rx="8" fill="var(--brand-primary)"/>
<polygon points="498,352 502,362 512,362 504,368 507,378 498,372 489,378 492,368 484,362 494,362" fill="#FFFFFF"/>

<text x="370" y="420" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#1A1A1A">六大核心价值</text>

<!-- 价值观网格 2x3 -->
<rect x="370" y="440" width="120" height="44" rx="3" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="430" y="468" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">客户为先</text>

<rect x="500" y="440" width="120" height="44" rx="3" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="560" y="468" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">创新</text>

<rect x="370" y="492" width="120" height="44" rx="3" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="430" y="520" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">拼搏</text>

<rect x="500" y="492" width="120" height="44" rx="3" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="560" y="520" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">担当</text>

<rect x="370" y="544" width="120" height="44" rx="3" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="430" y="572" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">感恩</text>

<rect x="500" y="544" width="120" height="44" rx="3" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="560" y="572" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="var(--brand-primary)">诚信</text>

<!-- 右侧：关键数字面板 -->
<rect x="660" y="100" width="580" height="580" rx="4" fill="#0A1F3A"/>
<rect x="660" y="100" width="4" height="580" fill="var(--brand-primary)"/>

<text x="680" y="136" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">关键数字</text>
<line x1="680" y1="146" x2="1220" y2="146" stroke="#1A5FA8" stroke-width="0.5"/>

<!-- 数字1：成立年份 -->
<rect x="680" y="164" width="260" height="120" rx="4" fill="#162A4A"/>
<text x="810" y="194" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">开始运营</text>
<text x="810" y="250" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="#FFFFFF">2018</text>

<rect x="960" y="164" width="240" height="120" rx="4" fill="#162A4A"/>
<text x="1080" y="194" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">运营年限</text>
<text x="1080" y="250" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">8</text>
<text x="1080" y="272" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#6B86A8">年</text>

<!-- 数字2：地址 -->
<rect x="680" y="300" width="520" height="100" rx="4" fill="#162A4A"/>
<!-- 图标：地址标记 -->
<rect x="696" y="320" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<circle cx="714" cy="332" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
<circle cx="714" cy="332" r="2" fill="#FFFFFF"/>
<path d="M714,338 L714,344" stroke="#FFFFFF" stroke-width="1.5"/>

<text x="748" y="340" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">总部地址</text>
<text x="748" y="364" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#FFFFFF">北京市北京经济技术开发区</text>
<text x="748" y="384" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#8AAED0">科创十一街18号院2号楼6层601</text>

<!-- 数字3：客服电话 -->
<rect x="680" y="416" width="520" height="100" rx="4" fill="#162A4A"/>
<!-- 图标：电话 -->
<rect x="696" y="436" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<rect x="704" y="444" width="16" height="20" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
<line x1="708" y1="448" x2="708" y2="458" stroke="#FFFFFF" stroke-width="1"/>
<line x1="716" y1="448" x2="716" y2="458" stroke="#FFFFFF" stroke-width="1"/>

<text x="748" y="456" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">客服电话</text>
<text x="748" y="486" font-family="Microsoft YaHei,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">4000988505</text>

<!-- 数字4：部门层级 -->
<rect x="680" y="532" width="520" height="100" rx="4" fill="#162A4A"/>
<!-- 图标：层级 -->
<rect x="696" y="552" width="36" height="36" rx="6" fill="var(--brand-primary)"/>
<rect x="702" y="562" width="24" height="4" rx="1" fill="#FFFFFF"/>
<rect x="706" y="570" width="16" height="4" rx="1" fill="#FFFFFF"/>
<rect x="709" y="578" width="10" height="4" rx="1" fill="#FFFFFF"/>

<text x="748" y="572" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#6B86A8" letter-spacing="2">客服中心层级</text>
<text x="748" y="602" font-family="Songti SC,SimSun,serif" font-size="24" font-weight="bold" fill="var(--brand-primary)">二级部门</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">2 / 11</text>
