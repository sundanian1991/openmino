<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary:   #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray:       #888888;
    --brand-light-bg:   #F5F5F5;
    --brand-border:     #E2E2E2;
    --semantic-success: #2E6B3E;
    --semantic-warning: #8A5A00;
    --semantic-danger:  #9C2B2B;
  }
</style></defs>

<!-- 顶部品牌色线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">组织架构</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">数据科技业务部为二级部门，三层架构分工明确</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧：组织架构图 -->
<rect x="40" y="100" width="700" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 顶层：数据科技业务部 -->
<rect x="200" y="120" width="380" height="60" rx="4" fill="var(--brand-primary)"/>
<text x="390" y="156" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">数据科技业务部（二级部门）</text>

<!-- 竖线 -->
<line x1="390" y1="180" x2="390" y2="240" stroke="var(--brand-primary)" stroke-width="1.5"/>
<!-- 横线 -->
<line x1="120" y1="240" x2="660" y2="240" stroke="var(--brand-primary)" stroke-width="1.5"/>

<!-- 三个分支竖线 -->
<line x1="180" y1="240" x2="180" y2="270" stroke="var(--brand-primary)" stroke-width="1.5"/>
<line x1="390" y1="240" x2="390" y2="270" stroke="var(--brand-primary)" stroke-width="1.5"/>
<line x1="600" y1="240" x2="600" y2="270" stroke="var(--brand-primary)" stroke-width="1.5"/>

<!-- 三个子部门 -->
