<line x1="390" y1="330" x2="390" y2="370" stroke="#AAAAAA" stroke-width="1"/>
<rect x="270" y="380" width="240" height="180" rx="4" fill="#F5F5F5"/>
<rect x="270" y="380" width="4" height="180" fill="var(--brand-primary)"/>
