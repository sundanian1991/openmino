<text x="180" y="306" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">电销服务组</text>

<rect x="290" y="270" width="200" height="60" rx="4" fill="#E8F0FA" stroke="var(--brand-primary)" stroke-width="1"/>
<text x="390" y="306" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">策略运营组</text>

<rect x="500" y="270" width="200" height="60" rx="4" fill="#E8F0FA" stroke="var(--brand-primary)" stroke-width="1"/>
<text x="600" y="306" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">后台管理部</text>

