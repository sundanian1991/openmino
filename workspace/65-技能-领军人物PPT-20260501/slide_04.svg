<line x1="290" y1="420" x2="490" y2="420" stroke="#CCCCCC" stroke-width="0.5"/>
<rect x="290" y="430" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="300" y="440" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">数据策略与模型开发</text>
<rect x="290" y="448" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="300" y="458" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">AI辅助系统运营管理</text>
<rect x="290" y="466" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="300" y="476" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">质检培训运营</text>
