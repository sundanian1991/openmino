<line x1="180" y1="330" x2="180" y2="370" stroke="#AAAAAA" stroke-width="1"/>
<rect x="60" y="380" width="240" height="180" rx="4" fill="#F5F5F5"/>
<rect x="60" y="380" width="4" height="180" fill="var(--brand-primary)"/>
<text x="80" y="410" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">电销服务组 &#x00B7; 2900+人</text>
