<text x="300" y="494" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">合规保障与风控</text>

<!-- 后台管理部详情 -->
<line x1="600" y1="330" x2="600" y2="370" stroke="#AAAAAA" stroke-width="1"/>
<rect x="480" y="380" width="240" height="180" rx="4" fill="#F5F5F5"/>
<rect x="480" y="380" width="4" height="180" fill="var(--brand-primary)"/>
<text x="500" y="410" font-family="Microsoft YaHei,sans-serif" font-size="12" font-weight="bold" fill="var(--brand-primary)">后台管理部 &#x00B7; 50+人</text>
<line x1="500" y1="420" x2="700" y2="420" stroke="#CCCCCC" stroke-width="0.5"/>
<rect x="500" y="430" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="440" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">供应商管理与考核</text>
<rect x="500" y="448" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="458" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">业务管理与跨部门协调</text>
<rect x="500" y="466" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="476" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">运营管理支撑</text>
<rect x="500" y="484" width="3" height="12" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="494" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">数据分析与报告输出</text>

<!-- 右侧：关键信息 -->
<rect x="756" y="100" width="484" height="580" rx="4" fill="#F5F5F5"/>
<rect x="756" y="100" width="4" height="580" fill="var(--brand-primary)"/>
<text x="776" y="128" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="var(--brand-primary)" letter-spacing="2">关键信息</text>
<line x1="776" y1="138" x2="1220" y2="138" stroke="var(--brand-primary)" stroke-width="1"/>

<!-- 部门定位 -->
<rect x="776" y="156" width="416" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="796" y="182" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">部门定位</text>
<text x="796" y="206" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">京东科技金融科技事业群核心部门，</text>
<text x="796" y="226" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">承载集团金融营销服务职能</text>

<!-- 服务部门定位 -->
<rect x="776" y="272" width="416" height="100" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="796" y="298" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">服务定位</text>
<text x="796" y="322" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">数据驱动的服务营销中枢</text>
<text x="796" y="342" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">通过精细化运营和智能化管理</text>

<!-- 运营年份 -->
<rect x="776" y="388" width="416" height="80" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="796" y="414" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">运营始于 2018 年</text>
<text x="796" y="442" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">7年运营经验积累</text>

<!-- 客服中心层级 -->
<rect x="776" y="484" width="416" height="80" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="796" y="510" font-family="Songti SC,SimSun,serif" font-size="16" font-weight="bold" fill="#1A1A1A">客服中心层级</text>
<text x="796" y="538" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">二级部门架构，直接向事业群汇报</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：申报材料 &#x00B7; 2026</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">4 / 11</text>
</svg>