<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>复贷TOP10蝴蝶图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFF8F0; }
  #chart { width: 960px; height: 620px; margin: 0 auto; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var names = [
  '陈雪春','于新美','刘军','杜小琴','李平',
  '李新华','钱纯玉','王兆雪','王夏娟','王康'
];
var gmv = [1610, 1530, 1470, 1470, 1390, 1370, 1330, 1330, 1320, 1310];
var score = [31.9, 38.4, 70.2, 57.3, 54.5, 18.4, 73.4, 79.3, 85.0, 21.9];

var HIGHLIGHT = '#CC6B1E';
var GRAY = '#C8C8C8';
var highlightIdx = 0;

function leftColor(idx) {
  return idx === highlightIdx ? HIGHLIGHT : GRAY;
}
function rightColor(idx) {
  return idx === highlightIdx ? HIGHLIGHT : GRAY;
}

var chart = echarts.init(document.getElementById('chart'));

var option = {
  backgroundColor: '#FFF8F0',
  title: {
    text: '复贷 GMV 最高的陈雪春（1610 万）得分仅 31.9——产出与考核排名背离，需确认权重设计意图',
    left: 24,
    top: 16,
    textStyle: {
      fontSize: 16,
      fontWeight: 600,
      color: '#333',
      width: 910,
      overflow: 'break'
    }
  },
  tooltip: { show: false },
  legend: { show: false },
  grid: [
    { left: 120, right: '52%', top: 80, bottom: 40 },
    { left: '52%', right: 80, top: 80, bottom: 40 }
  ],
  xAxis: [
    {
      type: 'value',
      gridIndex: 0,
      inverse: true,
      name: 'GMV（万）',
      nameLocation: 'start',
      nameTextStyle: { fontSize: 12, color: '#666', padding: [0, 0, 0, 0] },
      max: 1800,
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: false },
      axisLabel: {
        fontSize: 11,
        color: '#999',
        formatter: function(v) { return Math.abs(v); }
      }
    },
    {
      type: 'value',
      gridIndex: 1,
      name: '综合得分',
      nameLocation: 'start',
      nameTextStyle: { fontSize: 12, color: '#666', padding: [0, 0, 0, 0] },
      max: 100,
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: false },
      axisLabel: { fontSize: 11, color: '#999' }
    }
  ],
  yAxis: [
    {
      type: 'category',
      gridIndex: 0,
      data: names,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        fontSize: 13,
        color: function(value, idx) {
          return idx === highlightIdx ? HIGHLIGHT : '#444';
        },
        fontWeight: function(value, idx) {
          return idx === highlightIdx ? 700 : 400;
        }
      }
    },
    {
      type: 'category',
      gridIndex: 1,
      data: names,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { show: false }
    }
  ],
  series: [
    {
      name: 'GMV',
      type: 'bar',
      xAxisIndex: 0,
      yAxisIndex: 0,
      barWidth: 18,
      data: gmv.map(function(v, i) {
        return {
          value: v,
          itemStyle: {
            color: leftColor(i),
            borderRadius: i === highlightIdx ? [3, 0, 0, 3] : [3, 0, 0, 3]
          },
          label: {
            show: true,
            position: 'left',
            fontSize: i === highlightIdx ? 13 : 11,
            fontWeight: i === highlightIdx ? 700 : 400,
            color: i === highlightIdx ? HIGHLIGHT : '#888',
            formatter: function(params) {
              return params.value + '万';
            }
          }
        };
      })
    },
    {
      name: '综合得分',
      type: 'bar',
      xAxisIndex: 1,
      yAxisIndex: 1,
      barWidth: 18,
      data: score.map(function(v, i) {
        return {
          value: v,
          itemStyle: {
            color: rightColor(i),
            borderRadius: [0, 3, 3, 0]
          },
          label: {
            show: true,
            position: 'right',
            fontSize: i === highlightIdx ? 13 : 11,
            fontWeight: i === highlightIdx ? 700 : 400,
            color: i === highlightIdx ? HIGHLIGHT : '#888',
            formatter: function(params) {
              return params.value;
            }
          }
        };
      })
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
