<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>8 种 Hero 视觉包对比</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Doto:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#F2F0EC;color:#1A1816}
:root{--container:1120px;--pad:32px}
.page-header{padding:24px 32px;border-bottom:1px solid #C4B8A8}
.page-header h1{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:300}
.page-header p{font-size:13px;color:#8A7D6E;margin-top:4px}
.grid-8{display:flex;flex-direction:column}
.pack-row{border-bottom:1px solid #C4B8A8;position:relative}
.pack-row:last-child{border-bottom:none}
.pack-label{position:absolute;top:12px;left:12px;z-index:20;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;background:#fff;padding:2px 10px;border:1px solid #C4B8A8;border-radius:3px;color:#1A1816}
.pack-label .tag{color:#6B8B5E;font-weight:500}
.pack-label .mood{color:#8A7D6E}

/* Navigation */
.nav-top{display:flex;align-items:center;gap:24px;padding:10px 32px;border-bottom:1px solid var(--c-border,#C4B8A8)}
.nav-top a{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;color:var(--c-nav-inactive,#C4B8A8)}
.nav-top a.active{color:var(--c-nav-active,#1A1816)}
.nav-bottom{display:flex;align-items:center;justify-content:center;gap:24px;padding:12px 32px;border-top:1px solid var(--c-border,#C4B8A8)}
.nav-bottom a{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;color:var(--c-nav-inactive,#C4B8A8)}
.nav-bottom a.active{color:var(--c-nav-active,#1A1816)}
.nav-side{position:absolute;left:0;top:0;bottom:0;width:160px;padding:32px 20px;display:flex;flex-direction:column;gap:16px;border-right:1px solid var(--c-border,#C4B8A8)}
.nav-side a{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;color:var(--c-nav-inactive,#C4B8A8)}
.nav-side a.active{color:var(--c-nav-active,#1A1816)}
.nav-float{position:absolute;right:32px;top:90px;display:flex;flex-direction:column;gap:3px;background:var(--c-float-bg,#fff);border:1px solid var(--c-border,#C4B8A8);border-radius:20px;padding:5px;z-index:5}
.nav-float a{font-size:10px;text-decoration:none;padding:4px 12px;border-radius:12px;color:var(--c-nav-inactive,#C4B8A8)}
.nav-float a.active{background:#6B8B5E;color:#fff}
.nav-masthead{text-align:center;padding:16px 32px 10px;border-bottom:2px solid var(--c-nav-active,#1A1816)}
.nav-masthead .m-brand{font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;letter-spacing:0.1em}
.nav-masthead .m-links{display:flex;gap:24px;justify-content:center;margin-top:6px}
.nav-masthead .m-links a{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;color:var(--c-nav-inactive,#C4B8A8)}
.nav-masthead .m-links a.active{color:var(--c-nav-active,#1A1816)}

/* Hero */
.hero{min-height:55vh;display:flex;align-items:center;position:relative;overflow:hidden;background:var(--h-bg);color:var(--h-text)}
.hero-inner{width:100%;max-width:var(--container);margin:0 auto;padding:48px 32px;position:relative;z-index:2}
.hero.h-left .hero-inner{text-align:left}
.hero.h-center .hero-inner{text-align:center}
.hero.h-split .hero-inner{display:grid;grid-template-columns:1.2fr 0.8fr;gap:64px;align-items:center}
.hero-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--h-lbl);margin-bottom:16px}
.hero-title{font-family:'Playfair Display',Georgia,serif;font-size:clamp(48px,7vw,96px);font-weight:300;line-height:1.05;letter-spacing:-0.025em;max-width:14ch;color:var(--h-text)}
.hero.h-center .hero-title{max-width:100%}
.hero-sub{font-size:16px;font-weight:300;line-height:1.7;color:var(--h-sec);max-width:48ch;margin-top:16px}
.hero.h-center .hero-sub{margin-left:auto;margin-right:auto}
.hero-meta{display:flex;gap:40px;padding-top:24px;margin-top:32px;border-top:1px solid var(--h-meta-line,rgba(196,184,168,0.3))}
.hero.h-center .hero-meta{justify-content:center}
.meta-num{font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:500;line-height:1;color:var(--h-text)}
.meta-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--h-meta)}
.hero-right{display:flex;justify-content:center;align-items:center}

/* Cuts */
.cut-diagonal{clip-path:polygon(0 0,100% 0,100% 84%,0 100%)}
.cut-bevel{clip-path:polygon(0 0,100% 0,100% 92%,0 100%)}

/* Signatures */
.sig{position:absolute;pointer-events:none;z-index:1}
.sig-ghost{font-family:'Doto',monospace;letter-spacing:0.15em;opacity:0.04;color:var(--h-sig-color,#6B8B5E)}
.sig-ghost.tr{right:24px;top:16px;font-size:24px;writing-mode:vertical-rl}
.sig-ghost.cb{left:-2%;top:5%;font-size:clamp(12rem,28vw,32rem);opacity:0.03}
.sig-ghost.vl{left:16px;top:50%;transform:translateY(-50%);font-size:40px;writing-mode:vertical-rl;opacity:0.05}
.sig-dots{display:flex;gap:2px;flex-wrap:wrap;opacity:0.12}
.sig-dots span{width:5px;height:5px;border-radius:50%;background:var(--h-sig-color,#6B8B5E)}
.sig-dots.lt{left:24px;top:24px;width:60px}
.sig-dots.rt{right:24px;top:24px;width:48px}
.sig-dots.br{right:40px;top:80px;width:70px}
.sig-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--h-sig-color,#6B8B5E);opacity:0.25}
.sig-bar{position:absolute;top:32px;left:32px;width:28px;height:4px;border-radius:0}
.sig-combo{position:absolute;right:42px;top:70px;font-family:'Doto',monospace;font-size:18px;letter-spacing:0.15em;opacity:0.05;color:var(--h-sig-color,#6B8B5E);writing-mode:vertical-rl}
.sig-combo-dots{position:absolute;right:40px;top:100px;display:flex;gap:2px;flex-wrap:wrap;width:55px;opacity:0.1}
.sig-combo-dots span{width:5px;height:5px;border-radius:50%;background:var(--h-sig-color,#6B8B5E)}

/* Content snippet */
.cont-snip{padding:40px 32px;background:var(--c-cont-bg,#F2F0EC)}
.cont-inner{max-width:var(--container);margin:0 auto}
.cont-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cont-card{padding:16px 20px;border:1px solid var(--c-cont-border,#C4B8A8);border-radius:6px;background:var(--c-card-bg,#fff)}
.cont-card h4{font-size:13px;font-weight:500;color:var(--c-cont-text,#1A1816);margin-bottom:2px}
.cont-card p{font-size:11px;color:var(--c-cont-sec,#8A7D6E);line-height:1.5}
.cont-card .ctag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;color:var(--c-moss,#6B8B5E);display:inline-block;margin-top:6px}

@media(max-width:768px){
  .hero-title{font-size:clamp(32px,6vw,56px)}
  .hero-meta{gap:20px}
  .nav-side{position:relative;width:100%;flex-direction:row;flex-wrap:wrap;gap:12px;padding:12px 20px}
  .hero.h-split .hero-inner{grid-template-columns:1fr}
  .hero-right{display:none}
  .cont-grid{grid-template-columns:1fr}
}
</style>
</head><body>

<div class="page-header">
<h1>8 种视觉包 · Hero 真实渲染</h1>
<p>每一行是一个完整视觉包。滚动查看 8 种效果差异。</p>
</div>

<div class="grid-8" id="app"></div>

<script>
const packs = [{
  id:'P1',name:'数据权威',mood:'深色+左对齐+Line底',
  nav:'top', hbg:'#2D2A26', htxt:'#F2F0EC', hsec:'#C4B8A8', hlbl:'#6B8B5E', hmeta:'#8A7D6E', hsig:'#6B8B5E',
  hlayout:'left', hcut:'', sig:'<div class="sig sig-line" style="background:#6B8B5E;opacity:0.3"></div>',
  contbg:'#34302C', conttxt:'#F2F0EC', contsec:'#C4B8A8', contborder:'rgba(255,255,255,0.1)', cardbg:'rgba(255,255,255,0.04)',
  navInactive:'#8A7D6E', navActive:'#F2F0EC', nborder:'rgba(255,255,255,0.1)'
},{
  id:'P2',name:'编辑叙事',mood:'浅色+左对齐+Ghost右',
  nav:'top', hbg:'#F2F0EC', htxt:'#1A1816', hsec:'#8A7D6E', hlbl:'#6B8B5E', hmeta:'#8A7D6E', hsig:'#6B8B5E',
  hlayout:'left', hcut:'', sig:'<div class="sig sig-ghost tr">················</div>',
  contbg:'#F2F0EC', conttxt:'#1A1816', contsec:'#8A7D6E', contborder:'#C4B8A8', cardbg:'#fff',
  navInactive:'#C4B8A8', navActive:'#1A1816', nborder:'#C4B8A8'
},{
  id:'P3',name:'品牌宣言',mood:'品牌底+分屏+对角线',
  nav:'side', hbg:'#6B8B5E', htxt:'#F2F0EC', hsec:'#D4DBC8', hlbl:'#E3DFD8', hmeta:'#C4B8A8', hsig:'#6B8B5E',
  hlayout:'split', hcut:'cut-diagonal', sig:'<div class="sig sig-ghost vl">OPINIONS</div>',
  contbg:'#F2F0EC', conttxt:'#1A1816', contsec:'#8A7D6E', contborder:'#C4B8A8', cardbg:'#fff',
  navInactive:'#8A7D6E', navActive:'#1A1816', nborder:'#C4B8A8'
},{
  id:'P4',name:'数据+故事',mood:'浅色+分屏+Ghost+Dot',
  nav:'float', hbg:'#F2F0EC', htxt:'#1A1816', hsec:'#8A7D6E', hlbl:'#6B8B5E', hmeta:'#8A7D6E', hsig:'#6B8B5E',
  hlayout:'split', hcut:'', sig:'<div class="sig sig-combo">········</div><div class="sig sig-combo-dots">'+'<span></span>'.repeat(40)+'</div>',
  contbg:'#F2F0EC', conttxt:'#1A1816', contsec:'#8A7D6E', contborder:'#C4B8A8', cardbg:'#fff',
  navInactive:'#C4B8A8', navActive:'#1A1816', nborder:'#C4B8A8'
},{
  id:'P5',name:'工作汇报',mood:'浅色+左对齐+斜切',
  nav:'top', hbg:'#F2F0EC', htxt:'#1A1816', hsec:'#8A7D6E', hlbl:'#6B8B5E', hmeta:'#8A7D6E', hsig:'#6B8B5E',
  hlayout:'left', hcut:'cut-bevel', sig:'<div class="sig sig-bar" style="background:#6B8B5E"></div>',
  contbg:'#F2F0EC', conttxt:'#1A1816', contsec:'#8A7D6E', contborder:'#C4B8A8', cardbg:'#fff',
  navInactive:'#C4B8A8', navActive:'#1A1816', nborder:'#C4B8A8'
},{
  id:'P6',name:'流程指南',mood:'品牌底+斜切+底栏',
  nav:'bottom', hbg:'#6B8B5E', htxt:'#F2F0EC', hsec:'#D4DBC8', hlbl:'#E3DFD8', hmeta:'#C4B8A8', hsig:'#6B8B5E',
  hlayout:'left', hcut:'cut-bevel', sig:'<div class="sig sig-line" style="background:#4A6040;opacity:0.3"></div>',
  contbg:'#F2F0EC', conttxt:'#1A1816', contsec:'#8A7D6E', contborder:'#C4B8A8', cardbg:'#fff',
  navInactive:'#8A7D6E', navActive:'#1A1816', nborder:'#C4B8A8'
},{
  id:'P7',name:'冲击宣言',mood:'深色+分屏+对角线+报头',
  nav:'masthead', hbg:'#2D2A26', htxt:'#F2F0EC', hsec:'#C4B8A8', hlbl:'#6B8B5E', hmeta:'#8A7D6E', hsig:'#6B8B5E',
  hlayout:'split', hcut:'cut-diagonal', sig:'<div class="sig sig-ghost cb">O</div>',
  contbg:'#34302C', conttxt:'#F2F0EC', contsec:'#C4B8A8', contborder:'rgba(255,255,255,0.1)', cardbg:'rgba(255,255,255,0.04)',
  navInactive:'#8A7D6E', navActive:'#F2F0EC', nborder:'rgba(255,255,255,0.1)'
},{
  id:'P8',name:'沉浸阅读',mood:'浅色+居中+Dot',
  nav:'bottom', hbg:'#F2F0EC', htxt:'#1A1816', hsec:'#8A7D6E', hlbl:'#6B8B5E', hmeta:'#8A7D6E', hsig:'#6B8B5E',
  hlayout:'center', hcut:'', sig:'<div class="sig sig-dots lt">'+'<span></span>'.repeat(35)+'</div>',
  contbg:'#F2F0EC', conttxt:'#1A1816', contsec:'#8A7D6E', contborder:'#C4B8A8', cardbg:'#fff',
  navInactive:'#C4B8A8', navActive:'#1A1816', nborder:'#C4B8A8'
}];

function render() {
  const app = document.getElementById('app');
  app.innerHTML = packs.map((p,i) => {
    let html = `<div class="pack-row">`;
    html += `<div class="pack-label"><span class="tag">${p.id}</span> ${p.name} <span class="mood">· ${p.mood}</span></div>`;

    // Navigation
    if (p.nav === 'top') {
      html += `<div class="nav-top" style="background:${p.hbg};border-color:${p.nborder};--c-nav-inactive:${p.navInactive};--c-nav-active:${p.navActive}">
        <a href="#" class="active">全景</a><a href="#">笃定</a><a href="#">形成中</a><a href="#">审美</a><a href="#">未答</a>
      </div>`;
    } else if (p.nav === 'side') {
      html += `<div class="nav-side" style="background:${p.hbg};border-color:${p.nborder};--c-nav-inactive:${p.navInactive};--c-nav-active:${p.navActive}">
        <a href="#" class="active">全景</a><a href="#">笃定</a><a href="#">形成中</a><a href="#">审美</a><a href="#">未答</a>
      </div>`;
    } else if (p.nav === 'masthead') {
      html += `<div class="nav-masthead" style="background:${p.hbg};--c-nav-inactive:${p.navInactive};--c-nav-active:${p.navActive}">
        <div class="m-brand" style="color:${p.htxt}">OPINIONS</div>
        <div class="m-links"><a href="#" class="active" style="color:${p.navActive}">全景</a><a href="#" style="color:${p.navInactive}">笃定</a><a href="#" style="color:${p.navInactive}">形成中</a><a href="#" style="color:${p.navInactive}">审美</a></div>
      </div>`;
    }

    // Hero
    const hClass = `h-${p.hlayout}${p.hcut?' '+p.hcut:''}`;
    html += `<div class="hero ${hClass}" style="--h-bg:${p.hbg};--h-text:${p.htxt};--h-sec:${p.hsec};--h-lbl:${p.hlbl};--h-meta:${p.hmeta};--h-sig-color:${p.hsig}">`;

    // Signature
    if (p.sig) html += p.sig;

    // Float nav overlay
    if (p.nav === 'float') {
      html += `<div class="nav-float" style="--c-float-bg:#fff;--c-nav-inactive:${p.navInactive}">
        <a href="#" class="active">全景</a><a href="#">笃定</a><a href="#">形成中</a>
      </div>`;
    }

    // Hero content
    html += `<div class="hero-inner"><div>
      <div class="hero-lbl">个人信念地图</div>
      <h1 class="hero-title">从真实对话中<br>提炼的个人判断</h1>
      <p class="hero-sub">2026年1月至5月，从1717次会话中萃取的个人信念体系。</p>
      <div class="hero-meta">
        <div class="hero-meta-item"><span class="meta-num" style="color:${p.hsig}">14</span><span class="meta-lbl">笃定</span></div>
        <div class="hero-meta-item"><span class="meta-num" style="color:${p.hbg==='#2D2A26'?'#fff':'#C66B4B'}">21</span><span class="meta-lbl">形成中</span></div>
        <div class="hero-meta-item"><span class="meta-num">3</span><span class="meta-lbl">未答</span></div>
      </div>
    </div>`;

    // Split right
    if (p.hlayout === 'split') {
      html += `<div class="hero-right"><div style="display:grid;grid-template-columns:repeat(5,14px);gap:4px;opacity:0.12">
        ${'<div style="width:14px;height:14px;border-radius:2px;background:'+p.hsig+'"></div>'.repeat(25)}
      </div></div>`;
    }
    html += `</div></div>`; // hero-inner, hero

    // Content
    html += `<div class="cont-snip" style="--c-cont-bg:${p.contbg};--c-cont-text:${p.conttxt};--c-cont-sec:${p.contsec};--c-cont-border:${p.contborder};--c-card-bg:${p.cardbg};--c-moss:#6B8B5E">
      <div class="cont-inner"><div class="cont-grid">
        <div class="cont-card"><h4>供应商管理</h4><p>管理规范先行、协同语态、自建标杆</p><span class="ctag">11条</span></div>
        <div class="cont-card"><h4>AI 与效率</h4><p>去迎合化、逆向检验、先自检再交付</p><span class="ctag">9条</span></div>
        <div class="cont-card"><h4>审美标准</h4><p>暖色调、质感追求、一眼可辨、不将就</p><span class="ctag">6条</span></div>
      </div></div>
    </div>`;

    // Nav bottom
    if (p.nav === 'bottom') {
      html += `<div class="nav-bottom" style="background:${p.contbg};border-color:${p.contborder};--c-nav-inactive:${p.navInactive};--c-nav-active:${p.navActive}">
        <a href="#" class="active">全景</a><a href="#">笃定</a><a href="#">形成中</a><a href="#">审美</a><a href="#">未答</a>
      </div>`;
    }

    html += `</div>`;
    return html;
  }).join('');
}
document.addEventListener('DOMContentLoaded', render);
</script>
</body></html>
