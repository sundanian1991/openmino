<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视觉身份方案对比 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Doto:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:#F2F0EC; color:#1A1816; overflow-x:hidden; }

/* ===== CONTROL BAR ===== */
.ctrl { position:fixed; top:0; left:0; right:0; z-index:1000; background:#fff; border-bottom:1px solid #C4B8A8; padding:12px 24px; display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap; }
.ctrl-group { display:flex; flex-direction:column; gap:4px; }
.ctrl-group label { font-size:9px; font-family:'JetBrains Mono',monospace; letter-spacing:0.06em; text-transform:uppercase; color:#8A7D6E; }
.ctrl-btns { display:flex; gap:3px; flex-wrap:wrap; }
.ctrl-btn { font-size:10px; font-family:'Inter',sans-serif; padding:3px 9px; border:1px solid #C4B8A8; background:#fff; border-radius:3px; cursor:pointer; transition:all 0.1s; }
.ctrl-btn:hover { border-color:#6B8B5E; }
.ctrl-btn.active { border-color:#6B8B5E; background:rgba(107,139,94,0.08); }
.ctrl-btn.pack { min-width:56px; }
.ctrl-divider { width:1px; height:32px; background:#E3DFD8; align-self:center; }
.ctrl .label-a { color:#6B8B5E; font-weight:600; }
.ctrl .label-c { color:#C66B4B; font-weight:600; }

/* ===== PREVIEW WRAPPER ===== */
.pwrap { margin-top:80px; min-height:calc(100vh - 80px); }

/* ===== TOKENS (dynamic via .scheme-* class) ===== */
.pwrap { --c-bg:#F2F0EC; --c-sf:#FFFFFF; --c-sf-alt:#E3DFD8; --c-border:#C4B8A8; --c-border-strong:#8A7D6E; --c-text:#1A1816; --c-text2:#8A7D6E; --c-text3:#C4B8A8; --c-display:#2D2A26; --c-moss:#6B8B5E; --c-clay:#C66B4B; --c-hero-bg:#F2F0EC; --c-hero-text:#1A1816; --c-hero-sec:#8A7D6E; --c-hero-label:#6B8B5E; --c-hero-meta:#8A7D6E; --c-nav:#F2F0EC; --c-cont-bg:#F2F0EC; --c-cont-text:#1A1816; --c-cont-sec:#8A7D6E; --c-cont-border:#C4B8A8; --c-card-bg:#FFFFFF; --sig-opacity:0.04; }

/* Dark & Brand hero backgrounds */
.pwrap.scheme-dark { --c-hero-bg:#2D2A26; --c-hero-text:#F2F0EC; --c-hero-sec:#C4B8A8; --c-hero-label:#6B8B5E; --c-hero-meta:#8A7D6E; --c-nav:#2D2A26; --c-cont-bg:#34302C; --c-cont-text:#F2F0EC; --c-cont-sec:#C4B8A8; --c-cont-border:rgba(255,255,255,0.1); --c-card-bg:rgba(255,255,255,0.04); }
.pwrap.scheme-brand { --c-hero-bg:#6B8B5E; --c-hero-text:#F2F0EC; --c-hero-sec:#D4DBC8; --c-hero-label:#E3DFD8; --c-hero-meta:#C4B8A8; --c-nav:#6B8B5E; --c-cont-bg:#F2F0EC; --c-cont-text:#1A1816; --c-cont-sec:#8A7D6E; --c-cont-border:#C4B8A8; --c-card-bg:#FFFFFF; }

/* Nav types */
.pwrap.nav-side .preview-main { margin-left:160px; }
.pwrap.nav-float .preview-hero { padding-right:100px; }
.pwrap.nav-masthead .preview-hero { padding-top:80px; }

/* Hero cuts */
.pwrap.cut-diagonal .preview-hero { clip-path:polygon(0 0,100% 0,100% 84%,0 100%); }
.pwrap.cut-bevel .preview-hero { clip-path:polygon(0 0,100% 0,100% 92%,0 100%); }

/* Hero layouts */
.pwrap.layout-split .hero-inner { display:grid; grid-template-columns:1.2fr 0.8fr; gap:64px; align-items:center; }
.pwrap.layout-split .hero-right { display:flex; justify-content:center; align-items:center; }
.pwrap.layout-center .hero-inner { text-align:center; }
.pwrap.layout-center .hero-inner .hero-title { max-width:100%; }
.pwrap.layout-center .hero-inner .hero-sub { margin-left:auto; margin-right:auto; }
.pwrap.layout-center .hero-inner .hero-meta { justify-content:center; }

/* ===== COMMON PREVIEW STYLES ===== */
.preview-main { background:var(--c-bg); }
.preview-nav { background:var(--c-nav); }
.preview-hero { background:var(--c-hero-bg); color:var(--c-hero-text); position:relative; overflow:hidden; min-height:55vh; display:flex; align-items:center; }
.preview-cont { background:var(--c-cont-bg); color:var(--c-cont-text); }

/* Nav top */
.nav-top { display:flex; align-items:center; gap:24px; padding:10px 32px; border-bottom:1px solid var(--c-border); background:inherit; }
.nav-top a { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-text3); text-decoration:none; }
.nav-top a:hover { color:var(--c-text2); }
.nav-top a.active { color:var(--c-hero-text); }

/* Nav side */
.nav-side { position:fixed; left:0; top:80px; bottom:0; width:160px; background:var(--c-nav); border-right:1px solid var(--c-border); padding:32px 20px; display:flex; flex-direction:column; gap:16px; }
.nav-side a { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-text3); text-decoration:none; }
.nav-side a.active { color:var(--c-hero-text); }

/* Nav bottom */
.nav-bottom { display:flex; align-items:center; justify-content:center; gap:24px; padding:12px 32px; border-top:1px solid var(--c-border); background:var(--c-nav); }
.nav-bottom a { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-text3); text-decoration:none; }
.nav-bottom a.active { color:var(--c-hero-text); }

/* Nav masthead */
.nav-masthead { text-align:center; padding:16px 32px 10px; border-bottom:2px solid var(--c-hero-text); background:var(--c-nav); }
.nav-masthead .m-brand { font-family:'Playfair Display',Georgia,serif; font-size:16px; font-weight:700; letter-spacing:0.1em; color:var(--c-hero-text); }
.nav-masthead .m-links { display:flex; gap:24px; justify-content:center; margin-top:6px; }
.nav-masthead .m-links a { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-text3); text-decoration:none; }

/* Nav float */
.nav-float { position:absolute; right:32px; top:90px; display:flex; flex-direction:column; gap:3px; background:var(--c-sf); border:1px solid var(--c-border); border-radius:20px; padding:5px; z-index:5; }
.nav-float a { font-size:10px; color:var(--c-text3); text-decoration:none; padding:4px 12px; border-radius:12px; }
.nav-float a.active { background:var(--c-moss); color:#fff; }

/* Hero inner */
.hero-inner { width:100%; max-width:1120px; margin:0 auto; padding:48px 32px; position:relative; z-index:2; }

.hero-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--c-hero-label); margin-bottom:16px; }
.hero-title { font-family:'Playfair Display',Georgia,serif; font-size:clamp(48px,7vw,96px); font-weight:300; line-height:1.05; letter-spacing:-0.025em; max-width:14ch; color:var(--c-hero-text); }
.hero-sub { font-size:16px; font-weight:300; line-height:1.7; color:var(--c-hero-sec); max-width:48ch; margin-top:16px; }
.hero-meta { display:flex; gap:40px; padding-top:24px; margin-top:32px; border-top:1px solid rgba(196,184,168,0.3); }
.hero-meta-item { display:flex; flex-direction:column; gap:2px; }
.meta-num { font-family:'JetBrains Mono',monospace; font-size:44px; font-weight:500; line-height:1; color:var(--c-hero-text); }
.meta-lbl { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-hero-meta); }

/* Ghost / sig */
.sig-el { position:absolute; pointer-events:none; z-index:1; }
.sig-ghost { font-family:'Doto',monospace; letter-spacing:0.15em; opacity:0.04; color:var(--c-moss); }
.sig-ghost.top-right { right:24px; top:16px; font-size:24px; writing-mode:vertical-rl; }
.sig-ghost.center-bg { left:-2%; top:5%; font-size:clamp(12rem,28vw,32rem); opacity:0.03; }
.sig-ghost.vert-left { left:16px; top:50%; transform:translateY(-50%); font-size:40px; writing-mode:vertical-rl; opacity:0.04; }
.sig-dots { display:flex; gap:2px; flex-wrap:wrap; width:60px; opacity:0.12; }
.sig-dots span { width:5px; height:5px; border-radius:50%; background:var(--c-moss); }
.sig-dots.left-top { left:24px; top:24px; }
.sig-dots.right { right:40px; top:80px; }

/* Content section */
.cont-section { padding:64px 32px; }
.cont-inner { max-width:1120px; margin:0 auto; }
.cont-label { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--c-cont-sec); margin-bottom:24px; }
.cont-title { font-family:'Playfair Display',Georgia,serif; font-size:32px; font-weight:300; color:var(--c-cont-text); margin-bottom:24px; }
.cont-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.cont-card { background:var(--c-card-bg); border:1px solid var(--c-cont-border); border-radius:8px; padding:20px 24px; }
.cont-card h4 { font-size:14px; font-weight:500; color:var(--c-cont-text); margin-bottom:4px; }
.cont-card p { font-size:12px; color:var(--c-cont-sec); line-height:1.5; }
.cont-card .tag { display:inline-block; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.06em; color:var(--c-moss); margin-top:8px; }

/* Controls position label */
.sigpos { display:block; font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:0.04em; color:#8A7D6E; margin-top:1px; }

@media (max-width:900px) {
  .ctrl { padding:8px 12px; gap:8px; }
  .pwrap { margin-top:110px; }
  .hero-title { font-size:clamp(36px,6vw,64px); }
  .cont-grid { grid-template-columns:1fr; }
  .pwrap.layout-split .hero-inner { grid-template-columns:1fr; }
  .hero-right { display:none; }
}
</style>
</head>
<body>

<!-- Control bar -->
<div class="ctrl">
  <div class="ctrl-group">
    <label><span class="label-a">方案 A</span> · 完整视觉包</label>
    <div class="ctrl-btns" id="packBtns"></div>
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <label><span class="label-c">方案 C</span> · Hero 骨架</label>
    <div class="ctrl-btns" id="skelBtns"></div>
  </div>
  <div class="ctrl-group" id="sigGroup">
    <label>签名</label>
    <div class="ctrl-btns" id="sigBtns"></div>
  </div>
  <div class="ctrl-group" id="navGroup">
    <label>导航</label>
    <div class="ctrl-btns" id="navBtns"></div>
  </div>
</div>

<!-- Preview -->
<div class="pwrap scheme-light layout-left cut-none" id="previewRoot">
  <div class="preview-main" id="previewMain"></div>
</div>

<script>
// ===== DATA =====
const packs = {
  P1:{bg:'dark',layout:'left',cut:'none',sig:'line-bot',nav:'top',tag:'数据权威',mood:'深色+左对齐+Line底'},
  P2:{bg:'light',layout:'left',cut:'none',sig:'ghost-tr',nav:'top',tag:'编辑叙事',mood:'浅色+左对齐+Ghost右'},
  P3:{bg:'brand',layout:'split',cut:'diagonal',sig:'ghost-vert',nav:'side',tag:'品牌宣言',mood:'品牌底+分屏+对角线'},
  P4:{bg:'light',layout:'split',cut:'none',sig:'ghost-dot',nav:'float',tag:'数据+故事',mood:'浅色+分屏+Ghost+Dot'},
  P5:{bg:'light',layout:'left',cut:'bevel',sig:'bar',nav:'top',tag:'工作汇报',mood:'浅色+左对齐+斜切'},
  P6:{bg:'brand',layout:'left',cut:'bevel',sig:'line-bot',nav:'bottom',tag:'流程指南',mood:'品牌底+斜切+底栏'},
  P7:{bg:'dark',layout:'split',cut:'diagonal',sig:'ghost-center',nav:'masthead',tag:'冲击宣言',mood:'深色+分屏+对角线+报头'},
  P8:{bg:'light',layout:'center',cut:'none',sig:'dots-lt',nav:'bottom',tag:'沉浸阅读',mood:'浅色+居中+Dot'},
};

const skels = {
  data:{bg:'dark',layout:'left',cut:'none',sigs:[{t:'line-bot',d:'Line 底'},{t:'bar',d:'Bar'},{t:'none',d:'无'}],navs:['top','float']},
  narrative:{bg:'light',layout:'left',cut:'none',sigs:[{t:'ghost-tr',d:'Ghost 右上'},{t:'dots-lt',d:'Dot 左上'},{t:'none',d:'无'}],navs:['top','bottom']},
  statement:{bg:'brand',layout:'split',cut:'diagonal',sigs:[{t:'ghost-vert',d:'Ghost 竖左'},{t:'ghost-center',d:'Ghost 大字'},{t:'dots-rt',d:'Dot 右侧'}],navs:['side','masthead']}
};

let curMode = 'pack'; // 'pack' or 'skel'
let curPack = 'P2';
let curSkel = {skel:'narrative', sigIdx:0, navIdx:0};

// ===== BUILD UI =====
function build() {
  const pb = document.getElementById('packBtns');
  Object.keys(packs).forEach(k => {
    const b = document.createElement('button');
    b.className = 'ctrl-btn pack' + (k===curPack?' active':'');
    b.textContent = k;
    b.onclick = () => { curMode='pack'; curPack=k; render(); updateAllActive(); };
    pb.appendChild(b);
  });

  const sb = document.getElementById('skelBtns');
  Object.entries(skels).forEach(([k,v]) => {
    const b = document.createElement('button');
    b.className = 'ctrl-btn pack' + (k===curSkel.skel?' active':'');
    b.textContent = v.layout==='left'?`${v.bg==='dark'?'■':'□'}左`:`${v.bg==='brand'?'◆':'▣'}分`;
    b.title = v.name;
    b.onclick = () => { curMode='skel'; curSkel.skel=k; curSkel.sigIdx=0; curSkel.navIdx=0; render(); updateAllActive(); };
    sb.appendChild(b);
  });

  updateOptions();
  render();
}

function updateOptions() {
  const sk = skels[curSkel.skel];
  // Sig
  const sigb = document.getElementById('sigBtns');
  sigb.innerHTML = '';
  sk.sigs.forEach((s,i) => {
    const b = document.createElement('button');
    b.className = 'ctrl-btn' + (i===curSkel.sigIdx?' active':'');
    b.textContent = s.d;
    b.onclick = () => { curMode='skel'; curSkel.sigIdx=i; render(); updateAllActive(); };
    sigb.appendChild(b);
  });
  // Nav
  const nb = document.getElementById('navBtns');
  nb.innerHTML = '';
  sk.navs.forEach((n,i) => {
    const b = document.createElement('button');
    b.className = 'ctrl-btn' + (i===curSkel.navIdx?' active':'');
    const labels = {top:'顶栏',bottom:'底栏',side:'侧栏',float:'悬浮',masthead:'报头'};
    b.textContent = labels[n]||n;
    b.onclick = () => { curMode='skel'; curSkel.navIdx=i; render(); updateAllActive(); };
    nb.appendChild(b);
  });
}

function updateAllActive() {
  // Packs
  document.querySelectorAll('#packBtns .ctrl-btn').forEach(b => {
    b.classList.toggle('active', curMode==='pack' && b.textContent===curPack);
  });
  // Skels
  document.querySelectorAll('#skelBtns .ctrl-btn').forEach(b => {
    b.classList.toggle('active', curMode==='skel' && ((b.title && skels[curSkel.skel] && b.title===skels[curSkel.skel].name) || false));
  });
  // sig
  document.querySelectorAll('#sigBtns .ctrl-btn').forEach((b,i) => {
    b.classList.toggle('active', i===curSkel.sigIdx);
  });
  document.querySelectorAll('#navBtns .ctrl-btn').forEach((b,i) => {
    b.classList.toggle('active', i===curSkel.navIdx);
  });
}

// ===== RENDER =====
function render() {
  let cfg;
  let label;
  if (curMode === 'pack') {
    cfg = packs[curPack];
    label = '方案 A · ' + cfg.tag + ' · ' + cfg.mood;
  } else {
    const sk = skels[curSkel.skel];
    const sig = sk.sigs[curSkel.sigIdx];
    const nav = sk.navs[curSkel.navIdx];
    cfg = {bg:sk.bg, layout:sk.layout, cut:sk.cut, sig:sig.t, nav:nav};
    const navLabels = {top:'顶栏',bottom:'底栏',side:'侧栏',float:'悬浮',masthead:'报头'};
    label = '方案 C · ' + sk.name + ' · ' + sig.d + ' · ' + navLabels[nav];
  }

  // Apply classes
  const root = document.getElementById('previewRoot');
  root.className = 'pwrap';
  if (cfg.bg === 'dark') root.classList.add('scheme-dark');
  if (cfg.bg === 'brand') root.classList.add('scheme-brand');
  if (cfg.layout === 'split') root.classList.add('layout-split');
  if (cfg.layout === 'center') root.classList.add('layout-center');
  if (cfg.cut === 'diagonal') root.classList.add('cut-diagonal');
  if (cfg.cut === 'bevel') root.classList.add('cut-bevel');
  if (cfg.nav === 'side') root.classList.add('nav-side');
  if (cfg.nav === 'float') root.classList.add('nav-float');

  buildHTML(cfg, label);
}

function buildHTML(cfg, label) {
  const isDark = cfg.bg === 'dark' || cfg.bg === 'brand';

  let html = '';

  // Navigation
  if (cfg.nav === 'top') {
    html += `<div class="preview-nav nav-top">
      <a href="#" class="active">全景</a>
      <a href="#">笃定</a>
      <a href="#">形成中</a>
      <a href="#">审美</a>
      <a href="#">未答</a>
    </div>`;
  } else if (cfg.nav === 'side') {
    html += `<div class="nav-side">
      <a href="#" class="active">全景</a>
      <a href="#">笃定</a>
      <a href="#">形成中</a>
      <a href="#">审美</a>
      <a href="#">未答</a>
    </div>`;
  }

  // Hero
  html += `<div class="preview-hero">`;

  // Signature
  if (cfg.sig === 'line-bot') {
    html += `<div class="sig-el" style="position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--c-moss);opacity:0.25"></div>`;
  }
  if (cfg.sig === 'ghost-tr') {
    html += `<div class="sig-el sig-ghost top-right">················</div>`;
  }
  if (cfg.sig === 'ghost-vert') {
    html += `<div class="sig-el sig-ghost vert-left">OPINIONS</div>`;
  }
  if (cfg.sig === 'ghost-center') {
    html += `<div class="sig-el sig-ghost center-bg">O</div>`;
  }
  if (cfg.sig === 'ghost-dot') {
    html += `<div class="sig-el sig-ghost" style="right:42px;top:70px;font-size:18px;opacity:0.06;writing-mode:vertical-rl">········</div>`;
    html += `<div class="sig-el sig-dots right">${'<span></span>'.repeat(48)}</div>`;
  }
  if (cfg.sig === 'dots-lt') {
    html += `<div class="sig-el sig-dots left-top">${'<span></span>'.repeat(35)}</div>`;
  }
  if (cfg.sig === 'dots-rt') {
    html += `<div class="sig-el sig-dots" style="right:24px;top:24px;width:48px">${'<span></span>'.repeat(24)}</div>`;
  }
  if (cfg.sig === 'bar') {
    html += `<div class="sig-el" style="position:absolute;top:32px;left:32px;width:28px;height:4px;background:var(--c-moss);border-radius:0"></div>`;
  }

  // Nav float overlay
  if (cfg.nav === 'float') {
    html += `<div class="nav-float">
      <a href="#" class="active">全景</a>
      <a href="#">笃定</a>
      <a href="#">形成中</a>
    </div>`;
  }

  // Hero content
  html += `<div class="hero-inner">
    <div>
      <div class="hero-label">个人信念地图</div>
      <h1 class="hero-title">从真实对话中<br>提炼的个人判断</h1>
      <p class="hero-sub">2026年1月至5月，从1717次独立会话中萃取的个人信念体系。</p>
      <div class="hero-meta">
        <div class="hero-meta-item"><span class="meta-num" style="color:${isDark?'var(--c-moss)':'var(--c-moss)'}">14</span><span class="meta-lbl">笃定</span></div>
        <div class="hero-meta-item"><span class="meta-num" style="color:${isDark?'#fff':'var(--c-clay)'}">21</span><span class="meta-lbl">形成中</span></div>
        <div class="hero-meta-item"><span class="meta-num">3</span><span class="meta-lbl">未答</span></div>
      </div>
    </div>`;

  // Split right column
  if (cfg.layout === 'split') {
    const dotColor = isDark ? 'var(--c-moss)' : 'var(--c-moss)';
    html += `<div class="hero-right">
      <div style="display:grid;grid-template-columns:repeat(5,14px);gap:4px;opacity:0.12">
        ${Array(25).fill(0).map(()=>`<div style="width:14px;height:14px;border-radius:2px;background:${dotColor}"></div>`).join('')}
      </div>
    </div>`;
  }

  html += `</div></div>`; // hero-inner, hero

  // Content section
  html += `<div class="preview-cont">
    <div class="cont-section">
    <div class="cont-inner">
      <div class="cont-label">信念分布</div>
      <h2 class="cont-title">6 个认知领域</h2>
      <div class="cont-grid">
        <div class="cont-card">
          <h4>供应商管理</h4>
          <p>管理规范先行、协同语态、自建标杆倒逼优化</p>
          <span class="tag">11 条</span>
        </div>
        <div class="cont-card">
          <h4>AI 与效率</h4>
          <p>去迎合化、逆向检验、先自检再交付</p>
          <span class="tag">9 条</span>
        </div>

      </div>
    </div>
    </div>
  </div>`;

  // Nav bottom (positioned after content)
  if (cfg.nav === 'bottom') {
    html += `<div class="nav-bottom">
      <a href="#" class="active">全景</a>

      <a href="#">形成中</a>

  }

  // Masthead (positioned at top)
  if (cfg.nav === 'masthead') {
    html = `<div class="nav-masthead">

}
