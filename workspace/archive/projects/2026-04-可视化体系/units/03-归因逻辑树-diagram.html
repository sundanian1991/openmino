<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归因逻辑树 · Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf7f2;
      font-family: 'Geist', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 760px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    .diagram-wrap {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      padding: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Tree &middot; Attribution Logic</p>
    <h1>归因逻辑树</h1>
    <div class="diagram-wrap">
      <svg viewBox="0 0 680 556" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
          <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
          </marker>
        </defs>

        <!-- Background -->
        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- ===== CONNECTORS (drawn before nodes) ===== -->

        <!-- Root → Decision 1 -->
        <line x1="340" y1="72" x2="340" y2="104" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- Decision 1 YES → Decision 2 (accent = problem path) -->
        <line x1="340" y1="156" x2="340" y2="188" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>

        <!-- Decision 1 NO → 正常通报 (right) -->
        <line x1="440" y1="132" x2="544" y2="132" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- Decision 2 → Leaf 产能不足 (left) -->
        <path d="M 240 236 L 140 236 L 140 300" fill="none" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- Decision 2 → Leaf 人效低 (center) -->
        <line x1="340" y1="260" x2="340" y2="300" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- Decision 2 → Leaf 质量差 (right) -->
        <path d="M 440 236 L 540 236 L 540 300" fill="none" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- Leaf 产能不足 → Action -->
        <line x1="140" y1="352" x2="140" y2="392" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>

        <!-- Leaf 人效低 → Action -->
        <line x1="340" y1="352" x2="340" y2="392" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>

        <!-- Leaf 质量差 → Action -->
        <line x1="540" y1="352" x2="540" y2="392" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>

        <!-- ===== ARROW LABELS ===== -->
        <!-- YES label -->
        <rect x="324" y="160" width="32" height="12" rx="2" fill="#faf7f2"/>
        <text x="340" y="170" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.06em" text-anchor="middle">YES</text>

        <!-- NO label -->
        <rect x="476" y="120" width="24" height="12" rx="2" fill="#faf7f2"/>
        <text x="488" y="130" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.06em" text-anchor="middle">NO</text>

        <!-- ===== NODES (with paper rect backdrop) ===== -->

        <!-- Root: 月度数据异常 -->
        <rect x="260" y="28" width="160" height="44" rx="22" fill="#faf7f2"/>
        <rect x="260" y="28" width="160" height="44" rx="22" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="340" y="52" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">月度数据异常</text>
        <text x="340" y="64" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">trigger</text>

        <!-- Decision 1: 业绩/排名异常？ -->
        <rect x="240" y="104" width="200" height="52" rx="6" fill="#faf7f2"/>
        <rect x="240" y="104" width="200" height="52" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="340" y="128" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">业绩/排名异常？</text>
        <text x="340" y="144" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">check KPI deviation</text>

        <!-- End: 正常通报 -->
        <rect x="544" y="108" width="120" height="48" rx="24" fill="#faf7f2"/>
        <rect x="544" y="108" width="120" height="48" rx="24" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="604" y="132" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">正常通报</text>
        <text x="604" y="146" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">routine</text>

        <!-- Decision 2: 哪个维度？ (accent focal) -->
        <rect x="240" y="188" width="200" height="72" rx="6" fill="#faf7f2"/>
        <rect x="240" y="188" width="200" height="72" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="340" y="220" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">哪个维度出问题？</text>
        <text x="340" y="248" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">root cause analysis</text>

        <!-- Leaf 1: 产能不足 -->
        <rect x="64" y="300" width="152" height="52" rx="6" fill="#faf7f2"/>
        <rect x="64" y="300" width="152" height="52" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="140" y="320" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">D1</text>
        <text x="140" y="340" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">产能不足</text>

        <!-- Leaf 2: 人效低 -->
        <rect x="264" y="300" width="152" height="52" rx="6" fill="#faf7f2"/>
        <rect x="264" y="300" width="152" height="52" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="340" y="320" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">D2</text>
        <text x="340" y="340" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">人效偏低</text>

        <!-- Leaf 3: 质量差 -->
        <rect x="464" y="300" width="152" height="52" rx="6" fill="#faf7f2"/>
        <rect x="464" y="300" width="152" height="52" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="540" y="320" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">D3</text>
        <text x="540" y="340" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">质量下滑</text>

        <!-- Action 1: 加人 + 培训 -->
        <rect x="64" y="392" width="152" height="48" rx="6" fill="#faf7f2"/>
        <rect x="64" y="392" width="152" height="48" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
        <text x="140" y="412" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ACT</text>
        <text x="140" y="428" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">加人 + 培训</text>

        <!-- Action 2: 调整结构 -->
        <rect x="264" y="392" width="152" height="48" rx="6" fill="#faf7f2"/>
        <rect x="264" y="392" width="152" height="48" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
        <text x="340" y="412" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ACT</text>
        <text x="340" y="428" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">调整结构</text>

        <!-- Action 3: 流程优化 -->
        <rect x="464" y="392" width="152" height="48" rx="6" fill="#faf7f2"/>
        <rect x="464" y="392" width="152" height="48" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
        <text x="540" y="412" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ACT</text>
        <text x="540" y="428" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">流程优化</text>

        <!-- Legend strip -->
        <line x1="24" y1="476" x2="656" y2="476" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="496" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">LEGEND</text>

        <!-- Start/End -->
        <rect x="24" y="508" width="32" height="16" rx="8" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="64" y="520" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Start / End</text>

        <!-- Decision -->
        <rect x="160" y="508" width="32" height="16" rx="4" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="200" y="520" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Decision</text>

        <!-- Dimension leaf -->
        <rect x="292" y="508" width="32" height="16" rx="4" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="332" y="520" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Dimension leaf</text>

        <!-- Action (focal) -->
        <rect x="440" y="508" width="32" height="16" rx="4" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1"/>
        <text x="480" y="520" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Action</text>

        <!-- Problem path arrow -->
        <line x1="544" y1="516" x2="572" y2="516" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>
        <text x="580" y="520" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Problem path</text>
      </svg>
    </div>
  </div>
</body>
</html>
