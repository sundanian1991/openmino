<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度状态分类矩阵</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #faf7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .frame { max-width: 720px; width: 100%; }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 7.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #78716c;
    margin-bottom: 0.375rem;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #1c1917;
    margin-bottom: 1.25rem;
  }
  .diagram-wrap {
    background: #f2ede4;
    border: 1px solid rgba(28,25,23,0.12);
    border-radius: 8px;
    padding: 1px;
  }
  svg { width: 100%; display: block; }
</style>
</head>
<body>
<div class="frame">
  <p class="eyebrow">Monthly Classification · Quadrant</p>
  <h1>月度状态分类矩阵</h1>
  <div class="diagram-wrap">
    <svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== AXIS LABELS ===== -->
      <text x="340" y="28" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em" font-weight="500">PERFORMANCE</text>

      <!-- X-axis labels -->
      <text x="220" y="52" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">low</text>
      <text x="460" y="52" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">high</text>

      <!-- Y-axis label -->
      <text x="20" y="272" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em" font-weight="500" transform="rotate(-90,20,272)">URGENCY</text>

      <!-- Y-axis labels -->
      <text x="44" y="168" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">high</text>
      <text x="44" y="384" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">low</text>

      <!-- ===== QUADRANT CROSS ===== -->
      <!-- Vertical axis -->
      <line x1="340" y1="64" x2="340" y2="480" stroke="#1c1917" stroke-width="1"/>
      <!-- Horizontal axis -->
      <line x1="60" y1="272" x2="620" y2="272" stroke="#1c1917" stroke-width="1"/>

      <!-- ===== QUADRANT LABELS ===== -->

      <!-- Q1: top-right = DO FIRST (focal) -->
      <rect x="348" y="68" width="264" height="196" rx="4" fill="rgba(181,82,58,0.08)" stroke="none"/>
      <text x="360" y="88" fill="#b5523a" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">DO FIRST</text>
      <text x="360" y="104" fill="#b5523a" font-size="11" font-weight="600" font-family="'Geist', sans-serif">P0 需行动</text>

      <!-- P0 dots -->
      <circle cx="440" cy="140" r="6" fill="#b5523a"/>
      <text x="456" y="144" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif">华啸</text>
      <text x="456" y="160" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">峰值比 58% / 连续4月下滑</text>

      <circle cx="440" cy="200" r="6" fill="#b5523a"/>
      <text x="456" y="204" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif">岐力</text>
      <text x="456" y="220" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">排名 Bottom 3 / 连续3月</text>

      <text x="360" y="252" fill="#b5523a" font-size="8" font-family="'Geist', sans-serif">立即约谈 + 30天整改</text>

      <!-- Q2: top-left = SCHEDULE -->
      <text x="72" y="88" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">MONITOR</text>
      <text x="72" y="104" fill="#57534e" font-size="11" font-weight="600" font-family="'Geist', sans-serif">观察</text>

      <!-- Q3: bottom-left = LOW PRIORITY -->
      <text x="72" y="292" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">DELEGATE</text>

      <!-- Q4: bottom-right = MAINTAIN -->
      <text x="360" y="292" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">MAINTAIN</text>
      <text x="360" y="308" fill="#57534e" font-size="11" font-weight="600" font-family="'Geist', sans-serif">P1-P2 维持观察</text>

      <!-- P1-P2 dots in Q4 -->
      <circle cx="400" cy="340" r="4" fill="#57534e"/>
      <text x="412" y="344" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">毅航</text>

      <circle cx="476" cy="340" r="4" fill="#57534e"/>
      <text x="488" y="344" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">毛毛虫</text>

      <circle cx="400" cy="368" r="4" fill="#57534e"/>
      <text x="412" y="372" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">广达</text>

      <circle cx="476" cy="368" r="4" fill="#57534e"/>
      <text x="488" y="372" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">伽玛</text>

      <circle cx="400" cy="396" r="4" fill="#57534e"/>
      <text x="412" y="400" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">赛维斯</text>

      <text x="360" y="436" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">常规关注 + 分享标杆经验</text>

      <!-- Resource split bar -->
      <line x1="60" y1="460" x2="620" y2="460" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <rect x="60" y="468" width="448" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="60" y="468" width="112" height="8" rx="4" fill="rgba(181,82,58,0.25)"/>
      <text x="60" y="492" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace">80%</text>
      <text x="112" y="492" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">精力给 P0</text>
      <text x="260" y="492" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">20%</text>
      <text x="296" y="492" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">维持观察</text>

      <!-- ===== LEGEND ===== -->
      <line x1="36" y1="508" x2="644" y2="508" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <circle cx="48" cy="524" r="5" fill="#b5523a"/>
      <text x="60" y="528" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">P0 Action (2)</text>

      <circle cx="196" cy="524" r="4" fill="#57534e"/>
      <text x="208" y="528" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">P1-P2 Monitor (5)</text>

      <rect x="372" y="520" width="24" height="8" rx="4" fill="rgba(181,82,58,0.25)"/>
      <text x="404" y="528" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Resource allocation</text>
    </svg>
  </div>
</div>
</body>
</html>
