<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商健康度仪表盘 · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 24px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Health Dashboard</p>
    <h1>供应商健康度仪表盘</h1>

    <svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
        <linearGradient id="gauge-track" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(28,25,23,0.06)"/>
          <stop offset="100%" stop-color="rgba(28,25,23,0.15)"/>
        </linearGradient>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== CONTAINER ===== -->
      <rect x="20" y="48" width="640" height="440" rx="8" fill="#f2ede4" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>

      <!-- Container title -->
      <text x="340" y="72" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">供应商健康度仪表盘 · Health Dashboard</text>
      <text x="340" y="88" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">2026-04 · 毅航</text>

      <line x1="36" y1="100" x2="644" y2="100" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- ===== TIER 1: Gauge + Score (left) ===== -->

      <!-- Semi-circular gauge: center (240,260), r=100 -->
      <!-- Track (full semicircle) -->
      <path d="M 140 260 A 100 100 0 0 0 340 260"
            fill="none" stroke="url(#gauge-track)" stroke-width="20" stroke-linecap="round"/>

      <!-- Green zone (90-100): left segment, 180° → 162° -->
      <path d="M 140 260 A 100 100 0 0 0 144 229"
            fill="none" stroke="#57534e" stroke-width="16" stroke-linecap="round" opacity="0.25"/>

      <!-- Yellow zone (75-89): middle segment, 162° → 90° -->
      <path d="M 144 229 A 100 100 0 0 0 240 160"
            fill="none" stroke="#57534e" stroke-width="16" stroke-linecap="round" opacity="0.35"/>

      <!-- Red zone (<75): right segment, 90° → 0° -->
      <path d="M 240 160 A 100 100 0 0 0 340 260"
            fill="none" stroke="rgba(181,82,58,0.40)" stroke-width="16" stroke-linecap="round"/>

      <!-- Needle pointing to score 72 (≈115° → ~182,178) -->
      <line x1="240" y1="260" x2="182" y2="178" stroke="#b5523a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="240" cy="260" r="8" fill="#b5523a"/>
      <circle cx="240" cy="260" r="4" fill="#faf7f2"/>

      <!-- Gauge labels -->
      <text x="150" y="148" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">优秀 90+</text>
      <text x="240" y="140" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">良好 75-89</text>
      <text x="330" y="148" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">预警 &lt;75</text>

      <!-- Score display -->
      <text x="240" y="296" fill="#1c1917" font-size="32" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">72</text>
      <text x="240" y="316" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">HEALTH SCORE</text>

      <!-- ===== TIER 2: Metrics (right) ===== -->

      <!-- 产能达成率 -->
      <text x="480" y="132" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">产能达成率</text>
      <rect x="400" y="140" width="160" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="400" y="140" width="128" height="8" rx="4" fill="#57534e" opacity="0.5"/>
      <text x="572" y="148" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">80%</text>

      <!-- 人均人效 -->
      <text x="480" y="172" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">人均人效</text>
      <rect x="400" y="180" width="160" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="400" y="180" width="136" height="8" rx="4" fill="#57534e" opacity="0.5"/>
      <text x="572" y="188" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">85%</text>

      <!-- 质量得分 -->
      <text x="480" y="212" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">质量得分</text>
      <rect x="400" y="220" width="160" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="400" y="220" width="104" height="8" rx="4" fill="#57534e" opacity="0.4"/>
      <text x="572" y="228" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">65%</text>

      <!-- 峰值比 ⚠ (focal) -->
      <text x="480" y="252" fill="#b5523a" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">峰值比</text>
      <rect x="400" y="260" width="160" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="400" y="260" width="84" height="8" rx="4" fill="#b5523a" opacity="0.5"/>
      <text x="572" y="268" fill="#b5523a" font-size="9" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">52%</text>

      <!-- 流失率 -->
      <text x="480" y="292" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">流失率</text>
      <rect x="400" y="300" width="160" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="400" y="300" width="116" height="8" rx="4" fill="#57534e" opacity="0.45"/>
      <text x="572" y="308" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">72%</text>

      <!-- ===== TIER 3: Summary bar ===== -->
      <line x1="36" y1="344" x2="644" y2="344" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- Supplier -->
      <text x="52" y="372" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.10em">供应商</text>
      <text x="52" y="388" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">毅航</text>

      <!-- Score -->
      <text x="180" y="372" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.10em">健康度</text>
      <text x="180" y="388" fill="#b5523a" font-size="12" font-weight="600" font-family="'Geist', sans-serif">72 分</text>

      <!-- Status -->
      <text x="300" y="372" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.10em">状态</text>
      <text x="300" y="388" fill="#57534e" font-size="12" font-weight="600" font-family="'Geist', sans-serif">预警</text>

      <!-- Weak point -->
      <text x="400" y="372" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.10em">薄弱项</text>
      <text x="400" y="388" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">峰值比</text>

      <!-- Updated -->
      <text x="520" y="372" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.10em">更新</text>
      <text x="520" y="388" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif">04-20</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="420" x2="660" y2="420" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="20" y="436" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="444" width="14" height="10" rx="2" fill="rgba(28,25,23,0.06)"/>
      <text x="40" y="452" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Good</text>

      <rect x="92" y="444" width="14" height="10" rx="2" fill="rgba(28,25,23,0.12)"/>
      <text x="112" y="452" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Warning</text>

      <rect x="192" y="444" width="14" height="10" rx="2" fill="rgba(181,82,58,0.30)"/>
      <text x="212" y="452" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Critical</text>

      <line x1="292" y1="450" x2="320" y2="450" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <text x="328" y="452" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Focal metric</text>

      <!-- Editorial aside -->
      <text x="500" y="408" fill="#1c1917" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">整体得分 + 短板预警</text>
    </svg>
  </div>
</body>
</html>
