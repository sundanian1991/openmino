<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清退决策树 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12); --rule-solid: rgba(120,113,108,0.25);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .frame { max-width: 680px; width: 100%; }
    .eyebrow { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem; }
    h1 { font-family: var(--serif); font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem; }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Exit Decision Tree</p>
    <h1>清退决策树</h1>

    <svg viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== ARROWS (drawn first, behind nodes) ===== -->
      <!-- Start → D1 -->
      <line x1="340" y1="72" x2="340" y2="108" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- D1 YES → D2 -->
      <line x1="340" y1="164" x2="340" y2="216" stroke="#b5523a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
      <!-- D1 NO → 继续观察 (left) -->
      <line x1="264" y1="136" x2="148" y2="136" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- D2 YES → 机会期 (right) -->
      <line x1="416" y1="264" x2="516" y2="264" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- D2 NO → 启动清退 (down) -->
      <line x1="340" y1="312" x2="340" y2="400" stroke="#b5523a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

      <!-- D3 YES → 保留 (right-down) -->
      <line x1="572" y1="360" x2="572" y2="412" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- D3 NO → 启动清退 (left-down) -->
      <line x1="524" y1="336" x2="340" y2="336" stroke="#b5523a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
      <line x1="340" y1="336" x2="340" y2="400" stroke="#b5523a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

      <!-- 启动清退 → 书面通知 -->
      <line x1="340" y1="432" x2="340" y2="452" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- 书面通知 → 过渡期 -->
      <line x1="340" y1="484" x2="340" y2="492" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- 过渡期 → 正式清退 -->
      <line x1="340" y1="524" x2="340" y2="532" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== ARROW LABELS (with opaque bg) ===== -->
      <rect x="326" y="176" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="186" fill="#b5523a" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">是</text>

      <rect x="200" y="124" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="214" y="134" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">否</text>

      <rect x="452" y="252" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="466" y="262" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">是</text>

      <rect x="326" y="348" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="358" fill="#b5523a" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">否</text>

      <rect x="558" y="372" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="572" y="382" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">是</text>

      <rect x="476" y="300" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="490" y="310" fill="#b5523a" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">否</text>

      <!-- ===== NODES ===== -->

      <!-- START -->
      <rect x="276" y="40" width="128" height="32" rx="16" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1.5"/>
      <text x="340" y="61" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">月度评估触发</text>

      <!-- D1: 连续3月Bottom3？ -->
      <polygon points="340,108 416,136 340,164 264,136" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="340" y="132" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">连续3月</text>
      <text x="340" y="148" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">Bottom3？</text>

      <!-- END: 继续观察 -->
      <rect x="28" y="112" width="120" height="48" rx="12" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1"/>
      <text x="88" y="134" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">继续观察</text>
      <text x="88" y="148" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="middle">下月再评</text>

      <!-- D2: 可改进？ -->
      <polygon points="340,216 416,264 340,312 264,264" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="340" y="260" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">是否可改进？</text>

      <!-- 机会期 -->
      <rect x="516" y="240" width="112" height="48" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="572" y="260" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">机会期</text>
      <text x="572" y="276" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="middle">1-2月观察</text>

      <!-- D3: 达标？ -->
      <polygon points="572,312 620,336 572,360 524,336" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="572" y="340" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">达标？</text>

      <!-- END: 保留供应商 -->
      <rect x="512" y="412" width="120" height="48" rx="12" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1"/>
      <text x="572" y="434" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">保留供应商</text>
      <text x="572" y="448" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="middle">持续观察</text>

      <!-- 启动清退 (focal) -->
      <rect x="276" y="400" width="128" height="32" rx="8" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1.5"/>
      <text x="340" y="421" fill="#b5523a" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">启动清退</text>

      <!-- STEP 1: 书面通知 -->
      <rect x="276" y="452" width="128" height="32" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="340" y="472" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">书面通知</text>

      <!-- STEP 2: 过渡期 -->
      <rect x="276" y="492" width="128" height="32" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="340" y="512" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">过渡期 3-6月</text>

      <!-- STEP 3: 正式清退 -->
      <rect x="276" y="532" width="128" height="32" rx="8" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1.5"/>
      <text x="340" y="552" fill="#b5523a" font-size="11" font-family="var(--sans)" font-weight="600" text-anchor="middle">正式清退</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="580" x2="640" y2="580" stroke="var(--rule)" stroke-width="0.8"/>
      <rect x="80" y="590" width="12" height="12" rx="6" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1"/>
      <text x="100" y="599" fill="#57534e" font-size="8.5" font-family="var(--sans)">开始/结束</text>
      <polygon points="200,590 210,596 200,602 190,596" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="218" y="599" fill="#57534e" font-size="8.5" font-family="var(--sans)">决策</text>
      <rect x="280" y="590" width="12" height="12" rx="2" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="300" y="599" fill="#57534e" font-size="8.5" font-family="var(--sans)">步骤</text>
      <line x1="372" y1="596" x2="396" y2="596" stroke="#b5523a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
      <text x="404" y="599" fill="#57534e" font-size="8.5" font-family="var(--sans)">清退路径</text>
    </svg>
  </div>
</body>
</html>
