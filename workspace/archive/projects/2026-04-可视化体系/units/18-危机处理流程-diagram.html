<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>危机处理流程 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 1.5rem;
    }
    .diagram-container {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      overflow-x: auto;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Diagram Design</p>
    <h1>危机处理流程</h1>
    <div class="diagram-container">
      <svg viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
        </defs>

        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- ARROWS (drawn before boxes for z-order) -->
        <!-- Start → Step 1 -->
        <line x1="268" y1="60" x2="268" y2="88" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <!-- Step 1 → Step 2 (accent — critical first response) -->
        <line x1="268" y1="168" x2="268" y2="196" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <rect x="252" y="172" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="268" y="180" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">4h</text>
        <!-- Step 2 → Step 3 -->
        <line x1="268" y1="276" x2="268" y2="304" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="252" y="280" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="268" y="288" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">24h</text>
        <!-- Step 3 → Step 4 -->
        <line x1="268" y1="384" x2="268" y2="412" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="252" y="388" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="268" y="396" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">执行</text>
        <!-- Step 4 → Step 5 -->
        <line x1="268" y1="492" x2="268" y2="520" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="252" y="496" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="268" y="504" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">每日</text>
        <!-- Step 5 → Step 6 -->
        <line x1="268" y1="600" x2="268" y2="628" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- ===== START: 危机触发 ===== -->
        <rect x="196" y="20" width="144" height="40" rx="20" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="268" y="46" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">危机触发</text>

        <!-- ===== STEP 1: 快速响应 (focal — accent) ===== -->
        <rect x="100" y="88" width="336" height="80" rx="6" fill="#faf7f2" stroke="rgba(181,82,58,0.50)" stroke-width="1"/>
        <rect x="100" y="88" width="336" height="80" rx="6" fill="rgba(181,82,58,0.08)"/>
        <rect x="112" y="96" width="36" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
        <text x="130" y="106" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 1</text>
        <text x="268" y="124" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">快速响应</text>
        <text x="268" y="140" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">确认级别 · 通知干系人 · 启动应急通道</text>
        <text x="268" y="156" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">4小时内首响</text>

        <!-- ===== STEP 2: 成立小组 ===== -->
        <rect x="100" y="196" width="336" height="80" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="112" y="204" width="36" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="130" y="214" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 2</text>
        <text x="268" y="232" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">成立小组</text>
        <text x="268" y="248" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">指定负责人(军哥) · 跨部门成员 · 授权</text>
        <text x="268" y="264" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Task Force 跨部门</text>

        <!-- ===== STEP 3: 控制事态 ===== -->
        <rect x="100" y="304" width="336" height="80" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="112" y="312" width="36" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="130" y="322" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 3</text>
        <text x="268" y="340" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">控制事态</text>
        <text x="268" y="356" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">隔离范围 · 暂停操作 · 启动备用方案</text>
        <text x="268" y="372" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">止损 · 损失最小化</text>

        <!-- ===== STEP 4: 制定方案 ===== -->
        <rect x="100" y="412" width="336" height="80" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="112" y="420" width="36" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="130" y="430" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 4</text>
        <text x="268" y="448" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">制定方案</text>
        <text x="268" y="464" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">根因分析(5Why) · 短期恢复 · 长期预防</text>
        <text x="268" y="480" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">24h内出方案</text>

        <!-- ===== STEP 5: 执行跟踪 ===== -->
        <rect x="100" y="520" width="336" height="80" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="112" y="528" width="36" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="130" y="538" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 5</text>
        <text x="268" y="556" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">执行跟踪</text>
        <text x="268" y="572" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">每日晨会 · 关键指标 · 问题升级</text>
        <text x="268" y="588" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">每日 9:00 前汇报</text>

        <!-- ===== STEP 6: 复盘总结 (end oval) ===== -->
        <rect x="100" y="628" width="336" height="40" rx="20" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="268" y="654" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">复盘总结 · 知识归档</text>

        <!-- ===== RIGHT PANEL: Escalation ===== -->
        <rect x="452" y="88" width="208" height="168" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <rect x="464" y="80" width="72" height="16" rx="2" fill="#faf7f2"/>
        <text x="468" y="92" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.14em">升级路径</text>

        <text x="464" y="116" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">L1</text>
        <text x="488" y="116" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">年老师（执行层）</text>
        <text x="464" y="140" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">L2</text>
        <text x="488" y="140" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">王易人（执行负责人）</text>
        <text x="464" y="164" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">L3</text>
        <text x="488" y="164" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">卞海军（部门总）</text>

        <line x1="464" y1="180" x2="648" y2="180" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
        <text x="464" y="200" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">沟通</text>
        <text x="496" y="200" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">每日晨会 9:00</text>
        <text x="464" y="220" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">频率</text>
        <text x="496" y="220" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">紧急即时通报</text>
        <text x="464" y="244" fill="#57534e" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">4h首响，24h方案</text>

        <!-- Editorial aside -->
        <text x="100" y="700" fill="#57534e" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">速度决定损失边界。</text>

        <!-- LEGEND STRIP -->
        <line x1="16" y1="680" x2="664" y2="680" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="700" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="24" y="708" width="12" height="12" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="44" y="716" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Critical step (P0)</text>

        <rect x="160" y="708" width="12" height="12" rx="2" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="180" y="716" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Standard step</text>

        <line x1="280" y1="716" x2="308" y2="716" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <text x="316" y="716" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Critical path</text>

        <line x1="420" y1="716" x2="448" y2="716" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <text x="456" y="716" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Normal flow</text>
      </svg>
    </div>
  </div>
</body>
</html>
