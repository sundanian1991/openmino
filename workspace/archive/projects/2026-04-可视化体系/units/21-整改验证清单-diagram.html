<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>整改验证清单 · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12); --rule-solid: rgba(120,113,108,0.25);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .frame { max-width: 680px; width: 100%; }
    .eyebrow { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem; }
    h1 { font-family: var(--serif); font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem; }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Verification Checklist</p>
    <h1>整改验证清单</h1>

    <svg viewBox="0 0 680 504" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== TIER 1: 第1周检查 ===== -->
      <rect x="40" y="40" width="600" height="16" rx="4" fill="var(--accent-tint)"/>
      <text x="340" y="53" fill="#b5523a" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">TIER 1 · 第1周检查</text>

      <!-- Progress track (with paper mask) -->
      <rect x="80" y="72" width="520" height="8" rx="4" fill="#faf7f2"/>
      <rect x="80" y="72" width="520" height="8" rx="4" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <!-- Target line at 62% -->
      <line x1="403" y1="68" x2="403" y2="84" stroke="#57534e" stroke-width="1.5" stroke-dasharray="3 2"/>
      <rect x="391" y="60" width="24" height="12" rx="2" fill="#faf7f2"/>
      <text x="403" y="69" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle">62%</text>
      <!-- Actual: 60% -->
      <rect x="80" y="72" width="312" height="8" rx="4" fill="#b5523a"/>
      <!-- Value label -->
      <text x="392" y="96" fill="#1c1917" font-size="10" font-family="var(--mono)" font-weight="600" text-anchor="middle">实际 60%</text>
      <!-- Status badge -->
      <rect x="520" y="64" width="80" height="24" rx="12" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="560" y="80" fill="#b5523a" font-size="9" font-family="var(--sans)" font-weight="600" text-anchor="middle">略滞后 -2%</text>

      <!-- Arrow down -->
      <line x1="340" y1="104" x2="340" y2="132" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== TIER 2: 第2周检查 ===== -->
      <rect x="40" y="132" width="600" height="16" rx="4" fill="var(--accent-tint)"/>
      <text x="340" y="145" fill="#b5523a" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">TIER 2 · 第2周检查</text>

      <rect x="80" y="164" width="520" height="8" rx="4" fill="#faf7f2"/>
      <rect x="80" y="164" width="520" height="8" rx="4" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <line x1="419" y1="160" x2="419" y2="176" stroke="#57534e" stroke-width="1.5" stroke-dasharray="3 2"/>
      <rect x="407" y="152" width="24" height="12" rx="2" fill="#faf7f2"/>
      <text x="419" y="161" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle">65%</text>
      <rect x="80" y="164" width="333" height="8" rx="4" fill="#b5523a"/>
      <text x="413" y="188" fill="#1c1917" font-size="10" font-family="var(--mono)" font-weight="600" text-anchor="middle">实际 64%</text>
      <rect x="520" y="156" width="80" height="24" rx="12" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="560" y="172" fill="#b5523a" font-size="9" font-family="var(--sans)" font-weight="600" text-anchor="middle">接近 -1%</text>

      <!-- Arrow down -->
      <line x1="340" y1="196" x2="340" y2="224" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== TIER 3: 第4周验收 ===== -->
      <rect x="40" y="224" width="600" height="16" rx="4" fill="var(--accent-tint)"/>
      <text x="340" y="237" fill="#b5523a" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">TIER 3 · 第4周验收</text>

      <rect x="80" y="256" width="520" height="8" rx="4" fill="#faf7f2"/>
      <rect x="80" y="256" width="520" height="8" rx="4" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <line x1="444" y1="252" x2="444" y2="268" stroke="#57534e" stroke-width="1.5" stroke-dasharray="3 2"/>
      <rect x="432" y="244" width="24" height="12" rx="2" fill="#faf7f2"/>
      <text x="444" y="253" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle">70%</text>
      <rect x="80" y="256" width="354" height="8" rx="4" fill="#b5523a"/>
      <text x="434" y="280" fill="#1c1917" font-size="10" font-family="var(--mono)" font-weight="600" text-anchor="middle">实际 68%</text>
      <rect x="520" y="248" width="80" height="24" rx="12" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="560" y="264" fill="#b5523a" font-size="9" font-family="var(--sans)" font-weight="600" text-anchor="middle">接近 -2%</text>

      <!-- Arrow down -->
      <line x1="340" y1="288" x2="340" y2="324" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== TIER 4: 第8周终验 (focal) ===== -->
      <rect x="40" y="324" width="600" height="16" rx="4" fill="rgba(143,155,127,0.10)"/>
      <text x="340" y="337" fill="#8f9b7f" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">TIER 4 · 第8周终验</text>

      <rect x="80" y="356" width="520" height="8" rx="4" fill="#faf7f2"/>
      <rect x="80" y="356" width="520" height="8" rx="4" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <line x1="470" y1="352" x2="470" y2="368" stroke="#57534e" stroke-width="1.5" stroke-dasharray="3 2"/>
      <rect x="458" y="344" width="24" height="12" rx="2" fill="#faf7f2"/>
      <text x="470" y="353" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle">75%</text>
      <rect x="80" y="356" width="395" height="8" rx="4" fill="#8f9b7f"/>
      <text x="478" y="380" fill="#1c1917" font-size="10" font-family="var(--mono)" font-weight="600" text-anchor="middle">实际 76%</text>
      <rect x="520" y="348" width="80" height="24" rx="12" fill="rgba(143,155,127,0.18)" stroke="#8f9b7f" stroke-width="1"/>
      <text x="560" y="364" fill="#8f9b7f" font-size="9" font-family="var(--sans)" font-weight="600" text-anchor="middle">达成 +1%</text>

      <!-- ===== CONCLUSION CARD ===== -->
      <line x1="340" y1="388" x2="340" y2="412" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <rect x="40" y="412" width="600" height="56" rx="8" fill="rgba(143,155,127,0.10)" stroke="#8f9b7f" stroke-width="1.5"/>
      <rect x="48" y="420" width="6" height="40" rx="2" fill="#8f9b7f"/>
      <text x="64" y="440" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600">验收结论：通过</text>
      <text x="64" y="456" fill="#57534e" font-size="10" font-family="var(--sans)">8周整改完成，峰值比从58%提升至76%（+18%）</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="484" x2="640" y2="484" stroke="var(--rule)" stroke-width="0.8"/>
      <rect x="80" y="476" width="12" height="8" rx="2" fill="#b5523a"/>
      <text x="100" y="483" fill="#57534e" font-size="8.5" font-family="var(--sans)">实际进度</text>
      <line x1="196" y1="480" x2="216" y2="480" stroke="#57534e" stroke-width="1.5" stroke-dasharray="3 2"/>
      <text x="224" y="483" fill="#57534e" font-size="8.5" font-family="var(--sans)">目标线</text>
    </svg>
  </div>
</body>
</html>
