<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新供应商成长曲线</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #faf7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .frame { max-width: 720px; width: 100%; }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 7.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #78716c;
    margin-bottom: 0.375rem;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #1c1917;
    margin-bottom: 1.25rem;
  }
  .diagram-wrap {
    background: #f2ede4;
    border: 1px solid rgba(28,25,23,0.12);
    border-radius: 8px;
    padding: 1px;
  }
  svg { width: 100%; display: block; }
</style>
</head>
<body>
<div class="frame">
  <p class="eyebrow">Supplier Onboarding · Timeline</p>
  <h1>新供应商成长曲线</h1>
  <div class="diagram-wrap">
    <svg viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== TIMELINE BASELINE ===== -->
      <line x1="68" y1="220" x2="640" y2="220" stroke="#1c1917" stroke-width="1"/>
      <!-- Arrow tip at end -->
      <polygon points="640,220 632,216 632,224" fill="#1c1917"/>
      <text x="648" y="224" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.08em">time</text>

      <!-- Tick: M0 (start) -->
      <line x1="100" y1="216" x2="100" y2="224" stroke="#1c1917" stroke-width="1"/>
      <text x="100" y="240" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">M0</text>

      <!-- Tick: M1 -->
      <line x1="220" y1="216" x2="220" y2="224" stroke="#1c1917" stroke-width="1"/>
      <text x="220" y="240" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">M1</text>

      <!-- Tick: M3 -->
      <line x1="380" y1="216" x2="380" y2="224" stroke="#1c1917" stroke-width="1"/>
      <text x="380" y="240" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">M3</text>

      <!-- Tick: M6 -->
      <line x1="580" y1="216" x2="580" y2="224" stroke="#1c1917" stroke-width="1"/>
      <text x="580" y="240" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">M6</text>

      <!-- ===== EVENT DOTS ===== -->

      <!-- M1: 准入期 (regular dot, above timeline) -->
      <circle cx="220" cy="220" r="4" fill="#57534e"/>
      <!-- Label above -->
      <line x1="220" y1="184" x2="220" y2="212" stroke="#57534e" stroke-width="0.8" stroke-dasharray="3,3"/>
      <rect x="156" y="140" width="128" height="44" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="164" y="156" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">ONBOARDING</text>
      <text x="164" y="172" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">准入期</text>
      <text x="164" y="180" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">目标 0-30% / 实际 25%</text>

      <!-- M3: 爬坡期 (milestone accent dot) -->
      <circle cx="380" cy="220" r="6" fill="#b5523a"/>
      <!-- Label below -->
      <line x1="380" y1="228" x2="380" y2="256" stroke="#b5523a" stroke-width="0.8" stroke-dasharray="3,3"/>
      <rect x="316" y="260" width="128" height="52" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="324" y="276" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">RAMP-UP</text>
      <text x="324" y="292" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">爬坡期</text>
      <text x="324" y="300" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace">目标 30-70% / 实际 45%</text>

      <!-- M6: 达标期 (regular dot, above) -->
      <circle cx="580" cy="220" r="4" fill="#57534e"/>
      <!-- Label above -->
      <line x1="580" y1="184" x2="580" y2="212" stroke="#57534e" stroke-width="0.8" stroke-dasharray="3,3"/>
      <rect x="516" y="140" width="128" height="44" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="524" y="156" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">TARGET</text>
      <text x="524" y="172" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">达标期</text>
      <text x="524" y="180" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">目标 >= 80%</text>

      <!-- ===== PROGRESS CURVE (subtle path above baseline) ===== -->
      <!-- Ideal path: starts at M0 (0%), ends at M6 (100%) -->
      <path d="M 100 216 C 160 216, 220 208, 380 196 C 460 188, 520 180, 580 172" fill="none" stroke="#57534e" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

      <!-- ===== INTERVENTION CALLOUT ===== -->
      <rect x="400" y="268" width="136" height="36" rx="4" fill="#faf7f2" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
      <text x="408" y="284" fill="#b5523a" font-size="8" font-weight="500" font-family="'Geist', sans-serif">M3 滞后需干预</text>
      <text x="408" y="296" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace">加训 + 资源倾斜 + 周追踪</text>

      <!-- ===== LEGEND ===== -->
      <line x1="36" y1="368" x2="644" y2="368" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <circle cx="48" cy="388" r="4" fill="#57534e"/>
      <text x="60" y="392" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Regular phase</text>

      <circle cx="196" cy="388" r="5" fill="#b5523a"/>
      <text x="208" y="392" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Lagging milestone</text>

      <line x1="356" y1="388" x2="388" y2="388" stroke="#57534e" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="396" y="392" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Ideal curve</text>

      <!-- Editorial note -->
      <text x="36" y="428" fill="#78716c" font-size="11" font-family="'Instrument Serif', serif" font-style="italic">M3 实际 45% 低于目标下限，需判断是否加速。</text>
    </svg>
  </div>
</div>
</body>
</html>
