<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商档案标准 · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 24px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Archive Standard</p>
    <h1>供应商档案标准</h1>

    <svg viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== ROOT NODE ===== -->
      <rect x="244" y="48" width="192" height="48" rx="8" fill="#faf7f2"/>
      <rect x="244" y="48" width="192" height="48" rx="8" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="252" y="56" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="266" y="65" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ROOT</text>
      <text x="340" y="80" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">毅航 · Yihang</text>
      <text x="340" y="92" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">供应商档案根目录</text>

      <!-- Root → Tier 1 connector -->
      <line x1="340" y1="96" x2="340" y2="124" stroke="#57534e" stroke-width="1"/>

      <!-- ===== TIER 1: 6 Folders (2 rows × 3 cols) ===== -->

      <!-- Row 1 -->

      <!-- 01 基础信息 -->
      <rect x="24" y="124" width="192" height="44" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="32" y="132" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="44" y="141" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">01</text>
      <text x="120" y="144" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">基础信息</text>
      <text x="120" y="158" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Basic Info</text>

      <!-- 02 合同文件 -->
      <rect x="244" y="124" width="192" height="44" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="252" y="132" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="264" y="141" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">02</text>
      <text x="340" y="144" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">合同文件</text>
      <text x="340" y="158" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Contracts</text>

      <!-- 03 月度数据 (focal) -->
      <rect x="464" y="124" width="192" height="44" rx="6" fill="#faf7f2"/>
      <rect x="464" y="124" width="192" height="44" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="472" y="132" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="486" y="141" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">KEY</text>
      <text x="560" y="144" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">月度数据</text>
      <text x="560" y="158" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Monthly Data</text>

      <!-- Row 2 -->

      <!-- 04 约谈记录 -->
      <rect x="24" y="188" width="192" height="44" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="32" y="196" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="44" y="205" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">04</text>
      <text x="120" y="208" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">约谈记录</text>
      <text x="120" y="222" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Meetings</text>

      <!-- 05 整改跟踪 -->
      <rect x="244" y="188" width="192" height="44" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="252" y="196" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="264" y="205" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">05</text>
      <text x="340" y="208" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">整改跟踪</text>
      <text x="340" y="222" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Rectification</text>

      <!-- 06 异常事件 (focal) -->
      <rect x="464" y="188" width="192" height="44" rx="6" fill="#faf7f2"/>
      <rect x="464" y="188" width="192" height="44" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="472" y="196" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="486" y="205" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FOCAL</text>
      <text x="560" y="208" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">异常事件</text>
      <text x="560" y="222" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Exceptions</text>

      <!-- Connectors from Tier 1 to Tier 2 -->
      <line x1="120" y1="168" x2="120" y2="252" stroke="#57534e" stroke-width="0.8"/>
      <line x1="340" y1="168" x2="340" y2="252" stroke="#57534e" stroke-width="0.8"/>
      <line x1="560" y1="168" x2="560" y2="252" stroke="#b5523a" stroke-width="1"/>

      <line x1="120" y1="232" x2="120" y2="252" stroke="#57534e" stroke-width="0.8"/>
      <line x1="340" y1="232" x2="340" y2="252" stroke="#57534e" stroke-width="0.8"/>
      <line x1="560" y1="232" x2="560" y2="252" stroke="#b5523a" stroke-width="1"/>

      <!-- ===== TIER 2: Sub-items ===== -->

      <!-- 01 Sub-items -->
      <text x="44" y="272" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">├── 供应商概况.md</text>
      <text x="44" y="292" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">├── 联系人清单.md</text>
      <text x="44" y="312" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">└── 资质证书/</text>

      <!-- 02 Sub-items -->
      <text x="264" y="272" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">├── 主合同.pdf</text>
      <text x="264" y="292" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">├── 补充协议.pdf</text>
      <text x="264" y="312" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">└── 续签记录.md</text>

      <!-- 03 Sub-items (focal, expanded) -->
      <text x="484" y="272" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace">├── 📁 2025/</text>
      <text x="504" y="288" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">│   ├── 01_月报.md</text>
      <text x="504" y="304" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">│   ├── 02_月报.md</text>
      <text x="504" y="320" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">│   └── ...</text>
      <text x="484" y="336" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace">└── 📁 2026/</text>
      <text x="504" y="352" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">    ├── 01_月报.md</text>
      <text x="504" y="368" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">    └── ...</text>

      <!-- Separator -->
      <line x1="24" y1="388" x2="656" y2="388" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- Row 3 sub-items (below separator) -->

      <!-- 04 Sub-items -->
      <text x="44" y="408" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">├── 会议纪要.md</text>
      <text x="44" y="428" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">└── 行动计划.md</text>

      <!-- 05 Sub-items -->
      <text x="264" y="408" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">├── 整改计划.md</text>
      <text x="264" y="428" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">└── 验收报告.md</text>

      <!-- 06 Sub-items (focal) -->
      <text x="484" y="408" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace">├── W-2026-04-001.md</text>
      <text x="484" y="428" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace">├── W-2026-03-003.md</text>
      <text x="484" y="448" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace">└── ...</text>

      <!-- ===== ARCHIVE RULE ===== -->
      <rect x="24" y="468" width="632" height="36" rx="6" fill="#faf7f2"/>
      <rect x="24" y="468" width="632" height="36" rx="6" fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <text x="44" y="484" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">归档规则：按年度分目录 → 按月命名（01_月报.md, 02_月报.md） → 异常事件单独编号（W-YYYY-MM-NNN）</text>
      <text x="44" y="500" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.06em">ANNUAL FOLDERS → MONTHLY FILES → EXCEPTIONS WITH UNIQUE ID</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="516" x2="660" y2="516" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="20" y="532" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="540" width="14" height="10" rx="2" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <text x="40" y="548" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Folder</text>

      <rect x="100" y="540" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="120" y="548" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Focal folder</text>

      <line x1="224" y1="546" x2="252" y2="546" stroke="#57534e" stroke-width="0.8"/>
      <text x="260" y="548" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Hierarchy</text>

      <!-- Editorial aside -->
      <text x="500" y="452" fill="#1c1917" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">6 大模块 · 年度按月归档</text>
    </svg>
  </div>
</body>
</html>
