<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>异常模式识别 · Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 1.5rem;
    }
    .diagram-container {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      overflow-x: auto;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Timeline · Diagram Design</p>
    <h1>异常模式识别</h1>
    <div class="diagram-container">
      <svg viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- ===== BASELINE: Horizontal time axis ===== -->
        <line x1="44" y1="240" x2="640" y2="240" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <!-- Tick marks -->
        <line x1="100" y1="236" x2="100" y2="244" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <line x1="228" y1="236" x2="228" y2="244" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <line x1="356" y1="236" x2="356" y2="244" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <line x1="484" y1="236" x2="484" y2="244" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <line x1="612" y1="236" x2="612" y2="244" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <!-- Month labels -->
        <text x="100" y="260" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">1月</text>
        <text x="228" y="260" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">2月</text>
        <text x="356" y="260" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">3月</text>
        <text x="484" y="260" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">4月</text>
        <text x="612" y="260" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">5月</text>

        <!-- Threshold line at 70% -->
        <line x1="44" y1="176" x2="640" y2="176" stroke="#b5523a" stroke-width="0.8" stroke-dasharray="4,4"/>
        <rect x="636" y="168" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="654" y="178" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="end">70%</text>

        <!-- ===== PATTERN 1: 阶梯式下滑 (accent — focal) ===== -->
        <!-- Label above -->
        <text x="100" y="52" fill="#b5523a" font-size="12" font-family="'Geist', sans-serif" font-weight="600">阶梯式下滑</text>
        <text x="100" y="66" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">Staircase Decline</text>

        <!-- Data line -->
        <polyline points="100,148 228,172 356,200 484,228 612,248" fill="none" stroke="#b5523a" stroke-width="2"/>
        <!-- Data points -->
        <circle cx="100" cy="148" r="4" fill="#b5523a"/>
        <circle cx="228" cy="172" r="4" fill="#b5523a"/>
        <circle cx="356" cy="200" r="4" fill="#b5523a"/>
        <circle cx="484" cy="228" r="4" fill="#b5523a"/>
        <circle cx="612" cy="248" r="4" fill="#b5523a"/>
        <!-- Hairlines to baseline -->
        <line x1="100" y1="156" x2="100" y2="236" stroke="#b5523a" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
        <line x1="612" y1="256" x2="612" y2="240" stroke="#b5523a" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>

        <!-- Annotation callout -->
        <rect x="496" y="88" width="152" height="40" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="0.8"/>
        <text x="504" y="104" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" font-weight="600">逐月下降 -5~10%</text>
        <text x="504" y="118" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">P0/P1 · 深度约谈</text>

        <!-- ===== PATTERN 2: 波动型震荡 ===== -->
        <!-- Label below -->
        <text x="100" y="308" fill="#57534e" font-size="12" font-family="'Geist', sans-serif" font-weight="600">波动型震荡</text>
        <text x="100" y="322" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">Fluctuating</text>

        <!-- Data line (below baseline) -->
        <polyline points="100,292 228,304 356,288 484,316 612,296" fill="none" stroke="#57534e" stroke-width="1.5"/>
        <!-- Data points -->
        <circle cx="100" cy="292" r="4" fill="#faf7f2" stroke="#57534e" stroke-width="1.5"/>
        <circle cx="228" cy="304" r="4" fill="#faf7f2" stroke="#57534e" stroke-width="1.5"/>
        <circle cx="356" cy="288" r="4" fill="#faf7f2" stroke="#57534e" stroke-width="1.5"/>
        <circle cx="484" cy="316" r="4" fill="#faf7f2" stroke="#57534e" stroke-width="1.5"/>
        <circle cx="612" cy="296" r="4" fill="#faf7f2" stroke="#57534e" stroke-width="1.5"/>
        <!-- Hairlines -->
        <line x1="100" y1="284" x2="100" y2="244" stroke="#57534e" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
        <line x1="612" y1="288" x2="612" y2="244" stroke="#57534e" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>

        <!-- Annotation -->
        <rect x="496" y="328" width="152" height="40" rx="4" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
        <text x="504" y="344" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" font-weight="600">无规律波动 ±10%</text>
        <text x="504" y="358" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">P1/P2 · 观察</text>

        <!-- ===== PATTERN 3: 断崖式下跌 ===== -->
        <!-- Shown as accent event on timeline — cliff marker -->
        <text x="100" y="424" fill="#78716c" font-size="12" font-family="'Geist', sans-serif" font-weight="600">断崖式下跌</text>
        <text x="100" y="438" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">Cliff Drop</text>

        <!-- Mini baseline for cliff -->
        <line x1="100" y1="472" x2="612" y2="472" stroke="rgba(120,113,108,0.18)" stroke-width="1"/>
        <!-- Data: stable then cliff -->
        <polyline points="100,460 228,464 356,464 484,500 612,492" fill="none" stroke="#78716c" stroke-width="1.5"/>
        <circle cx="100" cy="460" r="4" fill="#faf7f2" stroke="#78716c" stroke-width="1.5"/>
        <circle cx="228" cy="464" r="4" fill="#faf7f2" stroke="#78716c" stroke-width="1.5"/>
        <circle cx="356" cy="464" r="4" fill="#faf7f2" stroke="#78716c" stroke-width="1.5"/>
        <circle cx="484" cy="500" r="6" fill="#b5523a"/>
        <circle cx="612" cy="492" r="4" fill="#faf7f2" stroke="#78716c" stroke-width="1.5"/>

        <!-- Cliff annotation -->
        <line x1="420" y1="468" x2="420" y2="500" stroke="#b5523a" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="408" y="490" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">断崖</text>

        <rect x="496" y="480" width="152" height="40" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="0.8"/>
        <text x="504" y="496" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" font-weight="600">单月暴跌超20%</text>
        <text x="504" y="510" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace">P0 · 4h首响</text>

        <!-- Axis label -->
        <text x="44" y="228" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.14em">PEAK RATIO</text>

        <!-- Editorial aside -->
        <text x="44" y="556" fill="#57534e" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">模式识别，策略匹配，快速决策。</text>

        <!-- LEGEND STRIP -->
        <line x1="16" y1="536" x2="664" y2="536" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="556" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <line x1="24" y1="572" x2="48" y2="572" stroke="#b5523a" stroke-width="2"/>
        <circle cx="36" cy="572" r="4" fill="#b5523a"/>
        <text x="56" y="576" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Staircase (focal)</text>

        <line x1="180" y1="572" x2="204" y2="572" stroke="#57534e" stroke-width="1.5"/>
        <circle cx="192" cy="572" r="4" fill="#faf7f2" stroke="#57534e" stroke-width="1.5"/>
        <text x="212" y="576" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Fluctuating</text>

        <line x1="324" y1="572" x2="348" y2="572" stroke="#78716c" stroke-width="1.5"/>
        <circle cx="348" cy="572" r="6" fill="#b5523a"/>
        <text x="360" y="576" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Cliff event</text>

        <line x1="468" y1="572" x2="492" y2="572" stroke="#b5523a" stroke-width="0.8" stroke-dasharray="4,4"/>
        <text x="500" y="576" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Threshold (70%)</text>
      </svg>
    </div>
  </div>
</body>
</html>
