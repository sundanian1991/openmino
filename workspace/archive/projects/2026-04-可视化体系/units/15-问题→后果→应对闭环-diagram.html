<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问题后果应对闭环 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 1.5rem;
    }
    .diagram-container {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      overflow-x: auto;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Diagram Design</p>
    <h1>问题→后果→应对闭环</h1>
    <div class="diagram-container">
      <svg viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
        </defs>

        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- ARROWS (drawn before boxes for z-order) -->
        <!-- 1→2 -->
        <line x1="228" y1="100" x2="228" y2="140" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="212" y="108" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="228" y="118" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">识别</text>

        <!-- 2→3 (accent — critical analysis) -->
        <line x1="228" y1="216" x2="228" y2="256" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <rect x="212" y="224" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="228" y="234" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">分析</text>

        <!-- 3→4 -->
        <line x1="228" y1="332" x2="228" y2="372" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="212" y="340" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="228" y="350" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">执行</text>

        <!-- 4→5 -->
        <line x1="228" y1="448" x2="228" y2="488" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="212" y="456" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="228" y="466" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">验证</text>

        <!-- 5→6 -->
        <line x1="228" y1="564" x2="228" y2="584" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- CLOSURE LOOP: 6→1 -->
        <path d="M 372 600 L 540 600 Q 560 600, 560 580 L 560 80 Q 560 60, 540 60 L 360 60" fill="none" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)" stroke-dasharray="5,4"/>
        <rect x="548" y="316" width="24" height="52" rx="2" fill="#faf7f2"/>
        <text x="560" y="330" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">闭</text>
        <text x="560" y="342" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">环</text>
        <text x="560" y="354" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">循</text>
        <text x="560" y="366" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">环</text>

        <!-- Example sidebar (right) -->
        <rect x="420" y="96" width="144" height="104" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="432" y="116" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif" font-weight="600">案例：华啸</text>
        <text x="432" y="134" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">峰值比 58%</text>
        <text x="432" y="150" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">1w后 72%</text>
        <text x="432" y="166" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">4w后 76% ✓</text>
        <text x="432" y="190" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif" font-weight="600">状态：已闭环</text>

        <!-- STEP 1: 问题识别 (oval start) -->
        <rect x="96" y="52" width="264" height="48" rx="24" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="108" y="76" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.08em">STEP 1</text>
        <text x="228" y="82" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">问题识别</text>

        <!-- STEP 2: 后果分析 (focal — accent) -->
        <rect x="96" y="140" width="264" height="76" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <rect x="96" y="140" width="264" height="76" rx="6" fill="#faf7f2" opacity="0"/>
        <rect x="108" y="148" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
        <text x="122" y="158" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 2</text>
        <text x="228" y="176" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">后果分析</text>
        <text x="228" y="192" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">产能不足 · 无法接单</text>

        <!-- STEP 3: 应对措施 -->
        <rect x="96" y="256" width="264" height="76" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="108" y="264" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="122" y="274" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 3</text>
        <text x="228" y="292" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">应对措施</text>
        <text x="228" y="308" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">约谈 + 整改 + 资源支持</text>

        <!-- STEP 4: 效果验证 -->
        <rect x="96" y="372" width="264" height="76" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="108" y="380" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="122" y="390" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 4</text>
        <text x="228" y="408" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">效果验证</text>
        <text x="228" y="424" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">1周后复查 72%</text>

        <!-- STEP 5: 持续监控 -->
        <rect x="96" y="488" width="264" height="76" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="108" y="496" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="122" y="506" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 5</text>
        <text x="228" y="524" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">持续监控</text>
        <text x="228" y="540" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">4周后达标 76% · 关闭异常</text>

        <!-- STEP 6: 闭环归档 (oval end) -->
        <rect x="96" y="584" width="264" height="40" rx="20" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="228" y="610" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">闭环归档</text>

        <!-- Editorial aside -->
        <text x="96" y="636" fill="#57534e" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">闭环不闭合，行动无意义。</text>

        <!-- LEGEND STRIP -->
        <line x1="16" y1="568" x2="84" y2="568" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="16" y="620" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="16" y="628" width="12" height="12" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="36" y="636" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Focal step</text>

        <rect x="120" y="628" width="12" height="12" rx="2" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="140" y="636" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Process step</text>

        <line x1="232" y1="636" x2="256" y2="636" stroke="#b5523a" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>
        <text x="264" y="636" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Closure loop</text>
      </svg>
    </div>
  </div>
</body>
</html>
