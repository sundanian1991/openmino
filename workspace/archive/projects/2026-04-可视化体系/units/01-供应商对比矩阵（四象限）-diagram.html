<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商对比矩阵 · Quadrant</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf7f2;
      font-family: 'Geist', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 760px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    .diagram-wrap {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      padding: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Quadrant &middot; Supplier Matrix</p>
    <h1>供应商对比矩阵</h1>
    <div class="diagram-wrap">
      <svg viewBox="0 0 680 548" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- Quadrant backgrounds -->
        <!-- Top-right: 标杆型 -->
        <rect x="336" y="24" width="332" height="244" fill="rgba(28,25,23,0.02)"/>
        <!-- Top-left: 潜力型 -->
        <rect x="24" y="24" width="312" height="244" fill="rgba(28,25,23,0.02)"/>
        <!-- Bottom-left: 问题型 (accent tint) -->
        <rect x="24" y="268" width="312" height="240" fill="rgba(181,82,58,0.08)"/>
        <!-- Bottom-right: 波动型 -->
        <rect x="336" y="268" width="332" height="240" fill="rgba(28,25,23,0.02)"/>

        <!-- Axis lines -->
        <line x1="24" y1="268" x2="668" y2="268" stroke="#1c1917" stroke-width="1"/>
        <line x1="336" y1="24" x2="336" y2="508" stroke="#1c1917" stroke-width="1"/>

        <!-- Axis end labels -->
        <!-- Y-axis top -->
        <text x="12" y="44" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em" text-transform="uppercase">HIGH</text>
        <!-- Y-axis bottom -->
        <text x="12" y="500" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">LOW</text>

        <!-- X-axis left end -->
        <text x="24" y="532" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">LOW</text>
        <!-- X-axis right end -->
        <text x="640" y="532" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">HIGH</text>

        <!-- Axis name labels -->
        <text x="336" y="540" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.06em" text-anchor="middle">头部差距</text>
        <text x="8" y="268" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.06em" text-anchor="middle" transform="rotate(-90, 8, 268)">自身峰值比</text>

        <!-- Quadrant labels -->
        <!-- 标杆型 (top-right) -->
        <rect x="484" y="32" width="72" height="20" rx="4" fill="rgba(28,25,23,0.04)"/>
        <text x="520" y="46" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">标杆型</text>

        <!-- 潜力型 (top-left) -->
        <rect x="148" y="32" width="72" height="20" rx="4" fill="rgba(28,25,23,0.04)"/>
        <text x="184" y="46" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">潜力型</text>

        <!-- 波动型 (bottom-right) -->
        <rect x="484" y="480" width="72" height="20" rx="4" fill="rgba(28,25,23,0.04)"/>
        <text x="520" y="494" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">波动型</text>

        <!-- 问题型 (bottom-left) accent -->
        <rect x="148" y="480" width="72" height="20" rx="4" fill="rgba(181,82,58,0.10)"/>
        <text x="184" y="494" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">问题型</text>

        <!-- Supplier dots -->
        <!-- 毅航 — 标杆型 (top-right) — r=5 -->
        <circle cx="544" cy="108" r="5" fill="#faf7f2" stroke="#1c1917" stroke-width="1.2"/>
        <text x="544" y="96" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">毅航</text>
        <text x="556" y="108" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">92%</text>

        <!-- 毛毛虫 — 标杆型 -->
        <circle cx="476" cy="152" r="5" fill="#faf7f2" stroke="#1c1917" stroke-width="1.2"/>
        <text x="476" y="140" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">毛毛虫</text>
        <text x="488" y="152" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">88%</text>

        <!-- 广达 — 潜力型 (top-left) -->
        <circle cx="200" cy="128" r="5" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="200" y="116" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">广达</text>
        <text x="212" y="128" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">85%</text>

        <!-- 伽玛 — 潜力型 -->
        <circle cx="268" cy="100" r="5" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="268" y="88" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">伽玛</text>
        <text x="280" y="100" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">82%</text>

        <!-- 赛维斯 — 波动型 (bottom-right) -->
        <circle cx="508" cy="376" r="5" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="508" y="364" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">赛维斯</text>
        <text x="520" y="376" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">78%</text>

        <!-- 华啸 — 问题型 (bottom-left) accent dot -->
        <circle cx="208" cy="400" r="5" fill="#b5523a" stroke="#1c1917" stroke-width="1.2"/>
        <text x="208" y="388" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">华啸</text>
        <text x="220" y="400" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace">58%</text>

        <!-- 岐力 — 问题型 -->
        <circle cx="148" cy="432" r="5" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="148" y="420" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">岐力</text>
        <text x="160" y="432" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">62%</text>

        <!-- Legend strip -->
        <line x1="24" y1="516" x2="656" y2="516" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="536" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">LEGEND</text>

        <circle cx="88" cy="540" r="4" fill="#faf7f2" stroke="#1c1917" stroke-width="1.2"/>
        <text x="100" y="544" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">标杆/潜力</text>

        <circle cx="180" cy="540" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="192" y="544" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">稳定/波动</text>

        <circle cx="272" cy="540" r="4" fill="#b5523a" stroke="#1c1917" stroke-width="1.2"/>
        <text x="284" y="544" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">问题型 (focus)</text>

        <text x="420" y="544" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">点大小 = 产能规模</text>
      </svg>
    </div>
  </div>
</body>
</html>
