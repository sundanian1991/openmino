<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据收集清单 · Nested</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12); --rule-solid: rgba(120,113,108,0.25);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .frame { max-width: 680px; width: 100%; }
    .eyebrow { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem; }
    h1 { font-family: var(--serif); font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem; }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Nested · Data Collection</p>
    <h1>数据收集清单</h1>

    <svg viewBox="0 0 680 548" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== OUTER CONTAINER ===== -->
      <rect x="40" y="40" width="600" height="464" rx="8" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>

      <!-- Outer header -->
      <text x="64" y="68" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600">月度数据收集（5项必交）</text>
      <text x="64" y="84" fill="#57534e" font-size="9" font-family="var(--mono)">截止：每月2日 12:00</text>

      <!-- ===== LEVEL 1: 必交数据 ===== -->
      <rect x="56" y="96" width="568" height="160" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="80" y="120" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600">必交数据</text>

      <!-- Level 2 items -->
      <rect x="72" y="128" width="536" height="28" rx="6" fill="#faf7f2" stroke="var(--rule)" stroke-width="0.8"/>
      <circle cx="88" cy="142" r="4" fill="none" stroke="#b5523a" stroke-width="1.5"/>
      <text x="100" y="146" fill="#1c1917" font-size="10" font-family="var(--sans)" font-weight="600">当月产能（万）</text>
      <text x="580" y="146" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="end">月度汇总</text>

      <rect x="72" y="160" width="536" height="28" rx="6" fill="#faf7f2" stroke="var(--rule)" stroke-width="0.8"/>
      <circle cx="88" cy="174" r="4" fill="none" stroke="#b5523a" stroke-width="1.5"/>
      <text x="100" y="178" fill="#1c1917" font-size="10" font-family="var(--sans)" font-weight="600">当月人效（万/人）</text>
      <text x="580" y="178" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="end">月度汇总</text>

      <rect x="72" y="192" width="536" height="28" rx="6" fill="#faf7f2" stroke="var(--rule)" stroke-width="0.8"/>
      <circle cx="88" cy="206" r="4" fill="none" stroke="#b5523a" stroke-width="1.5"/>
      <text x="100" y="210" fill="#1c1917" font-size="10" font-family="var(--sans)" font-weight="600">质量合规率（%）</text>
      <text x="580" y="210" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="end">质检报告</text>

      <rect x="72" y="224" width="536" height="28" rx="6" fill="#faf7f2" stroke="var(--rule)" stroke-width="0.8"/>
      <circle cx="88" cy="238" r="4" fill="none" stroke="#b5523a" stroke-width="1.5"/>
      <text x="100" y="242" fill="#1c1917" font-size="10" font-family="var(--sans)" font-weight="600">人力数据（人数/流失）</text>
      <text x="580" y="242" fill="#57534e" font-size="9" font-family="var(--mono)" text-anchor="end">HR系统</text>

      <!-- ===== LEVEL 1: 提交状态 ===== -->
      <rect x="56" y="268" width="280" height="104" rx="8" fill="rgba(143,155,127,0.08)" stroke="#8f9b7f" stroke-width="1"/>
      <text x="76" y="292" fill="#8f9b7f" font-size="11" font-family="var(--sans)" font-weight="600">已提交（5家）</text>

      <text x="76" y="314" fill="#1c1917" font-size="10" font-family="var(--sans)">✓ 毅航  ✓ 毛毛虫  ✓ 广达</text>
      <text x="76" y="334" fill="#1c1917" font-size="10" font-family="var(--sans)">✓ 伽玛  ✓ 赛维斯</text>

      <!-- LEVEL 1: 未提交 ===== -->
      <rect x="348" y="268" width="292" height="104" rx="8" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="368" y="292" fill="#b5523a" font-size="11" font-family="var(--sans)" font-weight="600">未提交（2家）</text>

      <text x="368" y="314" fill="#1c1917" font-size="10" font-family="var(--sans)">○ 华啸  ○ 岐力</text>
      <text x="368" y="334" fill="#57534e" font-size="9" font-family="var(--mono)">→ D2 15:00 电话催办</text>
      <text x="368" y="350" fill="#57534e" font-size="9" font-family="var(--mono)">→ D2 18:00 二次催办</text>

      <!-- ===== LEVEL 1: 质量要求 ===== -->
      <rect x="56" y="384" width="568" height="56" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="80" y="408" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600">质量要求</text>
      <text x="80" y="428" fill="#57534e" font-size="10" font-family="var(--sans)">准确 · 及时 · 完整 · 异常标注</text>

      <!-- ===== LEVEL 1: 催办流程 ===== -->
      <rect x="56" y="448" width="568" height="44" rx="8" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="80" y="474" fill="#1c1917" font-size="11" font-family="var(--sans)" font-weight="600">催办流程</text>
      <text x="280" y="474" fill="#57534e" font-size="10" font-family="var(--sans)">D2 15:00 → D2 18:00 → D2 20:00 上报军哥</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="528" x2="640" y2="528" stroke="var(--rule)" stroke-width="0.8"/>
      <circle cx="80" cy="520" r="4" fill="none" stroke="#b5523a" stroke-width="1.5"/>
      <text x="92" y="523" fill="#57534e" font-size="8.5" font-family="var(--sans)">待提交项</text>
      <text x="180" y="523" fill="#57534e" font-size="8.5" font-family="var(--sans)">✓ 已提交</text>
      <rect x="268" y="514" width="12" height="12" rx="2" fill="rgba(143,155,127,0.08)" stroke="#8f9b7f" stroke-width="1"/>
      <text x="288" y="523" fill="#57534e" font-size="8.5" font-family="var(--sans)">已提交区</text>
    </svg>
  </div>
</body>
</html>
