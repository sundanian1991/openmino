<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排名×人效交叉矩阵 · Quadrant</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf7f2;
      font-family: 'Geist', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 760px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    .diagram-wrap {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      padding: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Quadrant &middot; Trend Analysis</p>
    <h1>排名 × 人效交叉矩阵</h1>
    <div class="diagram-wrap">
      <svg viewBox="0 0 680 592" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- Quadrant backgrounds -->
        <!-- Top-right: 显性进步 -->
        <rect x="336" y="24" width="332" height="240" fill="rgba(28,25,23,0.03)"/>
        <!-- Top-left: 隐性进步 -->
        <rect x="24" y="24" width="312" height="240" fill="rgba(28,25,23,0.02)"/>
        <!-- Bottom-left: 隐性退步 (accent) -->
        <rect x="24" y="264" width="312" height="244" fill="rgba(181,82,58,0.08)"/>
        <!-- Bottom-right: 显性退步 -->
        <rect x="336" y="264" width="332" height="244" fill="rgba(181,82,58,0.04)"/>

        <!-- Axis lines -->
        <line x1="24" y1="264" x2="668" y2="264" stroke="#1c1917" stroke-width="1"/>
        <line x1="336" y1="24" x2="336" y2="508" stroke="#1c1917" stroke-width="1"/>

        <!-- Axis end labels -->
        <!-- Y-axis top: 排名上升 -->
        <text x="12" y="44" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">RANK UP</text>
        <!-- Y-axis bottom: 排名下降 -->
        <text x="12" y="500" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">RANK DN</text>
        <!-- X-axis left: 人效下降 -->
        <text x="24" y="536" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">EFF DN</text>
        <!-- X-axis right: 人效上升 -->
        <text x="620" y="536" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">EFF UP</text>

        <!-- Axis names -->
        <text x="336" y="544" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.06em" text-anchor="middle">人效变化</text>
        <text x="4" y="264" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.06em" text-anchor="middle" transform="rotate(-90, 4, 264)">排名变化</text>

        <!-- Quadrant labels with sub-labels -->
        <!-- 显性进步 (top-right) -->
        <rect x="448" y="36" width="88" height="20" rx="4" fill="rgba(28,25,23,0.04)"/>
        <text x="492" y="50" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">显性进步</text>
        <text x="492" y="68" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">人效 UP + 排名 UP</text>

        <!-- 隐性进步 (top-left) -->
        <rect x="124" y="36" width="88" height="20" rx="4" fill="rgba(28,25,23,0.04)"/>
        <text x="168" y="50" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">隐性进步</text>
        <text x="168" y="68" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">人效 UP + 排名 &rarr;</text>

        <!-- 显性退步 (bottom-right) -->
        <rect x="448" y="476" width="88" height="20" rx="4" fill="rgba(28,25,23,0.04)"/>
        <text x="492" y="490" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">显性退步</text>
        <text x="492" y="504" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">人效 DN + 排名 DN</text>

        <!-- 隐性退步 (bottom-left) accent -->
        <rect x="124" y="476" width="88" height="20" rx="4" fill="rgba(181,82,58,0.12)"/>
        <text x="168" y="490" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">隐性退步</text>
        <text x="168" y="504" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">人效 DN + 排名 &rarr;</text>

        <!-- Supplier dots -->
        <!-- 毅航 — 显性进步 (top-right) -->
        <circle cx="488" cy="132" r="4" fill="#faf7f2" stroke="#1c1917" stroke-width="1.2"/>
        <text x="488" y="120" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">毅航</text>
        <text x="500" y="132" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">+12% +2</text>

        <!-- 毛毛虫 — 显性进步 -->
        <circle cx="544" cy="168" r="4" fill="#faf7f2" stroke="#1c1917" stroke-width="1.2"/>
        <text x="544" y="156" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">毛毛虫</text>
        <text x="556" y="168" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">+8% +1</text>

        <!-- 伽玛 — 隐性进步 (top-left) -->
        <circle cx="180" cy="148" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="180" y="136" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">伽玛</text>
        <text x="192" y="148" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">+8% &rarr;</text>

        <!-- 赛维斯 — 隐性进步 -->
        <circle cx="240" cy="184" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="240" y="172" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">赛维斯</text>
        <text x="252" y="184" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">+5% &rarr;</text>

        <!-- 翰锐 — 隐性退步 (bottom-left) accent -->
        <circle cx="180" cy="372" r="4" fill="#b5523a" stroke="#1c1917" stroke-width="1.2"/>
        <text x="180" y="360" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">翰锐</text>
        <text x="192" y="372" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace">-10% &rarr;</text>

        <!-- 广达 — 隐性退步 -->
        <circle cx="240" cy="408" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="240" y="396" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">广达</text>
        <text x="252" y="408" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">-5% &rarr;</text>

        <!-- 岐力 — 显性退步 (bottom-right) -->
        <circle cx="488" cy="388" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="488" y="376" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">岐力</text>
        <text x="500" y="388" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">-8% -3</text>

        <!-- 华啸 — 显性退步 -->
        <circle cx="544" cy="424" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="544" y="412" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">华啸</text>
        <text x="556" y="424" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">-12% -4</text>

        <!-- Insight bar -->
        <rect x="24" y="552" width="644" height="24" rx="4" fill="rgba(181,82,58,0.06)"/>
        <text x="44" y="568" fill="#57534e" font-size="8" font-family="'Geist', sans-serif" letter-spacing="0.02em">隐性退步最危险：表面排名未降，实际人效在下滑。翰锐、广达需立即约谈。</text>

        <!-- Legend strip -->
        <line x1="24" y1="520" x2="656" y2="520" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="544" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">LEGEND</text>

        <circle cx="88" cy="540" r="4" fill="#faf7f2" stroke="#1c1917" stroke-width="1.2"/>
        <text x="100" y="544" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">进步型</text>

        <circle cx="160" cy="540" r="4" fill="#faf7f2" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="172" y="544" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">显性退步</text>

        <circle cx="244" cy="540" r="4" fill="#b5523a" stroke="#1c1917" stroke-width="1.2"/>
        <text x="256" y="544" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">隐性退步 (focus)</text>
      </svg>
    </div>
  </div>
</body>
</html>
