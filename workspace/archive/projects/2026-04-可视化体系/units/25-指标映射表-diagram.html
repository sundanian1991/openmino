<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指标映射表 · ER</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 24px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">ER Diagram · Data Contract</p>
    <h1>指标映射表</h1>

    <svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== ER ENTITIES ===== -->

      <!-- Entity 1: 业务指标 (focal) -->
      <rect x="24" y="60" width="184" height="200" rx="6" fill="#faf7f2"/>
      <rect x="24" y="60" width="184" height="200" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="32" y="68" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="46" y="77" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">KEY</text>
      <text x="116" y="96" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">业务指标</text>
      <text x="116" y="112" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">BUSINESS METRIC</text>

      <line x1="40" y1="124" x2="192" y2="124" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <text x="40" y="144" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace"># 业绩达成率</text>
      <text x="40" y="164" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace"># FCI 综合指数</text>
      <text x="40" y="184" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace"># 人均产能</text>
      <text x="40" y="204" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace"># 质量得分</text>
      <text x="40" y="224" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace"># 峰值比</text>
      <text x="40" y="244" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace"># 人员流失率</text>

      <!-- Entity 2: 数据字段 -->
      <rect x="248" y="60" width="184" height="200" rx="6" fill="#faf7f2"/>
      <rect x="248" y="60" width="184" height="200" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="256" y="68" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="270" y="77" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ATTR</text>
      <text x="340" y="96" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">数据字段</text>
      <text x="340" y="112" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">DATA FIELD</text>

      <line x1="264" y1="124" x2="416" y2="124" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <text x="264" y="144" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">achievement_rate</text>
      <text x="264" y="164" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">fci_score</text>
      <text x="264" y="184" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">per_capita_output</text>
      <text x="264" y="204" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">quality_pass_rate</text>
      <text x="264" y="224" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">peak_ratio</text>
      <text x="264" y="244" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">attrition_rate</text>

      <!-- Entity 3: 来源系统 -->
      <rect x="472" y="60" width="184" height="200" rx="6" fill="#faf7f2"/>
      <rect x="472" y="60" width="184" height="200" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <rect x="480" y="68" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="494" y="77" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="564" y="96" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">来源系统</text>
      <text x="564" y="112" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">SOURCE SYSTEM</text>

      <line x1="488" y1="124" x2="640" y2="124" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <text x="488" y="144" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">CRM 系统</text>
      <text x="488" y="164" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">财务系统 + HR</text>
      <text x="488" y="184" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">HR 系统 + CRM</text>
      <text x="488" y="204" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">质检系统</text>
      <text x="488" y="224" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">CRM + HR</text>
      <text x="488" y="244" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">HR 系统</text>

      <!-- Relationship lines with cardinality -->
      <line x1="208" y1="140" x2="248" y2="140" stroke="#57534e" stroke-width="1"/>
      <text x="216" y="132" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">1</text>
      <text x="240" y="132" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">1</text>

      <line x1="208" y1="160" x2="248" y2="160" stroke="#57534e" stroke-width="1"/>
      <line x1="208" y1="180" x2="248" y2="180" stroke="#57534e" stroke-width="1"/>
      <line x1="208" y1="200" x2="248" y2="200" stroke="#57534e" stroke-width="1"/>
      <line x1="208" y1="220" x2="248" y2="220" stroke="#57534e" stroke-width="1"/>
      <line x1="208" y1="240" x2="248" y2="240" stroke="#57534e" stroke-width="1"/>

      <line x1="432" y1="140" x2="472" y2="140" stroke="#57534e" stroke-width="1"/>
      <line x1="432" y1="160" x2="472" y2="160" stroke="#57534e" stroke-width="1"/>
      <line x1="432" y1="180" x2="472" y2="180" stroke="#57534e" stroke-width="1"/>
      <line x1="432" y1="200" x2="472" y2="200" stroke="#57534e" stroke-width="1"/>
      <line x1="432" y1="220" x2="472" y2="220" stroke="#57534e" stroke-width="1"/>
      <line x1="432" y1="240" x2="472" y2="240" stroke="#57534e" stroke-width="1"/>

      <!-- Entity 4: 计算规则 (bottom, full width) -->
      <rect x="24" y="300" width="632" height="200" rx="6" fill="#faf7f2"/>
      <rect x="24" y="300" width="632" height="200" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="32" y="308" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="46" y="317" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">RULE</text>
      <text x="340" y="336" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">计算规则</text>
      <text x="340" y="352" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">CALCULATION RULE</text>

      <line x1="40" y1="364" x2="640" y2="364" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <text x="40" y="384" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">业绩达成率  →  SUM(当月业绩) / SUM(目标) × 100%</text>
      <text x="40" y="404" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">FCI          →  0.3×业绩 + 0.3×人效 + 0.2×质量 + 0.2×成本</text>
      <text x="40" y="424" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">人均产能     →  月度总产出 ÷ 当月平均人力</text>
      <text x="40" y="444" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">质量得分     →  合格单量 / 总抽检单量 × 100%</text>
      <text x="40" y="464" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">峰值比       →  峰值日产出 ÷ 日均产出 × 100%</text>
      <text x="40" y="484" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">流失率       →  (离职人数 ÷ 期初人数) × 100%</text>

      <!-- FK arrows from calc rules back to metrics -->
      <path d="M 340 300 L 340 268" fill="none" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="316" y="276" width="48" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="285" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">MAPS</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="24" y1="532" x2="656" y2="532" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="24" y="548" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="24" y="560" width="14" height="10" rx="2" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="44" y="568" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Entity</text>

      <rect x="100" y="560" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="120" y="568" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Key entity</text>

      <rect x="212" y="560" width="14" height="10" rx="2" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="232" y="568" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">External</text>

      <line x1="304" y1="566" x2="332" y2="566" stroke="#57534e" stroke-width="1"/>
      <text x="340" y="568" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">1:1 mapping</text>

      <!-- Editorial aside (moved above legend) -->
      <text x="500" y="512" fill="#1c1917" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">业务与技术的数据契约</text>
    </svg>
  </div>
</body>
</html>
