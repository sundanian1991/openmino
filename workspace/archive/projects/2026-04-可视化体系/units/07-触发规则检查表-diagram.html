<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>触发规则检查表</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Decision Logic</p>
    <h1>触发规则检查表</h1>

    <svg viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#f2ede4" rx="8" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6" rx="8"/>

      <!-- ===== ARROWS (drawn first, behind nodes) ===== -->

      <!-- Start → R1 -->
      <line x1="340" y1="52" x2="340" y2="80" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- R1 YES → R1 triggered -->
      <line x1="440" y1="108" x2="500" y2="108" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>
      <!-- Arrow label bg -->
      <rect x="456" y="96" width="28" height="12" rx="2" fill="#f2ede4"/>
      <text x="470" y="105" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">YES</text>

      <!-- R1 NO → R2 -->
      <line x1="340" y1="136" x2="340" y2="168" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="346" y="144" width="24" height="12" rx="2" fill="#f2ede4"/>
      <text x="358" y="153" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">NO</text>

      <!-- R2 YES → R2 triggered -->
      <line x1="440" y1="196" x2="500" y2="196" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>
      <rect x="456" y="184" width="28" height="12" rx="2" fill="#f2ede4"/>
      <text x="470" y="193" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">YES</text>

      <!-- R2 NO → R3 -->
      <line x1="340" y1="224" x2="340" y2="256" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="346" y="232" width="24" height="12" rx="2" fill="#f2ede4"/>
      <text x="358" y="241" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">NO</text>

      <!-- R3 NO → R4 -->
      <line x1="340" y1="312" x2="340" y2="344" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="346" y="320" width="24" height="12" rx="2" fill="#f2ede4"/>
      <text x="358" y="329" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">NO</text>

      <!-- R4 NO → All pass -->
      <line x1="340" y1="400" x2="340" y2="432" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="346" y="408" width="24" height="12" rx="2" fill="#f2ede4"/>
      <text x="358" y="417" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">NO</text>

      <!-- All pass → End: 无需行动 -->
      <line x1="340" y1="476" x2="340" y2="508" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ===== NODES ===== -->

      <!-- START (oval) -->
      <rect x="296" y="24" width="88" height="28" rx="14" fill="#faf7f2" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
      <text x="340" y="42" fill="#1c1917" font-size="10" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">月度检查</text>

      <!-- R1: 峰值比 < 70% (diamond → rotated rect) -->
      <rect x="240" y="80" width="200" height="56" rx="6" fill="#faf7f2" stroke="rgba(181,82,58,0.40)" stroke-width="1"/>
      <!-- Node background to cover arrow -->
      <rect x="240" y="80" width="200" height="56" rx="6" fill="#faf7f2"/>
      <rect x="240" y="80" width="200" height="56" rx="6" fill="rgba(181,82,58,0.06)" stroke="rgba(181,82,58,0.40)" stroke-width="1"/>
      <text x="252" y="100" fill="#b5523a" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.08em">R1</text>
      <text x="340" y="120" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">峰值比 &lt; 70%?</text>

      <!-- R1 triggered result -->
      <rect x="500" y="88" width="152" height="40" rx="6" fill="#faf7f2"/>
      <rect x="500" y="88" width="152" height="40" rx="6" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.30)" stroke-width="0.8"/>
      <text x="576" y="104" fill="#b5523a" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">华啸 58%, 岐力 62%</text>
      <text x="576" y="120" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">TRIGGERED</text>

      <!-- R2: 排名下降 >= 3位 -->
      <rect x="240" y="168" width="200" height="56" rx="6" fill="#faf7f2" stroke="rgba(181,82,58,0.40)" stroke-width="1"/>
      <rect x="240" y="168" width="200" height="56" rx="6" fill="#faf7f2"/>
      <rect x="240" y="168" width="200" height="56" rx="6" fill="rgba(181,82,58,0.06)" stroke="rgba(181,82,58,0.40)" stroke-width="1"/>
      <text x="252" y="188" fill="#b5523a" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.08em">R2</text>
      <text x="340" y="208" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">排名下降 3位?</text>

      <!-- R2 triggered result -->
      <rect x="500" y="176" width="152" height="40" rx="6" fill="#faf7f2"/>
      <rect x="500" y="176" width="152" height="40" rx="6" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.30)" stroke-width="0.8"/>
      <text x="576" y="192" fill="#b5523a" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">翰锐 #8 → #11</text>
      <text x="576" y="208" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">TRIGGERED</text>

      <!-- R3: FCI < 80% — passed -->
      <rect x="240" y="256" width="200" height="56" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
      <text x="252" y="276" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.08em">R3</text>
      <text x="340" y="296" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">FCI &lt; 80%?</text>
      <!-- Passed indicator -->
      <rect x="380" y="264" width="40" height="14" rx="4" fill="rgba(28,25,23,0.04)" stroke="rgba(28,25,23,0.15)" stroke-width="0.8"/>
      <text x="400" y="274" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">PASS</text>

      <!-- R4: 连续2月Bottom3 — passed -->
      <rect x="240" y="344" width="200" height="56" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
      <text x="252" y="364" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.08em">R4</text>
      <text x="340" y="384" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">连续2月Bottom3?</text>
      <!-- Passed indicator -->
      <rect x="380" y="352" width="40" height="14" rx="4" fill="rgba(28,25,23,0.04)" stroke="rgba(28,25,23,0.15)" stroke-width="0.8"/>
      <text x="400" y="362" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">PASS</text>

      <!-- ALL PASS node -->
      <rect x="280" y="432" width="120" height="44" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
      <text x="340" y="452" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">R3, R4</text>
      <text x="340" y="468" fill="#78716c" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">均未触发</text>

      <!-- END (oval) -->
      <rect x="280" y="508" width="120" height="28" rx="14" fill="#faf7f2" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
      <text x="340" y="526" fill="#1c1917" font-size="10" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">生成台账</text>

      <!-- ===== SUMMARY BOX ===== -->
      <rect x="32" y="556" width="616" height="28" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.20)" stroke-width="0.8"/>
      <text x="44" y="574" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif">需行动: 2 个</text>
      <text x="144" y="574" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">华啸、岐力（峰值比）+ 翰锐（排名下降）48h 内启动约谈</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="32" y1="596" x2="648" y2="596" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <rect x="44" y="600" width="12" height="8" rx="2" fill="rgba(181,82,58,0.15)" stroke="rgba(181,82,58,0.40)" stroke-width="0.8"/>
      <text x="64" y="608" fill="#78716c" font-size="7" font-family="'Geist', sans-serif">Triggered</text>

      <rect x="132" y="600" width="12" height="8" rx="2" fill="#faf7f2" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
      <text x="152" y="608" fill="#78716c" font-size="7" font-family="'Geist', sans-serif">Passed</text>

      <line x1="204" y1="604" x2="224" y2="604" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="236" y="608" fill="#78716c" font-size="7" font-family="'Geist', sans-serif">Flow</text>
    </svg>
  </div>
</body>
</html>
