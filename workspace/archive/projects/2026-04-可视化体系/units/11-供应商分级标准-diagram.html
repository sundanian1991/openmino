<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商分级标准</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #faf7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .frame { max-width: 720px; width: 100%; }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 7.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #78716c;
    margin-bottom: 0.375rem;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #1c1917;
    margin-bottom: 1.25rem;
  }
  .diagram-wrap {
    background: #f2ede4;
    border: 1px solid rgba(28,25,23,0.12);
    border-radius: 8px;
    padding: 1px;
  }
  svg { width: 100%; display: block; }
</style>
</head>
<body>
<div class="frame">
  <p class="eyebrow">Supplier Tiering · Pyramid</p>
  <h1>供应商分级标准</h1>
  <div class="diagram-wrap">
    <svg viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== PYRAMID (4 trapezoid layers, center at x=340) ===== -->
      <!-- Pyramid center x=340, width from 480 down to 120 -->

      <!-- Layer S (top) — focal: accent -->
      <polygon points="240,44 440,44 492,120 188,120" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <!-- Paper rect behind text -->
      <rect x="236" y="52" width="208" height="60" rx="2" fill="#faf7f2" fill-opacity="0.9"/>
      <text x="340" y="70" fill="#b5523a" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em" font-weight="500">TIER S</text>
      <text x="340" y="90" fill="#1c1917" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">战略供应商</text>
      <text x="340" y="106" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Top 3 / FCI 90%+ / 份额>15%</text>

      <!-- Layer A -->
      <polygon points="188,124 492,124 532,200 148,200" fill="#faf7f2" stroke="#57534e" stroke-width="1"/>
      <rect x="184" y="132" width="312" height="60" rx="2" fill="#faf7f2" fill-opacity="0.9"/>
      <text x="340" y="150" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em" font-weight="500">TIER A</text>
      <text x="340" y="170" fill="#1c1917" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">核心供应商</text>
      <text x="340" y="186" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Top 3-8 / FCI 80%+ / 份额>8%</text>

      <!-- Layer B -->
      <polygon points="148,204 532,204 564,280 116,280" fill="#faf7f2" stroke="#57534e" stroke-width="1"/>
      <rect x="144" y="212" width="392" height="60" rx="2" fill="#faf7f2" fill-opacity="0.9"/>
      <text x="340" y="230" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em" font-weight="500">TIER B</text>
      <text x="340" y="250" fill="#1c1917" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">常规供应商</text>
      <text x="340" y="266" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Top 8-15 / FCI 70%+ / 份额>3%</text>

      <!-- Layer C (bottom) -->
      <polygon points="116,284 564,284 588,360 92,360" fill="#faf7f2" stroke="#78716c" stroke-width="1"/>
      <rect x="112" y="292" width="456" height="60" rx="2" fill="#faf7f2" fill-opacity="0.9"/>
      <text x="340" y="310" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em" font-weight="500">TIER C</text>
      <text x="340" y="330" fill="#1c1917" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">待观察供应商</text>
      <text x="340" y="346" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Bottom 3 / FCI<70% / 份额<3%</text>

      <!-- ===== SUPPLIER NAMES (right side, aligned to layers) ===== -->
      <text x="600" y="86" fill="#b5523a" font-size="10" font-family="'Geist', sans-serif">毅航 / 毛毛虫</text>
      <text x="600" y="166" fill="#57534e" font-size="10" font-family="'Geist', sans-serif">广达 / 伽玛 / 赛维斯</text>
      <text x="600" y="246" fill="#57534e" font-size="10" font-family="'Geist', sans-serif">翰锐 / 岐力 / 华啸</text>
      <text x="600" y="326" fill="#78716c" font-size="10" font-family="'Geist', sans-serif">--</text>

      <!-- ===== COMMUNICATION FREQUENCY (left side) ===== -->
      <text x="80" y="86" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">月1次深度</text>
      <text x="80" y="166" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">月1次电话</text>
      <text x="80" y="246" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">双月1次</text>
      <text x="80" y="326" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">按需沟通</text>

      <!-- ===== HAIRLINE BETWEEN LAYERS (reinforced) ===== -->
      <line x1="188" y1="120" x2="492" y2="120" stroke="rgba(120,113,108,0.25)" stroke-width="0.5"/>
      <line x1="148" y1="200" x2="532" y2="200" stroke="rgba(120,113,108,0.25)" stroke-width="0.5"/>
      <line x1="116" y1="280" x2="564" y2="280" stroke="rgba(120,113,108,0.25)" stroke-width="0.5"/>

      <!-- ===== LEGEND ===== -->
      <line x1="36" y1="392" x2="644" y2="392" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <polygon points="36,408 60,408 64,424 32,424" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="72" y="420" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">S-tier Focal</text>

      <polygon points="172,408 196,408 200,424 168,424" fill="#faf7f2" stroke="#57534e" stroke-width="1"/>
      <text x="208" y="420" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">A / B / C tier</text>

      <text x="340" y="420" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">每月重评，动态升降级</text>

      <!-- Editorial note -->
      <text x="36" y="460" fill="#78716c" font-size="11" font-family="'Instrument Serif', serif" font-style="italic">优胜劣汰，每月评估，逐级调整。</text>
    </svg>
  </div>
</div>
</body>
</html>
