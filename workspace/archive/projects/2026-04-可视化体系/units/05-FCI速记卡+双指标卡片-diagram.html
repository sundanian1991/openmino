<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCI 速记卡 + 双指标卡片</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Card Layout</p>
    <h1>FCI 速记卡 + 双指标卡片</h1>

    <svg viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#f2ede4" rx="8" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6" rx="8"/>

      <!-- ===== LEFT COLUMN: FCI CHEAT SHEET ===== -->
      <!-- Card background -->
      <rect x="24" y="24" width="304" height="436" rx="6" fill="#faf7f2"/>
      <rect x="24" y="24" width="304" height="436" rx="6" fill="none" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>

      <!-- Tag -->
      <rect x="36" y="36" width="32" height="16" rx="4" fill="rgba(28,25,23,0.06)" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
      <text x="52" y="47" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">REF</text>

      <!-- Card title -->
      <text x="176" y="80" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">FCI 速记卡</text>
      <text x="176" y="96" fill="#78716c" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Financial Composite Index</text>

      <!-- Divider -->
      <line x1="44" y1="112" x2="308" y2="112" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>

      <!-- DEFINITION label -->
      <text x="44" y="132" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">DEFINITION</text>
      <text x="44" y="152" fill="#1c1917" font-size="11" font-family="'Geist', sans-serif">财务综合指标，全面评估供应商</text>
      <text x="44" y="168" fill="#1c1917" font-size="11" font-family="'Geist', sans-serif">经营健康度，避免唯业绩论陷阱。</text>

      <!-- FORMULA label -->
      <text x="44" y="200" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">FORMULA</text>

      <!-- Formula box -->
      <rect x="36" y="212" width="280" height="96" rx="6" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.25)" stroke-width="0.8"/>

      <text x="48" y="236" fill="#1c1917" font-size="10" font-family="'Geist Mono', monospace">FCI = 业绩达标率</text>
      <text x="160" y="236" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist Mono', monospace"> x 40%</text>

      <text x="48" y="256" fill="#1c1917" font-size="10" font-family="'Geist Mono', monospace">    + 毛利率达标率</text>
      <text x="168" y="256" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist Mono', monospace"> x 30%</text>

      <text x="48" y="276" fill="#1c1917" font-size="10" font-family="'Geist Mono', monospace">    + 回款及时率</text>
      <text x="152" y="276" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist Mono', monospace"> x 20%</text>

      <text x="48" y="296" fill="#1c1917" font-size="10" font-family="'Geist Mono', monospace">    + 费用控制率</text>
      <text x="152" y="296" fill="#b5523a" font-size="10" font-weight="600" font-family="'Geist Mono', monospace"> x 10%</text>

      <!-- GRADING label -->
      <text x="44" y="336" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">GRADING</text>

      <!-- Grade row 1: Excellent -->
      <rect x="36" y="348" width="280" height="28" rx="4" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.15)" stroke-width="0.8"/>
      <rect x="44" y="355" width="12" height="12" rx="2" fill="#78716c"/>
      <text x="64" y="366" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">90%+</text>
      <text x="112" y="366" fill="#57534e" font-size="10" font-family="'Geist', sans-serif">优秀（标杆型）</text>

      <!-- Grade row 2: Qualified -->
      <rect x="36" y="384" width="280" height="28" rx="4" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.15)" stroke-width="0.8"/>
      <rect x="44" y="391" width="12" height="12" rx="2" fill="rgba(28,25,23,0.20)"/>
      <text x="64" y="402" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">80-90%</text>
      <text x="120" y="402" fill="#57534e" font-size="10" font-family="'Geist', sans-serif">合格（正常型）</text>

      <!-- Grade row 3: Warning — accent focal -->
      <rect x="36" y="420" width="280" height="28" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.30)" stroke-width="0.8"/>
      <rect x="44" y="427" width="12" height="12" rx="2" fill="#b5523a"/>
      <text x="64" y="438" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">&lt; 80%</text>
      <text x="108" y="438" fill="#b5523a" font-size="10" font-weight="500" font-family="'Geist', sans-serif">预警（问题型）</text>

      <!-- ===== RIGHT COLUMN: DUAL INDICATOR CARDS ===== -->
      <!-- Supplier header -->
      <text x="360" y="48" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif">[毅航] 月度业绩通报</text>

      <!-- Card 1: 业绩达成 -->
      <rect x="352" y="68" width="304" height="120" rx="6" fill="#faf7f2"/>
      <rect x="352" y="68" width="304" height="120" rx="6" fill="none" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>

      <text x="368" y="88" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">PERFORMANCE</text>
      <text x="504" y="132" fill="#1c1917" font-size="28" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">92%</text>

      <!-- Progress bar -->
      <rect x="368" y="148" width="272" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="368" y="148" width="250" height="8" rx="4" fill="#57534e"/>
      <text x="368" y="172" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">目标: 3000万</text>

      <!-- Badge -->
      <rect x="560" y="78" width="56" height="20" rx="4" fill="rgba(28,25,23,0.06)" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
      <text x="588" y="91" fill="#57534e" font-size="8" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">优秀</text>

      <!-- Card 2: FCI Score -->
      <rect x="352" y="204" width="304" height="120" rx="6" fill="#faf7f2"/>
      <rect x="352" y="204" width="304" height="120" rx="6" fill="none" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>

      <text x="368" y="224" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">FCI SCORE</text>
      <text x="504" y="268" fill="#b5523a" font-size="28" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">88%</text>

      <!-- Progress bar -->
      <rect x="368" y="284" width="272" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="368" y="284" width="240" height="8" rx="4" fill="#b5523a"/>
      <!-- Threshold marker at 80% -->
      <line x1="584" y1="280" x2="584" y2="296" stroke="#57534e" stroke-width="1"/>
      <text x="368" y="308" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">合格线: 80%</text>

      <!-- Badge -->
      <rect x="560" y="214" width="56" height="20" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.25)" stroke-width="0.8"/>
      <text x="588" y="227" fill="#b5523a" font-size="8" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">合格</text>

      <!-- ===== ANALYSIS BOX ===== -->
      <rect x="352" y="340" width="304" height="72" rx="6" fill="#faf7f2"/>
      <rect x="352" y="340" width="304" height="72" rx="6" fill="none" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>

      <text x="368" y="360" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">双指标匹配分析</text>
      <text x="368" y="380" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">业绩 92%（优秀）+ FCI 88%（合格）</text>
      <text x="368" y="396" fill="#57534e" font-size="9" font-family="'Instrument Serif', serif" font-style="italic">增收但未完全增利，建议约谈毛利率。</text>

      <!-- ===== EXTRA METRICS ROW ===== -->
      <text x="360" y="444" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">METRICS</text>

      <!-- Rank card -->
      <rect x="352" y="456" width="92" height="48" rx="6" fill="#faf7f2"/>
      <rect x="352" y="456" width="92" height="48" rx="6" fill="none" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      <text x="398" y="476" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">#3</text>
      <text x="398" y="492" fill="#78716c" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">排名</text>

      <!-- Trend card -->
      <rect x="456" y="456" width="92" height="48" rx="6" fill="#faf7f2"/>
      <rect x="456" y="456" width="92" height="48" rx="6" fill="none" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      <text x="502" y="476" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">+1</text>
      <text x="502" y="492" fill="#78716c" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">环比变动</text>

      <!-- Action card -->
      <rect x="560" y="456" width="96" height="48" rx="6" fill="rgba(181,82,58,0.08)"/>
      <rect x="560" y="456" width="96" height="48" rx="6" fill="none" stroke="rgba(181,82,58,0.25)" stroke-width="0.8"/>
      <text x="608" y="476" fill="#b5523a" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">需关注</text>
      <text x="608" y="492" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">ATTENTION</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="24" y1="520" x2="656" y2="520" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <text x="36" y="540" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="88" y="532" width="12" height="8" rx="2" fill="#57534e"/>
      <text x="108" y="540" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Excellent</text>

      <rect x="168" y="532" width="12" height="8" rx="2" fill="#b5523a"/>
      <text x="188" y="540" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Qualified</text>

      <rect x="248" y="532" width="12" height="8" rx="2" fill="rgba(28,25,23,0.20)"/>
      <text x="268" y="540" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Warning</text>
    </svg>
  </div>
</body>
</html>
