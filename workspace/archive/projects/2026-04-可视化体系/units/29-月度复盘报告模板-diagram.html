<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度复盘报告模板 · Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 24px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Layer Stack · Report Structure</p>
    <h1>月度复盘报告模板</h1>

    <svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- Direction indicator -->
      <text x="16" y="80" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em" transform="rotate(-90, 16, 80)">结构 ↓</text>

      <!-- ===== LAYER STACK (5 layers) ===== -->

      <!-- Layer 0: Report Title -->
      <rect x="40" y="48" width="600" height="48" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="48" y="56" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="62" y="65" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">HD</text>
      <text x="340" y="72" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">月度复盘报告 · Monthly Review</text>
      <text x="340" y="88" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">2026-04</text>

      <!-- Hairline separator -->
      <line x1="40" y1="100" x2="640" y2="100" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- Layer 1: 执行摘要 -->
      <rect x="40" y="104" width="600" height="72" rx="0" fill="#faf7f2"/>
      <rect x="40" y="104" width="600" height="72" rx="0" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <rect x="48" y="112" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="62" y="121" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">01</text>
      <text x="92" y="124" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif">执行摘要</text>
      <text x="400" y="124" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">核心结论 · 3 句话</text>

      <!-- Summary content -->
      <text x="92" y="144" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">· 本月整体达成率 92%，超目标 2% · 华啸、岐力连续下滑 · 毅航、毛毛虫保持标杆</text>
      <text x="400" y="164" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">结论先行</text>

      <!-- Hairline separator -->
      <line x1="40" y1="180" x2="640" y2="180" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- Layer 2: 数据概览 -->
      <rect x="40" y="184" width="600" height="72" rx="0" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <rect x="48" y="192" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="62" y="201" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">02</text>
      <text x="92" y="204" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif">数据概览</text>
      <text x="400" y="204" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">关键指标 vs 目标</text>

      <!-- Mini metrics -->
      <text x="92" y="228" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">总产能</text>
      <rect x="148" y="222" width="120" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="148" y="222" width="110" height="8" rx="4" fill="#57534e" opacity="0.5"/>
      <text x="276" y="230" fill="#1c1917" font-size="8" font-family="'Geist Mono', monospace">92%</text>

      <text x="340" y="228" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">平均人效</text>
      <rect x="404" y="222" width="120" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="404" y="222" width="102" height="8" rx="4" fill="#57534e" opacity="0.45"/>
      <text x="532" y="230" fill="#1c1917" font-size="8" font-family="'Geist Mono', monospace">85%</text>

      <text x="92" y="248" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">质量达标</text>
      <rect x="148" y="242" width="120" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="148" y="242" width="118" height="8" rx="4" fill="#57534e" opacity="0.5"/>
      <text x="276" y="250" fill="#1c1917" font-size="8" font-family="'Geist Mono', monospace">98%</text>

      <text x="340" y="248" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">峰值比</text>
      <rect x="404" y="242" width="120" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="404" y="242" width="67" height="8" rx="4" fill="#b5523a" opacity="0.4"/>
      <text x="532" y="250" fill="#b5523a" font-size="8" font-weight="600" font-family="'Geist Mono', monospace">56%</text>

      <!-- Hairline separator -->
      <line x1="40" y1="260" x2="640" y2="260" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- Layer 3: 供应商表现 -->
      <rect x="40" y="264" width="600" height="72" rx="0" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <rect x="48" y="272" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="62" y="281" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">03</text>
      <text x="92" y="284" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif">供应商表现</text>
      <text x="400" y="284" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace">S/A/B/C 分级分布</text>

      <!-- Grade badges -->
      <rect x="92" y="296" width="100" height="24" rx="4" fill="rgba(28,25,23,0.04)" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
      <text x="104" y="312" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">S 级：毅航、毛毛虫</text>

      <rect x="216" y="296" width="100" height="24" rx="4" fill="rgba(28,25,23,0.04)" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
      <text x="228" y="312" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">A 级：广达、伽玛</text>

      <rect x="340" y="296" width="100" height="24" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.30)" stroke-width="0.8"/>
      <text x="352" y="312" fill="#b5523a" font-size="9" font-weight="600" font-family="'Geist', sans-serif">C 级：华啸、岐力</text>

      <text x="92" y="328" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace">关注：华啸连续4月下滑、岐力峰值比58%</text>

      <!-- Hairline separator -->
      <line x1="40" y1="340" x2="640" y2="340" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <!-- Layer 4: 重点问题与行动 (focal) -->
      <rect x="40" y="344" width="600" height="88" rx="0" fill="#faf7f2"/>
      <rect x="40" y="344" width="600" height="88" rx="0" fill="rgba(181,82,58,0.05)" stroke="#b5523a" stroke-width="1"/>
      <rect x="48" y="352" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="62" y="361" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">04</text>
      <text x="92" y="364" fill="#b5523a" font-size="14" font-weight="600" font-family="'Geist', sans-serif">重点问题与行动</text>
      <text x="400" y="364" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace">P0 问题 + 责任分配</text>

      <!-- Problem 1 -->
      <text x="92" y="388" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace">P0 · 华啸峰值比连续 4 月下滑（58%）</text>
      <text x="108" y="404" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">行动：约谈 + 3 周整改（5 月 15 日前达标）· 责任人：张经理</text>

      <!-- Problem 2 -->
      <text x="92" y="420" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace">P0 · 岐力人效下降（隐性退步）</text>
      <text x="108" y="436" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">行动：电话沟通 + 结构诊断 · 责任人：王易人</text>

      <!-- Outer container border -->
      <rect x="40" y="48" width="600" height="384" rx="6" fill="none" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="460" x2="660" y2="460" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="20" y="476" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="484" width="14" height="10" rx="2" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <text x="40" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Report section</text>

      <rect x="148" y="484" width="14" height="10" rx="2" fill="rgba(181,82,58,0.05)" stroke="#b5523a" stroke-width="1"/>
      <text x="168" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Focal section</text>

      <line x1="284" y1="490" x2="312" y2="490" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <text x="320" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Layer boundary</text>

      <!-- Editorial aside -->
      <text x="500" y="448" fill="#1c1917" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">4 章节 · 结论先行 · 行动明确</text>
    </svg>
  </div>
</body>
</html>
