<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 310">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" font-size="15" font-weight="600" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">L1-06 · FCI速记卡</text>
  <text x="340" y="44" font-size="10" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">巡检2分钟内填写，快速记录供应商状态</text>

  <!-- Card -->
  <rect x="140" y="60" width="400" height="230" rx="12" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>

  <text x="160" y="90" font-size="13" font-weight="600" fill="#6b3410" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">FCI 巡检速记卡</text>
  <text x="500" y="90" font-size="10" fill="#c26d3a" font-weight="600" text-anchor="end" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">2分钟内填写</text>

  <line x1="160" y1="100" x2="520" y2="100" stroke="#c26d3a" stroke-width="0.5"/>

  <!-- Row 1: 站点 -->
  <text x="160" y="122" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">站点</text>
  <rect x="220" y="110" width="140" height="18" rx="4" fill="#fff" stroke="#d4a574" stroke-width="1"/>
  <text x="228" y="123" font-size="9" fill="#454240" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">华啸</text>

  <text x="370" y="122" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">日期</text>
  <rect x="415" y="110" width="100" height="18" rx="4" fill="#fff" stroke="#d4a574" stroke-width="1"/>
  <text x="423" y="123" font-size="9" fill="#454240" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">2026-04-15</text>

  <!-- Row 2: 总分 + 趋势 -->
  <text x="160" y="154" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">FCI总分</text>
  <rect x="220" y="142" width="60" height="22" rx="4" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="250" y="158" font-size="12" font-weight="600" fill="#c25030" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">52</text>

  <text x="295" y="154" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">趋势</text>
  <text x="340" y="156" font-size="12" fill="#c25030" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">↓ 下降</text>

  <text x="400" y="154" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">上期</text>
  <text x="440" y="156" font-size="12" fill="#454240" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">68</text>

  <!-- Row 3: 最低分项 -->
  <text x="160" y="188" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">最低分项</text>
  <rect x="230" y="178" width="280" height="18" rx="4" fill="#faeae5" stroke="#c25030" stroke-width="0.5"/>
  <text x="238" y="191" font-size="9" fill="#8b3018" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">出勤率(12/20) · 流失率(15%/月)</text>

  <!-- Row 4: 红色项 -->
  <text x="160" y="220" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">红色信号</text>
  <rect x="230" y="210" width="280" height="18" rx="4" fill="#faeae5" stroke="#c25030" stroke-width="0.5"/>
  <text x="238" y="223" font-size="9" fill="#8b3018" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">出勤&lt;85% · 流失率&gt;10% · 人均GMV连降2月</text>

  <!-- Row 5: 根因一句话 -->
  <text x="160" y="254" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">根因一句话</text>
  <rect x="230" y="244" width="280" height="28" rx="4" fill="#fff" stroke="#d4a574" stroke-width="1"/>
  <text x="238" y="262" font-size="9" fill="#454240" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">管理松弛，人均拨打量下降导致产能不足</text>
</svg>
