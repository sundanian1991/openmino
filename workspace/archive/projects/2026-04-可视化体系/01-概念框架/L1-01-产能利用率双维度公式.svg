<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 220">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" font-size="15" font-weight="600" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">L1-01 · 产能利用率双维度公式</text>
  <text x="340" y="46" font-size="11" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">同一分子，两个分母 → 回答不同的问题</text>

  <!-- Left card: 自身峰值比 -->
  <rect x="40" y="70" width="270" height="130" rx="12" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="60" y="100" font-size="13" font-weight="600" fill="#6b3410" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">自身峰值比</text>
  <text x="60" y="124" font-size="11" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">本月熟手人均GMV ÷ 近6个月熟手峰值</text>
  <text x="60" y="150" font-size="10" fill="#6b3410" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">回答："他自己跟自己比，发挥了几成功力？"</text>
  <text x="60" y="168" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">异常标准：&lt;65% = 内部出现管理/团队问题</text>

  <!-- Center arrow -->
  <line x1="310" y1="135" x2="370" y2="135" stroke="#c26d3a" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="340" y="125" font-size="9" fill="#6b3410" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">同一分子</text>
  <text x="340" y="150" font-size="9" fill="#6b3410" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">两个分母</text>

  <!-- Right card: 头部差距 -->
  <rect x="380" y="70" width="270" height="130" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="400" y="100" font-size="13" font-weight="600" fill="#0e4070" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">头部差距</text>
  <text x="400" y="124" font-size="11" fill="#1a5a90" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">本月熟手人均GMV ÷ 同产线第1名熟手人均</text>
  <text x="400" y="150" font-size="10" fill="#0e4070" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">回答："他跟最好的比，差多少空间？"</text>
  <text x="400" y="168" font-size="10" fill="#1a5a90" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">异常标准：&gt;40% = 跟头部差距大</text>
</svg>
