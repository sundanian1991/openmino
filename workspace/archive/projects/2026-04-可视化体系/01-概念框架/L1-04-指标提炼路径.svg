<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 180">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" font-size="15" font-weight="600" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">L1-04 · 指标提炼路径（三层翻译）</text>

  <!-- Layer 1: Raw Data -->
  <rect x="20" y="45" width="190" height="120" rx="12" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="35" y="70" font-size="12" font-weight="600" fill="#6b3410" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">层1 · 原始数据</text>
  <text x="35" y="92" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">GMV/出勤/转化率/拨打量</text>
  <text x="35" y="108" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">离职人数/质检结果</text>
  <text x="35" y="124" font-size="10" fill="#8b4513" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">容器大、信息多、价值低</text>
  <text x="35" y="148" font-size="9" fill="#c26d3a" font-weight="600" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">数据量大 · 信息密度低</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="105" x2="245" y2="105" stroke="#c26d3a" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="228" y="95" font-size="9" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">结构化</text>

  <!-- Layer 2: Structured Metrics -->
  <rect x="250" y="55" width="180" height="100" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="265" y="80" font-size="12" font-weight="600" fill="#0e4070" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">层2 · 结构化指标</text>
  <text x="265" y="102" font-size="10" fill="#1a5a90" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">排名/趋势/产能利用率</text>
  <text x="265" y="118" font-size="10" fill="#1a5a90" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">主管胜任/数据质量分</text>
  <text x="265" y="140" font-size="9" fill="#3a7ab8" font-weight="600" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">信息浓缩 · 可对标</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="105" x2="465" y2="105" stroke="#3a7ab8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="448" y="95" font-size="9" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">翻译</text>

  <!-- Layer 3: Narrative -->
  <rect x="470" y="65" width="190" height="80" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="485" y="90" font-size="12" font-weight="600" fill="#0f5040" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">层3 · 叙事结论</text>
  <text x="485" y="112" font-size="10" fill="#1a6b50" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">"赛维斯因管理松弛导致</text>
  <text x="485" y="128" font-size="10" fill="#1a6b50" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">人均下降27%，需约谈"</text>
  <text x="485" y="144" font-size="9" fill="#2e8b6e" font-weight="600" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">容器小 · 信息最精</text>
</svg>
