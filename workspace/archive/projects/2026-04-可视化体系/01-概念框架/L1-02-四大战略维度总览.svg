<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" font-size="15" font-weight="600" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">L1-02 · 四大战略维度总览</text>

  <!-- Center -->
  <rect x="260" y="110" width="160" height="60" rx="12" fill="#454240" stroke="#2e2c2a" stroke-width="1.5"/>
  <text x="340" y="136" font-size="14" font-weight="600" fill="#f2f0eb" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">供应商管理</text>
  <text x="340" y="156" font-size="10" fill="#d6d2c9" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">不可替代性</text>

  <!-- Top: 合规红线 -->
  <line x1="340" y1="110" x2="340" y2="60" stroke="#c25030" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="250" y="30" width="180" height="32" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="340" y="50" font-size="12" font-weight="600" fill="#6b2010" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">合规红线（生存）</text>

  <!-- Left: 运营效率 -->
  <line x1="260" y1="140" x2="140" y2="140" stroke="#c26d3a" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="30" y="120" width="110" height="36" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="85" y="142" font-size="12" font-weight="600" fill="#6b3410" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">运营效率</text>
  <text x="85" y="160" font-size="9" fill="#8b4513" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">（利润）</text>

  <!-- Right: 组织治理 -->
  <line x1="420" y1="140" x2="540" y2="140" stroke="#2e8b6e" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="540" y="120" width="110" height="36" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="595" y="142" font-size="12" font-weight="600" fill="#0f5040" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">组织治理</text>
  <text x="595" y="160" font-size="9" fill="#1a6b50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">（稳定性）</text>

  <!-- Bottom: 风险控制 -->
  <line x1="340" y1="170" x2="340" y2="220" stroke="#b88018" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="250" y="225" width="180" height="32" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="340" y="245" font-size="12" font-weight="600" fill="#6a4005" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">风险控制（连续性）</text>

  <!-- Sub-branches -->
  <text x="85" y="200" font-size="9" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">人均GMV / 转化率 / 产能利用率</text>
  <text x="595" y="200" font-size="9" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">流失率 / 主管胜任 / 整改执行力</text>
  <text x="340" y="280" font-size="9" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">数据质量 / 依赖度 / 替代方案 / 应急</text>
  <text x="340" y="90" font-size="9" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">诚信 / 质检 / 合规 / 红线</text>
</svg>
