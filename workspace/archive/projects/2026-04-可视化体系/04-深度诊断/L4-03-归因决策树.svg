<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 680">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:14px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="680" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="32" class="f t" fill="#454240">L4-03 归因决策树 — 四步诊断流程</text>

<!-- Layer 0: Root -->
<g transform="translate(190,52)">
<rect width="300" height="36" rx="8" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
<text x="150" y="23" class="f b" fill="#454240" text-anchor="middle">某供应商 GMV 在下滑</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="88" x2="340" y2="108" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="350" y="102" class="f s" fill="#857d74">第一步</text>

<!-- Layer 1: 自身峰值比判断 -->
<g transform="translate(20,118)">
<rect width="640" height="24" rx="6" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
<text x="12" y="17" class="f b" fill="#0e4070">层1：自身峰值比判断 — 是他自己没发挥好，还是产线整体不行？</text>
</g>

<!-- Three branches -->
<!-- Branch 1: Internal -->
<g transform="translate(16,158)">
<line x1="324" y1="-16" x2="12" y2="8" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="52" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#6b2010">自身峰值比&lt;65%</text>
<text x="10" y="36" class="f s" fill="#454240">同产线其他正常 → 内部问题</text>
<text x="10" y="48" class="f s" fill="#6b2010">→ 进入第二步</text>
</g>

<!-- Branch 2: Line problem -->
<g transform="translate(240,158)">
<line x1="100" y1="-16" x2="100" y2="8" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="52" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#0f5040">自身峰值比正常</text>
<text x="10" y="36" class="f s" fill="#454240">同产线也在降 → 产线/名单问题</text>
<text x="10" y="48" class="f s" fill="#0f5040">→ 反馈策略组</text>
</g>

<!-- Branch 3: Mixed -->
<g transform="translate(464,158)">
<line x1="-124" y1="-16" x2="176" y2="8" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="52" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#6a4005">自身峰值比&lt;65%</text>
<text x="10" y="36" class="f s" fill="#454240">同产线也在降 → 混合问题</text>
<text x="10" y="48" class="f s" fill="#6a4005">→ 进入第二步</text>
</g>

<!-- Arrow down to Layer 2 -->
<line x1="340" y1="210" x2="340" y2="230" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="350" y="224" class="f s" fill="#857d74">第二步</text>

<!-- Layer 2: 主管胜任评估 -->
<g transform="translate(20,238)">
<rect width="640" height="24" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="12" y="17" class="f b" fill="#0f5040">层2：主管胜任评估 — 是管理能力问题还是外部因素？</text>
</g>

<!-- Three branches -->
<g transform="translate(16,278)">
<line x1="324" y1="-16" x2="12" y2="8" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="52" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#6b2010">≤2项达标</text>
<text x="10" y="36" class="f s" fill="#454240">管理能力问题</text>
<text x="10" y="48" class="f s" fill="#6b2010">→ 约谈重点谈管理</text>
</g>

<g transform="translate(240,278)">
<line x1="100" y1="-16" x2="100" y2="8" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="52" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#3a4a30">4-5项达标</text>
<text x="10" y="36" class="f s" fill="#454240">不是管理问题</text>
<text x="10" y="48" class="f s" fill="#3a4a30">→ 进入第三步</text>
</g>

<g transform="translate(464,278)">
<line x1="-124" y1="-16" x2="176" y2="8" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="52" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#6a4005">3项达标（中等）</text>
<text x="10" y="36" class="f s" fill="#454240">有短板但不是主因</text>
<text x="10" y="48" class="f s" fill="#6a4005">→ 结合第三步</text>
</g>

<!-- Arrow down to Layer 3 -->
<line x1="340" y1="330" x2="340" y2="350" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="350" y="344" class="f s" fill="#857d74">第三步</text>

<!-- Layer 3: 7指标交叉验证 -->
<g transform="translate(20,358)">
<rect width="640" height="24" rx="6" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
<text x="12" y="17" class="f b" fill="#6b3410">层3：7指标交叉验证 — 定位具体原因</text>
</g>

<!-- Five branches in 2 rows -->
<g transform="translate(10,398)">
<rect width="124" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="8" y="18" class="f b" fill="#0f5040">人力缺口</text>
<text x="8" y="34" class="f s" fill="#454240">出勤率降</text>
<text x="8" y="46" class="f s" fill="#454240">人均拨打量不变</text>
<text x="8" y="62" class="f s" fill="#0f5040">"需要补人"</text>
</g>

<g transform="translate(142,398)">
<rect width="124" height="72" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
<text x="8" y="18" class="f b" fill="#6b2010">管理松弛</text>
<text x="8" y="34" class="f s" fill="#454240">出勤率不变</text>
<text x="8" y="46" class="f s" fill="#454240">人均拨打量降</text>
<text x="8" y="62" class="f s" fill="#6b2010">"管理节奏出问题"</text>
</g>

<g transform="translate(274,398)">
<rect width="124" height="72" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
<text x="8" y="18" class="f b" fill="#0e4070">名单可打性降</text>
<text x="8" y="34" class="f s" fill="#454240">接通率降</text>
<text x="8" y="46" class="f s" fill="#454240">转化率不变</text>
<text x="8" y="62" class="f s" fill="#0e4070">"评估名单质量"</text>
</g>

<g transform="translate(406,398)">
<rect width="124" height="72" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
<text x="8" y="18" class="f b" fill="#6a4005">销售能力降</text>
<text x="8" y="34" class="f s" fill="#454240">接通率不变</text>
<text x="8" y="46" class="f s" fill="#454240">转化率降</text>
<text x="8" y="62" class="f s" fill="#6a4005">"培训或调话术"</text>
</g>

<g transform="translate(538,398)">
<rect width="132" height="72" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
<text x="8" y="18" class="f b" fill="#3a4a30">客户结构变差</text>
<text x="8" y="34" class="f s" fill="#454240">件均下降</text>
<text x="8" y="46" class="f s" fill="#454240">转化量没少</text>
<text x="8" y="62" class="f s" fill="#3a4a30">"大额产出不足"</text>
</g>

<!-- Arrow down to Layer 4 -->
<line x1="340" y1="470" x2="340" y2="490" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="350" y="484" class="f s" fill="#857d74">第四步</text>

<!-- Layer 4: 处理方式 -->
<g transform="translate(20,498)">
<rect width="640" height="24" rx="6" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
<text x="12" y="17" class="f b" fill="#454240">层4：处理方式 — 根据诊断结果决定动作</text>
</g>

<!-- Four branches -->
<g transform="translate(16,538)">
<rect width="152" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#0f5040">观察期（2周）</text>
<text x="10" y="38" class="f s" fill="#454240">首次发现</text>
<text x="10" y="52" class="f s" fill="#454240">主管态度积极</text>
<text x="10" y="66" class="f s" fill="#0f5040">→ 看是否短期波动</text>
</g>

<g transform="translate(176,538)">
<rect width="152" height="72" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#0e4070">整改计划</text>
<text x="10" y="38" class="f s" fill="#454240">连续发现</text>
<text x="10" y="52" class="f s" fill="#454240">主管配合</text>
<text x="10" y="66" class="f s" fill="#0e4070">→ 要求提交整改计划</text>
</g>

<g transform="translate(336,538)">
<rect width="152" height="72" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#6a4005">升级约谈</text>
<text x="10" y="38" class="f s" fill="#454240">连续发现</text>
<text x="10" y="52" class="f s" fill="#454240">主管不配合</text>
<text x="10" y="66" class="f s" fill="#6a4005">→ 约谈更高层级</text>
</g>

<g transform="translate(496,538)">
<rect width="168" height="72" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="10" y="20" class="f b" fill="#6b2010">清退评估</text>
<text x="10" y="38" class="f s" fill="#454240">连续3个月未改善</text>
<text x="10" y="56" class="f s" fill="#6b2010">→ 启动清退评估</text>
<text x="10" y="68" class="f s" fill="#6b2010">（不是降分工，是留或退）</text>
</g>

<!-- Bottom note -->
<text x="20" y="640" class="f s" fill="#857d74">注：每一步都基于上一步的诊断结果，逐层深入直到找到根因。</text>
</svg>