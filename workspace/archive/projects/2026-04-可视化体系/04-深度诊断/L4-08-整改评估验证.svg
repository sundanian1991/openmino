<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="560" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-08 整改评估与验证</text>

<!-- Upper: 整改评估标准 -->
<g transform="translate(16,56)">
<text x="0" y="16" class="f b" fill="#454240">整改计划评估（收到供应商提交的整改计划后）</text>

<!-- 4 dimensions -->
<g transform="translate(0,28)">
<rect width="152" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#0f5040">1. 目标具体</text>
<text x="10" y="40" class="f s" fill="#454240">有明确的量化目标</text>
<text x="10" y="56" class="f s" fill="#454240">不是"提高效率"这种</text>
<text x="10" y="68" class="f s" fill="#2e8b6e">而是"人均70通/天"</text>
</g>

<g transform="translate(160,28)">
<rect width="152" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#0f5040">2. 动作具体</text>
<text x="10" y="40" class="f s" fill="#454240">有可执行的具体动作</text>
<text x="10" y="56" class="f s" fill="#454240">不是"加强管理"这种</text>
<text x="10" y="68" class="f s" fill="#2e8b6e">而是"每日晨会15min"</text>
</g>

<g transform="translate(320,28)">
<rect width="152" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#0f5040">3. 时间节点</text>
<text x="10" y="40" class="f s" fill="#454240">有明确的完成时间</text>
<text x="10" y="56" class="f s" fill="#454240">不是"尽快完成"这种</text>
<text x="10" y="68" class="f s" fill="#2e8b6e">而是"5月15日前"</text>
</g>

<g transform="translate(480,28)">
<rect width="152" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#0f5040">4. 根因对应</text>
<text x="10" y="40" class="f s" fill="#454240">动作和根因对应</text>
<text x="10" y="56" class="f s" fill="#454240">不是"全面培训"这种</text>
<text x="10" y="68" class="f s" fill="#2e8b6e">而是"针对转化率培训"</text>
</g>
</g>

<!-- Separator -->
<line x1="16" y1="180" x2="664" y2="180" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
<text x="340" y="176" class="f s" fill="#857d74" text-anchor="middle">评估通过后进入执行跟踪</text>

<!-- Lower: 整改验证 -->
<g transform="translate(16,196)">
<text x="0" y="16" class="f b" fill="#454240">整改结果验证（执行一段时间后）</text>

<!-- 4 dimensions with 4 results -->
<g transform="translate(0,28)">
<rect width="152" height="96" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#0f5040">目标达成</text>
<text x="10" y="42" class="f s" fill="#454240">承诺的量化目标</text>
<text x="10" y="56" class="f s" fill="#454240">是否达到？</text>
<text x="10" y="74" class="f s" fill="#454240">达成 → 关闭</text>
<text x="10" y="88" class="f s" fill="#c25030">未达 → 进入下一轮</text>
</g>

<g transform="translate(160,28)">
<rect width="152" height="96" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#0e4070">动作执行</text>
<text x="10" y="42" class="f s" fill="#454240">承诺的具体动作</text>
<text x="10" y="56" class="f s" fill="#454240">是否落地了？</text>
<text x="10" y="74" class="f s" fill="#454240">落实 → 看效果</text>
<text x="10" y="88" class="f s" fill="#c25030">未落实 → 退回重写</text>
</g>

<g transform="translate(320,28)">
<rect width="152" height="96" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#6a4005">持续性</text>
<text x="10" y="42" class="f s" fill="#454240">整改效果是</text>
<text x="10" y="56" class="f s" fill="#454240">否持续？</text>
<text x="10" y="74" class="f s" fill="#454240">持续 → 确认有效</text>
<text x="10" y="88" class="f s" fill="#c25030">反弹 → 管理问题</text>
</g>

<g transform="translate(480,28)">
<rect width="152" height="96" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
<text x="10" y="22" class="f b" fill="#3a4a30">根因消除</text>
<text x="10" y="42" class="f s" fill="#454240">根因是否</text>
<text x="10" y="56" class="f s" fill="#454240">被解决？</text>
<text x="10" y="74" class="f s" fill="#454240">已消除 → 解除预警</text>
<text x="10" y="88" class="f s" fill="#c25030">未消除 → 升级处理</text>
</g>
</g>

<!-- 4 result handlers -->
<g transform="translate(16,360)">
<text x="324" y="16" class="f b" fill="#454240" text-anchor="middle">4种结果处理</text>

<g transform="translate(0,28)">
<rect width="156" height="80" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="78" y="24" class="f b" fill="#0f5040" text-anchor="middle">全部达标</text>
<text x="10" y="42" class="f s" fill="#454240">4项全部验证通过</text>
<text x="10" y="60" class="f s" fill="#0f5040">→ 解除预警，正常管理</text>
<text x="10" y="74" class="f s" fill="#0f5040">→ 表扬，记录为正面案例</text>
</g>

<g transform="translate(164,28)">
<rect width="156" height="80" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="78" y="24" class="f b" fill="#0e4070" text-anchor="middle">部分达标</text>
<text x="10" y="42" class="f s" fill="#454240">2-3项通过，1-2项未达</text>
<text x="10" y="60" class="f s" fill="#0e4070">→ 进入下一轮整改</text>
<text x="10" y="74" class="f s" fill="#0e4070">→ 调整计划，加严标准</text>
</g>

<g transform="translate(328,28)">
<rect width="156" height="80" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="78" y="24" class="f b" fill="#6a4005" text-anchor="middle">效果反弹</text>
<text x="10" y="42" class="f s" fill="#454240">短期有效，之后回原样</text>
<text x="10" y="60" class="f s" fill="#6a4005">→ 约谈主管管理能力</text>
<text x="10" y="74" class="f s" fill="#6a4005">→ 持续性问题需严肃对待</text>
</g>

<g transform="translate(492,28)">
<rect width="164" height="80" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="82" y="24" class="f b" fill="#6b2010" text-anchor="middle">未执行/敷衍</text>
<text x="10" y="42" class="f s" fill="#454240">承诺未落地或应付了事</text>
<text x="10" y="60" class="f s" fill="#6b2010">→ 退回重写</text>
<text x="10" y="74" class="f s" fill="#6b2010">→ 连续敷衍 → 启动清退</text>
</g>
</g>

<!-- Bottom note -->
<text x="20" y="476" class="f s" fill="#857d74">关键：整改计划不合格直接"退回重写"，不接受"加强管理"这类模糊表述。</text>
<text x="20" y="496" class="f s" fill="#857d74">整改结果要持续跟踪，不是一次通过就结束了。反弹比不整改更说明管理有问题。</text>
</svg>