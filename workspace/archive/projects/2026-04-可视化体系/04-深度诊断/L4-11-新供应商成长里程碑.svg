<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 400">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="400" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-11 新供应商成长里程碑 — 6个月成长曲线</text>
<text x="20" y="56" class="f s" fill="#857d74">从引入到评判，每个阶段有明确目标和量化检查点</text>

<!-- Timeline line -->
<line x1="80" y1="120" x2="640" y2="120" stroke="#857d74" stroke-width="2"/>

<!-- Phase 1: 引入期 (Month 1-2) -->
<g transform="translate(40,80)">
<circle cx="60" cy="40" r="18" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="2"/>
<text x="60" y="44" class="f b" fill="#0f5040" text-anchor="middle">1</text>
<text x="60" y="78" class="f b" fill="#0f5040" text-anchor="middle">引入期</text>
<text x="60" y="94" class="f s" fill="#857d74" text-anchor="middle">第1-2月</text>

<!-- Card below -->
<rect x="-10" y="106" width="140" height="140" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="0" y="124" class="f b" fill="#0f5040">目标</text>
<text x="0" y="140" class="f s" fill="#454240">熟悉流程，搭建团队</text>
<text x="0" y="158" class="f b" fill="#0f5040">你的动作</text>
<text x="0" y="174" class="f s" fill="#454240">入职培训+系统对接</text>
<text x="0" y="190" class="f s" fill="#454240">配备HRBP扶持</text>
<text x="0" y="208" class="f b" fill="#0f5040">检查点</text>
<text x="0" y="224" class="f s" fill="#454240">出勤率&gt;85%</text>
<text x="0" y="238" class="f s" fill="#454240">团队搭建完成</text>
</g>

<!-- Arrow 1→2 -->
<line x1="190" y1="120" x2="210" y2="120" stroke="#2e8b6e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="200" y="110" class="f s" fill="#2e8b6e" text-anchor="middle">达标</text>

<!-- Phase 2: 成长期 (Month 3-4) -->
<g transform="translate(210,80)">
<circle cx="60" cy="40" r="18" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="2"/>
<text x="60" y="44" class="f b" fill="#0e4070" text-anchor="middle">2</text>
<text x="60" y="78" class="f b" fill="#0e4070" text-anchor="middle">成长期</text>
<text x="60" y="94" class="f s" fill="#857d74" text-anchor="middle">第3-4月</text>

<rect x="-10" y="106" width="140" height="140" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
<text x="0" y="124" class="f b" fill="#0e4070">目标</text>
<text x="0" y="140" class="f s" fill="#454240">产能爬坡，追赶均值</text>
<text x="0" y="158" class="f b" fill="#0e4070">你的动作</text>
<text x="0" y="174" class="f s" fill="#454240">月度对标+标杆配对</text>
<text x="0" y="190" class="f s" fill="#454240">跟踪转化率差距</text>
<text x="0" y="208" class="f b" fill="#0e4070">检查点</text>
<text x="0" y="224" class="f s" fill="#454240">第4月到中位排名</text>
<text x="0" y="238" class="f s" fill="#454240">转化率达老供应商80%</text>
</g>

<!-- Arrow 2→3 -->
<line x1="380" y1="120" x2="400" y2="120" stroke="#3a7ab8" stroke-width="1.5" marker-end="url(#a)"/>
<text x="390" y="110" class="f s" fill="#3a7ab8" text-anchor="middle">达标</text>

<!-- Phase 3: 稳定期 (Month 5-6) -->
<g transform="translate(400,80)">
<circle cx="60" cy="40" r="18" fill="#f0f2ec" stroke="#6f8660" stroke-width="2"/>
<text x="60" y="44" class="f b" fill="#3a4a30" text-anchor="middle">3</text>
<text x="60" y="78" class="f b" fill="#3a4a30" text-anchor="middle">稳定期</text>
<text x="60" y="94" class="f s" fill="#857d74" text-anchor="middle">第5-6月</text>

<rect x="-10" y="106" width="140" height="140" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
<text x="0" y="124" class="f b" fill="#3a4a30">目标</text>
<text x="0" y="140" class="f s" fill="#454240">稳定产出，融入体系</text>
<text x="0" y="158" class="f b" fill="#3a4a30">你的动作</text>
<text x="0" y="174" class="f s" fill="#454240">正常纳入月度评估</text>
<text x="0" y="190" class="f s" fill="#454240">参与标杆分享配对</text>
<text x="0" y="208" class="f b" fill="#3a4a30">检查点</text>
<text x="0" y="224" class="f s" fill="#454240">排名前70%</text>
<text x="0" y="238" class="f s" fill="#454240">产能曲线持续上升</text>
</g>

<!-- Arrow 3→4 -->
<line x1="570" y1="120" x2="590" y2="120" stroke="#6f8660" stroke-width="1.5" marker-end="url(#a)"/>
<text x="580" y="110" class="f s" fill="#6f8660" text-anchor="middle">达标</text>

<!-- Phase 4: 评判点 (Month 6 end) -->
<g transform="translate(590,80)">
<circle cx="50" cy="40" r="22" fill="#faeae5" stroke="#c25030" stroke-width="3"/>
<text x="50" y="44" class="f b" fill="#6b2010" text-anchor="middle">4</text>
<text x="50" y="78" class="f b" fill="#6b2010" text-anchor="middle">评判点</text>
<text x="50" y="94" class="f s" fill="#c25030" text-anchor="middle">第6月末</text>

<rect x="-10" y="106" width="130" height="140" rx="8" fill="#faf8f5" stroke="#c25030" stroke-width="2"/>
<text x="0" y="124" class="f b" fill="#6b2010">留或退决策</text>
<text x="0" y="142" class="f s" fill="#454240">6个月期满必须</text>
<text x="0" y="156" class="f s" fill="#454240">做出明确判断</text>
<text x="0" y="174" class="f b" fill="#6b2010">留下条件</text>
<text x="0" y="190" class="f s" fill="#454240">排名前70%</text>
<text x="0" y="204" class="f s" fill="#454240">产能持续上升</text>
<text x="0" y="222" class="f b" fill="#6b2010">否则</text>
<text x="0" y="238" class="f s" fill="#6b2010">启动清退流程</text>
</g>

<!-- Bottom notes -->
<text x="20" y="370" class="f s" fill="#857d74">未达标处理：任一阶段未达标 → 调整扶持策略或延长当前阶段1个月，最多延长1次。</text>
<text x="20" y="388" class="f s" fill="#c25030">评判点用Coral边框强调：这是留或退的决策点，不模糊处理。</text>
</svg>