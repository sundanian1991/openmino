<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="480" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-05 双维度组合判断矩阵</text>
<text x="20" y="56" class="f s" fill="#857d74">自身峰值比 x 头部差距 — 4种类型判定</text>

<!-- Axes labels -->
<text x="580" y="90" class="f s" fill="#454240">头部差距 →</text>
<text x="20" y="90" class="f s" fill="#454240">自身峰值比 ↓</text>

<!-- 2x2 Matrix -->
<!-- Top-Left: 标杆型 -->
<g transform="translate(120,100)">
<rect width="256" height="160" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="2"/>
<text x="128" y="30" class="f b" fill="#0f5040" text-anchor="middle" font-size="14">标杆型</text>
<text x="128" y="50" class="f s" fill="#2e8b6e" text-anchor="middle">自身峰值比 &gt; 85% | 头部差距 &lt; 20%</text>
<line x1="20" y1="60" x2="236" y2="60" stroke="#2e8b6e" stroke-width="0.5"/>
<text x="16" y="80" class="f n" fill="#454240">判断：接近自己最好水平</text>
<text x="16" y="96" class="f n" fill="#454240">跟头部差距小，发挥稳定</text>
<text x="16" y="116" class="f n" fill="#0f5040">动作：保持，选为标杆分享</text>
<text x="16" y="134" class="f s" fill="#2e8b6e">"连续2个月保持前2，让其他家学他"</text>
</g>

<!-- Top-Right: 尽力型 -->
<g transform="translate(384,100)">
<rect width="256" height="160" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="2"/>
<text x="128" y="30" class="f b" fill="#0e4070" text-anchor="middle" font-size="14">尽力型</text>
<text x="128" y="50" class="f s" fill="#3a7ab8" text-anchor="middle">自身峰值比 &gt; 85% | 头部差距 &gt; 40%</text>
<line x1="20" y1="60" x2="236" y2="60" stroke="#3a7ab8" stroke-width="0.5"/>
<text x="16" y="80" class="f n" fill="#454240">判断：自己发挥好了</text>
<text x="16" y="96" class="f n" fill="#454240">但跟头部差距大</text>
<text x="16" y="116" class="f n" fill="#0e4070">动作：评估产线/产品适配</text>
<text x="16" y="134" class="f s" fill="#3a7ab8">"他已经尽力了，差距可能在产线适配"</text>
</g>

<!-- Bottom-Left: 暂时波动型 -->
<g transform="translate(120,268)">
<rect width="256" height="160" rx="12" fill="#faf0dc" stroke="#b88018" stroke-width="2"/>
<text x="128" y="30" class="f b" fill="#6a4005" text-anchor="middle" font-size="14">暂时波动型</text>
<text x="128" y="50" class="f s" fill="#b88018" text-anchor="middle">自身峰值比 &lt; 65% | 头部差距 &lt; 20%</text>
<line x1="20" y1="60" x2="236" y2="60" stroke="#b88018" stroke-width="0.5"/>
<text x="16" y="80" class="f n" fill="#454240">判断：短期因素发挥不好</text>
<text x="16" y="96" class="f n" fill="#454240">但底子不差，跟头部差距小</text>
<text x="16" y="116" class="f n" fill="#6a4005">动作：观察1个月</text>
<text x="16" y="134" class="f s" fill="#b88018">"短期波动，看下个月是否恢复"</text>
</g>

<!-- Bottom-Right: 问题型 -->
<g transform="translate(384,268)">
<rect width="256" height="160" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="2"/>
<text x="128" y="30" class="f b" fill="#6b2010" text-anchor="middle" font-size="14">问题型</text>
<text x="128" y="50" class="f s" fill="#c25030" text-anchor="middle">自身峰值比 &lt; 65% | 头部差距 &gt; 40%</text>
<line x1="20" y1="60" x2="236" y2="60" stroke="#c25030" stroke-width="0.5"/>
<text x="16" y="80" class="f n" fill="#454240">判断：自己没发挥好</text>
<text x="16" y="96" class="f n" fill="#454240">跟头部差距也在拉大</text>
<text x="16" y="116" class="f n" fill="#6b2010">动作：约谈，定位内部问题</text>
<text x="16" y="134" class="f s" fill="#6b2010">"自己和同行都在退步，需要深度诊断"</text>
</g>

<!-- Axis annotations -->
<text x="108" y="360" class="f s" fill="#857d74" text-anchor="end">&gt; 85%</text>
<text x="108" y="410" class="f s" fill="#857d74" text-anchor="end">&lt; 65%</text>
<text x="248" y="85" class="f s" fill="#857d74" text-anchor="middle">&lt; 20%</text>
<text x="512" y="85" class="f s" fill="#857d74" text-anchor="middle">&gt; 40%</text>

<!-- Bottom note -->
<text x="20" y="460" class="f s" fill="#857d74">注：此矩阵基于"双维度公式"，与L3-02四象限（总量x人均）不同。此处看的是"发挥水平 x 相对差距"。</text>
</svg>