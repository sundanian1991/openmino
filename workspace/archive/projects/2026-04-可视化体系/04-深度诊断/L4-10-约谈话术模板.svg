<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 540">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="540" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-10 约谈话术模板</text>

<!-- Card 1: 通用约谈话术 -->
<g transform="translate(16,56)">
<rect width="648" height="230" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="16" y="28" class="f b" fill="#0e4070">通用约谈话术（占位符模板）</text>
<line x1="16" y1="36" x2="632" y2="36" stroke="#3a7ab8" stroke-width="0.5"/>

<!-- 事实部分 -->
<g transform="translate(16,44)">
<rect x="0" y="0" width="616" height="40" rx="6" fill="#3a7ab8" opacity="0.1"/>
<text x="10" y="16" class="f b" fill="#0e4070">事实陈述</text>
<text x="10" y="32" class="f s" fill="#454240">"我看了你近30天的数据。你的GMV从 <tspan fill="#c25030">X万</tspan> 降到 <tspan fill="#c25030">Y万</tspan>，下降幅度 <tspan fill="#c25030">Z%</tspan>。"</text>
</g>

<!-- 归因部分 -->
<g transform="translate(16,92)">
<rect x="0" y="0" width="616" height="40" rx="6" fill="#c26d3a" opacity="0.1"/>
<text x="10" y="16" class="f b" fill="#6b3410">归因结论</text>
<text x="10" y="32" class="f s" fill="#454240">"从归因来看，主要问题是 <tspan fill="#c25030">[归因结论]</tspan>。"</text>
</g>

<!-- 具体数据部分 -->
<g transform="translate(16,140)">
<rect x="0" y="0" width="616" height="40" rx="6" fill="#2e8b6e" opacity="0.1"/>
<text x="10" y="16" class="f b" fill="#0f5040">关键指标</text>
<text x="10" y="32" class="f s" fill="#454240">具体数据：<tspan fill="#c25030">[关键指标变化]</tspan>  横向对比：<tspan fill="#c25030">[其他供应商同期数据]</tspan></text>
</g>

<!-- 提问部分 -->
<g transform="translate(16,188)">
<rect x="0" y="0" width="616" height="40" rx="6" fill="#857d74" opacity="0.1"/>
<text x="10" y="16" class="f b" fill="#454240">引导式提问</text>
<text x="10" y="32" class="f s" fill="#454240">"你觉得你的问题出在哪？打算怎么调整？"</text>
</g>
</g>

<!-- Card 2: 管理问题约谈示例 -->
<g transform="translate(16,300)">
<rect width="648" height="220" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="16" y="28" class="f b" fill="#6b2010">示例：管理问题约谈（赛维斯真实数据）</text>
<line x1="16" y1="36" x2="632" y2="36" stroke="#c25030" stroke-width="0.5"/>

<text x="16" y="56" class="f n" fill="#454240">"你的GMV从5200万降到3800万，下降27%。归因分析显示："</text>

<text x="16" y="78" class="f s" fill="#454240">- 出勤人数稳定在135-140人，排除人力缺口</text>
<text x="16" y="96" class="f s" fill="#454240">- 人均拨打量从80通/天降到58通/天（降幅27%）</text>
<text x="16" y="114" class="f s" fill="#454240">- 接通率和转化率保持稳定</text>

<text x="16" y="138" class="f b" fill="#6b2010">结论：</text>
<text x="16" y="156" class="f n" fill="#454240">"所以你的GMV下降不是转化能力问题，是管理松弛导致人均拨打量大幅下降。</text>
<text x="16" y="174" class="f n" fill="#454240">同期其他供应商的人均拨打量保持在72-78通/天。</text>
<text x="16" y="192" class="f n" fill="#454240">你觉得管理上出了什么问题？打算怎么调整？"</text>
</g>
</svg>