<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 720">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="720" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-01 单体供应商深度看板 — 7个核心归因指标</text>
<text x="20" y="56" class="f s" fill="#857d74">为什么是7个不是3个：交叉验证定位根因，不只看表面</text>

<!-- Card grid 2x4 -->
<!-- Row 1, Col 1: 出勤率 - 人力组 -->
<g transform="translate(16,72)">
<rect width="316" height="120" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#0f5040">出勤率</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#2e8b6e"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">人力组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：有效出勤 / 目标人数</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：人力稳定性</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：低于 85%</text>
<text x="12" y="106" class="f s" fill="#6f8660">"人是不是不够了？"</text>
</g>

<!-- Row 1, Col 2: 总拨打量 - 拨打组 -->
<g transform="translate(348,72)">
<rect width="316" height="120" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#6b3410">总拨打量</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#c26d3a"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">拨打组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：当日总外呼通次</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：整体产出规模</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：比均值降 20%</text>
<text x="12" y="106" class="f s" fill="#6b3410">"整体量有没有缩水？"</text>
</g>

<!-- Row 2, Col 1: 人均拨打量 - 拨打组 -->
<g transform="translate(16,204)">
<rect width="316" height="120" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#6b3410">人均拨打量</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#c26d3a"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">拨打组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：总拨打量 / 出勤人数</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：人效 / 员工努力程度</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：比均值降 15%</text>
<text x="12" y="106" class="f s" fill="#6b3410">"在的人有没有在努力打？"</text>
</g>

<!-- Row 2, Col 2: 接通率 - 质量组 -->
<g transform="translate(348,204)">
<rect width="316" height="120" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#3a4a30">接通率</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#6f8660"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">质量组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：接通通次 / 拨打通次</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：名单可打性</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：比均值降 5 个百分点</text>
<text x="12" y="106" class="f s" fill="#6f8660">"名单是不是打不通了？"</text>
</g>

<!-- Row 3, Col 1: 转化率 - 质量组 -->
<g transform="translate(16,336)">
<rect width="316" height="120" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#3a4a30">转化率</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#6f8660"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">质量组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：转化用户数 / 接通用户数</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：销售能力</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：比均值降 5 个百分点</text>
<text x="12" y="106" class="f s" fill="#6f8660">"接通了但没成单，话术或能力问题？"</text>
</g>

<!-- Row 3, Col 2: 件均 - 结果组 -->
<g transform="translate(348,336)">
<rect width="316" height="120" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#0e4070">件均</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#3a7ab8"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">结果组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：GMV / 转化件数</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：客户质量 + 大额能力</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：比均值降 10%</text>
<text x="12" y="106" class="f s" fill="#3a7ab8">"转化了但金额小，客户结构变了？"</text>
</g>

<!-- Row 4, Col 1: 日均GMV - 结果组 -->
<g transform="translate(16,468)">
<rect width="316" height="120" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#0e4070">日均GMV</text>
<rect x="260" y="12" width="44" height="18" rx="4" fill="#3a7ab8"/>
<text x="282" y="25" class="f s" fill="#fff" text-anchor="middle">结果组</text>
<text x="12" y="48" class="f n" fill="#454240">公式：当日 GMV</text>
<text x="12" y="66" class="f n" fill="#454240">反映什么：最终结果</text>
<text x="12" y="84" class="f n" fill="#454240">异常标准：比均值降 20%</text>
<text x="12" y="106" class="f s" fill="#3a7ab8">"最终产出到底缩了多少？"</text>
</g>

<!-- Row 4, Col 2: 交叉验证说明 -->
<g transform="translate(348,468)">
<rect width="316" height="120" rx="8" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
<text x="12" y="26" class="f b" fill="#454240">交叉验证逻辑</text>
<text x="12" y="48" class="f n" fill="#454240">出勤率降 + 人均拨打量不变</text>
<text x="12" y="62" class="f s" fill="#857d74">→ 人力缺口（缺人）</text>
<text x="12" y="80" class="f n" fill="#454240">出勤率不变 + 人均拨打量降</text>
<text x="12" y="94" class="f s" fill="#857d74">→ 管理松弛（在的人不努力）</text>
<text x="12" y="112" class="f n" fill="#454240">接通率降 + 转化率不变</text>
</g>

<!-- Bottom annotation -->
<text x="20" y="610" class="f b" fill="#454240">指标分组说明</text>
<text x="20" y="632" class="f n" fill="#454240">人力组：出勤率 — 回答"有没有人"的问题</text>
<text x="20" y="652" class="f n" fill="#454240">拨打组：总拨打量 + 人均拨打量 — 回答"有没有在打"的问题</text>
<text x="20" y="672" class="f n" fill="#454240">质量组：接通率 + 转化率 — 回答"打得好不好"的问题</text>
<text x="20" y="692" class="f n" fill="#454240">结果组：件均 + 日均GMV — 回答"最终产出多少"的问题</text>
</svg>