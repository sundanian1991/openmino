<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 420">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="420" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-02 5种看板视图 — 交叉验证体系</text>
<text x="20" y="56" class="f s" fill="#857d74">5种视图从不同维度看同一供应商，交叉验证才能定位根因</text>

<!-- View 1: 日度GMV折线图 -->
<g transform="translate(16,76)">
<rect width="124" height="280" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="28" class="f b" fill="#0f5040">日度GMV折线图</text>
<text x="12" y="48" class="f s" fill="#0f5040">近30天</text>
<line x1="12" y1="56" x2="112" y2="56" stroke="#2e8b6e" stroke-width="0.5"/>
<text x="12" y="78" class="f s" fill="#454240">看什么：</text>
<text x="12" y="94" class="f s" fill="#6f8660">每天GMV连线</text>
<text x="12" y="118" class="f s" fill="#454240">能回答：</text>
<text x="12" y="134" class="f s" fill="#6f8660">哪天开始掉的？</text>
<text x="12" y="150" class="f s" fill="#6f8660">断崖还是缓降？</text>
<!-- Mini chart -->
<polyline points="12,200 30,198 48,195 66,196 84,188 102,170 112,155" fill="none" stroke="#2e8b6e" stroke-width="1.5" stroke-linecap="round"/>
<text x="12" y="260" class="f s" fill="#857d74">趋势入口</text>
</g>

<!-- Arrow 1→2 -->
<line x1="146" y1="216" x2="164" y2="216" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="155" y="208" class="f s" fill="#857d74" text-anchor="middle">+交叉</text>

<!-- View 2: 转化率+接通率 -->
<g transform="translate(170,76)">
<rect width="124" height="280" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="12" y="28" class="f b" fill="#3a4a30">转化率+接通率</text>
<text x="12" y="48" class="f s" fill="#3a4a30">双折线 近30天</text>
<line x1="12" y1="56" x2="112" y2="56" stroke="#6f8660" stroke-width="0.5"/>
<text x="12" y="78" class="f s" fill="#454240">看什么：</text>
<text x="12" y="94" class="f s" fill="#6f8660">两条线叠加</text>
<text x="12" y="118" class="f s" fill="#454240">能回答：</text>
<text x="12" y="134" class="f s" fill="#6f8660">名单变差还是</text>
<text x="12" y="150" class="f s" fill="#6f8660">坐席变差了？</text>
<!-- Mini chart -->
<polyline points="12,190 30,188 48,190 66,185 84,175 102,160 112,148" fill="none" stroke="#6f8660" stroke-width="1.5"/>
<polyline points="12,200 30,198 48,196 66,195 84,192 102,180 112,168" fill="none" stroke="#c26d3a" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="12" y="260" class="f s" fill="#857d74">名单 vs 能力</text>
</g>

<!-- Arrow 2→3 -->
<line x1="300" y1="216" x2="318" y2="216" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="309" y="208" class="f s" fill="#857d74" text-anchor="middle">+交叉</text>

<!-- View 3: 出勤+人均拨打量 -->
<g transform="translate(324,76)">
<rect width="124" height="280" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
<text x="12" y="28" class="f b" fill="#6b3410">出勤+人均拨打量</text>
<text x="12" y="48" class="f s" fill="#6b3410">双折线 近30天</text>
<line x1="12" y1="56" x2="112" y2="56" stroke="#c26d3a" stroke-width="0.5"/>
<text x="12" y="78" class="f s" fill="#454240">看什么：</text>
<text x="12" y="94" class="f s" fill="#6b3410">两条线叠加</text>
<text x="12" y="118" class="f s" fill="#454240">能回答：</text>
<text x="12" y="134" class="f s" fill="#6b3410">是人少了还是</text>
<text x="12" y="150" class="f s" fill="#6b3410">在的人不努力？</text>
<!-- Mini chart -->
<polyline points="12,190 30,189 48,190 66,188 84,190 102,187 112,186" fill="none" stroke="#c26d3a" stroke-width="1.5"/>
<polyline points="12,200 30,198 48,195 66,180 84,165 102,155 112,145" fill="none" stroke="#6f8660" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="12" y="260" class="f s" fill="#857d74">人力 vs 努力</text>
</g>

<!-- Arrow 3→4 -->
<line x1="454" y1="216" x2="472" y2="216" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="463" y="208" class="f s" fill="#857d74" text-anchor="middle">+交叉</text>

<!-- View 4: 件均折线 -->
<g transform="translate(478,76)">
<rect width="124" height="280" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="12" y="28" class="f b" fill="#0e4070">件均折线图</text>
<text x="12" y="48" class="f s" fill="#0e4070">近30天</text>
<line x1="12" y1="56" x2="112" y2="56" stroke="#3a7ab8" stroke-width="0.5"/>
<text x="12" y="78" class="f s" fill="#454240">看什么：</text>
<text x="12" y="94" class="f s" fill="#3a7ab8">件均趋势线</text>
<text x="12" y="118" class="f s" fill="#454240">能回答：</text>
<text x="12" y="134" class="f s" fill="#3a7ab8">客户结构有</text>
<text x="12" y="150" class="f s" fill="#3a7ab8">没有变化？</text>
<!-- Mini chart -->
<polyline points="12,190 30,188 48,192 66,186 84,185 102,178 112,170" fill="none" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="12" y="260" class="f s" fill="#857d74">客户结构</text>
</g>

<!-- Arrow 4→5 -->
<line x1="340" y1="362" x2="340" y2="378" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
<text x="355" y="372" class="f s" fill="#857d74">汇总对比</text>

<!-- View 5: 月度关键指标对比 -->
<g transform="translate(140,382)">
<rect width="400" height="30" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="12" y="20" class="f b" fill="#6b2010">月度关键指标对比（近3个月并列 — 结构性恶化还是暂时波动？）</text>
</g>
</svg>