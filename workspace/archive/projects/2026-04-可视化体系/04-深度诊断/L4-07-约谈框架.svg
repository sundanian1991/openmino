<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="620" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-07 约谈框架 — 四步流程</text>
<text x="20" y="56" class="f s" fill="#857d74">数据呈现 → 引导式提问 → 要求产出 → 记录存档</text>

<!-- Step 1: 数据呈现 -->
<g transform="translate(16,76)">
<rect width="500" height="120" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<rect x="12" y="8" width="120" height="24" rx="4" fill="#3a7ab8"/>
<text x="72" y="24" class="f b" fill="#fff" text-anchor="middle">数据呈现（5min）</text>
<text x="12" y="48" class="f n" fill="#454240">用客观数据开场，不带情绪：</text>
<text x="12" y="66" class="f s" fill="#454240">"你近30天GMV从X万降到Y万，下降Z%"</text>
<text x="12" y="84" class="f s" fill="#454240">"人均拨打量从80降到58，降幅27%"</text>
<text x="12" y="102" class="f s" fill="#454240">"同期其他供应商保持在72-78通/天"</text>
<text x="12" y="118" class="f s" fill="#454240">"出勤率稳定，说明不是人力问题"</text>
</g>

<!-- Arrow down -->
<line x1="266" y1="196" x2="266" y2="210" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 2: 引导式提问 -->
<g transform="translate(16,216)">
<rect width="500" height="180" rx="12" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
<rect x="12" y="8" width="140" height="24" rx="4" fill="#c26d3a"/>
<text x="82" y="24" class="f b" fill="#fff" text-anchor="middle">引导式提问（15min）</text>
<text x="12" y="48" class="f n" fill="#454240">你提问，他回答。你不替他想办法。</text>
<text x="12" y="68" class="f b" fill="#6b3410">四个核心问题：</text>
<text x="12" y="88" class="f s" fill="#454240">1. "你觉得问题出在哪？" — 让他自己定位</text>
<text x="12" y="106" class="f s" fill="#454240">2. "你打算怎么调整？" — 让他自己出方案</text>
<text x="12" y="124" class="f s" fill="#454240">3. "什么时候能看到效果？" — 设定时间线</text>
<text x="12" y="142" class="f s" fill="#454240">4. "需要我这边协调什么？" — 确认外部支持</text>
<text x="12" y="166" class="f s" fill="#857d74">关键：他不回答具体方案就追问，不替他补全。</text>
</g>

<!-- Arrow down -->
<line x1="266" y1="396" x2="266" y2="410" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 3: 要求产出 -->
<g transform="translate(16,416)">
<rect width="500" height="76" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<rect x="12" y="8" width="140" height="24" rx="4" fill="#2e8b6e"/>
<text x="82" y="24" class="f b" fill="#fff" text-anchor="middle">要求产出（5min）</text>
<text x="12" y="48" class="f n" fill="#454240">明确产出物和时间节点：</text>
<text x="12" y="66" class="f s" fill="#454240">"你回去提交整改计划，48小时内给到我。要有具体目标、动作、时间线。"</text>
</g>

<!-- Arrow down -->
<line x1="266" y1="492" x2="266" y2="506" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 4: 记录存档 -->
<g transform="translate(16,512)">
<rect width="500" height="56" rx="12" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="12" y="22" class="f b" fill="#3a4a30">记录存档</text>
<text x="12" y="42" class="f s" fill="#454240">约谈时间、参与人、核心结论、承诺的产出物和时间节点，记录到供应商独立空间。</text>
</g>

<!-- Key principles card (right side) -->
<g transform="translate(532,76)">
<rect width="132" height="340" rx="12" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#454240">关键原则</text>
<line x1="12" y1="30" x2="120" y2="30" stroke="#857d74" stroke-width="0.5"/>
<text x="12" y="52" class="f s" fill="#454240">你提问，他回答</text>
<text x="12" y="74" class="f s" fill="#454240">你不替他想办法</text>
<text x="12" y="104" class="f s" fill="#857d74">用数据说话</text>
<text x="12" y="126" class="f s" fill="#857d74">不代入主观判断</text>
<text x="12" y="156" class="f s" fill="#454240">让他自己定位</text>
<text x="12" y="178" class="f s" fill="#454240">让他自己出方案</text>
<text x="12" y="200" class="f s" fill="#454240">让他自己承诺</text>
<text x="12" y="230" class="f s" fill="#857d74">设定明确时间线</text>
<text x="12" y="252" class="f s" fill="#857d74">不模糊"尽快"这类词</text>
<text x="12" y="282" class="f s" fill="#454240">约谈是诊断</text>
<text x="12" y="304" class="f s" fill="#454240">不是审判</text>
</g>

<!-- Bottom note -->
<text x="20" y="596" class="f s" fill="#857d74">核心：引导式设问让供应商自己发现问题、自己出方案、自己承诺，而不是你给他解决方案。</text>
</svg>