<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="af" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 2L10 5L0 8" fill="#c98a6a"/>
    </marker>
  </defs>

  <rect width="680" height="400" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">数据处理全流程</text>
  <text x="40" y="46" font-size="11" fill="#6b6b66">从采集到决策的完整链路 — 自动化触发机制</text>

  <!-- Container -->
  <rect x="20" y="58" width="640" height="310" rx="10" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

  <!-- Step 1: 采集 -->
  <rect x="36" y="78" width="104" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- 3 arrows converging icon -->
  <path d="M56 100 L72 112" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M88 100 L72 112" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M72 106 L72 112" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="72" cy="116" r="4" fill="#c98a6a"/>
  <text x="88" y="140" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">采集</text>
  <text x="88" y="158" font-size="10" fill="#6b6b66" text-anchor="middle">多源汇聚</text>
  <rect x="60" y="164" width="56" height="18" rx="9" fill="#f0e0d4"/>
  <text x="88" y="177" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="600">实时</text>

  <!-- Arrow 1->2 -->
  <line x1="140" y1="128" x2="166" y2="128" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2: 清洗 -->
  <rect x="170" y="78" width="104" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Filter icon -->
  <path d="M188 104 L222 104 L210 118 L210 126 L198 130 L198 118 Z" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="222" y="140" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">清洗</text>
  <text x="222" y="158" font-size="10" fill="#6b6b66" text-anchor="middle">去重校验</text>
  <rect x="194" y="164" width="56" height="18" rx="9" fill="#f0e0d4"/>
  <text x="222" y="177" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="600">每日</text>

  <!-- Arrow 2->3 -->
  <line x1="274" y1="128" x2="300" y2="128" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3: 计算 -->
  <rect x="304" y="78" width="104" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Gear icon -->
  <circle cx="356" cy="115" r="10" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="356" cy="115" r="4" fill="none" stroke="#c98a6a" stroke-width="1.2"/>
  <line x1="356" y1="103" x2="356" y2="107" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="356" y1="123" x2="356" y2="127" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="344" y1="115" x2="348" y2="115" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="364" y1="115" x2="368" y2="115" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="356" y="140" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">计算</text>
  <text x="356" y="158" font-size="10" fill="#6b6b66" text-anchor="middle">自动聚合</text>
  <rect x="328" y="164" width="82" height="18" rx="9" fill="#e4e8dc"/>
  <text x="369" y="177" font-size="9" fill="#6b7f52" text-anchor="middle" font-weight="600">每月自动</text>

  <!-- Arrow 3->4 -->
  <line x1="408" y1="128" x2="434" y2="128" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4: 可视化 -->
  <rect x="438" y="78" width="104" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Chart icon -->
  <rect x="456" y="120" width="8" height="14" rx="1" fill="#c98a6a"/>
  <rect x="468" y="110" width="8" height="24" rx="1" fill="#c98a6a"/>
  <rect x="480" y="102" width="8" height="32" rx="1" fill="#c98a6a"/>
  <text x="490" y="140" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">可视化</text>
  <text x="490" y="158" font-size="10" fill="#6b6b66" text-anchor="middle">看板展示</text>
  <rect x="458" y="164" width="68" height="18" rx="9" fill="#f0e0d4"/>
  <text x="492" y="177" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="600">实时更新</text>

  <!-- Arrow 4->5 -->
  <line x1="542" y1="128" x2="568" y2="128" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5: 决策支持 -->
  <rect x="572" y="78" width="80" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Target icon -->
  <circle cx="612" cy="112" r="10" fill="none" stroke="#c98a6a" stroke-width="1.2"/>
  <circle cx="612" cy="112" r="6" fill="none" stroke="#c98a6a" stroke-width="1.2"/>
  <circle cx="612" cy="112" r="2.5" fill="#c98a6a"/>
  <text x="612" y="140" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">决策支持</text>
  <text x="612" y="156" font-size="9" fill="#6b6b66" text-anchor="middle">排名/归因</text>
  <rect x="584" y="164" width="56" height="18" rx="9" fill="#e8e4dc"/>
  <text x="612" y="177" font-size="9" fill="#6b6b66" text-anchor="middle" font-weight="600">按需</text>

  <!-- Feedback loop: Step 5 back to Step 1 -->
  <path d="M612 178 L612 230 L88 230 L88 178" fill="none" stroke="#c98a6a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="350" y="225" font-size="9" fill="#c98a6a" text-anchor="middle" font-style="italic">反馈闭环</text>

  <!-- Bottom section: Trigger mechanism -->
  <rect x="36" y="252" width="608" height="104" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="276" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">自动化触发规则</text>
  <line x1="60" y1="286" x2="620" y2="286" stroke="#d4d1c7" stroke-width="0.5"/>

  <!-- Trigger rows -->
  <rect x="50" y="296" width="570" height="24" rx="4" fill="#faf9f7"/>
  <text x="70" y="312" font-size="10" fill="#1a1a1a" font-weight="600">采集触发</text>
  <text x="150" y="312" font-size="10" fill="#6b6b66">新数据到达 → 自动入队 → 去重校验</text>

  <rect x="50" y="324" width="570" height="24" rx="4" fill="#faf9f7"/>
  <text x="70" y="340" font-size="10" fill="#1a1a1a" font-weight="600">计算触发</text>
  <text x="150" y="340" font-size="10" fill="#6b6b66">每月1日 00:00 → 拉取上月清洗数据 → 计算指标</text>

  <rect x="50" y="352" width="570" height="24" rx="4" fill="#faf9f7"/>
  <text x="70" y="368" font-size="10" fill="#1a1a1a" font-weight="600">异常触发</text>
  <text x="150" y="368" font-size="10" fill="#6b6b66">合规率 &lt; 95% 或 流失率 &gt; 15% → 标记异常 → 通知年老师</text>
</svg>
