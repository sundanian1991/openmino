<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 490" width="100%">
  <rect width="680" height="490" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia" font-size="18" font-weight="700" fill="#1a1a1a">约谈框架</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b6b">标准化约谈 — 避免无效沟通</text>

  <!-- Total time bar -->
  <rect x="40" y="64" width="600" height="28" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Segmented progress (5+10+10=25min, 596px total) -->
  <rect x="42" y="66" width="119" height="24" rx="7" fill="#c98a6a"/>
  <rect x="161" y="66" width="238" height="24" fill="#c98a6a"/>
  <rect x="399" y="66" width="239" height="24" rx="0 7 7 0" fill="#c98a6a"/>
  <text x="102" y="83" font-family="system-ui" font-size="9" font-weight="500" fill="#faf9f7" text-anchor="middle">5min 数据展示</text>
  <text x="280" y="83" font-family="system-ui" font-size="9" font-weight="500" fill="#faf9f7" text-anchor="middle">10min 引导提问</text>
  <text x="519" y="83" font-family="system-ui" font-size="9" font-weight="500" fill="#faf9f7" text-anchor="middle">10min 行动计划</text>

  <!-- Section 1: 数据展示 (5分钟) -->
  <rect x="40" y="106" width="600" height="106" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="56" y="126" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">数据展示</text>
  <rect x="112" y="116" width="38" height="18" rx="9" fill="#c98a6a"/>
  <text x="131" y="129" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">5分钟</text>
  <!-- Progress bar 20% -->
  <rect x="56" y="138" width="200" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="56" y="138" width="40" height="8" rx="4" fill="#c98a6a"/>
  <text x="262" y="146" font-family="system-ui" font-size="8.5" fill="#8a8580">20% 时间占比</text>
  <text x="56" y="164" font-family="system-ui" font-size="10.5" fill="#1a1a1a">让对方看到问题</text>
  <text x="56" y="182" font-family="system-ui" font-size="10" fill="#6b6b6b">准备：近3个月趋势图，异常数据点标注</text>
  <text x="56" y="198" font-family="system-ui" font-size="10" fill="#6b6b6b">要点：数据说话，不带主观评价，让对方先判断</text>

  <!-- Section 2: 引导提问 (10分钟) -->
  <rect x="40" y="224" width="600" height="106" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="56" y="244" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">引导提问</text>
  <rect x="112" y="234" width="38" height="18" rx="9" fill="#c98a6a"/>
  <text x="131" y="247" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">10分钟</text>
  <!-- Progress bar 40% -->
  <rect x="56" y="256" width="200" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="56" y="256" width="80" height="8" rx="4" fill="#c98a6a"/>
  <text x="262" y="264" font-family="system-ui" font-size="8.5" fill="#8a8580">40% 时间占比</text>
  <text x="56" y="282" font-family="system-ui" font-size="10.5" fill="#1a1a1a">"你认为原因是什么？"</text>
  <text x="56" y="300" font-family="system-ui" font-size="10" fill="#6b6b6b">关键：让对方先说，避免指责语气，引导自我诊断</text>
  <text x="56" y="316" font-family="system-ui" font-size="10" fill="#6b6b6b">技巧：用"我们"而非"你们"，共同面对问题</text>

  <!-- Section 3: 行动计划 (10分钟) -->
  <rect x="40" y="342" width="600" height="106" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="56" y="362" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">行动计划</text>
  <rect x="112" y="352" width="38" height="18" rx="9" fill="#c98a6a"/>
  <text x="131" y="365" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">10分钟</text>
  <!-- Progress bar 40% -->
  <rect x="56" y="374" width="200" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="56" y="374" width="80" height="8" rx="4" fill="#c98a6a"/>
  <text x="262" y="382" font-family="system-ui" font-size="8.5" fill="#8a8580">40% 时间占比</text>
  <text x="56" y="400" font-family="system-ui" font-size="10.5" fill="#1a1a1a">共同制定目标</text>
  <text x="56" y="418" font-family="system-ui" font-size="10" fill="#6b6b6b">产出：行动计划表 + 回访时间</text>
  <text x="56" y="434" font-family="system-ui" font-size="10" fill="#6b6b6b">要素：具体目标值、时间节点、责任人、验收标准</text>
</svg>
