<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" width="100%">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="430" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia" font-size="18" font-weight="700" fill="#1a1a1a">月度操作流程</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b6b">D1-D10标准化时间线 — 避免遗漏关键步骤</text>

  <!-- Timeline line -->
  <line x1="60" y1="90" x2="620" y2="90" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Phase boundaries (dots + arrows) -->
  <g font-family="system-ui" text-anchor="middle">
    <!-- Dot 1 -->
    <circle cx="60" cy="90" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
    <!-- Arrow 1 -->
    <line x1="65" y1="90" x2="185" y2="90" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
    <!-- Dot 2 -->
    <circle cx="200" cy="90" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
    <!-- Arrow 2 -->
    <line x1="205" y1="90" x2="325" y2="90" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
    <!-- Dot 3 -->
    <circle cx="340" cy="90" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
    <!-- Arrow 3 -->
    <line x1="345" y1="90" x2="465" y2="90" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
    <!-- Dot 4 -->
    <circle cx="480" cy="90" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
    <!-- Arrow 4 -->
    <line x1="485" y1="90" x2="605" y2="90" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
    <!-- Dot 5 -->
    <circle cx="620" cy="90" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  </g>

  <!-- Phase labels above timeline -->
  <g font-family="system-ui" font-size="10" font-weight="500" fill="#c98a6a" text-anchor="middle">
    <text x="130" y="78">D1-D2</text>
    <text x="270" y="78">D3-D5</text>
    <text x="410" y="78">D6-D8</text>
    <text x="550" y="78">D9-D10</text>
  </g>

  <!-- Phase cards below timeline -->
  <g font-family="system-ui" text-anchor="middle">
    <!-- Card 1: 收集数据 -->
    <rect x="56" y="112" width="148" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="130" y="134" font-size="11" font-weight="500" fill="#1a1a1a">收集数据</text>
    <text x="130" y="154" font-size="10" fill="#6b6b6b">产出：原始数据表</text>
    <text x="130" y="170" font-size="10" fill="#8a8580">各供应商产能</text>
    <text x="130" y="184" font-size="10" fill="#8a8580">+ 人效数据汇总</text>

    <!-- Card 2: 分析定位 -->
    <rect x="196" y="112" width="148" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="270" y="134" font-size="11" font-weight="500" fill="#1a1a1a">分析定位</text>
    <text x="270" y="154" font-size="10" fill="#6b6b6b">产出：异常供应商清单</text>
    <text x="270" y="170" font-size="10" fill="#8a8580">环比下滑识别</text>
    <text x="270" y="184" font-size="10" fill="#8a8580">+ Bottom3 锁定</text>

    <!-- Card 3: 约谈沟通 -->
    <rect x="336" y="112" width="148" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="410" y="134" font-size="11" font-weight="500" fill="#1a1a1a">约谈沟通</text>
    <text x="410" y="154" font-size="10" fill="#6b6b6b">产出：约谈记录</text>
    <text x="410" y="170" font-size="10" fill="#8a8580">改进目标 + 行动计划</text>
    <text x="410" y="184" font-size="10" fill="#8a8580">+ 回访时间约定</text>

    <!-- Card 4: 汇报同步 -->
    <rect x="476" y="112" width="148" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="550" y="134" font-size="11" font-weight="500" fill="#1a1a1a">汇报同步</text>
    <text x="550" y="154" font-size="10" fill="#6b6b6b">产出：月度报告PPT</text>
    <text x="550" y="170" font-size="10" fill="#8a8580">排名趋势 + 建议</text>
    <text x="550" y="184" font-size="10" fill="#8a8580">同步军哥/易人</text>
  </g>

  <!-- Bottom dashed container: 月底复盘 -->
  <rect x="40" y="215" width="600" height="195" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="56" y="235" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">月底复盘</text>

  <g font-family="system-ui" text-anchor="middle">
    <!-- 做得好的 -->
    <rect x="56" y="247" width="170" height="148" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="141" y="268" font-size="10.5" font-weight="500" fill="#1a1a1a">哪些做得好</text>
    <text x="141" y="288" font-size="10" fill="#6b6b6b">数据收集是否及时</text>
    <text x="141" y="306" font-size="10" fill="#6b6b6b">分析是否准确定位</text>
    <text x="141" y="324" font-size="10" fill="#6b6b6b">约谈是否有产出</text>
    <text x="141" y="342" font-size="10" fill="#6b6b6b">汇报是否清晰</text>
    <text x="141" y="368" font-size="9.5" font-family="Georgia" fill="#6b6b6b" font-style="italic">固化有效做法</text>

    <!-- 需改进的 -->
    <rect x="242" y="247" width="170" height="148" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="327" y="268" font-size="10.5" font-weight="500" fill="#1a1a1a">哪些需改进</text>
    <text x="327" y="288" font-size="10" fill="#6b6b6b">哪些环节延迟</text>
    <text x="327" y="306" font-size="10" fill="#6b6b6b">哪些数据缺失</text>
    <text x="327" y="324" font-size="10" fill="#6b6b6b">约谈是否跟进</text>
    <text x="327" y="342" font-size="10" fill="#6b6b6b">汇报是否有遗漏</text>
    <text x="327" y="368" font-size="9.5" font-family="Georgia" fill="#6b6b6b" font-style="italic">下月重点改进</text>

    <!-- 行动项 -->
    <rect x="428" y="247" width="196" height="148" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
    <text x="526" y="268" font-size="10.5" font-weight="500" fill="#1a1a1a">下月调整</text>
    <text x="526" y="288" font-size="10" fill="#6b6b6b">基于复盘结论调整流程</text>
    <text x="526" y="306" font-size="10" fill="#6b6b6b">优化数据收集模板</text>
    <text x="526" y="324" font-size="10" fill="#6b6b6b">完善约谈框架</text>
    <text x="526" y="342" font-size="10" fill="#6b6b6b">更新汇报模板</text>
    <text x="526" y="368" font-size="9.5" font-family="Georgia" fill="#6b6b6b" font-style="italic">形成PDCA循环</text>
  </g>
</svg>
