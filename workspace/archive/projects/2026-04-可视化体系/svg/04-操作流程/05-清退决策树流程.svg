<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 550" width="100%">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="550" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia" font-size="18" font-weight="700" fill="#1a1a1a">清退决策树与流程</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b6b">供应商退出机制 — 人性化处理逐步减少份额</text>

  <!-- Decision Tree -->
  <!-- Root: 连续3月Bottom3? -->
  <rect x="240" y="64" width="200" height="40" rx="8" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="340" y="82" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a" text-anchor="middle">连续3月 Bottom3？</text>

  <!-- 否 -> 继续观察 (right branch) -->
  <text x="470" y="78" font-family="system-ui" font-size="9" fill="#8a8580">否</text>
  <line x1="440" y1="84" x2="520" y2="84" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="520" y="68" width="110" height="32" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="575" y="89" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">继续观察</text>

  <!-- 是 -> 是否可改进? (down branch) -->
  <text x="340" y="112" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="middle">是</text>
  <line x1="340" y1="104" x2="340" y2="118" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="240" y="122" width="200" height="40" rx="8" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="340" y="146" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a" text-anchor="middle">是否可改进？</text>

  <!-- 是 -> 给机会期 (left branch) -->
  <text x="210" y="176" font-family="system-ui" font-size="9" fill="#8a8580">是</text>
  <line x1="240" y1="142" x2="210" y2="170" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="80" y="176" width="180" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="170" y="198" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">给机会期（1-2月）</text>

  <!-- 机会期 -> 改进? -->
  <line x1="170" y1="212" x2="170" y2="228" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="80" y="232" width="180" height="36" rx="8" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="170" y="254" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">是否改进？</text>

  <!-- 改进 -> 继续合作 (left) -->
  <text x="55" y="284" font-family="system-ui" font-size="9" fill="#8a8580">是</text>
  <line x1="80" y1="250" x2="55" y2="276" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="0" y="280" width="100" height="32" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="50" y="301" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">继续合作</text>

  <!-- 未改进 -> 启动清退 (down) -->
  <text x="170" y="276" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="middle">否</text>
  <line x1="170" y1="268" x2="170" y2="284" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>

  <!-- 否 -> 启动清退 (right branch from 是否可改进?) -->
  <text x="470" y="176" font-family="system-ui" font-size="9" fill="#8a8580">否</text>
  <line x1="440" y1="142" x2="470" y2="170" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>

  <!-- 启动清退 (merge point) -->
  <rect x="410" y="176" width="180" height="36" rx="8" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="500" y="198" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">启动清退</text>
  <line x1="170" y1="300" x2="170" y2="194" stroke="#c98a6a" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M170 194 Q170 194 410 194" fill="none" stroke="#c98a6a" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- 清退流程 timeline -->
  <text x="40" y="348" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">清退流程</text>
  <text x="40" y="364" font-family="system-ui" font-size="9.5" fill="#8a8580">总周期：3-6个月</text>

  <!-- Timeline line -->
  <line x1="56" y1="390" x2="620" y2="390" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Step cards -->
  <!-- Step 1: 发送通知 -->
  <rect x="56" y="404" width="128" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="120" y="424" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="500">Step 1</text>
  <text x="120" y="442" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">发送通知</text>
  <text x="120" y="458" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">正式书面通知</text>
  <text x="120" y="472" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">说明清退原因</text>

  <!-- Arrow 1-2 -->
  <line x1="188" y1="444" x2="210" y2="444" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 2: 过渡期安排 -->
  <rect x="214" y="404" width="128" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="278" y="424" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="500">Step 2</text>
  <text x="278" y="442" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">过渡期安排</text>
  <text x="278" y="458" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">工作交接计划</text>
  <text x="278" y="472" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">人员安置方案</text>

  <!-- Arrow 2-3 -->
  <line x1="346" y1="444" x2="368" y2="444" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 3: 逐步减份额 -->
  <rect x="372" y="404" width="128" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="436" y="424" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="500">Step 3</text>
  <text x="436" y="442" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">逐步减份额</text>
  <text x="436" y="458" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">按月递减</text>
  <text x="436" y="472" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">平稳过渡业务</text>

  <!-- Arrow 3-4 -->
  <line x1="504" y1="444" x2="526" y2="444" stroke="#c98a6a" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Step 4: 正式清退 -->
  <rect x="530" y="404" width="108" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="584" y="424" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle" font-weight="500">Step 4</text>
  <text x="584" y="442" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">正式清退</text>
  <text x="584" y="458" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">合同终止</text>
  <text x="584" y="472" font-family="system-ui" font-size="9" fill="#6b6b6b" text-anchor="middle">结算收尾</text>

  <!-- Timeline duration markers -->
  <text x="120" y="386" font-family="system-ui" font-size="8.5" fill="#c98a6a" text-anchor="middle">第1周</text>
  <text x="278" y="386" font-family="system-ui" font-size="8.5" fill="#c98a6a" text-anchor="middle">第1月</text>
  <text x="436" y="386" font-family="system-ui" font-size="8.5" fill="#c98a6a" text-anchor="middle">第1-3月</text>
  <text x="584" y="386" font-family="system-ui" font-size="8.5" fill="#c98a6a" text-anchor="middle">第3-6月</text>

  <!-- Warning -->
  <rect x="40" y="500" width="600" height="32" rx="8" fill="#f5f4f1" stroke="#d4845a" stroke-width="1"/>
  <text x="240" y="512" font-family="system-ui" font-size="9" fill="#d4845a">!</text>
  <text x="256" y="512" font-family="system-ui" font-size="10" font-weight="500" fill="#d4845a">注意：清退需军哥审批</text>
  <text x="400" y="512" font-family="system-ui" font-size="9.5" fill="#6b6b6b">涉及合同变更和业务转移，须服务组负责人审批</text>
</svg>
