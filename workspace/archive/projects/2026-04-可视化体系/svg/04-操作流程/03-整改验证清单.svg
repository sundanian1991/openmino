<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="100%">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia" font-size="18" font-weight="700" fill="#1a1a1a">整改验证清单</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b6b">分阶段验证 — 目标vs实际对比</text>

  <!-- Overall progress bar: 58% to 76% = 18 point range -->
  <rect x="40" y="64" width="600" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Scale: 58%=x0, 76%=x600. Range=18pts -->
  <!-- Tick marks at 58, 62, 65, 70, 75 -->
  <!-- 58: x=0, 62: x=600*(4/18)=133, 65: x=600*(7/18)=233, 70: x=600*(12/18)=400, 75: x=600*(17/18)=567, 76: x=600 -->
  <rect x="42" y="66" width="596" height="20" rx="5" fill="#d4d1c7"/>
  <!-- Actual progress: 58->76, so 100% filled -->
  <rect x="42" y="66" width="596" height="20" rx="5" fill="#8f9b7f"/>
  <!-- Ticks -->
  <line x1="42" y1="64" x2="42" y2="72" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="175" y1="64" x2="175" y2="72" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="275" y1="64" x2="275" y2="72" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="442" y1="64" x2="442" y2="72" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="609" y1="64" x2="609" y2="72" stroke="#1a1a1a" stroke-width="1"/>
  <text x="42" y="100" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">58%</text>
  <text x="175" y="100" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">62%</text>
  <text x="275" y="100" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">65%</text>
  <text x="442" y="100" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">70%</text>
  <text x="609" y="100" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">75%</text>
  <text x="340" y="100" font-family="system-ui" font-size="9" font-weight="500" fill="#1a1a1a" text-anchor="middle">整体进度：58% → 76%（已达标）</text>

  <!-- Stage 1: 第1周 -->
  <rect x="40" y="114" width="600" height="76" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="54" y="126" width="52" height="20" rx="10" fill="#c98a6a"/>
  <text x="80" y="140" font-family="system-ui" font-size="9.5" font-weight="500" fill="#faf9f7" text-anchor="middle">第1周</text>
  <!-- Target: 58→62, Actual: 60 -->
  <text x="120" y="140" font-family="system-ui" font-size="10" fill="#1a1a1a">目标 58% → 62%</text>
  <text x="240" y="140" font-family="system-ui" font-size="10" fill="#1a1a1a">实际 60%</text>
  <rect x="298" y="126" width="46" height="20" rx="10" fill="#c98a6a"/>
  <text x="321" y="140" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">接近</text>
  <!-- Progress bar: 60% of way from 58 to 62 = (60-58)/(62-58) = 50% -->
  <rect x="360" y="130" width="160" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="360" y="130" width="80" height="8" rx="4" fill="#c98a6a"/>
  <text x="526" y="139" font-family="system-ui" font-size="8.5" fill="#8a8580">50/100</text>
  <!-- Range markers -->
  <text x="360" y="152" font-family="system-ui" font-size="8" fill="#8a8580">58%</text>
  <text x="440" y="152" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="middle">60%</text>
  <text x="520" y="152" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="end">62%</text>

  <!-- Stage 2: 第2周 -->
  <rect x="40" y="198" width="600" height="76" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="54" y="210" width="52" height="20" rx="10" fill="#c98a6a"/>
  <text x="80" y="224" font-family="system-ui" font-size="9.5" font-weight="500" fill="#faf9f7" text-anchor="middle">第2周</text>
  <text x="120" y="224" font-family="system-ui" font-size="10" fill="#1a1a1a">目标 62% → 65%</text>
  <text x="240" y="224" font-family="system-ui" font-size="10" fill="#1a1a1a">实际 64%</text>
  <rect x="298" y="210" width="46" height="20" rx="10" fill="#c98a6a"/>
  <text x="321" y="224" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">接近</text>
  <!-- Progress: (64-62)/(65-62) = 67% -->
  <rect x="360" y="214" width="160" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="360" y="214" width="107" height="8" rx="4" fill="#c98a6a"/>
  <text x="526" y="223" font-family="system-ui" font-size="8.5" fill="#8a8580">67/100</text>
  <text x="360" y="236" font-family="system-ui" font-size="8" fill="#8a8580">62%</text>
  <text x="413" y="236" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="middle">64%</text>
  <text x="520" y="236" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="end">65%</text>

  <!-- Stage 3: 第4周 -->
  <rect x="40" y="282" width="600" height="76" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="54" y="294" width="52" height="20" rx="10" fill="#c98a6a"/>
  <text x="80" y="308" font-family="system-ui" font-size="9.5" font-weight="500" fill="#faf9f7" text-anchor="middle">第4周</text>
  <text x="120" y="308" font-family="system-ui" font-size="10" fill="#1a1a1a">目标 65% → 70%</text>
  <text x="240" y="308" font-family="system-ui" font-size="10" fill="#1a1a1a">实际 68%</text>
  <rect x="298" y="294" width="46" height="20" rx="10" fill="#c98a6a"/>
  <text x="321" y="308" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">接近</text>
  <!-- Progress: (68-65)/(70-65) = 60% -->
  <rect x="360" y="298" width="160" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="360" y="298" width="96" height="8" rx="4" fill="#c98a6a"/>
  <text x="526" y="307" font-family="system-ui" font-size="8.5" fill="#8a8580">60/100</text>
  <text x="360" y="320" font-family="system-ui" font-size="8" fill="#8a8580">65%</text>
  <text x="408" y="320" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="middle">68%</text>
  <text x="520" y="320" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="end">70%</text>

  <!-- Stage 4: 第8周 -->
  <rect x="40" y="366" width="600" height="76" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="54" y="378" width="52" height="20" rx="10" fill="#c98a6a"/>
  <text x="80" y="392" font-family="system-ui" font-size="9.5" font-weight="500" fill="#faf9f7" text-anchor="middle">第8周</text>
  <text x="120" y="392" font-family="system-ui" font-size="10" fill="#1a1a1a">目标 70% → 75%</text>
  <text x="240" y="392" font-family="system-ui" font-size="10" fill="#1a1a1a">实际 76%</text>
  <rect x="298" y="378" width="56" height="20" rx="10" fill="#8f9b7f"/>
  <text x="326" y="392" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">达成</text>
  <!-- Progress: (76-70)/(75-70) = 120% (exceeded) -->
  <rect x="360" y="382" width="160" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="360" y="382" width="160" height="8" rx="4" fill="#8f9b7f"/>
  <text x="526" y="391" font-family="system-ui" font-size="8.5" fill="#8a8580">120/100</text>
  <text x="360" y="404" font-family="system-ui" font-size="8" fill="#8a8580">70%</text>
  <text x="437" y="404" font-family="system-ui" font-size="8" fill="#8a8580" text-anchor="middle">75%</text>
  <text x="520" y="404" font-family="system-ui" font-size="8" fill="#8f9b7f" text-anchor="end">76%</text>

  <!-- Final conclusion -->
  <rect x="40" y="450" width="600" height="36" rx="8" fill="#8f9b7f"/>
  <text x="340" y="473" font-family="system-ui" font-size="11" font-weight="500" fill="#faf9f7" text-anchor="middle">验收结果：通过（建议维持观察1个月）</text>
</svg>
