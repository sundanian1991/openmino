<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <rect width="680" height="480" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">排名趋势（近6个月）</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">头部集中度与个体走势</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="355" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Y-axis labels (inverted: #1 at top) -->
  <!-- rank_to_y: y = 90 + (rank-1)*20, so #1→90, #3→130, #5→170, #8→230, #10→270, #12→310, #15→370 -->
  <text x="72" y="94" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#1</text>
  <line x1="80" y1="90" x2="610" y2="90" stroke="#e8e4dc" stroke-width="0.5"/>

  <text x="72" y="134" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#3</text>
  <line x1="80" y1="130" x2="610" y2="130" stroke="#e8e4dc" stroke-width="0.5"/>

  <text x="72" y="174" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#5</text>
  <line x1="80" y1="170" x2="610" y2="170" stroke="#e8e4dc" stroke-width="0.5"/>

  <text x="72" y="234" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#8</text>
  <line x1="80" y1="230" x2="610" y2="230" stroke="#e8e4dc" stroke-width="0.5"/>

  <text x="72" y="274" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#10</text>
  <line x1="80" y1="270" x2="610" y2="270" stroke="#e8e4dc" stroke-width="0.5"/>

  <text x="72" y="334" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#13</text>
  <line x1="80" y1="330" x2="610" y2="330" stroke="#e8e4dc" stroke-width="0.5"/>

  <text x="72" y="374" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">#15</text>
  <line x1="80" y1="370" x2="610" y2="370" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- X-axis months -->
  <text x="116" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">11月</text>
  <text x="212" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">12月</text>
  <text x="308" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">1月</text>
  <text x="404" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">2月</text>
  <text x="500" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">3月</text>
  <text x="596" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">4月</text>

  <!-- Top 3 line (olive green) -->
  <polyline points="116,110 212,90 308,110 404,90 500,110 596,90"
    fill="none" stroke="#8f9b7f" stroke-width="2"/>
  <circle cx="116" cy="110" r="4" fill="#faf9f7" stroke="#8f9b7f" stroke-width="1.5"/>
  <circle cx="212" cy="90" r="4" fill="#faf9f7" stroke="#8f9b7f" stroke-width="1.5"/>
  <circle cx="308" cy="110" r="4" fill="#faf9f7" stroke="#8f9b7f" stroke-width="1.5"/>
  <circle cx="404" cy="90" r="4" fill="#faf9f7" stroke="#8f9b7f" stroke-width="1.5"/>
  <circle cx="500" cy="110" r="4" fill="#faf9f7" stroke="#8f9b7f" stroke-width="1.5"/>
  <circle cx="596" cy="90" r="4" fill="#faf9f7" stroke="#8f9b7f" stroke-width="1.5"/>
  <text x="596" y="86" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8f9b7f">头部均#2</text>

  <!-- Mid-range line (terracotta) -->
  <polyline points="116,250 212,270 308,230 404,250 500,210 596,190"
    fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="116" cy="250" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="212" cy="270" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="308" cy="230" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="404" cy="250" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="500" cy="210" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="596" cy="190" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="596" y="186" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#c98a6a">广达 #5</text>

  <!-- Declining line (burnt orange) -->
  <polyline points="116,270 212,290 308,310 404,330 500,350 596,370"
    fill="none" stroke="#d4845a" stroke-width="2"/>
  <circle cx="116" cy="270" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <circle cx="212" cy="290" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <circle cx="308" cy="310" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <circle cx="404" cy="330" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <circle cx="500" cy="350" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <circle cx="596" cy="370" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <text x="596" y="386" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#d4845a">华啸 #15</text>

  <!-- Attention note -->
  <rect x="80" y="400" width="280" height="28" rx="6" fill="#d4845a" fill-opacity="0.10" stroke="#d4845a" stroke-width="0.5"/>
  <rect x="88" y="406" width="6" height="14" rx="2" fill="#d4845a"/>
  <text x="91" y="417" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#faf9f7">!</text>
  <text x="100" y="419" font-family="system-ui" font-size="10" fill="#d4845a">华啸 连续4月下滑 → 当前#15</text>

  <!-- Legend -->
  <line x1="400" y1="413" x2="420" y2="413" stroke="#8f9b7f" stroke-width="2"/>
  <text x="426" y="417" font-family="system-ui" font-size="9.5" fill="#1a1a1a">头部供应商</text>

  <line x1="510" y1="413" x2="530" y2="413" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="536" y="417" font-family="system-ui" font-size="9.5" fill="#1a1a1a">中游区间</text>

  <!-- Footer -->
  <text x="340" y="468" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">头部排名稳定在#1-#3，尾部供应商持续下滑需重点关注</text>
</svg>
