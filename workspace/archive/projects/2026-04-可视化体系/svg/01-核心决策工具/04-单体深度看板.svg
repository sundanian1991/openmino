<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">[毅航] 供应商深度看板</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">7维度全方位诊断</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="375" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Top indicator cards -->
  <!-- Card 1: 排名#3 -->
  <rect x="55" y="72" width="160" height="40" rx="8" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1"/>
  <text x="135" y="88" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">当前排名</text>
  <text x="135" y="104" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">#3</text>

  <!-- Card 2: FCI 92% -->
  <rect x="260" y="72" width="160" height="40" rx="8" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1"/>
  <text x="340" y="88" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">FCI 综合指标</text>
  <text x="340" y="104" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">92%</text>

  <!-- Card 3: 人效+8% -->
  <rect x="465" y="72" width="160" height="40" rx="8" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1"/>
  <text x="545" y="88" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">人效变化</text>
  <text x="545" y="104" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">+8%</text>

  <!-- Radar chart: center 340,200 radius 100 -->
  <!-- Concentric polygons -->
  <!-- 100% -->
  <polygon points="340,100 430.5,167.3 415.7,280.1 340,300 264.3,280.1 249.5,167.3 277.7,121.8" fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 80% -->
  <polygon points="340,120 416.4,175.8 404.6,266.1 340,282 275.4,266.1 263.6,175.8 286.2,139.4" fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 60% -->
  <polygon points="340,140 402.3,184.4 393.4,252.1 340,264 286.6,252.1 277.7,184.4 294.6,157.1" fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 40% -->
  <polygon points="340,160 388.2,193.0 382.3,238.0 340,246 297.7,238.0 291.8,193.0 303.1,174.7" fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 20% -->
  <polygon points="340,180 374.1,201.5 371.1,224.0 340,228 308.9,224.0 305.9,201.5 311.5,192.4" fill="none" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Axis lines -->
  <line x1="340" y1="200" x2="340" y2="100" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="200" x2="430.5" y2="167.3" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="200" x2="415.7" y2="280.1" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="200" x2="340" y2="300" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="200" x2="264.3" y2="280.1" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="200" x2="249.5" y2="167.3" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="200" x2="277.7" y2="121.8" stroke="#d4d1c7" stroke-width="0.5"/>

  <!-- Data polygon: 产能85/人效88/质量90/成本82/成长65/流失78/合规95 -->
  <polygon points="325,115 410.5,178.0 401.5,268.1 322,286.0 272.4,260.1 261.5,177.3 287.2,132.6"
    fill="#c98a6a" fill-opacity="0.10" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Data points -->
  <circle cx="325" cy="115" r="3" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="410.5" cy="178" r="3" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="401.5" cy="268.1" r="3" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="322" cy="286" r="3" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="272.4" cy="260.1" r="3" fill="#faf9f7" stroke="#d4845a" stroke-width="1.5"/>
  <circle cx="261.5" cy="177.3" r="3" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="287.2" cy="132.6" r="3" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="340" y="94" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">产能</text>
  <text x="438" y="164" font-family="system-ui" font-size="10" fill="#1a1a1a">人效</text>
  <text x="423" y="296" font-family="system-ui" font-size="10" fill="#1a1a1a">质量</text>
  <text x="340" y="316" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">成本</text>
  <text x="248" y="296" text-anchor="end" font-family="system-ui" font-size="10" fill="#d4845a" font-weight="500">成长</text>
  <text x="242" y="164" font-family="system-ui" font-size="10" fill="#1a1a1a">流失</text>
  <text x="270" y="116" text-anchor="end" font-family="system-ui" font-size="10" fill="#1a1a1a">合规</text>

  <!-- Weak axis highlight -->
  <line x1="340" y1="200" x2="272.4" y2="260.1" stroke="#d4845a" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- Bottom: comprehensive score card -->
  <rect x="180" y="340" width="320" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="362" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#6b6b6b">综合得分</text>
  <text x="340" y="386" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="700" fill="#8f9b7f">89分</text>
  <text x="340" y="402" text-anchor="middle" font-family="system-ui" font-size="10" fill="#8f9b7f" font-weight="500">优秀</text>

  <!-- Thin item alert -->
  <rect x="180" y="418" width="320" height="24" rx="6" fill="#d4845a" fill-opacity="0.08" stroke="#d4845a" stroke-width="0.5"/>
  <text x="340" y="435" text-anchor="middle" font-family="system-ui" font-size="9.5" fill="#d4845a" font-weight="500">薄弱项：成长速度（65分）需重点关注</text>
</svg>
