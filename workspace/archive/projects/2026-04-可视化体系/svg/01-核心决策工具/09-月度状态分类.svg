<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <rect width="680" height="380" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">月度状态分类</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">需行动 vs 维持观察</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="290" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- P0 card: 需行动 -->
  <rect x="55" y="72" width="280" height="160" rx="10" fill="#d4845a" fill-opacity="0.15" stroke="#d4845a" stroke-width="1.5"/>

  <!-- P0 header -->
  <rect x="70" y="84" width="250" height="30" rx="6" fill="#d4845a" fill-opacity="0.20"/>
  <text x="195" y="104" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#d4845a">需行动（P0）</text>

  <!-- P0 suppliers -->
  <rect x="70" y="122" width="250" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="195" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">涉及供应商</text>
  <text x="195" y="156" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#1a1a1a">华啸、岐力</text>

  <!-- P0 action -->
  <rect x="70" y="170" width="250" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="195" y="188" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">行动方案</text>
  <text x="195" y="208" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#d4845a">→ 立即约谈，制定整改计划</text>

  <!-- P1-P2 card: 维持观察 -->
  <rect x="350" y="72" width="275" height="160" rx="10" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>

  <!-- P1-P2 header -->
  <rect x="365" y="84" width="245" height="30" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="487" y="104" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">维持观察（P1-P2）</text>

  <!-- P1-P2 suppliers -->
  <rect x="365" y="122" width="245" height="40" rx="8" fill="#faf9f7" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="487" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">涉及供应商</text>
  <text x="487" y="156" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">毅航、毛毛虫、广达、伽玛、赛维斯</text>

  <!-- P1-P2 action -->
  <rect x="365" y="170" width="245" height="48" rx="8" fill="#faf9f7" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="487" y="188" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">行动方案</text>
  <text x="487" y="208" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#6b6b6b">→ 常规关注，分享标杆经验</text>

  <!-- Summary -->
  <rect x="210" y="250" width="260" height="36" rx="8" fill="#d4845a" fill-opacity="0.12" stroke="#d4845a" stroke-width="1"/>
  <text x="340" y="274" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#d4845a">本月需行动数：2 个</text>

  <!-- Comparison note -->
  <text x="340" y="305" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">P0 占比 2/7 = 29%，较上月 3/7 改善</text>

  <!-- Footer -->
  <text x="340" y="368" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">P0 供应商需在 5 个工作日内完成约谈并输出整改方案</text>
</svg>
