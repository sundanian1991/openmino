<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <rect width="680" height="520" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">归因逻辑树</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">从业绩异常到具体行动的完整路径</text>

  <defs>
    <marker id="arrG" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="5" markerHeight="4" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c98a6a"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="5" markerHeight="4" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="430" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Root node: 业绩/排名异常？ -->
  <rect x="240" y="72" width="200" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="90" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">业绩 / 排名异常？</text>

  <!-- YES branch down -->
  <line x1="340" y1="108" x2="340" y2="138" stroke="#c98a6a" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="350" y="128" font-family="system-ui" font-size="10" font-weight="500" fill="#c98a6a">是</text>

  <!-- Node 2: 哪个维度差？ -->
  <rect x="240" y="140" width="200" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="158" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">哪个维度差？</text>

  <!-- Three branches from Node 2 -->
  <!-- Left: 产能不足 (warning) -->
  <line x1="260" y1="176" x2="140" y2="210" stroke="#d4845a" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Center: 人效低 -->
  <line x1="340" y1="176" x2="340" y2="210" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Right: 质量差 (solution) -->
  <line x1="420" y1="176" x2="540" y2="210" stroke="#8f9b7f" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Branch labels -->
  <text x="180" y="198" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d4845a">产能不足</text>
  <text x="350" y="198" font-family="system-ui" font-size="9" fill="#c98a6a">人效低</text>
  <text x="500" y="198" text-anchor="middle" font-family="system-ui" font-size="9" fill="#8f9b7f">质量差</text>

  <!-- Action boxes -->
  <!-- 产能不足 → 行动 -->
  <rect x="60" y="212" width="160" height="48" rx="8" fill="#f5f4f1" stroke="#d4845a" stroke-width="1.5"/>
  <text x="140" y="230" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#d4845a">扩充产能</text>
  <text x="140" y="246" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">增人/增线/调班次</text>
  <text x="140" y="258" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">+ 周度跟踪</text>

  <!-- 人效低 → 行动 -->
  <rect x="260" y="212" width="160" height="48" rx="8" fill="#f5f4f1" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="340" y="230" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#c98a6a">效率提升</text>
  <text x="340" y="246" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">流程优化 / 培训</text>
  <text x="340" y="258" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">+ 人效对标分析</text>

  <!-- 质量差 → 行动 -->
  <rect x="460" y="212" width="160" height="48" rx="8" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
  <text x="540" y="230" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#8f9b7f">质量整改</text>
  <text x="540" y="246" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">质检复盘 / SOP</text>
  <text x="540" y="258" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">+ 专项辅导</text>

  <!-- NO branch from root -->
  <line x1="440" y1="90" x2="560" y2="90" stroke="#c98a6a" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="498" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#c98a6a">否</text>

  <!-- 正常通报 action -->
  <rect x="560" y="72" width="60" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="590" y="90" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1a1a1a">通报</text>

  <!-- Bottom section: further breakdown -->
  <line x1="140" y1="260" x2="140" y2="300" stroke="#c98a6a" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="150" y="285" font-family="system-ui" font-size="9" fill="#6b6b6b">根因定位后</text>

  <!-- Capacity sub-actions -->
  <rect x="55" y="302" width="170" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="140" y="318" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">约谈主管 → 整改计划</text>
  <text x="140" y="334" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">周跟踪 → 月评估 → 份额调整</text>

  <!-- 人效 sub-actions -->
  <line x1="340" y1="260" x2="340" y2="300" stroke="#c98a6a" stroke-width="1" marker-end="url(#arrG)"/>
  <rect x="260" y="302" width="160" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="318" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">标杆对标 → 差距分析</text>
  <text x="340" y="334" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">培训 → 跟踪 → 复评</text>

  <!-- 质量 sub-actions -->
  <line x1="540" y1="260" x2="540" y2="300" stroke="#c98a6a" stroke-width="1" marker-end="url(#arrG)"/>
  <rect x="460" y="302" width="160" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="540" y="318" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">质检通报 → 专项整改</text>
  <text x="540" y="334" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">SOP完善 → 持续监控</text>

  <!-- Final escalation -->
  <text x="340" y="380" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">升级路径</text>

  <!-- Escalation boxes -->
  <rect x="60" y="392" width="170" height="36" rx="8" fill="#f5f4f1" stroke="#d4845a" stroke-width="1.5"/>
  <text x="145" y="408" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#d4845a">整改无效 → P0 预警</text>
  <text x="145" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">约谈 + 限期整改</text>

  <rect x="260" y="392" width="160" height="36" rx="8" fill="#f5f4f1" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="340" y="408" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#c98a6a">连续不达标 → 份额调整</text>
  <text x="340" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">减少分配量</text>

  <rect x="460" y="392" width="160" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="540" y="408" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">持续改善 → 维持合作</text>
  <text x="540" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">经验沉淀</text>

  <!-- Escalation arrows -->
  <line x1="230" y1="410" x2="258" y2="410" stroke="#c98a6a" stroke-width="1"/>
  <line x1="420" y1="410" x2="458" y2="410" stroke="#c98a6a" stroke-width="1"/>

  <!-- Footer -->
  <text x="340" y="475" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">从异常发现到具体行动，每条路径都有明确的责任人和时间节点</text>
</svg>
