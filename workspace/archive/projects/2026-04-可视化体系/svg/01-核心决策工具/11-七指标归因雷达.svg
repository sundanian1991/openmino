<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
  <rect width="680" height="540" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">7指标归因雷达详解</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">产能 / 人效 / 质量 / 成本 / 成长 / 流失 / 合规</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="450" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Radar chart: center 340,190 radius 120 -->
  <!-- Concentric polygons -->
  <!-- 100% (r=120) -->
  <polygon points="340,70 456.6,183.7 438.8,326.1 340,310 241.2,326.1 223.4,183.7 259.2,97.9"
    fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 80% (r=96) -->
  <polygon points="340,94 445.3,187.0 431.0,300.9 340,288 249.0,300.9 238.7,187.0 267.4,118.3"
    fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 60% (r=72) -->
  <polygon points="340,118 434.0,190.2 423.3,275.7 340,266 256.7,275.7 254.1,190.2 275.5,138.7"
    fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 40% (r=48) -->
  <polygon points="340,142 422.7,193.5 415.5,250.5 340,244 264.5,250.5 269.4,193.5 283.7,159.1"
    fill="none" stroke="#e8e4dc" stroke-width="0.5"/>
  <!-- 20% (r=24) -->
  <polygon points="340,166 411.3,196.7 407.8,225.2 340,222 272.2,225.2 284.8,196.7 291.8,179.5"
    fill="none" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Axis lines -->
  <line x1="340" y1="190" x2="340" y2="70" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="456.6" y2="183.7" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="438.8" y2="326.1" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="340" y2="310" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="241.2" y2="326.1" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="223.4" y2="183.7" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="259.2" y2="97.9" stroke="#d4d1c7" stroke-width="0.5"/>

  <!-- Data polygon: 产能85/人效88/质量90/成本82/成长65/流失78/合规95 -->
  <polygon points="328,92 444.2,191.8 433.1,315.5 330.4,298 257.7,306.6 236.8,190.2 267.3,108.5"
    fill="#c98a6a" fill-opacity="0.10" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Data points -->
  <circle cx="328" cy="92" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="444.2" cy="191.8" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="433.1" cy="315.5" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="330.4" cy="298" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="257.7" cy="306.6" r="4" fill="#faf9f7" stroke="#d4845a" stroke-width="2"/>
  <circle cx="236.8" cy="190.2" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="267.3" cy="108.5" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="340" y="62" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">产能</text>
  <text x="464" y="181" font-family="system-ui" font-size="10.5" fill="#1a1a1a">人效</text>
  <text x="446" y="342" font-family="system-ui" font-size="10.5" fill="#1a1a1a">质量</text>
  <text x="340" y="330" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#1a1a1a">成本</text>
  <text x="234" y="342" text-anchor="end" font-family="system-ui" font-size="10.5" fill="#d4845a" font-weight="500">成长</text>
  <text x="216" y="181" font-family="system-ui" font-size="10.5" fill="#1a1a1a">流失</text>
  <text x="252" y="92" text-anchor="end" font-family="system-ui" font-size="10.5" fill="#1a1a1a">合规</text>

  <!-- Score table below radar -->
  <text x="340" y="365" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#6b6b6b">各项得分</text>

  <!-- 7 score cards in a row -->
  <!-- Card width 72, gap 8, total 7*72 + 6*8 = 552, start x=64 -->

  <!-- 产能 85 -->
  <rect x="64" y="375" width="72" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="100" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">产能</text>
  <text x="100" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">85</text>

  <!-- 人效 88 -->
  <rect x="144" y="375" width="72" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="180" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">人效</text>
  <text x="180" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">88</text>

  <!-- 质量 90 -->
  <rect x="224" y="375" width="72" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="260" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">质量</text>
  <text x="260" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">90</text>

  <!-- 成本 82 -->
  <rect x="304" y="375" width="72" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">成本</text>
  <text x="340" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#c98a6a">82</text>

  <!-- 成长 65 (highlighted) -->
  <rect x="384" y="375" width="72" height="44" rx="8" fill="#d4845a" fill-opacity="0.08" stroke="#d4845a" stroke-width="1.5"/>
  <text x="420" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d4845a">成长</text>
  <text x="420" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#d4845a">65</text>

  <!-- 流失 78 -->
  <rect x="464" y="375" width="72" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="500" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">流失</text>
  <text x="500" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#c98a6a">78</text>

  <!-- 合规 95 -->
  <rect x="544" y="375" width="72" height="44" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="580" y="393" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">合规</text>
  <text x="580" y="412" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">95</text>

  <!-- Comprehensive score -->
  <rect x="190" y="435" width="300" height="55" rx="10" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="456" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">综合得分</text>
  <text x="340" y="480" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="700" fill="#8f9b7f">86分</text>

  <!-- Footer -->
  <text x="340" y="528" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">成长得分65为最低项，反映新业务拓展和团队扩张能力不足</text>
</svg>
