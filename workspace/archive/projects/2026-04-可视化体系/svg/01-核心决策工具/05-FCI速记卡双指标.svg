<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <rect width="680" height="420" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">FCI 速记卡 + 双指标</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">月度通报核心工具 — 综合指标避免唯业绩论</text>

  <!-- Left container: FCI速记卡 -->
  <rect x="40" y="58" width="295" height="330" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- FCI header -->
  <rect x="55" y="72" width="265" height="32" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="187" y="93" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">FCI — 财务综合指标</text>

  <!-- Definition -->
  <text x="55" y="124" font-family="system-ui" font-size="10" fill="#1a1a1a">定义</text>
  <text x="55" y="140" font-family="system-ui" font-size="10" fill="#6b6b6b">综合反映供应商财务健康状况的单一指标</text>

  <!-- Formula -->
  <text x="55" y="166" font-family="system-ui" font-size="10" fill="#1a1a1a">公式</text>
  <text x="55" y="182" font-family="system-ui" font-size="10" fill="#6b6b6b">FCI = 业绩达成 × 50% + 质量得分 × 30%</text>
  <text x="55" y="196" font-family="system-ui" font-size="10" fill="#6b6b6b">     + 合规评分 × 20%</text>

  <!-- 3 tiers -->
  <text x="55" y="222" font-family="system-ui" font-size="10" fill="#1a1a1a" font-weight="500">分级标准</text>

  <!-- Tier 1: ≥90% 优秀 -->
  <rect x="55" y="230" width="265" height="28" rx="6" fill="#8f9b7f" fill-opacity="0.10" stroke="#8f9b7f" stroke-width="0.5"/>
  <text x="75" y="249" font-family="system-ui" font-size="10" fill="#1a1a1a">≥ 90%</text>
  <rect x="130" y="240" width="36" height="16" rx="4" fill="#8f9b7f"/>
  <text x="148" y="252" text-anchor="middle" font-family="system-ui" font-size="9" fill="#faf9f7">优秀</text>
  <text x="178" y="249" font-family="system-ui" font-size="9" fill="#6b6b6b">标杆供应商，优先分配</text>

  <!-- Tier 2: 80-90% 合格 -->
  <rect x="55" y="264" width="265" height="28" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="75" y="283" font-family="system-ui" font-size="10" fill="#1a1a1a">80-90%</text>
  <rect x="130" y="274" width="36" height="16" rx="4" fill="#c98a6a"/>
  <text x="148" y="286" text-anchor="middle" font-family="system-ui" font-size="9" fill="#faf9f7">合格</text>
  <text x="178" y="283" font-family="system-ui" font-size="9" fill="#6b6b6b">正常合作，持续观察</text>

  <!-- Tier 3: <80% 预警 -->
  <rect x="55" y="298" width="265" height="28" rx="6" fill="#d4845a" fill-opacity="0.10" stroke="#d4845a" stroke-width="0.5"/>
  <text x="75" y="317" font-family="system-ui" font-size="10" fill="#1a1a1a">&lt; 80%</text>
  <rect x="130" y="308" width="36" height="16" rx="4" fill="#d4845a"/>
  <text x="148" y="320" text-anchor="middle" font-family="system-ui" font-size="9" fill="#faf9f7">预警</text>
  <text x="178" y="317" font-family="system-ui" font-size="9" fill="#6b6b6b">需约谈并限期整改</text>

  <!-- Right container: 双指标卡片 -->
  <rect x="345" y="58" width="295" height="330" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="360" y="72" width="265" height="32" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="492" y="93" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">[毅航] 月度双指标</text>

  <!-- 业绩达成 -->
  <text x="360" y="130" font-family="system-ui" font-size="10" fill="#6b6b6b">业绩达成</text>
  <text x="600" y="130" text-anchor="end" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">92%</text>
  <rect x="360" y="138" width="265" height="10" rx="5" fill="#f5f4f1"/>
  <rect x="360" y="138" width="244" height="10" rx="5" fill="#8f9b7f"/>

  <!-- FCI指标 -->
  <text x="360" y="178" font-family="system-ui" font-size="10" fill="#6b6b6b">FCI 指标</text>
  <text x="600" y="178" text-anchor="end" font-family="system-ui" font-size="14" font-weight="700" fill="#8f9b7f">88%</text>
  <rect x="360" y="186" width="265" height="10" rx="5" fill="#f5f4f1"/>
  <rect x="360" y="186" width="233" height="10" rx="5" fill="#8f9b7f"/>

  <!-- Divider -->
  <line x1="360" y1="220" x2="625" y2="220" stroke="#e8e4dc" stroke-width="1"/>

  <!-- Breakdown -->
  <text x="360" y="246" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">FCI 拆解</text>

  <rect x="360" y="254" width="265" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="375" y="270" font-family="system-ui" font-size="9.5" fill="#6b6b6b">业绩 × 50%</text>
  <text x="540" y="270" text-anchor="end" font-family="system-ui" font-size="9.5" fill="#1a1a1a">46.0</text>

  <rect x="360" y="282" width="265" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="375" y="298" font-family="system-ui" font-size="9.5" fill="#6b6b6b">质量 × 30%</text>
  <text x="540" y="298" text-anchor="end" font-family="system-ui" font-size="9.5" fill="#1a1a1a">25.8</text>

  <rect x="360" y="310" width="265" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="375" y="326" font-family="system-ui" font-size="9.5" fill="#6b6b6b">合规 × 20%</text>
  <text x="540" y="326" text-anchor="end" font-family="system-ui" font-size="9.5" fill="#1a1a1a">16.0</text>

  <!-- Status -->
  <rect x="360" y="344" width="265" height="30" rx="8" fill="#8f9b7f" fill-opacity="0.12" stroke="#8f9b7f" stroke-width="1"/>
  <text x="492" y="364" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#8f9b7f">标杆型，维持现状</text>
</svg>
