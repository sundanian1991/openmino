<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="100%">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c98a6a"/>
    </marker>
  </defs>

  <rect width="680" height="480" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">问题 → 后果 → 应对 闭环</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b66">异常处理的完整SOP — 从识别到闭环验证</text>

  <!-- Main container -->
  <rect x="40" y="62" width="600" height="400" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- 3-column flow cards -->
  <!-- 问题识别 -->
  <rect x="52" y="74" width="170" height="80" rx="8" fill="#d4845a" opacity="0.1" stroke="#d4845a" stroke-width="1.2"/>
  <text x="137" y="96" font-family="system-ui" font-size="11" font-weight="500" fill="#d4845a" text-anchor="middle">问题识别</text>
  <text x="137" y="114" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">华啸峰值比58%</text>
  <text x="137" y="128" font-family="system-ui" font-size="9.5" fill="#6b6b66" text-anchor="middle">连续3月低于阈值</text>
  <text x="137" y="142" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="middle">触发: P0预警</text>

  <!-- Arrow 1 -->
  <line x1="226" y1="114" x2="246" y2="114" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- 后果分析 -->
  <rect x="250" y="74" width="170" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="335" y="96" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a" text-anchor="middle">后果分析</text>
  <text x="335" y="114" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">产能不足，无法接单</text>
  <text x="335" y="128" font-family="system-ui" font-size="9.5" fill="#6b6b66" text-anchor="middle">排名下滑 #10→#15</text>
  <text x="335" y="142" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="middle">影响: 月度产能损失15%</text>

  <!-- Arrow 2 -->
  <line x1="424" y1="114" x2="444" y2="114" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- 应对措施 -->
  <rect x="448" y="74" width="180" height="80" rx="8" fill="#8f9b7f" opacity="0.12" stroke="#8f9b7f" stroke-width="1.2"/>
  <text x="538" y="96" font-family="system-ui" font-size="11" font-weight="500" fill="#5a6b4f" text-anchor="middle">应对措施</text>
  <text x="538" y="114" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">约谈+整改+资源支持</text>
  <text x="538" y="128" font-family="system-ui" font-size="9.5" fill="#6b6b66" text-anchor="middle">目标: 4周内达标75%</text>
  <text x="538" y="142" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="middle">责任人: 年老师</text>

  <!-- Divider line -->
  <line x1="52" y1="170" x2="628" y2="170" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="52" y="186" font-family="system-ui" font-size="9" fill="#8a8580">闭环验证</text>

  <!-- Timeline milestones -->
  <!-- Week 1 -->
  <rect x="52" y="200" width="104" height="52" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="104" y="220" font-family="system-ui" font-size="9" font-weight="500" fill="#6b6b66" text-anchor="middle">第1周</text>
  <text x="104" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">目标62%</text>
  <text x="104" y="246" font-family="system-ui" font-size="9.5" fill="#c98a6a" text-anchor="middle">实际60%</text>

  <!-- Week 2 -->
  <rect x="164" y="200" width="104" height="52" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="216" y="220" font-family="system-ui" font-size="9" font-weight="500" fill="#6b6b66" text-anchor="middle">第2周</text>
  <text x="216" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">目标65%</text>
  <text x="216" y="246" font-family="system-ui" font-size="9.5" fill="#c98a6a" text-anchor="middle">实际64%</text>

  <!-- Week 4 -->
  <rect x="276" y="200" width="104" height="52" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="328" y="220" font-family="system-ui" font-size="9" font-weight="500" fill="#6b6b66" text-anchor="middle">第4周</text>
  <text x="328" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">目标70%</text>
  <text x="328" y="246" font-family="system-ui" font-size="9.5" fill="#c98a6a" text-anchor="middle">实际68%</text>

  <!-- Week 6 -->
  <rect x="388" y="200" width="104" height="52" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="440" y="220" font-family="system-ui" font-size="9" font-weight="500" fill="#6b6b66" text-anchor="middle">第6周</text>
  <text x="440" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">目标73%</text>
  <text x="440" y="246" font-family="system-ui" font-size="9.5" fill="#c98a6a" text-anchor="middle">实际72%</text>

  <!-- Week 8 - achieved -->
  <rect x="500" y="200" width="104" height="52" rx="8" fill="#8f9b7f" opacity="0.12" stroke="#8f9b7f" stroke-width="1.2"/>
  <text x="552" y="220" font-family="system-ui" font-size="9" font-weight="500" fill="#5a6b4f" text-anchor="middle">第8周</text>
  <text x="552" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a" text-anchor="middle">目标75%</text>
  <text x="552" y="246" font-family="system-ui" font-size="10" font-weight="600" fill="#5a6b4f" text-anchor="middle">实际76% ✓</text>

  <!-- Progress bar -->
  <text x="52" y="274" font-family="system-ui" font-size="9" fill="#8a8580">进度</text>
  <rect x="82" y="268" width="522" height="10" rx="5" fill="#d4d1c7"/>
  <rect x="82" y="268" width="470" height="10" rx="5" fill="#8f9b7f"/>
  <text x="610" y="277" font-family="system-ui" font-size="8.5" font-weight="500" fill="#5a6b4f" text-anchor="end">76%</text>

  <!-- Vertical closed-loop arrow -->
  <line x1="635" y1="190" x2="635" y2="270" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="635" y="210" font-family="system-ui" font-size="8.5" fill="#c98a6a" text-anchor="middle" transform="rotate(90,635,210)">闭环确认 → 4周后达标，关闭</text>

  <!-- Key metric comparison -->
  <text x="52" y="306" font-family="system-ui" font-size="9" fill="#8a8580">关键指标对比</text>

  <rect x="52" y="316" width="260" height="56" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="62" y="334" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">整改前（第0周）</text>
  <text x="62" y="350" font-family="system-ui" font-size="10" fill="#6b6b66">峰值比: 58% | 排名: #15</text>
  <text x="62" y="364" font-family="system-ui" font-size="9.5" fill="#d4845a">状态: 产能不足，无法接单</text>

  <rect x="330" y="316" width="260" height="56" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="334" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">整改后（第8周）</text>
  <text x="340" y="350" font-family="system-ui" font-size="10" fill="#6b6b66">峰值比: 76% | 排名: #10</text>
  <text x="340" y="364" font-family="system-ui" font-size="9.5" fill="#5a6b4f">状态: 已达标，闭环关闭</text>

  <!-- Conclusion -->
  <rect x="52" y="388" width="538" height="40" rx="8" fill="#8f9b7f" opacity="0.08" stroke="#8f9b7f" stroke-width="1"/>
  <text x="321" y="406" font-family="system-ui" font-size="10" font-weight="500" fill="#5a6b4f" text-anchor="middle">闭环结论：8周内峰值比从58%提升至76%，超过75%目标，异常关闭</text>
  <text x="321" y="420" font-family="system-ui" font-size="9" fill="#6b6b66" text-anchor="middle">记录人：年老师 | 日期：2026-04-15 | 状态：已归档</text>

</svg>