<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" width="100%">
  <rect width="680" height="580" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">异常信号总表</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b66">28个异常信号按维度分类 — 快速查阅百科全书</text>

  <!-- Dimension 1: 产能异常 -->
  <rect x="40" y="62" width="600" height="66" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="86" y="86" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">产能异常</text>
  <rect x="52" y="94" width="130" height="24" rx="6" fill="#d4845a" opacity="0.12" stroke="#d4845a" stroke-width="0.8"/>
  <text x="62" y="110" font-family="system-ui" font-size="8.5" font-weight="600" fill="#d4845a">P0</text>
  <text x="84" y="110" font-family="system-ui" font-size="9.5" fill="#1a1a1a">峰值比&lt;70%</text>
  <rect x="200" y="94" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="210" y="110" font-family="system-ui" font-size="8.5" font-weight="600" fill="#8a8580">P1</text>
  <text x="232" y="110" font-family="system-ui" font-size="9.5" fill="#1a1a1a">连续下滑</text>
  <rect x="348" y="94" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#e0ddd5" stroke-width="0.8"/>
  <text x="358" y="110" font-family="system-ui" font-size="8.5" font-weight="600" fill="#b0aea5">P2</text>
  <text x="380" y="110" font-family="system-ui" font-size="9.5" fill="#1a1a1a">产能萎缩</text>

  <!-- Dimension 2: 质量异常 -->
  <rect x="40" y="136" width="600" height="66" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="86" y="160" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">质量异常</text>
  <rect x="52" y="168" width="130" height="24" rx="6" fill="#d4845a" opacity="0.12" stroke="#d4845a" stroke-width="0.8"/>
  <text x="62" y="184" font-family="system-ui" font-size="8.5" font-weight="600" fill="#d4845a">P0</text>
  <text x="84" y="184" font-family="system-ui" font-size="9.5" fill="#1a1a1a">合规率下降</text>
  <rect x="200" y="168" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="210" y="184" font-family="system-ui" font-size="8.5" font-weight="600" fill="#8a8580">P1</text>
  <text x="232" y="184" font-family="system-ui" font-size="9.5" fill="#1a1a1a">投诉增加</text>
  <rect x="348" y="168" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#e0ddd5" stroke-width="0.8"/>
  <text x="358" y="184" font-family="system-ui" font-size="8.5" font-weight="600" fill="#b0aea5">P2</text>
  <text x="380" y="184" font-family="system-ui" font-size="9.5" fill="#1a1a1a">返工率升高</text>

  <!-- Dimension 3: 人力异常 -->
  <rect x="40" y="210" width="600" height="66" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="86" y="234" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">人力异常</text>
  <rect x="52" y="242" width="130" height="24" rx="6" fill="#d4845a" opacity="0.12" stroke="#d4845a" stroke-width="0.8"/>
  <text x="62" y="258" font-family="system-ui" font-size="8.5" font-weight="600" fill="#d4845a">P0</text>
  <text x="84" y="258" font-family="system-ui" font-size="9.5" fill="#1a1a1a">流失率&gt;15%</text>
  <rect x="200" y="242" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="210" y="258" font-family="system-ui" font-size="8.5" font-weight="600" fill="#8a8580">P1</text>
  <text x="232" y="258" font-family="system-ui" font-size="9.5" fill="#1a1a1a">新人占比&gt;50%</text>
  <rect x="348" y="242" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#e0ddd5" stroke-width="0.8"/>
  <text x="358" y="258" font-family="system-ui" font-size="8.5" font-weight="600" fill="#b0aea5">P2</text>
  <text x="380" y="258" font-family="system-ui" font-size="9.5" fill="#1a1a1a">主管更换</text>

  <!-- Dimension 4: 成本异常 -->
  <rect x="40" y="284" width="600" height="66" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="86" y="308" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">成本异常</text>
  <rect x="52" y="316" width="130" height="24" rx="6" fill="#d4845a" opacity="0.12" stroke="#d4845a" stroke-width="0.8"/>
  <text x="62" y="332" font-family="system-ui" font-size="8.5" font-weight="600" fill="#d4845a">P0</text>
  <text x="84" y="332" font-family="system-ui" font-size="9.5" fill="#1a1a1a">成本上升</text>
  <rect x="200" y="316" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="210" y="332" font-family="system-ui" font-size="8.5" font-weight="600" fill="#8a8580">P1</text>
  <text x="232" y="332" font-family="system-ui" font-size="9.5" fill="#1a1a1a">毛利率下降</text>
  <rect x="348" y="316" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#e0ddd5" stroke-width="0.8"/>
  <text x="358" y="332" font-family="system-ui" font-size="8.5" font-weight="600" fill="#b0aea5">P2</text>
  <text x="380" y="332" font-family="system-ui" font-size="9.5" fill="#1a1a1a">费用超支</text>

  <!-- Dimension 5: 增长异常 -->
  <rect x="40" y="358" width="600" height="66" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="86" y="382" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">增长异常</text>
  <rect x="52" y="390" width="130" height="24" rx="6" fill="#d4845a" opacity="0.12" stroke="#d4845a" stroke-width="0.8"/>
  <text x="62" y="406" font-family="system-ui" font-size="8.5" font-weight="600" fill="#d4845a">P0</text>
  <text x="84" y="406" font-family="system-ui" font-size="9.5" fill="#1a1a1a">环比零增长</text>
  <rect x="200" y="390" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="210" y="406" font-family="system-ui" font-size="8.5" font-weight="600" fill="#8a8580">P1</text>
  <text x="232" y="406" font-family="system-ui" font-size="9.5" fill="#1a1a1a">新客户零</text>
  <rect x="348" y="390" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#e0ddd5" stroke-width="0.8"/>
  <text x="358" y="406" font-family="system-ui" font-size="8.5" font-weight="600" fill="#b0aea5">P2</text>
  <text x="380" y="406" font-family="system-ui" font-size="9.5" fill="#1a1a1a">份额下降</text>

  <!-- Dimension 6: 风险预警 -->
  <rect x="40" y="432" width="600" height="66" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="86" y="456" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">风险预警</text>
  <rect x="52" y="464" width="130" height="24" rx="6" fill="#d4845a" opacity="0.12" stroke="#d4845a" stroke-width="0.8"/>
  <text x="62" y="480" font-family="system-ui" font-size="8.5" font-weight="600" fill="#d4845a">P0</text>
  <text x="84" y="480" font-family="system-ui" font-size="9.5" fill="#1a1a1a">合规违规</text>
  <rect x="200" y="464" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="210" y="480" font-family="system-ui" font-size="8.5" font-weight="600" fill="#8a8580">P1</text>
  <text x="232" y="480" font-family="system-ui" font-size="9.5" fill="#1a1a1a">客户投诉集中</text>
  <rect x="348" y="464" width="130" height="24" rx="6" fill="#f5f4f1" stroke="#e0ddd5" stroke-width="0.8"/>
  <text x="358" y="480" font-family="system-ui" font-size="8.5" font-weight="600" fill="#b0aea5">P2</text>
  <text x="380" y="480" font-family="system-ui" font-size="9.5" fill="#1a1a1a">舆情负面</text>

  <text x="340" y="568" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b66" text-anchor="middle">P0=立即响应 · P1=周度跟踪 · P2=月度回顾</text>
</svg>