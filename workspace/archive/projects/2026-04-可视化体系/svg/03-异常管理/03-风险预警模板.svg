<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
  <rect width="680" height="520" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">风险预警模板</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b66">P0/P1/P2三级 — 标准化预警通知</text>

  <!-- P0 严重 -->
  <rect x="40" y="62" width="600" height="120" rx="12" fill="#d4845a" opacity="0.15" stroke="#d4845a" stroke-width="1.5"/>
  <text x="52" y="84" font-family="system-ui" font-size="12" font-weight="600" fill="#d4845a">P0 严重</text>
  <text x="600" y="84" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="end">编号：W-2026-04-001</text>
  <text x="52" y="104" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">华啸连续4月下滑</text>
  <text x="52" y="122" font-family="system-ui" font-size="10" fill="#1a1a1a">关键数据: 峰值比 58%→55%，排名 #12→#15</text>
  <text x="52" y="140" font-family="system-ui" font-size="10" fill="#1a1a1a">建议: 立即约谈，制定整改计划</text>
  <text x="52" y="158" font-family="system-ui" font-size="9.5" fill="#8a8580">责任人: 年老师 | 响应时限: 24h</text>
  <text x="52" y="174" font-family="system-ui" font-size="9" fill="#6b6b66">通知方式: 邮件+系统推送+短信</text>

  <!-- P1 警告 -->
  <rect x="40" y="198" width="600" height="120" rx="12" fill="#d4845a" opacity="0.08" stroke="#d4845a" stroke-width="1"/>
  <text x="52" y="220" font-family="system-ui" font-size="12" font-weight="600" fill="#d4845a">P1 警告</text>
  <text x="600" y="220" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="end">编号：W-2026-04-002</text>
  <text x="52" y="240" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">翰锐人效隐性退步</text>
  <text x="52" y="258" font-family="system-ui" font-size="10" fill="#1a1a1a">关键数据: 人效下降5%，排名未变 #8</text>
  <text x="52" y="276" font-family="system-ui" font-size="10" fill="#1a1a1a">建议: 电话沟通，诊断原因</text>
  <text x="52" y="294" font-family="system-ui" font-size="9.5" fill="#8a8580">责任人: 年老师 | 响应时限: 48h</text>
  <text x="52" y="310" font-family="system-ui" font-size="9" fill="#6b6b66">通知方式: 邮件+系统推送</text>

  <!-- P2 关注 -->
  <rect x="40" y="334" width="600" height="110" rx="12" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="52" y="356" font-family="system-ui" font-size="12" font-weight="600" fill="#1a1a1a">P2 关注</text>
  <text x="600" y="356" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="end">编号：W-2026-04-003</text>
  <text x="52" y="376" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">新供应商达标检查</text>
  <text x="52" y="394" font-family="system-ui" font-size="10" fill="#1a1a1a">关键数据: 第3个月达标率65%，接近70%阈值</text>
  <text x="52" y="412" font-family="system-ui" font-size="10" fill="#1a1a1a">建议: 观察，不干预</text>
  <text x="52" y="430" font-family="system-ui" font-size="9.5" fill="#8a8580">责任人: 年老师 | 响应时限: 周度回顾</text>

  <!-- Template structure annotation -->
  <rect x="500" y="456" width="140" height="48" rx="8" fill="none" stroke="#d4d1c7" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="570" y="474" font-family="system-ui" font-size="9" fill="#8a8580" text-anchor="middle">模板结构</text>
  <text x="570" y="488" font-family="system-ui" font-size="8.5" fill="#6b6b66" text-anchor="middle">编号→数据→建议→责任人</text>

</svg>