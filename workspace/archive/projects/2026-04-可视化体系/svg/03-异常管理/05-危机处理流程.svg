<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c98a6a"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">危机处理流程</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b66">6步应急响应 — 分级响应时间线清晰</text>

  <!-- Main container -->
  <rect x="40" y="62" width="600" height="440" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Crisis level badges -->
  <rect x="52" y="72" width="170" height="28" rx="6" fill="#d4845a" opacity="0.15" stroke="#d4845a" stroke-width="1"/>
  <text x="137" y="90" font-family="system-ui" font-size="9.5" font-weight="600" fill="#d4845a" text-anchor="middle">一级危机：清退/合同违约</text>

  <rect x="236" y="72" width="170" height="28" rx="6" fill="#d4845a" opacity="0.1" stroke="#d4845a" stroke-width="0.8"/>
  <text x="321" y="90" font-family="system-ui" font-size="9.5" font-weight="600" fill="#d4845a" text-anchor="middle">二级危机：大面积质量问题</text>

  <rect x="420" y="72" width="170" height="28" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.8"/>
  <text x="505" y="90" font-family="system-ui" font-size="9.5" font-weight="600" fill="#8a8580" text-anchor="middle">三级危机：单一指标下滑</text>

  <!-- Timeline vertical line -->
  <line x1="85" y1="115" x2="85" y2="485" stroke="#c98a6a" stroke-width="1.5"/>

  <!-- Step 1 -->
  <circle cx="85" cy="132" r="5" fill="#d4845a"/>
  <rect x="105" y="118" width="510" height="38" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="113" y="124" width="40" height="16" rx="4" fill="#d4845a"/>
  <text x="133" y="136" font-family="system-ui" font-size="8.5" font-weight="600" fill="#fff" text-anchor="middle">4h</text>
  <text x="160" y="136" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">快速响应</text>
  <text x="300" y="136" font-family="system-ui" font-size="10" fill="#6b6b66">首响确认，评估影响范围</text>

  <!-- Step 2 -->
  <circle cx="85" cy="176" r="5" fill="#c98a6a"/>
  <rect x="105" y="162" width="510" height="38" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="113" y="168" width="40" height="16" rx="4" fill="#c98a6a"/>
  <text x="133" y="180" font-family="system-ui" font-size="8.5" font-weight="600" fill="#fff" text-anchor="middle">即刻</text>
  <text x="160" y="180" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">成立小组</text>
  <text x="300" y="180" font-family="system-ui" font-size="10" fill="#6b6b66">跨部门应急小组，明确负责人</text>

  <!-- Step 3 -->
  <circle cx="85" cy="220" r="5" fill="#c98a6a"/>
  <rect x="105" y="206" width="510" height="38" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="113" y="212" width="40" height="16" rx="4" fill="#c98a6a"/>
  <text x="133" y="224" font-family="system-ui" font-size="8.5" font-weight="600" fill="#fff" text-anchor="middle">立即</text>
  <text x="160" y="224" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">控制事态</text>
  <text x="300" y="224" font-family="system-ui" font-size="10" fill="#6b6b66">止损隔离风险，防止扩散</text>

  <!-- Step 4 -->
  <circle cx="85" cy="264" r="5" fill="#d4845a"/>
  <rect x="105" y="250" width="510" height="38" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="113" y="256" width="40" height="16" rx="4" fill="#d4845a"/>
  <text x="133" y="268" font-family="system-ui" font-size="8.5" font-weight="600" fill="#fff" text-anchor="middle">24h</text>
  <text x="160" y="268" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">制定方案</text>
  <text x="300" y="268" font-family="system-ui" font-size="10" fill="#6b6b66">应对方案审批，确定执行路径</text>

  <!-- Step 5 -->
  <circle cx="85" cy="308" r="5" fill="#c98a6a"/>
  <rect x="105" y="294" width="510" height="38" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="113" y="300" width="40" height="16" rx="4" fill="#c98a6a"/>
  <text x="133" y="312" font-family="system-ui" font-size="8.5" font-weight="600" fill="#fff" text-anchor="middle">每日</text>
  <text x="160" y="312" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">执行跟踪</text>
  <text x="300" y="312" font-family="system-ui" font-size="10" fill="#6b6b66">每日汇报进度，跟踪关键指标</text>

  <!-- Step 6 -->
  <circle cx="85" cy="352" r="5" fill="#8f9b7f"/>
  <rect x="105" y="338" width="510" height="38" rx="8" fill="#8f9b7f" opacity="0.08" stroke="#8f9b7f" stroke-width="1"/>
  <rect x="113" y="344" width="40" height="16" rx="4" fill="#8f9b7f"/>
  <text x="133" y="356" font-family="system-ui" font-size="8.5" font-weight="600" fill="#fff" text-anchor="middle">结案</text>
  <text x="160" y="356" font-family="system-ui" font-size="10.5" font-weight="500" fill="#5a6b4f">复盘总结</text>
  <text x="300" y="356" font-family="system-ui" font-size="10" fill="#6b6b66">形成防范机制，归档复盘报告</text>

  <!-- Footer note -->
  <text x="340" y="506" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b66" text-anchor="middle">危机级别决定响应速度，6步流程不可跳跃</text>

</svg>