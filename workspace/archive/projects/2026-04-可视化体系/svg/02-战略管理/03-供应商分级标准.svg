<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-d" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1 L5 9 L9 1" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">供应商分级标准</text>
  <text x="40" y="46" font-size="11" fill="#6b6b6a">S / A / B / C 四级 — 差异化管理 动态调整</text>

  <!-- S级 -->
  <rect x="40" y="64" width="600" height="90" fill="#8f9b7f" fill-opacity="0.08" stroke="#8f9b7f" stroke-width="1.5" rx="10"/>
  <text x="60" y="88" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#8f9b7f">S</text>
  <text x="84" y="86" font-size="13" font-weight="600" fill="#1a1a1a">金条供应商</text>
  <text x="220" y="86" font-size="10" fill="#6b6b6a">连续 3 月 Top3 · FCI ≥ 90% · 份额 > 15%</text>

  <rect x="60" y="98" width="140" height="22" rx="4" fill="#8f9b7f" fill-opacity="0.1"/>
  <text x="130" y="113" text-anchor="middle" font-size="9" fill="#4a6040">每月 1 次深度沟通</text>

  <text x="460" y="86" font-size="10" fill="#1a1a1a">毅航</text>
  <text x="510" y="86" font-size="10" fill="#1a1a1a">毛毛虫</text>
  <text x="570" y="86" font-size="10" fill="#1a1a1a">广达</text>
  <text x="460" y="104" font-size="10" fill="#1a1a1a">赛维斯</text>
  <text x="510" y="104" font-size="10" fill="#1a1a1a">岐力</text>
  <text x="560" y="104" font-size="9" fill="#8f9b7f" font-weight="600">5 家</text>

  <!-- Arrow down -->
  <line x1="340" y1="154" x2="340" y2="174" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-d)"/>

  <!-- A级 -->
  <rect x="40" y="178" width="600" height="90" fill="#f5f4f1" stroke="#c98a6a" stroke-width="1.5" rx="10"/>
  <text x="60" y="202" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#c98a6a">A</text>
  <text x="84" y="200" font-size="13" font-weight="600" fill="#1a1a1a">核心供应商</text>
  <text x="220" y="200" font-size="10" fill="#6b6b6a">Top3-8 · FCI ≥ 80% · 份额 > 8%</text>

  <rect x="60" y="212" width="140" height="22" rx="4" fill="#c98a6a" fill-opacity="0.1"/>
  <text x="130" y="227" text-anchor="middle" font-size="9" fill="#c98a6a">每月 1 次电话沟通</text>

  <text x="460" y="200" font-size="10" fill="#1a1a1a">伽玛</text>
  <text x="510" y="200" font-size="10" fill="#1a1a1a">翰锐</text>
  <text x="570" y="200" font-size="10" fill="#1a1a1a">华啸</text>
  <text x="460" y="218" font-size="10" fill="#1a1a1a">阅文</text>
  <text x="510" y="218" font-size="10" fill="#1a1a1a">...</text>
  <text x="560" y="218" font-size="9" fill="#c98a6a" font-weight="600">5 家</text>

  <!-- Arrow down -->
  <line x1="340" y1="268" x2="340" y2="288" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-d)"/>

  <!-- B级 -->
  <rect x="40" y="292" width="600" height="90" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="10"/>
  <text x="60" y="316" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#857d74">B</text>
  <text x="84" y="314" font-size="13" font-weight="600" fill="#1a1a1a">常规供应商</text>
  <text x="220" y="314" font-size="10" fill="#6b6b6a">Top8-15 · FCI ≥ 70% · 份额 > 3%</text>

  <rect x="60" y="326" width="140" height="22" rx="4" fill="#d4d1c7" fill-opacity="0.2"/>
  <text x="130" y="341" text-anchor="middle" font-size="9" fill="#5f5a54">双月 1 次沟通</text>

  <text x="460" y="314" font-size="10" fill="#1a1a1a">待定</text>
  <text x="510" y="314" font-size="10" fill="#1a1a1a">待定</text>
  <text x="560" y="314" font-size="9" fill="#6b6b6a" font-weight="600">2-3 家</text>

  <!-- Arrow down -->
  <line x1="340" y1="382" x2="340" y2="402" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-d)"/>

  <!-- C级 -->
  <rect x="40" y="406" width="600" height="90" fill="#d4845a" fill-opacity="0.08" stroke="#d4845a" stroke-width="1.5" rx="10"/>
  <text x="60" y="430" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#d4845a">C</text>
  <text x="84" y="428" font-size="13" font-weight="600" fill="#1a1a1a">风险供应商</text>
  <text x="220" y="428" font-size="10" fill="#6b6b6a">Bottom3 · FCI &lt; 70% · 份额 &lt; 3%</text>

  <rect x="60" y="440" width="140" height="22" rx="4" fill="#d4845a" fill-opacity="0.1"/>
  <text x="130" y="455" text-anchor="middle" font-size="9" fill="#d4845a">按需沟通 · 重点监控</text>

  <text x="460" y="428" font-size="10" fill="#1a1a1a">暂无</text>
  <text x="560" y="428" font-size="9" fill="#d4845a" font-weight="600">0 家</text>

  <!-- Footer -->
  <text x="340" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6b6b6a">分级基于月度 FCI + 排名综合评分，每月动态调整</text>
</svg>
