<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-end" viewBox="0 0 8 8" refX="8" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">新供应商成长曲线</text>
  <text x="40" y="46" font-size="11" fill="#6b6b6a">理想路径 vs 实际路径 — 管理预期避免焦虑</text>

  <!-- Chart container -->
  <rect x="40" y="64" width="600" height="320" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="12"/>

  <!-- Y-axis labels and grid -->
  <text x="50" y="100" text-anchor="end" font-size="10" fill="#6b6b6a">100%</text>
  <line x1="58" y1="96" x2="630" y2="96" stroke="#d4d1c7" stroke-width="0.5"/>

  <text x="50" y="150" text-anchor="end" font-size="10" fill="#6b6b6a">80%</text>
  <line x1="58" y1="146" x2="630" y2="146" stroke="#d4d1c7" stroke-width="0.5" stroke-dasharray="4 3"/>

  <text x="50" y="196" text-anchor="end" font-size="10" fill="#6b6b6a">60%</text>
  <line x1="58" y1="192" x2="630" y2="192" stroke="#d4d1c7" stroke-width="0.5"/>

  <text x="50" y="242" text-anchor="end" font-size="10" fill="#6b6b6a">40%</text>
  <line x1="58" y1="238" x2="630" y2="238" stroke="#d4d1c7" stroke-width="0.5"/>

  <text x="50" y="288" text-anchor="end" font-size="10" fill="#6b6b6a">20%</text>
  <line x1="58" y1="284" x2="630" y2="284" stroke="#d4d1c7" stroke-width="0.5"/>

  <text x="50" y="334" text-anchor="end" font-size="10" fill="#6b6b6a">0%</text>
  <line x1="58" y1="330" x2="630" y2="330" stroke="#d4d1c7" stroke-width="0.5"/>

  <!-- X-axis labels -->
  <text x="100" y="352" text-anchor="middle" font-size="10" fill="#6b6b6a">M1</text>
  <text x="196" y="352" text-anchor="middle" font-size="10" fill="#6b6b6a">M2</text>
  <text x="292" y="352" text-anchor="middle" font-size="10" fill="#6b6b6a">M3</text>
  <text x="388" y="352" text-anchor="middle" font-size="10" fill="#6b6b6a">M4</text>
  <text x="484" y="352" text-anchor="middle" font-size="10" fill="#6b6b6a">M5</text>
  <text x="580" y="352" text-anchor="middle" font-size="10" fill="#6b6b6a">M6</text>

  <!-- 80% target line label -->
  <text x="634" y="149" font-size="9" fill="#8f9b7f">达标线</text>

  <!-- 60% warning line label -->
  <text x="634" y="195" font-size="9" fill="#d4845a">预警线</text>

  <!-- Ideal curve (smooth line) -->
  <!-- M1=30% y=284, M2=45% y=238, M3=55% y=208, M4=68% y=170, M5=78% y=140, M6=85% y=119 -->
  <path d="M100 284 Q148 261 196 238 T292 208 T388 170 T484 140 T580 119" fill="none" stroke="#c98a6a" stroke-width="2"/>

  <!-- Actual curve -->
  <!-- M1=25% y=300, M3=45% y=238 -->
  <path d="M100 300 Q148 280 196 268 T292 238" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Milestone points on ideal curve -->
  <!-- M1: 准入期(0-30%) -->
  <circle cx="100" cy="284" r="5" fill="#c98a6a" stroke="#faf9f7" stroke-width="2"/>
  <text x="100" y="272" text-anchor="middle" font-size="9" font-weight="600" fill="#c98a6a">准入期</text>
  <text x="100" y="304" text-anchor="middle" font-size="9" fill="#6b6b6a">0-30%</text>

  <!-- M3: 爬坡期(30-70%) -->
  <circle cx="292" cy="208" r="5" fill="#c98a6a" stroke="#faf9f7" stroke-width="2"/>
  <text x="292" y="196" text-anchor="middle" font-size="9" font-weight="600" fill="#c98a6a">爬坡期</text>
  <text x="292" y="224" text-anchor="middle" font-size="9" fill="#6b6b6a">30-70%</text>

  <!-- M6: 达标期(≥80%) -->
  <circle cx="580" cy="119" r="5" fill="#c98a6a" stroke="#faf9f7" stroke-width="2"/>
  <text x="580" y="107" text-anchor="middle" font-size="9" font-weight="600" fill="#c98a6a">达标期</text>
  <text x="580" y="134" text-anchor="middle" font-size="9" fill="#6b6b6a">≥80%</text>

  <!-- Actual data points -->
  <!-- M1 actual: 25% -->
  <circle cx="100" cy="300" r="4" fill="#8f9b7f" stroke="#faf9f7" stroke-width="1.5"/>
  <text x="78" y="310" font-size="8" fill="#8f9b7f">实际 25% ✓</text>

  <!-- M3 actual: 45% -->
  <circle cx="292" cy="238" r="4" fill="#d4845a" stroke="#faf9f7" stroke-width="1.5"/>
  <text x="310" y="250" font-size="8" fill="#d4845a">实际 45% ⚠ 滞后</text>

  <!-- Legend -->
  <line x1="180" y1="370" x2="200" y2="370" stroke="#c98a6a" stroke-width="2"/>
  <text x="206" y="374" font-size="10" fill="#1a1a1a">理想路径</text>

  <line x1="280" y1="370" x2="300" y2="370" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="306" y="374" font-size="10" fill="#1a1a1a">实际路径</text>

  <circle cx="410" cy="368" r="4" fill="#8f9b7f"/>
  <text x="420" y="374" font-size="10" fill="#1a1a1a">达标</text>

  <circle cx="466" cy="368" r="4" fill="#d4845a"/>
  <text x="476" y="374" font-size="10" fill="#1a1a1a">滞后</text>

  <!-- Prediction arrow -->
  <text x="580" y="100" text-anchor="middle" font-size="8" fill="#c98a6a">预测</text>

  <!-- Footer -->
  <text x="340" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6b6b6a">基于历史供应商爬坡数据绘制，实际路径可能因行业/规模差异而偏离</text>
</svg>
