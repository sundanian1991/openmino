<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="560" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">供应商工作空间 — 文件夹结构</text>

  <!-- Root node -->
  <rect x="190" y="50" width="300" height="38" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="340" y="74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b3410">[供应商名称] - 工作空间</text>

  <!-- Tree connectors -->
  <line x1="340" y1="88" x2="340" y2="115" stroke="#857d74" stroke-width="1.5"/>
  <line x1="90" y1="115" x2="590" y2="115" stroke="#857d74" stroke-width="1.5"/>

  <!-- 8 sub-nodes: 4 columns, 2 rows -->
  <!-- Column positions: 90, 230, 390, 550 (centers) -->

  <!-- Row 1 -->
  <!-- 01-人力管理 (必填 Warm bold) -->
  <line x1="90" y1="115" x2="90" y2="140" stroke="#857d74" stroke-width="1.5"/>
  <rect x="20" y="140" width="140" height="48" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="90" y="160" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">01-人力管理</text>
  <text x="90" y="178" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c26d3a">必填 | 周报</text>

  <!-- 02-业绩数据 (必填 Warm bold) -->
  <line x1="230" y1="115" x2="230" y2="140" stroke="#857d74" stroke-width="1.5"/>
  <rect x="160" y="140" width="140" height="48" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="230" y="160" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">02-业绩数据</text>
  <text x="230" y="178" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c26d3a">必填 | 周报</text>

  <!-- 03-合规记录 (必填 Warm bold) -->
  <line x1="370" y1="115" x2="370" y2="140" stroke="#857d74" stroke-width="1.5"/>
  <rect x="300" y="140" width="140" height="48" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="370" y="160" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">03-合规记录</text>
  <text x="370" y="178" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c26d3a">必填 | 事件触发</text>

  <!-- 04-约谈与整改 (必填 Warm bold) -->
  <line x1="510" y1="115" x2="510" y2="140" stroke="#857d74" stroke-width="1.5"/>
  <rect x="440" y="140" width="140" height="48" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="510" y="160" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">04-约谈与整改</text>
  <text x="510" y="178" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c26d3a">必填 | 事件触发</text>

  <!-- Row 2 -->
  <!-- 05-培训与赋能 (自主 Stone dashed) -->
  <line x1="90" y1="115" x2="90" y2="220" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="20" y="220" width="140" height="48" rx="8" fill="#fafaf8" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="90" y="240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">05-培训与赋能</text>
  <text x="90" y="258" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">自主使用</text>

  <!-- 06-质检报告 (系统自动 Teal fill) -->
  <line x1="230" y1="115" x2="230" y2="220" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="160" y="220" width="140" height="48" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="230" y="240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#0f5040">06-质检报告</text>
  <text x="230" y="258" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#2e8b6e">系统自动 | 月度</text>

  <!-- 07-排名与考核 (必填 Warm bold) -->
  <line x1="370" y1="115" x2="370" y2="220" stroke="#857d74" stroke-width="1.5"/>
  <rect x="300" y="220" width="140" height="48" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="370" y="240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">07-排名与考核</text>
  <text x="370" y="258" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c26d3a">必填 | 月报</text>

  <!-- 08-通知与公告 (自主 Stone dashed) -->
  <line x1="510" y1="115" x2="510" y2="220" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="440" y="220" width="140" height="48" rx="8" fill="#fafaf8" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="510" y="240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">08-通知与公告</text>
  <text x="510" y="258" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">自主使用</text>

  <!-- Legend -->
  <rect x="30" y="300" width="620" height="90" rx="10" fill="#ffffff" stroke="#d5d3ce" stroke-width="1"/>
  <text x="50" y="322" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">图例说明</text>

  <!-- Legend items -->
  <rect x="50" y="334" width="16" height="16" rx="4" fill="#faf0e6" stroke="#c26d3a" stroke-width="2"/>
  <text x="74" y="347" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">必填项 — 粗Warm边框，必须按时填报</text>

  <rect x="330" y="334" width="16" height="16" rx="4" fill="#fafaf8" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="354" y="347" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">自主项 — 虚线Stone边框，供应商自主使用</text>

  <rect x="50" y="360" width="16" height="16" rx="4" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="74" y="373" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">系统自动 — Teal填充，无需人工填报</text>

  <!-- Bottom note -->
  <rect x="30" y="410" width="620" height="130" rx="10" fill="#f2f0eb" stroke="#d5d3ce" stroke-width="1"/>
  <text x="50" y="434" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">使用原则</text>
  <text x="50" y="456" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">1. 每个供应商独立一个文件夹，命名格式：供应商名称-工作空间</text>
  <text x="50" y="476" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">2. 必填项有明确截止时间，逾期影响当月排名评估</text>
  <text x="50" y="496" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">3. 系统自动项由质检系统/业绩系统定期写入，供应商只读</text>
  <text x="50" y="516" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">4. 自主项用于供应商自我管理，可作为约谈和整改的参考材料</text>
  <text x="50" y="536" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">5. 文件夹结构统一，新供应商准入时直接复制模板</text>
</svg>
