  <text x="52" y="100" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">在职人数 | 新人占比 | 出勤率 | 离职人数 | 招聘中人数 | 关键岗位空缺</text>

