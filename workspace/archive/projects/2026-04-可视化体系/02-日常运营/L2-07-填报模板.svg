  <!-- Footer: 截止时间 + 后果 -->
  <rect x="30" y="570" width="300" height="36" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="180" y="587" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#6a4005">截止时间：每周一 12:00 前</text>
  <text x="180" y="602" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#b88018">逾期当月排名加注星号</text>

  <rect x="350" y="570" width="300" height="36" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="500" y="587" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#6b2010">不填报后果</text>
