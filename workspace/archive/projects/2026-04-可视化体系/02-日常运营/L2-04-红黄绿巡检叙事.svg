<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Loop arrow for 预警 -->
    <marker id="loopArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b88018" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Arrow for 危险 -->
    <marker id="dangerArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c25030" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="480" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">红黄绿巡检叙事联动规则</text>

  <!-- ==================== 合格 (Green) ==================== -->
  <rect x="30" y="55" width="620" height="110" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <circle cx="58" cy="78" r="8" fill="#2e8b6e"/>
  <text x="58" y="81" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="8" font-weight="600" fill="#ffffff">绿</text>
  <text x="78" y="82" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#0f5040">合格</text>

  <!-- 判定条件 -->
  <rect x="30" y="95" width="120" height="24" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="90" y="112" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">FCI >= 80</text>

  <rect x="155" y="95" width="130" height="24" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="220" y="112" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">业绩达成 >= 90%</text>

  <rect x="290" y="95" width="130" height="24" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="355" y="112" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">出勤率 >= 90%</text>

  <rect x="425" y="95" width="130" height="24" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="490" y="112" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">无合规红线触发</text>

  <!-- 终点 -->
  <rect x="30" y="130" width="200" height="26" rx="8" fill="#fafaf8" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="130" y="148" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#2e8b6e">无需动作 — 终点</text>

  <!-- ==================== 预警 (Yellow) ==================== -->
  <rect x="30" y="185" width="620" height="120" rx="12" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <circle cx="58" cy="208" r="8" fill="#b88018"/>
  <text x="58" y="211" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="8" font-weight="600" fill="#ffffff">黄</text>
  <text x="78" y="212" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6a4005">预警</text>

  <!-- 判定条件 -->
  <rect x="30" y="225" width="130" height="24" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="95" y="242" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">70 <= FCI < 80</text>

  <rect x="165" y="225" width="130" height="24" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="230" y="242" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">85% <= 达成 < 90%</text>

  <rect x="300" y="225" width="130" height="24" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="365" y="242" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">85% <= 出勤 < 90%</text>

  <rect x="435" y="225" width="200" height="24" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="535" y="242" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">单一指标异常但未触红线</text>

  <!-- 动作 + 循环箭头 -->
  <rect x="30" y="260" width="250" height="26" rx="8" fill="#fafaf8" stroke="#b88018" stroke-width="1.5"/>
  <text x="155" y="278" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#b88018">周度关注 + 下次复查</text>

  <!-- Loop arrow symbol -->
  <path d="M290,273 C300,260 320,260 330,273" fill="none" stroke="#b88018" stroke-width="1.5" marker-end="url(#loopArrow)"/>
  <text x="310" y="258" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#b88018">循环复查</text>

  <!-- ==================== 危险 (Red) ==================== -->
  <rect x="30" y="325" width="620" height="120" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <circle cx="58" cy="348" r="8" fill="#c25030"/>
  <text x="58" y="351" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="8" font-weight="600" fill="#ffffff">红</text>
  <text x="78" y="352" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b2010">危险</text>

  <!-- 判定条件 -->
  <rect x="30" y="365" width="120" height="24" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="90" y="382" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">FCI < 70</text>

  <rect x="155" y="365" width="120" height="24" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="215" y="382" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">达成 < 85%</text>

  <rect x="280" y="365" width="120" height="24" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="340" y="382" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">出勤 < 85%</text>

  <rect x="405" y="365" width="130" height="24" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="470" y="382" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">合规红线触发</text>

  <rect x="540" y="365" width="100" height="24" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="590" y="382" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">诚信预警</text>

  <!-- 动作 -->
  <rect x="30" y="400" width="250" height="26" rx="8" fill="#fafaf8" stroke="#c25030" stroke-width="1.5"/>
  <text x="155" y="418" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#c25030">立即约谈 + 整改计划</text>

  <!-- Arrow pointing to 约谈 -->
  <line x1="290" y1="413" x2="500" y2="413" stroke="#c25030" stroke-width="1.5" marker-end="url(#dangerArrow)"/>
  <rect x="500" y="400" width="140" height="26" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="570" y="418" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">进入约谈流程</text>

  <!-- ==================== 右侧注解 ==================== -->
  <rect x="30" y="455" width="620" height="16" rx="4" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="340" y="467" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">巡检频率：周度扫描异常信号 + 月度FCI评估 + 事件触发深度诊断</text>
</svg>
