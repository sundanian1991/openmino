<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 420">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="420" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">管理节律 — 周度线 + 月度线</text>

  <!-- ==================== 周度线 ==================== -->
  <text x="30" y="72" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b3410">周度线</text>

  <!-- Timeline line -->
  <line x1="30" y1="100" x2="650" y2="100" stroke="#c26d3a" stroke-width="1.5" stroke-dasharray="none" marker-end="url(#a)"/>

  <!-- 周一 -->
  <rect x="30" y="80" width="120" height="40" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="90" y="99" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">周一 对标</text>
  <text x="90" y="113" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">15min</text>

  <!-- 周二三 -->
  <rect x="190" y="80" width="120" height="40" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="250" y="99" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">周二三 约谈</text>
  <text x="250" y="113" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">30-60min</text>

  <!-- 周四五 -->
  <rect x="350" y="80" width="130" height="40" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="415" y="99" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">周四五 整改评估</text>
  <text x="415" y="113" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">20-30min</text>

  <!-- 周末 -->
  <rect x="520" y="80" width="120" height="40" rx="8" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
  <text x="580" y="99" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">周末 休息</text>
  <text x="580" y="113" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">0min</text>

  <!-- ==================== 月度线 ==================== -->
  <text x="30" y="192" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#0f5040">月度线</text>

  <!-- Timeline line -->
  <line x1="30" y1="220" x2="650" y2="220" stroke="#2e8b6e" stroke-width="1.5" stroke-dasharray="none" marker-end="url(#a)"/>

  <!-- 第1周 -->
  <rect x="30" y="200" width="120" height="40" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="90" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">第1周 排名+通报</text>
  <text x="90" y="233" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">90min</text>

  <!-- 第2周 -->
  <rect x="190" y="200" width="120" height="40" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="250" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">第2周 约谈+配对</text>
  <text x="250" y="233" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">60min</text>

  <!-- 月中-末 -->
  <rect x="350" y="200" width="130" height="40" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="415" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">月中-末 巡检+扶持</text>
  <text x="415" y="233" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">持续进行</text>

  <!-- 月末 -->
  <rect x="520" y="200" width="120" height="40" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="580" y="219" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">月末 总结</text>
  <text x="580" y="233" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">30min</text>

  <!-- ==================== 虚线连接 ==================== -->
  <line x1="90" y1="120" x2="90" y2="200" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="100" y="165" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">排名对标</text>

  <line x1="250" y1="120" x2="250" y2="200" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="165" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">约谈配对</text>

  <line x1="415" y1="120" x2="415" y2="200" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="425" y="165" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">巡检整改</text>

  <line x1="580" y1="120" x2="580" y2="200" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="590" y="165" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">月度总结</text>

  <!-- ==================== 底部周度标签 ==================== -->
  <rect x="30" y="270" width="120" height="26" rx="6" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="90" y="288" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">第1周</text>

  <rect x="190" y="270" width="120" height="26" rx="6" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="250" y="288" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">第2周</text>

  <rect x="350" y="270" width="130" height="26" rx="6" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="415" y="288" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">第3周</text>

  <rect x="520" y="270" width="120" height="26" rx="6" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="580" y="288" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">第4周</text>

  <!-- ==================== 注解 ==================== -->
  <rect x="30" y="320" width="620" height="80" rx="8" fill="#fafaf8" stroke="#d5d3ce" stroke-width="1"/>
  <text x="50" y="345" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">使用说明</text>
  <text x="50" y="365" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">周度线：每周固定动作，周一到周五执行，周末不安排供应商事务</text>
  <text x="50" y="382" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b6860">月度线：按月节奏规划，四阶段各有侧重，总耗时约3小时/月</text>
</svg>
