<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 380 520">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="380" height="520" fill="#fafaf8"/>

  <!-- Phone frame -->
  <rect x="10" y="10" width="360" height="500" rx="16" fill="#ffffff" stroke="#d5d3ce" stroke-width="1.5"/>

  <!-- Title -->
  <text x="190" y="42" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="600" fill="#454240">4月供应商红绿灯月报</text>
  <text x="190" y="58" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">2026-04</text>

  <!-- Divider -->
  <line x1="30" y1="70" x2="350" y2="70" stroke="#d5d3ce" stroke-width="1"/>

  <!-- Section: 需要关注 (Red) -->
  <circle cx="40" cy="90" r="6" fill="#c25030"/>
  <text x="55" y="94" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b2010">需要关注 (2家)</text>

  <rect x="30" y="100" width="320" height="42" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="42" y="118" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">赛维斯</text>
  <text x="42" y="133" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c25030">FCI 58 | 根因：新人占比42%+主管更换</text>

  <rect x="30" y="148" width="320" height="42" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="42" y="166" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">翰锐</text>
  <text x="42" y="181" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#c25030">FCI 62 | 根因：转化率连续2周低于产线均值</text>

  <!-- Section: 需要跟踪 (Yellow) -->
  <circle cx="40" cy="210" r="6" fill="#b88018"/>
  <text x="55" y="214" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6a4005">需要跟踪 (2家)</text>

  <rect x="30" y="220" width="320" height="42" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="42" y="238" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6a4005">伽玛</text>
  <text x="42" y="253" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#b88018">FCI 74 | 根因：业绩达成88%，但人员流失加速</text>

  <rect x="30" y="268" width="320" height="42" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="42" y="286" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6a4005">岐力</text>
  <text x="42" y="301" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#b88018">FCI 71 | 根因：出勤率下滑至86%，需关注</text>

  <!-- Section: 正常运行 (Green) -->
  <circle cx="40" cy="330" r="6" fill="#2e8b6e"/>
  <text x="55" y="334" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">正常运行 (2家)</text>

  <rect x="30" y="340" width="320" height="42" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="42" y="358" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#0f5040">毅航</text>
  <text x="42" y="373" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#2e8b6e">FCI 89 | 业绩105%，各项指标稳定</text>

  <rect x="30" y="388" width="320" height="42" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="42" y="406" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#0f5040">毛毛虫</text>
  <text x="42" y="421" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#2e8b6e">FCI 85 | 业绩98%，熟手人均GMV产线第2</text>

  <!-- Bottom: 结论 -->
  <line x1="30" y1="445" x2="350" y2="445" stroke="#d5d3ce" stroke-width="1"/>
  <rect x="30" y="452" width="320" height="46" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="42" y="470" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">结论：约谈赛维斯+翰锐主管，伽玛关注流失趋势</text>
  <text x="42" y="488" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">FCI = 供应商综合能力指数 | &gt;80正常 | 70-80预警 | &lt;70危险</text>
</svg>
