<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500">
  <!-- 画布背景 -->
  <rect width="680" height="500" fill="#faf9f7" />

  <!-- 标题 -->
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">9月 vs 10月 对比</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">快速发现变化趋势</text>

  <!-- 9月容器 -->
  <rect x="40" y="80" width="280" height="280" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="52" y="105" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">9月数据</text>

  <g transform="translate(52, 120)">
    <rect y="0" width="256" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="12" y="23" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名1: 毅航</text>

    <rect y="44" width="256" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="12" y="67" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名2: 毛毛虫</text>

    <rect y="88" width="256" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="12" y="111" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a">排名3: 华啸 ⚠️</text>

    <rect y="132" width="256" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="12" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名4: 广达</text>

    <rect y="176" width="256" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="12" y="199" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名5: 伽玛</text>
  </g>

  <!-- 10月容器 -->
  <rect x="360" y="80" width="280" height="280" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="372" y="105" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">10月数据</text>

  <g transform="translate(372, 120)">
    <rect y="0" width="256" height="36" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="12" y="23" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名1: 毅航</text>

    <rect y="44" width="256" height="36" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="12" y="67" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名2: 毛毛虫</text>

    <rect y="88" width="256" height="36" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="12" y="111" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名3: 广达</text>

    <rect y="132" width="256" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="12" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">排名4: 伽玛</text>

    <rect y="176" width="256" height="36" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <text x="12" y="199" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a">排名7: 岐力 ⚠️</text>
  </g>

  <!-- 中间箭头 -->
  <path d="M330,220 L350,220" stroke="#c98a6a" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- 变化摘要容器 -->
  <rect x="40" y="380" width="600" height="100" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="52" y="402" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">变化摘要</text>

  <g transform="translate(52, 418)">
    <!-- 华啸大幅下滑 -->
    <rect width="180" height="48" rx="8" fill="rgba(212, 132, 90, 0.2)" stroke="#d4845a" stroke-width="1" />
    <text x="12" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">华啸</text>
    <text x="12" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">3位 → 8位</text>
    <text x="100" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4845a">↓5</text>

    <!-- 广达上升 -->
    <rect x="200" width="180" height="48" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="212" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">广达</text>
    <text x="212" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">5位 → 3位</text>
    <text x="300" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8f9b7f">↑2</text>

    <!-- 岐力下滑 -->
    <rect x="400" width="180" height="48" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <text x="412" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">岐力</text>
    <text x="412" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">4位 → 7位</text>
    <text x="500" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4845a">↓3</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#c98a6a" />
    </marker>
  </defs>
</svg>
