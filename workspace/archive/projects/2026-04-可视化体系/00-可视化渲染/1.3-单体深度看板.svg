<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600">
  <!-- 画布背景 -->
  <rect width="680" height="600" fill="#faf9f7" />

  <!-- 标题栏 -->
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">华啸 — 深度看板</text>

  <!-- 返回按钮 -->
  <rect x="540" y="22" width="50" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
  <text x="565" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">←返回</text>

  <!-- 导出按钮 -->
  <rect x="600" y="22" width="50" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
  <text x="625" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">导出</text>

  <!-- 核心指标容器 -->
  <rect x="40" y="70" width="600" height="80" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="52" y="90" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">核心指标</text>

  <!-- 指标卡片网格 -->
  <g transform="translate(52, 105)">
    <!-- 当前排名 -->
    <rect width="140" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="8" y="16" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">当前排名</text>
    <text x="8" y="32" font-family="SF Mono, Monaco, monospace" font-size="13" font-weight="600" fill="#d4845a">8位(↓4)</text>

    <!-- 峰值比 -->
    <rect x="152" width="140" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="160" y="16" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">峰值比</text>
    <text x="160" y="32" font-family="SF Mono, Monaco, monospace" font-size="13" font-weight="600" fill="#d4845a">58%</text>

    <!-- 人效 -->
    <rect x="304" width="140" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="312" y="16" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">人效</text>
    <text x="312" y="32" font-family="SF Mono, Monaco, monospace" font-size="13" font-weight="600" fill="#1a1a1a">1.2万</text>

    <!-- FCI -->
    <rect x="456" width="140" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="464" y="16" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">FCI</text>
    <text x="464" y="32" font-family="SF Mono, Monaco, monospace" font-size="13" font-weight="600" fill="#8f9b7f">72%</text>
  </g>

  <!-- 趋势图容器 -->
  <rect x="40" y="165" width="600" height="160" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="52" y="185" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">趋势图（近6个月）</text>

  <!-- 趋势图内容 -->
  <g transform="translate(52, 200)">
    <!-- Y轴网格线 -->
    <line x1="30" y1="0" x2="580" y2="0" stroke="#e8e4dc" stroke-width="1" />
    <line x1="30" y1="40" x2="580" y2="40" stroke="#e8e4dc" stroke-width="1" />
    <line x1="30" y1="80" x2="580" y2="80" stroke="#e8e4dc" stroke-width="1" />
    <line x1="30" y1="120" x2="580" y2="120" stroke="#e8e4dc" stroke-width="1" />

    <!-- Y轴标签 -->
    <text x="25" y="4" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="end">100%</text>
    <text x="25" y="84" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="end">70%</text>
    <text x="25" y="124" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="end">50%</text>

    <!-- 峰值比折线 - 下滑 -->
    <polyline points="50,30 150,36 250,48 350,60 450,72 550,84" fill="none" stroke="#d4845a" stroke-width="2" />
    <!-- 峰值比数据点 -->
    <circle cx="50" cy="30" r="4" fill="#d4845a" />
    <circle cx="150" cy="36" r="4" fill="#d4845a" />
    <circle cx="250" cy="48" r="4" fill="#d4845a" />
    <circle cx="350" cy="60" r="4" fill="#d4845a" />
    <circle cx="450" cy="72" r="4" fill="#d4845a" />
    <circle cx="550" cy="84" r="4" fill="#d4845a" />

    <!-- 人效折线 - 相对稳定 -->
    <polyline points="50,60 150,62 250,65 350,68 450,70 550,70" fill="none" stroke="#c98a6a" stroke-width="2" stroke-dasharray="4 2" />

    <!-- X轴标签 -->
    <text x="50" y="135" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">5月</text>
    <text x="150" y="135" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">6月</text>
    <text x="250" y="135" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">7月</text>
    <text x="350" y="135" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">8月</text>
    <text x="450" y="135" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">9月</text>
    <text x="550" y="135" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">10月</text>

    <!-- 图例 -->
    <g transform="translate(420, -15)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#d4845a" stroke-width="2" />
      <text x="25" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">峰值比</text>
      <line x1="70" y1="0" x2="90" y2="0" stroke="#c98a6a" stroke-width="2" stroke-dasharray="4 2" />
      <text x="95" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">人效</text>
    </g>
  </g>

  <!-- 侧边卡片 -->
  <!-- 主管胜任度 -->
  <rect x="40" y="340" width="280" height="100" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="52" y="360" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">主管胜任度</text>

  <g transform="translate(52, 375)">
    <!-- 仪表盘 -->
    <path d="M20,40 A40,40 0 0,1 100,40" fill="none" stroke="#e8e4dc" stroke-width="8" stroke-linecap="round" />
    <path d="M20,40 A40,40 0 0,1 72,26" fill="none" stroke="#d4845a" stroke-width="8" stroke-linecap="round" />
    <text x="60" y="70" font-family="SF Mono, Monaco, monospace" font-size="16" font-weight="600" fill="#d4845a" text-anchor="middle">75%</text>
    <text x="60" y="85" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a" text-anchor="middle">⚠️ 需关注</text>
  </g>

  <!-- 异常信号 -->
  <rect x="360" y="340" width="280" height="100" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="372" y="360" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">异常信号</text>

  <g transform="translate(372, 378)">
    <rect width="260" height="24" rx="6" fill="rgba(212, 132, 90, 0.2)" />
    <circle cx="15" cy="12" r="4" fill="#d4845a" />
    <text x="25" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">峰值比过低 &lt; 70%</text>

    <rect y="30" width="260" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="15" cy="42" r="4" fill="#8f9b7f" />
    <text x="25" y="46" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">FCI改善中 72% → 75%</text>
  </g>

  <!-- 历史约谈记录 -->
  <rect x="40" y="455" width="600" height="120" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5" />
  <text x="52" y="475" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">历史约谈记录（最近2条）</text>

  <g transform="translate(52, 490)">
    <!-- 记录1 -->
    <rect width="580" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="10" y="16" font-family="SF Mono, Monaco, monospace" font-size="9" fill="#6b6b6b">2026-09-15</text>
    <text x="100" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">峰值比下滑约谈</text>
    <text x="500" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">制定整改计划</text>

    <!-- 记录2 -->
    <rect y="30" width="580" height="24" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="10" y="46" font-family="SF Mono, Monaco, monospace" font-size="9" fill="#6b6b6b">2026-07-20</text>
    <text x="100" y="46" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">质量波动约谈</text>
    <text x="500" y="46" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">流程优化</text>
  </g>
</svg>
