<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <rect width="680" height="380" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">Q3复盘会议模板</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">季度复盘标准化</text>

  <rect x="40" y="80" width="600" height="260" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <rect width="560" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="15" r="8" fill="#c98a6a" />
    <text x="20" y="19" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">①</text>
    <text x="35" y="15" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">季度总览（15分钟）</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">头部集中度变化 • P0/P1异常处理情况 • S级/A级供应商变化</text>

    <rect y="60" width="560" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="75" r="8" fill="#d4845a" />
    <text x="20" y="79" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">②</text>
    <text x="35" y="75" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">异常回顾（30分钟）</text>
    <text x="15" y="95" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">华啸连续下滑处理过程 • 岐力突发情况应对</text>

    <rect y="120" width="560" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="20" cy="135" r="8" fill="#8f9b7f" />
    <text x="20" y="139" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">③</text>
    <text x="35" y="135" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">标杆沉淀（15分钟）</text>
    <text x="15" y="155" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">毅航新人培养方法 • 广达质量管控SOP</text>

    <rect y="180" width="560" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="195" r="8" fill="#c98a6a" />
    <text x="20" y="199" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">④</text>
    <text x="35" y="195" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">下季度规划（30分钟）</text>
    <text x="15" y="215" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">集中度目标调整 • 新供应商准入计划</text>
  </g>

  <rect x="60" y="305" width="560" height="24" rx="6" fill="rgba(143, 155, 127, 0.2)" />
  <text x="340" y="322" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a" text-anchor="middle">输出：会议纪要 + 行动项清单</text>
</svg>
