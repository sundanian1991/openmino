<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <rect width="680" height="340" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">月度操作流程</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">月度工作SOP</text>

  <rect x="40" y="80" width="600" height="220" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <rect width="120" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="15" cy="12" r="8" fill="#c98a6a" />
    <text x="15" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">①</text>
    <text x="30" y="16" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">数据收集</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">每月1-3日</text>

    <text x="140" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">→</text>

    <rect x="180" width="120" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="195" cy="12" r="8" fill="#c98a6a" />
    <text x="195" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">②</text>
    <text x="210" y="16" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">异常识别</text>
    <text x="195" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">自动分类</text>

    <text x="320" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">→</text>

    <rect x="360" width="120" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="375" cy="12" r="8" fill="#8f9b7f" />
    <text x="375" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">③</text>
    <text x="390" y="16" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">决策约谈</text>
    <text x="375" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">分配资源</text>
  </g>

  <g transform="translate(60, 170)">
    <rect width="120" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="15" cy="12" r="8" fill="#8f9b7f" />
    <text x="15" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">④</text>
    <text x="30" y="16" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">执行应对</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">发起约谈</text>

    <text x="140" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">→</text>

    <rect x="180" width="120" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="195" cy="12" r="8" fill="#c98a6a" />
    <text x="195" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">⑤</text>
    <text x="210" y="16" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">效果验证</text>
    <text x="195" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">D14/D28复查</text>

    <text x="320" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">→</text>

    <rect x="360" width="120" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="375" cy="12" r="8" fill="#c98a6a" />
    <text x="375" y="16" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">⑥</text>
    <text x="390" y="16" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">汇报归档</text>
    <text x="375" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">汇报军哥</text>
  </g>

  <g transform="translate(500, 110)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">↑</text>
    <path d="M5,-20 L5,50 L-20,50" fill="none" stroke="#c98a6a" stroke-width="1" />
  </g>

  <!-- 关键节点 -->
  <rect x="60" y="250" width="560" height="36" rx="6" fill="rgba(201, 138, 106, 0.15)" />
  <text x="75" y="273" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">关键节点：</text>
  <text x="145" y="273" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a">D3数据完整</text>
  <text x="230" y="273" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">D7约谈完成</text>
