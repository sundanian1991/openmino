<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <rect width="680" height="420" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">约谈框架</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">标准化约谈流程</text>

  <rect x="40" y="80" width="600" height="300" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <rect width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="15" r="8" fill="#c98a6a" />
    <text x="20" y="19" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">1</text>
    <text x="35" y="15" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">开场</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">"今天约你是因为..." 陈述数据事实（非情绪）</text>
    <text x="15" y="48" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">展示趋势图</text>

    <text x="280" y="35" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">↓</text>

    <rect y="70" width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="85" r="8" fill="#c98a6a" />
    <text x="20" y="89" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">2</text>
    <text x="35" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">诊断</text>
    <text x="15" y="105" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">"你认为是什么原因？" 倾听为主，不预设立场</text>
    <text x="15" y="118" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">记录关键信息</text>

    <text x="280" y="105" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">↓</text>

    <rect y="140" width="560" height="60" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="20" cy="155" r="8" fill="#8f9b7f" />
    <text x="20" y="159" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">3</text>
    <text x="35" y="155" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">方案</text>
    <text x="15" y="175" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">"我们一起来想..." 共同制定目标，明确支持措施</text>

    <text x="280" y="175" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a">↓</text>

    <rect y="210" width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="225" r="8" fill="#c98a6a" />
    <text x="20" y="229" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">4</text>
    <text x="35" y="225" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">收尾</text>
    <text x="15" y="245" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">"我们D7再看..." 明确复查时间，发送会议纪要</text>
  </g>
</svg>
