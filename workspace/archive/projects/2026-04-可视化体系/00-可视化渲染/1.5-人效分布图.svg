<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <!-- 画布背景 -->
  <rect width="680" height="420" fill="#faf9f7" />

  <!-- 标题 -->
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">人效分布（万/人/月）</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">发现人效异常</text>

  <!-- 概念容器 -->
  <rect x="40" y="80" width="600" height="300" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 人效柱状图 -->
  <g transform="translate(60, 105)">
    <!-- 毅航 -->
    <text x="0" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">毅航</text>
    <rect x="50" y="0" width="360" height="24" rx="6" fill="#8f9b7f" />
    <text x="420" y="16" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">2.1</text>

    <!-- 毛毛虫 -->
    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">毛毛虫</text>
    <rect x="50" y="38" width="340" height="24" rx="6" fill="#8f9b7f" />
    <text x="400" y="54" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">1.9</text>

    <!-- 广达 -->
    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">广达</text>
    <rect x="50" y="76" width="280" height="24" rx="6" fill="#8f9b7f" />
    <text x="340" y="92" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">1.6</text>

    <!-- 赛维斯 -->
    <text x="0" y="128" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">赛维斯</text>
    <rect x="50" y="114" width="240" height="24" rx="6" fill="#8f9b7f" />
    <text x="300" y="130" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">1.4</text>

    <!-- 伽玛 -->
    <text x="0" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">伽玛</text>
    <rect x="50" y="152" width="220" height="24" rx="6" fill="#8f9b7f" />
    <text x="280" y="168" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">1.3</text>

    <!-- 翰锐 -->
    <text x="0" y="204" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">翰锐</text>
    <rect x="50" y="190" width="200" height="24" rx="6" fill="#c98a6a" />
    <text x="260" y="206" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">1.25</text>

    <!-- 华啸 - 警告 -->
    <text x="0" y="242" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a">华啸</text>
    <rect x="50" y="228" width="180" height="24" rx="6" fill="#d4845a" />
    <text x="240" y="244" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#d4845a">1.2 ⚠️</text>

    <!-- 岐力 - 警告 -->
    <text x="0" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a">岐力</text>
    <rect x="50" y="266" width="140" height="24" rx="6" fill="#d4845a" />
    <text x="200" y="282" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#d4845a">1.0 ⚠️</text>
  </g>

  <!-- 平均线 -->
  <line x1="60" y1="330" x2="620" y2="330" stroke="#c98a6a" stroke-width="1" stroke-dasharray="4 2" />
  <text x="560" y="345" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a">平均线 1.5</text>

  <!-- 图例 -->
  <g transform="translate(60, 395)">
    <rect width="16" height="16" rx="4" fill="#8f9b7f" />
    <text x="22" y="13" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">正常 (≥1.3)</text>

    <rect x="120" width="16" height="16" rx="4" fill="#d4845a" />
    <text x="142" y="13" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">需关注 (&lt;1.3)</text>
  </g>
</svg>
