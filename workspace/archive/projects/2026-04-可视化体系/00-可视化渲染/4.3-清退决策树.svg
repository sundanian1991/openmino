<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <rect width="680" height="400" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">清退决策树</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">明确清退边界</text>

  <rect x="40" y="80" width="600" height="280" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 决策树 -->
  <g transform="translate(60, 100)">
    <text x="200" y="15" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">峰值比 &lt; 60%？</text>

    <!-- 是分支 -->
    <text x="200" y="40" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a" text-anchor="middle">├─ 是 → 连续3月？</text>
    <text x="320" y="65" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a" text-anchor="middle">├─ 是 → 约谈后无改善？</text>
    <rect x="430" y="50" width="100" height="30" rx="6" fill="#d4845a" />
    <text x="480" y="70" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#faf9f7" text-anchor="middle">启动清退</text>

    <text x="440" y="95" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f" text-anchor="middle">└─ 否 → 继续观察</text>

    <!-- 否分支 -->
    <text x="120" y="115" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a" text-anchor="middle">└─ 否 → 维持观察</text>
  </g>

  <!-- 清退流程 -->
  <rect x="60" y="230" width="560" height="110" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
  <text x="75" y="250" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">清退流程（一旦启动）</text>

  <g transform="translate(75, 265)">
    <circle cx="10" cy="10" r="8" fill="#d4845a" />
    <text x="10" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">①</text>
    <text x="25" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">内部评估</text>

    <text x="110" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <circle cx="140" cy="10" r="8" fill="#d4845a" />
    <text x="140" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">②</text>
    <text x="155" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">约谈告知</text>

    <text x="240" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <circle cx="270" cy="10" r="8" fill="#d4845a" />
    <text x="270" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">③</text>
    <text x="285" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">数据冻结</text>

    <text x="370" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <circle cx="400" cy="10" r="8" fill="#d4845a" />
    <text x="400" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">④</text>
    <text x="415" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">份额转移</text>

    <text x="500" y="14" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <circle cx="530" cy="10" r="8" fill="#d4845a" />
    <text x="530" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">⑤</text>
    <text x="545" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">正式通知</text>
  </g>

  <!-- 时间线 -->
  <text x="75" y="325" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">时间线：</text>
  <text x="130" y="325" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a">D0启动</text>
  <text x="200" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>
  <text x="220" y="325" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a">D7份额转移完成</text>
  <text x="350" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>
  <text x="370" y="325" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a">D30正式结束</text>
</svg>
