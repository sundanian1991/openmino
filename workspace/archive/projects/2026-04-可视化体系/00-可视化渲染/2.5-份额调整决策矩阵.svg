<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <rect width="680" height="380" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">份额调整决策矩阵</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">动态优化资源配置</text>

  <rect x="40" y="80" width="600" height="260" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 矩阵标题 -->
  <text x="60" y="105" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b"></text>
  <text x="220" y="105" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">产能充足</text>
  <text x="460" y="105" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">产能不足</text>

  <!-- 矩阵 -->
  <g transform="translate(60, 120)">
    <!-- 第一行：表现优秀 -->
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">表现优秀</text>

    <rect x="80" y="0" width="150" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="155" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a" text-anchor="middle">↑ 加份额</text>
    <text x="155" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">优先加派</text>

    <rect x="280" y="0" width="150" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="355" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a" text-anchor="middle">→ 维持</text>
    <text x="355" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">鼓励扩编</text>

    <!-- 第二行：表现下滑 -->
    <text x="0" y="95" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">表现下滑</text>

    <rect x="80" y="65" width="150" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="155" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a" text-anchor="middle">→ 观察</text>
    <text x="155" y="103" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">分析原因</text>

    <rect x="280" y="65" width="150" height="50" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <text x="355" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a" text-anchor="middle">↓ 减份额</text>
    <text x="355" y="103" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">启动约谈</text>
  </g>

  <!-- 流程步骤 -->
  <g transform="translate(60, 250)">
    <circle cx="25" cy="15" r="12" fill="#c98a6a" />
    <text x="25" y="19" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#faf9f7" text-anchor="middle">1</text>
    <text x="25" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">评估表现</text>

    <text x="50" y="19" font-family="system-ui, sans-serif" font-size="10" fill="#c98a6a">→</text>

    <circle cx="105" cy="15" r="12" fill="#c98a6a" />
    <text x="105" y="19" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#faf9f7" text-anchor="middle">2</text>
    <text x="105" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">评估产能</text>

    <text x="130" y="19" font-family="system-ui, sans-serif" font-size="10" fill="#c98a6a">→</text>

    <circle cx="185" cy="15" r="12" fill="#c98a6a" />
    <text x="185" y="19" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#faf9f7" text-anchor="middle">3</text>
    <text x="185" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">决策矩阵</text>

    <text x="210" y="19" font-family="system-ui, sans-serif" font-size="10" fill="#c98a6a">→</text>

    <circle cx="265" cy="15" r="12" fill="#c98a6a" />
    <text x="265" y="19" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#faf9f7" text-anchor="middle">4</text>
    <text x="265" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">内部审批</text>

    <text x="290" y="19" font-family="system-ui, sans-serif" font-size="10" fill="#c98a6a">→</text>

    <circle cx="345" cy="15" r="12" fill="#c98a6a" />
    <text x="345" y="19" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#faf9f7" text-anchor="middle">5</text>
    <text x="345" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">通知执行</text>
  </g>

  <!-- 本月案例 -->
  <rect x="470" y="240" width="150" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
  <text x="485" y="260" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">本月调整案例</text>
  <text x="485" y="278" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a">毅航：优秀+充足</text>
  <text x="485" y="293" font-family="system-ui, sans-serif" font-size="8" fill="#8f9b7f">→ 份额 +3%</text>
  <text x="485" y="308" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a">岐力：下滑+不足</text>
  <text x="485" y="323" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a">→ 份额 -2%</text>
</svg>
