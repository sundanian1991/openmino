<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <rect width="680" height="380" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">FCI分布（% - 成本健康度）</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">利润健康度检查</text>

  <rect x="40" y="80" width="600" height="260" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- Y轴标签 -->
  <text x="50" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">100%</text>
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">90%</text>
  <text x="50" y="200" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">80%</text>
  <text x="50" y="250" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">70%</text>
  <text x="50" y="300" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">60%</text>

  <!-- 80%阈值线 -->
  <line x1="65" y1="200" x2="615" y2="200" stroke="#d4845a" stroke-width="1" stroke-dasharray="4 2" />
  <text x="560" y="195" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a">达标线 80%</text>

  <!-- 柱状图 -->
  <g transform="translate(85, 0)">
    <!-- 毅航 95% -->
    <rect x="0" y="125" width="35" height="155" rx="4" fill="#8f9b7f" />
    <text x="17" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">毅航</text>
    <text x="17" y="120" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle">95</text>

    <!-- 毛毛虫 92% -->
    <rect x="50" y="140" width="35" height="140" rx="4" fill="#8f9b7f" />
    <text x="67" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">毛毛</text>
    <text x="67" y="135" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle">92</text>

    <!-- 广达 85% -->
    <rect x="100" y="175" width="35" height="105" rx="4" fill="#8f9b7f" />
    <text x="117" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">广达</text>
    <text x="117" y="170" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle">85</text>

    <!-- 赛维斯 82% -->
    <rect x="150" y="190" width="35" height="90" rx="4" fill="#8f9b7f" />
    <text x="167" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">赛维</text>
    <text x="167" y="185" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#1a1a1a" text-anchor="middle">82</text>

    <!-- 伽玛 78% - 低于达标 -->
    <rect x="200" y="210" width="35" height="70" rx="4" fill="#d4845a" />
    <text x="217" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">伽玛</text>
    <text x="217" y="205" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#d4845a" text-anchor="middle">78</text>

    <!-- 翰锐 75% - 低于达标 -->
    <rect x="250" y="225" width="35" height="55" rx="4" fill="#d4845a" />
    <text x="267" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">翰锐</text>
    <text x="267" y="220" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#d4845a" text-anchor="middle">75</text>

    <!-- 华啸 72% - 低于达标 -->
    <rect x="300" y="240" width="35" height="40" rx="4" fill="#d4845a" />
    <text x="317" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">华啸</text>
    <text x="317" y="235" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#d4845a" text-anchor="middle">72</text>

    <!-- 岐力 68% - 低于达标 -->
    <rect x="350" y="260" width="35" height="20" rx="4" fill="#d4845a" />
    <text x="367" y="315" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">岐力</text>
    <text x="367" y="255" font-family="SF Mono, Monaco, monospace" font-size="8" fill="#d4845a" text-anchor="middle">68</text>
  </g>
</svg>
