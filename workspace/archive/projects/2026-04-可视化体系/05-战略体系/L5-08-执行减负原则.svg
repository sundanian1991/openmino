<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 470">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="470" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-08 执行减负原则</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">什么是必须做的、可以简化的、可以不做的</text>

  <!-- Column headers -->
  <rect x="20" y="70" width="200" height="30" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="120" y="90" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">必须做</text>
  <rect x="240" y="70" width="200" height="30" rx="6" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
  <text x="340" y="90" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">可以简化</text>
  <rect x="460" y="70" width="200" height="30" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="560" y="90" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b2010">可以不做</text>

  <!-- Must do items -->
  <rect x="20" y="110" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="128" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">月度排名与通报</text>
  <rect x="20" y="140" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="158" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">异常供应商约谈</text>
  <rect x="20" y="170" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="188" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">红线/诚信问题处理</text>
  <rect x="20" y="200" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="218" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">数据质量抽查</text>
  <rect x="20" y="230" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">一页纸月报输出</text>
  <rect x="20" y="260" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="278" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">新供应商准入评估</text>
  <rect x="20" y="290" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="308" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">整改结果验证</text>

  <!-- Can simplify items -->
  <rect x="240" y="110" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="250" y="128" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">周报改为双周报</text>
  <rect x="240" y="140" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="250" y="158" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">填报模板合并精简</text>
  <rect x="240" y="170" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="250" y="188" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">会议纪要改为要点记录</text>
  <rect x="240" y="200" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="250" y="218" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">约谈记录模板化</text>
  <rect x="240" y="230" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="250" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">巡检报告拍照即可</text>
  <rect x="240" y="260" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="250" y="278" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">数据用系统自动采集</text>

  <!-- Can skip items -->
  <rect x="460" y="110" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="470" y="128" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240" text-decoration="line-through">逐日数据手工录入</text>
  <rect x="460" y="140" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="470" y="158" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240" text-decoration="line-through">供应商日报</text>
  <rect x="460" y="170" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="470" y="188" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240" text-decoration="line-through">会议纪要逐字记录</text>
  <rect x="460" y="200" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="470" y="218" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240" text-decoration="line-through">所有指标都追踪</text>
  <rect x="460" y="230" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="470" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240" text-decoration="line-through">替供应商做整改方案</text>
  <rect x="460" y="260" width="200" height="25" rx="4" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="470" y="278" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240" text-decoration="line-through">每次约谈都写长报告</text>

  <!-- Bottom principle card -->
  <rect x="20" y="335" width="640" height="110" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="40" y="360" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b3410">判断大于录入 四原则</text>
  <line x1="40" y1="370" x2="640" y2="370" stroke="#c26d3a" stroke-width="0.5"/>

  <text x="40" y="392" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">1. 能系统自动采集的，不手工录入</text>
  <text x="40" y="412" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">2. 能一句话概括的，不写长报告</text>
  <text x="40" y="432" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">3. 能口头沟通解决的，不写书面流程</text>
  <text x="40" y="452" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">4. 能聚焦核心指标的，不追踪全部</text>

  <!-- Footer -->
  <text x="340" y="465" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">供应商管理可视化体系 L5-08</text>
</svg>