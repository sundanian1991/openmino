<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="560" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-11 与刘乾坤对比</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">两种管理模式的本质差异</text>

  <!-- Column headers -->
  <rect x="20" y="70" width="100" height="28" rx="4" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="70" y="88" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">对比维度</text>
  <rect x="120" y="70" width="270" height="28" rx="4" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="255" y="88" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">刘乾坤（人盯人）</text>
  <rect x="390" y="70" width="270" height="28" rx="4" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="525" y="88" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#0f5040">年老师（制度盯人）</text>

  <!-- Row 1: 核心动作 -->
  <rect x="20" y="98" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="118" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">核心动作</text>
  <rect x="120" y="98" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="118" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">每天看数据、逐个找供应商、</text>
  <text x="130" y="138" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">替供应商想办法做方案</text>
  <rect x="390" y="98" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="118" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">月度排名通报、异常触发约谈、</text>
  <text x="400" y="138" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">给框架让供应商自己想办法</text>

  <!-- Row 2: 数据依赖 -->
  <rect x="20" y="153" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="173" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">数据依赖</text>
  <rect x="120" y="153" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="173" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">大量手工录入，靠记忆和经验</text>
  <text x="130" y="193" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">判断，数据分散在多处</text>
  <rect x="390" y="153" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="173" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">系统自动采集为主，结构化指标</text>
  <text x="400" y="193" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">体系，一页纸月报快速决策</text>

  <!-- Row 3: 时间投入 -->
  <rect x="20" y="208" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="228" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">时间投入</text>
  <rect x="120" y="208" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="228" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">30-40小时/月，每天都需要投入</text>
  <text x="130" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">精力，随供应商数量线性增长</text>
  <rect x="390" y="208" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="228" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">4-6小时/月，集中在特定节点</text>
  <text x="400" y="248" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">触发式管理，不随人数线性增长</text>

  <!-- Row 4: 管理方式 -->
  <rect x="20" y="263" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="283" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">管理方式</text>
  <rect x="120" y="263" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="283" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">人盯人，亲力亲为，每个供应商</text>
  <text x="130" y="303" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">都要管到，深度依赖个人能力</text>
  <rect x="390" y="263" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="283" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">制度盯人，规则驱动，异常才介入</text>
  <text x="400" y="303" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">正常运行的供应商不主动打扰</text>

  <!-- Row 5: 供应商感受 -->
  <rect x="20" y="318" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="338" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">供应商感受</text>
  <rect x="120" y="318" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="338" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">频繁被找，依赖管理者指导，</text>
  <text x="130" y="358" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">自主性弱，等指令做事</text>
  <rect x="390" y="318" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="338" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">平时自主运营，异常时被约谈，</text>
  <text x="400" y="358" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">规则清晰、预期明确、有压力</text>

  <!-- Row 6: 覆盖面 -->
  <rect x="20" y="373" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="393" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">覆盖面</text>
  <rect x="120" y="373" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="393" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">精力有限，只能覆盖头部几家，</text>
  <text x="130" y="413" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">中小供应商容易被忽略</text>
  <rect x="390" y="373" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="393" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">通过排名和指标覆盖全部供应商，</text>
  <text x="400" y="413" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">异常自动触发，无遗漏</text>

  <!-- Row 7: 可持续性 -->
  <rect x="20" y="428" width="100" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="70" y="448" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">可持续性</text>
  <rect x="120" y="428" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="130" y="448" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">高度依赖个人，换人就崩，</text>
  <text x="130" y="468" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">无法规模化复制</text>
  <rect x="390" y="428" width="270" height="55" rx="0" fill="#fff" stroke="#857d74" stroke-width="0.5"/>
  <text x="400" y="448" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">制度可传承，换人不换规则，</text>
  <text x="400" y="468" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">新管理者可按体系接手</text>

  <!-- Bottom annotation -->
  <rect x="20" y="495" width="640" height="45" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="340" y="515" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">核心差异</text>
  <text x="340" y="532" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">"人盯人" vs "制度盯人" -- 前者靠个人精力，后者靠规则体系。前者不可复制，后者可传承。</text>
</svg>