<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-02 供应商对比矩阵 — 四象限</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">X轴 = 总GMV（总量） | Y轴 = 熟手人均GMV（人效）</text>

  <!-- Axis -->
  <line x1="120" y1="500" x2="120" y2="100" stroke="#454240" stroke-width="1.5"/>
  <line x1="120" y1="500" x2="620" y2="500" stroke="#454240" stroke-width="1.5"/>
  <!-- Center lines -->
  <line x1="370" y1="100" x2="370" y2="500" stroke="#857d74" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="300" x2="620" y2="300" stroke="#857d74" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Axis labels -->
  <text x="60" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#454240" transform="rotate(-90,60,300)">熟手人均GMV</text>
  <text x="370" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#454240">总 GMV</text>
  <text x="115" y="105" text-anchor="end" font-size="9" fill="#857d74">高</text>
  <text x="115" y="498" text-anchor="end" font-size="9" fill="#857d74">低</text>
  <text x="125" y="495" font-size="9" fill="#857d74">低</text>
  <text x="610" y="495" text-anchor="end" font-size="9" fill="#857d74">高</text>

  <!-- Four quadrants with fills -->
  <!-- Q2: Top-Left (潜力型) -->
  <rect x="122" y="102" width="246" height="196" rx="4" fill="#e8f1fa" opacity="0.6"/>
  <!-- Q1: Top-Right (标杆型) -->
  <rect x="372" y="102" width="246" height="196" rx="4" fill="#e6f5f0" opacity="0.6"/>
  <!-- Q3: Bottom-Left (问题型) -->
  <rect x="122" y="302" width="246" height="196" rx="4" fill="#faeae5" opacity="0.6"/>
  <!-- Q4: Bottom-Right (臃肿型) -->
  <rect x="372" y="302" width="246" height="196" rx="4" fill="#faf0dc" opacity="0.6"/>

  <!-- Quadrant Labels -->
  <!-- Q1 标杆型 (Top-Right) -->
  <rect x="410" y="130" width="160" height="72" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="490" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#0f5040">标杆型</text>
  <text x="490" y="170" text-anchor="middle" font-size="10" fill="#0f5040">总量高 + 人效高</text>
  <text x="490" y="186" text-anchor="middle" font-size="10" fill="#0f5040">规模大 + 效率高，真正的强者</text>
  <text x="490" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#0f5040">动作：选为标杆，分享做法</text>

  <!-- Q2 潜力型 (Top-Left) -->
  <rect x="155" y="130" width="160" height="72" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="235" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#0e4070">潜力型</text>
  <text x="235" y="170" text-anchor="middle" font-size="10" fill="#0e4070">总量低 + 人效高</text>
  <text x="235" y="186" text-anchor="middle" font-size="10" fill="#0e4070">人少但效率高，给资源能放大</text>
  <text x="235" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#0e4070">动作：评估加数据量/加人</text>

  <!-- Q4 臃肿型 (Bottom-Right) -->
  <rect x="410" y="360" width="160" height="72" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="490" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#6a4005">臃肿型</text>
  <text x="490" y="400" text-anchor="middle" font-size="10" fill="#6a4005">总量高 + 人效低</text>
  <text x="490" y="416" text-anchor="middle" font-size="10" fill="#6a4005">靠人多撑着，效率被稀释</text>
  <text x="490" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#6a4005">动作：约谈，管理是否松弛</text>

  <!-- Q3 问题型 (Bottom-Left) -->
  <rect x="155" y="360" width="160" height="72" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="235" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#6b2010">问题型</text>
  <text x="235" y="400" text-anchor="middle" font-size="10" fill="#6b2010">总量低 + 人效低</text>
  <text x="235" y="416" text-anchor="middle" font-size="10" fill="#6b2010">规模小效率也差</text>
  <text x="235" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#6b2010">动作：约谈或启动清退</text>

  <!-- Sample supplier dots -->
  <circle cx="500" cy="160" r="6" fill="#2e8b6e"/>
  <text x="510" y="164" font-size="9" fill="#0f5040">毅航</text>
  <circle cx="480" cy="180" r="5" fill="#2e8b6e"/>
  <text x="490" y="184" font-size="9" fill="#0f5040">毛毛虫</text>
  <circle cx="200" cy="170" r="5" fill="#3a7ab8"/>
  <text x="175" y="175" font-size="9" fill="#0e4070">伽玛</text>
  <circle cx="460" cy="370" r="6" fill="#b88018"/>
  <text x="470" y="374" font-size="9" fill="#6a4005">赛维斯</text>
  <circle cx="200" cy="420" r="5" fill="#c25030"/>
  <text x="175" y="425" font-size="9" fill="#6b2010">华啸</text>

  <!-- Right side annotation -->
  <rect x="580" y="100" width="95" height="180" rx="8" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="627" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">为什么用</text>
  <text x="627" y="136" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">总量 × 人均</text>
  <text x="588" y="158" font-size="9" fill="#454240">1. 总量高是人多</text>
  <text x="588" y="172" font-size="9" fill="#454240">    还是效率高？</text>
  <text x="588" y="194" font-size="9" fill="#454240">2. 人均高但总量低</text>
  <text x="588" y="208" font-size="9" fill="#454240">    能不能给资源？</text>
  <text x="588" y="230" font-size="9" fill="#454240">3. 总量高但人均低</text>
  <text x="588" y="244" font-size="9" fill="#454240">    是不是人海战术？</text>

  <!-- Bottom annotation -->
  <rect x="120" y="545" width="500" height="50" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="140" y="565" font-size="10" font-weight="600" fill="#6b3410">注意：人均GMV必须用"熟手人数"做分母</text>
  <text x="140" y="582" font-size="10" fill="#454240">新人占比&gt;30% 的供应商落在"臃肿型"可能是暂时稀释，需在图旁标注新人比例</text>

  <!-- Footer -->
  <text x="340" y="615" text-anchor="middle" font-size="9" fill="#857d74">L3-02 四象限矩阵 | 总量×人效 | 发现异常落位的入口</text>
</svg>