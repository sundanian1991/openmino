<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-03 矩阵使用流程 — 五步法</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">矩阵不是画完就完了，它是发现异常的入口</text>

  <!-- Step 1 -->
  <rect x="10" y="65" width="120" height="120" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="70" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#0f5040">Step 1</text>
  <text x="70" y="108" text-anchor="middle" font-size="11" fill="#0f5040" font-weight="600">打开矩阵</text>
  <text x="70" y="128" text-anchor="middle" font-size="10" fill="#454240">看每个供应商</text>
  <text x="70" y="144" text-anchor="middle" font-size="10" fill="#454240">落在哪个象限</text>
  <text x="70" y="168" text-anchor="middle" font-size="9" fill="#857d74">四象限分布一览</text>

  <!-- Arrow 1->2 -->
  <line x1="130" y1="125" x2="155" y2="125" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="155" y="65" width="120" height="160" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="215" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#6a4005">Step 2</text>
  <text x="215" y="108" text-anchor="middle" font-size="11" fill="#6a4005" font-weight="600">标出异常落位</text>
  <!-- 4 scenarios -->
  <rect x="165" y="118" width="100" height="24" rx="6" fill="#faeae5"/>
  <text x="215" y="134" text-anchor="middle" font-size="9" fill="#6b2010">右上→右下 效率恶化</text>
  <rect x="165" y="146" width="100" height="24" rx="6" fill="#faeae5"/>
  <text x="215" y="162" text-anchor="middle" font-size="9" fill="#6b2010">左上→左下 潜力消失</text>
  <rect x="165" y="174" width="100" height="24" rx="6" fill="#faeae5"/>
  <text x="215" y="190" text-anchor="middle" font-size="9" fill="#6b2010">右下→左下 规模也缩</text>
  <rect x="165" y="202" width="100" height="24" rx="6" fill="#faeae5"/>
  <text x="215" y="218" text-anchor="middle" font-size="9" fill="#6b2010">连续两月左下 长期问题</text>

  <!-- Arrow 2->3 -->
  <line x1="275" y1="145" x2="300" y2="145" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="300" y="65" width="120" height="120" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="360" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#0e4070">Step 3</text>
  <text x="360" y="108" text-anchor="middle" font-size="11" fill="#0e4070" font-weight="600">双维度验证</text>
  <text x="360" y="128" text-anchor="middle" font-size="10" fill="#454240">点击异常供应商</text>
  <text x="360" y="144" text-anchor="middle" font-size="10" fill="#454240">看自身峰值比</text>
  <text x="360" y="160" text-anchor="middle" font-size="10" fill="#454240">+ 头部差距</text>
  <text x="360" y="178" text-anchor="middle" font-size="9" fill="#454240">确定内部问题</text>

  <!-- Arrow 3->4 -->
  <line x1="420" y1="125" x2="445" y2="125" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="445" y="65" width="110" height="120" rx="10" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
  <text x="500" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#454240">Step 4</text>
  <text x="500" y="108" text-anchor="middle" font-size="11" fill="#454240" font-weight="600">打开深度看板</text>
  <text x="500" y="128" text-anchor="middle" font-size="10" fill="#454240">7指标交叉验证</text>
  <text x="500" y="144" text-anchor="middle" font-size="10" fill="#454240">定位根因</text>
  <text x="500" y="164" text-anchor="middle" font-size="10" fill="#454240">主管胜任评估</text>
  <!-- Branch arrow to 看板三 -->
  <rect x="455" y="178" width="90" height="20" rx="10" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
  <text x="500" y="192" text-anchor="middle" font-size="9" fill="#3a4a30">看板三(深度)</text>

  <!-- Arrow 4->5 -->
  <line x1="555" y1="125" x2="580" y2="125" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="580" y="65" width="90" height="200" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="625" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#6b3410">Step 5</text>
  <text x="625" y="108" text-anchor="middle" font-size="11" fill="#6b3410" font-weight="600">决定动作</text>
  <!-- 4 branches -->
  <rect x="590" y="120" width="70" height="28" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="625" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#0f5040">约谈</text>
  <text x="625" y="145" text-anchor="middle" font-size="8" fill="#0f5040">了解原因</text>
  <rect x="590" y="156" width="70" height="28" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
  <text x="625" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#0e4070">扶持</text>
  <text x="625" y="181" text-anchor="middle" font-size="8" fill="#0e4070">提供框架</text>
  <rect x="590" y="192" width="70" height="28" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
  <text x="625" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#3a4a30">观察</text>
  <text x="625" y="217" text-anchor="middle" font-size="8" fill="#3a4a30">观察1个月</text>
  <rect x="590" y="228" width="70" height="28" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="625" y="241" text-anchor="middle" font-size="10" font-weight="600" fill="#6b2010">清退</text>
  <text x="625" y="253" text-anchor="middle" font-size="8" fill="#6b2010">启动评估</text>

  <!-- Bottom: decision flow summary -->
  <rect x="10" y="280" width="660" height="210" rx="12" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="340" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#454240">矩阵使用完整流程</text>
  <line x1="30" y1="315" x2="650" y2="315" stroke="#857d74" stroke-width="0.5"/>

  <!-- Flow rows -->
  <text x="30" y="340" font-size="11" fill="#454240">Step 1: 打开四象限矩阵，标注每个供应商的落位（标杆/臃肿/潜力/问题）</text>
  <text x="30" y="365" font-size="11" fill="#454240">Step 2: 标出"异常落位"的供应商 — 掉落到不同象限 = 状态恶化信号</text>
  <text x="30" y="390" font-size="11" fill="#454240">Step 3: 确认异常后，查看"自身峰值比 + 头部差距" — 确定是内部问题还是外部差距</text>
  <text x="30" y="415" font-size="11" fill="#454240">Step 4: 打开单体深度看板（看板三），7指标交叉验证 + 主管胜任评估</text>
  <text x="30" y="440" font-size="11" fill="#454240">Step 5: 决定处理方式 — 约谈 / 扶持 / 观察 / 清退</text>

  <!-- Key insight -->
  <rect x="30" y="455" width="620" height="28" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="340" y="474" text-anchor="middle" font-size="10" font-weight="600" fill="#6b3410">关键：矩阵是入口，不是终点。发现问题后必须深入到单体深度看板和触发规则</text>

  <!-- Footer -->
  <text x="340" y="510" text-anchor="middle" font-size="9" fill="#857d74">L3-03 矩阵使用流程 | 五步法 | 异常落位 → 双维度验证 → 深度诊断 → 动作输出</text>
</svg>