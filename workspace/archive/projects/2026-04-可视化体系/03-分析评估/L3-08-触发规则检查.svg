<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2e8b6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c25030" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-08 触发规则检查 — 8种状态流转</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">状态机 | 从正常到清退的全链路</text>

  <!-- State 1: 月度正常 -->
  <rect x="10" y="70" width="110" height="100" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="2"/>
  <text x="65" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#0f5040">月度正常</text>
  <text x="65" y="110" text-anchor="middle" font-size="9" fill="#0f5040">排名前70%</text>
  <text x="65" y="126" text-anchor="middle" font-size="9" fill="#454240">你要做的事：</text>
  <text x="65" y="140" text-anchor="middle" font-size="9" fill="#454240">保持关注，月度通报</text>
  <text x="65" y="156" text-anchor="middle" font-size="9" fill="#454240">完成标志：排名稳定</text>

  <!-- Arrow 1->2 -->
  <line x1="120" y1="100" x2="145" y2="100" stroke="#b88018" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="132" y="90" text-anchor="middle" font-size="8" fill="#6a4005">本月后30%</text>

  <!-- State 2: 首次预警 -->
  <rect x="145" y="70" width="110" height="100" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="200" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#6a4005">首次预警</text>
  <text x="200" y="110" text-anchor="middle" font-size="9" fill="#6a4005">首次进入后30%</text>
  <text x="200" y="126" text-anchor="middle" font-size="9" fill="#454240">你要做的事：</text>
  <text x="200" y="140" text-anchor="middle" font-size="9" fill="#454240">发送预警通知</text>
  <text x="200" y="156" text-anchor="middle" font-size="9" fill="#454240">完成标志：48h回复</text>

  <!-- Arrow 2->3 -->
  <line x1="255" y1="100" x2="280" y2="100" stroke="#b88018" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="267" y="90" text-anchor="middle" font-size="8" fill="#6a4005">连续2月</text>

  <!-- State 3: 连续预警 -->
  <rect x="280" y="70" width="110" height="100" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="335" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#6a4005">连续预警</text>
  <text x="335" y="110" text-anchor="middle" font-size="9" fill="#6a4005">连续2月后30%</text>
  <text x="335" y="126" text-anchor="middle" font-size="9" fill="#454240">你要做的事：</text>
  <text x="335" y="140" text-anchor="middle" font-size="9" fill="#454240">约谈，要求整改</text>
  <text x="335" y="156" text-anchor="middle" font-size="9" fill="#454240">完成标志：整改计划</text>

  <!-- Arrow 3->4 -->
  <line x1="390" y1="100" x2="415" y2="100" stroke="#c25030" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="402" y="90" text-anchor="middle" font-size="8" fill="#6b2010">连续3月</text>

  <!-- State 4: 清退评估 -->
  <rect x="415" y="70" width="110" height="100" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="2"/>
  <text x="470" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">清退评估</text>
  <text x="470" y="110" text-anchor="middle" font-size="9" fill="#6b2010">连续3月未改善</text>
  <text x="470" y="126" text-anchor="middle" font-size="9" fill="#454240">你要做的事：</text>
  <text x="470" y="140" text-anchor="middle" font-size="9" fill="#454240">启动清退流程</text>
  <text x="470" y="156" text-anchor="middle" font-size="9" fill="#454240">完成标志：替换供应商</text>

  <!-- Arrow from 4 to end -->
  <line x1="525" y1="100" x2="550" y2="100" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="80" width="100" height="40" rx="10" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="600" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">清退完成</text>

  <!-- A级骤降 branch (from 月度正常 direct) -->
  <line x1="65" y1="170" x2="65" y2="220" stroke="#c25030" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="65" y="195" text-anchor="middle" font-size="8" fill="#6b2010">排名骤降5+</text>

  <!-- State 5: A级骤降 -->
  <rect x="10" y="220" width="110" height="90" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="65" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">A级骤降</text>
  <text x="65" y="260" text-anchor="middle" font-size="9" fill="#454240">排名下降超过5名</text>
  <text x="65" y="276" text-anchor="middle" font-size="9" fill="#454240">你要做的事：</text>
  <text x="65" y="292" text-anchor="middle" font-size="9" fill="#454240">立即了解原因</text>

  <!-- Arrow to 首次预警 -->
  <line x1="120" y1="250" x2="145" y2="170" stroke="#c25030" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#c)"/>

  <!-- 诚信红线 branch -->
  <text x="180" y="220" font-size="10" font-weight="600" fill="#6b2010">诚信红线（独立分支）</text>

  <rect x="145" y="230" width="110" height="80" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="2"/>
  <text x="200" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">诚信预警</text>
  <text x="200" y="270" text-anchor="middle" font-size="9" fill="#454240">数据造假/虚报</text>
  <text x="200" y="286" text-anchor="middle" font-size="9" fill="#454240">→ 红线触发 → 直接清退</text>

  <rect x="145" y="320" width="110" height="80" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="2"/>
  <text x="200" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">红线触发</text>
  <text x="200" y="360" text-anchor="middle" font-size="9" fill="#454240">严重违规/欺诈</text>
  <text x="200" y="376" text-anchor="middle" font-size="9" fill="#454240">→ 立即清退，不约谈</text>

  <!-- 信任重建 -->
  <rect x="145" y="410" width="110" height="80" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="200" y="432" text-anchor="middle" font-size="11" font-weight="600" fill="#6a4005">信任重建</text>
  <text x="200" y="450" text-anchor="middle" font-size="9" fill="#454240">预警后整改完成</text>
  <text x="200" y="466" text-anchor="middle" font-size="9" fill="#454240">→ 恢复观察，重建信任</text>

  <!-- 回正 (from any state back to 正常) -->
  <text x="380" y="220" font-size="10" font-weight="600" fill="#0f5040">回正（从任意状态回流）</text>

  <rect x="280" y="230" width="110" height="80" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="2"/>
  <text x="335" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#0f5040">回正</text>
  <text x="335" y="270" text-anchor="middle" font-size="9" fill="#454240">回到前70%</text>
  <text x="335" y="286" text-anchor="middle" font-size="9" fill="#454240">你要做的事：</text>
  <text x="335" y="302" text-anchor="middle" font-size="9" fill="#454240">确认改善可持续</text>

  <!-- Return arrows (curved) -->
  <path d="M390 120 Q420 180 390 230" fill="none" stroke="#2e8b6e" stroke-width="1.5" marker-end="url(#r)"/>
  <text x="415" y="170" font-size="8" fill="#0f5040">连续预警</text>
  <text x="415" y="180" font-size="8" fill="#0f5040">改善后回流</text>

  <path d="M255 120 Q280 190 280 230" fill="none" stroke="#2e8b6e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#r)"/>
  <text x="275" y="170" font-size="8" fill="#0f5040">首次预警</text>
  <text x="275" y="180" font-size="8" fill="#0f5040">次月回升</text>

  <!-- 信任重建回流 -->
  <path d="M255 370 Q270 400 280 450" fill="none" stroke="#2e8b6e" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M255 450 Q260 440 280 450" fill="none" stroke="#2e8b6e" stroke-width="1" marker-end="url(#r)"/>

  <!-- Bottom summary -->
  <rect x="10" y="520" width="660" height="80" rx="10" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="340" y="545" text-anchor="middle" font-size="11" font-weight="600" fill="#454240">触发规则总览</text>
  <line x1="30" y1="555" x2="650" y2="555" stroke="#857d74" stroke-width="0.5"/>
  <text x="30" y="575" font-size="10" fill="#454240">正常 → 首次预警(1月后30%) → 连续预警(2月后30%) → 清退评估(3月未改善) → 清退</text>
  <text x="30" y="593" font-size="10" fill="#454240">A级骤降(排名降5+) → 立即约谈          诚信红线(造假/欺诈) → 直接清退          回正(恢复前70%) → 重建信任</text>

  <!-- Footer -->
  <text x="340" y="618" text-anchor="middle" font-size="9" fill="#857d74">L3-08 触发规则检查 | 8种状态 | 正常→预警→清退全链路 + 独立分支</text>
</svg>