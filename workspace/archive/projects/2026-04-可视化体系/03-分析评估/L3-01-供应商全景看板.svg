<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 820" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-01 供应商全景看板 — 7个核心信息</text>
  <text x="340" y="48" text-anchor="middle" font-size="10" fill="#857d74">月度打开 | 全景视图 | 发现异常入口</text>

  <!-- Card 1: 综合排名 (Main Card, wider) -->
  <rect x="20" y="65" width="640" height="100" rx="12" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="40" y="88" font-size="13" font-weight="600" fill="#6b3410">综合排名</text>
  <rect x="130" y="78" width="60" height="18" rx="9" fill="#e6f5f0"/>
  <text x="160" y="91" text-anchor="middle" font-size="9" fill="#0f5040">主卡</text>
  <!-- 看什么 -->
  <text x="40" y="112" font-size="10" fill="#6b3410" font-weight="600">看什么</text>
  <text x="40" y="128" font-size="11" fill="#454240">1~N名排名 + 后30%标红</text>
  <!-- 怎么判断 -->
  <text x="260" y="112" font-size="10" fill="#6b3410" font-weight="600">怎么判断</text>
  <text x="260" y="128" font-size="11" fill="#454240">连续后30% → 触发预警/约谈/清退</text>
  <rect x="260" y="134" width="55" height="16" rx="8" fill="#faeae5"/>
  <text x="287" y="146" text-anchor="middle" font-size="9" fill="#6b2010">后30%红</text>
  <!-- 对应动作 -->
  <text x="440" y="112" font-size="10" fill="#6b3410" font-weight="600">对应动作</text>
  <text x="440" y="128" font-size="11" fill="#454240">查触发规则 → 预警 / 约谈 / 清退</text>
  <!-- 排名变动 -->
  <text x="440" y="148" font-size="10" fill="#6b3410" font-weight="600">排名变动</text>
  <text x="440" y="162" font-size="11" fill="#454240">本月 - 上月 = 变动值</text>
  <rect x="440" y="146" width="85" height="16" rx="8" fill="#faf0dc"/>
  <text x="482" y="158" text-anchor="middle" font-size="9" fill="#6a4005">降5名=骤降</text>

  <!-- Card 2: 自身峰值比 -->
  <rect x="20" y="180" width="310" height="100" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="40" y="203" font-size="13" font-weight="600" fill="#0f5040">自身峰值比</text>
  <text x="40" y="224" font-size="10" fill="#0f5040" font-weight="600">看什么</text>
  <text x="40" y="240" font-size="11" fill="#454240">本月熟手人均GMV / 近6月熟手峰值</text>
  <text x="40" y="260" font-size="10" fill="#0f5040" font-weight="600">怎么判断</text>
  <rect x="40" y="266" width="55" height="16" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="67" y="278" text-anchor="middle" font-size="9" fill="#0f5040">&gt;85%正常</text>
  <rect x="100" y="266" width="55" height="16" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="127" y="278" text-anchor="middle" font-size="9" fill="#6a4005">65~85%预警</text>
  <rect x="160" y="266" width="55" height="16" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="187" y="278" text-anchor="middle" font-size="9" fill="#6b2010">&lt;65%异常</text>
  <!-- 动作 -->
  <text x="40" y="256" font-size="0">dummy</text>
  <text x="230" y="224" font-size="10" fill="#0f5040" font-weight="600">动作</text>
  <text x="230" y="240" font-size="11" fill="#454240">&lt;65%进入矩阵定位</text>

  <!-- Card 3: 头部差距 -->
  <rect x="350" y="180" width="310" height="100" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="370" y="203" font-size="13" font-weight="600" fill="#0e4070">头部差距</text>
  <text x="370" y="224" font-size="10" fill="#0e4070" font-weight="600">看什么</text>
  <text x="370" y="240" font-size="11" fill="#454240">本月熟手人均GMV / 同产线第1名</text>
  <text x="370" y="260" font-size="10" fill="#0e4070" font-weight="600">怎么判断</text>
  <rect x="370" y="266" width="55" height="16" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="397" y="278" text-anchor="middle" font-size="9" fill="#0f5040">&lt;20%领先</text>
  <rect x="430" y="266" width="55" height="16" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="457" y="278" text-anchor="middle" font-size="9" fill="#6a4005">20~40%注意</text>
  <rect x="490" y="266" width="55" height="16" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="517" y="278" text-anchor="middle" font-size="9" fill="#6b2010">&gt;40%差距大</text>
  <text x="560" y="224" font-size="10" fill="#0e4070" font-weight="600">动作</text>
  <text x="560" y="240" font-size="11" fill="#454240">评估产线适配</text>

  <!-- Card 4: 人力结构 -->
  <rect x="20" y="295" width="310" height="90" rx="10" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="40" y="318" font-size="13" font-weight="600" fill="#3a4a30">人力结构</text>
  <text x="40" y="338" font-size="11" fill="#454240">看什么：熟手人数 vs 新人人数（入职&lt;30天）</text>
  <text x="40" y="358" font-size="10" fill="#3a4a30" font-weight="600">怎么判断</text>
  <rect x="40" y="364" width="75" height="16" rx="8" fill="#e6f5f0"/>
  <text x="77" y="376" text-anchor="middle" font-size="9" fill="#0f5040">新人&lt;30%正常</text>
  <rect x="120" y="364" width="75" height="16" rx="8" fill="#faeae5"/>
  <text x="157" y="376" text-anchor="middle" font-size="9" fill="#6b2010">新人&gt;30%稀释</text>
  <text x="230" y="338" font-size="10" fill="#3a4a30" font-weight="600">动作</text>
  <text x="230" y="354" font-size="11" fill="#454240">按熟手算人均</text>
  <text x="230" y="370" font-size="11" fill="#454240">跟踪新人成长</text>

  <!-- Card 5: 出勤率 -->
  <rect x="350" y="295" width="310" height="90" rx="10" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
  <text x="370" y="318" font-size="13" font-weight="600" fill="#454240">出勤率</text>
  <text x="370" y="338" font-size="11" fill="#454240">看什么：上月日均有效出勤率</text>
  <text x="370" y="358" font-size="10" fill="#454240" font-weight="600">怎么判断</text>
  <rect x="370" y="364" width="65" height="16" rx="8" fill="#e6f5f0"/>
  <text x="402" y="376" text-anchor="middle" font-size="9" fill="#0f5040">&gt;90%正常</text>
  <rect x="440" y="364" width="65" height="16" rx="8" fill="#faf0dc"/>
  <text x="472" y="376" text-anchor="middle" font-size="9" fill="#6a4005">85~90%预警</text>
  <rect x="510" y="364" width="65" height="16" rx="8" fill="#faeae5"/>
  <text x="542" y="376" text-anchor="middle" font-size="9" fill="#6b2010">&lt;85%异常</text>
  <text x="590" y="338" font-size="10" fill="#454240" font-weight="600">动作</text>
  <text x="590" y="354" font-size="11" fill="#454240">了解原因</text>

  <!-- Card 6: 流失率 -->
  <rect x="20" y="400" width="310" height="90" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="40" y="423" font-size="13" font-weight="600" fill="#6b2010">流失率</text>
  <text x="40" y="443" font-size="11" fill="#454240">看什么：上月离职人数 / 月初总人数</text>
  <text x="40" y="463" font-size="10" fill="#6b2010" font-weight="600">怎么判断</text>
  <rect x="40" y="469" width="55" height="16" rx="8" fill="#e6f5f0"/>
  <text x="67" y="481" text-anchor="middle" font-size="9" fill="#0f5040">&lt;8%正常</text>
  <rect x="100" y="469" width="55" height="16" rx="8" fill="#faf0dc"/>
  <text x="127" y="481" text-anchor="middle" font-size="9" fill="#6a4005">8~10%预警</text>
  <rect x="160" y="469" width="55" height="16" rx="8" fill="#faeae5"/>
  <text x="187" y="481" text-anchor="middle" font-size="9" fill="#6b2010">&gt;10%高流失</text>
  <text x="230" y="443" font-size="10" fill="#6b2010" font-weight="600">动作</text>
  <text x="230" y="459" font-size="11" fill="#454240">主管问题 or 待遇</text>

  <!-- Card 7: 排名×人效趋势 (bottom center) -->
  <rect x="155" y="505" width="370" height="110" rx="12" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="340" y="530" text-anchor="middle" font-size="13" font-weight="600" fill="#6b3410">排名 × 人效趋势交叉（月度专属）</text>
  <text x="340" y="548" text-anchor="middle" font-size="10" fill="#857d74">排名变化 × 熟手人均GMV趋势 = 四种类型</text>

  <!-- 2x2 mini matrix -->
  <rect x="175" y="560" width="145" height="45" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="247" y="576" text-anchor="middle" font-size="11" font-weight="600" fill="#0f5040">真进步</text>
  <text x="247" y="592" text-anchor="middle" font-size="9" fill="#0f5040">排名升 + 人效升 → 表扬</text>

  <rect x="360" y="560" width="145" height="45" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
  <text x="432" y="576" text-anchor="middle" font-size="11" font-weight="600" fill="#0e4070">隐性进步</text>
  <text x="432" y="592" text-anchor="middle" font-size="9" fill="#0e4070">排名降 + 人效升 → 评估资源</text>

  <rect x="175" y="610" width="145" height="45" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="247" y="626" text-anchor="middle" font-size="11" font-weight="600" fill="#6a4005">隐性退步 ⚠</text>
  <text x="247" y="642" text-anchor="middle" font-size="9" fill="#6a4005">排名升 + 人效降 → 最危险</text>

  <rect x="360" y="610" width="145" height="45" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="432" y="626" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">真退步</text>
  <text x="432" y="642" text-anchor="middle" font-size="9" fill="#6b2010">排名降 + 人效降 → 约谈</text>

  <!-- Axis labels for 2x2 -->
  <text x="170" y="585" text-anchor="end" font-size="9" fill="#857d74">人均升</text>
  <text x="170" y="635" text-anchor="end" font-size="9" fill="#857d74">人均降</text>
  <text x="247" y="556" text-anchor="middle" font-size="9" fill="#857d74">排名升</text>
  <text x="432" y="556" text-anchor="middle" font-size="9" fill="#857d74">排名降</text>

  <!-- Bottom annotation -->
  <text x="340" y="680" text-anchor="middle" font-size="10" fill="#6a4005" font-weight="600">隐性退步最危险：排名升但人效降，说明靠加人不是提效</text>
  <text x="340" y="698" text-anchor="middle" font-size="10" fill="#0e4070" font-weight="600">隐性进步最值得关注：人效升但排名降，可能是数据量不够</text>

  <!-- Flow arrow -->
  <text x="340" y="730" text-anchor="middle" font-size="11" fill="#454240">全景看板 → 发现异常 → 四象限矩阵 → 单体深度看板 → 约谈 / 扶持 / 观察 / 清退</text>

  <!-- Footer -->
  <line x1="20" y1="760" x2="660" y2="760" stroke="#f2f0eb" stroke-width="1"/>
  <text x="340" y="780" text-anchor="middle" font-size="9" fill="#857d74">L3-01 供应商全景看板 | 月度打开一次 | 7个核心信息 | 异常判断入口</text>
</svg>