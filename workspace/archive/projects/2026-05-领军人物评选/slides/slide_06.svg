<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">转型背景与战略目标</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">合规与效率的双重挑战驱动客服向智能营销转型</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧：挑战 -->
<rect x="40" y="100" width="720" height="300" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="128" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">行业挑战与转型驱动</text>
<line x1="56" y1="136" x2="744" y2="136" stroke="#E2E2E2" stroke-width="0.5"/>

<rect x="56" y="150" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="160" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">获客成本持续上升，市场竞争加剧，需要通过精准识别提升ROI</text>

<rect x="56" y="174" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">金融营销合规要求持续收紧，需要持续强化合规能力</text>

<rect x="56" y="198" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="208" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">AI、大数据等新技术快速迭代，需要持续学习和应用</text>

<rect x="56" y="222" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="232" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">如何从海量数据中准确识别有真实需求的客户，避免打扰</text>

<rect x="56" y="246" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="256" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">整合分散在各个系统的客户数据，构建统一画像</text>

<rect x="56" y="270" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="280" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">从传统电销向数据驱动、AI辅助的智能营销转型</text>

<rect x="56" y="294" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="304" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">让AI辅助而非替代人工，保持营销的温度和信任</text>

<!-- 右侧：战略目标 -->
<rect x="776" y="100" width="464" height="300" rx="4" fill="var(--brand-primary)"/>
<text x="796" y="128" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8AAED0" letter-spacing="2">STRATEGIC GOALS</text>
<line x1="796" y1="136" x2="1224" y2="136" stroke="#FFFFFF" stroke-width="1"/>

<text x="796" y="170" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#FFFFFF">客服价值化</text>
<text x="796" y="200" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">从成本中心转型为</text>
<text x="796" y="220" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">利润创造中心</text>

<text x="796" y="266" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#FFFFFF">数字智能化</text>
<text x="796" y="296" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">AI赋能全流程，</text>
<text x="796" y="316" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">数据驱动决策</text>

<text x="796" y="362" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#FFFFFF">服务营销一体化</text>
<text x="796" y="392" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">全生命周期运营</text>
<text x="796" y="412" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">提升GMV与复购率</text>

<!-- 底部：转型原因说明 -->
<text x="40" y="440" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">制订战略目标的原因</text>
<line x1="40" y1="448" x2="400" y2="448" stroke="var(--brand-primary)" stroke-width="1.5"/>

<rect x="40" y="460" width="380" height="210" rx="4" fill="#F5F5F5"/>
<rect x="40" y="460" width="4" height="210" fill="var(--brand-primary)"/>
<text x="56" y="492" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">客户体验升级</text>
<text x="56" y="522" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">让客户感受到"被理解"</text>
<text x="56" y="546" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">而非"被推销"，建立</text>
<text x="56" y="570" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">长期信任关系</text>
<text x="56" y="610" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">通过精准触达减少客</text>
<text x="56" y="634" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">户打扰，提升满意度</text>

<rect x="436" y="460" width="380" height="210" rx="4" fill="#F5F5F5"/>
<rect x="436" y="460" width="4" height="210" fill="var(--brand-primary)"/>
<text x="452" y="492" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">业务增长驱动</text>
<text x="452" y="522" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">通过精准客户识别</text>
<text x="452" y="546" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">和智能路由提升转</text>
<text x="452" y="570" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">化率，同时全生命周</text>
<text x="452" y="594" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">期运营提升GMV和</text>
<text x="452" y="618" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">新客数</text>

<rect x="832" y="460" width="408" height="210" rx="4" fill="#F5F5F5"/>
<rect x="832" y="460" width="4" height="210" fill="var(--brand-primary)"/>
<text x="848" y="492" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">合规风险管控</text>
<text x="848" y="522" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">金融营销合规要求</text>
<text x="848" y="546" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">趋严，需要通过AI</text>
<text x="848" y="570" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">实时监控和智能质</text>
<text x="848" y="594" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">检确保合规率保持</text>
<text x="848" y="618" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">100%</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">6 / 12</text>
</svg>
