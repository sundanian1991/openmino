<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">组织变革与人才培养</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">AI辅助培训缩短新人上手时间67%，培养复合型营销人才</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左侧：组织变革 -->
<rect x="40" y="100" width="590" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="128" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">组织架构与管理变革</text>
<line x1="56" y1="136" x2="614" y2="136" stroke="var(--brand-primary)" stroke-width="1.5"/>

<rect x="56" y="150" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="160" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">前中后台明确分工，职责边界清晰</text>

<rect x="56" y="174" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">中台技术团队支撑前台业务，形成闭环</text>

<rect x="56" y="198" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="208" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">后台质检培训独立运营，保障合规底线</text>

<rect x="56" y="222" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="66" y="232" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">从传统电销管理向数据驱动运营转型</text>

<!-- 变革困难与克服 -->
<text x="56" y="290" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">变革中的困难与克服</text>
<line x1="56" y1="298" x2="300" y2="298" stroke="#E2E2E2" stroke-width="0.5"/>

<rect x="56" y="310" width="510" height="100" rx="4" fill="#F5F5F5"/>
<text x="72" y="340" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">组织惯性</text>
<text x="72" y="364" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">传统管理方式向数据驱动转变阻力大，</text>
<text x="72" y="384" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">通过分阶段推进和成果展示逐步化解</text>

<rect x="56" y="420" width="510" height="100" rx="4" fill="#F5F5F5"/>
<text x="72" y="450" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">跨部门协作</text>
<text x="72" y="474" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">数据、技术、业务三线协作需要建立</text>
<text x="72" y="494" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">统一语言和协作机制</text>

<rect x="56" y="530" width="510" height="100" rx="4" fill="#F5F5F5"/>
<text x="72" y="560" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">供应商协同</text>
<text x="72" y="584" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">35家供应商协同管理，标准统一难，</text>
<text x="72" y="604" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">通过统一平台和考核机制解决</text>

<!-- 右侧：人才培养 -->
<rect x="646" y="100" width="594" height="580" rx="4" fill="var(--brand-primary)"/>

<text x="662" y="128" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8AAED0" letter-spacing="2">TALENT DEVELOPMENT</text>
<line x1="662" y1="136" x2="1224" y2="136" stroke="#FFFFFF" stroke-width="1"/>

<text x="662" y="170" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#FFFFFF">关键人才类型</text>

<text x="662" y="210" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#E8F0FA">AI模型工程师</text>
<text x="662" y="234" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">需求识别、语义分析、话术推荐</text>

<text x="662" y="276" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#E8F0FA">数据分析师</text>
<text x="662" y="300" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">客户画像构建、分层运营策略制定</text>

<text x="662" y="342" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#E8F0FA">复合型坐席</text>
<text x="662" y="366" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">懂产品、懂话术、懂合规的全能人才</text>

<text x="662" y="408" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#E8F0FA">合规专员</text>
<text x="662" y="432" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">AI质检配合、风险预警与处理</text>

<text x="662" y="474" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#E8F0FA">供应商管理</text>
<text x="662" y="498" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">35家供应商统一标准与考核管理</text>

<!-- 培养方式 -->
<text x="662" y="560" font-family="Songti SC,SimSun,serif" font-size="20" font-weight="bold" fill="#FFFFFF">培养方式</text>
<text x="662" y="586" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">AI辅助降低新人门槛，智能话术辅助</text>
<text x="662" y="606" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">+实时合规监控 = 新人上手缩短67%</text>

<text x="662" y="646" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#D0E0F0">100%团队稳定性，合规率持续保持</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">10 / 12</text>
</svg>
