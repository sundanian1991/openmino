<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
<defs>
  <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5b7faa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="520" fill="#0a1f3d" rx="4"/>

<!-- Title -->
<text x="340" y="42" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="18" font-weight="700" fill="#f1f3f5">参与者格局</text>
<text x="340" y="62" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6b8ab0" letter-spacing="2">TWO PATHS · SPECIALTY VS SUPERMARKET</text>

<!-- Left: 专卖店 -->
<rect x="40" y="90" width="280" height="300" rx="12" fill="#1a3a5a" stroke="#3a5a7a" stroke-width="1.5"/>
<text x="180" y="120" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0" letter-spacing="2">专卖店 · SPECIALTY</text>
<text x="180" y="145" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#a0b8d0">只提供自家模型 · 深度优化</text>

<!-- Divider line -->
<line x1="70" y1="165" x2="290" y2="165" stroke="#3a5a7a" stroke-width="0.5"/>

<!-- 智谱 -->
<rect x="55" y="180" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="75" y="206" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">智谱 GLM</text>
<text x="290" y="206" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥49-149/月</text>

<!-- Kimi -->
<rect x="55" y="230" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="75" y="256" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">Kimi · 月之暗面</text>
<text x="290" y="256" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥19-99/月</text>

<!-- MiniMax -->
<rect x="55" y="280" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="75" y="306" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">MiniMax</text>
<text x="290" y="306" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥29-899/月</text>

<!-- 小米 -->
<rect x="55" y="330" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#5b7faa" stroke-width="1.5"/>
<text x="75" y="356" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">小米 MiMo</text>
<text x="290" y="356" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥39-659/月</text>

<!-- 新入局者标签 -->
<rect x="200" y="338" width="50" height="16" rx="8" fill="#c25030"/>
<text x="225" y="350" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#faf0e6">NEW</text>

<!-- Right: 超市 -->
<rect x="360" y="90" width="280" height="300" rx="12" fill="#1a3a5a" stroke="#5b7faa" stroke-width="1.5"/>
<text x="500" y="120" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0" letter-spacing="2">超市 · SUPERMARKET</text>
<text x="500" y="145" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#a0b8d0">聚合多模型 · 一个 Key 切换</text>

<line x1="390" y1="165" x2="610" y2="165" stroke="#3a5a7a" stroke-width="0.5"/>

<!-- 阿里百炼 -->
<rect x="375" y="180" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="395" y="206" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">阿里百炼</text>
<text x="610" y="206" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥40-1398</text>

<!-- 火山方舟 -->
<rect x="375" y="230" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="395" y="256" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">火山方舟 · 字节</text>
<text x="610" y="256" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥40-200/月</text>

<!-- 腾讯云 -->
<rect x="375" y="280" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="395" y="306" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">腾讯云</text>
<text x="610" y="306" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">¥39-200/月</text>

<!-- 百度千帆 -->
<rect x="375" y="330" width="250" height="42" rx="8" fill="#0a1f3d" stroke="#3a5a7a" stroke-width="1"/>
<text x="395" y="356" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">百度千帆</text>
<text x="610" y="356" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#70b0e0">按需计费</text>

<!-- Bottom: Insight -->
<rect x="40" y="415" width="600" height="60" rx="10" fill="#1a3a5a" stroke="#3a5a7a" stroke-width="1"/>
<text x="60" y="440" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#a0b8d0">核心差异：</text>
<text x="140" y="440" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#f1f3f5">专卖店 = 深度优化 · 单模型极致性能 ｜ 超市 = 广度覆盖 · 多模型灵活切换</text>
<text x="60" y="462" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#a0b8d0">趋势走向：</text>
<text x="140" y="462" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#f1f3f5">百炼推出企业版 Token Plan → 云平台跟进 Token Plan 趋势确认</text>

</svg>
