<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
<defs>
  <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5b7faa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="520" fill="#f1f3f5" rx="4"/>

<!-- Title -->
<text x="340" y="42" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="18" font-weight="700" fill="#0a1f3d">AI 定价模式演变</text>
<text x="340" y="62" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6b8ab0" letter-spacing="2">PRICING EVOLUTION · 2024-2026</text>

<!-- Timeline axis -->
<line x1="80" y1="280" x2="620" y2="280" stroke="#c8d4e0" stroke-width="1.5"/>

<!-- Phase labels -->
<rect x="80" y="90" width="170" height="28" rx="14" fill="#e4e8ec"/>
<text x="165" y="109" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#4a6a8a" letter-spacing="1">PHASE 01 · 价格战</text>

<rect x="260" y="90" width="180" height="28" rx="14" fill="#d4e0ec"/>
<text x="350" y="109" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#2a4a6a" letter-spacing="1">PHASE 02 · Coding Plan</text>

<rect x="450" y="90" width="170" height="28" rx="14" fill="#0a1f3d"/>
<text x="535" y="109" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#f1f3f5" letter-spacing="1">PHASE 03 · Token Plan</text>

