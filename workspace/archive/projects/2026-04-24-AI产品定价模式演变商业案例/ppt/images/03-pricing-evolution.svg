<circle cx="585" cy="280" r="5" fill="#0a1f3d"/>

<!-- Arrow 3 → 4 -->
<path d="M505 175 C512 175,512 175,520 175" fill="none" stroke="#3a5a7a" stroke-width="1.5" marker-end="url(#a1)"/>

<!-- Bottom row: Token cost trend -->
<text x="340" y="345" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6b8ab0" letter-spacing="2">TOKEN 价格趋势（每百万，输入）</text>

