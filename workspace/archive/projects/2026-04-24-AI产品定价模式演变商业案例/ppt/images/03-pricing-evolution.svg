<text x="560" y="310" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#8aa0b8">2026 Q4</text>

<!-- Event nodes - Top row -->
<!-- Node 1: DeepSeek 降价 -->
<rect x="70" y="140" width="130" height="70" rx="12" fill="#f5f7fa" stroke="#a0b4c8" stroke-width="1.5"/>
<text x="135" y="168" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="12" font-weight="600" fill="#0a1f3d">DeepSeek 带头</text>
