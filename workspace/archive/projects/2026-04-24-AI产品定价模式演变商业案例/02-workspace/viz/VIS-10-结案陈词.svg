<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 540" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #faf9f7; }
      .card { fill: #ffffff; stroke: #e8e0d8; stroke-width: 1; rx: 10; }
      .card-num { font-family: 'JetBrains Mono', monospace; font-size: 36px; fill: #6b3410; font-weight: 700; }
      .card-name { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #6b3410; font-weight: 600; }
      .card-text { font-family: 'Noto Serif SC', serif; font-size: 14px; fill: #333; }
      .card-app { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; fill: #857d74; }
      .pill { fill: #e0f5ef; stroke: #2a9d8f; stroke-width: 1; rx: 12; }
      .pill-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #2a9d8f; }
      .title { font-family: 'Noto Serif SC', serif; font-size: 18px; fill: #6b3410; font-weight: 600; }
      .footer { font-family: 'Noto Serif SC', serif; font-size: 13px; fill: #857d74; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="640" height="540"/>

  <!-- Title -->
  <text x="320" y="36" text-anchor="middle" class="title">能带走复用的，就这三条</text>

  <!-- Card 01 -->
  <rect x="20" y="60" width="600" height="130" class="card"/>
  <text x="48" y="110" class="card-num">01</text>
  <text x="48" y="136" class="card-name">计量即权力</text>
  <text x="48" y="164" class="card-text">谁定义计量单位，谁掌握定价权</text>
  <text x="48" y="182" class="card-app">应用场景：新产品定价</text>
  <rect x="490" y="118" width="72" height="24" class="pill"/>
  <text x="526" y="135" text-anchor="middle" class="pill-text">可复用</text>

  <!-- Card 02 -->
  <rect x="20" y="210" width="600" height="130" class="card"/>
  <text x="48" y="260" class="card-num">02</text>
  <text x="48" y="286" class="card-name">三段式节奏</text>
  <text x="48" y="314" class="card-text">补贴 → 收紧 → 分层，别一开始就想好定价</text>
  <text x="48" y="332" class="card-app">应用场景：市场进入策略</text>
  <rect x="490" y="268" width="72" height="24" class="pill"/>
  <text x="526" y="285" text-anchor="middle" class="pill-text">可复用</text>

  <!-- Card 03 -->
  <rect x="20" y="360" width="600" height="130" class="card"/>
  <text x="48" y="410" class="card-num">03</text>
  <text x="48" y="436" class="card-name">入口到生态</text>
  <text x="48" y="464" class="card-text">用高频刚需获客，用低频高价值提 ARPU</text>
  <text x="48" y="482" class="card-app">应用场景：产品升级路径</text>
  <rect x="490" y="418" width="72" height="24" class="pill"/>
  <text x="526" y="435" text-anchor="middle" class="pill-text">可复用</text>

  <!-- Footer -->
  <text x="320" y="525" text-anchor="middle" class="footer">调查结束。</text>
</svg>
