<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect width="900" height="420" fill="#faf7f2"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="16" fill="#2c2420" font-weight="700">18 个月的价格战争地图</text>
  <text x="450" y="52" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">2024 Q4 → 2026 Q4 | 从 Coding Plan 到 Token Plan 的必然转向</text>

  <!-- Main timeline line -->
  <line x1="60" y1="210" x2="850" y2="210" stroke="#c4956a" stroke-width="2" opacity="0.6"/>

  <!-- Event 1: 2024 Q4 — DeepSeek带头降价 (above) -->
  <circle cx="90" cy="210" r="6" fill="#c4956a"/>
  <line x1="90" y1="204" x2="90" y2="165" stroke="#c4956a" stroke-width="1" opacity="0.3"/>
  <text x="90" y="155" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-weight="600">2024 Q4</text>
  <text x="90" y="138" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">DeepSeek带头降价</text>

  <!-- Event 2: 2025 Q4 — 智谱首推Coding Plan (below) -->
  <circle cx="200" cy="210" r="6" fill="#5a8a5a"/>
  <line x1="200" y1="216" x2="200" y2="255" stroke="#5a8a5a" stroke-width="1" opacity="0.3"/>
  <text x="200" y="272" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-weight="600">2025 Q4</text>
  <text x="200" y="292" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">智谱首推Coding Plan</text>

  <!-- Event 3: 2025 H2 — 限购/停售/收紧 (above) -->
  <circle cx="310" cy="210" r="6" fill="#c4705a"/>
  <line x1="310" y1="204" x2="310" y2="165" stroke="#c4705a" stroke-width="1" opacity="0.3"/>
  <text x="310" y="155" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-weight="600">2025 H2</text>
  <text x="310" y="138" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">限购 / 停售 / 收紧</text>

  <!-- Event 4: 2026-01 — Kimi切换Token计量 (below) -->
  <circle cx="420" cy="210" r="6" fill="#4a6fa5"/>
  <line x1="420" y1="216" x2="420" y2="255" stroke="#4a6fa5" stroke-width="1" opacity="0.3"/>
  <text x="420" y="272" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-weight="600">2026-01</text>
  <text x="420" y="292" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">Kimi切换Token计量</text>

  <!-- Event 5: 2026-02 — OpenClaw爆火 (above, highlighted) -->
  <circle cx="530" cy="210" r="9" fill="#c4705a"/>
  <circle cx="530" cy="210" r="13" fill="none" stroke="#c4705a" stroke-width="1" opacity="0.3"/>
  <line x1="530" y1="197" x2="530" y2="145" stroke="#c4705a" stroke-width="1" opacity="0.3"/>
  <text x="530" y="130" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#c4705a" font-weight="700">2026-02</text>
  <text x="530" y="112" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355" font-weight="700">OpenClaw爆火 6-10x消耗</text>

  <!-- Catalyst annotation -->
  <text x="530" y="90" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#c4956a" font-weight="600">催化剂</text>

  <!-- Event 6: 2026-03 — MiniMax更名Token Plan (below, highlighted) -->
  <circle cx="650" cy="210" r="9" fill="#5a8a5a"/>
  <circle cx="650" cy="210" r="13" fill="none" stroke="#5a8a5a" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="223" x2="650" y2="265" stroke="#5a8a5a" stroke-width="1" opacity="0.3"/>
  <text x="650" y="282" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#5a8a5a" font-weight="700">2026-03</text>
  <text x="650" y="302" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355" font-weight="700">MiniMax更名Token Plan</text>
  <text x="650" y="322" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a8a5a" font-weight="600">终态信号</text>

  <!-- Event 7: 2026-04 — 阿里/小米/Anthropic收缩 (above) -->
  <circle cx="790" cy="210" r="6" fill="#c4705a"/>
  <line x1="790" y1="204" x2="790" y2="165" stroke="#c4705a" stroke-width="1" opacity="0.3"/>
  <text x="790" y="155" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-weight="600">2026-04</text>
  <text x="790" y="138" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">阿里/小米/Anthropic收缩</text>

  <!-- Source -->
  <text x="450" y="390" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-style="italic">从 Coding Plan 到 Token Plan，是 Agent 时代催生的必然转向</text>
</svg>
