<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" width="600" height="430">
  <rect width="600" height="430" fill="#faf7f2"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="16" fill="#2c2420" font-weight="700">能带走复用的，就这三条</text>
  <text x="300" y="50" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">不是 AI 定价的知识，是任何新产品定价都可以复用的逻辑</text>

  <!-- Card 1 -->
  <rect x="20" y="72" width="560" height="100" rx="10" fill="none" stroke="#c4956a" stroke-width="1" opacity="0.3"/>
  <text x="40" y="110" font-family="'Noto Serif SC', 'Georgia', serif" font-size="48" fill="#c4956a" font-weight="700">01</text>
  <text x="100" y="104" font-family="'Noto Serif SC', 'Georgia', serif" font-size="18" fill="#8b7355" font-weight="700">计量即权力</text>
  <text x="100" y="128" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">谁定义计量单位，谁掌握定价权</text>
  <text x="100" y="152" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599">应用场景：新产品定价</text>
  <rect x="470" y="97" width="80" height="22" rx="11" fill="#5a8a5a" opacity="0.15" stroke="#5a8a5a" stroke-width="0.8"/>
  <text x="510" y="112" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#5a8a5a" font-weight="600">可复用</text>

  <!-- Card 2 -->
  <rect x="20" y="184" width="560" height="100" rx="10" fill="none" stroke="#c4956a" stroke-width="1" opacity="0.3"/>
  <text x="40" y="222" font-family="'Noto Serif SC', 'Georgia', serif" font-size="48" fill="#c4956a" font-weight="700">02</text>
  <text x="100" y="216" font-family="'Noto Serif SC', 'Georgia', serif" font-size="18" fill="#8b7355" font-weight="700">三段式节奏</text>
  <text x="100" y="240" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">补贴→收紧→分层，别一开始就想好定价</text>
  <text x="100" y="264" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599">应用场景：市场进入策略</text>
  <rect x="470" y="209" width="80" height="22" rx="11" fill="#5a8a5a" opacity="0.15" stroke="#5a8a5a" stroke-width="0.8"/>
  <text x="510" y="224" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#5a8a5a" font-weight="600">可复用</text>

  <!-- Card 3 -->
  <rect x="20" y="296" width="560" height="100" rx="10" fill="none" stroke="#c4956a" stroke-width="1" opacity="0.3"/>
  <text x="40" y="334" font-family="'Noto Serif SC', 'Georgia', serif" font-size="48" fill="#c4956a" font-weight="700">03</text>
  <text x="100" y="328" font-family="'Noto Serif SC', 'Georgia', serif" font-size="18" fill="#8b7355" font-weight="700">入口到生态</text>
  <text x="100" y="352" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">用高频刚需获客，用低频高价值提ARPU</text>
  <text x="100" y="376" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599">应用场景：产品升级路径</text>
  <rect x="470" y="321" width="80" height="22" rx="11" fill="#5a8a5a" opacity="0.15" stroke="#5a8a5a" stroke-width="0.8"/>
  <text x="510" y="336" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#5a8a5a" font-weight="600">可复用</text>

  <!-- Footer -->
  <text x="300" y="415" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="12" fill="#ada599" font-style="italic">调查结束。</text>
</svg>
