<rect x="40" y="36" width="3" height="52" fill="#1677FF"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">推进需要确认的 4 件事 + 资源需求</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="100" width="590" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="100" width="4" height="580" fill="#1677FF"/>
<text x="64" y="132" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">需要确认的事项</text>
<rect x="64" y="156" width="546" height="110" rx="4" fill="#F5F5F5"/>
<text x="84" y="184" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">1. 权限边界</text>
<text x="84" y="212" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">哪些项目可以直接启动？哪些需要您</text>
<text x="84" y="232" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">先和军哥/易人确认？</text>
<text x="84" y="252" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">建议：分析类直接启动，制度类先确认</text>
<rect x="64" y="286" width="546" height="110" rx="4" fill="#F5F5F5"/>
<text x="84" y="314" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">2. 数据源对接</text>
<text x="84" y="342" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">供应商的业绩数据从哪个系统拉取？</text>
<text x="84" y="362" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">谁来协助打通数据权限？</text>
<text x="84" y="382" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">建议：先手动收集，再申请系统权限</text>
<rect x="64" y="416" width="546" height="110" rx="4" fill="#F5F5F5"/>
<text x="84" y="444" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">3. 考核体系对接</text>
<text x="84" y="472" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">现有供应商考核标准是否可复用？</text>
<text x="84" y="492" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">还是需要重新设计？</text>
<text x="84" y="512" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">建议：先盘点现有标准，再决定</text>
<rect x="64" y="546" width="546" height="110" rx="4" fill="#F5F5F5"/>
<text x="84" y="574" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">4. 汇报节奏</text>
<text x="84" y="602" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">是月度同步还是季度汇报？</text>
<text x="84" y="622" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">需要什么样的汇报格式？</text>
<text x="84" y="642" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">建议：月度简报 + 季度深度复盘</text>
<rect x="646" y="100" width="594" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="646" y="100" width="4" height="580" fill="#4A9E6A"/>
<text x="670" y="132" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#4A9E6A">资源需求</text>
<rect x="670" y="156" width="550" height="100" rx="4" fill="#EDF3EE"/>
<text x="690" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#2E6B3E">时间投入</text>
<text x="690" y="208" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">Q2 预计 50% 精力投入供应商管理体系建设</text>
<text x="690" y="228" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">4月打底阶段需 70%，5-6月回归 50%</text>
<rect x="670" y="276" width="550" height="100" rx="4" fill="#EDF3EE"/>
<text x="690" y="304" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#2E6B3E">跨部门协作</text>
<text x="690" y="328" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">需要数据团队支持数据对接</text>
<text x="690" y="348" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">需要财务团队协助结算流程优化</text>
<rect x="670" y="396" width="550" height="100" rx="4" fill="#EDF3EE"/>
<text x="690" y="424" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#2E6B3E">供应商配合</text>
<text x="690" y="448" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">需要供应商对接人参与访谈和校准会</text>
<text x="690" y="468" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">需提前和供应商打招呼，确保配合度</text>
<rect x="670" y="516" width="550" height="100" rx="4" fill="#EDF3EE"/>
<text x="690" y="544" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#2E6B3E">工具支持</text>
<text x="690" y="568" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">数据仪表盘需要 BI 工具支持</text>
<text x="690" y="588" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">如无可先用 Excel + 手动看板过渡</text>
<rect x="670" y="636" width="550" height="34" rx="4" fill="#F5F5F5"/>
<text x="690" y="658" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">以上 4 个确认 + 4 项资源，希望本周内沟通确认</text>
