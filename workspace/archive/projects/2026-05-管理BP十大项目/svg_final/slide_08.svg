<text x="180" y="210" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">降低陌生感</text>
<text x="460" y="190" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 指定导师（老供应商对接人）</text>
<text x="460" y="210" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 发放操作手册 + SOP 文档</text>
