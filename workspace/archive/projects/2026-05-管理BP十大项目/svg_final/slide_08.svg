<text x="1100" y="330" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#9C2B2B">· 沟通严重障碍</text>
<rect x="40" y="396" width="1200" height="120" fill="#FFFFFF"/>
<line x1="40" y1="516" x2="1240" y2="516" stroke="#E2E2E2" stroke-width="0.5"/>
