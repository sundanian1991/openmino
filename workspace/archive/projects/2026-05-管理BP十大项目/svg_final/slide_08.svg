<text x="860" y="450" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 分级落位确认</text>
<text x="860" y="470" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 下季度目标约定</text>
<text x="1100" y="430" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#9C2B2B">· 综合评分低于阈值</text>
<rect x="40" y="516" width="1200" height="120" fill="#EDF3EE"/>
<text x="56" y="550" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#2E6B3E">配套机制</text>
<text x="56" y="578" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 导师责任制：每位新供应商配对 1 名老供应商导师，带教期 90 天</text>
<text x="56" y="598" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 校准会：30/60/90 天各一次，三方参与（BP + 导师 + 供应商），记录问题 + 制定行动项</text>
<text x="56" y="618" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">· 否决项：任一否决项触发即启动清退流程，不拖延</text>
