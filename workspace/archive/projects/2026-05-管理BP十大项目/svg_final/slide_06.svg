<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<rect width="1280" height="720" fill="#FFFFFF"/>
<rect x="0" y="0" width="1280" height="3" fill="#1677FF"/>
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">阶段一 · 合作健康度诊断</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#1677FF">供应商管理BP</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="36" width="3" height="52" fill="#1677FF"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">合作健康度：定量 + 定性，找准 Top3 卡点</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="100" width="590" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="100" width="4" height="580" fill="#1677FF"/>
<text x="64" y="132" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">评估方法</text>
<rect x="64" y="156" width="546" height="100" rx="4" fill="#F5F5F5"/>
<text x="84" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">定量维度</text>
<text x="84" y="208" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">交付及时率 · 质量投诉次数 · 需求响应时长</text>
<text x="84" y="228" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">人员流失率 · 合同履约率 · 结算准确率</text>
<rect x="64" y="276" width="546" height="100" rx="4" fill="#F5F5F5"/>
<text x="84" y="304" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">定性维度</text>
<text x="84" y="328" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">内部 stakeholder 访谈（每供应商 2-3 人）</text>
<text x="84" y="348" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">协作流程走查 · 沟通记录分析</text>
<rect x="64" y="420" width="546" height="1" fill="#E2E2E2"/>
<text x="64" y="452" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">输出物</text>
<text x="64" y="476" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">每供应商一份健康度报告（定量分 + 定性标签）</text>
<text x="64" y="496" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">汇总 Top3 协作卡点，责任到人</text>
<text x="64" y="516" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">90 天改善计划 + 跟踪仪表盘</text>
<rect x="64" y="560" width="546" height="1" fill="#E2E2E2"/>
<text x="64" y="592" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">时间：4 月完成初稿</text>
<text x="64" y="612" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">方式：问卷 + 访谈 + 数据拉取</text>
<rect x="646" y="100" width="594" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="646" y="100" width="4" height="580" fill="#1677FF"/>
<text x="670" y="132" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">Top3 协作卡点（示例框架）</text>
<rect x="670" y="156" width="550" height="110" rx="4" fill="#F5E6E6"/>
<rect x="670" y="156" width="4" height="110" fill="#9C2B2B"/>
<text x="690" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#9C2B2B">卡点 1：需求响应慢</text>
<text x="690" y="208" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">从提出到确认平均 3-5 天</text>
<text x="690" y="228" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">改善：设立 SLA，48h 内响应，纳入考核</text>
<text x="690" y="248" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">责任人：供应商对接人 + 内部 PM</text>
<rect x="670" y="286" width="550" height="110" rx="4" fill="#F7EFE0"/>
<rect x="670" y="286" width="4" height="110" fill="#8A5A00"/>
<text x="690" y="314" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#8A5A00">卡点 2：人员流失频繁</text>
<text x="690" y="338" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">核心岗位月度流失率 > 8%</text>
<text x="690" y="358" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">改善：关键岗位备案制 + 替补人才池</text>
<text x="690" y="378" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">责任人：供应商 HR + 服务组 BP</text>
<rect x="670" y="416" width="550" height="110" rx="4" fill="#F7EFE0"/>
<rect x="670" y="416" width="4" height="110" fill="#8A5A00"/>
<text x="690" y="444" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#8A5A00">卡点 3：结算流程不透明</text>
<text x="690" y="468" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">结算周期长，对账差异多</text>
<text x="690" y="488" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">改善：月度对账模板 + 异常 48h 闭环</text>
<text x="690" y="508" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">责任人：财务 BP + 供应商结算对接人</text>
<rect x="670" y="550" width="550" height="70" rx="4" fill="#EDF3EE"/>
<text x="690" y="578" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#2E6B3E">90 天改善闭环</text>
<text x="690" y="598" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">第 30 天：SLA 上线 + 首次复盘</text>
<text x="690" y="618" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">第 60 天：中期检查 + 调整策略</text>
<text x="690" y="638" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">第 90 天：效果评估 + 标准化</text>
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：内部梳理 · 2026-05-04</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">6 / 13</text>
</svg>
