<html lang="zh-CN">
<head>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5; /* Paper White */
            --fg: #000;
            --accent: #ff0000;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --dot-color: rgba(0, 0, 0, 0.1);
            --modal-bg: rgba(255, 255, 255, 0.98);
        }

        [data-theme="dark"] {
            --bg: #000;
            --fg: #fff;
            --accent: #ff0000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
            --dot-color: rgba(255, 255, 255, 0.2);
            --modal-bg: rgba(0, 0, 0, 0.98);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 24px 24px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .mono { font-family: 'Space Mono', monospace; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.02), transparent);
            pointer-events: none;
            z-index: 1000;
            animation: scanline 8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanline"></div>

            { id: 2, title: "对错不取决于民调", cat: "Kernel", rule: "真理独立存在，取决于推理而非赞同。", desc: "你之所以正确，是因为你的事实和推理是正确的。真理独立存在。社会认定的“真理”很脆弱，只需一项观察就足以粉碎旧范式。" },
            { id: 3, title: "成功的关键是平庸的竞争", cat: "Interface", rule: "在红海中找利基，做那个需求最稳定的最好者。", desc: "与其在红海厮杀，不如选一个你相对他人有优势的利基市场。只要你是某件有稳定需求的事上做得最好的，你就能成功。" },
            { id: 4, title: "30美元书中的10亿答案", cat: "Processor", rule: "通过阅读“速通”知识，避免前人犯过的错。", desc: "阅读的力量在于只需一个想法就足以改变一生。知识是可以“速通”的，通过向先行者学习，你可以避免他们犯过的错，这是一条公平的捷径。" },
            { id: 5, title: "永远是技能问题", cat: "Kernel", rule: "得不到想要的东西，通常是你配不上它。", desc: "如果长期得不到想要的东西，问题多半出在你自己身上。从“是别人的错”转变为“是我自己的错”，这关乎责任和担当。得到你想要的，最简单的方式就是配得上你想要的。" },

            { id: 9, title: "机敏不同于智慧", cat: "Kernel", rule: "机敏是检索，智慧是构建，两者都可能干蠢事。", desc: "机敏是脑子快，智慧则更宽广。智慧帮你在脑中构建认知图式，机敏让你迅速检索。但即便再聪明，也可能因为过度自信而做出灾难性的决策。" },
            { id: 10, title: "普世智慧", cat: "Kernel", rule: "做通才，对整体有把握的人才是最好的决策者。", desc: "现代教育往往让我们精通某一领域却忽略其余一切。真实生活的问题是多面的，最好的决策者是对整体有良好把握的通才。" },
            { id: 11, title: "教育是心智软件", cat: "Processor", rule: "读一本书是在向大脑添加观念和词汇。", desc: "读一本书是在向你的大脑添加观念和词汇。每一个小时的阅读都在构筑理解层次，使决策变得更周全。" },
            { id: 12, title: "规模经济", cat: "Processor", rule: "规模带来效率，将节省的成本让利给顾客。", desc: "规模带来效率。制造业的固定成本摊薄、生物体的代谢率优势、几何学中的体积增长。如果你通过降低价格将节省下来的成本让给顾客，你就几乎不可能被淘汰。" },
            { id: 13, title: "品质", cat: "Network", rule: "它是一种感官交汇处的触发，而非单纯的品味。", desc: "我们内心有一种对品质的感知。它不是品味或分析能力，而是一个在我们所有感官交汇处被触发的开关。" },
            { id: 14, title: "1000个无聊日子的串联", cat: "Processor", rule: "非凡的结果，往往是长时间枯燥付出的复利。", desc: "“一夜成名”通常需要十年造就。要想在人前受到赞誉，你必须在无人看见处付出超越所有人的努力。" },
            { id: 15, title: "把砖摞起来", cat: "Processor", rule: "集中资源到一点，获得递增的回报。", desc: "心智资源有限，专注极其重要。将资源集中到同一点上（如苹果的产品设计或谷歌的搜索界面），会获得递增的回报。" },
            { id: 16, title: "多种思考方式", cat: "Interface", rule: "了解并利用你的天赋思考方式（如视觉）。", desc: "了解你自己的思考方式（如视觉型思考）并善加利用。达·芬奇通过素描来判断构想在现实中是否可行。" },
            { id: 17, title: "持续心智浸染", cat: "Processor", rule: "理解不是看摘要，而是持续不断地思考一件事。", desc: "理解源于持续不断地思考一件事，而不是看摘要。理解是指能从知识中获利的能力。" },
            { id: 18, title: "深层的简单", cat: "Processor", rule: "复杂系统往往由少数核心积木构成。", desc: "复杂系统往往由少数节点相互作用而成。在事物的底部，只有少数几个元件充当着乐高积木。贝索斯将亚马逊建立在三点之上：低价、快配、丰富选择。" },
            { id: 19, title: "改变问题切入点", cat: "Interface", rule: "稍稍改变切入点，能变不可能为容易。", desc: "找出看似要紧实则无关的要素并绕过它们。学习不同学科能帮你在别人看见墙的地方发现捷径。" },
            { id: 20, title: "天然去中心化", cat: "Network", rule: "系统天然趋向特化与分工增加熟练度。", desc: "分工增加熟练度。自然选择催生器官特化，经济学趋向自由市场定价，社会治理从君主制演进到民主制。" },
            { id: 21, title: "复杂适应系统", cat: "Network", rule: "在线性思维失效的地方，寻找反馈回路。", desc: "在生活的大部分领域，线性思维会失效。现实由复杂适应系统构成，拥有无限多的组件 and 反馈回路，输入稍作变动，输出便无法确定。" },
            { id: 22, title: "思考别人所未想", cat: "Interface", rule: "越多人不同意你且你正确，回报越大。", desc: "社会公认的真理只是占位符。在投资中，你必须逆势且正确。当你正确时，越多人不同意你，回报就越大。" },
            { id: 23, title: "摆脱旧观念的困难", cat: "Interface", rule: "习得成本越高，人们越难舍弃旧有的锤子。", desc: "困难不在于新观念，而在于摆脱旧观念。习得一个观念的成本很高，人们往往不舍得让它白费。" },
            { id: 24, title: "周围人的平均水平", cat: "Interface", rule: "通过模仿学习，环境塑造了你的行为。", desc: "我们通过模仿来学习。他人会塑造你的行为，你很难例外。" },
            { id: 25, title: "人类误判的根源", cat: "Interface", rule: "心智会频繁失灵，了解常见错误并保持警觉。", desc: "心智会频繁失灵（如情绪遮蔽判断、自利偏差）。最务实的方法是了解所有常见错误并保持警觉。" },
            { id: 26, title: "找出什么管用然后去做", cat: "Interface", rule: "不信意识形态，只检验现实。", desc: "李光耀的成功在于他不信意识形态，只检验现实。勤奋工作就是在把概率往有利于你的方向扳。" },
            { id: 27, title: "资本配置最重要", cat: "Interface", rule: "当企业规模化后，现金流的使用决定生死。", desc: "当企业产生大量现金流时，如何使用这些现金（再投资、并购或回购）决定了股东价值的量级。" },
            { id: 28, title: "历史常常押韵", cat: "Network", rule: "熟谙过往能让你为未来做好准备。", desc: "历史不会重演，但常常押韵。熟谙过往能让你为未来做好准备。大多数悲剧彼此相似，但教训极容易被遗忘。" },
            { id: 29, title: "均变论 vs 灾变论", cat: "Network", rule: "演进可能是渐进的，护城河消失往往是突发的。", desc: "系统演化可能是渐进的（均变），也可能是突发的（灾变）。公司的护城河往往不是缓慢侵蚀，而是在瞬间消失。" },
            { id: 30, title: "鲁拉帕鲁扎效应", cat: "Network", rule: "非凡结果通常是多个因素同向合力的产物。", desc: "非凡的结果通常是多个因素同时同向合力的产物（合奏效应）。" },
            { id: 31, title: "粉刷栅栏", cat: "Interface", rule: "哪怕没人看见，也要把活干漂亮。", desc: "一件事如果不值得做好，或许它根本就不值得做。自尊是我们与自己的名声，哪怕没人看见，也要把活干漂亮。" },
            { id: 32, title: "技术普及化", cat: "Processor", rule: "技术的角色是将复杂昂贵变便宜普及。", desc: "技术将饱受渴求的资源变得日益充裕，降低价格和使用门槛。" },
            { id: 33, title: "吸引子状态", cat: "Network", rule: "识别系统的均衡点，拥有超越他人的优势。", desc: "系统会收敛到某个均衡点。识别出那个均衡点能让你拥有超越他人的巨大优势。" },
            { id: 34, title: "尽可能简单", cat: "Processor", rule: "力求构建更简洁的框架，复杂不带来奖赏。", desc: "让事情尽可能简单，但不要过分简单。永远力求构建更简洁的框架。复杂并不会给你额外奖赏。" },
            { id: 35, title: "观念比想象古老", cat: "Network", rule: "你以为的新发明，历史早有先例。", desc: "人类已经存在了太久，观念自古流转。你以为的新发明，往往在历史上早有先例。" },
            { id: 36, title: "遗憾最小化", cat: "Interface", rule: "做80岁时不会让你遗憾的事。", desc: "运用遗憾最小化框架：当我80岁时，我会因为没做过这件事而遗憾吗？" },
            { id: 37, title: "真正的法律是理性", cat: "Kernel", rule: "理性是联结真理的线。", desc: "理性是联结真理的线。在任何情况下，最合乎理性的判断就是最好的判断。" },
            { id: 38, title: "无法改变本性", cat: "Interface", rule: "老手比未经检验的新人更可靠。", desc: "你无法改变一个人的本性。在管理中，经验丰富的老手往往比未经检验的新人更可靠。" },
            { id: 39, title: "知者 vs 无知者", cat: "Kernel", rule: "读源头，成为实践者，区分学会腔调的表演者。", desc: "这个世界满是学会了腔调却不真懂的“无知者”。你必须学会区分，方法是读源头并成为实践者。" }
        ];

        const CATEGORIES = {
            Kernel: { label: "CORE_KERNEL", color: "#FF0000", note: "Essential Truths & Logic" },
            Processor: { label: "SCALING_LOGIC", color: "var(--fg)", note: "Efficiency & Growth Patterns" },
            Network: { label: "SYSTEMS_ENV", color: "var(--fg)", note: "Complexity & Connectivity" },
            Interface: { label: "COG_STRATEGY", color: "var(--fg)", note: "Social & Action Manual" }
        };

        function Header() {
            return (
                <header style={{
                    padding: '40px 5%',
                    borderBottom: '1px solid var(--border)',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'flex-end',
                    background: 'linear-gradient(to bottom, var(--bg), transparent)'
                }}>
                    <div>
                        <div className="mono" style={{ fontSize: 12, letterSpacing: 4, color: 'var(--accent)', marginBottom: 8 }}>MENTAL_SOFTWARE_UPDATE</div>
                        <h1 style={{ fontSize: 48, fontWeight: 700, letterSpacing: -1 }}>WORLD_VIEW.v1.0</h1>
                    </div>
                    <div className="mono" style={{ textAlign: 'right', fontSize: 11, color: 'var(--fg)', opacity: 0.4, lineHeight: 1.5 }}>
                        BUILD_ID: 2026-05-25<br />
                        STATUS: OPTIMIZING_NEURON_LOAD<br />
                        39_MODELS_LOADED
                    </div>
                </header>
            );
        }

        function StatBar() {
            return (
                <div style={{
                    padding: '12px 5%',
                    borderBottom: '1px solid var(--border)',
                    background: 'rgba(255,255,255,0.02)',
                    display: 'flex',
                    gap: 32,
                    overflowX: 'auto'
                }}>
                    {Object.entries(CATEGORIES).map(([key, info]) => (
                        <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 8, whiteSpace: 'nowrap' }}>
                            <div style={{ width: 6, height: 6, background: info.color, borderRadius: '50%' }}></div>
                            <span className="mono" style={{ fontSize: 11, fontWeight: 700 }}>{info.label}</span>
                            <span className="mono" style={{ fontSize: 10, opacity: 0.4 }}>[{info.note}]</span>
                        </div>
                    ))}
                </div>
            );
        }

        function ModelCard({ model, active, onClick }) {
            return (
                <div 
                    onClick={onClick}
                    style={{
                        padding: 20,
                        border: '1px solid ' + (active ? 'var(--accent)' : 'var(--border)'),
                        background: active ? 'rgba(255,0,0,0.05)' : 'var(--glass)',
                        transition: 'all 0.2s ease',
                        position: 'relative',
                        display: 'flex',
                        flexDirection: 'column',
                        justifyContent: 'space-between',
                        minHeight: 140,
                        opacity: active ? 1 : 0.8
                    }}>
                    {active && <div style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: 2, background: 'var(--accent)' }}></div>}
                    
                    <div>
                        <div className="mono" style={{ fontSize: 10, opacity: 0.4, marginBottom: 8 }}>
                            #{String(model.id).padStart(2, '0')} / {model.cat.toUpperCase()}
                        </div>
                        <h3 style={{ fontSize: 16, marginBottom: 12, lineHeight: 1.3 }}>{model.title}</h3>
                    </div>
                    
                    <div className="mono" style={{ 
                        fontSize: 11, 
                        color: active ? 'var(--accent)' : 'rgba(255,255,255,0.6)',
                        lineHeight: 1.4,
                        borderTop: '1px dashed var(--border)',
                        paddingTop: 12
                    }}>
                        {model.rule}
                    </div>
                </div>
            );
        }

        function Modal({ model, onClose }) {
            if (!model) return null;
            return (
                <div style={{
                    position: 'fixed',
                    top: 0,
                    left: 0,
                    width: '100%',
                    height: '100%',
                    background: 'rgba(0,0,0,0.4)',
                    backdropFilter: 'blur(8px)',
                    zIndex: 2000,
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: 20
                }} onClick={onClose}>
                    <div style={{
                        width: '100%',
                        maxWidth: 600,
                        background: 'var(--modal-bg)',
                        border: '1px solid var(--accent)',
                        padding: 40,
                        position: 'relative',
                        boxShadow: '0 20px 40px rgba(0,0,0,0.1)'
                    }} onClick={e => e.stopPropagation()}>
                        <div className="mono" style={{ fontSize: 12, color: 'var(--accent)', marginBottom: 20 }}>
                            MODEL_DEEP_DIVE :: ID_{model.id}
                        </div>
                        <h2 style={{ fontSize: 32, marginBottom: 24 }}>{model.title}</h2>
                        <div style={{ 
                            fontSize: 18, 
                            lineHeight: 1.6, 
                            color: 'var(--fg)',
                            opacity: 0.8,
                            marginBottom: 40,
                            fontFamily: 'Space Mono'
                        }}>
                            {model.desc}
                        </div>
                        <button 
                            onClick={onClose}
                            className="mono"
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--fg)',
                                color: 'var(--fg)',
                                padding: '12px 24px',
                                fontSize: 12,
                                fontWeight: 700,
                                letterSpacing: 2
                            }}>CLOSE_WINDOW</button>
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedId, setSelectedId] = useState(null);
            const [filter, setFilter] = useState('all');
            const [theme, setTheme] = useState('light');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            const filteredModels = useMemo(() => {
                if (filter === 'all') return MODELS;
                return MODELS.filter(m => m.cat === filter);
            }, [filter]);

            const activeModel = MODELS.find(m => m.id === selectedId);

            return (
                <div style={{ paddingBottom: 100 }}>
                    <Header />
                    <StatBar />
                    
                    <nav style={{ padding: '24px 5%', display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                        <button 
                            onClick={() => setFilter('all')}
                            className="mono"
                            style={{
                                background: filter === 'all' ? 'var(--fg)' : 'transparent',
                                color: filter === 'all' ? 'var(--bg)' : 'var(--fg)',
                                border: '1px solid var(--fg)',
                                padding: '6px 16px',
                                fontSize: 11
                            }}>ALL_PROCESSES</button>
                        {Object.keys(CATEGORIES).map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setFilter(cat)}
                                className="mono"
                                style={{
                                    background: filter === cat ? 'var(--fg)' : 'transparent',
                                    color: filter === cat ? 'var(--bg)' : 'var(--fg)',
                                    border: '1px solid var(--fg)',
                                    padding: '6px 16px',
                                    fontSize: 11
                                }}>{cat.toUpperCase()}</button>
                        ))}
                    </nav>

                    <main style={{
                        padding: '0 5%',
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                        gap: 20
                    }}>
                        {filteredModels.map(model => (
                            <ModelCard 
                                key={model.id} 
                                model={model} 
                                active={selectedId === model.id}
                                onClick={() => setSelectedId(model.id)}
                            />
                        ))}
                    </main>

                    <Modal model={activeModel} onClose={() => setSelectedId(null)} />

                    <footer style={{
                        position: 'fixed',
                        bottom: 0,
                        left: 0,
                        width: '100%',
                        padding: '20px 5%',
                        background: 'var(--bg)',
                        opacity: 0.9,
                        backdropFilter: 'blur(10px)',
                        borderTop: '1px solid var(--border)',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        zIndex: 100
                    }}>
                        <div className="mono" style={{ fontSize: 10, letterSpacing: 1 }}>
                            SYSTEM_STABLE // NO_CRITICAL_ERRORS // © 2026 HUASHU_DESIGN
                        </div>
                        <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
                            <button 
                                onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}
                                className="mono"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--fg)',
                                    color: 'var(--fg)',
                                    padding: '4px 12px',
                                    fontSize: 10,
                                    textTransform: 'uppercase'
                                }}>
                                theme: {theme}
                            </button>
                            <div className="mono" style={{ fontSize: 10, color: 'var(--accent)' }}>
                                [ ESC_TO_CLOSE ]
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
