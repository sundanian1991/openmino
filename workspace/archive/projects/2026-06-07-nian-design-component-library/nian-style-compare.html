<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格对照 · MINO / Nothing / 欧莱雅</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;background:#F5F3EF;color:#1A1816}
.page{max-width:1100px;margin:0 auto;padding:20px}

.phdr{text-align:center;margin-bottom:20px}
.phdr h1{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:300;color:#2D2A26}
.phdr h1 strong{font-weight:600}
.phdr p{font-size:11px;color:#8A7D6E;margin-top:4px}

.style-tabs{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.stab{padding:6px 20px;font-size:11px;border:1px solid #DBD6D2;background:#fff;cursor:pointer;border-radius:4px;transition:all .15s;font-family:JetBrains Mono;letter-spacing:1px}
.stab:hover{border-color:#8A7D6E}
.stab.active{background:#2D2A26;color:#fff;border-color:#2D2A26}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

.scene-card{border:1px solid #DBD6D2;background:#fff;overflow:hidden;transition:opacity .2s}
.scene-card.hide{display:none}
.sc-hdr{padding:8px 12px;border-bottom:1px solid #DBD6D2;font-family:JetBrains Mono;font-size:8px;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between}
.sc-body{padding:12px}
.sc-hero{padding:16px 14px;margin-bottom:10px;position:relative;overflow:hidden}
.sc-hero__h{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:300;line-height:1.1;letter-spacing:-0.3px;margin-bottom:4px}
.sc-hero__h strong{font-weight:600}
.sc-hero__sub{font-size:10px;line-height:1.4;margin-bottom:8px}
.sc-hero__meta{display:flex;gap:8px;padding-top:6px;border-top:1px solid;font-family:JetBrains Mono;font-size:7px;letter-spacing:1px;text-transform:uppercase}
.sc-hero__wm{position:absolute;right:-0.01em;bottom:-0.02em;font-family:'Playfair Display',serif;font-size:clamp(3.5rem,8vw,6rem);font-weight:700;opacity:0.04;line-height:0.8;pointer-events:none}

.sc-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.sc-row__l{font-size:8px;font-family:JetBrains Mono;color:#8A7D6E;width:40px}
.sc-row__t{flex:1;height:4px;background:#E5E5E0;border-radius:2px}
.sc-row__f{height:100%;border-radius:2px}
.sc-row__v{font-family:JetBrains Mono;font-size:8px;width:24px;text-align:right}
.sc-tags{display:flex;gap:2px;flex-wrap:wrap;margin-top:8px}
.sc-tag{padding:1px 5px;font-family:JetBrains Mono;font-size:6px;border:1px solid;border-radius:2px}
</style>
</head>
<body>
<div class="page">

<div class="phdr">
  <h1>风格对照 · <strong>6 场景</strong></h1>
  <p>切换风格标签，看同一场景在不同色彩体系下的效果</p>
</div>

<div class="style-tabs" id="tabs">
  <button class="stab active" data-style="mino">MINO 情绪色</button>
  <button class="stab" data-style="nothing">Nothing 单色+红</button>
  <button class="stab" data-style="loreal">欧莱雅 黑红金</button>
</div>

<div class="grid" id="scene-grid"></div>

<div style="text-align:center;margin-top:20px;font-size:9px;color:#A0A0A0;font-family:JetBrains Mono;letter-spacing:1px">点击上方标签切换风格 · 每个场景布局不变，颜色体系变化</div>

</div>

<script>
const SCENES = [
  {
    id:'感知', name:'感知层 · 数据报告',
    hero:{h:'供应商绩效 <strong>全景分析</strong>',sub:'覆盖35家供应商6条产线',m1:'35家',m2:'+8.3%',m3:'98.3%',wm:'DATA'},
    rows:[{l:'毅航',p:92},{l:'毛毛虫',p:87},{l:'伽玛',p:85},{l:'岐力',p:78}]
  },
  {
    id:'决策', name:'决策层 · 方案对比',
    hero:{h:'方案选型 <strong>评估报告</strong>',sub:'自研vs采购vs混合',m1:'3方案',m2:'6维度',m3:'最优A',wm:'SELECT'},
    rows:[{l:'功能完整',p:85},{l:'成本控制',p:70},{l:'上线周期',p:55},{l:'风险可控',p:78}]
  },
  {
    id:'计划', name:'计划层 · SOP 流程',
    hero:{h:'准入流程 <strong>标准规范</strong>',sub:'4阶段12节点45天',m1:'4步',m2:'12节点',m3:'45天',wm:'FLOW'},
    rows:[{l:'阶段1',p:100},{l:'阶段2',p:75},{l:'阶段3',p:45},{l:'阶段4',p:20}]
  },
  {
    id:'执行', name:'执行层 · 周报',
    hero:{h:'第24周 <strong>工作简报</strong>',sub:'进度正常2阻塞项',m1:'87%',m2:'6项',m3:'2项',wm:'WEEK'},
    rows:[{l:'准入',p:100},{l:'分工',p:75},{l:'运营',p:45}]
  },
  {
    id:'沉淀', name:'沉淀层 · 阅读笔记',
    hero:{h:'系统思考 <strong>读书笔记</strong>',sub:'识别组织隐藏动态',m1:'12章',m2:'45条',m3:'3模型',wm:'NOTES'},
    rows:[{l:'洞察1',p:100},{l:'洞察2',p:72},{l:'洞察3',p:58}]
  },
  {
    id:'对外', name:'对外层 · 品牌展示',
    hero:{h:'Landscape <strong>and Signal</strong>',sub:'Three typefaces one voice',m1:'6色',m2:'4字体',m3:'160+',wm:'BRAND'},
    rows:[{l:'色板',p:100},{l:'字体',p:85},{l:'组件',p:92},{l:'案例',p:78}]
  }
];

const STYLES = {
  mino: {
    name:'MINO',
    scenes: {
      '感知':{hero:'#111',tag:'#999',text:'#fff',sub:'rgba(255,255,255,.4)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#E2725B','#666','#999','#E5E5E0'],bg:'#FAFAFA',hdr:'#111'},
      '决策':{hero:'#0d7680',tag:'rgba(255,255,255,.5)',text:'#fff',sub:'rgba(255,255,255,.4)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#0d7680','#999','#E5E5E0','#FAFAFA'],bg:'#FAFAFA',hdr:'#0d7680'},
      '计划':{hero:'#111',tag:'#999',text:'#fff',sub:'rgba(255,255,255,.4)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#111','#666','#999','#E5E5E0'],bg:'#FAFAFA',hdr:'#111'},
      '执行':{hero:'#E2725B',tag:'rgba(255,255,255,.5)',text:'#fff',sub:'rgba(255,255,255,.4)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#E2725B','#666','#999'],bg:'#FAFAFA',hdr:'#E2725B'},
      '沉淀':{hero:'#F5F5F5',tag:'#999',text:'#111',sub:'#666',wm:'rgba(0,0,0,.03)',meta:'#E5E5E0',bar:['#E2725B','#666','#999'],bg:'#FAFAFA',hdr:'#E2725B'},
      '对外':{hero:'#D4AF37',tag:'rgba(255,255,255,.5)',text:'#fff',sub:'rgba(255,255,255,.4)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#D4AF37','#999','#666','#E5E5E0'],bg:'#FAFAFA',hdr:'#D4AF37'}
    }
  },
  nothing: {
    name:'Nothing',
    scenes: {
      '感知':{hero:'#1A1A1A',tag:'rgba(255,255,255,.4)',text:'#fff',sub:'rgba(255,255,255,.3)',wm:'rgba(255,255,255,.03)',meta:'rgba(255,255,255,.1)',bar:['#1A1A1A','#666','#999','#E5E5E0'],bg:'#fff',hdr:'#1A1A1A'},
      '决策':{hero:'#F5F5F5',tag:'#999',text:'#1A1A1A',sub:'#666',wm:'rgba(0,0,0,.03)',meta:'#E5E5E0',bar:['#1A1A1A','#666','#999','#E5E5E0'],bg:'#fff',hdr:'#1A1A1A'},
      '计划':{hero:'#1A1A1A',tag:'rgba(255,255,255,.4)',text:'#fff',sub:'rgba(255,255,255,.3)',wm:'rgba(255,255,255,.03)',meta:'rgba(255,255,255,.1)',bar:['#1A1A1A','#666','#999'],bg:'#fff',hdr:'#1A1A1A'},
      '执行':{hero:'#F5F5F5',tag:'#999',text:'#1A1A1A',sub:'#666',wm:'rgba(0,0,0,.03)',meta:'#E5E5E0',bar:['#D71921','#666','#999'],bg:'#fff',hdr:'#D71921'},
      '沉淀':{hero:'#fff',tag:'#999',text:'#1A1A1A',sub:'#666',wm:'rgba(0,0,0,.02)',meta:'#E5E5E0',bar:['#666','#999','#E5E5E0'],bg:'#fff',hdr:'#666'},
      '对外':{hero:'#1A1A1A',tag:'rgba(255,255,255,.4)',text:'#fff',sub:'rgba(255,255,255,.3)',wm:'rgba(255,255,255,.03)',meta:'rgba(255,255,255,.1)',bar:['#1A1A1A','#666','#999','#E5E5E0'],bg:'#fff',hdr:'#1A1A1A'}
    }
  },
  loreal: {
    name:'欧莱雅',
    scenes: {
      '感知':{hero:'#1A1A1A',tag:'rgba(255,255,255,.5)',text:'#fff',sub:'rgba(255,255,255,.3)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#D70015','#555','#888','#E0E0E0'],bg:'#F8F8F8',hdr:'#D70015'},
      '决策':{hero:'#F8F8F8',tag:'#888',text:'#1A1A1A',sub:'#555',wm:'rgba(0,0,0,.03)',meta:'#E0E0E0',bar:['#D70015','#555','#888'],bg:'#F8F8F8',hdr:'#D70015'},
      '计划':{hero:'#1A1A1A',tag:'rgba(255,255,255,.5)',text:'#fff',sub:'rgba(255,255,255,.3)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#D70015','#555','#888','#E0E0E0'],bg:'#F8F8F8',hdr:'#D70015'},
      '执行':{hero:'#F8F8F8',tag:'#888',text:'#1A1A1A',sub:'#555',wm:'rgba(0,0,0,.03)',meta:'#E0E0E0',bar:['#D70015','#B8860B','#888'],bg:'#F8F8F8',hdr:'#D70015'},
      '沉淀':{hero:'#fff',tag:'#888',text:'#1A1A1A',sub:'#555',wm:'rgba(0,0,0,.02)',meta:'#E0E0E0',bar:['#B8860B','#555','#888'],bg:'#F8F8F8',hdr:'#B8860B'},
      '对外':{hero:'#000',tag:'rgba(255,255,255,.5)',text:'#fff',sub:'rgba(255,255,255,.3)',wm:'rgba(255,255,255,.04)',meta:'rgba(255,255,255,.1)',bar:['#D70015','#555','#888','#000'],bg:'#F8F8F8',hdr:'#D70015'}
    }
  }
};

function render() {
  const styleKey = document.querySelector('.stab.active').dataset.style;
  const style = STYLES[styleKey];
  const grid = document.getElementById('scene-grid');
  
  let html = '';
  SCENES.forEach(s => {
    const c = style.scenes[s.id];
    const isLight = c.hero === '#F5F5F5' || c.hero === '#F8F8F8' || c.hero === '#fff';
    const isPureLight = c.hero === '#fff';
    
    html += `<div class="scene-card">`;
    html += `<div class="sc-hdr" style="background:${c.hdr};color:${c.hdr==='#111'||c.hdr==='#1A1A1A'||c.hdr==='#000'||c.hdr==='#D70015'?'#fff':'#1A1A1A'}">`;
    html += `<span>${s.name}</span><span>${style.name}</span></div>`;
    html += `<div class="sc-body" style="background:${c.bg}">`;
    
    // Hero
    html += `<div class="sc-hero" style="background:${c.hero};color:${isLight&&!isPureLight?'#1A1A1A':isPureLight?'#1A1A1A':'#fff'}">`;
    html += `<div class="sc-hero__h" style="color:${isLight?'#1A1A1A':'#fff'}">${s.hero.h}</div>`;
    html += `<div class="sc-hero__sub" style="color:${c.sub}">${s.hero.sub}</div>`;
    html += `<div class="sc-hero__meta" style="color:${isLight?c.tag:'rgba(255,255,255,.4)'};border-top-color:${c.meta}">`;
    html += `<span>${s.hero.m1}</span><span>${s.hero.m2}</span><span>${s.hero.m3}</span>`;
    html += `</div><div class="sc-hero__wm" style="color:${c.wm}">${s.hero.wm}</div></div>`;
    
    // Bars
    s.rows.forEach((r,i) => {
      const barColor = c.bar[i % c.bar.length];
      html += `<div class="sc-row"><span class="sc-row__l">${r.l}</span>`;
      html += `<div class="sc-row__t"><div class="sc-row__f" style="width:${r.p}%;background:${barColor}"></div></div>`;
      html += `<span class="sc-row__v">${r.p}%</span></div>`;
    });
    
    // Tags
    html += `<div class="sc-tags">`;
    const tagColors = styleKey === 'mino' ? [c.bar[0],c.bar[1],c.bar[2]] :
                      styleKey === 'nothing' ? ['#1A1A1A','#666','#999'] :
                      ['#D70015','#555','#888'];
    tagColors.forEach((tc,i) => {
      html += `<span class="sc-tag" style="border-color:${tc};color:${tc}">${['核心','辅助','点缀'][i]}</span>`;
    });
    html += `</div></div></div>`;
  });
  
  grid.innerHTML = html;
}

document.querySelectorAll('.stab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();
</script>
</body>
</html>
