<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nian 色彩 V1 vs V2 · 对照全景</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;background:#F0EDE6;color:#1A1816;-webkit-font-smoothing:antialiased}
.page{max-width:1200px;margin:0 auto;padding:24px}

/* ═══ Header ═══ */
.phdr{text-align:center;margin-bottom:24px}
.phdr__h{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:300;color:#2D2A26}
.phdr__h strong{font-weight:600}
.phdr__note{font-family:'JetBrains Mono',monospace;font-size:9px;color:#8A7D6E;margin-top:6px;letter-spacing:1px}
.phdr__leg{display:flex;justify-content:center;gap:24px;margin-top:12px;font-size:10px}
.phdr__leg span{display:flex;align-items:center;gap:6px}
.phdr__leg .dot{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ═══ Scene Row ═══ */
.scene{margin-bottom:20px}
.scene__hdr{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#8A7D6E;margin-bottom:8px;display:flex;justify-content:space-between}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.pair{grid-template-columns:1fr}}

/* ═══ Panel (V1 or V2) ═══ */
.panel{border:1px solid #DBD6D2;overflow:hidden;background:#fff}
.panel__hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid #DBD6D2;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase}
.panel__body{padding:0}

/* ═══ Hero (shared) ═══ */
.hero{padding:28px 24px;position:relative;overflow:hidden}
.hero_i{position:relative;z-index:2;max-width:480px}
.hero_t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.hero_h{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.1rem,2.2vw,1.6rem);font-weight:300;line-height:1.08;letter-spacing:-0.5px;margin-bottom:6px;max-width:400px}
.hero_h strong{font-weight:600}
.hero_s{font-size:11px;line-height:1.5;max-width:300px;margin-bottom:12px}
.hero_d{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-top:10px;border-top:1px solid}
.hero_dn{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:300;line-height:1}
.hero_dl{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.hero_wm{position:absolute;right:-0.02em;bottom:-0.05em;font-family:'Playfair Display',Georgia,serif;font-size:clamp(5rem,12vw,12rem);font-weight:700;opacity:0.04;line-height:0.8;pointer-events:none}
.hero_cp{position:absolute;top:0;right:0;width:38%;height:100%;z-index:1}

/* ═══ Content blocks ═══ */
.ct{padding:12px 14px}
.ct--a{background:#FAFAF8}
.ct--w{background:#fff}
.c2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cd{border:1px solid #DBD6D2;padding:10px}
.cd_l{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.cd_v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;margin-bottom:4px}
.cd_b{height:3px;border-radius:2px;margin-bottom:4px}
.steps{display:flex;gap:0;padding:4px 0}
.step{display:flex;flex-direction:column;gap:2px;padding:4px 8px;flex:1}
.sl{font-family:'JetBrains Mono',monospace;font-size:6px;letter-spacing:1px;text-transform:uppercase}
.sv{font-size:10px}
.arw{font-size:12px;padding:4px 0;line-height:1;color:#BAACA8}
.tgs{display:flex;gap:3px;flex-wrap:wrap;padding:6px 14px 10px}
.tg{padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:7px;border:1px solid;border-radius:2px}
.ins{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid #DBD6D2}
.ins:last-child{border-bottom:none}
.ins_n{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:300;line-height:1;opacity:.2}
.ins_t{font-size:11px;font-weight:500}
.ins_d{font-size:10px;color:#8A7D6E;line-height:1.4}
.pbar{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.pbar_l{font-family:'JetBrains Mono',monospace;font-size:8px;color:#8A7D6E;width:50px}
.pbar_t{flex:1;height:4px;background:#DBD6D2;border-radius:2px}
.pbar_f{height:100%;border-radius:2px}
.pbar_v{font-family:'JetBrains Mono',monospace;font-size:8px;width:30px;text-align:right}

/* ═══ Color swatch strip ═══ */
.cstrip{display:flex;gap:2px;padding:6px 14px 2px;border-top:1px solid #DBD6D2}
.cs{height:10px;border-radius:2px;position:relative;cursor:help}
.clist{display:flex;flex-wrap:wrap;gap:3px;padding:2px 14px 8px}
.cv{font-family:'JetBrains Mono',monospace;font-size:6px;padding:1px 4px;border:1px solid #DBD6D2;border-radius:2px;display:flex;align-items:center;gap:2px}
.cv_d{width:5px;height:5px;border-radius:1px}

/* ═══ Footer ═══ */
.ftr{text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;font-size:8px;color:#A0A0A0;letter-spacing:1px}
</style>
</head>
<body>
<div class="page">
<div class="phdr">

    <span><span class="dot" style="background:#3D5A35"></span>V1 Forest</span>

</div>

function renderScene(s, idx) {
  const hero = s.hero;
  // V1 panel
  let v1h = s.v1;
  let v2h = s.v2;
  
  let html = `<div class="scene">
    <div class="scene__hdr"><span>${s.name}</span><span>V1: ${s.v1Hero} ｜ V2: ${s.v2Hero}</span></div>
    <div class="pair">`;
  
  // === V1 PANEL ===
  html += `<div class="panel"><div class="panel__hdr"><span>V1 · 现有</span><span style="color:#8A7D6E">${s.v1Hero}</span></div><div class="panel__body">`;
  
  // Hero (V1 uses background color from v1h)
  let heroBg = v1h.hero;
  let tagColor = '#8A7D6E';
  let isLightBg = heroBg === '#F6F6F0';
  
  html += `<div class="hero" style="background:${heroBg};color:${isLightBg?'var(--text-display)':'#fff'}">`;
  if (v1h.clip) html += `<div class="hero_cp" style="background:${v1h.clip};clip-path:polygon(40% 0,100% 0,100% 100%,0% 100%)"></div>`;
  html += `<div class="hero_i"><div class="hero_t" style="color:${isLightBg?'#8A7D6E':'rgba(255,255,255,.5)'}">${hero.tag}</div>`;
  html += `<div class="hero_h" style="color:${isLightBg?'#383A3E':'#fff'}">${hero.title}</div>`;
  html += `<div class="hero_s" style="color:${isLightBg?'#8A7D6E':'rgba(255,255,255,.5)'}">${hero.sub}</div>`;
  html += `<div class="hero_d" style="border-top-color:${isLightBg?'#DBD6D2':'rgba(255,255,255,.1)'}">`;
  hero.data.forEach(d => {
    html += `<div><div class="hero_dn" style="color:${isLightBg?'#383A3E':'#fff'}">${d.n}<span style="color:${isLightBg?'#BF9B5A':'rgba(255,255,255,.3)'}">${d.u}</span></div><div class="hero_dl" style="color:${isLightBg?'#8A7D6E':'rgba(255,255,255,.3)'}">${d.l}</div></div>`;
  });
  html += `</div></div><div class="hero_wm" style="color:${isLightBg?'rgba(0,0,0,.03)':'rgba(255,255,255,.04)'}">${hero.wm}</div></div>`;
  
  // Content
  html += `<div class="ct">`;
  if (s.cards) {
    html += `<div class="c2">`;
    s.cards.forEach((c,i) => {
      const bars = [v1h.b1,v1h.b2,v1h.b3,v1h.b4];
      html += `<div class="cd"><div class="cd_l" style="color:#8A7D6E">${c.l}</div><div class="cd_v" style="color:#383A3E">${c.v}</div><div class="cd_b" style="width:${c.p}%;background:${bars[i]||'#3D5A35'}"></div></div>`;
    });
    html += `</div>`;
  }
  if (s.steps) {
    html += `<div class="steps">`;
    s.steps.forEach((st,i) => {
      html += `<div class="step"><span class="sl" style="color:#A0A0A0">${st.l}</span><span class="sv">${st.v}</span></div>`;
      if (i < s.steps.length - 1) html += `<span class="arw">›</span>`;
    });
    html += `</div>`;
  }
  if (s.bars) {
    s.bars.forEach((b,i) => {
      const bs = [v1h.b1,v1h.b2,v1h.b3];
      html += `<div class="pbar"><span class="pbar_l">${b.l}</span><div class="pbar_t"><div class="pbar_f" style="width:${b.p}%;background:${bs[i]||'#3D5A35'}"></div></div><span class="pbar_v">${b.p}%</span></div>`;
    });
  }
  if (s.insights) {
    s.insights.forEach(in_ => {
      html += `<div class="ins"><div class="ins_n" style="color:${v1h.num||'#6B8B5E'}">${in_.n}</div><div><div class="ins_t">${in_.t}</div><div class="ins_d">${in_.d}</div></div></div>`;
    });
  }
  if (s.quote) {
    html += `<div style="border-left:3px solid ${v1h.q||'#C66B4B'};padding:6px 10px;font-size:10px;line-height:1.6">${s.quote}</div>`;
  }
  html += `</div>`;
  
  // Tags
  if (s.tags) {
    html += `<div class="tgs">`;
    s.tags.forEach(t => {
      const cmap = {f1:'#3D5A35',m1:'#6B8B5E',sl:'#4E627C',st:'#7A8B9B',go:'#BF9B5A',rd:v1h.hero==='#F6F6F0'?'#D9433A':v1h.hero==='#f0ede6'?'#d86a48':'#D9433A',cl:'#C66B4B',sk:'#4A80C0',gn:'#5a9165'};
      const c = cmap[t.c]|| '#3D5A35';
      html += `<span class="tg" style="border-color:${c};color:${c}">${t.l}</span>`;
    });
    html += `</div>`;
  }
  
  // Color strip
  html += `<div class="cstrip">`;
  v1h.clr.forEach(c => { html += `<div class="cs" style="flex:${100/v1h.clr.length};background:${c}" title="${c}"></div>`; });
  html += `</div><div class="clist">`;
  v1h.clr.forEach(c => { html += `<span class="cv"><span class="cv_d" style="background:${c}"></span>${c}</span>`; });
  html += `</div></div></div>`;
  
  // === V2 PANEL ===
  html += `<div class="panel"><div class="panel__hdr"><span>V2 · 新方案</span><span style="color:#8A7D6E">${s.v2Hero}</span></div><div class="panel__body">`;
  
  heroBg = v2h.hero;
  isLightBg = heroBg === '#f0ede6';
  
  html += `<div class="hero" style="background:${heroBg};color:${isLightBg?'#1A1816':'#fff'}">`;
  if (v2h.clip) html += `<div class="hero_cp" style="background:${v2h.clip};clip-path:polygon(40% 0,100% 0,100% 100%,0% 100%)"></div>`;
  html += `<div class="hero_i"><div class="hero_t" style="color:${isLightBg?'#8A7D6E':'rgba(255,255,255,.5)'}">${hero.tag}</div>`;
  html += `<div class="hero_h" style="color:${isLightBg?'#2d3142':'#fff'}">${hero.title}</div>`;
  html += `<div class="hero_s" style="color:${isLightBg?'#8A7D6E':'rgba(255,255,255,.5)'}">${hero.sub}</div>`;
  html += `<div class="hero_d" style="border-top-color:${isLightBg?'#DBD6D2':'rgba(255,255,255,.1)'}">`;
  hero.data.forEach(d => {
    html += `<div><div class="hero_dn" style="color:${isLightBg?'#2d3142':'#fff'}">${d.n}<span style="color:${isLightBg?'#d47836':'rgba(255,255,255,.3)'}">${d.u}</span></div><div class="hero_dl" style="color:${isLightBg?'#8A7D6E':'rgba(255,255,255,.3)'}">${d.l}</div></div>`;
  });
  html += `</div></div><div class="hero_wm" style="color:${isLightBg?'rgba(0,0,0,.03)':'rgba(255,255,255,.04)'}">${hero.wm}</div></div>`;
  
  // Content V2
  html += `<div class="ct">`;
  if (s.cards) {
    html += `<div class="c2">`;
    s.cards.forEach((c,i) => {
      const bars = [v2h.b1,v2h.b2,v2h.b3,v2h.b4];
      html += `<div class="cd"><div class="cd_l" style="color:#8A7D6E">${c.l}</div><div class="cd_v" style="color:#2d3142">${c.v}</div><div class="cd_b" style="width:${c.p}%;background:${bars[i]||'#d47836'}"></div></div>`;
    });
    html += `</div>`;
  }
  if (s.steps) {
    html += `<div class="steps">`;
    s.steps.forEach((st,i) => {
      html += `<div class="step"><span class="sl" style="color:#A0A0A0">${st.l}</span><span class="sv">${st.v}</span></div>`;
      if (i < s.steps.length - 1) html += `<span class="arw">›</span>`;
    });
    html += `</div>`;
  }
  if (s.bars) {
    s.bars.forEach((b,i) => {
      const bs = [v2h.b1,v2h.b2,v2h.b3];
      html += `<div class="pbar"><span class="pbar_l">${b.l}</span><div class="pbar_t"><div class="pbar_f" style="width:${b.p}%;background:${bs[i]||'#d47836'}"></div></div><span class="pbar_v">${b.p}%</span></div>`;
    });
  }
  if (s.insights) {
    s.insights.forEach(in_ => {
      html += `<div class="ins"><div class="ins_n" style="color:${v2h.num||'#6B8B5E'}">${in_.n}</div><div><div class="ins_t">${in_.t}</div><div class="ins_d">${in_.d}</div></div></div>`;
    });
  }
  if (s.quote) {
    html += `<div style="border-left:3px solid ${v2h.q||'#6B8B5E'};padding:6px 10px;font-size:10px;line-height:1.6">${s.quote}</div>`;
  }
  html += `</div>`;
  
  // Tags V2
  if (s.tags) {
    html += `<div class="tgs">`;
    s.tags.forEach(t => {
      const cmap = {f1:'#3D5A35',m1:'#6B8B5E',sl:'#4E627C',st:'#7A8B9B',go:'#BF9B5A',rd:'#d86a48',cl:'#C66B4B',sk:'#4A80C0',gn:'#5a9165',wm:'#d47836'};
      const c = cmap[t.c]|| '#d47836';
      html += `<span class="tg" style="border-color:${c};color:${c}">${t.l}</span>`;
    });
    html += `</div>`;
  }
  
  // Color strip V2
  html += `<div class="cstrip">`;
  v2h.clr.forEach(c => { html += `<div class="cs" style="flex:${100/v2h.clr.length};background:${c}" title="${c}"></div>`; });
  html += `</div><div class="clist">`;
  v2h.clr.forEach(c => { html += `<span class="cv"><span class="cv_d" style="background:${c}"></span>${c}</span>`; });
  html += `</div></div></div>`;
  
  html += `</div></div>`;
  return html;
}

document.getElementById('root').innerHTML = SCENES.map((s,i) => renderScene(s,i)).join('');
</script>
</body>
</html>
