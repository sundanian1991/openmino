<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>养龙虾心得电影版 — PPT 预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: "Source Han Sans SC", "PingFang SC", sans-serif;
    padding: 40px 20px;
    color: #ccc;
  }
  h1 { text-align: center; color: #a0845c; font-size: 20px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 32px; }
  .preview-container { max-width: 1000px; margin: 0 auto; }
  .slide-label { font-size: 13px; color: #a0845c; margin-bottom: 8px; font-weight: bold; }
  .slide-wrapper {
    margin-bottom: 48px;
    background: #000;
    padding: 16px;
    border-radius: 4px;
  }
  .slide-wrapper svg { width: 100%; height: auto; display: block; }
  .note { text-align: center; color: #666; font-size: 12px; margin-top: 40px; }
</style>
</head>
<body>
  <h1>养龙虾心得电影版 — 6 页全览</h1>
  <p class="subtitle">是枝裕和风格 · 100 天 AI 共生纪实</p>
  <div class="preview-container">
    <p class="slide-label">1 / 封面</p>
    <div class="slide-wrapper"><embed src="01-cover.svg" type="image/svg+xml" width="100%" style="display:block;"></div>

    <p class="slide-label">2 / 第一个月：什么都想试，什么都不对</p>
    <div class="slide-wrapper"><embed src="02-month1.svg" type="image/svg+xml" width="100%" style="display:block;"></div>

    <p class="slide-label">3 / 第二个月：开始建体系</p>
    <div class="slide-wrapper"><embed src="03-month2.svg" type="image/svg+xml" width="100%" style="display:block;"></div>

    <p class="slide-label">4 / 第三个月：产出开始爆发</p>
    <div class="slide-wrapper"><embed src="04-month3.svg" type="image/svg+xml" width="100%" style="display:block;"></div>

    <p class="slide-label">5 / 方法论：从坑里爬出来的 8 条经验</p>
    <div class="slide-wrapper"><embed src="05-methods.svg" type="image/svg+xml" width="100%" style="display:block;"></div>

    <p class="slide-label">6 / 结尾：龙虾还是那只龙虾</p>
    <div class="slide-wrapper"><embed src="06-closing.svg" type="image/svg+xml" width="100%" style="display:block;"></div>
  </div>
  <p class="note">预览完毕，确认后即可生成 PPTX 文件。</p>
</body>
</html>
