<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>图5：提前还款率 vs 纠偏系数</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<body>
<div id="chart" style="width:960px;height:540px;font-family:'Helvetica Neue',Inter,sans-serif;"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var months = ['26-01', '26-02', '26-03', '26-04', '26-05'];

var option = {
  backgroundColor: '#FFFFFF',
  color: ['#CC6B1E', '#B0B0B0', '#C0392B'],
  title: {
    text: '实际提前还款率持续高于固定假设，纠偏系数一路下行',
    subtext: '首贷实际提前还款率 9.1%→11.6% vs 固定假设7% | 纠偏系数 0.769→0.603',
    left: 24, top: 16,
    textStyle: { fontSize: 18, fontWeight: 600, color: '#2D2D2D' },
    subtextStyle: { fontSize: 12, color: '#6C7A89' }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#FFFFFF', borderColor: '#E0E0E0', borderWidth: 1,
    formatter: function(p) {
      var s = '<b>' + p[0].axisValue + '</b><br/>';
      p.forEach(function(i) {
        if (i.seriesName !== '固定假设') {
          s += i.marker + ' ' + i.seriesName + ': ' + i.value + (i.seriesName === '纠偏系数' ? '' : '%') + '<br/>';
        }
      });
      // 固定假设单独处理
      var fixLine = p.find(function(i) { return i.seriesName === '固定假设'; });
      if (fixLine) s += fixLine.marker + ' 固定假设: 7%<br/>';
      return s;
    }
  },
  legend: { left: 24, top: 64, textStyle: { fontSize: 11, color: '#6C7A89' } },
  grid: { left: 60, right: 60, top: 110, bottom: 50 },
  xAxis: {
    type: 'category',
    data: months,
    axisLine: { lineStyle: { color: '#D5DDE5' } },
    axisLabel: { fontSize: 12, color: '#6C7A89', fontWeight: 500 },
    axisTick: { alignWithLabel: true }
  },
  yAxis: [{
    type: 'value',
    name: '提前还款率',
    min: 0, max: 15,
    nameTextStyle: { fontSize: 11, color: '#6C7A89' },
    splitLine: { lineStyle: { color: '#F0F0F0', type: 'dashed' } },
    axisLabel: { fontSize: 11, color: '#6C7A89', formatter: '{value}%' }
  }, {
    type: 'value',
    name: '纠偏系数',
    min: 0.5, max: 0.85,
    nameTextStyle: { fontSize: 11, color: '#C0392B' },
    splitLine: { show: false },
    axisLabel: { fontSize: 11, color: '#C0392B' }
  }],
  series: [
    {
      name: '实际提前还款率',
      type: 'bar',
      data: [9.1, 10.4, 9.9, 10.0, 11.6],
      barWidth: 22,
      itemStyle: { color: '#CC6B1E', borderRadius: [3, 3, 0, 0] },
      label: { show: true, position: 'top', formatter: '{c}%', fontSize: 11, fontWeight: 600, color: '#CC6B1E' }
    },
    {
      name: '固定假设',
      type: 'bar',
      data: [7, 7, 7, 7, 7],
      barWidth: 22,
      barGap: '50%',
      itemStyle: { color: '#D5DDE5', opacity: 0.6, borderRadius: [3, 3, 0, 0] },
      label: { show: true, position: 'top', formatter: '7%', fontSize: 10, color: '#999' }
    },
    {
      name: '纠偏系数',
      type: 'line',
      yAxisIndex: 1,
      data: [0.769, 0.673, 0.707, 0.700, 0.603],
      symbol: 'diamond', symbolSize: 12,
      lineStyle: { width: 3, color: '#C0392B' },
      itemStyle: { color: '#C0392B' },
      label: {
        show: true, position: 'bottom',
        formatter: function(p) { return p.value.toFixed(3); },
        fontSize: 12, fontWeight: 700, color: '#C0392B'
      },
      areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
        colorStops: [{ offset: 0, color: 'rgba(192,57,43,0.2)' }, { offset: 1, color: 'rgba(192,57,43,0.02)' }]
      }}
    }
  ],
  // 佣金调降幅度标注
  graphic: [
    { type: 'text', right: 24, top: 96,
      style: { text: '佣金调降幅度', fill: '#6C7A89', fontSize: 10, fontWeight: 500 } },
    { type: 'text', right: 24, top: 112,
      style: { text: '23% → 40%', fill: '#C0392B', fontSize: 14, fontWeight: 700 }
    },
    // 01月标注
    { type: 'text', left: '9%', bottom: 50,
      style: { text: '23%', fill: '#C0392B', fontSize: 10, fontStyle: 'italic' } },
    // 05月标注
    { type: 'text', right: '6%', bottom: 50,
      style: { text: '40%', fill: '#C0392B', fontSize: 10, fontStyle: 'italic' } }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
