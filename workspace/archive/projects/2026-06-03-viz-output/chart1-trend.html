<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>图1：精算人均整体下滑趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<body>
<div id="chart" style="width:960px;height:540px;font-family:'Helvetica Neue',Inter,sans-serif;"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  backgroundColor: '#FFFFFF',
  color: ['#CC6B1E', '#F0A54A', '#6C7A89', '#8B3A0F'],
  title: {
    text: '首贷精算人均触及红线 4,814元/月（-48%）',
    subtext: '人机结算持续下降，首贷5月精算人均仅4,814元/人/月 | 2025-12 ~ 2026-05',
    left: 24, top: 16,
    textStyle: { fontSize: 18, fontWeight: 600, color: '#2D2D2D' },
    subtextStyle: { fontSize: 12, color: '#6C7A89' }
  },
  tooltip: { trigger: 'axis', backgroundColor: '#FFFFFF', borderColor: '#E0E0E0', borderWidth: 1,
    formatter: function(p) {
      var s = '<b>' + p[0].axisValue + '</b><br/>';
      p.forEach(function(i) { s += i.marker + ' ' + i.seriesName + ': ' + i.value.toLocaleString() + ' 元<br/>'; });
      return s;
    }
  },
  legend: { left: 24, top: 62, textStyle: { fontSize: 12, color: '#6C7A89' } },
  grid: { left: 60, right: 60, top: 110, bottom: 50 },
  xAxis: {
    type: 'category',
    data: ['25-12','26-01','26-02','26-03','26-04','26-05'],
    axisLine: { lineStyle: { color: '#D5DDE5' } },
    axisLabel: { fontSize: 12, color: '#6C7A89', fontWeight: 500 },
    axisTick: { alignWithLabel: true }
  },
  yAxis: {
    type: 'value',
    name: '精算人均（元）',
    nameTextStyle: { fontSize: 11, color: '#6C7A89' },
    min: 0, max: 26000,
    splitLine: { lineStyle: { color: '#F0F0F0', type: 'dashed' } },
    axisLabel: { fontSize: 11, color: '#6C7A89',
      formatter: function(v) { return v >= 1000 ? (v/1000).toFixed(0) + 'k' : v; }
    }
  },
  series: [{
    name: '人机精算人均',
    type: 'line',
    smooth: false,
    data: [9986, 13074, 7409, 10592, 8552, 5518],
    symbol: 'circle', symbolSize: 6,
    lineStyle: { width: 2 },
    emphasis: { lineStyle: { width: 3 } }
  }, {
    name: '首贷精算人均',
    type: 'line',
    smooth: false,
    data: [9314, 12245, 6225, 9266, 7851, 4814],
    symbol: 'circle', symbolSize: 8,
    lineStyle: { width: 3, color: '#CC6B1E' },
    itemStyle: { color: '#CC6B1E' },
    markPoint: {
      data: [{
        coord: ['26-05', 4814],
        symbol: 'pin', symbolSize: 64,
        itemStyle: { color: '#C0392B' },
        label: { formatter: '4,814\n红线', fontSize: 13, fontWeight: 'bold', color: '#FFFFFF', lineHeight: 18 }
      }],
      animation: false
    },
    markLine: {
      silent: true,
      data: [{
        yAxis: 5000,
        label: { formatter: '警戒线 5,000', color: '#C0392B', fontSize: 11, position: 'insideEndTop' },
        lineStyle: { color: '#C0392B', type: 'dashed', width: 1.5 }
      }]
    },
    emphasis: { lineStyle: { width: 4 } }
  }, {
    name: '复贷精算人均',
    type: 'line',
    smooth: false,
    data: [16464, 21063, 19252, 23521, 15839, 9378],
    symbol: 'circle', symbolSize: 6,
    lineStyle: { width: 2, color: '#6C7A89' },
    itemStyle: { color: '#6C7A89' },
    emphasis: { lineStyle: { width: 3 } }
  }],
  // 终点标注
  graphic: [
    { type: 'text', left: '90%', top: 90, style: { text: '▼ 9,378', fill: '#6C7A89', fontSize: 11, fontWeight: 500 } },
    { type: 'text', left: '90%', top: '48%', style: { text: '▼ 4,814', fill: '#C0392B', fontSize: 12, fontWeight: 700 } }
  ]
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
