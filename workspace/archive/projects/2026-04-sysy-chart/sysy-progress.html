<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SysY Compiler Progress</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0e8;
    display: flex;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
  .chart-wrapper { width: 880px; padding: 28px 40px 20px; }
  .header { margin-bottom: 16px; }
  .header h1 { font-size: 19px; font-weight: 600; color: #2a2420; line-height: 1.35; }
  .header .meta { font-size: 12.5px; color: #7a6e62; margin-top: 5px; }
  .header .meta .hl { color: #b8722a; font-weight: 600; }
  .chart svg { width: 100%; height: auto; }
</style>
</head>
<body>
<div class="chart-wrapper">
  <div class="header">
    <h1>Building a complete SysY compiler in Rust, from scratch to 100%</h1>
    <div class="meta">mino-v2.5-pro &middot; 672 tool calls &middot; 4.3 hours &middot; <span class="hl">233 / 233 passed</span></div>
  </div>
  <div class="chart">
    <svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#9a8e80" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#9a8e80" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Phase backgrounds -->
      <rect x="0" y="0" width="200" height="250" fill="#ecdcc8" opacity="0.5"/>
      <rect x="200" y="0" width="200" height="250" fill="#d8b88a" opacity="0.3"/>
      <rect x="400" y="0" width="200" height="250" fill="#c89060" opacity="0.2"/>
      <rect x="600" y="0" width="200" height="250" fill="#8ab890" opacity="0.2"/>

      <!-- Phase labels -->
      <text x="100" y="-16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a6040" letter-spacing="0.8">PHASE 1</text>
      <text x="100" y="-4" text-anchor="middle" font-size="8.5" fill="#a08060">Scaffolding &amp; AST</text>
      <text x="300" y="-16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a6040" letter-spacing="0.8">PHASE 2</text>
      <text x="300" y="-4" text-anchor="middle" font-size="8.5" fill="#a08060">Koopa IR Codegen</text>
      <text x="500" y="-16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a6040" letter-spacing="0.8">PHASE 3</text>
      <text x="500" y="-4" text-anchor="middle" font-size="8.5" fill="#a08060">RISC-V Backend</text>
      <text x="700" y="-16" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a6a40" letter-spacing="0.8">PHASE 4</text>
      <text x="700" y="-4" text-anchor="middle" font-size="8.5" fill="#5a8a60">Perf Optimization</text>

      <!-- Grid -->
      <line x1="-40" y1="62" x2="800" y2="62" stroke="#ddd8d0" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="-40" y1="125" x2="800" y2="125" stroke="#ddd8d0" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="-40" y1="187" x2="800" y2="187" stroke="#ddd8d0" stroke-width="0.5" stroke-dasharray="2,4"/>
      <line x1="-40" y1="250" x2="800" y2="250" stroke="#ccc4b8" stroke-width="0.5"/>

      <!-- Y axis -->
      <text x="-46" y="4" text-anchor="end" font-size="10" fill="#9a8e80">100%</text>
      <text x="-46" y="66" text-anchor="end" font-size="10" fill="#9a8e80">75%</text>
      <text x="-46" y="129" text-anchor="end" font-size="10" fill="#9a8e80">50%</text>
      <text x="-46" y="191" text-anchor="end" font-size="10" fill="#9a8e80">25%</text>
      <text x="-46" y="254" text-anchor="end" font-size="10" fill="#9a8e80">0%</text>

      <!-- Data layers (generated by JS) -->
      <g id="areas"></g>
      <path id="mainline" fill="none" stroke="#b8722a" stroke-width="1.8" stroke-linejoin="round"/>

      <!-- Milestone vertical lines -->
      <line id="vline1" stroke="#b8722a" stroke-width="0.3" opacity="0.25"/>
      <line id="vline2" stroke="#b8722a" stroke-width="0.3" opacity="0.25"/>
      <line id="vline3" stroke="#b8722a" stroke-width="0.3" opacity="0.25"/>

      <!-- Milestone 1 -->
      <rect x="12" y="105" width="148" height="42" rx="6" fill="#fffefc" stroke="#d8d0c4" stroke-width="0.8"/>
      <text x="22" y="124" font-size="10.5" fill="#2a2420" font-weight="600">First compile succeeds</text>
      <text x="22" y="138" font-size="10" fill="#7a6e62">137/233 = 59%</text>
      <line id="ml1" stroke="#9a8e80" stroke-width="0.8" marker-start="url(#b)"/>

      <!-- Milestone 2 -->
      <rect x="195" y="72" width="155" height="42" rx="6" fill="#fffefc" stroke="#d8d0c4" stroke-width="0.8"/>
      <text x="205" y="91" font-size="10.5" fill="#2a2420" font-weight="600">Koopa IR 110/110</text>
      <text x="205" y="105" font-size="10" fill="#7a6e62">All IR levels passed</text>
      <line id="ml2" stroke="#9a8e80" stroke-width="0.8" marker-start="url(#b)"/>

      <!-- Milestone 3 -->
      <rect x="460" y="55" width="165" height="42" rx="6" fill="#fffefc" stroke="#d8d0c4" stroke-width="0.8"/>
      <text x="470" y="74" font-size="10.5" fill="#2a2420" font-weight="600">All functional tests pass</text>
      <text x="470" y="88" font-size="10" fill="#7a6e62">213/233 = 91%</text>
      <line id="ml3" stroke="#9a8e80" stroke-width="0.8" marker-start="url(#b)"/>

      <!-- Milestone 4 -->
      <rect x="560" y="28" width="155" height="42" rx="6" fill="#fffefc" stroke="#c8d8c8" stroke-width="1"/>
      <text x="570" y="47" font-size="10.5" fill="#2a5a30" font-weight="600">PERFECT SCORE</text>
      <text x="570" y="61" font-size="10" fill="#3a6a40">233/233 = 100%</text>
      <line id="ml4" stroke="#5a8a60" stroke-width="0.8" marker-start="url(#b)"/>

      <!-- X axis -->
      <text x="0" y="272" text-anchor="middle" font-size="10" fill="#9a8e80">0.0h</text>
      <text x="160" y="272" text-anchor="middle" font-size="10" fill="#9a8e80">1.0h</text>
      <text x="320" y="272" text-anchor="middle" font-size="10" fill="#9a8e80">2.0h</text>
      <text x="480" y="272" text-anchor="middle" font-size="10" fill="#9a8e80">3.0h</text>
      <text x="640" y="272" text-anchor="middle" font-size="10" fill="#9a8e80">4.0h</text>
      <text x="800" y="272" text-anchor="middle" font-size="10" fill="#9a8e80">4.5h</text>
      <text x="400" y="296" text-anchor="middle" font-size="11" font-weight="600" fill="#5a4a3a">Elapsed Time</text>

      <!-- Legend -->
      <rect x="140" y="312" width="10" height="10" rx="2" fill="#d4a574" opacity="0.6"/>
      <text x="156" y="322" font-size="10.5" fill="#6a5a4a">Koopa IR (110)</text>
      <rect x="270" y="312" width="10" height="10" rx="2" fill="#c89060" opacity="0.5"/>
      <text x="286" y="322" font-size="10.5" fill="#6a5a4a">RISC-V Backend (103)</text>
      <rect x="430" y="312" width="10" height="10" rx="2" fill="#8ab890" opacity="0.5"/>
      <text x="446" y="322" font-size="10.5" fill="#6a5a4a">Perf Optimization (20)</text>
      <line x1="580" y1="317" x2="600" y2="317" stroke="#b8722a" stroke-width="1.8"/>
      <text x="606" y="322" font-size="10.5" fill="#6a5a4a">Total Pass Rate</text>
    </svg>
  </div>
</div>

<script>
(function() {
  var total = 233, h = 4.3;
  var steps = [];

  // The original shape: massive early jump (0→59% at ~0.2h), then gradual climb
  // Manually specify key inflection points matching the original curve
  var keyPoints = [
    // [time_h, totalPass, kp, rp, pp]
    [0.00,   0,   0,   0,  0],
    [0.08,  27,  27,   0,  0],
    [0.12,  80,  80,   0,  0],
    [0.18, 137, 110,  27,  0],  // First compile: 137/233 = 59%
    [0.25, 140, 110,  30,  0],
    [0.50, 148, 110,  38,  0],
    [0.80, 155, 110,  45,  0],
    [1.00, 160, 110,  50,  0],
    [1.20, 165, 110,  55,  0],
    [1.50, 172, 110,  62,  0],
    [1.80, 180, 110,  70,  0],
    [2.00, 188, 110,  78,  0],
    [2.20, 195, 110,  85,  0],
    [2.40, 202, 110,  92,  0],
    [2.50, 213, 110, 103,  0],  // All functional tests: 213/233 = 91%
    [2.80, 215, 110, 103,  2],
    [3.00, 218, 110, 103,  5],
    [3.30, 222, 110, 103,  9],
    [3.60, 226, 110, 103, 13],
    [3.80, 228, 110, 103, 15],
    [4.00, 230, 110, 103, 17],
    [4.20, 232, 110, 103, 19],
    [4.30, 233, 110, 103, 20],  // Perfect score
    [4.50, 233, 110, 103, 20],
  ];

  // Interpolate between key points
  for (var seg = 0; seg < keyPoints.length - 1; seg++) {
    var s = keyPoints[seg], e = keyPoints[seg + 1];
    var dur = e[0] - s[0];
    if (dur === 0) continue;
    var nSteps = Math.max(1, Math.round(dur / 0.03));
    for (var i = 0; i <= nSteps; i++) {
      var frac = i / nSteps;
      var t = s[0] + frac * dur;
      var tp = Math.round(s[1] + frac * (e[1] - s[1]));
      var kp = Math.round(s[2] + frac * (e[2] - s[2]));
      var rp = Math.round(s[3] + frac * (e[3] - s[3]));
      var pp = Math.round(s[4] + frac * (e[4] - s[4]));
      var x = (t / h) * 800;
      var y = 250 - (tp / total) * 250;
      steps.push({x: x, y: y, tp: tp, ky: 250 - (kp/total)*250, ry: 250 - ((kp+rp)/total)*250});
    }
  }

  // Build stepped path
  var d = 'M' + Math.round(steps[0].x) + ',' + 250;
  for (var i = 1; i < steps.length; i++) {
    var px = Math.round(steps[i].x);
    var py = Math.round(steps[i].y);
    var prevY = Math.round(steps[i-1].y);
    d += 'L' + px + ',' + prevY + 'L' + px + ',' + py;
  }
  document.getElementById('mainline').setAttribute('d', d);

  // Koopa area
  var da = 'M' + Math.round(steps[0].x) + ',250';
  for (var i = 0; i < steps.length; i++) da += 'L' + Math.round(steps[i].x) + ',' + Math.round(steps[i].ky);
  da += 'L' + Math.round(steps[steps.length-1].x) + ',250Z';
  var a1 = document.createElementNS('http://www.w3.org/2000/svg','path');
  a1.setAttribute('d', da); a1.setAttribute('fill','#d4a574'); a1.setAttribute('opacity','0.35');
  document.getElementById('areas').appendChild(a1);

  // RISC-V area
  var db = 'M' + Math.round(steps[0].x) + ',250';
  for (var i = 0; i < steps.length; i++) db += 'L' + Math.round(steps[i].x) + ',' + Math.round(steps[i].ry);
  db += 'L' + Math.round(steps[steps.length-1].x) + ',250Z';
  var a2 = document.createElementNS('http://www.w3.org/2000/svg','path');
  a2.setAttribute('d', db); a2.setAttribute('fill','#c89060'); a2.setAttribute('opacity','0.25');
  document.getElementById('areas').appendChild(a2);

  // Find milestone points on the data line
  var m1x, m1y, m2x, m2y, m3x, m3y;
  for (var i = 0; i < steps.length; i++) {
    if (!m1x && steps[i].tp >= 137) { m1x = steps[i].x; m1y = steps[i].y; }
    if (!m2x && steps[i].tp >= 213) { m2x = steps[i].x; m2y = steps[i].y; }
    if (!m3x && steps[i].tp >= 233) { m3x = steps[i].x; m3y = steps[i].y; }
  }

  // Arrows from bubble bottom → curve (marker-end arrowhead points toward curve)
  // Milestone 1: bubble cx=86, bottom=147
  if (m1x) {
    document.getElementById('vline1').setAttribute('x1', m1x);
    document.getElementById('vline1').setAttribute('x2', m1x);
    document.getElementById('vline1').setAttribute('y1', m1y);
    document.getElementById('ml1').setAttribute('x1', 86);
    document.getElementById('ml1').setAttribute('y1', 147);
    document.getElementById('ml1').setAttribute('x2', m1x);
    document.getElementById('ml1').setAttribute('y2', m1y);
  }
  // Milestone 2: bubble cx=272, bottom=114
  if (m2x) {
    document.getElementById('vline2').setAttribute('x1', m2x);
    document.getElementById('vline2').setAttribute('x2', m2x);
    document.getElementById('vline2').setAttribute('y1', m2y);
    document.getElementById('ml2').setAttribute('x1', 272);
    document.getElementById('ml2').setAttribute('y1', 114);
    document.getElementById('ml2').setAttribute('x2', m2x);
    document.getElementById('ml2').setAttribute('y2', m2y);
  }
  // Milestone 3: bubble cx=542, bottom=97
  if (m2x) {
    document.getElementById('ml3').setAttribute('x1', 542);
    document.getElementById('ml3').setAttribute('y1', 97);
    document.getElementById('ml3').setAttribute('x2', m2x);
    document.getElementById('ml3').setAttribute('y2', m2y);
  }
  // Milestone 4: bubble cx=637, bottom=70
  if (m3x) {
    document.getElementById('ml4').setAttribute('x1', 637);
    document.getElementById('ml4').setAttribute('y1', 70);
    document.getElementById('ml4').setAttribute('x2', m3x);
    document.getElementById('ml4').setAttribute('y2', m3y);
  }
})();
</script>
</body>
</html>
