<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能手机市场份额变化</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 800px; height: 500px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    苹果从 <strong>18% 升至 20%</strong> 重返第一，三星 <strong>20%→19%</strong> 让出宝座。中国军团集体下滑：小米 14%→12%，OPPO 10%→8%。唯一逆势增长的是 <strong>传音（5%→8%，出货量 +47%）</strong>——在非洲和新兴市场攻城略地。
  </div>
  <div class="footer-note">数据来源：IDC 全球手机跟踪 | 2021—2025 年度出货量市场份额</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const years = ['2021','2022','2023','2024','2025'];

// 用出货量（百万部），"其他"包含华为+荣耀+Realme+其他
const samsung  = [272, 261, 227, 232, 241];
const apple    = [236, 224, 234, 226, 241];
const xiaomi   = [191, 151, 146, 148, 145];
const oppo     = [137, 113, 110, 105, 100];
const vivo     = [109,  91, 101, 101, 105];
const transsion= [ 68,  75,  94, 100,  95];
const others   = [327, 359, 362, 358, 323]; // Huawei+Honor+Realme+其他

const opt = {
  title: {
    text: '苹果重返第一，中国军团集体下滑',
    subtext: '2021 — 2025 全球智能手机出货量份额',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(p) {
      let s = p[0].axisValue + '<br/>';
      let total = 0;
      p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + 'M<br/>'; total += item.value; });
      s += '<b>合计: ' + total + 'M</b>';
      return s;
    }
  },
  legend: { data: ['三星','苹果','小米','OPPO','vivo','传音','其他'], bottom: 0, textStyle: { fontSize: 10 }, itemWidth: 12, itemHeight: 10 },
  grid: { left: 60, right: 50, top: 60, bottom: 75 },
  xAxis: {
    type: 'category', data: years,
    axisLabel: { fontSize: 12, color: '#3D3D3A', fontWeight: 600 },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    axisLabel: { formatter: '{value}M', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [
    { name: '苹果', type: 'bar', stack: 'total', data: apple,
      itemStyle: { color: '#D97757' }, barWidth: '45%' },
    { name: '三星', type: 'bar', stack: 'total', data: samsung,
      itemStyle: { color: '#5B8C8D' }, barWidth: '45%' },
    { name: '传音', type: 'bar', stack: 'total', data: transsion,
      itemStyle: { color: '#788C5D' }, barWidth: '45%' },
    { name: '小米', type: 'bar', stack: 'total', data: xiaomi,
      itemStyle: { color: '#87867F' }, barWidth: '45%' },
    { name: 'OPPO', type: 'bar', stack: 'total', data: oppo,
      itemStyle: { color: '#A3A29B' }, barWidth: '45%' },
    { name: 'vivo', type: 'bar', stack: 'total', data: vivo,
      itemStyle: { color: '#C1C0B8' }, barWidth: '45%' },
    { name: '其他', type: 'bar', stack: 'total', data: others,
      itemStyle: { color: '#E3DACC' }, barWidth: '45%' }
  ],
  // 标注：苹果 2021 vs 2025 对比，传音增长
  graphic: [
    // 苹果 2021 标签
    {
      type: 'text', style: { text: '236M → 241M', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: 580, top: 95
    },
    // 传音增长标注
    {
      type: 'text', style: { text: '传音 68M→95M  ↑47%', fill: '#788C5D', fontSize: 10, fontWeight: 600 },
      left: 620, top: 310
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
