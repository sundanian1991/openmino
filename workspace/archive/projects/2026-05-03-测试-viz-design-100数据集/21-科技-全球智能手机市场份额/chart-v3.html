<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能手机市场份额变化</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 850px; height: 460px; }
  .lead { max-width: 750px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: '#141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    苹果从 <strong>18% 升至 20%</strong> 重返第一，三星 <strong>20%→19%</strong> 让出宝座。中国军团集体下滑。唯一逆势增长的是 <strong>传音（出货量 +47%）</strong>——在非洲和新兴市场攻城略地。
  </div>
  <div class="footer-note">数据来源：IDC | 2021—2025 年度出货量</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const years = ['2021','2022','2023','2024','2025'];

const samsung   = [272, 261, 227, 232, 241];
const apple     = [236, 224, 234, 226, 241];
const xiaomi    = [191, 151, 146, 148, 145];
const oppo      = [137, 113, 110, 105, 100];
const vivo      = [109,  91, 101, 101, 105];
const transsion = [ 68,  75,  94, 100,  95];
const others    = [327, 359, 362, 358, 323];

const W = 850, H = 460;
const pad = { top: 70, right: 140, bottom: 40, left: 55 };
const plotW = W - pad.left - pad.right;
const plotH = H - pad.top - pad.bottom;
const yMax = 1500;

function xPx(i) { return pad.left + (i + 0.5) / years.length * plotW; }
function yPx(v) { return pad.top + plotH - (v / yMax) * plotH; }

// 累计值（从底部堆叠：其他→vivo→OPPO→小米→传音→三星→苹果）
function cumBase(i) { return others[i] + vivo[i] + oppo[i] + xiaomi[i] + transsion[i] + samsung[i]; }
function cumAppleTop(i) { return cumBase(i) + apple[i]; }
function cumTranssionTop(i) { return others[i] + vivo[i] + oppo[i] + xiaomi[i] + transsion[i]; }

const legendX = W - pad.right + 15;

const opt = {
  title: {
    text: '苹果重返第一，中国军团集体下滑',
    subtext: '2021 — 2025 全球智能手机出货量（百万部）',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(p) {
      let s = p[0].axisValue + '<br>';
      p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + 'M<br>'; });
      return s;
    }
  },
  grid: { left: pad.left, right: pad.right, top: pad.top, bottom: pad.bottom },
  xAxis: {
    type: 'category', data: years,
    axisLabel: { fontSize: 12, color: '#3D3D3A', fontWeight: 600 },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    axisLabel: { formatter: '{value}M', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [
    { name: '其他', type: 'bar', stack: 'total', data: others,
      itemStyle: { color: '#E3DACC' }, barWidth: '40%' },
    { name: 'vivo', type: 'bar', stack: 'total', data: vivo,
      itemStyle: { color: '#D1CFC5' } },
    { name: 'OPPO', type: 'bar', stack: 'total', data: oppo,
      itemStyle: { color: '#C1C0B8' } },
    { name: '小米', type: 'bar', stack: 'total', data: xiaomi,
      itemStyle: { color: '#A3A29B' } },
    { name: '传音', type: 'bar', stack: 'total', data: transsion,
      itemStyle: { color: '#788C5D' } },
    { name: '三星', type: 'bar', stack: 'total', data: samsung,
      itemStyle: { color: '#87867F' } },
    { name: '苹果', type: 'bar', stack: 'total', data: apple,
      itemStyle: { color: '#D97757' } }
  ],
  graphic: [
    // ====== 苹果趋势虚线：2021柱顶 → 2025柱顶 ======
    {
      type: 'line',
      shape: { x1: xPx(0), y1: yPx(cumAppleTop(0)), x2: xPx(4), y2: yPx(cumAppleTop(4)) },
      style: { stroke: '#D97757', lineWidth: 1.5, lineDash: [4, 4] }
    },
    // 苹果标签：2021
    {
      type: 'text', style: { text: '236M', fill: '#D97757', fontSize: 10, fontWeight: 700 },
      left: xPx(0) - 15, top: yPx(cumAppleTop(0)) - 22
    },
    // 苹果标签：2025
    {
      type: 'text', style: { text: '241M', fill: '#D97757', fontSize: 11, fontWeight: 700 },
      left: xPx(4) + 10, top: yPx(cumAppleTop(4)) - 22
    },

    // ====== 传音增长虚线：2021段顶 → 2025段顶 ======
    {
      type: 'line',
      shape: {
        x1: xPx(0) + 20, y1: yPx(cumTranssionTop(0)),
        x2: legendX - 5, y2: yPx(cumTranssionTop(4))
      },
      style: { stroke: '#788C5D', lineWidth: 1.5, lineDash: [4, 4] }
    },
    // 传音标签：2021
    {
      type: 'text', style: { text: '68M', fill: '#788C5D', fontSize: 10, fontWeight: 600 },
      left: xPx(0) + 22, top: yPx(cumTranssionTop(0)) - 14
    },
    // 传音标签：2025
    {
      type: 'text', style: { text: '95M', fill: '#788C5D', fontSize: 10, fontWeight: 600 },
      left: legendX + 2, top: yPx(cumTranssionTop(4)) - 14
    },
    // 传音增长箭头：2025 标签右侧
    {
      type: 'text', style: { text: '↑+47%', fill: '#788C5D', fontSize: 10, fontWeight: 700 },
      left: legendX + 30, top: yPx(cumTranssionTop(4)) - 14
    },

    // ====== 三星让位标注 ======
    {
      type: 'text', style: { text: '272M→241M', fill: '#87867F', fontSize: 9 },
      left: xPx(4) + 8, top: yPx(cumAppleTop(4)) + 18
    },

    // ====== 右侧图例 ======
    {
      type: 'rect',
      shape: { x: legendX - 5, y: pad.top - 5, width: 120, height: 90 },
      style: { fill: '#FAF9F5', stroke: '#E6E3DA', lineWidth: 0.5 }
    },
    {
      type: 'text', style: { text: '● 苹果', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: legendX, top: pad.top + 15
    },
    {
      type: 'text', style: { text: '● 传音', fill: '#788C5D', fontSize: 10, fontWeight: 600 },
      left: legendX, top: pad.top + 40
    },
    {
      type: 'text', style: { text: '○ 其他品牌', fill: '#A3A29B', fontSize: 10 },
      left: legendX, top: pad.top + 65
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
