<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple 股价 V 型反转</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  #chart { width: 900px; height: 440px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>

  '2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07','2024-08',
  '2024-09','2024-10','2024-11','2024-12','2025-01','2025-02','2025-03','2025-04'
];
const prices = [
  124.28,136.96,145.86,151.83,141.50,149.80,165.30,177.57,

  233.00,225.91,238.72,250.42,224.80,217.90,209.27,198.50

    left: 'center',
    top: 4,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) { return p[0].axisValue + ' $' + p[0].data; }
  },
  grid: { left: 55, right: 35, top: 60, bottom: 55 },
  xAxis: {
    type: 'category', data: months,
    axisLabel: { interval: 5, rotate: 30, fontSize: 10, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },

    type: 'value', min: 110, max: 270, interval: 20,

    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [
    {
      name: '收盘价', type: 'line', data: prices,
      smooth: true, symbol: 'none',
      lineStyle: { width: 2, color: '#87867F' },
      markPoint: {
        symbol: 'circle', symbolSize: 10,
        itemStyle: { color: '#D97757' },
        label: {
          fontSize: 11, fontWeight: 600, color: '#D97757',
          position: 'insideMiddleTop', offset: [0, -18],
          formatter: function(p) { return p.name; }

    {

      type: 'text', style: { text: '加速期', fill: '#D97757', fontSize: 9, opacity: 0.5 },

</html>
