<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国 GDP 十年转型</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 900px; height: 480px; }
  .footer-note { text-align: center; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="footer-note">数据来源：国家统计局 | 2015—2024 年度</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const gdp =      [702511, 761193, 847383, 936010, 1005872, 1034868, 1173823, 1234029, 1294272, 1349084];
const growth =   [7.0, 6.8, 6.9, 6.8, 6.1, 2.3, 8.6, 3.1, 5.4, 5.0];
const services = [51.7, 53.3, 53.5, 54.1, 55.2, 55.5, 54.8, 55.0, 56.3, 56.7];

const option = {
  title: {
    text: '中国 10 年经济转型：增速从 7% 降到 5%，服务业占比突破 57%',
    subtext: '2015 — 2024 年度数据',
    left: 'center', top: 4,
    textStyle: { fontSize: 16, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) {
      let s = p[0].axisValue + '<br/>';
      p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + '<br/>'; });
      return s;
    }
  },
  legend: { data: ['GDP 总量', '增速', '服务业占比'], top: 38, textStyle: { fontSize: 11 } },
  grid: { left: 70, right: 65, top: 72, bottom: 50 },
  xAxis: {
    type: 'category', data: years,
    axisLabel: { fontSize: 11, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: [
    {
      type: 'value', name: '增速 (%)', min: 0, max: 10, interval: 2,
      nameTextStyle: { fontSize: 10, color: '#D97757' },
      axisLabel: { formatter: '{value}%', fontSize: 10, color: '#D97757' },
      axisLine: { show: false },
      splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
      axisTick: { show: false }
    },
    {
      type: 'value', name: '服务业占比 (%)', min: 48, max: 60, interval: 2,
      nameTextStyle: { fontSize: 10, color: '#788C5D' },
      axisLabel: { formatter: '{value}%', fontSize: 10, color: '#788C5D' },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: false }
    }
  ],
  series: [
    // GDP 总量柱状（背景感）
    {
      name: 'GDP 总量', type: 'bar', data: gdp,
      itemStyle: { color: 'rgba(135,134,127,0.12)' },
      barWidth: '50%', yAxisIndex: 0, silent: true
    },
    // 增速线
    {
      name: '增速', type: 'line', data: growth,
      smooth: true, symbol: 'circle', symbolSize: 6,
      itemStyle: { color: '#D97757' },
      lineStyle: { width: 3 },
      yAxisIndex: 0,
      markPoint: {
        symbol: 'circle', symbolSize: 6,
        itemStyle: { color: '#c25030' },
        label: { fontSize: 10, fontWeight: 600, color: '#c25030', position: 'top', offset: [0, -12] },
        data: [
          { name: '疫情 2.3%', xAxis: '2020', yAxis: 2.3 },
          { name: '疫后反弹 8.6%', xAxis: '2021', yAxis: 8.6 }
        ]
      }
    },
    // 服务业占比线
    {
      name: '服务业占比', type: 'line', data: services,
      smooth: true, symbol: 'circle', symbolSize: 6,
      itemStyle: { color: '#788C5D' },
      lineStyle: { width: 3 },
      yAxisIndex: 1,
      markPoint: {
        symbol: 'circle', symbolSize: 6,
        itemStyle: { color: '#5a6e45' },
        label: { fontSize: 10, fontWeight: 600, color: '#5a6e45', position: 'bottom', offset: [0, 14] },
        data: [
          { name: '突破 55%', xAxis: '2019', yAxis: 55.2 },
          { name: '56.7%', xAxis: '2024', yAxis: 56.7 }
        ]
      }
    }
  ]
};

chart.setOption(option);
</script>
</body>
</html>
