<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国 CPI 十年走势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 850px; height: 420px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: '#141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    中国 CPI 十年徘徊在 2% 以下，2023-2024 仅 <strong>0.2%</strong>——通胀不是潜在风险，而是已经发生的现实。PPI 从 -5.2% 飙到 +8.1% 再跌回 -3.0%，<strong>工业端经历了过山车，消费端却几乎没动静。</strong>
  </div>
  <div class="footer-note">数据来源：国家统计局 | 2015—2024 年度同比</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const cpi   = [1.4, 2.0, 1.6, 2.1, 2.9, 2.5, 0.9, 2.0, 0.2, 0.2];
const ppi   = [-5.2,-1.4, 6.3, 3.5,-0.3,-1.8, 8.1, 4.1,-3.0,-2.2];
const food  = [2.3, 4.6,-1.4, 1.8, 7.4,10.6,-1.4, 2.4,-0.3,-0.2];

const opt = {
  title: {
    text: '中国 CPI 十年走低，PPI 剧烈波动',
    subtext: '2015 — 2024 年度同比（%）',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) {
      let s = p[0].axisValue + '<br/>';
      p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + '%<br/>'; });
      return s;
    }
  },
  legend: { data: ['CPI','PPI','食品CPI'], top: 38, right: 10, textStyle: { fontSize: 10 } },
  grid: { left: 50, right: 50, top: 70, bottom: 40 },
  xAxis: {
    type: 'category', data: years,
    axisLabel: { fontSize: 11, color: '#3D3D3A', fontWeight: 600 },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [
    { name: 'CPI', type: 'line', data: cpi,
      smooth: 0.2, symbol: 'circle', symbolSize: 5,
      lineStyle: { width: 2.5, color: '#3D3D3A' },
      itemStyle: { color: '#3D3D3A' } },
    { name: 'PPI', type: 'line', data: ppi,
      smooth: 0.2, symbol: 'none',
      lineStyle: { width: 2, color: '#D97757' },
      itemStyle: { color: '#D97757' } },
    { name: '食品CPI', type: 'line', data: food,
      smooth: 0.2, symbol: 'none',
      lineStyle: { width: 2, color: '#788C5D' },
      itemStyle: { color: '#788C5D' } }
  ],
  // 2% 参考线
  graphic: [
    // 2024 CPI 标注
    {
      type: 'circle', shape: { cx: 755, cy: 260, r: 4 },
      style: { fill: '#3D3D3A', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '0.2%', fill: '#3D3D3A', fontSize: 10, fontWeight: 600 },
      left: 760, top: 252
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
