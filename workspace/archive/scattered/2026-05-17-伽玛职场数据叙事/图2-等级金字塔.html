<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等级金字塔</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFF8F0; display: flex; justify-content: center; padding: 40px 20px; }
  #chart { width: 800px; height: 500px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var categories = [
  '首贷-S', '首贷-A', '首贷-B', '首贷-C',
  '',
  '复贷-S', '复贷-A', '复贷-B', '复贷-C'
];

var rawData = [5, 13, 16, 22, null, 7, 33, 40, 13];
var firstTotal = 56;
var renewTotal = 93;

var labelData = [
  '5 人（8.9%）', '13 人（23.2%）', '16 人（28.6%）', '22 人（39.3%）',
  '',
  '7 人（7.5%）', '33 人（35.5%）', '40 人（43.0%）', '13 人（14.0%）'
];

var option = {
  backgroundColor: '#FFF8F0',
  title: {
    text: '首贷参评 56 人中 S 级仅 5 人（9%），复贷参评 93 人中 S 级 7 人（7.5%）',
    left: 20,
    top: 16,
    textStyle: {
      fontSize: 16,
      fontWeight: 600,
      color: '#333',
      width: 680,
      lineHeight: 24,
      overflow: 'break'
    }
  },
  grid: {
    left: 110,
    right: 100,
    top: 80,
    bottom: 30
  },
  xAxis: {
    type: 'value',
    max: 50,
    axisLabel: {
      color: '#999',
      fontSize: 12
    },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      show: true,
      lineStyle: {
        color: '#E8E0D8',
        type: 'dashed'
      }
    }
  },
  yAxis: {
    type: 'category',
    data: categories,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      fontSize: 13,
      color: '#555',
      fontWeight: 500,
      formatter: function(value) {
        return value === '' ? ' ' : value;
      }
    }
  },
  series: [{
    type: 'bar',
    data: rawData.map(function(val, i) {
      var isHighlight = (i === 0);
      var isGap = (i === 4);
      var item = {
        value: val,
        itemStyle: {
          color: isGap ? 'transparent' : (isHighlight ? '#CC6B1E' : '#C8C8C8'),
          borderRadius: isGap ? 0 : [0, 3, 3, 0]
        },
        label: {
          show: !isGap,
          position: 'right',
          formatter: labelData[i],
          color: isHighlight ? '#CC6B1E' : '#888',
          fontSize: 12,
          fontWeight: isHighlight ? 600 : 400
        }
      };
      if (isGap) {
        item.barWidth = 12;
      }
      return item;
    }),
    barCategoryGap: '30%'
  }],
  tooltip: { show: false },
  legend: { show: false },
  animation: true,
  animationDuration: 800,
  animationEasing: 'cubicOut'
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
