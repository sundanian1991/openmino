<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参评率对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFF8F0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  #chart { width: 720px; height: 320px; margin: 40px auto; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

var totalFirst = 120, evalFirst = 56, nonEvalFirst = 64;
var totalRenew = 223, evalRenew = 93, nonEvalRenew = 130;

function pct(v, t) { return (v / t * 100).toFixed(0); }

var option = {
  backgroundColor: '#FFF8F0',
  title: {
    text: '343 人中仅 43% 进入考核，194 人因出勤不足被排除',
    left: 20,
    top: 12,
    textStyle: { fontSize: 16, fontWeight: 600, color: '#333' }
  },
  grid: {
    left: 72,
    right: 160,
    top: 64,
    bottom: 36
  },
  xAxis: {
    type: 'value',
    max: 260,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { show: false },
    splitLine: { lineStyle: { color: '#E8E8E8', type: 'dashed' } }
  },
  yAxis: {
    type: 'category',
    data: ['首贷', '复贷'],
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { fontSize: 14, color: '#555', fontWeight: 500 }
  },
  animationDuration: 600,
  series: [
    {
      name: '参评',
      type: 'bar',
      stack: 'total',
      barWidth: 36,
      data: [
        {
          value: evalFirst,
          itemStyle: { color: '#B8B8B8' },
          label: {
            show: true,
            position: 'insideLeft',
            formatter: '参评 ' + evalFirst + '人 (' + pct(evalFirst, totalFirst) + '%)',
            fontSize: 12,
            color: '#fff',
            fontWeight: 500
          }
        },
        {
          value: evalRenew,
          itemStyle: { color: '#B8B8B8' },
          label: {
            show: true,
            position: 'insideLeft',
            formatter: '参评 ' + evalRenew + '人 (' + pct(evalRenew, totalRenew) + '%)',
            fontSize: 12,
            color: '#fff',
            fontWeight: 500
          }
        }
      ]
    },
    {
      name: '非参评',
      type: 'bar',
      stack: 'total',
      data: [
        {
          value: nonEvalFirst,
          itemStyle: { color: '#D9D9D9' },
          label: {
            show: true,
            position: 'insideRight',
            formatter: '非参评 ' + nonEvalFirst + '人 (' + pct(nonEvalFirst, totalFirst) + '%)',
            fontSize: 12,
            color: '#888',
            fontWeight: 500
          }
        },
        {
          value: nonEvalRenew,
          itemStyle: { color: '#CC6B1E' },
          label: {
            show: true,
            position: 'insideRight',
            formatter: '非参评 ' + nonEvalRenew + '人 (' + pct(nonEvalRenew, totalRenew) + '%)',
            fontSize: 13,
            color: '#fff',
            fontWeight: 600
          }
        }
      ]
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
