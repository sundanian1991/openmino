<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等级人均GMV对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFF8F0; display: flex; justify-content: center; padding: 32px 0; }
  #chart { width: 820px; height: 480px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

// 数据：从上到下 复贷S→C，间隔，首贷S→C
var categories = [
  '复贷 S', '复贷 A', '复贷 B', '复贷 C',
  ' ',
  '首贷 S', '首贷 A', '首贷 B', '首贷 C'
];

var values = [1417, 984, 663, 463, 0, 375.8, 255.1, 85.0, 55.7];

var option = {
  backgroundColor: '#FFF8F0',
  title: {
    text: '首贷 S 级人均 GMV 是 C 级的 6.7 倍，复贷 S 级人均 1417 万（是 C 级 3.1 倍）',
    left: 0,
    top: 0,
    textStyle: {
      fontSize: 16,
      fontWeight: 600,
      color: '#333',
      lineHeight: 24
    }
  },
  grid: {
    left: 90,
    right: 110,
    top: 60,
    bottom: 40
  },
  xAxis: {
    type: 'value',
    axisLabel: {
      color: '#999',
      fontSize: 12,
      formatter: '{value}'
    },
    splitLine: { show: false },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'category',
    data: categories,
    inverse: false,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: {
      fontSize: 13,
      color: '#666',
      formatter: function (value) {
        // 间隔行用空格占位，保持间距但不显示文字
        if (value.trim() === '') return ' ';
        return value;
      },
      rich: {
        highlight: {
          fontWeight: 'bold',
          color: '#CC6B1E'
        }
      }
    }
  },
  series: [{
    type: 'bar',
    data: values.map(function (v, i) {
      var isHighlight = (i === 5); // 首贷S
      var isEmpty = (v === 0);      // 间隔行
      var labelColor = isHighlight ? '#CC6B1E' : '#999';
      var barColor = isHighlight ? '#CC6B1E' : (isEmpty ? 'rgba(0,0,0,0)' : '#C8C8C8');

      var labelText = '';
      if (!isEmpty) {
        labelText = v >= 1000 ? v.toLocaleString() + ' 万' : v + ' 万';
      }

      return {
        value: v,
        itemStyle: {
          color: barColor,
          borderRadius: isHighlight ? [0, 3, 3, 0] : [0, 2, 2, 0]
        },
        label: {
          show: !isEmpty,
          position: 'right',
          formatter: labelText,
          color: labelColor,
          fontWeight: isHighlight ? '600' : 'normal',
          fontSize: isHighlight ? 13 : 12
        }
      };
    }),
    barCategoryGap: '30%'
  }]
};

chart.setOption(option);
window.addEventListener('resize', function () { chart.resize(); });
</script>
</body>
</html>
