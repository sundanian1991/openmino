<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#ccc;padding:20px}
h2{color:#e8ecf1;margin-bottom:12px;font-size:14px}
.chart-box{background:#222240;border-radius:8px;padding:16px;margin-bottom:16px}
.chart-box h3{color:#98a0ab;font-size:12px;margin-bottom:8px}
.chart-container{width:100%;height:220px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
</style>
</head>
<body>
<h2>ECharts 官网配色标准 — Red #c23531 + Navy #2f4554</h2>
<div class="row">
<div class="chart-box">
<h3>1. 折线图 — 达标率趋势</h3>
<div id="c1" class="chart-container"></div>
</div>
<div class="chart-box">
<h3>2. 柱状图 — 产能对比</h3>
<div id="c2" class="chart-container"></div>
</div>
</div>
<div class="row">
<div class="chart-box">
<h3>3. 饼图 — 供应商分布</h3>
<div id="c3" class="chart-container"></div>
</div>
<div class="chart-box">
<h3>4. 散点图 — 质量×准时率</h3>
<div id="c4" class="chart-container"></div>
</div>
</div>
<div class="row">
<div class="chart-box">
<h3>5. 双轴图 — 金额+达标率</h3>
<div id="c5" class="chart-container"></div>
</div>
<div class="chart-box">
<h3>6. 堆叠柱状图 — 分级占比</h3>
<div id="c6" class="chart-container"></div>
</div>
</div>
<div class="row">
<div class="chart-box">
<h3>7. 桑基图 — 供应商流向</h3>
<div id="c7" class="chart-container"></div>
</div>
<div class="chart-box">
<h3>8. 仪表盘 — 综合评分</h3>
<div id="c8" class="chart-container"></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js" onload="init()"></script>
<script>
var R='#c23531',N='#2f4554',G='#857d74',GRID='#e8ecf1',LABEL='#98a0ab';
var baseTheme={color:[R,N],backgroundColor:'transparent',animation:false,textStyle:{fontFamily:'system-ui,sans-serif'},grid:{top:10,right:14,bottom:22,left:36},xAxis:{axisLine:{lineStyle:{color:LABEL}},splitLine:{lineStyle:{color:GRID,type:'dashed'}},axisLabel:{color:LABEL,fontSize:11}},yAxis:{axisLine:{show:false},splitLine:{lineStyle:{color:GRID,type:'dashed'}},axisLabel:{color:LABEL,fontSize:11}},legend:{textStyle:{fontSize:10,color:LABEL}},tooltip:{textStyle:{fontSize:10}}};
function init(){
// 1. 折线图
var ch1=echarts.init(document.getElementById('c1'));
ch1.setOption({...baseTheme,xAxis:{...baseTheme.xAxis,data:['1月','2月','3月','4月','5月','6月']},yAxis:{...baseTheme.yAxis,max:100},series:[{name:'达标率',type:'line',smooth:true,data:[82,85,78,90,88,95],itemStyle:{color:R},lineStyle:{width:2.5},symbol:'circle',symbolSize:6,markLine:{data:[{type:'average',name:'平均值'}],lineStyle:{color:G,type:'dashed'},label:{color:G}}},{name:'目标',type:'line',data:[90,90,90,90,90,90],itemStyle:{color:N},lineStyle:{type:'dashed',width:1.5},symbol:'none'}]});

// 2. 柱状图
var ch2=echarts.init(document.getElementById('c2'));
ch2.setOption({...baseTheme,xAxis:{...baseTheme.xAxis,data:['毅航','毛毛虫','伽玛','赛维斯','岐力','翰锐']},yAxis:{...baseTheme.yAxis},series:[{type:'bar',barWidth:32,data:[320,280,250,210,180,160],itemStyle:{color:function(p){return[N,'#4a6274','#658094','#809fb0','#9bbecd','#b0d0e0'][p.dataIndex]}},label:{show:true,position:'top',color:LABEL,fontSize:10}}]});

// 3. 饼图
var ch3=echarts.init(document.getElementById('c3'));
ch3.setOption({...baseTheme,series:[{type:'pie',radius:['40%','65%'],center:['50%','55%'],data:[{value:35,name:'金条'},{value:25,name:'企金'},{value:20,name:'信用卡'},{value:20,name:'财富'}],itemStyle:{color:function(p){return[R,N,G,'#61a0a8'][p.dataIndex]}},label:{color:LABEL,fontSize:10},labelLine:{lineStyle:{color:LABEL}}}]});

// 4. 散点图
var ch4=echarts.init(document.getElementById('c4'));
ch4.setOption({...baseTheme,xAxis:{...baseTheme.xAxis,name:'质量分',nameTextStyle:{color:LABEL},min:60,max:100},yAxis:{...baseTheme.yAxis,name:'准时率%',nameTextStyle:{color:LABEL},min:60,max:100},series:[{type:'scatter',data:[[85,92],[78,85],[92,88],[70,75],[88,95],[95,90],[72,80],[80,78],[90,92],[68,70]],itemStyle:{color:R},symbolSize:10,markLine:{data:[{xAxis:85},{yAxis:85}],lineStyle:{color:N,type:'dashed'},label:{show:false}},markArea:{data:[[{xAxis:85,yAxis:85},{xAxis:100,yAxis:100}]],itemStyle:{color:'rgba(47,69,84,0.08)'}}}]});

// 5. 双轴图
var ch5=echarts.init(document.getElementById('c5'));
ch5.setOption({...baseTheme,xAxis:{...baseTheme.xAxis,data:['Q1','Q2','Q3','Q4']},yAxis:[{...baseTheme.yAxis,name:'金额(万)',nameTextStyle:{color:R}},{...baseTheme.yAxis,name:'达标率%',nameTextStyle:{color:N},max:100,position:'right'}],series:[{name:'金额',type:'bar',data:[1200,1500,1350,1800],itemStyle:{color:R},yAxisIndex:0},{name:'达标率',type:'line',data:[82,88,85,94],itemStyle:{color:N},lineStyle:{width:2.5},symbol:'circle',symbolSize:6,yAxisIndex:1}]});

// 6. 堆叠柱状图
var ch6=echarts.init(document.getElementById('c6'));
ch6.setOption({...baseTheme,xAxis:{...baseTheme.xAxis,data:['1月','2月','3月','4月','5月','6月']},yAxis:{...baseTheme.yAxis},legend:{data:['A级','B级','C级'],...baseTheme.legend},series:[{name:'A级',type:'bar',stack:'s',data:[12,15,18,20,22,25],itemStyle:{color:R}},{name:'B级',type:'bar',stack:'s',data:[10,12,11,13,14,12],itemStyle:{color:N}},{name:'C级',type:'bar',stack:'s',data:[5,4,3,4,3,2],itemStyle:{color:G}}]});

// 7. 桑基图
var ch7=echarts.init(document.getElementById('c7'));
ch7.setOption({...baseTheme,series:[{type:'sankey',data:[{name:'供应商'},{name:'金条'},{name:'企金'},{name:'信用卡'},{name:'财富'},{name:'A级'},{name:'B级'},{name:'C级'}],links:[{source:'供应商',target:'金条',value:35},{source:'供应商',target:'企金',value:25},{source:'供应商',target:'信用卡',value:20},{source:'供应商',target:'财富',value:20},{source:'金条',target:'A级',value:20},{source:'金条',target:'B级',value:10},{source:'金条',target:'C级',value:5},{source:'企金',target:'A级',value:12},{source:'企金',target:'B级',value:8},{source:'企金',target:'C级',value:5},{source:'信用卡',target:'A级',value:8},{source:'信用卡',target:'B级',value:7},{source:'信用卡',target:'C级',value:5},{source:'财富',target:'A级',value:6},{source:'财富',target:'B级',value:8},{source:'财富',target:'C级',value:6}],lineStyle:{color:'gradient',curveness:0.5},itemStyle:{color:function(p){return[R,N,G,'#61a0a8','#4a6274','#809fb0','#9bbecd','#b0d0e0'][p.dataIndex%8]}},label:{color:LABEL,fontSize:10}}]});

// 8. 仪表盘
var ch8=echarts.init(document.getElementById('c8'));
ch8.setOption({...baseTheme,series:[{type:'gauge',startAngle:200,endAngle:-20,min:0,max:100,splitNumber:10,data:[{value:87,name:'综合评分',title:{offsetCenter:[0,'80%'],color:LABEL,fontSize:12},detail:{offsetCenter:[0,'45%'],color:R,fontSize:28,fontWeight:600,formatter:'{value}分'}}],axisLine:{lineStyle:{width:12,color:[[0.3,R],[0.7,N],[1,G]]}},axisTick:{show:false},splitLine:{length:8,lineStyle:{color:LABEL}},axisLabel:{color:LABEL,fontSize:10},pointer:{itemStyle:{color:'auto'},width:5},detail:{formatter:'{value}分',color:LABEL}}]});
}
if(window.echarts)init();
</script>
</body>
</html>
