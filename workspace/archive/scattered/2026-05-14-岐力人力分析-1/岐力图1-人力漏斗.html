<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐力职场人力漏斗</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #F5F3F0;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #chart {
    width: 900px;
    height: 500px;
  }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

// 瀑布图数据：4段
// 1. 起始 118
// 2. 非参评 -73（剩45）
// 3. 出勤不足 -24（剩21）
// 4. 终点 21

var categories = ['总坐席', '非参评', '出勤不足', '有效产出'];
var values =    [118,     -73,      -24,       21];

// 计算 stacked 基底
// 透明底柱（定位用）
var invisible = [0, 45, 21, 0];
// 正值柱（增长/起始/终点）
var positive =  [118, 0,  0,  21];
// 负值柱绝对值（衰减段）
var negative =  [0,   73, 24, 0];

// 柱顶标注文字
var topLabels = [
  '118人',
  '-73人',
  '-24人',
  '21人'
];

// 剩余值（柱顶位置）
var remainValues = [118, 45, 21, 21];

var option = {
  animation: false,
  grid: {
    left: 60,
    right: 160,
    top: 80,
    bottom: 60
  },
  title: [
    {
      text: '118人的职场，只有21人在战斗',
      left: 60,
      top: 16,
      textStyle: {
        fontSize: 16,
        fontWeight: 600,
        color: '#4F302D',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    },
    {
      text: '岐力职场人力漏斗 | 2026.05.14 近30天数据',
      left: 60,
      top: 40,
      textStyle: {
        fontSize: 11,
        fontWeight: 400,
        color: '#ACA9A2',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    }
  ],
  graphic: [
    {
      type: 'text',
      left: 'center',
      bottom: 12,
      style: {
        text: '数据来源：岐力职场管户金条复贷线 2026.05.14 截面数据',
        fontSize: 10,
        fontWeight: 400,
        fill: '#ACA9A2',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    }
  ],
  xAxis: {
    type: 'category',
    data: categories,
    axisLine: { lineStyle: { color: '#ACA9A2' } },
    axisTick: { show: false },
    axisLabel: {
      fontSize: 12,
      color: '#87867F',
      fontFamily: 'system-ui, -apple-system, sans-serif'
    }
  },
  yAxis: {
    type: 'value',
    max: 130,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      lineStyle: { color: '#E8E6E3', type: 'dashed' }
    },
    axisLabel: {
      fontSize: 10,
      color: '#ACA9A2',
      fontFamily: 'system-ui, -apple-system, sans-serif'
    }
  },
  series: [
    // 透明底柱
    {
      name: '基底',
      type: 'bar',
      stack: 'waterfall',
      barWidth: 56,
      itemStyle: { color: 'transparent' },
      data: invisible,
      label: {
        show: true,
        position: 'top',
        formatter: function(params) {
          // 只在正值段（索引0和3）显示顶部标注
          if (params.dataIndex === 0 || params.dataIndex === 3) {
            return topLabels[params.dataIndex];
          }
          return '';
        },
        fontSize: 13,
        fontWeight: 600,
        color: '#4F302D',
        fontFamily: 'system-ui, -apple-system, sans-serif',
        distance: 6
      }
    },
    // 正值柱（起始+终点）
    {
      name: '正值',
      type: 'bar',
      stack: 'waterfall',
      itemStyle: {
        color: function(params) {
          // 终点柱用稍深主色加粗感
          return params.dataIndex === 3 ? '#C06840' : '#D97757';
        },
        borderRadius: [3, 3, 3, 3]
      },
      data: positive,
      label: {
        show: true,
        position: function(params) {
          return 'insideTop';
        },
        formatter: function(params) {
          if (params.dataIndex === 0) return '';
          if (params.dataIndex === 3) return '21人';
          return '';
        },
        fontSize: 13,
        fontWeight: 600,
        color: '#FFF',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    },
    // 负值柱（衰减段）
    {
      name: '衰减',
      type: 'bar',
      stack: 'waterfall',
      itemStyle: {
        color: function(params) {
          // 非参评用 Danger，出勤不足用 Gray
          if (params.dataIndex === 1) return '#B04A4A';
          if (params.dataIndex === 2) return '#ACA9A2';
          return '#ACA9A2';
        },
        borderRadius: [0, 0, 3, 3]
      },
      data: negative,
      label: {
        show: true,
        position: 'top',
        formatter: function(params) {
          if (params.dataIndex === 1) return '-73人';
          if (params.dataIndex === 2) return '-24人';
          return '';
        },
        fontSize: 13,
        fontWeight: 600,
        color: function(params) {
          if (params.dataIndex === 1) return '#B04A4A';
          if (params.dataIndex === 2) return '#87867F';
          return '#87867F';
        },
        fontFamily: 'system-ui, -apple-system, sans-serif',
        distance: 6
      }
    },
    // 连接线（用 markLine 实现）
    {
      name: '连接线',
      type: 'bar',
      stack: 'connector',
      barWidth: 0,
      data: [],
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: {
          color: '#ACA9A2',
          type: 'dashed',
          width: 1
        },
        data: [
          // 从总坐席顶到非参评底
          [
            { coord: [0, 118] },
            { coord: [1, 118] }
          ],
          // 从总坐席底（118-73=45）到非参评底（=45）
          [
            { coord: [0, 45] },
            { coord: [1, 45] }
          ],
          // 从非参评底（45）到出勤不足底
          [
            { coord: [1, 45] },
            { coord: [2, 45] }
          ],
          // 从非参评底-24=21 到出勤不足底
          [
            { coord: [1, 21] },
            { coord: [2, 21] }
          ],
          // 从出勤不足底（21）到终点顶
          [
            { coord: [2, 21] },
            { coord: [3, 21] }
          ]
        ]
      }
    }
  ]
};

// 用 graphic 添加非参评段的右侧标注
// 需要等 chart 渲染后再计算位置
chart.setOption(option);

// 延迟添加标注，确保坐标系已就绪
setTimeout(function() {
  // 获取非参评柱（index=1）的像素位置
  var point = chart.convertToPixel({xAxisIndex: 0, yAxisIndex: 0}, [1, 45]);
  var pointBottom = chart.convertToPixel({xAxisIndex: 0, yAxisIndex: 0}, [1, 118]);

  // 中间 y 位置
  var midY = (point[1] + pointBottom[1]) / 2;

  chart.setOption({
    graphic: [
      {
        type: 'text',
        left: 'center',
        bottom: 12,
        style: {
          text: '数据来源：岐力职场管户金条复贷线 2026.05.14 截面数据',
          fontSize: 10,
          fontWeight: 400,
          fill: '#ACA9A2',
          fontFamily: 'system-ui, -apple-system, sans-serif'
        }
      },
      {
        type: 'group',
        left: point[0] + 40,
        top: midY - 20,
        children: [
          {
            type: 'rect',
            shape: { x: 0, y: 0, width: 140, height: 36, r: 4 },
            style: {
              fill: '#FEF0ED',
              stroke: '#B04A4A',
              lineWidth: 1
            }
          },
          {
            type: 'text',
            style: {
              text: '非参评率 62%',
              x: 70,
              y: 10,
              textAlign: 'center',
              fontSize: 11,
              fontWeight: 600,
              fill: '#B04A4A',
              fontFamily: 'system-ui, -apple-system, sans-serif'
            }
          },
          {
            type: 'text',
            style: {
              text: '最大出血点',
              x: 70,
              y: 24,
              textAlign: 'center',
              fontSize: 10,
              fontWeight: 400,
              fill: '#B04A4A',
              fontFamily: 'system-ui, -apple-system, sans-serif'
            }
          }
        ]
      },
      // 连接线：从非参评柱右边缘到标注框左边
      {
        type: 'line',
        shape: { x1: point[0] + 28, y1: midY, x2: point[0] + 40, y2: midY },
        style: {
          stroke: '#B04A4A',
          lineWidth: 1,
          lineDash: [3, 3]
        }
      }
    ]
  });
}, 100);

window.addEventListener('resize', function() {
  chart.resize();
});
</script>
</body>
</html>
