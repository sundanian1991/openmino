<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>岐力职场各入职批次留存率</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, Helvetica Neue, sans-serif; }
  #chart { width: 900px; height: 400px; }
</style>
</head>
<body>
<div id="chart"></div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
var chart = echarts.init(document.getElementById('chart'));

var months = ['2025/6月','7月','9月','10月','11月','12月','2026/1月','2月','3月','4月','5月'];
var entryData   = [7, 3, 2, 3, 3, 3, 5, 2, 46, 21, 23];
var retainData  = [3, 1, 2, 0, 3, 2, 2, 1, 27, 13, 20];
var rateData    = [43, 33, 100, 0, 100, 67, 40, 50, 59, 62, 87];

// 柱状颜色：3月用红色高亮，其余灰色
var barColors = entryData.map(function(v, i) {
  return i === 8 ? '#B04A4A' : '#ACA9A2';
});

var option = {
  animation: false,
  title: {
    text: '3月集中招聘46人，仅59%留存',
    subtext: '岐力职场各入职批次留存率 · 流失19人中含8名GMV≥500万熟手',
    left: 'center',
    top: 8,
    textStyle: { fontSize: 15, fontWeight: 600, color: '#4F302D', fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    subtextStyle: { fontSize: 11, fontWeight: 400, color: '#87867F', fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#fff',
    borderColor: '#E3DACC',
    textStyle: { color: '#4F302D', fontSize: 12 },
    formatter: function(params) {
      var bar = params[0];
      var line = params[1];
      return '<b>' + bar.axisValue + '</b><br/>' +
        '入职人数：' + bar.value + '<br/>' +
        '留存人数：' + retainData[bar.dataIndex] + '<br/>' +
        '留存率：' + line.value + '%';
    }
  },
  grid: {
    left: 60,
    right: 65,
    top: 75,
    bottom: 50
  },
  xAxis: {
    type: 'category',
    data: months,
    axisLine: { lineStyle: { color: '#ACA9A2' } },
    axisTick: { show: false },
    axisLabel: { color: '#87867F', fontSize: 11, fontWeight: 400, fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
  },
  yAxis: [
    {
      type: 'value',
      name: '人数',
      nameTextStyle: { color: '#87867F', fontSize: 10, fontWeight: 400 },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { lineStyle: { color: '#F0EEE6' } },
      axisLabel: { color: '#87867F', fontSize: 10, fontWeight: 400 }
    },
    {
      type: 'value',
      name: '留存率',
      nameTextStyle: { color: '#87867F', fontSize: 10, fontWeight: 400 },
      min: 0,
      max: 100,
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: false },
      axisLabel: { color: '#87867F', fontSize: 10, fontWeight: 400, formatter: '{value}%' }
    }
  ],
  series: [
    {
      name: '入职人数',
      type: 'bar',
      yAxisIndex: 0,
      barWidth: 22,
      data: entryData.map(function(v, i) {
        return {
          value: v,
          itemStyle: { color: barColors[i] }
        };
      }),
      label: {
        show: false
      },
      markPoint: {
        symbol: 'pin',
        symbolSize: 0,
        data: [
          {
            coord: [8, 46],
            label: {
              show: true,
              formatter: '入46人',
              color: '#B04A4A',
              fontSize: 12,
              fontWeight: 600,
              fontFamily: 'system-ui, Helvetica Neue, sans-serif',
              position: 'insideTop',
              offset: [0, -8]
            },
            itemStyle: { color: 'transparent' }
          },
          {
            coord: [8, 27],
            label: {
              show: true,
              formatter: '流失19人\n含8名GMV≥500万熟手',
              color: '#B04A4A',
              fontSize: 9,
              fontWeight: 400,
              fontFamily: 'system-ui, Helvetica Neue, sans-serif',
              lineHeight: 14,
              position: 'insideTop',
              offset: [40, -30]
            },
            itemStyle: { color: 'transparent' }
          }
        ]
      }
    },
    {
      name: '留存率',
      type: 'line',
      yAxisIndex: 1,
      smooth: false,
      lineStyle: { color: '#87867F', width: 1.5 },
      symbol: function(value, params) {
        return params.dataIndex === 8 ? 'circle' : 'circle';
      },
      symbolSize: function(value, params) {
        return params.dataIndex === 8 ? 10 : 5;
      },
      itemStyle: function(params) {
        return {
          color: params.dataIndex === 8 ? '#B04A4A' : '#87867F'
        };
      },
      data: rateData,
      markPoint: {
        symbol: 'pin',
        symbolSize: 0,
        data: [
          {
            coord: [8, 59],
            label: {
              show: true,
              formatter: '59%',
              color: '#B04A4A',
              fontSize: 12,
              fontWeight: 600,
              fontFamily: 'system-ui, Helvetica Neue, sans-serif',
              position: 'insideTop',
              offset: [0, -10]
            },
            itemStyle: { color: 'transparent' }
          },
          {
            coord: [10, 87],
            label: {
              show: true,
              formatter: '(不足1月)',
              color: '#87867F',
              fontSize: 9,
              fontWeight: 400,
              fontFamily: 'system-ui, Helvetica Neue, sans-serif',
              position: 'insideTop',
              offset: [0, -10]
            },
            itemStyle: { color: 'transparent' }
          }
        ]
      }
    }
  ],
  graphic: [
    {
      type: 'text',
      left: 'center',
      bottom: 8,
      style: {
        text: '数据来源：岐力职场人力分析 · 5月批次入职不足1个月，留存率偏高为自然现象',
        fontSize: 9,
        fontWeight: 400,
        fill: '#ACA9A2',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
