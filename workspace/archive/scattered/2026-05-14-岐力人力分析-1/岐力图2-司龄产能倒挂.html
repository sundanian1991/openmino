<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司龄与产能倒挂</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: system-ui, -apple-system, sans-serif; }
  #chart { width: 900px; height: 500px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var categories = [
  'MOB6-12（>180天）',
  'MOB3-6（90-180天）',
  'MOB1-3（30-90天）',
  'MOB1-（<30天）'
];

var headcountPct = [12, 13, 31, 44];
var gmvPct       = [30.7, 36, 33, 0.3];

chart.setOption({
  animation: false,
  grid: {
    left: 140,
    right: 140,
    top: 80,
    bottom: 55
  },
  title: [
    {
      text: '近一半的人几乎不产出——司龄与产能严重倒挂',
      left: 'center',
      top: 12,
      textStyle: {
        fontSize: 16,
        fontWeight: 600,
        color: '#4F302D',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    },
    {
      text: '岐力职场按司龄分段 | 2026.05.14 近30天数据',
      left: 'center',
      top: 36,
      textStyle: {
        fontSize: 11,
        fontWeight: 400,
        color: '#ACA9A2',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }
    }
  ],
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(params) {
      var idx = params[0].dataIndex;
      var hc = headcountPct[idx];
      var gmv = gmvPct[idx];
      return '<b>' + categories[idx] + '</b><br/>' +
             '人数占比：' + hc + '%<br/>' +
             'GMV占比：' + gmv + '%';
    }
  },
  xAxis: {
    type: 'value',
    min: -50,
    max: 50,
    interval: 10,
    axisLabel: {
      formatter: function(v) { return Math.abs(v) + '%'; },
      fontSize: 10,
      color: '#ACA9A2',
      fontFamily: 'system-ui, -apple-system, sans-serif'
    },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      lineStyle: { color: '#E8E6E1', type: 'dashed' }
    }
  },
  yAxis: {
    type: 'category',
    data: categories,
    inverse: true,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      fontSize: 11,
      color: '#4F302D',
      fontWeight: 500,
      fontFamily: 'system-ui, -apple-system, sans-serif'
    }
  },
  series: [
    {
      name: '人数占比',
      type: 'bar',
      data: headcountPct.map(function(v, i) {
        var isHero = (i === 3);
        return {
          value: -v,
          itemStyle: {
            color: isHero ? '#B04A4A' : '#D97757',
            borderRadius: [4, 0, 0, 4]
          },
          label: {
            show: true,
            position: 'left',
            formatter: function(p) { return Math.abs(p.value) + '%'; },
            fontSize: 11,
            fontWeight: isHero ? 700 : 400,
            color: isHero ? '#B04A4A' : '#87867F',
            fontFamily: 'system-ui, -apple-system, sans-serif'
          }
        };
      }),
      barWidth: 26,
      z: 2
    },
    {
      name: 'GMV占比',
      type: 'bar',
      data: gmvPct.map(function(v, i) {
        var isHero = (i === 3);
        return {
          value: v,
          itemStyle: {
            color: '#788C5D',
            borderRadius: [0, 4, 4, 0]
          },
          label: {
            show: true,
            position: 'right',
            formatter: function(p) { return p.value + '%'; },
            fontSize: 11,
            fontWeight: 400,
            color: '#788C5D',
            fontFamily: 'system-ui, -apple-system, sans-serif'
          },
          markPoint: isHero ? {
            symbol: 'pin',
            symbolSize: 1,
            silent: true,
            data: [{
              coord: [0.3, 3],
              label: {
                show: true,
                formatter: '44%人数 → 0.3%GMV',
                fontSize: 10,
                fontWeight: 600,
                color: '#B04A4A',
                fontFamily: 'system-ui, -apple-system, sans-serif',
                backgroundColor: 'rgba(255,255,255,0.9)',
                padding: [4, 8],
                borderRadius: 3
              },
              itemStyle: { color: 'transparent' }
            }],
            animation: false
          } : undefined
        };
      }),
      barWidth: 26,
      z: 2
    }
  ],
  graphic: [
    {
      type: 'text',
      left: 'center',
      bottom: 20,
      style: {
        text: '数据来源：岐力职场管户金条复贷线 2026.05.14 截面数据 | GMV为复贷GMV',
        fontSize: 10,
        fontWeight: 400,
        fill: '#ACA9A2',
        fontFamily: 'system-ui, -apple-system, sans-serif',
        textAlign: 'center'
      }
    },
    {
      type: 'group',
      left: 'center',
      top: 56,
      children: [
        {
          type: 'text',
          style: {
            text: '← 人数占比',
            fontSize: 10,
            fill: '#D97757',
            fontFamily: 'system-ui, -apple-system, sans-serif',
            textAlign: 'right',
            x: -8
          }
        },
        {
          type: 'text',
          style: {
            text: 'GMV占比 →',
            fontSize: 10,
            fill: '#788C5D',
            fontFamily: 'system-ui, -apple-system, sans-serif',
            textAlign: 'left',
            x: 8
          }
        }
      ]
    }
  ]
});

window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
