<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐力职场复贷线人力分布</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFFFFF; font-family: system-ui, Helvetica Neue, sans-serif; }
  #chart { width: 800px; height: 400px; margin: 0 auto; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var categories = ['MOB6-12', 'MOB3-6', 'MOB1-3', 'MOB1-', '汇总'];

var option = {
  animation: false,
  title: {
    text: '118人中仅34人达标参评——超过七成人力当前未达标参评',
    subtext: '岐力职场复贷线 · 2025-06至2026-05-12 · 在职口径：5.11-12有有效外呼',
    left: 20,
    top: 8,
    textStyle: { fontSize: 15, fontWeight: 600, color: '#4F302D', fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    subtextStyle: { fontSize: 11, fontWeight: 400, color: '#87867F', fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
  },
  legend: {
    data: ['在职参评', '在职不参评', '已流失'],
    bottom: 0,
    left: 'center',
    itemWidth: 12,
    itemHeight: 12,
    textStyle: { fontSize: 11, fontFamily: 'system-ui, Helvetica Neue, sans-serif', color: '#4D4D4A' }
  },
  grid: {
    left: 80,
    right: 120,
    top: 65,
    bottom: 35,
    containLabel: false
  },
  xAxis: {
    type: 'value',
    max: 130,
    axisLabel: { fontSize: 11, color: '#87867F', fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { lineStyle: { color: '#F0EEE6', type: 'dashed' } }
  },
  yAxis: {
    type: 'category',
    data: categories,
    inverse: false,
    axisLabel: {
      fontSize: 11,
      fontWeight: 400,
      color: '#4D4D4A',
      fontFamily: 'system-ui, Helvetica Neue, sans-serif',
      formatter: function(value) {
        var labels = { 'MOB1-': 'MOB1-（36人）', 'MOB1-3': 'MOB1-3（57人）', 'MOB3-6': 'MOB3-6（10人）', 'MOB6-12': 'MOB6-12（15人）', '汇总': '汇总（118人）' };
        return labels[value] || value;
      }
    },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  graphic: [
    {
      type: 'line',
      left: 78,
      right: 118,
      top: 114,
      shape: { x1: 0, y1: 0, x2: 1, y2: 0 },
      style: { stroke: '#ACA9A2', lineWidth: 1, lineDash: [4, 3] },
      z: 100
    },
    {
      type: 'group',
      right: 15,
      top: 15,
      children: [
        {
          type: 'text',
          style: {
            text: '有效人力占比',
            fill: '#87867F',
            fontSize: 10,
            fontFamily: 'system-ui, Helvetica Neue, sans-serif',
            fontWeight: 400,
            textAlign: 'center',
            x: 50
          }
        },
        {
          type: 'text',
          style: {
            text: '29%',
            fill: '#4F302D',
            fontSize: 26,
            fontFamily: 'system-ui, Helvetica Neue, sans-serif',
            fontWeight: 600,
            textAlign: 'center',
            x: 50,
            y: 22
          }
        }
      ]
    },
    {
      type: 'text',
      left: 80,
      bottom: 14,
      style: {
        text: '数据来源：岐力职场人力分析 · 在职口径：2026-05-11/12有有效外呼记录',
        fill: '#ACA9A2',
        fontSize: 9,
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        fontWeight: 400
      }
    }
  ],
  series: [
    {
      name: '在职参评',
      type: 'bar',
      stack: 'total',
      barWidth: 24,
      itemStyle: { color: '#D97757' },
      label: {
        show: true,
        position: 'inside',
        fontSize: 11,
        fontWeight: 600,
        color: '#FFFFFF',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        formatter: function(p) { return p.value > 0 ? p.value : ''; }
      },
      data: [5, 6, 23, 0, 34]
    },
    {
      name: '在职不参评',
      type: 'bar',
      stack: 'total',
      itemStyle: { color: '#ACA9A2' },
      label: {
        show: true,
        position: 'inside',
        fontSize: 11,
        fontWeight: 600,
        color: '#FFFFFF',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        formatter: function(p) { return p.value > 0 ? p.value : ''; }
      },
      data: [1, 0, 11, 28, 40]
    },
    {
      name: '已流失',
      type: 'bar',
      stack: 'total',
      itemStyle: { color: '#B04A4A', borderRadius: [0, 2, 2, 0] },
      label: {
        show: true,
        position: 'inside',
        fontSize: 11,
        fontWeight: 600,
        color: '#FFFFFF',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        formatter: function(p) { return p.value > 0 ? p.value : ''; }
      },
      data: [9, 4, 23, 8, 44]
    },
    {
      name: '流失率标注',
      type: 'scatter',
      symbol: 'none',
      data: [[118 + 3, 4]],
      label: {
        show: true,
        position: 'right',
        formatter: '37%流失率',
        fontSize: 11,
        fontWeight: 600,
        color: '#B04A4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      },
      tooltip: { show: false }
    }
  ],
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    backgroundColor: '#FFFFFF',
    borderColor: '#E3DACC',
    borderWidth: 1,
    textStyle: { color: '#4D4D4A', fontSize: 12, fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    formatter: function(params) {
      var cat = params[0].axisValue;
      var labels = { 'MOB1-': 'MOB1-（36人）', 'MOB1-3': 'MOB1-3（57人）', 'MOB3-6': 'MOB3-6（10人）', 'MOB6-12': 'MOB6-12（15人）', '汇总': '汇总（118人）' };
      var html = '<b>' + (labels[cat] || cat) + '</b><br/>';
      params.forEach(function(p) {
        if (p.seriesName !== '流失率标注') {
          html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + p.color + ';margin-right:6px;"></span>' + p.seriesName + '：' + p.value + '人<br/>';
        }
      });
      return html;
    }
  }
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
