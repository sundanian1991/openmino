<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三条改善路径，最大杠杆在C级提效</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, Helvetica Neue, sans-serif; }
  .chart-wrap { width: 900px; height: 350px; }
</style>
</head>
<body>
<div class="chart-wrap" id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var option = {
  animation: false,
  title: {
    text: '三条改善路径，最大杠杆在C级提效',
    textStyle: { fontSize: 15, fontWeight: 600, color: '#4F302D', fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    subtext: '岐力职场人力结构优化目标 · 17人若提升到B级，预期增量超3800万',
    subtextStyle: { fontSize: 11, fontWeight: 400, color: '#87867F', fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    left: 12,
    top: 8
  },
  grid: {
    left: 155,
    right: 265,
    top: 65,
    bottom: 50
  },
  xAxis: {
    type: 'value',
    max: 22,
    show: false
  },
  yAxis: {
    type: 'category',
    data: [
      '{gray|缩短新人爬坡（10人）}',
      '{red|提升C级（17人）}',
      '{clay|稳住核心（8人）}'
    ],
    inverse: true,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: {
      fontSize: 13,
      fontWeight: 600,
      color: '#4D4D4A',
      fontFamily: 'system-ui, Helvetica Neue, sans-serif',
      margin: 12,
      rich: {
        clay: { color: '#D97757', fontWeight: 600, fontSize: 13, fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
        red: { color: '#B04A4A', fontWeight: 600, fontSize: 13, fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
        gray: { color: '#87867F', fontWeight: 600, fontSize: 13, fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
      }
    }
  },
  series: [
    {
      name: '稳住核心',
      type: 'bar',
      barWidth: 30,
      barGap: '-100%',
      data: [
        { value: 0, itemStyle: { color: 'transparent' } },
        { value: 0, itemStyle: { color: 'transparent' } },
        {
          value: 8,
          itemStyle: { color: '#D97757' },
          label: {
            show: true,
            position: 'right',
            formatter: '0流失，保住月产出7120万',
            fontSize: 11,
            fontWeight: 400,
            color: '#D97757',
            fontFamily: 'system-ui, Helvetica Neue, sans-serif'
          }
        }
      ]
    },
    {
      name: '提升C级',
      type: 'bar',
      barWidth: 40,
      barGap: '-100%',
      data: [
        { value: 0, itemStyle: { color: 'transparent' } },
        {
          value: 17,
          itemStyle: { color: '#B04A4A' },
          label: {
            show: true,
            position: 'right',
            formatter: '{maxLever|最大杠杆点}\n{calcLine|推算：B级人均702 - C级人均478 = 224万/人 × 17 = 3808万}',
            rich: {
              maxLever: { fontSize: 14, fontWeight: 600, color: '#B04A4A', lineHeight: 22, fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
              calcLine: { fontSize: 10, fontWeight: 400, color: '#B04A4A', lineHeight: 16, fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
            }
          }
        },
        { value: 0, itemStyle: { color: 'transparent' } }
      ]
    },
    {
      name: '缩短新人爬坡',
      type: 'bar',
      barWidth: 30,
      barGap: '-100%',
      data: [
        {
          value: 10,
          itemStyle: { color: '#87867F' },
          label: {
            show: true,
            position: 'right',
            formatter: '推动达标参评，增量待估',
            fontSize: 11,
            fontWeight: 400,
            color: '#87867F',
            fontFamily: 'system-ui, Helvetica Neue, sans-serif'
          }
        },
        { value: 0, itemStyle: { color: 'transparent' } },
        { value: 0, itemStyle: { color: 'transparent' } }
      ]
    }
  ],
  graphic: [
    {
      type: 'text',
      right: 20,
      bottom: 10,
      style: {
        text: '数据来源：岐力职场人力分析 · 改善路径基于当前数据结构推导，预期增量为理论推算',
        fontSize: 9,
        fontWeight: 400,
        fill: '#ACA9A2',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        textAlign: 'right'
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
