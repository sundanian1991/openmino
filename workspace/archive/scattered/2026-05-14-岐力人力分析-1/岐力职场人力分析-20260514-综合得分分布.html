<!DOCTYPE html>
<html lang="zh-CN">
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>

  body { font-family: system-ui, -apple-system, sans-serif; background: #fff; }
  .chart-wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 24px 16px 16px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; text-align: center; }
  canvas { width: 100% !important; height: 480px !important; }
</style>
</head>
<body>
<div class="chart-wrap">
  <h1>参评坐席综合得分分布</h1>
  <canvas id="scatterChart"></canvas>
</div>
<script>

  var ctx = document.getElementById('scatterChart');

  var datasets = [{"label": "S级", "data": [{"x": 1, "y": 77.81, "name": "言莹", "rank": "88", "grade": "S", "seniority": "MOB1-3", "gmv": "1110"}], "backgroundColor": "#b88018", "borderColor": "#b88018", "pointRadius": 12, "pointHoverRadius": 16}, {"label": "A级", "data": [{"x": 2, "y": 67.42, "name": "邓清清", "rank": "153", "grade": "A", "seniority": "MOB6-12", "gmv": "814.22"}, {"x": 3, "y": 66.33, "name": "吴珍珍", "rank": "161", "grade": "A", "seniority": "MOB1-3", "gmv": "841.09"}, {"x": 4, "y": 65.67, "name": "徐锦", "rank": "165", "grade": "A", "seniority": "MOB1-3", "gmv": "971.56"}, {"x": 5, "y": 60.24, "name": "刘莉莉", "rank": "211", "grade": "A", "seniority": "MOB6-12", "gmv": "639.7"}, {"x": 6, "y": 57.73, "name": "彭科", "rank": "228", "grade": "A", "seniority": "MOB1-3", "gmv": "1030"}, {"x": 7, "y": 57.19, "name": "蔡子虎", "rank": "234", "grade": "A", "seniority": "MOB6-12", "gmv": "886.7"}, {"x": 8, "y": 55.32, "name": "黎鑫", "rank": "246", "grade": "A", "seniority": "MOB1-3", "gmv": "855.79"}, {"x": 9, "y": 54.22, "name": "郑民", "rank": "257", "grade": "A", "seniority": "MOB3-6", "gmv": "811.75"}, {"x": 10, "y": 53.2, "name": "颜樱", "rank": "261", "grade": "A", "seniority": "MOB1-3", "gmv": "782.08"}], "backgroundColor": "#2e8b6e", "borderColor": "#2e8b6e", "pointRadius": 8, "pointHoverRadius": 12}, {"label": "B级", "data": [{"x": 11, "y": 48.04, "name": "刘强", "rank": "299", "grade": "B", "seniority": "MOB1-3", "gmv": "814.95"}, {"x": 12, "y": 47.04, "name": "熊晨", "rank": "311", "grade": "B", "seniority": "MOB3-6", "gmv": "849.15"}, {"x": 13, "y": 43.75, "name": "胡帅", "rank": "336", "grade": "B", "seniority": "MOB1-3", "gmv": "597.34"}, {"x": 14, "y": 42.74, "name": "龚梅", "rank": "347", "grade": "B", "seniority": "MOB1-3", "gmv": "613.45"}, {"x": 15, "y": 41.09, "name": "黄素云", "rank": "363", "grade": "B", "seniority": "MOB1-3", "gmv": "743.67"}, {"x": 16, "y": 37.46, "name": "刘玉立", "rank": "392", "grade": "B", "seniority": "MOB1-3", "gmv": "844.68"}, {"x": 17, "y": 36.93, "name": "杨丹丹", "rank": "396", "grade": "B", "seniority": "MOB1-3", "gmv": "756.61"}, {"x": 18, "y": 35.3, "name": "龚洋洋", "rank": "405", "grade": "B", "seniority": "MOB1-3", "gmv": "709.02"}, {"x": 19, "y": 34.54, "name": "张爱飞", "rank": "411", "grade": "B", "seniority": "MOB1-3", "gmv": "466.56"}, {"x": 20, "y": 31.59, "name": "杨文婷", "rank": "433", "grade": "B", "seniority": "MOB1-3", "gmv": "623.77"}, {"x": 21, "y": 31.03, "name": "罗豪", "rank": "442", "grade": "B", "seniority": "MOB1-3", "gmv": "871.01"}, {"x": 22, "y": 29.65, "name": "余学伟", "rank": "451", "grade": "B", "seniority": "MOB1-3", "gmv": "653.41"}, {"x": 23, "y": 28.15, "name": "陈家伟", "rank": "464", "grade": "B", "seniority": "MOB1-3", "gmv": "729.2"}], "backgroundColor": "#3a7ab8", "borderColor": "#3a7ab8", "pointRadius": 8, "pointHoverRadius": 12}, {"label": "C级", "data": [{"x": 24, "y": 26.45, "name": "刘波波", "rank": "480", "grade": "C", "seniority": "MOB6-12", "gmv": "768.93"}, {"x": 25, "y": 26.43, "name": "徐鸿宇", "rank": "481", "grade": "C", "seniority": "MOB1-3", "gmv": "561.89"}, {"x": 26, "y": 24.18, "name": "王诗琦", "rank": "496", "grade": "C", "seniority": "MOB1-3", "gmv": "421.9"}, {"x": 27, "y": 24.02, "name": "熊智", "rank": "499", "grade": "C", "seniority": "MOB1-3", "gmv": "601.74"}, {"x": 28, "y": 23.84, "name": "罗来江", "rank": "501", "grade": "C", "seniority": "MOB3-6", "gmv": "594.71"}, {"x": 29, "y": 20.31, "name": "易慕康", "rank": "529", "grade": "C", "seniority": "MOB1-3", "gmv": "594.53"}, {"x": 30, "y": 20.19, "name": "张波", "rank": "532", "grade": "C", "seniority": "MOB1-3", "gmv": "443.85"}, {"x": 31, "y": 18.41, "name": "熊仕铭", "rank": "536", "grade": "C", "seniority": "MOB3-6", "gmv": "486.79"}, {"x": 32, "y": 17.28, "name": "程芬芬", "rank": "545", "grade": "C", "seniority": "MOB1-3", "gmv": "409"}, {"x": 33, "y": 15.69, "name": "李博闻", "rank": "553", "grade": "C", "seniority": "MOB1-3", "gmv": "443.9"}, {"x": 34, "y": 15.64, "name": "徐志雄", "rank": "554", "grade": "C", "seniority": "MOB3-6", "gmv": "530.09"}, {"x": 35, "y": 14.56, "name": "吴文豪", "rank": "561", "grade": "C", "seniority": "MOB1-3", "gmv": "548.95"}, {"x": 36, "y": 9.89, "name": "齐梦华", "rank": "578", "grade": "C", "seniority": "MOB6-12", "gmv": "419.43"}, {"x": 37, "y": 8.54, "name": "邹泽勇", "rank": "583", "grade": "C", "seniority": "MOB1-3", "gmv": "344.77"}, {"x": 38, "y": 7.96, "name": "徐乐富", "rank": "586", "grade": "C", "seniority": "MOB3-6", "gmv": "271.05"}, {"x": 39, "y": 7.77, "name": "冯子豪", "rank": "587", "grade": "C", "seniority": "MOB1-3", "gmv": "335.49"}, {"x": 40, "y": 3.95, "name": "刘智帆", "rank": "591", "grade": "C", "seniority": "MOB1-3", "gmv": "348.11"}], "backgroundColor": "#c25030", "borderColor": "#c25030", "pointRadius": 8, "pointHoverRadius": 12}];
  var annotations = [{"x": 1, "y": 77.81, "label": "言莹", "offset": 14}, {"x": 40, "y": 3.95, "label": "刘智帆", "offset": -16}];
  var avgScore = 34.69;
  var totalPoints = 40;

  // custom plugin: draw mean line + labels
  var meanLinePlugin = {
    id: 'meanLine',
    afterDraw: function(chart) {
      var yScale = chart.scales.y;
      var xScale = chart.scales.x;
      var c = chart.ctx;

      // mean dashed line
      var yPixel = yScale.getPixelForValue(avgScore);
      c.save();
      c.setLineDash([6, 4]);
      c.strokeStyle = '#888';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(xScale.left, yPixel);
      c.lineTo(xScale.right, yPixel);
      c.stroke();
      c.setLineDash([]);

      // mean label
      c.fillStyle = '#888';
      c.font = '11px system-ui';
      c.textAlign = 'right';
      c.fillText('均值 ' + avgScore, xScale.right, yPixel - 6);
      c.restore();

      // point annotations
      annotations.forEach(function(a) {
        var xPx = xScale.getPixelForValue(a.x);
        var yPx = yScale.getPixelForValue(a.y);
        c.save();
        c.fillStyle = '#333';
        c.font = '11px system-ui';
        c.textAlign = 'center';
        var labelY = a.offset > 0 ? yPx + a.offset + 4 : yPx + a.offset - 2;
        c.fillText(a.label, xPx, labelY);
        c.restore();
      });
    }
  };

  new Chart(ctx, {
    type: 'scatter',
    data: { datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 20, right: 24 } },
      scales: {
        x: {
          title: { display: true, text: '排名', font: { family: 'system-ui', size: 13 }, color: '#555' },
          min: 0,
          max: totalPoints + 2,
          ticks: { stepSize: 5, font: { family: 'system-ui', size: 11 } },
          grid: { color: 'rgba(0,0,0,0.04)' }
        },
        y: {
          title: { display: true, text: '综合得分', font: { family: 'system-ui', size: 13 }, color: '#555' },
          min: Math.floor(3.95 - (77.81 - 3.95) * 0.1),
          max: Math.ceil(77.81 + (77.81 - 3.95) * 0.1),
          ticks: { font: { family: 'system-ui', size: 11 } },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      },
      plugins: {
        legend: {
          position: 'right',
          labels: {
            usePointStyle: true,
            pointStyle: 'circle',
            font: { family: 'system-ui', size: 12 },
            padding: 16,
            generateLabels: function(chart) {
              return chart.data.datasets.map(function(ds) {
                return {
                  text: ds.label,
                  fillStyle: ds.backgroundColor,
                  strokeStyle: ds.backgroundColor,
                  pointStyle: 'circle',
                  hidden: false,
                  index: chart.data.datasets.indexOf(ds)
                };
              });
            }
          }
        },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.96)',
          titleColor: '#1a1a1a',
          bodyColor: '#333',
          borderColor: '#e0e0e0',
          borderWidth: 1,
          cornerRadius: 6,
          padding: 10,
          titleFont: { family: 'system-ui', size: 13, weight: '600' },
          bodyFont: { family: 'system-ui', size: 12 },
          callbacks: {
            title: function(items) {
              return items[0].raw.name;
            },
            label: function(item) {
              var d = item.raw;
              return [
                '排名: #' + d.rank + ' (序' + d.x + ')',
                '综合得分: ' + d.y,
                '等级: ' + d.grade,
                '司龄: ' + d.seniority,
                '复贷GMV: ' + d.gmv + ' 万'
              ];
            }
          }
        }
      }
    },
    plugins: [meanLinePlugin]
  });
});
</script>
</body>
</html>
