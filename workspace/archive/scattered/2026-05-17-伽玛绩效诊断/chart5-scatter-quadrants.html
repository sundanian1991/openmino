<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转化率得分 vs 通时得分 - 四象限散点图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #FFFFFF;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  #main { width: 800px; }
  .header { padding: 0 10px 8px; border-bottom: 1px solid #e5e7eb; margin-bottom: 0; }
  .header h1 { font-size: 18px; font-weight: 600; color: #1a1a2e; line-height: 1.4; }
  .header p { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .chart { width: 800px; height: 750px; }
  .footer { padding: 8px 10px 0; border-top: 1px solid #e5e7eb; margin-top: 0; font-size: 12px; color: #9ca3af; }
</style>
</head>
<body>
<div id="main">
  <div class="header">
    <h1>左下角聚集了70%的C级坐席——转化率与通时双低是尾部核心特征</h1>
    <p>参评坐席转化率得分 vs 通时得分 | N=56（5S + 13A + 16B + 22C）</p>
  </div>
  <div id="chart" class="chart"></div>
  <div class="footer">数据日期：2026年4月快照 | 来源：工作簿3-伽玛.xlsx</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var sData = [
  [99.1, 80.6], [85.1, 77.0], [98.3, 48.0], [84.9, 82.5], [84.6, 73.3]
];
var aData = [
  [79.7, 44.4], [93.6, 36.0], [77.8, 63.7], [46.1, 83.1], [85.7, 11.5],
  [82.9, 24.7], [89.8, 26.6], [70.9, 44.1], [73.3, 46.5], [66.7, 34.8],
  [55.9, 50.3], [58.6, 30.5], [83.6, 21.8]
];
var bData = [
  [43.7, 61.0], [33.9, 68.4], [33.1, 49.3], [40.7, 24.3], [22.8, 49.5],
  [43.5, 50.7], [58.0, 29.8], [18.3, 65.3], [48.4, 37.5], [50.7, 66.1],
  [39.4, 34.7], [12.4, 58.8], [26.0, 25.6], [60.3, 51.4], [48.4, 51.4],
  [33.3, 78.9]
];

// C-level: split into bottom-left (both < 50) and others
var cBottomLeft = [];
var cOthers = [];
var cAll = [
  [7.5, 28.6], [18.6, 57.6], [0.4, 54.2], [28.4, 14.9], [0.9, 14.7],
  [4.1, 27.5], [4.3, 17.5], [13.9, 27.5], [37.3, 18.8], [13.2, 32.8],
  [19.4, 32.0], [8.9, 42.9], [8.5, 16.8], [4.7, 41.6], [5.6, 55.4],
  [0.6, 77.4], [3.4, 55.7], [10.4, 48.6], [1.3, 20.7], [17.0, 50.8],
  [16.9, 20.5], [2.8, 59.1]
];
cAll.forEach(function(p) {
  if (p[0] < 50 && p[1] < 50) {
    cBottomLeft.push(p);
  } else {
    cOthers.push(p);
  }
});

var option = {
  animation: false,
  grid: { top: 90, right: 40, bottom: 60, left: 60 },
  tooltip: {
    trigger: 'item',
    formatter: function(p) {
      var grade = p.seriesName;
      return grade + '级<br/>转化率得分: ' + p.value[0] + '<br/>通时得分: ' + p.value[1];
    }
  },
  legend: {
    data: ['S级', 'A级', 'B级', 'C级'],
    top: 0,
    right: 10,
    textStyle: { fontSize: 12, color: '#6b7280' }
  },
  xAxis: {
    type: 'value',
    min: 0,
    max: 100,
    name: '转化率得分',
    nameLocation: 'middle',
    nameGap: 35,
    nameTextStyle: { fontSize: 13, fontWeight: 500, color: '#1a1a2e' },
    splitLine: { show: true, lineStyle: { color: '#f3f4f6' } },
    axisTick: { show: true },
    axisLabel: { fontSize: 11, color: '#6b7280' },
    axisLine: { lineStyle: { color: '#d1d5db' } }
  },
  yAxis: {
    type: 'value',
    min: 0,
    max: 100,
    name: '通时得分',
    nameLocation: 'middle',
    nameGap: 45,
    nameTextStyle: { fontSize: 13, fontWeight: 500, color: '#1a1a2e' },
    splitLine: { show: true, lineStyle: { color: '#f3f4f6' } },
    axisTick: { show: true },
    axisLabel: { fontSize: 11, color: '#6b7280' },
    axisLine: { lineStyle: { color: '#d1d5db' } }
  },
  series: [
    // S级
    {
      name: 'S级',
      type: 'scatter',
      data: sData,
      itemStyle: { color: '#1e40af' },
      symbolSize: 9,
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { type: 'dashed', color: '#9ca3af', width: 1 },
        data: [
          { xAxis: 50 },
          { yAxis: 50 }
        ]
      }
    },
    // A级
    {
      name: 'A级',
      type: 'scatter',
      data: aData,
      itemStyle: { color: '#3b82f6' },
      symbolSize: 8
    },
    // B级
    {
      name: 'B级',
      type: 'scatter',
      data: bData,
      itemStyle: { color: '#93c5fd' },
      symbolSize: 7
    },
    // C级 - 左下双低 (红色)
    {
      name: 'C级',
      type: 'scatter',
      data: cBottomLeft,
      itemStyle: { color: '#ef4444' },
      symbolSize: 10,
      markArea: {
        silent: true,
        data: [
          [
            {
              xAxis: 0,
              yAxis: 0,
              itemStyle: { color: 'rgba(239,68,68,0.06)' },
              label: {
                show: true,
                position: 'inside',
                formatter: '双低尾部',
                color: '#ef4444',
                fontSize: 13,
                fontWeight: 600,
                offset: [40, -20]
              }
            },
            {
              xAxis: 50,
              yAxis: 50
            }
          ]
        ]
      }
    },
    // C级 - 其他 (灰色)
    {
      name: 'C级',
      type: 'scatter',
      data: cOthers,
      itemStyle: { color: '#d1d5db' },
      symbolSize: 7
    },
    // 右上角 markArea - 高效能 (绿色)
    {
      name: '',
      type: 'scatter',
      data: [],
      markArea: {
        silent: true,
        data: [
          [
            {
              xAxis: 50,
              yAxis: 50,
              itemStyle: { color: 'rgba(34,197,94,0.04)' },
              label: {
                show: true,
                position: 'inside',
                formatter: '高效能',
                color: '#16a34a',
                fontSize: 13,
                fontWeight: 600,
                offset: [-40, 20]
              }
            },
            {
              xAxis: 100,
              yAxis: 100
            }
          ]
        ]
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
