<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOB异常率分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFFFFF;
    font-family: system-ui, -apple-system, sans-serif;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #main { width: 900px; height: 450px; }
</style>
</head>
<body>
<div id="main"></div>
<script>
(function () {
  var chart = echarts.init(document.getElementById('main'));

  var cats = [
    'MOB1-', 'MOB1-3', 'MOB3-6', 'MOB6-12',
    'MOB12+', 'S', 'A', 'B', 'C'
  ];
  var vals = [17.4, 14.3, 9.1, 0, 0, 0, 0, 0, 0];
  var fracs = ['4/23', '6/42', '1/11', '0/11', '0/33', '0/7', '0/33', '0/40', '0/13'];
  var barColors = cats.map(function (c) {
    return (c === 'MOB1-' || c === 'MOB1-3') ? '#f97316' : '#d1d5db';
  });

  var option = {
    backgroundColor: '#FFFFFF',
    title: {
      text: 'MOB1-3新人上线异常率14%，是全体平均的3.5倍',
      subtext: '各司龄段异常坐席（超7天未上线或连续3天未上线）占比 | 全体平均4.1%',
      left: 'center',
      top: 10,
      textStyle: { fontSize: 16, fontWeight: 600, color: '#1a1a2e' },
      subtextStyle: { fontSize: 12, color: '#6b7280' }
    },
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      formatter: function (params) {
        var i = params[0].dataIndex;
        return cats[i] + '<br/>异常率：' + vals[i].toFixed(1) + '%<br/>人数：' + fracs[i];
      }
    },
    grid: { top: 90, right: 80, bottom: 50, left: 100 },
    xAxis: {
      type: 'value',
      min: 0,
      max: 20,
      axisLabel: {
        formatter: '{value}%',
        color: '#6b7280',
        fontSize: 11
      },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: true, lineStyle: { color: '#f3f4f6', type: 'dashed' } }
    },
    yAxis: {
      type: 'category',
      data: cats,
      inverse: false,
      axisLabel: { color: '#1a1a2e', fontSize: 12, fontWeight: 500 },
      axisLine: { show: false },
      axisTick: { show: false }
    },
    series: [{
      type: 'bar',
      data: vals.map(function (v, i) {
        return {
          value: v,
          itemStyle: { color: barColors[i], borderRadius: [0, 3, 3, 0] }
        };
      }),
      barWidth: 22,
      label: {
        show: true,
        position: 'right',
        formatter: function (params) {
          var i = params.dataIndex;
          var v = vals[i];
          var f = fracs[i];
          if (v > 0) {
            return '{pct|' + v.toFixed(1) + '%}\n{frac|' + f + '}';
          }
          return '{frac|' + f + '}';
        },
        rich: {
          pct: { fontSize: 12, fontWeight: 600, color: '#1a1a2e', padding: [0, 0, 2, 0] },
          frac: { fontSize: 10, color: '#9ca3af' }
        }
      },
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: '#6b7280', type: 'dashed', width: 2 },
        label: {
          show: true,
          formatter: '全体平均 4.1%',
          position: 'insideEndBottom',
          color: '#6b7280',
          fontSize: 10,
          offset: [8, 0]
        },
        data: [{ xAxis: 4.1 }]
      }
    }],
    graphic: [{
      type: 'text',
      left: 'center',
      bottom: 10,
      style: {
        text: '注：异常=超7天未上线或连续3天未上线预警 | 数据日期：2026年4月快照 | 来源：工作簿3-伽玛.xlsx',
        fill: '#9ca3af',
        fontSize: 10
      }
    }],
    animation: false
  };

  chart.setOption(option);
})();
</script>
</body>
</html>
