<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 05: Notebook Tabs</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8;
            --paper: #fffdf8;
            --tab-1: #e85d4c;
            --tab-2: #4a90d9;
            --tab-3: #5cb85c;
            --text: #2d2d2d;
            --text-muted: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }
        .notebook {
            background: var(--paper);
            padding: clamp(2rem, 4vw, 3rem);
            border-radius: 4px 16px 16px 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 85vw;
            position: relative;
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tabs {
            position: absolute;
            left: -40px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .tab {
            width: 50px;
            height: 30px;
            border-radius: 4px 0 0 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .tab:nth-child(1) { background: var(--tab-1); }
        .tab:nth-child(2) { background: var(--tab-2); }
        .tab:nth-child(3) { background: var(--tab-3); }
        h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .line {
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ccc 0, #ccc 4px, transparent 4px, transparent 8px);
            margin: 1rem 0;
        }
        p {
            color: var(--text-muted);
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="notebook">
        <div class="tabs">
            <div class="tab">01</div>
            <div class="tab">02</div>
            <div class="tab">03</div>
        </div>
        <h1>Notebook Tabs</h1>
        <div class="line"></div>
        <p>编辑风格 · 清晰有序 · 报告呈现</p>
    </div>
</body>
</html>
