<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">目录</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">本次汇报分八个部分</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 目录内容 - 8个项目，分两列 -->
<!-- 左列 -->
<text x="80" y="160" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">01</text>
<text x="150" y="158" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">企业介绍</text>
<text x="150" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">京东科技品牌与服务理念</text>

<text x="80" y="240" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">02</text>
<text x="150" y="238" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">呼叫中心现况</text>
<text x="150" y="264" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">目标、渠道与团队规模</text>

<text x="80" y="320" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">03</text>
<text x="150" y="318" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">组织架构</text>
<text x="150" y="344" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">前中后台分工明确的组织结构</text>

<text x="80" y="400" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">04</text>
<text x="150" y="398" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">转型背景与目标</text>
<text x="150" y="424" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">合规与效率的双重挑战</text>

<!-- 右列 -->
<text x="680" y="160" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">05</text>
<text x="750" y="158" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">转型实施过程</text>
<text x="750" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">三阶段实施路径</text>

<text x="680" y="240" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">06</text>
<text x="750" y="238" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">转型具体成果</text>
<text x="750" y="264" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">数据驱动的显著成效</text>

<text x="680" y="320" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">07</text>
<text x="750" y="318" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">成功关键与人才培养</text>
<text x="750" y="344" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">三位一体驱动转型</text>

<text x="680" y="400" font-family="Microsoft YaHei,sans-serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">08</text>
<text x="750" y="398" font-family="Microsoft YaHei,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">下一步计划</text>
<text x="750" y="424" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#888888">持续深化AI应用与合规能力</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">2 / 12</text>
</svg>
