<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 背景 -->
<rect width="1280" height="720" fill="#FFFFFF"/>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="4" fill="var(--brand-primary)"/>

<!-- 装饰线 -->
<line x1="60" y1="200" x2="200" y2="200" stroke="var(--brand-primary)" stroke-width="3"/>

<!-- 主标题 -->
<text x="60" y="240" font-family="Songti SC,SimSun,serif" font-size="36" font-weight="bold" fill="#1A1A1A">2026年度"新客服最佳实践奖"</text>
<text x="60" y="290" font-family="Songti SC,SimSun,serif" font-size="36" font-weight="bold" fill="#1A1A1A">评选申报</text>

<!-- 申请单位 -->
<text x="60" y="370" font-family="Microsoft YaHei,sans-serif" font-size="18" fill="#555555">申请单位：京东科技股份有限公司</text>
<text x="60" y="400" font-family="Microsoft YaHei,sans-serif" font-size="18" fill="#555555">申报部门：金融科技事业群 · 数据科技业务部</text>
<text x="60" y="430" font-family="Microsoft YaHei,sans-serif" font-size="18" fill="#555555">申报日期：2026年5月</text>

<!-- 底部装饰 -->
<rect x="0" y="660" width="1280" height="60" fill="#F5F5F5"/>
<rect x="0" y="658" width="1280" height="2" fill="var(--brand-primary)"/>
<text x="60" y="696" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">京东科技 · 金融科技事业群 · 数据科技业务部</text>
<text x="1220" y="696" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="var(--brand-primary)" font-weight="bold">京东科技 JD TECHNOLOGY</text>
</svg>
