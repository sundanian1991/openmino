<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">组织架构</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">数据科技业务部作为二级部门，前中后台分工明确</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 组织架构图 -->
<!-- 顶层：集团 -->
<rect x="440" y="110" width="400" height="60" rx="4" fill="var(--brand-primary)"/>
<text x="640" y="146" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">京东科技股份有限公司</text>

<!-- 连接线 -->
<line x1="640" y1="170" x2="640" y2="200" stroke="var(--brand-primary)" stroke-width="2"/>

<!-- 第二层：事业群 -->
<rect x="440" y="200" width="400" height="60" rx="4" fill="#1A1A1A"/>
<text x="640" y="236" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">金融科技事业群</text>

<!-- 连接线 -->
<line x1="640" y1="260" x2="640" y2="290" stroke="var(--brand-primary)" stroke-width="2"/>

<!-- 第三层：部门 -->
<rect x="440" y="290" width="400" height="60" rx="4" fill="#FFFFFF" stroke="var(--brand-primary)" stroke-width="2"/>
<text x="640" y="326" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="var(--brand-primary)">数据科技业务部（二级部门）</text>

<!-- 连接线 - 分为三栏 -->
<line x1="640" y1="350" x2="640" y2="380" stroke="var(--brand-primary)" stroke-width="2"/>
<line x1="180" y1="380" x2="1100" y2="380" stroke="var(--brand-primary)" stroke-width="2"/>

<!-- 前台 -->
<line x1="180" y1="380" x2="180" y2="410" stroke="var(--brand-primary)" stroke-width="2"/>
<rect x="40" y="410" width="280" height="220" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="410" width="4" height="220" fill="var(--brand-primary)"/>
<text x="60" y="446" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="var(--brand-primary)">前台</text>
<text x="60" y="480" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">营销外呼团队</text>
<text x="60" y="510" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">新客拉新</text>
<text x="60" y="536" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">老客复购</text>
<text x="60" y="562" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">客户维护</text>
<text x="180" y="610" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="28" font-weight="bold" fill="var(--brand-primary)">2900+</text>

<!-- 中台 -->
<line x1="640" y1="380" x2="640" y2="410" stroke="var(--brand-primary)" stroke-width="2"/>
<rect x="500" y="410" width="280" height="220" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="500" y="410" width="4" height="220" fill="var(--brand-primary)"/>
<text x="520" y="446" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="var(--brand-primary)">中台</text>
<text x="520" y="480" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">策略与数据支撑</text>
<text x="520" y="510" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">AI模型开发</text>
<text x="520" y="536" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">数据分析运营</text>
<text x="520" y="562" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">系统平台建设</text>
<text x="640" y="610" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="28" font-weight="bold" fill="var(--brand-primary)">100+</text>

<!-- 后台 -->
<line x1="1100" y1="380" x2="1100" y2="410" stroke="var(--brand-primary)" stroke-width="2"/>
<rect x="960" y="410" width="280" height="220" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="960" y="410" width="4" height="220" fill="var(--brand-primary)"/>
<text x="980" y="446" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="var(--brand-primary)">后台</text>
<text x="980" y="480" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">管理与运营支撑</text>
<text x="980" y="510" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">质检培训</text>
<text x="980" y="536" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">合规管理</text>
<text x="980" y="562" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#555555">行政人事</text>
<text x="1100" y="610" text-anchor="middle" font-family="Songti SC,SimSun,serif" font-size="28" font-weight="bold" fill="var(--brand-primary)">50+</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">5 / 12</text>
</svg>
