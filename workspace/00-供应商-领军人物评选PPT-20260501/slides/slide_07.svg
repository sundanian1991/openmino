<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">转型实施过程</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">三阶段实施路径：数据赋能、人机协同、全生命周期运营</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 时间轴主线 -->
<line x1="100" y1="220" x2="1180" y2="220" stroke="var(--brand-primary)" stroke-width="3"/>

<!-- 阶段一 -->
<circle cx="300" cy="220" r="28" fill="var(--brand-primary)"/>
<text x="300" y="225" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">一</text>
<text x="300" y="186" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">第一阶段</text>

<rect x="140" y="280" width="320" height="380" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="140" y="280" width="4" height="380" fill="var(--brand-primary)"/>
<text x="160" y="316" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="var(--brand-primary)">数据赋能客户识别</text>

<rect x="160" y="336" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="170" y="346" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">开发AI需求识别模型</text>
<text x="170" y="366" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">预测客户金融需求</text>

<rect x="160" y="392" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="170" y="402" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">精准分层运营</text>
<text x="170" y="422" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">差异化触达策略</text>

<rect x="160" y="448" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="170" y="458" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">接通率提升35%</text>
<text x="170" y="478" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">首拨转化率提升28%</text>

<text x="160" y="520" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">挑战：数据整合</text>
<text x="160" y="540" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">跨系统数据打通</text>
<text x="160" y="570" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">客户需求准确度</text>

<!-- 阶段二 -->
<circle cx="640" cy="220" r="28" fill="var(--brand-primary)"/>
<text x="640" y="225" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">二</text>
<text x="640" y="186" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">第二阶段</text>

<rect x="480" y="280" width="320" height="380" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="480" y="280" width="4" height="380" fill="var(--brand-primary)"/>
<text x="500" y="316" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="var(--brand-primary)">人机协同智能外呼</text>

<rect x="500" y="336" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="346" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">智能客户路由</text>
<text x="510" y="366" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">画像与产品智能匹配</text>

<rect x="500" y="392" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="402" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">实时话术辅助</text>
<text x="510" y="422" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">AI推荐话术+异议处理</text>

<rect x="500" y="448" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="510" y="458" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">AI赋能合规提效</text>
<text x="510" y="478" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">实时合规监控+智能质检</text>

<text x="500" y="520" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">挑战：人机平衡</text>
<text x="500" y="540" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">保持营销温度</text>
<text x="500" y="570" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">合规与效率平衡</text>

<!-- 阶段三 -->
<circle cx="980" cy="220" r="28" fill="var(--brand-primary)"/>
<text x="980" y="225" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">三</text>
<text x="980" y="186" text-anchor="middle" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">第三阶段</text>

<rect x="820" y="280" width="320" height="380" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="820" y="280" width="4" height="380" fill="var(--brand-primary)"/>
<text x="840" y="316" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="var(--brand-primary)">全生命周期运营</text>

<rect x="840" y="336" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="850" y="346" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">新客获取与首次转化</text>
<text x="850" y="366" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">精准识别高效触达</text>

<rect x="840" y="392" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="850" y="402" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">复购激活与流失预警</text>
<text x="850" y="422" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">主动触达及时挽回</text>

<rect x="840" y="448" width="3" height="14" rx="1" fill="var(--brand-primary)"/>
<text x="850" y="458" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#333333">人均效率提升40%</text>
<text x="850" y="478" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#555555">新人上手时间缩短67%</text>

<text x="840" y="520" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">挑战：能力转型</text>
<text x="840" y="540" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">传统向智能转型</text>
<text x="840" y="570" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">复合型人才培养</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">7 / 12</text>
</svg>
