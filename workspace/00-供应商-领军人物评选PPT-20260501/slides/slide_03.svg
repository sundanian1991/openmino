<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">企业介绍</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">京东科技金融科技事业群承载集团金融营销服务核心职能</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 左栏：企业介绍 -->
<rect x="40" y="100" width="464" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 企业信息 -->
<text x="56" y="140" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="var(--brand-primary)" letter-spacing="2">企业信息</text>
<line x1="56" y1="152" x2="200" y2="152" stroke="var(--brand-primary)" stroke-width="1.5"/>

<text x="56" y="190" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">企业名称</text>
<text x="56" y="214" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">京东科技股份有限公司</text>

<text x="56" y="260" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">主营业务</text>
<text x="56" y="284" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">信息技术咨询、云计算、</text>
<text x="56" y="308" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">人工智能应用、软件开发、</text>
<text x="56" y="332" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">数据处理服务</text>

<text x="56" y="378" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">从事行业</text>
<text x="56" y="402" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">金融科技 / 科技服务</text>

<text x="56" y="448" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">服务渠道</text>
<text x="56" y="472" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">电销渠道（100%）</text>

<!-- 中栏：使命愿景 -->
<rect x="520" y="100" width="380" height="580" rx="4" fill="var(--brand-primary)"/>

<text x="540" y="140" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8AAED0" letter-spacing="2">服务理念</text>
<line x1="540" y1="152" x2="700" y2="152" stroke="#FFFFFF" stroke-width="1.5"/>

<text x="540" y="200" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">服务使命</text>
<text x="540" y="234" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#E8F0FA">技术为本，让生活更美好</text>

<text x="540" y="290" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">服务愿景</text>
<text x="540" y="324" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#E8F0FA">成为全球最值得信赖的企业</text>

<text x="540" y="380" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">服务价值观</text>
<text x="540" y="414" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#E8F0FA">客户为先、创新、拼搏</text>
<text x="540" y="438" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#E8F0FA">担当、感恩、诚信</text>

<text x="540" y="494" font-family="Songti SC,SimSun,serif" font-size="18" font-weight="bold" fill="#FFFFFF">部门定位</text>
<text x="540" y="528" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">数据驱动的服务营销中枢</text>
<text x="540" y="552" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">通过精细化运营和智能化</text>
<text x="540" y="576" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">管理提供专业金融服务</text>

<!-- 右栏：关键数字 -->
<rect x="916" y="100" width="324" height="580" rx="4" fill="#F5F5F5"/>
<rect x="916" y="100" width="4" height="580" fill="var(--brand-primary)"/>

<text x="936" y="140" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="var(--brand-primary)" letter-spacing="2">核心数据</text>
<line x1="936" y1="152" x2="1100" y2="152" stroke="var(--brand-primary)" stroke-width="1"/>

<text x="936" y="220" font-family="Songti SC,SimSun,serif" font-size="52" font-weight="bold" fill="var(--brand-primary)">2018</text>
<text x="936" y="250" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">开始运营年份</text>

<text x="936" y="330" font-family="Songti SC,SimSun,serif" font-size="52" font-weight="bold" fill="var(--brand-primary)">3000+</text>
<text x="936" y="360" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">团队总规模</text>

<text x="936" y="440" font-family="Songti SC,SimSun,serif" font-size="52" font-weight="bold" fill="var(--brand-primary)">100%</text>
<text x="936" y="470" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">合规率</text>

<text x="936" y="550" font-family="Songti SC,SimSun,serif" font-size="52" font-weight="bold" fill="var(--brand-primary)">99%</text>
<text x="936" y="580" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">营销业务占比</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">3 / 12</text>
</svg>
