<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">成功关键</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">数据、AI、合规三位一体驱动转型成功</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 大数字冲击效果 -->
<text x="140" y="380" font-family="Songti SC,SimSun,serif" font-size="160" font-weight="bold" fill="var(--brand-primary)">3位</text>
<line x1="140" y1="400" x2="440" y2="400" stroke="#1A1A1A" stroke-width="1.5"/>
<text x="140" y="440" font-family="Songti SC,SimSun,serif" font-size="26" font-weight="bold" fill="#1A1A1A">一体驱动模式</text>
<text x="140" y="484" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#666666">从战略到落地，数据、AI、合规</text>
<text x="140" y="508" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#666666">三者缺一不可</text>

<!-- 右侧竖分隔线 -->
<line x1="800" y1="140" x2="800" y2="610" stroke="#E2E2E2" stroke-width="1"/>

<!-- 右侧三条支撑 -->
<text x="860" y="180" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="var(--brand-primary)" letter-spacing="2">SUCCESS FACTORS</text>
<line x1="860" y1="200" x2="1200" y2="200" stroke="var(--brand-primary)" stroke-width="1.5"/>

<text x="860" y="240" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">数据驱动</text>
<text x="860" y="264" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">精准识别客户需求</text>
<text x="860" y="284" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">打通跨系统数据构建统一</text>
<text x="860" y="304" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">客户画像，实现精准触达</text>
<line x1="860" y1="324" x2="1200" y2="324" stroke="#E2E2E2" stroke-width="0.5"/>

<text x="860" y="364" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">AI协同</text>
<text x="860" y="388" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">辅助而非替代人工</text>
<text x="860" y="408" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">AI实时推荐话术、提示异</text>
<text x="860" y="428" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">议处理，保持营销温度</text>
<line x1="860" y1="448" x2="1200" y2="448" stroke="#E2E2E2" stroke-width="0.5"/>

<text x="860" y="488" font-family="Microsoft YaHei,sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">合规保障</text>
<text x="860" y="512" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">红线管理一票否决</text>
<text x="860" y="532" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">从事后检查转向事中预警，</text>
<text x="860" y="552" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">合规风险降低60%</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">9 / 12</text>
</svg>
