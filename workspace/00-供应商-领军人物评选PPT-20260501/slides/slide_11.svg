<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">下一步计划</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">持续深化AI应用与合规能力建设，探索精准营销新边界</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 三大挑战 -->
<text x="40" y="130" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">未来12个月面临的三大挑战</text>
<line x1="40" y1="138" x2="500" y2="138" stroke="var(--brand-primary)" stroke-width="1.5"/>

<rect x="40" y="150" width="380" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="150" width="4" height="160" fill="#B01C1C"/>
<text x="56" y="184" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">获客成本持续上升</text>
<text x="56" y="210" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">市场竞争加剧，需要进一步</text>
<text x="56" y="230" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">提升精准识别能力以提高ROI</text>
<text x="56" y="270" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">应对：深化AI需求识别模型</text>

<rect x="436" y="150" width="380" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="436" y="150" width="4" height="160" fill="#8A5A00"/>
<text x="452" y="184" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">合规要求持续趋严</text>
<text x="452" y="210" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">金融营销合规标准不断提高，</text>
<text x="452" y="230" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">需持续强化合规能力</text>
<text x="452" y="270" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">应对：升级AI合规监控系统</text>

<rect x="832" y="150" width="408" height="160" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="832" y="150" width="4" height="160" fill="var(--brand-primary)"/>
<text x="848" y="184" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">技术迭代压力</text>
<text x="848" y="210" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">AI、大数据等新技术快速迭代，</text>
<text x="848" y="230" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">需要持续学习和应用</text>
<text x="848" y="270" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">应对：建立持续学习机制</text>

<!-- 下一步战略目标 -->
<text x="40" y="350" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">下一步战略目标与计划</text>
<line x1="40" y1="358" x2="500" y2="358" stroke="var(--brand-primary)" stroke-width="1.5"/>

<!-- 目标1 -->
<rect x="40" y="370" width="590" height="130" rx="4" fill="var(--brand-primary)"/>
<text x="56" y="400" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">目标一：AI深度赋能</text>
<text x="56" y="426" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">升级AI需求识别模型，提升客户预测准确度</text>
<text x="56" y="446" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">完善实时话术推荐和异议处理系统</text>
<text x="56" y="466" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">进一步降低新人培训成本，缩短上手周期</text>

<!-- 目标2 -->
<rect x="646" y="370" width="594" height="130" rx="4" fill="var(--brand-primary)"/>
<text x="662" y="400" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">目标二：合规体系升级</text>
<text x="662" y="426" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">构建全链路合规风控体系，从预警到处理闭环</text>
<text x="662" y="446" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">提升AI智能质检覆盖度和准确度</text>
<text x="662" y="466" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#E8F0FA">建立供应商合规评级体系</text>

<!-- 目标3 -->
<rect x="40" y="510" width="590" height="160" rx="4" fill="#F5F5F5"/>
<rect x="40" y="510" width="4" height="160" fill="var(--brand-primary)"/>
<text x="56" y="540" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">目标三：全生命周期精细化运营</text>
<text x="56" y="566" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">完善客户生命周期管理，从获客到留存全链条优化</text>
<text x="56" y="586" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">建立流失预警与挽回机制，降低客户流失率</text>
<text x="56" y="606" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">深化产品匹配算法，提升交叉销售和复购转化</text>
<text x="56" y="636" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">探索精准营销新边界，创新服务模式</text>

<!-- 目标4 -->
<rect x="646" y="510" width="594" height="160" rx="4" fill="#F5F5F5"/>
<rect x="646" y="510" width="4" height="160" fill="var(--brand-primary)"/>
<text x="662" y="540" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">目标四：团队能力升级</text>
<text x="662" y="566" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">培养数据驱动的复合型营销人才</text>
<text x="662" y="586" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">建立持续学习机制，跟进AI技术迭代</text>
<text x="662" y="606" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">优化供应商协同管理，统一标准与考核</text>
<text x="662" y="636" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#555555">确保团队稳定性与持续增长</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">11 / 12</text>
</svg>
