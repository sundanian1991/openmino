<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  :root {
    --brand-primary: #1677FF;
    --brand-near-black: #1A1A1A;
    --brand-gray: #888888;
    --brand-light-bg: #F5F5F5;
    --brand-border: #E2E2E2;
  }
</style></defs>

<!-- 顶部品牌蓝线 -->
<rect x="0" y="0" width="1280" height="3" fill="var(--brand-primary)"/>

<!-- 页眉 -->
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">转型具体成果</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="var(--brand-primary)">京东科技</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- Action Title -->
<rect x="40" y="36" width="3" height="52" fill="var(--brand-primary)"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">接通率提升35%，人均效率提升40%，合规率保持100%</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>

<!-- 6个KPI卡片 2x3网格 -->
<!-- 行1 -->
<!-- KPI1: 年度GMV -->
<rect x="40" y="110" width="380" height="170" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="110" width="4" height="170" fill="var(--brand-primary)"/>
<text x="60" y="144" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">年度GMV（放款额）</text>
<text x="60" y="200" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">2000亿+</text>
<text x="60" y="230" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">行业领先规模</text>
<text x="60" y="250" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">35家供应商协同管理</text>

<!-- KPI2: 团队规模 -->
<rect x="446" y="110" width="370" height="170" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="446" y="110" width="4" height="170" fill="var(--brand-primary)"/>
<text x="466" y="144" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">团队总规模</text>
<text x="466" y="200" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="var(--brand-primary)">3000+人</text>
<text x="466" y="230" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">最大电销团队之一</text>
<text x="466" y="250" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">本科及以上占比60%</text>

<!-- KPI3: 合规率 -->
<rect x="842" y="110" width="398" height="170" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="842" y="110" width="4" height="170" fill="#1A7A42"/>
<text x="862" y="144" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">合规率</text>
<text x="862" y="200" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="#1A7A42">100%</text>
<text x="862" y="230" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI实时监控+智能质检</text>
<text x="862" y="250" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">合规风险降低60%</text>

<!-- 行2 -->
<!-- KPI4: 营销转化率 -->
<rect x="40" y="300" width="380" height="170" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="300" width="4" height="170" fill="#1A7A42"/>
<text x="60" y="334" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">营销转化率</text>
<text x="60" y="390" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="#1A7A42">+25%</text>
<text x="60" y="420" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI辅助需求挖掘</text>
<text x="60" y="440" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">个性化产品匹配</text>

<!-- KPI5: 人均效率 -->
<rect x="446" y="300" width="370" height="170" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="446" y="300" width="4" height="170" fill="#1A7A42"/>
<text x="466" y="334" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">人均效率提升</text>
<text x="466" y="390" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="#1A7A42">+40%</text>
<text x="466" y="420" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">新人上手时间缩短67%</text>
<text x="466" y="440" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">质检效率提升300%</text>

<!-- KPI6: 复购率 -->
<rect x="842" y="300" width="398" height="170" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="842" y="300" width="4" height="170" fill="#1A7A42"/>
<text x="862" y="334" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#888888">客户复购率提升</text>
<text x="862" y="390" font-family="Songti SC,SimSun,serif" font-size="48" font-weight="bold" fill="#1A7A42">+30%</text>
<text x="862" y="420" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">全生命周期运营</text>
<text x="862" y="440" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">流失预警主动挽回</text>

<!-- 底部：成果亮点总结 -->
<text x="40" y="510" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="var(--brand-primary)">创新成果亮点</text>
<line x1="40" y1="518" x2="300" y2="518" stroke="var(--brand-primary)" stroke-width="1.5"/>

<rect x="40" y="530" width="277" height="140" rx="4" fill="#F5F5F5"/>
<rect x="40" y="530" width="4" height="140" fill="var(--brand-primary)"/>
<text x="56" y="560" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">多维客户识别</text>
<text x="56" y="584" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">接通率+35%，首拨转化+28%</text>
<text x="56" y="604" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI模型精准预测需求</text>

<rect x="333" y="530" width="277" height="140" rx="4" fill="#F5F5F5"/>
<rect x="333" y="530" width="4" height="140" fill="var(--brand-primary)"/>
<text x="349" y="560" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">人机协同外呼</text>
<text x="349" y="584" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">AI成为坐席超级助手</text>
<text x="349" y="604" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">实时话术辅助与情绪监控</text>

<rect x="626" y="530" width="277" height="140" rx="4" fill="#F5F5F5"/>
<rect x="626" y="530" width="4" height="140" fill="var(--brand-primary)"/>
<text x="642" y="560" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">AI赋能合规</text>
<text x="642" y="584" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">100%通话覆盖自动质检</text>
<text x="642" y="604" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">从事后检查转向事中预警</text>

<rect x="919" y="530" width="321" height="140" rx="4" fill="#F5F5F5"/>
<rect x="919" y="530" width="4" height="140" fill="var(--brand-primary)"/>
<text x="935" y="560" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">规模领先优势</text>
<text x="935" y="584" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">3000+人专业团队</text>
<text x="935" y="604" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#555555">行业最大电销团队之一</text>

<!-- 页脚 -->
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：京东科技 · 2026年5月</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">8 / 12</text>
</svg>
