<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比特币突破 10 万后失守</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .wrap { background: #fff; border-radius: 16px; padding: 36px 40px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); max-width: 960px; }
  .chart-title { font-size: 17px; font-weight: 700; color: #141413; margin-bottom: 4px; }
  .chart-subtitle { font-size: 11px; color: #87867F; margin-bottom: 16px; }
  #chart { width: 880px; height: 420px; }
  .lead { max-width: 700px; margin: 16px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { font-size: 11px; color: #A3A29B; margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="chart-title">比特币突破 10 万后失守，收于 94.2K</div>
  <div class="chart-subtitle">2024年5月 — 2025年5月 月度收盘价（USD）</div>
  <div id="chart"></div>
  <div class="lead">
    比特币从 63.6K 起步，<strong>8 月崩盘至 49K，12 月突破 10 万，1 月触及 107.5K 历史新高</strong>，随后回调 23% 至 83.1K，5 月回升至 94.2K。<strong>波动幅度超 50%，不是线性增长。</strong>
  </div>
  <div class="footer-note">数据来源：CoinGecko | 2024-05 至 2025-05</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var dates = [
  '2024-05','2024-06','2024-07','2024-08','2024-09',
  '2024-10','2024-11','2024-12','2025-01','2025-02',
  '2025-03','2025-04','2025-05'
];
var prices = [63619, 60677, 66551, 49000, 58100, 68100, 92700, 100200, 107500, 86500, 83100, 89400, 94200];

// 数据点样式：仅峰值高亮，其余灰色
var seriesData = prices.map(function(v, i) {
  var item = { value: v };
  if (i === 8) {
    // 峰值 — 高亮 clay
    item.itemStyle = { color: '#D97757' };
    item.label = { show: true, position: 'top', fontSize: 11, fontWeight: 600, color: '#D97757', formatter: '107.5K' };
  } else if (i === 3) {
    // 谷值 — clay-d 暗色
    item.itemStyle = { color: '#B85C3E' };
    item.label = { show: true, position: 'bottom', fontSize: 10, fontWeight: 600, color: '#B85C3E', formatter: '49K' };
  } else if (i === 12) {
    // 终点 — clay
    item.itemStyle = { color: '#D97757' };
    item.label = { show: true, position: 'top', fontSize: 11, fontWeight: 600, color: '#D97757', formatter: '94.2K' };
  } else {
    item.itemStyle = { color: '#3D3D3A' };
  }
  return item;
});

var opt = {
  grid: { left: 60, right: 80, top: 20, bottom: 40 },
  xAxis: {
    type: 'category', data: dates,
    axisLine: { lineStyle: { color: '#E6E3DA' } },
    axisLabel: { fontSize: 10, color: '#87867F', rotate: 30 },
    axisTick: { show: false }
  },
  yAxis: {
    name: '价格（USD）', nameLocation: 'end', nameGap: 8, nameTextStyle: { fontSize: 10, color: '#87867F' },
    type: 'value', min: 40000, max: 120000,
    axisLabel: {
      formatter: function(v) { return (v/1000) + 'K'; },
      fontSize: 10, color: '#87867F'
    },
    axisLine: { show: false }, axisTick: { show: false },
    splitLine: { lineStyle: { color: '#F0EEE6', type: 'dashed' } }
  },
  series: [{
    type: 'line', data: seriesData,
    smooth: 0.3,
    lineStyle: { width: 2.5, color: '#3D3D3A' },
    symbol: 'circle', symbolSize: function(val, param) {
      if (param.dataIndex === 8) return 14;
      if (param.dataIndex === 3 || param.dataIndex === 12) return 10;
      return 4;
    },
    label: {
      show: false // 由数据项控制
    }
  }],
  graphic: [
    // 10万参考线
    { type: 'line', shape: { x1: 0, y1: 142, x2: 880, y2: 142 },
      style: { stroke: '#E6E3DA', lineWidth: 1, lineDash: [6,4] } },
    // 峰值标注：原因+幅度
    { type: 'text', style: { text: '历史新高 ↑ +69% 从起点', fill: '#D97757', fontSize: 10, fontWeight: 600 }, left: 420, top: 15 },
    // 谷值标注：原因
    { type: 'text', style: { text: '8月崩盘 —23%', fill: '#B85C3E', fontSize: 9, fontWeight: 600 }, left: 240, top: 390 },
    // 终点标注：原因+幅度
    { type: 'text', style: { text: '较峰值 —12%', fill: '#D97757', fontSize: 10, fontWeight: 600 }, right: 10, top: 210 }
  ]
};

chart.setOption(opt);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
