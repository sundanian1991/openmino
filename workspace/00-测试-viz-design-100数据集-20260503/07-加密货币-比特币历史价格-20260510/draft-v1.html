<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比特币突破 10 万后失守</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .wrap { background: #fff; border-radius: 16px; padding: 36px 40px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); max-width: 960px; }
  .chart-title { font-size: 17px; font-weight: 700; color: #141413; margin-bottom: 4px; }
  .chart-subtitle { font-size: 11px; color: #87867F; margin-bottom: 16px; }
  #chart { width: 880px; height: 420px; }
  .lead { max-width: 700px; margin: 16px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { font-size: 11px; color: #A3A29B; margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="chart-title">比特币突破 10 万后失守，年末收于 94.2K</div>
  <div class="chart-subtitle">2024年5月 — 2025年5月 月度收盘价（USD）</div>
  <div id="chart"></div>
  <div class="lead">
    比特币一年内经历<strong>暴涨→崩盘→历史新高→回调</strong>——从 63.6K 起步，8 月腰斩至 49K，12 月突破 10 万大关并在 2025 年 1 月触及 107.5K 历史高点，随后回调 23% 至 83.1K，5 月回升至 94.2K。<strong>这不是线性增长，是波动幅度超 50% 的过山车。</strong>
  </div>
  <div class="footer-note">数据来源：CoinGecko | 2024-05 至 2025-05</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var dates = [
  '2024-05','2024-06','2024-07','2024-08','2024-09',
  '2024-10','2024-11','2024-12','2025-01','2025-02',
  '2025-03','2025-04','2025-05'
];
// 取每月代表性价格（从30行CSV中采样13个关键月）
var prices = [63619, 60677, 66551, 49000, 58100, 68100, 92700, 100200, 107500, 86500, 83100, 89400, 94200];

var opt = {
  grid: { left: 60, right: 80, top: 10, bottom: 40 },
  xAxis: {
    type: 'category', data: dates,
    axisLine: { lineStyle: { color: '#E6E3DA' } },
    axisLabel: { fontSize: 10, color: '#87867F', rotate: 30 },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value', min: 40000, max: 120000,
    axisLabel: {
      formatter: function(v) { return (v/1000) + 'K'; },
      fontSize: 10, color: '#87867F'
    },
    axisLine: { show: false }, axisTick: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } }
  },
  series: [{
    type: 'line', data: prices,
    smooth: true,
    lineStyle: { width: 2.5, color: '#3D3D3A' },
    itemStyle: { color: '#3D3D3A' },
    symbol: 'circle', symbolSize: function(val, param) {
      // 峰值、谷值、终点放大
      if (param.dataIndex === 8) return 12;  // 107.5K 峰值
      if (param.dataIndex === 3) return 10;  // 49K 谷值
      if (param.dataIndex === 12) return 10; // 94.2K 终点
      return 5;
    },
    // 峰值/谷值/终点单独着色
    data: prices.map(function(v, i) {
      var item = { value: v };
      if (i === 8) item.itemStyle = { color: '#D97757' };  // 峰值 clay
      else if (i === 3) item.itemStyle = { color: '#B85C3E' }; // 谷值 clay-d
      else if (i === 12) item.itemStyle = { color: '#D97757' }; // 终点 clay
      return item;
    })
  }],
  graphic: [
    // 10万参考线
    { type: 'line', shape: { x1: 0, y1: 120, x2: 880, y2: 120 },
      style: { stroke: '#E6E3DA', lineWidth: 1, lineDash: [6,4] } },
    { type: 'text', style: { text: '10万大关', fill: '#A3A29B', fontSize: 9 }, left: 10, top: 108 },
    // 峰值标注
    { type: 'text', style: { text: '历史新高 107.5K', fill: '#D97757', fontSize: 11, fontWeight: 600 }, left: 470, top: 20 },
    // 谷值标注
    { type: 'text', style: { text: '8月崩盘 49K', fill: '#B85C3E', fontSize: 10, fontWeight: 600 }, left: 230, top: 380 },
    // 终点标注
    { type: 'text', style: { text: '94.2K', fill: '#D97757', fontSize: 12, fontWeight: 600 }, right: 10, top: 195 }
  ]
};

chart.setOption(opt);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
