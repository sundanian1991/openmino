<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房地产退场，制造业接力：中国固定资产投资结构变迁</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #faf8f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
}
</style>
</head>
<body>
<div id="chart" style="width:960px;height:540px;"></div>
<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

var years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
var totalInvestment = [56.20, 59.65, 63.17, 64.57, 64.83, 65.53, 68.77, 72.06, 73.78, 74.20];
var realEstate     = [9.60, 10.26, 10.98, 12.03, 13.22, 14.14, 14.76, 13.29, 11.09, 10.03];
var mfgGrowth      = [8.1, 4.2, 4.8, 9.5, 3.1, -2.2, 13.5, 9.1, 6.5, 8.5];
var infraGrowth    = [17.2, 15.7, 13.9, 3.8, 3.3, 0.9, 0.4, 9.4, 5.9, 4.4];

var option = {
  backgroundColor: '#faf8f5',

  title: [
    {
      text: '房地产退场，制造业接力：中国固定资产投资结构变迁',
      left: 60,
      top: 16,
      textStyle: { fontSize: 18, fontWeight: 'bold', color: '#292524', lineHeight: 24 }
    },
    {
      text: '2015-2024 | 数据来源：国家统计局',
      left: 60,
      top: 44,
      textStyle: { fontSize: 12, fontWeight: 'normal', color: '#78716c' }
    }
  ],

  legend: {
    data: ['总投资额', '房地产投资额', '制造业增速', '基建增速'],
    top: 12,
    right: 80,
    orient: 'horizontal',
    itemGap: 16,
    textStyle: { fontSize: 11, color: '#78716c' },
    itemWidth: 14,
    itemHeight: 10
  },

  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(255,255,255,0.96)',
    borderColor: '#e7e5e4',
    borderWidth: 1,
    textStyle: { color: '#292524', fontSize: 12 },
    formatter: function(params) {
      var s = '<b>' + params[0].axisValue + '年</b><br/>';
      params.forEach(function(p) {
        var unit = (p.seriesName === '制造业增速' || p.seriesName === '基建增速') ? '%' : ' 万亿';
        s += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + p.color + ';margin-right:6px;vertical-align:middle;"></span>';
        s += p.seriesName + '：<b>' + p.value + unit + '</b><br/>';
      });
      return s;
    }
  },

  grid: {
    left: 60,
    right: 80,
    top: 80,
    bottom: 60
  },

  graphic: [
    {
      type: 'group',
      left: '72%',
      top: 88,
      children: [
        {
          type: 'rect',
          shape: { width: 240, height: 130, r: 6 },
          style: { fill: '#ffffff', stroke: '#e7e5e4', lineWidth: 1, shadowBlur: 4, shadowColor: 'rgba(0,0,0,0.04)', shadowOffsetY: 2 }
        },
        { type: 'circle', shape: { cx: 20, cy: 24 }, style: { fill: '#D45400' } },
        { type: 'text', style: { text: '房地产投资额', x: 34, y: 18, fontSize: 12, fontWeight: 'bold', fill: '#292524' } },
        { type: 'text', style: { text: '从 14.76 万亿峰值跌至 10.03 万亿', x: 34, y: 38, fontSize: 11, fill: '#78716c' } },
        { type: 'text', style: { text: '▼ 32%', x: 34, y: 60, fontSize: 18, fontWeight: 'bold', fill: '#D45400' } },
        { type: 'line', shape: { x1: 14, y1: 88, x2: 226, y2: 88 }, style: { stroke: '#f5f5f4', lineWidth: 1 } },
        { type: 'circle', shape: { cx: 20, cy: 108 }, style: { fill: '#0D7377' } },
        { type: 'text', style: { text: '制造业增速', x: 34, y: 102, fontSize: 12, fontWeight: 'bold', fill: '#292524' } },
        { type: 'text', style: { text: '2021 年飙升到 13.5%', x: 34, y: 120, fontSize: 11, fill: '#78716c' } },
        { type: 'text', style: { text: '▲', x: 34, y: 142, fontSize: 18, fontWeight: 'bold', fill: '#0D7377' } }
      ]
    },
    {
      type: 'group',
      left: '72%',
      top: 240,
      children: [
        {
          type: 'rect',
          shape: { width: 240, height: 90, r: 6 },
          style: { fill: '#ffffff', stroke: '#e7e5e4', lineWidth: 1, shadowBlur: 4, shadowColor: 'rgba(0,0,0,0.04)', shadowOffsetY: 2 }
        },
        { type: 'circle', shape: { cx: 20, cy: 24 }, style: { fill: '#a8a29e' } },
        { type: 'text', style: { text: '固定资产投资总额', x: 34, y: 18, fontSize: 12, fontWeight: 'bold', fill: '#292524' } },
        { type: 'text', style: { text: '10 年增长 32%', x: 34, y: 38, fontSize: 11, fill: '#78716c' } },
        { type: 'text', style: { text: '74.2 万亿', x: 34, y: 62, fontSize: 20, fontWeight: 'bold', fill: '#292524' } }
      ]
    }
  ],

  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#d6d3d1' } },
    axisTick: { show: false },
    axisLabel: { fontSize: 11, color: '#78716c' }
  },

  yAxis: [
    {
      type: 'value',
      name: '万亿元',
      nameTextStyle: { fontSize: 10, color: '#a8a29e', padding: [0, 40, 0, 0] },
      min: 0,
      max: 80,
      interval: 20,
      splitLine: { lineStyle: { color: '#e7e5e4', type: 'dashed' } },
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { fontSize: 10, color: '#a8a29e' }
    },
    {
      type: 'value',
      name: '%',
      nameTextStyle: { fontSize: 10, color: '#a8a29e' },
      min: -5,
      max: 20,
      interval: 5,
      splitLine: { show: false },
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { fontSize: 10, color: '#a8a29e' }
    }
  ],

  series: [
    {
      name: '总投资额',
      type: 'bar',
      yAxisIndex: 0,
      barWidth: '50%',
      barGap: '-80%',
      z: 1,
      itemStyle: { color: '#e8e4dc', borderRadius: [2, 2, 0, 0] },
      data: totalInvestment,
      animationDelay: function(idx) { return idx * 60; }
    },
    {
      name: '房地产投资额',
      type: 'bar',
      yAxisIndex: 0,
      barWidth: '35%',
      z: 2,
      itemStyle: { color: '#D45400', borderRadius: [2, 2, 0, 0] },
      data: realEstate,
      markPoint: {
        symbol: 'pin',
        symbolSize: 42,
        animation: true,
        data: [
          {
            name: '峰值',
            coord: [6, 14.76],
            value: '峰值',
            itemStyle: { color: '#D45400' },
            label: { show: true, formatter: '峰值', fontSize: 11, fontWeight: 'bold', color: '#fff' }
          }
        ]
      },
      animationDelay: function(idx) { return idx * 60 + 200; }
    },
    {
      name: '制造业增速',
      type: 'line',
      yAxisIndex: 1,
      z: 3,
      lineStyle: { color: '#0D7377', width: 2.5 },
      itemStyle: { color: '#0D7377' },
      symbol: 'circle',
      symbolSize: 6,
      data: mfgGrowth,
      markPoint: {
        symbol: 'pin',
        animation: true,
        data: [
          {
            name: '政策刺激反弹',
            coord: [6, 13.5],
            value: '政策刺激反弹',
            symbolSize: 46,
            itemStyle: { color: '#0D7377' },
            label: { show: true, formatter: '政策刺激反弹', fontSize: 9, fontWeight: 'bold', color: '#fff' },
            symbolOffset: [0, '-50%']
          },
          {
            name: '疫情冲击',
            coord: [5, -2.2],
            value: '疫情冲击',
            symbolSize: 38,
            symbolOffset: [0, '50%'],
            itemStyle: { color: '#78716c' },
            label: { show: true, formatter: '疫情冲击', fontSize: 9, fontWeight: 'normal', color: '#fff' }
          }
        ]
      },
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: '#a8a29e', type: 'dashed', width: 1 },
        label: { show: false },
        data: [{ yAxis: 0 }]
      }
    },
    {
      name: '基建增速',
      type: 'line',
      yAxisIndex: 1,
      z: 3,
      lineStyle: { color: '#a8a29e', width: 1.5 },
      itemStyle: { color: '#a8a29e' },
      symbol: 'circle',
      symbolSize: 4,
      data: infraGrowth
    }
  ]
};

chart.setOption(option);

window.addEventListener('resize', function() {
  chart.resize();
});
</script>
</body>
</html>
