<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴西主导全球咖啡生产，产量超第2-3名之和</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf0e6;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;display:flex;justify-content:center;padding:40px 20px}
.card{width:800px;max-width:100%;background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
#chart{width:100%;height:550px}
.footer{margin-top:8px;font-size:10px;color:#ada599;text-align:center}
</style>
</head>
<body>
<div class="card">
<div id="chart"></div>
<div class="footer">全球总产量 1.78 亿袋，消费量 1.72 亿袋，供大于求</div>
</div>
<script>
var WARM = '#c26d3a';
var WARM_HIGHLIGHT = '#E8875F';
var STONE = '#CCCCCC';
var BG_GRID = '#f2f0eb';
var TXT_MD = '#857d74';
var TXT_LT = '#ada599';
var TXT_DK = '#2E2C2A';

var countries = ['巴布亚新几内亚','哥斯达黎加','科特迪瓦','尼加拉瓜','危地马拉','墨西哥','秘鲁','乌干达','印度','洪都拉斯','埃塞俄比亚','印度尼西亚','哥伦比亚','越南','巴西'];
var values = [1200,1800,2500,2800,3800,4000,4200,5500,6000,6200,8500,11500,12500,29000,66400];
var colors = values.map(function(v){ return v === 66400 ? WARM_HIGHLIGHT : STONE; });

var chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  title: {
    text: '巴西主导全球咖啡生产，产量超第2-3名之和',
    subtext: '2023/24年度 · 全球TOP15咖啡生产国',
    left: 'center',
    top: 10,
    textStyle: { fontSize: 16, fontWeight: 600, color: TXT_DK },
    subtextStyle: { fontSize: 11, color: TXT_LT }
  },
  grid: { top: 70, right: 100, bottom: 10, left: 120 },
  xAxis: {
    type: 'value',
    min: 0,
    axisLine: { lineStyle: { color: TXT_LT } },
    axisTick: { show: false },
    splitLine: { lineStyle: { color: BG_GRID, type: 'dashed' } },
    axisLabel: { color: TXT_MD, fontSize: 11,
      formatter: function(v){ return v >= 10000 ? (v/10000).toFixed(0)+'万' : v; }
    }
  },
  yAxis: {
    type: 'category',
    data: countries,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { color: TXT_MD, fontSize: 11 }
  },
  series: [{
    name: '产量（千袋）',
    type: 'bar',
    data: values.map(function(v, i){
      var item = { value: v, itemStyle: { color: colors[i], borderRadius: [0, 3, 3, 0] } };
      if (v === 66400) {
        item.label = { show: true, position: 'right', fontSize: 11, fontWeight: 600, color: WARM_HIGHLIGHT,
          formatter: '66,400\n超第2-3名之和' };
      }
      return item;
    }),
    barWidth: 20,
    label: {
      show: true,
      position: 'right',
      fontSize: 10,
      color: TXT_MD,
      formatter: function(p){ return p.value.toLocaleString(); }
    }
  }],
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(ps){
      return ps[0].name + '：' + ps[0].value.toLocaleString() + ' 千袋';
    }
  }
});
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
