<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上证指数 28 个月回到原点</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 900px; height: 420px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    28 个月，从 <strong>3255 点回到 3258 点</strong>——中间经历了 2024 年 8 月跌至 2842 的绝望，以及 9 月政策刺激猛拉至 3336 的希望。两次极端波动后，最终回到原点。<strong>市场在等一个真正的增长叙事。</strong>
  </div>
  <div class="footer-note">数据来源：Wind | 2023.01 — 2025.04 月度收盘价</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const months = [
  '2023-01','2023-02','2023-03','2023-04','2023-05','2023-06','2023-07',
  '2023-08','2023-09','2023-10','2023-11','2023-12',
  '2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07',
  '2024-08','2024-09','2024-10','2024-11','2024-12',
  '2025-01','2025-02','2025-03','2025-04'
];
const prices = [
  3255.67,3279.61,3272.86,3323.63,3204.58,3202.06,3291.04,
  3119.47,3110.48,3018.77,3029.26,2974.93,
  2788.49,3027.02,3041.17,3104.82,3089.37,2967.41,2938.73,
  2842.21,3336.50,3261.44,3326.46,3351.78,
  3250.60,3313.53,3344.99,3258.89
];

const W = 900, H = 420;
const pad = { top: 70, right: 55, bottom: 50, left: 65 };
const plotW = W - pad.left - pad.right;
const plotH = H - pad.top - pad.bottom;

function xPx(i) { return pad.left + (i + 0.5) / months.length * plotW; }
function yPx(v) { return pad.top + plotH - ((v - 2700) / (3500 - 2700)) * plotH; }

const opt = {
  title: {
    text: '上证指数 28 个月回到原点',
    subtext: '2023.01 — 2025.04 月度收盘价',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) { return p[0].axisValue + ' ' + p[0].data.toFixed(1) + ' 点'; }
  },
  grid: { left: pad.left, right: pad.right, top: pad.top, bottom: pad.bottom },
  xAxis: {
    type: 'category', data: months,
    axisLabel: { interval: 5, rotate: 30, fontSize: 10, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value', min: 2700, max: 3500, interval: 100,
    axisLabel: { formatter: '{value}', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [{
    type: 'line', data: prices,
    smooth: 0.3, symbol: 'none',
    lineStyle: { width: 2.5, color: '#3D3D3A' }
  }],
  graphic: [
    // 起点 3255
    {
      type: 'circle', shape: { cx: xPx(0), cy: yPx(3255.67), r: 4 },
      style: { fill: '#87867F', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '起点 3255', fill: '#87867F', fontSize: 10, fontWeight: 600 },
      left: xPx(0) + 10, top: yPx(3255.67) - 16
    },
    // 最低 2842
    {
      type: 'circle', shape: { cx: xPx(19), cy: yPx(2842.21), r: 5 },
      style: { fill: '#c25030', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '2842 绝望时刻', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      left: xPx(19) - 80, top: yPx(2842.21) + 10
    },
    // 最高反弹 3336（政策刺激）
    {
      type: 'circle', shape: { cx: xPx(20), cy: yPx(3336.50), r: 5 },
      style: { fill: '#788C5D', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '3336 政策猛拉', fill: '#788C5D', fontSize: 10, fontWeight: 600 },
      left: xPx(20) - 70, top: yPx(3336.50) - 22
    },
    // 终点 3258
    {
      type: 'circle', shape: { cx: xPx(27), cy: yPx(3258.89), r: 4 },
      style: { fill: '#D97757', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '3258 回到原点', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: xPx(27) - 85, top: yPx(3258.89) - 16
    },
    // 起点参考线
    {
      type: 'line', shape: { x1: pad.left, y1: yPx(3255.67), x2: W - pad.right, y2: yPx(3255.67) },
      style: { stroke: '#C1C0B8', lineWidth: 0.8, lineDash: [3, 3] }
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
