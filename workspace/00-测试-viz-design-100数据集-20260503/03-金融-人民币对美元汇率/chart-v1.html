<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人民币汇率 vs 贸易顺差</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 900px; height: 500px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    2023 年初至 2025 年 4 月，人民币对美元从 <strong>6.75 贬至 7.25（-7%）</strong>，但贸易顺差并未系统性扩大——月均在 <strong>560-1050 亿美元</strong> 之间波动。经典理论预期贬值→出口竞争力增强→顺差扩大，数据不支持。可能原因：内需疲弱、关税压力、供应链转移。
  </div>
  <div class="footer-note">数据来源：中国人民银行、海关总署</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const dates = [
  '2023-01','2023-02','2023-03','2023-04','2023-05','2023-06','2023-07',
  '2023-08','2023-09','2023-10','2023-11','2023-12',
  '2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07',
  '2024-08','2024-09','2024-10','2024-11','2024-12',
  '2025-01','2025-02','2025-03','2025-04'
];
const usdCny = [
  6.75,6.85,6.88,6.92,7.08,7.22,7.17,7.28,7.29,7.32,7.24,7.11,
  7.10,7.20,7.23,7.25,7.24,7.27,7.26,7.13,7.02,7.12,7.24,7.30,
  7.28,7.26,7.24,7.25
];
const tradeBal = [
  76.7,16.9,88.2,90.2,65.1,70.6,80.1,68.2,77.7,56.5,68.4,75.3,
  62.1,41.0,72.7,72.6,82.6,81.2,84.7,91.0,58.2,58.5,61.0,104.8,
  63.0,18.0,72.5,68.9
];

const W = 900, H = 500;
const pad = { top: 70, right: 55, bottom: 100, left: 65 };
const plotH = H - pad.top - pad.bottom;
const topRatio = 0.62;
const topH = plotH * topRatio;
const botH = plotH * (1 - topRatio);
const gap = 30;

function xPx(i) { return pad.left + (i + 0.5) / dates.length * (W - pad.left - pad.right); }
function yPx(v, min, max, h, top) { return top + h - ((v - min) / (max - min)) * h; }

const opt = {
  title: {
    text: '人民币贬值 7%，但贸易顺差并未扩大',
    subtext: '2023.01 — 2025.04 月度数据',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) {
      let s = p[0].axisValue + '<br/>';
      p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + (item.seriesName.includes('汇率') ? '' : 'B') + '<br/>'; });
      return s;
    }
  },
  grid: [
    { left: pad.left, right: pad.right, top: pad.top, height: topH },
    { left: pad.left, right: pad.right, top: pad.top + topH + gap, height: botH }
  ],
  xAxis: [
    {
      type: 'category', data: dates, gridIndex: 0,
      axisLabel: { show: false },
      axisLine: { lineStyle: { color: '#E3DACC' } },
      axisTick: { show: false }
    },
    {
      type: 'category', data: dates, gridIndex: 1,
      axisLabel: { interval: 5, rotate: 30, fontSize: 10, color: '#87867F' },
      axisLine: { lineStyle: { color: '#E3DACC' } },
      axisTick: { show: false }
    }
  ],
  yAxis: [
    {
      type: 'value', name: 'USD/CNY', min: 6.6, max: 7.5, interval: 0.2,
      nameTextStyle: { fontSize: 10, color: '#D97757' },
      axisLabel: { fontSize: 10, color: '#D97757' },
      axisLine: { lineStyle: { color: '#D9775733' } },
      splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
      axisTick: { show: false },
      inverse: true
    },
    {
      type: 'value', name: '顺差 ($B)', min: 0, max: 120, interval: 20,
      nameTextStyle: { fontSize: 10, color: '#87867F' },
      axisLabel: { fontSize: 10, color: '#87867F' },
      axisLine: { show: false },
      splitLine: { show: false },
      axisTick: { show: false }
    }
  ],
  series: [
    {
      name: 'USD/CNY 汇率', type: 'line', data: usdCny,
      smooth: true, symbol: 'none',
      lineStyle: { width: 2.5, color: '#D97757' },
      xAxisIndex: 0, yAxisIndex: 0
    },
    {
      name: '贸易顺差', type: 'bar', data: tradeBal,
      itemStyle: { color: 'rgba(135,134,127,0.25)' },
      barWidth: '60%',
      xAxisIndex: 1, yAxisIndex: 1
    }
  ],
  graphic: [
    // 汇率区域标签
    {
      type: 'text', style: { text: '人民币贬值方向 →', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: pad.left + 8, top: pad.top + 8
    },
    // 起点标注
    {
      type: 'circle', shape: { cx: xPx(0), cy: yPx(6.75, 6.6, 7.5, topH, pad.top), r: 4 },
      style: { fill: '#D97757', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '6.75', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: xPx(0) + 10, top: yPx(6.75, 6.6, 7.5, topH, pad.top) - 14
    },
    // 最高贬值点
    {
      type: 'circle', shape: { cx: xPx(9), cy: yPx(7.32, 6.6, 7.5, topH, pad.top), r: 4 },
      style: { fill: '#c25030', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '7.32 最高贬值', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      left: xPx(9) - 80, top: yPx(7.32, 6.6, 7.5, topH, pad.top) + 8
    },
    // 终点
    {
      type: 'circle', shape: { cx: xPx(27), cy: yPx(7.25, 6.6, 7.5, topH, pad.top), r: 4 },
      style: { fill: '#D97757', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '7.25', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: xPx(27) + 10, top: yPx(7.25, 6.6, 7.5, topH, pad.top) - 14
    },
    // 顺差峰值
    {
      type: 'text', style: { text: '104.8B', fill: '#87867F', fontSize: 9, fontWeight: 600 },
      left: xPx(23) - 18, top: pad.top + topH + gap + botH - (104.8 / 120) * botH - 14
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
