<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple 股价：两次寻找新叙事</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 960px; }
  #chart { width: 900px; height: 460px; }
  .footer-note { text-align: center; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="footer-note">数据来源：月度收盘价（经拆股调整） | 2021.05 — 2025.04</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const months = [
  '2021-05','2021-06','2021-07','2021-08','2021-09','2021-10','2021-11','2021-12',
  '2022-01','2022-02','2022-03','2022-04','2022-05','2022-06','2022-07','2022-08',
  '2022-09','2022-10','2022-11','2022-12','2023-01','2023-02','2023-03','2023-04',
  '2023-05','2023-06','2023-07','2023-08','2023-09','2023-10','2023-11','2023-12',
  '2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07','2024-08',
  '2024-09','2024-10','2024-11','2024-12','2025-01','2025-02','2025-03','2025-04'
];
const prices = [
  124.28,136.96,145.86,151.83,141.50,149.80,165.30,177.57,
  174.78,165.12,174.61,157.65,148.84,136.72,162.51,157.22,
  138.20,153.34,148.03,129.93,144.29,147.41,164.90,169.68,
  177.25,193.97,196.45,187.65,171.21,170.77,189.95,192.53,
  184.40,180.75,171.48,169.30,192.25,210.62,218.24,229.00,
  233.00,225.91,238.72,250.42,224.80,217.90,209.27,198.50
];

// 两次下跌的关键数据
// 第一次: 2022-01 ($174.78) → 2022-12 ($129.93)  跌幅 -26%
// 第二次: 2024-12 ($250.42) → 2025-04 ($198.50)   跌幅 -21%

const option = {
  title: {
    text: 'Apple 两次失去增长叙事：第一次 AI 救了它，第二次呢？',
    subtext: '2021.05 — 2025.04 月度收盘价',
    left: 'center',
    top: 4,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) { return p[0].axisValue + ' $' + p[0].data; }
  },
  grid: { left: 55, right: 120, top: 62, bottom: 55 },
  xAxis: {
    type: 'category', data: months,
    axisLabel: { interval: 5, rotate: 30, fontSize: 10, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value', min: 110, max: 270, interval: 20,
    axisLabel: { formatter: '${value}', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [
    {
      name: '收盘价', type: 'line', data: prices,
      smooth: 0.3, symbol: 'none',
      lineStyle: { width: 2.5, color: '#3D3D3A' },
      // 第一次下跌：硬件周期见顶 → 触底
      markPoint: {
        symbol: 'circle', symbolSize: 8,
        data: [
          { name: '$177 见顶', xAxis: '2022-01', yAxis: 174.78, itemStyle: { color: '#c25030' }, label: { fontSize: 10, fontWeight: 600, color: '#c25030', position: 'insideTop', offset: [16, -10] }},
          { name: '$130 触底', xAxis: '2022-12', yAxis: 129.93, itemStyle: { color: '#c25030' }, label: { fontSize: 10, fontWeight: 600, color: '#c25030', position: 'insideBottom', offset: [16, 10] }}
        ]
      },
      markLine: {
        silent: true, symbol: 'none',
        data: [
          {
            yAxis: 177.57,
            label: { show: true, formatter: '前高 $177', position: 'insideStartTop', fontSize: 9, color: '#A3A29B' },
            lineStyle: { color: '#C1C0B8', type: 'dashed', width: 0.8 }
          }
        ]
      }
    }
  ],
  // 右侧注释区 — 两次下跌对比
  graphic: [
    // 第一次下跌区域标注
    {
      type: 'rect', shape: { x: 195, y: 55, width: 175, height: 155 },
      style: { fill: 'rgba(194,80,48,0.05)', stroke: 'rgba(194,80,48,0.15)', lineWidth: 1 }
    },
    {
      type: 'text', style: {
        text: '第一次失去叙事\niPhone 见顶 → 跌至 $130\n跌幅 -26%', fill: '#c25030',
        fontSize: 11, lineHeight: 18, fontWeight: 600
      },
      left: 210, top: 60
    },
    {
      type: 'text', style: {
        text: '结局：AI 叙事救场\n→ 涨至 $250', fill: '#788C5D',
        fontSize: 10, lineHeight: 17
      },
      left: 210, top: 115
    },

    // 第二次下跌区域标注
    {
      type: 'rect', shape: { x: 710, y: 55, width: 175, height: 155 },
      style: { fill: 'rgba(194,80,48,0.05)', stroke: 'rgba(194,80,48,0.15)', lineWidth: 1 }
    },
    {
      type: 'text', style: {
        text: '第二次失去叙事\nAI 见顶 → 跌至 $198\n跌幅 -21%', fill: '#c25030',
        fontSize: 11, lineHeight: 18, fontWeight: 600
      },
      left: 725, top: 60
    },
    {
      type: 'text', style: {
        text: '结局：？？？', fill: '#D97757',
        fontSize: 13, lineHeight: 17, fontWeight: 700
      },
      left: 725, top: 120
    }
  ]
};

chart.setOption(option);
</script>
</body>
</html>
