<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金价格年度数据 2015-2024</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #faf0e6;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 24px;
    color: #2e2c2a;
  }
  .card {
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid rgba(11,13,11,0.08);
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  .card h2 {
    font-size: 16px;
    font-weight: 600;
    color: #6b3410;
    margin-bottom: 4px;
  }
  .card .subtitle {
    font-size: 12px;
    color: #ada599;
    margin-bottom: 16px;
  }
  #chart { width: 100%; height: 480px; }
  .footer {
    font-size: 10px;
    color: #ada599;
    text-align: right;
    margin-top: 12px;
    border-top: 1px solid #f2f0eb;
    padding-top: 8px;
  }
</style>
</head>
<body>
<div class="card">
  <h2>黄金价格与宏观因子 2015-2024</h2>
  <p class="subtitle">金价(USD/oz) · 美元指数 · 美债10年期收益率(%) · 黄金ETF持仓(吨)</p>
  <div id="chart"></div>
  <p class="footer">数据来源：年度汇总 | 左轴：金价 / 右轴：美元指数、收益率、ETF持仓</p>
</div>

<script>
const chart = echarts.init(document.getElementById('chart'));

const years = [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024];
const goldPrices = [1160.06, 1250.82, 1257.70, 1268.99, 1392.60, 1769.64, 1798.60, 1800.09, 1943.22, 2386.53];
const usdIndex = [96.3, 95.1, 96.0, 97.4, 96.5, 94.5, 95.6, 104.0, 101.5, 103.2];
const yields = [2.14, 1.84, 2.33, 2.91, 1.86, 0.89, 1.45, 3.88, 3.99, 4.23];
const etfTonnes = [1558, 1736, 1769, 1763, 2845, 3752, 3568, 3132, 2615, 3215];

const option = {
  color: ['#c26d3a', '#3a7ab8', '#c25030', '#2e8b6e'],
  animation: false,
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#ffffff',
    borderColor: '#f2f0eb',
    textStyle: { color: '#2e2c2a', fontSize: 12 },
    axisPointer: { type: 'line', lineStyle: { color: '#ada599', type: 'dashed' } }
  },
  legend: {
    bottom: 0,
    textStyle: { color: '#857d74', fontSize: 11 },
    itemWidth: 16,
    itemHeight: 2
  },
  grid: { left: 64, right: 72, top: 24, bottom: 48 },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ada599' } },
    splitLine: { show: false },
    axisLabel: { color: '#857d74', fontSize: 11 }
  },
  yAxis: [
    {
      type: 'value',
      name: '金价 USD/oz',
      nameTextStyle: { color: '#c26d3a', fontSize: 10, padding: [0, 0, 0, 0] },
      min: 1000,
      max: 2500,
      axisLine: { show: false },
      axisLabel: { color: '#c26d3a', fontSize: 10, formatter: '${value}' },
      splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } }
    },
    {
      type: 'value',
      name: '右轴',
      min: 0,
      max: 120,
      axisLine: { show: false },
      axisLabel: { color: '#857d74', fontSize: 10 },
      splitLine: { show: false }
    }
  ],
  series: [
    {
      name: '金价 (USD/oz)',
      type: 'line',
      yAxisIndex: 0,
      data: goldPrices,
      smooth: true,
      symbol: 'circle',
      symbolSize: 6,
      lineStyle: { width: 2.5 },
      itemStyle: { color: '#c26d3a' },
      label: {
        show: true,
        position: 'top',
        formatter: '${c}',
        fontSize: 9,
        color: '#c26d3a'
      },
      markPoint: {
        data: [
          { type: 'max', name: '最高', label: { formatter: '最高\n${c}', fontSize: 9, color: '#c26d3a' } }
        ],
        symbol: 'pin',
        symbolSize: 40,
        itemStyle: { color: '#c26d3a', opacity: 0.7 }
      }
    },
    {
      name: '美元指数',
      type: 'line',
      yAxisIndex: 1,
      data: usdIndex,
      smooth: true,
      symbol: 'circle',
      symbolSize: 5,
      lineStyle: { width: 1.5, type: 'solid' },
      itemStyle: { color: '#3a7ab8' }
    },
    {
      name: '美债10Y收益率(%)',
      type: 'line',
      yAxisIndex: 1,
      data: yields,
      smooth: true,
      symbol: 'diamond',
      symbolSize: 5,
      lineStyle: { width: 1.5 },
      itemStyle: { color: '#c25030' }
    },
    {
      name: '黄金ETF持仓(吨)',
      type: 'line',
      yAxisIndex: 1,
      data: etfTonnes,
      smooth: true,
      symbol: 'rect',
      symbolSize: 5,
      lineStyle: { width: 1.5 },
      itemStyle: { color: '#2e8b6e' }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
