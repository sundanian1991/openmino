<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金的悖论：价格新高，持仓撤退</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAFAF5;
    font-family: Georgia, "Times New Roman", serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    width: 900px;
    background: #FAFAF5;
  }
  .header {
    text-align: center;
    padding: 0 30px 20px;
    border-bottom: 2px solid #8B1A1A;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1A1A1A;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .header h1 span {
    color: #8B1A1A;
  }
  .header p {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 12px;
    color: #857d74;
  }
  .chart-top {
    width: 100%;
    height: 280px;
  }
  .mid-comment {
    text-align: center;
    padding: 10px 30px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #8B1A1A;
    border-top: 1px dashed #ddd;
    border-bottom: 1px dashed #ddd;
    margin: 0 30px;
    background: rgba(139,26,26,0.03);
  }
  .chart-bottom {
    width: 100%;
    height: 280px;
  }
  .footnote {
    text-align: right;
    padding: 12px 30px 0;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 10px;
    color: #A3A29B;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span>黄金的悖论</span>：价格新高，持仓撤退</h1>
    <p>2015-2024 · 金价持续上涨但 ETF 资金持续流出 — 谁在买黄金？</p>
  </div>

  <div class="chart-top" id="chart-gold"></div>

  <div class="mid-comment">
    &#x2191; 金价创新高 &#x2003;&#x2003; vs &#x2003;&#x2003; &#x2193; 资金持续流出 &#x2003;— 传统逻辑失效
  </div>

  <div class="chart-bottom" id="chart-etf"></div>

  <div class="footnote">数据来源：LBMA · World Gold Council</div>
</div>

<script>
const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const goldPrices = [1160.06, 1250.82, 1257.70, 1268.99, 1392.60, 1769.64, 1798.60, 1800.09, 1943.22, 2386.53];
const etfHoldings = [1558, 1736, 1769, 1763, 2845, 3752, 3568, 3132, 2615, 3215];

const RED = '#8B1A1A';
const RED_LIGHT = '#C06060';
const BLUE = '#2A5C8A';
const BLUE_LIGHT = '#8BAEC0';
const BG = '#FAFAF5';
const TEXT = '#1A1A1A';
const GRID = '#e8e5df';
const LABEL = '#857d74';

// ===== 上图：金价 =====
const chartGold = echarts.init(document.getElementById('chart-gold'));
chartGold.setOption({
  grid: { top: 50, right: 30, bottom: 35, left: 60 },
  tooltip: {
    trigger: 'axis',
    formatter: function(params) {
      return params[0].name + '<br/>金价: $' + params[0].value.toLocaleString();
    },
    backgroundColor: '#fff',
    borderColor: '#ddd',
    textStyle: { fontSize: 12, color: TEXT }
  },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ada599' } },
    splitLine: { show: false },
    axisLabel: { color: LABEL, fontSize: 11 },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    name: '美元/盎司',
    nameTextStyle: { color: LABEL, fontSize: 11, padding: [0, 0, 0, -20] },
    min: 1000,
    axisLine: { show: false },
    splitLine: { lineStyle: { color: GRID, type: 'dashed' } },
    axisLabel: { color: LABEL, fontSize: 11, formatter: '${value}' }
  },
  series: [
    {
      name: '黄金价格',
      type: 'line',
      data: goldPrices,
      smooth: true,
      symbol: 'none',
      lineStyle: { width: 2.5, color: RED },
      areaStyle: {
        color: {
          type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
          colorStops: [
            { offset: 0, color: 'rgba(139,26,26,0.25)' },
            { offset: 1, color: 'rgba(139,26,26,0.02)' }
          ]
        }
      },
      markPoint: {
        symbol: 'circle',
        symbolSize: 8,
        itemStyle: { color: RED, borderColor: '#fff', borderWidth: 2 },
        data: [
          { name: '2020', value: goldPrices[5], xAxis: 5, yAxis: goldPrices[5], label: { show: false } },
          { name: '2024', value: goldPrices[9], xAxis: 9, yAxis: goldPrices[9], label: { show: false } }
        ]
      },
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: '#999', type: 'dotted', width: 1 },
        data: [
          { xAxis: 5, label: { show: false } },
          { xAxis: 9, label: { show: false } }
        ]
      }
    }
  ],
  graphic: [
    {
      type: 'text',
      left: 'center',
      top: 12,
      style: {
        text: '金价十年翻倍：$1,160 → $2,387（+106%）',
        fill: TEXT,
        font: '600 14px Georgia, serif'
      }
    },
    {
      type: 'text',
      left: 65,
      top: 60,
      style: {
        text: '疫情+零利率\n首破1700',
        fill: RED,
        font: '600 11px system-ui, sans-serif',
        textAlign: 'left'
      }
    },
    {
      type: 'text',
      right: 35,
      top: 30,
      style: {
        text: '央行购金+去美元化\n站上2400',
        fill: RED,
        font: '600 11px system-ui, sans-serif',
        textAlign: 'right'
      }
    }
  ]
});

// ===== 下图：ETF持仓 =====
const chartEtf = echarts.init(document.getElementById('chart-etf'));
chartEtf.setOption({
  grid: { top: 50, right: 30, bottom: 35, left: 60 },
  tooltip: {
    trigger: 'axis',
    formatter: function(params) {
      return params[0].name + '<br/>ETF持仓: ' + params[0].value.toLocaleString() + ' 吨';
    },
    backgroundColor: '#fff',
    borderColor: '#ddd',
    textStyle: { fontSize: 12, color: TEXT }
  },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ada599' } },
    splitLine: { show: false },
    axisLabel: { color: LABEL, fontSize: 11 },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    name: '吨',
    nameTextStyle: { color: LABEL, fontSize: 11, padding: [0, 0, 0, -20] },
    min: 1000,
    axisLine: { show: false },
    splitLine: { lineStyle: { color: GRID, type: 'dashed' } },
    axisLabel: { color: LABEL, fontSize: 11 }
  },
  series: [
    {
      name: 'ETF持仓',
      type: 'line',
      data: etfHoldings,
      smooth: true,
      symbol: 'none',
      lineStyle: { width: 2, color: BLUE },
      areaStyle: {
        color: {
          type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
          colorStops: [
            { offset: 0, color: 'rgba(42,92,138,0.20)' },
            { offset: 1, color: 'rgba(42,92,138,0.02)' }
          ]
        }
      },
    },
    {
      name: '2015基准',
      type: 'line',
      data: etfHoldings.map(() => 1558),
      symbol: 'none',
      lineStyle: { color: '#bbb', type: 'dashed', width: 1 },
      silent: true
    }
  ],
  graphic: [
    {
      type: 'text',
      left: 'center',
      top: 12,
      style: {
        text: 'ETF持仓：2020年见顶后连降4年',
        fill: TEXT,
        font: '600 14px Georgia, serif'
      }
    },
    {
      type: 'text',
      left: 'center',
      top: 35,
      style: {
        text: '3,752 吨',
        fill: BLUE,
        font: '600 11px system-ui, sans-serif'
      }
    },
    {
      type: 'text',
      right: 40,
      top: 110,
      style: {
        text: '连降4年后\n首回升',
        fill: BLUE,
        font: '600 11px system-ui, sans-serif',
        textAlign: 'right'
      }
    },
    {
      type: 'text',
      left: 65,
      bottom: 45,
      style: {
        text: '2015 基准: 1,558 吨',
        fill: '#999',
        font: '10px system-ui, sans-serif',
        textAlign: 'left'
      }
    }
  ]
});
</script>
</body>
</html>
