<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国城镇化增速放缓</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAFAF5;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .chart-container {
    width: 800px;
    max-width: 100%;
    background: #FAFAF5;
  }
  .chart-header {
    text-align: center;
    margin-bottom: 8px;
    padding: 0 40px;
  }
  .chart-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 600;
    color: #1A1A1A;
    line-height: 1.35;
  }
  .chart-subtitle {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #8B1A1A;
    margin-top: 8px;
    font-weight: 500;
  }
  #main {
    width: 100%;
    height: 400px;
  }
  .chart-footer {
    padding: 0 40px;
    font-size: 10px;
    color: #8B8680;
    border-top: 1px solid #E8E4DD;
    padding-top: 10px;
  }
</style>
</head>
<body>
<div class="chart-container">
  <div class="chart-header">
    <div class="chart-title">城镇化速度越来越慢</div>
    <div class="chart-subtitle">曲线从陡峭到平缓 — 每年新增城镇人口萎缩 97%</div>
  </div>
  <div id="main"></div>
  <div class="chart-footer">数据来源：国家统计局 | 城镇人口（百万）</div>
</div>
<script>
const chart = echarts.init(document.getElementById('main'));

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const urbanPop = [771.2, 798.7, 825.1, 849.3, 873.0, 894.8, 920.7, 932.7, 941.2, 950.4];

const option = {
  animation: false,
  backgroundColor: '#FAFAF5',
  textStyle: { fontFamily: 'system-ui, sans-serif', color: '#1A1A1A' },
  grid: { top: 40, right: 60, bottom: 40, left: 55 },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ADA599' } },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: { color: '#8B8680', fontSize: 11 }
  },
  yAxis: {
    type: 'value',
    min: 750,
    max: 970,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      show: true,
      lineStyle: { color: '#F2F0EB', type: 'dashed', width: 1 }
    },
    axisLabel: {
      color: '#8B8680',
      fontSize: 11,
      formatter: '{value}M'
    }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(255,255,255,0.95)',
    borderColor: '#E8E4DD',
    textStyle: { fontSize: 12, color: '#1A1A1A' },
    formatter: function(p) {
      return p[0].name + '年<br/>城镇人口：' + p[0].value + 'M';
    }
  },
  series: [
    // 系列 1：城镇人口折线
    {
      name: '城镇人口',
      type: 'line',
      data: urbanPop,
      smooth: true,
      symbol: 'none',
      lineStyle: { color: '#8B1A1A', width: 3 },
      z: 2
    },
    // 系列 2：2024 终点
    {
      type: 'scatter',
      data: [[9, 950.4]],
      symbol: 'circle',
      symbolSize: 16,
      itemStyle: { color: '#8B1A1A' },
      z: 3,
      silent: true,
      label: {
        show: true,
        formatter: '950M',
        position: 'right',
        offset: [12, 0],
        color: '#8B1A1A',
        fontSize: 16,
        fontWeight: 'bold',
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 3：2015 起点
    {
      type: 'scatter',
      data: [[0, 771.2]],
      symbol: 'circle',
      symbolSize: 10,
      itemStyle: { color: '#FAFAF5', borderColor: '#8B8680', borderWidth: 2 },
      z: 3,
      silent: true,
      label: {
        show: true,
        formatter: '771M',
        position: 'left',
        offset: [-12, 0],
        color: '#8B8680',
        fontSize: 12,
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 4：拐点标注（2020 疫情后减速）
    {
      type: 'scatter',
      data: [[5, 894.8]],
      symbol: 'circle',
      symbolSize: 8,
      itemStyle: { color: '#8B8680' },
      z: 3,
      silent: true,
      label: {
        show: true,
        formatter: '2020 后明显减速',
        position: 'bottom',
        offset: [0, 14],
        color: '#8B8680',
        fontSize: 11,
        fontFamily: 'Georgia, serif'
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
