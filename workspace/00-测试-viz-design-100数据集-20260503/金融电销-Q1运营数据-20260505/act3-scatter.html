<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融电销 Q1 — 转：根因分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 850px; height: 400px; }
  .act-badge { display: inline-block; background: #788C5D; color: #fff; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 4px; margin-bottom: 8px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div class="act-badge">第三幕 · 转</div>
  <div id="chart"></div>
  <div class="lead">
    <strong>日均拨打越少，转化越高</strong>——B 组日均 289 通转化 2.3%，C 组 316 通仅 1.8%。C 组"无效忙碌"：追求拨打量牺牲了通话质量。<strong>不是打得越多越好，是打得越精越好。</strong>
  </div>
  <div class="footer-note">数据来源：电销中心运营系统 | 2025年 Q1 均值</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

// X=日均拨打, Y=转化率%, size=通话时长s
const data = [
  { name: 'B组', value: [289, 2.3], size: 342, color: '#D97757', itemStyle: { color: '#D97757' } },
  { name: 'D组', value: [277, 2.4], size: 333, color: '#87867F', itemStyle: { color: '#87867F' } },
  { name: 'A组', value: [300, 2.2], size: 324, color: '#C1C0B8', itemStyle: { color: '#C1C0B8' } },
  { name: 'E组', value: [301, 2.3], size: 316, color: '#C1C0B8', itemStyle: { color: '#C1C0B8' } },
  { name: 'C组', value: [316, 1.8], size: 290, color: '#c25030', itemStyle: { color: '#c25030' } },
  { name: 'F组', value: [285, 1.8], size: 278, color: '#C1C0B8', itemStyle: { color: '#C1C0B8' } },
];

const opt = {
  title: {
    text: '日均拨打越少转化越高，C 组"无效忙碌"',
    subtext: 'X=日均拨打通数, Y=转化率%, 气泡大小=平均通话时长(s)',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    formatter: function(p) {
      return p.name + '<br/>日均拨打: ' + p.value[0] + ' 通<br/>转化率: ' + p.value[1] + '%<br/>通话时长: ' + p.data.size + 's';
    }
  },
  grid: { left: 55, right: 30, top: 65, bottom: 40 },
  xAxis: {
    name: '日均拨打（通）', nameLocation: 'middle', nameGap: 28, nameTextStyle: { fontSize: 10, color: '#87867F' },
    min: 265, max: 325,
    axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { fontSize: 10, color: '#87867F' }, axisTick: { show: false },
    splitLine: { show: false }
  },
  yAxis: {
    name: '转化率（%）', nameLocation: 'middle', nameGap: 32, nameTextStyle: { fontSize: 10, color: '#87867F' },
    min: 1.5, max: 2.8,
    axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' }, axisTick: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } }
  },
  series: [{
    type: 'scatter', data: data,
    symbolSize: function(d, param) { return Math.sqrt(param.data.size) * 2.2; },
    label: {
      show: true, formatter: function(p) { return p.name; },
      position: 'top', fontSize: 10, fontWeight: 600,
      color: function(p) { return p.data.color; }
    },
    itemStyle: { borderColor: '#fff', borderWidth: 2 }
  }],
  graphic: [
    // 负相关趋势标注
    {
      type: 'text', style: { text: '← 拨打越少，转化越高 →', fill: '#A3A29B', fontSize: 10, fontStyle: 'italic' },
      left: 250, top: 340
    },
    // B 组标注
    {
      type: 'text', style: { text: '精拨打 + 长通话', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: 180, top: 120
    },
    // C 组标注
    {
      type: 'text', style: { text: '无效忙碌', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      right: 80, top: 270
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
