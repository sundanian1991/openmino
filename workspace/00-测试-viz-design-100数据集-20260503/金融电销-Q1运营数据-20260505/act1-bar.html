<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融电销 Q1 — 起：团队业绩总览</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 850px; height: 400px; }
  .act-badge { display: inline-block; background: #D97757; color: #fff; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 4px; margin-bottom: 8px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div class="act-badge">第一幕 · 起</div>
  <div id="chart"></div>
  <div class="lead">
    6 个团队 Q1 业绩分化严重——<strong>B 组成交 1.2 亿，是 F 组的 1.7 倍</strong>。B/D 两组持续领先，C/F 组垫底且无改善迹象。<strong>头尾差距不是偶然，是策略差异的必然结果。</strong>
  </div>
  <div class="footer-note">数据来源：电销中心运营系统 | 2025年 Q1</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

// Q1 总成交金额（万元），降序
const teams = ['B组','D组','E组','A组','C组','F组'];
const revenue = [11955, 10848, 10119, 10014, 7392, 6993];
const meanVal = 9554;
const colors = ['#D97757','#C1C0B8','#C1C0B8','#C1C0B8','#C1C0B8','#c25030'];

const opt = {
  title: {
    text: 'B 组 Q1 成交 1.2 亿领跑，F 组仅 6993 万',
    subtext: '6 团队 Q1 总成交金额（万元）',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis', axisPointer: { type: 'shadow' },
    formatter: function(p) { return p[0].name + ': ' + p[0].value + ' 万（' + (p[0].value/10000).toFixed(1) + '亿）'; }
  },
  grid: { left: 50, right: 100, top: 65, bottom: 25 },
  xAxis: {
    type: 'value',
    axisLabel: { formatter: function(v) { return (v/10000).toFixed(1) + '亿'; }, fontSize: 10, color: '#87867F' },
    axisLine: { show: false }, splitLine: { show: false }, axisTick: { show: false }
  },
  yAxis: {
    type: 'category', data: teams,
    axisLine: { show: false }, axisTick: { show: false },
    axisLabel: { fontSize: 11, color: '#3D3D3A' }
  },
  series: [{
    type: 'bar', data: revenue, barWidth: '50%',
    itemStyle: { color: function(p) { return colors[p.dataIndex]; }, borderRadius: [0, 4, 4, 0] },
    label: { show: true, position: 'right', formatter: function(p) { return (p.value/10000).toFixed(1) + '亿'; }, fontSize: 10, color: '#87867F' }
  }],
  graphic: [
    // 均值参考线
    {
      type: 'line',
      shape: { x1: 50, y1: 150, x2: 800, y2: 150 },
      style: { stroke: '#E6E3DA', lineWidth: 1, lineDash: [6, 4] }
    },
    {
      type: 'text', style: { text: '均值 9554 万', fill: '#A3A29B', fontSize: 9 },
      left: 800 - 90, top: 150 - 14
    },
    // B 组标注
    {
      type: 'text', style: { text: '↑ 领先 F 组 71%', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: 680, top: 100
    },
    // F 组标注
    {
      type: 'text', style: { text: '垫底', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      left: 620, top: 325
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
