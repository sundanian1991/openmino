<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5G基站建设与渗透率</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==="undefined"){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.1/echarts.min.js"><\/script>')}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .chart-card {
    width: 900px;
    margin: 0 auto;
    padding: 28px 32px 18px;
    background: #ffffff;
    border-radius: 10px;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: #6b3410;
    line-height: 1.5;
  }
  .chart-subtitle {
    font-size: 11px;
    font-weight: 400;
    color: #857d74;
    margin-top: 2px;
  }
  #chart { width: 900px; height: 420px; }
  .chart-footnote {
    font-size: 10px;
    color: #ada599;
    margin-top: 4px;
    text-align: right;
  }
</style>
</head>
<body>
<div class="chart-card">
  <div class="chart-title">5G 基站累计突破 400 万座，2023 年新建达峰值后增速放缓</div>
  <div class="chart-subtitle">2019-2025 中国 5G 基站建设与渗透率变化</div>
  <div id="chart"></div>
  <div class="chart-footnote">2025E 为预测值</div>
</div>

<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

var years = ['2019', '2020', '2021', '2022', '2023', '2024', '2025E'];
var newBuild = [13.0, 58.8, 70.7, 88.7, 106.5, 87.3, 75.0];
var pct5G    = [1.5, 7.7, 14.3, 21.3, 29.3, 35.0, 39.7];

var option = {
  animation: false,
  grid: {
    left: 62,
    right: 62,
    top: 30,
    bottom: 44,
    containLabel: false
  },
  legend: {
    show: true,
    bottom: 0,
    itemGap: 28,
    itemWidth: 14,
    itemHeight: 10,
    textStyle: { color: '#857d74', fontSize: 11 },
    data: [
      { name: '当年新建基站（万个）', icon: 'rect' },
      { name: '5G 占比（%）', icon: 'line' }
    ]
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross', crossStyle: { color: '#ada599' } },
    backgroundColor: '#fff',
    borderColor: '#f2f0eb',
    borderWidth: 1,
    textStyle: { color: '#2e2c2a', fontSize: 12 },
    formatter: function(params) {
      var bar = params[0];
      var line = params[1];
      return '<b>' + bar.axisValue + '</b><br/>' +
        '<span style="color:#2e8b6e">●</span> 当年新建：' + bar.value + ' 万个<br/>' +
        '<span style="color:#c26d3a">—</span> 5G 占比：' + line.value + '%';
    }
  },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ada599' } },
    axisTick: { show: false },
    axisLabel: { color: '#857d74', fontSize: 11 },
    splitLine: { show: false }
  },
  yAxis: [
    {
      type: 'value',
      name: '万个',
      nameTextStyle: { color: '#857d74', fontSize: 10, padding: [0, 30, 0, 0] },
      min: 0,
      max: 120,
      interval: 20,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { color: '#857d74', fontSize: 11 },
      splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } }
    },
    {
      type: 'value',
      name: '%',
      nameTextStyle: { color: '#857d74', fontSize: 10, padding: [0, 0, 0, 30] },
      min: 0,
      max: 50,
      interval: 10,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { color: '#857d74', fontSize: 11 },
      splitLine: { show: false }
    }
  ],
  series: [
    {
      name: '当年新建基站（万个）',
      type: 'bar',
      yAxisIndex: 0,
      barWidth: '42%',
      data: newBuild.map(function(v, i) {
        var item = { value: v, itemStyle: { color: '#2e8b6e' } };
        // 2025E 预测值：虚线边框 + 半透明填充
        if (i === 6) {
          item.itemStyle = {
            color: 'rgba(46,139,110,0.2)',
            borderColor: '#2e8b6e',
            borderWidth: 2,
            borderType: 'dashed',
            borderRadius: [2, 2, 0, 0]
          };
        } else {
          item.itemStyle.borderRadius = [2, 2, 0, 0];
        }
        return item;
      }),
      markPoint: {
        symbol: 'pin',
        symbolSize: 0,
        data: [
          {
            name: '2023峰值',
            coord: [4, 106.5],
            label: {
              show: true,
              formatter: '106.5 万峰值',
              color: '#2e8b6e',
              fontSize: 10,
              fontWeight: 600,
              position: 'top',
              distance: 8
            }
          }
        ]
      }
    },
    {
      name: '5G 占比（%）',
      type: 'line',
      yAxisIndex: 1,
      smooth: true,
      symbol: 'circle',
      symbolSize: 6,
      lineStyle: { color: '#c26d3a', width: 2.5 },
      itemStyle: { color: '#c26d3a', borderWidth: 2 },
      data: pct5G,
      markPoint: {
        symbol: 'pin',
        symbolSize: 0,
        data: [
          {
            name: '35%',
            coord: [5, 35.0],
            label: {
              show: true,
              formatter: '35%',
              color: '#c26d3a',
              fontSize: 11,
              fontWeight: 600,
              position: 'right',
              distance: 6
            }
          }
        ]
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
