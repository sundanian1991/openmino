<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 06: Pastel Geometry</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fef9f3;
            --accent-1: #ffb5a7;
            --accent-2: #fcd5ce;
            --accent-3: #f8edeb;
            --accent-4: #d8e2dc;
            --accent-5: #b5e48c;
            --text: #4a4a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        .shapes {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .shape {
            position: absolute;
            border-radius: 100px;
        }
        .shape:nth-child(1) { width: 200px; height: 60px; background: var(--accent-1); top: 15%; left: 10%; animation: float 4s ease-in-out infinite; }
        .shape:nth-child(2) { width: 80px; height: 80px; background: var(--accent-4); top: 20%; right: 15%; border-radius: 50%; animation: float 5s ease-in-out infinite 0.5s; }
        .shape:nth-child(3) { width: 150px; height: 40px; background: var(--accent-5); bottom: 25%; left: 20%; animation: float 4.5s ease-in-out infinite 1s; }
        .shape:nth-child(4) { width: 100px; height: 100px; background: var(--accent-2); bottom: 15%; right: 10%; border-radius: 50%; animation: float 5.5s ease-in-out infinite 0.3s; }
        .content {
            text-align: center;
            z-index: 1;
        }
        h1 {
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 700;
            color: var(--text);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .pills {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
            animation: fadeIn 0.6s 0.2s both;
        }
        .pill {
            background: var(--accent-1);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pill:nth-child(2) { background: var(--accent-4); color: var(--text); }
        .pill:nth-child(3) { background: var(--accent-5); color: var(--text); }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="content">
        <h1>Pastel Geometry</h1>
        <div class="pills">
            <span class="pill">友好</span>
            <span class="pill">亲和</span>
            <span class="pill">现代</span>
        </div>
    </div>
</body>
</html>
