<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 01: Bold Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #1a1a2e;
            --accent: #ff3366;
            --text: #ffffff;
            --text-muted: #8888aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }
        .card {
            background: var(--card);
            padding: clamp(2rem, 5vw, 4rem);
            border-radius: 24px;
            text-align: center;
            max-width: 90vw;
            animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 60px rgba(255, 51, 102, 0.15);
        }
        h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .accent-bar {
            width: 60px;
            height: 4px;
            background: var(--accent);
            margin: 1rem auto;
            border-radius: 2px;
        }
        p {
            color: var(--text-muted);
            font-size: clamp(1rem, 2vw, 1.25rem);
        }
        .tag {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 1.5rem;
            letter-spacing: 0.05em;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bold Signal</h1>
        <div class="accent-bar"></div>
        <p>自信、高冲击力的演示风格</p>
        <span class="tag">PITCH DECK</span>
    </div>
</body>
</html>
