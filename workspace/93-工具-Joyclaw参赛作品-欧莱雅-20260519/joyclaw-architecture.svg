<defs>
  <style>
    @keyframes dash-flow { to { stroke-dashoffset: -40; } }
    @keyframes dash-flow-slow { to { stroke-dashoffset: -40; } }
    .flow-primary { stroke-dasharray: 10 6; animation: dash-flow 2s linear infinite; }
    .flow-secondary { stroke-dasharray: 8 8; animation: dash-flow 2.4s linear infinite; }
    .flow-feedback { stroke-dasharray: 6 10; animation: dash-flow-slow 3s linear infinite; }
    .phase-bg { opacity: 0.07; }
    .phase-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; }
    .node-title { font-size: 14px; font-weight: 600; fill: #2d2926; }
    .node-desc { font-size: 10.5px; fill: #7a6f66; }
    .edge-lbl { font-size: 11px; font-weight: 500; }
    .main-title { font-size: 20px; font-weight: 600; fill: #2d2926; }
    .main-sub { font-size: 11px; fill: #7a6f66; letter-spacing: 0.04em; }
    .val-title { font-size: 12px; font-weight: 600; fill: #2d2926; }
    .val-desc { font-size: 10px; fill: #7a6f66; }
    .val-num { font-size: 11px; font-weight: 600; }
    .comp-title { font-size: 12px; font-weight: 600; fill: #2d2926; }
    .comp-desc { font-size: 9.5px; fill: #7a6f66; }
    text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; }
  </style>
