<!-- Background -->
<rect width="1100" height="920" fill="#fcfbf7"/>
<text x="60" y="40" class="main-title">Joyclaw 智能工作流 — Agent 工作流程</text>
<text x="60" y="62" class="main-sub">提交需求 → 自动搭建 → 定时执行 → 结果推送</text>

<!-- ============ PHASE 1: 输入 ============ -->
<rect x="60" y="86" width="880" height="140" rx="10" fill="#fff0cf" class="phase-bg"/>
<rect x="60" y="86" width="880" height="140" rx="10" fill="none" stroke="#e8e1d7"/>
<rect x="72" y="94" width="56" height="20" rx="4" fill="#fff0cf" stroke="#d4b870" stroke-width="1"/>
<text x="100" y="108" class="phase-tag" text-anchor="middle" fill="#c49000">01 输入</text>

<!-- N1 业务人员 -->
<rect x="340" y="108" width="320" height="96" rx="14" fill="white" stroke="#2d2926" stroke-width="1.5"/>
<rect x="342" y="110" width="320" height="96" rx="14" fill="none" stroke="#2d2926" stroke-width="0.6" opacity="0.2"/>
<use href="#ico-user" x="362" y="130" width="26" height="26" fill="#c49000"/>
<text x="396" y="148" class="node-title">业务人员</text>
<text x="362" y="178" class="node-desc">提交 SQL 与提示词</text>

<!-- N1→N2 -->
<path d="M500,204 L500,275" fill="none" stroke="#f36b3c" stroke-width="3.5" class="flow-primary" marker-end="url(#ac)"/>
<rect x="506" y="224" width="90" height="18" rx="4" fill="#fcfbf7"/>
<text x="551" y="237" class="edge-lbl" fill="#f36b3c" text-anchor="middle">提交需求</text>

<!-- ============ PHASE 2: 搭建 ============ -->
<rect x="60" y="240" width="880" height="240" rx="10" fill="#ffe0d7" class="phase-bg"/>
<rect x="60" y="240" width="880" height="240" rx="10" fill="none" stroke="#e8e1d7"/>
<rect x="72" y="248" width="56" height="20" rx="4" fill="#ffe0d7" stroke="#d4a090" stroke-width="1"/>
<text x="100" y="262" class="phase-tag" text-anchor="middle" fill="#c44400">02 搭建</text>

<!-- N2 Joyclaw 智能引擎 -->
<rect x="330" y="278" width="340" height="96" rx="14" fill="#ffe0d7" stroke="#2d2926" stroke-width="1.5"/>
<rect x="332" y="280" width="340" height="96" rx="14" fill="none" stroke="#2d2926" stroke-width="0.6" opacity="0.2"/>
<use href="#ico-gear" x="352" y="302" width="26" height="26" fill="#c44400"/>
<text x="386" y="320" class="node-title">Joyclaw 智能引擎</text>
<text x="352" y="350" class="node-desc">根据 Skill 自动搭建 Agent 工作流</text>

<!-- N2→N3 (分支) -->
<path d="M500,374 L500,410" fill="none" stroke="#f36b3c" stroke-width="3" class="flow-primary" marker-end="url(#ac)"/>
<rect x="506" y="382" width="90" height="18" rx="4" fill="#fcfbf7"/>
<text x="551" y="395" class="edge-lbl" fill="#f36b3c" text-anchor="middle">生成工作流</text>

<!-- N3 工作流组件（4个并排） -->
<rect x="90" y="415" width="820" height="56" rx="10" fill="white" stroke="#2f7cf6" stroke-width="1.2" stroke-dasharray="4 3"/>

<!-- C1 数据库 -->
<rect x="105" y="420" width="185" height="46" rx="8" fill="#dcebff" stroke="#2f7cf6" stroke-width="0.8"/>
<use href="#ico-database" x="115" y="430" width="22" height="22" fill="#1a5fb4"/>
<text x="142" y="446" class="comp-title">数据库</text>
<text x="115" y="458" class="comp-desc">SQL 查询</text>

<!-- C2 提示词 -->
<rect x="305" y="420" width="185" height="46" rx="8" fill="#dcebff" stroke="#2f7cf6" stroke-width="0.8"/>
<use href="#ico-wand" x="315" y="430" width="22" height="22" fill="#1a5fb4"/>
<text x="342" y="446" class="comp-title">提示词</text>
<text x="315" y="458" class="comp-desc">用户自定义</text>

<!-- C3 大模型 -->
<rect x="505" y="420" width="185" height="46" rx="8" fill="#dcebff" stroke="#2f7cf6" stroke-width="0.8"/>
<use href="#ico-cpu" x="515" y="430" width="22" height="22" fill="#1a5fb4"/>
<text x="542" y="446" class="comp-title">大模型</text>
<text x="515" y="458" class="comp-desc">智能分析</text>

<!-- C4 发送京me群 -->
<rect x="705" y="420" width="185" height="46" rx="8" fill="#dcebff" stroke="#2f7cf6" stroke-width="0.8"/>
<use href="#ico-megaphone" x="715" y="430" width="22" height="22" fill="#1a5fb4"/>
<text x="742" y="446" class="comp-title">发送京me群</text>
<text x="715" y="458" class="comp-desc">结果推送</text>

<!-- N3→N4 -->
<path d="M500,471 L500,540" fill="none" stroke="#2f7cf6" stroke-width="3.5" class="flow-primary" marker-end="url(#as)"/>
<rect x="506" y="492" width="90" height="18" rx="4" fill="#fcfbf7"/>
<text x="551" y="505" class="edge-lbl" fill="#2f7cf6" text-anchor="middle">定时触发</text>

<!-- ============ PHASE 3: 执行 ============ -->
<rect x="60" y="510" width="880" height="240" rx="10" fill="#dff7e8" class="phase-bg"/>
<rect x="60" y="510" width="880" height="240" rx="10" fill="none" stroke="#e8e1d7"/>
<rect x="72" y="518" width="56" height="20" rx="4" fill="#dff7e8" stroke="#90d0a8" stroke-width="1"/>
<text x="100" y="532" class="phase-tag" text-anchor="middle" fill="#1a7a3a">03 执行</text>

<!-- N4 智能体云端定时调用 -->
<rect x="300" y="548" width="400" height="96" rx="14" fill="white" stroke="#2d2926" stroke-width="1.5"/>
<rect x="302" y="550" width="400" height="96" rx="14" fill="none" stroke="#2d2926" stroke-width="0.6" opacity="0.2"/>
<use href="#ico-gauge" x="322" y="572" width="26" height="26" fill="#1a7a3a"/>
<text x="356" y="590" class="node-title">智能体云端定时调用</text>
<text x="322" y="620" class="node-desc">云端自动执行 · 无需人工干预</text>

<!-- N4→N5 -->
<path d="M500,644 L500,690" fill="none" stroke="#24b36b" stroke-width="3.5" class="flow-primary" marker-end="url(#am)"/>

<!-- N5 执行完毕 -->
<rect x="370" y="695" width="260" height="56" rx="28" fill="#dff7e8" stroke="#1a7a3a" stroke-width="1.5"/>
<rect x="372" y="697" width="260" height="56" rx="28" fill="none" stroke="#1a7a3a" stroke-width="0.6" opacity="0.2"/>
<use href="#ico-check" x="392" y="710" width="22" height="22" fill="#1a7a3a"/>
<text x="420" y="726" class="node-title">执行完毕</text>
<text x="392" y="742" class="comp-desc">结果已推送至京me群</text>

<!-- ============ FEEDBACK: 执行结果 → 优化提示词 ============ -->
<path d="M370,723 L80,723 L80,443 L105,443" fill="none" stroke="#d79210" stroke-width="2.5" class="flow-feedback" marker-end="url(#aa)"/>
<rect x="42" y="570" width="76" height="18" rx="4" fill="#fcfbf7"/>
<text x="80" y="583" class="edge-lbl" fill="#d79210" text-anchor="middle">结果反馈</text>

<!-- ============ RIGHT SIDE ============ -->
<rect x="960" y="86" width="120" height="664" rx="8" fill="white" stroke="#e8e1d7" stroke-width="1"/>
<text x="1020" y="106" class="phase-tag" text-anchor="middle" fill="#7a6f66">阶段说明</text>

<line x1="970" y1="116" x2="1070" y2="116" stroke="#e8e1d7"/>
<text x="974" y="140" class="val-title" fill="#c49000">01 输入</text>
<text x="974" y="158" class="val-desc">业务人员提交</text>
<text x="974" y="174" class="val-desc">SQL 和提示词</text>

<line x1="970" y1="194" x2="1070" y2="194" stroke="#e8e1d7"/>
<text x="974" y="218" class="val-title" fill="#c44400">02 搭建</text>
<text x="974" y="236" class="val-desc">Joyclaw 根据 Skill</text>
<text x="974" y="252" class="val-desc">自动生成工作流</text>
<text x="974" y="268" class="val-desc">含4个核心组件</text>

<line x1="970" y1="288" x2="1070" y2="288" stroke="#e8e1d7"/>
<text x="974" y="312" class="val-title" fill="#1a7a3a">03 执行</text>
<text x="974" y="330" class="val-desc">云端定时调用</text>
<text x="974" y="346" class="val-desc">自动运行推送</text>

<!-- ============ BOTTOM: VALUE ============ -->
<rect x="60" y="778" width="1020" height="120" rx="12" fill="white" stroke="#e8e1d7" stroke-width="1.5"/>
<rect x="60" y="778" width="1020" height="4" rx="2" fill="#f36b3c"/>
<text x="90" y="808" class="val-title" fill="#2d2926">核心流程特点</text>

<!-- V1 -->
<rect x="80" y="822" width="230" height="60" rx="8" fill="#fcfbf7" stroke="#e8e1d7"/>
<use href="#ico-user" x="92" y="836" width="18" height="18" fill="#c49000"/>
