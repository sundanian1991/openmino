<text x="592" y="868" class="val-desc">无需人工干预，自动运行</text>

<!-- V4 -->
<rect x="830" y="822" width="230" height="60" rx="8" fill="#fcfbf7" stroke="#e8e1d7"/>
<use href="#ico-megaphone" x="842" y="836" width="18" height="18" fill="#1a5fb4"/>
