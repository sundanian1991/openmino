<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国城镇化率 2015-2024</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAFAF5;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .chart-container {
    width: 800px;
    max-width: 100%;
    background: #FAFAF5;
  }
  .chart-header {
    text-align: center;
    margin-bottom: 8px;
    padding: 0 40px;
  }
  .chart-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 600;
    color: #1A1A1A;
    line-height: 1.3;
  }
  .chart-subtitle {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #8B1A1A;
    margin-top: 8px;
    font-weight: 500;
  }
  #main {
    width: 100%;
    height: 420px;
  }
  .chart-footer {
    padding: 0 40px;
    font-size: 10px;
    color: #8B8680;
    border-top: 1px solid #E8E4DD;
    padding-top: 10px;
    margin-top: 0;
  }
</style>
</head>
<body>
<div class="chart-container">
  <div class="chart-header">
    <div class="chart-title">中国城镇化十年进程：从 57% 到 66%，从未回头</div>
    <div class="chart-subtitle">2015-2024 年城镇人口占比变化 | 新增城镇人口约 8600 万</div>
  </div>
  <div id="main"></div>
  <div class="chart-footer">数据来源：国家统计局</div>
</div>
<script>
const chart = echarts.init(document.getElementById('main'));

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const rates = [57.33, 58.84, 60.24, 61.50, 62.71, 63.52, 64.72, 65.22, 65.53, 65.89];

const option = {
  animation: false,
  backgroundColor: '#FAFAF5',
  textStyle: { fontFamily: 'system-ui, sans-serif', color: '#1A1A1A' },
  grid: { top: 30, right: 80, bottom: 40, left: 50 },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ADA599' } },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: {
      color: '#8B8680',
      fontSize: 11,
      formatter: function(v) {
        const yr = parseInt(v);
        if (yr === 2015 || yr === 2017 || yr === 2019 || yr === 2021 || yr === 2023 || yr === 2024) return v;
        return '';
      }
    }
  },
  yAxis: {
    type: 'value',
    min: 55,
    max: 70,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      show: true,
      lineStyle: { color: '#F2F0EB', type: 'dashed', width: 1 }
    },
    axisLabel: {
      color: '#8B8680',
      fontSize: 11,
      formatter: '{value}%'
    }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(255,255,255,0.95)',
    borderColor: '#E8E4DD',
    textStyle: { fontSize: 12, color: '#1A1A1A' },
    formatter: function(params) {
      return params[0].name + '年<br/>城镇化率：' + params[0].value + '%';
    }
  },
  // 系列 1：灰色背景线（起点强调）
  series: [
    {
      name: '城镇化率',
      type: 'line',
      data: rates,
      smooth: true,
      symbol: 'circle',
      symbolSize: 0,
      lineStyle: { color: '#D4C5A0', width: 6, opacity: 0.3 },
      silent: true,
      z: 1
    },
    // 系列 2：红色主线
    {
      name: '城镇化率',
      type: 'line',
      data: rates,
      smooth: true,
      symbol: 'none',
      lineStyle: { color: '#8B1A1A', width: 3 },
      z: 2
    },
    // 系列 3：起点 - 灰色圆环
    {
      type: 'scatter',
      data: [[0, 57.33]],
      symbol: 'circle',
      symbolSize: 12,
      itemStyle: { color: '#FAFAF5', borderColor: '#8B8680', borderWidth: 2.5 },
      z: 3,
      silent: true,
      label: {
        show: true,
        formatter: '57.33%',
        position: 'bottom',
        offset: [0, 16],
        color: '#8B8680',
        fontSize: 13,
        fontWeight: 'normal',
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 4：终点 - 红色大圆点 + 光晕
    {
      type: 'scatter',
      data: [[9, 65.89]],
      symbol: 'circle',
      symbolSize: 22,
      itemStyle: { color: '#8B1A1A' },
      z: 4,
      silent: true
    },
    // 系列 5：终点光晕
    {
      type: 'scatter',
      data: [[9, 65.89]],
      symbol: 'circle',
      symbolSize: 36,
      itemStyle: { color: '#8B1A1A', opacity: 0.12 },
      z: 3,
      silent: true
    },
    // 系列 6：终点标注
    {
      type: 'scatter',
      data: [[9, 65.89]],
      symbol: 'none',
      z: 5,
      label: {
        show: true,
        formatter: '65.89%',
        position: 'top',
        offset: [0, -16],
        color: '#8B1A1A',
        fontSize: 20,
        fontWeight: 'bold',
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 7：增幅箭头标注
    {
      type: 'scatter',
      data: [[5, 59]],
      symbol: 'none',
      z: 5,
      label: {
        show: true,
        formatter: '+8.56%',
        color: '#8B1A1A',
        fontSize: 14,
        fontWeight: 'bold',
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 8：均值参考线
    {
      type: 'line',
      data: [62.55, 62.55, 62.55, 62.55, 62.55, 62.55, 62.55, 62.55, 62.55, 62.55],
      symbol: 'none',
      lineStyle: { color: '#8B8680', type: 'dashed', width: 1, opacity: 0.4 },
      z: 0,
      silent: true,
      label: {
        show: true,
        position: 'end',
        formatter: '均值',
        fontSize: 10,
        color: '#8B8680'
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
