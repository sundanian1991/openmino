<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国城镇化率 2015-2024</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAFAF5;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .chart-container {
    width: 800px;
    max-width: 100%;
    background: #FAFAF5;
  }
  .chart-header {
    text-align: center;
    margin-bottom: 8px;
    padding: 0 40px;
  }
  .chart-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 600;
    color: #1A1A1A;
    line-height: 1.3;
  }
  .chart-subtitle {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #8B1A1A;
    margin-top: 8px;
    font-weight: 500;
  }
  #main {
    width: 100%;
    height: 420px;
  }
  .chart-footer {
    padding: 0 40px;
    font-size: 10px;
    color: #8B8680;
    border-top: 1px solid #E8E4DD;
    padding-top: 10px;
  }
</style>
</head>
<body>
<div class="chart-container">
  <div class="chart-header">
    <div class="chart-title">2017 年，城镇人口首次超过农村</div>
    <div class="chart-subtitle">中国城镇化历史性交叉点 | 此后差距持续扩大至 460M</div>
  </div>
  <div id="main"></div>
  <div class="chart-footer">数据来源：国家统计局 | 城镇人口（红色）· 农村人口（灰色）· 单位：百万</div>
</div>
<script>
const chart = echarts.init(document.getElementById('main'));

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const urban = [771.2, 798.7, 825.1, 849.3, 873.0, 894.8, 920.7, 932.7, 941.2, 950.4];
const rural = [574.9, 557.8, 544.3, 531.2, 518.3, 513.4, 501.3, 497.0, 494.1, 490.8];

const option = {
  animation: false,
  backgroundColor: '#FAFAF5',
  textStyle: { fontFamily: 'system-ui, sans-serif', color: '#1A1A1A' },
  grid: { top: 40, right: 50, bottom: 40, left: 55 },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: '#ADA599' } },
    axisTick: { show: false },
    splitLine: { show: false },
    axisLabel: { color: '#8B8680', fontSize: 11 }
  },
  yAxis: {
    type: 'value',
    min: 480,
    max: 960,
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      show: true,
      lineStyle: { color: '#F2F0EB', type: 'dashed', width: 1 }
    },
    axisLabel: {
      color: '#8B8680',
      fontSize: 11,
      formatter: '{value}M'
    }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(255,255,255,0.95)',
    borderColor: '#E8E4DD',
    textStyle: { fontSize: 12, color: '#1A1A1A' },
    formatter: function(params) {
      return params[0].name + '年<br/>城镇：' + params[0].value + 'M<br/>农村：' + params[1].value + 'M';
    }
  },
  series: [
    // 系列 1：农村人口 - 灰色虚线（下沉）
    {
      name: '农村人口',
      type: 'line',
      data: rural,
      smooth: true,
      symbol: 'none',
      lineStyle: { color: '#ADA599', width: 2.5, type: 'solid' },
      z: 1
    },
    // 系列 2：城镇人口 - 红色实线（主角）
    {
      name: '城镇人口',
      type: 'line',
      data: urban,
      smooth: true,
      symbol: 'none',
      lineStyle: { color: '#8B1A1A', width: 3.5 },
      z: 2
    },
    // 系列 3：2017 交叉点 - 光晕
    {
      type: 'scatter',
      data: [[2, 810]],
      symbol: 'circle',
      symbolSize: 40,
      itemStyle: { color: '#8B1A1A', opacity: 0.08 },
      z: 1,
      silent: true
    },
    // 系列 4：2017 交叉点 - 圆点
    {
      type: 'scatter',
      data: [[2, 810]],
      symbol: 'circle',
      symbolSize: 10,
      itemStyle: { color: '#8B1A1A' },
      z: 3,
      silent: true
    },
    // 系列 5：交叉点标注
    {
      type: 'scatter',
      data: [[2, 830]],
      symbol: 'none',
      z: 5,
      label: {
        show: true,
        formatter: '2017 交叉点',
        color: '#8B1A1A',
        fontSize: 13,
        fontWeight: 'bold',
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 6：城镇终点标注
    {
      type: 'scatter',
      data: [[9, 950.4]],
      symbol: 'circle',
      symbolSize: 14,
      itemStyle: { color: '#8B1A1A' },
      z: 4,
      silent: true,
      label: {
        show: true,
        formatter: '城镇 950M',
        position: 'top',
        offset: [0, -10],
        color: '#8B1A1A',
        fontSize: 15,
        fontWeight: 'bold',
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 7：农村终点标注
    {
      type: 'scatter',
      data: [[9, 490.8]],
      symbol: 'circle',
      symbolSize: 10,
      itemStyle: { color: '#ADA599' },
      z: 4,
      silent: true,
      label: {
        show: true,
        formatter: '农村 491M',
        position: 'bottom',
        offset: [0, 12],
        color: '#8B8680',
        fontSize: 12,
        fontFamily: 'Georgia, serif'
      }
    },
    // 系列 8：差距箭头标注
    {
      type: 'scatter',
      data: [[7.5, 720]],
      symbol: 'none',
      z: 5,
      label: {
        show: true,
        formatter: '差距 → 460M',
        color: '#8B1A1A',
        fontSize: 13,
        fontWeight: 'bold',
        fontFamily: 'Georgia, serif'
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
