<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>利率双轨制：市场化利率下行 vs 基准利率十年不变</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAFAF5;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
#chart{width:900px;max-width:100%;height:560px;background:#FAFAF5}
</style>
</head>
<body>
<div id="chart"></div>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script>
var chart = echarts.init(document.getElementById('chart'));

// 经济学人红 #05 配色
var red    = '#8B1A1A';  // Economist red — LPR 核心主线
var blue   = '#2A5C8A';  // FT blue    — MLF
var green  = '#6B8E6B';  // muted green — SHIBOR
var gray   = '#C0C0C0';  // 基准利率淡化
var bg     = '#FAFAF5';
var dark   = '#1A1A1A';
var mid    = '#6B6B6B';
var light  = '#A3A29B';

var years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];

var option = {
  backgroundColor: bg,

  // 标题：结论性
  title: {
    text: '利率双轨制：市场化利率持续下行，基准利率十年不变',
    subtext: '2015—2024年 中国银行间关键利率对比  |  数据来源：中国人民银行',
    left: 0,
    top: 0,
    textStyle: { fontSize: 17, fontWeight: 600, color: dark, lineHeight: 24 },
    subtextStyle: { fontSize: 11, color: light, lineHeight: 16 }
  },

  grid: { left: 56, right: 36, top: 72, bottom: 72 },

  tooltip: {
    trigger: 'axis',
    backgroundColor: '#FFFFFF',
    borderColor: '#E0E0E0',
    borderWidth: 1,
    textStyle: { color: dark, fontSize: 12 },
    formatter: function(params) {
      var s = '<b>' + params[0].axisValue + '年</b><br/>';
      for (var i = 0; i < params.length; i++) {
        s += params[i].marker + ' ' + params[i].seriesName + ': <b>' + params[i].value.toFixed(2) + '%</b><br/>';
      }
      return s;
    }
  },

  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: light } },
    axisTick: { show: false },
    axisLabel: { color: mid, fontSize: 11, padding: [6, 0, 0, 0] }
  },

  yAxis: {
    type: 'value',
    name: '利率（%）',
    nameTextStyle: { color: mid, fontSize: 10, padding: [0, 0, 0, 0] },
    min: 1,
    max: 5,
    splitNumber: 4,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { color: mid, fontSize: 10, formatter: '{value}%' },
    splitLine: { lineStyle: { color: '#ECECEC', type: 'dashed' } }
  },

  series: [
    // 1. 贷款基准利率 — 淡化处理，虚线
    {
      name: '贷款基准利率',
      type: 'line',
      data: [4.35,4.35,4.35,4.35,4.35,4.35,4.35,4.35,4.35,4.35],
      lineStyle: { color: gray, width: 1.5, type: 'dashed' },
      itemStyle: { color: gray },
      symbol: 'none',
      label: {
        show: true, position: 'insideEndTop',
        formatter: '基准利率 4.35%',
        fontSize: 10, color: light,
        backgroundColor: 'rgba(250,245,229,0.85)',
        padding: [3, 6], borderRadius: 3
      }
    },
    // 2. 1年期LPR — 红色主线
    {
      name: '1年期LPR',
      type: 'line',
      data: [4.30,4.30,4.30,4.31,4.15,3.85,3.85,3.65,3.45,3.10],
      lineStyle: { color: red, width: 3 },
      itemStyle: { color: red },
      symbol: 'circle',
      symbolSize: 5,
      markPoint: {
        data: [
          {
            coord: [4, 4.15],
            value: '2019 LPR改革',
            itemStyle: { color: red },
            label: { fontSize: 9, color: red, fontWeight: 600, offset: [0, -16] }
          }
        ],
        symbol: 'pin',
        symbolSize: 50
      },
      // 末端数值标签
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: red, width: 1, type: 'solid' },
        data: [
          { yAxis: 4.30, label: { show: false } },
        ]
      }
    },
    // 3. MLF利率 — 蓝色辅线
    {
      name: 'MLF利率',
      type: 'line',
      data: [3.25,3.00,3.20,3.30,3.25,2.95,2.95,2.75,2.50,2.00],
      lineStyle: { color: blue, width: 2.5 },
      itemStyle: { color: blue },
      symbol: 'circle',
      symbolSize: 4,
      markPoint: {
        data: [
          {
            coord: [9, 2.00],
            value: '↓125bp',
            itemStyle: { color: blue },
            label: { fontSize: 10, color: blue, fontWeight: 700, offset: [0, 18] }
          }
        ],
        symbol: 'circle',
        symbolSize: 12
      }
    },
    // 4. 隔夜SHIBOR — 绿色，波动线
    {
      name: '隔夜SHIBOR',
      type: 'line',
      data: [1.85,2.15,2.68,2.45,2.35,1.78,2.05,1.58,1.72,1.53],
      lineStyle: { color: green, width: 2 },
      itemStyle: { color: green },
      symbol: 'circle',
      symbolSize: 3
    }
  ],

  // 图例
  legend: {
    data: ['贷款基准利率','1年期LPR','MLF利率','隔夜SHIBOR'],
    bottom: 4,
    left: 'center',
    textStyle: { fontSize: 11, color: mid },
    itemWidth: 18,
    itemHeight: 3,
    icon: 'roundRect'
  },

  // 底部解读文字
  graphic: [
    {
      type: 'text',
      left: 0,
      bottom: 24,
      style: {
        text: 'LPR 十年累计下行 120bp，MLF 自2019年改革以来降息 125bp。市场化利率与固定基准利率利差持续扩大，利率并轨趋势明确。',
        fontSize: 12,
        fill: '#5F5A54',
        fontWeight: 400
      }
    },
    {
      type: 'text',
      right: 0,
      bottom: 4,
      style: {
        text: '制图：Mino',
        fontSize: 10,
        fill: light
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
