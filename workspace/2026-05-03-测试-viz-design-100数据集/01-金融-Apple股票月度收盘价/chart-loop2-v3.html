<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple 股价 V 型反转</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 880px; height: 460px; }
  .footer { display: flex; justify-content: center; gap: 28px; margin-top: 12px; font-size: 11px; color: #87867F; }
  .footer .tag { display: flex; align-items: center; gap: 6px; }
  .footer .swatch { width: 24px; height: 4px; border-radius: 2px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="footer">
    <div class="tag"><span class="swatch" style="background:#B85C3E"></span>下跌期（2022.01→2022.12）</div>
    <div class="tag"><span class="swatch" style="background:#D97757"></span>V型反弹（2022.12→2024.12）</div>
    <div class="tag"><span class="swatch" style="background:#87867F"></span>回调（2024.12→2025.04）</div>
  </div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const months = [
  '2021-05','2021-06','2021-07','2021-08','2021-09','2021-10','2021-11','2021-12',
  '2022-01','2022-02','2022-03','2022-04','2022-05','2022-06','2022-07','2022-08',
  '2022-09','2022-10','2022-11','2022-12','2023-01','2023-02','2023-03','2023-04',
  '2023-05','2023-06','2023-07','2023-08','2023-09','2023-10','2023-11','2023-12',
  '2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07','2024-08',
  '2024-09','2024-10','2024-11','2024-12','2025-01','2025-02','2025-03','2025-04'
];
const prices = [
  124.28,136.96,145.86,151.83,141.50,149.80,165.30,177.57,
  174.78,165.12,174.61,157.65,148.84,136.72,162.51,157.22,
  138.20,153.34,148.03,129.93,144.29,147.41,164.90,169.68,
  177.25,193.97,196.45,187.65,171.21,170.77,189.95,192.53,
  184.40,180.75,171.48,169.30,192.25,210.62,218.24,229.00,
  233.00,225.91,238.72,250.42,224.80,217.90,209.27,198.50
];

// 三段分段数据（用于不同颜色）
// 段1: 上涨到见顶 (idx 0-7) 灰色铺垫
// 段2: V型下跌+反弹 (idx 7-31，2022-01 见顶 → 2022-12 触底 → 2023-12 回到前高) 暖橙V色带
// 段3: 加速冲高 (idx 31-43) 更深暖橙
// 段4: 回调 (idx 43-47) 浅灰

const option = {
  title: {
    text: 'Apple 48 个月 V 型反转：从 $130 到 $250 历史新高',
    subtext: '2021.05 — 2025.04  月度收盘价',
    left: 'center',
    top: 2,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) { return p[0].axisValue + ' $' + p[0].data; }
  },
  grid: { left: 55, right: 35, top: 58, bottom: 85 },
  xAxis: {
    type: 'category', data: months,
    axisLabel: { interval: 5, rotate: 30, fontSize: 10, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value', min: 110, max: 270, interval: 20,
    axisLabel: { formatter: '${value}', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [
    // 段1: 铺垫期（灰）— 涨到见顶
    {
      type: 'line', data: prices.map((v, i) => i <= 7 ? v : '-'),
      smooth: true, symbol: 'none', connectNulls: false,
      lineStyle: { width: 2.5, color: '#C1C0B8' },
      silent: true
    },
    // 段2: V型下跌（暖橙）— 见顶→触底
    {
      type: 'line', data: prices.map((v, i) => (i >= 7 && i <= 19) ? v : '-'),
      smooth: true, symbol: 'none',
      lineStyle: { width: 3.5, color: '#D97757' },
      markPoint: {
        symbol: 'circle', symbolSize: 10,
        itemStyle: { color: '#B85C3E' },
        label: {
          fontSize: 11, fontWeight: 700, color: '#B85C3E',
          position: 'top', offset: [0, -16],
          formatter: function(p) { return p.name; }
        },
        data: [
          { name: '▼ $177 见顶', xAxis: '2022-01', yAxis: 174.78 }
        ]
      }
    },
    // 段3: V型反弹回升（深暖橙）— 触底→新高
    {
      type: 'line', data: prices.map((v, i) => (i >= 19 && i <= 43) ? v : '-'),
      smooth: true, symbol: 'none',
      lineStyle: { width: 3.5, color: '#B85C3E' },
      markPoint: {
        symbol: 'circle', symbolSize: 12,
        itemStyle: { color: '#D97757' },
        label: {
          fontSize: 12, fontWeight: 700, color: '#D97757',
          position: 'top', offset: [0, -18],
          formatter: function(p) { return p.name; }
        },
        data: [
          { name: '▲ $130 触底', xAxis: '2022-12', yAxis: 129.93 },
          { name: '▲ $250 历史新高', xAxis: '2024-12', yAxis: 250.42 }
        ]
      }
    },
    // 段4: 回调（浅灰）
    {
      type: 'line', data: prices.map((v, i) => i >= 43 ? v : '-'),
      smooth: true, symbol: 'none',
      lineStyle: { width: 2, color: '#C1C0B8' },
      silent: true
    },
    // 参考线：前高 $177
    {
      type: 'line', name: '前高', markLine: {
        silent: true, symbol: 'none',
        label: { formatter: '前高 $177', position: 'end', fontSize: 9, color: '#A3A29B' },
        lineStyle: { color: '#C1C0B8', type: 'dashed', width: 1 },
        data: [{ yAxis: 177.57 }]
      }
    }
  ]
};

chart.setOption(option);
</script>
</body>
</html>
