<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple 两次寻找新叙事</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 960px; }
  #chart { width: 900px; height: 480px; }
  .footer-note { text-align: center; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="footer-note">数据来源：月度收盘价（经拆股调整） | 2021.05 — 2025.04</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const W = 900, H = 480;
const pad = { top: 68, right: 130, bottom: 60, left: 58 };
const plotW = W - pad.left - pad.right;
const plotH = H - pad.top - pad.bottom;
const yMin = 110, yMax = 270;

const months = [
  '2021-05','2021-06','2021-07','2021-08','2021-09','2021-10','2021-11','2021-12',
  '2022-01','2022-02','2022-03','2022-04','2022-05','2022-06','2022-07','2022-08',
  '2022-09','2022-10','2022-11','2022-12','2023-01','2023-02','2023-03','2023-04',
  '2023-05','2023-06','2023-07','2023-08','2023-09','2023-10','2023-11','2023-12',
  '2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07','2024-08',
  '2024-09','2024-10','2024-11','2024-12','2025-01','2025-02','2025-03','2025-04'
];
const prices = [
  124.28,136.96,145.86,151.83,141.50,149.80,165.30,177.57,
  174.78,165.12,174.61,157.65,148.84,136.72,162.51,157.22,
  138.20,153.34,148.03,129.93,144.29,147.41,164.90,169.68,
  177.25,193.97,196.45,187.65,171.21,170.77,189.95,192.53,
  184.40,180.75,171.48,169.30,192.25,210.62,218.24,229.00,
  233.00,225.91,238.72,250.42,224.80,217.90,209.27,198.50
];

function xPx(i) { return pad.left + (i / (months.length - 1)) * plotW; }
function yPx(v) { return pad.top + plotH - ((v - yMin) / (yMax - yMin)) * plotH; }

// 计算关键数据点的精确坐标
const p2022_01 = { x: xPx(8),  y: yPx(174.78) };  // 见顶 idx=8
const p2022_12 = { x: xPx(19), y: yPx(129.93) };  // 触底 idx=19
const p2024_12 = { x: xPx(43), y: yPx(250.42) };  // 新高 idx=43
const p2025_04 = { x: xPx(47), y: yPx(198.50) };  // 最新 idx=47
const y177 = yPx(177.57);

const option = {
  title: {
    text: 'Apple 两次失去增长叙事：第一次 AI 救了它，第二次呢？',
    subtext: '2021.05 — 2025.04 月度收盘价',
    left: 'center', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) { return p[0].axisValue + ' $' + p[0].data; }
  },
  grid: { left: pad.left, right: pad.right, top: pad.top, bottom: pad.bottom },
  xAxis: {
    type: 'category', data: months,
    axisLabel: { interval: 5, rotate: 30, fontSize: 10, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value', min: yMin, max: yMax, interval: 20,
    axisLabel: { formatter: '${value}', fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  series: [{
    name: '收盘价', type: 'line', data: prices,
    smooth: 0.3, symbol: 'none',
    lineStyle: { width: 2.5, color: '#3D3D3A' }
  }],
  graphic: [
    // === 参考线: 前高 $177 ===
    {
      type: 'line', shape: { x1: pad.left, y1: y177, x2: W - pad.right, y2: y177 },
      style: { stroke: '#C1C0B8', lineWidth: 1, lineDash: [4, 4] }
    },
    {
      type: 'text', style: { text: '前高 $177', fill: '#A3A29B', fontSize: 9, fontFamily: 'monospace' },
      left: pad.left + 6, top: y177 - 14
    },

    // === 拐点 1: 2022-01 见顶 $177 ===
    {
      type: 'circle', shape: { cx: p2022_01.x, cy: p2022_01.y, r: 5 },
      style: { fill: '#c25030', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '$177 硬件周期见顶', fill: '#c25030', fontSize: 11, fontWeight: 600 },
      left: p2022_01.x + 12, top: p2022_01.y - 22
    },

    // === 拐点 2: 2022-12 触底 $130 ===
    {
      type: 'circle', shape: { cx: p2022_12.x, cy: p2022_12.y, r: 5 },
      style: { fill: '#c25030', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '$130 触底', fill: '#c25030', fontSize: 11, fontWeight: 600 },
      left: p2022_12.x + 12, top: p2022_12.y + 6
    },

    // === 拐点 3: 2024-12 新高 $250 ===
    {
      type: 'circle', shape: { cx: p2024_12.x, cy: p2024_12.y, r: 5 },
      style: { fill: '#788C5D', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '$250 AI 叙事历史新高', fill: '#788C5D', fontSize: 11, fontWeight: 600 },
      left: p2024_12.x - 170, top: p2024_12.y - 22
    },

    // === 拐点 4: 2025-04 回落 $198 ===
    {
      type: 'circle', shape: { cx: p2025_04.x, cy: p2025_04.y, r: 5 },
      style: { fill: '#D97757', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '$198 再次回落', fill: '#D97757', fontSize: 11, fontWeight: 600 },
      left: p2025_04.x - 90, top: p2025_04.y + 6
    },

    // === 第一次下跌区域标注（右侧空间不够，放底部） ===
    {
      type: 'rect', shape: { x: pad.left + 4, y: H - pad.bottom + 8, width: 340, height: 42 },
      style: { fill: 'rgba(194,80,48,0.06)', stroke: 'rgba(194,80,48,0.12)', lineWidth: 1, rx: 4 }
    },
    {
      type: 'text', style: { text: '第一次 -26%：iPhone 见顶 → $130 → AI 救场 → $250', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      left: pad.left + 14, top: H - pad.bottom + 16
    },
    {
      type: 'text', style: { text: '第二次 -21%：AI 叙事见顶 → $198 → ？', fill: '#D97757', fontSize: 12, fontWeight: 700 },
      left: pad.left + 370, top: H - pad.bottom + 16
    }
  ]
};

chart.setOption(option);
</script>
</body>
</html>
