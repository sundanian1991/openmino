<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国外汇储备十年演进（2015-2024）</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@6/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAF9F5;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #141413;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 32px;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 2px solid #D97757;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #141413;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 14px;
    color: #87867F;
  }
  .chart-section {
    margin-bottom: 48px;
  }
  .chart-box {
    width: 100%;
    height: 400px;
  }
  .footer {
    font-size: 11px;
    color: #87867F;
    text-align: center;
    padding-top: 24px;
    border-top: 1px solid #D1CFC5;
  }
  .kpi-grid {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .kpi-card {
    border-radius: 8px;
    padding: 20px 28px;
    text-align: center;
    min-width: 180px;
  }
  .kpi-card .label { font-size: 11px; margin-bottom: 6px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; margin: 4px 0 2px; }
  .kpi-card .sub { font-size: 11px; color: #87867F; }
</style>
</head>
<body>

<div class="header">
  <h1>中国外汇储备十年演进（2015-2024）</h1>
  <p>总额稳定，结构变迁——从"美元为主"到"多元化+藏金"</p>
</div>

<div class="chart-section">
  <div id="chart1" class="chart-box"></div>
</div>

<div class="chart-section">
  <div id="chart2" class="chart-box"></div>
</div>

<div class="chart-section">
  <div id="chart3" class="chart-box"></div>
</div>

<div class="chart-section">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:17px;font-weight:600;color:#141413;">外汇储备总额稳定，但内部结构已变</div>
    <div style="font-size:11px;color:#87867F;margin-top:4px;">2015 vs 2024 核心指标对比</div>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card" style="background:rgba(92,124,163,0.1);border:1px solid rgba(92,124,163,0.3);">
      <div class="label" style="color:#5C7CA3;">外汇储备</div>
      <div class="value" style="color:#5C7CA3;">3,456B</div>
      <div class="sub">2015→2024 +1.5%</div>
    </div>
    <div class="kpi-card" style="background:rgba(217,119,87,0.1);border:1px solid rgba(217,119,87,0.3);">
      <div class="label" style="color:#D97757;">黄金储备</div>
      <div class="value" style="color:#D97757;">2,264 吨</div>
      <div class="sub" style="color:#B04A4A;font-weight:600;">十年 +28.5%</div>
    </div>
    <div class="kpi-card" style="background:rgba(176,74,74,0.08);border:1px solid rgba(176,74,74,0.3);">
      <div class="label" style="color:#B04A4A;">人民币贬值</div>
      <div class="value" style="color:#B04A4A;">+15.6%</div>
      <div class="sub">6.23 → 7.20</div>
    </div>
  </div>
</div>

<div class="footer">
  数据来源：国家外汇管理局、中国人民银行 &nbsp;|&nbsp; 时间范围：2015-2024
</div>

<script>
const C = {
  clay: '#D97757', slate: '#141413', ivory: '#FAF9F5', oat: '#E3DACC',
  g100: '#F0EEE6', g300: '#D1CFC5', g500: '#87867F', g700: '#3D3D3A',
  success: '#788C5D', warning: '#C78E3F', danger: '#B04A4A', info: '#5C7CA3'
};

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const reserves = [3405.25, 3097.66, 3235.68, 3168.22, 3222.89, 3357.24, 3427.93, 3306.84, 3449.54, 3456.02];
const gold = [1762, 1843, 1842, 1852, 1948, 1948, 1948, 2010, 2235, 2264];
const trade = [358.8, 255.5, 215.7, 91.5, 132.8, 355.1, 460.8, 577.8, 383.6, 533.7];
const usdCny = [6.23, 6.64, 6.76, 6.62, 6.91, 6.90, 6.45, 6.74, 7.08, 7.20];

// ========== Chart 1: 外汇储备总额（Cycle 2 减法：删 markLine 参考线） ==========
(function() {
  const chart = echarts.init(document.getElementById('chart1'));
  chart.setOption({
    title: {
      text: '外汇储备十年波动有限，2016-2017 经历资本外流后企稳',
      subtext: '2015-2024 中国外汇储备总额（十亿美元）',
      left: 'center',
      textStyle: { fontSize: 17, fontWeight: 600, color: C.slate },
      subtextStyle: { fontSize: 11, color: C.g500 },
      top: 4
    },
    grid: { top: 72, right: 32, bottom: 40, left: 64 },
    xAxis: {
      type: 'category', data: years,
      axisLine: { lineStyle: { color: C.g300 } },
      axisTick: { show: false },
      axisLabel: { color: C.g500, fontSize: 11 }
    },
    yAxis: {
      type: 'value', min: 2800, max: 3600,
      splitLine: { lineStyle: { color: C.g300, type: 'dashed', opacity: 0.6 } },
      axisLabel: { color: C.g500, fontSize: 11, formatter: '{value}B' }
    },
    series: [{
      type: 'line', data: reserves, smooth: 0.3,
      symbol: 'circle', symbolSize: 5,
      lineStyle: { color: C.clay, width: 2.5 },
      itemStyle: { color: C.clay },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(217,119,87,0.18)' },
          { offset: 1, color: 'rgba(217,119,87,0.01)' }
        ])
      }
    }],
    graphic: [
      // Cycle 2 减法：只标 2 个关键点，去掉了 markLine
      { type: 'group', left: 88, top: 268, children: [
        { type: 'circle', shape: { r: 5 }, style: { fill: C.danger } },
        { type: 'text', style: { text: '3098B 资本外流', fill: C.danger, fontSize: 10, fontWeight: 600, x: 12, y: 4 } }
      ]},
      { type: 'group', right: 48, top: 140, children: [
        { type: 'circle', shape: { r: 5 }, style: { fill: C.clay } },
        { type: 'text', style: { text: '3456B', fill: C.clay, fontSize: 10, fontWeight: 600, x: 12, y: 4 } }
      ]}
    ]
  });
  window.addEventListener('resize', () => chart.resize());
})();

// ========== Chart 2: 黄金储备（Cycle 2 减法：删柱体渐变） ==========
(function() {
  const chart = echarts.init(document.getElementById('chart2'));
  chart.setOption({
    title: {
      text: '黄金储备十年增长 28.5%，"藏金于国"战略清晰',
      subtext: '2015-2024 中国黄金储备（吨）',
      left: 'center',
      textStyle: { fontSize: 17, fontWeight: 600, color: C.slate },
      subtextStyle: { fontSize: 11, color: C.g500 },
      top: 4
    },
    grid: { top: 72, right: 32, bottom: 40, left: 64 },
    xAxis: {
      type: 'category', data: years,
      axisLine: { lineStyle: { color: C.g300 } },
      axisTick: { show: false },
      axisLabel: { color: C.g500, fontSize: 11 }
    },
    yAxis: {
      type: 'value', min: 1600, max: 2400,
      splitLine: { lineStyle: { color: C.g300, type: 'dashed', opacity: 0.6 } },
      axisLabel: { color: C.g500, fontSize: 11 }
    },
    series: [
      {
        // Cycle 2 减法：柱体统一 clay 色，不再渐变
        type: 'bar',
        data: gold.map(v => ({ value: v, itemStyle: { color: C.clay, borderRadius: [3, 3, 0, 0], opacity: 0.55 } })),
        barWidth: '55%'
      },
      {
        type: 'line', data: gold, smooth: 0.2,
        symbol: 'diamond', symbolSize: 8,
        lineStyle: { color: C.clay, width: 2.5 },
        itemStyle: { color: C.clay }, z: 10
      }
    ],
    graphic: [
      { type: 'group', left: 96, top: 290, children: [
        { type: 'text', style: { text: '1762 吨', fill: C.clay, fontSize: 10, fontWeight: 600, x: 0, y: 0, textAlign: 'center' } }
      ]},
      { type: 'group', right: 40, top: 108, children: [
        { type: 'text', style: { text: '2264 吨  +28.5%', fill: C.clay, fontSize: 11, fontWeight: 700, x: 0, y: 0, textAlign: 'center' } }
      ]}
    ]
  });
  window.addEventListener('resize', () => chart.resize());
})();

// ========== Chart 3: 贸易+汇率（Cycle 2 减法：删柱体渐变 + 峰值高亮） ==========
(function() {
  const chart = echarts.init(document.getElementById('chart3'));
  chart.setOption({
    title: {
      text: '贸易顺差 2022 年飙升至 5778 亿后回落，同期人民币持续贬值',
      subtext: '贸易顺差（十亿美元）与美元兑人民币年均汇率',
      left: 'center',
      textStyle: { fontSize: 17, fontWeight: 600, color: C.slate },
      subtextStyle: { fontSize: 11, color: C.g500 },
      top: 4
    },
    grid: { top: 72, right: 56, bottom: 40, left: 64 },
    xAxis: {
      type: 'category', data: years,
      axisLine: { lineStyle: { color: C.g300 } },
      axisTick: { show: false },
      axisLabel: { color: C.g500, fontSize: 11 }
    },
    yAxis: [
      {
        type: 'value', name: '贸易顺差 (B)', min: 0, max: 650, position: 'left',
        splitLine: { lineStyle: { color: C.g300, type: 'dashed', opacity: 0.6 } },
        axisLabel: { color: C.success, fontSize: 10, formatter: '{value}B' },
        nameTextStyle: { color: C.success, fontSize: 10 }
      },
      {
        type: 'value', name: 'USD/CNY', min: 6.0, max: 7.5, position: 'right',
        splitLine: { show: false },
        axisLabel: { color: C.danger, fontSize: 10 },
        nameTextStyle: { color: C.danger, fontSize: 10 }
      }
    ],
    series: [
      {
        // Cycle 2 减法：统一 success 色，2022 峰值用 clay 高亮
        type: 'bar',
        data: trade.map((v, i) => ({
          value: v,
          itemStyle: {
            color: i === 7 ? C.clay : C.success,
            opacity: i === 7 ? 1 : 0.55,
            borderRadius: [3, 3, 0, 0]
          }
        })),
        barWidth: '50%', yAxisIndex: 0
      },
      {
        type: 'line', data: usdCny, smooth: 0.2,
        symbol: 'circle', symbolSize: 6,
        lineStyle: { color: C.danger, width: 2.5 },
        itemStyle: { color: C.danger }, yAxisIndex: 1, z: 10
      }
    ],
    graphic: [
      { type: 'group', left: 250, top: 310, children: [
        { type: 'text', style: { text: '贸易摩擦 91.5B', fill: C.g500, fontSize: 10 } }
      ]},
      { type: 'group', right: 200, top: 110, children: [
        { type: 'text', style: { text: '577.8B', fill: C.clay, fontSize: 10, fontWeight: 700 } }
      ]},
      { type: 'group', right: 40, top: 128, children: [
        { type: 'text', style: { text: '7.20', fill: C.danger, fontSize: 11, fontWeight: 700, textAlign: 'right' } }
      ]}
    ]
  });
  window.addEventListener('resize', () => chart.resize());
})();
</script>
</body>
</html>
