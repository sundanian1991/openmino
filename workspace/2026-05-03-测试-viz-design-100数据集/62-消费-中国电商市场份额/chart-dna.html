<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国电商市场份额 2019-2024</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script>if(typeof echarts==="undefined"){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.1/echarts.min.js"><\/script>')}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .chart-card {
    width: 900px;
    height: 500px;
    background: #fff;
    border-radius: 10px;
    padding: 32px 28px 20px 28px;
    position: relative;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: #6b3410;
    line-height: 1.5;
    margin-bottom: 2px;
  }
  .chart-subtitle {
    font-size: 11px;
    font-weight: 400;
    color: #ada599;
    margin-bottom: 8px;
  }
  #chart { width: 100%; height: calc(100% - 56px); }
  .footnote {
    position: absolute;
    bottom: 8px;
    left: 28px;
    font-size: 10px;
    color: #ada599;
  }
</style>
</head>
<body>
<div class="chart-card">
  <div class="chart-title">阿里份额腰斩：从 66% 跌至 37%，抖音电商三年冲到 15%</div>
  <div class="chart-subtitle">2019-2024 中国电商市场份额变化（按 GMV 口径）</div>
  <div id="chart"></div>
  <div class="footnote">数据来源：公开财报数据估算</div>
</div>

<script>
var chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

var years = ['2019', '2020', '2021', '2022', '2023', '2024'];

// 堆叠顺序（从下到上）：阿里、京东、拼多多、抖音、快手、美团
var seriesData = {
  '阿里(淘宝/天猫)': [66, 59, 52, 46, 42, 37],
  '京东':             [17, 17, 17, 16, 15, 14],
  '拼多多':           [9, 12, 15, 16, 17, 18],
  '抖音电商':         [0.5, 3, 6, 9, 12, 15],
  '快手电商':         [0.3, 2, 4, 6, 7, 8],
  '美团(含外卖)':     [3, 3, 3, 3, 3, 3]
};

var colors = {
  '阿里(淘宝/天猫)': '#ada599',
  '京东': '#d4d4d4',
  '拼多多': '#2e8b6e',
  '抖音电商': '#c26d3a',
  '快手电商': '#e8d5c0',
  '美团(含外卖)': '#c4b8aa'
};

var option = {
  animation: false,
  grid: {
    left: 50,
    right: 30,
    top: 20,
    bottom: 50
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#fff',
    borderColor: '#f2f0eb',
    textStyle: { color: '#2e2c2a', fontSize: 11 },
    formatter: function(params) {
      var tip = '<b>' + params[0].axisValue + ' 年</b><br/>';
      params.reverse().forEach(function(p) {
        tip += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + p.color + ';margin-right:6px;"></span>'
          + p.seriesName + '：<b>' + p.value + '%</b><br/>';
      });
      return tip;
    }
  },
  legend: {
    bottom: 0,
    itemWidth: 12,
    itemHeight: 8,
    textStyle: { color: '#857d74', fontSize: 10 },
    itemGap: 14
  },
  xAxis: {
    type: 'category',
    data: years,
    boundaryGap: false,
    axisLine: { lineStyle: { color: '#ada599' } },
    axisTick: { show: false },
    axisLabel: { color: '#857d74', fontSize: 11 },
    splitLine: { show: false }
  },
  yAxis: {
    type: 'value',
    min: 0,
    max: 100,
    interval: 20,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: {
      color: '#857d74',
      fontSize: 11,
      formatter: '{value}%'
    },
    splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } }
  },
  series: Object.keys(seriesData).map(function(name) {
    return {
      name: name,
      type: 'line',
      stack: 'total',
      areaStyle: { color: colors[name] },
      lineStyle: { width: 0.5, color: '#fff', opacity: 0.4 },
      symbol: 'none',
      smooth: false,
      data: seriesData[name],
      emphasis: { focus: 'series' }
    };
  }),
  // 标注：阿里 66%→37%
  graphic: [
    {
      type: 'group',
      left: 80,
      top: 48,
      children: [
        {
          type: 'text',
          style: {
            text: '66%→37%',
            fill: '#6b3410',
            fontSize: 11,
            fontWeight: 600,
            fontFamily: '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif'
          }
        },
        {
          type: 'text',
          style: {
            text: '阿里',
            fill: '#857d74',
            fontSize: 9,
            y: 14,
            fontFamily: '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif'
          }
        }
      ]
    },
    {
      type: 'group',
      right: 120,
      bottom: 180,
      children: [
        {
          type: 'text',
          style: {
            text: '0.5%→15%',
            fill: '#6b3410',
            fontSize: 11,
            fontWeight: 600,
            fontFamily: '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif'
          }
        },
        {
          type: 'text',
          style: {
            text: '抖音电商',
            fill: '#857d74',
            fontSize: 9,
            y: 14,
            fontFamily: '-apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif'
          }
        }
      ]
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
