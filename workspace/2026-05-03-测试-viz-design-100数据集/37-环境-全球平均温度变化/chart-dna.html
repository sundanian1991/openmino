<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>全球平均温度变化</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .chart-card {
    width: 900px;
    height: 450px;
    background: #ffffff;
    border-radius: 10px;
    padding: 24px 28px 16px 20px;
    position: relative;
  }
  #chart { width: 100%; height: calc(100% - 0px); }
</style>
</head>
<body>
<div class="chart-card">
  <div id="chart"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script>if(typeof echarts==="undefined"){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.1/echarts.min.js"><\/script>')}</script>
<script>
(function() {
  var chart = echarts.init(document.getElementById('chart'));

  var years = ['1880','1900','1920','1940','1950','1960','1970','1980','1990','2000','2005','2010','2015','2020','2023','2024'];
  var temps = [-0.16, -0.08, -0.27, 0.10, -0.01, 0.03, 0.00, 0.26, 0.45, 0.42, 0.68, 0.72, 0.90, 1.29, 1.48, 1.55];

  var option = {
    animation: false,
    backgroundColor: 'transparent',
    title: {
      text: '2024 年全球温度突破 1.5°C 警戒线，升温速率加速',
      subtext: '全球平均温度偏差（相对于 1850-1900 基准）',
      left: 'center',
      top: 4,
      textStyle: {
        color: '#6b3410',
        fontSize: 14,
        fontWeight: 600,
        lineHeight: 20
      },
      subtextStyle: {
        color: '#857d74',
        fontSize: 11,
        fontWeight: 400,
        lineHeight: 18
      }
    },
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(255,255,255,0.95)',
      borderColor: '#f2f0eb',
      textStyle: { color: '#2e2c2a', fontSize: 12 },
      formatter: function(params) {
        var p = params[0];
        return p.name + ' 年<br/>温度偏差：<b>' + p.value + '°C</b>';
      }
    },
    grid: {
      left: 56,
      right: 40,
      top: 70,
      bottom: 36
    },
    xAxis: {
      type: 'category',
      data: years,
      axisLine: { lineStyle: { color: '#ada599' } },
      axisTick: { show: false },
      splitLine: { show: false },
      axisLabel: { color: '#857d74', fontSize: 11 },
      name: '年份',
      nameTextStyle: { color: '#857d74', fontSize: 11 }
    },
    yAxis: {
      type: 'value',
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { lineStyle: { color: '#f2f0eb', type: 'dashed' } },
      axisLabel: { color: '#857d74', fontSize: 11, formatter: '{value}°C' },
      name: '温度偏差（°C）',
      nameTextStyle: { color: '#857d74', fontSize: 11 },
      min: -0.4,
      max: 1.8
    },
    series: [{
      type: 'line',
      data: temps,
      smooth: true,
      showSymbol: false,
      lineStyle: { color: '#c26d3a', width: 2.5 },
      areaStyle: { color: 'rgba(212,165,116,0.3)' },
      markLine: {
        symbol: 'none',
        silent: true,
        data: [
          {
            yAxis: 0,
            lineStyle: { color: '#ada599', type: 'solid', width: 1 },
            label: { show: false }
          },
          {
            yAxis: 1.5,
            lineStyle: { color: '#c25030', type: 'dashed', width: 1.5 },
            label: {
              show: true,
              position: 'insideEndTop',
              formatter: '巴黎协定 1.5°C 目标',
              color: '#c25030',
              fontSize: 10,
              fontWeight: 500,
              distance: 4
            }
          }
        ]
      },
      markPoint: {
        data: [
          {
            coord: ['2024', 1.55],
            value: '1.55°C',
            symbol: 'circle',
            symbolSize: 8,
            itemStyle: { color: '#c25030' },
            label: {
              show: true,
              position: 'top',
              formatter: '1.55°C 突破警戒线',
              color: '#c25030',
              fontSize: 10,
              fontWeight: 600,
              distance: 10
            }
          }
        ]
      }
    }]
  };

  chart.setOption(option);
  window.addEventListener('resize', function() { chart.resize(); });
})();
</script>
</body>
</html>
