<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融电销 Q1 运营数据 — 起承转合</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .wrap { background: #fff; border-radius: 16px; padding: 36px 40px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); max-width: 960px; }

  /* 幕导航 — Birchline 色系 */
  .act-nav { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
  .act-step { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 0; flex: 1; position: relative; }
  .act-step::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #E6E3DA; transition: background .3s; }
  .act-step.active::after { background: #D97757; }
  .act-dot { width: 10px; height: 10px; border-radius: 50%; background: #D1CFC5; transition: all .3s; flex-shrink: 0; }
  .act-step.active .act-dot { background: #D97757; transform: scale(1.3); }
  .act-label { font-size: 12px; color: #87867F; transition: color .3s; font-weight: 500; }
  .act-step.active .act-label { color: #141413; font-weight: 600; }

  /* 标题区 */
  .chart-title { font-size: 17px; font-weight: 700; color: #141413; margin-bottom: 4px; transition: opacity .2s; }
  .chart-subtitle { font-size: 11px; color: #87867F; margin-bottom: 16px; }

  /* 图表 */
  #chart { width: 880px; height: 420px; }

  /* 提要 */
  .lead { max-width: 700px; margin: 16px 0 0; font-size: 13px; color: #3D3D3A; line-height: 1.7; transition: opacity .2s; }
  .lead strong { color: #141413; font-weight: 600; }

  /* 底部 */
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid #E6E3DA; }
  .footer-note { font-size: 11px; color: #87867F; }
  .footer-nav { display: flex; gap: 8px; }
  .footer-btn { border: 1px solid #E6E3DA; background: #fff; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; color: #3D3D3A; transition: all .2s; }
  .footer-btn:hover { border-color: #D97757; color: #D97757; }
  .footer-btn:disabled { opacity: .4; cursor: default; border-color: #E6E3DA; color: #87867F; }
</style>
</head>
<body>
<div class="wrap">
  <div class="act-nav" id="actNav"></div>
  <div class="chart-title" id="chartTitle"></div>
  <div class="chart-subtitle" id="chartSubtitle"></div>
  <div id="chart"></div>
  <div class="lead" id="lead"></div>
  <div class="footer">
    <div class="footer-note">数据来源：电销中心运营系统</div>
    <div class="footer-nav">
      <button class="footer-btn" id="prevBtn" onclick="goPrev()">← 上一幕</button>
      <button class="footer-btn" id="nextBtn" onclick="goNext()">下一幕 →</button>
    </div>
  </div>
</div>

<script>
var chart = echarts.init(document.getElementById('chart'));
var currentAct = 0;

var acts = [
  {
    name: '第一幕 · 起', role: '全景',
    title: 'B 组 Q1 成交 1.2 亿领跑，F 组仅 6993 万',
    subtitle: '6 团队 Q1 总成交金额（万元）',
    lead: '6 个团队 Q1 业绩分化严重——<strong>B 组成交 1.2 亿，是 F 组的 1.7 倍</strong>。头尾差距不是偶然，是策略差异的必然结果。',
    option: (function(){
      var teams = ['B组','D组','E组','A组','C组','F组'];
      var revenue = [11955, 10848, 10119, 10014, 7392, 6993];
      // Birchline: clay(B标杆) g300(非高亮) clay-d(F问题)
      var colors = ['#D97757','#D1CFC5','#D1CFC5','#D1CFC5','#D1CFC5','#B85C3E'];
      return {
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' },
          formatter: function(p){ return p[0].name + ': ' + p[0].value + '万（' + (p[0].value/10000).toFixed(1) + '亿）'; }},
        grid: { left: 60, right: 100, top: 10, bottom: 10 },
        xAxis: { type: 'value', axisLabel: { formatter: function(v){ return (v/10000).toFixed(1)+'亿'; }, fontSize: 10, color: '#87867F' }, axisLine: { show: false }, splitLine: { show: false }, axisTick: { show: false } },
        yAxis: { type: 'category', data: teams, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { fontSize: 12, color: '#3D3D3A', fontWeight: 600 } },
        series: [{ type: 'bar', data: revenue.map(function(v,i){ return { value: v, itemStyle: { color: colors[i], borderRadius: [0,4,4,0] } }; }), barWidth: '55%'
        }],
        graphic: [
          // 均值线
          { type: 'line', shape: { x1: 0, y1: 210, x2: 880, y2: 210 }, style: { stroke: '#E6E3DA', lineWidth: 1, lineDash: [6,4] } },
          { type: 'text', style: { text: '均值 9554 万', fill: '#87867F', fontSize: 9 }, left: 880 - 90, top: 210 - 14 },
          // B 组标注 — 贴着 B 组条形右端
          { type: 'text', style: { text: '↑ 领先 F 组 71%', fill: '#D97757', fontSize: 11, fontWeight: 600 }, left: 720, top: 55 },
          // F 组标注 — 贴着 F 组条形右端
          { type: 'text', style: { text: '垫底', fill: '#B85C3E', fontSize: 11, fontWeight: 600 }, left: 560, top: 340 }
        ]
      };
    })()
  },
  {
    name: '第二幕 · 承', role: '趋势',
    title: 'B 组从 2.0% 升至 2.6%，C/F 三个月原地踏步',
    subtitle: 'B/D/C/F 团队月度转化率走势（%）',
    lead: 'B 组转化率逐月上升至 2.6%，D 组同步改善；<strong>C/F 组三个月原地踏步</strong>，始终停留在 1.7-1.9%。差距不是一个月拉开的，是持续策略差异的累积。',
    option: (function(){
      var months = ['1月','2月','3月'];
      // Birchline: g700(B/D上升) clay-d(C/F停滞)
      var lines = [
        { name: 'B组', data: [2.0, 2.3, 2.6], lw: 3, color: '#3D3D3A', dash: false, sym: 8 },
        { name: 'D组', data: [2.2, 2.6, 2.5], lw: 2.5, color: '#3D3D3A', dash: false, sym: 7 },
        { name: 'C组', data: [1.7, 1.9, 1.7], lw: 2, color: '#B85C3E', dash: true, sym: 5 },
        { name: 'F组', data: [1.7, 1.9, 1.7], lw: 2, color: '#B85C3E', dash: true, sym: 5 },
      ];
      return {
        tooltip: { trigger: 'axis', formatter: function(p){
          var s = p[0].axisValueLabel + '<br/>';
          p.forEach(function(it){ s += it.marker + it.seriesName + ': ' + it.value + '%<br/>'; }); return s;
        }},
        grid: { left: 50, right: 100, top: 10, bottom: 30 },
        xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { fontSize: 11, color: '#3D3D3A' }, axisTick: { show: false } },
        yAxis: { type: 'value', min: 1.5, max: 3.0, axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } }, axisTick: { show: false } },
        series: lines.map(function(l){
          return { type: 'line', name: l.name, data: l.data, smooth: true,
            lineStyle: { width: l.lw, color: l.color, type: l.dash ? 'dashed' : 'solid' },
            itemStyle: { color: l.color }, symbolSize: l.sym };
        }),
        graphic: [
          { type: 'text', style: { text: 'B组 ↑ +0.6pp', fill: '#3D3D3A', fontSize: 10, fontWeight: 600 }, right: 10, top: 30 },
          { type: 'text', style: { text: 'C/F 组 —', fill: '#B85C3E', fontSize: 10, fontWeight: 600 }, right: 10, top: 350 }
        ]
      };
    })()
  },
  {
    name: '第三幕 · 转', role: '根因',
    title: '日均拨打越少转化越高，C 组"无效忙碌"',
    subtitle: 'X=日均拨打通数, Y=转化率%, 气泡大小=平均通话时长(s)',
    lead: '<strong>日均拨打越少，转化越高</strong>——B 组日均 289 通转化 2.3%，C 组 316 通仅 1.8%。C 组追求拨打量牺牲了通话质量。不是打得越多越好，是打得越精越好。',
    option: (function(){
      // Birchline: clay(B/D标杆) g300(其余) clay-d(C问题)
      var data = [
        { name: 'B组', value: [289, 2.3], size: 342, color: '#D97757' },
        { name: 'D组', value: [277, 2.4], size: 333, color: '#D97757' },
        { name: 'A组', value: [300, 2.2], size: 324, color: '#D1CFC5' },
        { name: 'E组', value: [301, 2.3], size: 316, color: '#D1CFC5' },
        { name: 'C组', value: [316, 1.8], size: 290, color: '#B85C3E' },
        { name: 'F组', value: [285, 1.8], size: 278, color: '#D1CFC5' },
      ];
      return {
        tooltip: { formatter: function(p){ return p.name + '<br/>日均拨打: ' + p.value[0] + ' 通<br/>转化率: ' + p.value[1] + '%<br/>通话时长: ' + p.data.size + 's'; } },
        grid: { left: 55, right: 120, top: 10, bottom: 40 },
        xAxis: { name: '日均拨打（通）→', nameLocation: 'end', nameGap: 8, nameTextStyle: { fontSize: 10, color: '#87867F' }, min: 265, max: 325, axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { fontSize: 10, color: '#87867F' }, axisTick: { show: false }, splitLine: { show: false } },
        yAxis: { name: '转化率（%）', nameLocation: 'middle', nameGap: 36, nameTextStyle: { fontSize: 10, color: '#87867F' }, min: 1.5, max: 2.8, axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' }, axisTick: { show: false }, splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } } },
        series: [{ type: 'scatter', data: data,
          symbolSize: function(d, param){ return Math.sqrt(param.data.size) * 2.2; },
          label: { show: true, formatter: function(p){ return p.name; }, position: function(p){
            // B组标签放右侧，其余放上方，避免重叠
            return p.name === 'B组' ? 'right' : 'top';
          }, fontSize: 10, fontWeight: 600, color: function(p){ return p.data.color; } },
          itemStyle: { borderColor: '#fff', borderWidth: 2 }
        }],
        graphic: [
          { type: 'text', style: { text: '← 拨打越少，转化越高 →', fill: '#87867F', fontSize: 10, fontStyle: 'italic' }, left: 280, top: 380 },
          // B 组标注放右上方，不与标签重叠
          { type: 'text', style: { text: '精拨打 + 长通话', fill: '#D97757', fontSize: 10, fontWeight: 600 }, right: 10, top: 100 },
          // C 组标注
          { type: 'text', style: { text: '无效忙碌', fill: '#B85C3E', fontSize: 10, fontWeight: 600 }, right: 10, top: 300 }
        ]
      };
    })()
  },
  {
    name: '第四幕 · 合', role: '行动',
    title: '三项改进预计提升转化率 0.4 个百分点至 2.5%',
    subtitle: '当前均值 2.1% → Q2 目标 2.5%',
    lead: '三项改进预计提升转化率 <strong>+0.4 个百分点至 2.5%</strong>：C/F 组通话培训贡献最大（+0.2%），B/D 经验推广和号码优化各 +0.1%。不需要全面变革，针对性干预即可见效。',
    option: (function(){
      // Birchline: g500(起点) olive(增量) clay(目标)
      var categories = ['当前均值', 'C/F培训', 'B/D推广', '号码优化', '目标'];
      var transparent = [0, 2.1, 2.3, 2.4, 0];
      var values =      [2.1, 0.2, 0.1, 0.1, 2.5];
      var colors =      ['#87867F', '#788C5D', '#788C5D', '#788C5D', '#D97757'];
      return {
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' },
          formatter: function(p){ var it = p[1]; if(!it) return ''; return it.name + ': ' + (it.dataIndex === 0 || it.dataIndex === 4 ? '' : '+') + it.value + '%'; } },
        grid: { left: 50, right: 30, top: 10, bottom: 45 },
        xAxis: { type: 'category', data: categories, axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { fontSize: 11, color: '#3D3D3A' }, axisTick: { show: false } },
        yAxis: { type: 'value', min: 0, max: 3.0, axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' }, axisLine: { show: false }, axisTick: { show: false }, splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } } },
        series: [
          { type: 'bar', stack: 'wf', barWidth: '45%', data: transparent.map(function(v){ return { value: v, itemStyle: { color: 'transparent' } }; }), emphasis: { itemStyle: { color: 'transparent' } } },
          { type: 'bar', stack: 'wf', barWidth: '45%', data: values.map(function(v, i){ return { value: v, itemStyle: { color: colors[i], borderRadius: i === 0 ? 0 : [4,4,0,0] } }; }),
            label: { show: true, position: 'top', fontSize: 12, fontWeight: 600,
              formatter: function(p){ var i = p.dataIndex; if(i === 0 || i === 4) return p.value + '%'; return '+' + p.value + '%'; },
              color: function(p){ return colors[p.dataIndex]; } }
          }
        ],
        graphic: []
      };
    })()
  }
];

function renderAct(idx){
  currentAct = idx;
  var act = acts[idx];

  // 导航
  var nav = document.getElementById('actNav');
  nav.innerHTML = '';
  acts.forEach(function(a, i){
    var step = document.createElement('div');
    step.className = 'act-step' + (i === idx ? ' active' : '');
    step.innerHTML = '<div class="act-dot"></div><div class="act-label">' + a.name + '</div>';
    step.onclick = function(){ renderAct(i); };
    nav.appendChild(step);
  });

  // 标题
  document.getElementById('chartTitle').textContent = act.title;
  document.getElementById('chartSubtitle').textContent = act.subtitle;
  document.getElementById('lead').innerHTML = act.lead;

  // 按钮
  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === 3);

  // 图表
  chart.clear();
  chart.setOption(act.option, true);
}

function goPrev(){ if(currentAct > 0) renderAct(currentAct - 1); }
function goNext(){ if(currentAct < 3) renderAct(currentAct + 1); }

renderAct(0);

window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
