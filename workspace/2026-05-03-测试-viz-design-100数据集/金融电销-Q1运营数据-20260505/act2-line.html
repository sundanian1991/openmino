<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融电销 Q1 — 承：转化率趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 850px; height: 400px; }
  .act-badge { display: inline-block; background: #87867F; color: #fff; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 4px; margin-bottom: 8px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div class="act-badge">第二幕 · 承</div>
  <div id="chart"></div>
  <div class="lead">
    B 组转化率从 2.0% 逐月升至 2.6%，D 组同步改善；<strong>C/F 组三个月原地踏步</strong>，始终停留在 1.7-1.9%。<strong>差距不是一个月拉开的，是持续策略差异的累积。</strong>
  </div>
  <div class="footer-note">数据来源：电销中心运营系统 | 2025年 1-3月</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const months = ['1月','2月','3月'];
const series = [
  { name: 'B组', data: [2.0, 2.3, 2.6], lineStyle: { width: 3, color: '#3D3D3A' }, itemStyle: { color: '#3D3D3A' }, symbolSize: 8 },
  { name: 'D组', data: [2.2, 2.6, 2.5], lineStyle: { width: 2, color: '#87867F' }, itemStyle: { color: '#87867F' }, symbolSize: 6 },
  { name: 'A组', data: [2.0, 2.3, 2.3], lineStyle: { width: 1.5, type: 'dashed', color: '#C1C0B8' }, itemStyle: { color: '#C1C0B8' }, symbolSize: 4 },
  { name: 'E组', data: [2.0, 2.5, 2.3], lineStyle: { width: 1.5, type: 'dashed', color: '#C1C0B8' }, itemStyle: { color: '#C1C0B8' }, symbolSize: 4 },
  { name: 'C组', data: [1.7, 1.9, 1.7], lineStyle: { width: 2, type: 'dashed', color: '#c25030' }, itemStyle: { color: '#c25030' }, symbolSize: 5 },
  { name: 'F组', data: [1.7, 1.9, 1.7], lineStyle: { width: 2, type: 'dashed', color: '#c25030' }, itemStyle: { color: '#c25030' }, symbolSize: 5 },
];

const opt = {
  title: {
    text: 'B 组从 2.0% 升至 2.6%，C/F 三个月原地踏步',
    subtext: '6 团队月度转化率走势（%）',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: { trigger: 'axis', formatter: function(p) {
    let s = p[0].axisValueLabel + '<br/>';
    p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + '%<br/>'; });
    return s;
  }},
  grid: { left: 50, right: 30, top: 65, bottom: 30 },
  xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: '#E6E3DA' } }, axisLabel: { fontSize: 11, color: '#3D3D3A' }, axisTick: { show: false } },
  yAxis: {
    type: 'value', min: 1.5, max: 3.0,
    axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' },
    axisLine: { show: false }, splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } }, axisTick: { show: false }
  },
  series: series.map(function(s) {
    return { type: 'line', name: s.name, data: s.data, smooth: true,
      lineStyle: s.lineStyle, itemStyle: s.itemStyle, symbolSize: s.symbolSize,
      label: { show: false }
    };
  }),
  // 右侧标注
  graphic: [
    {
      type: 'text', style: { text: 'B组 ↑', fill: '#3D3D3A', fontSize: 10, fontWeight: 600 },
      right: 20, top: 120
    },
    {
      type: 'text', style: { text: 'C/F 组 —', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      right: 20, top: 290
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
