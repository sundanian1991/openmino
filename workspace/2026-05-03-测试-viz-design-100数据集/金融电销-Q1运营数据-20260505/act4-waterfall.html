<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金融电销 Q1 — 合：行动建议</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 850px; height: 400px; }
  .act-badge { display: inline-block; background: #D97757; color: #fff; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 4px; margin-bottom: 8px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div class="act-badge">第四幕 · 合</div>
  <div id="chart"></div>
  <div class="lead">
    三项改进预计提升转化率 <strong>+0.4 个百分点至 2.5%</strong>：C/F 组通话培训贡献最大（+0.2%），B/D 经验推广和号码优化各 +0.1%。<strong>不需要全面变革，针对性干预即可见效。</strong>
  </div>
  <div class="footer-note">数据来源：电销中心运营系统 | Q2 预估目标</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

// 瀑布图数据：起点、三项增量、终点
// 用 stacked bar 模拟：transparent 底座 + 可见增量
const categories = ['当前均值', 'C/F培训', 'B/D推广', '号码优化', '目标'];

// 底座（transparent）
const transparent = [0, 2.1, 2.3, 2.4, 0];
// 可见柱
const values =      [2.1, 0.2, 0.1, 0.1, 2.5];
// 颜色
const barColors =   ['#87867F', '#788C5D', '#788C5D', '#788C5D', '#D97757'];

const opt = {
  title: {
    text: '三项改进预计提升转化率 0.4 个百分点至 2.5%',
    subtext: '当前均值 2.1% → Q2 目标 2.5%',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis', axisPointer: { type: 'shadow' },
    formatter: function(p) {
      // 只显示可见值
      var item = p[1];
      if (!item) return '';
      var name = item.name;
      var val = item.value;
      if (name === '当前均值' || name === '目标') return name + ': ' + val + '%';
      return name + ': +' + val + '%';
    }
  },
  grid: { left: 50, right: 30, top: 65, bottom: 45 },
  xAxis: {
    type: 'category', data: categories,
    axisLine: { lineStyle: { color: '#E6E3DA' } },
    axisLabel: { fontSize: 11, color: '#3D3D3A', rotate: 0 },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value', min: 0, max: 3.0,
    axisLabel: { formatter: '{value}%', fontSize: 10, color: '#87867F' },
    axisLine: { show: false }, axisTick: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } }
  },
  series: [
    // 透明底座
    {
      type: 'bar', stack: 'wf', barWidth: '40%',
      data: transparent.map(function(v) { return { value: v, itemStyle: { color: 'transparent' } }; }),
      emphasis: { itemStyle: { color: 'transparent' } }
    },
    // 可见柱
    {
      type: 'bar', stack: 'wf', barWidth: '40%',
      data: values.map(function(v, i) { return { value: v, itemStyle: { color: barColors[i], borderRadius: [4, 4, 0, 0] } }; }),
      label: {
        show: true, position: 'top', fontSize: 11, fontWeight: 600,
        formatter: function(p) {
          var idx = p.dataIndex;
          if (idx === 0) return p.value + '%';
          if (idx === 4) return p.value + '%';
          return '+' + p.value + '%';
        },
        color: function(p) { return barColors[p.dataIndex]; }
      }
    }
  ],
  graphic: [
    // 增量总计标注
    {
      type: 'text', style: { text: '合计 +0.4%', fill: '#788C5D', fontSize: 10, fontWeight: 600 },
      left: 370, top: 175
    },
    // 箭头示意
    {
      type: 'text', style: { text: '▼', fill: '#D97757', fontSize: 16 },
      right: 110, top: 140
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
