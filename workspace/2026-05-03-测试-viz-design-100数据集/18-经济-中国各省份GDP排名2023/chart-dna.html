<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2023年中国各省份GDP排名TOP15</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==="undefined"){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.1/echarts.min.js"><\/script>')}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #chart { width: 900px; height: 600px; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var provinces = ['江西','陕西','北京','河北','安徽','上海','湖南','福建','湖北','四川','河南','浙江','山东','江苏','广东'];
var gdpValues = [32200.0, 33786.07, 43760.7, 43944.6, 47050.6, 47218.66, 50012.85, 54355.0, 55803.63, 60132.9, 59132.39, 82553.0, 92292.4, 128192.2, 135673.16];

var colors = provinces.map(function(name, i) {
  var rank = 15 - i;
  if (rank <= 5) return '#2e8b6e';
  if (rank <= 10) return '#5dbf9e';
  return '#ada599';
});

var avgGDP = gdpValues.reduce(function(a, b) { return a + b; }, 0) / gdpValues.length;

var option = {
  animation: false,
  title: {
    text: '广东 GDP 13.6 万亿领跑全国，前二省份超 12 万亿',
    subtext: '2023年中国各省份 GDP 排名 TOP15（单位：亿元人民币）',
    left: 'center',
    top: 12,
    textStyle: {
      fontSize: 14,
      fontWeight: 600,
      color: '#6b3410',
      lineHeight: 22
    },
    subtextStyle: {
      fontSize: 11,
      color: '#857d74',
      lineHeight: 20
    }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(params) {
      var d = params[0];
      return d.name + '<br/>GDP：' + (d.value / 10000).toFixed(2) + ' 万亿元';
    },
    backgroundColor: '#fffdf8',
    borderColor: '#e8e2d8',
    textStyle: { color: '#4a4039', fontSize: 12 }
  },
  grid: {
    left: 80,
    right: 80,
    top: 72,
    bottom: 48,
    containLabel: false
  },
  xAxis: {
    type: 'value',
    name: 'GDP（万亿元）',
    nameLocation: 'end',
    nameTextStyle: { color: '#857d74', fontSize: 10, padding: [0, 0, 0, -20] },
    min: 0,
    max: 150000,
    interval: 30000,
    axisLabel: {
      color: '#857d74',
      fontSize: 11,
      formatter: function(v) { return (v / 10000).toFixed(0); }
    },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: {
      show: true,
      lineStyle: { color: '#f2f0eb', type: 'dashed' }
    }
  },
  yAxis: {
    type: 'category',
    data: provinces,
    axisLabel: { color: '#857d74', fontSize: 11 },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [{
    type: 'bar',
    data: gdpValues.map(function(v, i) {
      var item = { value: v, itemStyle: { color: colors[i] } };
      if (i === 14) {
        item.label = {
          show: true,
          position: 'right',
          formatter: '13.6万亿',
          color: '#2e8b6e',
          fontSize: 11,
          fontWeight: 600
        };
      } else if (i === 13) {
        item.label = {
          show: true,
          position: 'right',
          formatter: '12.8万亿',
          color: '#2e8b6e',
          fontSize: 11,
          fontWeight: 600
        };
      }
      return item;
    }),
    barWidth: 18,
    markLine: {
      silent: true,
      symbol: 'none',
      lineStyle: { color: '#c25030', type: 'dashed', width: 1.5 },
      label: {
        show: true,
        position: 'end',
        formatter: function(params) { return '均值 ' + (avgGDP / 10000).toFixed(1) + '万亿'; },
        color: '#c25030',
        fontSize: 10
      },
      data: [{ xAxis: avgGDP }]
    }
  }],
  graphic: [{
    type: 'text',
    left: 'center',
    bottom: 10,
    style: {
      text: '数据来源：国家统计局 2023',
      fontSize: 10,
      fill: '#ada599',
      textAlign: 'center'
    }
  }]
};

chart.setOption(option);
</script>
</body>
</html>
