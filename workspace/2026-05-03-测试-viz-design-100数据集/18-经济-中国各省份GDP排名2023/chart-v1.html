<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国各省份 GDP 排名 2023</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 900px; height: 560px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    广东（13.6 万亿）和江苏（12.8 万亿）遥遥领先，但增速最快的不是经济大省——<strong>西藏 9.5%、海南 9.2%、内蒙古 7.3%</strong>。经济大省增速普遍偏低（广东 4.8%、河南 4.1%）。<strong>增长重心正在从沿海大省向中小省份转移。</strong>
  </div>
  <div class="footer-note">数据来源：国家统计局 | 2023 年度各省 GDP</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

// Top 15 省份，按 GDP 从高到低排列（ECharts 条形图从上到下）
const provinces = ['广东','江苏','山东','浙江','四川','河南','湖北','福建','湖南','上海','安徽','河北','北京','重庆','内蒙古'];
const gdp =       [135673,128192,92292,82553,60133,59132,55804,54355,50013,47219,47051,43944,43761,30146,24627];
const growthRates = [4.8, 5.8, 6.0, 6.0, 6.0, 4.1, 6.0, 4.5, 4.6, 5.0, 5.8, 5.5, 5.2, 6.1, 7.3];

// 颜色：广东和江苏高亮（领先），内蒙古高亮（高增速），其余灰色
const colors = ['#D97757','#D97757','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#3D3D3A','#788C5D'];

const opt = {
  title: {
    text: '广东江苏领跑全国，但增速在中小省份',
    subtext: '2023 年各省 GDP Top 15（万亿元）及增速',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(p) {
      var idx = p[0].dataIndex;
      return provinces[idx] + '<br/>GDP: ' + (gdp[idx]/10000).toFixed(1) + ' 万亿<br/>增速: ' + growthRates[idx] + '%';
    }
  },
  grid: { left: 75, right: 50, top: 65, bottom: 30 },
  xAxis: {
    type: 'value',
    axisLabel: { formatter: function(v) { return (v/10000).toFixed(0) + '万亿'; }, fontSize: 10, color: '#87867F' },
    axisLine: { show: false },
    splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'category',
    data: provinces.map(function(name, i) { return name + '  ' + growthRates[i] + '%'; }),
    axisLabel: {
      fontSize: 12,
      color: function(v, i) { return colors[i]; },
      fontWeight: function(v, i) { return (i === 0 || i === 1 || i === 14) ? 600 : 400; }
    },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [{
    type: 'bar', data: gdp,
    barWidth: '55%',
    itemStyle: {
      color: function(p) { return colors[p.dataIndex]; },
      borderRadius: [0, 3, 3, 0]
    },
    label: {
      show: true, position: 'right',
      formatter: function(p) { return (p.value / 10000).toFixed(1); },
      fontSize: 10, color: '#87867F'
    }
  }]
};

chart.setOption(opt);
</script>
</body>
</html>
