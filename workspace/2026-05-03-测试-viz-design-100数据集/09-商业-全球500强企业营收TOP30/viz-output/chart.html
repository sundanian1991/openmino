<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球500强企业营收TOP30</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAFAF8; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }

  .container {
    width: 1200px;
    margin: 0 auto;
    padding: 16px 20px 20px 20px;
    background: #FAFAF8;
  }

  .title-area {
    margin-bottom: 8px;
    padding-left: 20px;
  }
  .title-area h1 {
    font-family: Georgia, "Noto Serif SC", "SimSun", serif;
    font-size: 24px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.4;
    letter-spacing: 0.5px;
  }
  .title-area .subtitle {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #7A756F;
    margin-top: 4px;
    font-weight: 400;
  }

  .main-row {
    display: flex;
    align-items: flex-start;
  }

  #chart {
    width: 850px;
    height: 1020px;
    flex-shrink: 0;
  }

  .insights {
    width: 280px;
    flex-shrink: 0;
    padding-top: 20px;
    padding-left: 10px;
  }
  .insights h2 {
    font-family: Georgia, "Noto Serif SC", "SimSun", serif;
    font-size: 15px;
    color: #3D3832;
    margin-bottom: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    border-bottom: 1.5px solid #D4CEC6;
    padding-bottom: 8px;
  }
  .insight-card {
    display: flex;
    align-items: flex-start;
    margin-bottom: 20px;
    line-height: 1.65;
  }
  .insight-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
    margin-right: 10px;
  }
  .insight-card .text {
    font-size: 13px;
    color: #3D3832;
  }
  .insight-card .text strong {
    font-weight: 700;
    color: #1A1A1A;
  }

  .footnote {
    margin-top: 8px;
    padding-left: 20px;
    font-size: 11px;
    color: #A09A92;
    font-family: "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title-area">
    <h1>美国科技零售与中国能源国企主导全球营收TOP30</h1>
    <div class="subtitle">Fortune Global 500 — 2026年度 营收排名前30（百万美元）</div>
  </div>

  <div class="main-row">
    <div id="chart"></div>
    <div class="insights">
      <h2>关键洞察</h2>
      <div class="insight-card">
        <div class="insight-dot" style="background:#003D6B;"></div>
        <div class="text"><strong>美国企业</strong>占据 TOP30 近半壁江山（14家），科技+零售双轮驱动</div>
      </div>
      <div class="insight-card">
        <div class="insight-dot" style="background:#C0272D;"></div>
        <div class="text"><strong>中国企业</strong>以国企为主（10家），集中在炼油和银行业</div>
      </div>
      <div class="insight-card">
        <div class="insight-dot" style="background:#5B7B8A;"></div>
        <div class="text"><strong>炼油行业</strong>数量最多（6家），但营收跨度最大</div>
      </div>
    </div>
  </div>

  <div class="footnote">数据来源: Fortune Global 500</div>
</div>

<script>
(function() {
  var chartDom = document.getElementById('chart');
  var chart = echarts.init(chartDom);

  var rawData = [
    { company: 'Walmart', revenue: 648125, country: '美国', industry: '零售' },
    { company: 'Amazon', revenue: 574785, country: '美国', industry: '互联网零售' },
    { company: 'State Grid', revenue: 530097, country: '中国', industry: '公用事业' },
    { company: 'China National Petroleum', revenue: 483015, country: '中国', industry: '炼油' },
    { company: 'China Sinopec Group', revenue: 471149, country: '中国', industry: '炼油' },
    { company: 'Saudi Aramco', revenue: 461640, country: '沙特阿拉伯', industry: '炼油' },
    { company: 'Apple', revenue: 383482, country: '美国', industry: '科技' },
    { company: 'UnitedHealth Group', revenue: 371622, country: '美国', industry: '医疗保健' },
    { company: 'Berkshire Hathaway', revenue: 364482, country: '美国', industry: '保险' },
    { company: 'CVS Health', revenue: 357776, country: '美国', industry: '医疗保健' },
    { company: 'Volkswagen', revenue: 349346, country: '德国', industry: '汽车' },
    { company: 'Exxon Mobil', revenue: 334707, country: '美国', industry: '炼油' },
    { company: 'China State Construction', revenue: 325610, country: '中国', industry: '工程建筑' },
    { company: 'Toyota Motor', revenue: 310606, country: '日本', industry: '汽车' },
    { company: 'Alphabet', revenue: 307394, country: '美国', industry: '科技' },
    { company: 'McKesson', revenue: 297183, country: '美国', industry: '批发' },
    { company: 'Shell', revenue: 280145, country: '英国', industry: '炼油' },
    { company: 'Cencora', revenue: 262172, country: '美国', industry: '批发' },
    { company: 'Microsoft', revenue: 245122, country: '美国', industry: '科技' },
    { company: 'Costco Wholesale', revenue: 242290, country: '美国', industry: '零售' },
    { company: 'BP', revenue: 224844, country: '英国', industry: '炼油' },
    { company: 'TotalEnergies', revenue: 217393, country: '法国', industry: '炼油' },
    { company: 'Chevron', revenue: 200949, country: '美国', industry: '炼油' },
    { company: 'Samsung Electronics', revenue: 189350, country: '韩国', industry: '科技' },
    { company: 'Home Depot', revenue: 152669, country: '美国', industry: '零售' },
    { company: 'ICBC', revenue: 138789, country: '中国', industry: '银行' },
    { company: 'China Construction Bank', revenue: 132074, country: '中国', industry: '银行' },
    { company: 'Agricultural Bank of China', revenue: 125479, country: '中国', industry: '银行' },
    { company: 'Ping An Insurance', revenue: 124533, country: '中国', industry: '保险' },
    { company: 'Bank of China', revenue: 114918, country: '中国', industry: '银行' }
  ];

  function getColor(country) {
    if (country === '美国') return '#003D6B';
    if (country === '中国') return '#C0272D';
    return '#5B7B8A';
  }

  var sorted = rawData.slice().sort(function(a, b) { return a.revenue - b.revenue; });
  var categories = sorted.map(function(d) { return d.company; });

  function getLineWidth(idx) {
    var rank = 29 - idx;
    if (rank < 3) return 3;
    if (rank < 10) return 2;
    return 1.5;
  }

  function getSymbolSize(idx) {
    var rank = 29 - idx;
    if (rank < 3) return 12;
    if (rank < 10) return 8;
    return 6;
  }

  var option = {
    backgroundColor: 'transparent',
    grid: {
      top: 10,
      right: 120,
      bottom: 30,
      left: 170,
      containLabel: false
    },
    xAxis: {
      type: 'value',
      max: 700000,
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: {
        show: true,
        lineStyle: { color: '#E8E4DF', type: 'solid', width: 0.5 }
      },
      axisLabel: {
        show: true,
        color: '#9E9E9E',
        fontSize: 10,
        fontFamily: '"PingFang SC", sans-serif',
        formatter: function(val) {
          if (val === 0) return '0';
          return (val / 1000).toFixed(0) + 'K';
        }
      }
    },
    yAxis: {
      type: 'category',
      data: categories,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        color: '#3D3832',
        fontSize: 11,
        fontFamily: '"PingFang SC", "Hiragino Sans GB", sans-serif'
      }
    },
    tooltip: {
      show: true,
      trigger: 'axis',
      axisPointer: { type: 'none' },
      backgroundColor: 'rgba(255,255,255,0.96)',
      borderColor: '#D4CEC6',
      borderWidth: 1,
      textStyle: { color: '#3D3832', fontSize: 12, fontFamily: '"PingFang SC", sans-serif' },
      formatter: function(params) {
        var idx = params[0].dataIndex;
        var d = sorted[idx];
        var revenueB = (d.revenue / 1000).toFixed(0);
        return '<strong>' + d.company + '</strong><br/>营收: $' + d.revenue.toLocaleString() + 'M (' + revenueB + 'B)<br/>国家: ' + d.country;
      }
    },
    legend: {
      show: true,
      top: 0,
      right: 0,
      itemWidth: 12,
      itemHeight: 12,
      textStyle: { color: '#3D3832', fontSize: 12, fontFamily: '"PingFang SC", sans-serif' },
      data: [
        { name: '美国', itemStyle: { color: '#003D6B' } },
        { name: '中国', itemStyle: { color: '#C0272D' } },
        { name: '其他', itemStyle: { color: '#5B7B8A' } }
      ]
    },
    series: [
      {
        name: '美国',
        type: 'custom',
        renderItem: function(params, api) {
          var idx = params.dataIndex;
          var yCategory = api.value(0);
          var xValue = api.value(1);
          var startPt = api.coord([0, yCategory]);
          var endPt = api.coord([xValue, yCategory]);
          var color = getColor(sorted[idx].country);
          var lw = getLineWidth(idx);

          return {
            type: 'group',
            children: [
              {
                type: 'line',
                shape: { x1: startPt[0], y1: startPt[1], x2: endPt[0], y2: endPt[1] },
                style: { stroke: color, lineWidth: lw, lineCap: 'round' }
              },
              {
                type: 'circle',
                shape: { cx: endPt[0], cy: endPt[1], r: getSymbolSize(idx) / 2 },
                style: { fill: color }
              }
            ]
          };
        },
        data: sorted.map(function(d, i) { return [i, d.revenue]; }),
        z: 2,
        encode: { x: 1, y: 0 },
        markLine: {
          silent: true,
          symbol: 'none',
          data: [
            {
              xAxis: 280145,
              lineStyle: { color: '#9E9E9E', type: 'dashed', width: 1.5 },
              label: {
                show: true,
                position: 'start',
                formatter: '中位数',
                color: '#9E9E9E',
                fontSize: 11,
                fontFamily: '"PingFang SC", sans-serif'
              }
            }
          ]
        }
      },
      {
        name: '中国',
        type: 'custom',
        renderItem: function() { return { type: 'group', children: [] }; },
        data: [],
        z: 1
      },
      {
        name: '其他',
        type: 'custom',
        renderItem: function() { return { type: 'group', children: [] }; },
        data: [],
        z: 1
      }
    ],
    animation: true,
    animationDuration: 800,
    animationEasing: 'cubicOut'
  };

  chart.setOption(option);

  // Top3 标注
  setTimeout(function() {
    var top3Map = [
      { idx: 29, text: 'Walmart $648B', color: '#003D6B' },
      { idx: 28, text: 'Amazon $575B', color: '#003D6B' },
      { idx: 27, text: 'State Grid $530B', color: '#C0272D' }
    ];

    top3Map.forEach(function(item) {
      var point = chart.convertToPixel({ xAxisIndex: 0, yAxisIndex: 0 }, [sorted[item.idx].revenue, item.idx]);
      if (!point) return;

      var label = document.createElement('div');
      label.style.position = 'absolute';
      label.style.left = (point[0] + 12) + 'px';
      label.style.top = (point[1] - 8) + 'px';
      label.style.fontSize = '13px';
      label.style.fontWeight = 'bold';
      label.style.color = item.color;
      label.style.fontFamily = '"PingFang SC", "Hiragino Sans GB", sans-serif';
      label.style.pointerEvents = 'none';
      label.style.whiteSpace = 'nowrap';
      label.style.zIndex = '20';
      label.textContent = item.text;
      chartDom.appendChild(label);
    });
  }, 300);

  window.addEventListener('resize', function() { chart.resize(); });
})();
</script>
</body>
</html>
