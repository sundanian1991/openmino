<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国 GDP 十年转型</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 900px; height: 420px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    过去十年，中国经济增速从 <strong>7% 持续降至 5%</strong>，但服务业占比从 <strong>52% 升至 57%</strong>——增长引擎正从工业转向服务业。问题是：服务业驱动的经济，能维持多高的增速？
  </div>
  <div class="footer-note">数据来源：国家统计局 | 2015—2024 年度</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
const growth   = [7.0, 6.8, 6.9, 6.8, 6.1, 2.3, 8.6, 3.1, 5.4, 5.0];
const services = [51.7, 53.3, 53.5, 54.1, 55.2, 55.5, 54.8, 55.0, 56.3, 56.7];

const W = 900, H = 420;
const pad = { top: 70, right: 60, bottom: 50, left: 70 };
const plotW = W - pad.left - pad.right;
const plotH = H - pad.top - pad.bottom;

function xPx(i) { return pad.left + (i + 0.5) / years.length * plotW; }
function yGrowth(v) { return pad.top + plotH - (v / 10) * plotH; }
function yService(v) { return pad.top + plotH - ((v - 48) / 12) * plotH; }

const opt = {
  title: {
    text: '增速放缓 vs 结构转型',
    subtext: '2015 — 2024 年度数据',
    left: 'left', top: 10,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) {
      let s = p[0].axisValue + '<br/>';
      p.forEach(function(item) { s += item.marker + item.seriesName + ': ' + item.value + '<br/>'; });
      return s;
    }
  },
  grid: { left: pad.left, right: pad.right, top: pad.top, bottom: pad.bottom },
  xAxis: {
    type: 'category', data: years,
    axisLabel: { fontSize: 11, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: [
    {
      type: 'value', name: '增速', min: 0, max: 10, interval: 2,
      nameTextStyle: { fontSize: 10, color: '#D97757' },
      axisLabel: { formatter: '{value}%', fontSize: 10, color: '#D97757' },
      axisLine: { lineStyle: { color: '#D9775733' } },
      splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed', width: 0.5 } },
      axisTick: { show: false }
    },
    {
      type: 'value', name: '服务业占比', min: 48, max: 60, interval: 2,
      nameTextStyle: { fontSize: 10, color: '#788C5D' },
      axisLabel: { formatter: '{value}%', fontSize: 10, color: '#788C5D' },
      axisLine: { lineStyle: { color: '#788C5D33' } },
      axisTick: { show: false },
      splitLine: { show: false }
    }
  ],
  series: [
    {
      name: '增速', type: 'line', data: growth,
      smooth: true, symbol: 'circle', symbolSize: 5,
      itemStyle: { color: '#D97757' },
      lineStyle: { width: 3 },
      yAxisIndex: 0
    },
    {
      name: '服务业占比', type: 'line', data: services,
      smooth: true, symbol: 'circle', symbolSize: 5,
      itemStyle: { color: '#788C5D' },
      lineStyle: { width: 3 },
      yAxisIndex: 1
    }
  ],
  graphic: [
    // 疫情标注 — 只在关键视觉位置保留
    {
      type: 'circle', shape: { cx: xPx(5), cy: yGrowth(2.3), r: 5 },
      style: { fill: '#c25030', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '疫情 2.3%', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      left: xPx(5) - 12, top: yGrowth(2.3) - 26
    },
    // 2024 最新值
    {
      type: 'text', style: { text: '5.0%', fill: '#D97757', fontSize: 11, fontWeight: 700 },
      left: xPx(9) + 12, top: yGrowth(5.0) - 18
    },
    {
      type: 'text', style: { text: '56.7%', fill: '#788C5D', fontSize: 11, fontWeight: 700 },
      left: xPx(9) + 12, top: yService(56.7) - 18
    }
  ]
};

chart.setOption(opt);
</script>
</body>
</html>
