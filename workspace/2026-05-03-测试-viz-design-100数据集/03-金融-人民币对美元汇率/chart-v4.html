<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人民币汇率 vs 贸易顺差</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FAF9F5; font-family: -apple-system, "PingFang SC", sans-serif; display: flex; justify-content: center; padding: 40px 0; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 32px 36px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 940px; }
  #chart { width: 900px; height: 500px; }
  .lead { max-width: 700px; margin: 12px 0 0; font-size: 13px; color: #5F5A54; line-height: 1.7; }
  .lead strong { color: #141413; font-weight: 600; }
  .footer-note { text-align: left; font-size: 11px; color: #A3A29B; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="lead">
    2023 年初至 2025 年 4 月，人民币对美元从 <strong>6.75 贬至 7.25</strong>，但贸易顺差并未系统性扩大——月均在 <strong>560-1050 亿美元</strong> 之间波动。经典理论预期贬值→出口竞争力增强→顺差扩大，数据不支持。
  </div>
  <div class="footer-note">数据来源：中国人民银行、海关总署</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));

const dates = [
  '23-01','23-02','23-03','23-04','23-05','23-06','23-07',
  '23-08','23-09','23-10','23-11','23-12',
  '24-01','24-02','24-03','24-04','24-05','24-06','24-07',
  '24-08','24-09','24-10','24-11','24-12',
  '25-01','25-02','25-03','25-04'
];
const usdCny = [
  6.75,6.85,6.88,6.92,7.08,7.22,7.17,7.28,7.29,7.32,7.24,7.11,
  7.10,7.20,7.23,7.25,7.24,7.27,7.26,7.13,7.02,7.12,7.24,7.30,
  7.28,7.26,7.24,7.25
];
const tradeBal = [
  76.7,16.9,88.2,90.2,65.1,70.6,80.1,68.2,77.7,56.5,68.4,75.3,
  62.1,41.0,72.7,72.6,82.6,81.2,84.7,91.0,58.2,58.5,61.0,104.8,
  63.0,18.0,72.5,68.9
];

const gL = 70, gR = 60, gTop = 70, gBottom = 50;
const W = 900, H = 500;
const pW = W - gL - gR;
const pH = H - gTop - gBottom;
const yMin = 6.6, yMax = 7.4;

function xPx(i) { return gL + (i / (dates.length - 1)) * pW; }
function yPx(v) { return gTop + pH - ((v - yMin) / (yMax - yMin)) * pH; }

const option = {
  title: {
    text: '人民币贬值 7%，但贸易顺差并未扩大',
    subtext: '2023.01 — 2025.04 月度数据',
    left: 'left', top: 6,
    textStyle: { fontSize: 17, fontWeight: 700, color: '#141413', fontFamily: 'Georgia, serif' },
    subtextStyle: { fontSize: 11, color: '#A3A29B' }
  },
  tooltip: {
    trigger: 'axis',
    formatter: function(p) {
      let s = p[0].axisValue + '<br/>';
      p.forEach(function(item) {
        let val = item.value;
        if (item.seriesName.includes('汇率')) val = val.toFixed(2);
        s += item.marker + item.seriesName + ': ' + val + (item.seriesName.includes('汇率') ? '' : 'B') + '<br/>';
      });
      return s;
    }
  },
  grid: { left: gL, right: gR, top: gTop, bottom: gBottom },
  xAxis: {
    type: 'category', data: dates,
    axisLabel: { interval: 4, fontSize: 10, color: '#87867F' },
    axisLine: { lineStyle: { color: '#E3DACC' } },
    axisTick: { show: false }
  },
  yAxis: [
    {
      type: 'value', name: 'USD/CNY',
      min: yMin, max: yMax,
      nameTextStyle: { fontSize: 10, color: '#D97757' },
      axisLabel: {
        formatter: function(v) { return v.toFixed(1); },
        fontSize: 10, color: '#D97757'
      },
      axisLine: { lineStyle: { color: '#D9775733' } },
      splitLine: { lineStyle: { color: '#E6E3DA', type: 'dashed' } },
      axisTick: { show: false }
    },
    {
      type: 'value', name: '顺差 ($B)',
      min: 0, max: 120, interval: 20,
      nameTextStyle: { fontSize: 10, color: '#87867F' },
      axisLabel: { fontSize: 10, color: '#87867F' },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: false }
    }
  ],
  series: [
    {
      name: 'USD/CNY 汇率', type: 'line', data: usdCny,
      smooth: 0.3, symbol: 'none',
      lineStyle: { width: 2.5, color: '#D97757' },
      yAxisIndex: 0
    },
    {
      name: '贸易顺差', type: 'bar', data: tradeBal,
      itemStyle: { color: 'rgba(135,134,127,0.2)' },
      barWidth: '50%',
      yAxisIndex: 1
    }
  ],
  graphic: [
    {
      type: 'circle', shape: { cx: xPx(0), cy: yPx(6.75), r: 5 },
      style: { fill: '#D97757', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '6.75', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: xPx(0) + 12, top: yPx(6.75) - 14
    },
    {
      type: 'circle', shape: { cx: xPx(9), cy: yPx(7.32), r: 5 },
      style: { fill: '#c25030', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '7.32 最高', fill: '#c25030', fontSize: 10, fontWeight: 600 },
      left: xPx(9) - 40, top: yPx(7.32) + 10
    },
    {
      type: 'circle', shape: { cx: xPx(27), cy: yPx(7.25), r: 5 },
      style: { fill: '#D97757', stroke: '#fff', lineWidth: 2 }
    },
    {
      type: 'text', style: { text: '7.25', fill: '#D97757', fontSize: 10, fontWeight: 600 },
      left: xPx(27) + 12, top: yPx(7.25) - 14
    }
  ]
};

chart.setOption(option);
</script>
</body>
</html>
