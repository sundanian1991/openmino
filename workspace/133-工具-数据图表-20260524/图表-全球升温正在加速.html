
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR 战略图表套件 v2.8 | 定制精简版</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 全局样式 */
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #F4F7F9;
            color: #051c2c;
            overflow: hidden;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 数据表格 */
        .mck-data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
        .mck-data-table th { background: #f8fafc; color: #475569; font-weight: 600; padding: 6px 12px; border-bottom: 2px solid #e2e8f0; text-align: left; white-space: nowrap; }
        .mck-data-table td { padding: 5px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .mck-data-table tr.even td { background: #f8fafc; }
        .mck-data-table tr.odd td { background: #fff; }
        .mck-data-table tr:hover td { background: #eff6ff; }

        /* 麦肯锡配色变量 */
        :root {
            --mck-deep-blue: #051c2c;
            --mck-sky-blue: #00A9E0;
            --mck-light-grey: #F4F7F9;
            --mck-border: #e2e8f0;
        }

        /* 通用组件类 */
        .input-group { margin-bottom: 1rem; }
        .input-label {
            display: block; font-size: 0.75rem; font-weight: 600; color: #64748b;
            margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .form-input, .form-select {
            width: 100%; padding: 0.5rem; border: 1px solid var(--mck-border);
            border-radius: 0.25rem; font-size: 0.875rem; color: var(--mck-deep-blue);
            background-color: white; transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none; border-color: var(--mck-sky-blue);
            box-shadow: 0 0 0 2px rgba(0, 169, 224, 0.1);
        }
        
        /* 按钮样式 */
        .btn-primary {
            background-color: var(--mck-deep-blue); color: white; font-weight: 500;
            padding: 0.6rem 1rem; border-radius: 0.25rem; transition: background-color 0.2s;
            width: 100%; text-align: center; cursor: pointer;
        }
        .btn-primary:hover { background-color: #0a2e46; }
        .btn-secondary {
            background-color: white; color: var(--mck-deep-blue); border: 1px solid var(--mck-border);
            font-weight: 500; padding: 0.5rem 1rem; border-radius: 0.25rem;
            transition: all 0.2s; cursor: pointer;
        }
        .btn-secondary:hover { border-color: var(--mck-sky-blue); color: var(--mck-sky-blue); }

        /* 图表水印 */
        .watermark {
            position: absolute; bottom: 1rem; right: 1.5rem; font-size: 0.75rem;
            color: rgba(5, 28, 44, 0.3); font-weight: 600; pointer-events: none;
            z-index: 10; letter-spacing: 0.05em; font-family: 'Inter', sans-serif;
        }

        /* 加载遮罩 */
        #loading {
            display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.8);
            z-index: 50; justify-content: center; align-items: center;
        }
        
        /* 隐藏的 SVG 容器 */
        #svgContainer {
            position: absolute; top: -9999px; left: -9999px; visibility: hidden;
        }

        /* 自定义颜色输入框高度 */
        input[type="color"] {
            height: 36px;
            padding: 2px 4px;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 顶部导航 -->
    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#051c2c] text-white flex items-center justify-center font-bold text-sm rounded">TR</div>
            <h1 class="font-semibold text-lg tracking-tight text-[#051c2c]">Strategy Chart Suite <span class="text-xs font-normal text-gray-500 ml-2">v2.8 定制版</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="exportChart('png')" class="btn-secondary text-xs flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                导出 4K PNG
            </button>
            <button onclick="exportSVG()" class="btn-secondary text-xs flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                导出 SVG
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- 左侧：控制面板 -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)] h-full overflow-hidden">
            <div class="flex-1 overflow-y-auto p-5 space-y-6">
                
                <!-- 板块：图表类型 -->
                <div>
                    <label class="input-label">图表类型 (Chart Type)</label>
                    <select id="chartType" class="form-select" onchange="loadTemplate()">
                        <optgroup label="战略分析 (Strategic)">
                            <option value="waterfall">瀑布图 (Waterfall Bridge)</option>
                            <option value="stacked">堆叠柱状图 (Stacked Column)</option>
                            <option value="grouped_bar">分组柱形图 (Grouped Column)</option>
                            <option value="variance">差值箭头图 (Actual vs Budget)</option>
                            <option value="butterfly">蝴蝶图/龙卷风图 (Butterfly)</option>
                            <option value="swot">SWOT 矩阵 (Matrix)</option>
                        </optgroup>
                        <optgroup label="新增图表 (New)">
                            <option value="hbar_grouped">分组条形图 (Grouped Horizontal Bar)</option>
                            <option value="line_bar">折线+柱形组合图 (Line + Bar)</option>
                            <option value="funnel">漏斗图 (Funnel)</option>
                            <option value="pyramid">金字塔图 (Pyramid)</option>
                            <option value="quadrant">散点象限图 (Quadrant)</option>
                            <option value="bullet">子弹图 (Bullet)</option>
                            <option value="tree">树图 (Tree)</option>
                        </optgroup>
                        <optgroup label="高级图表 (Advanced)">
                            <option value="area_stacked">堆叠面积图 (Stacked Area)</option>
                            <option value="bubble_grouped">分组气泡图 (Grouped Bubble)</option>
                            <option value="scatter">散点图 (Scatter Plot)</option>
                            <option value="treemap">矩形树图 (Treemap)</option>
                            <option value="sankey">桑基图 (Sankey)</option>
                            <option value="sunburst">旭日图 (Sunburst)</option>
                            <option value="radar">雷达图 (Radar)</option>
                            <option value="portfolio">气泡矩阵 (Portfolio Funnel)</option>
                        </optgroup>
                        <optgroup label="基础图表 (Basic)">
                            <option value="bar">标准柱状图 (Bar)</option>
                            <option value="line">折线图 (Line)</option>
                            <option value="pie">专业饼图 (Pie)</option>
                        </optgroup>
                    </select>
                </div>

                <!-- 板块：画布尺寸 -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="input-label">画布宽度 (px)</label>
                        <input type="number" id="canvasWidth" class="form-input" value="1000" oninput="updateContainerSize()">
                    </div>
                    <div>
                        <label class="input-label">画布高度 (px)</label>
                        <input type="number" id="canvasHeight" class="form-input" value="600" oninput="updateContainerSize()">
                    </div>
                </div>

                <!-- 板块：标题与排版 -->
                <div class="border-t border-slate-100 pt-4">
                    <label class="input-label">图表主标题</label>
                    <input type="text" id="chartTitle" class="form-input mb-2" value="2023-2025 收入增长驱动力分析" oninput="renderChart(false)">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="input-label">标题字号</label>
                            <input type="number" id="titleSize" class="form-input" value="20" oninput="renderChart(false)">
                        </div>
                        <div>
                            <label class="input-label">对齐方式</label>
                            <select id="titleAlign" class="form-select" onchange="renderChart(false)">
                                <option value="left">左对齐 (对齐坐标轴)</option>
                                <option value="center">居中</option>
                                <option value="right">右对齐 (对齐坐标轴)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 板块：图例与网格 -->
                <div class="border-t border-slate-100 pt-4">
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div>
                            <label class="input-label">图例位置</label>
                            <select id="legendPos" class="form-select" onchange="renderChart(false)">
                                <option value="top-right">右上</option>
                                <option value="top-center">顶部居中</option>
                                <option value="bottom-center" selected>底部居中</option>
                            </select>
                        </div>
                        <div>
                            <label class="input-label">网格线样式</label>
                            <select id="gridStyle" class="form-select" onchange="renderChart(false)">
                                <option value="dashed">虚线</option>
                                <option value="solid">实线</option>
                                <option value="none">无网格线</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 板块：坐标轴刻度控制 -->
                <div class="border-t border-slate-100 pt-4">
                    <label class="input-label mb-2">坐标轴刻度 (留空为自动)</label>
                    
                    <!-- Y轴控制 -->
                    <div class="mb-2">
                        <span class="text-xs font-semibold text-slate-500">Y 轴 (纵轴)</span>
                        <div class="grid grid-cols-3 gap-1 mt-1">
                            <input type="number" id="yMin" class="form-input px-1 text-center" placeholder="起始" oninput="renderChart(false)">
                            <input type="number" id="yMax" class="form-input px-1 text-center" placeholder="结束" oninput="renderChart(false)">
                            <input type="number" id="yInterval" class="form-input px-1 text-center" placeholder="步长" oninput="renderChart(false)">
                        </div>
                    </div>

                    <!-- X轴控制 -->
                    <div>
                        <span class="text-xs font-semibold text-slate-500">X 轴 (横轴 - 仅散点/气泡)</span>
                        <div class="grid grid-cols-3 gap-1 mt-1">
                            <input type="number" id="xMin" class="form-input px-1 text-center" placeholder="起始" oninput="renderChart(false)">
                            <input type="number" id="xMax" class="form-input px-1 text-center" placeholder="结束" oninput="renderChart(false)">
                            <input type="number" id="xInterval" class="form-input px-1 text-center" placeholder="步长" oninput="renderChart(false)">
                        </div>
                    </div>

                    <!-- 轴标题 -->
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div>
                            <label class="input-label">Y 轴标题</label>
                            <input type="text" id="yAxisName" class="form-input" placeholder="如：工单数" oninput="renderChart(false)">
                        </div>
                        <div>
                            <label class="input-label">X 轴标题</label>
                            <input type="text" id="xAxisName" class="form-input" placeholder="如：月份" oninput="renderChart(false)">
                        </div>
                    </div>
                </div>

                <!-- 板块：视觉控制 -->
                <div class="border-t border-slate-100 pt-4 space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="text-sm text-slate-600">显示数值标签</label>
                        <input type="checkbox" id="showLabels" checked class="accent-[#051c2c]" onchange="renderChart(false)">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-sm text-slate-600">显示 Y 轴刻度</label>
                        <input type="checkbox" id="showYAxis" checked class="accent-[#051c2c]" onchange="renderChart(false)">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="input-label">标签字号</label>
                            <input type="number" id="labelSize" class="form-input" value="12" oninput="renderChart(false)">
                        </div>
                        <div>
                            <label class="input-label">柱体宽度 %</label>
                            <input type="number" id="barWidth" class="form-input" value="50" min="5" max="100" oninput="renderChart(false)">
                        </div>
                    </div>

                    <!-- 分类间距调节 -->
                    <div>
                        <label class="input-label flex justify-between">
                            <span>分类间距 (Category Gap)</span>
                            <span id="catGapVal" class="text-xs text-gray-500">20%</span>
                        </label>
                        <input type="range" id="catGap" class="w-full accent-[#051c2c]" min="0" max="80" value="20" oninput="document.getElementById('catGapVal').innerText=this.value+'%'; debouncedRender()">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="input-label">X轴字号</label>
                            <input type="number" id="xAxisFontSize" class="form-input" value="12" oninput="renderChart(false)">
                        </div>
                        <div>
                            <label class="input-label">X轴旋转</label>
                            <select id="xAxisRotate" class="form-select" onchange="renderChart(false)">
                                <option value="0">0°</option>
                                <option value="45">45°</option>
                                <option value="90">90°</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="input-label">数据排序</label>
                        <select id="sortData" class="form-select" onchange="renderChart(false)">
                            <option value="none">原始顺序</option>
                            <option value="asc">升序 (从小到大)</option>
                            <option value="desc">降序 (从大到小)</option>
                        </select>
                    </div>
                </div>

                <!-- 板块：叙事层控制 -->
                <div class="border-t border-slate-100 pt-4 space-y-3">
                    <label class="input-label">叙事层（Narrative Layer）</label>

                    <!-- 副标题 -->
                    <div>
                        <label class="input-label">副标题（背景信息）</label>
                        <input type="text" id="chartSubtitle" class="form-input" value="" placeholder="如：2023-2024年度" oninput="renderChart(false)">
                    </div>

                    <!-- 解读文字 -->
                    <div>
                        <label class="input-label">解读文字（核心判断）</label>
                        <textarea id="chartTakeaway" class="form-input" rows="2" placeholder="如：Q3 起成本增速持续高于收入，需关注毛利率压力" oninput="renderChart(false)"></textarea>
                        <span class="text-xs text-gray-400 mt-1">图表下方加粗显示的核心结论</span>
                    </div>

                    <!-- 提要 -->
                    <div>
                        <label class="input-label">提要（补充说明）</label>
                        <textarea id="chartFootnote" class="form-input" rows="2" placeholder="如：8月开始落后于增长，且此后一直未能赶上" oninput="renderChart(false)"></textarea>
                    </div>

                    <!-- 数据来源 -->
                    <div>
                        <label class="input-label">数据来源</label>
                        <input type="text" id="dataSource" class="form-input" value="" placeholder="如：数据来源：国家统计局 | 2015-2024" oninput="renderChart(false)">
                    </div>

                    <!-- 参考线 -->
                    <div>
                        <label class="input-label">参考线（每行一条：值,标签,线型）</label>
                        <textarea id="refLines" class="form-input font-mono text-xs" rows="2" placeholder="如：&#10;100,目标值,dashed&#10;80,均值,solid" oninput="renderChart(false)"></textarea>
                        <span class="text-xs text-gray-400 mt-1">线型：solid / dashed / dotted</span>
                    </div>

                    <!-- 风格学派 -->
                    <div>
                        <label class="input-label">风格学派</label>
                        <select id="styleSchool" class="form-select" onchange="applyStyleSchool()">
                            <option value="mckinsey">麦肯锡极简（深蓝+天蓝）</option>
                            <option value="ft">FT 风格（紫红+暖灰）</option>
                            <option value="economist">Economist（红+白）</option>
                            <option value="tufte">Tufte 极简（黑白）</option>
                            <option value="dark">暗色终端（深色背景）</option>
                            <option value="nyt">NYT（衬线+灰调）</option>
                            <option value="nature">学术 Nature（蓝绿）</option>
                            <option value="custom">自定义（下方输入）</option>
                        </select>
                    </div>

                    <!-- 自定义颜色 -->
                    <div id="customColors" style="display:none;">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="input-label">主色</label>
                                <input type="color" id="customPrimary" class="form-input" value="#051c2c" oninput="renderChart(false)">
                            </div>
                            <div>
                                <label class="input-label">辅色</label>
                                <input type="color" id="customSecondary" class="form-input" value="#00A9E0" oninput="renderChart(false)">
                            </div>
                        </div>
                    </div>

                    <!-- 语义色 -->
                    <div>
                        <label class="input-label">语义色</label>
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="text-xs text-gray-500">正面</label>
                                <input type="color" id="semanticPositive" class="form-input" value="#2E7D32" oninput="renderChart(false)">
                            </div>
                            <div>
                                <label class="text-xs text-gray-500">负面</label>
                                <input type="color" id="semanticNegative" class="form-input" value="#C62828" oninput="renderChart(false)">
                            </div>
                            <div>
                                <label class="text-xs text-gray-500">基准</label>
                                <input type="color" id="semanticNeutral" class="form-input" value="#7D8F9E" oninput="renderChart(false)">
                            </div>
                        </div>
                    </div>

                    <!-- 背景色 -->
                    <div>
                        <label class="input-label">背景色</label>
                        <select id="bgColor" class="form-select" onchange="renderChart(false)">
                            <option value="#fff">白色（默认）</option>
                            <option value="#F4F7F9">浅灰</option>
                            <option value="#FFF1F0">FT 粉白</option>
                            <option value="#1a1a2e">暗色</option>
                        </select>
                    </div>

                    <!-- 高亮标注 -->
                    <div>
                        <label class="input-label">高亮标注（JSON 格式）</label>
                        <textarea id="annotations" class="form-input font-mono text-xs" rows="3" placeholder='[{"type":"markLine","value":3000,"label":"目标值","color":"#C62828"}]' oninput="renderChart(false)"></textarea>
                        <span class="text-xs text-gray-400 mt-1">支持：markLine（参考线）、markPoint（关键点）</span>
                    </div>
                </div>

                <!-- 板块：数据录入 -->
                <div class="border-t border-slate-100 pt-4 flex-1 flex flex-col">
                    <label class="input-label flex justify-between">
                        <span>数据录入 (CSV/TSV)</span>
                        <span class="text-xs text-blue-500 cursor-pointer hover:underline" onclick="loadTemplate()">重置模板</span>
                    </label>
                    <textarea id="dataInput" class="form-input font-mono text-xs h-48 resize-none mb-3" spellcheck="false" placeholder="在此粘贴 Excel 数据..."></textarea>
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-sm text-slate-600">显示原始数据表</label>
                        <input type="checkbox" id="showDataTable" class="accent-[#051c2c]" onchange="renderChart(false)">
                    </div>
                    <button onclick="renderChart(true)" class="btn-primary shadow-lg shadow-blue-900/20">
                        确认并刷新图表
                    </button>
                </div>

            </div>
        </aside>

        <!-- 右侧：画布工作区 -->
        <main class="flex-1 bg-[#F4F7F9] relative overflow-auto flex items-center justify-center p-10">
            <!-- 图表卡片 -->
            <div id="chartCard" class="bg-white shadow-xl rounded-sm relative transition-all duration-300">
                <div id="chartContainer" style="width:1000px;height:600px;"></div>
                <div class="watermark">TR | Strategic Analysis Suite</div>
                <div id="loading"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#051c2c]"></div></div>
            </div>
            <!-- 隐藏的 SVG 容器 -->
            <div id="svgContainer"></div>
        </main>
    </div>

    <script>
        // --- 配置与状态 ---
        let chartInstance = null;
        let currentOption = null; // 保存当前配置，用于 SVG 导出
        let varianceGraphicItems = []; // 缓存 variance 箭头 graphic 元素
        // --- 防抖工具 ---
        function debounce(fn, delay) {
            var timer;
            return function() {
                var args = arguments, ctx = this;
                clearTimeout(timer);
                timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
            };
        }
        var debouncedRender = debounce(function() { renderChart(false); }, 100);

        // --- 颜色主题映射（单一数据源） ---
        const colorThemes = {
            mckinsey: {
                bg: '#fff', primary: '#051c2c', secondary: '#00A9E0',
                tertiary: '#7D8F9E', positive: '#2E7D32', negative: '#C62828',
                palette: ['#051c2c', '#00A9E0', '#4B5563', '#9CA3AF', '#D1D5DB', '#1F2937', '#7D8F9E']
            },
            ft: {
                bg: '#FFF1F0', primary: '#990F3D', secondary: '#27658A',
                tertiary: '#66434B', positive: '#2E7D32', negative: '#C62828',

        // --- 初始化 ---
        window.onload = function() {
            updateContainerSize();
            loadTemplate();
        };

        function updateContainerSize() {
            const w = document.getElementById('canvasWidth').value;
            const h = document.getElementById('canvasHeight').value;
            const card = document.getElementById('chartCard');
            card.style.width = w + 'px';
            card.style.height = h + 'px';
            const container = document.getElementById('chartContainer');
            if (container) {
                container.style.width = w + 'px';
                container.style.height = h + 'px';
            }
            card.querySelectorAll('.chart-footnote-area, .chart-takeaway-area, .chart-data-table-area').forEach(function(el) {
                el.style.width = w + 'px';
            });
            if(chartInstance) chartInstance.resize();
        }

        function applyStyleSchool() {
            var school = document.getElementById('styleSchool').value;
            document.getElementById('customColors').style.display = school === 'custom' ? 'block' : 'none';
            if (school === 'custom') return;
            var s = colorThemes[school];
            if (!s) return;
            if (s.primary) document.getElementById('customPrimary').value = s.primary;
            if (s.secondary) document.getElementById('customSecondary').value = s.secondary;
            if (s.positive) document.getElementById('semanticPositive').value = s.positive;
            if (s.negative) document.getElementById('semanticNegative').value = s.negative;
            if (s.tertiary) document.getElementById('semanticNeutral').value = s.tertiary;
            if (s.bg) document.getElementById('bgColor').value = s.bg;
            renderChart(false);
        }

        function loadTemplate() {
            const type = document.getElementById('chartType').value;
            document.getElementById('dataInput').value = templates[type] || "";
            renderChart(true);
        }

        // --- 数据解析 ---
        function parseData(input) {
            const lines = input.trim().split('\n');
            const delimiter = input.indexOf('\t') > -1 ? '\t' : (input.indexOf(',') > -1 ? ',' : ' ');
            
            if (document.getElementById('chartType').value === 'swot') {
                return lines; 
            }

            const headers = lines[0].split(delimiter).map(h => h.trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].split(delimiter).map(c => c.trim());
                const obj = {};
                headers.forEach((h, index) => {
                    const val = row[index];
                    obj[h] = isNaN(Number(val)) ? val : Number(val);
                });
                data.push(obj);
            }
            return { headers, data };
        }

        // --- 坐标轴应用逻辑 ---
        function applyAxisConfig(option, axisName, minId, maxId, intervalId) {
            const min = document.getElementById(minId).value;
            const max = document.getElementById(maxId).value;
            const interval = document.getElementById(intervalId).value;

            if (!option[axisName]) return;
            const axes = Array.isArray(option[axisName]) ? option[axisName] : [option[axisName]];

            axes.forEach(ax => {
                if (ax.type === 'value') {
                    if (min !== "") ax.min = parseFloat(min);
                    if (max !== "") ax.max = parseFloat(max);
                    if (interval !== "") ax.interval = parseFloat(interval);
                }
            });
        }

        // --- 图表渲染逻辑 ---
        function renderChart(showLoading = false) {
            const loading = document.getElementById('loading');
            if(showLoading) loading.style.display = 'flex';
            varianceGraphicItems = []; // 每轮渲染清空缓存

            // 主题切换 — 从 styleSchool select 读取
            const theme = document.getElementById('styleSchool').value;
            document.getElementById('customColors').style.display = theme === 'custom' ? 'block' : 'none';
            let currentColors;
            if (theme === 'custom') {
                const primary = document.getElementById('customPrimary').value;
                const secondary = document.getElementById('customSecondary').value;
                currentColors = {
                    primary: primary,
                    secondary: secondary,
                    tertiary: '#7D8F9E',
                    positive: '#2E7D32',
                    negative: '#C62828',
                    palette: [primary, secondary, '#4B5563', '#9CA3AF', '#D1D5DB', '#1F2937', '#7D8F9E']
                };
            } else {
                currentColors = { ...(colorThemes[theme] || colorThemes.mckinsey) };
            }

            // 语义色覆盖（必须在 build 函数之前）
            var semPos = document.getElementById('semanticPositive').value;
            var semNeg = document.getElementById('semanticNegative').value;
            var semNeu = document.getElementById('semanticNeutral').value;
            if (semPos) currentColors.positive = semPos;
            if (semNeg) currentColors.negative = semNeg;
            if (semNeu) currentColors.tertiary = semNeu;

            const type = document.getElementById('chartType').value;
            const title = document.getElementById('chartTitle').value;
            const titleSize = parseInt(document.getElementById('titleSize').value);
            const titleAlign = document.getElementById('titleAlign').value;
            const showLabels = document.getElementById('showLabels').checked;
            const labelSize = parseInt(document.getElementById('labelSize').value);
            const showYAxis = document.getElementById('showYAxis').checked;
            const barWidth = document.getElementById('barWidth').value + '%';
            const catGap = document.getElementById('catGap').value + '%';
            const xAxisFontSize = parseInt(document.getElementById('xAxisFontSize').value);
            const xAxisRotate = parseInt(document.getElementById('xAxisRotate').value);
            const sortOrder = document.getElementById('sortData').value;
            const legendPos = document.getElementById('legendPos').value;
            const gridStyle = document.getElementById('gridStyle').value;

            const rawInput = document.getElementById('dataInput').value;
            const parsed = parseData(rawInput);

            const dom = document.getElementById('chartContainer');
            echarts.dispose(dom);
            chartInstance = echarts.init(dom, null, { renderer: 'canvas' });

            // 定义 Grid 边距
            const gridLeft = 60;
            const gridRight = 60;
            const gridTop = 80;
            const gridBottom = 60;

            // 标题配置
            let titleOption = {
                text: title,
                top: 20,
                textStyle: {
                    fontFamily: 'Inter, "PingFang SC", sans-serif',
                    fontSize: titleSize,
                    fontWeight: 600,
                    color: currentColors.primary
                }
            };

            // 副标题
            const subtitle = document.getElementById('chartSubtitle').value;
            if (subtitle) {
                titleOption.subtext = subtitle;
                titleOption.subtextStyle = {
                    fontFamily: 'Inter, "PingFang SC", sans-serif',
                    fontSize: 12,
                    color: '#64748b'
                };
            }

            // 图例配置
            let legendOption = {
                icon: 'circle',
                itemWidth: 10,
                itemHeight: 10,
                textStyle: { color: '#666' }
            };

            // 智能布局：处理标题右对齐与图例右上的冲突
            if (titleAlign === 'right' && legendPos === 'top-right') {
                titleOption.right = gridRight;
                legendOption.top = 55;
                legendOption.right = gridRight;
                legendOption.orient = 'horizontal';
            } else {
                if (titleAlign === 'left') titleOption.left = gridLeft;
                else if (titleAlign === 'right') titleOption.right = gridRight;
                else titleOption.left = 'center';

                if (legendPos === 'top-right') {
                    legendOption.top = 25;
                    legendOption.right = gridRight;
                    legendOption.orient = 'horizontal';
                } else if (legendPos === 'top-center') {
                    legendOption.top = 50;
                    legendOption.left = 'center';
                    legendOption.orient = 'horizontal';
                } else { // bottom-center
                    legendOption.bottom = 10;
                    legendOption.left = 'center';
                    legendOption.orient = 'horizontal';
                }
            }

            // 网格线样式
            let splitLineOption = {
                show: gridStyle !== 'none',
                lineStyle: {
                    type: gridStyle === 'none' ? 'solid' : gridStyle,
                    color: '#e2e8f0'
                }
            };

            let option = {
                backgroundColor: '#fff',
                title: titleOption,
                legend: legendOption,
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', textStyle: { color: '#333' }, borderColor: '#ddd' },
                grid: { top: gridTop, bottom: gridBottom, left: gridLeft, right: gridRight, containLabel: true },
                textStyle: { fontFamily: 'Inter, "PingFang SC", sans-serif' }
            };

            try {
                if (type === 'waterfall') buildWaterfall(option, parsed, showLabels, labelSize, barWidth, currentColors);
                else if (type === 'stacked') buildStacked(option, parsed, showLabels, labelSize, barWidth, catGap, currentColors, sortOrder);
                else if (type === 'swot') buildSwot(option, parsed, currentColors);
                else if (type === 'bar') buildBar(option, parsed, showLabels, labelSize, barWidth, catGap, currentColors, sortOrder);
                else if (type === 'line') buildLine(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'pie') buildPie(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'sankey') buildSankey(option, parsed, currentColors);
                else if (type === 'radar') buildRadar(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'portfolio') buildPortfolio(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'sunburst') buildSunburst(option, parsed, currentColors);

                else if (type === 'grouped_bar') buildGroupedBar(option, parsed, showLabels, labelSize, barWidth, catGap, currentColors);
                else if (type === 'variance') buildVariance(option, parsed, showLabels, labelSize, barWidth, catGap, currentColors);
                else if (type === 'butterfly') buildButterfly(option, parsed, showLabels, labelSize, barWidth, currentColors);
                else if (type === 'area_stacked') buildAreaStacked(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'bubble_grouped') buildBubbleGrouped(option, parsed, currentColors);
                else if (type === 'scatter') buildScatter(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'treemap') buildTreemap(option, parsed, showLabels, labelSize, currentColors);

                // 新增图表
                else if (type === 'hbar_grouped') buildHBarGrouped(option, parsed, showLabels, labelSize, barWidth, catGap, currentColors);
                else if (type === 'line_bar') buildLineBar(option, parsed, showLabels, labelSize, barWidth, catGap, currentColors);

                // 新增图表类型
                else if (type === 'funnel') buildFunnel(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'tree') buildTree(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'pyramid') buildPyramid(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'quadrant') buildQuadrant(option, parsed, showLabels, labelSize, currentColors);
                else if (type === 'bullet') buildBullet(option, parsed, showLabels, labelSize, currentColors);

                // 通用坐标轴配置
                if (option.xAxis && option.xAxis.length !== undefined) {
                    option.xAxis[0].axisLabel = { ...option.xAxis[0].axisLabel, fontSize: xAxisFontSize, rotate: xAxisRotate };
                } else if (option.xAxis) {
                    option.xAxis.axisLabel = { fontSize: xAxisFontSize, rotate: xAxisRotate, interval: 0 };
                }

                // 应用网格线样式
                const isHorizontal = type.startsWith('hbar') || type === 'butterfly';
                
                if (option.yAxis && !isHorizontal) {
                    const axes = Array.isArray(option.yAxis) ? option.yAxis : [option.yAxis];
                    axes.forEach(ax => { if (ax.type === 'value') ax.splitLine = splitLineOption; });
                }
                if (option.xAxis && isHorizontal) {
                    const axes = Array.isArray(option.xAxis) ? option.xAxis : [option.xAxis];
                    axes.forEach(ax => { if (ax.type === 'value') ax.splitLine = splitLineOption; });
                }
                
                if ((type === 'scatter' || type === 'bubble_grouped' || type === 'portfolio') && option.xAxis && option.yAxis) {
                     if (option.xAxis.type === 'value') option.xAxis.splitLine = splitLineOption;
                     if (option.yAxis.type === 'value') option.yAxis.splitLine = splitLineOption;
                }

                // Y轴显示控制
                if (option.yAxis && !showYAxis) {
                    const hideObj = { show: false };
                    const axes = Array.isArray(option.yAxis) ? option.yAxis : [option.yAxis];
                    axes.forEach(ax => { ax.axisLabel = hideObj; ax.axisTick = hideObj; ax.splitLine = hideObj; });
                }

                applyAxisConfig(option, 'yAxis', 'yMin', 'yMax', 'yInterval');
                applyAxisConfig(option, 'xAxis', 'xMin', 'xMax', 'xInterval');

                // 轴标题
                var yAxisName = document.getElementById('yAxisName').value;
                var xAxisName = document.getElementById('xAxisName').value;
                if (yAxisName && option.yAxis) {
                    var axes = Array.isArray(option.yAxis) ? option.yAxis : [option.yAxis];
                    axes.forEach(function(ax) { if (ax.type === 'value') ax.name = yAxisName; });
                }
                if (xAxisName && option.xAxis) {
                    var xAxes = Array.isArray(option.xAxis) ? option.xAxis : [option.xAxis];
                    xAxes.forEach(function(ax) { if (ax.type === 'value') ax.name = xAxisName; });
                }

                // 背景色
                var bgColor = document.getElementById('bgColor').value;
                if (bgColor && bgColor !== '#FFFFFF' && bgColor !== '#fff') {
                    option.backgroundColor = bgColor;
                    var cc = document.getElementById('chartCard');
                    if (cc) cc.style.backgroundColor = bgColor;
                } else {
                    option.backgroundColor = '#fff';
                    var cc2 = document.getElementById('chartCard');
                    if (cc2) cc2.style.backgroundColor = '#fff';
                }

                // 参考线
                var refLinesStr = document.getElementById('refLines').value;
                if (refLinesStr.trim() && option.series) {
                    refLinesStr.trim().split('\n').forEach(function(line) {
                        var parts = line.split(',');
                        if (parts.length < 1 || !parts[0].trim()) return;
                        var val = parseFloat(parts[0].trim());
                        if (isNaN(val)) return;
                        var label = (parts[1] || val.toString()).trim();
                        var lineType = (parts[2] || 'dashed').trim();
                        var refColor = (parts[3] || '#64748b').trim();
                        option.series.forEach(function(s) {
                            if (s.type === 'pie' || s.type === 'radar' || s.type === 'treemap' || s.type === 'funnel' || s.type === 'gauge' || s.type === 'sunburst' || s.type === 'tree' || s.type === 'pyramid' || s.type === 'sankey') return;
                            if (!s.markLine) s.markLine = { data: [] };
                            s.markLine.data.push({
                                yAxis: val,
                                label: { formatter: label, fontSize: 11, position: 'insideEndTop' },
                                lineStyle: { color: refColor, type: lineType, width: 1.5 }
                            });
                        });
                    });
                }

                // 解析高亮标注
                const annotationsStr = document.getElementById('annotations').value;
                if (annotationsStr.trim()) {
                    try {
                        const annotations = JSON.parse(annotationsStr);
                        annotations.forEach(ann => {
                            if (!option.series || option.series.length === 0) return;

                            // 找到目标系列（默认第一个）
                            const targetSeries = ann.series !== undefined ? Math.min(ann.series, option.series.length - 1) : 0;
                            const s = option.series[targetSeries];

                            if (ann.type === 'markLine' && ann.value !== undefined) {
                                if (!s.markLine) s.markLine = { data: [] };
                                s.markLine.data.push({
                                    yAxis: ann.value,
                                    label: { formatter: ann.label || ann.value.toString(), fontSize: 11 },
                                    lineStyle: { color: ann.color || '#C62828', type: 'dashed', width: 1.5 }
                                });
                            } else if (ann.type === 'markPoint') {
                                if (!s.markPoint) s.markPoint = { data: [] };
                                s.markPoint.data.push({
                                    type: ann.position || 'max',
                                    label: { formatter: ann.label || '{c}' },
                                    itemStyle: { color: ann.color || '#C62828' }
                                });
                            }
                        });
                    } catch (e) {
                        console.error('标注解析失败:', e);
                        alert('标注 JSON 格式错误，请检查语法');
                    }
                }

                // 保存当前 Option 供 SVG 导出使用
                currentOption = option;
                // 非 variance 图表时清除 graphic 箭头
                if (type !== 'variance') {
                    chartInstance.setOption({ graphic: [] });
                }
                chartInstance.setOption(option, true);

                // ThinkCell 风格垂直箭头（variance 图表）
                if (option._varianceMeta) {
                    var vm = option._varianceMeta;
                    var graphicItems = [];
                    var categories = option.xAxis.data;
                    var barW = parseFloat(barWidth) / 100;
                    categories.forEach(function(cat, i) {
                        var row = vm.data.find(function(d) { return d[vm.catKey] === cat; });
                        if (!row) return;
                        var budVal = row[vm.budKey];
                        var actVal = row[vm.actKey];

                type: 'tree', data: roots, orient: 'LR', layout: 'orthogonal',
                symbol: 'roundRect', symbolSize: [80, 30],
                label: {
                    show: showLabels, fontSize: labelSize, position: 'inside',
                    formatter: function(p) { return p.name + (valLabel ? '\n' + p.value : ''); },
                    color: '#fff', fontWeight: 500
                },
                leaves: { label: { position: 'inside', color: '#fff' } },
                expandAndCollapse: false, animationDuration: 550, animationDurationUpdate: 750,
                lineStyle: { color: colors.tertiary, width: 1.5, curveness: 0.5 },
                itemStyle: { color: colors.primary, borderColor: colors.primary, borderRadius: 4 }
            }];
            option.tooltip = { trigger: 'item', triggerOn: 'mousemove' };
        }

        function buildPyramid(option, parsed, showLabels, labelSize, colors) {
            var nameKey = parsed.headers[0]; var valKey = parsed.headers[1];
            var total = parsed.data.reduce(function(s, d) { return s + d[valKey]; }, 0);
            option.series = [{
                type: 'funnel', left: '15%', right: '15%', top: 40, bottom: 40,
                min: 0, max: total, sort: 'descending', gap: 2,
                label: { show: showLabels, position: 'inside', fontSize: labelSize,
                    formatter: function(p) { return p.name + ': ' + p.value + ' (' + (p.value / total * 100).toFixed(1) + '%)'; }
                },
                itemStyle: { borderColor: '#fff', borderWidth: 1 },
                data: parsed.data.map(function(d, i) { return { name: d[nameKey], value: d[valKey], itemStyle: { color: colors.palette[i % colors.palette.length] } }; })
            }];
            option.tooltip = { trigger: 'item', formatter: '{b}: {c} ({d}%)' };
        }

        function buildQuadrant(option, parsed, showLabels, labelSize, colors) {
            var nameKey = parsed.headers[0]; var xKey = parsed.headers[1]; var yKey = parsed.headers[2];
            var xVals = parsed.data.map(function(d) { return d[xKey]; }); var yVals = parsed.data.map(function(d) { return d[yKey]; });
            var xMid = (Math.min.apply(null, xVals) + Math.max.apply(null, xVals)) / 2;
            var yMid = (Math.min.apply(null, yVals) + Math.max.apply(null, yVals)) / 2;
            option.xAxis = { type: 'value', name: xKey, splitLine: { show: true, lineStyle: { type: 'dashed', color: '#e2e8f0' } },
                axisLabel: { fontSize: 11 }, nameTextStyle: { fontSize: 11 } };
            option.yAxis = { type: 'value', name: yKey, splitLine: { show: true, lineStyle: { type: 'dashed', color: '#e2e8f0' } },
                axisLabel: { fontSize: 11 }, nameTextStyle: { fontSize: 11 } };
            option.series = [{
                type: 'scatter', data: parsed.data.map(function(d) { return [d[xKey], d[yKey]]; }),
                symbolSize: 16, itemStyle: { color: colors.secondary },
                label: { show: showLabels, fontSize: labelSize, formatter: function(p) { return parsed.data[p.dataIndex][nameKey]; }, position: 'top' },
                markLine: {
                    silent: true, symbol: 'none',
                    lineStyle: { color: '#94a3b8', type: 'dashed', width: 1 },
                    label: { show: false },
                    data: [{ xAxis: xMid }, { yAxis: yMid }]
                }
            }];
            option.tooltip = { trigger: 'item', formatter: function(p) { var d = parsed.data[p.dataIndex]; return d[nameKey] + '<br/>' + xKey + ': ' + d[xKey] + '<br/>' + yKey + ': ' + d[yKey]; } };
        }

        function buildBullet(option, parsed, showLabels, labelSize, colors) {
            var catKey = parsed.headers[0]; var actualKey = parsed.headers[1]; var targetKey = parsed.headers[2];
            option.xAxis = { type: 'category', data: parsed.data.map(function(d) { return d[catKey]; }) };
            option.yAxis = { type: 'value' };
            option.series = [
                { name: '实际', type: 'bar', data: parsed.data.map(function(d) { return d[actualKey]; }),
                  barWidth: '40%', itemStyle: { color: colors.primary }, z: 2,
                  label: { show: showLabels, position: 'top', fontSize: labelSize },
                  markLine: {
                      silent: true, symbol: ['none', 'arrow'], symbolSize: 6,
                      lineStyle: { color: colors.negative, type: 'solid', width: 2 },
                      label: { show: false },
                      data: parsed.data.map(function(d) { return { yAxis: d[targetKey] }; })
                  }
                },
                { name: '目标', type: 'bar', data: parsed.data.map(function(d) { return d[targetKey]; }),
                  barWidth: '60%', barGap: '-80%',
                  itemStyle: { color: '#e2e8f0', borderColor: '#94a3b8', borderType: 'dashed', borderWidth: 1 }, z: 1,
                  label: { show: false }
                }
            ];
        }

        // --- 导出逻辑 ---
        function exportChart(format) {
            if (!chartInstance) return;
            const url = chartInstance.getDataURL({ type: format, pixelRatio: format === 'png' ? 4 : 1, backgroundColor: '#fff' });
            const link = document.createElement('a'); link.download = `TR_Strategy_Chart_${new Date().getTime()}.${format}`; link.href = url; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // --- 专门的 SVG 导出逻辑 ---
        function exportSVG() {
            if (!currentOption) return;

            // 1. 获取隐藏容器
            const svgContainer = document.getElementById('svgContainer');
            const w = document.getElementById('canvasWidth').value;
            const h = document.getElementById('canvasHeight').value;
            
            // 2. 设置容器尺寸
            svgContainer.style.width = w + 'px';
            svgContainer.style.height = h + 'px';

            // 3. 初始化 SVG 模式的 ECharts 实例
            const svgChart = echarts.init(svgContainer, null, { renderer: 'svg' });
            
            // 4. 设置配置项 (关闭动画以确保渲染完成)
            const svgOption = JSON.parse(JSON.stringify(currentOption));
            svgOption.animation = false;
            svgChart.setOption(svgOption);

            // 4.5 对 variance 图表补充箭头 graphic 元素
            if (varianceGraphicItems.length > 0) {
                svgChart.setOption({ graphic: varianceGraphicItems });
            }

            // 5. 获取 SVG 字符串并下载
            setTimeout(() => {
                const svgData = svgChart.getDataURL({ type: 'svg' });
                const link = document.createElement('a');
                link.download = `TR_Strategy_Chart_${new Date().getTime()}.svg`;
                link.href = svgData;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // 清理
                svgChart.dispose();
            }, 100);
        }
    </script>

<script>
(function() {
  // --- 实际数据 ---
  var YRS = ['1880','1900','1920','1940','1950','1960','1970','1980','1990','2000','2005','2010','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
  var TMP = [-0.16,-0.08,-0.27,0.10,-0.01,0.03,0.00,0.26,0.45,0.42,0.68,0.72,0.91,1.01,0.92,0.85,0.99,1.02,0.85,0.89,1.18,1.29];
  // 索引对照: 0=1880, 1=1900, 2=1920, 3=1940, 4=1950, 5=1960, 6=1970, 7=1980, 8=1990, 9=2000, 10=2005, 11=2010, 12=2015, 13=2016, 14=2017, 15=2018, 16=2019, 17=2020, 18=2021, 19=2022, 20=2023, 21=2024

  // 生成 CSV
  var csv = '年份,温度偏差(°C)\n';
  for (var i = 0; i < YRS.length; i++) csv += YRS[i] + ',' + TMP[i] + '\n';
  csv = csv.trim();

  // 追加 load 事件，不覆盖原生 onload，避免被 loadTemplate 覆盖
  window.addEventListener('load', function() {
    // 只取容器尺寸，不执行 loadTemplate（它会把数据盖掉）
    if (typeof updateContainerSize === 'function') updateContainerSize();

    // 1. 图表类型 → 折线图
    document.getElementById('chartType').value = 'line';

    // 2. 数据
    document.getElementById('dataInput').value = csv;

    // 3. 标题
    document.getElementById('chartTitle').value = '全球升温正在加速：最后44年走完过去100年的路';
    document.getElementById('chartSubtitle').value = '1880-2024年全球平均温度偏差（相对1850-1900基准）';

    // 4. 数据来源 + 核心判断（写在数据来源下面）
    document.getElementById('dataSource').value = '数据来源：NASA/GISS ｜ 1880-2024';
    document.getElementById('chartTakeaway').value = '核心结论：2024年1.29°C距1.5°C巴黎协定目标仅剩0.21°C，全球升温仍在加速';

    // 5. 参考线：基准零线 + 巴黎协定1.5°C红线
    document.getElementById('refLines').value = '0,1850-1900基准,dashed,#999999\n1.5,巴黎协定1.5°C目标,dashed,#c25030';

    // 6. 风格：birchline 暖色调
    document.getElementById('styleSchool').value = 'custom';
    document.getElementById('customPrimary').value = '#141413';
    document.getElementById('customSecondary').value = '#D97757';
    document.getElementById('semanticNegative').value = '#c25030';

    // 7. 背景白
    document.getElementById('bgColor').value = '#FFFFFF';

    // 8. 标题居中
    document.getElementById('titleAlign').value = 'center';

    // 9. 画布
    document.getElementById('canvasWidth').value = '1000';
    document.getElementById('canvasHeight').value = '600';

    // 10. X轴
    document.getElementById('xAxisRotate').value = '45';
    document.getElementById('xAxisFontSize').value = '11';

    // 11. Y轴范围
    document.getElementById('yMin').value = '-0.3';
    document.getElementById('yMax').value = '1.5';

    // 12. Y轴名称
    document.getElementById('yAxisName').value = '温度偏差 (°C)';

    // 13. 触发渲染
    if (typeof renderChart === 'function') renderChart(true);

    // 15. 后处理：面积填充 + 标注 + X轴精简
    setTimeout(function() {
      if (typeof chartInstance === 'undefined' || !chartInstance) return;
      try {
        var opt = chartInstance.getOption();
        var s = opt.series && opt.series[0];
        if (!s) return;

        // 渐变面积填充（暖橙半透明）
        s.areaStyle = {
          color: {
            type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
            colorStops: [
              { offset: 0, color: 'rgba(217,119,87,0.30)' },
              { offset: 0.5, color: 'rgba(217,119,87,0.08)' },
              { offset: 1, color: 'rgba(217,119,87,0.02)' }
            ]
          }
        };
        s.lineStyle.width = 3;
        s.symbol = 'circle';
        s.symbolSize = 5;

        // 关键里程碑标注（2016/2023/2024）
        s.markPoint = {
          symbol: 'pin', symbolSize: 44,
          itemStyle: { color: '#c25030' },
          label: { fontSize: 10, fontWeight: 600, color: '#fff' },
          data: [
            { coord: ['2016', 1.01], name: '首次突破1°C' },
            { coord: ['2023', 1.18], name: '有记录最热年' },
            { coord: ['2024', 1.29], name: '再创新高1.29°C' }
          ]
        };

        // X轴只显示关键年份（减少拥挤）
        var showIdx = {};
        [0,1,2,3,5,6,7,8,9,10,11,12,13,17,19,20,21].forEach(function(i) { showIdx[i] = true; });
        if (opt.xAxis && opt.xAxis[0]) {
          opt.xAxis[0].axisLabel = opt.xAxis[0].axisLabel || {};
          opt.xAxis[0].axisLabel.interval = function(idx) { return !!showIdx[idx]; };
          opt.xAxis[0].axisLabel.fontSize = 11;
          opt.xAxis[0].axisLabel.rotate = 45;
        }
        // tooltip 显示年份+温度
        opt.tooltip = {
          trigger: 'axis',
          backgroundColor: 'rgba(255,255,255,0.95)',
          borderColor: '#e2e8f0',
          textStyle: { color: '#333', fontSize: 12 },
          formatter: function(params) {
            var p = params[0];
            return p.name + ' 年<br/>温度偏差：<b>' + p.value + '°C</b>';
          }
        };

        chartInstance.setOption(opt, true);
      } catch(e) { console.error(e); }
    }, 500);
  });
})();
