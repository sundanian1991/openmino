<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万历十五年 · 命运星图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060606;
  color: #a0a0a0;
  font-family: 'Noto Serif SC', Georgia, serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: auto;
}
.container {
  width: 720px;
  background: #0c0c0e;
  border-radius: 16px;
  padding: 32px;
  position: relative;
  border: 1px solid #1a1a1a;
}
.glow {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 400px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.title {
  text-align: center;
  margin-bottom: 8px;
}
.year {
  font-size: 56px;
  font-weight: 700;
  background: linear-gradient(180deg, #d4b87a, #8a7040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 8px;
  line-height: 1;
}
.subtitle {
  font-size: 12px;
  color: #555;
  letter-spacing: 4px;
  margin-top: 4px;
}
.radial-area {
  position: relative;
  height: 340px;
  margin: 24px 0;
}
.center-node {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #c9a96e;
  background: #0a0804;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.center-node .num {
  font-size: 24px;
  font-weight: 800;
  color: #d4b87a;
  letter-spacing: 3px;
}
.center-node .label {
  font-size: 9px;
  color: #5a4a20;
  letter-spacing: 2px;
}
.orbit-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid #1a1508;
}
.orbit-ring.outer { width: 280px; height: 280px; }
.orbit-ring.middle { width: 200px; height: 200px; border-style: dashed; border-color: #1e180a; }
.orbit-ring.inner { width: 130px; height: 130px; border-color: #22201a; }
.char-node {
  position: absolute;
  width: 72px;
  text-align: center;
  z-index: 3;
}
.char-node .avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid;
  margin: 0 auto 6px;
  background: #0c0c0e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
}
.char-node .name {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 2px;
}
.char-node .fate {
  font-size: 8px;
  color: #555;
}
/* Character positions */
.n1 { top: 20px; left: 50%; transform: translateX(-50%); } /* 万历 - top */
.n2 { top: 30%; left: 15%; transform: translateX(-50%); } /* 居正 - left */
.n3 { bottom: 20px; left: 50%; transform: translateX(-50%); } /* 时行 - bottom */
.n4 { top: 30%; right: 15%; transform: translateX(50%); } /* 海瑞 - right */
.n5 { top: 15%; left: 30%; transform: translateX(-50%); } /* 继光 - top-left */
.n6 { bottom: 15%; right: 30%; transform: translateX(50%); } /* 李贽 - bottom-right */

.c1 .avatar { border-color: #c4764a; color: #c4764a; }
.c1 .name { color: #c4764a; }
.c2 .avatar { border-color: #6a8a5a; color: #6a8a5a; }
.c2 .name { color: #6a8a5a; }
.c3 .avatar { border-color: #b89a5a; color: #b89a5a; }
.c3 .name { color: #b89a5a; }
.c4 .avatar { border-color: #4a8a8a; color: #4a8a8a; }
.c4 .name { color: #4a8a8a; }
.c5 .avatar { border-color: #8a6a5a; color: #8a6a5a; }
.c5 .name { color: #8a6a5a; }
.c6 .avatar { border-color: #7a6a9a; color: #7a6a9a; }
.c6 .name { color: #7a6a9a; }
.connector {
  position: absolute;
  background: #2a2010;
  transform-origin: left center;
  height: 1px;
  z-index: 1;
}
.themes {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 20px;
}
.theme-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 10px;
  padding: 14px 10px;
  text-align: center;
  position: relative;
}
.theme-card::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 2px;
  background: #c9a96e;
  opacity: 0.4;
}
.theme-card .num {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.3);
  background: rgba(201,169,110,0.1);
  color: #c9a96e;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}
.theme-card .title {
  font-size: 12px;
  font-weight: 600;
  color: #c9a96e;
  margin: 4px 0 4px;
}
.theme-card .desc {
  font-size: 9px;
  color: #555;
  line-height: 1.4;
}
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: #444;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>
  <div class="title">
    <div class="year">1587</div>
    <div class="subtitle">万历十五年 · 命运星图</div>
  </div>
  <div class="radial-area">
    <div class="orbit-ring outer"></div>
    <div class="orbit-ring middle"></div>
    <div class="orbit-ring inner"></div>
    <div class="center-node">
      <div class="num">1587</div>
      <div class="label">万历十五年</div>
    </div>
    <div class="char-node c1 n1">
      <div class="avatar">皇</div>
      <div class="name">万历皇帝</div>
      <div class="fate">28年不上朝</div>
    </div>
    <div class="char-node c2 n2">
      <div class="avatar">正</div>
      <div class="name">张居正</div>
      <div class="fate">死后抄家</div>
    </div>
    <div class="char-node c3 n3">
      <div class="avatar">申</div>
      <div class="name">申时行</div>
      <div class="fate">辞职还乡</div>
    </div>
    <div class="char-node c4 n4">
      <div class="avatar">海</div>
      <div class="name">海瑞</div>
      <div class="fate">清廉难行</div>
    </div>
    <div class="char-node c5 n5">
      <div class="avatar">戚</div>
      <div class="name">戚继光</div>
      <div class="fate">人亡政息</div>
    </div>
    <div class="char-node c6 n6">
      <div class="avatar">贽</div>
      <div class="name">李贽</div>
      <div class="fate">狱中自刎</div>
    </div>
  </div>
  <div class="themes">
    <div class="theme-card">
      <div class="num">1</div>
      <div class="title">道德代法律</div>
      <div class="desc">以四书五经仁义道德<br>替代精密法律与数字管理</div>
    </div>
    <div class="theme-card">
      <div class="num">2</div>
      <div class="title">文官僵化</div>
      <div class="desc">缺乏训练的文官垄断权力<br>不求创新只求平衡</div>
    </div>
    <div class="theme-card">
      <div class="num">3</div>
      <div class="title">财政死结</div>
      <div class="desc">税收制度混乱低效<br>缺乏精密预算体系</div>
    </div>
    <div class="theme-card">
      <div class="num">4</div>
      <div class="title">超稳定陷阱</div>
      <div class="desc">任何变革被视为秩序威胁<br>技术思想皆遭扼杀</div>
    </div>
  </div>
  <div class="footer">大明不是亡于1644，而是亡于1587 · 六个角色 · 四种困境 · 一个结构性溃败</div>
</div>
</body>
</html>
