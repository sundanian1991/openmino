<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电视机海报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5F5F0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .poster {
    width: 1280px;
    height: 720px;
    background: #FFFFFF;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  }

  /* 顶部留白区域 */
  .top-space {
    height: 80px;
    padding: 40px 80px 0;
  }

  /* 主内容区 */
  .main {
    display: flex;
    padding: 0 80px;
    height: 480px;
    align-items: center;
    gap: 60px;
  }

  /* 电视机 */
  .tv {
    flex-shrink: 0;
    width: 520px;
    position: relative;
  }
  .tv-screen {
    width: 520px;
    height: 320px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  /* 屏幕内容 - 抽象山水 */
  .tv-screen::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 45%;
    background: linear-gradient(0deg, #2d5a3f 0%, #4a8c5e 40%, transparent 100%);
    opacity: 0.7;
  }
  .tv-screen::after {
    content: '';
    position: absolute;
    top: 30px;
    left: 40px;
    right: 40px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  }
  /* 屏幕光晕 */
  .screen-glow {
    position: absolute;
    top: -20px;
    left: -20px;
    right: -20px;
    bottom: -20px;
    background: radial-gradient(ellipse at center, rgba(99, 153, 255, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  /* 电视边框 */
  .tv-frame {
    width: 520px;
    height: 320px;
    border: 3px solid #2a2a2a;
    border-radius: 12px;
    position: relative;
  }
  .tv-stand {
    width: 120px;
    height: 40px;
    background: #2a2a2a;
    margin: 0 auto;
    border-radius: 0 0 4px 4px;
    position: relative;
  }
  .tv-stand::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
  }

  /* 右侧文字 */
  .text-area {
    flex: 1;
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6399FF;
    border: 1px solid #6399FF;
    padding: 4px 12px;
    margin-bottom: 24px;
  }
  .title {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.1;
    color: #1a1a1a;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .title em {
    font-style: normal;
    color: #6399FF;
  }
  .subtitle {
    font-size: 18px;
    color: #666666;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .specs {
    display: flex;
    gap: 32px;
  }
  .spec {
    text-align: center;
  }
  .spec-num {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
  }
  .spec-label {
    font-size: 12px;
    color: #999999;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* 底部装饰线 */
  .bottom-line {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: #E8E8E3;
  }

  /* 底部品牌 */
  .footer {
    position: absolute;
    bottom: 32px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .brand-sub {
    font-size: 11px;
    color: #999999;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .cta {
    font-size: 12px;
    color: #6399FF;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* 装饰元素 - 右侧几何 */
  .deco {
    position: absolute;
    top: 0;
    right: 0;
    width: 240px;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
  }
  .deco-circle {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(99, 153, 255, 0.15);
  }
  .deco-circle-2 {
    position: absolute;
    bottom: -40px;
    right: -30px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 1px solid rgba(99, 153, 255, 0.1);
  }
  .deco-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #6399FF;
    opacity: 0.4;
  }
  .deco-dot:nth-child(3) { top: 120px; right: 60px; }
  .deco-dot:nth-child(4) { top: 200px; right: 100px; }
  .deco-dot:nth-child(5) { top: 300px; right: 40px; }
</style>
</head>
<body>
<div class="poster">
  <!-- 装饰 -->
  <div class="deco">
    <div class="deco-circle"></div>
    <div class="deco-circle-2"></div>
    <div class="deco-dot"></div>
    <div class="deco-dot"></div>
    <div class="deco-dot"></div>
  </div>

  <!-- 顶部 -->
  <div class="top-space"></div>

  <!-- 主内容 -->
  <div class="main">
    <!-- 电视机 -->
    <div class="tv">
      <div class="tv-frame">
        <div class="tv-screen">
          <div class="screen-glow"></div>
        </div>
      </div>
      <div class="tv-stand"></div>
    </div>

    <!-- 文字 -->
    <div class="text-area">
      <div class="tag">New Series</div>
      <div class="title">看见<br><em>真实</em>的色彩</div>
      <div class="subtitle">4K HDR · 量子点显示 · AI 画质引擎<br>每一帧，都值得凝视</div>
      <div class="specs">
        <div class="spec">
          <div class="spec-num">4K</div>
          <div class="spec-label">超高清</div>
        </div>
        <div class="spec">
          <div class="spec-num">120Hz</div>
          <div class="spec-label">刷新率</div>
        </div>
        <div class="spec">
          <div class="spec-num">AI</div>
          <div class="spec-label">画质引擎</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 分割线 -->
  <div class="bottom-line"></div>

  <!-- 底部 -->
  <div class="footer">
    <div>
      <div class="brand">VISION PRO</div>
      <div class="brand-sub">Quantum Dot Display</div>
    </div>
    <div class="cta">了解更多 →</div>
  </div>
</div>
</body>
</html>
