<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>56%坐席未被评级</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FFFFFF; font-family: system-ui, -apple-system, sans-serif; color: #1a1a2e; }
#chart { width: 800px; height: 380px; margin: 0 auto; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  title: {
    text: '56%坐席未被评级：194人中126人有产出但人均仅40万',
    subtext: '参评 vs 非参评坐席人数分布 | 首贷120人 复贷223人 合计343人',
    left: 'center',
    top: 12,
    textStyle: { fontSize: 16, fontWeight: 600, color: '#1a1a2e' },
    subtextStyle: { fontSize: 12, color: '#6b7280' }
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(params) {
      var total = 0;
      var html = params[0].name + '<br/>';
      for (var i = 0; i < params.length; i++) {
        total += params[i].value;
        html += params[i].marker + params[i].seriesName + ': <b>' + params[i].value + '</b><br/>';
      }
      html += '总计: <b>' + total + '</b>';
      return html;
    }
  },
  legend: {
    data: ['参评', '非参评'],
    top: 72,
    left: 'center',
    textStyle: { fontSize: 12, color: '#1a1a2e' },
    itemWidth: 16,
    itemHeight: 12
  },
  grid: { top: 100, right: 40, bottom: 50, left: 80 },
  xAxis: {
    type: 'value',
    max: 350,
    axisLabel: { fontSize: 11, color: '#6b7280' },
    splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } },
    axisTick: { show: false },
    axisLine: { show: false }
  },
  yAxis: {
    type: 'category',
    data: ['合计', '复贷', '首贷'],
    axisLabel: { fontSize: 13, color: '#1a1a2e', fontWeight: 500 },
    axisTick: { show: false },
    axisLine: { show: false }
  },
  series: [
    {
      name: '参评',
      type: 'bar',
      stack: 'total',
      barWidth: 40,
      data: [149, 93, 56],
      itemStyle: { color: '#3b82f6' },
      label: {
        show: true,
        position: 'insideLeft',
        formatter: '{c}',
        fontSize: 12,
        fontWeight: 600,
        color: '#fff',
        offset: [5, 0]
      }
    },
    {
      name: '非参评',
      type: 'bar',
      stack: 'total',
      data: [194, 130, 64],
      itemStyle: {
        color: {
          type: 'linear',
          x: 0, y: 0, x2: 1, y2: 0,
          colorStops: [
            { offset: 0, color: '#f97316' },
            { offset: 1, color: '#fb923c' }
          ]
        }
      },
      label: {
        show: true,
        position: 'insideRight',
        formatter: function(p) {
          var vals = [194, 130, 64];
          var totals = [343, 223, 120];
          var idx = ['合计', '复贷', '首贷'].indexOf(p.name);
          var pct = Math.round(vals[idx] / totals[idx] * 100);
          return p.value + ' (' + pct + '%)';
        },
        fontSize: 12,
        fontWeight: 600,
        color: '#fff',
        offset: [-5, 0]
      }
    }
  ],
  graphic: [
    {
      type: 'text',
      left: 'center',
      bottom: 8,
      style: {
        text: '注：非参评坐席中126人有GMV产出，人均40万，不足参评均值555万的1/14',
        fontSize: 11,
        fill: '#9ca3af',
        textAlign: 'center'
      }
    },
    {
      type: 'text',
      right: 10,
      bottom: 8,
      style: {
        text: '数据日期：2026年4月快照 | 来源：工作簿3-伽玛.xlsx',
        fontSize: 10,
        fill: '#b0b0b0',
        textAlign: 'right'
      }
    }
  ]
};
chart.setOption(option);
</script>
</body>
</html>
