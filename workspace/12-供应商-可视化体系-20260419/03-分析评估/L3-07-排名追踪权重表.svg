<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-07 排名追踪权重表 — 5维度</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">雷达图 + 权重卡片 | 排名不是只看GMV</text>

  <!-- Radar Chart -->
  <g transform="translate(170, 260)">
    <!-- Pentagon grid -->
    <!-- Center -->
    <circle cx="0" cy="0" r="8" fill="#857d74"/>

    <!-- Grid rings -->
    <polygon points="0,-140 133,-43 83,114 -83,114 -133,-43" fill="none" stroke="#f2f0eb" stroke-width="1"/>
    <polygon points="0,-105 100,-32 62,86 -62,86 -100,-32" fill="none" stroke="#f2f0eb" stroke-width="1"/>
    <polygon points="0,-70 67,-22 42,57 -42,57 -67,-22" fill="none" stroke="#f2f0eb" stroke-width="1"/>
    <polygon points="0,-35 33,-11 21,28 -21,28 -33,-11" fill="none" stroke="#f2f0eb" stroke-width="1"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-140" stroke="#857d74" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="133" y2="-43" stroke="#857d74" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="83" y2="114" stroke="#857d74" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-83" y2="114" stroke="#857d74" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-133" y2="-43" stroke="#857d74" stroke-width="0.5"/>

    <!-- Data polygon (example supplier) -->
    <polygon points="0,-126 113,-37 58,79 -50,68 -87,-28" fill="#faf0e6" fill-opacity="0.5" stroke="#c26d3a" stroke-width="2"/>
    <circle cx="0" cy="-126" r="4" fill="#c26d3a"/>
    <circle cx="113" cy="-37" r="4" fill="#c26d3a"/>
    <circle cx="58" cy="79" r="4" fill="#c26d3a"/>
    <circle cx="-50" cy="68" r="4" fill="#c26d3a"/>
    <circle cx="-87" cy="-28" r="4" fill="#c26d3a"/>

    <!-- Labels -->
    <text x="0" y="-155" text-anchor="middle" font-size="10" font-weight="600" fill="#6b3410">业绩达成</text>
    <text x="0" y="-143" text-anchor="middle" font-size="9" fill="#857d74">35%</text>

    <text x="155" y="-40" text-anchor="start" font-size="10" font-weight="600" fill="#3a4a30">合规</text>
    <text x="155" y="-28" text-anchor="start" font-size="9" fill="#857d74">20%</text>

    <text x="95" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#0e4070">配合度</text>
    <text x="95" y="142" text-anchor="middle" font-size="9" fill="#857d74">20%</text>

    <text x="-95" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#0f5040">组织健康</text>
    <text x="-95" y="142" text-anchor="middle" font-size="9" fill="#857d74">15%</text>

    <text x="-155" y="-40" text-anchor="end" font-size="10" font-weight="600" fill="#6a4005">成长性</text>
    <text x="-155" y="-28" text-anchor="end" font-size="9" fill="#857d74">10%</text>
  </g>

  <!-- Weight Cards -->
  <!-- Card 1: 业绩达成 35% -->
  <rect x="360" y="60" width="300" height="75" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="380" y="82" font-size="12" font-weight="600" fill="#6b3410">业绩达成</text>
  <rect x="500" y="72" width="50" height="20" rx="10" fill="#c26d3a"/>
  <text x="525" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">35%</text>
  <text x="380" y="102" font-size="10" fill="#454240">数据项：月度GMV达成率、排名稳定性</text>
  <text x="380" y="118" font-size="10" fill="#454240">数据来源：系统日度业绩自动汇总</text>

  <!-- Card 2: 合规 20% -->
  <rect x="360" y="145" width="210" height="75" rx="10" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="380" y="167" font-size="12" font-weight="600" fill="#3a4a30">合规</text>
  <rect x="460" y="157" width="50" height="20" rx="10" fill="#6f8660"/>
  <text x="485" y="171" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">20%</text>
  <text x="380" y="187" font-size="10" fill="#454240">数据项：质检合格率、合规事件数</text>
  <text x="380" y="203" font-size="10" fill="#454240">数据来源：质检团队月度报告</text>

  <!-- Card 3: 配合度 20% -->
  <rect x="360" y="230" width="210" height="75" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="380" y="252" font-size="12" font-weight="600" fill="#0e4070">配合度</text>
  <rect x="460" y="242" width="50" height="20" rx="10" fill="#3a7ab8"/>
  <text x="485" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">20%</text>
  <text x="380" y="272" font-size="10" fill="#454240">数据项：预警响应率、整改按期率</text>
  <text x="380" y="288" font-size="10" fill="#454240">数据来源：年老师记录+供应商反馈</text>

  <!-- Card 4: 组织健康 15% -->
  <rect x="360" y="315" width="175" height="75" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="380" y="337" font-size="12" font-weight="600" fill="#0f5040">组织健康</text>
  <rect x="465" y="327" width="50" height="20" rx="10" fill="#2e8b6e"/>
  <text x="490" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">15%</text>
  <text x="380" y="357" font-size="10" fill="#454240">数据项：流失率、出勤率</text>
  <text x="380" y="373" font-size="10" fill="#454240">数据来源：供应商周报人力表</text>

  <!-- Card 5: 成长性 10% -->
  <rect x="360" y="400" width="150" height="75" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="380" y="422" font-size="12" font-weight="600" fill="#6a4005">成长性</text>
  <rect x="455" y="412" width="50" height="20" rx="10" fill="#b88018"/>
  <text x="480" y="426" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">10%</text>
  <text x="380" y="442" font-size="10" fill="#454240">数据项：环比改善趋势</text>
  <text x="380" y="458" font-size="10" fill="#454240">数据来源：月度排名变化</text>

  <!-- Bottom note -->
  <rect x="20" y="490" width="640" height="25" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="340" y="508" text-anchor="middle" font-size="10" font-weight="600" fill="#6b3410">权重越大卡片越宽（容量逻辑） | 排名 = 多维综合，不是只看GMV</text>

  <!-- Footer -->
  <text x="340" y="518" text-anchor="middle" font-size="9" fill="#857d74">L3-07 排名追踪5维度权重表 | 业绩35% + 合规20% + 配合度20% + 组织健康15% + 成长性10%</text>
</svg>