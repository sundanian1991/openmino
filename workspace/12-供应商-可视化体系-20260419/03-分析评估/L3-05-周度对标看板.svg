<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-05 周度对标看板 — 4个核心对比</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">每周一打开 | 横向对比 | 发现谁在掉队</text>

  <!-- Card 1: 周度GMV排名 -->
  <rect x="20" y="60" width="310" height="125" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="40" y="82" font-size="12" font-weight="600" fill="#6b3410">周度GMV排名</text>
  <text x="40" y="102" font-size="10" fill="#6b3410" font-weight="600">看什么</text>
  <text x="40" y="118" font-size="11" fill="#454240">本周每家供应商GMV排名</text>
  <text x="40" y="138" font-size="10" fill="#6b3410" font-weight="600">怎么判断</text>
  <text x="40" y="154" font-size="11" fill="#454240">周排名比月排名差很多 = 加速恶化</text>
  <text x="40" y="172" font-size="10" fill="#6b3410" font-weight="600">对应动作</text>
  <text x="40" y="188" font-size="11" fill="#454240">可能需要提前介入，不等月底</text>

  <!-- Card 2: 周度产能达成率 (larger) -->
  <rect x="350" y="60" width="310" height="200" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="370" y="82" font-size="12" font-weight="600" fill="#0f5040">周度产能达成率（核心）</text>
  <text x="370" y="102" font-size="10" fill="#0f5040" font-weight="600">看什么</text>
  <text x="370" y="118" font-size="11" fill="#454240">本周GMV / (月度目标÷4)</text>
  <text x="370" y="138" font-size="10" fill="#0f5040" font-weight="600">怎么判断</text>
  <rect x="370" y="144" width="65" height="16" rx="8" fill="#e6f5f0"/>
  <text x="402" y="156" text-anchor="middle" font-size="9" fill="#0f5040">&gt;75%正常</text>
  <rect x="440" y="144" width="65" height="16" rx="8" fill="#faeae5"/>
  <text x="472" y="156" text-anchor="middle" font-size="9" fill="#6b2010">&lt;75%落后</text>
  <text x="370" y="174" font-size="10" fill="#0f5040" font-weight="600">对应动作</text>
  <text x="370" y="190" font-size="11" fill="#454240">了解本周异常原因</text>
  <text x="370" y="208" font-size="11" fill="#454240">连续2周&lt;75% = 现在就该介入</text>
  <!-- mini table -->
  <text x="370" y="235" font-size="9" fill="#857d74">示例：赛维斯75% | 汇讯69% | 华啸57%</text>

  <!-- Card 3: 周度转化率对比 -->
  <rect x="20" y="200" width="310" height="125" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="40" y="222" font-size="12" font-weight="600" fill="#0e4070">周度转化率对比</text>
  <text x="40" y="242" font-size="10" fill="#0e4070" font-weight="600">看什么</text>
  <text x="40" y="258" font-size="11" fill="#454240">每家供应商转化率横向排列</text>
  <text x="40" y="278" font-size="10" fill="#0e4070" font-weight="600">怎么判断</text>
  <text x="40" y="294" font-size="11" fill="#454240">显著低于平均 = 名单质量或能力问题</text>
  <text x="40" y="312" font-size="10" fill="#0e4070" font-weight="600">对应动作</text>
  <text x="40" y="328" font-size="11" fill="#454240">共性问题(名单) → 反馈策略组</text>

  <!-- Card 4: 周度出勤对比 -->
  <rect x="350" y="275" width="310" height="125" rx="10" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
  <text x="370" y="297" font-size="12" font-weight="600" fill="#454240">周度出勤对比</text>
  <text x="370" y="317" font-size="10" fill="#454240" font-weight="600">看什么</text>
  <text x="370" y="333" font-size="11" fill="#454240">每家供应商本周出勤率排列</text>
  <text x="370" y="353" font-size="10" fill="#454240" font-weight="600">怎么判断</text>
  <text x="370" y="369" font-size="11" fill="#454240">出勤率最低的2-3家 = 人力风险</text>
  <text x="370" y="387" font-size="10" fill="#454240" font-weight="600">对应动作</text>
  <text x="370" y="403" font-size="11" fill="#454240">了解原因，确认是否短期因素</text>

  <!-- Bottom: key signals -->
  <rect x="20" y="420" width="640" height="120" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="340" y="445" text-anchor="middle" font-size="12" font-weight="600" fill="#6b2010">三大突变信号（需要立即关注）</text>
  <line x1="40" y1="455" x2="640" y2="455" stroke="#c25030" stroke-width="0.5"/>

  <!-- Signal 1 -->
  <rect x="40" y="465" width="185" height="65" rx="8" fill="#faeae5"/>
  <text x="132" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">出勤异常</text>
  <text x="132" y="502" text-anchor="middle" font-size="10" fill="#454240">出勤率 &lt; 85%</text>
  <text x="132" y="518" text-anchor="middle" font-size="10" fill="#454240">人力不稳定</text>

  <!-- Signal 2 -->
  <rect x="245" y="465" width="185" height="65" rx="8" fill="#faeae5"/>
  <text x="337" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">业绩断崖</text>
  <text x="337" y="502" text-anchor="middle" font-size="10" fill="#454240">比均值降 &gt; 20%</text>
  <text x="337" y="518" text-anchor="middle" font-size="10" fill="#454240">产出严重异常</text>

  <!-- Signal 3 -->
  <rect x="450" y="465" width="185" height="65" rx="8" fill="#faeae5"/>
  <text x="542" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">流失加速</text>
  <text x="542" y="502" text-anchor="middle" font-size="10" fill="#454240">月度离职率 &gt; 5%</text>
  <text x="542" y="518" text-anchor="middle" font-size="10" fill="#454240">团队在流失</text>

  <!-- Bottom note -->
  <rect x="20" y="555" width="640" height="40" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
  <text x="340" y="572" text-anchor="middle" font-size="10" fill="#3a4a30">周度对标只关注突变信号，不需要做深度诊断。深度诊断留给月度全景看板和单体看板。</text>
  <text x="340" y="588" text-anchor="middle" font-size="10" fill="#3a4a30">不需要做的事：不追细节、不看趋势、不做约谈（除非连续2周异常）。</text>

  <!-- Footer -->
  <text x="340" y="615" text-anchor="middle" font-size="9" fill="#857d74">L3-05 周度对标看板 | 4个核心对比 | 横向对比发现掉队</text>
</svg>