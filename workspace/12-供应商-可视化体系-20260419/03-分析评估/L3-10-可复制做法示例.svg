<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-10 可复制做法示例</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">不是泛泛的"加强管理"，而是具体的、可量化的、可复制的做法</text>

  <!-- Card 1: 晨会目标拆解 -->
  <rect x="15" y="60" width="150" height="160" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="90" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#6b3410">晨会目标拆解</text>
  <!-- 做法 -->
  <text x="30" y="102" font-size="9" font-weight="600" fill="#6b3410">做法</text>
  <text x="30" y="118" font-size="10" fill="#454240">每天10点15分钟晨会</text>
  <text x="30" y="134" font-size="10" fill="#454240">当日目标拆解到人</text>
  <!-- 量化效果 -->
  <text x="30" y="154" font-size="9" font-weight="600" fill="#6b3410">量化效果</text>
  <text x="30" y="174" font-size="14" font-weight="600" fill="#c26d3a">+3pp</text>
  <text x="75" y="174" font-size="10" fill="#454240">转化率高于产线平均</text>
  <!-- 可复制性 -->
  <rect x="30" y="182" width="120" height="22" rx="6" fill="#e6f5f0"/>
  <text x="90" y="197" text-anchor="middle" font-size="9" fill="#0f5040">可复制性：高（仅需晨会）</text>

  <!-- Card 2: 复贷分组 -->
  <rect x="180" y="60" width="150" height="160" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="255" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#0f5040">复贷分组拨打</text>
  <!-- 做法 -->
  <text x="195" y="102" font-size="9" font-weight="600" fill="#0f5040">做法</text>
  <text x="195" y="118" font-size="10" fill="#454240">复贷客户单独分组</text>
  <text x="195" y="134" font-size="10" fill="#454240">专人专组拨打</text>
  <!-- 量化效果 -->
  <text x="195" y="154" font-size="9" font-weight="600" fill="#0f5040">量化效果</text>
  <text x="195" y="174" font-size="14" font-weight="600" fill="#c26d3a">+8pp</text>
  <text x="240" y="174" font-size="10" fill="#454240">复贷转化率高于混组</text>
  <!-- 可复制性 -->
  <rect x="195" y="182" width="120" height="22" rx="6" fill="#e6f5f0"/>
  <text x="255" y="197" text-anchor="middle" font-size="9" fill="#0f5040">可复制性：高（需分组调整）</text>

  <!-- Card 3: 新人7天听录音 -->
  <rect x="345" y="60" width="150" height="160" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="420" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#0e4070">新人7天听录音</text>
  <!-- 做法 -->
  <text x="360" y="102" font-size="9" font-weight="600" fill="#0e4070">做法</text>
  <text x="360" y="118" font-size="10" fill="#454240">新人前7天只听录音</text>
  <text x="360" y="134" font-size="10" fill="#454240">第8天上岗，不直接打</text>
  <!-- 量化效果 -->
  <text x="360" y="154" font-size="9" font-weight="600" fill="#0e4070">量化效果</text>
  <text x="360" y="174" font-size="14" font-weight="600" fill="#c26d3a">+5pp</text>
  <text x="405" y="174" font-size="10" fill="#454240">首周转化率高于直接上岗</text>
  <!-- 可复制性 -->
  <rect x="360" y="182" width="120" height="22" rx="6" fill="#e8f1fa"/>
  <text x="420" y="197" text-anchor="middle" font-size="9" fill="#0e4070">可复制性：中（需7天缓冲期）</text>

  <!-- Card 4: 每日TOP3分享 -->
  <rect x="510" y="60" width="150" height="160" rx="10" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="585" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4a30">每日TOP3分享</text>
  <!-- 做法 -->
  <text x="525" y="102" font-size="9" font-weight="600" fill="#3a4a30">做法</text>
  <text x="525" y="118" font-size="10" fill="#454240">每日TOP3坐席分享</text>
  <text x="525" y="134" font-size="10" fill="#454240">当日最佳话术/技巧</text>
  <!-- 量化效果 -->
  <text x="525" y="154" font-size="9" font-weight="600" fill="#3a4a30">量化效果</text>
  <text x="525" y="174" font-size="14" font-weight="600" fill="#c26d3a">+2pp</text>
  <text x="570" y="174" font-size="10" fill="#454240">产线整体转化率提升</text>
  <!-- 可复制性 -->
  <rect x="525" y="182" width="120" height="22" rx="6" fill="#f0f2ec"/>
  <text x="585" y="197" text-anchor="middle" font-size="9" fill="#3a4a30">可复制性：极高（零成本）</text>

  <!-- Bottom: Extraction conditions -->
  <text x="340" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#454240">提取做法三条件</text>

  <rect x="40" y="265" width="180" height="60" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="130" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#6b3410">具体的</text>
  <text x="130" y="308" text-anchor="middle" font-size="10" fill="#454240">不是"加强管理"</text>
  <text x="130" y="324" text-anchor="middle" font-size="10" fill="#454240">而是"每天10点15分钟晨会"</text>

  <rect x="250" y="265" width="180" height="60" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="340" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#0f5040">可量化的</text>
  <text x="340" y="308" text-anchor="middle" font-size="10" fill="#454240">不是"效果很好"</text>
  <text x="340" y="324" text-anchor="middle" font-size="10" fill="#454240">而是"转化率高3个百分点"</text>

  <rect x="460" y="265" width="180" height="60" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
  <text x="550" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#0e4070">可复制的</text>
  <text x="550" y="308" text-anchor="middle" font-size="10" fill="#454240">不是"我们团队特殊"</text>
  <text x="550" y="324" text-anchor="middle" font-size="10" fill="#454240">而是"任何同规模团队可用"</text>

  <!-- Comparison example -->
  <rect x="40" y="350" width="600" height="60" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="340" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">对比：不可复制的 vs 可复制的</text>
  <text x="60" y="395" font-size="10" fill="#6b2010">不可复制："加强团队管理"、"提高转化率"、"优化人力结构"</text>
  <text x="60" y="412" font-size="10" fill="#0f5040">可复制："每天10点晨会目标拆解到人"、"复贷客户单独分组拨打"</text>

  <!-- Summary -->
  <rect x="40" y="425" width="600" height="35" rx="8" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="340" y="440" text-anchor="middle" font-size="10" fill="#454240">从标杆供应商的具体数据中提取可复制的做法，不是泛泛的管理口号</text>
  <text x="340" y="456" text-anchor="middle" font-size="10" fill="#454240">配对后每月跟踪头部差距是否缩小 — 差距缩小 = 配对有效，否则重新配对</text>

  <!-- Footer -->
  <text x="340" y="478" text-anchor="middle" font-size="9" fill="#857d74">L3-10 可复制做法示例 | 四张卡片 | 具体的、可量化的、可复制的</text>
</svg>