<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-09 标杆分享配对 — 5步骤</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">精准配对，不是让所有供应商互相学习</text>

  <!-- Step 1: 选标杆 -->
  <rect x="10" y="65" width="120" height="110" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="70" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0f5040">Step 1</text>
  <text x="70" y="108" text-anchor="middle" font-size="11" fill="#0f5040" font-weight="600">选标杆</text>
  <rect x="25" y="118" width="90" height="22" rx="6" fill="#e6f5f0"/>
  <text x="70" y="133" text-anchor="middle" font-size="9" fill="#0f5040">连续2月前2</text>
  <rect x="25" y="144" width="90" height="22" rx="6" fill="#e6f5f0"/>
  <text x="70" y="159" text-anchor="middle" font-size="9" fill="#0f5040">人均GMV最高</text>

  <!-- Dashed line constraint between Step 1 and 2 -->
  <line x1="130" y1="120" x2="155" y2="120" stroke="#c26d3a" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="125" y="100" width="40" height="16" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="145" y="112" text-anchor="middle" font-size="8" fill="#6b3410">同产线</text>

  <!-- Step 2: 找对标 -->
  <rect x="155" y="65" width="120" height="110" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="215" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0e4070">Step 2</text>
  <text x="215" y="108" text-anchor="middle" font-size="11" fill="#0e4070" font-weight="600">找对标</text>
  <rect x="170" y="118" width="90" height="22" rx="6" fill="#e8f1fa"/>
  <text x="215" y="133" text-anchor="middle" font-size="9" fill="#0e4070">同产线有空间</text>
  <rect x="170" y="144" width="90" height="22" rx="6" fill="#e8f1fa"/>
  <text x="215" y="159" text-anchor="middle" font-size="9" fill="#0e4070">峰值比&lt;70%</text>

  <!-- Arrow 2->3 -->
  <line x1="275" y1="120" x2="300" y2="120" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3: 配对条件 -->
  <rect x="300" y="65" width="120" height="110" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="360" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#6a4005">Step 3</text>
  <text x="360" y="108" text-anchor="middle" font-size="11" fill="#6a4005" font-weight="600">配对条件</text>
  <rect x="315" y="118" width="90" height="22" rx="6" fill="#faf0dc"/>
  <text x="360" y="133" text-anchor="middle" font-size="9" fill="#6a4005">规模差距&lt;30%</text>
  <rect x="315" y="144" width="90" height="22" rx="6" fill="#faf0dc"/>
  <text x="360" y="159" text-anchor="middle" font-size="9" fill="#6a4005">避免"没法学"</text>

  <!-- Arrow 3->4 -->
  <line x1="420" y1="120" x2="445" y2="120" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4: 提取做法 -->
  <rect x="445" y="65" width="120" height="110" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="505" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#6b3410">Step 4</text>
  <text x="505" y="108" text-anchor="middle" font-size="11" fill="#6b3410" font-weight="600">提取做法</text>
  <rect x="460" y="118" width="90" height="22" rx="6" fill="#faf0e6"/>
  <text x="505" y="133" text-anchor="middle" font-size="9" fill="#6b3410">具体的做法</text>
  <rect x="460" y="144" width="90" height="22" rx="6" fill="#faf0e6"/>
  <text x="505" y="159" text-anchor="middle" font-size="9" fill="#6b3410">可量化的</text>

  <!-- Arrow 4->5 -->
  <line x1="565" y1="120" x2="590" y2="120" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5: 跟踪差距 -->
  <rect x="590" y="65" width="80" height="110" rx="10" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="630" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#3a4a30">Step 5</text>
  <text x="630" y="108" text-anchor="middle" font-size="11" fill="#3a4a30" font-weight="600">跟踪差距</text>
  <text x="630" y="130" text-anchor="middle" font-size="10" fill="#454240">月度看</text>
  <text x="630" y="146" text-anchor="middle" font-size="10" fill="#454240">头部差距</text>
  <text x="630" y="162" text-anchor="middle" font-size="10" fill="#454240">是否缩小</text>

  <!-- Pairing Table -->
  <text x="340" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#454240">配对跟踪表示例</text>

  <!-- Table header -->
  <rect x="20" y="220" width="640" height="26" rx="4" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="100" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">标杆</text>
  <text x="220" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">对标供应商</text>
  <text x="350" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">产线</text>
  <text x="440" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">标杆人均(万)</text>
  <text x="540" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">对标人均(万)</text>
  <text x="620" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#454240">差距</text>

  <!-- Row 1 -->
  <rect x="20" y="246" width="640" height="22" fill="#ffffff"/>
  <text x="100" y="261" text-anchor="middle" font-size="10" fill="#0f5040">毅航</text>
  <text x="220" y="261" text-anchor="middle" font-size="10" fill="#0e4070">伽玛</text>
  <text x="350" y="261" text-anchor="middle" font-size="10" fill="#454240">金条</text>
  <text x="440" y="261" text-anchor="middle" font-size="10" fill="#454240">42</text>
  <text x="540" y="261" text-anchor="middle" font-size="10" fill="#454240">28</text>
  <text x="620" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#6a4005">-33%</text>

  <!-- Row 2 -->
  <rect x="20" y="268" width="640" height="22" fill="#f9f9f9"/>
  <text x="100" y="283" text-anchor="middle" font-size="10" fill="#0f5040">毛毛虫</text>
  <text x="220" y="283" text-anchor="middle" font-size="10" fill="#0e4070">赛维斯</text>
  <text x="350" y="283" text-anchor="middle" font-size="10" fill="#454240">金条</text>
  <text x="440" y="283" text-anchor="middle" font-size="10" fill="#454240">38</text>
  <text x="540" y="283" text-anchor="middle" font-size="10" fill="#454240">26</text>
  <text x="620" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#6a4005">-32%</text>

  <!-- Row 3 -->
  <rect x="20" y="290" width="640" height="22" fill="#ffffff"/>
  <text x="100" y="305" text-anchor="middle" font-size="10" fill="#0f5040">伽玛</text>
  <text x="220" y="305" text-anchor="middle" font-size="10" fill="#0e4070">翰锐</text>
  <text x="350" y="305" text-anchor="middle" font-size="10" fill="#454240">企金</text>
  <text x="440" y="305" text-anchor="middle" font-size="10" fill="#454240">35</text>
  <text x="540" y="305" text-anchor="middle" font-size="10" fill="#454240">22</text>
  <text x="620" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#6a4005">-37%</text>

  <!-- Bottom: pairing rules -->
  <rect x="20" y="330" width="640" height="120" rx="10" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="340" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#6b3410">配对规则</text>
  <line x1="40" y1="362" x2="640" y2="362" stroke="#c26d3a" stroke-width="0.5"/>

  <text x="40" y="382" font-size="10" fill="#454240">1. 同产线配对 — 不同产线的做法不具可比性（金条和信用卡的客群、话术、转化节奏完全不同）</text>
  <text x="40" y="402" font-size="10" fill="#454240">2. 规模差距&lt;30% — "他有200人我只有50人"的团队没法直接对标，管理动作会被规模稀释</text>
  <text x="40" y="422" font-size="10" fill="#454240">3. 对标方必须有提升空间 — 自身峰值比&lt;70%的供应商才是合适的对标对象</text>
  <text x="40" y="442" font-size="10" fill="#454240">4. 跟踪差距缩小 = 配对有效 — 下个月看头部差距是否缩小，否则重新配对</text>

  <!-- Key note -->
  <rect x="20" y="470" width="640" height="35" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="340" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#0f5040">核心：不是让所有供应商互相学习，而是在产线相近、规模相近之间做精准配对</text>
  <text x="340" y="500" text-anchor="middle" font-size="10" fill="#0f5040">提取做法三条件：具体的、可量化的、可复制的</text>

  <!-- Footer -->
  <text x="340" y="555" text-anchor="middle" font-size="9" fill="#857d74">L3-09 标杆分享配对 | 五步法 | 同产线 + 规模相近 + 精准配对</text>
</svg>