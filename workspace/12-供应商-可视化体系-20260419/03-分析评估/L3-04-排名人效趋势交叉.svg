<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#454240">L3-04 排名 × 人效趋势交叉分析</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#857d74">月度专属 | 排名变化 × 熟手人均GMV趋势 = 四种类型</text>

  <!-- Axis -->
  <line x1="100" y1="450" x2="100" y2="80" stroke="#454240" stroke-width="1.5"/>
  <line x1="100" y1="450" x2="600" y2="450" stroke="#454240" stroke-width="1.5"/>
  <line x1="350" y1="80" x2="350" y2="450" stroke="#857d74" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="265" x2="600" y2="265" stroke="#857d74" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Axis labels -->
  <text x="85" y="265" text-anchor="middle" font-size="11" font-weight="600" fill="#454240" transform="rotate(-90,85,265)">人均GMV趋势</text>
  <text x="350" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#454240">排名变化</text>
  <text x="95" y="85" text-anchor="end" font-size="9" fill="#857d74">上升</text>
  <text x="95" y="445" text-anchor="end" font-size="9" fill="#857d74">下降</text>
  <text x="160" y="445" font-size="9" fill="#857d74">上升</text>
  <text x="530" y="445" font-size="9" fill="#857d74">下降</text>

  <!-- Q1: Top-Left (真进步) 排名升 + 人均升 -->
  <rect x="102" y="82" width="246" height="181" rx="4" fill="#e6f5f0" opacity="0.7"/>
  <rect x="150" y="120" width="160" height="90" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="230" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#0f5040">真进步</text>
  <text x="230" y="165" text-anchor="middle" font-size="10" fill="#0f5040">排名上升 + 人效上升</text>
  <text x="230" y="185" text-anchor="middle" font-size="10" fill="#0f5040">排名和效率都在变好</text>
  <text x="230" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#0f5040">动作：表扬，确认可持续</text>

  <!-- Q2: Top-Right (隐性退步) 排名降 + 人均升 -->
  <!-- Wait, re-check: X=排名变化(升/降), Y=人均趋势(升/降) -->
  <!-- Left=升, Right=降 for X; Top=升, Bottom=降 for Y -->
  <!-- So Top-Right: 排名降 + 人均升 = 隐性进步 -->
  <rect x="352" y="82" width="246" height="181" rx="4" fill="#e8f1fa" opacity="0.7"/>
  <rect x="400" y="120" width="160" height="90" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="480" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#0e4070">隐性进步</text>
  <text x="480" y="165" text-anchor="middle" font-size="10" fill="#0e4070">排名下降 + 人效上升</text>
  <text x="480" y="185" text-anchor="middle" font-size="10" fill="#0e4070">人效在升但排名降了</text>
  <text x="480" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#0e4070">动作：评估是否数据量不够</text>

  <!-- Q3: Bottom-Left (隐性退步) 排名升 + 人均降 -->
  <rect x="102" y="267" width="246" height="181" rx="4" fill="#faf0dc" opacity="0.7"/>
  <rect x="150" y="300" width="160" height="100" rx="10" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="230" y="325" text-anchor="middle" font-size="13" font-weight="600" fill="#6a4005">隐性退步 ⚠ 最危险</text>
  <text x="230" y="345" text-anchor="middle" font-size="10" fill="#6a4005">排名上升 + 人效下降</text>
  <text x="230" y="365" text-anchor="middle" font-size="10" fill="#6a4005">排名升了但人效在降</text>
  <text x="230" y="380" text-anchor="middle" font-size="10" fill="#6a4005">可能靠加人撑排名</text>
  <text x="230" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#6a4005">动作：警惕，不可持续</text>

  <!-- Q4: Bottom-Right (真退步) 排名降 + 人均降 -->
  <rect x="352" y="267" width="246" height="181" rx="4" fill="#faeae5" opacity="0.7"/>
  <rect x="400" y="300" width="160" height="100" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="480" y="325" text-anchor="middle" font-size="13" font-weight="600" fill="#6b2010">真退步</text>
  <text x="480" y="345" text-anchor="middle" font-size="10" fill="#6b2010">排名下降 + 人效下降</text>
  <text x="480" y="365" text-anchor="middle" font-size="10" fill="#6b2010">排名和效率都在恶化</text>
  <text x="480" y="385" text-anchor="middle" font-size="10" fill="#6b2010">全面下滑，根因复杂</text>
  <text x="480" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#6b2010">动作：约谈，定位根因</text>

  <!-- Bottom annotation -->
  <rect x="100" y="495" width="500" height="50" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="120" y="515" font-size="10" font-weight="600" fill="#6a4005">关键洞察：</text>
  <text x="120" y="533" font-size="10" fill="#6a4005">"隐性退步"最危险 — 靠加人撑排名，人效下降迟早反映到排名上</text>
  <text x="120" y="550" font-size="10" fill="#0e4070">"隐性进步"最值得你关注 — 人效在升但排名降了，可能是你给的数据量不够</text>

  <!-- Footer -->
  <text x="340" y="580" text-anchor="middle" font-size="9" fill="#857d74">L3-04 排名×人效趋势交叉 | 四种类型 | 只看排名不够，必须交叉验证</text>
</svg>