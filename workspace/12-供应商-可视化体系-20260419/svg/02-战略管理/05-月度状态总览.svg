<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-u" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 9 L5 1 L9 9" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-d2" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1 L5 9 L9 1" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="440" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">月度状态总览</text>
  <text x="40" y="46" font-size="11" fill="#6b6b6a">全局健康度 — 本月供应商整体态势</text>

  <!-- 3 Summary Cards -->
  <!-- P0: 需行动 -->
  <rect x="40" y="64" width="190" height="80" fill="#d4845a" fill-opacity="0.15" stroke="#d4845a" stroke-width="1.5" rx="10"/>
  <text x="135" y="88" text-anchor="middle" font-size="10" fill="#6b6b6a">需行动 (P0)</text>
  <text x="135" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#d4845a">2</text>
  <text x="135" y="134" text-anchor="middle" font-size="9" fill="#6b6b6a">家</text>

  <!-- P1: 维持观察 -->
  <rect x="245" y="64" width="190" height="80" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1.5" rx="10"/>
  <text x="340" y="88" text-anchor="middle" font-size="10" fill="#6b6b6a">维持观察 (P1)</text>
  <text x="340" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#1a1a1a">5</text>
  <text x="340" y="134" text-anchor="middle" font-size="9" fill="#6b6b6a">家</text>

  <!-- P2: 健康 -->
  <rect x="450" y="64" width="190" height="80" fill="#8f9b7f" fill-opacity="0.08" stroke="#8f9b7f" stroke-width="1.5" rx="10"/>
  <text x="545" y="88" text-anchor="middle" font-size="10" fill="#6b6b6a">健康 (P2)</text>
  <text x="545" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#8f9b7f">6</text>
  <text x="545" y="134" text-anchor="middle" font-size="9" fill="#6b6b6a">家</text>

  <!-- Trend indicator -->
  <rect x="40" y="158" width="600" height="40" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="60" y="183" font-size="11" font-weight="600" fill="#1a1a1a">趋势（vs 上月）</text>

  <!-- Trend items -->
  <text x="230" y="183" text-anchor="middle" font-size="13" fill="#d4845a">↑1</text>
  <text x="260" y="183" font-size="10" fill="#6b6b6a">家需行动</text>

  <text x="370" y="183" text-anchor="middle" font-size="13" fill="#1a1a1a">—</text>
  <text x="390" y="183" font-size="10" fill="#6b6b6a">家维持观察</text>

  <text x="490" y="183" text-anchor="middle" font-size="13" fill="#8f9b7f">↓2</text>
  <text x="520" y="183" font-size="10" fill="#6b6b6a">家转健康</text>

  <!-- Health bar -->
  <rect x="40" y="214" width="600" height="24" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="12"/>
  <rect x="41" y="215" width="80" height="22" fill="#d4845a" fill-opacity="0.7" rx="12"/>
  <rect x="41" y="215" width="290" height="22" fill="#f5f4f1" rx="0"/>
  <rect x="121" y="215" width="210" height="22" fill="#d4d1c7" fill-opacity="0.5" rx="0"/>
  <rect x="331" y="215" width="308" height="22" fill="#8f9b7f" fill-opacity="0.7" rx="0 12 12 0"/>

  <text x="81" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#faf9f7">P0 15%</text>
  <text x="226" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1a1a">P1 38%</text>
  <text x="485" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#faf9f7">P2 47%</text>

  <!-- Supplier dots -->
  <text x="40" y="268" font-size="12" font-weight="600" fill="#1a1a1a">供应商分布</text>

  <!-- Row 1: P0 suppliers -->
  <circle cx="60" cy="300" r="14" fill="#d4845a" fill-opacity="0.7"/>
  <text x="60" y="304" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">华啸</text>

  <circle cx="100" cy="300" r="14" fill="#d4845a" fill-opacity="0.7"/>
  <text x="100" y="304" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">阅文</text>

  <!-- Row 2: P1 suppliers -->
  <circle cx="60" cy="334" r="14" fill="#d4d1c7"/>
  <text x="60" y="338" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1a1a">伽玛</text>

  <circle cx="100" cy="334" r="14" fill="#d4d1c7"/>
  <text x="100" y="338" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1a1a">赛维斯</text>

  <circle cx="140" cy="334" r="14" fill="#d4d1c7"/>
  <text x="140" y="338" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1a1a">翰锐</text>

  <circle cx="180" cy="334" r="14" fill="#d4d1c7"/>
  <text x="180" y="338" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1a1a">岐力</text>

  <circle cx="220" cy="334" r="14" fill="#d4d1c7"/>
  <text x="220" y="338" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1a1a">待定5</text>

  <!-- Row 3: P2 suppliers -->
  <circle cx="60" cy="368" r="14" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="60" y="372" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">毅航</text>

  <circle cx="100" cy="368" r="14" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="100" y="372" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">毛毛虫</text>

  <circle cx="140" cy="368" r="14" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="140" y="372" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">广达</text>

  <circle cx="180" cy="368" r="14" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="180" y="372" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">待定4</text>

  <circle cx="220" cy="368" r="14" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="220" y="372" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">待定3</text>

  <circle cx="260" cy="368" r="14" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="260" y="372" text-anchor="middle" font-size="8" font-weight="600" fill="#faf9f7">待定2</text>

  <!-- Legend -->
  <rect x="340" y="286" width="290" height="96" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="356" y="306" font-size="10" font-weight="600" fill="#1a1a1a">图例</text>

  <circle cx="370" cy="324" r="8" fill="#d4845a" fill-opacity="0.7"/>
  <text x="388" y="328" font-size="9" fill="#1a1a1a">需行动 (P0) — 本月需立即处理</text>

  <circle cx="370" cy="344" r="8" fill="#d4d1c7"/>
  <text x="388" y="348" font-size="9" fill="#1a1a1a">维持观察 (P1) — 数据波动，持续关注</text>

  <circle cx="370" cy="364" r="8" fill="#8f9b7f" fill-opacity="0.7"/>
  <text x="388" y="368" font-size="9" fill="#1a1a1a">健康 (P2) — 表现稳定，符合预期</text>

  <!-- Footer -->
  <text x="340" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6b6b6a">基于月度 FCI + 排名自动分类</text>
</svg>
