<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M1 1 L5 9 L9 1" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-curve" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">供应商管理四大战略维度</text>
  <text x="40" y="46" font-size="11" fill="#6b6b6a">战略选择 → 供应商培育 → 动态调整 → 合规风控</text>

  <!-- Card 1: 战略选择 -->
  <rect x="40" y="64" width="600" height="90" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5" rx="10"/>
  <circle cx="62" cy="88" r="16" fill="#c98a6a" opacity="0.15"/>
  <text x="62" y="93" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c98a6a">01</text>
  <text x="90" y="88" font-size="14" font-weight="600" fill="#1a1a1a">战略选择</text>
  <text x="90" y="106" font-size="11" fill="#6b6b6a">头部集中 / 分散布局</text>
  <text x="90" y="134" font-size="11" fill="#1a1a1a">当前：头部集中度 55% ✓</text>

  <line x1="340" y1="154" x2="340" y2="184" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Card 2: 供应商培育 -->
  <rect x="40" y="188" width="600" height="90" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5" rx="10"/>
  <circle cx="62" cy="212" r="16" fill="#c98a6a" opacity="0.15"/>
  <text x="62" y="217" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c98a6a">02</text>
  <text x="90" y="212" font-size="14" font-weight="600" fill="#1a1a1a">供应商培育</text>
  <text x="90" y="230" font-size="11" fill="#6b6b6a">新人成长 / 能力提升</text>
  <text x="90" y="258" font-size="11" fill="#1a1a1a">当前：新增 2 家进入爬坡期</text>

  <line x1="340" y1="278" x2="340" y2="308" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Card 3: 动态调整 -->
  <rect x="40" y="312" width="600" height="90" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5" rx="10"/>
  <circle cx="62" cy="336" r="16" fill="#c98a6a" opacity="0.15"/>
  <text x="62" y="341" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c98a6a">03</text>
  <text x="90" y="336" font-size="14" font-weight="600" fill="#1a1a1a">动态调整</text>
  <text x="90" y="354" font-size="11" fill="#6b6b6a">进退清退 / 份额调整</text>
  <text x="90" y="382" font-size="11" fill="#1a1a1a">当前：无清退 / 份额调整 → 正常</text>

  <line x1="340" y1="402" x2="340" y2="432" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Card 4: 合规风控 -->
  <rect x="40" y="436" width="600" height="70" fill="#f5f4f1" stroke="#1a1a1a" stroke-width="1.5" rx="10"/>
  <circle cx="62" cy="458" r="16" fill="#c98a6a" opacity="0.15"/>
  <text x="62" y="463" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c98a6a">04</text>
  <text x="90" y="458" font-size="14" font-weight="600" fill="#1a1a1a">合规风控</text>
  <text x="90" y="476" font-size="11" fill="#6b6b6a">底线管理 / 风险预警</text>
  <text x="90" y="494" font-size="11" fill="#1a1a1a">当前：华啸预警，已处理 → 已解决</text>

  <!-- Circular return arrow (right side, bottom → top) -->
  <path d="M650 471 L660 471 Q670 471 670 461 L670 91 Q670 81 660 81 L650 81" fill="none" stroke="#c98a6a" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-curve)"/>
  <text x="662" y="280" text-anchor="middle" font-size="9" fill="#c98a6a" transform="rotate(-90, 662, 280)">闭环迭代</text>
</svg>
