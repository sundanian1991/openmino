<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">份额调整规则与流程</text>
  <text x="40" y="46" font-size="11" fill="#6b6b6a">基于表现 × 产能的动态优化</text>

  <!-- Decision Matrix 2x2 -->
  <rect x="40" y="64" width="600" height="210" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="12"/>

  <!-- Axes labels -->
  <text x="340" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1a1a">表现优秀 ↑</text>
  <text x="340" y="270" text-anchor="middle" font-size="10" fill="#6b6b6a">表现下滑 ↓</text>
  <text x="50" y="180" font-size="10" fill="#6b6b6a">产能不足</text>
  <text x="628" y="180" text-anchor="end" font-size="10" fill="#6b6b6a">产能充足</text>

  <!-- Vertical divider -->
  <line x1="340" y1="92" x2="340" y2="260" stroke="#d4d1c7" stroke-width="1"/>
  <!-- Horizontal divider -->
  <line x1="52" y1="176" x2="628" y2="176" stroke="#d4d1c7" stroke-width="1"/>

  <!-- Top-left: 表现↑ + 产能不足 → 维持观察 -->
  <rect x="52" y="92" width="288" height="84" fill="#f5f4f1" rx="6"/>
  <text x="196" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">维持观察</text>
  <text x="196" y="138" text-anchor="middle" font-size="9" fill="#6b6b6a">表现好但产能跟不上</text>
  <text x="196" y="154" text-anchor="middle" font-size="9" fill="#6b6b6a">帮助提升产能，暂不调份额</text>
  <text x="196" y="168" text-anchor="middle" font-size="9" fill="#857d74">→ 观察期 1-2 月</text>

  <!-- Top-right: 表现↑ + 产能充足 → 份额↑ -->
  <rect x="340" y="92" width="288" height="84" fill="#8f9b7f" fill-opacity="0.1" rx="6"/>
  <text x="484" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#4a6040">份额 ↑ (+3%)</text>
  <text x="484" y="138" text-anchor="middle" font-size="9" fill="#6b6b6a">表现优秀 产能充足</text>
  <text x="484" y="154" text-anchor="middle" font-size="9" fill="#6b6b6a">给予更多业务量</text>
  <text x="484" y="168" text-anchor="middle" font-size="9" fill="#4a6040">→ 优先增量分配</text>

  <!-- Bottom-left: 表现↓ + 产能不足 → 份额↓ -->
  <rect x="52" y="176" width="288" height="84" fill="#d4845a" fill-opacity="0.08" rx="6"/>
  <text x="196" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#d4845a">份额 ↓ (-2%)</text>
  <text x="196" y="222" text-anchor="middle" font-size="9" fill="#6b6b6a">表现下滑 产能不足</text>
  <text x="196" y="238" text-anchor="middle" font-size="9" fill="#6b6b6a">缩减份额，发出整改通知</text>
  <text x="196" y="252" text-anchor="middle" font-size="9" fill="#d4845a">→ 整改期 1-3 月</text>

  <!-- Bottom-right: 表现↓ + 产能充足 → 预警关注 -->
  <rect x="340" y="176" width="288" height="84" fill="#f5f4f1" rx="6"/>
  <text x="484" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">预警关注</text>
  <text x="484" y="222" text-anchor="middle" font-size="9" fill="#6b6b6a">产能充足但表现下滑</text>
  <text x="484" y="238" text-anchor="middle" font-size="9" fill="#6b6b6a">排查原因，重点关注</text>
  <text x="484" y="252" text-anchor="middle" font-size="9" fill="#6b6b6a">→ 专项沟通 + 跟踪</text>

  <!-- 6-step flow header -->
  <text x="40" y="308" font-size="13" font-weight="600" fill="#1a1a1a">调整流程</text>

  <!-- Step 1 -->
  <rect x="40" y="322" width="82" height="50" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="81" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1a1a">01</text>
  <text x="81" y="358" text-anchor="middle" font-size="9" fill="#1a1a1a">评估表现</text>
  <line x1="122" y1="347" x2="138" y2="347" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-r)"/>

  <!-- Step 2 -->
  <rect x="138" y="322" width="82" height="50" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="179" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1a1a">02</text>
  <text x="179" y="358" text-anchor="middle" font-size="9" fill="#1a1a1a">评估产能</text>
  <line x1="220" y1="347" x2="236" y2="347" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-r)"/>

  <!-- Step 3 -->
  <rect x="236" y="322" width="82" height="50" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="277" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1a1a">03</text>
  <text x="277" y="358" text-anchor="middle" font-size="9" fill="#1a1a1a">决策矩阵</text>
  <line x1="318" y1="347" x2="334" y2="347" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-r)"/>

  <!-- Step 4 -->
  <rect x="334" y="322" width="82" height="50" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="375" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1a1a">04</text>
  <text x="375" y="358" text-anchor="middle" font-size="9" fill="#1a1a1a">内部审批</text>
  <line x1="416" y1="347" x2="432" y2="347" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-r)"/>

  <!-- Step 5 -->
  <rect x="432" y="322" width="90" height="50" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="477" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1a1a">05</text>
  <text x="477" y="358" text-anchor="middle" font-size="9" fill="#1a1a1a">通知供应商</text>
  <line x1="522" y1="347" x2="538" y2="347" stroke="#c98a6a" stroke-width="1.2" marker-end="url(#arrow-r)"/>

  <!-- Step 6 -->
  <rect x="538" y="322" width="102" height="50" fill="#c98a6a" fill-opacity="0.1" stroke="#c98a6a" stroke-width="1.5" rx="8"/>
  <text x="589" y="342" text-anchor="middle" font-size="9" font-weight="600" fill="#c98a6a">06</text>
  <text x="589" y="358" text-anchor="middle" font-size="9" fill="#c98a6a">执行调整</text>

  <!-- Detail cards below steps -->
  <rect x="40" y="390" width="290" height="100" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="56" y="412" font-size="10" font-weight="600" fill="#1a1a1a">份额调整原则</text>
  <text x="56" y="430" font-size="9" fill="#6b6b6a">· 单次调整幅度不超过 ±5%</text>
  <text x="56" y="446" font-size="9" fill="#6b6b6a">· 连续 2 月同一方向才调整</text>
  <text x="56" y="462" font-size="9" fill="#6b6b6a">· 调整后 1 个月内跟踪效果</text>
  <text x="56" y="478" font-size="9" fill="#6b6b6a">· 重大调整需军哥审批</text>

  <rect x="340" y="390" width="300" height="100" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" rx="8"/>
  <text x="356" y="412" font-size="10" font-weight="600" fill="#1a1a1a">关键注意事项</text>
  <text x="356" y="430" font-size="9" fill="#6b6b6a">· 调整前确保有数据支撑（FCI+排名）</text>
  <text x="356" y="446" font-size="9" fill="#6b6b6a">· 与供应商充分沟通，避免误读</text>
  <text x="356" y="462" font-size="9" fill="#6b6b6a">· 记录调整原因和预期效果</text>
  <text x="356" y="478" font-size="9" fill="#6b6b6a">· 设置明确整改时间节点</text>

  <!-- Footer -->
  <text x="340" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#6b6b6a">份额调整需基于客观数据，禁止主观判断</text>
</svg>
