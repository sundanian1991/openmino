<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 490" width="100%">
  <rect width="680" height="490" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">异常模式识别</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b66">3种典型异常模式 — 快速匹配无需从头分析</text>

  <!-- Pattern 1: 阶梯式下滑 -->
  <rect x="40" y="62" width="600" height="116" rx="12" fill="none" stroke="#d4845a" stroke-width="1.5"/>
  <!-- Sparkline -->
  <path d="M55,76 L125,76 L130,96 L195,96 L200,116 L265,116 L270,136 L335,136" fill="none" stroke="#d4845a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="55" cy="76" r="3" fill="#d4845a"/>
  <circle cx="130" cy="96" r="3" fill="#d4845a"/>
  <circle cx="200" cy="116" r="3" fill="#d4845a"/>
  <circle cx="270" cy="136" r="3" fill="#d4845a"/>
  <circle cx="335" cy="136" r="3" fill="#d4845a"/>
  <text x="370" y="84" font-family="system-ui" font-size="12" font-weight="600" fill="#d4845a">阶梯式下滑</text>
  <text x="370" y="100" font-family="system-ui" font-size="10" fill="#1a1a1a">原因: 结构性问题（管理/人力）</text>
  <text x="370" y="116" font-family="system-ui" font-size="10" fill="#1a1a1a">应对: 深度约谈+整改计划+资源支持</text>
  <text x="370" y="132" font-family="system-ui" font-size="10" fill="#1a1a1a">周期: 3-6个月</text>
  <text x="370" y="148" font-family="system-ui" font-size="9" fill="#8a8580">特征: 每阶段稳定后再次下滑</text>

  <!-- Pattern 2: 波动型震荡 -->
  <rect x="40" y="190" width="600" height="116" rx="12" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Sparkline -->
  <path d="M55,120 Q85,95 115,110 Q145,125 175,105 Q205,85 235,108 Q265,130 295,102 Q325,74 335,100" fill="none" stroke="#c98a6a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="55" cy="120" r="3" fill="#c98a6a"/>
  <circle cx="115" cy="110" r="3" fill="#c98a6a"/>
  <circle cx="175" cy="105" r="3" fill="#c98a6a"/>
  <circle cx="235" cy="108" r="3" fill="#c98a6a"/>
  <circle cx="295" cy="102" r="3" fill="#c98a6a"/>
  <circle cx="335" cy="100" r="3" fill="#c98a6a"/>
  <text x="370" y="212" font-family="system-ui" font-size="12" font-weight="600" fill="#c98a6a">波动型震荡</text>
  <text x="370" y="228" font-family="system-ui" font-size="10" fill="#1a1a1a">原因: 临时因素（季节性/项目周期）</text>
  <text x="370" y="244" font-family="system-ui" font-size="10" fill="#1a1a1a">应对: 观察，确认震荡区间</text>
  <text x="370" y="260" font-family="system-ui" font-size="10" fill="#1a1a1a">周期: 1-2个月</text>
  <text x="370" y="276" font-family="system-ui" font-size="9" fill="#8a8580">特征: 指标上下波动，无明显趋势</text>

  <!-- Pattern 3: 断崖式下跌 -->
  <rect x="40" y="318" width="600" height="116" rx="12" fill="none" stroke="#d4845a" stroke-width="2"/>
  <!-- Sparkline -->
  <path d="M55,332 L200,332 L210,410 L335,410" fill="none" stroke="#d4845a" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="55" cy="332" r="3.5" fill="#d4845a"/>
  <circle cx="200" cy="332" r="3.5" fill="#d4845a"/>
  <circle cx="210" cy="410" r="4" fill="#d4845a"/>
  <circle cx="335" cy="410" r="3.5" fill="#d4845a"/>
  <text x="370" y="340" font-family="system-ui" font-size="12" font-weight="600" fill="#d4845a">断崖式下跌</text>
  <text x="370" y="356" font-family="system-ui" font-size="10" fill="#1a1a1a">原因: 突发事件（关键人离职/合同纠纷）</text>
  <text x="370" y="372" font-family="system-ui" font-size="10" fill="#1a1a1a">应对: 紧急介入+危机处理流程</text>
  <text x="370" y="388" font-family="system-ui" font-size="10" fill="#1a1a1a">周期: 立即响应</text>
  <text x="370" y="404" font-family="system-ui" font-size="9" fill="#8a8580">特征: 指标骤降，无缓冲期</text>

</svg>