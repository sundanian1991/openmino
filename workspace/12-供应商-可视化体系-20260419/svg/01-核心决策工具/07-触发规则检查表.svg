<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440">
  <rect width="680" height="440" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">月度触发规则检查</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">自动筛选异常供应商</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="350" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Rule 1: 峰值比 < 70% - triggered -->
  <rect x="55" y="72" width="570" height="50" rx="8" fill="#d4845a" fill-opacity="0.20" stroke="#d4845a" stroke-width="1"/>
  <text x="72" y="92" font-family="system-ui" font-size="14" fill="#d4845a">☑</text>
  <text x="96" y="92" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">峰值比 &lt; 70%</text>
  <text x="96" y="108" font-family="system-ui" font-size="9.5" fill="#6b6b6b">自身产能峰值 / 历史最高产能 &lt; 70%</text>
  <rect x="400" y="80" width="100" height="30" rx="6" fill="#d4845a" fill-opacity="0.30" stroke="#d4845a" stroke-width="0.5"/>
  <text x="450" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#d4845a">华啸、岐力</text>

  <!-- Rule 2: 排名下降 ≥3位 - triggered -->
  <rect x="55" y="130" width="570" height="50" rx="8" fill="#d4845a" fill-opacity="0.15" stroke="#d4845a" stroke-width="0.5"/>
  <text x="72" y="150" font-family="system-ui" font-size="14" fill="#d4845a">☑</text>
  <text x="96" y="150" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">排名下降 ≥ 3位</text>
  <text x="96" y="166" font-family="system-ui" font-size="9.5" fill="#6b6b6b">本月排名较上月下降3位及以上</text>
  <rect x="400" y="138" width="80" height="30" rx="6" fill="#d4845a" fill-opacity="0.30" stroke="#d4845a" stroke-width="0.5"/>
  <text x="440" y="158" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#d4845a">翰锐</text>

  <!-- Rule 3: FCI < 80% - not triggered -->
  <rect x="55" y="188" width="570" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="72" y="208" font-family="system-ui" font-size="14" fill="#6b6b6b">☐</text>
  <text x="96" y="208" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">FCI &lt; 80%</text>
  <text x="96" y="224" font-family="system-ui" font-size="9.5" fill="#6b6b6b">财务综合指标低于预警线</text>
  <rect x="400" y="196" width="60" height="30" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="430" y="216" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">无</text>

  <!-- Rule 4: 连续2月Bottom3 - not triggered -->
  <rect x="55" y="246" width="570" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="72" y="266" font-family="system-ui" font-size="14" fill="#6b6b6b">☐</text>
  <text x="96" y="266" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">连续2月 Bottom 3</text>
  <text x="96" y="282" font-family="system-ui" font-size="9.5" fill="#6b6b6b">连续两个月排名处于末三位</text>
  <rect x="400" y="254" width="60" height="30" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="430" y="274" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">无</text>

  <!-- Manual check section (dashed container) -->
  <rect x="55" y="306" width="570" height="85" rx="8" fill="#faf9f7" stroke="#e8e4dc" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="70" y="326" font-family="system-ui" font-size="10" font-weight="500" fill="#6b6b6b">人工检查项</text>

  <rect x="70" y="334" width="250" height="28" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="82" y="353" font-family="system-ui" font-size="10" fill="#1a1a1a">☐ 人效隐性退步（人效↓ 排名→）</text>

  <rect x="330" y="334" width="280" height="28" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="342" y="353" font-family="system-ui" font-size="10" fill="#1a1a1a">☐ 新供应商达标检查（首期≥80%）</text>

  <!-- Summary badge -->
  <rect x="180" y="400" width="160" height="32" rx="8" fill="#d4845a" fill-opacity="0.12" stroke="#d4845a" stroke-width="1"/>
  <text x="260" y="421" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#d4845a">需行动数：2个</text>

  <!-- Legend -->
  <rect x="370" y="406" width="10" height="10" rx="2" fill="#d4845a" fill-opacity="0.15"/>
  <text x="386" y="416" font-family="system-ui" font-size="9" fill="#6b6b6b">已触发</text>
  <rect x="450" y="406" width="10" height="10" rx="2" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="466" y="416" font-family="system-ui" font-size="9" fill="#6b6b6b">未触发</text>
</svg>
