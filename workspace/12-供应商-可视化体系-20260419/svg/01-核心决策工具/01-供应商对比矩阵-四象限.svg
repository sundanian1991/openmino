<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680">
  <rect width="680" height="680" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">供应商对比矩阵</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">自身峰值比 × 头部差距 — 四象限分类</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="590" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="340" y="76" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">头部差距 小 →</text>
  <text x="340" y="640" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">头部差距 大 →</text>

  <!-- Y-axis labels -->
  <text x="56" y="90" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">高</text>
  <text x="56" y="618" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">低</text>

  <!-- X axis line -->
  <line x1="70" y1="345" x2="610" y2="345" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arr)"/>
  <!-- Y axis line -->
  <line x1="340" y1="620" x2="340" y2="80" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Gridlines -->
  <line x1="70" y1="90" x2="70" y2="620" stroke="#e8e4dc" stroke-width="0.5"/>
  <line x1="610" y1="90" x2="610" y2="620" stroke="#e8e4dc" stroke-width="0.5"/>
  <line x1="70" y1="90" x2="610" y2="90" stroke="#e8e4dc" stroke-width="0.5"/>
  <line x1="70" y1="620" x2="610" y2="620" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Quadrant backgrounds -->
  <!-- P0 问题型 (top-left) -->
  <rect x="71" y="91" width="268" height="253" fill="#d4845a" fill-opacity="0.10" rx="0"/>
  <!-- P1 标杆型 (top-right) -->
  <rect x="341" y="91" width="268" height="253" fill="#8f9b7f" fill-opacity="0.08" rx="0"/>
  <!-- 潜力型 (bottom-left) -->
  <rect x="71" y="346" width="268" height="273" fill="#f5f4f1" rx="0"/>
  <!-- 波动型 (bottom-right) -->
  <rect x="341" y="346" width="268" height="273" fill="#f5f4f1" rx="0"/>

  <!-- Quadrant titles -->
  <text x="205" y="112" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#d4845a">问题型</text>
  <text x="475" y="112" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#8f9b7f">标杆型</text>
  <text x="205" y="636" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">潜力型</text>
  <text x="475" y="636" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b6b6b">波动型</text>

  <!-- Sample suppliers -->
  <!-- 华啸 - 问题型 (large, r=36) -->
  <circle cx="170" cy="200" r="36" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1.5"/>
  <text x="170" y="196" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">华啸</text>
  <text x="170" y="210" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">问题型</text>

  <!-- 毅航 - 标杆型 (large, r=36) -->
  <circle cx="510" cy="195" r="36" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
  <text x="510" y="191" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">毅航</text>
  <text x="510" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">标杆型</text>

  <!-- 广达 - 潜力型 (medium, r=30) -->
  <circle cx="185" cy="475" r="30" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="185" y="472" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">广达</text>
  <text x="185" y="486" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">潜力型</text>

  <!-- 赛维斯 - 波动型 (medium, r=30) -->
  <circle cx="495" cy="485" r="30" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="495" y="482" text-anchor="middle" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">赛维斯</text>
  <text x="495" y="496" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">波动型</text>

  <!-- Legend -->
  <text x="340" y="668" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">圆面积 = 供应商产能规模（大 / 中 / 小）</text>
</svg>
