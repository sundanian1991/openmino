<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <rect width="680" height="480" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">周度产能达成率对比</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">上月 vs 本月 — 每周达标跟踪</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="355" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Y-axis labels and gridlines -->
  <!-- 125% y=90, 100% y=140, 75% y=190, 50% y=240, 25% y=290, 0% y=340 -->
  <line x1="80" y1="90" x2="610" y2="90" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="75" y="94" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">125%</text>

  <line x1="80" y1="140" x2="610" y2="140" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="75" y="144" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">100%</text>

  <line x1="80" y1="190" x2="610" y2="190" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="75" y="194" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">75%</text>

  <line x1="80" y1="240" x2="610" y2="240" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="75" y="244" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">50%</text>

  <line x1="80" y1="290" x2="610" y2="290" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="75" y="294" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">25%</text>

  <line x1="80" y1="340" x2="610" y2="340" stroke="#e8e4dc" stroke-width="0.5"/>
  <text x="75" y="344" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">0%</text>

  <!-- 100% target line -->
  <line x1="80" y1="140" x2="610" y2="140" stroke="#6b6b6a" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="615" y="144" font-family="system-ui" font-size="8" fill="#6b6b6b">目标线</text>

  <!-- Bars: width=35px, gap between pairs=40px -->
  <!-- 上月 W1: 85% (below target, orange), 上月 W2: 92%, 上月 W3: 78%, 上月 W4: 95% -->
  <!-- 本月 W1: 98%, 本月 W2: 105%, 本月 W3: 88%, 本月 W4: 110% -->
  <!-- Bar pair spacing: each pair at x=105, 195, 285, 375; bars within pair at x and x+40 -->

  <!-- 上月 W1: 85% → bar height = 85/125 * 250 = 170, y = 340 - 170 = 170 -->
  <rect x="105" y="170" width="35" height="170" rx="3" fill="#d4845a"/>
  <text x="122" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">85%</text>

  <!-- 上月 W2: 92% → height = 184, y = 156 -->
  <rect x="145" y="156" width="35" height="184" rx="3" fill="#d4845a"/>
  <text x="162" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">92%</text>

  <!-- 上月 W3: 78% → height = 156, y = 184 -->
  <rect x="195" y="184" width="35" height="156" rx="3" fill="#d4845a"/>
  <text x="212" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">78%</text>

  <!-- 上月 W4: 95% → height = 190, y = 150 -->
  <rect x="235" y="150" width="35" height="190" rx="3" fill="#d4845a"/>
  <text x="252" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">95%</text>

  <!-- 本月 W1: 98% → height = 196, y = 144 -->
  <rect x="315" y="144" width="35" height="196" rx="3" fill="#d4845a"/>
  <text x="332" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">98%</text>

  <!-- 本月 W2: 105% → height = 210, y = 130 -->
  <rect x="355" y="130" width="35" height="210" rx="3" fill="#8f9b7f"/>
  <text x="372" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">105%</text>

  <!-- 本月 W3: 88% → height = 176, y = 164 -->
  <rect x="405" y="164" width="35" height="176" rx="3" fill="#d4845a"/>
  <text x="422" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">88%</text>

  <!-- 本月 W4: 110% → height = 220, y = 120 -->
  <rect x="445" y="120" width="35" height="220" rx="3" fill="#8f9b7f"/>
  <text x="462" y="356" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">110%</text>

  <!-- Month labels -->
  <text x="175" y="374" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">上月</text>
  <text x="405" y="374" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">本月</text>

  <!-- Week labels for 上月 -->
  <text x="122" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W1</text>
  <text x="162" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W2</text>
  <text x="212" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W3</text>
  <text x="252" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W4</text>

  <!-- Week labels for 本月 -->
  <text x="332" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W1</text>
  <text x="372" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W2</text>
  <text x="422" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W3</text>
  <text x="462" y="388" text-anchor="middle" font-family="system-ui" font-size="8.5" fill="#8a8580">W4</text>

  <!-- Separator between months -->
  <line x1="290" y1="88" x2="290" y2="340" stroke="#e8e4dc" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Legend -->
  <rect x="130" y="410" width="10" height="10" rx="2" fill="#8f9b7f"/>
  <text x="146" y="420" font-family="system-ui" font-size="10" fill="#1a1a1a">达标（≥100%）</text>

  <rect x="260" y="410" width="10" height="10" rx="2" fill="#d4845a"/>
  <text x="276" y="420" font-family="system-ui" font-size="10" fill="#1a1a1a">未达标（&lt;100%）</text>

  <line x1="410" y1="415" x2="430" y2="415" stroke="#6b6b6a" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="436" y="420" font-family="system-ui" font-size="10" fill="#1a1a1a">目标线</text>

  <!-- Footer -->
  <text x="340" y="468" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">本月达标率 50%（2/4），较上月 0% 有明显改善</text>
</svg>
