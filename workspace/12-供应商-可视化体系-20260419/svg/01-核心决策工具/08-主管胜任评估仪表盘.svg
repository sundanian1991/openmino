<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <rect width="680" height="480" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">主管胜任度评估</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">4维度评估供应商管理能力</text>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="390" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Gauge / dial: center 340,180 radius 80 -->
  <!-- Background arc (semi-circle from left to right) -->
  <path d="M 260 180 A 80 80 0 0 1 420 180" fill="none" stroke="#e8e4dc" stroke-width="12"/>
  <!-- Filled arc: 85% of semi-circle (180 * 0.85 = 153 degrees from left) -->
  <!-- Start from left (260,180), go 153 degrees along the arc -->
  <path d="M 260 180 A 80 80 0 0 1 413 188" fill="none" stroke="#c98a6a" stroke-width="12"/>

  <!-- Gauge center dot -->
  <circle cx="340" cy="180" r="6" fill="#1a1a1a"/>

  <!-- Needle line pointing to 85% position -->
  <!-- 85% from left means angle = 180° - 153° = 27° from top-right direction -->
  <!-- Actually: left=0%, right=100%. 85% is at angle = π - (0.85 * π) = 0.15π = 27° from right -->
  <!-- Needle from center to 85% position on arc -->
  <!-- 85% position: angle from center = 180° - 0.85*180° = 27° above horizontal-right -->
  <!-- x = 340 + 65*cos(27°) = 340 + 57.9 = 397.9 -->
  <!-- y = 180 - 65*sin(27°) = 180 - 29.5 = 150.5 -->
  <line x1="340" y1="180" x2="398" y2="151" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Score label -->
  <text x="340" y="196" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="700" fill="#1a1a1a">85%</text>

  <!-- 优秀 badge -->
  <rect x="310" y="204" width="60" height="22" rx="11" fill="#8f9b7f"/>
  <text x="340" y="220" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#faf9f7">优秀</text>

  <!-- Scale labels -->
  <text x="258" y="200" text-anchor="end" font-family="system-ui" font-size="9" fill="#6b6b6b">0%</text>
  <text x="422" y="200" font-family="system-ui" font-size="9" fill="#6b6b6b">100%</text>

  <!-- 4 progress bars -->
  <!-- Bar area starts at y=250 -->
  <text x="55" y="266" font-family="system-ui" font-size="10" font-weight="500" fill="#1a1a1a">4维度明细</text>

  <!-- Bar 1: 管理半径 90% (olive green) -->
  <text x="55" y="296" font-family="system-ui" font-size="10" fill="#1a1a1a">管理半径</text>
  <rect x="140" y="284" width="480" height="16" rx="8" fill="#f5f4f1"/>
  <rect x="140" y="284" width="432" height="16" rx="8" fill="#8f9b7f"/>
  <text x="635" y="296" text-anchor="end" font-family="system-ui" font-size="11" font-weight="700" fill="#8f9b7f">90%</text>

  <!-- Bar 2: 梯队健康 82% (terracotta) -->
  <text x="55" y="332" font-family="system-ui" font-size="10" fill="#1a1a1a">梯队健康</text>
  <rect x="140" y="320" width="480" height="16" rx="8" fill="#f5f4f1"/>
  <rect x="140" y="320" width="394" height="16" rx="8" fill="#c98a6a"/>
  <text x="635" y="332" text-anchor="end" font-family="system-ui" font-size="11" font-weight="700" fill="#c98a6a">82%</text>

  <!-- Bar 3: 新人培养 78% (burnt orange - warning) -->
  <text x="55" y="368" font-family="system-ui" font-size="10" fill="#1a1a1a">新人培养</text>
  <rect x="140" y="356" width="480" height="16" rx="8" fill="#f5f4f1"/>
  <rect x="140" y="356" width="374" height="16" rx="8" fill="#d4845a"/>
  <text x="635" y="368" text-anchor="end" font-family="system-ui" font-size="11" font-weight="700" fill="#d4845a">78%</text>
  <!-- Warning indicator -->
  <rect x="640" y="359" width="8" height="10" rx="2" fill="#d4845a"/>
  <text x="644" y="367" text-anchor="middle" font-family="system-ui" font-size="7" font-weight="700" fill="#faf9f7">!</text>

  <!-- Bar 4: 流失率控制 88% (olive green) -->
  <text x="55" y="404" font-family="system-ui" font-size="10" fill="#1a1a1a">流失率控制</text>
  <rect x="140" y="392" width="480" height="16" rx="8" fill="#f5f4f1"/>
  <rect x="140" y="392" width="422" height="16" rx="8" fill="#8f9b7f"/>
  <text x="635" y="404" text-anchor="end" font-family="system-ui" font-size="11" font-weight="700" fill="#8f9b7f">88%</text>

  <!-- Footer -->
  <text x="340" y="468" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">新人培养为薄弱环节，需加强培训体系与导师机制</text>
</svg>
