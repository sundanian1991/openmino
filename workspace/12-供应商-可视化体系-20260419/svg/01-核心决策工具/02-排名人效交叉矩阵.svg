<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <rect width="680" height="520" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">排名 × 人效交叉分析</text>
  <text x="40" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b6b6b">发现隐性退步与隐性进步</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Container -->
  <rect x="40" y="58" width="600" height="430" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="340" y="76" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#6b6b6b">人效 → 升</text>

  <!-- Y-axis vertical label -->
  <text x="56" y="340" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="500" fill="#6b6b6b" transform="rotate(-90,56,340)">排名 → 升</text>

  <!-- X axis -->
  <line x1="70" y1="340" x2="610" y2="340" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arr)"/>
  <!-- Y axis -->
  <line x1="340" y1="455" x2="340" y2="88" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Quadrant backgrounds -->
  <!-- Top-left: 显性退步 -->
  <rect x="71" y="89" width="268" height="250" fill="#faf9f7" rx="0"/>
  <!-- Top-right: 隐性退步 (WARNING) -->
  <rect x="341" y="89" width="268" height="250" fill="#d4845a" fill-opacity="0.08" rx="0" stroke="#d4845a" stroke-width="2"/>
  <!-- Bottom-left: 隐性进步 -->
  <rect x="71" y="341" width="268" height="113" fill="#faf9f7" rx="0"/>
  <!-- Bottom-right: 显性进步 -->
  <rect x="341" y="341" width="268" height="113" fill="#8f9b7f" fill-opacity="0.08" rx="0"/>

  <!-- Quadrant titles -->
  <text x="205" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">显性退步</text>
  <text x="205" y="126" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">人效↓ 排名↓</text>

  <!-- 隐性退步 with warning badge -->
  <text x="475" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#d4845a">隐性退步</text>
  <!-- Warning badge -->
  <rect x="415" y="94" width="8" height="14" rx="2" fill="#d4845a"/>
  <text x="419" y="105" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#faf9f7">!</text>
  <text x="475" y="126" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">人效↓ 排名→</text>

  <text x="205" y="360" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">隐性进步</text>
  <text x="205" y="376" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">人效↑ 排名→</text>

  <text x="475" y="360" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#8f9b7f">显性进步</text>
  <text x="475" y="376" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b6b6b">人效↑ 排名↑</text>

  <!-- Sample suppliers -->
  <!-- 显性退步 -->
  <rect x="145" y="170" width="120" height="32" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="205" y="184" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#1a1a1a">华啸</text>
  <text x="205" y="198" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d4845a">↓ 人效 排名双降</text>

  <!-- 隐性退步 -->
  <rect x="400" y="170" width="150" height="32" rx="6" fill="#f5f4f1" stroke="#d4845a" stroke-width="1"/>
  <text x="475" y="184" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#1a1a1a">岐力</text>
  <text x="475" y="198" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d4845a">↓ 人效降 排名持平</text>

  <!-- 隐性进步 -->
  <rect x="130" y="390" width="150" height="32" rx="6" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="205" y="404" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#1a1a1a">广达</text>
  <text x="205" y="418" text-anchor="middle" font-family="system-ui" font-size="9" fill="#8f9b7f">↑ 人效升 排名持平</text>

  <!-- 显性进步 -->
  <rect x="390" y="390" width="170" height="32" rx="6" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1"/>
  <text x="475" y="404" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#1a1a1a">毅航</text>
  <text x="475" y="418" text-anchor="middle" font-family="system-ui" font-size="9" fill="#8f9b7f">↑ 人效排名双升</text>

  <!-- Footer -->
  <text x="340" y="508" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#6b6b6b">隐性退步最危险：人效在降但排名不变 → 说明整体在下滑</text>
</svg>
