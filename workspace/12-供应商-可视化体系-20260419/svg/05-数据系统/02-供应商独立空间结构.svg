<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">供应商独立空间结构</text>
  <text x="40" y="46" font-size="11" fill="#6b6b66">数据隔离 — 每个供应商完整的独立档案</text>

  <!-- Outer Container: 毅航 独立空间 -->
  <rect x="30" y="58" width="430" height="420" rx="12" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <rect x="30" y="58" width="430" height="28" rx="12" fill="#faf9f7"/>
  <rect x="30" y="72" width="430" height="14" fill="#faf9f7"/>
  <text x="245" y="78" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">毅航 独立空间</text>

  <!-- 1. 基础信息 (top) -->
  <rect x="42" y="96" width="406" height="90" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <circle cx="62" cy="118" r="8" fill="#c98a6a"/>
  <text x="62" y="122" font-size="8" fill="#faf9f7" text-anchor="middle" font-weight="600">i</text>
  <text x="80" y="116" font-size="11" font-weight="600" fill="#1a1a1a">基础信息</text>
  <text x="80" y="138" font-size="10" fill="#6b6b66">供应商名称 | 规模 | 联系人 | 合同信息</text>
  <line x1="80" y1="148" x2="420" y2="148" stroke="#d4d1c7" stroke-width="0.5"/>
  <text x="80" y="168" font-size="10" fill="#6b6b66">毅航 | 800人 | 张经理 | 合同期2025-2027</text>

  <!-- 2. 历史数据 (middle-left) -->
  <rect x="42" y="196" width="195" height="130" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <path d="M52 218 L52 210 L58 210 L58 214 L64 214 L64 218 Z" fill="none" stroke="#8f9b7f" stroke-width="1.2"/>
  <text x="74" y="220" font-size="11" font-weight="600" fill="#1a1a1a">历史数据</text>
  <!-- Folder items -->
  <rect x="56" y="238" width="160" height="22" rx="4" fill="#faf9f7"/>
  <text x="66" y="253" font-size="10" fill="#1a1a1a">2026/ 01 02 03 04</text>
  <rect x="56" y="264" width="160" height="22" rx="4" fill="#faf9f7"/>
  <text x="66" y="279" font-size="10" fill="#1a1a1a">2025/ 06 07 08 09 10 11 12</text>
  <rect x="56" y="290" width="160" height="22" rx="4" fill="#faf9f7"/>
  <text x="66" y="305" font-size="10" fill="#6b6b66">... 按月归档</text>

  <!-- 3. 互动记录 (middle-right) -->
  <rect x="253" y="196" width="195" height="130" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <circle cx="265" cy="218" r="5" fill="none" stroke="#c98a6a" stroke-width="1.2"/>
  <circle cx="265" cy="218" r="2" fill="#c98a6a"/>
  <text x="278" y="220" font-size="11" font-weight="600" fill="#1a1a1a">互动记录</text>
  <!-- Timeline items -->
  <circle cx="270" cy="242" r="3" fill="#c98a6a"/>
  <line x1="270" y1="245" x2="270" y2="278" stroke="#c98a6a" stroke-width="0.8"/>
  <text x="282" y="246" font-size="10" fill="#1a1a1a">约谈记录</text>
  <circle cx="270" cy="268" r="3" fill="#c98a6a"/>
  <line x1="270" y1="271" x2="270" y2="300" stroke="#c98a6a" stroke-width="0.8"/>
  <text x="282" y="272" font-size="10" fill="#1a1a1a">整改跟踪</text>
  <circle cx="270" cy="294" r="3" fill="#c98a6a"/>
  <text x="282" y="298" font-size="10" fill="#1a1a1a">邮件往来</text>

  <!-- 4. 异常事件 (bottom) -->
  <rect x="42" y="336" width="406" height="130" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <path d="M60 356 L64 348 L68 356 Z" fill="#d4845a" stroke="#d4845a" stroke-width="0.5"/>
  <text x="64" y="355" font-size="5" fill="#faf9f7" text-anchor="middle" font-weight="bold">!</text>
  <text x="80" y="358" font-size="11" font-weight="600" fill="#1a1a1a">异常事件</text>
  <line x1="42" y1="370" x2="448" y2="370" stroke="#d4d1c7" stroke-width="0.5"/>
  <!-- Timeline sub-items -->
  <circle cx="62" cy="388" r="3" fill="#d4845a"/>
  <line x1="62" y1="391" x2="62" y2="416" stroke="#d4845a" stroke-width="0.8"/>
  <text x="74" y="392" font-size="10" fill="#1a1a1a">触发事件</text>
  <circle cx="62" cy="412" r="3" fill="#d4845a"/>
  <line x1="62" y1="415" x2="62" y2="440" stroke="#d4845a" stroke-width="0.8"/>
  <text x="74" y="416" font-size="10" fill="#1a1a1a">处理过程</text>
  <circle cx="62" cy="438" r="3" fill="#8f9b7f"/>
  <text x="74" y="442" font-size="10" fill="#1a1a1a">复盘总结</text>

  <!-- Right side: Permission annotation -->
  <rect x="478" y="58" width="172" height="200" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="564" y="82" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">权限说明</text>
  <line x1="490" y1="92" x2="638" y2="92" stroke="#d4d1c7" stroke-width="0.5"/>

  <!-- Permission rows -->
  <rect x="490" y="102" width="146" height="36" rx="6" fill="#faf9f7"/>
  <circle cx="504" cy="120" r="5" fill="#c98a6a"/>
  <text x="516" y="116" font-size="10" font-weight="600" fill="#1a1a1a">年老师</text>
  <text x="516" y="132" font-size="9" fill="#6b6b66">读写全部数据</text>

  <rect x="490" y="144" width="146" height="36" rx="6" fill="#faf9f7"/>
  <circle cx="504" cy="162" r="5" fill="#8f9b7f"/>
  <text x="516" y="158" font-size="10" font-weight="600" fill="#1a1a1a">军哥</text>
  <text x="516" y="174" font-size="9" fill="#6b6b66">只读摘要</text>

  <rect x="490" y="186" width="146" height="36" rx="6" fill="#faf9f7"/>
  <circle cx="504" cy="204" r="5" fill="#6b6b66"/>
  <text x="516" y="200" font-size="10" font-weight="600" fill="#1a1a1a">供应商</text>
  <text x="516" y="216" font-size="9" fill="#6b6b66">仅自己空间</text>

  <!-- Data isolation visual (multiple suppliers concept) -->
  <rect x="478" y="272" width="172" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="564" y="294" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="middle">数据隔离示意</text>

  <!-- Isolated supplier boxes -->
  <rect x="488" y="304" width="68" height="56" rx="6" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="522" y="328" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="600">毅航</text>
  <text x="522" y="346" font-size="8" fill="#6b6b66" text-anchor="middle">独立空间</text>

  <rect x="562" y="304" width="68" height="56" rx="6" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="596" y="328" font-size="9" fill="#6b6b66" text-anchor="middle" font-weight="600">毛毛虫</text>
  <text x="596" y="346" font-size="8" fill="#6b6b66" text-anchor="middle">独立空间</text>

  <!-- Divider between them -->
  <line x1="558" y1="304" x2="558" y2="360" stroke="#d4d1c7" stroke-width="0.8" stroke-dasharray="2,2"/>
</svg>
