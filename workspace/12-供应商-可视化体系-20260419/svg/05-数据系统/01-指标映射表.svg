  <text x="92" y="83" font-size="10.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">业务指标</text>
  <text x="212" y="83" font-size="10.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">数据字段</text>
  <text x="392" y="83" font-size="10.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">来源系统</text>
  <text x="472" y="83" font-size="10.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">计算规则</text>
  <text x="590" y="83" font-size="10.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">更新频率</text>

  <!-- Row 1 -->
  <rect x="32" y="100" width="616" height="52" fill="#faf9f7"/>
