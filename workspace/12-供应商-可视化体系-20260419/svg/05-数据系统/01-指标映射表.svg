  <rect x="32" y="316" width="616" height="52" fill="#faf9f7"/>
  <text x="92" y="338" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-weight="600">排名</text>
  <text x="212" y="338" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-family="monospace">supplier_rank</text>
  <text x="392" y="338" font-size="10.5" fill="#1a1a1a" text-anchor="middle">计算引擎</text>
  <text x="472" y="338" font-size="10.5" fill="#1a1a1a" text-anchor="middle">多指标加权</text>
  <rect x="552" y="328" width="76" height="20" rx="10" fill="#f0e0d4"/>
  <text x="590" y="342" font-size="9.5" fill="#c98a6a" text-anchor="middle" font-weight="600">每月</text>

  <!-- Row 6 -->
  <rect x="32" y="370" width="616" height="52" fill="#f0efeb"/>
