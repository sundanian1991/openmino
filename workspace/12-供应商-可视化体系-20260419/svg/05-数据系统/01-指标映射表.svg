  <!-- Column dividers -->
  <line x1="152" y1="60" x2="152" y2="530" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="272" y1="60" x2="272" y2="530" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="432" y1="60" x2="432" y2="530" stroke="#d4d1c7" stroke-width="0.5"/>
  <line x1="550" y1="60" x2="550" y2="530" stroke="#d4d1c7" stroke-width="0.5"/>
