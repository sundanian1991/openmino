<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,2 L10,5 L0,8Z" fill="#c98a6a"/>
    </marker>
  </defs>

  <rect width="680" height="560" fill="#faf9f7"/>
