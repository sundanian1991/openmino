  <text x="212" y="122" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-family="monospace">monthly_achievement</text>
  <text x="392" y="122" font-size="10.5" fill="#1a1a1a" text-anchor="middle">CRM系统</text>
  <text x="472" y="122" font-size="10.5" fill="#1a1a1a" text-anchor="middle">实际/目标×100%</text>
  <rect x="552" y="112" width="76" height="20" rx="10" fill="#f0e0d4"/>
