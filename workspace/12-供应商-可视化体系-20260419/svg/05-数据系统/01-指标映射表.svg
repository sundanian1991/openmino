  <text x="472" y="392" font-size="10.5" fill="#1a1a1a" text-anchor="middle">离职/总人数</text>
  <rect x="552" y="382" width="76" height="20" rx="10" fill="#f0e0d4"/>
  <text x="590" y="396" font-size="9.5" fill="#c98a6a" text-anchor="middle" font-weight="600">每月</text>

  <!-- Row 7 -->
  <rect x="32" y="424" width="616" height="52" fill="#faf9f7"/>
  <text x="92" y="446" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-weight="600">合规率</text>
  <text x="212" y="446" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-family="monospace">compliance_rate</text>
  <text x="392" y="446" font-size="10.5" fill="#1a1a1a" text-anchor="middle">质检系统</text>
  <text x="472" y="446" font-size="10.5" fill="#1a1a1a" text-anchor="middle">合规单/总单</text>
  <rect x="552" y="436" width="76" height="20" rx="10" fill="#e4e8dc"/>
  <text x="590" y="450" font-size="9.5" fill="#6b7f52" text-anchor="middle" font-weight="600">每周</text>

  <!-- Row 8 -->
  <rect x="32" y="478" width="616" height="52" fill="#f0efeb"/>
  <text x="92" y="500" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-weight="600">增长率</text>
  <text x="212" y="500" font-size="10.5" fill="#1a1a1a" text-anchor="middle" font-family="monospace">growth_rate</text>
  <text x="392" y="500" font-size="10.5" fill="#1a1a1a" text-anchor="middle">CRM系统</text>
