<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 510" width="100%">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="510" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia" font-size="18" font-weight="700" fill="#1a1a1a">月度数据收集清单</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b6b">提交标准化 — 准确/及时/完整</text>

  <!-- Right side: Process flow -->
  <text x="540" y="72" font-family="system-ui" font-size="9" fill="#c98a6a" font-weight="500">提交流程</text>
  <text x="540" y="86" font-family="system-ui" font-size="8.5" fill="#8a8580">D1 提醒</text>
  <line x1="540" y1="90" x2="610" y2="90" stroke="#c98a6a" stroke-width="0.8" marker-end="url(#ah)"/>
  <text x="610" y="86" font-family="system-ui" font-size="8.5" fill="#8a8580">D2 截止</text>
  <line x1="610" y1="90" x2="670" y2="90" stroke="#c98a6a" stroke-width="0.8" marker-end="url(#ah)"/>
  <text x="540" y="104" font-family="system-ui" font-size="8.5" fill="#8a8580">D2-D3 校验</text>
  <line x1="540" y1="108" x2="610" y2="108" stroke="#c98a6a" stroke-width="0.8" marker-end="url(#ah)"/>
  <text x="610" y="104" font-family="system-ui" font-size="8.5" fill="#8a8580">D4 分析</text>

  <!-- 5 required data items -->
  <g font-family="system-ui" font-size="10.5" fill="#1a1a1a">
    <!-- Item 1 -->
    <rect x="40" y="72" width="14" height="14" rx="3" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
    <path d="M43 79l3 3 5-6" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="84">产能数据</text>
    <text x="120" y="84" fill="#6b6b6b">（每月2日12点前）</text>

    <!-- Item 2 -->
    <rect x="40" y="96" width="14" height="14" rx="3" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
    <path d="M43 103l3 3 5-6" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="108">人效数据</text>

    <!-- Item 3 -->
    <rect x="40" y="120" width="14" height="14" rx="3" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
    <path d="M43 127l3 3 5-6" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="132">质量合规</text>

    <!-- Item 4 -->
    <rect x="40" y="144" width="14" height="14" rx="3" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
    <path d="M43 151l3 3 5-6" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="156">人力变动</text>

    <!-- Item 5 -->
    <rect x="40" y="168" width="14" height="14" rx="3" fill="#f5f4f1" stroke="#8f9b7f" stroke-width="1.5"/>
    <path d="M43 175l3 3 5-6" fill="none" stroke="#8f9b7f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="180">情况说明</text>
  </g>

  <!-- Submission status -->
  <text x="40" y="208" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">本月提交状态</text>

  <!-- 已提交 -->
  <text x="40" y="226" font-family="system-ui" font-size="10" fill="#1a1a1a">已提交</text>
  <rect x="100" y="216" width="40" height="18" rx="9" fill="#8f9b7f"/>
  <text x="120" y="229" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">毅航</text>
  <rect x="144" y="216" width="46" height="18" rx="9" fill="#8f9b7f"/>
  <text x="167" y="229" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">毛毛虫</text>
  <rect x="194" y="216" width="40" height="18" rx="9" fill="#8f9b7f"/>
  <text x="214" y="229" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">广达</text>
  <rect x="238" y="216" width="40" height="18" rx="9" fill="#8f9b7f"/>
  <text x="258" y="229" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">伽玛</text>
  <rect x="282" y="216" width="46" height="18" rx="9" fill="#8f9b7f"/>
  <text x="305" y="229" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">赛维斯</text>

  <!-- 未提交 -->
  <text x="40" y="256" font-family="system-ui" font-size="10" fill="#1a1a1a">未提交</text>
  <rect x="100" y="246" width="40" height="18" rx="9" fill="#d4845a"/>
  <text x="120" y="259" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">华啸</text>
  <rect x="144" y="246" width="40" height="18" rx="9" fill="#d4845a"/>
  <text x="164" y="259" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">岐力</text>
  <text x="196" y="259" font-family="system-ui" font-size="9" fill="#d4845a">自动催办</text>

  <!-- 待校验 -->
  <text x="40" y="286" font-family="system-ui" font-size="10" fill="#1a1a1a">待校验</text>
  <rect x="100" y="276" width="46" height="18" rx="9" fill="#c98a6a"/>
  <text x="123" y="289" font-family="system-ui" font-size="8.5" fill="#faf9f7" text-anchor="middle" font-weight="500">翰锐</text>
  <text x="158" y="289" font-family="system-ui" font-size="9" fill="#6b6b6b">数据完整性校验中</text>

  <!-- Quality requirements card -->
  <rect x="40" y="308" width="600" height="110" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="56" y="328" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">质量要求</text>

  <g font-family="system-ui" font-size="10" fill="#1a1a1a">
    <!-- Row 1: 准确性 -->
    <circle cx="72" cy="352" r="4" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
    <text x="84" y="356">准确性：数据与系统一致，不得虚报</text>

    <!-- Row 2: 及时性 -->
    <circle cx="72" cy="374" r="4" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
    <text x="84" y="378">及时性：每月2日12点前提交，逾期自动催办</text>

    <!-- Row 3: 完整性 -->
    <circle cx="72" cy="396" r="4" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
    <text x="84" y="400">完整性：5项数据全部提交，缺一不可</text>

    <!-- Row 4: 异常标注 -->
    <circle cx="72" cy="418" r="4" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
    <text x="84" y="422">异常标注：异常数据需附情况说明</text>
  </g>

  <!-- Timeline bar at bottom -->
  <text x="40" y="440" font-family="system-ui" font-size="9.5" fill="#8a8580">处理时间线</text>
  <line x1="40" y1="454" x2="640" y2="454" stroke="#c98a6a" stroke-width="1"/>
  <!-- Dots and labels -->
  <circle cx="40" cy="454" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="40" y="470" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle">D1</text>
  <text x="40" y="448" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">提醒</text>

  <circle cx="180" cy="454" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="180" y="470" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle">D2 12:00</text>
  <text x="180" y="448" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">截止</text>

  <circle cx="320" cy="454" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="320" y="470" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle">D2-D3</text>
  <text x="320" y="448" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">校验</text>

  <circle cx="460" cy="454" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="460" y="470" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle">D4</text>
  <text x="460" y="448" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">分析</text>

  <circle cx="600" cy="454" r="4" fill="#faf9f7" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="600" y="470" font-family="system-ui" font-size="9" fill="#c98a6a" text-anchor="middle">D5+</text>
  <text x="600" y="448" font-family="system-ui" font-size="8.5" fill="#8a8580" text-anchor="middle">约/汇报</text>
</svg>
