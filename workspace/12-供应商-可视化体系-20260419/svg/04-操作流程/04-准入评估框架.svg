<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#faf9f7"/>
  <text x="40" y="28" font-family="Georgia" font-size="18" font-weight="700" fill="#1a1a1a">新供应商准入评估框架</text>
  <text x="40" y="46" font-family="system-ui" font-size="11" fill="#6b6b6b">4维度打分制 — ≥70分准入，避免主观判断</text>

  <!-- Dimension 1: 资质评估 (pass/fail) -->
  <rect x="40" y="64" width="600" height="72" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="54" y="76" width="64" height="20" rx="10" fill="#c98a6a"/>
  <text x="86" y="90" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">必备项</text>
  <text x="130" y="90" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">资质评估</text>
  <!-- Checklist -->
  <text x="220" y="90" font-family="system-ui" font-size="10" fill="#1a1a1a">营业执照</text>
  <circle cx="280" cy="87" r="5" fill="none" stroke="#8f9b7f" stroke-width="1.5"/>
  <path d="M277 87l2 2 4-4" fill="none" stroke="#8f9b7f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="300" y="90" font-family="system-ui" font-size="10" fill="#1a1a1a">注册资本</text>
  <circle cx="356" cy="87" r="5" fill="none" stroke="#8f9b7f" stroke-width="1.5"/>
  <path d="M353 87l2 2 4-4" fill="none" stroke="#8f9b7f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="372" y="90" font-family="system-ui" font-size="10" fill="#1a1a1a">从业年限</text>
  <circle cx="428" cy="87" r="5" fill="none" stroke="#8f9b7f" stroke-width="1.5"/>
  <path d="M425 87l2 2 4-4" fill="none" stroke="#8f9b7f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="520" y="90" font-family="system-ui" font-size="10" fill="#8a8580">合规经营</text>
  <circle cx="568" cy="87" r="5" fill="none" stroke="#8f9b7f" stroke-width="1.5"/>
  <path d="M565 87l2 2 4-4" fill="none" stroke="#8f9b7f" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="340" y="118" font-family="system-ui" font-size="9.5" fill="#6b6b6b" text-anchor="middle">全部通过方可进入评分环节 · 不占分但为一票否决项</text>

  <!-- Dimension 2: 能力评估 (40分) -->
  <rect x="40" y="148" width="280" height="140" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="56" y="160" width="36" height="20" rx="10" fill="#c98a6a"/>
  <text x="74" y="174" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">40分</text>
  <text x="104" y="174" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">能力评估</text>
  <!-- Sub-items -->
  <text x="56" y="200" font-family="system-ui" font-size="10" fill="#1a1a1a">产能规模（15分）</text>
  <rect x="56" y="206" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="56" y="206" width="105" height="8" rx="4" fill="#c98a6a"/>
  <text x="212" y="214" font-family="system-ui" font-size="8.5" fill="#8a8580">12/15</text>

  <text x="56" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a">人效水平（15分）</text>
  <rect x="56" y="240" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="56" y="240" width="120" height="8" rx="4" fill="#c98a6a"/>
  <text x="212" y="248" font-family="system-ui" font-size="8.5" fill="#8a8580">13/15</text>

  <text x="56" y="268" font-family="system-ui" font-size="10" fill="#1a1a1a">管理团队（10分）</text>
  <rect x="56" y="274" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="56" y="274" width="75" height="8" rx="4" fill="#c98a6a"/>
  <text x="212" y="282" font-family="system-ui" font-size="8.5" fill="#8a8580">7/10</text>

  <rect x="56" y="294" width="248" height="1" fill="none" stroke="#d4d1c7" stroke-width="1"/>
  <text x="180" y="280" font-family="system-ui" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">32/40</text>

  <!-- Dimension 3: 资源评估 (30分) -->
  <rect x="360" y="148" width="280" height="140" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="376" y="160" width="36" height="20" rx="10" fill="#c98a6a"/>
  <text x="394" y="174" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">30分</text>
  <text x="424" y="174" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">资源评估</text>

  <text x="376" y="200" font-family="system-ui" font-size="10" fill="#1a1a1a">招聘能力（15分）</text>
  <rect x="376" y="206" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="376" y="206" width="120" height="8" rx="4" fill="#c98a6a"/>
  <text x="532" y="214" font-family="system-ui" font-size="8.5" fill="#8a8580">12/15</text>

  <text x="376" y="234" font-family="system-ui" font-size="10" fill="#1a1a1a">培训体系（15分）</text>
  <rect x="376" y="240" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="376" y="240" width="90" height="8" rx="4" fill="#c98a6a"/>
  <text x="532" y="248" font-family="system-ui" font-size="8.5" fill="#8a8580">12/15</text>

  <rect x="376" y="266" width="248" height="1" fill="none" stroke="#d4d1c7" stroke-width="1"/>
  <text x="500" y="256" font-family="system-ui" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">24/30</text>

  <!-- Dimension 4: 风险评估 (30分) -->
  <rect x="360" y="300" width="280" height="118" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="376" y="312" width="36" height="20" rx="10" fill="#c98a6a"/>
  <text x="394" y="326" font-family="system-ui" font-size="9" fill="#faf9f7" text-anchor="middle" font-weight="500">30分</text>
  <text x="424" y="326" font-family="system-ui" font-size="11" font-weight="500" fill="#1a1a1a">风险评估</text>

  <text x="376" y="352" font-family="system-ui" font-size="10" fill="#1a1a1a">合规记录（10分）</text>
  <rect x="376" y="358" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="376" y="358" width="90" height="8" rx="4" fill="#c98a6a"/>
  <text x="532" y="366" font-family="system-ui" font-size="8.5" fill="#8a8580">8/10</text>

  <text x="376" y="382" font-family="system-ui" font-size="10" fill="#1a1a1a">财务状况（10分）</text>
  <rect x="376" y="388" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="376" y="388" width="83" height="8" rx="4" fill="#c98a6a"/>
  <text x="532" y="396" font-family="system-ui" font-size="8.5" fill="#8a8580">7/10</text>

  <text x="376" y="412" font-family="system-ui" font-size="10" fill="#1a1a1a">客户结构（10分）</text>
  <rect x="376" y="418" width="150" height="8" rx="4" fill="#d4d1c7"/>
  <rect x="376" y="418" width="83" height="8" rx="4" fill="#c98a6a"/>
  <text x="532" y="426" font-family="system-ui" font-size="8.5" fill="#8a8580">7/10</text>

  <rect x="376" y="430" width="248" height="1" fill="none" stroke="#d4d1c7" stroke-width="1"/>
  <text x="500" y="420" font-family="system-ui" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">22/30</text>

  <!-- Score summary -->
  <rect x="40" y="300" width="280" height="140" rx="10" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="180" y="320" font-family="Georgia" font-size="14" font-weight="700" fill="#1a1a1a" text-anchor="middle">综合评分</text>

  <!-- Score bar: 0-100, threshold at 70 -->
  <rect x="56" y="336" width="248" height="16" rx="8" fill="#d4d1c7"/>
  <rect x="56" y="336" width="174" height="16" rx="8" fill="#8f9b7f"/>
  <!-- Threshold line at 70% = x=56+248*0.7=230 -->
  <line x1="230" y1="332" x2="230" y2="356" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="230" y="330" font-family="system-ui" font-size="8" fill="#1a1a1a" text-anchor="middle">70</text>

  <text x="180" y="374" font-family="system-ui" font-size="10" fill="#6b6b6b" text-anchor="middle">能力 32 + 资源 24 + 风险 22</text>
  <text x="180" y="396" font-family="system-ui" font-size="16" font-weight="600" fill="#1a1a1a" text-anchor="middle">78/100</text>
  <rect x="96" y="406" width="168" height="22" rx="11" fill="#8f9b7f"/>
  <text x="180" y="422" font-family="system-ui" font-size="10" fill="#faf9f7" text-anchor="middle" font-weight="500">≥70，准予准入</text>

  <!-- Trial agreement -->
  <rect x="40" y="452" width="600" height="50" rx="10" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="56" y="472" font-family="system-ui" font-size="10.5" font-weight="500" fill="#1a1a1a">试用约定</text>
  <text x="120" y="472" font-family="system-ui" font-size="10" fill="#6b6b6b">3个月 · 达标率≥80% · 期满复评</text>
  <text x="56" y="490" font-family="system-ui" font-size="9.5" fill="#8a8580">试用期不达标则启动清退流程</text>
</svg>
