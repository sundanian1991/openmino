<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="480" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-06 资源匹配度判定</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">通过信号判断供应商资源是否匹配业务需求</text>

  <!-- Column headers -->
  <rect x="20" y="70" width="280" height="28" rx="4" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="160" y="89" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">信号</text>
  <rect x="305" y="70" width="175" height="28" rx="4" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="392" y="89" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">判定</text>
  <rect x="485" y="70" width="175" height="28" rx="4" fill="#f2f0eb" stroke="#857d74" stroke-width="1"/>
  <text x="572" y="89" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">你的动作</text>

  <!-- Row 1: 头部差距扩大 -->
  <rect x="20" y="105" width="280" height="75" rx="6" fill="#fff" stroke="#c25030" stroke-width="1"/>
  <text x="30" y="127" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">头部差距持续扩大</text>
  <text x="30" y="147" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">头部差距从15%扩大到35%+</text>
  <text x="30" y="167" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">连续2个月追赶无改善</text>
  <rect x="305" y="105" width="175" height="75" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="315" y="127" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">资源不匹配</text>
  <text x="315" y="147" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">该供应商的人力/管理</text>
  <text x="315" y="167" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">能力跟不上产线要求</text>
  <rect x="485" y="105" width="175" height="75" rx="6" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="495" y="127" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b3410">约谈+减份额</text>
  <text x="495" y="147" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">约谈了解根因，如确认</text>
  <text x="495" y="167" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">能力不足则逐步减份额</text>

  <!-- Row 2: 头部差距缩小 -->
  <rect x="20" y="187" width="280" height="75" rx="6" fill="#fff" stroke="#2e8b6e" stroke-width="1"/>
  <text x="30" y="209" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">头部差距持续缩小</text>
  <text x="30" y="229" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">头部差距从30%缩小到10%</text>
  <text x="30" y="249" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">连续2个月趋势向好</text>
  <rect x="305" y="187" width="175" height="75" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="315" y="209" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#0f5040">资源匹配</text>
  <text x="315" y="229" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">人力和管理正在改善</text>
  <text x="315" y="249" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">当前资源能支撑追赶</text>
  <rect x="485" y="187" width="175" height="75" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="495" y="209" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#0f5040">鼓励+观察</text>
  <text x="495" y="229" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">保持关注，认可进步，</text>
  <text x="495" y="249" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">不主动干预</text>

  <!-- Row 3: 加名单后人均降 -->
  <rect x="20" y="269" width="280" height="75" rx="6" fill="#fff" stroke="#b88018" stroke-width="1"/>
  <text x="30" y="291" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">加名单后人均GMV下降</text>
  <text x="30" y="311" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">增加数据量后人均产出反而降</text>
  <text x="30" y="331" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">拨打量未跟上名单增长</text>
  <rect x="305" y="269" width="175" height="75" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="315" y="291" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6a4005">管理瓶颈</text>
  <text x="315" y="311" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">不是名单问题，是团队</text>
  <text x="315" y="331" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">消化能力不足</text>
  <rect x="485" y="269" width="175" height="75" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="495" y="291" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6a4005">暂停加量+诊断</text>
  <text x="495" y="311" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">暂停追加名单，先诊断</text>
  <text x="495" y="331" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">是拨打效率还是转化率</text>

  <!-- Row 4: 反复要名单但人均低 -->
  <rect x="20" y="351" width="280" height="75" rx="6" fill="#fff" stroke="#c25030" stroke-width="1"/>
  <text x="30" y="373" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">反复要求加名单但人均低</text>
  <text x="30" y="393" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">多次主动要求更多数据量</text>
  <text x="30" y="413" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">但人均GMV持续低于均值</text>
  <rect x="305" y="351" width="175" height="75" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="315" y="373" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">资源错配</text>
  <text x="315" y="393" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">态度积极但能力不匹配，</text>
  <text x="315" y="413" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">加量只会浪费资源</text>
  <rect x="485" y="351" width="175" height="75" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="495" y="373" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">拒绝+要求整改</text>
  <text x="495" y="393" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">明确拒绝加量要求，要求</text>
  <text x="495" y="413" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">先提升人均再谈加量</text>

  <!-- Footer -->
  <text x="340" y="465" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">供应商管理可视化体系 L5-06</text>
</svg>