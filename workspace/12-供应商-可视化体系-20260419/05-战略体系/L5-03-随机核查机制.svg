<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2e8b6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="440" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-03 随机核查机制</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">四种核查类型 + 随机触发流程</text>

  <!-- Flow: 随机 -> 核查 -> 验证 -->
  <rect x="30" y="70" width="100" height="40" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="80" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">随机触发</text>

  <line x1="130" y1="90" x2="170" y2="90" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="175" y="70" width="100" height="40" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="225" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0f5040">现场核查</text>

  <line x1="275" y1="90" x2="315" y2="90" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="70" width="100" height="40" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="370" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#0e4070">数据验证</text>

  <line x1="420" y1="90" x2="460" y2="90" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="465" y="70" width="100" height="40" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="515" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#3a4a30">记录存档</text>

  <line x1="565" y1="90" x2="610" y2="90" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="625" y="82" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">异常则</text>
  <text x="625" y="97" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#c25030" font-weight="600">触发L5-04</text>

  <!-- Card 1: 出勤抽检 -->
  <rect x="20" y="130" width="310" height="120" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="152" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#454240">出勤抽检</text>
  <rect x="120" y="138" width="55" height="18" rx="9" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="147" y="151" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">每周1次</text>
  <text x="35" y="175" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">方式：不提前通知，随机某天上午/下午到职场实地清点</text>
  <text x="35" y="195" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">内容：实到人数 vs 报表人数，差异 > 5% 则标记异常</text>
  <text x="35" y="215" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">记录：拍照 + 签到表对比 + 差异率</text>
  <text x="35" y="235" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">触发：连续2次差异 > 5% → 启动L5-04虚高出勤预案</text>

  <!-- Card 2: 离职核实 -->
  <rect x="350" y="130" width="310" height="120" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="365" y="152" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#454240">离职核实</text>
  <rect x="460" y="138" width="55" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="487" y="151" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">每月2次</text>
  <text x="365" y="175" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">方式：随机抽取3-5名声称"在职"的人员，电话或当面确认</text>
  <text x="365" y="195" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">内容：是否仍在职、最后工作日、离职原因</text>
  <text x="365" y="215" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">发现隐瞒离职 → 从发现当月起扣减对应人力产能</text>

  <!-- Card 3: 产能核实 -->
  <rect x="20" y="270" width="310" height="120" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="292" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#454240">产能核实</text>
  <rect x="120" y="278" width="55" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="147" y="291" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">每月1次</text>
  <text x="35" y="315" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">方式：现场旁听1-2名"熟手"实际拨打，记录真实产能</text>
  <text x="35" y="335" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">内容：实际拨打量/接通率/转化率 vs 报表数据对比</text>
  <text x="35" y="355" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">差异 > 15% → 标记"熟手虚标"嫌疑，启动深度核查</text>

  <!-- Card 4: 新人核实 -->
  <rect x="350" y="270" width="310" height="120" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="365" y="292" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#454240">新人核实</text>
  <rect x="470" y="278" width="70" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="505" y="291" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">新人入职时</text>
  <text x="365" y="315" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">方式：新供应商引入或大批新人入职时，核实"新人"真实性</text>
  <text x="365" y="335" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">内容：入职场时间、是否有行业经验、是否"假新人"</text>
  <text x="365" y="355" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">发现将熟手当新人报备 → 修正人力结构，取消豁免期</text>

  <!-- Footer -->
  <text x="340" y="420" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">供应商管理可视化体系 L5-03</text>
</svg>