<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2e8b6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-01 HRBP式扶持流程</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">供应商绩效下滑时的主动介入路径</text>

  <!-- Step 1: 主动联系 -->
  <rect x="20" y="70" width="145" height="180" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="92" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b3410">主动联系</text>
  <line x1="35" y1="105" x2="150" y2="105" stroke="#c26d3a" stroke-width="0.5"/>
  <text x="30" y="125" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">1. 发现连续下滑后</text>
  <text x="30" y="143" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   48h内主动联系</text>
  <text x="30" y="163" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">2. 不质问，先关心</text>
  <text x="30" y="183" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   "最近有什么困难"</text>
  <text x="30" y="203" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">3. 判断是否愿意</text>
  <text x="30" y="223" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   配合改进</text>

  <!-- Arrow 1->2 -->
  <line x1="165" y1="160" x2="195" y2="160" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: 帮他分析 -->
  <rect x="200" y="70" width="145" height="180" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="272" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#0f5040">帮他分析</text>
  <line x1="215" y1="105" x2="330" y2="105" stroke="#2e8b6e" stroke-width="0.5"/>
  <text x="210" y="125" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">1. 带数据去，不空谈</text>
  <text x="210" y="143" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   "你转化率降了8pp"</text>
  <text x="210" y="163" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">2. 引导他自己找原因</text>
  <text x="210" y="183" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   "你觉得主要原因</text>
  <text x="210" y="203" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   是什么？"</text>
  <text x="210" y="223" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">3. 区分个性/共性</text>

  <!-- Arrow 2->3 -->
  <line x1="345" y1="160" x2="375" y2="160" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: 提供框架 -->
  <rect x="380" y="70" width="145" height="180" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="452" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#0e4070">提供框架</text>
  <line x1="395" y1="105" x2="510" y2="105" stroke="#3a7ab8" stroke-width="0.5"/>
  <text x="390" y="125" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">1. 给整改框架模板</text>
  <text x="390" y="143" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   目标/动作/时间</text>
  <text x="390" y="163" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">2. 让他自己填内容</text>
  <text x="390" y="183" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">3. 约定复查时间</text>
  <text x="390" y="203" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   2周后check进度</text>
  <text x="390" y="223" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">4. 不替他做方案</text>

  <!-- Arrow 3->4 -->
  <line x1="525" y1="160" x2="555" y2="160" stroke="#857d74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: 推荐标杆 -->
  <rect x="560" y="70" width="105" height="180" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="612" y="95" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#3a4a30">推荐标杆</text>
  <line x1="572" y1="105" x2="652" y2="105" stroke="#6f8660" stroke-width="0.5"/>
  <text x="570" y="125" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">1. 配对同产线</text>
  <text x="570" y="143" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   标杆供应商</text>
  <text x="570" y="163" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">2. 分享可复制</text>
  <text x="570" y="183" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   做法（晨会/复贷</text>
  <text x="570" y="203" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">   分组等）</text>
  <text x="570" y="223" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">3. 跟踪差距缩小</text>

  <!-- Feedback loop arrow -->
  <path d="M612 250 Q612 270 450 270 Q290 270 92 270" fill="none" stroke="#857d74" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="340" y="265" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">2周后复查，未回正则升级约谈</text>

  <!-- Bottom metrics card -->
  <rect x="20" y="295" width="640" height="90" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="340" y="320" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">扶持量化指标</text>

  <!-- Metric 1 -->
  <rect x="50" y="335" width="170" height="36" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="135" y="351" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#0f5040">80%</text>
  <text x="135" y="366" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">扶持响应率</text>

  <!-- Metric 2 -->
  <rect x="255" y="335" width="170" height="36" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="340" y="351" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#0f5040">60%</text>
  <text x="340" y="366" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">回正率</text>

  <!-- Metric 3 -->
  <rect x="460" y="335" width="170" height="36" rx="6" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="545" y="351" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#6a4005">2月</text>
  <text x="545" y="366" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">平均回正时间</text>

  <!-- Core principle -->
  <rect x="20" y="405" width="640" height="55" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
  <text x="40" y="425" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">核心原则</text>
  <text x="40" y="445" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">你提问，他回答。你不替他想办法。给框架，不给答案。给标杆，不给路径。</text>

  <!-- Footer -->
  <text x="340" y="495" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">供应商管理可视化体系 L5-01</text>
</svg>