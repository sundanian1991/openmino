<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 530">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="530" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-04 对抗性造假预案</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">四种造假类型识别与处置</text>

  <!-- Alert banner -->
  <rect x="20" y="65" width="640" height="28" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="340" y="84" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">对抗性特征：供应商有意识地操纵数据，使报表与实际偏离</text>

  <!-- Type 1: 虚高出勤 -->
  <rect x="20" y="105" width="640" height="85" rx="8" fill="#fff" stroke="#c25030" stroke-width="1.5"/>
  <text x="35" y="127" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b2010">1. 虚高出勤</text>
  <rect x="130" y="113" width="70" height="18" rx="9" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="165" y="126" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">红线级</text>
  <text x="35" y="148" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">识别信号：实地清点人数与报表差异 > 5%；考勤系统数据与职场实际不符；同一天多人"请假"但职场空荡</text>
  <text x="35" y="168" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">处理方式：当月扣减虚报人力对应的全部产能核算；累计2次 → 诚信预警；累计3次 → 触发清退评估</text>

  <!-- Type 2: 隐瞒离职 -->
  <rect x="20" y="200" width="640" height="85" rx="8" fill="#fff" stroke="#c25030" stroke-width="1.5"/>
  <text x="35" y="222" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b2010">2. 隐瞒离职</text>
  <rect x="140" y="208" width="70" height="18" rx="9" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="175" y="221" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">红线级</text>
  <text x="35" y="243" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">识别信号：电话核实已离职人员仍在报表中；离职人员工位被他人占用；社保/工资记录与在职名单不一致</text>
  <text x="35" y="263" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">处理方式：从实际离职当月起重新核算产能；隐瞒期间GMV全部打折计算；要求供应商补交离职台账</text>

  <!-- Type 3: 熟手虚标 -->
  <rect x="20" y="295" width="640" height="85" rx="8" fill="#fff" stroke="#c25030" stroke-width="1.5"/>
  <text x="35" y="317" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b2010">3. 熟手虚标</text>
  <rect x="140" y="303" width="70" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="175" y="316" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">预警级</text>
  <text x="35" y="338" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">识别信号：新人占比高但人均GMV异常稳定；现场旁听产能远低于报表数据；"熟手"无法解释自身数据表现</text>
  <text x="35" y="358" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">处理方式：重新标注人力结构（熟手→新人）；修正产能利用率计算；要求供应商提交真实人力分类清单</text>

  <!-- Type 4: 分流业绩 -->
  <rect x="20" y="390" width="640" height="85" rx="8" fill="#fff" stroke="#c25030" stroke-width="1.5"/>
  <text x="35" y="412" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#6b2010">4. 分流业绩</text>
  <rect x="140" y="398" width="70" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="175" y="411" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">预警级</text>
  <text x="35" y="433" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">识别信号：同供应商旗下多产线，某条线数据异常偏低；总GMV达标但单线人均极低；跨产线人员调拨未报备</text>
  <text x="35" y="453" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">处理方式：按产线独立核算，禁止跨线调剂；要求人员调拨提前报备并审批；反复违规 → 缩减该供应商份额</text>

  <!-- Bottom: 诚信红线 -->
  <rect x="20" y="485" width="640" height="35" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="340" y="507" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#6b2010">诚信红线：任何造假行为一经确认，当月排名直接标注"诚信预警"，连续2次进入清退流程</text>
</svg>