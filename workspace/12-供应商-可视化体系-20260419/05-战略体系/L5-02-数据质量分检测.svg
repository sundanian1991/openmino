<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 540">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="540" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-02 数据质量分检测</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">5项异常信号 + 评分规则</text>

  <!-- Signal 1 -->
  <rect x="20" y="70" width="640" height="65" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="90" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">1. 人均GMV突变</text>
  <rect x="160" y="78" width="50" height="18" rx="9" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="185" y="91" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">Coral</text>
  <text x="35" y="115" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">检测：周环比下降 > 20%，且无合理解释</text>

  <!-- Signal 2 -->
  <rect x="20" y="145" width="640" height="65" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="165" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">2. 出勤率与产能背离</text>
  <rect x="200" y="153" width="50" height="18" rx="9" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
  <text x="225" y="166" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">Coral</text>
  <text x="35" y="190" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">检测：出勤率 > 95% 但人均GMV下降，存在虚报出勤嫌疑</text>

  <!-- Signal 3 -->
  <rect x="20" y="220" width="640" height="65" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="240" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">3. 新人占比异常偏高</text>
  <rect x="210" y="228" width="50" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="235" y="241" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">Amber</text>
  <text x="35" y="265" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">检测：新人占比 > 40% 且持续2周以上，数据代表性不足</text>

  <!-- Signal 4 -->
  <rect x="20" y="295" width="640" height="65" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="315" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">4. 转化率与接通率背离</text>
  <rect x="210" y="303" width="50" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="235" y="316" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">Amber</text>
  <text x="35" y="340" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">检测：接通率正常但转化率飙升，可能存在人为干预数据</text>

  <!-- Signal 5 -->
  <rect x="20" y="370" width="640" height="65" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="390" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">5. 填报不及时或缺失</text>
  <rect x="200" y="378" width="50" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="225" y="391" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">Amber</text>
  <text x="35" y="415" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">检测：周报/月报逾期未交，或关键字段空白，配合度低</text>

  <!-- Scoring rules -->
  <text x="340" y="460" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#454240">评分规则</text>

  <!-- Score 100 -->
  <rect x="50" y="475" width="170" height="40" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="135" y="492" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="600" fill="#0f5040">0项触发 = 100分</text>
  <text x="135" y="507" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">数据可信，排名正常标注</text>

  <!-- Score 70 -->
  <rect x="255" y="475" width="170" height="40" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
  <text x="340" y="492" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="600" fill="#6a4005">1项触发 = 70分</text>
  <text x="340" y="507" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3a4a30">数据基本可信，加注观察</text>

  <!-- Score 40 -->
  <rect x="460" y="475" width="170" height="40" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
  <text x="545" y="492" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="600" fill="#6b2010">2项+ = 40分</text>
  <text x="545" y="507" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6b2010">数据不可信，排名加星号</text>
</svg>