<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="480" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">L5-05 考核豁免期规则</text>
  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">三种扩编/爬坡场景的豁免判定</text>

  <!-- Scenario 1: 甲方要求扩编 -->
  <rect x="20" y="70" width="640" height="120" rx="8" fill="#fff" stroke="#2e8b6e" stroke-width="1.5"/>
  <text x="35" y="92" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#0f5040">1. 甲方要求扩编</text>
  <rect x="180" y="78" width="70" height="18" rx="9" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="215" y="91" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">可豁免</text>

  <!-- Timeline for 2 months -->
  <rect x="35" y="102" width="600" height="22" rx="4" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="0.5"/>
  <text x="40" y="117" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">第1个月（完全豁免）</text>
  <rect x="335" y="102" width="300" height="22" rx="4" fill="#faf0dc" stroke="#b88018" stroke-width="0.5"/>
  <text x="340" y="117" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">第2个月（部分豁免，关注人均GMV）</text>
  <text x="620" y="117" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">正常考核</text>

  <text x="35" y="142" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">豁免规则：扩编后2个月内不考核人均GMV排名，第3个月开始纳入考核</text>
  <text x="35" y="162" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">适用条件：有甲方书面/邮件要求扩编的记录；扩编人数 > 原有团队30%</text>
  <text x="35" y="182" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">标注方式：排名表中标注"（豁免中）"，加注星号说明原因</text>

  <!-- Scenario 2: 供应商主动扩编 -->
  <rect x="20" y="200" width="640" height="110" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="222" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#454240">2. 供应商主动扩编</text>
  <rect x="210" y="208" width="80" height="18" rx="9" fill="#faf0dc" stroke="#b88018" stroke-width="1"/>
  <text x="250" y="221" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#6a4005">部分豁免</text>

  <text x="35" y="245" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">豁免规则：仅第1个月豁免，且仅考核"熟手人均GMV"（新人不参与计算）</text>
  <text x="35" y="265" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">适用条件：供应商提前1周报备扩编计划；扩编人员有明确入职时间</text>
  <text x="35" y="285" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">标注方式：排名表中标注"（部分豁免）"，说明仅考核熟手维度</text>
  <text x="35" y="300" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#c25030" font-weight="600">注意：如扩编后人均GMV持续下降超过2个月，豁免自动取消</text>

  <!-- Scenario 3: 新产线爬坡 -->
  <rect x="20" y="320" width="640" height="110" rx="8" fill="#fff" stroke="#857d74" stroke-width="1"/>
  <text x="35" y="342" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#454240">3. 新产线爬坡</text>
  <rect x="170" y="328" width="70" height="18" rx="9" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="205" y="341" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#0f5040">可豁免</text>

  <text x="35" y="365" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">豁免规则：新产线上线后3个月内不纳入综合排名，独立追踪成长曲线</text>
  <text x="35" y="385" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">适用条件：首次承接新产线（非扩产线）；有甲方新产线上线通知</text>
  <text x="35" y="405" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">标注方式：排名表中该产线单独列出，标注"爬坡期"，不参与总分计算</text>
  <text x="35" y="420" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">第4个月起按正常标准考核，但可参考爬坡期均值作为基准线</text>

  <!-- Footer -->
  <text x="340" y="465" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">供应商管理可视化体系 L5-05</text>
</svg>