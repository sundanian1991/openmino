  <text x="10" y="315" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">制度维护</text>
  <rect x="510" y="305" width="130" height="18" rx="3" fill="#c26d3a" opacity="0.4"/>
  <text x="575" y="318" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">30min</text>

  <!-- Row 10: 月度总结 -->
  <text x="10" y="340" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">月度总结</text>
  <rect x="510" y="330" width="130" height="18" rx="3" fill="#6f8660" opacity="0.5"/>
  <text x="575" y="343" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">30min</text>

  <!-- Table -->
