  <text x="310" y="400" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#454240">频率</text>
  <rect x="360" y="385" width="100" height="22" rx="3" fill="#f2f0eb" stroke="#857d74" stroke-width="0.5"/>
  <text x="410" y="400" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#454240">单次耗时</text>
  <rect x="460" y="385" width="100" height="22" rx="3" fill="#f2f0eb" stroke="#857d74" stroke-width="0.5"/>
  <text x="510" y="400" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#454240">月均耗时</text>

  <!-- Summary totals -->
  <rect x="20" y="415" width="640" height="30" rx="6" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="30" y="434" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b3410">年老师月均总计：约 4-6 小时</text>
  <text x="350" y="434" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">对比：传统人盯人模式 30-40 小时/月</text>
  <rect x="555" y="420" width="80" height="20" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
  <text x="595" y="434" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#0f5040">节省 ~85%</text>

  <!-- Footer -->
  <text x="340" y="470" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#857d74">供应商管理可视化体系 L5-10</text>
</svg>