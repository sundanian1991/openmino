  <text x="185" y="143" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">15min</text>
  <rect x="250" y="130" width="130" height="18" rx="3" fill="#2e8b6e" opacity="0.6"/>
  <text x="315" y="143" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">15min</text>
  <rect x="380" y="130" width="130" height="18" rx="3" fill="#2e8b6e" opacity="0.6"/>
  <text x="445" y="143" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">15min</text>
