  <text x="340" y="50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">10个核心动作的月度时间分布</text>

  <!-- Gantt-like chart -->
  <text x="20" y="75" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#454240">月度分布</text>

  <!-- Week headers -->
