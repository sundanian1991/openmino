<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="500" fill="#fafaf8"/>

  <!-- Title -->
