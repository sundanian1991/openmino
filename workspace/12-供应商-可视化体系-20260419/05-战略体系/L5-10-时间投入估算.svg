  <!-- Table header -->
  <rect x="20" y="385" width="240" height="22" rx="3" fill="#f2f0eb" stroke="#857d74" stroke-width="0.5"/>
  <text x="140" y="400" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" font-weight="600" fill="#454240">动作</text>
