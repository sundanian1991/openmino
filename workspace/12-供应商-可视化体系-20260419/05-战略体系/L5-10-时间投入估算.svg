  <text x="185" y="268" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">15min</text>
  <rect x="380" y="255" width="130" height="18" rx="3" fill="#857d74" opacity="0.5"/>
  <text x="445" y="268" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">15min</text>

  <!-- Row 8: 标杆配对 -->
  <text x="10" y="290" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#454240">标杆配对</text>
  <rect x="250" y="280" width="130" height="18" rx="3" fill="#2e8b6e" opacity="0.4"/>
  <text x="315" y="293" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#fff">20min</text>

