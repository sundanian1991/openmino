<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 380">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" font-size="15" font-weight="600" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">L1-05 · 五大看板关系总览图</text>

  <!-- Source dashboards (left) -->
  <rect x="15" y="45" width="140" height="44" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="85" y="65" font-size="11" font-weight="600" fill="#6b3410" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">看板一 · 月度全景</text>
  <text x="85" y="80" font-size="9" fill="#8b4513" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">发现异常</text>

  <rect x="15" y="105" width="140" height="44" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5"/>
  <text x="85" y="125" font-size="11" font-weight="600" fill="#6b3410" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">看板二 · 周度对标</text>
  <text x="85" y="140" font-size="9" fill="#8b4513" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">发现异常</text>

  <rect x="15" y="165" width="140" height="44" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
  <text x="85" y="185" font-size="11" font-weight="600" fill="#0e4070" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">看板四 · 新供应商</text>
  <text x="85" y="200" font-size="9" fill="#1a5a90" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">成长跟踪</text>

  <rect x="15" y="225" width="140" height="44" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
  <text x="85" y="245" font-size="11" font-weight="600" fill="#3a4a30" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">现场巡检</text>
  <text x="85" y="260" font-size="9" fill="#4a6040" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">事件触发</text>

  <!-- Arrows to center -->
  <line x1="155" y1="67" x2="225" y2="120" stroke="#c26d3a" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="155" y1="127" x2="225" y2="135" stroke="#c26d3a" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="155" y1="187" x2="225" y2="155" stroke="#3a7ab8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="155" y1="247" x2="225" y2="170" stroke="#6f8660" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Center: 看板三 (deep diagnosis) -->
  <rect x="230" y="40" width="220" height="230" rx="12" fill="#454240" stroke="#2e2c2a" stroke-width="2"/>
  <text x="340" y="68" font-size="13" font-weight="600" fill="#f2f0eb" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">看板三 · 单体深度诊断</text>
  <text x="340" y="84" font-size="10" fill="#d6d2c9" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">异常后打开，定位根因</text>

  <rect x="245" y="100" width="190" height="28" rx="6" fill="#d6d2c9"/>
  <text x="340" y="118" font-size="10" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">Step 1 · 7指标交叉验证</text>

  <rect x="245" y="136" width="190" height="28" rx="6" fill="#d6d2c9"/>
  <text x="340" y="154" font-size="10" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">Step 2 · 主管胜任评估</text>

  <rect x="245" y="172" width="190" height="28" rx="6" fill="#d6d2c9"/>
  <text x="340" y="190" font-size="10" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">Step 3 · 个性/共性问题判断</text>

  <rect x="245" y="208" width="190" height="28" rx="6" fill="#d6d2c9"/>
  <text x="340" y="226" font-size="10" fill="#454240" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">Step 4 · 决定处理方式</text>

  <text x="340" y="260" font-size="10" fill="#857d74" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">所有异常汇聚于此</text>

  <!-- Arrows to narrative outputs (right) -->
  <line x1="450" y1="100" x2="490" y2="70" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="450" y1="136" x2="490" y2="130" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="450" y1="172" x2="490" y2="190" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="450" y1="208" x2="490" y2="250" stroke="#857d74" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- Narrative outputs (right, dashed borders = abstract layer) -->
  <rect x="495" y="45" width="160" height="50" rx="8" fill="#faf0e6" stroke="#c26d3a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="575" y="66" font-size="10" fill="#6b3410" font-weight="600" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">月度排名通报</text>
  <text x="575" y="82" font-size="9" fill="#8b4513" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">（看板一输出）</text>

  <rect x="495" y="108" width="160" height="50" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="575" y="129" font-size="10" fill="#0f5040" font-weight="600" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">周度对标速报</text>
  <text x="575" y="145" font-size="9" fill="#1a6b50" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">（看板二输出）</text>

  <rect x="495" y="171" width="160" height="50" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="575" y="192" font-size="10" fill="#0e4070" font-weight="600" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">预警约谈叙事</text>
  <text x="575" y="208" font-size="9" fill="#1a5a90" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">（看板三输出）</text>

  <rect x="495" y="234" width="160" height="50" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="575" y="255" font-size="10" fill="#6a4005" font-weight="600" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">巡检预警叙事</text>
  <text x="575" y="271" font-size="9" fill="#8a5a0a" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">（巡检输出）</text>

  <!-- Legend -->
  <rect x="15" y="310" width="650" height="55" rx="8" fill="#f2f0eb" stroke="#d6d2c9" stroke-width="1"/>
  <text x="30" y="330" font-size="10" fill="#454240" font-weight="600" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">关系说明</text>
  <text x="30" y="350" font-size="10" fill="#454240" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">看板一/二/四 → 发现异常 → 看板三（深度诊断） → 产出叙事。看板是"看"，叙事是"说"。</text>
  <text x="30" y="366" font-size="10" fill="#857d74" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">左侧实线框 = 数据源（具体层），右侧虚线框 = 叙事输出（抽象层）</text>
</svg>
