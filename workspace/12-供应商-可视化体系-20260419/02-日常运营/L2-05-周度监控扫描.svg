<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 400">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="400" fill="#fafaf8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="600" fill="#454240">周度监控扫描 — 3个突变信号</text>

  <!-- ==================== Card 1: 出勤异常 ==================== -->
  <rect x="30" y="55" width="195" height="160" rx="10" fill="#ffffff" stroke="#d5d3ce" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="30" y="55" width="195" height="30" rx="10" fill="#faeae5"/>
  <rect x="30" y="70" width="195" height="15" fill="#faeae5"/>
  <text x="127" y="75" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b2010">出勤异常</text>

  <!-- Row 1: 信号名称 -->
  <text x="45" y="105" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">信号</text>
  <text x="45" y="120" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">出勤率突降</text>

  <!-- Row 2: 异常标准 -->
  <text x="45" y="145" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">标准</text>
  <text x="45" y="162" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#c25030">&lt; 85%</text>

  <!-- Row 3: 触发动作 -->
  <text x="45" y="185" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">动作</text>
  <text x="45" y="200" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">当日核实：是请假还是</text>
  <text x="45" y="214" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">离职？区分原因处理</text>

  <!-- ==================== Card 2: 业绩断崖 ==================== -->
  <rect x="242" y="55" width="195" height="160" rx="10" fill="#ffffff" stroke="#d5d3ce" stroke-width="1.5"/>
  <rect x="242" y="55" width="195" height="30" rx="10" fill="#faeae5"/>
  <rect x="242" y="70" width="195" height="15" fill="#faeae5"/>
  <text x="340" y="75" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b2010">业绩断崖</text>

  <text x="257" y="105" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">信号</text>
  <text x="257" y="120" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">周GMV环比骤降</text>

  <text x="257" y="145" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">标准</text>
  <text x="257" y="162" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#c25030">&gt; 20% 下降</text>

  <text x="257" y="185" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">动作</text>
  <text x="257" y="200" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">拆分拨打量/转化率/</text>
  <text x="257" y="214" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">件均，定位断裂环节</text>

  <!-- ==================== Card 3: 流失加速 ==================== -->
  <rect x="455" y="55" width="195" height="160" rx="10" fill="#ffffff" stroke="#d5d3ce" stroke-width="1.5"/>
  <rect x="455" y="55" width="195" height="30" rx="10" fill="#faeae5"/>
  <rect x="455" y="70" width="195" height="15" fill="#faeae5"/>
  <text x="552" y="75" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="600" fill="#6b2010">流失加速</text>

  <text x="470" y="105" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">信号</text>
  <text x="470" y="120" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">周离职率异常升高</text>

  <text x="470" y="145" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">标准</text>
  <text x="470" y="162" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="600" fill="#c25030">&gt; 5% 周离职率</text>

  <text x="470" y="185" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">动作</text>
  <text x="470" y="200" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">约谈主管，了解流失</text>
  <text x="470" y="214" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#454240">原因，评估补充人力</text>

  <!-- ==================== 不需要做的事 ==================== -->
  <text x="340" y="255" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="#857d74">不需要做的事</text>

  <rect x="30" y="270" width="620" height="110" rx="10" fill="#f2f0eb" stroke="#d5d3ce" stroke-width="1"/>

  <!-- 划掉的项目 -->
  <line x1="50" y1="295" x2="210" y2="295" stroke="#857d74" stroke-width="1"/>
  <text x="130" y="298" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">不要每天看日报表</text>

  <line x1="250" y1="295" x2="420" y2="295" stroke="#857d74" stroke-width="1"/>
  <text x="335" y="298" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">不要替供应商想办法</text>

  <line x1="460" y1="295" x2="620" y2="295" stroke="#857d74" stroke-width="1"/>
  <text x="540" y="298" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">不要一次性给10个表</text>

  <line x1="50" y1="330" x2="220" y2="330" stroke="#857d74" stroke-width="1"/>
  <text x="135" y="333" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">不要自己填数据帮供应商</text>

  <line x1="260" y1="330" x2="430" y2="330" stroke="#857d74" stroke-width="1"/>
  <text x="345" y="333" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">不要用绝对值不用排名</text>

  <line x1="470" y1="330" x2="600" y2="330" stroke="#857d74" stroke-width="1"/>
  <text x="535" y="333" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#857d74">不要跳过主管直接介入</text>

  <!-- Footer -->
  <text x="340" y="370" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">原则：只扫3个突变信号，其余交给月度巡检和日常监控</text>
  <text x="340" y="390" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#857d74">时间投入：每周一 15分钟快速扫描，发现异常再深入</text>
</svg>
