<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <rect width="680" height="340" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">华啸整改验证清单</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">整改效果追踪</text>

  <rect x="40" y="80" width="600" height="220" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 基本信息 -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">约谈日期：</text>
    <text x="65" y="0" font-family="SF Mono, Monaco, monospace" font-size="9" font-weight="500" fill="#1a1a1a">2026-09-15</text>
    <text x="160" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">整改目标：</text>
    <text x="225" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">峰值比 58% → 75%</text>
  </g>

  <!-- 检查项 -->
  <g transform="translate(60, 125)">
    <!-- D1 完成 -->
    <rect width="560" height="36" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="20" cy="18" r="10" fill="#8f9b7f" />
    <text x="20" y="22" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
    <text x="40" y="15" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">D1 约谈完成，确认问题</text>
    <text x="530" y="23" font-family="system-ui, sans-serif" font-size="8" fill="#8f9b7f">已完成</text>

    <!-- D3 完成 -->
    <rect y="45" width="560" height="36" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="20" cy="63" r="10" fill="#8f9b7f" />
    <text x="20" y="67" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
    <text x="40" y="60" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">D3 整改计划提交</text>
    <text x="530" y="68" font-family="system-ui, sans-serif" font-size="8" fill="#8f9b7f">已完成</text>

    <!-- D7 完成 -->
    <rect y="90" width="560" height="36" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="20" cy="108" r="10" fill="#8f9b7f" />
    <text x="20" y="112" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
    <text x="40" y="105" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">D7 人效提升至1.3万（+8%）</text>
    <text x="530" y="113" font-family="system-ui, sans-serif" font-size="8" fill="#8f9b7f">已完成</text>

    <!-- D14 进行中 -->
    <rect y="135" width="560" height="36" rx="8" fill="rgba(201, 138, 106, 0.15)" stroke="#c98a6a" stroke-width="1" />
    <circle cx="20" cy="153" r="10" fill="#c98a6a" />
    <text x="20" y="157" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#faf9f7" text-anchor="middle">⏳</text>
    <text x="40" y="150" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">D14 峰值比复查（目标72%）</text>
    <text x="530" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#c98a6a">待验证</text>

    <!-- D28 待办 -->
    <rect y="180" width="560" height="36" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="198" r="10" fill="none" stroke="#6b6b6b" stroke-width="1" />
    <text x="20" y="202" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b6b6b" text-anchor="middle">⬜</text>
    <text x="40" y="195" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">D28 最终验证（目标75%）</text>
    <text x="530" y="203" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">待办</text>
  </g>

  <!-- 进度 -->
  <line x1="50" y1="265" x2="630" y2="265" stroke="#d4d1c7" stroke-width="1" />
  <text x="60" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">当前进度</text>
  <text x="130" y="285" font-family="SF Mono, Monaco, monospace" font-size="16" font-weight="700" fill="#8f9b7f">3/5</text>
  <text x="175" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">完成</text>
</svg>
