<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <rect width="680" height="340" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">指标映射表</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">明确数据来源与计算逻辑</text>

  <rect x="40" y="80" width="600" height="220" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(55, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">指标名</text>
    <text x="100" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">数据源</text>
    <text x="250" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">计算逻辑</text>
    <line x1="0" y1="10" x2="550" y2="10" stroke="#d4d1c7" stroke-width="1" />

    <g transform="translate(0, 25)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">排名</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">BI排行导出</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">直接取值</text>
    </g>

    <g transform="translate(0, 50)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">峰值比</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">BI峰值比导出</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">直接取值</text>
    </g>

    <g transform="translate(0, 75)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">人效</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">BI人效导出</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">直接取值</text>
    </g>

    <g transform="translate(0, 100)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">FCI</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">BI成本导出</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">直接取值</text>
    </g>

    <g transform="translate(0, 125)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">头部差距</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">计算</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">(No.1-我)/No.1</text>
    </g>

    <g transform="translate(0, 150)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">自身峰值比</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">BI峰值比导出</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">直接取值</text>
    </g>

    <g transform="translate(0, 175)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">主管胜任度</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a">手工评估</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">四维度平均</text>
    </g>

    <g transform="translate(0, 200)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">流失率</text>
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a">BI人力导出</text>
      <text x="250" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">流失/期初人数</text>
    </g>
  </g>
</svg>
