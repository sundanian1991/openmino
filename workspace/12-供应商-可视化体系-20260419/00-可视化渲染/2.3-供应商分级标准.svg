<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <rect width="680" height="420" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">供应商分级标准</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">建立供应商等级体系</text>

  <rect x="40" y="80" width="600" height="310" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <!-- S级 -->
    <rect width="560" height="60" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1.5" />
    <text x="15" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#8f9b7f">S级：金条供应商（标杆型）</text>
    <circle cx="540" cy="30" r="14" fill="#8f9b7f" />
    <text x="540" y="34" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#faf9f7" text-anchor="middle">S</text>
    <text x="15" y="40" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">连续3月Top3 │ FCI≥90% │ 份额&gt;15%</text>
    <text x="15" y="53" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">毅航、毛毛虫</text>

    <!-- A级 -->
    <rect y="70" width="560" height="60" rx="8" fill="rgba(201, 138, 106, 0.15)" stroke="#c98a6a" stroke-width="1.5" />
    <text x="15" y="90" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#c98a6a">A级：核心供应商（稳定型）</text>
    <circle cx="540" cy="100" r="14" fill="#c98a6a" />
    <text x="540" y="104" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#faf9f7" text-anchor="middle">A</text>
    <text x="15" y="110" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">Top3-8 │ FCI≥80% │ 份额&gt;8%</text>
    <text x="15" y="123" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">广达、伽玛、赛维斯</text>

    <!-- B级 -->
    <rect y="140" width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="160" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">B级：常规供应商（观察型）</text>
    <circle cx="540" cy="170" r="14" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="540" y="174" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6b6b6b" text-anchor="middle">B</text>
    <text x="15" y="180" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">Top8-15 │ FCI≥70% │ 份额&gt;3%</text>
    <text x="15" y="193" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">翰锐、岐力、华啸</text>

    <!-- C级 -->
    <rect y="210" width="560" height="60" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1.5" />
    <text x="15" y="230" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#d4845a">C级：待观察供应商（风险型）</text>
    <circle cx="540" cy="240" r="14" fill="#d4845a" />
    <text x="540" y="244" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#faf9f7" text-anchor="middle">C</text>
    <text x="15" y="250" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">Bottom3 │ FCI&lt;70% │ 份额&lt;3%</text>
    <text x="15" y="263" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">—</text>
  </g>
</svg>
