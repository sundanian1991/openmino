<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <rect width="680" height="340" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">头部集中度</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">战略选择指标</text>

  <rect x="40" y="80" width="600" height="230" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 半圆仪表盘 -->
  <g transform="translate(220, 180)">
    <!-- 背景弧 -->
    <path d="M-100,30 A100,100 0 0,1 100,30" fill="none" stroke="#e8e4dc" stroke-width="16" stroke-linecap="round" />
    <!-- 进度弧 55% -->
    <path d="M-100,30 A100,100 0 0,1 10,-60" fill="none" stroke="#c98a6a" stroke-width="16" stroke-linecap="round" />
    <!-- 指针 -->
    <line x1="0" y1="20" x2="-20" y2="-50" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />
    <circle cx="0" cy="20" r="6" fill="#1a1a1a" />
    <!-- 数值 -->
    <text x="0" y="60" font-family="SF Mono, Monaco, monospace" font-size="28" font-weight="700" fill="#1a1a1a" text-anchor="middle">55%</text>
  </g>

  <!-- 右侧数据卡片 -->
  <g transform="translate(380, 110)">
    <rect width="220" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="25" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">Top3份额</text>
    <text x="15" y="50" font-family="SF Mono, Monaco, monospace" font-size="20" font-weight="600" fill="#1a1a1a">55%</text>
  </g>

  <g transform="translate(380, 195)">
    <rect width="220" height="70" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="15" y="25" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">目标</text>
    <text x="15" y="50" font-family="SF Mono, Monaco, monospace" font-size="20" font-weight="600" fill="#8f9b7f">60%</text>
  </g>

  <!-- 状态标签 -->
  <g transform="translate(60, 280)">
    <rect width="120" height="24" rx="6" fill="rgba(143, 155, 127, 0.2)" />
    <text x="60" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#8f9b7f" text-anchor="middle">状态：接近目标 ✓</text>
  </g>
</svg>
