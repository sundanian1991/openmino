<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <rect width="680" height="400" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">异常信号速查表</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">异常识别百科全书</text>

  <rect x="40" y="80" width="600" height="290" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 表头 -->
  <g transform="translate(55, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#6b6b6b">信号名称</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#6b6b6b">触发条件</text>
    <text x="280" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#6b6b6b">优先级</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#6b6b6b">应对</text>
    <line x1="0" y1="10" x2="550" y2="10" stroke="#d4d1c7" stroke-width="1" />
  </g>

  <!-- 信号行 -->
  <g transform="translate(55, 125)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">隐性退步</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">人效↓但排名→</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(201, 138, 106, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#c98a6a" text-anchor="middle">P1</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">约谈诊断</text>
  </g>

  <g transform="translate(55, 155)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">峰值比过低</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">峰值比&lt;70%</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(212, 132, 90, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#d4845a" text-anchor="middle">P0</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">立即约谈</text>
  </g>

  <g transform="translate(55, 185)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">连续下滑</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">连续3月↓</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(212, 132, 90, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#d4845a" text-anchor="middle">P0</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">启动整改</text>
  </g>

  <g transform="translate(55, 215)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">排名骤降</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">单月↓≥5位</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(201, 138, 106, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#c98a6a" text-anchor="middle">P1</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">分析原因</text>
  </g>

  <g transform="translate(55, 245)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">FCI预警</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">FCI&lt;80%</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(201, 138, 106, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#c98a6a" text-anchor="middle">P1</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">关注利润</text>
  </g>

  <g transform="translate(55, 275)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">质量波动</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">合规率&lt;95%</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(201, 138, 106, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#c98a6a" text-anchor="middle">P1</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">流程检查</text>
  </g>

  <g transform="translate(55, 305)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">流失率异常</text>
    <text x="120" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">月流失&gt;20%</text>
    <rect x="280" y="-10" width="30" height="16" rx="4" fill="rgba(212, 132, 90, 0.2)" />
    <text x="295" y="1" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#d4845a" text-anchor="middle">P0</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">了解原因</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(55, 350)">
    <rect width="30" height="16" rx="4" fill="rgba(212, 132, 90, 0.2)" />
    <text x="40" y="12" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">P0紧急</text>

    <rect x="100" width="30" height="16" rx="4" fill="rgba(201, 138, 106, 0.2)" />
    <text x="140" y="12" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">P1重要</text>
  </g>
</svg>
