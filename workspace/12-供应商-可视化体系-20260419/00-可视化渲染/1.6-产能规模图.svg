<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <rect width="680" height="320" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">产能规模分布（万/月）</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">了解产能分布</text>

  <rect x="40" y="80" width="600" height="200" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 110)">
    <text x="0" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">毅航</text>
    <g transform="translate(60, 8)">
      <circle cx="12" cy="8" r="8" fill="#8f9b7f" /><circle cx="28" cy="8" r="8" fill="#8f9b7f" /><circle cx="44" cy="8" r="8" fill="#8f9b7f" /><circle cx="60" cy="8" r="8" fill="#8f9b7f" /><circle cx="76" cy="8" r="8" fill="#8f9b7f" /><circle cx="92" cy="8" r="8" fill="#8f9b7f" />
    </g>
    <text x="170" y="14" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">600万</text>

    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">毛毛虫</text>
    <g transform="translate(60, 46)">
      <circle cx="12" cy="8" r="8" fill="#8f9b7f" /><circle cx="28" cy="8" r="8" fill="#8f9b7f" /><circle cx="44" cy="8" r="8" fill="#8f9b7f" /><circle cx="60" cy="8" r="8" fill="#8f9b7f" /><circle cx="76" cy="8" r="8" fill="#8f9b7f" />
    </g>
    <text x="170" y="52" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">580万</text>

    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">广达</text>
    <g transform="translate(60, 84)">
      <circle cx="12" cy="8" r="8" fill="#8f9b7f" /><circle cx="28" cy="8" r="8" fill="#8f9b7f" /><circle cx="44" cy="8" r="8" fill="#8f9b7f" /><circle cx="60" cy="8" r="8" fill="#8f9b7f" />
    </g>
    <text x="170" y="90" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#1a1a1a">520万</text>

    <text x="0" y="128" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a">华啸</text>
    <g transform="translate(60, 122)">
      <circle cx="12" cy="8" r="8" fill="#d4845a" /><circle cx="28" cy="8" r="8" fill="#d4845a" />
    </g>
    <text x="170" y="128" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#d4845a">280万 ⚠️</text>

    <text x="0" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">岐力</text>
    <g transform="translate(60, 160)">
      <circle cx="12" cy="8" r="8" fill="#d4845a" /><circle cx="28" cy="8" r="8" fill="#d4845a" />
    </g>
    <text x="170" y="166" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#d4845a">320万</text>
  </g>

  <text x="60" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">气泡大小 ∝ 产能规模</text>
