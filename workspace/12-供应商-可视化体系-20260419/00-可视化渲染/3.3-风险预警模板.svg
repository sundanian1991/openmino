<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300">
  <rect width="680" height="300" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">风险预警模板</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">标准化预警通知</text>

  <rect x="40" y="80" width="600" height="180" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 优先级切换 -->
  <g transform="translate(60, 100)">
    <rect width="180" height="30" rx="6" fill="#d4845a" />
    <text x="90" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#faf9f7" text-anchor="middle">P0 紧急</text>

    <rect x="200" width="180" height="30" rx="6" fill="#c98a6a" />
    <text x="290" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#faf9f7" text-anchor="middle">P1 重要</text>

    <rect x="400" width="180" height="30" rx="6" fill="#8a8580" />
    <text x="490" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#faf9f7" text-anchor="middle">P2 一般</text>
  </g>

  <!-- 预警卡片 -->
  <g transform="translate(60, 145)">
    <rect width="560" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />

    <line x1="0" y1="35" x2="560" y2="35" stroke="#d4d1c7" stroke-width="1" />

    <text x="15" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">P0级预警：华啸连续4月下滑</text>
    <rect x="480" y="8" width="65" height="18" rx="4" fill="#d4845a" />
    <text x="512" y="20" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#faf9f7" text-anchor="middle">立即响应</text>

    <g transform="translate(15, 50)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">触发条件</text>
      <text x="0" y="14" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">峰值比 &lt; 70% 连续4月</text>
    </g>

    <g transform="translate(280, 50)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">响应时限</text>
      <text x="0" y="14" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">24小时内介入</text>
    </g>

    <g transform="translate(15, 80)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">建议行动</text>
      <rect x="60" y="-8" width="60" height="16" rx="4" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1" />
      <text x="90" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">立即约谈</text>
      <rect x="130" y="-8" width="60" height="16" rx="4" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1" />
      <text x="160" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">暂停新单</text>
      <rect x="200" y="-8" width="60" height="16" rx="4" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1" />
      <text x="230" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">日报跟踪</text>
    </g>
  </g>
</svg>
