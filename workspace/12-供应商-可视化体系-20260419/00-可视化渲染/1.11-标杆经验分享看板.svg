<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <rect width="680" height="380" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">本月标杆经验</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">复制成功经验</text>

  <rect x="40" y="80" width="600" height="270" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 经验卡片1: 毅航 -->
  <g transform="translate(55, 95)">
    <rect width="570" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <rect width="570" height="28" rx="8" fill="rgba(143, 155, 127, 0.2)" />
    <text x="15" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">毅航：新人培养方法</text>

    <g transform="translate(15, 40)">
      <circle cx="5" cy="5" r="3" fill="#8f9b7f" />
      <text x="15" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">第1周：带教名单确认</text>
    </g>
    <g transform="translate(200, 40)">
      <circle cx="5" cy="5" r="3" fill="#8f9b7f" />
      <text x="15" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">第2周：每日进度跟踪</text>
    </g>
    <g transform="translate(380, 40)">
      <circle cx="5" cy="5" r="3" fill="#8f9b7f" />
      <text x="15" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">第4周：独立单量评估</text>
    </g>

    <rect x="15" y="62" width="540" height="24" rx="6" fill="rgba(143, 155, 127, 0.15)" />
    <text x="25" y="78" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">效果：新人3个月达标率</text>
    <text x="200" y="78" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#8f9b7f">90%</text>
  </g>

  <!-- 经验卡片2: 广达 -->
  <g transform="translate(55, 215)">
    <rect width="570" height="100" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <rect width="570" height="28" rx="8" fill="rgba(143, 155, 127, 0.2)" />
    <text x="15" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">广达：质量管控SOP</text>

    <g transform="translate(15, 40)">
      <circle cx="5" cy="5" r="3" fill="#8f9b7f" />
      <text x="15" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">每日首件检验制度</text>
    </g>
    <g transform="translate(200, 40)">
      <circle cx="5" cy="5" r="3" fill="#8f9b7f" />
      <text x="15" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">问题快速响应机制</text>
    </g>
    <g transform="translate(380, 40)">
      <circle cx="5" cy="5" r="3" fill="#8f9b7f" />
      <text x="15" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">周度质量复盘会</text>
    </g>

    <rect x="15" y="62" width="540" height="24" rx="6" fill="rgba(143, 155, 127, 0.15)" />
    <text x="25" y="78" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">效果：质量合规率</text>
    <text x="160" y="78" font-family="SF Mono, Monaco, monospace" font-size="11" font-weight="600" fill="#8f9b7f">98% → 99.5%</text>
  </g>
</svg>
