<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <rect width="680" height="320" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">系统流程图</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">理解数据流转</text>

  <rect x="40" y="80" width="600" height="200" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <!-- BI系统 -->
    <rect x="0" y="0" width="100" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="50" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">BI系统</text>
    <text x="50" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">(数据源)</text>

    <text x="130" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <!-- 月度数据收集 -->
    <rect x="160" y="0" width="120" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="220" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">月度数据</text>
    <text x="220" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">收集(每月)</text>

    <text x="300" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <!-- 异常识别 -->
    <rect x="330" y="0" width="100" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="380" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">异常识别</text>
    <text x="380" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">自动分类</text>

    <text x="450" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#c98a6a">→</text>

    <!-- 可视化单元渲染 -->
    <rect x="480" y="0" width="100" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="530" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">可视化</text>
    <text x="530" y="38" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">单元渲染</text>

    <!-- 向下分支 -->
    <path d="M220,60 L220,90 L100,90 L100,100" fill="none" stroke="#c98a6a" stroke-width="1" />
    <path d="M530,60 L530,90 L450,90 L450,100" fill="none" stroke="#8f9b7f" stroke-width="1" />

    <!-- 决策支持 -->
    <rect x="0" y="100" width="100" height="50" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="50" y="120" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">决策支持</text>
    <text x="50" y="138" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">(看板)</text>

    <!-- 知识沉淀 -->
    <rect x="380" y="100" width="100" height="50" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <text x="430" y="120" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">知识沉淀</text>
    <text x="430" y="138" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">(独立空间)</text>

    <!-- 循环箭头 -->
    <path d="M580,25 Q600,25 600,125 Q600,160 590,160" fill="none" stroke="#c98a6a" stroke-width="1" stroke-dasharray="4 2" />
    <path d="M50,150 Q30,150 30,75 Q30,40 40,40" fill="none" stroke="#c98a6a" stroke-width="1" stroke-dasharray="4 2" />

    <text x="300" y="185" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">↻ 每月循环</text>
  </g>
</svg>
