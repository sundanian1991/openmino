<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <rect width="680" height="320" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">月度状态分类</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">快速判断当月整体情况</text>

  <rect x="40" y="80" width="600" height="200" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <!-- 需行动卡片 -->
    <rect width="560" height="70" rx="8" fill="rgba(212, 132, 90, 0.2)" stroke="#d4845a" stroke-width="1.5" />
    <text x="15" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#d4845a">需行动</text>
    <rect x="510" y="12" width="30" height="18" rx="4" fill="#d4845a" />
    <text x="525" y="25" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#faf9f7" text-anchor="middle">P0</text>

    <text x="15" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">华啸、岐力</text>
    <text x="15" y="58" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">→ 立即约谈，制定整改计划</text>
  </g>

  <g transform="translate(60, 185)">
    <!-- 维持观察卡片 -->
    <rect width="560" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">维持观察</text>
    <rect x="510" y="12" width="30" height="18" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="525" y="25" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b6b6b" text-anchor="middle">P1-P2</text>

    <text x="15" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">毅航、毛毛虫、广达、伽玛、赛维斯</text>
    <text x="15" y="58" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">→ 常规关注，分享标杆经验</text>
  </g>

  <!-- 汇总栏 -->
  <line x1="50" y1="265" x2="630" y2="265" stroke="#d4d1c7" stroke-width="1" />
  <text x="60" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">需行动数</text>
  <text x="150" y="285" font-family="SF Mono, Monaco, monospace" font-size="16" font-weight="700" fill="#d4845a">2 个</text>
</svg>
