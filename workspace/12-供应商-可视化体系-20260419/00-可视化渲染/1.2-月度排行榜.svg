<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <!-- 画布背景 -->
  <rect width="680" height="520" fill="#faf9f7" />

  <!-- 标题 -->
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">10月供应商排行榜</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">一眼看清排序变化</text>

  <!-- 概念容器 -->
  <rect x="40" y="80" width="600" height="400" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 排行行容器 -->
  <g transform="translate(48, 95)">
    <!-- 行1: 毅航 -->
    <rect y="0" width="584" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="16" y="29" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">1</text>
    <text x="50" y="29" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">毅航</text>
    <text x="450" y="29" font-family="system-ui, sans-serif" font-size="10" fill="#8f9b7f" font-weight="600">↑2</text>
    <text x="500" y="29" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">95%</text>
    <text x="550" y="29" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">600万</text>

    <!-- 行2: 毛毛虫 -->
    <rect y="56" width="584" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="16" y="85" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">2</text>
    <text x="50" y="85" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">毛毛虫</text>
    <text x="450" y="85" font-family="system-ui, sans-serif" font-size="10" fill="#c98a6a" font-weight="600">→</text>
    <text x="500" y="85" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">92%</text>
    <text x="550" y="85" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">580万</text>

    <!-- 行3: 广达 -->
    <rect y="112" width="584" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="16" y="141" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">3</text>
    <text x="50" y="141" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">广达</text>
    <text x="450" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a" font-weight="600">↓1</text>
    <text x="500" y="141" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">88%</text>
    <text x="550" y="141" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">520万</text>

    <!-- 行4: 伽玛 -->
    <rect y="168" width="584" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="16" y="197" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">4</text>
    <text x="50" y="197" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">伽玛</text>
    <text x="450" y="197" font-family="system-ui, sans-serif" font-size="10" fill="#8f9b7f" font-weight="600">↑1</text>
    <text x="500" y="197" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">85%</text>
    <text x="550" y="197" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">480万</text>

    <!-- 行5: 赛维斯 -->
    <rect y="224" width="584" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="16" y="253" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">5</text>
    <text x="50" y="253" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">赛维斯</text>
    <text x="450" y="253" font-family="system-ui, sans-serif" font-size="10" fill="#c98a6a" font-weight="600">→</text>
    <text x="500" y="253" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">83%</text>
    <text x="550" y="253" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">450万</text>

    <!-- 行6: 翰锐 -->
    <rect y="280" width="584" height="48" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="16" y="309" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">6</text>
    <text x="50" y="309" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">翰锐</text>
    <text x="450" y="309" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a" font-weight="600">↓2</text>
    <text x="500" y="309" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">76%</text>
    <text x="550" y="309" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">380万</text>

    <!-- 行7: 岐力 -->
    <rect y="336" width="584" height="48" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <text x="16" y="365" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a1a">7</text>
    <text x="50" y="365" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">岐力</text>
    <text x="450" y="365" font-family="system-ui, sans-serif" font-size="10" fill="#d4845a" font-weight="600">↓3</text>
    <text x="500" y="365" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#d4845a">65%</text>
    <text x="550" y="365" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#6b6b6b">320万</text>
  </g>

  <!-- 标记说明 -->
  <g transform="translate(48, 495)">
    <text font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">标记说明：</text>
    <text x="55" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">↑上升</text>
    <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a">→持平</text>
    <text x="145" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a">↓下降</text>
  </g>

  <!-- 点击提示 -->
  <text x="630" y="495" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#6b6b6b" text-anchor="end">点击行 → 查看单体深度看板</text>
</svg>
