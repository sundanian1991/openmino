<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300">
  <rect width="680" height="300" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">数据收集清单</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">确保数据完整</text>

  <rect x="40" y="80" width="600" height="180" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">基础数据（每月3日收集）</text>

    <g transform="translate(0, 20)">
      <circle cx="8" cy="8" r="6" fill="#8f9b7f" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">排名数据（Top15）</text>
    </g>

    <g transform="translate(200, 20)">
      <circle cx="8" cy="8" r="6" fill="#8f9b7f" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">峰值比数据</text>
    </g>

    <g transform="translate(350, 20)">
      <circle cx="8" cy="8" r="6" fill="#8f9b7f" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">人效数据</text>
    </g>

    <g transform="translate(0, 50)">
      <circle cx="8" cy="8" r="6" fill="#8f9b7f" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">产能规模数据</text>
    </g>

    <g transform="translate(200, 50)">
      <circle cx="8" cy="8" r="6" fill="#8f9b7f" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">FCI数据</text>
    </g>

    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">补充数据（按需收集）</text>

    <g transform="translate(0, 110)">
      <circle cx="8" cy="8" r="6" fill="none" stroke="#6b6b6b" stroke-width="1" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#6b6b6b" text-anchor="middle">○</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">主管胜任度评估（季度）</text>
    </g>

    <g transform="translate(250, 110)">
      <circle cx="8" cy="8" r="6" fill="none" stroke="#6b6b6b" stroke-width="1" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#6b6b6b" text-anchor="middle">○</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">流失率数据（季度）</text>
    </g>

    <g transform="translate(0, 140)">
      <circle cx="8" cy="8" r="6" fill="none" stroke="#6b6b6b" stroke-width="1" />
      <text x="8" y="11" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#6b6b6b" text-anchor="middle">○</text>
      <text x="20" y="11" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">质量合规率（月度）</text>
    </g>
  </g>

  <text x="60" y="245" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">数据来源：BI系统导出 + 手工补充</text>
</svg>
