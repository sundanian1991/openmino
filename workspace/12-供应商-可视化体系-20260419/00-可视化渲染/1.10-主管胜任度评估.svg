<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <rect width="680" height="340" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">主管胜任度评估</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">管理能力可视化</text>

  <rect x="40" y="80" width="600" height="230" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 仪表盘 -->
  <g transform="translate(180, 180)">
    <path d="M-80,25 A80,80 0 0,1 80,25" fill="none" stroke="#e8e4dc" stroke-width="12" stroke-linecap="round" />
    <path d="M-80,25 A80,80 0 0,1 50,-55" fill="none" stroke="#8f9b7f" stroke-width="12" stroke-linecap="round" />
    <text x="0" y="55" font-family="SF Mono, Monaco, monospace" font-size="24" font-weight="700" fill="#1a1a1a" text-anchor="middle">85%</text>
    <text x="0" y="75" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f" text-anchor="middle">优秀</text>
  </g>

  <!-- 四维度量表 -->
  <g transform="translate(320, 100)">
    <rect width="280" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="18" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">管理半径</text>
    <text x="15" y="32" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">90%</text>
    <rect x="90" y="22" width="170" height="6" rx="3" fill="#e8e4dc" />
    <rect x="90" y="22" width="153" height="6" rx="3" fill="#8f9b7f" />

    <rect y="50" width="280" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="68" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">梯队健康</text>
    <text x="15" y="82" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">82%</text>
    <rect x="90" y="72" width="170" height="6" rx="3" fill="#e8e4dc" />
    <rect x="90" y="72" width="139" height="6" rx="3" fill="#c98a6a" />

    <rect y="100" width="280" height="40" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <text x="15" y="118" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">新人培养</text>
    <text x="15" y="132" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#d4845a">78%</text>
    <rect x="90" y="122" width="170" height="6" rx="3" fill="#e8e4dc" />
    <rect x="90" y="122" width="133" height="6" rx="3" fill="#d4845a" />

    <rect y="150" width="280" height="40" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="168" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">流失率</text>
    <text x="15" y="182" font-family="SF Mono, Monaco, monospace" font-size="12" font-weight="600" fill="#1a1a1a">88%</text>
    <rect x="90" y="172" width="170" height="6" rx="3" fill="#e8e4dc" />
    <rect x="90" y="172" width="150" height="6" rx="3" fill="#8f9b7f" />
  </g>

  <!-- 关注点 -->
  <g transform="translate(60, 280)">
    <rect width="180" height="24" rx="6" fill="rgba(212, 132, 90, 0.2)" />
    <text x="90" y="17" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a" text-anchor="middle">关注点：新人培养 78%</text>
  </g>
</svg>
