<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <rect width="680" height="320" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">供应商关系网络</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">发现潜在联动风险</text>

  <rect x="40" y="80" width="600" height="200" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 关系网络图 -->
  <g transform="translate(100, 120)">
    <!-- 毅航节点 -->
    <circle cx="0" cy="0" r="30" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1.5" />
    <text y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">毅航</text>

    <!-- 毛毛虫节点 -->
    <circle cx="150" cy="0" r="30" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1.5" />
    <text y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">毛毛虫</text>

    <!-- 翰锐节点 -->
    <circle cx="0" cy="100" r="30" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1.5" />
    <text y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">翰锐</text>

    <!-- 连接线：同集团 -->
    <line x1="0" y1="30" x2="0" y2="70" stroke="#c98a6a" stroke-width="2" />
    <text x="10" y="55" font-family="system-ui, sans-serif" font-size="8" fill="#c98a6a">同集团</text>

    <!-- 连接线：共同主管 -->
    <line x1="30" y1="0" x2="120" y2="0" stroke="#8f9b7f" stroke-width="2" stroke-dasharray="4 2" />
    <text x="55" y="-10" font-family="system-ui, sans-serif" font-size="8" fill="#8f9b7f">共同主管</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(400, 150)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#c98a6a" stroke-width="2" />
    <text x="40" y="4" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">── 同集团</text>

    <line x1="0" y1="25" x2="30" y2="25" stroke="#8f9b7f" stroke-width="2" stroke-dasharray="4 2" />
    <text x="40" y="29" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">══ 共同主管</text>
  </g>

  <text x="60" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">联动风险：毅航出问题可能影响翰锐（同集团资源）</text>
</svg>
