<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <rect width="680" height="400" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">新供应商成长曲线</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">管理新供应商预期</text>

  <rect x="40" y="80" width="600" height="280" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 曲线图 -->
  <g transform="translate(60, 100)">
    <!-- Y轴网格 -->
    <line x1="40" y1="20" x2="540" y2="20" stroke="#e8e4dc" stroke-width="1" />
    <line x1="40" y1="60" x2="540" y2="60" stroke="#e8e4dc" stroke-width="1" />
    <line x1="40" y1="100" x2="540" y2="100" stroke="#e8e4dc" stroke-width="1" />

    <!-- 里程碑线 -->
    <line x1="130" y1="10" x2="130" y2="130" stroke="#d4d1c7" stroke-dasharray="2 2" />
    <line x1="290" y1="10" x2="290" y2="130" stroke="#d4d1c7" stroke-dasharray="2 2" />
    <line x1="540" y1="10" x2="540" y2="130" stroke="#d4d1c7" stroke-dasharray="2 2" />

    <!-- 理想曲线 -->
    <path d="M40,130 Q130,100 290,60 T540,20" fill="none" stroke="#c98a6a" stroke-width="2" />

    <!-- 实际曲线 -->
    <path d="M40,130 Q130,105 290,75 T540,40" fill="none" stroke="#d4845a" stroke-width="2" stroke-dasharray="4 2" />

    <!-- Y轴标签 -->
    <text x="35" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="end">100%</text>
    <text x="35" y="64" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="end">70%</text>
    <text x="35" y="104" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="end">30%</text>

    <!-- X轴标签 -->
    <text x="130" y="145" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">M1</text>
    <text x="290" y="145" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">M3</text>
    <text x="540" y="145" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">M6</text>

    <!-- 图例 -->
    <line x1="400" y1="-5" x2="440" y2="-5" stroke="#c98a6a" stroke-width="2" />
    <text x="450" y="-2" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">理想</text>
    <line x1="400" y1="8" x2="440" y2="8" stroke="#d4845a" stroke-width="2" stroke-dasharray="4 2" />
    <text x="450" y="11" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">实际</text>
  </g>

  <!-- 里程碑卡片 -->
  <g transform="translate(60, 260)">
    <rect width="180" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="15" cy="15" r="5" fill="#8f9b7f" />
    <text x="25" y="18" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">M1 准入期（0-30%）</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">目标：熟悉流程，建立数据</text>
    <text x="15" y="50" font-family="system-ui, sans-serif" font-size="8" fill="#1a1a1a">实际：25%，符合预期 ✓</text>
  </g>

  <g transform="translate(260, 260)">
    <rect width="180" height="80" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <circle cx="15" cy="15" r="5" fill="#d4845a" />
    <text x="25" y="18" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">M3 爬坡期（30-70%）</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">目标：快速成长，补齐人力</text>
    <text x="15" y="50" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a">实际：45%，⚠️ 滞后，需关注</text>
  </g>

  <g transform="translate(460, 260)">
    <rect width="180" height="80" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="15" cy="15" r="5" fill="none" stroke="#6b6b6b" stroke-width="1" />
    <text x="25" y="18" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">M6 达标期（≥80%）</text>
    <text x="15" y="35" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">目标：进入稳定期</text>
    <text x="15" y="50" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">预测达成率待观察</text>
  </g>
</svg>
