<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <rect width="680" height="320" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">准入评估框架</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">新供应商准入标准</text>

  <rect x="40" y="80" width="600" height="200" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">维度</text>
    <text x="80" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">权重</text>
    <text x="160" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b" text-anchor="middle">得分</text>
    <text x="280" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">加权分</text>
    <line x1="0" y1="10" x2="540" y2="10" stroke="#d4d1c7" stroke-width="1" />

    <g transform="translate(0, 25)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">人力规模</text>
      <text x="80" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">25%</text>
      <text x="160" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">80/100</text>
      <text x="280" y="0" font-family="SF Mono, Monaco, monospace" font-size="9" font-weight="600" fill="#1a1a1a">20</text>
    </g>

    <g transform="translate(0, 55)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">历史表现</text>
      <text x="80" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">30%</text>
      <text x="160" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">90/100</text>
      <text x="280" y="0" font-family="SF Mono, Monaco, monospace" font-size="9" font-weight="600" fill="#8f9b7f">27</text>
    </g>

    <g transform="translate(0, 85)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">设施条件</text>
      <text x="80" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">20%</text>
      <text x="160" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">70/100</text>
      <text x="280" y="0" font-family="SF Mono, Monaco, monospace" font-size="9" font-weight="600" fill="#c98a6a">14</text>
    </g>

    <g transform="translate(0, 115)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">主管能力</text>
      <text x="80" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">15%</text>
      <text x="160" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">85/100</text>
      <text x="280" y="0" font-family="SF Mono, Monaco, monospace" font-size="9" font-weight="600" fill="#8f9b7f">12.75</text>
    </g>

    <g transform="translate(0, 145)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">配合意愿</text>
      <text x="80" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">10%</text>
      <text x="160" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">95/100</text>
      <text x="280" y="0" font-family="SF Mono, Monaco, monospace" font-size="9" font-weight="600" fill="#8f9b7f">9.5</text>
    </g>
  </g>

  <!-- 总分 -->
  <line x1="50" y1="255" x2="630" y2="255" stroke="#d4d1c7" stroke-width="1" />
  <text x="60" y="275" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">总分</text>
  <text x="130" y="275" font-family="SF Mono, Monaco, monospace" font-size="18" font-weight="700" fill="#8f9b7f">83.25</text>

  <rect x="350" y="260" width="200" height="24" rx="6" fill="rgba(143, 155, 127, 0.2)" />
  <text x="450" y="277" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#8f9b7f" text-anchor="middle">准入线：80分 ✓</text>
</svg>
