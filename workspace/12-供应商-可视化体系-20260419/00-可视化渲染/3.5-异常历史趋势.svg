<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <rect width="680" height="340" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">异常历史热力图</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">发现系统性问题（近6个月）</text>

  <rect x="40" y="80" width="600" height="220" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 表头 -->
  <g transform="translate(60, 100)">
    <text x="100" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">5月</text>
    <text x="170" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">6月</text>
    <text x="240" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">7月</text>
    <text x="310" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">8月</text>
    <text x="380" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">9月</text>
    <text x="450" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">10月</text>
  </g>

  <!-- 热力图网格 -->
  <g transform="translate(60, 115)">
    <!-- 毅航 -->
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">毅航</text>
    <rect x="70" y="5" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="140" y="5" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="210" y="5" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="280" y="5" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="350" y="5" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="420" y="5" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <text x="490" y="21" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">·</text>

    <!-- 毛毛虫 -->
    <text x="0" y="55" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">毛毛虫</text>
    <rect x="70" y="40" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="140" y="40" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="210" y="40" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="280" y="40" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="350" y="40" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="420" y="40" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <text x="490" y="56" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">·</text>

    <!-- 广达 -->
    <text x="0" y="90" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">广达</text>
    <rect x="70" y="75" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="140" y="75" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="210" y="75" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="280" y="75" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <rect x="350" y="75" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="420" y="75" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <text x="490" y="91" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">1次</text>

    <!-- 华啸 - 连续异常 -->
    <text x="0" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a">华啸</text>
    <rect x="70" y="110" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="140" y="110" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <rect x="210" y="110" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <rect x="280" y="110" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <rect x="350" y="110" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <rect x="420" y="110" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <text x="490" y="126" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a" font-weight="600">5次</text>

    <!-- 岐力 - 连续异常 -->
    <text x="0" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a">岐力</text>
    <rect x="70" y="145" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="140" y="145" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="210" y="145" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="280" y="145" width="60" height="24" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <rect x="350" y="145" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <rect x="420" y="145" width="60" height="24" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <text x="490" y="161" font-family="system-ui, sans-serif" font-size="8" fill="#d4845a" font-weight="600">2次</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(60, 275)">
    <rect width="24" height="16" rx="4" fill="#f5f4f1" stroke="#e8e4dc" stroke-width="1" />
    <text x="30" y="13" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">· 无异常</text>

    <rect x="100" width="24" height="16" rx="4" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1" />
    <text x="130" y="13" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">▲ 有异常</text>
  </g>

  <!-- 发现 -->
  <rect x="350" y="265" width="290" height="30" rx="6" fill="rgba(212, 132, 90, 0.15)" />
  <text x="365" y="285" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a">发现：华啸连续5月异常，岐力连续2月</text>
</svg>
