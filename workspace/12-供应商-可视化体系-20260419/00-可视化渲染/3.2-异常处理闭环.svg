<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <rect width="680" height="320" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">异常处理六步闭环</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">异常处理的完整SOP</text>

  <rect x="40" y="80" width="600" height="200" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 上排三个步骤 -->
  <g transform="translate(60, 100)">
    <!-- 步骤1 -->
    <rect width="160" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="15" r="8" fill="#d4845a" />
    <text x="20" y="18" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">1</text>
    <text x="35" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">问题识别</text>
    <text x="15" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">华啸峰值比58%</text>
    <rect x="15" y="48" width="40" height="14" rx="4" fill="#d4845a" />
    <text x="35" y="58" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">P0</text>

    <!-- 步骤2 -->
    <rect x="200" width="160" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="220" cy="15" r="8" fill="#c98a6a" />
    <text x="220" y="18" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">2</text>
    <text x="235" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">后果分析</text>
    <text x="215" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">产能不足</text>
    <text x="215" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">无法接单</text>

    <!-- 步骤3 -->
    <rect x="400" width="160" height="70" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="420" cy="15" r="8" fill="#8f9b7f" />
    <text x="420" y="18" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">3</text>
    <text x="435" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">应对措施</text>
    <text x="415" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">约谈+整改</text>
    <text x="415" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">资源支持</text>
    <rect x="500" y="48" width="40" height="14" rx="4" fill="#8f9b7f" />
    <text x="520" y="58" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">行动</text>
  </g>

  <!-- 下排三个步骤 -->
  <g transform="translate(60, 185)">
    <!-- 步骤6 -->
    <rect width="160" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="20" cy="15" r="8" fill="#c98a6a" />
    <text x="20" y="18" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">6</text>
    <text x="35" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">闭环归档</text>
    <text x="15" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">经验沉淀</text>
    <text x="15" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">案例库更新</text>

    <!-- 步骤5 -->
    <rect x="200" width="160" height="70" rx="8" fill="rgba(143, 155, 127, 0.15)" stroke="#8f9b7f" stroke-width="1" />
    <circle cx="220" cy="15" r="8" fill="#8f9b7f" />
    <text x="220" y="18" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">5</text>
    <text x="235" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">持续监控</text>
    <text x="215" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">4周后达标</text>
    <text x="215" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">关闭异常 ✓</text>
    <rect x="300" y="48" width="24" height="14" rx="4" fill="#8f9b7f" />
    <text x="312" y="58" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#faf9f7" text-anchor="middle">✓</text>

    <!-- 步骤4 -->
    <rect x="400" width="160" height="70" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <circle cx="420" cy="15" r="8" fill="#c98a6a" />
    <text x="420" y="18" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#faf9f7" text-anchor="middle">4</text>
    <text x="435" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">效果验证</text>
    <text x="415" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">1周后72%</text>
    <text x="415" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f">接近目标75%</text>
  </g>

  <!-- 循环箭头 -->
  <path d="M60,255 Q60,280 80,280 L560,280 Q580,280 580,255" fill="none" stroke="#c98a6a" stroke-width="1" stroke-dasharray="4 2" />
  <path d="M230,185 L230,175 L250,180 Z" fill="#c98a6a" />
  <path d="M450,180 L470,175 L470,185 Z" fill="#c98a6a" />

  <text x="320" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">↻ 循环直到问题解决</text>
</svg>
