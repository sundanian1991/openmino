<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360">
  <rect width="680" height="360" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">供应商独立空间结构</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">知识沉淀标准化</text>

  <rect x="40" y="80" width="600" height="240" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a">供应商管理/</text>

    <g transform="translate(15, 25)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a">├──</text>
      <text x="20" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">供应商-毅航/</text>
      <g transform="translate(35, 20)">
        <text x="0" y="0" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   ├── README.md（概览+当前状态）</text>
        <text x="0" y="15" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   ├── 指标追踪.md（月度指标表）</text>
        <text x="0" y="30" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   ├── 约谈记录/（按日期文件夹）</text>
        <text x="0" y="45" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   │   ├── 2026-09-15-峰值比下滑约谈.md</text>
        <text x="0" y="60" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   │   └── 2026-07-20-质量波动约谈.md</text>
        <text x="0" y="75" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   ├── 异常记录.md（异常清单+闭环状态）</text>
        <text x="0" y="90" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">│   └── 份额调整历史.md</text>
      </g>
    </g>

    <g transform="translate(15, 150)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a">├──</text>
      <text x="20" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">供应商-毛毛虫/</text>
    </g>

    <g transform="translate(15, 175)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#c98a6a">└──</text>
      <text x="20" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">...</text>
    </g>
  </g>

  <!-- 元数据约定 -->
  <rect x="60" y="260" width="540" height="40" rx="6" fill="rgba(201, 138, 106, 0.15)" />
  <text x="75" y="278" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">元数据约定</text>
  <text x="180" y="278" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">：</text>
  <text x="195" y="278" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">每个供应商一个独立文件夹 • README.md 始终显示当前状态 • 约谈记录按日期组织</text>

  <rect x="60" y="310" width="540" height="30" rx="6" fill="rgba(143, 155, 127, 0.15)" />
  <text x="75" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#1a1a1a">便于追溯和复盘</text>
</svg>
