<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <defs>
    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#c98a6a" />
    </marker>
  </defs>

  <!-- 画布背景 -->
  <rect width="680" height="520" fill="#faf9f7" />

  <!-- 标题 -->
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">供应商对比矩阵</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">异常发现的第一入口</text>

  <!-- 概念容器 -->
  <rect x="40" y="80" width="600" height="380" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <!-- 四象限背景 -->
  <!-- 左下 P0 问题型 - 焦橙20% -->
  <rect x="41" y="261" width="298" height="198" rx="0" fill="rgba(212, 132, 90, 0.2)" />
  <!-- 右上 P1 标杆型 - 橄榄绿15% -->
  <rect x="341" y="81" width="298" height="198" rx="0" fill="rgba(143, 155, 127, 0.15)" />

  <!-- 坐标轴线 -->
  <line x1="340" y1="90" x2="340" y2="450" stroke="#1a1a1a" stroke-width="1" />
  <line x1="50" y1="270" x2="630" y2="270" stroke="#1a1a1a" stroke-width="1" />

  <!-- 轴标签 -->
  <text x="340" y="475" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b" text-anchor="middle">头部差距（大 → 小）</text>
  <text x="50" y="275" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b" transform="rotate(-90, 50, 275)" text-anchor="end">自身峰值比（高 → 低）</text>

  <!-- 象限标签 -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="9" fill="#d4845a" font-weight="500">P0 问题型</text>
  <text x="590" y="110" font-family="system-ui, sans-serif" font-size="9" fill="#8f9b7f" font-weight="500">P1 标杆型</text>
  <text x="80" y="110" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">P2 普通型</text>
  <text x="590" y="430" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">P3 稳健型</text>

  <!-- 散点气泡 -->
  <!-- 毅航 - P1标杆型 (右上) -->
  <g transform="translate(500, 150)">
    <circle r="35" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">毅航</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#8f9b7f" text-anchor="middle">95%</text>
  </g>

  <!-- 毛毛虫 - P1标杆型 (右上) -->
  <g transform="translate(450, 200)">
    <circle r="32" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">毛毛虫</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#8f9b7f" text-anchor="middle">92%</text>
  </g>

  <!-- 广达 - P3稳健型 (右下) -->
  <g transform="translate(480, 380)">
    <circle r="28" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">广达</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">88%</text>
  </g>

  <!-- 华啸 - P0问题型 (左下) - 醒目 -->
  <g transform="translate(150, 380)">
    <circle r="25" fill="rgba(212, 132, 90, 0.3)" stroke="#d4845a" stroke-width="1.5" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">华啸</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#d4845a" text-anchor="middle">58%</text>
  </g>

  <!-- 岐力 - P0问题型 (左下) -->
  <g transform="translate(220, 350)">
    <circle r="22" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">岐力</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#d4845a" text-anchor="middle">65%</text>
  </g>

  <!-- 伽玛 - P2普通型 (左上) -->
  <g transform="translate(150, 180)">
    <circle r="26" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1a1a1a" text-anchor="middle">伽玛</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">78%</text>
  </g>

  <!-- 赛维斯 - P3稳健型 (右下) -->
  <g transform="translate(550, 400)">
    <circle r="24" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1" />
    <text y="-5" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a" text-anchor="middle">赛维斯</text>
    <text y="8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="middle">85%</text>
  </g>

  <!-- 气泡大小说明 -->
  <g transform="translate(50, 495)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#6b6b6b" stroke-width="1" />
    <text x="15" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#6b6b6b">气泡大小 = 产能规模</text>
  </g>

  <!-- 点击提示 -->
  <text x="630" y="495" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#6b6b6b" text-anchor="end">点击气泡 → 查看单体深度看板</text>
</svg>
