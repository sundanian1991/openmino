<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <rect width="680" height="480" fill="#faf9f7" />
  <text x="40" y="38" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1a1a1a">供应商管理四大战略维度</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">战略全景图，季度回顾</text>

  <rect x="40" y="80" width="600" height="370" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1.5" />

  <g transform="translate(60, 100)">
    <!-- 战略选择 -->
    <rect width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">战略选择</text>
    <text x="15" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">头部集中 / 分散布局</text>
    <text x="400" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">头部集中度：55%</text>
    <text x="520" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#8f9b7f">✓</text>

    <!-- 箭头 -->
    <text x="280" y="75" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a" text-anchor="middle">↓</text>

    <!-- 供应商培育 -->
    <rect y="85" width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="105" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">供应商培育</text>
    <text x="15" y="123" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">新人成长 / 能力提升</text>
    <text x="400" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">新增2家进入爬坡期</text>

    <!-- 箭头 -->
    <text x="280" y="160" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a" text-anchor="middle">↓</text>

    <!-- 动态调整 -->
    <rect y="170" width="560" height="60" rx="8" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1" />
    <text x="15" y="190" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">动态调整</text>
    <text x="15" y="208" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">进退清退 / 份额调整</text>
    <text x="400" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">无清退/份额调整</text>
    <text x="520" y="208" font-family="system-ui, sans-serif" font-size="14" fill="#8f9b7f">✓</text>

    <!-- 箭头 -->
    <text x="280" y="245" font-family="system-ui, sans-serif" font-size="16" fill="#c98a6a" text-anchor="middle">↓</text>

    <!-- 合规风控 -->
    <rect y="255" width="560" height="60" rx="8" fill="rgba(212, 132, 90, 0.15)" stroke="#d4845a" stroke-width="1" />
    <text x="15" y="275" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a1a">合规风控</text>
    <text x="15" y="293" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b">底线管理 / 风险预警</text>
    <text x="400" y="293" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">华啸预警，已处理</text>
    <text x="520" y="293" font-family="system-ui, sans-serif" font-size="14" fill="#8f9b7f">✓</text>
  </g>

  <!-- 循环迭代提示 -->
  <text x="340" y="435" font-family="system-ui, sans-serif" font-size="9" fill="#6b6b6b" text-anchor="middle">↻ 循环迭代：每月评估，季度调整</text>
</svg>
