<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="440" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-09 个性问题 vs 共性问题判断</text>
<text x="20" y="56" class="f s" fill="#857d74">发现供应商下降后，先判断是个性问题还是共性问题，处理方向完全不同</text>

<!-- Root node -->
<g transform="translate(190,76)">
<rect width="300" height="40" rx="8" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
<text x="150" y="25" class="f b" fill="#454240" text-anchor="middle">某供应商 GMV 下降</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="116" x2="340" y2="136" stroke="#857d74" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Question -->
<g transform="translate(200,140)">
<rect width="280" height="36" rx="18" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="140" y="23" class="f b" fill="#0e4070" text-anchor="middle">只有他一家在降吗？</text>
</g>

<!-- Three branches -->
<!-- Left: 个性问题 -->
<g transform="translate(16,200)">
<line x1="324" y1="-24" x2="12" y2="8" stroke="#c25030" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="200" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="2"/>
<text x="100" y="28" class="f b" fill="#6b2010" text-anchor="middle" font-size="14">个性问题</text>
<line x1="16" y1="36" x2="184" y2="36" stroke="#c25030" stroke-width="0.5"/>
<text x="16" y="56" class="f n" fill="#454240">判断条件：</text>
<text x="16" y="74" class="f s" fill="#454240">只有这一家供应商在下降</text>
<text x="16" y="90" class="f s" fill="#454240">同产线其他供应商正常</text>
<text x="16" y="110" class="f n" fill="#454240">处理方向：</text>
<text x="16" y="128" class="f s" fill="#454240">约谈该供应商</text>
<text x="16" y="144" class="f s" fill="#454240">走归因诊断流程</text>
<text x="16" y="160" class="f s" fill="#454240">7指标交叉验证定位根因</text>
<text x="16" y="180" class="f s" fill="#454240">主管胜任评估</text>
</g>

<!-- Middle: 共性问题 -->
<g transform="translate(240,200)">
<line x1="100" y1="-24" x2="100" y2="8" stroke="#b88018" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="200" rx="12" fill="#faf0dc" stroke="#b88018" stroke-width="2"/>
<text x="100" y="28" class="f b" fill="#6a4005" text-anchor="middle" font-size="14">共性问题</text>
<line x1="16" y1="36" x2="184" y2="36" stroke="#b88018" stroke-width="0.5"/>
<text x="16" y="56" class="f n" fill="#454240">判断条件：</text>
<text x="16" y="74" class="f s" fill="#454240">多家供应商同时转化率</text>
<text x="16" y="90" class="f s" fill="#454240">下降，不是单家问题</text>
<text x="16" y="110" class="f n" fill="#454240">处理方向：</text>
<text x="16" y="128" class="f s" fill="#454240">反馈策略组/量化组</text>
<text x="16" y="144" class="f s" fill="#454240">可能是名单/策略问题</text>
<text x="16" y="160" class="f s" fill="#454240">需要策略侧排查和调整</text>
<text x="16" y="180" class="f s" fill="#454240">不约谈供应商</text>
</g>

<!-- Right: 产线问题 -->
<g transform="translate(464,200)">
<line x1="-124" y1="-24" x2="176" y2="8" stroke="#3a7ab8" stroke-width="1.5" marker-end="url(#a)"/>
<rect width="200" height="200" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="2"/>
<text x="100" y="28" class="f b" fill="#0e4070" text-anchor="middle" font-size="14">产线问题</text>
<line x1="16" y1="36" x2="184" y2="36" stroke="#3a7ab8" stroke-width="0.5"/>
<text x="16" y="56" class="f n" fill="#454240">判断条件：</text>
<text x="16" y="74" class="f s" fill="#454240">某个产线所有供应商</text>
<text x="16" y="90" class="f s" fill="#454240">都在下降</text>
<text x="16" y="110" class="f n" fill="#454240">处理方向：</text>
<text x="16" y="128" class="f s" fill="#454240">找业务管理协调</text>
<text x="16" y="144" class="f s" fill="#454240">可能是产线层面的系统性</text>
<text x="16" y="160" class="f s" fill="#454240">问题，需要产线级调整</text>
<text x="16" y="180" class="f s" fill="#454240">不归因为供应商问题</text>
</g>

<!-- Special case -->
<g transform="translate(16,412)">
<rect width="648" height="20" rx="6" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
<text x="12" y="14" class="f s" fill="#3a4a30">特例：全行业降但你家没降 → 表扬 + 确认名单分配是否公平</text>
</g>
</svg>