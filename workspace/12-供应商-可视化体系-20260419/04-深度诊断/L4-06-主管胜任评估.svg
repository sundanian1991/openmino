<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="560" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-06 主管胜任评估 — 5项可观察指标</text>
<text x="20" y="56" class="f s" fill="#857d74">作为甲方，无法直接评估对方主管能力，但可以从外部观察管理效果</text>

<!-- 5 Indicator Cards -->
<!-- Card 1 -->
<g transform="translate(16,76)">
<rect width="648" height="60" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#0f5040">1. 团队稳定度</text>
<text x="12" y="42" class="f s" fill="#454240">公式：月度流失率 = 离职人数 / 月初总人数</text>
<rect x="320" y="12" width="100" height="24" rx="4" fill="#2e8b6e"/>
<text x="370" y="28" class="f s" fill="#fff" text-anchor="middle">达标线：&lt; 8%/月</text>
<text x="440" y="28" class="f s" fill="#454240">反映：主管能不能留住人</text>
</g>

<!-- Card 2 -->
<g transform="translate(16,144)">
<rect width="648" height="60" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#0f5040">2. 出勤稳定度</text>
<text x="12" y="42" class="f s" fill="#454240">公式：月度日均有效出勤率</text>
<rect x="320" y="12" width="100" height="24" rx="4" fill="#2e8b6e"/>
<text x="370" y="28" class="f s" fill="#fff" text-anchor="middle">达标线：&gt; 90%</text>
<text x="440" y="28" class="f s" fill="#454240">反映：日常管理是否严格</text>
</g>

<!-- Card 3 -->
<g transform="translate(16,212)">
<rect width="648" height="60" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#0f5040">3. 人效趋势</text>
<text x="12" y="42" class="f s" fill="#454240">近3个月人均GMV趋势（升/平/降）</text>
<rect x="320" y="12" width="130" height="24" rx="4" fill="#2e8b6e"/>
<text x="385" y="28" class="f s" fill="#fff" text-anchor="middle">达标线：不连续2月降</text>
<text x="470" y="28" class="f s" fill="#454240">反映：能否维持或提升产出</text>
</g>

<!-- Card 4 -->
<g transform="translate(16,280)">
<rect width="648" height="60" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#0f5040">4. 响应质量</text>
<text x="12" y="42" class="f s" fill="#454240">预警后48小时内提交原因分析的比例</text>
<rect x="320" y="12" width="100" height="24" rx="4" fill="#2e8b6e"/>
<text x="370" y="28" class="f s" fill="#fff" text-anchor="middle">达标线：&gt; 80%</text>
<text x="440" y="28" class="f s" fill="#454240">反映：重视程度和管理成熟度</text>
</g>

<!-- Card 5 -->
<g transform="translate(16,348)">
<rect width="648" height="60" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#0f5040">5. 整改执行力</text>
<text x="12" y="42" class="f s" fill="#454240">承诺的整改动作按期完成率</text>
<rect x="320" y="12" width="100" height="24" rx="4" fill="#2e8b6e"/>
<text x="370" y="28" class="f s" fill="#fff" text-anchor="middle">达标线：&gt; 70%</text>
<text x="440" y="28" class="f s" fill="#454240">反映：说到能不能做到</text>
</g>

<!-- Three judgment results -->
<g transform="translate(16,428)">
<text x="324" y="16" class="f b" fill="#454240" text-anchor="middle">主管胜任判定结果</text>

<!-- 5 items - Competent -->
<rect x="0" y="24" width="206" height="56" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="103" y="46" class="f b" fill="#0f5040" text-anchor="middle">5项全达标</text>
<text x="103" y="66" class="f n" fill="#0f5040" text-anchor="middle">胜任</text>
<text x="103" y="78" class="f s" fill="#2e8b6e" text-anchor="middle">管理可靠，持续关注</text>

<!-- 3-4 items - Attention -->
<rect x="221" y="24" width="206" height="56" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="324" y="46" class="f b" fill="#6a4005" text-anchor="middle">3-4项达标</text>
<text x="324" y="66" class="f n" fill="#6a4005" text-anchor="middle">需关注</text>
<text x="324" y="78" class="f s" fill="#b88018" text-anchor="middle">了解短板，针对性谈话</text>

<!-- <=2 items - Incompetent -->
<rect x="442" y="24" width="206" height="56" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="545" y="46" class="f b" fill="#6b2010" text-anchor="middle">≤2项达标</text>
<text x="545" y="66" class="f n" fill="#6b2010" text-anchor="middle">不胜任信号</text>
<text x="545" y="78" class="f s" fill="#c25030" text-anchor="middle">约谈重点谈管理能力</text>
</g>

<!-- Bottom note -->
<text x="20" y="520" class="f s" fill="#857d74">注：5项指标均为可观察的外部指标，不依赖对主管的直接评估。</text>
</svg>