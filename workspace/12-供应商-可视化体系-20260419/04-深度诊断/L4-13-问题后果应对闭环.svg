<rect x="326" width="170" height="40" rx="6" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="334" y="16" class="f s" fill="#454240">话术有没有调整？</text>
<text x="334" y="30" class="f s" fill="#454240">是共性问题还是单家？</text>

<rect x="504" width="160" height="40" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="512" y="16" class="f s" fill="#454240">共性问题→反馈策略组</text>
<text x="512" y="30" class="f s" fill="#2e8b6e">个性问题→培训+对标</text>
