<rect x="326" width="170" height="40" rx="6" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="334" y="16" class="f s" fill="#454240">哪一维度的问题？</text>
<text x="334" y="30" class="f s" fill="#454240">7指标哪个异常最明显？</text>

<rect x="504" width="160" height="40" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="512" y="16" class="f s" fill="#454240">立即约谈+7指标诊断</text>
<text x="512" y="30" class="f s" fill="#2e8b6e">48小时内出整改计划</text>
