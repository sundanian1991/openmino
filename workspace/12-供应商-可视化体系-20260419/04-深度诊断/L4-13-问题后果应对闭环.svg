<rect x="326" width="170" height="28" rx="6" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
<text x="411" y="18" class="f b" fill="#0e4070" text-anchor="middle">答案准备</text>

<rect x="504" width="160" height="28" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="584" y="18" class="f b" fill="#0f5040" text-anchor="middle">辅导动作</text>
</g>

<!-- Row 1: 流失率超标 -->
<g transform="translate(16,112)">
