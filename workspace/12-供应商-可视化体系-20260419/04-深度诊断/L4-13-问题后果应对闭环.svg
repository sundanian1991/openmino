<!-- Background -->
<rect width="680" height="400" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-13 问题 → 后果 → 应对闭环</text>
<text x="20" y="56" class="f s" fill="#857d74">18个核心信号的闭环处理：问题发现 → 后果评估 → 答案准备 → 辅导动作</text>

<!-- Headers -->
<g transform="translate(16,76)">
<rect width="150" height="28" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
