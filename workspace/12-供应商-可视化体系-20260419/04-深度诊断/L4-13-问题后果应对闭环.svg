<text x="166" y="30" class="f s" fill="#c25030">客户结构变差</text>

<rect x="326" width="170" height="40" rx="6" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="334" y="16" class="f s" fill="#454240">大额客户流失到哪了？</text>
<text x="334" y="30" class="f s" fill="#454240">坐席大额能力有没有降？</text>

<rect x="504" width="160" height="40" rx="6" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="512" y="16" class="f s" fill="#454240">推荐大额案例学习</text>
<text x="512" y="30" class="f s" fill="#2e8b6e">配对大额能力强的供应商</text>
