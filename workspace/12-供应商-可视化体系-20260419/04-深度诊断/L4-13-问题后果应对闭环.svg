<text x="512" y="16" class="f s" fill="#454240">约谈管理节奏</text>
<text x="512" y="30" class="f s" fill="#2e8b6e">要求恢复日常管理动作</text>
</g>

<!-- Row 4: 转化率下降 -->
<g transform="translate(16,250)">
<rect width="150" height="40" rx="6" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="8" y="16" class="f s" fill="#454240">转化率降5pp</text>

<rect x="158" width="160" height="40" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
