<!-- Row 6: GMV骤降 -->
<g transform="translate(16,342)">
<rect width="150" height="40" rx="6" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="8" y="16" class="f s" fill="#454240">GMV降幅&gt;20%</text>

<rect x="158" width="160" height="40" rx="6" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
<text x="166" y="16" class="f s" fill="#454240">月度目标无法完成</text>
