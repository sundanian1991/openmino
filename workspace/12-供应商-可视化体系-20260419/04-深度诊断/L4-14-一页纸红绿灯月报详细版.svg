<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 680">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="680" fill="#faf8f5"/>

<!-- Phone frame -->
<rect x="100" y="16" width="480" height="650" rx="24" fill="#fff" stroke="#857d74" stroke-width="2"/>
<rect x="108" y="24" width="464" height="634" rx="20" fill="#faf8f5"/>

<!-- Title inside phone -->
<text x="340" y="56" class="f t" fill="#454240" text-anchor="middle">月度红绿灯通报</text>
<text x="340" y="74" class="f s" fill="#857d74" text-anchor="middle">2026年4月</text>

<!-- Section 1: 需要关注 (Red) -->
<g transform="translate(124,92)">
<rect width="432" height="120" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="16" y="26" class="f b" fill="#6b2010">需要关注（2家）</text>
<circle cx="390" cy="20" r="6" fill="#c25030"/>

<line x1="16" y1="34" x2="416" y2="34" stroke="#c25030" stroke-width="0.5"/>

<!-- Supplier row 1 -->
<text x="16" y="54" class="f b" fill="#454240">赛维斯</text>
<text x="16" y="70" class="f s" fill="#454240">熟手人均37.1万，峰值比65%，头部差距48%</text>
<text x="16" y="86" class="f s" fill="#454240">根因：管理松弛，人均拨打量从80降至58通/天</text>
<text x="16" y="106" class="f s" fill="#6b2010">动作：约谈，48小时内提交整改计划</text>

<!-- Supplier row 2 -->
<text x="16" y="126" class="f b" fill="#454240">汇讯</text>
<text x="16" y="142" class="f s" fill="#454240">流失率12%/月，团队稳定度不达标</text>
<text x="16" y="158" class="f s" fill="#454240">根因：主管管理能力不足，5项评估仅2项达标</text>
<text x="16" y="178" class="f s" fill="#6b2010">动作：约谈主管，评估是否需要换人</text>
</g>

<!-- Section 2: 需要跟踪 (Amber) -->
<g transform="translate(124,224)">
<rect width="432" height="100" rx="12" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="16" y="26" class="f b" fill="#6a4005">需要跟踪（3家）</text>
<circle cx="390" cy="20" r="6" fill="#b88018"/>

<line x1="16" y1="34" x2="416" y2="34" stroke="#b88018" stroke-width="0.5"/>

<!-- Supplier row 1 -->
<text x="16" y="54" class="f b" fill="#454240">伽玛</text>
<text x="16" y="70" class="f s" fill="#454240">新人占比35%，新人拉低幅度22%，熟手人均正常</text>
<text x="16" y="88" class="f s" fill="#6a4005">跟踪：新人成长计划执行情况</text>

<!-- Supplier row 2 -->
<text x="16" y="108" class="f b" fill="#454240">岐力</text>
<text x="16" y="124" class="f s" fill="#454240">转化率本月降3pp，但未达5pp预警线</text>
<text x="16" y="142" class="f s" fill="#6a4005">跟踪：下月转化率是否恢复</text>
</g>

<!-- Section 3: 正常运行 (Green) -->
<g transform="translate(124,336)">
<rect width="432" height="120" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="16" y="26" class="f b" fill="#0f5040">正常运行（5家）</text>
<circle cx="390" cy="20" r="6" fill="#2e8b6e"/>

<line x1="16" y1="34" x2="416" y2="34" stroke="#2e8b6e" stroke-width="0.5"/>

<text x="16" y="54" class="f b" fill="#454240">毅航</text>
<text x="16" y="70" class="f s" fill="#454240">峰值比92%，头部差距12%，标杆型，保持</text>

<text x="16" y="90" class="f b" fill="#454240">毛毛虫</text>
<text x="16" y="106" class="f s" fill="#454240">峰值比88%，头部差距15%，标杆型，保持</text>

<text x="16" y="126" class="f b" fill="#454240">翰锐</text>
<text x="16" y="142" class="f s" fill="#454240">峰值比85%，头部差距18%，尽力型，评估产线适配</text>
</g>

<!-- Bottom: 一句话结论 -->
<g transform="translate(124,472)">
<rect width="432" height="72" rx="12" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
<text x="16" y="22" class="f b" fill="#454240">一句话结论</text>
<line x1="16" y1="28" x2="416" y2="28" stroke="#857d74" stroke-width="0.5"/>
<text x="16" y="46" class="f s" fill="#454240">本月整体稳定，但赛维斯管理松弛需重点关注，伽玛新人稀释需</text>
<text x="16" y="60" class="f s" fill="#454240">跟踪。毅航、毛毛虫继续保持标杆地位。</text>
</g>

<!-- Bottom: 指标说明 -->
<g transform="translate(124,556)">
<rect width="432" height="80" rx="12" fill="#faf8f5" stroke="#857d74" stroke-width="1" stroke-dasharray="2,2"/>
<text x="16" y="22" class="f s" fill="#857d74">指标说明</text>
<text x="16" y="38" class="f s" fill="#857d74">峰值比 = 本月熟手人均GMV / 近6月熟手峰值（&lt;65%预警）</text>
<text x="16" y="52" class="f s" fill="#857d74">头部差距 = 本月熟手人均GMV / 同产线第1名（&gt;40%预警）</text>
<text x="16" y="66" class="f s" fill="#857d74">新人拉低 = (熟手人均-总人均)/熟手人均（&gt;20%需关注）</text>
</g>
</svg>