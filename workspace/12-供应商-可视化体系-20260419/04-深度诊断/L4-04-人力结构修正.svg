<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520">
<defs>
<linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#c25030" stop-opacity="0.3"/>
<stop offset="100%" stop-color="#2e8b6e" stop-opacity="0.3"/>
</linearGradient>
</defs>
<style>
.f{font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.t{font-size:15px;font-weight:600}
.b{font-size:12px;font-weight:600}
.n{font-size:11px}
.s{font-size:10px}
</style>

<!-- Background -->
<rect width="680" height="520" fill="#faf8f5"/>

<!-- Title -->
<text x="20" y="36" class="f t" fill="#454240">L4-04 人力结构修正场景表</text>
<text x="20" y="56" class="f s" fill="#857d74">人均GMV必须基于"熟手"计算，不是总人数。不同人力场景需不同修正方式。</text>

<!-- Header row -->
<g transform="translate(16,72)">
<rect width="180" height="32" rx="6" fill="#454240"/>
<text x="90" y="22" class="f b" fill="#fff" text-anchor="middle">人力场景</text>
<rect x="188" width="220" height="32" rx="6" fill="#454240"/>
<text x="298" y="22" class="f b" fill="#fff" text-anchor="middle">修正方式</text>
<rect x="416" width="248" height="32" rx="6" fill="#454240"/>
<text x="540" y="22" class="f b" fill="#fff" text-anchor="middle">原因</text>
</g>

<!-- Row 1: 新人占比>30% -->
<g transform="translate(16,112)">
<rect width="180" height="72" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#6b2010">新人占比 &gt; 30%</text>
<text x="12" y="42" class="f s" fill="#857d74">（入职&lt;30天）</text>
<text x="12" y="62" class="f s" fill="#6b2010">Coral 预警</text>

<rect x="188" width="220" height="72" rx="8" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="200" y="22" class="f n" fill="#454240">分母改用"熟手人数"</text>
<text x="200" y="38" class="f s" fill="#454240">同时标注"新人拉低幅度"</text>
<text x="200" y="56" class="f s" fill="#454240">公式：</text>
<text x="200" y="68" class="f s" fill="#857d74">新人拉低 = (熟手人均 - 总人均)/熟手人均</text>

<rect x="416" width="248" height="72" rx="8" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="428" y="22" class="f n" fill="#454240">新人不出产能，按总人数</text>
<text x="428" y="38" class="f s" fill="#454240">算会严重失真。修正后才能</text>
<text x="428" y="54" class="f s" fill="#454240">真实反映熟手产能水平</text>
</g>

<!-- Row 2: 总人数变化>20% -->
<g transform="translate(16,192)">
<rect width="180" height="72" rx="8" fill="#faf0dc" stroke="#b88018" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#6a4005">总人数变化 &gt; 20%</text>
<text x="12" y="42" class="f s" fill="#857d74">（扩编或缩编）</text>
<text x="12" y="62" class="f s" fill="#6a4005">Amber 注意</text>

<rect x="188" width="220" height="72" rx="8" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="200" y="22" class="f n" fill="#454240">同时看两个指标：</text>
<text x="200" y="40" class="f n" fill="#454240">1. 总量GMV</text>
<text x="200" y="56" class="f n" fill="#454240">2. 熟手人均GMV</text>

<rect x="416" width="248" height="72" rx="8" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="428" y="22" class="f n" fill="#454240">只看人均会忽略规模变化</text>
<text x="428" y="38" class="f s" fill="#454240">的影响。总量涨了但人均</text>
<text x="428" y="54" class="f s" fill="#454240">降了 = 消化能力不足</text>
</g>

<!-- Row 3: 正常波动 -->
<g transform="translate(16,272)">
<rect width="180" height="72" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="12" y="24" class="f b" fill="#0f5040">正常波动</text>
<text x="12" y="42" class="f s" fill="#857d74">新人&lt;30%，人数变化&lt;20%</text>
<text x="12" y="62" class="f s" fill="#0f5040">Teal 正常</text>

<rect x="188" width="220" height="72" rx="8" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="200" y="30" class="f n" fill="#454240">正常计算，不做修正</text>
<text x="200" y="50" class="f s" fill="#857d74">在正常范围内</text>

<rect x="416" width="248" height="72" rx="8" fill="#faf8f5" stroke="#857d74" stroke-width="1"/>
<text x="428" y="30" class="f n" fill="#454240">人力结构稳定，熟手占比</text>
<text x="428" y="50" class="f s" fill="#857d74">合理，直接计算即可</text>
</g>

<!-- Example calculation box -->
<g transform="translate(16,360)">
<rect width="648" height="140" rx="12" fill="#f2f0eb" stroke="#857d74" stroke-width="1.5"/>
<text x="16" y="28" class="f b" fill="#454240">示例计算：赛维斯 — 新人稀释场景</text>
<line x1="16" y1="36" x2="632" y2="36" stroke="#857d74" stroke-width="0.5"/>

<text x="16" y="56" class="f n" fill="#454240">总GMV = 5200万，总人数190人（熟手140人，新人50人），近6月熟手峰值 = 42万</text>

<!-- Wrong calculation -->
<rect x="16" y="66" width="290" height="58" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1" stroke-dasharray="3,2"/>
<text x="26" y="84" class="f b" fill="#6b2010">按总人数算（错误）</text>
<text x="26" y="100" class="f s" fill="#454240">总人均 = 5200/190 = 27.4万</text>
<text x="26" y="114" class="f s" fill="#454240">自身峰值比 = 27.4/42 = 65%</text>

<!-- Correct calculation -->
<rect x="320" y="66" width="300" height="58" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="330" y="84" class="f b" fill="#0f5040">按熟手算（正确）</text>
<text x="330" y="100" class="f s" fill="#454240">熟手人均 = 5200/140 = 37.1万</text>
<text x="330" y="114" class="f s" fill="#454240">自身峰值比 = 37.1/42 = 88%（正常）</text>

<text x="16" y="136" class="f s" fill="#857d74">结论：人均下降主要是新人稀释，不是管理问题。新人拉低幅度 = (37.1-27.4)/37.1 = 26%</text>
</g>
</svg>