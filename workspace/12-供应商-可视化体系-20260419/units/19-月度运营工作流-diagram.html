<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度运营工作流 · Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12); --rule-solid: rgba(120,113,108,0.25);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .frame { max-width: 680px; width: 100%; }
    .eyebrow { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem; }
    h1 { font-family: var(--serif); font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem; }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Timeline · Supplier Operations</p>
    <h1>月度运营工作流</h1>

    <svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== TIMELINE BASELINE ===== -->
      <line x1="80" y1="180" x2="600" y2="180" stroke="#b5523a" stroke-width="2"/>

      <!-- Tick marks -->
      <line x1="120" y1="176" x2="120" y2="184" stroke="#b5523a" stroke-width="1.5"/>
      <line x1="260" y1="176" x2="260" y2="184" stroke="#b5523a" stroke-width="1.5"/>
      <line x1="400" y1="176" x2="400" y2="184" stroke="#b5523a" stroke-width="1.5"/>
      <line x1="540" y1="176" x2="540" y2="184" stroke="#b5523a" stroke-width="1.5"/>

      <!-- ===== EVENT NODES ===== -->
      <!-- D1 数据收集 -->
      <circle cx="120" cy="180" r="6" fill="#b5523a" stroke="#faf7f2" stroke-width="2"/>
      <!-- D3 分析定位 -->
      <circle cx="260" cy="180" r="6" fill="#b5523a" stroke="#faf7f2" stroke-width="2"/>
      <!-- D6 约谈沟通 -->
      <circle cx="400" cy="180" r="6" fill="#b5523a" stroke="#faf7f2" stroke-width="2"/>
      <!-- D9 汇报同步 -->
      <circle cx="540" cy="180" r="6" fill="#b5523a" stroke="#faf7f2" stroke-width="2"/>

      <!-- ===== FLOW ARROWS ===== -->
      <line x1="132" y1="180" x2="252" y2="180" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="272" y1="180" x2="392" y2="180" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="412" y1="180" x2="532" y2="180" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== TOP LABEL CARDS (D1, D6) ===== -->
      <!-- D1-D2 数据收集 -->
      <rect x="56" y="56" width="128" height="64" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="120" y="80" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">数据收集</text>
      <text x="120" y="96" fill="var(--mono)" font-size="8" fill="#57534e" text-anchor="middle" letter-spacing="0.06em">D1-D2</text>
      <text x="120" y="112" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">产能/人效/FCI</text>

      <!-- D6-D8 约谈沟通 -->
      <rect x="336" y="56" width="128" height="64" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="400" y="80" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">约谈沟通</text>
      <text x="400" y="96" fill="var(--mono)" font-size="8" fill="#57534e" text-anchor="middle" letter-spacing="0.06em">D6-D8</text>
      <text x="400" y="112" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">P0供应商约谈</text>

      <!-- ===== BOTTOM LABEL CARDS (D3, D9) ===== -->
      <!-- D3-D5 分析定位 -->
      <rect x="196" y="248" width="128" height="64" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="260" y="272" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">分析定位</text>
      <text x="260" y="288" fill="var(--mono)" font-size="8" fill="#57534e" text-anchor="middle" letter-spacing="0.06em">D3-D5</text>
      <text x="260" y="304" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">异常清单分级</text>

      <!-- D9-D10 汇报同步 -->
      <rect x="476" y="248" width="128" height="64" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="540" y="272" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">汇报同步</text>
      <text x="540" y="288" fill="var(--mono)" font-size="8" fill="#57534e" text-anchor="middle" letter-spacing="0.06em">D9-D10</text>
      <text x="540" y="304" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">月度报告PPT</text>

      <!-- ===== DATE LABELS ON TICKS ===== -->
      <rect x="106" y="192" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="120" y="202" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">D1</text>

      <rect x="246" y="192" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="260" y="202" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">D3</text>

      <rect x="386" y="192" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="400" y="202" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">D6</text>

      <rect x="526" y="192" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="540" y="202" fill="#57534e" font-size="8" font-family="var(--mono)" text-anchor="middle" letter-spacing="0.06em">D9</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="396" x2="640" y2="396" stroke="var(--rule)" stroke-width="0.8"/>
      <circle cx="80" cy="384" r="4" fill="#b5523a"/>
      <text x="92" y="387" fill="#57534e" font-size="8.5" font-family="var(--sans)">时间节点</text>
      <line x1="172" y1="384" x2="204" y2="384" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="212" y="387" fill="#57534e" font-size="8.5" font-family="var(--sans)">流程方向</text>
      <rect x="280" y="378" width="12" height="12" rx="2" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="300" y="387" fill="#57534e" font-size="8.5" font-family="var(--sans)">阶段卡片</text>
    </svg>
  </div>
</body>
</html>
