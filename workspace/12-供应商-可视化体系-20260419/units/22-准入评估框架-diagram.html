<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入评估框架 · Pyramid</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12); --rule-solid: rgba(120,113,108,0.25);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .frame { max-width: 680px; width: 100%; }
    .eyebrow { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem; }
    h1 { font-family: var(--serif); font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem; }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Pyramid · Admission Assessment</p>
    <h1>准入评估框架</h1>

    <svg viewBox="0 0 680 488" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== PYRAMID ===== -->
      <!-- Tier 1: 综合评分 (top, narrowest) -->
      <rect x="240" y="40" width="200" height="56" rx="8" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1.5"/>
      <text x="340" y="64" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">综合评分</text>
      <text x="340" y="84" fill="#b5523a" font-size="16" font-family="var(--mono)" font-weight="600" text-anchor="middle">76 / 100</text>

      <!-- Arrow down -->
      <line x1="340" y1="96" x2="340" y2="124" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Tier 2: 资质评估 (一票否决) -->
      <rect x="180" y="124" width="320" height="64" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <rect x="188" y="132" width="6" height="48" rx="2" fill="#b5523a"/>
      <text x="204" y="152" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600">资质评估</text>
      <text x="204" y="168" fill="#57534e" font-size="9" font-family="var(--mono)">一票否决 · 准入门槛</text>
      <text x="380" y="152" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">✓ 营业执照</text>
      <text x="380" y="168" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">✓ 注册资本 ≥ 500万</text>

      <!-- Arrow down -->
      <line x1="340" y1="188" x2="340" y2="216" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Tier 3: 能力 + 资源 (two columns) -->
      <rect x="60" y="216" width="272" height="80" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <rect x="68" y="224" width="6" height="48" rx="2" fill="#b5523a"/>
      <text x="84" y="244" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600">能力评估</text>
      <text x="84" y="260" fill="#57534e" font-size="9" font-family="var(--mono)">产能 / 人效 / 管理</text>
      <text x="84" y="280" fill="#1c1917" font-size="11" font-family="var(--mono)" font-weight="600">28 / 40</text>

      <rect x="348" y="216" width="272" height="80" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <rect x="356" y="224" width="6" height="48" rx="2" fill="#b5523a"/>
      <text x="372" y="244" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600">资源评估</text>
      <text x="372" y="260" fill="#57534e" font-size="9" font-family="var(--mono)">招聘 / 培训体系</text>
      <text x="372" y="280" fill="#1c1917" font-size="11" font-family="var(--mono)" font-weight="600">22 / 30</text>

      <!-- Arrows down -->
      <line x1="196" y1="296" x2="196" y2="324" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="484" y1="296" x2="484" y2="324" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Tier 4: 风险评估 (base, widest) -->
      <rect x="60" y="324" width="560" height="64" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <rect x="68" y="332" width="6" height="48" rx="2" fill="#b5523a"/>
      <text x="84" y="352" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600">风险评估</text>
      <text x="84" y="368" fill="#57534e" font-size="9" font-family="var(--mono)">合规 / 财务 / 客户结构</text>
      <text x="400" y="352" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">合规 10/10</text>
      <text x="400" y="368" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">财务 8/10</text>
      <text x="540" y="352" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">客户 8/10</text>
      <text x="540" y="368" fill="#b5523a" font-size="14" font-family="var(--mono)" font-weight="600" text-anchor="middle">26/30</text>

      <!-- ===== PASS THRESHOLD ===== -->
      <line x1="60" y1="416" x2="620" y2="416" stroke="var(--rule)" stroke-width="1"/>
      <rect x="276" y="408" width="128" height="16" rx="8" fill="#faf7f2"/>
      <rect x="276" y="408" width="128" height="16" rx="8" fill="rgba(143,155,127,0.12)" stroke="#8f9b7f" stroke-width="1"/>
      <text x="340" y="420" fill="#8f9b7f" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle">合格线 70分</text>

      <!-- ===== RESULT ===== -->
      <rect x="220" y="444" width="240" height="36" rx="18" fill="#faf7f2"/>
      <rect x="220" y="444" width="240" height="36" rx="18" fill="rgba(143,155,127,0.12)" stroke="#8f9b7f" stroke-width="1.5"/>
      <text x="340" y="467" fill="#8f9b7f" font-size="13" font-family="var(--sans)" font-weight="600" text-anchor="middle">✓ 准予准入 → 试用期3个月</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="496" x2="640" y2="496" stroke="var(--rule)" stroke-width="0.8"/>
      <rect x="80" y="466" width="12" height="12" rx="2" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="100" y="475" fill="#57534e" font-size="8.5" font-family="var(--sans)">评估维度</text>
      <rect x="188" y="466" width="12" height="12" rx="6" fill="var(--accent-tint)" stroke="#b5523a" stroke-width="1"/>
      <text x="208" y="475" fill="#57534e" font-size="8.5" font-family="var(--sans)">综合评分</text>
    </svg>
  </div>
</body>
</html>
