<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主管胜任评估仪表盘</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Assessment Panel</p>
    <h1>主管胜任评估仪表盘</h1>

    <svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#f2ede4" rx="8" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6" rx="8"/>

      <!-- ===== COMPOSITE SCORE (top-right) ===== -->
      <rect x="544" y="24" width="112" height="52" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
      <text x="600" y="42" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">COMPOSITE</text>
      <text x="584" y="66" fill="#1c1917" font-size="20" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">85</text>
      <text x="608" y="66" fill="#78716c" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">/100</text>

      <!-- ===== FOUR DIMENSION CARDS (2x2 grid) ===== -->

      <!-- D1: 管理半径 90% — top-left -->
      <rect x="24" y="92" width="308" height="108" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      <!-- Label mask -->
      <rect x="36" y="84" width="72" height="16" fill="#f2ede4"/>
      <text x="40" y="96" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.14em">D1 · SPAN</text>

      <text x="44" y="124" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">管理半径</text>
      <text x="312" y="124" fill="#1c1917" font-size="24" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">90</text>

      <!-- Progress bar -->
      <rect x="44" y="140" width="280" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="44" y="140" width="252" height="8" rx="4" fill="#57534e"/>

      <text x="44" y="164" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.04em">supervisor-to-staff ratio · healthy</text>

      <!-- D2: 梯队健康 82% — top-right -->
      <rect x="348" y="92" width="308" height="108" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      <rect x="360" y="84" width="84" height="16" fill="#f2ede4"/>
      <text x="364" y="96" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.14em">D2 · TALENT</text>

      <text x="368" y="124" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">梯队健康</text>
      <text x="636" y="124" fill="#1c1917" font-size="24" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">82</text>

      <rect x="368" y="140" width="280" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="368" y="140" width="230" height="8" rx="4" fill="#57534e"/>

      <text x="368" y="164" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.04em">pipeline depth · adequate</text>

      <!-- D3: 新人培养 78% — bottom-left — CORAL (weakness) -->
      <rect x="24" y="220" width="308" height="108" rx="6" fill="#faf7f2"/>
      <rect x="24" y="220" width="308" height="108" rx="6" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.40)" stroke-width="1"/>
      <rect x="36" y="212" width="68" height="16" fill="#f2ede4"/>
      <text x="40" y="224" fill="#b5523a" font-size="7" font-weight="600" font-family="'Geist Mono', monospace" letter-spacing="0.14em">D3 · WEAK</text>

      <text x="44" y="252" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">新人培养</text>
      <text x="312" y="252" fill="#b5523a" font-size="24" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">78</text>

      <rect x="44" y="268" width="280" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="44" y="268" width="218" height="8" rx="4" fill="#b5523a"/>

      <text x="44" y="292" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.04em">onboarding cycle · needs attention</text>

      <!-- D4: 流失率 88% — bottom-right -->
      <rect x="348" y="220" width="308" height="108" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>
      <rect x="360" y="212" width="56" height="16" fill="#f2ede4"/>
      <text x="364" y="224" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.14em">D4 · RET</text>

      <text x="368" y="252" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">流失率</text>
      <text x="636" y="252" fill="#1c1917" font-size="24" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">88</text>

      <rect x="368" y="268" width="280" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
      <rect x="368" y="268" width="246" height="8" rx="4" fill="#57534e"/>

      <text x="368" y="292" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.04em">turnover control · strong</text>

      <!-- ===== EVALUATION SUMMARY ===== -->
      <rect x="24" y="352" width="632" height="52" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.15)" stroke-width="1"/>

      <!-- Grade label -->
      <text x="44" y="376" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">评估：</text>
      <text x="84" y="376" fill="#57534e" font-size="10" font-weight="600" font-family="'Geist', sans-serif">优秀（85 分）</text>

      <!-- Focus area label -->
      <text x="44" y="394" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">关注：</text>
      <rect x="84" y="384" width="100" height="16" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.25)" stroke-width="0.8"/>
      <text x="134" y="396" fill="#b5523a" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">新人培养 78%</text>

      <text x="200" y="394" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">培训周期偏长，建议分享标杆经验或专项辅导</text>

      <!-- ===== SCORING NOTE ===== -->
      <text x="32" y="432" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.06em">SCORING · weighted average across 4 dimensions · threshold = 80</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="24" y1="452" x2="656" y2="452" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <text x="36" y="468" fill="#78716c" font-size="7" font-weight="500" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="88" y="460" width="12" height="8" rx="2" fill="#57534e"/>
      <text x="108" y="468" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Healthy (80+)</text>

      <rect x="192" y="460" width="12" height="8" rx="2" fill="rgba(181,82,58,0.15)" stroke="rgba(181,82,58,0.40)" stroke-width="0.8"/>
      <text x="212" y="468" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Weakness (&lt;80)</text>

      <rect x="312" y="460" width="12" height="8" rx="2" fill="rgba(28,25,23,0.06)"/>
      <text x="332" y="468" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Bar background</text>
    </svg>
  </div>
</body>
</html>
