<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>约谈框架 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12); --rule-solid: rgba(120,113,108,0.25);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .frame { max-width: 680px; width: 100%; }
    .eyebrow { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem; }
    h1 { font-family: var(--serif); font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem; }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Meeting Framework</p>
    <h1>约谈框架</h1>

    <svg viewBox="0 0 680 548" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== START ===== -->
      <rect x="276" y="32" width="128" height="32" rx="16" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1.5"/>
      <text x="340" y="53" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">约谈开始</text>

      <!-- Arrow: start → P1 -->
      <line x1="340" y1="64" x2="340" y2="80" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== PHASE 1: 数据展示 ===== -->
      <rect x="220" y="80" width="240" height="16" rx="4" fill="var(--accent-tint)"/>
      <text x="340" y="93" fill="#b5523a" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">P1 · 数据展示（5 min）</text>

      <rect x="244" y="104" width="192" height="44" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="340" y="124" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">展示近3月趋势，标注异常</text>
      <text x="340" y="140" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">"请看峰值比曲线变化"</text>

      <!-- Arrow: P1 → P2 -->
      <line x1="340" y1="148" x2="340" y2="180" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== PHASE 2: 引导提问 ===== -->
      <rect x="220" y="180" width="240" height="16" rx="4" fill="var(--accent-tint)"/>
      <text x="340" y="193" fill="#b5523a" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">P2 · 引导提问（10 min）</text>

      <rect x="244" y="204" width="192" height="60" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="340" y="224" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">"你注意到这个变化了吗？"</text>
      <text x="340" y="240" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">让对方自己说出原因</text>
      <text x="340" y="256" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">而非直接指责</text>

      <!-- Arrow: P2 → P3 -->
      <line x1="340" y1="264" x2="340" y2="300" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== PHASE 3: 行动计划 ===== -->
      <rect x="220" y="300" width="240" height="16" rx="4" fill="var(--accent-tint)"/>
      <text x="340" y="313" fill="#b5523a" font-size="9" font-family="var(--mono)" font-weight="500" text-anchor="middle" letter-spacing="0.08em">P3 · 行动计划（10 min）</text>

      <rect x="244" y="324" width="192" height="44" rx="8" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="340" y="344" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">共同制定目标，明确节点</text>
      <text x="340" y="360" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">约定验收标准，双方签字</text>

      <!-- Arrow: P3 → follow-up -->
      <line x1="340" y1="368" x2="340" y2="404" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== FOLLOW-UP ===== -->
      <rect x="244" y="404" width="192" height="44" rx="8" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1.5"/>
      <text x="340" y="424" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">跟进：周报/日报追踪</text>
      <text x="340" y="440" fill="#57534e" font-size="10" font-family="var(--sans)" text-anchor="middle">下次约谈验证效果</text>

      <!-- Arrow: follow-up → end -->
      <line x1="340" y1="448" x2="340" y2="480" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- ===== END ===== -->
      <rect x="276" y="480" width="128" height="32" rx="16" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1.5"/>
      <text x="340" y="501" fill="#1c1917" font-size="12" font-family="var(--sans)" font-weight="600" text-anchor="middle">约谈结束</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="532" x2="640" y2="532" stroke="var(--rule)" stroke-width="0.8"/>
      <rect x="80" y="520" width="12" height="12" rx="6" fill="#faf7f2" stroke="var(--rule-solid)" stroke-width="1"/>
      <text x="100" y="529" fill="#57534e" font-size="8.5" font-family="var(--sans)">开始/结束</text>
      <rect x="188" y="520" width="12" height="12" rx="2" fill="#faf7f2" stroke="var(--rule)" stroke-width="1"/>
      <text x="208" y="529" fill="#57534e" font-size="8.5" font-family="var(--sans)">步骤</text>
      <rect x="268" y="520" width="12" height="12" rx="4" fill="var(--accent-tint)" stroke="var(--accent)" stroke-width="1"/>
      <text x="288" y="529" fill="#57534e" font-size="8.5" font-family="var(--sans)">阶段标签</text>
    </svg>
  </div>
</body>
</html>
