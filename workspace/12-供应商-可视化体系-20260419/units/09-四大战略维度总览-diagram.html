<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四大战略维度总览</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #faf7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .frame { max-width: 720px; width: 100%; }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 7.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #78716c;
    margin-bottom: 0.375rem;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #1c1917;
    margin-bottom: 1.25rem;
  }
  .diagram-wrap {
    background: #f2ede4;
    border: 1px solid rgba(28,25,23,0.12);
    border-radius: 8px;
    padding: 1px;
  }
  svg { width: 100%; display: block; }
</style>
</head>
<body>
<div class="frame">
  <p class="eyebrow">Strategy Overview · Architecture</p>
  <h1>四大战略维度总览</h1>
  <div class="diagram-wrap">
    <svg viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== ARROWS FIRST (behind boxes) ===== -->

      <!-- D1 → D2 -->
      <line x1="340" y1="120" x2="340" y2="152" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="316" y="128" width="48" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="138" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">drives</text>

      <!-- D2 → D3 -->
      <line x1="340" y1="252" x2="340" y2="284" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="316" y="260" width="48" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="270" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">drives</text>

      <!-- D3 → D4 -->
      <line x1="340" y1="384" x2="340" y2="416" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="316" y="392" width="48" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="402" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">drives</text>

      <!-- D4 → D1 cycle (right side curve) -->
      <path d="M 544 452 C 600 452, 600 48, 544 48" fill="none" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>
      <rect x="564" y="244" width="52" height="12" rx="2" fill="#faf7f2"/>
      <text x="590" y="254" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">iterate</text>

      <!-- ===== BOXES (on top of arrows) ===== -->

      <!-- D1: 战略选择 (focal) -->
      <rect x="140" y="28" width="400" height="88" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <rect x="140" y="28" width="400" height="88" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="156" y="46" fill="#b5523a" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">DIM 01</text>
      <text x="340" y="72" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">战略选择</text>
      <text x="340" y="88" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">头部集中 / 分散布局</text>
      <line x1="156" y1="96" x2="524" y2="96" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <text x="340" y="110" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">头部集中度 55% -- 符合预期</text>

      <!-- D2: 供应商培育 -->
      <rect x="140" y="160" width="400" height="88" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="156" y="178" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">DIM 02</text>
      <text x="340" y="204" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">供应商培育</text>
      <text x="340" y="220" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">新人成长 / 能力提升</text>
      <line x1="156" y1="228" x2="524" y2="228" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <text x="340" y="242" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">新增 2 家进入爬坡期 -- 进行中</text>

      <!-- D3: 动态调整 -->
      <rect x="140" y="292" width="400" height="88" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="156" y="310" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">DIM 03</text>
      <text x="340" y="336" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">动态调整</text>
      <text x="340" y="352" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">进退清退 / 份额调整</text>
      <line x1="156" y1="360" x2="524" y2="360" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <text x="340" y="374" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">无清退 / 份额调整 -- 正常</text>

      <!-- D4: 合规风控 -->
      <rect x="140" y="424" width="400" height="88" rx="6" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="156" y="442" fill="#78716c" font-size="7.5" font-family="'Geist Mono', monospace" letter-spacing="0.18em" font-weight="500">DIM 04</text>
      <text x="340" y="468" fill="#1c1917" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">合规风控</text>
      <text x="340" y="484" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">底线管理 / 风险预警</text>
      <line x1="156" y1="492" x2="524" y2="492" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <text x="340" y="506" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">华啸预警，已处理 -- 已解决</text>

      <!-- ===== LEGEND ===== -->
      <line x1="36" y1="544" x2="644" y2="544" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <rect x="36" y="560" width="16" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="60" y="568" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Focal dimension</text>

      <rect x="196" y="560" width="16" height="10" rx="2" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="220" y="568" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Dimension</text>

      <line x1="356" y1="565" x2="380" y2="565" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="388" y="568" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Drives</text>

      <line x1="456" y1="565" x2="480" y2="565" stroke="#b5523a" stroke-width="1" marker-end="url(#arrow-accent)"/>
      <text x="488" y="568" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Cycle</text>

      <!-- Editorial note -->
      <text x="36" y="600" fill="#78716c" font-size="11" font-family="'Instrument Serif', serif" font-style="italic">每月评估，季度调整，四维闭环迭代。</text>
    </svg>
  </div>
</div>
</body>
</html>
