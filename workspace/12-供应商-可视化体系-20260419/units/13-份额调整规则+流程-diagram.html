<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>份额调整规则+流程</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #faf7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .frame { max-width: 720px; width: 100%; }
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 7.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #78716c;
    margin-bottom: 0.375rem;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #1c1917;
    margin-bottom: 1.25rem;
  }
  .diagram-wrap {
    background: #f2ede4;
    border: 1px solid rgba(28,25,23,0.12);
    border-radius: 8px;
    padding: 1px;
  }
  svg { width: 100%; display: block; }
</style>
</head>
<body>
<div class="frame">
  <p class="eyebrow">Share Adjustment · Flowchart</p>
  <h1>份额调整规则 + 流程</h1>
  <div class="diagram-wrap">
    <svg viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== FLOW: top to bottom ===== -->

      <!-- START: oval -->
      <rect x="260" y="28" width="160" height="36" rx="18" fill="rgba(28,25,23,0.03)" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
      <text x="340" y="50" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">月初评估启动</text>

      <!-- Arrow: start → step1 -->
      <line x1="340" y1="64" x2="340" y2="84" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- STEP 1: 评估表现 -->
      <rect x="220" y="88" width="240" height="48" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="232" y="106" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">STEP 1</text>
      <text x="340" y="124" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">评估供应商业绩表现</text>

      <!-- Arrow: step1 → diamond1 -->
      <line x1="340" y1="136" x2="340" y2="156" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- DIAMOND 1: 表现是否优秀? -->
      <polygon points="340,160 420,196 340,232 260,196" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <text x="340" y="192" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">表现优秀?</text>

      <!-- Arrow: diamond1 YES → step2 (left branch: 加份额) -->
      <line x1="260" y1="196" x2="196" y2="196" stroke="#57534e" stroke-width="1"/>
      <line x1="196" y1="196" x2="196" y2="260" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="172" y="204" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="186" y="214" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">yes</text>

      <!-- Arrow: diamond1 NO → diamond2 (right branch) -->
      <line x1="420" y1="196" x2="484" y2="196" stroke="#57534e" stroke-width="1"/>
      <line x1="484" y1="196" x2="484" y2="260" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="432" y="204" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="446" y="214" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">no</text>

      <!-- STEP 2a: 加份额 (left, focal) -->
      <rect x="100" y="264" width="192" height="48" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="112" y="282" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">INCREASE</text>
      <text x="196" y="300" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">加份额 +3%</text>

      <!-- DIAMOND 2: 产能是否充足? (right) -->
      <polygon points="484,264 556,296 484,328 412,296" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <text x="484" y="292" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">产能充足?</text>

      <!-- Arrow: diamond2 YES → 维持观察 -->
      <line x1="484" y1="328" x2="484" y2="352" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="464" y="332" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="478" y="342" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">yes</text>

      <!-- Arrow: diamond2 NO → 减份额 -->
      <line x1="556" y1="296" x2="596" y2="296" stroke="#57534e" stroke-width="1"/>
      <line x1="596" y1="296" x2="596" y2="352" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="564" y="304" width="28" height="12" rx="2" fill="#faf7f2"/>
      <text x="578" y="314" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">no</text>

      <!-- STEP: 维持观察 -->
      <rect x="420" y="356" width="128" height="40" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="484" y="380" fill="#57534e" font-size="10" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">维持观察</text>

      <!-- STEP: 减份额 -->
      <rect x="540" y="356" width="112" height="40" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="596" y="374" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">减份额</text>
      <text x="596" y="388" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">-2%</text>

      <!-- Arrows: step2a + 维持 + 减 → merge → step3 审批 -->
      <line x1="196" y1="312" x2="196" y2="424" stroke="#57534e" stroke-width="1"/>
      <line x1="484" y1="396" x2="484" y2="424" stroke="#57534e" stroke-width="1"/>
      <line x1="596" y1="396" x2="596" y2="424" stroke="#57534e" stroke-width="1"/>

      <!-- Merge line -->
      <line x1="196" y1="424" x2="596" y2="424" stroke="#57534e" stroke-width="1"/>
      <line x1="340" y1="424" x2="340" y2="444" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- STEP 3: 内部审批 -->
      <rect x="220" y="448" width="240" height="48" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="232" y="466" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">STEP 2</text>
      <text x="340" y="484" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">内部审批 + 通知供应商</text>

      <!-- Arrow: step3 → step4 -->
      <line x1="340" y1="496" x2="340" y2="516" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- STEP 4: 执行调整 -->
      <rect x="220" y="520" width="240" height="48" rx="4" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="232" y="538" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" letter-spacing="0.12em">STEP 3</text>
      <text x="340" y="556" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">执行调整，下月生效</text>

      <!-- ===== LEGEND ===== -->
      <line x1="36" y1="588" x2="644" y2="588" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <rect x="36" y="604" width="16" height="10" rx="5" fill="rgba(28,25,23,0.03)" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
      <text x="60" y="612" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Start / end</text>

      <rect x="164" y="604" width="16" height="10" rx="2" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <text x="188" y="612" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Step</text>

      <polygon points="304,609 316,604 328,609 316,614" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <text x="336" y="612" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Decision</text>

      <rect x="436" y="604" width="16" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="460" y="612" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Incentive</text>
    </svg>
  </div>
</div>
</body>
</html>
