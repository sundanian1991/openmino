<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统流程图 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 24px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Data Flow</p>
    <h1>系统流程图</h1>

    <svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- Tier labels -->
      <text x="116" y="40" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em" text-anchor="middle">SOURCE</text>
      <text x="340" y="40" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em" text-anchor="middle">PROCESS</text>
      <text x="564" y="40" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em" text-anchor="middle">OUTPUT</text>

      <!-- ===== ARROWS FIRST (behind boxes) ===== -->

      <!-- Source → Collection (blue links) -->
      <line x1="156" y1="88" x2="268" y2="112" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
      <line x1="156" y1="152" x2="268" y2="168" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
      <line x1="156" y1="216" x2="268" y2="224" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
      <line x1="156" y1="280" x2="268" y2="280" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>

      <!-- Arrow labels for sources -->
      <rect x="184" y="88" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="200" y="97" fill="#2563eb" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">业绩</text>
      <rect x="184" y="148" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="200" y="157" fill="#2563eb" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">人效</text>
      <rect x="184" y="208" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="200" y="217" fill="#2563eb" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">质量</text>
      <rect x="184" y="268" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="200" y="277" fill="#2563eb" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">财务</text>

      <!-- Collection → Cleaning → Calculation → Storage (vertical flow) -->
      <line x1="340" y1="204" x2="340" y2="268" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="324" y="224" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="233" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">清洗</text>

      <line x1="340" y1="320" x2="340" y2="304" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="324" y="300" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="340" y="309" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">计算</text>

      <line x1="340" y1="356" x2="340" y2="384" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Calculation → Output (branch to 3 outputs) -->
      <path d="M 404 330 L 488 120" fill="none" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <path d="M 404 330 L 488 216" fill="none" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <path d="M 404 330 L 488 312" fill="none" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ===== SOURCE NODES (left column) ===== -->

      <!-- CRM -->
      <rect x="24" y="72" width="132" height="40" rx="6" fill="#faf7f2"/>
      <rect x="24" y="72" width="132" height="40" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <rect x="32" y="80" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="44" y="89" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="90" y="100" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">CRM 系统</text>

      <!-- HR -->
      <rect x="24" y="136" width="132" height="40" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <rect x="32" y="144" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="44" y="153" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="90" y="164" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">HR 系统</text>

      <!-- 质检 -->
      <rect x="24" y="200" width="132" height="40" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <rect x="32" y="208" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="44" y="217" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="90" y="228" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">质检系统</text>

      <!-- 财务 -->
      <rect x="24" y="264" width="132" height="40" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <rect x="32" y="272" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="44" y="281" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="90" y="292" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">财务系统</text>

      <!-- ===== PROCESS PIPELINE (center) ===== -->

      <!-- Step 01: 数据采集 -->
      <rect x="276" y="80" width="128" height="124" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="284" y="88" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="298" y="97" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">01</text>
      <text x="340" y="112" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">数据采集</text>
      <text x="340" y="128" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">每日 02:00</text>

      <line x1="292" y1="140" x2="388" y2="140" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>

      <text x="340" y="160" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">API · 文件 · 手动</text>
      <text x="340" y="176" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">去重 · 补缺</text>
      <text x="340" y="192" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">失败重试 ×3</text>

      <!-- Step 02: 数据清洗 -->
      <rect x="276" y="268" width="128" height="52" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <rect x="284" y="276" width="28" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="298" y="285" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">02</text>
      <text x="340" y="300" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">数据清洗</text>
      <text x="340" y="314" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">标准化 · 校验</text>

      <!-- Step 03: 指标计算 (focal) -->
      <rect x="276" y="304" width="128" height="52" rx="6" fill="#faf7f2"/>
      <rect x="276" y="304" width="128" height="52" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="284" y="312" width="28" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="298" y="321" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">03</text>
      <text x="340" y="336" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">指标计算</text>
      <text x="340" y="350" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">FCI · KPI</text>

      <!-- Step 04: 数据仓库 -->
      <rect x="276" y="384" width="128" height="36" rx="6" fill="#faf7f2"/>
      <rect x="276" y="384" width="128" height="36" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
      <rect x="284" y="392" width="28" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.50)" stroke-width="0.8"/>
      <text x="298" y="401" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">04</text>
      <text x="340" y="408" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">数据仓库</text>

      <!-- ===== OUTPUT NODES (right column) ===== -->

      <!-- 数据报表 -->
      <rect x="496" y="104" width="160" height="40" rx="6" fill="#faf7f2"/>
      <rect x="496" y="104" width="160" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="0.8"/>
      <text x="576" y="128" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">数据报表</text>

      <!-- 可视化看板 (focal) -->
      <rect x="496" y="200" width="160" height="40" rx="6" fill="#faf7f2"/>
      <rect x="496" y="200" width="160" height="40" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="504" y="208" width="24" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
      <text x="516" y="217" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">KEY</text>
      <text x="576" y="224" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">可视化看板</text>

      <!-- 预警分析 -->
      <rect x="496" y="296" width="160" height="40" rx="6" fill="#faf7f2"/>
      <rect x="496" y="296" width="160" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="0.8"/>
      <text x="576" y="320" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">预警 + 分析</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="460" x2="660" y2="460" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="20" y="476" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="484" width="14" height="10" rx="2" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="40" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">External</text>

      <rect x="112" y="484" width="14" height="10" rx="2" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
      <text x="132" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Process</text>

      <rect x="208" y="484" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="228" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Focal</text>

      <rect x="288" y="484" width="14" height="10" rx="2" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="0.8"/>
      <text x="308" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Store</text>

      <line x1="380" y1="490" x2="408" y2="490" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
      <text x="416" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Data ingest</text>

      <line x1="516" y1="490" x2="544" y2="490" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <text x="552" y="492" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Primary flow</text>

      <!-- Editorial aside -->
      <text x="460" y="368" fill="#1c1917" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">4 源汇入 → 采集 → 清洗 → 计算 → 分发</text>
    </svg>
  </div>
</body>
</html>
