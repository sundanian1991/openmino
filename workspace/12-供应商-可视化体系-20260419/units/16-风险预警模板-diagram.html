<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风险预警模板 · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #57534e;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 1.5rem;
    }
    .diagram-container {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      overflow-x: auto;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Diagram Design</p>
    <h1>风险预警模板</h1>
    <div class="diagram-container">
      <svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
        </defs>

        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- ARROWS (drawn before boxes) -->
        <!-- 异常信号 → 预警分级 -->
        <line x1="192" y1="92" x2="192" y2="132" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <!-- 预警分级 → P0 -->
        <line x1="148" y1="208" x2="88" y2="252" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <rect x="100" y="216" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="118" y="226" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">严重</text>
        <!-- 预警分级 → P1 -->
        <line x1="192" y1="208" x2="192" y2="252" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="176" y="216" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="194" y="226" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">警告</text>
        <!-- 预警分级 → P2 -->
        <line x1="236" y1="208" x2="296" y2="252" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <rect x="248" y="216" width="36" height="12" rx="2" fill="#faf7f2"/>
        <text x="266" y="226" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">关注</text>

        <!-- P0 → 通知 (accent) -->
        <line x1="88" y1="340" x2="88" y2="380" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <!-- P1 → 通知 -->
        <line x1="192" y1="340" x2="192" y2="380" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
        <!-- P2 → 通知 -->
        <line x1="296" y1="340" x2="296" y2="380" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- 通知 → 建议行动 -->
        <line x1="192" y1="452" x2="192" y2="488" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- 建议行动 → 案例归档 -->
        <line x1="192" y1="560" x2="192" y2="592" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

        <!-- 异常信号源 (left top) -->
        <rect x="72" y="32" width="240" height="60" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="84" y="40" width="40" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="104" y="50" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">INPUT</text>
        <text x="192" y="68" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">异常信号触发</text>
        <text x="192" y="84" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">14-信号总表匹配</text>

        <!-- 预警分级 (decision) -->
        <rect x="112" y="132" width="160" height="76" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="124" y="140" width="40" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="144" y="150" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CLASSIFY</text>
        <text x="192" y="172" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">预警分级</text>
        <text x="192" y="188" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">P0 / P1 / P2</text>

        <!-- P0 card (focal — accent) -->
        <rect x="20" y="252" width="136" height="88" rx="6" fill="#faf7f2" stroke="rgba(181,82,58,0.50)" stroke-width="1" stroke-dasharray="4,4"/>
        <rect x="20" y="252" width="136" height="88" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <rect x="32" y="260" width="24" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
        <text x="44" y="270" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">P0</text>
        <text x="88" y="290" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">严重预警</text>
        <text x="88" y="306" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">4h内首响</text>
        <text x="88" y="320" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">24h出方案</text>

        <!-- P1 card -->
        <rect x="124" y="252" width="136" height="88" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="136" y="260" width="24" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="148" y="270" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">P1</text>
        <text x="192" y="290" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">重要警告</text>
        <text x="192" y="306" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">24h内介入</text>
        <text x="192" y="320" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">3d出方案</text>

        <!-- P2 card -->
        <rect x="228" y="252" width="136" height="88" rx="6" fill="#faf7f2" stroke="rgba(120,113,108,0.25)" stroke-width="1"/>
        <rect x="240" y="260" width="24" height="12" rx="2" fill="transparent" stroke="rgba(120,113,108,0.30)" stroke-width="0.8"/>
        <text x="252" y="270" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">P2</text>
        <text x="296" y="290" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">一般关注</text>
        <text x="296" y="306" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">观察跟踪</text>
        <text x="296" y="320" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">月度记录</text>

        <!-- 通知模板 (right side panel) -->
        <rect x="388" y="132" width="268" height="208" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <rect x="400" y="124" width="72" height="16" rx="2" fill="#faf7f2"/>
        <text x="404" y="136" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.14em">通知模板 6要素</text>

        <text x="404" y="164" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">01 编号</text>
        <text x="500" y="164" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">W-2026-04-001</text>
        <text x="404" y="184" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">02 级别</text>
        <text x="500" y="184" fill="#b5523a" font-size="9" font-family="'Geist', sans-serif" font-weight="600">P0 严重 / P1 / P2</text>
        <text x="404" y="204" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">03 对象</text>
        <text x="500" y="204" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">供应商名 + 产线</text>
        <text x="404" y="224" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">04 数据</text>
        <text x="500" y="224" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">触发条件 + 当前值</text>
        <text x="404" y="244" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">05 建议</text>
        <text x="500" y="244" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">约谈/整改/观察</text>
        <text x="404" y="264" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" font-weight="500">06 责任</text>
        <text x="500" y="264" fill="#1c1917" font-size="9" font-family="'Geist', sans-serif">年老师 + 抄送军哥</text>

        <line x1="404" y1="280" x2="640" y2="280" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
        <text x="404" y="300" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" font-style="italic">触发时间：YYYY-MM-DD HH:MM</text>
        <text x="404" y="316" fill="#57534e" font-size="9" font-family="'Geist', sans-serif" font-style="italic">响应时限：依级别而定</text>
        <text x="404" y="332" fill="#57534e" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">标准化 = 不遗漏</text>

        <!-- 预警通知输出 -->
        <rect x="72" y="380" width="240" height="72" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="84" y="388" width="40" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="104" y="398" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OUTPUT</text>
        <text x="192" y="420" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">预警通知发出</text>
        <text x="192" y="436" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">责任人确认 · 干系人同步</text>

        <!-- 建议行动 -->
        <rect x="72" y="488" width="240" height="72" rx="6" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <rect x="84" y="496" width="32" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="100" y="506" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ACT</text>
        <text x="192" y="528" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">执行建议行动</text>
        <text x="192" y="544" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">进入 15-闭环SOP</text>

        <!-- 案例归档 (end oval) -->
        <rect x="108" y="592" width="168" height="40" rx="20" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="192" y="618" fill="#1c1917" font-size="12" font-family="'Geist', sans-serif" font-weight="600" text-anchor="middle">案例归档</text>

        <!-- LEGEND STRIP -->
        <line x1="16" y1="644" x2="664" y2="644" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="664" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="24" y="672" width="12" height="12" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="44" y="680" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Focal (P0)</text>

        <rect x="120" y="672" width="12" height="12" rx="2" fill="#faf7f2" stroke="#1c1917" stroke-width="1"/>
        <text x="140" y="680" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Standard node</text>

        <rect x="240" y="672" width="12" height="12" rx="2" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="260" y="680" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Panel</text>

        <line x1="340" y1="680" x2="368" y2="680" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
        <text x="376" y="680" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Critical path</text>
      </svg>
    </div>
  </div>
</body>
</html>
