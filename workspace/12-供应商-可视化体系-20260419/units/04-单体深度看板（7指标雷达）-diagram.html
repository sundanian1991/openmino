<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单体深度看板 · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf7f2;
      font-family: 'Geist', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 760px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    .diagram-wrap {
      background: #f2ede4;
      border: 1px solid rgba(28,25,23,0.12);
      border-radius: 8px;
      padding: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture &middot; Supplier Dashboard</p>
    <h1>单体深度看板 · 毅航</h1>
    <div class="diagram-wrap">
      <svg viewBox="0 0 680 564" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
        </defs>

        <!-- Background -->
        <rect width="100%" height="100%" fill="#faf7f2"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

        <!-- ===== TIER 1: KEY METRICS (top row) ===== -->

        <!-- Card 1: 排名 -->
        <rect x="24" y="24" width="200" height="64" rx="6" fill="#faf7f2"/>
        <rect x="24" y="24" width="200" height="64" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="36" y="44" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">RANKING</text>
        <text x="124" y="72" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">#3</text>
        <text x="124" y="84" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">+1 vs last month</text>

        <!-- Card 2: FCI (accent focal) -->
        <rect x="240" y="24" width="200" height="64" rx="6" fill="#faf7f2"/>
        <rect x="240" y="24" width="200" height="64" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1"/>
        <text x="252" y="44" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">FCI SCORE</text>
        <text x="340" y="72" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">92%</text>
        <text x="340" y="84" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">excellent</text>

        <!-- Card 3: 人效 -->
        <rect x="456" y="24" width="200" height="64" rx="6" fill="#faf7f2"/>
        <rect x="456" y="24" width="200" height="64" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="468" y="44" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">EFFICIENCY</text>
        <text x="556" y="72" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">+8%</text>
        <text x="556" y="84" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">MoM change</text>

        <!-- ===== TIER 2: 7-INDICATOR SCORES (middle grid) ===== -->

        <!-- Section eyebrow -->
        <text x="24" y="116" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">DIMENSION SCORES</text>

        <!-- Row 1: 产能 / 人效 / 质量 -->
        <!-- 产能 92 -->
        <rect x="24" y="128" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="24" y="128" width="208" height="48" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="36" y="148" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">产能</text>
        <text x="36" y="164" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">capacity</text>
        <!-- Score bar background -->
        <rect x="120" y="140" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <!-- Score bar fill: 92% -->
        <rect x="120" y="140" width="92" height="8" rx="4" fill="#57534e"/>
        <text x="200" y="164" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">92</text>

        <!-- 人效 88 -->
        <rect x="240" y="128" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="240" y="128" width="208" height="48" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="252" y="148" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">人效</text>
        <text x="252" y="164" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">efficiency</text>
        <rect x="336" y="140" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <rect x="336" y="140" width="88" height="8" rx="4" fill="#57534e"/>
        <text x="416" y="164" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">88</text>

        <!-- 质量 95 -->
        <rect x="456" y="128" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="456" y="128" width="208" height="48" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="468" y="148" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">质量</text>
        <text x="468" y="164" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">quality</text>
        <rect x="552" y="140" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <rect x="552" y="140" width="96" height="8" rx="4" fill="#57534e"/>
        <text x="632" y="164" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">95</text>

        <!-- Row 2: 成本 / 成长 / 流失 -->
        <!-- 成本 85 -->
        <rect x="24" y="188" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="24" y="188" width="208" height="48" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="36" y="208" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">成本</text>
        <text x="36" y="224" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">cost</text>
        <rect x="120" y="200" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <rect x="120" y="200" width="84" height="8" rx="4" fill="#57534e"/>
        <text x="200" y="224" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">85</text>

        <!-- 成长 78 (accent = weak point) -->
        <rect x="240" y="188" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="240" y="188" width="208" height="48" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1"/>
        <text x="252" y="208" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">成长</text>
        <text x="252" y="224" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace">growth</text>
        <rect x="336" y="200" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <rect x="336" y="200" width="72" height="8" rx="4" fill="#b5523a"/>
        <text x="416" y="224" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">78</text>

        <!-- 流失 90 -->
        <rect x="456" y="188" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="456" y="188" width="208" height="48" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="468" y="208" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">流失</text>
        <text x="468" y="224" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">attrition</text>
        <rect x="552" y="200" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <rect x="552" y="200" width="88" height="8" rx="4" fill="#57534e"/>
        <text x="632" y="224" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">90</text>

        <!-- Row 3: 合规 (single, left-aligned) -->
        <rect x="24" y="248" width="208" height="48" rx="6" fill="#faf7f2"/>
        <rect x="24" y="248" width="208" height="48" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="36" y="268" fill="#1c1917" font-size="10" font-weight="600" font-family="'Geist', sans-serif">合规</text>
        <text x="36" y="284" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace">compliance</text>
        <rect x="120" y="260" width="100" height="8" rx="4" fill="rgba(28,25,23,0.06)"/>
        <rect x="120" y="260" width="92" height="8" rx="4" fill="#57534e"/>
        <text x="200" y="284" fill="#1c1917" font-size="9" font-family="'Geist Mono', monospace" font-weight="500">92</text>

        <!-- ===== TIER 3: OVERALL + WEAKNESS ===== -->

        <!-- Overall score box -->
        <rect x="412" y="248" width="244" height="48" rx="6" fill="#faf7f2"/>
        <rect x="412" y="248" width="244" height="48" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
        <text x="424" y="268" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">OVERALL SCORE</text>
        <text x="534" y="284" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">89 分</text>
        <text x="624" y="284" fill="#78716c" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">优秀</text>

        <!-- Weakness highlight box -->
        <rect x="24" y="320" width="632" height="56" rx="6" fill="#faf7f2"/>
        <rect x="24" y="320" width="632" height="56" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.20)" stroke-width="1"/>
        <text x="36" y="340" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">WEAK POINT</text>
        <text x="36" y="360" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif">成长速度 78 分</text>
        <text x="36" y="372" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">新人培养周期偏长，需专项关注</text>

        <!-- ===== TIER 4: ACTION ===== -->

        <rect x="24" y="400" width="632" height="48" rx="6" fill="#faf7f2"/>
        <rect x="24" y="400" width="632" height="48" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="36" y="420" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">ACTION</text>
        <text x="36" y="436" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif">维持现状，分享标杆经验</text>
        <text x="36" y="448" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">专项新人培养计划，重点提升成长维度至 85+</text>

        <!-- ===== Connecting arrows between tiers ===== -->
        <!-- Tier 1 → Tier 2 -->
        <line x1="340" y1="88" x2="340" y2="120" stroke="#57534e" stroke-width="0.8" marker-end="url(#arrow)"/>

        <!-- Tier 2 → Overall -->
        <line x1="534" y1="296" x2="534" y2="308" stroke="#57534e" stroke-width="0.8" marker-end="url(#arrow)"/>

        <!-- Weakness → Action -->
        <line x1="340" y1="376" x2="340" y2="392" stroke="#b5523a" stroke-width="0.8" marker-end="url(#arrow)"/>

        <!-- Legend strip -->
        <line x1="24" y1="476" x2="656" y2="476" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
        <text x="24" y="496" fill="#78716c" font-size="7" font-family="'Geist Mono', monospace" font-weight="500" letter-spacing="0.18em">LEGEND</text>

        <rect x="24" y="508" width="20" height="12" rx="4" fill="#57534e"/>
        <text x="52" y="518" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Score bar</text>

        <rect x="140" y="508" width="20" height="12" rx="4" fill="#b5523a"/>
        <text x="168" y="518" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Weak point (focus)</text>

        <rect x="296" y="508" width="20" height="12" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="324" y="518" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Normal card</text>

        <rect x="432" y="508" width="20" height="12" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1"/>
        <text x="460" y="518" fill="#57534e" font-size="8" font-family="'Geist', sans-serif">Weak point</text>

        <!-- Editorial aside -->
        <text x="24" y="548" fill="#78716c" font-size="11" font-family="'Instrument Serif', serif" font-style="italic">整体表现优秀，仅成长维度需专项提升。可作为标杆分享。</text>
      </svg>
    </div>
  </div>
</body>
</html>
