<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周度产能达成率对比</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: #faf7f2;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #78716c;
      margin-bottom: 4px;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #1c1917;
      margin-bottom: 16px;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Timeline · Weekly Tracking</p>
    <h1>周度产能达成率对比</h1>

    <svg viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#f2ede4" rx="8" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6" rx="8"/>

      <!-- ===== HEADER ===== -->
      <text x="32" y="36" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">毅航 · 产能达成率周度跟踪</text>

      <!-- Status badge -->
      <rect x="588" y="20" width="72" height="24" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.30)" stroke-width="0.8"/>
      <text x="624" y="35" fill="#b5523a" font-size="8" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">需加速</text>

      <!-- ===== TIMELINE STRUCTURE ===== -->
      <!-- Y axis: 0% at y=380, 100% at y=80. Scale: 3px per 1%. -->

      <!-- Grid lines -->
      <line x1="80" y1="80" x2="648" y2="80" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <line x1="80" y1="140" x2="648" y2="140" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <line x1="80" y1="200" x2="648" y2="200" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <line x1="80" y1="260" x2="648" y2="260" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>
      <line x1="80" y1="320" x2="648" y2="320" stroke="rgba(28,25,23,0.08)" stroke-width="0.8"/>

      <!-- Target line at 100% (y=80) -->
      <line x1="80" y1="80" x2="648" y2="80" stroke="#57534e" stroke-width="1" stroke-dasharray="6 4"/>
      <rect x="616" y="68" width="48" height="12" rx="2" fill="#f2ede4"/>
      <text x="640" y="76" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="end">100%</text>

      <!-- Y axis labels -->
      <text x="68" y="84" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">100%</text>
      <text x="68" y="144" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">80%</text>
      <text x="68" y="204" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">60%</text>
      <text x="68" y="264" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">40%</text>
      <text x="68" y="324" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">20%</text>
      <text x="68" y="384" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end">0%</text>

      <!-- Baseline -->
      <line x1="80" y1="380" x2="648" y2="380" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>

      <!-- Month separator -->
      <line x1="372" y1="68" x2="372" y2="384" stroke="rgba(28,25,23,0.12)" stroke-width="0.8" stroke-dasharray="4 4"/>

      <!-- Month labels -->
      <text x="224" y="404" fill="#78716c" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">上月</text>
      <text x="512" y="404" fill="#1c1917" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">本月</text>

      <!-- ===== BARS ===== -->
      <!-- Last month: W1=82%, W2=88%, W3=75%, W4=85% -->
      <!-- This month: W1=72%, W2=94% -->
      <!-- Scale: y_top = 380 - (value/100)*300 -->
      <!-- Bar width=40, positions evenly spaced -->

      <!-- LAST MONTH W1: 82% → y=380-246=134, h=246 -->
      <rect x="120" y="134" width="40" height="246" rx="4" fill="rgba(28,25,23,0.12)"/>
      <text x="140" y="126" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">82%</text>
      <text x="140" y="420" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">W1</text>

      <!-- LAST MONTH W2: 88% → y=380-264=116, h=264 -->
      <rect x="192" y="116" width="40" height="264" rx="4" fill="rgba(28,25,23,0.12)"/>
      <text x="212" y="108" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">88%</text>
      <text x="212" y="420" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">W2</text>

      <!-- LAST MONTH W3: 75% → y=380-225=155, h=225 -->
      <rect x="264" y="155" width="40" height="225" rx="4" fill="rgba(181,82,58,0.15)"/>
      <text x="284" y="147" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">75%</text>
      <text x="284" y="420" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">W3</text>

      <!-- LAST MONTH W4: 85% → y=380-255=125, h=255 -->
      <rect x="336" y="125" width="40" height="255" rx="4" fill="rgba(28,25,23,0.12)"/>
      <text x="356" y="117" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">85%</text>
      <text x="356" y="420" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">W4</text>

      <!-- THIS MONTH W1: 72% → y=380-216=164, h=216 — below target -->
      <rect x="432" y="164" width="40" height="216" rx="4" fill="rgba(181,82,58,0.25)"/>
      <text x="452" y="156" fill="#b5523a" font-size="8" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">72%</text>
      <text x="452" y="420" fill="#1c1917" font-size="8" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">W1</text>

      <!-- THIS MONTH W2: 94% → y=380-282=98, h=282 — above target! -->
      <rect x="504" y="98" width="40" height="282" rx="4" fill="#57534e"/>
      <text x="524" y="90" fill="#57534e" font-size="8" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">94%</text>
      <text x="524" y="420" fill="#1c1917" font-size="8" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">W2</text>

      <!-- THIS MONTH W3: placeholder dot -->
      <circle cx="596" cy="380" r="6" fill="none" stroke="rgba(28,25,23,0.25)" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="596" y="420" fill="#1c1917" font-size="8" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">W3</text>

      <!-- THIS MONTH W4: placeholder dot -->
      <circle cx="628" cy="380" r="6" fill="none" stroke="rgba(28,25,23,0.25)" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="628" y="420" fill="#1c1917" font-size="8" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle">W4</text>

      <!-- ===== INSIGHT ANNOTATION ===== -->
      <rect x="32" y="440" width="616" height="24" rx="4" fill="rgba(181,82,58,0.08)" stroke="rgba(181,82,58,0.20)" stroke-width="0.8"/>
      <text x="44" y="456" fill="#57534e" font-size="9" font-family="'Instrument Serif', serif" font-style="italic">W1 未达标但 W2 强势反弹至 94%，累计 83%，按此趋势月底预计达标。</text>
    </svg>
  </div>
</body>
</html>
