<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 月 GMV 目标达成率</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif; display: flex; justify-content: center; padding: 40px 20px; }
  .chart-wrapper { width: 800px; background: #fff; }
  #chart { width: 800px; height: 500px; }
  .footnote { font-size: 11px; color: #8B8680; margin-top: 8px; padding-left: 2px; }
  .summary { font-size: 12px; color: #293C54; margin-bottom: 4px; padding-left: 2px; }
</style>
</head>
<body>
<div class="chart-wrapper">
  <div class="summary" id="summary"></div>
  <div id="chart"></div>
  <div class="footnote">数据来源：业务系统，2026 年 3 月 | B 端企业主贷大额人工 · 新客-未授信</div>
</div>
<script>
  const chart = echarts.init(document.getElementById('chart'));

  const workplaces = ['汇讯', '新动力', '锦瑞', '德辰', '广达', '中乾', '速腾', '九通'];
  const rates = [132.5, 105.8, 103.9, 93.9, 85.3, 80.3, 76.0, 68.2];
  const gaps = rates.map(r => (r - 100).toFixed(1));
  const colors = rates.map(r => r >= 100 ? '#D45400' : '#CC0000');

  document.getElementById('summary').innerHTML =
    '3 家达标（汇讯 +32.5%、新动力 +5.8%、锦瑞 +3.9%），5 家未达标（九通缺口最大 -31.8%）';

  option = {
    title: {
      text: '3 月 GMV 目标达成严重分化——极差 64 个百分点',
      left: 2,
      top: 8,
      textStyle: { fontSize: 17, fontWeight: 600, color: '#1A1A2E', lineHeight: 24 }
    },
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      formatter: function(params) {
        const p = params[0];
        const r = rates[p.dataIndex];
        const g = gaps[p.dataIndex];
        const sign = g >= 0 ? '+' : '';
        return `<b>${p.name}</b><br/>达成率：${r}%<br/>偏离目标：${sign}${g} 个百分点`;
      }
    },
    grid: { left: 80, right: 70, top: 80, bottom: 30 },
    xAxis: {
      type: 'value',
      min: 50,
      max: 145,
      axisLabel: { formatter: '{value}%', color: '#8B8680', fontSize: 11 },
      splitLine: { lineStyle: { color: '#eee' } },
      axisTick: { show: false },
      axisLine: { show: false }
    },
    yAxis: {
      type: 'category',
      data: workplaces,
      inverse: true,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { color: '#1A1A2E', fontSize: 12, fontWeight: 500 }
    },
    series: [{
      type: 'bar',
      data: rates.map((rate, i) => ({
        value: rate,
        itemStyle: { color: colors[i], borderRadius: [0, 2, 2, 0] },
        label: {
          show: true,
          position: 'right',
          formatter: rates[i] + '%',
          color: '#1A1A2E',
          fontSize: 11,
          fontWeight: 500
        }
      })),
      barWidth: 24,
      markLine: {
        symbol: 'none',
        data: [{ xAxis: 100 }],
        lineStyle: { color: '#8B8680', type: 'dashed', width: 2 },
        label: {
          show: true,
          formatter: '达标线',
          position: 'insideStartTop',
          color: '#8B8680',
          fontSize: 11,
          offset: [0, -10]
        }
      },
      markPoint: {
        data: [
          {
            name: '汇讯',
            xAxis: 0, yAxis: 0,
            value: '超目标 32%',
            itemStyle: { color: 'transparent' },
            label: { show: true, formatter: '超目标 32%', position: 'right', color: '#D45400', fontSize: 13, fontWeight: 'bold', offset: [8, 0] }
          },
          {
            name: '九通',
            xAxis: 7, yAxis: 7,
            value: '缺口 32%',
            itemStyle: { color: 'transparent' },
            label: { show: true, formatter: '缺口 32%', position: 'right', color: '#CC0000', fontSize: 13, fontWeight: 'bold', offset: [8, 0] }
          }
        ]
      }
    }]
  };

  chart.setOption(option);
  window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
