<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐力职场参评人员等级分布 vs 人均产出</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFFFFF;
    font-family: system-ui, Helvetica Neue, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #chart {
    width: 800px;
    height: 450px;
  }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var categories = ['S', 'A', 'B', 'C'];
var headcount = [1, 7, 9, 17];
var gmvPerCapita = [1110, 890, 702, 478];

var colors = ['#D97757', '#D97757', '#ACA9A2', '#B04A4A'];

var option = {
  animation: false,
  title: [
    {
      text: '参评34人中C级占半——C级人均GMV仅为A级的54%',
      left: 10,
      top: 8,
      textStyle: {
        fontSize: 15,
        fontWeight: 600,
        color: '#4F302D',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    },
    {
      text: '岐力职场参评人员等级分布 vs 人均产出 · C级是提效最大杠杆',
      left: 10,
      top: 30,
      textStyle: {
        fontSize: 11,
        fontWeight: 400,
        color: '#87867F',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    }
  ],
  grid: [
    {
      left: 70,
      right: 260,
      top: 60,
      height: 140
    },
    {
      left: 70,
      right: 260,
      top: 250,
      height: 140
    }
  ],
  xAxis: [
    {
      type: 'category',
      data: categories,
      gridIndex: 0,
      axisTick: { show: false },
      axisLine: { lineStyle: { color: '#ACA9A2' } },
      axisLabel: {
        fontSize: 12,
        fontWeight: 600,
        color: '#4D4D4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    },
    {
      type: 'category',
      data: categories,
      gridIndex: 1,
      position: 'bottom',
      axisTick: { show: false },
      axisLine: { lineStyle: { color: '#ACA9A2' } },
      axisLabel: {
        fontSize: 12,
        fontWeight: 600,
        color: '#4D4D4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    }
  ],
  yAxis: [
    {
      type: 'value',
      gridIndex: 0,
      min: 0,
      max: 20,
      interval: 5,
      name: '人数',
      nameTextStyle: {
        fontSize: 11,
        fontWeight: 400,
        color: '#87867F',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { lineStyle: { color: '#F0EEE6', type: 'dashed' } },
      axisLabel: {
        fontSize: 10,
        color: '#ACA9A2',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    },
    {
      type: 'value',
      gridIndex: 1,
      min: 0,
      max: 1200,
      interval: 300,
      name: '人均GMV(万)',
      nameTextStyle: {
        fontSize: 11,
        fontWeight: 400,
        color: '#87867F',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { lineStyle: { color: '#F0EEE6', type: 'dashed' } },
      axisLabel: {
        fontSize: 10,
        color: '#ACA9A2',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif'
      }
    }
  ],
  series: [
    {
      name: '人数',
      type: 'bar',
      xAxisIndex: 0,
      yAxisIndex: 0,
      barWidth: 40,
      data: headcount.map(function (val, i) {
        return {
          value: val,
          itemStyle: { color: colors[i] }
        };
      }),
      label: {
        show: true,
        position: 'top',
        fontSize: 11,
        fontWeight: 600,
        color: '#4D4D4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        formatter: function (params) {
          return params.value + '人';
        }
      }
    },
    {
      name: '人均GMV',
      type: 'bar',
      xAxisIndex: 1,
      yAxisIndex: 1,
      barWidth: 40,
      data: gmvPerCapita.map(function (val, i) {
        return {
          value: val,
          itemStyle: { color: colors[i] }
        };
      }),
      label: {
        show: true,
        position: 'top',
        fontSize: 11,
        fontWeight: 600,
        color: '#4D4D4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        formatter: function (params) {
          return params.value + '万';
        }
      }
    }
  ],
  tooltip: { show: false },
  legend: { show: false },
  graphic: [
    {
      type: 'group',
      right: 15,
      top: 155,
      children: [
        {
          type: 'rect',
          shape: { x: 0, y: 0, width: 230, height: 80 },
          style: {
            fill: '#F7F6F1',
            stroke: '#E3DACC',
            lineWidth: 1
          }
        },
        {
          type: 'text',
          style: {
            text: 'C级 vs A级',
            x: 12,
            y: 18,
            font: '600 11px system-ui, Helvetica Neue, sans-serif',
            fill: '#4F302D'
          }
        },
        {
          type: 'text',
          style: {
            text: 'ATT  77s vs 110s',
            x: 12,
            y: 36,
            font: '400 10px system-ui, Helvetica Neue, sans-serif',
            fill: '#87867F'
          }
        },
        {
          type: 'text',
          style: {
            text: '日均通时  105分 vs 140分',
            x: 12,
            y: 52,
            font: '400 10px system-ui, Helvetica Neue, sans-serif',
            fill: '#87867F'
          }
        },
        {
          type: 'text',
          style: {
            text: '件均  1.8万 vs 2.9万',
            x: 12,
            y: 68,
            font: '400 10px system-ui, Helvetica Neue, sans-serif',
            fill: '#87867F'
          }
        }
      ]
    },
    {
      type: 'text',
      right: 15,
      bottom: 10,
      style: {
        text: '数据来源：岐力职场人力分析 · 参评=近30天外呼天数≥22天',
        font: '400 10px system-ui, Helvetica Neue, sans-serif',
        fill: '#ACA9A2',
        textAlign: 'right'
      }
    }
  ]
};

chart.setOption(option);

window.addEventListener('resize', function () {
  chart.resize();
});
</script>
</body>
</html>
