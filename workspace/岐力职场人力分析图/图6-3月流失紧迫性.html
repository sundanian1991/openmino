<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3月扩招已流失8名高产熟手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, Helvetica Neue, sans-serif; }
  .chart-wrap { width: 800px; height: 420px; position: relative; }
  #chart { width: 100%; height: 100%; }
  .footnote {
    position: absolute; bottom: 6px; right: 12px;
    font-size: 9px; color: #ACA9A2; font-weight: 400;
    font-family: system-ui, Helvetica Neue, sans-serif;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
<div class="chart-wrap">
  <div id="chart"></div>
  <div class="footnote">数据来源：岐力职场人力分析 · 流失口径：5.11-12无有效外呼记录 · 3月批次共流失19人</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var names = ['龚盼星', '龚梅', '黄素云', '杨丹丹', '颜樱', '吴珍珍', '刘玉立', '詹焱'];
var values = [561, 613, 744, 757, 782, 841, 845, 871];
var avgLine = 634;

var option = {
  animation: false,
  title: [
    {
      text: '3月扩招已流失8名高产熟手，累计带走5946万GMV',
      left: 12, top: 8,
      textStyle: { fontSize: 15, fontWeight: 600, color: '#4F302D', fontFamily: 'system-ui, Helvetica Neue, sans-serif', lineHeight: 22 }
    },
    {
      text: '岐力职场3月入职流失人员GMV · 在职参评人均634万作为参考',
      left: 12, top: 32,
      textStyle: { fontSize: 11, fontWeight: 400, color: '#87867F', fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
    }
  ],
  grid: {
    left: 80, right: 90, top: 60, bottom: 35
  },
  xAxis: {
    type: 'value',
    name: 'GMV（万）',
    nameTextStyle: { fontSize: 10, color: '#87867F', fontFamily: 'system-ui, Helvetica Neue, sans-serif' },
    axisLine: { lineStyle: { color: '#F0EEE6' } },
    axisTick: { show: false },
    splitLine: { lineStyle: { color: '#F7F6F1', type: 'dashed' } },
    axisLabel: { fontSize: 10, color: '#ACA9A2', fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
  },
  yAxis: {
    type: 'category',
    data: names,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { fontSize: 12, fontWeight: 400, color: '#4D4D4A', fontFamily: 'system-ui, Helvetica Neue, sans-serif' }
  },
  series: [
    {
      type: 'bar',
      data: values,
      barWidth: 22,
      barCategoryGap: '35%',
      itemStyle: {
        color: '#B04A4A',
        borderRadius: [0, 6, 6, 0]
      },
      label: {
        show: true,
        position: 'right',
        fontSize: 11,
        fontWeight: 600,
        color: '#4D4D4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        formatter: function(p) { return p.value + '万'; }
      },
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: '#87867F', type: 'dashed', width: 1 },
        label: {
          show: true,
          position: 'start',
          fontSize: 10,
          fontWeight: 400,
          color: '#87867F',
          fontFamily: 'system-ui, Helvetica Neue, sans-serif',
          formatter: '在职参评人均 634万'
        },
        data: [{ xAxis: avgLine }]
      }
    }
  ],
  graphic: [
    {
      type: 'text',
      right: 14, top: 56,
      style: {
        text: '累计 5946万',
        fontSize: 18,
        fontWeight: 600,
        color: '#B04A4A',
        fontFamily: 'system-ui, Helvetica Neue, sans-serif',
        opacity: 0.7
      }
    }
  ]
};

chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
