<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>图4：线路费占比恶化趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<body>
<div id="chart" style="width:960px;height:540px;font-family:'Helvetica Neue',Inter,sans-serif;"></div>
<script>
var chart = echarts.init(document.getElementById('chart'));

var months = ['12月', '01月', '02月', '03月', '04月', '05月'];
var suppliers = [
  { name: '赛维斯', data: [37.4, 44.9, 44.3, 51.6, 62.6, 61.6] },
  { name: '零犀', data: [27.6, 25.7, 30.8, 33.1, 37.3, 44.1] },
  { name: '零犀伽玛', data: [35.1, 34.8, 41.6, 42.5, 48.6, 59.8] },
  { name: '零犀毅航', data: [28.2, 28.2, 37, 33.6, 36.5, 42.2] },
  { name: '零犀毛毛虫', data: [31, 30.1, 34.6, 40.7, 50.8, 62.2] },
  { name: '零犀赛维斯', data: [32.6, 36, 39.5, 47.4, 49.8, 61.2] }
];

// 找出恶化最快的2家（最高终点值）：毛毛虫 62.2, 伽玛 59.8
var highlight = ['零犀毛毛虫', '零犀伽玛'];

function series() {
  return suppliers.map(function(s) {
    var isHighlight = highlight.indexOf(s.name) >= 0;
    return {
      name: s.name,
      type: 'line',
      data: s.data,
      smooth: false,
      symbol: isHighlight ? 'circle' : 'none',
      symbolSize: 6,
      lineStyle: { width: isHighlight ? 3 : 1.5, color: isHighlight ? '#CC6B1E' : '#B0B0B0' },
      itemStyle: { color: isHighlight ? '#CC6B1E' : '#B0B0B0' },
      label: {
        show: true,
        formatter: function(p) { return p.dataIndex === 5 ? s.data[5] + '%' : ''; },
        fontSize: 11, fontWeight: isHighlight ? 700 : 400,
        color: isHighlight ? '#CC6B1E' : '#B0B0B0',
        position: 'right', offset: [4, 0]
      },
      emphasis: { lineStyle: { width: isHighlight ? 4 : 2 } }
    };
  });
}

var option = {
  backgroundColor: '#FFFFFF',
  title: {
    text: '线路费全线飙升，零犀系两家已超60%',
    subtext: '各供应商首贷线路费占比趋势 | 粗线=恶化最快两家 | 2025-12 ~ 2026-05',
    left: 24, top: 16,
    textStyle: { fontSize: 18, fontWeight: 600, color: '#2D2D2D' },
    subtextStyle: { fontSize: 12, color: '#6C7A89' }
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#FFFFFF', borderColor: '#E0E0E0', borderWidth: 1
  },
  legend: { left: 24, top: 64, textStyle: { fontSize: 11, color: '#6C7A89' } },
  grid: { left: 55, right: 80, top: 100, bottom: 50 },
  xAxis: {
    type: 'category',
    data: months,
    axisLine: { lineStyle: { color: '#D5DDE5' } },
    axisLabel: { fontSize: 12, color: '#6C7A89', fontWeight: 500 },
    axisTick: { alignWithLabel: true }
  },
  yAxis: {
    type: 'value',
    name: '线路费占比',
    min: 0, max: 120,
    nameTextStyle: { fontSize: 11, color: '#6C7A89' },
    splitLine: { lineStyle: { color: '#F0F0F0', type: 'dashed' } },
    axisLabel: { fontSize: 11, color: '#6C7A89', formatter: '{value}%' }
  },
  series: series().concat([{
    name: '成本倒挂线',
    type: 'line',
    data: [100, 100, 100, 100, 100, 100],
    lineStyle: { color: '#C0392B', type: 'dashed', width: 1.5 },
    symbol: 'none',
    label: { show: true, formatter: '成本倒挂', color: '#C0392B', fontSize: 11, position: 'insideEndTop' },
    silent: true
  }])
};
chart.setOption(option);
window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
