<!doctype html>
<html lang="zh-CN" data-theme="light" data-layout="comfortable" data-persona="normal">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>供应商管理仪表板</title>
  <meta name="description" content="BPO供应商全生命周期管理平台" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Birchline Design System - 暖色调、克制、手工感 */

    :root {
      /* 中性色 - 暖灰 */
      --n50: #FAF9F5;
      --n100: #F0EEE6;
      --n200: #E6E3DA;
      --n300: #D1CFC5;
      --n400: #B3B1A9;
      --n500: #87867F;
      --n600: #5A5955;
      --n700: #3D3D3A;
      --n800: #2A2A28;
      --n900: #1D1D1B;
      --n950: #141413;

      /* 品牌色 - 陶土/砖红 */
      --b50: #FBF0EB;
      --b100: #F5DDD2;
      --b200: #EDC4AE;
      --b300: #E2A68A;
      --b400: #D98E6E;
      --b500: #D97757;
      --b600: #C7684C;
      --b700: #B85C3E;
      --b800: #9A4B32;
      --b900: #7D3D28;

      /* 语义色 */
      --success: #788C5D;
      --success-bg: rgba(120,140,93,0.12);
      --warning: #C78E3F;
      --warning-bg: rgba(199,142,63,0.12);
      --danger: #B04A4A;
      --danger-bg: rgba(176,74,74,0.12);
      --info: #5C7CA3;
      --info-bg: rgba(92,124,163,0.12);

      /* 间距 */
      --sp-xs: 8px;
      --sp-sm: 12px;
      --sp-md: 16px;
      --sp-lg: 24px;
      --sp-xl: 32px;
      --sp-2xl: 48px;

      /* 圆角 */
      --rd-element: 4px;
      --rd-control: 8px;
      --rd-component: 12px;

      /* 阴影 */
      --shadow-sm: 0 1px 2px rgba(20,20,19,0.06);
      --shadow-md: 0 4px 10px rgba(20,20,19,0.08);
      --shadow-lg: 0 12px 28px rgba(20,20,19,0.12);
    }

    /* 深色模式 */
    html[data-theme="dark"] {
      --n50: #1A1917;
      --n100: #242320;
      --n200: #2D2C29;
      --n300: #3D3C38;
      --n400: #5A5955;
      --n500: #87867F;
      --n600: #B3B1A9;
      --n700: #D1CFC5;
      --n800: #E6E3DA;
      --n900: #F0EEE6;
      --n950: #FAF9F5;
      --b500: #E08B6E;
      --b600: #D98E6E;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 430;
      color: var(--n950);
      background: var(--n50);
      margin: 0;
      padding: 0;
    }

    /* 导航 */
    header {
      background: var(--n50);
      border-bottom: 1.5px solid var(--n300);
      padding: var(--sp-md) var(--sp-xl);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 18px;
      font-weight: 600;
      color: var(--n900);
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: var(--sp-lg);
    }

    .nav-links a {
      color: var(--n600);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      transition: color 150ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--b600);
    }

    .nav-links a.active {
      border-bottom-color: var(--b500);
    }

    /* 主内容 */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--sp-2xl) var(--sp-xl);
    }

    /* Hero 区域 - 扁平设计，无渐变 */
    .hero {
      background: var(--n100);
      border: 1.5px solid var(--n300);
      border-radius: var(--rd-component);
      padding: var(--sp-2xl);
      margin-bottom: var(--sp-xl);
    }

    .hero-content {
      display: flex;
      align-items: flex-end;
      gap: var(--sp-2xl);
    }

    .hero-main {
      flex: 1;
    }

    .hero-label {
      font-size: 13px;
      color: var(--n500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--sp-xs);
    }

    .hero-value {
      font-size: 42px;
      font-weight: 600;
      color: var(--n900);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .hero-stats {
      display: flex;
      gap: var(--sp-xl);
      margin-top: var(--sp-lg);
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--n500);
    }

    .hero-stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--n700);
    }

    .hero-side {
      display: flex;
      flex-direction: column;
      gap: var(--sp-md);
      min-width: 200px;
    }

    .stat-card {
      background: #FFFFFF;
      border: 1.5px solid var(--n300);
      border-radius: var(--rd-control);
      padding: var(--sp-md);
    }

    .stat-card-label {
      font-size: 12px;
      color: var(--n500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .stat-card-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--n700);
    }

    .stat-card-value.success { color: var(--success); }

    /* 内容网格 */
    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--sp-xl);
    }

    /* Section 标题 */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-md);
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--n900);
      letter-spacing: -0.01em;
    }

    .section-link {
      font-size: 13px;
      color: var(--b600);
      text-decoration: none;
      font-weight: 500;
    }

    .section-link:hover {
      color: var(--b700);
    }

    /* 表格 */
    .data-table {
      background: #FFFFFF;
      border: 1.5px solid var(--n300);
      border-radius: var(--rd-component);
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 0.8fr;
      gap: var(--sp-md);
      padding: var(--sp-sm) var(--sp-md);
      background: var(--n100);
      border-bottom: 1.5px solid var(--n300);
      font-size: 12px;
      font-weight: 500;
      color: var(--n500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 0.8fr;
      gap: var(--sp-md);
      padding: var(--sp-md);
      border-bottom: 1px solid var(--n200);
      cursor: pointer;
      transition: background 150ms ease;
      align-items: center;
    }

    .table-row:hover {
      background: var(--n50);
    }

    .table-row:last-child {
      border-bottom: none;
    }

    .cell-primary {
      font-weight: 500;
      color: var(--n900);
    }

    .cell-secondary {
      font-size: 13px;
      color: var(--n500);
    }

    .cell-mono {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      color: var(--n600);
    }

    /* 状态点 */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--n600);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-active .status-dot { background: var(--success); }
    .status-warning .status-dot { background: var(--warning); }
    .status-inactive .status-dot { background: var(--danger); }

    /* 合规率 */
    .compliance {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      font-weight: 500;
    }

    .compliance-high { color: var(--success); }
    .compliance-medium { color: var(--warning); }
    .compliance-low { color: var(--danger); }

    /* 侧边栏 */
    .sidebar-section {
      margin-bottom: var(--sp-xl);
    }

    /* 通知 */
    .notification {
      padding: var(--sp-sm) var(--sp-md);
      border-left: 3px solid transparent;
      margin-bottom: var(--sp-sm);
      background: var(--n50);
    }

    .notification-urgent {
      border-left-color: var(--danger);
      background: var(--danger-bg);
    }

    .notification-warning {
      border-left-color: var(--warning);
      background: var(--warning-bg);
    }

    .notification-info {
      border-left-color: var(--info);
      background: var(--info-bg);
    }

    .notification-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--n800);
      margin-bottom: 2px;
    }

    .notification-time {
      font-size: 12px;
      color: var(--n500);
    }

    /* 快捷操作 */
    .action-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
    }

    .action-btn {
      width: 100%;
      text-align: left;
      padding: var(--sp-sm) var(--sp-md);
      background: #FFFFFF;
      border: 1.5px solid var(--n300);
      border-radius: var(--rd-control);
      font-size: 14px;
      font-weight: 500;
      color: var(--n700);
      cursor: pointer;
      transition: all 150ms ease;
    }

    .action-btn:hover {
      border-color: var(--b500);
      color: var(--b600);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--sp-2xl);
      background: var(--n50);
      border: 1.5px solid var(--n300);
      border-radius: var(--rd-component);
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--n900);
      margin-bottom: var(--sp-xs);
    }

    .empty-desc {
      font-size: 14px;
      color: var(--n500);
      margin-bottom: var(--sp-lg);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      border-radius: var(--rd-control);
      cursor: pointer;
      transition: all 150ms ease;
      border: none;
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--b500);
      color: white;
    }

    .btn-primary:hover {
      background: var(--b600);
    }

    /* 控制栏 */
    #proto-controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
    }

    .proto-bar {
      display: flex;
      flex-wrap: nowrap;
      gap: 20px;
      padding: 14px 20px;
      background: #FFFFFF;
      border: 1.5px solid var(--n300);
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
    }

    .proto-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .proto-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--n500);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .proto-seg {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--n300);
      background: transparent;
      color: var(--n600);
      cursor: pointer;
      transition: all 150ms ease;
    }

    .proto-seg[aria-pressed="true"] {
      background: var(--b500);
      color: white;
      border-color: var(--b500);
    }

    .proto-seg:hover:not([aria-pressed="true"]) {
      border-color: var(--b400);
      color: var(--b600);
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="brand">供应商管理平台</div>
      <div class="nav-links">
        <a href="index.html" class="active">概览</a>
        <a href="suppliers.html">供应商</a>
        <a href="#">合规</a>
        <a href="#">绩效</a>
      </div>
      <div style="display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--n600);">
        <span data-persona-text="user.name">王经理</span>
        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--b500); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;" data-persona-text="user.initials">WM</div>
      </div>
    </nav>
  </header>

  <main>
    <!-- Hero - 扁平设计 -->
    <div class="hero">
      <div class="hero-content">
        <div class="hero-main">
          <div class="hero-label">年度总支出</div>
          <div class="hero-value" data-persona-text="stats.totalSpend">¥27.6M</div>
          <div class="hero-stats">
            <div class="hero-stat">
              <span class="hero-stat-label">供应商</span>
              <span class="hero-stat-value" data-persona-text="stats.activeCount">6</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">在册人数</span>
              <span class="hero-stat-value" data-persona-text="stats.totalHeadcount">3,930</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">预警</span>
              <span class="hero-stat-value" data-persona-text="stats.warningCount">2</span>
            </div>
          </div>
        </div>
        <div class="hero-side">
          <div class="stat-card">
            <div class="stat-card-label">本月新增</div>
            <div class="stat-card-value">+¥1.2M</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">平均合规率</div>
            <div class="stat-card-value success">89.7%</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 内容 -->
    <div class="content-grid">
      <div>
        <div class="section-header">
          <h2 class="section-title">供应商</h2>
          <a href="suppliers.html" class="section-link">查看全部 →</a>
        </div>

        <!-- 空状态 -->
        <div data-persona-show="empty" class="empty-state">
          <div class="empty-title">暂无供应商数据</div>
          <div class="empty-desc">您可以通过"添加供应商"按钮录入第一个供应商</div>
          <button class="btn btn-primary">添加供应商</button>
        </div>

        <!-- 表格 -->
        <div data-persona-hide="empty" class="data-table">
          <div class="table-header">
            <div>供应商</div>
            <div>人数</div>
            <div>支出</div>
            <div>合规</div>
            <div>状态</div>
          </div>
          <div data-supplier-list></div>
        </div>
      </div>

      <div>
        <div class="sidebar-section">
          <div class="section-header">
            <h2 class="section-title">通知</h2>
          </div>
          <div data-persona-show="empty" style="font-size: 14px; color: var(--n500);">暂无通知</div>
          <div data-persona-hide="empty" data-notification-list></div>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <h2 class="section-title">快捷操作</h2>
          </div>
          <div class="action-list">
            <button class="action-btn">导出月度报表</button>
            <button class="action-btn">发起供应商评估</button>
            <button class="action-btn">查看合同到期</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 控制栏 -->
  <div id="proto-controls">
    <div class="proto-bar">
      <div class="proto-section">
        <span class="proto-label">模式</span>
        <div style="display: flex; gap: 4px;">
          <button class="proto-seg" data-theme-option="light" aria-pressed="true">浅色</button>
          <button class="proto-seg" data-theme-option="dark" aria-pressed="false">深色</button>
        </div>
      </div>
      <div class="proto-section">
        <span class="proto-label">密度</span>
        <div style="display: flex; gap: 4px;">
          <button class="proto-seg" data-layout-option="compact" aria-pressed="false">紧凑</button>
          <button class="proto-seg" data-layout-option="comfortable" aria-pressed="true">舒适</button>
          <button class="proto-seg" data-layout-option="spacious" aria-pressed="false">宽松</button>
        </div>
      </div>
      <div class="proto-section">
        <span class="proto-label">角色</span>
        <div style="display: flex; gap: 4px;">
          <button class="proto-seg" data-persona-option="normal" aria-pressed="true">运营</button>
          <button class="proto-seg" data-persona-option="empty" aria-pressed="false">空</button>
          <button class="proto-seg" data-persona-option="power" aria-pressed="false">高管</button>
        </div>
      </div>
      <div class="proto-section">
        <button class="proto-seg" data-share>分享</button>
        <button class="proto-seg" data-feedback-toggle>反馈</button>
      </div>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/data.js"></script>
  <script src="js/persona.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feedback.js"></script>
</body>
</html>
