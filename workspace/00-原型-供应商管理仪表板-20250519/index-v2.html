<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>供应商管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* === RESTRAINED DESIGN SYSTEM === */
    :root {
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-2: #6B6B6B;
      --text-3: #9CA3AF;
      --border: #E5E5E5;
      --border-2: #D4D4D4;
      --accent: #B45309;
      --accent-light: #FEF3C7;
      --success: #166534;
      --success-light: #DCFCE7;
      --danger: #991B1B;
      --danger-light: #FEE2E2;

      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      padding: var(--space-xl);
    }

    /* === NAV === */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-2xl);
    }

    .brand {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: var(--space-lg);
    }

    .nav-links a {
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    /* === HERO METRICS (No cards, just text) === */
    .metrics {
      display: flex;
      gap: var(--space-2xl);
      margin-bottom: var(--space-2xl);
      padding-bottom: var(--space-xl);
      border-bottom: 1px solid var(--border);
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .metric-value.warning {
      color: var(--accent);
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
    }

    /* === LAYOUT === */
    .content {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-2xl);
    }

    /* === SECTION === */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-md);
    }

    /* === TABLE (Row-based, no card) === */
    .table-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 0.6fr;
      gap: var(--space-md);
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .table-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 0.6fr;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
      cursor: pointer;
      transition: background 0.1s;
    }

    .table-row:hover {
      background: var(--surface);
    }

    .cell-primary {
      font-weight: 500;
    }

    .cell-secondary {
      color: var(--text-2);
      font-size: 13px;
    }

    .cell-mono {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 13px;
      color: var(--text-2);
    }

    /* === STATUS === */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-ok { color: var(--success); }
    .status-ok .status-dot { background: var(--success); }
    .status-warn { color: var(--accent); }
    .status-warn .status-dot { background: var(--accent); }
    .status-bad { color: var(--danger); }
    .status-bad .status-dot { background: var(--danger); }

    /* === ALERTS === */
    .alert {
      padding: var(--space-md);
      border-radius: 6px;
      margin-bottom: var(--space-sm);
      font-size: 13px;
    }

    .alert-warning {
      background: var(--accent-light);
      color: var(--accent);
    }

    .alert-danger {
      background: var(--danger-light);
      color: var(--danger);
    }

    .alert-success {
      background: var(--success-light);
      color: var(--success);
    }

    /* === ACTIONS === */
    .actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .action {
      padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.1s;
    }

    .action:hover {
      border-color: var(--border-2);
    }

    /* === LINK === */
    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">供应商管理平台</div>
    <div class="nav-links">
      <a href="#" class="active">概览</a>
      <a href="#">供应商</a>
      <a href="#">合规</a>
      <a href="#">绩效</a>
    </div>
    <div style="font-size: 13px; color: var(--text-2);">王经理</div>
  </nav>

  <!-- 核心指标 - 纯文字，无卡片 -->
  <div class="metrics">
    <div class="metric">
      <div class="metric-value">¥27.6M</div>
      <div class="metric-label">年度支出</div>
    </div>
    <div class="metric">
      <div class="metric-value">6</div>
      <div class="metric-label">供应商</div>
    </div>
    <div class="metric">
      <div class="metric-value">3,930</div>
      <div class="metric-label">在册人数</div>
    </div>
    <div class="metric">
      <div class="metric-value warning">2</div>
      <div class="metric-label">预警</div>
    </div>
  </div>

  <div class="content">
    <div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md);">
        <div class="section-title">供应商</div>
        <a href="#" class="link">查看全部 →</a>
      </div>

      <div class="table-header">
        <div>名称</div>
        <div>人数</div>
        <div>支出</div>
        <div>合规</div>
        <div>状态</div>
      </div>

      <div class="table-row">
        <div>
          <div class="cell-primary">毅航科技</div>
          <div class="cell-secondary">北京</div>
        </div>
        <div class="cell-mono">1,200</div>
        <div class="cell-mono">¥850万</div>
        <div class="cell-mono" style="color: var(--success);">98%</div>
        <div class="status status-ok"><span class="status-dot"></span>正常</div>
      </div>

      <div class="table-row">
        <div>
          <div class="cell-primary">毛毛虫服务</div>
          <div class="cell-secondary">上海</div>
        </div>
        <div class="cell-mono">890</div>
        <div class="cell-mono">¥620万</div>
        <div class="cell-mono" style="color: var(--success);">95%</div>
        <div class="status status-ok"><span class="status-dot"></span>正常</div>
      </div>

      <div class="table-row">
        <div>
          <div class="cell-primary">伽玛外包</div>
          <div class="cell-secondary">广州</div>
        </div>
        <div class="cell-mono">650</div>
        <div class="cell-mono">¥410万</div>
        <div class="cell-mono" style="color: var(--accent);">82%</div>
        <div class="status status-warn"><span class="status-dot"></span>预警</div>
      </div>

      <div class="table-row">
        <div>
          <div class="cell-primary">赛维斯人力</div>
          <div class="cell-secondary">深圳</div>
        </div>
        <div class="cell-mono">520</div>
        <div class="cell-mono">¥380万</div>
        <div class="cell-mono" style="color: var(--success);">91%</div>
        <div class="status status-ok"><span class="status-dot"></span>正常</div>
      </div>

      <div class="table-row">
        <div>
          <div class="cell-primary">岐力咨询</div>
          <div class="cell-secondary">成都</div>
        </div>
        <div class="cell-mono">380</div>
        <div class="cell-mono">¥290万</div>
        <div class="cell-mono" style="color: var(--danger);">78%</div>
        <div class="status status-warn"><span class="status-dot"></span>预警</div>
      </div>

      <div class="table-row">
        <div>
          <div class="cell-primary">翰锐实业</div>
          <div class="cell-secondary">杭州</div>
        </div>
        <div class="cell-mono">290</div>
        <div class="cell-mono">¥210万</div>
        <div class="cell-mono" style="color: var(--success);">94%</div>
        <div class="status status-ok"><span class="status-dot"></span>正常</div>
      </div>
    </div>

    <div>
      <div class="section-title">通知</div>

      <div class="alert alert-warning">
        <strong>岐力咨询</strong> 合规率低于 80%<br>
        <span style="color: var(--text-3); font-size: 12px;">2小时前</span>
      </div>

      <div class="alert alert-success">
        <strong>毅航科技</strong> 月度绩效已更新<br>
        <span style="color: var(--text-3); font-size: 12px;">5小时前</span>
      </div>

      <div class="section-title" style="margin-top: var(--space-xl);">快捷操作</div>

      <div class="actions">
        <button class="action">导出月度报表</button>
        <button class="action">发起供应商评估</button>
        <button class="action">查看合同到期</button>
      </div>
    </div>
  </div>

</body>
</html>
