<!doctype html>
<html lang="zh-CN" data-theme="professional" data-layout="comfortable" data-persona="normal">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>供应商列表 - 供应商管理平台</title>
  <meta name="description" content="供应商列表" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/feedback.css" />
  <style>
    html[data-theme="professional"] { --surface: 255 255 255; --elevated: 248 250 252; --accent: 37 99 235; --muted: 226 232 240; --ink: 15 23 42; --ink2: 100 116 139; --radius: 8px; }
    html[data-theme="midnight"] { --surface: 15 23 42; --elevated: 30 41 59; --accent: 96 165 250; --muted: 51 65 85; --ink: 241 245 249; --ink2: 148 163 184; --radius: 8px; }
    html[data-theme="emerald"] { --surface: 255 255 255; --elevated: 240 253 244; --accent: 5 150 105; --muted: 167 243 208; --ink: 6 78 59; --ink2: 6 95 70; --radius: 8px; }
    html[data-layout="compact"] .dashboard-card { padding: 1rem; }
    html[data-layout="comfortable"] .dashboard-card { padding: 1.5rem; }
    html[data-layout="spacious"] .dashboard-card { padding: 2rem; }
    .dashboard-card { background: rgb(var(--elevated)); border: 1px solid rgb(var(--muted)); border-radius: var(--radius); }
    .supplier-card { border: 1px solid rgb(var(--muted)); border-radius: var(--radius); padding: 1rem; }
    .supplier-card:hover { border-color: rgb(var(--accent)); }
    .status-active { background: #10b981; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
    .status-warning { background: #f59e0b; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
    .status-inactive { background: #ef4444; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
    .risk-low { color: #10b981; }
    .risk-medium { color: #f59e0b; }
    .risk-high { color: #ef4444; }
    #proto-controls { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 9999; }
    .proto-bar { display: flex; flex-wrap: nowrap; gap: 1rem; padding: 0.75rem 1rem; background: rgba(var(--surface), 0.95); backdrop-filter: blur(8px); border: 1px solid rgb(var(--muted)); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .proto-bar-section { display: flex; align-items: center; gap: 0.5rem; }
    .proto-bar-label { font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: rgb(var(--ink2)); }
    .proto-seg-group { display: flex; gap: 0.25rem; }
    .proto-seg { padding: 0.375rem 0.75rem; font-size: 0.75rem; font-weight: 500; border-radius: 6px; border: 1px solid rgb(var(--muted)); background: transparent; color: rgb(var(--ink)); cursor: pointer; }
    .proto-seg[aria-pressed="true"] { background: rgb(var(--accent)); color: white; border-color: rgb(var(--accent)); }
    .proto-hint { text-align: center; font-size: 0.625rem; color: rgb(var(--ink2)); margin-top: 0.25rem; }
    .btn-primary { background: rgb(var(--accent)); color: white; padding: 0.625rem 1.25rem; border-radius: var(--radius); font-weight: 500; text-decoration: none; display: inline-block; }
    .btn-primary:hover { opacity: 0.9; }
  </style>
</head>
<body class="bg-surface text-ink font-body antialiased">

  <header class="border-b border-muted/20">
    <nav class="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-heading text-lg font-bold">供应商管理平台</a>
      <ul class="hidden md:flex gap-6 text-sm">
        <li><a href="index.html" class="hover:text-accent">概览</a></li>
        <li><a href="suppliers.html" class="text-accent font-medium">供应商</a></li>
        <li><a href="compliance.html" class="hover:text-accent">合规</a></li>
        <li><a href="performance.html" class="hover:text-accent">绩效</a></li>
      </ul>
      <a href="index.html" class="btn-primary text-sm">返回概览</a>
    </nav>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-8">
    <div class="dashboard-card">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold">供应商列表</h1>
          <p class="text-ink2 text-sm mt-1">管理全部 <span data-persona-text="stats.activeCount"></span> 家供应商</p>
        </div>
        <div class="flex gap-3">
          <input type="text" placeholder="搜索供应商..." class="px-4 py-2 border border-muted rounded-lg text-sm" />
          <button class="btn-primary" data-toast="功能演示：添加供应商">+ 添加供应商</button>
        </div>
      </div>

      <div data-supplier-list class="grid grid-cols-2 gap-4"></div>
    </div>
  </main>

  <footer class="border-t border-muted/20 mt-12">
    <div class="mx-auto max-w-7xl px-6 py-6 flex items-center justify-between text-sm text-ink2">
      <span>供应商管理平台 — 演示原型</span>
    </div>
  </footer>

  <div id="proto-controls">
    <div class="proto-bar">
      <div class="proto-bar-section">
        <span class="proto-bar-label">Theme</span>
        <div class="proto-seg-group">
          <button class="proto-seg" data-theme-option="professional" aria-pressed="true">专业蓝</button>
          <button class="proto-seg" data-theme-option="midnight" aria-pressed="false">深邃夜</button>
          <button class="proto-seg" data-theme-option="emerald" aria-pressed="false">翡翠绿</button>
        </div>
      </div>
      <div class="proto-bar-section">
        <span class="proto-bar-label">Layout</span>
        <div class="proto-seg-group">
          <button class="proto-seg" data-layout-option="compact" aria-pressed="false">紧凑</button>
          <button class="proto-seg" data-layout-option="comfortable" aria-pressed="true">舒适</button>
          <button class="proto-seg" data-layout-option="spacious" aria-pressed="false">宽松</button>
        </div>
      </div>
      <div class="proto-bar-section">
        <span class="proto-bar-label">Persona</span>
        <div class="proto-seg-group">
          <button class="proto-seg" data-persona-option="normal" aria-pressed="true">运营</button>
          <button class="proto-seg" data-persona-option="empty" aria-pressed="false">空</button>
          <button class="proto-seg" data-persona-option="power" aria-pressed="false">高管</button>
        </div>
      </div>
      <div class="proto-bar-section">
        <button class="proto-seg" data-share>🔗 Share</button>
        <button class="proto-seg" data-feedback-toggle>💬 Feedback</button>
      </div>
    </div>
    <p class="proto-hint">Shift + ? · 最近页面</p>
  </div>

  <script src="js/state.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/data.js"></script>
  <script src="js/persona.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feedback.js"></script>
  <script>
    // Override data.js for grid layout
    const originalApply = Data.apply;
    Data.apply = function(personaName) {
      const persona = Data.get(personaName);
      if (persona.stats) {
        document.querySelectorAll('[data-persona-text="stats.activeCount"]').forEach(el => {
          el.textContent = persona.stats.activeCount;
        });
      }

      const supplierList = document.querySelector('[data-supplier-list]');
      if (supplierList && persona.suppliers) {
        supplierList.innerHTML = '';
        persona.suppliers.forEach(s => {
          const card = document.createElement('div');
          card.className = 'supplier-card';
          card.innerHTML = `
            <div class="flex items-start justify-between mb-3">
              <div>
                <h3 class="font-semibold text-lg">${s.name}</h3>
                <p class="text-sm text-ink2">${s.location} · ${s.type}</p>
              </div>
              <span class="status-${s.status}">${s.status === 'active' ? '正常' : s.status === 'warning' ? '预警' : '停用'}</span>
            </div>
            <div class="grid grid-cols-3 gap-4 text-sm">
              <div>
                <div class="text-ink2">人数</div>
                <div class="font-medium">${s.headcount.toLocaleString()}</div>
              </div>
              <div>
                <div class="text-ink2">支出</div>
                <div class="font-medium">¥${(s.spend/10000).toFixed(0)}万</div>
              </div>
              <div>
                <div class="text-ink2">合规</div>
                <div class="font-medium ${s.compliance >= 90 ? 'risk-low' : s.compliance >= 80 ? 'risk-medium' : 'risk-high'}">${s.compliance}%</div>
              </div>
            </div>
            <div class="mt-4 flex gap-2">
              <button class="text-sm text-accent hover:underline" data-toast="查看详情">查看详情</button>
              <button class="text-sm text-accent hover:underline" data-toast="编辑">编辑</button>
            </div>
          `;
          supplierList.appendChild(card);
        });
      }
    };
  </script>
</body>
</html>
