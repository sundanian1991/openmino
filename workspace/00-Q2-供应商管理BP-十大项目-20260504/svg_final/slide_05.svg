<text x="690" y="532" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">策略：准备替代方案，必要时清退</text>
<text x="690" y="560" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">注意：分级是动态的，季度调整</text>
