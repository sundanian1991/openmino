<text x="690" y="208" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">6-10 家 · 资源倾斜 · 优先分配 · 深度绑定</text>
<text x="690" y="232" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">策略：重点投入，确保稳定产出</text>
