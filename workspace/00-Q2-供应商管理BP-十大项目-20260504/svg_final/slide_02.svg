<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
<rect width="1280" height="720" fill="#FFFFFF"/>
<rect x="0" y="0" width="1280" height="3" fill="#1677FF"/>
<text x="40" y="22" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">背景与定位</text>
<text x="1240" y="22" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#1677FF">供应商管理BP</text>
<line x1="40" y1="30" x2="1240" y2="30" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="36" width="3" height="52" fill="#1677FF"/>
<text x="52" y="70" font-family="Songti SC,SimSun,serif" font-size="22" font-weight="bold" fill="#1A1A1A">为什么需要这份规划</text>
<line x1="40" y1="94" x2="1240" y2="94" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="100" width="590" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="40" y="100" width="4" height="580" fill="#1677FF"/>
<text x="64" y="132" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">我的角色</text>
<text x="64" y="164" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">负责 30+ 供应商的全量管理</text>
<text x="64" y="196" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">合规、准入、清退、分工</text>
<text x="64" y="228" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">定位偏 BP — 连接公司与供应商</text>
<text x="64" y="260" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">通过影响他人达成业务结果</text>
<rect x="64" y="300" width="546" height="1" fill="#E2E2E2"/>
<text x="64" y="332" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">管理现状</text>
<text x="64" y="364" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">偏事件驱动 — 出问题才处理</text>
<text x="64" y="396" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">缺乏系统性的管理体系</text>
<text x="64" y="428" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">判断多凭经验，数据支撑不足</text>
<rect x="64" y="468" width="546" height="1" fill="#E2E2E2"/>
<text x="64" y="500" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">重点供应商</text>
<text x="64" y="532" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">毅航、毛毛虫、伽玛、赛维斯、岐力、翰锐</text>
<text x="64" y="564" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">金条头部 6 家，总目标 3 亿+ 职场</text>
<rect x="646" y="100" width="594" height="580" rx="4" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="0.5"/>
<rect x="646" y="100" width="4" height="580" fill="#1677FF"/>
<text x="670" y="132" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">为什么做这个规划</text>
<rect x="670" y="152" width="550" height="4" rx="2" fill="#1677FF"/>
<text x="670" y="188" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">HRBP 领域有成熟的十大落地项目框架，</text>
<text x="670" y="212" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">覆盖人才管理全生命周期。这套框架的</text>
<text x="670" y="236" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">底层逻辑同样适用于供应商管理。</text>
<rect x="670" y="280" width="550" height="1" fill="#E2E2E2"/>
<text x="670" y="312" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">核心差异</text>
<text x="670" y="344" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">HRBP 管"内部员工"，有制度约束力</text>
<text x="670" y="368" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">我们管"外部供应商"，约束力来自</text>
<text x="670" y="392" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">合同 + 利益分配，更强调利益绑定</text>
<rect x="670" y="436" width="550" height="1" fill="#E2E2E2"/>
<text x="670" y="468" font-family="Microsoft YaHei,sans-serif" font-size="14" font-weight="bold" fill="#1677FF">Q2 核心目标</text>
<rect x="670" y="500" width="550" height="140" rx="4" fill="#F5F5F5"/>
<text x="690" y="532" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">从被动响应 → 主动管理</text>
<text x="690" y="560" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">从经验判断 → 数据驱动</text>
<text x="690" y="588" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">从单点动作 → 体系化闭环</text>
<text x="690" y="616" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#333333">从执行者 → BP 角色</text>
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="40" y="708" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">来源：内部梳理 · 2026-05-04</text>
<text x="1240" y="708" text-anchor="end" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#888888">2 / 13</text>
</svg>
