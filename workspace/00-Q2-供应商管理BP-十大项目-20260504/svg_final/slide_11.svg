<line x1="40" y1="256" x2="1240" y2="256" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="234" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#8A5A00">数据缺失导致无法评估</text>
<text x="400" y="234" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">决策盲猜</text>
