<text x="648" y="235" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8A5A00">高</text>
<text x="840" y="234" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">先手动收集，逐步自动化</text>
<text x="1100" y="234" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">4月末数据缺失</text>
<rect x="40" y="256" width="1200" height="50" fill="#FFFFFF"/>
<line x1="40" y1="306" x2="1240" y2="306" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="284" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#8A5A00">制度变更审批周期长</text>
<text x="400" y="284" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">进度延迟</text>
<rect x="640" y="270" width="50" height="22" rx="4" fill="#F7EFE0"/>
<text x="648" y="285" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8A5A00">高</text>
<text x="840" y="284" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">提前沟通，先框架后细节</text>
<text x="1100" y="284" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">超 2 周未批复</text>
<rect x="40" y="306" width="1200" height="50" fill="#FAFAFA"/>
<line x1="40" y1="356" x2="1240" y2="356" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="334" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#F7EFE0">内部配合度不足</text>
<text x="400" y="334" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">项目搁置</text>
<rect x="640" y="320" width="50" height="22" rx="4" fill="#F7EFE0"/>
<text x="648" y="335" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8A5A00">中</text>
<text x="840" y="334" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">明确责任人 + 向上对齐</text>
<text x="1100" y="334" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">连续 2 次未响应</text>
<rect x="40" y="356" width="1200" height="50" fill="#FFFFFF"/>
<line x1="40" y1="406" x2="1240" y2="406" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="384" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#8A5A00">供应商抵触分级</text>
<text x="400" y="384" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">关系紧张</text>
<rect x="640" y="370" width="50" height="22" rx="4" fill="#F7EFE0"/>
<text x="648" y="385" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8A5A00">中</text>
<text x="840" y="384" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">分级不对外公布，只沟通提升方向</text>
<text x="1100" y="384" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">供应商主动询问排名</text>
<rect x="40" y="406" width="1200" height="50" fill="#FAFAFA"/>
<line x1="40" y1="456" x2="1240" y2="456" stroke="#E2E2E2" stroke-width="0.5"/>
<text x="56" y="434" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#F7EFE0">业务目标突变</text>
<text x="400" y="434" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">计划作废</text>
<rect x="640" y="420" width="50" height="22" rx="4" fill="#F7EFE0"/>
<text x="648" y="435" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#8A5A00">中</text>
<text x="840" y="434" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">模块化设计，可快速调整</text>
<text x="1100" y="434" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">业务线战略调整</text>
<rect x="40" y="476" width="1200" height="160" rx="4" fill="#F5F5F5"/>
<text x="64" y="508" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">风险管理原则</text>
<rect x="64" y="524" width="4" height="90" fill="#1677FF"/>
<text x="84" y="544" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">1. 风险前置：不等问题发生，提前识别信号</text>
<text x="84" y="564" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">2. 分级响应：不同风险等级对应不同响应速度，红色 24h、黄色 72h、绿色周报跟踪</text>
<text x="84" y="584" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">3. 预案先行：每个高风险项都有 B 计划，不临时抱佛脚</text>
<text x="84" y="604" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">4. 月度回顾：每月复盘风险矩阵，更新概率和影响评估</text>
<line x1="40" y1="690" x2="1240" y2="690" stroke="#E2E2E2" stroke-width="0.5"/>
