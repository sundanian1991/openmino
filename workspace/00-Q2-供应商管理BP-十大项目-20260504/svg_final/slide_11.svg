<text x="648" y="185" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#9C2B2B">低</text>
<text x="840" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">备份供应商预案 + 产能冗余</text>
<text x="1100" y="184" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#333333">预警红色</text>
