<text x="400" y="143" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">影响</text>
<text x="640" y="143" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">概率</text>
<text x="840" y="143" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">应对策略</text>
<text x="1100" y="143" font-family="Microsoft YaHei,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">触发信号</text>
<rect x="40" y="156" width="1200" height="50" fill="#FFFFFF"/>
<line x1="40" y1="206" x2="1240" y2="206" stroke="#E2E2E2" stroke-width="0.5"/>
