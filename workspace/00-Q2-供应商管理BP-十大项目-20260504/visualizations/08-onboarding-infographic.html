<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新供应商引入效能 - Infographic</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #f5f5f5; }
  #container { width: 100%; height: 100%; }
  #export-btn {
    position: fixed; top: 16px; right: 16px; z-index: 999;
    padding: 8px 16px; background: #1890ff; color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
  }
  #export-btn:hover { background: #40a9ff; }
</style>
</head>
<body>
<div id="container"></div>
<button id="export-btn">导出 SVG</button>
<script src="https://unpkg.com/@antv/infographic@latest/dist/infographic.min.js"></script>
<script>
const infographic = new AntVInfographic.Infographic({
  container: '#container',
  width: '100%',
  height: '100%',
});

const syntax = `infographic sequence-stairs-front-pill-badge
data
  title 新供应商引入效能
  desc 从15天压缩到5-7天，建立备选供应商池
  items
    - label 准入流程体检
      desc 回顾近3个月数据，识别最耗时环节
    - label 准入能力模型
      desc 五维画像评估供应商综合资质
    - label 流程优化
      desc 标准化清单+信息复用+并行处理
    - label 备选供应商池
      desc 建立潜在档案，快速启动
  order asc
theme
  palette #1B6CA8 #2EA87A #D48806 #E07563
  base
    text
      font-family "PingFang SC", "Microsoft YaHei", sans-serif
`;

document.fonts?.ready.then(() => {
  infographic.render(syntax);
}).catch((error) => {
  console.error('Error waiting for fonts to load:', error);
  infographic.render(syntax);
});

document.getElementById('export-btn').addEventListener('click', async () => {
  const svgDataUrl = await infographic.toDataURL({ type: 'svg' });
  const link = document.createElement('a');
  link.download = '新供应商引入效能-infographic.svg';
  link.href = svgDataUrl;
  link.click();
});
</script>
</body>
</html>
