<rect class="edge-label-bg" x="545" y="671" width="92" height="36" rx="16" />
<text class="edge-label" style="font-size: 13.5px;" x="591" y="691.8">
<tspan x="591" dy="0">建立标准</tspan>
</text>
</g>
<g class="edge edge-2">
<path class="pipe-flow" style="stroke: var(--flow_sky); stroke-width: 2.69; stroke-dasharray: 6 7; animation-duration: 2.2s;" d="M 522 550 C 576 550, 606 550, 660 550" />
<rect class="edge-label-bg" x="484.9" y="420" width="92" height="36" rx="16" />
