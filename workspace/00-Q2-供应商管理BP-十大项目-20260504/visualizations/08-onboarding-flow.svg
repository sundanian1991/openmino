<path class="group-frame" d="M 108 160 H 1092 A 28 28 0 0 1 1120 188 V 652 A 28 28 0 0 1 1092 680 H 108 A 28 28 0 0 1 80 652 V 188 A 28 28 0 0 1 108 160 Z" />
</g>
