<section class="slide layout-architecture" data-title="{{title}}" data-layout="architecture">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="ARCHITECTURE">{{kicker}}</p>
    <h2 data-field="title" data-example="Sense Deck 的核心是语义层和渲染层解耦">{{title}}</h2>
  </div>
  <div class="architecture-map">
    <article class="arch-node source">
      <small>01</small>
      <strong data-field="node1Title" data-example="Source">{{node1Title}}</strong>
      <p data-field="node1Body" data-example="主题、文章、数据、访谈或用户素材。">{{node1Body}}</p>
    </article>
    <article class="arch-node core">
      <small>02</small>
      <strong data-field="node2Title" data-example="Content IR">{{node2Title}}</strong>
      <p data-field="node2Body" data-example="受众、叙事、页面角色、布局、动效和讲稿。">{{node2Body}}</p>
    </article>
    <article class="arch-node">
      <small>03</small>
      <strong data-field="node3Title" data-example="Template Library">{{node3Title}}</strong>
      <p data-field="node3Body" data-example="主题、完整 deck、单页布局和动效组件。">{{node3Body}}</p>
    </article>
    <article class="arch-node">
      <small>04</small>
      <strong data-field="node4Title" data-example="Static Runtime">{{node4Title}}</strong>
      <p data-field="node4Body" data-example="HTML 演示、演讲者模式、生命周期、手势控制。">{{node4Body}}</p>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="架构页要从左到右讲清楚数据如何流动，而不是解释每个模块的所有细节。">{{speakerNotes}}</aside>
</section>
