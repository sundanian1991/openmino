<section class="slide" data-title="{{title}}">
  <div class="slide-head">
    <p class="kicker">{{kicker}}</p>
    <h2>{{title}}</h2>
  </div>
  <div class="compare-grid">
    <article class="glass-panel">
      <h3>{{leftTitle}}</h3>
      <ul>
        <li>{{left1}}</li>
        <li>{{left2}}</li>
        <li>{{left3}}</li>
        <li>{{left4}}</li>
      </ul>
    </article>
    <article class="glass-panel primary">
      <h3>{{rightTitle}}</h3>
      <ul>
        <li>{{right1}}</li>
        <li>{{right2}}</li>
        <li>{{right3}}</li>
        <li>{{right4}}</li>
      </ul>
    </article>
  </div>
  <aside class="notes">{{speakerNotes}}</aside>
</section>
