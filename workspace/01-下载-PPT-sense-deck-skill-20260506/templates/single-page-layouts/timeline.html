<section class="slide layout-timeline" data-title="{{title}}" data-layout="timeline">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="TIMELINE">{{kicker}}</p>
    <h2 data-field="title" data-example="行业变化不是跳跃，而是连续积累">{{title}}</h2>
  </div>
  <div class="timeline-track" data-anim="stagger">
    <article class="timeline-node">
      <small data-field="time1" data-example="2023">{{time1}}</small>
      <strong data-field="event1Title" data-example="短剧商业模型验证">{{event1Title}}</strong>
      <p data-field="event1Body" data-example="国内短剧完成用户教育，分集付费和买量投放跑通。">{{event1Body}}</p>
    </article>
    <article class="timeline-node">
      <small data-field="time2" data-example="2024">{{time2}}</small>
      <strong data-field="event2Title" data-example="海外应用开始放量">{{event2Title}}</strong>
      <p data-field="event2Body" data-example="欧美和东南亚市场出现头部短剧 App，题材本土化变成核心变量。">{{event2Body}}</p>
    </article>
    <article class="timeline-node">
      <small data-field="time3" data-example="2025">{{time3}}</small>
      <strong data-field="event3Title" data-example="AI进入生产链路">{{event3Title}}</strong>
      <p data-field="event3Body" data-example="剧本变体、配音字幕、海报预告和素材测试被系统化提速。">{{event3Body}}</p>
    </article>
    <article class="timeline-node">
      <small data-field="time4" data-example="Next">{{time4}}</small>
      <strong data-field="event4Title" data-example="竞争转向内容操作系统">{{event4Title}}</strong>
      <p data-field="event4Body" data-example="单部爆款的价值下降，数据回写和批量复制能力成为壁垒。">{{event4Body}}</p>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="时间线不要念年份，要讲清楚每个阶段积累出了什么能力。">{{speakerNotes}}</aside>
</section>
