<section class="slide layout-code" data-title="{{title}}" data-layout="code">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="IMPLEMENTATION">{{kicker}}</p>
    <h2 data-field="title" data-example="用一份 IR 驱动多种输出">{{title}}</h2>
  </div>
  <div class="code-grid">
    <pre class="code-panel"><code data-field="code" data-example='{"role":"market-signal","layout":"market-signal","animations":["stagger"]}'>{{code}}</code></pre>
    <article class="glass-panel code-notes">
      <h3 data-field="explainTitle" data-example="为什么这样设计">{{explainTitle}}</h3>
      <ul>
        <li data-field="point1" data-example="内容结构和视觉模板解耦">{{point1}}</li>
        <li data-field="point2" data-example="HTML、PDF、长图可以共用同一份语义数据">{{point2}}</li>
        <li data-field="point3" data-example="Agent 不再直接从原文硬写页面">{{point3}}</li>
      </ul>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="代码页要讲思路，不要逐行解释。把听众注意力放在结构关系上。">{{speakerNotes}}</aside>
</section>
