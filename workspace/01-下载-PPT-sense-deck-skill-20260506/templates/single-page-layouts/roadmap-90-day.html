<section class="slide" data-title="{{title}}">
  <div class="slide-head">
    <p class="kicker">{{kicker}}</p>
    <h2>{{title}}</h2>
  </div>
  <div class="roadmap">
    <article><small>{{phase1Time}}</small><strong>{{phase1}}</strong><p>{{phase1Detail}}</p></article>
    <article><small>{{phase2Time}}</small><strong>{{phase2}}</strong><p>{{phase2Detail}}</p></article>
    <article><small>{{phase3Time}}</small><strong>{{phase3}}</strong><p>{{phase3Detail}}</p></article>
    <article><small>{{phase4Time}}</small><strong>{{phase4}}</strong><p>{{phase4Detail}}</p></article>
  </div>
  <aside class="notes">{{speakerNotes}}</aside>
</section>
