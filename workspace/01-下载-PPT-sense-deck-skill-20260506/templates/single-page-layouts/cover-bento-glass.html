<section class="slide cover active" data-title="{{title}}">
  <div class="cover-grid">
    <div class="hero-copy">
      <p class="kicker">{{kicker}}</p>
      <h1>{{title}}</h1>
      <p class="lead">{{lead}}</p>
    </div>
    <div class="hero-device glass-panel">
      <div class="phone-frame">
        <div class="reel-card reel-a"><span>{{card1Label}}</span><strong>{{card1}}</strong></div>
        <div class="reel-card reel-b"><span>{{card2Label}}</span><strong>{{card2}}</strong></div>
        <div class="reel-card reel-c"><span>{{card3Label}}</span><strong>{{card3}}</strong></div>
      </div>
    </div>
  </div>
  <aside class="notes">{{speakerNotes}}</aside>
</section>
