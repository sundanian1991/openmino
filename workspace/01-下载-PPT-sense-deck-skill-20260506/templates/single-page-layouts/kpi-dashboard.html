<section class="slide layout-kpi-dashboard" data-title="{{title}}" data-layout="kpi-dashboard">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="KPI DASHBOARD">{{kicker}}</p>
    <h2 data-field="title" data-example="看一个短剧项目，先看四个漏斗指标">{{title}}</h2>
  </div>
  <div class="dashboard-grid">
    <article class="metric-card">
      <small data-field="metric1Label" data-example="CTR">{{metric1Label}}</small>
      <strong data-field="metric1Value" data-example="3.8%">{{metric1Value}}</strong>
      <span data-field="metric1Note" data-example="前3秒钩子是否成立">{{metric1Note}}</span>
    </article>
    <article class="metric-card">
      <small data-field="metric2Label" data-example="Completion">{{metric2Label}}</small>
      <strong data-field="metric2Value" data-example="41%">{{metric2Value}}</strong>
      <span data-field="metric2Note" data-example="单集节奏是否足够紧">{{metric2Note}}</span>
    </article>
    <article class="metric-card">
      <small data-field="metric3Label" data-example="Unlock">{{metric3Label}}</small>
      <strong data-field="metric3Value" data-example="9.6%">{{metric3Value}}</strong>
      <span data-field="metric3Note" data-example="付费点是否卡在正确位置">{{metric3Note}}</span>
    </article>
    <article class="metric-card">
      <small data-field="metric4Label" data-example="ROAS">{{metric4Label}}</small>
      <strong data-field="metric4Value" data-example="1.32">{{metric4Value}}</strong>
      <span data-field="metric4Note" data-example="素材和题材能否规模化投放">{{metric4Note}}</span>
    </article>
    <article class="glass-panel dashboard-insight">
      <h3 data-field="insightTitle" data-example="判断标准">{{insightTitle}}</h3>
      <p data-field="insight" data-example="不要只看播放量。真正决定扩量的是点击、完播、解锁和回收周期能不能同时站住。">{{insight}}</p>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="KPI页要强调漏斗关系。单个数字漂亮没有意义，关键是四个指标能不能互相支撑。">{{speakerNotes}}</aside>
</section>
