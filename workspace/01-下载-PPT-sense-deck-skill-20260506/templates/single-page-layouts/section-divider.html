<section class="slide layout-section-divider" data-title="{{title}}" data-layout="section-divider" data-canvas-fx="{{canvasFx}}">
  <canvas class="fx-canvas" aria-hidden="true"></canvas>
  <div class="section-mark">
    <p class="kicker" data-field="kicker" data-example="PART 01">{{kicker}}</p>
    <h2 data-field="title" data-example="风口不是突然出现">{{title}}</h2>
    <p class="lead" data-field="lead" data-example="先看清楚市场、技术和分发三股力量如何叠加。">{{lead}}</p>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="这里作为章节切换，语速可以放慢，用一句话把观众带到下一段。">{{speakerNotes}}</aside>
</section>
