<section class="slide layout-thanks" data-title="{{title}}" data-layout="thanks">
  <div class="thanks-card glass-panel">
    <p class="kicker" data-field="kicker" data-example="THANK YOU">{{kicker}}</p>
    <h2 data-field="title" data-example="谢谢，欢迎继续共建素材库">{{title}}</h2>
    <p class="lead" data-field="lead" data-example="下一步，把高频主题、完整 deck、单页布局和动效组件持续沉淀。">{{lead}}</p>
    <div class="contact-row">
      <span data-field="contact1" data-example="sense-deck-skill">{{contact1}}</span>
      <span data-field="contact2" data-example="Static HTML / CSS / JS">{{contact2}}</span>
      <span data-field="contact3" data-example="Optional Gesture Ready">{{contact3}}</span>
    </div>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="结束页收束，不要再引入新信息。给出下一步即可。">{{speakerNotes}}</aside>
</section>
