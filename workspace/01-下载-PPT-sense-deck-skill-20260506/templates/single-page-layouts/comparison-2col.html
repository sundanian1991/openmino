<section class="slide layout-comparison-2col" data-title="{{title}}" data-layout="comparison-2col">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="CONTRAST">{{kicker}}</p>
    <h2 data-field="title" data-example="真正的差异，不在工具，而在工作流">{{title}}</h2>
  </div>
  <div class="compare-grid">
    <article class="glass-panel">
      <small data-field="leftLabel" data-example="旧路径">{{leftLabel}}</small>
      <h3 data-field="leftTitle" data-example="从空白页开始设计">{{leftTitle}}</h3>
      <ul>
        <li data-field="left1" data-example="每页重新写版式和 CSS">{{left1}}</li>
        <li data-field="left2" data-example="风格随着上下文变长而漂移">{{left2}}</li>
        <li data-field="left3" data-example="动效和交互难以复用">{{left3}}</li>
      </ul>
    </article>
    <article class="glass-panel primary">
      <small data-field="rightLabel" data-example="新路径">{{rightLabel}}</small>
      <h3 data-field="rightTitle" data-example="先选模板再填内容">{{rightTitle}}</h3>
      <ul>
        <li data-field="right1" data-example="主题、布局、动效都有现成组件">{{right1}}</li>
        <li data-field="right2" data-example="结构稳定，内容替换更快">{{right2}}</li>
        <li data-field="right3" data-example="生成质量从随机变成可控">{{right3}}</li>
      </ul>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="这一页讲二元对比，不要平均用力，重点落在右侧的新路径。">{{speakerNotes}}</aside>
</section>
