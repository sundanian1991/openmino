<section class="slide" data-title="{{title}}">
  <div class="slide-head">
    <p class="kicker">{{kicker}}</p>
    <h2>{{title}}</h2>
  </div>
  <div class="metrics-row">
    <article class="metric-card"><small>{{metric1Label}}</small><strong>{{metric1}}</strong><span>{{metric1Note}}</span></article>
    <article class="metric-card"><small>{{metric2Label}}</small><strong>{{metric2}}</strong><span>{{metric2Note}}</span></article>
    <article class="metric-card"><small>{{metric3Label}}</small><strong>{{metric3}}</strong><span>{{metric3Note}}</span></article>
  </div>
  <div class="glass-panel insight">
    <h3>{{insightTitle}}</h3>
    <p>{{insight}}</p>
  </div>
  <aside class="notes">{{speakerNotes}}</aside>
</section>
