<section class="slide" data-title="{{title}}">
  <div class="slide-head">
    <p class="kicker">{{kicker}}</p>
    <h2>{{title}}</h2>
  </div>
  <div class="pipeline">
    <div class="step"><span>01</span><strong>{{step1}}</strong><small>{{step1Note}}</small></div>
    <div class="step"><span>02</span><strong>{{step2}}</strong><small>{{step2Note}}</small></div>
    <div class="step"><span>03</span><strong>{{step3}}</strong><small>{{step3Note}}</small></div>
    <div class="step"><span>04</span><strong>{{step4}}</strong><small>{{step4Note}}</small></div>
    <div class="step"><span>05</span><strong>{{step5}}</strong><small>{{step5Note}}</small></div>
  </div>
  <div class="ai-core glass-panel">
    <h3>{{insightTitle}}</h3>
    <p>{{insight}}</p>
  </div>
  <aside class="notes">{{speakerNotes}}</aside>
</section>
