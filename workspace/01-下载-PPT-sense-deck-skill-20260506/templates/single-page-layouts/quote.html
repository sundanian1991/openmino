<section class="slide layout-quote" data-title="{{title}}" data-layout="quote">
  <div class="quote-wrap glass-panel">
    <p class="kicker" data-field="kicker" data-example="KEY IDEA">{{kicker}}</p>
    <blockquote data-field="quote" data-example="AI短剧出海的胜负手，不是更快做完一部剧，而是更快理解一个市场。">{{quote}}</blockquote>
    <div class="quote-meta">
      <strong data-field="source" data-example="Sense Deck Insight">{{source}}</strong>
      <span data-field="sourceNote" data-example="用于章节收束或观点强调">{{sourceNote}}</span>
    </div>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="引用页适合停顿。讲完这句话后留一秒，再解释它为什么是后续章节的判断基准。">{{speakerNotes}}</aside>
</section>
