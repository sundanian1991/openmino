<section class="slide layout-agenda" data-title="{{title}}" data-layout="agenda">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="AGENDA">{{kicker}}</p>
    <h2 data-field="title" data-example="今天只讲清楚三件事">{{title}}</h2>
  </div>
  <div class="agenda-list" data-anim="stagger">
    <article class="glass-panel agenda-item">
      <span>01</span>
      <strong data-field="item1Title" data-example="风口为什么现在出现">{{item1Title}}</strong>
      <p data-field="item1Note" data-example="短剧付费、AI产能和全球买量基础设施同时成熟。">{{item1Note}}</p>
    </article>
    <article class="glass-panel agenda-item">
      <span>02</span>
      <strong data-field="item2Title" data-example="AI如何改造短剧链路">{{item2Title}}</strong>
      <p data-field="item2Note" data-example="从题材扫描到素材测试，生产链路变成持续迭代系统。">{{item2Note}}</p>
    </article>
    <article class="glass-panel agenda-item">
      <span>03</span>
      <strong data-field="item3Title" data-example="出海团队该怎么启动">{{item3Title}}</strong>
      <p data-field="item3Note" data-example="用90天跑通小闭环，再扩大题材和语言矩阵。">{{item3Note}}</p>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="这一页不要展开细节，只帮听众建立接下来三段内容的预期。">{{speakerNotes}}</aside>
</section>
