<section class="slide layout-comparison-3col" data-title="{{title}}" data-layout="comparison-3col">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="THREE OPTIONS">{{kicker}}</p>
    <h2 data-field="title" data-example="三种路线，决定三种交付效率">{{title}}</h2>
  </div>
  <div class="three-col-grid" data-anim="stagger">
    <article class="bento-card">
      <span class="num">01</span>
      <h3 data-field="col1Title" data-example="Markdown Slides">{{col1Title}}</h3>
      <p data-field="col1Body" data-example="结构清楚、速度快，但视觉表达和复杂版式容易受限。">{{col1Body}}</p>
    </article>
    <article class="bento-card">
      <span class="num">02</span>
      <h3 data-field="col2Title" data-example="Raw HTML">{{col2Title}}</h3>
      <p data-field="col2Body" data-example="自由度最高，但每次都要重建主题、布局和交互。">{{col2Body}}</p>
    </article>
    <article class="bento-card accent">
      <span class="num">03</span>
      <h3 data-field="col3Title" data-example="Template Skill">{{col3Title}}</h3>
      <p data-field="col3Body" data-example="把自由度收进素材库，既稳定又能保留视觉表达。">{{col3Body}}</p>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="三栏对比适合讲路线选择。最后一栏通常作为推荐方案，要给它更强视觉权重。">{{speakerNotes}}</aside>
</section>
