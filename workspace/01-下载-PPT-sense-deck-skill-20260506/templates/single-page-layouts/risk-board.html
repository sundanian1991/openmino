<section class="slide layout-risk-board" data-title="{{title}}" data-layout="risk-board">
  <div class="slide-head">
    <p class="kicker" data-field="kicker" data-example="RISKS">{{kicker}}</p>
    <h2 data-field="title" data-example="真正的风险，不是做不出来，而是扩不稳">{{title}}</h2>
  </div>
  <div class="risk-grid" data-anim="stagger">
    <article class="risk-card">
      <span data-field="risk1Title" data-example="内容风险">{{risk1Title}}</span>
      <p data-field="risk1Body" data-example="题材尺度、文化误读、性别叙事和当地价值观冲突。">{{risk1Body}}</p>
    </article>
    <article class="risk-card">
      <span data-field="risk2Title" data-example="投放风险">{{risk2Title}}</span>
      <p data-field="risk2Body" data-example="素材内卷导致获客成本上升，ROAS 迅速被压缩。">{{risk2Body}}</p>
    </article>
    <article class="risk-card">
      <span data-field="risk3Title" data-example="合规风险">{{risk3Title}}</span>
      <p data-field="risk3Body" data-example="版权、肖像、音乐、AI生成素材和平台广告政策都要可审计。">{{risk3Body}}</p>
    </article>
    <article class="risk-card">
      <span data-field="risk4Title" data-example="组织风险">{{risk4Title}}</span>
      <p data-field="risk4Body" data-example="内容、投放、数据和本土化团队割裂，会让迭代速度变慢。">{{risk4Body}}</p>
    </article>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="风险页要避免吓人，重点是说明这些风险可以通过流程和系统前置管理。">{{speakerNotes}}</aside>
</section>
