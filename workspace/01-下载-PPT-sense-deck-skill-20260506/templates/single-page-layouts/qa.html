<section class="slide layout-qa" data-title="{{title}}" data-layout="qa">
  <div class="qa-panel glass-panel">
    <p class="kicker" data-field="kicker" data-example="Q&A">{{kicker}}</p>
    <h2 data-field="title" data-example="我们现在可以拆任何一个环节">{{title}}</h2>
    <div class="qa-prompts" data-anim="stagger">
      <span data-field="prompt1" data-example="模板库怎么扩？">{{prompt1}}</span>
      <span data-field="prompt2" data-example="手势识别怎么接？">{{prompt2}}</span>
      <span data-field="prompt3" data-example="Typst 负责什么？">{{prompt3}}</span>
      <span data-field="prompt4" data-example="如何导出 PDF？">{{prompt4}}</span>
    </div>
  </div>
  <aside class="notes" data-field="speakerNotes" data-example="Q&A 页不要放太多字，用几个提示问题帮听众开口。">{{speakerNotes}}</aside>
</section>
