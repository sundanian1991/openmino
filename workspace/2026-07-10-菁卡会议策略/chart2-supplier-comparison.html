<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商盈亏全景：只有底线值方案能让AI供应商转正</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #ffffff;
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  #chart { width: 100%; height: 600px; }
  .insight {
    margin-top: 18px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.04);
    border-left: 3px solid #ff4d4f;
    border-radius: 4px;
    color: #d0d0e0;
    font-size: 14px;
    line-height: 1.7;
  }
  .insight strong { color: #ff4d4f; }
</style>
</head>
<body>
<div class="container">
  <div id="chart"></div>
  <div class="insight">
    <strong>数据解读：</strong>前4个版本虽然坐席收入和BPO结算逐级提升，但AI供应商月亏损始终无法转正（-33.75万→-15.51万）。只有底线值方案通过同步上调产品分润，才使AI端扭亏为盈（+5.69万）。核心结论：单纯拉高坐席收入是"治标"，必须联动产品定价才能拯救AI端，否则供应商生态不可持续。
  </div>
</div>
<script>
  var chart = echarts.init(document.getElementById('chart'));

  var versions = ['6月真实', '版本2', '版本3', '版本4', '底线值'];
  var seatIncome = [3500, 3800, 4000, 4500, 4500];
  var bpoSettle  = [5130, 5734, 6030, 6670, 6870];
  var totalSettle= [13222, 14649, 15348, 16860, 18234];
  var aiPnl      = [-33.75, -26.60, -23.09, -15.51, 5.69];

  function hexToRgb(hex, alpha) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function barItemStyle(value, baseColor, index) {
    // 6月真实 红色高亮，底线值 绿色高亮
    if (index === 0) return { color: hexToRgb('#E74C3C', 0.9), borderRadius: [4,4,0,0] };
    if (index === 4) return { color: hexToRgb('#27AE60', 0.9), borderRadius: [4,4,0,0] };
    return { color: baseColor, borderRadius: [4,4,0,0] };
  }

  var option = {
    backgroundColor: 'transparent',
    title: {
      text: '供应商盈亏全景：只有底线值方案能让AI供应商转正',
      subtext: '5个版本对比 — 不调分润比例，怎么提坐席收入都救不了AI端',
      left: 'center',
      top: 8,
      textStyle: { color: '#ffffff', fontSize: 20, fontWeight: 'bold' },
      subtextStyle: { color: '#9090a8', fontSize: 14 }
    },
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      backgroundColor: 'rgba(26,26,46,0.95)',
      borderColor: '#444466',
      textStyle: { color: '#ffffff' },
      order: 'seriesDesc'
    },
    legend: {
      data: ['坐席收入', 'BPO人均结算', '人均总结算', 'AI供应商月盈亏'],
      top: 72,
      textStyle: { color: '#c0c0d4', fontSize: 12 },
      itemWidth: 16,
      itemHeight: 10
    },
    grid: { left: '6%', right: '6%', bottom: '12%', top: '22%', containLabel: true },
    xAxis: {
      type: 'category',
      data: versions,
      axisLine: { lineStyle: { color: '#3a3a52' } },
      axisTick: { show: false },
      axisLabel: {
        color: function(value, index) {
          if (index === 0) return '#E74C3C';
          if (index === 4) return '#27AE60';
          return '#c0c0d4';
        },
        fontWeight: function(value, index) {
          return (index === 0 || index === 4) ? 'bold' : 'normal';
        },
        fontSize: 13
      }
    },
    yAxis: [
      {
        type: 'value',
        name: '金额（元）',
        position: 'left',
        nameTextStyle: { color: '#9090a8', fontSize: 12 },
        axisLine: { show: false },
        axisLabel: { color: '#c0c0d4', fontSize: 11 },
        splitLine: { lineStyle: { color: '#2a2a3e' } },
        min: 0
      },
      {
        type: 'value',
        name: 'AI供应商月盈亏（万元）',
        position: 'right',
        nameTextStyle: { color: '#ff6b6b', fontSize: 12 },
        axisLine: { show: false },
        axisLabel: { color: '#c0c0d4', fontSize: 11, formatter: function(v){ return v + '万'; } },
        splitLine: { show: false },
        min: -40,
        max: 10
      }
    ],
    series: [
      {
        name: '坐席收入',
        type: 'bar',
        data: seatIncome.map(function(v,i){ return { value: v, itemStyle: barItemStyle(v, '#5b8def', i) }; }),
        barWidth: '20%',
        label: { show: true, position: 'top', color: '#c0c0d4', fontSize: 10, formatter: function(p){ return p.value.toLocaleString(); } }
      },
      {
        name: 'BPO人均结算',
        type: 'bar',
        data: bpoSettle.map(function(v,i){ return { value: v, itemStyle: barItemStyle(v, '#9b6dff', i) }; }),
        barWidth: '20%',
        label: { show: true, position: 'top', color: '#c0c0d4', fontSize: 10, formatter: function(p){ return p.value.toLocaleString(); } }
      },
      {
        name: '人均总结算',
        type: 'bar',
        data: totalSettle.map(function(v,i){ return { value: v, itemStyle: barItemStyle(v, '#f0a040', i) }; }),
        barWidth: '20%',
        label: { show: true, position: 'top', color: '#ffd980', fontSize: 10, formatter: function(p){ return p.value.toLocaleString(); } }
      },
      {
        name: 'AI供应商月盈亏',
        type: 'line',
        yAxisIndex: 1,
        data: aiPnl,
        symbol: 'circle',
        symbolSize: 11,
        smooth: false,
        lineStyle: { color: '#ff4d4f', width: 4 },
        itemStyle: {
          color: function(p){ return p.value < 0 ? '#ff4d4f' : '#52c41a'; },
          borderColor: '#1a1a2e',
          borderWidth: 2
        },
        areaStyle: {
          color: {
            type: 'linear', x:0, y:0, x2:0, y2:1,
            colorStops: [
              { offset: 0, color: 'rgba(255,77,79,0.35)' },
              { offset: 1, color: 'rgba(255,77,79,0.02)' }
            ]
          }
        },
        label: {
          show: true,
          position: 'top',
          distance: 8,
          color: '#ff6b6b',
          fontSize: 12,
          fontWeight: 'bold',
          formatter: function(p){ return (p.value > 0 ? '+' : '') + p.value + '万'; }
        },
        markLine: {
          silent: true,
          symbol: 'none',
          lineStyle: { color: '#ff9c9c', type: 'dashed', width: 2 },
          label: {
            show: true,
            position: 'insideStartTop',
            formatter: '盈亏平衡线（0万元）',
            color: '#ff9c9c',
            fontSize: 12,
            fontWeight: 'bold',
            backgroundColor: 'rgba(255,77,79,0.15)',
            padding: [3,8],
            borderRadius: 3
          },
          data: [{ yAxis: 0 }]
        },
        z: 10
      },
      {
        // 健康线：坐席收入≥4,500元（在左Y轴上画水平线）
        name: '健康线',
        type: 'line',
        yAxisIndex: 0,
        data: [],
        markLine: {
          silent: true,
          symbol: 'none',
          lineStyle: { color: '#27AE60', type: 'dashed', width: 2 },
          label: {
            show: true,
            position: 'insideEndTop',
            formatter: '健康线：坐席收入≥4,500元',
            color: '#27AE60',
            fontSize: 12,
            fontWeight: 'bold',
            backgroundColor: 'rgba(39,174,96,0.15)',
            padding: [3,8],
            borderRadius: 3
          },
          data: [{ yAxis: 4500 }]
        }
      }
    ]
  };

  chart.setOption(option);
  window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
