<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络关系 — 供应商-产线-职场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@700&family=Space+Grotesk&wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F5F5;--card:#FFFFFF;--border:#E8E8E8;--border-v:#CCCCCC;
  --tx1:#1A1A1A;--tx2:#666666;--tx3:#999999;
  --accent:#D71921;--success:#4A9E5C;--warning:#D4A843;
}
body{background:var(--bg);color:var(--tx1);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:400;min-height:100vh;padding:48px 64px}
.page{max-width:1080px;margin:0 auto}

/* HEADER */
.header{display:flex;align-items:baseline;gap:16px;margin-bottom:64px;border-bottom:1px solid var(--border);padding-bottom:32px}
.hero-num{font-family:'Doto','Space Mono',monospace;font-size:64px;font-weight:700;line-height:1;color:var(--tx1);letter-spacing:-0.03em}
.hero-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx3)}
.hero-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--tx1);margin-left:auto}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 240px;gap:48px;align-items:start}

/* NETWORK SVG */
.net-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;position:relative}
.net-wrap svg{width:100%;height:auto}

/* Node styles via SVG attributes */
.node-product{fill:var(--tx1)}
.node-supplier{fill:transparent;stroke:var(--tx2);stroke-width:1.5}
.node-workplace{fill:transparent;stroke:var(--tx3);stroke-width:1}

/* SIDEBAR */
.sidebar{}
.legend-section{margin-bottom:32px}
.legend-title{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.legend-item:last-child{border-bottom:none}
.legend-shape{flex-shrink:0}
.legend-text{font-size:13px;color:var(--tx2)}

.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.stat-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
.stat-value{font-family:'Doto','Space Mono',monospace;font-size:28px;font-weight:700;color:var(--tx1);line-height:1}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-row .k{color:var(--tx3);font-family:'Space Mono',monospace;font-size:11px}
.stat-row .v{color:var(--tx1);font-weight:700;font-family:'Space Mono',monospace}

/* FOOTER */
.footer{margin-top:48px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
.footer-text{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--tx3)}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <span class="hero-num">6</span>
    <div>
      <div class="hero-label">Suppliers</div>
    </div>
    <span class="hero-title">供应商-产线-职场关系图谱</span>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- NETWORK GRAPH -->
    <div class="net-wrap">
      <svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg">
        <!-- CONNECTIONS: Supplier → Product Line (solid, weight=stroke-width) -->
        <!-- Yihang → 金条(thick), 企金(mid) -->
        <line x1="130" y1="130" x2="360" y2="180" stroke="#666" stroke-width="3"/>
        <line x1="130" y1="130" x2="360" y2="280" stroke="#666" stroke-width="1.5"/>
        <!-- Maochong → 金条(mid), 信用卡(thin) -->
        <line x1="130" y1="240" x2="360" y2="180" stroke="#666" stroke-width="1.5"/>
        <line x1="130" y1="240" x2="360" y2="330" stroke="#666" stroke-width="1"/>
        <!-- Gamma → 金条(thick), 企金(thin) -->
        <line x1="130" y1="350" x2="360" y2="180" stroke="#666" stroke-width="3"/>
        <line x1="130" y1="350" x2="360" y2="280" stroke="#666" stroke-width="1"/>
        <!-- Saiweisi → 金条(thin), 财富(mid) -->
        <line x1="130" y1="440" x2="360" y2="180" stroke="#666" stroke-width="1"/>
        <line x1="130" y1="440" x2="360" y2="390" stroke="#666" stroke-width="1.5"/>
        <!-- Qili → 企金(thick) -->
        <line x1="280" y1="80" x2="360" y2="280" stroke="#666" stroke-width="3"/>
        <!-- Hanrui → 金条(mid), 信用卡(mid) -->
        <line x1="280" y1="430" x2="360" y2="180" stroke="#666" stroke-width="1.5"/>
        <line x1="280" y1="430" x2="360" y2="330" stroke="#666" stroke-width="1.5"/>

        <!-- CONNECTIONS: Supplier → Workplace (dashed) -->
        <line x1="130" y1="130" x2="580" y2="140" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="130" y1="130" x2="580" y2="240" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="130" y1="240" x2="580" y2="140" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="130" y1="240" x2="580" y2="340" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="130" y1="350" x2="580" y2="240" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="130" y1="350" x2="580" y2="340" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="280" y1="80" x2="580" y2="140" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="130" y1="440" x2="580" y2="340" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>
        <line x1="280" y1="430" x2="580" y2="240" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/>

        <!-- PRODUCT LINES (filled squares, largest = 金条) -->
        <rect x="340" y="160" width="40" height="40" rx="2" fill="#1A1A1A"/>
        <text x="360" y="185" text-anchor="middle" fill="#fff" font-family="Space Grotesk" font-size="11" font-weight="700">金条</text>

        <rect x="345" y="268" width="30" height="24" rx="2" fill="#1A1A1A"/>
        <text x="360" y="285" text-anchor="middle" fill="#fff" font-family="Space Grotesk" font-size="9" font-weight="700">企金</text>

        <rect x="345" y="318" width="30" height="24" rx="2" fill="#1A1A1A"/>
        <text x="360" y="335" text-anchor="middle" fill="#fff" font-family="Space Grotesk" font-size="9" font-weight="700">信用卡</text>

        <rect x="345" y="378" width="30" height="24" rx="2" fill="#1A1A1A"/>
        <text x="360" y="395" text-anchor="middle" fill="#fff" font-family="Space Grotesk" font-size="9" font-weight="700">财富</text>

        <!-- SUPPLIERS (circles) -->
        <circle cx="130" cy="130" r="18" fill="transparent" stroke="#666" stroke-width="1.5"/>
        <text x="130" y="135" text-anchor="middle" font-family="Space Grotesk" font-size="10" font-weight="700" fill="#666">毅航</text>

        <circle cx="130" cy="240" r="18" fill="transparent" stroke="#666" stroke-width="1.5"/>
        <text x="130" y="245" text-anchor="middle" font-family="Space Grotesk" font-size="10" font-weight="700" fill="#666">毛毛虫</text>

        <circle cx="130" cy="350" r="18" fill="transparent" stroke="#666" stroke-width="1.5"/>
        <text x="130" y="355" text-anchor="middle" font-family="Space Grotesk" font-size="10" font-weight="700" fill="#666">伽玛</text>

        <circle cx="130" cy="440" r="16" fill="transparent" stroke="#999" stroke-width="1"/>
        <text x="130" y="445" text-anchor="middle" font-family="Space Grotesk" font-size="9" font-weight="700" fill="#999">赛维斯</text>

        <circle cx="280" cy="80" r="16" fill="transparent" stroke="#666" stroke-width="1.5"/>
        <text x="280" y="85" text-anchor="middle" font-family="Space Grotesk" font-size="10" font-weight="700" fill="#666">岐力</text>

        <circle cx="280" cy="430" r="16" fill="transparent" stroke="#666" stroke-width="1.5"/>
        <text x="280" y="435" text-anchor="middle" font-family="Space Grotesk" font-size="10" font-weight="700" fill="#666">翰锐</text>

        <!-- WORKPLACES (diamonds) -->
        <g transform="translate(580,140) rotate(45)">
          <rect x="-8" y="-8" width="16" height="16" fill="transparent" stroke="#999" stroke-width="1"/>
        </g>
        <text x="600" y="145" font-family="Space Mono" font-size="10" fill="#999" letter-spacing="0.04em">合肥</text>

        <g transform="translate(580,240) rotate(45)">
          <rect x="-8" y="-8" width="16" height="16" fill="transparent" stroke="#999" stroke-width="1"/>
        </g>
        <text x="600" y="245" font-family="Space Mono" font-size="10" fill="#999" letter-spacing="0.04em">武汉</text>

        <g transform="translate(580,340) rotate(45)">
          <rect x="-8" y="-8" width="16" height="16" fill="transparent" stroke="#999" stroke-width="1"/>
        </g>
        <text x="600" y="345" font-family="Space Mono" font-size="10" fill="#999" letter-spacing="0.04em">成都</text>

        <!-- Column labels -->
        <text x="130" y="40" text-anchor="middle" font-family="Space Mono" font-size="10" fill="#999" letter-spacing="0.08em">SUPPLIER</text>
        <text x="360" y="40" text-anchor="middle" font-family="Space Mono" font-size="10" fill="#999" letter-spacing="0.08em">PRODUCT</text>
        <text x="580" y="100" text-anchor="middle" font-family="Space Mono" font-size="10" fill="#999" letter-spacing="0.08em">WORKPLACE</text>

      </svg>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="legend-section">
        <div class="legend-title">Node Types</div>
        <div class="legend-item">
          <svg width="16" height="16" class="legend-shape"><rect x="2" y="2" width="12" height="12" rx="1" fill="#1A1A1A"/></svg>
          <span class="legend-text">产线</span>
        </div>
        <div class="legend-item">
          <svg width="16" height="16" class="legend-shape"><circle cx="8" cy="8" r="6" fill="transparent" stroke="#666" stroke-width="1.5"/></svg>
          <span class="legend-text">供应商</span>
        </div>
        <div class="legend-item">
          <svg width="16" height="16" class="legend-shape"><rect x="3" y="3" width="10" height="10" fill="transparent" stroke="#999" stroke-width="1" transform="rotate(45 8 8)"/></svg>
          <span class="legend-text">职场</span>
        </div>
      </div>
      <div class="legend-section">
        <div class="legend-title">Edge Types</div>
        <div class="legend-item">
          <svg width="40" height="8" class="legend-shape"><line x1="0" y1="4" x2="40" y2="4" stroke="#666" stroke-width="2"/></svg>
          <span class="legend-text">业务关联</span>
        </div>
        <div class="legend-item">
          <svg width="40" height="8" class="legend-shape"><line x1="0" y1="4" x2="40" y2="4" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4 3"/></svg>
          <span class="legend-text">驻场</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Network Stats</div>
        <div class="stat-row"><span class="k">SUPPLIERS</span><span class="v">6</span></div>
        <div class="stat-row"><span class="k">PRODUCTS</span><span class="v">4</span></div>
        <div class="stat-row"><span class="k">WORKPLACES</span><span class="v">3</span></div>
        <div class="stat-row"><span class="k">EDGES</span><span class="v">14</span></div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Hub Node</div>
        <div class="stat-value">金条</div>
        <div style="font-family:'Space Mono',monospace;font-size:11px;color:#999;margin-top:4px;letter-spacing:0.04em">5 SUPPLIERS · 4 WORKPLACES</div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-text">供应商-产线-职场 · Relationship Graph</span>
    <span class="footer-text">Line Weight = Business Volume</span>
  </div>

</div>
</body>
</html>
