<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>各等级能力雷达</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: transparent; }
  .chart-wrap { width: 100%; max-width: 680px; margin: 24px auto; height: 500px; }
  .sample-info { text-align: center; color: #666; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="chart-wrap">
  <canvas id="radarChart"></canvas>
  <p class="sample-info">S级n=1 | A级n=9 | B级n=13 | C级n=17</p>
</div>
<script>
window.addEventListener('load', function() {
  var ctx = document.getElementById('radarChart');
  if (!ctx) return;
  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['ATT得分 (10%)', 'GMV得分 (35%)', '件均得分 (15%)', 'T0GMV得分 (15%)', '通时得分 (25%)'],
      datasets: [{"label": "S级 (n=1)", "data": [61.72, 75.21, 78.92, 75.89, 88.36], "borderColor": "#b88018", "backgroundColor": "rgba(184,128,24,0.10)", "borderWidth": 2, "pointBackgroundColor": "#b88018", "pointRadius": 4}, {"label": "A级 (n=9)", "data": [67.81, 54.06, 70.98, 64.85, 54.51], "borderColor": "#2e8b6e", "backgroundColor": "rgba(46,139,110,0.10)", "borderWidth": 2, "pointBackgroundColor": "#2e8b6e", "pointRadius": 4}, {"label": "B级 (n=13)", "data": [46.49, 40.04, 46.08, 33.74, 27.4], "borderColor": "#3a7ab8", "backgroundColor": "rgba(58,122,184,0.10)", "borderWidth": 2, "pointBackgroundColor": "#3a7ab8", "pointRadius": 4}, {"label": "C级 (n=17)", "data": [22.09, 16.77, 16.83, 10.13, 18.59], "borderColor": "#c25030", "backgroundColor": "rgba(194,80,48,0.10)", "borderWidth": 2, "pointBackgroundColor": "#c25030", "pointRadius": 4}]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true,
          max: 100,
          ticks: {
            stepSize: 20,
            color: '#999',
            backdropColor: 'transparent',
            font: { size: 11 }
          },
          grid: {
            color: 'rgba(0,0,0,0.06)'
          },
          angleLines: {
            color: 'rgba(0,0,0,0.06)'
          },
          pointLabels: {
            color: '#333',
            font: { size: 13, family: 'system-ui' }
          }
        }
      },
      plugins: {
        title: {
          display: true,
          text: '各等级能力雷达（参评坐席均值）',
          color: '#222',
          font: { size: 16, weight: '600', family: 'system-ui' },
          padding: { bottom: 16 }
        },
        legend: {
          position: 'bottom',
          labels: {
            color: '#444',
            font: { size: 13, family: 'system-ui' },
            usePointStyle: true,
            padding: 16
          }
        }
      }
    }
  });
});
</script>
</body>
</html>
