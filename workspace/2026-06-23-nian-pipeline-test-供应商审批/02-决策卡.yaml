# ═══ nian-decision-card 输出 · nian-design 施工输入 ═══
# 输入：集团拉新项目供应商引入审批邮件（文字分支）
# 产出时间：2026-06-23
# 备注：组件编号采用 COMPONENTS-MASTER.md 新编号（A01-H11），规避 validate 脚本旧编号 bug

branch: text

# ── 气质（决策A）──
visualStream: Statement            # 论证式立论（4层筛选推理链→互补论证），非宣言口号
structuralStream: S2-长文导航       # 约1500字+8段+3表，需"我在哪"导航

# ── 骨架（决策B）──
layoutSequence:
  - { section: 项目背景与核心诉求, layout: S04, role: hero-statement }      # 左立论右关键数据
  - { section: 寻源过程, layout: S07, role: data-table }                      # 5家供应商枚举表
  - { section: 四层筛选逻辑, layout: S16, role: argument-progression }        # 4层漏斗递进（打破点）
  - { section: 供应商资质评估, layout: S09, role: comparison }                 # 2家4维度对照
  - { section: 选择理由, layout: S13, role: framework-cards }                  # 4点互补论证（三力卡扩展）
  - { section: 风险提示, layout: S14, role: cells }                           # 3风险格子卡
  - { section: 后续安排, layout: S10, role: pipeline }                         # 4阶段时间流程
  - { section: 请示收束, layout: S18, role: closing }                          # 深色收束+行动项

# ── 组件 + Hero + 打破（决策C）──
heroType: V4-Statement             # 左大断言+右侧关键数据（项目参数）

components:
  # Hero 段 —— 项目背景
  - { id: "A03 Table", purpose: "Hero 右侧关键项目参数（试案周期/拨出量/团队要求）" }
  - { id: "F03 Quote-minimal", purpose: "核心诉求一句话引用" }
  # 寻源段
  - { id: "A03 Table", purpose: "5家供应商寻源对比表（类型/意愿/说明）" }
  - { id: "C05 Tag", purpose: "意愿状态标签（愿意/不参与）" }
  # 筛选逻辑段（打破点）
  - { id: "E03 Decorative-Number-Accent", purpose: "四层筛选 ghost 数字 4（橙色打破）" }
  - { id: "B07 Pyramid", purpose: "四层漏斗可视化（5→3→2→2 递进）" }
  # 资质评估段
  - { id: "D02 Asymmetric-Table", purpose: "2家供应商4维度非对称深度对比" }
  # 选择理由段
  - { id: "A05 Three-Column", purpose: "4点互补论证卡片（扩展为四列）" }
  # 风险段
  - { id: "A04 Bento-Grid", purpose: "3风险格子卡（试案周期/拨出量/首次合作）" }
  - { id: "C05 Tag-orange", purpose: "风险等级警示标签" }
  # 后续安排段
  - { id: "C02 Vertical-Timeline", purpose: "4阶段推进时间线（审批/准备/试案/评估）" }
  # 收束段
  - { id: "D06 Button-primary", purpose: "请示批示 CTA" }

breakPoint:
  section: 四层筛选逻辑
  method: ghost水印                           # 超大透明数字
  spec:
    text: "4"
    opacity: 0.06
    font: Playfair-Display
    position: 右下角
    color: var(--color-signal-orange)         # signal-orange 打破（权威+警示混合调性）
    rationale: "四层筛选是整篇决策的核心推理链，用 ghost 4 强调'漏斗式严谨筛选'是引入建议的根基"

# ── 配色 ──
palette:
  primary: charcoal                 # 商务权威/沉稳立论（charcoal #2D2A26，token-root 中性色LV5）
  accent: signal-orange             # 警示/section编号/打破点（signal-orange #E87A3C）
  baseMode: light                   # 浅色优先（buffer.md 6-01 偏好）

# ── 数据图位置（仅数据分支）──
dataCharts: null                   # 文字分支，表格走 A03 组件不放 dataCharts

# ── 上游溯源 ──
source:
  narrative: "workspace/临时草稿/集团拉新项目供应商引入审批邮件.md（8段+3表+4层筛选）"
  audience: 决策者（王易人）/ 业务方（卞海军）
  upstream: "curatorial 阶段1-3 压缩版（内容已成型，邮件即定题+叙事+视觉语言）"

# ── 决策记录（供 nian-design 对账）──
decisionRationale:
  visualStream: "论证式非宣言——4层筛选推理链完整，砍成口号会丢失决策依据"
  structuralStream: "1500字+8段，读者需导航定位（审批者跳读关切段）"
  breakPoint: "选筛选段而非互补段——筛选是'为什么是这两家'的根基，互补是'这两家好在哪'的延伸，根基更值得打破强调"
  palette: "darkgray 而非 olive——商务审批文档需要权威感而非自然温暖感；orange 而非 yellow——含风险提示需警示调性"

# ── 已知风险（施工时注意）──
knownIssues:
  - "validate-decision-card.py 可能因 components.md→COMPONENTS-MASTER.md 改名报错，手动校验"
  - "S13 三力卡片原生3列，选择理由4点需扩展为4列（layoutSequence 已标注 role: framework-cards）"
  - "S16 三论点递进原生3列，四层筛选需扩展为4列（同理）"
  - "商务邮件含称谓（王易人/卞海军）和落款（孙大年），nian 视觉体系无对应组件，用 F03 Quote 或 A06 Detail Panel 承载"
