<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>线索到放款转化漏斗 · viz-design</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F1419;font-family:-apple-system,'Helvetica Neue',sans-serif;color:#E8E8E8;display:flex;flex-direction:column;align-items:center;padding:40px 20px;min-height:100vh}
.container{width:100%;max-width:680px}
.header{margin-bottom:8px}
.header h1{font-size:18px;font-weight:600;color:#FFFFFF;line-height:1.4}
.header .sub{font-size:13px;color:#8A8A8A;margin-top:6px}
#chart{width:100%;height:460px}
.footer{margin-top:16px;display:flex;gap:24px;font-size:12px;color:#6A6A6A}
.footer span strong{color:#E8E8E8}
.insight{margin-top:20px;padding:16px 20px;background:rgba(255,57,75,0.08);border-left:3px solid #FF394B;border-radius:0 4px 4px 0}
.insight__tag{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#FF394B;margin-bottom:6px}
.insight__txt{font-size:14px;color:#E8E8E8;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>线索到放款：第一步流失占总流失 60%，是治本关键</h1>
    <div class="sub">六级转化漏斗 · 线索池 100,000 → 大额放款 2,800（2.8%）</div>
  </div>
  <div id="chart"></div>
  <div class="insight">
    <div class="insight__tag">最大瓶颈</div>
    <div class="insight__txt">线索→触达流失 58,000 条（−58%），占全部流失的 60%。根因是线索质量——来的不是对的人，后面每步都在为低质线索买单。</div>
  </div>
  <div class="footer">
    <span>总转化率 <strong>2.8%</strong></span>
    <span>最大流失 <strong>−58%（第一步）</strong></span>
    <span>最强环节 <strong>授信通过率 45%</strong></span>
  </div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  backgroundColor: 'transparent',
  series: [{
    type: 'funnel',
    left: '10%',
    right: '10%',
    top: 20,
    bottom: 20,
    minSize: '8%',
    maxSize: '100%',
    sort: 'descending',
    gap: 3,
    label: {
      show: true,
      position: 'inside',
      formatter: function(p){
        return '{name|' + p.name + '}\n{val|' + p.value.toLocaleString() + '}';
      },
      rich: {
        name: { fontSize: 13, color: '#FFFFFF', fontWeight: 500, lineHeight: 20 },
        val: { fontSize: 15, color: '#FFFFFF', fontWeight: 600, fontFamily: 'Georgia' }
      }
    },
    labelLine: { show: false },
    itemStyle: {
      borderColor: 'transparent',
      borderWidth: 0
    },
    emphasis: {
      label: { fontSize: 14 }
    },
    data: [
      { value: 100000, name: '线索池', itemStyle: { color: '#635BFF' } },
      { value: 42000, name: '有效触达', itemStyle: { color: '#5450DD', borderColor: '#FF394B', borderWidth: 3 } },
      { value: 18500, name: '意向客户', itemStyle: { color: '#4540CC' } },
      { value: 8200, name: '授信通过', itemStyle: { color: '#3835B0' } },
      { value: 4100, name: '提款客户', itemStyle: { color: '#2D2880' } },
      { value: 2800, name: '大额放款', itemStyle: { color: '#1A1750' } }
    ]
  }],
  graphic: [
    // 流失率标注
    { type: 'text', left: '76%', top: '14%', style: { text: '−58%', fill: '#FF394B', font: 'bold 13px Georgia' } },
    { type: 'text', left: '76%', top: '30%', style: { text: '−56%', fill: '#8A8A8A', font: '12px Georgia' } },
    { type: 'text', left: '76%', top: '46%', style: { text: '−56%', fill: '#8A8A8A', font: '12px Georgia' } },
    { type: 'text', left: '76%', top: '60%', style: { text: '−50%', fill: '#8A8A8A', font: '12px Georgia' } },
    { type: 'text', left: '76%', top: '74%', style: { text: '−32%', fill: '#8A8A8A', font: '12px Georgia' } }
  ]
});
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
