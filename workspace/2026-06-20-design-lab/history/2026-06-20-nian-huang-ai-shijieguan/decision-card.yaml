# nian-decision-card · 黄仁勋 AI 世界观（quick 通道）

branch: text
visualStream: Statement          # 论证式长文：每观点有"早期→当前→核心结论"推理链
scene: 知识                       # 认知升级/思想文章
structuralStream: S2-长文导航     # ~1800字/8段，中等长度需 TOC
