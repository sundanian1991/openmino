<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capsule S — Final Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-darkgray: #2C2C2C;
  --primary-olive: #4A5D3A;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E5E5E0;
  --text-display: #2C2C2C;
  --text-secondary: #6B6B6B;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-display); line-height: 1.6; }
section { padding: 120px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 60px; }
.section-title { font-family: 'Georgia', serif; font-size: 42px; font-weight: 300; line-height: 1.15; letter-spacing: -1px; margin-bottom: 60px; max-width: 700px; }
.section-title strong { font-weight: 600; }
.section-sub { font-size: 16px; line-height: 1.7; color: var(--text-secondary); max-width: 500px; margin-bottom: 60px; }

/* COMPARISON */
.comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-top: 60px; }
.comparison__card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px; text-align: center; }
.comparison__label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 24px; }
.comparison__preview { margin-bottom: 24px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.comparison__desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* CAPSULE S */
.capsule-s {
  display: inline-grid;
  grid-template-columns: repeat(5, 20px);
  grid-template-rows: repeat(7, 30px);
  gap: 6px;
}
.capsule {
  width: 20px;
  height: 30px;
  border-radius: 10px;
  background: currentColor;
}
.capsule.empty { background: transparent; }

/* FOOTER */
.footer { background: var(--primary-darkgray); color: rgba(255,255,255,0.3); padding: 60px 120px; display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 1024px) { section { padding: 80px 40px; } .comparison { grid-template-columns: 1fr; } }
@media (max-width: 768px) { section { padding: 60px 24px; } .section-title { font-size: 28px; } .footer { flex-direction: column; gap: 16px; text-align: center; } }
</style>
</head>
<body>

<!-- SECTION: COMPARISON -->
<section>
  <div class="section-label">Capsule S vs Haglöfs H</div>
  <div class="section-title">对比<strong>分析</strong></div>
  <div class="section-sub">Haglöfs 的 H 用 5 个胶囊拼接，S 用 7 个胶囊拼接。</div>

  <div class="comparison">
    <!-- Haglöfs H -->
    <div class="comparison__card">
      <div class="comparison__label">Haglöfs H · 5 capsules</div>
      <div class="comparison__preview">
        <div class="capsule-s" style="grid-template-columns: repeat(3, 20px); grid-template-rows: repeat(5, 30px); color: var(--text-display);">
          <!-- Row 1 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 2 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 3 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 4 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 5 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule"></div>
        </div>
      </div>
      <div class="comparison__desc">
        <strong>结构：</strong>两个竖线 + 一个横线<br>
        <strong>胶囊数：</strong>5 个<br>
        <strong>风格：</strong>简洁、几何、对称
      </div>
    </div>

    <!-- Nian's S -->
    <div class="comparison__card">
      <div class="comparison__label">Nian's S · 7 capsules</div>
      <div class="comparison__preview">
        <div class="capsule-s" style="color: var(--text-display);">
          <!-- Row 1: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 2: 1 0 0 0 0 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div>
          <!-- Row 3: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 4: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 5: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 6: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 7: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
        </div>
      </div>
      <div class="comparison__desc">
        <strong>结构：</strong>三条横线 + 两条竖线<br>
        <strong>胶囊数：</strong>7 个<br>
        <strong>风格：</strong>简洁、几何、曲线
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">Nian's® Brand Guidelines</div>
  <div class="footer-right">2024</div>
</footer>

</body>
</html>
