<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capsule S — Haglöfs Style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-darkgray: #2C2C2C;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E5E5E0;
  --text-display: #2C2C2C;
  --text-secondary: #6B6B6B;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-display); line-height: 1.6; }
section { padding: 120px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 60px; }
.section-title { font-family: 'Georgia', serif; font-size: 42px; font-weight: 300; line-height: 1.15; letter-spacing: -1px; margin-bottom: 60px; max-width: 700px; }
.section-title strong { font-weight: 600; }
.section-sub { font-size: 16px; line-height: 1.7; color: var(--text-secondary); max-width: 500px; margin-bottom: 60px; }

/* CAPSULE S CONTAINER */
.capsule-container {
  display: inline-grid;
  grid-template-columns: repeat(5, 24px);
  grid-template-rows: repeat(7, 36px);
  gap: 8px;
}

/* CAPSULE */
.capsule {
  width: 24px;
  height: 36px;
  border-radius: 12px;
  background: currentColor;
}

.capsule.empty {
  background: transparent;
}

/* S SHAPES */
.s-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; margin-top: 60px; }
.s-shape { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px; text-align: center; }
.s-shape--dark { background: var(--primary-darkgray); border-color: transparent; }
.s-shape__label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 24px; }
.s-shape--dark .s-shape__label { color: rgba(255,255,255,0.4); }
.s-shape__preview { margin-bottom: 24px; display: flex; align-items: center; justify-content: center; min-height: 280px; }
.s-shape__desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* FOOTER */
.footer { background: var(--primary-darkgray); color: rgba(255,255,255,0.3); padding: 60px 120px; display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 1024px) { section { padding: 80px 40px; } .s-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { section { padding: 60px 24px; } .section-title { font-size: 28px; } .footer { flex-direction: column; gap: 16px; text-align: center; } }
</style>
</head>
<body>

<!-- SECTION: CAPSULE S -->
<section>
  <div class="section-label">Capsule S — Haglöfs Style</div>
  <div class="section-title">胶囊 <strong>S</strong></div>
  <div class="section-sub">用大个胶囊形拼接 S，达到 Haglöfs H 的效果。</div>

  <div class="s-grid">
    <!-- 白色胶囊 S（深色背景） -->
    <div class="s-shape s-shape--dark">
      <div class="s-shape__label">白色胶囊 · 深色背景</div>
      <div class="s-shape__preview">
        <div class="capsule-container" style="color: var(--bg);">
          <!-- Row 1: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 2: 1 0 0 0 0 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div>
          <!-- Row 3: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 4: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 5: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 6: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 7: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
        </div>
      </div>
      <div class="s-shape__desc" style="color: rgba(255,255,255,0.5);">大个胶囊拼接，白色在深色背景上</div>
    </div>

    <!-- 黑色胶囊 S（浅色背景） -->
    <div class="s-shape">
      <div class="s-shape__label">黑色胶囊 · 浅色背景</div>
      <div class="s-shape__preview">
        <div class="capsule-container" style="color: var(--text-display);">
          <!-- Row 1: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 2: 1 0 0 0 0 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div>
          <!-- Row 3: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 4: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 5: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 6: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 7: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
        </div>
      </div>
      <div class="s-shape__desc">大个胶囊拼接，黑色在浅色背景上</div>
    </div>

    <!-- 橄榄色胶囊 S -->
    <div class="s-shape" style="background: var(--primary-olive); border-color: transparent;">
      <div class="s-shape__label" style="color: rgba(255,255,255,0.7);">橄榄色胶囊</div>
      <div class="s-shape__preview">
        <div class="capsule-container" style="color: var(--bg);">
          <!-- Row 1: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 2: 1 0 0 0 0 -->
          <div class="capsule"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div>
          <!-- Row 3: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 4: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 5: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
          <!-- Row 6: 0 0 0 0 1 -->
          <div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule empty"></div><div class="capsule"></div>
          <!-- Row 7: 1 1 1 1 1 -->
          <div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div><div class="capsule"></div>
        </div>
      </div>
      <div class="s-shape__desc" style="color: rgba(255,255,255,0.7);">橄榄色背景，白色胶囊</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">Nian's® Brand Guidelines</div>
  <div class="footer-right">2024</div>
</footer>

</body>
</html>
