<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S Design Options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-darkgray: #2C2C2C;
  --primary-olive: #4A5D3A;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E5E5E0;
  --text-display: #2C2C2C;
  --text-secondary: #6B6B6B;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-display); line-height: 1.6; }
section { padding: 120px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 60px; }
.section-title { font-family: 'Georgia', serif; font-size: 42px; font-weight: 300; line-height: 1.15; letter-spacing: -1px; margin-bottom: 60px; max-width: 700px; }
.section-title strong { font-weight: 600; }
.section-sub { font-size: 16px; line-height: 1.7; color: var(--text-secondary); max-width: 500px; margin-bottom: 60px; }

/* OPTIONS GRID */
.options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 48px; margin-top: 60px; }
.option-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px; text-align: center; }
.option-card--dark { background: var(--primary-darkgray); border-color: transparent; }
.option-card__label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 24px; }
.option-card--dark .option-card__label { color: rgba(255,255,255,0.4); }
.option-card__preview { margin-bottom: 24px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.option-card__desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* OPTION 1: NEGATIVE SPACE S */
.s-negative {
  width: 120px;
  height: 180px;
  background: currentColor;
  border-radius: 60px;
  position: relative;
  overflow: hidden;
}
.s-negative::before {
  content: '';
  position: absolute;
  top: 30px;
  left: 30px;
  right: 0;
  bottom: 0;
  background: var(--primary-darkgray);
  border-radius: 0 0 0 60px;
}
.s-negative::after {
  content: 'S';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Georgia', serif;
  font-size: 80px;
  font-weight: 300;
  color: var(--bg);
}

/* OPTION 2: TWO CAPSULES */
.s-two-capsules {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}
.s-capsule-top {
  width: 80px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
}
.s-capsule-mid {
  width: 60px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
  margin-left: -20px;
}
.s-capsule-bottom {
  width: 80px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
}

/* OPTION 3: DOT MATRIX S (CORRECT) */
.s-dotmatrix {
  display: inline-grid;
  grid-template-columns: repeat(5, 16px);
  grid-template-rows: repeat(5, 16px);
  gap: 8px;
}
.s-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: currentColor;
}
.s-dot.empty { background: transparent; }

/* OPTION 4: CAPSULE ASSEMBLY */
.s-assembly {
  position: relative;
  width: 140px;
  height: 180px;
}
.s-assembly__top {
  position: absolute;
  top: 0;
  left: 0;
  width: 120px;
  height: 28px;
  border-radius: 14px;
  background: currentColor;
}
.s-assembly__left {
  position: absolute;
  top: 28px;
  left: 0;
  width: 28px;
  height: 80px;
  border-radius: 14px;
  background: currentColor;
}
.s-assembly__mid {
  position: absolute;
  top: 90px;
  left: 0;
  width: 120px;
  height: 28px;
  border-radius: 14px;
  background: currentColor;
}
.s-assembly__right {
  position: absolute;
  top: 100px;
  right: 0;
  width: 24px;
  height: 60px;
  border-radius: 12px;
  background: currentColor;
}
.s-assembly__bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 120px;
  height: 28px;
  border-radius: 14px;
  background: currentColor;
}

/* FOOTER */
.footer { background: var(--primary-darkgray); color: rgba(255,255,255,0.3); padding: 60px 120px; display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 1024px) { section { padding: 80px 40px; } .options-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { section { padding: 60px 24px; } .section-title { font-size: 28px; } .footer { flex-direction: column; gap: 16px; text-align: center; } }
</style>
</head>
<body>

<!-- SECTION: OPTIONS -->
<section>
  <div class="section-label">S Design Options</div>
  <div class="section-title">S 的<strong>设计方案</strong></div>
  <div class="section-sub">4 种不同的 S 设计方案，选择最适合的。</div>

  <div class="options-grid">
    <!-- Option 1: Negative Space -->
    <div class="option-card">
      <div class="option-card__label">Option 1: Negative Space</div>
      <div class="option-card__preview">
        <div class="s-negative" style="color: var(--text-display);"></div>
      </div>
      <div class="option-card__desc">大胶囊内部用负空间形成 S<br>简洁、高级、有设计感</div>
    </div>

    <!-- Option 2: Two Capsules -->
    <div class="option-card">
      <div class="option-card__label">Option 2: Two Capsules</div>
      <div class="option-card__preview">
        <div class="s-two-capsules" style="color: var(--text-display);">
          <div class="s-capsule-top"></div>
          <div class="s-capsule-mid"></div>
          <div class="s-capsule-bottom"></div>
        </div>
      </div>
      <div class="option-card__desc">两个弯曲胶囊形成 S<br>简洁、现代</div>
    </div>

    <!-- Option 3: Dot Matrix -->
    <div class="option-card">
      <div class="option-card__label">Option 3: Dot Matrix</div>
      <div class="option-card__preview">
        <div class="s-dotmatrix" style="color: var(--text-display);">
          <!-- Row 1: 1 1 1 1 1 -->
          <div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div>
          <!-- Row 2: 1 0 0 0 0 -->
          <div class="s-dot"></div><div class="s-dot empty"></div><div class="s-dot empty"></div><div class="s-dot empty"></div><div class="s-dot empty"></div>
          <!-- Row 3: 1 1 1 1 1 -->
          <div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div>
          <!-- Row 4: 0 0 0 0 1 -->
          <div class="s-dot empty"></div><div class="s-dot empty"></div><div class="s-dot empty"></div><div class="s-dot empty"></div><div class="s-dot"></div>
          <!-- Row 5: 1 1 1 1 1 -->
          <div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div>
        </div>
      </div>
      <div class="option-card__desc">5×5 点阵，正确排列<br>简洁、几何</div>
    </div>

    <!-- Option 4: Capsule Assembly -->
    <div class="option-card">
      <div class="option-card__label">Option 4: Capsule Assembly</div>
      <div class="option-card__preview">
        <div class="s-assembly" style="color: var(--text-display);">
          <div class="s-assembly__top"></div>
          <div class="s-assembly__left"></div>
          <div class="s-assembly__mid"></div>
          <div class="s-assembly__right"></div>
          <div class="s-assembly__bottom"></div>
        </div>
      </div>
      <div class="option-card__desc">5 个胶囊拼接 S<br>基于 Haglöfs H 风格</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">Nian's® Brand Guidelines</div>
  <div class="footer-right">2024</div>
</footer>

</body>
</html>
