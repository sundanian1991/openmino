<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capsule S — Final Version</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-darkgray: #2C2C2C;
  --primary-olive: #4A5D3A;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E5E5E0;
  --text-display: #2C2C2C;
  --text-secondary: #6B6B6B;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-display); line-height: 1.6; }
section { padding: 120px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 60px; }
.section-title { font-family: 'Georgia', serif; font-size: 42px; font-weight: 300; line-height: 1.15; letter-spacing: -1px; margin-bottom: 60px; max-width: 700px; }
.section-title strong { font-weight: 600; }
.section-sub { font-size: 16px; line-height: 1.7; color: var(--text-secondary); max-width: 500px; margin-bottom: 60px; }

/* HAGLÖFS H STYLE */
.haglofs-h {
  display: flex;
  gap: 12px;
  align-items: stretch;
}
.haglofs-h__left,
.haglofs-h__right {
  width: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.haglofs-h__capsule {
  width: 100%;
  height: 60px;
  border-radius: 12px;
  background: currentColor;
}
.haglofs-h__mid {
  display: flex;
  align-items: center;
  justify-content: center;
}
.haglofs-h__mid-capsule {
  width: 40px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
}

/* NIAN'S S STYLE — 基于 H 的风格 */
.nians-s {
  position: relative;
  width: 120px;
  height: 180px;
}

/* 顶部横向胶囊 */
.nians-s__top {
  position: absolute;
  top: 0;
  left: 0;
  width: 100px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
}

/* 左侧竖向胶囊 */
.nians-s__left {
  position: absolute;
  top: 24px;
  left: 0;
  width: 24px;
  height: 80px;
  border-radius: 12px;
  background: currentColor;
}

/* 中部横向胶囊 */
.nians-s__mid {
  position: absolute;
  top: 90px;
  left: 0;
  width: 100px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
}

/* 右侧小型竖向胶囊 */
.nians-s__right {
  position: absolute;
  top: 100px;
  right: 0;
  width: 20px;
  height: 60px;
  border-radius: 10px;
  background: currentColor;
}

/* 底部横向胶囊 */
.nians-s__bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100px;
  height: 24px;
  border-radius: 12px;
  background: currentColor;
}

/* SHOWCASE */
.showcase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; margin-top: 60px; }
.showcase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px; text-align: center; }
.showcase-card--dark { background: var(--primary-darkgray); border-color: transparent; }
.showcase-card__label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 24px; }
.showcase-card--dark .showcase-card__label { color: rgba(255,255,255,0.4); }
.showcase-card__preview { margin-bottom: 24px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.showcase-card__desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* FOOTER */
.footer { background: var(--primary-darkgray); color: rgba(255,255,255,0.3); padding: 60px 120px; display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 1024px) { section { padding: 80px 40px; } .showcase-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { section { padding: 60px 24px; } .section-title { font-size: 28px; } .footer { flex-direction: column; gap: 16px; text-align: center; } }
</style>
</head>
<body>

<!-- SECTION: H vs S -->
<section>
  <div class="section-label">Haglöfs H vs Nian's S</div>
  <div class="section-title">胶囊 <strong>H</strong> 与 <strong>S</strong></div>
  <div class="section-sub">基于 Haglöfs H 的风格，设计 Nian's S。</div>

  <div class="showcase-grid">
    <!-- Haglöfs H -->
    <div class="showcase-card showcase-card--dark">
      <div class="showcase-card__label">Haglöfs H</div>
      <div class="showcase-card__preview">
        <div class="haglofs-h" style="color: var(--bg);">
          <div class="haglofs-h__left">
            <div class="haglofs-h__capsule"></div>
            <div class="haglofs-h__capsule"></div>
          </div>
          <div class="haglofs-h__mid">
            <div class="haglofs-h__mid-capsule"></div>
          </div>
          <div class="haglofs-h__right">
            <div class="haglofs-h__capsule"></div>
            <div class="haglofs-h__capsule"></div>
          </div>
        </div>
      </div>
      <div class="showcase-card__desc" style="color: rgba(255,255,255,0.5);">Haglöfs 风格：胶囊 + 间距</div>
    </div>

    <!-- Nian's S -->
    <div class="showcase-card showcase-card--dark">
      <div class="showcase-card__label">Nian's S</div>
      <div class="showcase-card__preview">
        <div class="nians-s" style="color: var(--bg);">
          <div class="nians-s__top"></div>
          <div class="nians-s__left"></div>
          <div class="nians-s__mid"></div>
          <div class="nians-s__right"></div>
          <div class="nians-s__bottom"></div>
        </div>
      </div>
      <div class="showcase-card__desc" style="color: rgba(255,255,255,0.5);">Nian's S：基于 H 风格</div>
    </div>

    <!-- 橄榄色 S -->
    <div class="showcase-card" style="background: var(--primary-olive); border-color: transparent;">
      <div class="showcase-card__label" style="color: rgba(255,255,255,0.7);">橄榄色胶囊</div>
      <div class="showcase-card__preview">
        <div class="nians-s" style="color: var(--bg);">
          <div class="nians-s__top"></div>
          <div class="nians-s__left"></div>
          <div class="nians-s__mid"></div>
          <div class="nians-s__right"></div>
          <div class="nians-s__bottom"></div>
        </div>
      </div>
      <div class="showcase-card__desc" style="color: rgba(255,255,255,0.7);">橄榄色背景，白色胶囊</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">Nian's® Brand Guidelines</div>
  <div class="footer-right">2024</div>
</footer>

</body>
</html>
