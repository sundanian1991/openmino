<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S More Options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-darkgray: #2C2C2C;
  --primary-olive: #4A5D3A;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E5E5E0;
  --text-display: #2C2C2C;
  --text-secondary: #6B6B6B;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-display); line-height: 1.6; }
section { padding: 120px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 60px; }
.section-title { font-family: 'Georgia', serif; font-size: 42px; font-weight: 300; line-height: 1.15; letter-spacing: -1px; margin-bottom: 60px; max-width: 700px; }
.section-title strong { font-weight: 600; }

/* OPTIONS GRID */
.options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 48px; margin-top: 60px; }
.option-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px; text-align: center; }
.option-card--dark { background: var(--primary-darkgray); border-color: transparent; }
.option-card__label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 24px; }
.option-card--dark .option-card__label { color: rgba(255,255,255,0.4); }
.option-card__preview { margin-bottom: 24px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.option-card__desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* OPTION 5: SVG S */
.s-svg {
  width: 120px;
  height: 180px;
}

/* OPTION 6: GRADIENT S */
.s-gradient {
  width: 120px;
  height: 180px;
  background: linear-gradient(135deg, var(--primary-olive) 0%, var(--primary-darkgray) 100%);
  border-radius: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* OPTION 7: CURVE S */
.s-curve {
  position: relative;
  width: 120px;
  height: 180px;
}
.s-curve__top {
  position: absolute;
  top: 0;
  left: 0;
  width: 100px;
  height: 60px;
  border: 8px solid currentColor;
  border-radius: 50px 50px 0 0;
  border-bottom: none;
}
.s-curve__bottom {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 100px;
  height: 60px;
  border: 8px solid currentColor;
  border-radius: 0 0 50px 50px;
  border-top: none;
}
.s-curve__mid {
  position: absolute;
  top: 60px;
  left: 20px;
  width: 80px;
  height: 8px;
  background: currentColor;
  border-radius: 4px;
}

/* OPTION 8: MODULAR S */
.s-modular {
  display: grid;
  grid-template-columns: repeat(3, 32px);
  grid-template-rows: repeat(5, 32px);
  gap: 8px;
}
.s-modular__block {
  background: currentColor;
  border-radius: 4px;
}
.s-modular__block.empty { background: transparent; }

/* FOOTER */
.footer { background: var(--primary-darkgray); color: rgba(255,255,255,0.3); padding: 60px 120px; display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 1024px) { section { padding: 80px 40px; } .options-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { section { padding: 60px 24px; } .footer { flex-direction: column; gap: 16px; text-align: center; } }
</style>
</head>
<body>

<!-- SECTION: MORE OPTIONS -->
<section>
  <div class="section-label">More S Options</div>
  <div class="section-title">更多<strong>方案</strong></div>

  <div class="options-grid">
    <!-- Option 5: SVG S -->
    <div class="option-card">
      <div class="option-card__label">Option 5: SVG S</div>
      <div class="option-card__preview">
        <svg class="s-svg" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 20 H100 C130 20 130 60 100 60 H40 C10 60 10 100 40 100 H100 C130 100 130 140 100 140 H20" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="option-card__desc">SVG 路径绘制<br>简洁、可缩放</div>
    </div>

    <!-- Option 6: Gradient S -->
    <div class="option-card">
      <div class="option-card__label">Option 6: Gradient S</div>
      <div class="option-card__preview">
        <div class="s-gradient">
          <svg width="60" height="90" viewBox="0 0 60 90" fill="none">
            <path d="M10 10 H50 C70 10 70 30 50 30 H20 C0 30 0 50 20 50 H50 C70 50 70 70 50 70 H10" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </div>
      <div class="option-card__desc">渐变胶囊 + S<br>高级感、现代</div>
    </div>

    <!-- Option 7: Curve S -->
    <div class="option-card">
      <div class="option-card__label">Option 7: Curve S</div>
      <div class="option-card__preview">
        <div class="s-curve" style="color: var(--text-display);">
          <div class="s-curve__top"></div>
          <div class="s-curve__mid"></div>
          <div class="s-curve__bottom"></div>
        </div>
      </div>
      <div class="option-card__desc">曲线 S<br>用边框形成曲线</div>
    </div>

    <!-- Option 8: Modular S -->
    <div class="option-card">
      <div class="option-card__label">Option 8: Modular S</div>
      <div class="option-card__preview">
        <div class="s-modular" style="color: var(--text-display);">
          <div class="s-modular__block"></div><div class="s-modular__block"></div><div class="s-modular__block"></div>
          <div class="s-modular__block"></div><div class="s-modular__block empty"></div><div class="s-modular__block empty"></div>
          <div class="s-modular__block"></div><div class="s-modular__block"></div><div class="s-modular__block"></div>
          <div class="s-modular__block empty"></div><div class="s-modular__block empty"></div><div class="s-modular__block"></div>
          <div class="s-modular__block"></div><div class="s-modular__block"></div><div class="s-modular__block"></div>
        </div>
      </div>
      <div class="option-card__desc">模块化 S<br>方块组成</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">Nian's® Brand Guidelines</div>
  <div class="footer-right">2024</div>
</footer>

</body>
</html>
