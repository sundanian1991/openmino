<!DOCTYPE html>

<style>
:root {
  --primary-darkgray: #2C2C2C;
  --primary-olive: #4A5D3A;
  --primary-earth: #8B7355;
  --accent-orange: #E55B2B;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --surface-raised: #F5F5F0;
  --border: #E5E5E0;
  --text-display: #2C2C2C;
  --text-secondary: #6B6B6B;
  --text-disabled: #A0A0A0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-display); line-height: 1.6; }
section { padding: 120px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 60px; }
.section-title { font-family: 'Georgia', serif; font-size: 42px; font-weight: 300; line-height: 1.15; letter-spacing: -1px; margin-bottom: 60px; max-width: 700px; }
.section-title strong { font-weight: 600; }
.section-sub { font-size: 16px; line-height: 1.7; color: var(--text-secondary); max-width: 500px; margin-bottom: 60px; }

/* CAPSULE GRID */
.capsule-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-top: 60px; }
.capsule-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 32px; text-align: center; }
.capsule-card--dark { background: var(--primary-darkgray); border-color: transparent; }
.capsule-card__label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 16px; }
.capsule-card--dark .capsule-card__label { color: rgba(255,255,255,0.4); }
.capsule-card__preview { margin-bottom: 16px; display: flex; align-items: center; justify-content: center; min-height: 120px; }
.capsule-card__desc { font-size: 12px; color: var(--text-disabled); line-height: 1.5; }

/* CAPSULE S STYLES */
.capsule-s {
  display: inline-grid;
  grid-template-columns: repeat(5, var(--capsule-w, 14px));
  grid-template-rows: repeat(7, var(--capsule-h, 24px));
  gap: var(--capsule-gap, 6px);
}
.capsule {
  width: var(--capsule-w, 14px);
  height: var(--capsule-h, 24px);
  border-radius: 50%;
  background: currentColor;
}
.capsule.empty { background: transparent; }

/* COLOR VARIANTS */
.color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; margin-top: 60px; }
.color-card { border-radius: 8px; padding: 32px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; }
.color-card__label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }

/* FOOTER */
.footer { background: var(--primary-darkgray); color: rgba(255,255,255,0.3); padding: 60px 120px; display: flex; justify-content: space-between; align-items: center; }
.footer-left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 1024px) { section { padding: 80px 40px; } .capsule-grid, .color-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { section { padding: 60px 24px; } .section-title { font-size: 28px; } .footer { flex-direction: column; gap: 16px; text-align: center; } }
</style>
</head>
