<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐力职场人力结构</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: transparent; }
  .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 24px 16px; }
  .chart-wrap { position: relative; height: 500px; }
  .stats { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 140px;
    padding: 14px 18px;
    border-radius: 8px;
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    text-align: center;
  }
  .stat-card .label { font-size: 13px; color: #6c757d; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: #212529; }
  .stat-card.highlight { background: #e8f5f0; border-color: #2e8b6e; }
  .stat-card.highlight .value { color: #2e8b6e; }
</style>
</head>
<body>
<div class="container">
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="label">总人数</div>
      <div class="value">118</div>
    </div>
    <div class="stat-card highlight">
      <div class="label">在职</div>
      <div class="value">82</div>
    </div>
    <div class="stat-card">
      <div class="label">已离职/不在岗</div>
      <div class="value">36</div>
    </div>
    <div class="stat-card highlight">
      <div class="label">在职率</div>
      <div class="value">69.5%</div>
    </div>
  </div>
</div>

<script>
(function() {
  var ctx = document.getElementById('chart').getContext('2d');

  var labels = ["MOB1-", "MOB1-3", "MOB3-6", "MOB6-12"];
  var evalData = [0, 29, 6, 5];
  var noevalData = [28, 11, 0, 3];
  var inactiveData = [8, 17, 4, 7];

  // Compute totals for top labels
  var totals = labels.map(function(_, i) { return evalData[i] + noevalData[i] + inactiveData[i]; });

  var chart = new Chart(ctx, {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels: labels,
      datasets: [
        {
          label: '在职（参评）',
          data: evalData,
          backgroundColor: '#2e8b6e',
          borderRadius: 4,
          borderSkipped: false,
          datalabels: {
            display: function(ctx) { return ctx.dataset.data[ctx.dataIndex] > 0; },
            color: '#fff',
            font: { weight: '600', size: 12 },
            anchor: 'center',
            align: 'center',
            formatter: function(v) { return v; }
          }
        },
        {
          label: '在职（非参评）',
          data: noevalData,
          backgroundColor: '#b88018',
          borderRadius: 4,
          borderSkipped: false,
          datalabels: {
            display: function(ctx) { return ctx.dataset.data[ctx.dataIndex] > 0; },
            color: '#fff',
            font: { weight: '600', size: 12 },
            anchor: 'center',
            align: 'center',
            formatter: function(v) { return v; }
          }
        },
        {
          label: '已离职/不在岗',
          data: inactiveData,
          backgroundColor: 'rgba(224,128,96,0.55)',
          borderColor: '#e08060',
          borderWidth: 2,
          borderDash: [4, 3],
          borderRadius: 4,
          borderSkipped: false,
          datalabels: {
            display: function(ctx) { return ctx.dataset.data[ctx.dataIndex] > 0; },
            color: '#b05a3a',
            font: { weight: '600', size: 12 },
            anchor: 'center',
            align: 'center',
            formatter: function(v) { return v; }
          }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: { top: 28 }
      },
      plugins: {
        title: {
          display: true,
          text: ['岐力职场人力结构（118人）', '按司龄分段 x 在职/参评状态'],
          font: { size: 16, weight: '700', family: 'system-ui' },
          color: '#212529',
          padding: { bottom: 16 }
        },
        subtitle: {
          display: false
        },
        legend: {
          position: 'bottom',
          labels: {
            usePointStyle: true,
            pointStyle: 'rectRounded',
            padding: 20,
            font: { size: 13, family: 'system-ui' },
            color: '#495057'
          }
        },
        tooltip: {
          backgroundColor: '#212529',
          titleFont: { family: 'system-ui' },
          bodyFont: { family: 'system-ui' },
          callbacks: {
            label: function(ctx) {
              return ctx.dataset.label + ': ' + ctx.parsed.y + ' 人';
            }
          }
        },
        datalabels: {
          // Global defaults overridden per-dataset above
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: {
            font: { size: 13, weight: '600', family: 'system-ui' },
            color: '#495057'
          },
          border: { display: false }
        },
        y: {
          stacked: true,
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 12, family: 'system-ui' },
            color: '#6c757d',
            stepSize: 5
          },
          border: { display: false },
          title: {
            display: true,
            text: '人数',
            font: { size: 12, family: 'system-ui' },
            color: '#6c757d'
          }
        }
      }
    },
    plugins: [{
      id: 'totalLabels',
      afterDatasetsDraw: function(chart) {
        var ctx = chart.ctx;
        var meta = chart.getDatasetMeta(0);
        ctx.save();
        ctx.font = '600 13px system-ui';
        ctx.fillStyle = '#212529';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        meta.data.forEach(function(bar, i) {
          var total = totals[i];
          ctx.fillText(total + ' 人', bar.x, bar.y - 6);
        });
        ctx.restore();
      }
    }]
  });
})();
</script>
</body>
</html>
