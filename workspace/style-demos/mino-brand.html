<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mino Style: 品牌模式 - 陶土色手绘</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --terracotta: #E2725B;
            --terracotta-deep: #CA6641;
            --cream: #F5F1EE;
            --charcoal: #3D2C29;
            --grey-mid: #C5C1BE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        /* 纸张纹理 */
        .paper-texture {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 85vw;
            position: relative;
            z-index: 1;
        }

        /* 主视觉 - 手形线稿 */
        .main-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2.5rem;
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-icon svg {
            width: 100%;
            height: 100%;
        }
        .main-icon svg path,
        .main-icon svg circle,
        .main-icon svg line {
            stroke: var(--charcoal);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        .main-icon svg .filled {
            fill: var(--terracotta);
            stroke: none;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 600;
            color: var(--charcoal);
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--charcoal);
            opacity: 0.7;
            margin-bottom: 2rem;
            animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 手绘强调线 */
        .accent-line {
            width: 80px;
            height: 3px;
            background: var(--terracotta);
            margin: 0 auto 2.5rem;
            border-radius: 2px;
            animation: expand 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* 手绘线条图标网格 */
        .icon-grid {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            margin-bottom: 2.5rem;
            animation: fadeIn 0.6s 0.3s both;
        }
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .icon-svg {
            width: 48px;
            height: 48px;
        }
        .icon-svg svg {
            width: 100%;
            height: 100%;
        }
        .icon-svg svg path,
        .icon-svg svg circle,
        .icon-svg svg line {
            stroke: var(--charcoal);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        .icon-svg svg .filled {
            fill: var(--terracotta);
            stroke: none;
        }
        .icon-label {
            font-size: 0.75rem;
            color: var(--charcoal);
            opacity: 0.6;
        }

        /* 色彩标签 */
        .color-tags {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            animation: fadeIn 0.6s 0.4s both;
        }
        .color-tag {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid var(--grey-mid);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--charcoal);
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes expand {
            from { width: 0; }
            to { width: 80px; }
        }
    </style>
</head>
<body>
    <div class="paper-texture"></div>

    <div class="container">
        <!-- 手形主视觉 -->
        <div class="main-icon">
            <svg viewBox="0 0 120 120">
                <!-- 手掌轮廓 -->
                <path d="M60 25 Q68 40 60 60 Q52 40 60 25" class="filled"/>
                <path d="M35 70 Q60 55 85 70 Q90 88 85 98 Q60 110 35 98 Q30 88 35 70" class="filled"/>
                <!-- 手指线条 -->
                <line x1="42" y1="50" x2="42" y2="68"/>
                <line x1="54" y1="42" x2="54" y2="58"/>
                <line x1="66" y1="42" x2="66" y2="58"/>
                <line x1="78" y1="52" x2="78" y2="68"/>
            </svg>
        </div>

        <h1>品牌模式</h1>
        <p class="subtitle">陶土色手绘线稿 · 温暖克制 · 人文科技感</p>

        <div class="accent-line"></div>

        <!-- 手绘线条图标 -->
        <div class="icon-grid">
            <div class="icon-item">
                <div class="icon-svg">
                    <svg viewBox="0 0 48 48">
                        <!-- 书籍 -->
                        <path d="M8 10 Q24 14 24 14 L24 38 Q24 38 8 34 Z"/>
                        <path d="M40 10 Q24 14 24 14 L24 38 Q24 38 40 34 Z"/>
                        <line x1="24" y1="14" x2="24" y2="38"/>
                    </svg>
                </div>
                <span class="icon-label">知识</span>
            </div>
            <div class="icon-item">
                <div class="icon-svg">
                    <svg viewBox="0 0 48 48">
                        <!-- 叶子/植物 -->
                        <path d="M24 38 L24 24" />
                        <path d="M24 24 Q32 16 32 10 Q24 14 24 24" class="filled"/>
                        <path d="M24 28 Q18 22 18 18 Q22 20 24 28" class="filled"/>
                    </svg>
                </div>
                <span class="icon-label">成长</span>
            </div>
            <div class="icon-item">
                <div class="icon-svg">
                    <svg viewBox="0 0 48 48">
                        <!-- 蝴蝶 -->
                        <path d="M24 18 Q16 10 10 16 Q14 24 24 22" class="filled"/>
                        <path d="M24 18 Q32 10 38 16 Q34 24 24 22" class="filled"/>
                        <path d="M24 22 Q20 30 18 38" />
                        <path d="M24 22 Q28 30 30 38" />
                    </svg>
                </div>
                <span class="icon-label">蜕变</span>
            </div>
            <div class="icon-item">
                <div class="icon-svg">
                    <svg viewBox="0 0 48 48">
                        <!-- 连接/网络 -->
                        <circle cx="24" cy="14" r="4"/>
                        <circle cx="14" cy="34" r="4"/>
                        <circle cx="34" cy="34" r="4"/>
                        <line x1="24" y1="18" x2="17" y2="30"/>
                        <line x1="24" y1="18" x2="31" y2="30"/>
                        <line x1="18" y1="34" x2="30" y2="34"/>
                    </svg>
                </div>
                <span class="icon-label">协作</span>
            </div>
        </div>

        <!-- 色彩系统 -->
        <div class="color-tags">
            <div class="color-tag">
                <span class="color-dot" style="background: #E2725B"></span>
                Terracotta
            </div>
            <div class="color-tag">
                <span class="color-dot" style="background: #F5F1EE; border: 1px solid #C5C1BE"></span>
                Cream
            </div>
            <div class="color-tag">
                <span class="color-dot" style="background: #3D2C29"></span>
                Charcoal
            </div>
        </div>
    </div>
</body>
</html>
