<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 11: Swiss Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ff0000;
            --gray: #666666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .container {
            max-width: 80vw;
        }
        .grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            align-items: end;
        }
        .number {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 700;
            color: var(--accent);
            line-height: 0.8;
            letter-spacing: -0.02em;
        }
        .content {
            padding-bottom: 1rem;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .divider {
            width: 100%;
            height: 4px;
            background: var(--text);
            margin: 1rem 0;
            animation: expand 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        p {
            color: var(--gray);
            font-size: clamp(0.9rem, 1.5vw, 1rem);
            font-weight: 300;
            animation: fadeIn 0.6s 0.2s both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes expand {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid">
            <div class="number">11</div>
            <div class="content">
                <h1>Swiss Modern</h1>
                <div class="divider"></div>
                <p>极简 · 精确 · 数据驱动</p>
            </div>
        </div>
    </div>
</body>
</html>
