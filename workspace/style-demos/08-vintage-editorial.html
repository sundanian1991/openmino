<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style 08: Vintage Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e6;
            --accent: #c45c3e;
            --text: #2a2a2a;
            --text-muted: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Libre Baskerville', serif;
            overflow: hidden;
        }
        .container {
            max-width: 80vw;
            text-align: center;
        }
        .tagline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            letter-spacing: 0.3em;
            color: var(--accent);
            margin-bottom: 0.5rem;
            animation: fadeIn 0.5s;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            letter-spacing: 0.02em;
            color: var(--text);
            line-height: 0.9;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        h1 span { color: var(--accent); }
        .quote {
            font-style: italic;
            color: var(--text-muted);
            font-size: clamp(1rem, 2vw, 1.25rem);
            margin-top: 1.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.7s 0.2s both;
        }
        .line {
            width: 1px;
            height: 60px;
            background: var(--accent);
            margin: 1.5rem auto;
            animation: grow 0.5s 0.3s both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes grow {
            from { height: 0; }
            to { height: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="tagline">EST. 2024</p>
        <h1>VINTAGE <span>EDITORIAL</span></h1>
        <div class="line"></div>
        <p class="quote">"个性驱动的故事讲述，让每个品牌都有独特的声音"</p>
    </div>
</body>
</html>
