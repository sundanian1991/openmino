<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mino Style: 数据模式 - 极简黑白灰</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #111111;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --bg-white: #ffffff;
            --border: #e5e5e5;
            --accent: #E2725B; /* 陶土色点缀 */
            --success: #2a9d5c;
            --danger: #d73a49;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-white);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .dashboard {
            background: var(--bg-white);
            border: 1px solid var(--border);
            padding: clamp(1.5rem, 3vw, 2rem);
            max-width: 90vw;
            width: 640px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 标题区 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--text); /* 2px 黑色表头边框 */
        }
        h1 {
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        /* 数据卡片网格 */
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px; /* 1px 分割 */
            background: var(--border);
            margin-bottom: 1.5rem;
        }
        .metric {
            background: var(--bg-white);
            padding: 1.25rem 1rem;
            text-align: center;
        }
        .metric-value {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 600;
            color: var(--text);
            line-height: 1;
        }
        /* 陶土色点缀 - 仅核心数据 */
        .metric.highlight .metric-value {
            color: var(--accent);
        }
        .metric-label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .metric-change {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .metric-change.up { color: var(--success); }
        .metric-change.down { color: var(--danger); }

        /* 图表区 */
        .chart-section {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }
        .chart-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* 简洁条形图 */
        .chart-bars {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .bar-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            width: 80px;
            text-align: right;
        }
        .bar-track {
            flex: 1;
            height: 24px;
            background: #f5f5f5;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            background: var(--text);
            animation: growRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 陶土色点缀 - 关键数据 */
        .bar-fill.accent {
            background: var(--accent);
        }
        .bar-value {
            font-size: 0.75rem;
            color: var(--text);
            font-weight: 500;
            width: 40px;
        }

        /* 底部说明 */
        .footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes growRight {
            from { width: 0; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>数据概览</h1>
            <span class="badge">极简模式 · 黑白灰 + 陶土色点缀</span>
        </div>

        <div class="metrics">
            <div class="metric highlight">
                <div class="metric-value">42%</div>
                <div class="metric-label">核心指标</div>
                <div class="metric-change up">↑ 12%</div>
            </div>
            <div class="metric">
                <div class="metric-value">1,248</div>
                <div class="metric-label">总量</div>
            </div>
            <div class="metric">
                <div class="metric-value">89</div>
                <div class="metric-label">活跃数</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-title">月度趋势</div>
            <div class="chart-bars">
                <div class="bar-row">
                    <span class="bar-label">一月</span>
                    <div class="bar-track"><div class="bar-fill" style="width: 65%"></div></div>
                    <span class="bar-value">65</span>
                </div>
                <div class="bar-row">
                    <span class="bar-label">二月</span>
                    <div class="bar-track"><div class="bar-fill" style="width: 78%"></div></div>
                    <span class="bar-value">78</span>
                </div>
                <div class="bar-row">
                    <span class="bar-label">三月</span>
                    <div class="bar-track"><div class="bar-fill accent" style="width: 92%"></div></div>
                    <span class="bar-value">92</span>
                </div>
                <div class="bar-row">
                    <span class="bar-label">四月</span>
                    <div class="bar-track"><div class="bar-fill" style="width: 54%"></div></div>
                    <span class="bar-value">54</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>陶土色仅用于激活视觉焦点</span>
            <span>更新于 2024-03</span>
        </div>
    </div>
</body>
</html>
