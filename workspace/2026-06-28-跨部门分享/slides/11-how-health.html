<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>How - wiki:health检查项</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .health-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    align-self: center;
  }
  .health-item {
    padding: 40px;
    background: var(--surface-dim);
    border-top: 3px solid var(--accent);
  }
  .health-icon {
    font-size: 32px;
    margin-bottom: 24px;
  }
  .health-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .health-desc {
    font-size: 16px;
    color: var(--ink-muted);
    line-height: 1.7;
  }
  .score-bar {
    margin-top: 24px;
    height: 4px;
    background: var(--border);
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">04 HOW</div>
    <h1>wiki:health 检查项</h1>
  </div>
  <div class="health-grid">
    <div class="health-item">
      <div class="health-icon">01</div>
      <div class="health-title">文档完整性</div>
      <div class="health-desc">所有raw文档是否都已distill？是否有遗漏的业务领域？</div>
      <div class="score-bar"><div class="score-fill" style="width: 95%"></div></div>
    </div>
    <div class="health-item">
      <div class="health-icon">02</div>
      <div class="health-title">知识准确性</div>
      <div class="health-desc">提炼内容是否与原文一致？关键数据是否正确提取？</div>
      <div class="score-bar"><div class="score-fill" style="width: 88%"></div></div>
    </div>
    <div class="health-item">
      <div class="health-icon">03</div>
      <div class="health-title">索引覆盖度</div>
      <div class="health-desc">CLAUDE.md是否覆盖所有主题？关键词是否足够丰富？</div>
      <div class="score-bar"><div class="score-fill" style="width: 92%"></div></div>
    </div>
    <div class="health-item">
      <div class="health-icon">04</div>
      <div class="health-title">时效性</div>
      <div class="health-desc">文档是否是最新的版本？过时内容是否已标记？</div>
      <div class="score-bar"><div class="score-fill" style="width: 85%"></div></div>
    </div>
    <div class="health-item">
      <div class="health-icon">05</div>
      <div class="health-title">关联性</div>
      <div class="health-desc">相关主题之间是否建立了正确的引用关系？</div>
      <div class="score-bar"><div class="score-fill" style="width: 90%"></div></div>
    </div>
    <div class="health-item">
      <div class="health-icon">06</div>
      <div class="health-title">可访问性</div>
      <div class="health-desc">AI能否快速定位到准确答案？响应时间是否合理？</div>
      <div class="score-bar"><div class="score-fill" style="width: 94%"></div></div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>11 / 16</span>
  </div>
</body>
</html>
