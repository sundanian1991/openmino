<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Demo整理前 - 散乱SOP文档</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .demo-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-self: center;
  }
  .demo-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .file-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .file-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--surface-dim);
    border-left: 3px solid var(--ink-muted);
  }
  .file-icon {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--ink-muted);
    min-width: 40px;
  }
  .file-name {
    font-size: 18px;
    color: var(--ink);
  }
  .file-meta {
    font-size: 14px;
    color: var(--ink-muted);
    margin-left: auto;
  }
  .mess-indicator {
    margin-top: 40px;
    padding: 32px;
    background: #FFF5F5;
    border: 1px solid #FFCCCC;
  }
  .mess-indicator h4 {
    font-size: 20px;
    font-weight: 600;
    color: #CC0000;
    margin: 0 0 12px 0;
  }
  .mess-indicator p {
    font-size: 16px;
    color: #666;
    margin: 0;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">03 DEMO</div>
    <h1>散乱的SOP文档</h1>
  </div>
  <div class="demo-container">
    <div>
      <div class="demo-label">Before - 整理前</div>
      <div class="file-list">
        <div class="file-item">
          <div class="file-icon">DOC</div>
          <div class="file-name">供应商准入流程v2.1.docx</div>
          <div class="file-meta">2024-03</div>
        </div>
        <div class="file-item">
          <div class="file-icon">PDF</div>
          <div class="file-name">清退制度终版.pdf</div>
          <div class="file-meta">2023-11</div>
        </div>
        <div class="file-item">
          <div class="file-icon">MD</div>
          <div class="file-name">金条产线分工说明.md</div>
          <div class="file-meta">2024-06</div>
        </div>
        <div class="file-item">
          <div class="file-icon">TXT</div>
          <div class="file-name">合规检查清单.txt</div>
          <div class="file-meta">2024-01</div>
        </div>
        <div class="file-item">
          <div class="file-icon">DOC</div>
          <div class="file-name">供应商评分标准_最新.xlsx</div>
          <div class="file-meta">2024-05</div>
        </div>
      </div>
    </div>
    <div>
      <div class="mess-indicator">
        <h4>问题</h4>
        <p>
          · 格式不统一（doc/pdf/md/txt/xlsx混杂）<br>
          · 命名混乱（有版本号、有"终版"、有"最新"）<br>
          · 散落各处（本地/飞书/邮件附件）<br>
          · 无法被AI理解
        </p>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>06 / 16</span>
  </div>
</body>
</html>
