<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>How - 三级火箭</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .rocket-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    align-self: center;
  }
  .rocket-stage {
    position: relative;
    padding: 48px;
    background: var(--surface-dim);
  }
  .stage-badge {
    position: absolute;
    top: -16px;
    left: 48px;
    padding: 8px 24px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .stage-title {
    font-size: 28px;
    font-weight: 600;
    margin: 32px 0 24px;
    color: var(--ink);
  }
  .stage-content {
    font-size: 18px;
    line-height: 1.8;
    color: var(--ink-muted);
  }
  .stage-highlight {
    margin-top: 32px;
    padding: 24px;
    background: white;
    border-left: 3px solid var(--accent);
  }
  .stage-highlight p {
    font-size: 16px;
    color: var(--ink-light);
    margin: 0;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">04 HOW</div>
    <h1>三级火箭落地路径</h1>
  </div>
  <div class="rocket-container">
    <div class="rocket-stage">
      <div class="stage-badge">LEVEL 1</div>
      <div class="stage-title">个人先行</div>
      <div class="stage-content">
        一个人先跑通全流程<br>
        验证工具和方法<br>
        积累最佳实践
      </div>
      <div class="stage-highlight">
        <p>周期：2-4周<br>目标：跑通一个完整案例</p>
      </div>
    </div>
    <div class="rocket-stage">
      <div class="stage-badge">LEVEL 2</div>
      <div class="stage-title">人工确认</div>
      <div class="stage-content">
        小范围试点<br>
        人工校验AI输出<br>
        逐步建立信任
      </div>
      <div class="stage-highlight">
        <p>周期：1-2月<br>目标：3-5人团队试用</p>
      </div>
    </div>
    <div class="rocket-stage">
      <div class="stage-badge">LEVEL 3</div>
      <div class="stage-title">团队共享</div>
      <div class="stage-content">
        完善文档和流程<br>
        建立维护机制<br>
        推广到更多团队
      </div>
      <div class="stage-highlight">
        <p>周期：3-6月<br>目标：部门级知识库</p>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>13 / 16</span>
  </div>
</body>
</html>
