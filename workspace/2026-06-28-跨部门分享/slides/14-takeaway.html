<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Takeaway - 三句话带走</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .takeaway-container {
    display: flex;
    flex-direction: column;
    gap: 64px;
    align-self: center;
    max-width: 1200px;
  }
  .takeaway-item {
    display: flex;
    align-items: flex-start;
    gap: 40px;
  }
  .takeaway-number {
    font-family: var(--font-mono);
    font-size: 80px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    opacity: 0.3;
  }
  .takeaway-content h3 {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 600;
    margin: 0 0 16px 0;
    color: var(--ink);
    line-height: 1.3;
  }
  .takeaway-content p {
    font-size: 22px;
    color: var(--ink-muted);
    line-height: 1.7;
    margin: 0;
  }
</style>
</head>
<body>
  <div style="text-align: center; margin-bottom: 40px;">
    <h1>三句话带走</h1>
  </div>
  <div class="takeaway-container">
    <div class="takeaway-item">
      <div class="takeaway-number">01</div>
      <div class="takeaway-content">
        <h3>知识需要结构化，AI才能用</h3>
        <p>散乱的文档是AI的噩梦，raw/distill/CLAUDE.md三层结构是解药</p>
      </div>
    </div>
    <div class="takeaway-item">
      <div class="takeaway-number">02</div>
      <div class="takeaway-content">
        <h3>工具降低门槛，人保持控制</h3>
        <p>AI提炼效率，人工校验准确性，两者结合才是最优解</p>
      </div>
    </div>
    <div class="takeaway-item">
      <div class="takeaway-number">03</div>
      <div class="takeaway-content">
        <h3>从一个人开始，逐步扩展</h3>
        <p>三级火箭路径：个人先行、小范围试用、团队推广</p>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>14 / 16</span>
  </div>
</body>
</html>
