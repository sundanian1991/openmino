<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>What - 三层结构</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .structure-container {
    display: flex;
    flex-direction: column;
    gap: 32px;
    align-self: center;
  }
  .layer {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 48px;
    align-items: center;
    padding: 48px;
    background: var(--surface-dim);
    border-left: 4px solid var(--border);
    transition: all 0.3s ease;
  }
  .layer:hover {
    border-left-color: var(--accent);
  }
  .layer-label {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .layer-content h3 {
    margin: 0 0 12px 0;
    font-size: 28px;
    font-weight: 600;
  }
  .layer-content p {
    margin: 0;
    font-size: 20px;
    color: var(--ink-muted);
    line-height: 1.6;
  }
  .arrow {
    display: flex;
    justify-content: center;
    color: var(--ink-muted);
    font-size: 24px;
    margin: -8px 0;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">02 WHAT</div>
    <h1>三层知识结构</h1>
  </div>
  <div class="structure-container">
    <div class="layer">
      <div class="layer-label">raw/</div>
      <div class="layer-content">
        <h3>原始文档</h3>
        <p>直接存放你的SOP、会议纪要、流程说明，不做任何处理</p>
      </div>
    </div>
    <div class="arrow">↓ distill</div>
    <div class="layer">
      <div class="layer-label">distill/</div>
      <div class="layer-content">
        <h3>AI提炼</h3>
        <p>AI自动提取关键概念、流程、决策点，生成结构化知识</p>
      </div>
    </div>
    <div class="arrow">↓ organize</div>
    <div class="layer">
      <div class="layer-label">CLAUDE.md</div>
      <div class="layer-content">
        <h3>索引文件</h3>
        <p>知识地图，告诉AI去哪里找什么信息</p>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>03 / 16</span>
  </div>
</body>
</html>
