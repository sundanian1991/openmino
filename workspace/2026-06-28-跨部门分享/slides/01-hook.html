<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Hook - 你们团队的知识，AI能用吗？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
  }
  .hook-content {
    text-align: center;
    max-width: 1400px;
  }
  .hook-question {
    font-family: var(--font-display);
    font-size: 96px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 60px;
    letter-spacing: -0.03em;
  }
  .hook-subtitle {
    font-size: 28px;
    color: var(--ink-muted);
    line-height: 1.6;
  }
  .hook-subtitle strong {
    color: var(--accent);
  }
  .dots {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 80px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ink-muted);
    opacity: 0.3;
  }
  .dot.active {
    background: var(--accent);
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="hook-content">
    <div class="hook-question">你们团队的知识<br><span class="accent">AI能用吗？</span></div>
    <div class="hook-subtitle">从散乱文档到结构化知识库的实践路径</div>
  </div>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>01 / 16</span>
  </div>
</body>
</html>
