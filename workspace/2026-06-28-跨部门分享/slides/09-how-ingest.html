<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>How - wiki:ingest六步流程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .steps-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 24px;
    align-self: center;
  }
  .step {
    text-align: center;
    position: relative;
  }
  .step-number {
    width: 48px;
    height: 48px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: white;
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
  }
  .step-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .step-desc {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.5;
  }
  .step-arrow {
    position: absolute;
    right: -20px;
    top: 20px;
    color: var(--ink-muted);
    font-size: 18px;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">04 HOW</div>
    <h1>wiki:ingest 六步流程</h1>
  </div>
  <div class="steps-container">
    <div class="step">
      <div class="step-number">1</div>
      <div class="step-title">扫描</div>
      <div class="step-desc">识别目录下所有文档</div>
      <div class="step-arrow">→</div>
    </div>
    <div class="step">
      <div class="step-number">2</div>
      <div class="step-title">解析</div>
      <div class="step-desc">提取文本和结构</div>
      <div class="step-arrow">→</div>
    </div>
    <div class="step">
      <div class="step-number">3</div>
      <div class="step-title">分块</div>
      <div class="step-desc">按主题切分内容</div>
      <div class="step-arrow">→</div>
    </div>
    <div class="step">
      <div class="step-number">4</div>
      <div class="step-title">提炼</div>
      <div class="step-desc">AI提取关键概念</div>
      <div class="step-arrow">→</div>
    </div>
    <div class="step">
      <div class="step-number">5</div>
      <div class="step-title">索引</div>
      <div class="step-desc">建立知识地图</div>
      <div class="step-arrow">→</div>
    </div>
    <div class="step">
      <div class="step-number">6</div>
      <div class="step-title">验证</div>
      <div class="step-desc">检查质量完整性</div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>09 / 16</span>
  </div>
</body>
</html>
