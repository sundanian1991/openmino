<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>What - 三个技能对比</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .comparison {
    display: grid;
    grid-template-columns: 200px repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    align-self: center;
  }
  .cell {
    background: var(--surface);
    padding: 32px 24px;
    font-size: 18px;
    line-height: 1.6;
  }
  .cell.header {
    background: var(--ink);
    color: white;
    font-weight: 600;
    font-size: 20px;
    text-align: center;
  }
  .cell.row-label {
    background: var(--surface-dim);
    font-weight: 500;
    color: var(--ink-muted);
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
  }
  .cell.skill-name {
    background: var(--accent);
    color: white;
    font-family: var(--font-mono);
    font-weight: 600;
    text-align: center;
    font-size: 22px;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">02 WHAT</div>
    <h1>三个技能对比</h1>
  </div>
  <div class="comparison">
    <div class="cell header"></div>
    <div class="cell skill-name">wiki:ingest</div>
    <div class="cell skill-name">wiki:query</div>
    <div class="cell skill-name">wiki:health</div>
    
    <div class="cell row-label">功能</div>
    <div class="cell">导入文档并建立知识索引</div>
    <div class="cell">基于知识库回答问题</div>
    <div class="cell">检查知识库健康度</div>
    
    <div class="cell row-label">输入</div>
    <div class="cell">文档路径或内容</div>
    <div class="cell">自然语言问题</div>
    <div class="cell">知识库目录</div>
    
    <div class="cell row-label">输出</div>
    <div class="cell">结构化知识文件</div>
    <div class="cell">精准答案 + 来源</div>
    <div class="cell">健康报告 + 建议</div>
    
    <div class="cell row-label">频率</div>
    <div class="cell">新增文档时</div>
    <div class="cell">随时提问</div>
    <div class="cell">每周/每月</div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>05 / 16</span>
  </div>
</body>
</html>
