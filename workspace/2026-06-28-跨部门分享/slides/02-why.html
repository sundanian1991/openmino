<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Why - 现有方案的问题</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  h1 {
    margin-bottom: 60px;
  }
  .problems {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    align-self: center;
  }
  .problem-card {
    padding: 40px;
    background: var(--surface-dim);
    border-radius: 2px;
  }
  .problem-number {
    font-family: var(--font-mono);
    font-size: 48px;
    font-weight: 700;
    color: var(--ink-muted);
    opacity: 0.3;
    margin-bottom: 24px;
  }
  .problem-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .problem-desc {
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink-muted);
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">01 WHY</div>
    <h1>现有方案的问题</h1>
  </div>
  <div class="problems">
    <div class="problem-card">
      <div class="problem-number">01</div>
      <div class="problem-title">技术门槛高</div>
      <div class="problem-desc">需要写代码、配置环境、理解API，产品经理和运营同学望而却步</div>
    </div>
    <div class="problem-card">
      <div class="problem-number">02</div>
      <div class="problem-title">没有专门支持</div>
      <div class="problem-desc">通用工具不理解业务语境，无法处理供应商SOP、合规流程等领域知识</div>
    </div>
    <div class="problem-card">
      <div class="problem-number">03</div>
      <div class="problem-title">散落各处</div>
      <div class="problem-desc">文档在飞书、Notion、本地文件夹、微信聊天记录里，AI找不到也用不了</div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>02 / 16</span>
  </div>
</body>
</html>
