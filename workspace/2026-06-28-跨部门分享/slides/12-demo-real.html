<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Demo - 供应商管理知识库实例</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .demo-layout {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 80px;
    align-self: center;
  }
  .stats-panel {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .stat-card {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .stat-number {
    font-family: var(--font-mono);
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-unit {
    font-size: 20px;
    color: var(--ink-muted);
  }
  .stat-label {
    font-size: 18px;
    color: var(--ink-light);
  }
  .status-panel {
    padding: 48px;
    background: var(--surface-dim);
  }
  .status-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .status-title {
    font-size: 22px;
    font-weight: 600;
  }
  .health-score {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: #F0FFF0;
    color: #006600;
    font-weight: 600;
  }
  .status-items {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .status-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .status-item:last-child {
    border-bottom: none;
  }
  .item-label {
    font-size: 16px;
    color: var(--ink-light);
  }
  .item-value {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">03 DEMO</div>
    <h1>真实案例：供应商管理知识库</h1>
  </div>
  <div class="demo-layout">
    <div class="stats-panel">
      <div class="stat-card">
        <div class="stat-number">5,353</div>
        <div class="stat-unit">行</div>
        <div class="stat-label">知识内容</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">44</div>
        <div class="stat-unit">篇</div>
        <div class="stat-label">结构化文档</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">100</div>
        <div class="stat-unit">分</div>
        <div class="stat-label">健康度评分</div>
      </div>
    </div>
    <div class="status-panel">
      <div class="status-header">
        <div class="status-title">知识库状态</div>
        <div class="health-score">
          <span>健康度</span>
          <span style="font-size: 24px;">100</span>
        </div>
      </div>
      <div class="status-items">
        <div class="status-item">
          <div class="item-label">覆盖领域</div>
          <div class="item-value">准入/清退/合规/分工/评分</div>
        </div>
        <div class="status-item">
          <div class="item-label">支持提问</div>
          <div class="item-value">238个常见问题</div>
        </div>
        <div class="status-item">
          <div class="item-label">最后更新</div>
          <div class="item-value">2026-06-27</div>
        </div>
        <div class="status-item">
          <div class="item-label">平均响应</div>
          <div class="item-value">1.2秒</div>
        </div>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>12 / 16</span>
  </div>
</body>
</html>
