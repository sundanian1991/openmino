<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>How - AI提炼 vs 人写</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .comparison-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-self: center;
  }
  .comparison-side {
    padding: 48px;
    background: var(--surface-dim);
  }
  .side-header {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .side-header.ai { color: var(--accent); }
  .side-header.human { color: var(--ink-muted); }
  .checklist {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink-light);
  }
  .check-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .check-icon.yes { color: var(--accent); }
  .check-icon.no { color: var(--ink-muted); }
</style>
</head>
<body>
  <div>
    <div class="section-badge">04 HOW</div>
    <h1>AI提炼 vs 人写规范</h1>
  </div>
  <div class="comparison-container">
    <div class="comparison-side">
      <div class="side-header ai">AI提炼</div>
      <div class="checklist">
        <div class="check-item">
          <span class="check-icon yes">+</span>
          <span>速度：分钟级完成提炼</span>
        </div>
        <div class="check-item">
          <span class="check-icon yes">+</span>
          <span>一致性：统一格式和结构</span>
        </div>
        <div class="check-item">
          <span class="check-icon yes">+</span>
          <span>可扩展：处理海量文档</span>
        </div>
        <div class="check-item">
          <span class="check-icon no">-</span>
          <span>可能遗漏隐性知识</span>
        </div>
        <div class="check-item">
          <span class="check-icon no">-</span>
          <span>需要人工校验关键点</span>
        </div>
      </div>
    </div>
    <div class="comparison-side">
      <div class="side-header human">人写规范</div>
      <div class="checklist">
        <div class="check-item">
          <span class="check-icon yes">+</span>
          <span>准确：捕获隐性经验</span>
        </div>
        <div class="check-item">
          <span class="check-icon yes">+</span>
          <span>深度：理解业务上下文</span>
        </div>
        <div class="check-item">
          <span class="check-icon no">-</span>
          <span>耗时：每篇文档需要数小时</span>
        </div>
        <div class="check-item">
          <span class="check-icon no">-</span>
          <span>难维护：规范容易过时</span>
        </div>
        <div class="check-item">
          <span class="check-icon no">-</span>
          <span>难规模化：团队难以统一</span>
        </div>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>08 / 16</span>
  </div>
</body>
</html>
