<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>What - 三个操作</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .operations {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 64px;
    align-self: center;
  }
  .operation {
    text-align: center;
  }
  .operation-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: white;
    font-size: 32px;
    font-weight: 700;
  }
  .operation h3 {
    font-size: 32px;
    font-weight: 600;
    margin: 0 0 16px 0;
  }
  .operation p {
    font-size: 20px;
    color: var(--ink-muted);
    line-height: 1.7;
    margin: 0;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">02 WHAT</div>
    <h1>三个核心操作</h1>
  </div>
  <div class="operations">
    <div class="operation">
      <div class="operation-icon">I</div>
      <h3>Ingest</h3>
      <p>导入文档<br>建立索引<br>AI开始学习</p>
    </div>
    <div class="operation">
      <div class="operation-icon">Q</div>
      <h3>Query</h3>
      <p>自然语言提问<br>精准检索<br>得到答案</p>
    </div>
    <div class="operation">
      <div class="operation-icon">L</div>
      <h3>Lint</h3>
      <p>健康检查<br>发现缺失<br>持续优化</p>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>04 / 16</span>
  </div>
</body>
</html>
