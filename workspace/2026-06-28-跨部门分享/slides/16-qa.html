<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Q&A - 答疑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: var(--page-padding);
    text-align: center;
  }
  .qa-content {
    max-width: 800px;
  }
  .qa-title {
    font-family: var(--font-display);
    font-size: 96px;
    font-weight: 700;
    margin-bottom: 40px;
    color: var(--ink);
  }
  .qa-subtitle {
    font-size: 28px;
    color: var(--ink-muted);
    margin-bottom: 60px;
    line-height: 1.6;
  }
  .contact-info {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 40px;
  }
  .contact-item {
    text-align: center;
  }
  .contact-label {
    font-size: 14px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .contact-value {
    font-size: 20px;
    color: var(--ink);
    font-weight: 500;
  }
  .dots {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 80px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ink-muted);
    opacity: 0.3;
  }
  .dot.active {
    background: var(--accent);
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="qa-content">
    <div class="qa-title">Q&A</div>
    <div class="qa-subtitle">有问题，现在问</div>
    <div class="contact-info">
      <div class="contact-item">
        <div class="contact-label">邮件</div>
        <div class="contact-value">your-email@company.com</div>
      </div>
      <div class="contact-item">
        <div class="contact-label">飞书</div>
        <div class="contact-value">@你的名字</div>
      </div>
    </div>
  </div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>16 / 16</span>
  </div>
</body>
</html>
