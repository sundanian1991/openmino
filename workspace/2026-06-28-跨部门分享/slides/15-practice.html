<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Practice - 现场体验</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: var(--page-padding);
    text-align: center;
  }
  .practice-content {
    max-width: 1000px;
  }
  .practice-title {
    font-family: var(--font-display);
    font-size: 72px;
    font-weight: 700;
    margin-bottom: 40px;
    color: var(--ink);
  }
  .practice-subtitle {
    font-size: 28px;
    color: var(--ink-muted);
    margin-bottom: 60px;
    line-height: 1.6;
  }
  .practice-steps {
    display: flex;
    justify-content: center;
    gap: 48px;
  }
  .practice-step {
    padding: 32px 40px;
    background: var(--surface-dim);
    text-align: center;
    min-width: 200px;
  }
  .step-number {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .step-text {
    font-size: 18px;
    color: var(--ink-light);
    line-height: 1.5;
  }
  .qr-placeholder {
    margin-top: 60px;
    padding: 40px;
    border: 2px dashed var(--border);
    display: inline-block;
  }
  .qr-text {
    font-size: 16px;
    color: var(--ink-muted);
  }
</style>
</head>
<body>
  <div class="practice-content">
    <div class="practice-title">现场体验</div>
    <div class="practice-subtitle">打开你的Claude Code，试试看</div>
    <div class="practice-steps">
      <div class="practice-step">
        <div class="step-number">1</div>
        <div class="step-text">找到你的一个SOP文档</div>
      </div>
      <div class="practice-step">
        <div class="step-number">2</div>
        <div class="step-text">运行wiki:ingest</div>
      </div>
      <div class="practice-step">
        <div class="step-number">3</div>
        <div class="step-text">用wiki:query提问</div>
      </div>
    </div>
    <div class="qr-placeholder">
      <div class="qr-text">[ 二维码 - 扫码获取工具指南 ]</div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>15 / 16</span>
  </div>
</body>
</html>
