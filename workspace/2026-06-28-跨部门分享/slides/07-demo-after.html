<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Demo整理后 - 结构化知识</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--page-padding);
  }
  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .section-badge::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
  }
  .demo-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-self: center;
  }
  .demo-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .structure-tree {
    font-family: var(--font-mono);
    font-size: 16px;
    line-height: 2;
    color: var(--ink);
  }
  .tree-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tree-indent { color: var(--ink-muted); }
  .tree-folder { color: var(--accent); font-weight: 600; }
  .tree-file { color: var(--ink-light); }
  .success-indicator {
    margin-top: 40px;
    padding: 32px;
    background: #F0FFF0;
    border: 1px solid #CCFFCC;
  }
  .success-indicator h4 {
    font-size: 20px;
    font-weight: 600;
    color: #006600;
    margin: 0 0 12px 0;
  }
  .success-indicator p {
    font-size: 16px;
    color: #333;
    margin: 0;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div>
    <div class="section-badge">03 DEMO</div>
    <h1>结构化的知识库</h1>
  </div>
  <div class="demo-container">
    <div>
      <div class="demo-label">After - 整理后</div>
      <div class="structure-tree">
        <div class="tree-item"><span class="tree-folder">knowledge-base/</span></div>
        <div class="tree-item"><span class="tree-indent">  </span><span class="tree-folder">raw/</span></div>
        <div class="tree-item"><span class="tree-indent">    </span><span class="tree-file">供应商准入流程v2.1.docx</span></div>
        <div class="tree-item"><span class="tree-indent">    </span><span class="tree-file">清退制度终版.pdf</span></div>
        <div class="tree-item"><span class="tree-indent">    </span><span class="tree-file">金条产线分工说明.md</span></div>
        <div class="tree-item"><span class="tree-indent">  </span><span class="tree-folder">distill/</span></div>
        <div class="tree-item"><span class="tree-indent">    </span><span class="tree-file">供应商准入流程.md</span></div>
        <div class="tree-item"><span class="tree-indent">    </span><span class="tree-file">清退制度.md</span></div>
        <div class="tree-item"><span class="tree-indent">    </span><span class="tree-file">产线分工规则.md</span></div>
        <div class="tree-item"><span class="tree-indent">  </span><span class="tree-file">CLAUDE.md</span></div>
      </div>
    </div>
    <div>
      <div class="success-indicator">
        <h4>效果</h4>
        <p>
          · AI可以精准找到任何制度条文<br>
          · 支持自然语言提问："供应商准入需要几步？"<br>
          · 自动关联相关流程和标准<br>
          · 新文档加入后自动更新索引
        </p>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <span>跨部门分享 · 2026.06.28</span>
    <span>07 / 16</span>
  </div>
</body>
</html>
