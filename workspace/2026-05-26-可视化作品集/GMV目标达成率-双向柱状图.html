<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 月 GMV 目标达成率差距图</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFFFFF;
    font-family: 'Inter', 'Inter Tight', system-ui, sans-serif;
    color: #1A1A2E;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    width: 800px;
    background: #fff;
  }
  .title {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #051C2C;
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: #8B8680;
    margin-bottom: 16px;
  }
  #chart { width: 800px; height: 420px; }
  .footnote {
    font-size: 11px;
    color: #8B8680;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #E8E5E0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="title">3 月 GMV 目标达成严重分化 —— 3 家达标、5 家未达标，极差 64 个百分点</div>
  <div class="subtitle">2026 年 3 月 · B 端企业主贷大额人工 · 新客-未授信</div>
  <div id="chart"></div>
  <div class="footnote">数据来源：业务系统，2026 年 3 月 | B 端企业主贷大额人工 · 新客-未授信</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
(function() {
  const data = [
    { name: '汇讯', rate: 132.5, gap: 32.5 },
    { name: '新动力', rate: 105.8, gap: 5.8 },
    { name: '锦瑞', rate: 103.9, gap: 3.9 },
    { name: '德辰', rate: 93.9, gap: -6.1 },
    { name: '广达', rate: 85.3, gap: -14.7 },
    { name: '中乾', rate: 80.3, gap: -19.7 },
    { name: '速腾', rate: 76.0, gap: -24.0 },
    { name: '九通', rate: 68.2, gap: -31.8 },
  ];

  const names = data.map(d => d.name).reverse();
  const gaps = data.map(d => d.gap).reverse();

  const chart = echarts.init(document.getElementById('chart'));

  chart.setOption({
    grid: {
      left: 90,
      right: 100,
      top: 20,
      bottom: 30,
    },
    xAxis: {
      type: 'value',
      min: -35,
      max: 35,
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: {
        lineStyle: { color: '#E8E5E0', type: 'dashed' }
      },
      axisLabel: {
        formatter: v => v === 0 ? '' : (v > 0 ? '+' + v + '%' : v + '%'),
        fontFamily: 'Inter',
        fontSize: 10,
        color: '#8B8680',
      }
    },
    yAxis: {
      type: 'category',
      data: names,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        fontFamily: 'Inter Tight',
        fontSize: 13,
        fontWeight: 500,
        color: '#1A1A2E',
      }
    },
    // 100% 基准线 via markLine on series
    series: [{
      type: 'bar',
      data: gaps.map((g, i) => ({
        value: g,
        itemStyle: {
          color: g >= 0 ? '#2E7D32' : '#D45400',
          borderRadius: g >= 0 ? [0, 2, 2, 0] : [2, 0, 0, 2],
        },
        label: {
          show: true,
          position: g >= 0 ? 'right' : 'left',
          formatter: function() {
            const d = data[data.length - 1 - i];
            if (d.name === '汇讯') return '{high|超目标 32%}';
            if (d.name === '九通') return '{low|缺口 32%}';
            return '{num|' + d.rate + '%}';
          },
          rich: {
            high: {
              fontFamily: 'Inter Tight',
              fontSize: 11,
              fontWeight: 700,
              color: '#2E7D32',
              padding: [0, 0, 0, 4],
            },
            low: {
              fontFamily: 'Inter Tight',
              fontSize: 11,
              fontWeight: 700,
              color: '#D45400',
              padding: [0, 4, 0, 0],
            },
            num: {
              fontFamily: 'Inter',
              fontSize: 10,
              color: '#8B8680',
            }
          }
        }
      })),
      barWidth: 24,
      barGap: '16px',
      markLine: {
        silent: true,
        symbol: 'none',
        lineStyle: { color: '#8B8680', type: 'dashed', width: 1.5 },
        label: {
          show: true,
          formatter: '达标线',
          fontFamily: 'Inter Tight',
          fontSize: 10,
          color: '#8B8680',
          position: 'insideStartTop',
        },
        data: [{ xAxis: 0 }]
      }
    }],
    animation: true,
    animationDuration: 800,
    animationEasing: 'cubicOut',
  });

  window.addEventListener('resize', () => chart.resize());
})();
</script>
</body>
</html>
