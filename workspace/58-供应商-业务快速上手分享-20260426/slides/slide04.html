<div class="wrap">
<p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #b8782a; letter-spacing: 2pt; margin-bottom: 8pt;">STEP 01 — HOW TO</p>
<h1 style="font-size: 24pt; color: #a85a1a; font-weight: bold; margin-bottom: 4pt;">怎么填这张画布</h1>
<div class="box">
<p style="font-size: 13pt; color: #2c2217; line-height: 1.5;">找一张大白纸或在线白板，花1小时从已有资料和访谈中把9个格子填满。</p>
<p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #b8782a; margin-top: 8pt;">填不上的格子 = 关键信息缺口，优先去补齐</p>
</div>
<p style="font-size: 12pt; color: #7a6b58; margin-top: 16pt; line-height: 1.5;">第一版画布的目标是<b style="color: #2c2217;">暴露你不知道什么</b>，而不是展示你知道什么。</p>
<div style="width: 40pt; height: 1pt; background: #a85a1a; margin: 14pt 0;"></div>
<p style="font-size: 12pt; color: #7a6b58; line-height: 1.5;">前30分钟用已有材料填，后30分钟标注空白并安排访谈。</p>
</div>
