<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商站点看板 v5 - Tab1 全局大盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #f5f3ef;
            --card: #ffffff;
            --card-hover: #fafafa;
            --border: #e8e4df;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --text: #2c2c2c;
            --text2: #6b6b6b;
            --text3: #9e9e9e;
            --blue: #5b7fa8;
            --green: #6d9e84;
            --gold: #c4a96a;
            --red: #b87e7e;
            --purple: #8a6daa;
            --radius: 2px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 顶部筛选栏 */
        .filter-bar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item label {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
        }

        .filter-item select {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            font-size: 13px;
            color: var(--text);
            min-width: 120px;
            cursor: pointer;
        }

        .filter-item select:focus {
            outline: none;
            border-color: var(--blue);
        }

        /* KPI 卡片 */
        .kpi-section {
            margin-bottom: 20px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .kpi-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            transition: box-shadow 0.2s;
        }

        .kpi-card:hover {
            box-shadow: var(--shadow);
        }

        .kpi-label {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .kpi-trend {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .trend-up { color: var(--green); }
        .trend-down { color: var(--red); }
        .trend-flat { color: var(--text3); }

        /* 风险概览卡片 */
        .risk-section {
            margin-bottom: 20px;
        }

        .risk-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .risk-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
        }

        .risk-card.warning {
            border-left: 3px solid var(--gold);
        }

        .risk-card.danger {
            border-left: 3px solid var(--red);
        }

        .risk-label {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .risk-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
        }

        .risk-desc {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
        }

        /* 月度趋势图 */
        .trend-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .trend-chart {
            width: 100%;
            height: 300px;
        }

        /* 关键洞察 */
        .insights-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .insights-list {
            list-style: none;
        }

        .insights-list li {
            padding: 12px 0;
            padding-left: 24px;
            position: relative;
            font-size: 14px;
            color: var(--text);
            line-height: 1.6;
            border-bottom: 1px solid var(--border);
        }

        .insights-list li:last-child {
            border-bottom: none;
        }

        .insights-list li::before {
            content: "•";
            position: absolute;
            left: 8px;
            color: var(--blue);
            font-weight: bold;
            font-size: 18px;
        }

        .insight-highlight {
            font-weight: 600;
            color: var(--blue);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .kpi-grid, .risk-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .kpi-grid, .risk-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        <div class="filter-bar">

        <!-- KPI 卡片 -->

                <div class="kpi-card">
                    <div class="kpi-label">供应商数</div>

                <div class="kpi-card">

                        <span id="kpi-project-count">-</span>
                        <span class="kpi-trend" id="kpi-project-trend"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 风险概览卡片 -->
        <div class="risk-section">
            <div class="risk-grid">
                <div class="risk-card warning">
                    <div class="risk-label">微小站点</div>
                    <div class="risk-value" id="risk-small-count">-</div>
                    <div class="risk-desc">&lt; 20 人</div>

                <div class="risk-card danger">
                    <div class="risk-label">超大站点</div>
                    <div class="risk-value" id="risk-large-count">-</div>
                    <div class="risk-desc">≥ 100 人</div>
                </div>
                <div class="risk-card warning">
                    <div class="risk-label">单一项目职场</div>
                    <div class="risk-value" id="risk-single-project-count">-</div>
                    <div class="risk-desc">仅 1 个项目</div>
                </div>
                <div class="risk-card danger">
                    <div class="risk-label">集中度风险供应商</div>
                    <div class="risk-value" id="risk-concentration-count">-</div>
                    <div class="risk-desc">单项目占比 &gt; 40%</div>
                </div>
            </div>
        </div>

        <div class="trend-section">
            <div class="section-title">月度人力趋势</div>
            <div id="trend-chart" class="trend-chart"></div>

        ];

        // ========== 数据层：合并物理职场 ==========
        function mergeWorkplaces(data) {
            const merged = new Map();

            data.forEach(row => {
                const key = `${row.供应商简称}-${row.职场}`;

                if (!merged.has(key)) {
                    merged.set(key, {
                        供应商简称：row.供应商简称,
                        职场：row.职场,
                        省份：row.站点所在省，
                        城市：row.站点所在市，
                        模式：row.模式，
                        项目列表：new Set([row.项目]),
                        1 月：row["1 月"] || 0,
                        2 月：row["2 月"] || 0,
                        3 月：row["3 月"] || 0,
                        4 月：row["4 月"] || 0,
                        Q1 平均人力：row["Q1 平均人力"] || 0,
                        项目明细：new Map([[row.项目，row["Q1 平均人力"]]])
                    });
                } else {
                    const wp = merged.get(key);
                    wp.1 月 += row["1 月"] || 0;
                    wp.2 月 += row["2 月"] || 0;
                    wp.3 月 += row["3 月"] || 0;
                    wp.4 月 += row["4 月"] || 0;
                    wp.Q1 平均人力 += row["Q1 平均人力"] || 0;
                    wp.项目列表.add(row.项目);

                    // 更新项目明细
                    const prev = wp.项目明细.get(row.项目) || 0;
                    wp.项目明细.set(row.项目，prev + row["Q1 平均人力"]);

                    // 模式：有任何一条是人工就是人工
                    if (row.模式 === "人工") {
                        wp.模式 = "人工";
                    }
                }
            });

            // 转换 Set 为数组，Map 为对象
            return Array.from(merged.values()).map(wp => ({
                ...wp,
                项目列表：Array.from(wp.项目列表),
                项目数量：wp.项目列表.length,
                项目明细：Object.fromEntries(wp.项目明细)
            }));
        }

        // ========== 数据层：全局计算 ==========
        const workplaces = mergeWorkplaces(rawData);

        // 获取唯一值列表
        const suppliers = [...new Set(rawData.map(r => r.供应商简称))].sort();
        const projects = [...new Set(rawData.map(r => r.项目))].sort();
        const provinces = [...new Set(rawData.map(r => r.站点所在省))].sort();

        // 初始化筛选器选项
        function initFilters() {
            const supplierSelect = document.getElementById('filter-supplier');
            const projectSelect = document.getElementById('filter-project');
            const provinceSelect = document.getElementById('filter-province');

            suppliers.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                supplierSelect.appendChild(opt);
            });

            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                projectSelect.appendChild(opt);
            });

            provinces.forEach(pr => {
                const opt = document.createElement('option');
                opt.value = pr;
                opt.textContent = pr;
                provinceSelect.appendChild(opt);
            });
        }

        // 筛选数据
        function filterData(data, filters) {
            return data.filter(row => {
                if (filters.supplier && row.供应商简称 !== filters.supplier) return false;
                if (filters.project && row.项目 !== filters.project) return false;
                if (filters.province && row.站点所在省 !== filters.province) return false;
                return true;
            });
        }

        // 筛选职场数据
        function filterWorkplaces(workplaces, rawData, filters) {
            if (!filters.supplier && !filters.project && !filters.province) {
                return workplaces;
            }

            // 先筛选原始数据，再合并
            const filteredRaw = filterData(rawData, filters);
            return mergeWorkplaces(filteredRaw);
        }

        // 计算指定月份的人力
        function getHeadcountByMonth(data, month) {
            const monthKey = `${month}月`;
            return data.reduce((sum, row) => sum + (row[monthKey] || 0), 0);
        }

        // 计算职场指定月份的人力
        function getWorkplaceHeadcountByMonth(wp, month) {
            const monthKey = `${month}月`;
            return wp[monthKey] || 0;
        }

        // 计算环比
        function calculateTrend(current, previous) {
            if (previous === 0 || current === 0) return { value: 0, type: 'flat' };
            const change = ((current - previous) / previous) * 100;
            if (change > 0.5) return { value: change, type: 'up' };
            if (change < -0.5) return { value: change, type: 'down' };
            return { value: change, type: 'flat' };
        }

        function formatTrend(trend) {
            if (trend.type === 'flat') return '';
            const arrow = trend.type === 'up' ? '↑' : '↓';
            const cls = trend.type === 'up' ? 'trend-up' : 'trend-down';
            return `<span class="${cls}">${arrow}${Math.abs(trend.value).toFixed(1)}%</span>`;
        }

        // ========== 核心计算：KPI 指标 ==========
        function calculateKPIs(workplaces, rawData, month) {
            const prevMonth = month > 1 ? month - 1 : 1;

            // 当前月总人力
            const currentTotal = workplaces.reduce((sum, wp) => sum + getWorkplaceHeadcountByMonth(wp, month), 0);
            const prevTotal = workplaces.reduce((sum, wp) => sum + getWorkplaceHeadcountByMonth(wp, prevMonth), 0);
            const totalTrend = calculateTrend(currentTotal, prevTotal);

            // 职场数（有人的职场）
            const currentWorkplaces = workplaces.filter(wp => getWorkplaceHeadcountByMonth(wp, month) > 0).length;
            const prevWorkplaces = workplaces.filter(wp => getWorkplaceHeadcountByMonth(wp, prevMonth) > 0).length;
            const workplaceTrend = calculateTrend(currentWorkplaces, prevWorkplaces);

            // 供应商数
            const currentSuppliers = new Set(workplaces.filter(wp => getWorkplaceHeadcountByMonth(wp, month) > 0).map(wp => wp.供应商简称)).size;
            const prevSuppliers = new Set(workplaces.filter(wp => getWorkplaceHeadcountByMonth(wp, prevMonth) > 0).map(wp => wp.供应商简称)).size;
            const supplierTrend = calculateTrend(currentSuppliers, prevSuppliers);

            // 项目数
            const currentProjects = new Set(rawData.filter(r => r[`${month}月`] > 0).map(r => r.项目)).size;
            const prevProjects = new Set(rawData.filter(r => r[`${prevMonth}月`] > 0).map(r => r.项目)).size;
            const projectTrend = calculateTrend(currentProjects, prevProjects);

            return {
                total: { value: currentTotal, trend: totalTrend },
                workplaces: { value: currentWorkplaces, trend: workplaceTrend },
                suppliers: { value: currentSuppliers, trend: supplierTrend },
                projects: { value: currentProjects, trend: projectTrend }
            };
        }

        // ========== 核心计算：风险指标 ==========
        function calculateRisks(workplaces, month) {
            const monthHeadcount = wp => getWorkplaceHeadcountByMonth(wp, month);

            // 微小站点 (<20 人)
            const smallCount = workplaces.filter(wp => monthHeadcount(wp) < 20 && monthHeadcount(wp) > 0).length;

            // 超大站点 (≥100 人)
            const largeCount = workplaces.filter(wp => monthHeadcount(wp) >= 100).length;

            // 单一项目职场
            const singleProjectCount = workplaces.filter(wp => wp.项目数量 === 1 && monthHeadcount(wp) > 0).length;

            // 集中度风险供应商 (单项目人力/该项目总人力 > 40%)
            const projectTotalMap = new Map();
            workplaces.forEach(wp => {
                if (monthHeadcount(wp) <= 0) return;
                Object.entries(wp.项目明细).forEach(([project, q1Avg]) => {
                    // 用 Q1 平均人力作为权重近似计算
                    const prev = projectTotalMap.get(project) || 0;
                    projectTotalMap.set(project, prev + q1Avg);
                });
            });

            const concentrationCount = new Set(workplaces.filter(wp => {
                if (monthHeadcount(wp) <= 0) return false;
                // 检查该供应商的每个项目占比
                for (const [project, q1Avg] of Object.entries(wp.项目明细)) {
                    const projectTotal = projectTotalMap.get(project) || 0;
                    if (projectTotal > 0 && q1Avg / projectTotal > 0.4) {
                        return true;
                    }
                }
                return false;
            }).map(wp => wp.供应商简称)).size;

            return {
                small: smallCount,
                large: largeCount,
                singleProject: singleProjectCount,
                concentration: concentrationCount
            };
        }

        // ========== 洞察引擎 ==========
        function generateInsights(workplaces, rawData, kpis, risks, month) {
            const insights = [];
            const monthNames = ['1 月', '2 月', '3 月', '4 月'];
            const prevMonth = month > 1 ? month - 1 : 1;

            // 洞察 1: 总人力趋势
            if (kpis.total.trend.type !== 'flat') {
                const changeType = kpis.total.trend.type === 'up' ? '增' : '降';
                const changePct = Math.abs(kpis.total.trend.value).toFixed(1);

                // 找出贡献最大的项目
                const monthKey = `${month}月`;
                const prevMonthKey = `${prevMonth}月`;
                const projectContribution = new Map();
                rawData.forEach(r => {
                    const diff = (r[monthKey] || 0) - (r[prevMonthKey] || 0);
                    const prev = projectContribution.get(r.项目) || 0;
                    projectContribution.set(r.项目，prev + diff);
                });

                const topProject = Array.from(projectContribution.entries())
                    .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))[0];

                if (topProject) {
                    insights.push(`${monthNames[month - 1]}总人力较${monthNames[prevMonth - 1]}${changeType}${changePct}%，主要由${topProject[0]}贡献`);
                }
            }

            // 洞察 2: 单点依赖风险
            const monthKey = `${month}月`;
            const totalHeadcount = workplaces.reduce((sum, wp) => sum + (wp[monthKey] || 0), 0);
            const topWorkplace = workplaces
                .filter(wp => wp[monthKey] > 0)
                .sort((a, b) => b[monthKey] - a[monthKey])[0];

            if (topWorkplace && totalHeadcount > 0) {
                const占比 = (topWorkplace[monthKey] / totalHeadcount * 100).toFixed(1);
                if (占比 > 10) {
                    insights.push(`${topWorkplace.供应商简称}${topWorkplace.职场}人力${topWorkplace[monthKey]}人，占总人力${占比}%，为最大单点依赖`);
                }
            }

            // 洞察 3: 供应链单薄
            const projectSupplierMap = new Map();
            rawData.forEach(r => {
                if (r[monthKey] > 0) {
                    const prev = projectSupplierMap.get(r.项目) || new Set();
                    prev.add(r.供应商简称);
                    projectSupplierMap.set(r.项目，prev);
                }
            });

            const thinSupplyProjects = Array.from(projectSupplierMap.entries())
                .filter(([_, suppliers]) => suppliers.size < 2)
                .map(([project, suppliers]) => ({ project, count: suppliers.size }));

            if (thinSupplyProjects.length > 0) {
                const proj = thinSupplyProjects[0];
                insights.push(`${proj.project}仅靠${proj.count}家供应商支撑，供应链单薄`);
            }

            // 洞察 4: 微小站点警告
            if (risks.small > 5) {
                insights.push(`当前${risks.small}个站点人力不足 20 人，运营成本效率偏低`);
            }

            // 洞察 5: 新开/关闭站点
            const newOrClosed = [];
            workplaces.forEach(wp => {
                const prev = getWorkplaceHeadcountByMonth(wp, prevMonth);
                const curr = getWorkplaceHeadcountByMonth(wp, month);
                if (prev === 0 && curr > 0) {
                    newOrClosed.push({ type: '新增', wp, count: curr });
                } else if (prev > 0 && curr === 0) {
                    newOrClosed.push({ type: '关闭', wp, count: prev });
                }
            });

            if (newOrClosed.length > 0 && insights.length < 5) {
                const item = newOrClosed[0];
                insights.push(`${item.wp.供应商简称}${item.wp.职场}${monthNames[month - 1]}${item.type}，人力${item.count}`);
            }

            return insights.slice(0, 5);
        }

                                ]
                            }
                        },
                        z: 2
                    },
                    {
                        name: '人机',
                        type: 'line',
                        data: displayAuto,
                        smooth: true,
                        lineStyle: { color: '#c4a96a', width: 2, type: 'dashed' },
                        itemStyle: { color: '#c4a96a' },
                        areaStyle: {
                            color: {
                                type: 'linear',
                                x: 0, y: 0, x2: 0, y2: 1,
                                colorStops: [
                                    { offset: 0, color: 'rgba(196,169,106,0.2)' },
                                    { offset: 1, color: 'rgba(196,169,106,0.02)' }
                                ]
                            }
                        },
                        z: 1
                    }
                ]
            };

            trendChart.setOption(option);
        }

        // ========== 主更新函数 ==========
        function updateDashboard() {
            const month = parseInt(document.getElementById('filter-month').value);
            const supplier = document.getElementById('filter-supplier').value;
            const project = document.getElementById('filter-project').value;
            const province = document.getElementById('filter-province').value;

            const filters = { supplier, project, province };
            const filteredRaw = filterData(rawData, filters);
            const filteredWorkplaces = mergeWorkplaces(filteredRaw);

            // 计算 KPIs
            const kpis = calculateKPIs(filteredWorkplaces, filteredRaw, month);
            renderKPIs(kpis);

            // 计算风险
            const risks = calculateRisks(filteredWorkplaces, month);
            renderRisks(risks);

            // 生成洞察
            const insights = generateInsights(filteredWorkplaces, filteredRaw, kpis, risks, month);
            renderInsights(insights);

            // 渲染趋势图
            renderTrendChart(filteredWorkplaces, filteredRaw, month);
        }

        // ========== 事件绑定 ==========
        function bindEvents() {
            document.getElementById('filter-month').addEventListener('change', updateDashboard);
            document.getElementById('filter-supplier').addEventListener('change', updateDashboard);
            document.getElementById('filter-project').addEventListener('change', updateDashboard);
            document.getElementById('filter-province').addEventListener('change', updateDashboard);

            // 窗口大小变化时重绘图表
            window.addEventListener('resize', () => {
                if (trendChart) trendChart.resize();
            });
        }

        // ========== 初始化 ==========
        initFilters();
        bindEvents();
        updateDashboard();
    </script>
</body>
</html>
