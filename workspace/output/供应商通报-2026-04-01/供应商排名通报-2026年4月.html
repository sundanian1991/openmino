<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金条供应商产能排名通报</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #F5F0EC;
      padding: clamp(1rem, 3vw, 2rem);
      display: flex;
      justify-content: center;
    }
    .poster {
      width: min(820px, 100% - 2rem);
      background: #fff;
      border-radius: 2px;
      border: 1px solid #E5E5E5;
      overflow: hidden;
    }

    /* 封面 Header - 克制专业主义 */
    .header {
      background: #8B0000;
      padding: clamp(2rem, 5vw, 3rem);
      position: relative;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2.4px;
      background: #E2725B;
    }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,.15);
      color: #fff;
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 16px;
    }
    .header h1 {
      color: #fff;
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      font-weight: 700;
    }
    .header h1 span {
      display: block;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      font-weight: 400;
      margin-top: 8px;
      opacity: .8;
    }
    .header-meta {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-meta .tag {
      color: rgba(255,255,255,.9);
      font-size: 10px;
      background: rgba(255,255,255,.1);
      padding: 4px 10px;
      border-radius: 2px;
    }

    /* 内容区 */
    .body { padding: clamp(1.5rem, 4vw, 3rem); }
    .section { margin-top: 32px; }
    .section:first-child { margin-top: 24px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .section-num {
      width: 28px;
      height: 28px;
      background: #8B0000;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
    }
    .section-title {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 700;
      color: #111;
    }
    .section-line {
      flex: 1;
      height: 2px;
      background: #E5E5E5;
    }

    /* 数据表格 - 无阴影、无渐变 */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #111;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #E5E5E5;
    }
    tr:nth-child(even) td { background: #FAFAFA; }
    tr:hover td { background: #F5F5F5; }
    
    /* 排名样式 */
    .rank {
      width: 28px;
      height: 28px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }
    .rank-1 { background: #E2725B; color: #fff; }
    .rank-2 { background: #333; color: #fff; }
    .rank-3 { background: #666; color: #fff; }
    .rank-other { background: #E5E5E5; color: #333; }
    
    /* 产能数字 */
    .amount {
      font-size: 18px;
      font-weight: 700;
      color: #111;
    }
    .amount-unit {
      font-size: 11px;
      color: #666;
      margin-left: 2px;
    }
    
    /* 环比徽章 - 克制使用强调色 */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-up {
      background: rgba(226, 114, 91, 0.15);
      color: #E2725B;
      border: 1px solid rgba(226, 114, 91, 0.3);
    }
    .badge-down {
      background: #F5F5F5;
      color: #666;
      border: 1px solid #E5E5E5;
    }

    /* 关键洞察卡片 */
    .insight-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .insight-card {
      background: #FAFAFA;
      border: 1px solid #E5E5E5;
      border-radius: 2px;
      padding: 16px;
    }
    .insight-card.highlight {
      border: 1px solid #E2725B;
      background: rgba(226, 114, 91, 0.08);
    }
    .insight-label {
      font-size: 10px;
      color: #666;
      margin-bottom: 4px;
    }
    .insight-value {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }
    .insight-value.accent {
      color: #E2725B;
    }
    .insight-desc {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    @media (max-width: 600px) {
      .insight-cards { grid-template-columns: 1fr; }
    }

    /* 底部信息条 */
    .bottom-strip {
      background: #111;
      padding: 16px clamp(1.5rem, 4vw, 3rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .bottom-strip .left,
    .bottom-strip .right {
      color: rgba(255,255,255,.7);
      font-size: 10px;
    }
  </style>
</head>
<body>
<div class="poster">
  <!-- Header -->
  <div class="header">
    <div class="header-badge">内部通报 · 管理层</div>
    <h1>金条供应商产能排名<span>2026年4月 · 头部6家供应商产能统计</span></h1>
    <div class="header-meta">
      <div class="tag">数据科技业务部</div>
      <div class="tag">供应商管理</div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">
    <!-- Section 1: 排名表 -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">1</div>
        <div class="section-title">产能排名</div>
        <div class="section-line"></div>
      </div>
      
      <table>
        <thead>
          <tr>
            <th style="width: 60px;">排名</th>
            <th>供应商</th>
            <th style="width: 140px;">产能</th>
            <th style="width: 100px;">环比</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><div class="rank rank-1">1</div></td>
            <td style="font-weight: 600;">毅航</td>
            <td><span class="amount">3000<span class="amount-unit">万</span></span></td>
            <td><span class="badge badge-up">+15%</span></td>
          </tr>
          <tr>
            <td><div class="rank rank-2">2</div></td>
            <td style="font-weight: 600;">毛毛虫</td>
            <td><span class="amount">2800<span class="amount-unit">万</span></span></td>
            <td><span class="badge badge-up">+8%</span></td>
          </tr>
          <tr>
            <td><div class="rank rank-3">3</div></td>
            <td style="font-weight: 600;">伽玛</td>
            <td><span class="amount">2500<span class="amount-unit">万</span></span></td>
            <td><span class="badge badge-down">-3%</span></td>
          </tr>
          <tr>
            <td><div class="rank rank-other">4</div></td>
            <td style="font-weight: 500;">赛维斯</td>
            <td><span class="amount" style="font-size: 16px;">2200<span class="amount-unit">万</span></span></td>
            <td><span class="badge badge-up">+5%</span></td>
          </tr>
          <tr>
            <td><div class="rank rank-other">5</div></td>
            <td style="font-weight: 500;">岐力</td>
            <td><span class="amount" style="font-size: 16px;">2000<span class="amount-unit">万</span></span></td>
            <td><span class="badge badge-down">-8%</span></td>
          </tr>
          <tr>
            <td><div class="rank rank-other">6</div></td>
            <td style="font-weight: 500;">翰锐</td>
            <td><span class="amount" style="font-size: 16px;">1800<span class="amount-unit">万</span></span></td>
            <td><span class="badge badge-up">+12%</span></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Section 2: 关键洞察 -->
    <div class="section">
      <div class="section-header">
        <div class="section-num">2</div>
        <div class="section-title">关键洞察</div>
        <div class="section-line"></div>
      </div>
      
      <div class="insight-cards">
        <div class="insight-card highlight">
          <div class="insight-label">TOP1 产能</div>
          <div class="insight-value accent">3000万</div>
          <div class="insight-desc">毅航领跑，环比增长15%</div>
        </div>
        <div class="insight-card">
          <div class="insight-label">头部占比</div>
          <div class="insight-value">61%</div>
          <div class="insight-desc">前3家占总产能61%</div>
        </div>
        <div class="insight-card">
          <div class="insight-label">增长最快</div>
          <div class="insight-value accent">+15%</div>
          <div class="insight-desc">毅航环比增速第一</div>
        </div>
        <div class="insight-card">
          <div class="insight-label">需关注</div>
          <div class="insight-value">2家</div>
          <div class="insight-desc">伽玛、岐力环比下滑</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Strip -->
  <div class="bottom-strip">
    <div class="left">数据科技业务部 · 供应商管理</div>
    <div class="right">2026年4月 · 内部资料</div>
  </div>
</div>
</body>
</html>
