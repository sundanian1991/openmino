<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商站点看板 v3</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f3ef;
      --card: #ffffff;
      --border: #e8e4df;
      --text: #2c2c2c;
      --text2: #6b6b6b;
      --text3: #9e9e9e;
      --blue: #5b7fa8;
      --green: #6d9e84;
      --gold: #c4a96a;
      --red: #b87e7e;
      --purple: #8a6daa;
      --radius: 2px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }
    .header-meta {
      font-size: 11px;
      color: var(--text2);
    }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      background: var(--card);
      color: var(--text);
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      transition: all 0.2s;
    }
    .tab:hover {
      color: var(--text);
    }
    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      font-weight: 500;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
    }
    .kpi-label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }
    .kpi-trend {
      font-size: 11px;
      margin-top: 4px;
    }
    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }
    .risk-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .risk-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .risk-label {
      font-size: 11px;
      color: var(--text2);
    }
    .risk-value {
      font-size: 20px;
      font-weight: 600;
      margin-top: 4px;
    }
    .risk-high { color: var(--red); }
    .risk-medium { color: var(--gold); }
    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .chart-full {
      grid-column: 1 / -1;
    }
    .chart-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 12px;
    }
    .chart {
      width: 100%;
      height: 280px;
    }
    .insights {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .insight-item {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .insight-item:last-child {
      border-bottom: none;
    }
    .insight-dot {
      width: 6px;
      height: 6px;
      background: var(--blue);
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .insight-text {
      font-size: 12px;
      color: var(--text);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    th {
      background: #f5f5f5;
      padding: 8px 10px;
      text-align: left;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover {
      background: #fafafa;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 500;
    }
    .badge-danger { background: #fee; color: #c33; }
    .badge-warning { background: #ffc; color: #960; }
    .badge-success { background: #efe; color: #363; }
    .badge-neutral { background: #f5f5f5; color: #666; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
    }
    @media (max-width: 768px) {
      .kpi-grid, .risk-grid, .chart-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>供应商站点看板 v3</h1>
      <div class="header-meta">数据截止：2026年3月</div>
    </div>

    <div class="filters">
      <select class="filter-select" id="monthFilter">
        <option value="3">3月</option>
        <option value="2">2月</option>
        <option value="1">1月</option>
      </select>
      <select class="filter-select" id="supplierFilter" multiple>
      </select>
      <select class="filter-select" id="bizFilter" multiple>
      </select>
      <select class="filter-select" id="regionFilter" multiple>
      </select>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="tab1">全局大盘</button>
      <button class="tab" data-tab="tab2">职场分析</button>
      <button class="tab" data-tab="tab3">供应商分析</button>
      <button class="tab" data-tab="tab4">产品线分析</button>
      <button class="tab" data-tab="tab5">数据明细</button>
    </div>

    <!-- Tab 1: 全局大盘 -->
    <div class="tab-content active" id="tab1">
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-value" id="totalHeadcount">-</div>
          <div class="kpi-label">总人力</div>
          <div class="kpi-trend" id="headcountTrend">-</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="totalSites">-</div>
          <div class="kpi-label">职场数</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="totalSuppliers">-</div>
          <div class="kpi-label">供应商数</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="totalBizLines">-</div>
          <div class="kpi-label">业务线数</div>
        </div>
      </div>

      <div class="risk-grid">
        <div class="risk-card">
          <div class="risk-label">微小站点 (&lt;20人)</div>
          <div class="risk-value risk-medium" id="tinySites">-</div>
        </div>
        <div class="risk-card">
          <div class="risk-label">超大站点 (≥100人)</div>
          <div class="risk-value risk-high" id="largeSites">-</div>
        </div>
        <div class="risk-card">
          <div class="risk-label">单一业务线职场</div>
          <div class="risk-value risk-medium" id="singleBizSites">-</div>
        </div>
        <div class="risk-card">
          <div class="risk-label">集中度风险供应商</div>
          <div class="risk-value risk-high" id="concentrationRisk">-</div>
        </div>
      </div>

      <div class="chart-row">
        <div class="chart-box chart-full">
          <div class="chart-title">月度人力趋势</div>
          <div class="chart" id="trendChart"></div>
        </div>
      </div>

      <div class="insights" id="insights">
        <div class="chart-title">关键洞察</div>
      </div>
    </div>

    <!-- Tab 2: 职场分析 -->
    <div class="tab-content" id="tab2">
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">职场规模分布</div>
          <div class="chart" id="sizeDistChart"></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">TOP 10 职场</div>
          <div class="chart" id="topSitesChart"></div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-title">职场 × 业务线矩阵</div>
        <div style="overflow-x: auto; max-height: 400px;">
          <table id="siteBizMatrix"></table>
        </div>
      </div>
    </div>

    <!-- Tab 3: 供应商分析 -->
    <div class="tab-content" id="tab3">
      <div class="chart-box" style="margin-bottom: 16px;">
        <div class="chart-title">供应商排名</div>
        <div id="supplierRanking"></div>
      </div>
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">供应商 × 业务线热力图</div>
          <div class="chart" id="supplierBizHeatmap"></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">增长/下降 TOP 5</div>
          <div class="chart" id="growthChart"></div>
        </div>
      </div>
    </div>

    <!-- Tab 4: 产品线分析 -->
    <div class="tab-content" id="tab4">
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">产品线人力占比</div>
          <div class="chart" id="bizShareChart"></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">产品线供应商数量</div>
          <div class="chart" id="bizSupplierChart"></div>
        </div>
      </div>
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">产品线 × 运营模式</div>
          <div class="chart" id="bizModeChart"></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">产品线地域分布</div>
          <div class="chart" id="bizRegionChart"></div>
        </div>
      </div>
    </div>

    <!-- Tab 5: 数据明细 -->
    <div class="tab-content" id="tab5">
      <div style="margin-bottom: 12px;">
        <button class="filter-select" onclick="exportCSV()">导出 CSV</button>
      </div>
      <div style="overflow-x: auto;">
        <table id="detailTable"></table>
      </div>
    </div>
  </div>

    // 全局状态
    let currentMonth = 'm3';
    let filteredData = [];
    let mergedSites = [];
    let allCharts = {};

    // 初始化
    function init() {
      processData();
      populateFilters();
      setupTabs();
      updateDashboard();
    }

    // 数据处理：合并物理职场
    function processData() {
      const merged = new Map();

      RAW_DATA.forEach(row => {
        const key = `${row.supplier}_${row.site}`;
        if (!merged.has(key)) {
          merged.set(key, {
            supplier: row.supplier,
            site: row.site,
            mode: row.mode,
            region: row.region,
            province: row.province,
            city: row.city,
            district: row.district,
            address: row.address,
            bizList: new Set([row.biz]),
            m1: row.m1,
            m2: row.m2,
            m3: row.m3,
            q1: row.q1,
            records: [row]
          });
        } else {
          const existing = merged.get(key);
          existing.bizList.add(row.biz);
          existing.m1 += row.m1;
          existing.m2 += row.m2;
          existing.m3 += row.m3;
          existing.q1 += row.q1;
          existing.records.push(row);
          if (row.mode === '人工') existing.mode = '人工';
        }
      });

      mergedSites = Array.from(merged.values()).map(s => ({
        ...s,
        bizList: Array.from(s.bizList),
        bizCount: s.bizList.size
      }));

      filteredData = [...mergedSites];
    }

    // 填充筛选器
    function populateFilters() {
      const suppliers = [...new Set(RAW_DATA.map(r => r.supplier))].sort();
      const bizLines = [...new Set(RAW_DATA.map(r => r.biz))].sort();
      const regions = [...new Set(RAW_DATA.map(r => r.region))].sort();

      const supplierSelect = document.getElementById('supplierFilter');
      const bizSelect = document.getElementById('bizFilter');
      const regionSelect = document.getElementById('regionFilter');

      suppliers.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        supplierSelect.appendChild(opt);
      });

      bizLines.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        bizSelect.appendChild(opt);
      });

      regions.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        regionSelect.appendChild(opt);
      });
    }

    // 设置 Tab 切换
    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab).classList.add('active');
        });
      });

      document.getElementById('monthFilter').addEventListener('change', (e) => {
        const monthMap = { '1': 'm1', '2': 'm2', '3': 'm3' };
        currentMonth = monthMap[e.target.value];
        updateDashboard();
      });
    }

    // 更新仪表盘
    function updateDashboard() {
      applyFilters();
      updateKPIs();
      updateRisks();
      updateTrendChart();
      updateInsights();
      updateSiteAnalysis();
      updateSupplierAnalysis();
      updateBizAnalysis();
      updateDetailTable();
    }

    // 应用筛选
    function applyFilters() {
      const selectedSuppliers = Array.from(document.getElementById('supplierFilter').selectedOptions).map(o => o.value);
      const selectedBiz = Array.from(document.getElementById('bizFilter').selectedOptions).map(o => o.value);
      const selectedRegions = Array.from(document.getElementById('regionFilter').selectedOptions).map(o => o.value);

      filteredData = mergedSites.filter(site => {
        if (selectedSuppliers.length > 0 && !selectedSuppliers.includes(site.supplier)) return false;
        if (selectedRegions.length > 0 && !selectedRegions.includes(site.region)) return false;
        if (selectedBiz.length > 0) {
          const hasBiz = site.records.some(r => selectedBiz.includes(r.biz));
          if (!hasBiz) return false;
        }
        return true;
      });
    }

    // 更新 KPI
    function updateKPIs() {
      const month = currentMonth;
      const totalHeadcount = filteredData.reduce((sum, s) => sum + s[month], 0);
      const uniqueSites = filteredData.length;
      const uniqueSuppliers = new Set(filteredData.map(s => s.supplier)).size;
      const allBiz = new Set(filteredData.flatMap(s => s.bizList)).size;

      document.getElementById('totalHeadcount').textContent = totalHeadcount.toLocaleString();
      document.getElementById('totalSites').textContent = uniqueSites;
      document.getElementById('totalSuppliers').textContent = uniqueSuppliers;
      document.getElementById('totalBizLines').textContent = allBiz;

      const monthMap = { 'm1': null, 'm2': 'm1', 'm3': 'm2' };
      const prevMonth = monthMap[month];
      if (prevMonth) {
        const prevTotal = filteredData.reduce((sum, s) => sum + s[prevMonth], 0);
        const change = prevTotal > 0 ? ((totalHeadcount - prevTotal) / prevTotal * 100).toFixed(1) : 0;
        const trendEl = document.getElementById('headcountTrend');
        if (change > 0) {
          trendEl.innerHTML = `<span class="trend-up">↑ ${change}%</span> vs上月`;
        } else if (change < 0) {
          trendEl.innerHTML = `<span class="trend-down">↓ ${Math.abs(change)}%</span> vs上月`;
        } else {
          trendEl.innerHTML = `<span>→ 持平</span>`;
        }
      }
    }

    // 更���风险
    function updateRisks() {
      const month = currentMonth;
      const tinySites = filteredData.filter(s => s[month] < 20).length;
      const largeSites = filteredData.filter(s => s[month] >= 100).length;
      const singleBizSites = filteredData.filter(s => s.bizCount === 1).length;

      document.getElementById('tinySites').textContent = tinySites;
      document.getElementById('largeSites').textContent = largeSites;
      document.getElementById('singleBizSites').textContent = singleBizSites;

      const bizTotals = {};
      filteredData.forEach(s => {
        s.records.forEach(r => {
          if (!bizTotals[r.biz]) bizTotals[r.biz] = 0;
          bizTotals[r.biz] += r[month];
        });
      });

      const supplierConcentration = new Map();
      filteredData.forEach(s => {
        s.records.forEach(r => {
          const key = `${s.supplier}_${r.biz}`;
          if (!supplierConcentration.has(key)) {
            supplierConcentration.set(key, { supplier: s.supplier, biz: r.biz, value: 0 });
          }
          supplierConcentration.get(key).value += r[month];
        });
      });

      let riskCount = 0;
      supplierConcentration.forEach((data) => {
        const bizTotal = bizTotals[data.biz] || 1;
        const ratio = data.value / bizTotal;
        if (ratio > 0.4) riskCount++;
      });

      document.getElementById('concentrationRisk').textContent = riskCount;
    }

    // 月度趋势图
    function updateTrendChart() {
      const chartDom = document.getElementById('trendChart');
      if (allCharts.trend) allCharts.trend.dispose();
      allCharts.trend = echarts.init(chartDom);

      const months = ['1月', '2月', '3月'];
      const manualData = [
        filteredData.reduce((sum, s) => sum + (s.mode === '人工' ? s.m1 : 0), 0),
        filteredData.reduce((sum, s) => sum + (s.mode === '人工' ? s.m2 : 0), 0),
        filteredData.reduce((sum, s) => sum + (s.mode === '人工' ? s.m3 : 0), 0)
      ];
      const hybridData = [
        filteredData.reduce((sum, s) => sum + (s.mode === '人机' ? s.m1 : 0), 0),
        filteredData.reduce((sum, s) => sum + (s.mode === '人机' ? s.m2 : 0), 0),
        filteredData.reduce((sum, s) => sum + (s.mode === '人机' ? s.m3 : 0), 0)
      ];

      allCharts.trend.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['人工', '人机'] },
        xAxis: { type: 'category', data: months },
        yAxis: { type: 'value' },
        series: [
          { name: '人工', type: 'line', data: manualData, areaStyle: { opacity: 0.3 }, smooth: true },
          { name: '人机', type: 'line', data: hybridData, areaStyle: { opacity: 0.3 }, smooth: true }
        ]
      });
    }

    // 生成洞察
    function updateInsights() {
      const month = currentMonth;
      const monthName = { m1: '1月', m2: '2月', m3: '3月' }[month];
      const insights = [];

      const totalHeadcount = filteredData.reduce((sum, s) => sum + s[month], 0);

      const maxSite = [...filteredData].sort((a, b) => b[month] - a[month])[0];
      if (maxSite && maxSite[month] > 0) {
        const ratio = ((maxSite[month] / totalHeadcount) * 100).toFixed(1);
        insights.push(`${maxSite.supplier} ${maxSite.site} 人力达 ${maxSite[month]} 人，占总人力 ${ratio}%，为最大单点依赖`);
      }

      const bizSupplierCount = {};
      filteredData.forEach(s => {
        s.records.forEach(r => {
          if (!bizSupplierCount[r.biz]) bizSupplierCount[r.biz] = new Set();
          bizSupplierCount[r.biz].add(s.supplier);
        });
      });

      Object.entries(bizSupplierCount).forEach(([biz, suppliers]) => {
        if (suppliers.size < 3) {
          insights.push(`${biz} 仅靠 ${suppliers.size} 家供应商支撑，供应链单薄`);
        }
      });

      const tinySites = filteredData.filter(s => s[month] < 20 && s[month] > 0);
      if (tinySites.length > 5) {
        insights.push(`当前有 ${tinySites.length} 个站点人力不足 20 人，运营成本效率偏低`);
      }

      const container = document.getElementById('insights');
      container.innerHTML = '<div class="chart-title">关键洞察</div>';

      insights.slice(0, 5).forEach(text => {
        const div = document.createElement('div');
        div.className = 'insight-item';
        div.innerHTML = `<div class="insight-dot"></div><div class="insight-text">${text}</div>`;
        container.appendChild(div);
      });
    }

    // 职场分析
    function updateSiteAnalysis() {
      const month = currentMonth;

      const sizeChartDom = document.getElementById('sizeDistChart');
      if (allCharts.sizeDist) allCharts.sizeDist.dispose();
      allCharts.sizeDist = echarts.init(sizeChartDom);

      const sizeCategories = {
        '微小 (<20)': filteredData.filter(s => s[month] < 20).length,
        '正常 (20-99)': filteredData.filter(s => s[month] >= 20 && s[month] < 100).length,
        '大型 (100-199)': filteredData.filter(s => s[month] >= 100 && s[month] < 200).length,
        '超大 (≥200)': filteredData.filter(s => s[month] >= 200).length
      };

      allCharts.sizeDist.setOption({
        tooltip: { trigger: 'item' },
        legend: { orient: 'vertical', right: 10 },
        series: [{
          type: 'pie',
          radius: ['40%', '70%'],
          data: Object.entries(sizeCategories).map(([name, value]) => ({ name, value })),
          center: ['40%', '50%']
        }]
      });

      const topChartDom = document.getElementById('topSitesChart');
      if (allCharts.topSites) allCharts.topSites.dispose();
      allCharts.topSites = echarts.init(topChartDom);

      const topSites = [...filteredData].sort((a, b) => b[month] - a[month]).slice(0, 10);

      allCharts.topSites.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'value' },
        yAxis: {
          type: 'category',
          data: topSites.map(s => `${s.supplier}-${s.site}`),
          axisLabel: { fontSize: 10 }
        },
        series: [{
          type: 'bar',
          data: topSites.map(s => ({
            value: s[month],
            itemStyle: {
              color: s[month] >= 100 ? '#b87e7e' : s[month] < 20 ? '#c4a96a' : '#5b7fa8'
            }
          })),
          label: { show: true, position: 'right' }
        }]
      });

      const matrixTable = document.getElementById('siteBizMatrix');
      const allBiz = [...new Set(filteredData.flatMap(s => s.bizList))].sort();
      const displaySites = [...filteredData].sort((a, b) => b[month] - a[month]).slice(0, 20);

      let html = '<thead><tr><th>职场</th>';
      allBiz.forEach(b => html += `<th>${b}</th>`);
      html += '<th>业务线数</th><th>总人力</th></tr></thead><tbody>';

      displaySites.forEach(site => {
        const bizData = {};
        site.records.forEach(r => {
          if (!bizData[r.biz]) bizData[r.biz] = 0;
          bizData[r.biz] += r[month];
        });

        html += `<tr><td>${site.supplier}-${site.site}</td>`;
        allBiz.forEach(b => {
          const val = bizData[b] || 0;
          const bg = val > 0 ? `rgba(91, 127, 168, ${Math.min(val / 100, 0.8)})` : '';
          html += `<td style="background:${bg}">${val > 0 ? val : ''}</td>`;
        });
        html += `<td>${site.bizCount}</td><td>${site[month]}</td></tr>`;
      });

      html += '</tbody>';
      matrixTable.innerHTML = html;
    }

    // 供应商分析
    function updateSupplierAnalysis() {
      const month = currentMonth;

      const supplierData = new Map();
      filteredData.forEach(s => {
        if (!supplierData.has(s.supplier)) {
          supplierData.set(s.supplier, {
            headcount: 0,
            sites: new Set(),
            bizList: new Set()
          });
        }
        const data = supplierData.get(s.supplier);
        data.headcount += s[month];
        data.sites.add(s.site);
        s.bizList.forEach(b => data.bizList.add(b));
      });

      const ranking = Array.from(supplierData.entries())
        .map(([supplier, data]) => ({
          supplier,
          headcount: data.headcount,
          sites: data.sites.size,
          bizCount: data.bizList.size
        }))
        .sort((a, b) => b.headcount - a.headcount);

      const maxHeadcount = ranking[0]?.headcount || 1;

      const rankingDiv = document.getElementById('supplierRanking');
      let html = '<table style="margin-top:12px"><thead><tr><th>供应商</th><th>总人力</th><th>覆盖职场</th><th>业务线数</th></tr></thead><tbody>';

      ranking.forEach(r => {
        const progress = (r.headcount / maxHeadcount * 100).toFixed(1);
        html += `<tr>
          <td>${r.supplier}</td>
          <td style="width:50%">
            <div class="progress-bar">
              <div class="progress-fill" style="width:${progress}%"></div>
            </div>
            <span style="margin-left:8px">${r.headcount}</span>
          </td>
          <td>${r.sites}</td>
          <td>${r.bizCount}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      rankingDiv.innerHTML = html;

      const heatmapDom = document.getElementById('supplierBizHeatmap');
      if (allCharts.heatmap) allCharts.heatmap.dispose();
      allCharts.heatmap = echarts.init(heatmapDom);

      const topSuppliers = ranking.slice(0, 15).map(r => r.supplier);
      const allBiz = [...new Set(filteredData.flatMap(s => s.bizList))].sort();

      const heatmapData = [];
      topSuppliers.forEach((s, i) => {
        allBiz.forEach((b, j) => {
          const val = filteredData
            .filter(site => site.supplier === s)
            .reduce((sum, site) => {
              const bizRecord = site.records.find(r => r.biz === b);
              return sum + (bizRecord ? bizRecord[month] : 0);
            }, 0);
          if (val > 0) heatmapData.push([i, j, val]);
        });
      });

      allCharts.heatmap.setOption({
        tooltip: { position: 'top' },
        xAxis: { type: 'category', data: allBiz, splitArea: { show: true } },
        yAxis: { type: 'category', data: topSuppliers, splitArea: { show: true } },
        visualMap: { min: 0, max: 100, calculable: true, orient: 'horizontal', left: 'center', bottom: '0%' },
        series: [{
          type: 'heatmap',
          data: heatmapData,
          label: { show: true },
          emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
        }]
      });

      const growthDom = document.getElementById('growthChart');
      if (allCharts.growth) allCharts.growth.dispose();
      allCharts.growth = echarts.init(growthDom);

      const supplierGrowth = Array.from(supplierData.entries()).map(([supplier, data]) => {
        const m3Total = filteredData.filter(s => s.supplier === supplier).reduce((sum, s) => sum + s.m3, 0);
        const m1Total = filteredData.filter(s => s.supplier === supplier).reduce((sum, s) => sum + s.m1, 0);
        const change = m3Total - m1Total;
        const rate = m1Total > 0 ? ((change / m1Total) * 100).toFixed(1) : 0;
        return { supplier, change, rate: parseFloat(rate) };
      });

      const growthTop5 = supplierGrowth.filter(s => s.change > 0).sort((a, b) => b.change - a.change).slice(0, 5);
      const declineTop5 = supplierGrowth.filter(s => s.change < 0).sort((a, b) => a.change - b.change).slice(0, 5);

      allCharts.growth.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['增长', '下降'] },
        xAxis: {
          type: 'category',
          data: growthTop5.map(s => s.supplier).concat(declineTop5.map(s => s.supplier)),
          axisLabel: { rotate: 45, fontSize: 10 }
        },
        yAxis: { type: 'value' },
        series: [
          { name: '增长', type: 'bar', data: growthTop5.map(s => s.change).concat(new Array(declineTop5.length).fill(0)), itemStyle: { color: '#6d9e84' } },
          { name: '下降', type: 'bar', data: new Array(growthTop5.length).fill(0).concat(declineTop5.map(s => s.change)), itemStyle: { color: '#b87e7e' } }
        ]
      });
    }

    // 产品线分析
    function updateBizAnalysis() {
      const month = currentMonth;

      const bizShareDom = document.getElementById('bizShareChart');
      if (allCharts.bizShare) allCharts.bizShare.dispose();
      allCharts.bizShare = echarts.init(bizShareDom);

      const bizHeadcount = {};
      filteredData.forEach(s => {
        s.records.forEach(r => {
          if (!bizHeadcount[r.biz]) bizHeadcount[r.biz] = 0;
          bizHeadcount[r.biz] += r[month];
        });
      });

      allCharts.bizShare.setOption({
        tooltip: { trigger: 'item' },
        legend: { orient: 'vertical', right: 10 },
        series: [{
          type: 'pie',
          radius: ['40%', '70%'],
          data: Object.entries(bizHeadcount).map(([name, value]) => ({ name, value })),
          center: ['40%', '50%']
        }]
      });

      const bizSupplierDom = document.getElementById('bizSupplierChart');
      if (allCharts.bizSupplier) allCharts.bizSupplier.dispose();
      allCharts.bizSupplier = echarts.init(bizSupplierDom);

      const bizSupplierCount = {};
      filteredData.forEach(s => {
        s.records.forEach(r => {
          if (!bizSupplierCount[r.biz]) bizSupplierCount[r.biz] = new Set();
          bizSupplierCount[r.biz].add(s.supplier);
        });
      });

      const bizSupplierData = Object.entries(bizSupplierCount).map(([biz, suppliers]) => ({
        name: biz,
        value: suppliers.size
      }));

      allCharts.bizSupplier.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: bizSupplierData.map(d => d.name) },
        yAxis: { type: 'value' },
        series: [{
          type: 'bar',
          data: bizSupplierData.map(d => ({
            value: d.value,
            itemStyle: { color: d.value < 3 ? '#c4a96a' : '#5b7fa8' }
          })),
          markLine: {
            data: [{ yAxis: 3, lineStyle: { color: '#b87e7e', type: 'dashed' }, label: { formatter: '风险线' } }]
          }
        }]
      });

      const bizModeDom = document.getElementById('bizModeChart');
      if (allCharts.bizMode) allCharts.bizMode.dispose();
      allCharts.bizMode = echarts.init(bizModeDom);

      const bizModeData = { manual: [], hybrid: [] };
      Object.keys(bizHeadcount).forEach(biz => {
        const manual = filteredData.reduce((sum, s) => {
          const rec = s.records.find(r => r.biz === biz && s.mode === '人工');
          return sum + (rec ? rec[month] : 0);
        }, 0);
        const hybrid = filteredData.reduce((sum, s) => {
          const rec = s.records.find(r => r.biz === biz && s.mode === '人机');
          return sum + (rec ? rec[month] : 0);
        }, 0);
        bizModeData.manual.push(manual);
        bizModeData.hybrid.push(hybrid);
      });

      allCharts.bizMode.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { data: ['人工', '人机'] },
        xAxis: { type: 'category', data: Object.keys(bizHeadcount) },
        yAxis: { type: 'value' },
        series: [
          { name: '人工', type: 'bar', stack: '总量', data: bizModeData.manual },
          { name: '人机', type: 'bar', stack: '总量', data: bizModeData.hybrid }
        ]
      });

      const bizRegionDom = document.getElementById('bizRegionChart');
      if (allCharts.bizRegion) allCharts.bizRegion.dispose();
      allCharts.bizRegion = echarts.init(bizRegionDom);

      const regions = [...new Set(filteredData.map(s => s.region))].sort();
      const bizRegionData = {};
      Object.keys(bizHeadcount).forEach(biz => {
        bizRegionData[biz] = regions.map(r => {
          return filteredData.reduce((sum, s) => {
            if (s.region !== r) return sum;
            const rec = s.records.find(rec => rec.biz === biz);
            return sum + (rec ? rec[month] : 0);
          }, 0);
        });
      });

      allCharts.bizRegion.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: Object.keys(bizHeadcount) },
        xAxis: { type: 'category', data: regions },
        yAxis: { type: 'value' },
        series: Object.keys(bizHeadcount).map((biz, i) => ({
          name: biz,
          type: 'bar',
          stack: 'total',
          data: bizRegionData[biz]
        }))
      });
    }

    // 数据明细表
    function updateDetailTable() {
      const table = document.getElementById('detailTable');
      const month = currentMonth;

      const sortedSites = [...filteredData].sort((a, b) => b[month] - a[month]);

      let html = '<thead><tr><th>供应商</th><th>职场</th><th>省份</th><th>城市</th><th>模式</th><th>业务线</th>';
      html += '<th>1月</th><th>2月</th><th>3月</th><th>Q1平均</th><th>规模等级</th></tr></thead><tbody>';

      sortedSites.forEach(site => {
        const size = site[month];
        let sizeLevel = '正常';
        let sizeClass = 'badge-neutral';
        if (size < 20) { sizeLevel = '微小'; sizeClass = 'badge-warning'; }
        else if (size >= 100) { sizeLevel = '超大'; sizeClass = 'badge-danger'; }

        html += `<tr>
          <td>${site.supplier}</td>
          <td>${site.site}</td>
          <td>${site.province}</td>
          <td>${site.city}</td>
          <td>${site.mode}</td>
          <td>${site.bizList.join(', ')}</td>
          <td>${site.m1}</td>
          <td>${site.m2}</td>
          <td>${site.m3}</td>
          <td>${site.q1.toFixed(1)}</td>
          <td><span class="badge ${sizeClass}">${sizeLevel}</span></td>
        </tr>`;
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    // 导出 CSV
    function exportCSV() {
      const month = currentMonth;
      const monthName = { m1: '1月', m2: '2月', m3: '3月' }[month];

      let csv = '供应商,职场,省份,城市,模式,业务线,1月,2月,3月,Q1平均,规模等级\n';

      filteredData.forEach(site => {
        const size = site[month];
        let sizeLevel = '正常';
        if (size < 20) sizeLevel = '微小';
        else if (size >= 100) sizeLevel = '超大';

        csv += `"${site.supplier}","${site.site}","${site.province}","${site.city}","${site.mode}","${site.bizList.join(';')}",`;
        csv += `${site.m1},${site.m2},${site.m3},${site.q1.toFixed(1)},"${sizeLevel}"\n`;
      });

      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `供应商站点看板_${monthName}.csv`;
      link.click();
    }

    window.addEventListener('resize', () => {
      Object.values(allCharts).forEach(chart => chart && chart.resize());
    });

    init();
  </script>
</body>
</html>
