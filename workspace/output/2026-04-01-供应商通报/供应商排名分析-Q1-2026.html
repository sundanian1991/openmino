<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商排名分析 - 2026年Q1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f0;padding:40px;color:#333}
.container{max-width:800px;margin:0 auto;background:white;border-radius:12px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:28px;font-weight:600;color:#1a1a1a;margin-bottom:8px}
.header p{font-size:14px;color:#666}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#f8f7f4;border:1px solid #e0ddd8;border-radius:8px;padding:16px;text-align:center}
.stat-label{font-size:12px;color:#888;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:600}
.stat-value.teal{color:#2e8b6e}
.stat-value.warm{color:#c26d3a}
.chart-wrapper{position:relative;width:100%;height:320px;margin-bottom:24px}
.footer{font-size:12px;color:#888;text-align:center;border-top:1px solid #e0ddd8;padding-top:16px;margin-top:16px}
@media print{body{background:white;padding:20px}.container{box-shadow:none}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>供应商排名分析</h1>
<p>2026年Q1（1-3月）人机合作模式BPO供应商选拔</p>
</div>
<div class="stats">
<div class="stat-card">
<div class="stat-label">推荐录取 #1</div>
<div class="stat-value teal">毅航合肥</div>
</div>
<div class="stat-card">
<div class="stat-label">推荐录取 #2</div>
<div class="stat-value warm">赛维斯</div>
</div>
</div>
<div class="chart-wrapper">
<canvas id="chart"></canvas>
</div>
<div class="footer">
<p>规则：金条人工职场近三个月同项目赛马排名靠前职场录取前2名</p>
<p>数据来源：金条首贷/复贷赛马排名 · 生成时间：2026-04-01</p>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
type: 'line',
data: {
labels: ['1月', '2月', '3月'],
datasets: [
{ label: '毅航合肥', data: [3, 1, 1], borderColor: '#2e8b6e', backgroundColor: 'rgba(46,139,110,0.15)', fill: true, tension: 0.3, pointRadius: 5, pointHoverRadius: 7 },
{ label: '赛维斯', data: [2, 2, 2], borderColor: '#c26d3a', backgroundColor: 'rgba(194,109,58,0.15)', fill: true, tension: 0.3, pointRadius: 5, pointHoverRadius: 7 },
{ label: '岐力', data: [1, 5, 9], borderColor: '#c25030', backgroundColor: 'rgba(194,80,48,0.1)', fill: false, tension: 0.3, pointRadius: 4 },
{ label: '广达陕西', data: [4, 11, 4], borderColor: '#b88018', backgroundColor: 'rgba(184,128,24,0.1)', fill: false, tension: 0.3, pointRadius: 4 },
{ label: '翰锐曲靖', data: [5, 7, 8], borderColor: '#857d74', backgroundColor: 'rgba(133,125,116,0.1)', fill: false, tension: 0.3, pointRadius: 4 },
{ label: '汇讯', data: [6, 9, 3], borderColor: '#3a7ab8', backgroundColor: 'rgba(58,122,184,0.1)', fill: false, tension: 0.3, pointRadius: 4 }
]
},
options: {
responsive: true,
maintainAspectRatio: false,
plugins: {
legend: { position: 'bottom', labels: { boxWidth: 12, usePointStyle: true, padding: 16 } },
tooltip: { mode: 'index', intersect: false }
},
scales: {
y: {
reverse: true,
min: 1,
max: 12,
title: { display: true, text: '排名（数字越小越好）' },
grid: { color: 'rgba(0,0,0,0.06)' }
},
x: { grid: { display: false } }
}
}
});
</script>
</body>
</html>
