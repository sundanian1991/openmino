<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>供应商站点看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary: #111111;
            --secondary: #666666;
            --border: #E5E5E5;
            --accent: #E2725B;
            --white: #FFFFFF;
            --bg-light: #F9F9F9;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--white);
            color: var(--secondary);
            line-height: 1.5;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        /* 顶部装饰线 */
        .header-line {
            height: 2.4px;
            background: var(--accent);
            margin-bottom: 24px;
            border-radius: 2px;
        }
        /* 标题区 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
        }
        .header-info {
            font-size: 13px;
            color: var(--secondary);
        }
        /* 筛选器 */
        .filters {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
        }
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-size: 13px;
            background: var(--white);
            color: var(--primary);
            cursor: pointer;
            min-width: 140px;
        }
        .filter-group select:focus {
            outline: none;
            border-color: var(--accent);
        }
        /* KPI 区 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--bg-light);
            padding: 16px;
            border-radius: 2px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .kpi-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .kpi-label {
            font-size: 13px;
            color: var(--secondary);
        }
        .kpi-card.highlight {
            border-top: 2px solid var(--accent);
        }
        /* 图表区 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 16px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .chart-container {
            height: 300px;
        }
        /* 表格区 */
        .table-section {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .table-header {
            background: var(--primary);
            color: var(--white);
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: var(--bg-light);
            padding: 10px 12px;
            text-align: left;
            font-weight: 500;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--secondary);
        }
        tr:hover {
            background: var(--bg-light);
        }
        tr:last-child td {
            border-bottom: none;
        }
        .trend-up {
            color: #22C55E;
            font-weight: 500;
        }
        .trend-down {
            color: #EF4444;
            font-weight: 500;
        }
        .trend-flat {
            color: var(--secondary);
        }
        .number-cell {
            text-align: right;
            font-weight: 500;
            color: var(--primary);
        }
        /* 底部信息条 */
        .footer-bar {
            background: var(--primary);
            color: var(--white);
            padding: 12px 20px;
            margin-top: 24px;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        /* 响应式 */
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .filters {
                flex-direction: column;
            }
        }
        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        const filterSupplier = document.getElementById('filterSupplier');
        const filterProject = document.getElementById('filterProject');
        const filterCity = document.getElementById('filterCity');
        const tableBody = document.getElementById('tableBody');
        const projectChartEl = document.getElementById('projectChart');
        const supplierChartEl = document.getElementById('supplierChart');

        let projectChart = echarts.init(projectChartEl);
        let supplierChart = echarts.init(supplierChartEl);

        function getTrend(m2, m3) {
            if (m3 > m2) return 'up';
            if (m3 < m2) return 'down';
            return 'flat';
        }

        function getTrendSymbol(trend) {
            if (trend === 'up') return '<span class="trend-up">+up</span>';
            if (trend === 'down') return '<span class="trend-down">-down</span>';
            return '<span class="trend-flat">=flat</span>';
        }

        function initFilters() {
            const suppliers = [...new Set(workplaces.map(w => w.supplier))].sort();
            const projects = [...new Set(workplaces.map(w => w.project))].sort();
            const cities = [...new Set(workplaces.map(w => w.city))].sort();

            suppliers.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                filterSupplier.appendChild(opt);
            });

            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                filterProject.appendChild(opt);
            });

            cities.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                filterCity.appendChild(opt);
            });
        }

        function getFilteredData() {
            const sVal = filterSupplier.value;
            const pVal = filterProject.value;
            const cVal = filterCity.value;

            return workplaces.filter(w => {
                if (sVal && w.supplier !== sVal) return false;
                if (pVal && w.project !== pVal) return false;
                if (cVal && w.city !== cVal) return false;
                return true;
            });
        }

        function updateKPI(data) {
            const total = data.reduce((sum, w) => sum + w.m3, 0);
            const suppliers = new Set(data.map(w => w.supplier)).size;
            const projects = new Set(data.map(w => w.project)).size;
            const cities = new Set(data.map(w => w.city)).size;
            const workplaceSet = new Set(data.map(w => w.supplier + '|' + w.workplace)).size;

            document.getElementById('kpiTotal').textContent = total;
            document.getElementById('kpiSuppliers').textContent = suppliers;
            document.getElementById('kpiProjects').textContent = projects;
            document.getElementById('kpiCities').textContent = cities;
            document.getElementById('kpiWorkplaces').textContent = workplaceSet;
        }

        function updateTable(data) {
            tableBody.innerHTML = '';
            data.forEach(w => {
                const trend = getTrend(w.m2, w.m3);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${w.supplier}</td>
                    <td>${w.workplace}</td>
                    <td>${w.project}</td>
                    <td>${w.mode}</td>
                    <td class="number-cell">${w.m1}</td>
                    <td class="number-cell">${w.m2}</td>
                    <td class="number-cell">${w.m3}</td>
                    <td>${getTrendSymbol(trend)}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateCharts(data) {
            const projectMap = {};
            const supplierMap = {};

            data.forEach(w => {
                projectMap[w.project] = (projectMap[w.project] || 0) + w.m3;
                supplierMap[w.supplier] = (supplierMap[w.supplier] || 0) + w.m3;
            });

            const projectData = Object.entries(projectMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const supplierData = Object.entries(supplierMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const projectOption = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value', axisLine: { lineStyle: { color: '#E5E5E5' } }, axisLabel: { color: '#666666' } },
                yAxis: { type: 'category', data: projectData.map(d => d[0]).reverse(), axisLine: { lineStyle: { color: '#E5E5E5' } }, axisLabel: { color: '#111111' } },
                series: [{
                    type: 'bar',
                    data: projectData.map(d => d[1]).reverse(),
                    itemStyle: { color: '#111111', borderRadius: 2 },
                    barWidth: 20
                }]
            };

            const supplierOption = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value', axisLine: { lineStyle: { color: '#E5E5E5' } }, axisLabel: { color: '#666666' } },
                yAxis: { type: 'category', data: supplierData.map(d => d[0]).reverse(), axisLine: { lineStyle: { color: '#E5E5E5' } }, axisLabel: { color: '#111111' } },
                series: [{
                    type: 'bar',
                    data: supplierData.map(d => d[1]).reverse(),
                    itemStyle: { color: '#E2725B', borderRadius: 2 },
                    barWidth: 20
                }]
            };

            projectChart.setOption(projectOption, true);
            supplierChart.setOption(supplierOption, true);
        }

        function updateAll() {
            const data = getFilteredData();
            updateKPI(data);
            updateTable(data);
            updateCharts(data);
        }

        filterSupplier.addEventListener('change', updateAll);
        filterProject.addEventListener('change', updateAll);
        filterCity.addEventListener('change', updateAll);

        window.addEventListener('resize', function() {
            projectChart.resize();
            supplierChart.resize();
        });

        initFilters();
        updateAll();
    });
