<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手绘SVG示例 - 具体场景</title>
    <style>
        :root {
            --cream: #F7F3ED;
            --vermillion: #BA3420;
            --vermillion-light: #E2725B;
            --ink: #0B0800;
            --gray-light: #D4CFC7;
            --gray-mid: #A8A098;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            background: var(--cream);
            color: var(--ink);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .subtitle {
            color: var(--gray-mid);
            margin-bottom: 3rem;
            font-size: 0.9rem;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .example-card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(11, 8, 0, 0.08);
        }

        .example-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--vermillion);
        }

        .example-desc {
            font-size: 0.9rem;
            color: var(--gray-mid);
            margin-bottom: 1.5rem;
        }

        .svg-container {
            width: 100%;
            background: var(--cream);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        /* 文本标签样式 */
        .label-text {
            font-size: 11px;
            font-weight: 500;
            fill: var(--ink);
        }

        .label-title {
            font-size: 13px;
            font-weight: 600;
            fill: var(--ink);
        }

        .label-accent {
            font-size: 12px;
            font-weight: 600;
            fill: var(--vermillion);
        }

        .label-desc {
            font-size: 10px;
            fill: var(--gray-mid);
        }

        /* 纸张纹理 */
        .paper-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.25;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <div class="paper-texture"></div>
    <div class="container">
        <h1>手绘SVG示例 — 具体场景</h1>
        <p class="subtitle">基于权责不对等研究的真实内容可视化</p>

        <div class="examples-grid">
            <!-- 场景1：策略组 vs 服务组权责分离 -->
            <div class="example-card">
                <div class="example-title">场景1：结构性权责分离</div>
                <div class="example-desc">定价权在策略组，流失风险由服务组承担</div>
                <div class="svg-container">
                    <svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
                        <!-- 填充层 -->
                        <g fill-opacity="0.1">
                            <!-- 策略组区域 -->
                            <rect x="40" y="60" width="240" height="220" rx="8" fill="#BA3420" fill-opacity="0.08"/>
                            <!-- 服务组区域 -->
                            <rect x="320" y="60" width="240" height="220" rx="8" fill="#BA3420" fill-opacity="0.05"/>
                            <!-- 决策权连接箭头填充 -->
                            <path d="M280 140 Q300 140 320 140" fill="#BA3420" fill-opacity="0.15"/>
                            <!-- 风险传递箭头填充 -->
                            <path d="M320 220 Q300 220 280 220" fill="#BA3420" fill-opacity="0.15"/>
                        </g>

                        <!-- 线条层 -->
                        <g stroke-linecap="round" stroke-linejoin="round">
                            <!-- 策略组框 -->
                            <rect x="40" y="60" width="240" height="220" rx="8" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <!-- 服务组框 -->
                            <rect x="320" y="60" width="240" height="220" rx="8" fill="none" stroke="#0B0800" stroke-width="2"/>

                            <!-- 标题线 -->
                            <line x1="60" y1="90" x2="120" y2="90" stroke="#0B0800" stroke-width="2"/>
                            <line x1="340" y1="90" x2="400" y2="90" stroke="#0B0800" stroke-width="2"/>

                            <!-- 策略组内容 -->
                            <circle cx="80" cy="120" r="4" fill="#BA3420" stroke="none"/>
                            <text x="95" y="124" class="label-title">定价权</text>
                            <text x="95" y="140" class="label-desc">结算价格调整</text>
                            <text x="95" y="154" class="label-desc">供应商名单管理</text>

                            <circle cx="80" cy="180" r="4" fill="#BA3420" stroke="none"/>
                            <text x="95" y="184" class="label-title">KPI导向</text>
                            <text x="95" y="200" class="label-desc">费效比优化</text>
                            <text x="95" y="214" class="label-desc">成本控制优先</text>

                            <circle cx="80" cy="240" r="3" fill="#F7F3ED" stroke="#0B0800" stroke-width="1.5"/>
                            <text x="95" y="244" class="label-text">刘伟佳 — 责任边界管理</text>

                            <!-- 服务组内容 -->
                            <circle cx="360" cy="120" r="3" fill="#F7F3ED" stroke="#0B0800" stroke-width="1.5"/>
                            <text x="375" y="124" class="label-text">年老师 — 服务组负责人</text>

                            <circle cx="360" cy="160" r="4" fill="#BA3420" stroke="none"/>
                            <text x="375" y="164" class="label-title">承担结果</text>
                            <text x="375" y="180" class="label-desc">供应商流失KPI</text>
                            <text x="375" y="194" class="label-desc">运营质量指标</text>

                            <circle cx="360" cy="220" r="4" fill="#BA3420" stroke="none"/>
                            <text x="375" y="224" class="label-title">实际约束</text>
                            <text x="375" y="240" class="label-desc">无法改变定价</text>
                            <text x="375" y="254" class="label-desc">无法单边决策</text>

                            <!-- 决策权箭头 -->
                            <path d="M280 140 L320 140" stroke="#BA3420" stroke-width="2.5" fill="none"/>
                            <path d="M312 136 L320 140 L312 144" stroke="#BA3420" stroke-width="2.5" fill="none"/>
                            <text x="285" y="130" class="label-accent">决策权</text>

                            <!-- 风险传递箭头 -->
                            <path d="M320 220 L280 220" stroke="#BA3420" stroke-width="2.5" fill="none"/>
                            <path d="M288 216 L280 220 L288 224" stroke="#BA3420" stroke-width="2.5" fill="none"/>
                            <text x="285" y="210" class="label-accent">风险倒挂</text>

                            <!-- 供应商夹层 -->
                            <ellipse cx="300" cy="300" rx="80" ry="25" fill="#BA3420" fill-opacity="0.08" stroke="#0B0800" stroke-width="1.5" stroke-dasharray="4,3"/>
                            <text x="300" y="304" text-anchor="middle" class="label-text">供应商夹在中间</text>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- 场景2：供应商夹层困境 -->
            <div class="example-card">
                <div class="example-title">场景2：供应商夹层困境</div>
                <div class="example-desc">供应商收到矛盾信号：服务组要求质量提升，策略组压降价格</div>
                <div class="svg-container">
                    <svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
                        <!-- 填充层 -->
                        <g fill-opacity="0.08">
                            <!-- 供应商中心 -->
                            <circle cx="300" cy="140" r="60" fill="#BA3420"/>
                            <!-- 左侧压力源 -->
                            <circle cx="100" cy="80" r="40" fill="#BA3420" fill-opacity="0.05"/>
                            <circle cx="100" cy="200" r="40" fill="#BA3420" fill-opacity="0.05"/>
                        </g>

                        <!-- 线条层 -->
                        <g stroke-linecap="round" stroke-linejoin="round">
                            <!-- 供应商中心 -->
                            <circle cx="300" cy="140" r="60" fill="none" stroke="#0B0800" stroke-width="2.5"/>
                            <text x="300" y="135" text-anchor="middle" class="label-title">供应商</text>
                            <text x="300" y="152" text-anchor="middle" class="label-desc">毅航/毛毛虫</text>

                            <!-- 服务组压力源 -->
                            <circle cx="100" cy="80" r="40" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="100" y="75" text-anchor="middle" class="label-title">服务组</text>
                            <text x="100" y="90" text-anchor="middle" class="label-desc">年老师</text>

                            <!-- 策略组压力源 -->
                            <circle cx="100" cy="200" r="40" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="100" y="195" text-anchor="middle" class="label-title">策略组</text>
                            <text x="100" y="210" text-anchor="middle" class="label-desc">刘伟佳</text>

                            <!-- 服务组要求箭头 -->
                            <path d="M145 85 Q200 85 235 115" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <path d="M230 110 L235 115 L228 118" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <text x="175" y="75" class="label-accent">质量提升!</text>

                            <!-- 策略组要求箭头 -->
                            <path d="M145 195 Q200 195 235 165" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <path d="M228 162 L235 165 L230 170" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <text x="175" y="215" class="label-accent">降价!</text>

                            <!-- 困境标注 -->
                            <circle cx="300" cy="140" r="75" fill="none" stroke="#BA3420" stroke-width="1.5" stroke-dasharray="4,3"/>
                            <text x="420" y="135" class="label-accent">矛盾信号</text>
                            <text x="420" y="152" class="label-desc">质量↑ + 价格↓</text>
                            <text x="420" y="166" class="label-desc">= ROI崩溃</text>

                            <!-- 结果箭头 -->
                            <path d="M360 140 L420 140" stroke="#0B0800" stroke-width="1.5" fill="none"/>
                            <path d="M415 137 L420 140 L415 143" stroke="#0B0800" stroke-width="1.5" fill="none"/>

                            <!-- 具体影响 -->
                            <rect x="480" y="100" width="100" height="80" rx="4" fill="#BA3420" fill-opacity="0.08" stroke="#0B0800" stroke-width="1.5"/>
                            <circle cx="495" cy="118" r="3" fill="#BA3420" stroke="none"/>
                            <text x="505" y="122" class="label-text">供应商流失</text>
                            <circle cx="495" cy="138" r="3" fill="#BA3420" stroke="none"/>
                            <text x="505" y="142" class="label-text">不愿投入</text>
                            <circle cx="495" cy="158" r="3" fill="#BA3420" stroke="none"/>
                            <text x="505" y="162" class="label-text">质量下降</text>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- 场景3：刘伟佳责任边界管理 -->
            <div class="example-card">
                <div class="example-title">场景3：刘伟佳责任边界管理</div>
                <div class="example-desc">分析外化 + 模糊化处理，列出问题但不揽责任</div>
                <div class="svg-container">
                    <svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
                        <!-- 填充层 -->
                        <g fill-opacity="0.08">
                            <!-- 刘伟佳中心 -->
                            <rect x="220" y="100" width="160" height="120" rx="8" fill="#BA3420"/>
                            <!-- 问题区域 -->
                            <ellipse cx="150" cy="160" rx="100" ry="70" fill="#BA3420" fill-opacity="0.05"/>
                            <!-- 责任边界 -->
                            <rect x="100" y="250" width="400" height="50" rx="4" fill="#BA3420" fill-opacity="0.05"/>
                        </g>

                        <!-- 线条层 -->
                        <g stroke-linecap="round" stroke-linejoin="round">
                            <!-- 刘伟佳框 -->
                            <rect x="220" y="100" width="160" height="120" rx="8" fill="none" stroke="#0B0800" stroke-width="2.5"/>
                            <text x="300" y="130" text-anchor="middle" class="label-title">刘伟佳</text>
                            <text x="300" y="150" text-anchor="middle" class="label-desc">策略组负责人</text>

                            <!-- 行为模式 -->
                            <circle cx="245" cy="175" r="4" fill="#BA3420" stroke="none"/>
                            <text x="255" y="179" class="label-text">分析外化</text>
                            <circle cx="245" cy="198" r="4" fill="#BA3420" stroke="none"/>
                            <text x="255" y="202" class="label-text">模糊化处理</text>

                            <!-- 问题区域 -->
                            <ellipse cx="150" cy="160" rx="100" ry="70" fill="none" stroke="#0B0800" stroke-width="2" stroke-dasharray="3,2"/>
                            <text x="150" y="145" text-anchor="middle" class="label-accent">问题区域</text>

                            <!-- 具体问题 -->
                            <circle cx="100" cy="165" r="3" fill="#F7F3ED" stroke="#0B0800" stroke-width="1.2"/>
                            <text x="80" y="185" text-anchor="end" class="label-desc">供应商流失</text>
                            <circle cx="130" cy="175" r="3" fill="#F7F3ED" stroke="#0B0800" stroke-width="1.2"/>
                            <text x="130" y="195" text-anchor="middle" class="label-desc">费效比压力</text>
                            <circle cx="170" cy="165" r="3" fill="#F7F3ED" stroke="#0B0800" stroke-width="1.2"/>
                            <text x="190" y="185" text-anchor="start" class="label-desc">质量下滑</text>

                            <!-- 外化箭头 -->
                            <path d="M250 160 L210 160" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <path d="M218 157 L210 160 L218 163" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <text x="225" y="150" class="label-accent">指向外部</text>

                            <!-- 责任边界 -->
                            <rect x="100" y="250" width="400" height="50" rx="4" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="300" y="270" text-anchor="middle" class="label-title">责任边界</text>
                            <text x="300" y="288" text-anchor="middle" class="label-desc">"问题我看到了，但责任不在我"（定价权、KPI设定）</text>

                            <!-- 边界箭头 -->
                            <path d="M300 220 L300 245" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <path d="M297 240 L300 245 L303 240" stroke="#BA3420" stroke-width="2" fill="none"/>

                            <!-- 服务组位置 -->
                            <rect x="420" y="100" width="140" height="120" rx="8" fill="#BA3420" fill-opacity="0.05" stroke="#0B0800" stroke-width="1.5"/>
                            <text x="490" y="140" text-anchor="middle" class="label-title">服务组</text>
                            <text x="490" y="160" text-anchor="middle" class="label-desc">年老师</text>
                            <circle cx="445" cy="185" r="3" fill="#BA3420" stroke="none"/>
                            <text x="455" y="189" class="label-desc">承担结果</text>

                            <!-- 责任转移箭头 -->
                            <path d="M380 160 L415 160" stroke="#0B0800" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
                            <path d="M410 157 L415 160 L410 163" stroke="#0B0800" stroke-width="1.5" fill="none"/>
                            <text x="390" y="150" class="label-desc">风险转移</text>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- 场景4：REACT回应框架 -->
            <div class="example-card">
                <div class="example-title">场景4：REACT回应框架示例</div>
                <div class="example-desc">"为什么毅航这月流失严重？"的标准回应</div>
                <div class="svg-container">
                    <svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg">
                        <!-- 填充层 -->
                        <g fill-opacity="0.08">
                            <!-- 问号 -->
                            <circle cx="60" cy="130" r="35" fill="#BA3420"/>
                            <!-- R步骤 -->
                            <rect x="130" y="40" width="100" height="180" rx="6" fill="#BA3420" fill-opacity="0.12"/>
                            <!-- E步骤 -->
                            <rect x="250" y="40" width="100" height="180" rx="6" fill="#BA3420" fill-opacity="0.08"/>
                            <!-- A步骤 -->
                            <rect x="370" y="40" width="100" height="180" rx="6" fill="#BA3420" fill-opacity="0.06"/>
                            <!-- C步骤 -->
                            <rect x="490" y="40" width="100" height="180" rx="6" fill="#BA3420" fill-opacity="0.04"/>
                            <!-- T步骤 -->
                            <rect x="610" y="40" width="70" height="180" rx="6" fill="#BA3420" fill-opacity="0.03"/>
                        </g>

                        <!-- 线条层 -->
                        <g stroke-linecap="round" stroke-linejoin="round">
                            <!-- 问题 -->
                            <circle cx="60" cy="130" r="35" fill="none" stroke="#BA3420" stroke-width="2.5"/>
                            <text x="60" y="125" text-anchor="middle" class="label-title" style="font-size: 20px;">?</text>
                            <text x="60" y="145" text-anchor="middle" class="label-desc">被追问</text>

                            <!-- 连接箭头 -->
                            <path d="M100 130 L125 130" stroke="#BA3420" stroke-width="2" fill="none"/>
                            <path d="M118 127 L125 130 L118 133" stroke="#BA3420" stroke-width="2" fill="none"/>

                            <!-- R - Respond -->
                            <rect x="130" y="40" width="100" height="180" rx="6" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="180" y="70" text-anchor="middle" class="label-accent">R</text>
                            <text x="180" y="90" text-anchor="middle" class="label-title">Respond</text>
                            <text x="180" y="108" text-anchor="middle" class="label-desc">承认问题</text>
                            <line x1="145" y1="118" x2="215" y2="118" stroke="#0B0800" stroke-width="1" stroke-dasharray="2,2"/>
                            <text x="180" y="140" text-anchor="middle" class="label-desc">"确实，毅航本月</text>
                            <text x="180" y="156" text-anchor="middle" class="label-desc">流失X人，是</text>
                            <text x="180" y="172" text-anchor="middle" class="label-desc">需要关注的"</text>

                            <!-- E - Explain -->
                            <rect x="250" y="40" width="100" height="180" rx="6" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="300" y="70" text-anchor="middle" class="label-accent">E</text>
                            <text x="300" y="90" text-anchor="middle" class="label-title">Explain</text>
                            <text x="300" y="108" text-anchor="middle" class="label-desc">说明原因</text>
                            <line x1="265" y1="118" x2="335" y2="118" stroke="#0B0800" stroke-width="1" stroke-dasharray="2,2"/>
                            <text x="300" y="140" text-anchor="middle" class="label-desc">"根本原因是</text>
                            <text x="300" y="156" text-anchor="middle" class="label-desc">3月结算价</text>
                            <text x="300" y="172" text-anchor="middle" class="label-desc">调整后ROI下降"</text>

                            <!-- A - Action -->
                            <rect x="370" y="40" width="100" height="180" rx="6" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="420" y="70" text-anchor="middle" class="label-accent">A</text>
                            <text x="420" y="90" text-anchor="middle" class="label-title">Action</text>
                            <text x="420" y="108" text-anchor="middle" class="label-desc">已做行动</text>
                            <line x1="385" y1="118" x2="455" y2="118" stroke="#0B0800" stroke-width="1" stroke-dasharray="2,2"/>
                            <text x="420" y="140" text-anchor="middle" class="label-desc">"沟通3次、</text>
                            <text x="420" y="156" text-anchor="middle" class="label-desc">提供方案、</text>
                            <text x="420" y="172" text-anchor="middle" class="label-desc">协商激励"</text>

                            <!-- C - Constraint -->
                            <rect x="490" y="40" width="100" height="180" rx="6" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="540" y="70" text-anchor="middle" class="label-accent">C</text>
                            <text x="540" y="90" text-anchor="middle" class="label-title">Constraint</text>
                            <text x="540" y="108" text-anchor="middle" class="label-desc">当前约束</text>
                            <line x1="505" y1="118" x2="575" y2="118" stroke="#0B0800" stroke-width="1" stroke-dasharray="2,2"/>
                            <text x="540" y="140" text-anchor="middle" class="label-desc">"定价权在</text>
                            <text x="540" y="156" text-anchor="middle" class="label-desc">策略组，</text>
                            <text x="540" y="172" text-anchor="middle" class="label-desc">我无法调整"</text>

                            <!-- T - Target -->
                            <rect x="610" y="40" width="70" height="180" rx="6" fill="none" stroke="#0B0800" stroke-width="2"/>
                            <text x="645" y="70" text-anchor="middle" class="label-accent">T</text>
                            <text x="645" y="90" text-anchor="middle" class="label-title">Target</text>
                            <text x="645" y="108" text-anchor="middle" class="label-desc">建议</text>
                            <line x1="620" y1="118" x2="670" y2="118" stroke="#0B0800" stroke-width="1" stroke-dasharray="2,2"/>
                            <text x="645" y="140" text-anchor="middle" class="label-desc">"重新</text>
                            <text x="645" y="156" text-anchor="middle" class="label-desc">评估</text>
                            <text x="645" y="172" text-anchor="middle" class="label-desc">定价"</text>
