<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商站点看板 - V6 Data</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-tertiary: #1a1a1a;
      --border: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent-red: #c25030;
      --accent-yellow: #b88018;
      --accent-green: #2e8b6e;
      --accent-blue: #3a7bd5;
      --accent-purple: #6b5b95;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      font-size: 13px;
    }
    .container { max-width: 1920px; margin: 0 auto; padding: 16px; }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .header-left h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .header-left .subtitle {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .header-stats {
      display: flex;
      gap: 32px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-value.accent { color: var(--accent-blue); }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    
    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }
    
    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .card-body { padding: 16px; }
    
    /* Chart containers */
    .chart-container { width: 100%; height: 100%; }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-6 { grid-column: span 6; }
    .col-8 { grid-column: span 8; }
    .col-12 { grid-column: span 12; }
    
    /* Risk Table */
    .risk-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .risk-table th {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-weight: 500;
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .risk-table td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .risk-table tr:hover { background: rgba(255,255,255,0.02); }
    
    /* Risk tags */
    .risk-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 500;
    }
    .risk-high {
      background: rgba(194, 80, 48, 0.15);
      color: var(--accent-red);
    }
    .risk-medium {
      background: rgba(184, 128, 24, 0.15);
      color: var(--accent-yellow);
    }
    .risk-low {
      background: rgba(46, 139, 110, 0.15);
      color: var(--accent-green);
    }
    
    /* Risk indicators */
    .indicator-yes {
      color: var(--accent-red);
      font-weight: 600;
    }
    .indicator-no { color: var(--text-muted); }
    
    /* Progress bars */
    .progress-bar {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent-blue);
      border-radius: 2px;
    }
    
    /* Number formatting */
    .num { font-family: 'SF Mono', Monaco, monospace; }
    .num-large { font-size: 14px; font-weight: 600; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
    /* Table wrapper for scroll */
    .table-wrapper {
      max-height: 520px;
      overflow: auto;
    }
    
    /* Summary cards row */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .summary-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 16px;
      text-align: center;
    }
    .summary-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .summary-value.red { color: var(--accent-red); }
    .summary-value.yellow { color: var(--accent-yellow); }
    .summary-value.green { color: var(--accent-green); }
    .summary-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Heatmap cell */
    .heatmap-cell {
      display: inline-block;
      width: 24px;
      height: 24px;
      margin: 1px;
      border-radius: 2px;
    }
    
    /* Mini stat in table */
    .mini-stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mini-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .dot-red { background: var(--accent-red); }
    .dot-yellow { background: var(--accent-yellow); }
    .dot-green { background: var(--accent-green); }
    
    /* Rank badge */
    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-tertiary);
    }
    .rank-top { background: var(--accent-blue); color: #fff; }
  </style>
</head>

    });
    
    // Sort by risk level and headcount
    suppliers.sort((a, b) => {
      const levelOrder = { '高风险': 0, '中风险': 1, '低风险': 2 };
      if (levelOrder[a.riskLevel] !== levelOrder[b.riskLevel]) {
        return levelOrder[a.riskLevel] - levelOrder[b.riskLevel];
      }
      return b.m3 - a.m3;
    });
    
    // Render risk table
    const tbody = document.getElementById('risk-table-body');
    suppliers.forEach((s, idx) => {
      const tr = document.createElement('tr');
      const riskClass = s.riskLevel === '高风险' ? 'risk-high' : s.riskLevel === '中风险' ? 'risk-medium' : 'risk-low';
      
      tr.innerHTML = `
        <td><span class="rank ${idx < 3 ? 'rank-top' : ''}">${idx + 1}</span></td>
        <td><strong>${s.name}</strong></td>
        <td class="num num-large">${s.m3}</td>
        <td class="num">${s.risk.productCount}</td>
        <td class="num">${s.risk.siteCount}</td>
        <td class="num">${s.risk.tinySites}</td>
        <td class="num">${s.risk.hugeSites}</td>
        <td class="num">${s.risk.concentration.toFixed(1)}%</td>
        <td class="${s.risk.supplyChainThin ? 'indicator-yes' : 'indicator-no'}">${s.risk.supplyChainThin ? '是' : '否'}</td>
        <td class="${s.risk.geoConcentrated ? 'indicator-yes' : 'indicator-no'}">${s.risk.geoConcentrated ? '是' : '否'}</td>
        <td class="${s.risk.projectConcentrated ? 'indicator-yes' : 'indicator-no'}">${s.risk.projectConcentrated ? '是' : '否'}</td>
        <td class="${s.risk.continuousDecline ? 'indicator-yes' : 'indicator-no'}">${s.risk.continuousDecline ? '是' : '否'}</td>
        <td class="${s.risk.lowFlexibility ? 'indicator-yes' : 'indicator-no'}">${s.risk.lowFlexibility ? '是' : '否'}</td>
        <td><span class="risk-tag ${riskClass}">${s.riskLevel}</span></td>
      `;
      tbody.appendChild(tr);
    });
    
    // Chart 1: Supplier Distribution (Bar Chart)
    const chartSupplier = echarts.init(document.getElementById('chart-supplier-dist'));
    const top10Suppliers = [...suppliers].sort((a, b) => b.m3 - a.m3).slice(0, 10);
    chartSupplier.setOption({
      backgroundColor: 'transparent',
      grid: { left: 60, right: 20, top: 20, bottom: 40 },
      xAxis: {
        type: 'category',
        data: top10Suppliers.map(s => s.name),
        axisLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#a0a0a0', fontSize: 11, rotate: 30 }
      },
      yAxis: {
        type: 'value',
        axisLine: { show: false },
        splitLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#666666', fontSize: 10 }
      },
      series: [{
        type: 'bar',
        data: top10Suppliers.map(s => ({
          value: s.m3,
          itemStyle: { 
            color: s.riskLevel === '高风险' ? '#c25030' : 
                   s.riskLevel === '中风险' ? '#b88018' : '#2e8b6e'
          }
        })),
        barWidth: '60%',
        label: { show: true, position: 'top', color: '#ffffff', fontSize: 10 }
      }]
    });
    
    // Chart 2: Risk Distribution (Pie Chart)
    const chartRisk = echarts.init(document.getElementById('chart-risk-dist'));
    const riskCounts = { '高风险': 0, '中风险': 0, '低风险': 0 };
    suppliers.forEach(s => riskCounts[s.riskLevel]++);
    chartRisk.setOption({
      backgroundColor: 'transparent',
      series: [{
        type: 'pie',
        radius: ['45%', '70%'],
        center: ['50%', '55%'],
        data: [
          { value: riskCounts['高风险'], name: '高风险', itemStyle: { color: '#c25030' } },
          { value: riskCounts['中风险'], name: '中风险', itemStyle: { color: '#b88018' } },
          { value: riskCounts['低风险'], name: '低风险', itemStyle: { color: '#2e8b6e' } }
        ],
        label: { color: '#a0a0a0', fontSize: 12, formatter: '{b}: {c}' },
        labelLine: { lineStyle: { color: '#666666' } }
      }]
    });
    
    // Chart 3: Product Line Distribution
    const chartProduct = echarts.init(document.getElementById('chart-product-dist'));
    const productMap = {};
    rawData.forEach(d => { productMap[d.product] = (productMap[d.product] || 0) + d.m3; });
    const products = Object.entries(productMap).sort((a, b) => b[1] - a[1]);
    chartProduct.setOption({
      backgroundColor: 'transparent',
      grid: { left: 100, right: 20, top: 10, bottom: 20 },
      xAxis: {
        type: 'value',
        axisLine: { show: false },
        splitLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#666666', fontSize: 10 }
      },
      yAxis: {
        type: 'category',
        data: products.map(p => p[0]),
        axisLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#a0a0a0', fontSize: 10 }
      },
      series: [{
        type: 'bar',
        data: products.map(p => p[1]),
        barWidth: '50%',
        itemStyle: { color: '#3a7bd5' },
        label: { show: true, position: 'right', color: '#ffffff', fontSize: 10 }
      }]
    });
    
    // Chart 4: Trend Chart (Top 10 suppliers)
    const chartTrend = echarts.init(document.getElementById('chart-trend'));
    chartTrend.setOption({
      backgroundColor: 'transparent',
      grid: { left: 50, right: 20, top: 20, bottom: 30 },
      legend: {
        data: top10Suppliers.slice(0, 5).map(s => s.name),
        textStyle: { color: '#a0a0a0', fontSize: 10 },
        top: 0
      },
      xAxis: {
        type: 'category',
        data: ['1月', '2月', '3月'],
        axisLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#a0a0a0', fontSize: 11 }
      },
      yAxis: {
        type: 'value',
        axisLine: { show: false },
        splitLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#666666', fontSize: 10 }
      },
      series: top10Suppliers.slice(0, 5).map((s, i) => ({
        name: s.name,
        type: 'line',
        data: [s.m1, s.m2, s.m3],
        smooth: true,
        symbol: 'circle',
        symbolSize: 6,
        lineStyle: { width: 2 },
        itemStyle: { 
          color: ['#3a7bd5', '#c25030', '#2e8b6e', '#b88018', '#6b5b95'][i]
        }
      }))
    });
    
    // Chart 5: Regional Distribution
    const chartRegion = echarts.init(document.getElementById('chart-region'));
    const regionMap = {};
    rawData.forEach(d => { regionMap[d.region] = (regionMap[d.region] || 0) + d.m3; });
    const regions = Object.entries(regionMap).sort((a, b) => b[1] - a[1]);
    chartRegion.setOption({
      backgroundColor: 'transparent',
      grid: { left: 60, right: 20, top: 20, bottom: 40 },
      xAxis: {
        type: 'category',
        data: regions.map(r => r[0]),
        axisLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#a0a0a0', fontSize: 11 }
      },
      yAxis: {
        type: 'value',
        axisLine: { show: false },
        splitLine: { lineStyle: { color: '#2a2a2a' } },
        axisLabel: { color: '#666666', fontSize: 10 }
      },
      series: [{
        type: 'bar',
        data: regions.map(r => r[1]),
        barWidth: '50%',
        itemStyle: { 
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: '#3a7bd5' },
            { offset: 1, color: '#6b5b95' }
          ])
        },
        label: { show: true, position: 'top', color: '#ffffff', fontSize: 10 }
      }]
    });
    
    // Responsive
    window.addEventListener('resize', () => {
      chartSupplier.resize();
      chartRisk.resize();
      chartProduct.resize();
      chartTrend.resize();
      chartRegion.resize();
    });
  </script>
</body>
</html>
