<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商站点看板 - 数据模式</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: #000;
            color: #fff;
            padding: 20px 24px;
            border-radius: 2px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header-meta {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: #ccc;
        }

        .header-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Filter Bar */
        .filter-bar {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .filter-group select {
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 13px;
            background: #fff;
            min-width: 120px;
            cursor: pointer;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #000;
        }

        .filter-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 2px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f5f5f5;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .btn-primary:hover {
            background: #333;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #000;
        }

        .tab.active {
            color: #000;
            border-bottom-color: #000;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 20px;
            transition: all 0.2s;
        }

        .kpi-card:hover {
            border-color: #000;
        }

        .kpi-card.alert {
            border-color: #000;
            background: #fafafa;
        }

        .kpi-card.alert .kpi-value {
            color: #000;
            font-weight: 700;
        }

        .kpi-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .kpi-change {
            font-size: 12px;
            color: #666;
        }

        .kpi-change.up {
            color: #000;
        }

        .kpi-change.down {
            color: #999;
        }

        /* Section Title */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin: 24px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ccc;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-container {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 20px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #000;
            margin-bottom: 16px;
        }

        .chart-box {
            height: 280px;
        }

        /* Risk Panel */
        .risk-panel {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .risk-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .risk-item {
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .risk-item:hover {
            border-color: #000;
        }

        .risk-item.high {
            border-color: #000;
            background: #fafafa;
        }

        .risk-name {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .risk-count {
            font-size: 24px;
            font-weight: 600;
            color: #000;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .risk-desc {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        /* Insights Panel */
        .insights-panel {
            background: #000;
            color: #fff;
            border-radius: 2px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .insights-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .insights-list {
            list-style: none;
        }

        .insights-list li {
            padding: 12px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
            line-height: 1.6;
        }

        .insights-list li:last-child {
            border-bottom: none;
        }

        .insights-list li::before {
            content: '>';
            color: #ccc;
            margin-right: 12px;
            font-family: monospace;
        }

        /* Table */
        .table-container {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            background: #000;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }

        .data-table tr:hover td {
            background: #f5f5f5;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 11px;
            color: #333;
        }

        .tag.alert {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px;
            background: #fafafa;
            border-top: 1px solid #ccc;
        }

        .pagination button {
            padding: 6px 12px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
        }

        .pagination button:hover {
            border-color: #000;
        }

        .pagination button.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Full width chart */
        .chart-full {
            grid-column: 1 / -1;
        }

        /* Supplier Cards */
        .supplier-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .supplier-card {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 20px;
        }

        .supplier-card:hover {
            border-color: #000;
        }

        .supplier-name {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 12px;
        }

        .supplier-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .supplier-stat {
            padding: 8px 0;
        }

        .supplier-stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .supplier-stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            font-family: 'SF Mono', Monaco, monospace;
        }

        /* Project Analysis */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-item {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-item:hover {
            border-color: #000;
        }

        .project-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
        }

        .project-info span {
            font-size: 12px;
            color: #666;
        }

        .project-metrics {
            display: flex;
            gap: 24px;
        }

        .project-metric {
            text-align: right;
        }

        .project-metric-label {
            font-size: 11px;
            color: #666;
        }

        .project-metric-value {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            font-family: 'SF Mono', Monaco, monospace;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .kpi-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .risk-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .supplier-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-actions {
                margin-left: 0;
            }
            .risk-grid {
                grid-template-columns: 1fr;
            }
            .supplier-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>供应商站点看板</h1>
            <div class="header-meta">
                <span>数据周期: 2026年1-4月</span>
                <span>物理职场: 67个</span>
                <span>供应商: 30家</span>
                <span>项目: 18个</span>
                <span>最后更新: 2026-04-04</span>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>月份</label>
                <select id="filter-month">
                    <option value="all">全部月份</option>
                    <option value="1">1月</option>
                    <option value="2">2月</option>
                    <option value="3">3月</option>
                    <option value="4">4月</option>
                </select>
            </div>
            <div class="filter-group">
                <label>供应商</label>
                <select id="filter-supplier">
                    <option value="all">全部供应商</option>
                </select>
            </div>
            <div class="filter-group">
                <label>项目</label>
                <select id="filter-project">
                    <option value="all">全部项目</option>
                </select>
            </div>
            <div class="filter-group">
                <label>省份</label>
                <select id="filter-province">
                    <option value="all">全部省份</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="btn" onclick="resetFilters()">重置筛选</button>
                <button class="btn btn-primary" onclick="applyFilters()">应用筛选</button>
            </div>
        </div>

        <!-- Insights Panel -->
        <div class="insights-panel">
            <div class="insights-title">智能洞察</div>
            <ul class="insights-list" id="insights-list">
                <!-- Dynamic insights will be inserted here -->
            </ul>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="overview">全局大盘</div>
            <div class="tab" data-tab="workplace">职场分析</div>
            <div class="tab" data-tab="supplier">供应商分析</div>
            <div class="tab" data-tab="project">项目分析</div>
            <div class="tab" data-tab="detail">数据明细</div>
        </div>

        <!-- Tab Content: Overview -->
        <div class="tab-content active" id="tab-overview">
            <!-- KPI Cards -->
            <div class="kpi-grid" id="overview-kpis">
                <!-- Dynamic KPI cards -->
            </div>

            <!-- Risk Panel -->
            <div class="section-title">风险监控 (8大维度)</div>
            <div class="risk-panel">
                <div class="risk-grid" id="risk-grid">
                    <!-- Dynamic risk items -->
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-container">
                    <div class="chart-title">月度人力趋势</div>
                    <div class="chart-box" id="chart-trend"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">供应商分布</div>
                    <div class="chart-box" id="chart-supplier-distribution"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">职场规模分布</div>
                    <div class="chart-box" id="chart-workplace-size"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">项目人力占比</div>
                    <div class="chart-box" id="chart-project-share"></div>
                </div>
            </div>
        </div>

        <!-- Tab Content: Workplace -->
        <div class="tab-content" id="tab-workplace">
            <div class="kpi-grid" id="workplace-kpis">
                <!-- Dynamic KPI cards -->
            </div>

            <div class="charts-grid">
                <div class="chart-container chart-full">
                    <div class="chart-title">TOP20 职场人力排名</div>
                    <div class="chart-box" id="chart-workplace-ranking" style="height: 400px;"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">职场区域分布</div>
                    <div class="chart-box" id="chart-region-distribution"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">职场城市能级分布</div>
                    <div class="chart-box" id="chart-city-tier"></div>
                </div>
            </div>

            <div class="section-title">职场明细</div>
            <div class="table-container">
                <table class="data-table" id="workplace-table">
                    <!-- Dynamic table content -->
                </table>
                <div class="pagination" id="workplace-pagination"></div>
            </div>
        </div>

        <!-- Tab Content: Supplier -->
        <div class="tab-content" id="tab-supplier">
            <div class="kpi-grid" id="supplier-kpis">
                <!-- Dynamic KPI cards -->
            </div>

            <div class="charts-grid">
                <div class="chart-container chart-full">
                    <div class="chart-title">供应商人力趋势对比</div>
                    <div class="chart-box" id="chart-supplier-trend" style="height: 350px;"></div>
                </div>
            </div>

            <div class="section-title">供应商详情</div>
            <div class="supplier-cards" id="supplier-cards">
                <!-- Dynamic supplier cards -->
            </div>
        </div>

        <!-- Tab Content: Project -->
        <div class="tab-content" id="tab-project">
            <div class="kpi-grid" id="project-kpis">
                <!-- Dynamic KPI cards -->
            </div>

            <div class="charts-grid">
                <div class="chart-container">
                    <div class="chart-title">项目人力分布</div>
                    <div class="chart-box" id="chart-project-distribution"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">业务线人力占比</div>
                    <div class="chart-box" id="chart-business-line"></div>
                </div>
            </div>

            <div class="section-title">项目列表</div>
            <div class="project-list" id="project-list">
                <!-- Dynamic project list -->
            </div>
        </div>

        <!-- Tab Content: Detail -->
        <div class="tab-content" id="tab-detail">
            <div class="table-container">
                <table class="data-table" id="detail-table">
                    <!-- Dynamic table content -->
                </table>
                <div class="pagination" id="detail-pagination"></div>
            </div>
        </div>
    </div>

        // 合并物理职场 - 按"供应商简称+职场"合并
        function mergePhysicalWorkplaces(data) {
            const merged = {};
            
            data.forEach(record => {
                const key = record.supplier + '-' + record.workplace;
                
                if (!merged[key]) {
                    merged[key] = {
                        key: key,
                        supplier: record.supplier,
                        company: record.company,
                        workplace: record.workplace,
                        mode: record.mode,
                        province: record.province,
                        city: record.city,
                        district: record.district,
                        region: record.region,
                        cityTier: record.cityTier,
                        projects: [],
                        bizLines: [],
                        m1: 0, m2: 0, m3: 0, m4: 0
                    };
                }
                
                // 累加人力
                merged[key].m1 += parseInt(record.m1) || 0;
                merged[key].m2 += parseInt(record.m2) || 0;
                merged[key].m3 += parseInt(record.m3) || 0;
                merged[key].m4 += parseInt(record.m4) || 0;
                
                // 收集项目和业务线
                if (!merged[key].projects.includes(record.project)) {
                    merged[key].projects.push(record.project);
                }
                if (!merged[key].bizLines.includes(record.bizLine)) {
                    merged[key].bizLines.push(record.bizLine);
                }
            });
            
            return Object.values(merged);
        }

        // 计算KPI数据
        function calculateKPIs(data) {
            const totalSites = data.length;
            const uniqueSuppliers = [...new Set(data.map(w => w.supplier))].length;
            const m1Total = data.reduce((sum, w) => sum + w.m1, 0);
            const m2Total = data.reduce((sum, w) => sum + w.m2, 0);
            const m3Total = data.reduce((sum, w) => sum + w.m3, 0);
            const m4Total = data.reduce((sum, w) => sum + w.m4, 0);
            
            const avgSize = totalSites > 0 ? Math.round((m1Total + m2Total + m3Total) / 3 / totalSites) : 0;
            const m2Change = m1Total > 0 ? ((m2Total - m1Total) / m1Total * 100).toFixed(1) : 0;
            const m3Change = m2Total > 0 ? ((m3Total - m2Total) / m2Total * 100).toFixed(1) : 0;

            return {
                totalSites,
                uniqueSuppliers,
                m1Total,
                m2Total,
                m3Total,
                m4Total,
                avgSize,
                m2Change,
                m3Change
            };
        }

        // 8大风险维度分析
        function analyzeRisks(data) {
            const risks = {
                tinySites: { name: '微小站点', desc: '<20人', count: 0, items: [], threshold: '<20人' },
                hugeSites: { name: '超大站点', desc: '≥100人', count: 0, items: [], threshold: '≥100人' },
                highConcentration: { name: '供应商集中度', desc: '>40%', count: 0, items: [], threshold: '>40%' },
                thinSupplyChain: { name: '供应链单薄', desc: '<2家', count: 0, items: [], threshold: '<2家' },
                geoConcentration: { name: '地理集中', desc: '>60%', count: 0, items: [], threshold: '>60%' },
                continuousDecline: { name: '连续下降', desc: '≥2月', count: 0, items: [], threshold: '≥2月' },
                singleProject: { name: '项目单一', desc: '=1个项目', count: 0, items: [], threshold: '=1个项目' },
                scatteredProjects: { name: '项目分散', desc: '>5个', count: 0, items: [], threshold: '>5个' }
            };

            const m1Total = data.reduce((sum, w) => sum + w.m1, 0);
            const m2Total = data.reduce((sum, w) => sum + w.m2, 0);
            const m3Total = data.reduce((sum, w) => sum + w.m3, 0);

            // 1. 微小站点(<20人)
            data.forEach(w => {
                const avg = (w.m1 + w.m2 + w.m3) / 3;
                if (avg < 20) {
                    risks.tinySites.count++;
                    risks.tinySites.items.push(w);
                }
            });

            // 2. 超大站点(≥100人)
            data.forEach(w => {
                const avg = (w.m1 + w.m2 + w.m3) / 3;
                if (avg >= 100) {
                    risks.hugeSites.count++;
                    risks.hugeSites.items.push(w);
                }
            });

            // 3. 供应商集中度(>40%)
            const supplierShare = {};
            data.forEach(w => {
                if (!supplierShare[w.supplier]) supplierShare[w.supplier] = 0;
                supplierShare[w.supplier] += w.m1 + w.m2 + w.m3;
            });
            const total = m1Total + m2Total + m3Total;
            Object.entries(supplierShare).forEach(([supplier, sum]) => {
                if (total > 0 && sum / total > 0.4) {
                    risks.highConcentration.count++;
                    risks.highConcentration.items.push({ supplier, share: (sum/total*100).toFixed(1) });
                }
            });

            // 4. 供应链单薄(<2家)
            const provinceSuppliers = {};
            data.forEach(w => {
                if (!provinceSuppliers[w.province]) provinceSuppliers[w.province] = new Set();
                provinceSuppliers[w.province].add(w.supplier);
            });
            Object.entries(provinceSuppliers).forEach(([province, suppliers]) => {
                if (suppliers.size < 2) {
                    risks.thinSupplyChain.count++;
                    risks.thinSupplyChain.items.push({ province, count: suppliers.size });
                }
            });

            // 5. 地理集中(>60%)
            const regionShare = {};
            data.forEach(w => {
                if (!regionShare[w.region]) regionShare[w.region] = 0;
                regionShare[w.region] += w.m1 + w.m2 + w.m3;
            });
            Object.entries(regionShare).forEach(([region, sum]) => {
                if (total > 0 && sum / total > 0.6) {
                    risks.geoConcentration.count++;
                    risks.geoConcentration.items.push({ region, share: (sum/total*100).toFixed(1) });
                }
            });

            // 6. 连续下降(≥2月)
            data.forEach(w => {
                if (w.m2 < w.m1 && w.m3 < w.m2) {
                    risks.continuousDecline.count++;
                    risks.continuousDecline.items.push(w);
                }
            });

            // 7. 项目单一(=1个项目)
            data.forEach(w => {
                if (w.projects.length === 1) {
                    risks.singleProject.count++;
                    risks.singleProject.items.push(w);
                }
            });

            // 8. 项目分散(一个供应商>5个项目)
            const supplierProjects = {};
            data.forEach(w => {
                if (!supplierProjects[w.supplier]) supplierProjects[w.supplier] = new Set();
                w.projects.forEach(p => supplierProjects[w.supplier].add(p));
            });
            Object.entries(supplierProjects).forEach(([supplier, projects]) => {
                if (projects.size > 5) {
                    risks.scatteredProjects.count++;
                    risks.scatteredProjects.items.push({ supplier, count: projects.size });
                }
            });

            return risks;
        }

        // 生成智能洞察
        function generateInsights(data, risks, kpis) {
            const insights = [];
            
            // 洞察1: 整体规模趋势
            if (kpis.m3Change > 0) {
                insights.push(`整体人力呈增长态势，3月较2月增长${kpis.m3Change}%，当前在册${kpis.totalSites}个物理职场，平均规模${kpis.avgSize}人。`);
            } else if (kpis.m3Change < 0) {
                insights.push(`整体人力呈下降趋势，3月较2月减少${Math.abs(kpis.m3Change)}%，需关注职场稳定性。`);
            } else {
                insights.push(`整体人力保持平稳，当前在册${kpis.totalSites}个物理职场，平均规模${kpis.avgSize}人。`);
            }

            // 洞察2: 风险分布
            const highRisks = Object.entries(risks).filter(([k, v]) => v.count > 0);
            if (highRisks.length > 0) {
                const riskNames = highRisks.map(([k, v]) => v.name).slice(0, 3).join('、');
                insights.push(`发现${highRisks.length}类风险信号，重点关注${riskNames}，建议制定针对性管控措施。`);
            }

            // 洞察3: 头部集中度
            if (risks.highConcentration.count > 0) {
                insights.push(`供应商集中度风险显著，头部供应商占比超40%，存在供应链单一依赖风险。`);
            }

            // 洞察4: 微小站点
            if (risks.tinySites.count > 0) {
                insights.push(`存在${risks.tinySites.count}个微小站点(平均<20人)，运营成本效率偏低，建议评估整合或关闭。`);
            }

            // 洞察5: 超大站点
            if (risks.hugeSites.count > 0) {
                insights.push(`存在${risks.hugeSites.count}个超大站点(≥100人)，管理复杂度较高，需关注人员流失和运营风险。`);
            }

            return insights.slice(0, 5);
        }

                    axisLabel: { color: '#333' },
                    splitLine: { lineStyle: { color: '#eee' } }

                    lineStyle: { color: '#000', width: 2 },
                    itemStyle: { color: '#000' },

            data.forEach(w => {

                supplierTotals[w.supplier] += w.m1 + w.m2 + w.m3;
            });
            const sortedSuppliers = Object.entries(supplierTotals)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            charts.supplierDistribution.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },

                    type: 'value',
                    axisLine: { lineStyle: { color: '#ccc' } },

                yAxis: {

                    axisLine: { lineStyle: { color: '#ccc' } },
                    axisLabel: { color: '#333' }

                series: [{
                    type: 'bar',

                    itemStyle: { color: '#000' }
                }]

            // 职场规模分布

            data.forEach(w => {
                const avg = (w.m1 + w.m2 + w.m3) / 3;
                if (avg < 20) sizeRanges['<20']++;

                    projectTotals[p] += w.m1 + w.m2 + w.m3;

        // 更新项目分析Tab
        function updateProjectTab(data) {

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                const tabId = 'tab-' + tab.dataset.tab;
                document.getElementById(tabId).classList.add('active');
                
                currentTab = tab.dataset.tab;
                updateCurrentTab();
            });
        });

        // 更新当前Tab
        function updateCurrentTab() {
            switch(currentTab) {
                case 'workplace':
                    updateWorkplaceTab(filteredData);
                    break;
                case 'supplier':
                    updateSupplierTab(filteredData);
                    break;
                case 'project':
                    updateProjectTab(filteredData);
                    break;
                case 'detail':
                    updateDetailTab(filteredData);
                    break;
            }
        }

        // 更新所有Tab
        function updateAllTabs() {
            const kpis = calculateKPIs(filteredData);
            const risks = analyzeRisks(filteredData);
            const insights = generateInsights(filteredData, risks, kpis);

            renderOverviewKPIs(kpis);
            renderRiskPanel(risks);
            renderInsights(insights);
            updateOverviewCharts(filteredData);
            
            if (currentTab !== 'overview') {
                updateCurrentTab();
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initFilters();
            initCharts();
            updateAllTabs();
        });
    </script>
</body>
</html>
