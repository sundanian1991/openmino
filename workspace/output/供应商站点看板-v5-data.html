<!DOCTYPE html>
<html lang="zh-CN">

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FFFFFF; color: #333333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 16px; }

        /* Header */
        .header { border-bottom: 2px solid #000000; padding: 12px 0; margin-bottom: 16px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #000000; }

        /* Filters */
        .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 13px; color: #333333; }
        .filter-group select { padding: 6px 10px; border: 1px solid #CCCCCC; border-radius: 2px; font-size: 13px; background: #FFFFFF; min-width: 140px; }

        /* KPI Section */
        .kpi-section { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 16px; }
        .kpi-card { border: 1px solid #CCCCCC; border-radius: 2px; padding: 12px; }
        .kpi-label { font-size: 12px; color: #666666; margin-bottom: 4px; }
        .kpi-value { font-size: 28px; font-weight: 700; color: #000000; }
        .kpi-card.highlight { border-color: #E2725B; }
        .kpi-card.highlight .kpi-value { color: #E2725B; }

        /* Charts */
        .charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .chart-card { border: 1px solid #CCCCCC; border-radius: 2px; padding: 12px; }
        .chart-title { font-size: 14px; font-weight: 600; color: #000000; margin-bottom: 8px; border-bottom: 1px solid #CCCCCC; padding-bottom: 6px; }
        .chart-container { height: 280px; }

        /* Table */
        .table-section { border: 1px solid #CCCCCC; border-radius: 2px; overflow: hidden; }
        .table-header { background: #000000; color: #FFFFFF; padding: 10px 12px; font-size: 14px; font-weight: 600; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #000000; color: #FFFFFF; }
        th { padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #000000; white-space: nowrap; }
        td { padding: 6px 10px; border-bottom: 1px solid #CCCCCC; white-space: nowrap; }
        tbody tr:hover { background: #F5F5F5; }
        .num-cell { text-align: right; font-weight: 500; }
        .num-cell.total { font-weight: 700; color: #000000; }

        /* Responsive */
        @media (max-width: 1024px) {
            .kpi-section { grid-template-columns: repeat(3, 1fr); }
            .charts-section { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .kpi-section { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

            // Initialize filters
            const suppliers = [...new Set(workplaces.map(w => w.supplier))].sort();
            const projects = [...new Set(workplaces.map(w => w.project))].sort();
            const bizLines = [...new Set(workplaces.map(w => w.bizLine))].sort();

            const supplierFilter = document.getElementById('supplierFilter');
            const projectFilter = document.getElementById('projectFilter');
            const bizLineFilter = document.getElementById('bizLineFilter');
            const modeFilter = document.getElementById('modeFilter');

            suppliers.forEach(s => { supplierFilter.innerHTML += `<option value="${s}">${s}</option>`; });
            projects.forEach(p => { projectFilter.innerHTML += `<option value="${p}">${p}</option>`; });
            bizLines.forEach(b => { bizLineFilter.innerHTML += `<option value="${b}">${b}</option>`; });

            // Filter function
            function getFilteredData() {
                return workplaces.filter(w => {
                    if (supplierFilter.value && w.supplier !== supplierFilter.value) return false;
                    if (projectFilter.value && w.project !== projectFilter.value) return false;
                    if (bizLineFilter.value && w.bizLine !== bizLineFilter.value) return false;
                    if (modeFilter.value && w.mode !== modeFilter.value) return false;
                    return true;
                });
            }

            // Update KPI
            function updateKPI(data) {
                const sites = data.length;
                const uniqueSuppliers = [...new Set(data.map(w => w.supplier))].length;
                const m1Total = data.reduce((sum, w) => sum + w.m1, 0);
                const m2Total = data.reduce((sum, w) => sum + w.m2, 0);
                const m3Total = data.reduce((sum, w) => sum + w.m3, 0);
                const change = m2Total > 0 ? ((m3Total - m2Total) / m2Total * 100).toFixed(1) : 0;

                document.getElementById('kpiSites').textContent = sites;
                document.getElementById('kpiSuppliers').textContent = uniqueSuppliers;
                document.getElementById('kpiM1').textContent = m1Total;
                document.getElementById('kpiM2').textContent = m2Total;
                document.getElementById('kpiM3').textContent = m3Total;
                document.getElementById('kpiChange').textContent = change + '%';
            }

            // Update Supplier Chart
            function updateSupplierChart(data) {
                const supplierTotals = {};
                data.forEach(w => {
                    if (!supplierTotals[w.supplier]) supplierTotals[w.supplier] = { m1: 0, m2: 0, m3: 0 };
                    supplierTotals[w.supplier].m1 += w.m1;
                    supplierTotals[w.supplier].m2 += w.m2;
                    supplierTotals[w.supplier].m3 += w.m3;
                });

                const sorted = Object.entries(supplierTotals)
                    .sort((a, b) => (b[1].m1 + b[1].m2 + b[1].m3) - (a[1].m1 + a[1].m2 + a[1].m3))
                    .slice(0, 10);

                const chart = echarts.init(document.getElementById('supplierChart'));
                chart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    legend: { top: 0, textStyle: { color: '#333333' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: sorted.map(s => s[0]), axisLabel: { color: '#333333', fontSize: 11 }, axisLine: { lineStyle: { color: '#CCCCCC' } } },
                    yAxis: { type: 'value', axisLabel: { color: '#333333' }, axisLine: { lineStyle: { color: '#CCCCCC' } }, splitLine: { lineStyle: { color: '#E5E5E5' } } },
                    series: [
                        { name: '1月', type: 'bar', data: sorted.map(s => s[1].m1), itemStyle: { color: '#000000' } },
                        { name: '2月', type: 'bar', data: sorted.map(s => s[1].m2), itemStyle: { color: '#666666' } },
                        { name: '3月', type: 'bar', data: sorted.map(s => s[1].m3), itemStyle: { color: '#CCCCCC' } }
                    ]
                });
            }

            // Update BizLine Chart
            function updateBizLineChart(data) {
                const bizLineTotals = {};
                data.forEach(w => {
                    if (!bizLineTotals[w.bizLine]) bizLineTotals[w.bizLine] = 0;
                    bizLineTotals[w.bizLine] += w.m1 + w.m2 + w.m3;
                });

                const sorted = Object.entries(bizLineTotals).sort((a, b) => b[1] - a[1]);

                const chart = echarts.init(document.getElementById('bizLineChart'));
                chart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'value', axisLabel: { color: '#333333' }, axisLine: { lineStyle: { color: '#CCCCCC' } }, splitLine: { lineStyle: { color: '#E5E5E5' } } },
                    yAxis: { type: 'category', data: sorted.map(b => b[0]), axisLabel: { color: '#333333', fontSize: 11 }, axisLine: { lineStyle: { color: '#CCCCCC' } } },
                    series: [
                        { type: 'bar', data: sorted.map(b => b[1]), itemStyle: { color: '#000000' }, barWidth: 20 }
                    ]
                });
            }

            // Update Table
            function updateTable(data) {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                data.forEach(w => {
                    const total = w.m1 + w.m2 + w.m3;
                    tbody.innerHTML += `<tr>
                        <td>${w.supplier}</td>
                        <td>${w.site}</td>
                        <td>${w.mode}</td>
                        <td>${w.project}</td>
                        <td>${w.bizLine}</td>
                        <td>${w.province}</td>
                        <td>${w.city}</td>
                        <td class="num-cell">${w.m1}</td>
                        <td class="num-cell">${w.m2}</td>
                        <td class="num-cell">${w.m3}</td>
                        <td class="num-cell total">${total}</td>
                    </tr>`;
                });
                document.getElementById('tableCount').textContent = data.length;
            }

            // Update all
            function updateAll() {
                const data = getFilteredData();
                updateKPI(data);
                updateSupplierChart(data);
                updateBizLineChart(data);
                updateTable(data);
            }

            // Event listeners
            [supplierFilter, projectFilter, bizLineFilter, modeFilter].forEach(f => {
                f.addEventListener('change', updateAll);
            });

            // Initial render
            updateAll();

            // Resize charts
            window.addEventListener('resize', () => {
                echarts.getInstanceByDom(document.getElementById('supplierChart')).resize();
                echarts.getInstanceByDom(document.getElementById('bizLineChart')).resize();
            });
        });
