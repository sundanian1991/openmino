<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- Background -->
  <rect fill="#f5f0e8" width="960" height="540"/>

  <!-- Center frame -->
  <rect fill="none" stroke="#a0845c" stroke-width="1" x="180" y="80" width="600" height="380"/>
  <rect fill="none" stroke="#b8b0a4" stroke-width="1" x="200" y="100" width="560" height="340"/>

  <!-- Closing text inside the frame -->
  <text fill="#2c2c2c" x="480" y="170" text-anchor="middle" font-size="32" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    龙虾还是那只龙虾
  </text>

  <line stroke="#b8b0a4" stroke-width="1" x1="380" y1="190" x2="580" y2="190"/>

  <text fill="#8a7e6e" x="480" y="230" text-anchor="middle" font-size="16" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    但养龙虾的人，已经不一样了
  </text>

  <text fill="#8a7e6e" x="480" y="270" text-anchor="middle" font-size="14" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    100 天，从调试到体系，从摸索到产出
  </text>
  <text fill="#8a7e6e" x="480" y="296" text-anchor="middle" font-size="14" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    不是 AI 替代人，是 AI 放大人
  </text>

  <text fill="#8a7e6e" x="480" y="350" text-anchor="middle" font-size="13" font-style="italic" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    "日常中的每一步，都有重量。"
  </text>

  <text fill="#8a7e6e" x="480" y="380" text-anchor="middle" font-size="11" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    《步履不停》，是枝裕和，2008
  </text>

  <!-- Bottom accent -->
  <rect fill="#a0845c" x="440" y="480" width="80" height="3"/>
</svg>
