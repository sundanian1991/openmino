  </text>
  <circle fill="#7a8b6f" cx="516" cy="348" r="3"/>
  <text fill="#2c2c2c" x="532" y="352" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    每日书信：十年记忆切片自动推送
  </text>
  <circle fill="#7a8b6f" cx="516" cy="384" r="3"/>
  <text fill="#2c2c2c" x="532" y="388" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    浏览器自动化、数据抓取、研究代理
  </text>
  <circle fill="#7a8b6f" cx="516" cy="420" r="3"/>
  <text fill="#2c2c2c" x="532" y="424" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
