<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <rect fill="#f5f0e8" width="960" height="540"/>

  <!-- Action Title -->
  <rect fill="#a0845c" x="48" y="36" width="3" height="24"/>
  <text fill="#2c2c2c" x="64" y="54" font-size="18" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    第二个月：开始建体系
  </text>
  <text fill="#8a7e6e" x="64" y="78" font-size="11" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    建构期 · 第 31-60 天
  </text>
  <line stroke="#b8b0a4" stroke-width="1" x1="48" y1="96" x2="912" y2="96"/>

  <!-- Left column: Memory System -->
  <rect fill="#ede7db" x="48" y="116" width="424" height="380" rx="2"/>
  <circle fill="#a0845c" cx="72" cy="148" r="10"/>
  <text fill="#f5f0e8" x="72" y="153" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif">M</text>
  <text fill="#2c2c2c" x="96" y="144" font-size="16" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    记忆系统搭建
  </text>
  <text fill="#8a7e6e" x="96" y="164" font-size="11" font-family="Source Han Sans SC, PingFang SC, sans-serif">
