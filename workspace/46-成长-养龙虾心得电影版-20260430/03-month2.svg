  <line stroke="#b8b0a4" stroke-width="1" x1="504" y1="180" x2="896" y2="180"/>

  <circle fill="#7a8b6f" cx="516" cy="204" r="3"/>
  <text fill="#2c2c2c" x="532" y="208" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
