  </text>
  <circle fill="#a0845c" cx="76" cy="420" r="3"/>
  <text fill="#2c2c2c" x="92" y="424" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    ~90 条核心记忆已入库
  </text>

  <!-- Right column: Skill Ecosystem -->
  <rect fill="#ede7db" x="488" y="116" width="424" height="380" rx="2"/>
  <circle fill="#7a8b6f" cx="512" cy="148" r="10"/>
  <text fill="#f5f0e8" x="512" y="153" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif">S</text>
  <text fill="#2c2c2c" x="536" y="144" font-size="16" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
