  </text>
  <line stroke="#b8b0a4" stroke-width="1" x1="64" y1="180" x2="456" y2="180"/>

  <circle fill="#a0845c" cx="76" cy="204" r="3"/>
  <text fill="#2c2c2c" x="92" y="208" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    核心记忆：用户画像、组织结构、工作规范
  </text>
  <circle fill="#a0845c" cx="76" cy="240" r="3"/>
  <text fill="#2c2c2c" x="92" y="244" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    WAL 协议：关键信息先写后答
  </text>
  <circle fill="#a0845c" cx="76" cy="276" r="3"/>
  <text fill="#2c2c2c" x="92" y="280" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
