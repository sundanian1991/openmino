<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <rect fill="#f5f0e8" width="960" height="540"/>

  <!-- Action Title -->
  <rect fill="#a0845c" x="48" y="36" width="3" height="24"/>
  <text fill="#2c2c2c" x="64" y="54" font-size="18" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    方法论：从坑里爬出来的 8 条经验
  </text>
  <text fill="#8a7e6e" x="64" y="78" font-size="11" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    每一条都是踩过坑之后才懂的
  </text>
  <line stroke="#b8b0a4" stroke-width="1" x1="48" y1="96" x2="912" y2="96"/>

  <!-- 8 items in 2-column grid -->
  <rect fill="#ede7db" x="48" y="116" width="424" height="48" rx="2"/>
  <text fill="#a0845c" x="64" y="136" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">01</text>
  <text fill="#2c2c2c" x="100" y="136" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">不写下来，就是白做</text>

  <rect fill="#ede7db" x="488" y="116" width="424" height="48" rx="2"/>
  <text fill="#7a8b6f" x="504" y="136" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">02</text>
  <text fill="#2c2c2c" x="540" y="136" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">先跑起来，再追求完美</text>

  <rect fill="#ede7db" x="48" y="180" width="424" height="48" rx="2"/>
  <text fill="#a0845c" x="64" y="200" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">03</text>
  <text fill="#2c2c2c" x="100" y="200" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">体系比工具更重要</text>

  <rect fill="#ede7db" x="488" y="180" width="424" height="48" rx="2"/>
  <text fill="#7a8b6f" x="504" y="200" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">04</text>
  <text fill="#2c2c2c" x="540" y="200" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">每次只解决一个问题</text>

  <rect fill="#ede7db" x="48" y="244" width="424" height="48" rx="2"/>
  <text fill="#a0845c" x="64" y="264" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">05</text>
  <text fill="#2c2c2c" x="100" y="264" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">让 AI 理解你的语境</text>

  <rect fill="#ede7db" x="488" y="244" width="424" height="48" rx="2"/>
  <text fill="#7a8b6f" x="504" y="264" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">06</text>
  <text fill="#2c2c2c" x="540" y="264" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">复利来自持续迭代</text>

  <rect fill="#ede7db" x="48" y="308" width="424" height="48" rx="2"/>
  <text fill="#a0845c" x="64" y="328" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">07</text>
  <text fill="#2c2c2c" x="100" y="328" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">边界清晰才能放手</text>

  <rect fill="#ede7db" x="488" y="308" width="424" height="48" rx="2"/>
  <text fill="#7a8b6f" x="504" y="328" font-size="14" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">08</text>
  <text fill="#2c2c2c" x="540" y="328" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">龙虾还是那只龙虾</text>

  <!-- Bottom quote -->
  <text fill="#8a7e6e" x="480" y="430" text-anchor="middle" font-size="13" font-style="italic" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    "没人看到，不等于不存在。"
  </text>
  <text fill="#8a7e6e" x="480" y="456" text-anchor="middle" font-size="12" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    ——《无人知晓》，是枝裕和，2004
  </text>
</svg>
