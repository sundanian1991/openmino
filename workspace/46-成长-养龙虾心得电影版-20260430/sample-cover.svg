<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <style>
      .bg { fill: #f5f0e8; }
      .surface { fill: #ede7db; }
      .text-primary { fill: #2c2c2c; font-family: "Songti SC", "Source Han Serif SC", "SimSun", serif; }
      .text-secondary { fill: #8a7e6e; font-family: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .accent { fill: #a0845c; }
      .divider { stroke: #b8b0a4; stroke-width: 1; }
      .frame-line { stroke: #a0845c; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="960" height="540"/>

  <!-- Frame within frame: outer border -->
  <rect class="frame-line" x="48" y="48" width="864" height="444" fill="none" rx="0"/>

  <!-- Frame within frame: inner subtle border -->
  <rect class="divider" x="64" y="64" width="832" height="412" fill="none" rx="0"/>

  <!-- Title area: centered, serif, large -->
  <text class="text-primary" x="480" y="200" text-anchor="middle" font-size="36" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    养龙虾心得电影版
  </text>

  <!-- Subtitle -->
  <text class="text-secondary" x="480" y="240" text-anchor="middle" font-size="16" font-family="Source Han Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    100 天 AI 共生纪实
  </text>

  <!-- Decorative divider line -->
  <line class="divider" x1="380" y1="268" x2="580" y2="268"/>

  <!-- Date / attribution -->
  <text class="text-secondary" x="480" y="300" text-anchor="middle" font-size="13" font-family="Source Han Sans SC, PingFang SC, Microsoft YaHei, sans-serif">
    供应商管理岗 · 2026
  </text>

  <!-- Bottom accent: warm brown horizontal rule -->
  <rect class="accent" x="440" y="420" width="80" height="3" rx="0"/>
</svg>
