<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- Background: warm paper -->
  <rect fill="#f5f0e8" width="960" height="540"/>

  <!-- Left decorative panel: "diary page" feel -->
  <rect fill="#ede7db" x="0" y="0" width="400" height="540"/>
  <line stroke="#d4c9b8" stroke-width="1" x1="400" y1="0" x2="400" y2="540"/>

  <!-- Date stamp on left panel -->
  <text fill="#8a7e6e" x="200" y="60" text-anchor="middle" font-size="12" font-family="Source Han Sans SC, PingFang SC, sans-serif" letter-spacing="4">
    二 零 二 六
  </text>

  <!-- Decorative frame on left - like a photo slot -->
  <rect fill="none" stroke="#d4c9b8" stroke-width="1" x="100" y="120" width="200" height="260"/>
  <rect fill="none" stroke="#a0845c" stroke-width="1" x="108" y="128" width="184" height="244"/>

  <!-- Subtle pattern in the frame: horizontal lines like ruled paper -->
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="160" x2="284" y2="160"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="180" x2="284" y2="180"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="200" x2="284" y2="200"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="220" x2="284" y2="220"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="240" x2="284" y2="240"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="260" x2="284" y2="260"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="280" x2="284" y2="280"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="300" x2="284" y2="300"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="320" x2="284" y2="320"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="340" x2="284" y2="340"/>
  <line stroke="#d4c9b8" stroke-width="0.5" x1="116" y1="360" x2="240" y2="360"/>

  <!-- Small accent dot -->
  <circle fill="#a0845c" cx="200" cy="430" r="4"/>
  <text fill="#8a7e6e" x="200" y="460" text-anchor="middle" font-size="11" font-family="Songti SC, Source Han Serif SC, serif" font-style="italic">
    100 天
  </text>

  <!-- Right side: title area with more visual weight -->
  <rect fill="#a0845c" x="460" y="140" width="40" height="4"/>

  <text fill="#2c2c2c" x="460" y="210" font-size="42" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    养龙虾
  </text>
  <text fill="#2c2c2c" x="460" y="260" font-size="42" font-weight="bold" font-family="Songti SC, Source Han Serif SC, SimSun, serif">
    心得电影版
  </text>

  <line stroke="#b8b0a4" stroke-width="1" x1="460" y1="290" x2="620" y2="290"/>

  <text fill="#8a7e6e" x="460" y="320" font-size="18" font-family="Songti SC, Source Han Serif SC, serif">
    供应商管理岗的 100 天 AI 共生纪实
  </text>

  <text fill="#8a7e6e" x="460" y="370" font-size="13" font-family="Source Han Sans SC, PingFang SC, sans-serif">
    从调试到体系 · 从摸索到产出 · 从一个人的实验到一群人的工具
  </text>

  <!-- Bottom right small text -->
  <text fill="#b8b0a4" x="460" y="490" font-size="11" font-family="Source Han Sans SC, PingFang SC, sans-serif" letter-spacing="2">
    AI AGENT · 2026
  </text>
</svg>
