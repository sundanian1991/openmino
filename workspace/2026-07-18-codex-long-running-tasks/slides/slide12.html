<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 30pt 50pt 0 50pt;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 14pt 0;
  font-weight: bold;
}
.statement {
  font-family: Georgia, serif;
  font-size: 22pt;
  line-height: 1.4;
  color: #141413;
  margin: 0;
  letter-spacing: -0.3pt;
}
.statement em {
  color: #d97757;
  font-style: italic;
  font-weight: bold;
}
.checklist-title {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 32pt 0 14pt 0;
  font-weight: bold;
}
.check-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14pt;
}
.check-card {
  background: #ffffff;
  border-top: 3pt solid #d97757;
  padding: 14pt 16pt;
}
.check-num {
  font-family: Arial, sans-serif;
  font-size: 18pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 1;
}
.check-title {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  color: #141413;
  font-weight: bold;
  margin: 8pt 0 4pt 0;
}
.check-desc {
  font-family: Georgia, serif;
  font-size: 10pt;
  color: #141413;
  margin: 0;
  line-height: 1.4;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">06 · 适用边界</p>
  <p class="page-num">12 / 15</p>
</div>

<div class="main">
  <p class="kicker">WHEN TO USE · 适用边界</p>
  <p class="statement">这套架构并非适用于所有任务。<em>仅当项目同时满足以下三个特征</em>时，投入产出比最高。</p>

  <p class="checklist-title">三项触发条件</p>
  <div class="check-grid">
    <div class="check-card">
      <p class="check-num">01</p>
      <p class="check-title">持续涌现新信息</p>
      <p class="check-desc">项目推进中不断出现需要重新判断的新证据</p>
    </div>
    <div class="check-card">
      <p class="check-num">02</p>
      <p class="check-title">多块独立并行</p>
      <p class="check-desc">可拆分为多个互不阻塞的并行子任务</p>
    </div>
    <div class="check-card">
      <p class="check-num">03</p>
      <p class="check-title">多环境验证</p>
      <p class="check-desc">需要多个不同环境（远程 + 本地）的验证证据</p>
    </div>
  </div>
</div>
</body>
</html>
