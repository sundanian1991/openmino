<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 26pt 50pt 0 50pt;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 12pt 0;
  font-weight: bold;
}
.statement {
  font-family: Georgia, serif;
  font-size: 18pt;
  line-height: 1.45;
  color: #141413;
  margin: 0;
  letter-spacing: -0.2pt;
}
.statement em {
  color: #d97757;
  font-style: italic;
  font-weight: bold;
}
.pillars {
  display: flex;
  gap: 16pt;
  margin: 26pt 0 0 0;
  flex: 1;
}
.pillar {
  flex: 1;
  background: #ffffff;
  border-top: 5pt solid #d97757;
  padding: 18pt 16pt;
  display: flex;
  flex-direction: column;
}
.pillar-num {
  font-family: Arial, sans-serif;
  font-size: 36pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 0.9;
  letter-spacing: -1.5pt;
}
.pillar-title {
  font-family: Arial, sans-serif;
  font-size: 13pt;
  color: #141413;
  font-weight: bold;
  margin: 12pt 0 8pt 0;
  line-height: 1.2;
}
.pillar-desc {
  font-family: Georgia, serif;
  font-size: 10.5pt;
  color: #141413;
  margin: 0;
  line-height: 1.5;
}
.pillar-tag-wrap {
  border-top: 1pt solid #e8e6dc;
  padding: 8pt 0 0 0;
  margin: 10pt 0 0 0;
}
.pillar-tag {
  font-family: Arial, sans-serif;
  font-size: 8pt;
  letter-spacing: 1.5pt;
  color: #6a9bcc;
  margin: 0;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">08 · 底层三要素</p>
  <p class="page-num">14 / 15</p>
</div>

<div class="main">
  <p class="kicker">THE THREE PILLARS · 三个朴素原则</p>
  <p class="statement">真正支撑长周期任务不翻车的，<em>并非更强的模型能力</em>，而是三个朴素原则。</p>

  <div class="pillars">
    <div class="pillar">
      <p class="pillar-num">01</p>
      <p class="pillar-title">持久锚点</p>
      <p class="pillar-desc">持久 Goal 与 GOALS.md 为 AI 提供不会漂移的锚点</p>
      <div class="pillar-tag-wrap"><p class="pillar-tag">ANTI-DRIFT</p></div>
    </div>
    <div class="pillar">
      <p class="pillar-num">02</p>
      <p class="pillar-title">多层验收</p>
      <p class="pillar-desc">里程碑审计与 /review 为项目设置多层验收关卡</p>
      <div class="pillar-tag-wrap"><p class="pillar-tag">QUALITY GATES</p></div>
    </div>
    <div class="pillar">
      <p class="pillar-num">03</p>
      <p class="pillar-title">状态外置</p>
      <p class="pillar-desc">简报与仪表盘将项目状态外置，避免信息仅存于线程上下文</p>
      <div class="pillar-tag-wrap"><p class="pillar-tag">EXTERNALIZED STATE</p></div>
    </div>
  </div>
</div>
</body>
</html>
