<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.top-band {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.brand-tag {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #141413;
  font-weight: bold;
}
.accent-dot {
  width: 10pt; height: 10pt;
  background: #d97757;
  border-radius: 50%;
}
.date-tag {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 0 50pt;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  letter-spacing: 4pt;
  color: #d97757;
  font-weight: bold;
  margin: 0 0 18pt 0;
}
.title {
  font-family: Arial, sans-serif;
  font-size: 44pt;
  line-height: 1.08;
  color: #141413;
  font-weight: bold;
  margin: 0;
  letter-spacing: -0.5pt;
}
.title-accent {
  color: #d97757;
}
.subtitle {
  font-family: Georgia, serif;
  font-size: 15pt;
  font-style: italic;
  color: #141413;
  margin: 22pt 0 0 0;
  line-height: 1.5;
}
.rule {
  width: 60pt;
  height: 3pt;
  background: #141413;
  margin: 26pt 0 0 0;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 50pt 28pt 50pt;
}
.footer-left {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.footer-right {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
</style>
</head>
<body>
<div class="top-band">
  <div style="display: flex; align-items: center; gap: 12pt;">
    <div class="accent-dot"></div>
    <p class="brand-tag">CODEX · DEEP DIVE</p>
  </div>
  <p class="date-tag">2026 · 技术深度解析</p>
</div>

<div class="main">
  <p class="kicker">AI 协作 · 长周期任务</p>
  <h1 class="title">让 Codex 长周期<br>大项目<span class="title-accent">不跑偏</span></h1>
  <p class="subtitle">OpenAI 工程师分享的 5 个 AI 协作习惯<br>—— 从"放养式使用"到"带领 AI 团队作战"</p>
  <div class="rule"></div>
</div>

<div class="footer">
  <p class="footer-left">基于 Gabriel Chua《Collaborating with Codex on Long-Running Tasks》</p>
  <p class="footer-right">01 / 15</p>
</div>
</body>
</html>
