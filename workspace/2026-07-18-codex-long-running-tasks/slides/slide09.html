<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.habit-tag {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.body-area {
  display: flex;
  padding: 20pt 50pt 0 50pt;
  gap: 36pt;
  flex: 1;
}
.left-col {
  width: 42%;
  display: flex;
  flex-direction: column;
}
.right-col {
  width: 58%;
  display: flex;
  flex-direction: column;
}
.big-num {
  font-family: Arial, sans-serif;
  font-size: 84pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 0.9;
  letter-spacing: -4pt;
}
.habit-name {
  font-family: Arial, sans-serif;
  font-size: 24pt;
  color: #141413;
  font-weight: bold;
  margin: 10pt 0 0 0;
  line-height: 1.15;
  letter-spacing: -0.3pt;
}
.habit-def {
  font-family: Georgia, serif;
  font-size: 12pt;
  font-style: italic;
  color: #141413;
  margin: 14pt 0 0 0;
  line-height: 1.5;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
  margin: 0 0 10pt 0;
  font-weight: bold;
}
.locality-intro {
  font-family: Georgia, serif;
  font-size: 11pt;
  line-height: 1.55;
  color: #141413;
  margin: 0 0 10pt 0;
}
.local-tasks {
  display: flex;
  flex-wrap: wrap;
  gap: 6pt;
  margin: 0 0 12pt 0;
}
.task-chip {
  background: #e8e6dc;
  padding: 5pt 10pt;
}
.task-chip p {
  font-family: Arial, sans-serif;
  font-size: 9.5pt;
  color: #141413;
  margin: 0;
}
.flow-title {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 0 0 8pt 0;
  font-weight: bold;
}
.flow-steps {
  display: flex;
  align-items: center;
  gap: 4pt;
  margin: 0 0 10pt 0;
}
.flow-node {
  background: #ffffff;
  border: 1pt solid #e8e6dc;
  padding: 6pt 8pt;
  font-family: Arial, sans-serif;
  font-size: 8.5pt;
  color: #141413;
  text-align: center;
  flex: 1;
}
.flow-node.local {
  background: #d97757;
  border: none;
}
.flow-node.local p { color: #faf9f5; }
.flow-arrow-s {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  color: #b0aea5;
  margin: 0;
}
.flow-node p {
  font-family: Arial, sans-serif;
  font-size: 8.5pt;
  margin: 0;
  line-height: 1.2;
}
.value-card {
  background: #141413;
  padding: 12pt 16pt;
  margin: 6pt 0 0 0;
}
.value-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 0 0 5pt 0;
  font-weight: bold;
}
.value-text {
  font-family: Georgia, serif;
  font-size: 11pt;
  color: #faf9f5;
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="header">
  <p class="habit-tag">HABIT 04 · 本地线程校验</p>
  <p class="page-num">09 / 15</p>
</div>

<div class="body-area">
  <div class="left-col">
    <p class="big-num">04</p>
    <h2 class="habit-name">本机测试<br>交给本地线程</h2>
    <p class="habit-def">远程持续运行，本地专属校验，两套环境协同闭环。</p>
  </div>

  <div class="right-col">
    <p class="kicker">仅委派给本地线程的任务</p>
    <p class="locality-intro">远程实例承载绝大多数任务，仅以下依赖本机环境者例外：</p>
    <div class="local-tasks">
      <div class="task-chip"><p>登录态浏览器</p></div>
      <div class="task-chip"><p>本地凭据</p></div>
      <div class="task-chip"><p>Xcode</p></div>
      <div class="task-chip"><p>macOS 权限</p></div>
      <div class="task-chip"><p>iOS 模拟器</p></div>
    </div>

    <p class="flow-title">典型闭环流程</p>
    <div class="flow-steps">
      <div class="flow-node"><p>远程实现</p></div>
      <p class="flow-arrow-s">→</p>
      <div class="flow-node"><p>远程测试</p></div>
      <p class="flow-arrow-s">→</p>
      <div class="flow-node local"><p>本地校验</p></div>
      <p class="flow-arrow-s">→</p>
      <div class="flow-node"><p>远程修复</p></div>
      <p class="flow-arrow-s">→</p>
      <div class="flow-node local"><p>本地复测</p></div>
    </div>

    <div class="value-card">
      <p class="value-label">CORE VALUE · 核心价值</p>
      <p class="value-text">兼顾远程持续运行与本地专属校验，远程线程可等待本地环境就绪后继续推进</p>
    </div>
  </div>
</div>
</body>
</html>
