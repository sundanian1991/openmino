<!DOCTYPE html>
<html>
<head>
<style>
html { background: #141413; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #141413;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 36pt 50pt 0 50pt;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 18pt 0;
  font-weight: bold;
}
.big-statement {
  font-family: Georgia, serif;
  font-size: 28pt;
  line-height: 1.35;
  color: #faf9f5;
  margin: 0;
  letter-spacing: -0.3pt;
  font-style: italic;
}
.big-statement b {
  color: #d97757;
  font-style: normal;
  font-family: Arial, sans-serif;
  font-weight: bold;
}
.role-shift {
  display: flex;
  gap: 20pt;
  margin: 36pt 0 0 0;
  align-items: stretch;
}
.role-before {
  flex: 1;
  padding: 16pt;
  border: 1pt solid #b0aea5;
}
.role-after {
  flex: 1;
  padding: 16pt;
  background: #d97757;
}
.role-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
  margin: 0 0 8pt 0;
  font-weight: bold;
}
.role-after .role-label { color: #141413; }
.role-name {
  font-family: Arial, sans-serif;
  font-size: 16pt;
  color: #faf9f5;
  font-weight: bold;
  margin: 0 0 6pt 0;
}
.role-after .role-name { color: #141413; }
.role-desc {
  font-family: Georgia, serif;
  font-size: 11pt;
  color: #e8e6dc;
  margin: 0;
  line-height: 1.5;
}
.role-after .role-desc { color: #141413; }
.arrow-mid {
  font-family: Arial, sans-serif;
  font-size: 24pt;
  color: #d97757;
  margin: 0;
  align-self: center;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">07 · 范式升级</p>
  <p class="page-num">13 / 15</p>
</div>

<div class="main">
  <p class="kicker">PARADIGM SHIFT · 范式升级本质</p>
  <p class="big-statement">核心不是工具技巧，而是 <b>AI 时代的新型项目管理</b>——开发者从执行者，转变为带领 AI 团队的技术负责人。</p>

  <div class="role-shift">
    <div class="role-before">
      <p class="role-label">BEFORE · 过去</p>
      <p class="role-name">亲自写代码的<br>执行者</p>
      <p class="role-desc">自己完成所有实现，AI 是辅助工具</p>
    </div>
    <p class="arrow-mid">→</p>
    <div class="role-after">
      <p class="role-label">AFTER · 现在</p>
      <p class="role-name">带领 AI 团队的<br>技术负责人</p>
      <p class="role-desc">定目标 · 拆里程碑 · 委派 · 验收 · 控全局</p>
    </div>
  </div>
</div>
</body>
</html>
