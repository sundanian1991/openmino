<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 40pt 50pt 0 50pt;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 20pt 0;
  font-weight: bold;
}
.statement {
  font-family: Georgia, serif;
  font-size: 26pt;
  line-height: 1.4;
  color: #141413;
  margin: 0;
  letter-spacing: -0.3pt;
}
.statement em {
  color: #d97757;
  font-style: italic;
  font-weight: bold;
}
.statement b {
  font-family: Arial, sans-serif;
  font-style: normal;
  font-weight: bold;
}
.dual-req {
  display: flex;
  gap: 24pt;
  margin: 36pt 0 0 0;
}
.req-card {
  flex: 1;
  background: #ffffff;
  border-top: 4pt solid #d97757;
  padding: 20pt 22pt;
}
.req-card.alt {
  border-top: 4pt solid #6a9bcc;
}
.req-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 0 0 10pt 0;
  font-weight: bold;
}
.req-card.alt .req-label { color: #6a9bcc; }
.req-title {
  font-family: Arial, sans-serif;
  font-size: 15pt;
  color: #141413;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
.req-desc {
  font-family: Georgia, serif;
  font-size: 11pt;
  line-height: 1.55;
  color: #141413;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">03 · 核心难题</p>
  <p class="page-num">04 / 15</p>
</div>

<div class="main">
  <p class="kicker">THE CORE TENSION</p>
  <p class="statement">通过 <b>/goal</b> 指令设定持久目标后，Codex 容易在推进中<em>偏离方向</em>——理想的协作模式，需要同时满足两个看似矛盾的要求。</p>

  <div class="dual-req">
    <div class="req-card">
      <p class="req-label">REQUIREMENT 01</p>
      <p class="req-title">守住核心目标</p>
      <p class="req-desc">牢牢锚定项目最初定义的方向与"完成定义"，不允许随对话漂移</p>
    </div>
    <div class="req-card alt">
      <p class="req-label">REQUIREMENT 02</p>
      <p class="req-title">保留调整弹性</p>
      <p class="req-desc">为用户和 AI 预留根据新证据动态调整计划的空间，而非僵硬执行</p>
    </div>
  </div>
</div>
</body>
</html>
