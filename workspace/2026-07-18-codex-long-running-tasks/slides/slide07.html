<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.habit-tag {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.body-area {
  display: flex;
  padding: 14pt 50pt 0 50pt;
  gap: 36pt;
  flex: 1;
}
.left-col {
  width: 42%;
  display: flex;
  flex-direction: column;
}
.right-col {
  width: 58%;
  display: flex;
  flex-direction: column;
}
.big-num {
  font-family: Arial, sans-serif;
  font-size: 84pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 0.9;
  letter-spacing: -4pt;
}
.habit-name {
  font-family: Arial, sans-serif;
  font-size: 22pt;
  color: #141413;
  font-weight: bold;
  margin: 8pt 0 0 0;
  line-height: 1.15;
  letter-spacing: -0.3pt;
}
.habit-def {
  font-family: Georgia, serif;
  font-size: 12pt;
  font-style: italic;
  color: #141413;
  margin: 14pt 0 0 0;
  line-height: 1.5;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
  margin: 0 0 10pt 0;
  font-weight: bold;
}
.focus-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10pt;
  margin: 0 0 14pt 0;
}
.focus-item {
  background: #ffffff;
  border: 1.5pt solid #e8e6dc;
  padding: 10pt;
}
.focus-num {
  font-family: Arial, sans-serif;
  font-size: 20pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 1;
}
.focus-label {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  color: #141413;
  margin: 5pt 0 0 0;
  font-weight: bold;
}
.step-text {
  font-family: Georgia, serif;
  font-size: 11pt;
  line-height: 1.55;
  color: #141413;
  margin: 0 0 12pt 0;
}
.value-card {
  background: #141413;
  padding: 14pt 16pt;
  margin: 4pt 0 0 0;
}
.value-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 0 0 6pt 0;
  font-weight: bold;
}
.value-text {
  font-family: Georgia, serif;
  font-size: 11pt;
  color: #faf9f5;
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="header">
  <p class="habit-tag">HABIT 02 · 主线程协调</p>
  <p class="page-num">07 / 15</p>
</div>

<div class="body-area">
  <div class="left-col">
    <p class="big-num">02</p>
    <h2 class="habit-name">主线程仅负责<br>全局协调</h2>
    <p class="habit-def">不陷入实现细节，统筹全局同时保证每块工作可独立追溯。</p>
  </div>

  <div class="right-col">
    <p class="kicker">主线程只聚焦 4 件事</p>
    <div class="focus-grid">
      <div class="focus-item">
        <p class="focus-num">01</p>
        <p class="focus-label">目标 Goal</p>
      </div>
      <div class="focus-item">
        <p class="focus-num">02</p>
        <p class="focus-label">约束 Constraint</p>
      </div>
      <div class="focus-item">
        <p class="focus-num">03</p>
        <p class="focus-label">决策 Decision</p>
      </div>
      <div class="focus-item">
        <p class="focus-num">04</p>
        <p class="focus-label">状态 Status</p>
      </div>
    </div>

    <p class="step-text">可回溯的任务使用<b>独立 thread</b> 存储完整历史；临时任务直接委派给 <b>subagent</b>。主线程决定任务委派方向、评估执行结果，不承载实现细节。</p>

    <div class="value-card">
      <p class="value-label">CORE VALUE · 核心价值</p>
      <p class="value-text">统筹全局的同时保证每块工作可独立追溯，支持多任务并行推进</p>
    </div>
  </div>
</div>
</body>
</html>
