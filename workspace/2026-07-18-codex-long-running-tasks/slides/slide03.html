<!DOCTYPE html>
<html>
<head>
<style>
html { background: #141413; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #141413;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 32pt 50pt 0 50pt;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 14pt 0;
  font-weight: bold;
}
.big-name {
  font-family: Georgia, serif;
  font-size: 34pt;
  color: #faf9f5;
  margin: 0;
  font-style: italic;
  letter-spacing: -0.5pt;
}
.role-line {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  color: #d97757;
  margin: 10pt 0 0 0;
  letter-spacing: 1pt;
  font-weight: bold;
}
.stats-row {
  display: flex;
  gap: 44pt;
  margin: 26pt 0 0 0;
}
.stat-block {
  display: flex;
  flex-direction: column;
}
.stat-num {
  font-family: Arial, sans-serif;
  font-size: 44pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 1;
  letter-spacing: -2pt;
}
.stat-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  color: #faf9f5;
  letter-spacing: 2pt;
  margin: 8pt 0 0 0;
  font-weight: bold;
}
.stat-sub {
  font-family: Georgia, serif;
  font-size: 10pt;
  color: #b0aea5;
  margin: 4pt 0 0 0;
  font-style: italic;
}
.footer {
  padding: 0 50pt 36pt 50pt;
}
.quote-wrap {
  border-left: 3pt solid #d97757;
  padding: 4pt 0 4pt 16pt;
}
.quote {
  font-family: Georgia, serif;
  font-size: 13pt;
  font-style: italic;
  color: #e8e6dc;
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">02 · 作者与影响力</p>
  <p class="page-num">03 / 15</p>
</div>

<div class="main">
  <p class="kicker">来自一线工程师的实战笔记</p>
  <h2 class="big-name">Gabriel Chua</h2>
  <p class="role-line">OpenAI · CODEX DX ENGINEER</p>

  <div class="stats-row">
    <div class="stat-block">
      <p class="stat-num">89万</p>
      <p class="stat-label">VIEWS</p>
      <p class="stat-sub">全网浏览量</p>
    </div>
    <div class="stat-block">
      <p class="stat-num">5</p>
      <p class="stat-label">HABITS</p>
      <p class="stat-sub">核心协作习惯</p>
    </div>
    <div class="stat-block">
      <p class="stat-num">∞</p>
      <p class="stat-label">PORTABLE</p>
      <p class="stat-sub">可迁移至所有长任务工具</p>
    </div>
  </div>
</div>

<div class="footer">
  <div class="quote-wrap">
    <p class="quote">"将传统放养式使用 AI，升级为带领 AI 团队协同作战。"</p>
  </div>
</div>
</body>
</html>
