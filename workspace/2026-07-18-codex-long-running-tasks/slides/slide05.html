<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24pt 40pt 0 40pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.main {
  padding: 16pt 40pt 0 40pt;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.title-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin: 0 0 14pt 0;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 6pt 0;
  font-weight: bold;
}
.section-title {
  font-family: Arial, sans-serif;
  font-size: 24pt;
  color: #141413;
  font-weight: bold;
  margin: 0;
  letter-spacing: -0.3pt;
}
.arch-diagram {
  display: flex;
  flex-direction: column;
  gap: 10pt;
  flex: 1;
}
.arch-row {
  display: flex;
  gap: 10pt;
  justify-content: center;
}
.node {
  background: #ffffff;
  border: 1.5pt solid #e8e6dc;
  padding: 10pt 12pt;
  text-align: center;
  border-radius: 4pt;
  min-width: 90pt;
}
.node-main {
  background: #141413;
  border: none;
  padding: 14pt 18pt;
}
.node-main .node-label { color: #d97757; }
.node-main .node-desc { color: #faf9f5; }
.node-label {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 1pt;
  color: #d97757;
  margin: 0 0 4pt 0;
  font-weight: bold;
}
.node-desc {
  font-family: Georgia, serif;
  font-size: 10pt;
  color: #141413;
  margin: 0;
  line-height: 1.35;
}
.flow-arrow {
  font-family: Arial, sans-serif;
  font-size: 14pt;
  color: #b0aea5;
  margin: 0;
  text-align: center;
}
.bottom-flow {
  display: flex;
  gap: 8pt;
  margin: 4pt 0 0 0;
}
.bottom-node {
  flex: 1;
  background: #e8e6dc;
  padding: 10pt 12pt;
  text-align: center;
  border-radius: 4pt;
}
.bottom-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 1pt;
  color: #141413;
  margin: 0 0 4pt 0;
  font-weight: bold;
}
.bottom-desc {
  font-family: Georgia, serif;
  font-size: 9pt;
  color: #141413;
  margin: 0;
  line-height: 1.3;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">04 · 全景协作架构</p>
  <p class="page-num">05 / 15</p>
</div>

<div class="main">
  <div class="title-row">
    <div>
      <p class="kicker">"带 AI 团队"全景架构</p>
      <h2 class="section-title">主线程协调 · 子单元执行 · 多层验收</h2>
    </div>
  </div>

  <div class="arch-diagram">
    <div class="arch-row">
      <div class="node node-main">
        <p class="node-label">MAIN THREAD</p>
        <p class="node-desc">全局协调<br>目标 · 约束 · 决策 · 状态</p>
      </div>
    </div>
    <p class="flow-arrow">↓ 委派</p>
    <div class="arch-row">
      <div class="node">
        <p class="node-label">WORKER 01</p>
        <p class="node-desc">远程执行</p>
      </div>
      <div class="node">
        <p class="node-label">WORKER 02</p>
        <p class="node-desc">远程执行</p>
      </div>
      <div class="node">
        <p class="node-label">LOCAL THREAD</p>
        <p class="node-desc">本机环境校验</p>
      </div>
      <div class="node">
        <p class="node-label">SUBAGENT</p>
        <p class="node-desc">临时任务</p>
      </div>
    </div>
    <p class="flow-arrow">↓ 锚点与关卡</p>
    <div class="bottom-flow">
      <div class="bottom-node">
        <p class="bottom-label">GOALS.MD</p>
        <p class="bottom-desc">里程碑 + 验证证据</p>
      </div>
      <div class="bottom-node">
        <p class="bottom-label">/REVIEW</p>
        <p class="bottom-desc">代码审查关卡</p>
      </div>
      <div class="bottom-node">
        <p class="bottom-label">路线图审计</p>
        <p class="bottom-desc">5 项里程碑复核</p>
      </div>
      <div class="bottom-node">
        <p class="bottom-label">DASHBOARD</p>
        <p class="bottom-desc">全局状态外置</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
