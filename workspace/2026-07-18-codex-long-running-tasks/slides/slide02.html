<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.section-num {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.body-area {
  display: flex;
  padding: 30pt 50pt 0 50pt;
  gap: 40pt;
  flex: 1;
}
.left-col {
  width: 38%;
}
.right-col {
  width: 62%;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #b0aea5;
  margin: 0 0 14pt 0;
  font-weight: bold;
}
.section-title {
  font-family: Arial, sans-serif;
  font-size: 30pt;
  line-height: 1.12;
  color: #141413;
  font-weight: bold;
  margin: 0;
  letter-spacing: -0.3pt;
}
.accent-rule {
  width: 40pt;
  height: 3pt;
  background: #d97757;
  margin: 18pt 0 0 0;
}
.lead {
  font-family: Georgia, serif;
  font-size: 14pt;
  line-height: 1.6;
  color: #141413;
  margin: 0 0 16pt 0;
}
.lead em {
  color: #d97757;
  font-style: normal;
  font-weight: bold;
}
.pain-point {
  display: flex;
  gap: 14pt;
  margin: 0 0 14pt 0;
  align-items: flex-start;
}
.pain-num {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  color: #d97757;
  font-weight: bold;
  min-width: 18pt;
  margin: 2pt 0 0 0;
}
.pain-text {
  font-family: Georgia, serif;
  font-size: 12pt;
  line-height: 1.55;
  color: #141413;
  margin: 0;
}
.pain-text b {
  font-family: Arial, sans-serif;
  font-size: 11pt;
  letter-spacing: 1pt;
}
</style>
</head>
<body>
<div class="header">
  <p class="section-num">01 · 核心背景</p>
  <p class="page-num">02 / 15</p>
</div>

<div class="body-area">
  <div class="left-col">
    <p class="kicker">THE SHIFT</p>
    <h2 class="section-title">从启动任务，<br>到守住目标</h2>
    <div class="accent-rule"></div>
  </div>

  <div class="right-col">
    <p class="lead">AI 编码工具已支持连续数小时甚至数天的长周期运行。核心痛点不再是<em>能否启动</em>任务，而是在多轮迭代、持续验证中，<em>避免 AI 偏离项目目标</em>。</p>

    <div class="pain-point">
      <p class="pain-num">01</p>
      <p class="pain-text"><b>早期假设变更</b><br>项目推进中，最初的判断随新信息出现而失效</p>
    </div>
    <div class="pain-point">
      <p class="pain-num">02</p>
      <p class="pain-text"><b>新信息涌现</b><br>每轮迭代都可能引入需要重新调整方向的新证据</p>
    </div>
    <div class="pain-point">
      <p class="pain-num">03</p>
      <p class="pain-text"><b>方向漂移累积</b><br>小偏差在长周期中被放大，最终远离原始目标</p>
    </div>
  </div>
</div>
</body>
</html>
