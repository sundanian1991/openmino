<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.habit-tag {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.body-area {
  display: flex;
  padding: 14pt 50pt 0 50pt;
  gap: 36pt;
  flex: 1;
}
.left-col {
  width: 42%;
  display: flex;
  flex-direction: column;
}
.right-col {
  width: 58%;
  display: flex;
  flex-direction: column;
}
.big-num {
  font-family: Arial, sans-serif;
  font-size: 84pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 0.9;
  letter-spacing: -4pt;
}
.habit-name {
  font-family: Arial, sans-serif;
  font-size: 22pt;
  color: #141413;
  font-weight: bold;
  margin: 8pt 0 0 0;
  line-height: 1.15;
  letter-spacing: -0.3pt;
}
.habit-def {
  font-family: Georgia, serif;
  font-size: 12pt;
  font-style: italic;
  color: #141413;
  margin: 14pt 0 0 0;
  line-height: 1.5;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
  margin: 0 0 10pt 0;
  font-weight: bold;
}
.three-part {
  display: flex;
  flex-direction: column;
  gap: 5pt;
  margin: 0 0 10pt 0;
}
.part-row {
  display: flex;
  gap: 12pt;
  align-items: center;
  background: #ffffff;
  border-left: 4pt solid #d97757;
  padding: 6pt 12pt;
}
.part-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 1pt;
  color: #d97757;
  font-weight: bold;
  min-width: 70pt;
}
.part-text {
  font-family: Georgia, serif;
  font-size: 10.5pt;
  color: #141413;
  margin: 0;
}
.tools-row {
  display: flex;
  gap: 10pt;
  margin: 0 0 8pt 0;
}
.tool-card {
  flex: 1;
  background: #e8e6dc;
  padding: 8pt 12pt;
}
.tool-cmd {
  font-family: Arial, sans-serif;
  font-size: 12pt;
  color: #141413;
  margin: 0 0 4pt 0;
  font-weight: bold;
}
.tool-desc {
  font-family: Georgia, serif;
  font-size: 10pt;
  color: #141413;
  margin: 0;
  line-height: 1.4;
}
.value-card {
  background: #141413;
  padding: 12pt 16pt;
  margin: 4pt 0 0 0;
}
.value-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 0 0 5pt 0;
  font-weight: bold;
}
.value-text {
  font-family: Georgia, serif;
  font-size: 11pt;
  color: #faf9f5;
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="header">
  <p class="habit-tag">HABIT 05 · 简报与仪表盘</p>
  <p class="page-num">10 / 15</p>
</div>

<div class="body-area">
  <div class="left-col">
    <p class="big-num">05</p>
    <h2 class="habit-name">简报 + 仪表盘<br>同步全局进度</h2>
    <p class="habit-def">把项目状态外置，避免信息只存在线程上下文。</p>
  </div>

  <div class="right-col">
    <p class="kicker">三段式极简汇报</p>
    <div class="three-part">
      <div class="part-row">
        <p class="part-label">WHAT'S DONE</p>
        <p class="part-text">已完成</p>
      </div>
      <div class="part-row">
        <p class="part-label">WHAT'S NEXT</p>
        <p class="part-text">下一步</p>
      </div>
      <div class="part-row">
        <p class="part-label">BLOCKERS</p>
        <p class="part-text">有无阻塞</p>
      </div>
    </div>

    <div class="tools-row">
      <div class="tool-card">
        <p class="tool-cmd">/side</p>
        <p class="tool-desc">不打断主线程探查进度、传递新指令</p>
      </div>
      <div class="tool-card">
        <p class="tool-cmd">dashboard.html</p>
        <p class="tool-desc">自定义可视化仪表盘，远程访问</p>
      </div>
    </div>

    <div class="value-card">
      <p class="value-label">CORE VALUE · 核心价值</p>
      <p class="value-text">用户无需回溯 worker 线程上下文，随时查看全局状态，大幅降低回归成本</p>
    </div>
  </div>
</div>
</body>
</html>
