<!DOCTYPE html>
<html>
<head>
<style>
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28pt 50pt 0 50pt;
}
.habit-tag {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  letter-spacing: 3pt;
  color: #d97757;
  font-weight: bold;
}
.page-num {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
}
.body-area {
  display: flex;
  padding: 20pt 50pt 0 50pt;
  gap: 36pt;
  flex: 1;
}
.left-col {
  width: 42%;
  display: flex;
  flex-direction: column;
}
.right-col {
  width: 58%;
  display: flex;
  flex-direction: column;
}
.big-num {
  font-family: Arial, sans-serif;
  font-size: 84pt;
  color: #d97757;
  font-weight: bold;
  margin: 0;
  line-height: 0.9;
  letter-spacing: -4pt;
}
.habit-name {
  font-family: Arial, sans-serif;
  font-size: 24pt;
  color: #141413;
  font-weight: bold;
  margin: 10pt 0 0 0;
  line-height: 1.15;
  letter-spacing: -0.3pt;
}
.habit-def {
  font-family: Georgia, serif;
  font-size: 12pt;
  font-style: italic;
  color: #141413;
  margin: 14pt 0 0 0;
  line-height: 1.5;
}
.kicker {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #b0aea5;
  margin: 0 0 10pt 0;
  font-weight: bold;
}
.audit-list {
  margin: 0 0 12pt 0;
}
.audit-item {
  display: flex;
  gap: 10pt;
  margin: 0 0 7pt 0;
  align-items: flex-start;
}
.audit-check {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  color: #d97757;
  font-weight: bold;
  min-width: 14pt;
  margin: 2pt 0 0 0;
}
.audit-text {
  font-family: Georgia, serif;
  font-size: 10.5pt;
  line-height: 1.45;
  color: #141413;
  margin: 0;
}
.review-row {
  display: flex;
  gap: 12pt;
  margin: 8pt 0 0 0;
}
.review-card {
  flex: 1;
  background: #ffffff;
  border-top: 3pt solid #d97757;
  padding: 10pt 12pt;
}
.review-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 1pt;
  color: #d97757;
  margin: 0 0 4pt 0;
  font-weight: bold;
}
.review-text {
  font-family: Georgia, serif;
  font-size: 10pt;
  color: #141413;
  margin: 0;
  line-height: 1.4;
}
.value-card {
  background: #141413;
  padding: 12pt 16pt;
  margin: 10pt 0 0 0;
}
.value-label {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  letter-spacing: 2pt;
  color: #d97757;
  margin: 0 0 5pt 0;
  font-weight: bold;
}
.value-text {
  font-family: Georgia, serif;
  font-size: 11pt;
  color: #faf9f5;
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="header">
  <p class="habit-tag">HABIT 03 · 里程碑审计 + /review</p>
  <p class="page-num">08 / 15</p>
</div>

<div class="body-area">
  <div class="left-col">
    <p class="big-num">03</p>
    <h2 class="habit-name">里程碑完成后<br>先审计，再 review</h2>
    <p class="habit-def">在验收关卡前设置多层复核，提前发现偏差。</p>
  </div>

  <div class="right-col">
    <p class="kicker">5 项里程碑审计（独立线程执行）</p>
    <div class="audit-list">
      <div class="audit-item">
        <p class="audit-check">01</p>
        <p class="audit-text">验证里程碑是否<b>真正完成</b></p>
      </div>
      <div class="audit-item">
        <p class="audit-check">02</p>
        <p class="audit-text"><b>下一个目标</b>是否仍然合理</p>
      </div>
      <div class="audit-item">
        <p class="audit-check">03</p>
        <p class="audit-text">是否<b>遗漏</b>了某些里程碑</p>
      </div>
      <div class="audit-item">
        <p class="audit-check">04</p>
        <p class="audit-text">新证据是否要求<b>调整工作顺序</b></p>
      </div>
      <div class="audit-item">
        <p class="audit-check">05</p>
        <p class="audit-text">原"<b>完成定义</b>"是否仍成立</p>
      </div>
    </div>

    <div class="review-row">
      <div class="review-card">
        <p class="review-label">/REVIEW</p>
        <p class="review-text">同步对实现代码执行审查</p>
      </div>
      <div class="review-card">
        <p class="review-label">RECORD</p>
        <p class="review-text">所有操作留存独立记录</p>
      </div>
    </div>

    <div class="value-card">
      <p class="value-label">CORE VALUE · 核心价值</p>
      <p class="value-text">提前发现路线图偏差与代码隐性问题，避免小问题累积导致大规模返工</p>
    </div>
  </div>
</div>
</body>
</html>
