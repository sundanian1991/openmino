<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花叔 Design · 20 种设计哲学</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #faf8f5;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    color: #1a1a1a;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const styles_20styles = {
  page: { maxWidth: 1400, margin: '0 auto', padding: '48px 32px 80px' },
  header: { textAlign: 'center', marginBottom: 64, padding: '48px 0 40px', borderBottom: '1px solid #e8e4df' },
  headerLabel: { fontSize: 12, letterSpacing: '0.2em', color: '#999', textTransform: 'uppercase', fontFamily: "'Space Mono', monospace" },
  headerTitle: { fontFamily: "'DM Serif Display', serif", fontSize: 48, color: '#1a1a1a', marginTop: 12, fontWeight: 400 },
  headerSub: { fontSize: 15, color: '#888', marginTop: 8 },
  schoolSection: (accent, bg) => ({ marginBottom: 56 }),
  schoolHeader: (accent) => ({ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }),
  schoolDot: (accent) => ({ width: 10, height: 10, borderRadius: '50%', background: accent, flexShrink: 0 }),
  schoolName: { fontFamily: "'DM Serif Display', serif", fontSize: 24, color: '#1a1a1a' },
  schoolPhilosophy: { fontSize: 13, color: '#999', fontStyle: 'italic', marginLeft: 'auto' },
  schoolDesc: { fontSize: 13, color: '#aaa', marginBottom: 20 },
  cardGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 20 },
  card: { background: '#fff', borderRadius: 12, overflow: 'hidden', border: '1px solid #ece9e4', transition: 'box-shadow 0.25s', cursor: 'default' },
  cardPreview: (bg, children) => ({ background: bg, padding: '32px 28px', minHeight: 180, display: 'flex', flexDirection: 'column', justifyContent: 'center', position: 'relative', overflow: 'hidden' }),
  cardNumber: { fontFamily: "'DM Serif Display', serif", fontSize: 48, opacity: 0.12, position: 'absolute', top: 8, right: 16 },
  cardBody: { padding: '20px 24px 24px' },
  cardStyleName: { fontFamily: "'Noto Serif SC', serif", fontSize: 17, fontWeight: 700, marginBottom: 6 },
  cardPhilosophy: { fontSize: 12, color: '#aaa', marginBottom: 10, fontStyle: 'italic' },
  cardFeatures: { fontSize: 12.5, color: '#666', lineHeight: 1.7 },
  cardFeature: (accent) => ({ display: 'flex', gap: 8, marginBottom: 3 }),
  cardFeatureDot: (accent) => ({ width: 5, height: 5, borderRadius: '50%', background: accent, marginTop: 5, flexShrink: 0 }),
  cardTags: { display: 'flex', gap: 6, marginTop: 14, flexWrap: 'wrap' },
  tag: (accent) => ({ fontSize: 10, padding: '3px 10px', borderRadius: 20, background: accent + '15', color: accent, letterSpacing: '0.05em' }),
  cardPath: (path) => ({ marginTop: 12, fontSize: 11, color: '#bbb', fontFamily: "'Space Mono', monospace" }),
  schoolColors: {
    architecture: { accent: '#2d5a8e', bg: '#f0f4f8' },
    motion: { accent: '#7c3aed', bg: '#f3f0ff' },
    minimal: { accent: '#1a1a1a', bg: '#f8f7f5' },
    avantgarde: { accent: '#e8542a', bg: '#fef3f0' },
    eastern: { accent: '#5a7e6a', bg: '#f0f6f2' },
  }
};

const styles = [
  { id: 1, school: 'architecture', name: 'Pentagram / Michael Bierut', philosophy: '字体即语言，网格即思想', features: ['极度克制的颜色（黑白+1品牌色）', '瑞士网格系统现代演绎', '字体排印作为主要视觉语言', '60%+ 战略性留白'], tags: ['排版', '网格', '克制'], path: 'HTML' },
  { id: 2, school: 'architecture', name: 'Stamen Design · 数据诗学', philosophy: '让数据成为可触摸的风景', features: ['地图学思维应用于信息设计', '算法生成的有机图形', '温暖的数据可视化色调', '可交互的层级系统'], tags: ['数据', '地图', '有机'], path: '混合' },
  { id: 3, school: 'architecture', name: 'Information Architects', philosophy: '设计不是装饰，是内容的建筑', features: ['极端的内容层级清晰度', '只使用系统字体', '蓝色超链接传统的坚守', '性能即美学'], tags: ['内容', '系统字体', '阅读'], path: 'HTML' },
  { id: 4, school: 'architecture', name: 'Fathom · 科学叙事', philosophy: '每一个像素都必须承载信息', features: ['科学期刊的严谨+设计的优雅', '定量数据的精确可视化', '冷静的专业色调', '注释与引用系统设计'], tags: ['科学', '精确', '严谨'], path: 'HTML' },
  { id: 5, school: 'motion', name: 'Locomotive · 滚动叙事', philosophy: '滚动不是浏览，是旅程', features: ['丝滑的视差滚动效果', '电影化的分镜叙事', '大胆的空间留白', '动态元素精确编排'], tags: ['滚动', '叙事', '电影感'], path: '混合' },
  { id: 6, school: 'motion', name: 'Active Theory · WebGL', philosophy: '让技术可见化即可理解', features: ['3D粒子系统为核心元素', '实时渲染的数据可视化', '鼠标交互驱动世界构建', '霓虹与深空的配色'], tags: ['粒子', '3D', '交互'], path: 'AI生成' },
  { id: 7, school: 'motion', name: 'Field.io · 算法美学', philosophy: '代码即设计师', features: ['生成艺术系统', '每次访问不同的动态图形', '抽象几何的智能编排', '技术感与艺术性平衡'], tags: ['生成艺术', '算法', '几何'], path: 'AI生成' },
  { id: 8, school: 'motion', name: 'Resn · 叙事交互', philosophy: '每个点击都推进故事', features: ['游戏化的用户旅程', '强烈的情感化设计', '插画与代码深度结合', '非线性探索体验'], tags: ['游戏化', '插画', '故事'], path: 'AI生成' },
  { id: 9, school: 'minimal', name: 'Experimental Jetset', philosophy: '一个想法 = 一个形式', features: ['单一视觉隐喻贯穿全场', '蓝/红/黄+白的蒙德里安色系', '字体即图形', '反商业的诚实设计'], tags: ['概念', '极简', '三原色'], path: '混合' },
  { id: 10, school: 'minimal', name: 'Müller-Brockmann · 瑞士网格', philosophy: '客观性即美', features: ['数学精确的8pt基线网格', '绝对的左对齐或居中', '单色或双色方案', '功能主义至上'], tags: ['网格', '瑞士', '客观'], path: 'HTML' },
  { id: 11, school: 'minimal', name: 'Build · 当代极简品牌', philosophy: '精致的简单比复杂更难', features: ['奢侈品级的70%+留白', '微妙的字重对比（200-600）', '单一强调色的战略使用', '黄金比例的节奏感'], tags: ['留白', '奢侈', '呼吸感'], path: 'HTML' },
  { id: 12, school: 'minimal', name: 'Sagmeister & Walsh', philosophy: '美即功能的情感维度', features: ['意外的色彩爆发', '手工感与数字的融合', '正能量的视觉语言', '实验性但可读'], tags: ['快乐', '手工', '实验'], path: 'AI生成' },
  { id: 13, school: 'avantgarde', name: 'Zach Lieberman · 代码诗学', philosophy: '编程即绘画', features: ['手绘感的算法图形', '实时生成艺术', '黑白的纯粹表达', '工具本身的可见性'], tags: ['代码', '手绘', '黑白'], path: 'AI生成' },
  { id: 14, school: 'avantgarde', name: 'Raven Kwok · 参数化美学', philosophy: '系统的美胜过个体的美', features: ['分形与递归图形', '黑白高对比', '建筑化的信息结构', '东方园林的算法演绎'], tags: ['分形', '参数化', '建筑'], path: 'AI生成' },
  { id: 15, school: 'avantgarde', name: 'Ash Thorp · 赛博诗意', philosophy: '未来不是冰冷的，是孤独的诗', features: ['电影级的光影效果', '赛博朋克的温暖版本（橙/青）', '故事性的概念设计', '工业美学的精致化'], tags: ['赛博', '电影', '光影'], path: 'AI生成' },
  { id: 16, school: 'avantgarde', name: 'Territory Studio · 屏幕虚构', philosophy: '未来UI的今日想象', features: ['科幻电影中的屏幕设计（FUI）', '全息投影感', '多层叠加的数据可视化', '可信的未来感'], tags: ['FUI', '科幻', '全息'], path: 'AI生成' },
  { id: 17, school: 'eastern', name: 'Takram · 日式思辨设计', philosophy: '技术是思考的媒介', features: ['概念原型的优雅', '柔和的科技感（圆角、柔和阴影）', '图表即艺术', '谦逊的精致'], tags: ['思辨', '柔和', '图表'], path: 'HTML' },
  { id: 18, school: 'eastern', name: 'Kenya Hara · 空的设计', philosophy: '设计不是填充，是清空', features: ['80%+ 极致的留白', '纸张质感的数字化', '白色的层次（暖白/冷白/米白）', '触觉的视觉化'], tags: ['留白', '纸张', '空'], path: 'HTML' },
  { id: 19, school: 'eastern', name: 'Irma Boom · 书籍建筑师', philosophy: '信息的物理诗学', features: ['非线性的信息架构', '边缘与边界的游戏', '意外的颜色组合', '手工艺的数字转译'], tags: ['书籍', '建筑', '意外'], path: '混合' },
  { id: 20, school: 'eastern', name: 'Neo Shen · 东方光影诗', philosophy: '技术需要人的温度', features: ['水墨晕染的数字化', '柔和的光晕效果', '诗意的留白', '情感化的色彩（深蓝/暖灰/柔金）'], tags: ['水墨', '光影', '诗意'], path: 'AI生成' },
];

const schools = [
  { key: 'architecture', name: '信息建筑派', desc: '理性、数据驱动、克制', philosophy: '数据不是装饰，是建筑材料' },
  { key: 'motion', name: '运动诗学派', desc: '动感、沉浸、技术美学', philosophy: '技术本身就是一种流动的诗' },
  { key: 'minimal', name: '极简主义派', desc: '秩序、留白、精致', philosophy: '删减到无法再删' },
  { key: 'avantgarde', name: '实验先锋派', desc: '先锋、生成艺术、视觉冲击', philosophy: '打破规则即创造规则' },
  { key: 'eastern', name: '东方哲学派', desc: '温润、诗意、思辨', philosophy: '留白即内容' },
];

const schoolPreviewPatterns = {
  architecture: (accent, id) => (
    <div style={{ opacity: 0.25 }}>
      {/* Grid lines pattern */}
      <div style={{ position: 'absolute', inset: 0, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 1, padding: 12 }}>
        {Array.from({length: 8}).map((_, i) => (
          <div key={i} style={{ border: `1px solid ${accent}`, borderRadius: 2 }} />
        ))}
      </div>
      {/* Typography hierarchy */}
      <div style={{ position: 'relative', zIndex: 1, paddingLeft: 4 }}>
        <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, fontWeight: 400, color: accent, marginBottom: 6 }}>Aa</div>
        <div style={{ width: 60, height: 2, background: accent, marginBottom: 8 }} />
        <div style={{ fontSize: 10, color: accent, maxWidth: 180, lineHeight: 1.5 }}>
          Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        </div>
      </div>
    </div>
  ),
  motion: (accent, id) => (
    <div style={{ opacity: 0.25, position: 'relative', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      {/* Particle dots */}
      {Array.from({length: 20}).map((_, i) => {
        const x = (i * 37 + id * 13) % 260;
        const y = (i * 23 + id * 7) % 140;
        const r = 1 + (i % 3);
        return <div key={i} style={{ position: 'absolute', left: x, top: y, width: r*2, height: r*2, borderRadius: '50%', background: accent }} />;
      })}
      {/* Flow lines */}
      <svg width="260" height="140" style={{ position: 'absolute', inset: 0 }}>
        <path d={`M0,70 Q65,${30+id*10} 130,70 Q195,${110-id*10} 260,70`} fill="none" stroke={accent} strokeWidth="0.8" />
        <path d={`M0,50 Q65,${10+id*10} 130,50 Q195,${90-id*10} 260,50`} fill="none" stroke={accent} strokeWidth="0.4" />
      </svg>
      {/* Label */}
      <div style={{ position: 'relative', zIndex: 1, fontFamily: "'Space Mono', monospace", fontSize: 11, color: accent, letterSpacing: '0.15em' }}>MOTION</div>
    </div>
  ),
  minimal: (accent, id) => (
    <div style={{ opacity: 0.25, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', height: '100%', padding: 20 }}>
      {/* Minimal circle + line */}
      <div style={{ width: 48, height: 48, borderRadius: '50%', border: `1px solid ${accent}`, marginBottom: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: accent }} />
      </div>
      <div style={{ width: 40, height: 1, background: accent }} />
      <div style={{ marginTop: 8, fontFamily: "'DM Serif Display', serif", fontSize: 14, color: accent }}>Less</div>
    </div>
  ),
  avantgarde: (accent, id) => (
    <div style={{ opacity: 0.25, position: 'relative', height: '100%', overflow: 'hidden' }}>
      {/* Triangular/geometric pattern */}
      <svg width="280" height="160" style={{ position: 'absolute', inset: 0 }}>
        {Array.from({length: 6}).map((_, i) => {
          const cx = 40 + i * 42;
          const cy = 80 + Math.sin(i + id) * 30;
          return <polygon key={i} points={`${cx},${cy-15} ${cx-12},${cy+10} ${cx+12},${cy+10}`} fill="none" stroke={accent} strokeWidth="0.8" />;
        })}
        <circle cx="140" cy="80" r="30" fill="none" stroke={accent} strokeWidth="0.5" strokeDasharray="4 4" />
      </svg>
      <div style={{ position: 'relative', zIndex: 1, padding: '60px 16px 0', fontFamily: "'Space Mono', monospace", fontSize: 10, color: accent, letterSpacing: '0.2em' }}>BREAK RULES</div>
    </div>
  ),
  eastern: (accent, id) => (
    <div style={{ opacity: 0.25, display: 'flex', justifyContent: 'flex-end', alignItems: 'flex-end', height: '100%', padding: 16, position: 'relative' }}>
      {/* Ink wash circle */}
      <div style={{ position: 'absolute', left: 24, top: 16, width: 60, height: 60, borderRadius: '50%', background: `radial-gradient(circle, ${accent}18, transparent 70%)` }} />
      {/* Vertical text */}
      <div style={{ writingMode: 'vertical-rl', fontFamily: "'Noto Serif SC', serif", fontSize: 14, color: accent, letterSpacing: '0.3em', lineHeight: 2 }}>留白即内容</div>
      {/* Small seal */}
      <div style={{ position: 'absolute', left: 24, bottom: 16, width: 16, height: 16, border: `1px solid ${accent}`, borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, color: accent }}>印</div>
    </div>
  ),
};

function PreviewCard({ style, colors }) {
  const [hovered, setHovered] = React.useState(false);
  const pattern = schoolPreviewPatterns[style.school];
  const pathLabel = { HTML: 'HTML 渲染', 'AI生成': 'AI 生成', '混合': 'HTML + AI' };

  return (
    <div
      style={{
        ...styles_20styles.card,
        boxShadow: hovered ? '0 8px 32px rgba(0,0,0,0.08)' : '0 1px 4px rgba(0,0,0,0.04)',
        transform: hovered ? 'translateY(-2px)' : 'none',
      }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      <div style={styles_20styles.cardPreview(colors.bg)}>
        <div style={styles_20styles.cardNumber}>{String(style.id).padStart(2, '0')}</div>
        {pattern(colors.accent, style.id)}
      </div>
      <div style={styles_20styles.cardBody}>
        <div style={styles_20styles.cardStyleName}>{style.name}</div>
        <div style={styles_20styles.cardPhilosophy}>{style.philosophy}</div>
        <div>
          {style.features.map((f, i) => (
            <div key={i} style={styles_20styles.cardFeature(colors.accent)}>
              <span style={styles_20styles.cardFeatureDot(colors.accent)} />
              <span>{f}</span>
            </div>
          ))}
        </div>
        <div style={styles_20styles.cardTags}>
          {style.tags.map((t, i) => (
            <span key={i} style={styles_20styles.tag(colors.accent)}>{t}</span>
          ))}
        </div>
        <div style={styles_20styles.cardPath(pathLabel[style.path])}>
          最佳路径 → {pathLabel[style.path]}
        </div>
      </div>
    </div>
  );
}

function SchoolSection({ school, items }) {
  const colors = styles_20styles.schoolColors[school.key];
  return (
    <div style={styles_20styles.schoolSection(colors.accent, colors.bg)}>
      <div style={styles_20styles.schoolHeader(colors.accent)}>
        <span style={styles_20styles.schoolDot(colors.accent)} />
        <span style={styles_20styles.schoolName}>{school.name}</span>
        <span style={styles_20styles.schoolPhilosophy}>{school.philosophy}</span>
      </div>
      <div style={styles_20styles.schoolDesc}>{school.desc} · {items.length} 种风格</div>
      <div style={styles_20styles.cardGrid}>
        {items.map(item => (
          <PreviewCard key={item.id} style={item} colors={colors} />
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <div style={styles_20styles.page}>
      <div style={styles_20styles.header}>
        <div style={styles_20styles.headerLabel}>Huashu-Design · 花叔 Design</div>
        <div style={styles_20styles.headerTitle}>20 种设计哲学</div>
        <div style={styles_20styles.headerSub}>5 大流派 · 20 种设计体系 · 从 Pentagram 到原研哉</div>
      </div>

      {/* Legend */}
      <div style={{ display: 'flex', justifyContent: 'center', gap: 32, marginBottom: 48, flexWrap: 'wrap' }}>
        {schools.map(s => {
          const c = styles_20styles.schoolColors[s.key];
          return (
            <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: c.accent }} />
              <span style={{ fontSize: 13, color: '#666' }}>{s.name}</span>
            </div>
          );
        })}
      </div>

      {schools.map(school => (
        <SchoolSection
          key={school.key}
          school={school}
          items={styles.filter(s => s.school === school.key)}
        />
      ))}

      {/* Footer summary */}
      <div style={{ textAlign: 'center', padding: '40px 0 0', borderTop: '1px solid #e8e4df' }}>
        <div style={{ fontSize: 12, color: '#bbb', fontFamily: "'Space Mono', monospace", letterSpacing: '0.1em' }}>
          路径说明：HTML 渲染 = 代码精确控制 · AI 生成 = 图片直出 · 混合 = HTML 骨架 + AI 配图
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
