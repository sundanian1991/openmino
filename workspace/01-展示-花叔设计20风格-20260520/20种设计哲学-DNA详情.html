<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花叔 Design · 20种设计哲学 · 详细DNA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&family=Space+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f3ef; font-family: 'Noto Sans SC', sans-serif; color: #1a1a1a; line-height: 1.6; }
.page { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
.header { text-align: center; margin-bottom: 48px; padding: 32px 0 28px; border-bottom: 1px solid #e0dbd3; }
.header-label { font-size: 11px; letter-spacing: 0.25em; color: #aaa; font-family: 'Space Mono', monospace; text-transform: uppercase; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 40px; color: #1a1a1a; margin-top: 10px; font-weight: 400; }
.header-sub { font-size: 13px; color: #999; margin-top: 6px; }
.nav-pills { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
.pill { font-size: 12px; padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; background: transparent; color: #888; font-family: 'Noto Sans SC', sans-serif; transition: all 0.2s; letter-spacing: 0.02em; }
.pill.active { background: #1a1a1a; color: #fff; }
.school-divider { display: flex; align-items: center; gap: 16px; margin: 48px 0 24px; }
.school-divider-text { font-family: 'DM Serif Display', serif; font-size: 14px; white-space: nowrap; }
.school-divider-sub { font-size: 11px; color: #bbb; white-space: nowrap; }
.school-divider-line { flex: 1; height: 1px; background: #e0dbd3; }

.style-card { background: #fff; border-radius: 16px; margin-bottom: 16px; border: 1px solid #e8e4dd; overflow: hidden; }
.card-header { padding: 20px 24px; display: flex; align-items: flex-start; gap: 16px; cursor: pointer; position: relative; user-select: none; }
.card-header:hover { background: rgba(0,0,0,0.01); }
.card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.card-title-block { flex: 1; }
.card-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: #1a1a1a; margin-bottom: 2px; }
.card-phil { font-size: 12px; color: #888; font-style: italic; }
.card-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 10px; border-radius: 12px; letter-spacing: 0.05em; }
.card-num { font-family: 'DM Serif Display', serif; font-size: 42px; opacity: 0.12; position: absolute; top: 8px; right: 20px; line-height: 1; }
.card-arrow { font-size: 14px; color: #bbb; transition: transform 0.2s; margin-left: 8px; flex-shrink: 0; }
.card-arrow.open { transform: rotate(90deg); }
.card-body { display: none; padding: 0 24px 28px; }
.card-body.open { display: block; }
.section-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-line { width: 16px; height: 1px; }
.feature-list { margin-bottom: 20px; }
.feature-item { font-size: 13px; color: #444; line-height: 1.7; margin-bottom: 4px; padding-left: 16px; position: relative; }
.feature-dot { position: absolute; left: 0; top: 7px; width: 6px; height: 6px; border-radius: 50%; }
.color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.color-chip { display: flex; align-items: center; gap: 8px; background: #faf9f6; border-radius: 8px; padding: 6px 12px; border: 1px solid #ece8e1; }
.color-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0; }
.color-label { font-size: 12px; font-family: 'Space Mono', monospace; color: #555; }
.font-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.font-chip { background: #faf9f6; border-radius: 8px; padding: 10px 14px; border: 1px solid #ece8e1; flex: 1; min-width: 200px; }
.font-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; }
.font-name { font-size: 13px; color: #333; margin-top: 4px; line-height: 1.5; }
.layout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.layout-item { background: #faf9f6; border-radius: 8px; padding: 12px 14px; border: 1px solid #ece8e1; }
.layout-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; margin-bottom: 4px; }
.layout-value { font-size: 12.5px; color: #333; line-height: 1.6; }
.dna-block { background: #faf9f6; border: 1px solid #ece8e1; border-radius: 10px; padding: 18px 20px; font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 12px; line-height: 1.9; color: #333; white-space: pre-wrap; margin-bottom: 20px; position: relative; }
.dna-label { font-size: 10px; color: #999; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 8px; }
.copy-btn { position: absolute; top: 14px; right: 14px; font-size: 10px; padding: 3px 10px; border-radius: 6px; border: 1px solid #e0dbd3; background: #fff; color: #999; cursor: pointer; font-family: 'Space Mono', monospace; }
.copy-btn.done { background: #e8f5e9; color: #43a047; border-color: #a5d6a7; }
.tip-box { border-left: 3px solid; border-radius: 0 8px 8px 0; padding: 14px 18px; }
.tip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; font-family: 'Space Mono', monospace; margin-bottom: 4px; }
.tip-text { font-size: 12.5px; color: #555; line-height: 1.7; }
.footer { text-align: center; padding: 40px 0 0; border-top: 1px solid #e0dbd3; }
.footer-text { font-size: 11px; color: #bbb; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; line-height: 1.8; }
@media (max-width: 700px) {
  .layout-grid { grid-template-columns: 1fr; }
  .font-row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script>
const schoolMeta = {
  architecture: { accent: '#2d5a8e', bg: '#eef3f8', name: '一、信息建筑派', desc: '数据不是装饰，是建筑材料' },
  motion: { accent: '#7c3aed', bg: '#f0ecfc', name: '二、运动诗学派', desc: '技术本身就是一种流动的诗' },
  minimal: { accent: '#2a2a2a', bg: '#f5f4f2', name: '三、极简主义派', desc: '删减到无法再删' },
  avantgarde: { accent: '#c9452a', bg: '#fdf0ec', name: '四、实验先锋派', desc: '打破规则即创造规则' },
  eastern: { accent: '#4a7c6a', bg: '#e8f2ee', name: '五、东方哲学派', desc: '留白即内容' },
};

const styles_data = [
  {
    id:1, school:'architecture', name:'Pentagram / Michael Bierut', phil:'字体即语言，网格即思想',
    features:['极度克制的颜色（黑白+1个品牌色，不超过3色）','瑞士网格系统的现代演绎（12列等分网格）','字体排印作为主要视觉语言（非装饰）','负空间的战略性使用（60%+留白）'],
    tags:['排版','网格','克制'], path:'HTML',
    dna:`Pentagram / Michael Bierut style design:
- Typography as the primary visual language, Helvetica Neue or Univers family
- Swiss grid system with 12-column layout, precise mathematical spacing (8px baseline grid)
- Color: black (#1a1a1a) + white (#ffffff) + ONE accent color (#HEX)
- Hierarchy: Display 48-72px (serif or heavy sans), Body 14-16px (light sans), Caption 11-12px
- 60%+ whitespace ratio — elements breathe, no crowding
- Left-aligned text blocks, no centered paragraphs except headlines
- Data and information structured as visual architecture (tables, numbers as hero)
- No gradients, no shadows, no decorative elements
- Thin horizontal rules (1px, #ddd) as the only separator`,
    colors:[{role:'Ink',hex:'#1a1a1a'},{role:'Paper',hex:'#ffffff'},{role:'Accent',hex:'#e8542a'},{role:'Rule',hex:'#d4d0c8'}],
    fonts:{display:'Helvetica Neue / Univers (Heavy 700-800)',body:'Helvetica Neue (Light 300, Regular 400)',mono:'Space Mono (data / labels)'},
    layout:{grid:'12-column Swiss grid, 8px baseline',whitespace:'60%+ negative space',alignment:'Flush left (text), centered (display headlines only)',spacing:'24px minimum between sections'},
    tip:'Hillary Clinton 2016 campaign identity 是经典案例。核心是"把信息当建筑材料"——标题、数据、引语本身就是装饰，不需要额外加 icon 或图形。',
  },
  {
    id:2, school:'architecture', name:'Stamen Design · 数据诗学', phil:'让数据成为可触摸的风景',
    features:['地图学思维应用于信息设计','算法生成的有机图形（等值线、热力图）','温暖的数据可视化色调（赭石、鼠尾草绿、深蓝）','可交互的层级系统（zoom-in 展示更多细节）'],
    tags:['数据','地图','有机'], path:'混合',
    dna:`Stamen Design aesthetic:
- Cartographic approach to data visualization — treat data like terrain
- Organic, algorithm-generated patterns (contour lines, Voronoi cells, flow maps)
- Warm earthy palette: terracotta (#c07040), sage green (#6b8e5a), deep blue (#2d4a6f), warm cream (#f5f0e8)
- Layered information like topographic maps — 3 depth levels max
- Hand-crafted feel despite digital precision — slight irregularity in lines
- Soft shadows (rgba(0,0,0,0.06)) and subtle depth between layers
- Typography: clean sans-serif (Source Sans Pro or Inter), body 13-14px
- Data labels small and unobtrusive (10-11px, #888)
- No sharp geometric shapes — prefer rounded, organic forms
- Legend/map-key design integrated into layout, not separate sidebar`,
    colors:[{role:'Terracotta',hex:'#c07040'},{role:'Sage Green',hex:'#6b8e5a'},{role:'Deep Blue',hex:'#2d4a6f'},{role:'Warm Cream',hex:'#f5f0e8'}],
    fonts:{display:'Source Sans Pro (Semibold 600)',body:'Source Sans Pro (Regular 400)',mono:'Space Mono (coordinates / values)'},
    layout:{grid:'Free-form organic layout (no rigid grid)',whitespace:'Moderate — data density is the focus',alignment:'Mixed — organic flow, not strict alignment',spacing:'Data clusters separated by 16-24px breathing room'},
    tip:'参考 Stamen 的 COVID-19 surge map。关键是把数据看作"地形"——用颜色深浅、线条密度表达"高低起伏"，而不是用冰冷的柱状图。',
  },
  {
    id:3, school:'architecture', name:'Information Architects', phil:'设计不是装饰，是内容的建筑',
    features:['极端的内容层级清晰度（标题 > 正文 > 注释三级分明）','只使用系统字体（优化阅读体验）','蓝色超链接传统的坚守','性能即美学（加载速度本身就是设计品质）'],
    tags:['内容','系统字体','阅读'], path:'HTML',
    dna:`Information Architects (iA) philosophy:
- Content-first hierarchy, ZERO decorative elements
- System fonts only: -apple-system, BlinkMacSystemFont, "SF Pro Display", Georgia (serif option)
- Classic blue hyperlinks: #0000EE (visited: #551a8b) — no removal, no styling
- Reading-optimized line length: 66 characters max per line
- Progressive disclosure — depth revealed on demand (click/expand)
- Text-heavy design — if it can be expressed in text, it should be
- Font sizing: H1 24-28px, H2 18-20px, Body 15-16px, small 13px
- Line height: 1.6 for body, 1.3 for headings
- No background colors except white (#fff) or near-white (#fafafa)
- Separators: single thin line (#eee), never boxes or cards unless absolutely necessary
- Load fast, render fast — if it delays reading by 0.5s, remove it`,
    colors:[{role:'Ink',hex:'#333333'},{role:'Paper',hex:'#ffffff'},{role:'Link',hex:'#0000ee'},{role:'Subtle',hex:'#999999'}],
    fonts:{display:'-apple-system / SF Pro Display (Semibold 600)',body:'-apple-system / SF Pro Text (Regular 400)',mono:'SF Mono / Menlo (code / data)'},
    layout:{grid:'Single column, max-width 660px',whitespace:'Generous around text blocks (24px+)',alignment:'Left-aligned everything',spacing:'16px between paragraphs, 32px between sections'},
    tip:'参考 iA Writer 的界面哲学。核心是"阅读优先"——所有设计决策围绕"是否有助于阅读理解"，不符合的直接砍掉。',
  },
  {
    id:4, school:'architecture', name:'Fathom · 科学叙事', phil:'每一个像素都必须承载信息',
    features:['科学期刊的严谨 + 设计的优雅','定量数据的精确可视化（图表、时间线、散点图）','冷静的专业色调（灰、海军蓝）','注释与引用系统的设计化（脚注本身也是设计元素）'],
    tags:['科学','精确','严谨'], path:'HTML',
    dna:`Fathom Information Design style:
- Scientific journal aesthetic meets modern design sensibility
- Precise data visualization: bar charts, timelines, scatter plots, flow diagrams
- Neutral color scheme: grays (#333, #666, #999, #ccc), navy (#1e3a5f), ONE highlight color
- Footnote and citation design integrated into layout (not afterthought)
- Clean sans-serif: GT America, Graphik, or Inter — body 13-14px
- Information density without clutter — every pixel earns its place
- Charts: minimal axis lines, no background grid, data-focused
- Captions and labels: 10-11px, #777, placed below not above
- Table design: thin horizontal rules only, no vertical lines, header bold
- Data source citations mandatory: "Source: XXX, YYYY" in 10px #999 at bottom
- Color coding only for meaningful categories (never decorative)`,
    colors:[{role:'Navy',hex:'#1e3a5f'},{role:'Ink',hex:'#333333'},{role:'Gray',hex:'#888888'},{role:'Light',hex:'#e8e6e1'}],
    fonts:{display:'GT America / Graphik (Medium 500)',body:'GT America / Graphik (Regular 400)',mono:'IBM Plex Mono (data values)'},
    layout:{grid:'Structured grid (data columns + annotation margin)',whitespace:'Tight but breathing — density is acceptable',alignment:'Left-aligned text, centered chart titles',spacing:'12px between data elements, 20px between sections'},
    tip:'参考比尔·盖茨基金会年度报告。关键是"每个像素都承载信息"——没有装饰性图标、没有渐变色块，数据和注释就是全部内容。',
  },
  {
    id:5, school:'motion', name:'Locomotive · 滚动叙事', phil:'滚动不是浏览，是旅程',
    features:['丝滑的视差滚动效果（多层不同速度移动）','电影化的分镜叙事（每屏是一个"镜头"）','大胆的空间留白（每屏一个焦点）','动态元素的精确编排（文字从暗处浮现）'],
    tags:['滚动','叙事','电影感'], path:'混合',
    dna:`Locomotive scroll narrative style:
- Film-like scene composition with parallax depth (3+ layers moving at different speeds)
- Generous vertical spacing between sections — each section is a "scene" (100vh minimum)
- Bold typography emerging from darkness — large headlines (60-80px), dramatic weight
- Smooth motion blur effects on scroll (CSS will-change + transform)
- Dark mode base: near-black backgrounds (#0a0a0a to #111111)
- Strategic glowing accents: warm amber or cool cyan, never more than one accent
- Hero sections fill the viewport — no scrolling to see the main message
- Text reveal on scroll: fade-in + translateY(30px -> 0) with stagger
- Progress indicator: thin vertical line on left or right edge showing scroll position
- Transition between scenes: not instant cut, but smooth morph or fade
- No navigation bar — the scroll IS the navigation
- Typography: Display serif (Playfair Display, DM Serif) for headlines, sans-serif for body`,
    colors:[{role:'Dark Base',hex:'#0a0a0a'},{role:'Surface',hex:'#1a1a1a'},{role:'Accent (amber)',hex:'#c8956c'},{role:'Text',hex:'#e8e4df'}],
    fonts:{display:'Playfair Display / DM Serif Display (Bold 700, 60-80px)',body:'Inter / Source Sans Pro (Light 300, 15-16px)',mono:'Space Mono (labels / numbers)'},
    layout:{grid:'Full-viewport scenes (100vh each), single-column centered',whitespace:'Extreme — each scene has one focal point',alignment:'Centered headlines, left-aligned body text',spacing:'Sections separated by full viewport height'},
    tip:'参考 Lusion.co 的滚动叙事。关键是"滚动即旅程"——用户不是在看页面，而是在经历一段有节奏的叙事。每屏一个信息点，不贪多。',
  },
  {
    id:6, school:'motion', name:'Active Theory · WebGL', phil:'让技术可见化即让技术可理解',
    features:['3D粒子系统作为核心视觉元素','实时渲染的数据可视化（WebGL / Three.js）','鼠标交互驱动的世界构建','霓虹与深空的配色（青/洋红/电蓝）'],
    tags:['粒子','3D','交互'], path:'AI生成',
    dna:`Active Theory WebGL aesthetic:
- Particle systems representing data flow (thousands of points, not dozens)
- 3D visualization in depth space — Z-axis is a first-class dimension
- Neon gradients on dark: cyan (#00f0ff), magenta (#ff00aa), electric blue (#0066ff)
- Near-black background (#050510 or #0a0a1a) — deep space feel
- Mouse-reactive environment: particles respond to cursor position
- Depth of field and bokeh effects — blur layers at different depths
- Floating UI with glassmorphism (backdrop-filter: blur(12px), rgba(255,255,255,0.08))
- Typography: thin, futuristic sans-serif (Rajdhani, Exo 2, Orbitron) — 12-14px
- Data HUD elements: small technical readouts floating around the 3D scene
- Glow effects: text-shadow or box-shadow with color, not just white
- Smooth camera movements, not static 3D — the "world" has momentum
- Performance-aware: 60fps minimum, particles scale with device capability`,
    colors:[{role:'Deep Space',hex:'#050510'},{role:'Cyan',hex:'#00f0ff'},{role:'Magenta',hex:'#ff00aa'},{role:'Electric Blue',hex:'#0066ff'}],
    fonts:{display:'Rajdhani / Exo 2 (Semibold 600, all-caps)',body:'Inter (Light 300)',mono:'Share Tech Mono (HUD elements)'},
    layout:{grid:'Full-screen 3D canvas with floating UI overlays',whitespace:'Data-driven — particles fill space but UI has breathing room',alignment:'UI elements at edges, data centered in 3D space',spacing:'UI panels separated by 16px, floating independently'},
    tip:'参考 Active Theory 的 NASA Prospect 项目。核心是"让技术可见"——粒子、光效、3D 深度都是表达手段，不是装饰。数据本身驱动视觉。',
  },
  {
    id:7, school:'motion', name:'Field.io · 算法美学', phil:'代码即设计师',
    features:['生成艺术系统（每次渲染都略有不同）','抽象几何的智能编排（Voronoi、Delaunay 三角）','技术感与艺术性的完美平衡','数学精度的空间分配（黄金分割、斐波那契）'],
    tags:['生成艺术','算法','几何'], path:'AI生成',
    dna:`Field.io generative design style:
- Abstract geometric patterns, algorithmically generated (Voronoi, Delaunay, Perlin noise)
- Dynamic composition that feels computational — symmetry is suspicious, prefer organized chaos
- Monochromatic base (black/white/gray) with ONE vibrant accent color
- Mathematical precision in spacing: Fibonacci ratios, golden section proportions
- Clean code aesthetic — visible structure lines, construction grid as design element
- Typography: rationalist sans-serif (Helvetica, Akzidenz-Grotesk, or Space Grotesk)
- No organic/hand-drawn elements — everything is precise and geometric
- Color accent used strategically: not everywhere, only at focal points
- Layering: 2-3 geometric layers with varying opacity (100%, 60%, 25%)
- Background: clean white (#ffffff) or very light gray (#f8f8f8)
- Composition feels "computed" — like a program could have generated it
- Every element has a reason — if you can\'t explain why it\'s there, remove it`,
    colors:[{role:'Black',hex:'#1a1a1a'},{role:'White',hex:'#ffffff'},{role:'Accent',hex:'#ff3366'},{role:'Mid Gray',hex:'#cccccc'}],
    fonts:{display:'Space Grotesk (Bold 700)',body:'Helvetica Neue (Regular 400)',mono:'Space Mono (labels / data)'},
    layout:{grid:'Algorithmic — not fixed grid, but mathematically positioned',whitespace:'Structured — white space follows mathematical ratios',alignment:'No strict alignment — geometric balance replaces alignment',spacing:'Proportions follow Fibonacci (1:1.618) or golden ratio'},
    tip:'参考 Field.io 的 British Council 数字装置。核心是"代码即设计师"——视觉来自算法而非手动排布，呈现出一种"计算出来的美"。',
  },
  {
    id:8, school:'motion', name:'Resn · 叙事交互', phil:'每个点击都推进故事',
    features:['游戏化的用户旅程（进度指示器、成就解锁）','强烈的情感化设计（插画 + UI 的深度结合）','温暖的色彩调色板（尽管是科技主题）','非线性的探索体验（用户可以选择自己的路径）'],
    tags:['游戏化','插画','故事'], path:'AI生成',
    dna:`Resn interactive storytelling approach:
- Illustrative style mixed with UI elements — hand-drawn or editorial illustration meets product
- Gamified exploration: progress indicators, "chapters" or "levels", unlockable content
- Warm color palette despite tech subject: warm yellows, coral, muted greens
- Character-driven design — if there\'s a concept, give it a face or icon
- Scroll-triggered animations: elements appear as you reach them, not all at once
- Editorial illustration aesthetic: think New Yorker meets product design
- Typography: playful but legible — serif display (Source Serif Pro) + sans-serif body (Nunito or Poppins)
- Navigation: non-linear — user can explore in any order, not forced sequence
- Micro-interactions: buttons bounce, cards flip, elements respond to hover with personality
- Background: warm cream (#faf6f0) or soft pastel, never cold white
- Humor and personality: copy has voice, tooltips have character
- No corporate sterility — every element feels hand-crafted and intentional`,
    colors:[{role:'Warm Cream',hex:'#faf6f0'},{role:'Coral',hex:'#e8705a'},{role:'Warm Yellow',hex:'#f0c040'},{role:'Muted Green',hex:'#7a9e6a'}],
    fonts:{display:'Source Serif Pro (Bold 700)',body:'Nunito / Poppins (Regular 400)',mono:'Space Mono (data / labels)'},
    layout:{grid:'Flexible / editorial — content drives layout',whitespace:'Warm and inviting — not clinical',alignment:'Varied — editorial rhythm over strict alignment',spacing:'Irregular spacing that feels organic, not rigid'},
    tip:'参考 Resn.co.nz 的 portfolio 项目。核心是"交互即叙事"——每个用户操作都在推进一个故事，而不是在完成一个任务。',
  },
  {
    id:9, school:'minimal', name:'Experimental Jetset', phil:'一个想法 = 一个形式',
    features:['单一视觉隐喻贯穿整个设计（从头到尾一个核心图形）','蓝/红/黄+黑白的蒙德里安色系','字体即图形（排版本身就是视觉主体）','反商业的诚实设计（不讨好、不装饰）'],
    tags:['概念','极简','三原色'], path:'混合',
    dna:`Experimental Jetset conceptual minimalism:
- ONE visual metaphor for the entire design — if it\'s a circle, EVERYTHING is about circles

const navItems = [
  { key:'all', label:'全部 20 种' },
  ...schoolOrder.map(k => ({ key: k, label: schoolMeta[k].name.replace(/^[一二三四五]、/, '') }))
];

function render() {
  const app = document.getElementById('app');
  let html = '';

  // Header
  html += `<div class="header">
    <div class="header-label">Huashu-Design · 花叔 Design</div>
    <div class="header-title">20 种设计哲学 · 详细 DNA</div>
    <div class="header-sub">每种风格包含：核心特征 · 色彩体系 · 字体系统 · 布局规则 · 提示词 DNA · 代表作参考</div>
  </div>`;

  // Nav
  html += '<div class="nav-pills">';
  navItems.forEach(item => {
    html += `<button class="pill ${item.key === 'all' ? 'active' : ''}" data-filter="${item.key}" onclick="filterBy('${item.key}', this)">${item.label}</button>`;
  });
  html += '</div>';

  // Content
  const schoolsToShow = (document.querySelector('.pill.active')?.dataset?.filter || 'all');

  if (schoolsToShow === 'all') {
    schoolOrder.forEach(key => {
      const meta = schoolMeta[key];
      const items = styles_data.filter(s => s.school === key);
      html += `<div class="school-section" data-school="${key}">
        <div class="school-divider">
          <span class="school-divider-text" style="color:${meta.accent}">${meta.name}</span>
          <span class="school-divider-sub">${meta.desc}</span>
          <span class="school-divider-line"></span>
        </div>`;
      items.forEach(style => {
        html += renderCard(style, meta);
      });
      html += '</div>';
    });
  } else {
    const meta = schoolMeta[schoolsToShow];
    const items = styles_data.filter(s => s.school === schoolsToShow);
    html += `<div class="school-section" data-school="${schoolsToShow}">
      <div class="school-divider">
        <span class="school-divider-text" style="color:${meta.accent}">${meta.name}</span>
        <span class="school-divider-sub">${meta.desc}</span>
        <span class="school-divider-line"></span>
      </div>`;
    items.forEach(style => {
      html += renderCard(style, meta);
    });
    html += '</div>';
  }

  // Footer
  html += `<div class="footer">
    <div class="footer-text">提示词 DNA 可直接复制到任何 AI 设计工具中使用<br>每种风格都包含色彩 HEX 值、字体族、布局规则和具体约束</div>
  </div>`;

  app.innerHTML = html;
}

function renderCard(style, meta) {
  const c = meta.accent;
  const pathLabel = style.path === 'HTML' ? 'HTML 渲染' : style.path === 'AI生成' ? 'AI 生成' : 'HTML + AI 混合';
  const layoutLabels = { grid:'网格系统', whitespace:'留白策略', alignment:'对齐方式', spacing:'间距规则' };
  const fontLabels = { display:'Display', body:'Body', mono:'Mono' };

  let featuresHtml = style.features.map(f =>
    `<div class="feature-item"><span class="feature-dot" style="background:${c}"></span>${f}</div>`
  ).join('');

  let colorsHtml = style.colors.map(co =>
    `<div class="color-chip"><span class="color-swatch" style="background:${co.hex}"></span><span class="color-label">${co.role} · ${co.hex}</span></div>`
  ).join('');

  let fontsHtml = Object.entries(style.fonts).map(([key, val]) =>
    `<div class="font-chip"><div class="font-label">${fontLabels[key] || key}</div><div class="font-name">${val}</div></div>`
  ).join('');

  let layoutHtml = Object.entries(style.layout).map(([key, val]) =>
    `<div class="layout-item"><div class="layout-label">${layoutLabels[key] || key}</div><div class="layout-value">${val}</div></div>`
  ).join('');

  let tagsHtml = style.tags.map(t =>
    `<span class="tag" style="background:${c}14;color:${c}">${t}</span>`
  ).join('') + `<span class="tag" style="background:${c}25;color:${c};font-weight:500">${pathLabel}</span>`;

  return `<div class="style-card">
    <div class="card-header" onclick="toggleCard(this)" style="background:${meta.bg}">
      <span class="card-dot" style="background:${c}"></span>
      <div class="card-title-block">
        <div class="card-name">${style.name}</div>
        <div class="card-phil">${style.phil}</div>
        <div class="card-tags">${tagsHtml}</div>
      </div>
      <span class="card-num" style="color:${c}">${String(style.id).padStart(2,'0')}</span>
      <span class="card-arrow">&#9654;</span>
    </div>
    <div class="card-body">
      <div class="section-label" style="color:${c}"><span class="section-line" style="background:${c}"></span>核心特征</div>
      <div class="feature-list">${featuresHtml}</div>

      <div class="section-label" style="color:${c}"><span class="section-line" style="background:${c}"></span>色彩体系</div>
      <div class="color-row">${colorsHtml}</div>

      <div class="section-label" style="color:${c}"><span class="section-line" style="background:${c}"></span>字体系统</div>
      <div class="font-row">${fontsHtml}</div>

      <div class="section-label" style="color:${c}"><span class="section-line" style="background:${c}"></span>布局规则</div>
      <div class="layout-grid">${layoutHtml}</div>

      <div class="dna-block">
        <div class="dna-label">提示词 DNA（点击复制）</div>
        <button class="copy-btn" onclick="copyDna(this, event)">复制</button>
        <div class="dna-content">${style.dna.replace(/\n/g,'<br>')}</div>
      </div>

      <div class="tip-box" style="background:${c}0a;border-color:${c}">
        <div class="tip-label" style="color:${c}">代表作参考</div>
        <div class="tip-text">${style.tip}</div>
      </div>
    </div>
  </div>`;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.card-arrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function filterBy(key, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function copyDna(btn, event) {
  event.stopPropagation();
  const content = btn.parentElement.querySelector('.dna-content');
  const text = content.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('done'); }, 2000);
  });
}

render();
</script>
</body>
</html>
