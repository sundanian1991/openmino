<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伽玛首贷线等级分布</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #ffffff;
  padding: 40px;
}
.container { max-width: 880px; margin: 0 auto; }
#chart { width: 100%; height: 420px; }
.annotation {
  margin-top: 18px;
  padding: 14px 20px;
  background: #FAF8F6;
  border-left: 4px solid #E8553A;
  font-size: 13px;
  line-height: 1.7;
  color: #666;
  border-radius: 0 8px 8px 0;
}
.annotation .label { color: #333; font-weight: 600; }
.annotation .normal { color: #2A7A6E; font-weight: 600; }
.annotation .warn { color: #E8553A; font-weight: 600; }
.source {
  margin-top: 10px;
  font-size: 11px;
  color: #bbb;
  text-align: right;
}
</style>
</head>
<body>
<div class="container">
  <div id="chart"></div>
  <div class="annotation">
    <span class="label">非参评构成分析：</span>
    <span class="normal">MOB1-新人22人（34%）</span>属正常范围（入职不足）；
    <span class="warn">MOB12+老员工15人（23%）</span>因外呼天数不足未达参评标准，
    提示老员工参评意识或管理制度存在短板；其余27人（42%）为其他原因。
  </div>
  <div class="source">数据截止：近30天 | 伽玛首贷线</div>
</div>
<script>
(function() {
  var chartDom = document.getElementById('chart');
  var myChart = echarts.init(chartDom);

  var rawData = [
    { name: 'S级', short: 'S', value: 5, pct: '4.2%' },
    { name: 'A级', short: 'A', value: 13, pct: '10.8%' },
    { name: 'B级', short: 'B', value: 16, pct: '13.3%' },
    { name: 'C级', short: 'C', value: 22, pct: '18.3%' },
    { name: '非参评', short: '非参评', value: 64, pct: '53.3%' }
  ];
  var total = 120;

  var option = {
    title: {
      text: '53%坐席未达参评标准，C级占39%——筛选和培养机制可能失效',
      subtext: '伽玛首贷线 | 近30天 | 参评56人 / 总计120人',
      left: 'left',
      textStyle: {
        fontSize: 17,
        fontWeight: 700,
        color: '#2C2C2C',
        lineHeight: 28
      },
      subtextStyle: {
        fontSize: 13,
        color: '#999',
        lineHeight: 22
      },
      padding: [0, 0, 22, 0]
    },

    grid: {
      left: '3%',
      right: '16%',
      bottom: '6%',
      top: '20%',
      containLabel: false
    },

    xAxis: {
      type: 'value',
      min: 0,
      max: 72,
      splitLine: {
        show: true,
        lineStyle: {
          color: '#EDEDED',
          type: 'dashed',
          width: 1
        }
      },
      axisLabel: {
        color: '#BBB',
        fontSize: 11
      },
      axisLine: { show: false },
      axisTick: { show: false }
    },

    yAxis: {
      type: 'category',
      data: rawData.map(function(d) { return d.name; }),
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        color: '#444',
        fontSize: 13,
        fontWeight: 500
      },
      splitLine: { show: false }
    },

    series: [{
      type: 'bar',
      data: [
        {
          value: rawData[0].value,
          itemStyle: {
            color: '#2A7A6E',
            borderRadius: [0, 4, 4, 0]
          }
        },
        {
          value: rawData[1].value,
          itemStyle: {
            color: '#4F8F8F',
            borderRadius: [0, 4, 4, 0]
          }
        },
        {
          value: rawData[2].value,
          itemStyle: {
            color: '#D4A76A',
            borderRadius: [0, 4, 4, 0]
          }
        },
        {
          value: rawData[3].value,
          itemStyle: {
            color: '#E8553A',
            borderRadius: [0, 4, 4, 0]
          }
        },
        {
          value: rawData[4].value,
          itemStyle: {
            color: '#F7F7F7',
            borderColor: '#CCCCCC',
            borderType: 'dashed',
            borderWidth: 2,
            borderRadius: [0, 4, 4, 0]
          },
          label: {
            color: '#BBBBBB',
            fontWeight: 400
          }
        }
      ],
      barWidth: 38,
      barGap: '30%',

      label: {
        show: true,
        position: 'right',
        padding: [0, 0, 0, 10],
        fontSize: 13,
        fontWeight: 500,
        color: '#555',
        formatter: function(params) {
          var idx = params.dataIndex;
          return rawData[idx].short + '  ' + rawData[idx].value + '人 (' + rawData[idx].pct + ')';
        }
      },

      emphasis: {
        itemStyle: {
          shadowBlur: 6,
          shadowOffsetX: 0,
          shadowOffsetY: 2,
          shadowColor: 'rgba(0,0,0,0.12)'
        }
      },

      tooltip: {
        trigger: 'item',
        formatter: function(params) {
          var idx = params.dataIndex;
          return '<strong>' + rawData[idx].name + '</strong><br/>'
            + '人数：' + rawData[idx].value + '人<br/>'
            + '占比：' + rawData[idx].pct;
        }
      }
    }],

    // Use a custom graphic to draw the "参评/非参评" division marker
    graphic: [
      {
        type: 'line',
        shape: {
          x1: 0, y1: 0,
          x2: 0, y2: 0
        },
        style: { stroke: '#ccc', lineWidth: 0 },
        invisible: true
      }
    ]
  };

  myChart.setOption(option);
  window.addEventListener('resize', function() { myChart.resize(); });
})();
</script>
</body>
</html>
