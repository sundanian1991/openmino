<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>伽玛首贷GMV分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fff;
  color: #333;
  padding: 32px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
}
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  color: #1a1a1a;
  margin-bottom: 4px;
}
.header .subtitle {
  font-size: 14px;
  color: #888;
}
.charts-wrapper {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-box {
  flex: 1;
  height: 400px;
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 8px;
  background: #fff;
}
.cards {
  display: flex;
  gap: 16px;
}
.card {
  flex: 1;
  padding: 16px 20px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.7;
}
.card-warning {
  background: #fff8f7;
  border-left: 4px solid #E8553A;
}
.card-info {
  background: #f5faf8;
  border-left: 4px solid #2A7A6E;
}
.card strong {
  display: block;
  font-size: 15px;
  margin-bottom: 4px;
}
@media (max-width: 768px) {
  .charts-wrapper { flex-direction: column; }
  .cards { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>A→B断崖下降67%，Top20%坐席贡献50%GMV</h1>
    <p class="subtitle">伽玛首贷线近30天 | 参评56人</p>
  </div>
  <div class="charts-wrapper">
    <div id="chart-left" class="chart-box"></div>
    <div id="chart-right" class="chart-box"></div>
  </div>
  <div class="cards">
    <div class="card card-warning">
      <strong>A→B断崖降幅67%（255万→85万），中间层培养机制缺失</strong>
      <div>S级到A级降幅32%为管理可接受的正常梯度，但A级到B级骤降67%，绝非正常淘汰——中间层（B级）的培养或留存机制存在系统性缺失。若B级人均提升至150万，可带来约1040万增量GMV。</div>
    </div>
    <div class="card card-info">
      <strong>过度依赖头部：Top20%坐席=11人=50%GMV，后40%仅贡献23%</strong>
      <div>业绩高度集中于少数头部坐席，腰部（B级）断档严重，尾部（C级）产能过低，呈典型的"头重脚轻"结构。Top20%若出现人员流失，GMV稳定性将面临严峻挑战。</div>
    </div>
  </div>
</div>

<script>
;(function() {
  // ============================================================
  // LEFT: 各等级人均GMV（水平条形图）
  // ============================================================
  var leftChart = echarts.init(document.getElementById('chart-left'));

  var categories = ['S级', 'A级', 'B级', 'C级'];
  var values    = [375.8, 255.1, 85.0, 55.7];
  var barColors = ['#2A7A6E', '#4F8F8F', '#D4A76A', '#E8553A'];
  var nPeople   = ['5人', '13人', '16人', '22人'];
  var totalGMV  = [1878.8, 3316.4, 1359.4, 1225.6];
  var dropText  = ['', '↓32%', '', '↓34%'];

  var seriesData = values.map(function(v, i) {
    var item = {
      value: v,
      itemStyle: { color: barColors[i] }
    };
    // S, A, B: inside label (value + optional drop); C too short -> outside
    if (i === 3) {
      // C: outside right since bar too short
      item.label = {
        show: true,
        position: 'right',
        formatter: v + '万  ' + dropText[i],
        color: '#888',
        fontSize: 12,
        fontWeight: 'normal'
      };
    } else if (i === 1) {
      // A: inside white, include drop
      item.label = {
        show: true,
        position: 'inside',
        formatter: v + '万  {drop|' + dropText[i] + '}',
        color: '#fff',
        fontSize: 13,
        fontWeight: 'bold',
        rich: {
          drop: { color: '#ffd4d0', fontSize: 11, fontWeight: 'normal' }
        }
      };
    } else if (i === 2) {
      // B: inside white, cliff annotation handles story
      item.label = {
        show: true,
        position: 'inside',
        formatter: v + '万',
        color: '#fff',
        fontSize: 13,
        fontWeight: 'bold'
      };
    } else {
      // S
      item.label = {
        show: true,
        position: 'inside',
        formatter: v + '万',
        color: '#fff',
        fontSize: 13,
        fontWeight: 'bold'
      };
    }
    return item;
  });

  var leftOption = {
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      formatter: function(params) {
        var p = params[0];
        var idx = categories.indexOf(p.name);
        var lines = [
          '<strong>' + p.name + '级（' + nPeople[idx] + '）</strong>',
          '人均GMV：' + p.value + '万',
          '总量：' + totalGMV[idx] + '万'
        ];
        if (idx === 1) lines.push('<span style="color:#E8553A;">较S级降32%</span>');
        if (idx === 2) lines.push('<span style="color:#E8553A;font-weight:bold;">较A级降67% ← 断崖</span>');
        if (idx === 3) lines.push('<span style="color:#E8553A;">较B级降34%</span>');
        return lines.join('<br/>');
      }
    },
    grid: { left: 50, right: 30, top: 12, bottom: 30 },
    yAxis: {
      type: 'category',
      data: ['S级', 'A级', 'B级', 'C级'],
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { fontSize: 14, fontWeight: 'bold', color: '#333' }
    },
    xAxis: {
      type: 'value',
      max: 420,
      axisLabel: {
        formatter: '{value}万',
        color: '#bbb',
        fontSize: 11
      },
      splitLine: {
        lineStyle: { color: '#f5f5f5', type: 'dashed' }
      },
      axisLine: { show: false },
      axisTick: { show: false }
    },
    series: [{
      type: 'bar',
      data: seriesData,
      barWidth: 36,
      barGap: '50%',
      // Cliff annotation: diagonal arrow from A bar end to B bar end
      markLine: {
        symbol: ['none', 'arrow'],
        symbolSize: [10, 14],
        lineStyle: { color: '#E8553A', width: 3 },
        label: {
          formatter: '断崖 ↓67%',
          color: '#E8553A',
          fontSize: 14,
          fontWeight: 'bold',
          position: 'middle'
        },
        data: [
          [
            { yAxis: 'A级', xAxis: 255.1 },
            { yAxis: 'B级', xAxis: 85.0 }
          ]
        ]
      }
    }]
  };

  leftChart.setOption(leftOption);


  // ============================================================
  // RIGHT: GMV集中度（帕累托图）
  // ============================================================
  var rightChart = echarts.init(document.getElementById('chart-right'));

  var total = 7780.2;
  var known = [
    { ppl: 0,   cumGMV: 0,     cumPct: 0 },
    { ppl: 9,   cumGMV: 2373.0, cumPct: 30.5 },
    { ppl: 20,  cumGMV: 3890.1, cumPct: 50.0 },
    { ppl: 29,  cumGMV: 4940.4, cumPct: 63.5 },
    { ppl: 100, cumGMV: total,  cumPct: 100 }
  ];

  function interpolate(x) {
    for (var i = 0; i < known.length - 1; i++) {
      if (x >= known[i].ppl && x <= known[i+1].ppl) {
        var t = (x - known[i].ppl) / (known[i+1].ppl - known[i].ppl);
        return {
          cumGMV: +(known[i].cumGMV + t * (known[i+1].cumGMV - known[i].cumGMV)).toFixed(1),
          cumPct: +(known[i].cumPct + t * (known[i+1].cumPct - known[i].cumPct)).toFixed(1)
        };
      }
    }
    return known[known.length - 1];
  }

  var plotPts = [0, 9, 20, 29, 40, 50, 60, 70, 80, 90, 100];
  var labels  = plotPts.map(function(p) { return p + '%'; });
  var barData = plotPts.map(function(p) { return interpolate(p).cumGMV; });
  var lineData = plotPts.map(function(p) { return interpolate(p).cumPct; });

  // Only show key labels to reduce clutter
  var labelShowAt = [0, 1, 2, 3, 5, 7, 10]; // 0%, 9%, 20%, 29%, 50%, 70%, 100%

  var rightOption = {
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        var barP = null, lineP = null;
        for (var i = 0; i < params.length; i++) {
          if (params[i].seriesName === '累积GMV') barP = params[i];
          if (params[i].seriesName === '累积占比') lineP = params[i];
        }
        if (!barP) return '';
        return [
          '<strong>累计座席比例：' + barP.name + '</strong>',
          '累积GMV：' + Number(barP.value).toFixed(1) + '万',
          '累积占比：' + (lineP ? lineP.value : '') + '%'
        ].join('<br/>');
      }
    },
    grid: { left: 55, right: 55, top: 12, bottom: 30 },
    xAxis: {
      type: 'category',
      data: labels,
      axisLabel: {
        color: '#999',
        fontSize: 10,
        interval: function(idx) {
          return labelShowAt.indexOf(idx) !== -1;
        }
      },
      axisLine: { show: false },
      axisTick: { show: false },
      splitLine: { show: false }
    },
    yAxis: [
      {
        type: 'value',
        name: 'GMV（万）',
        nameTextStyle: { color: '#888', fontSize: 11 },
        axisLabel: { color: '#bbb', fontSize: 11 },
        splitLine: {
          lineStyle: { color: '#f5f5f5', type: 'dashed' }
        },
        axisLine: { show: false },
        axisTick: { show: false }
      },
      {
        type: 'value',
        name: '累积占比',
        nameTextStyle: { color: '#888', fontSize: 11 },
        min: 0,
        max: 100,
        axisLabel: {
          color: '#bbb',
          fontSize: 11,
          formatter: '{value}%'
        },
        splitLine: { show: false },
        axisLine: { show: false },
        axisTick: { show: false }
      }
    ],
    series: [
      {
        name: '累积GMV',
        type: 'bar',
        data: barData,
        itemStyle: {
          color: '#4F8F8F',
          borderRadius: [3, 3, 0, 0]
        },
        barWidth: '85%',
        barGap: '15%',
        label: {
          show: true,
          position: 'top',
          formatter: function(params) {
            var idx = params.dataIndex;
            // Label only key points
            if (idx === 0) return '';
            return params.value.toFixed(0) + '万';
          },
          color: '#4F8F8F',
          fontSize: 10,
          fontWeight: 'bold'
        }
      },
      {
        name: '累积占比',
        type: 'line',
        yAxisIndex: 1,
        data: lineData,
        itemStyle: { color: '#2A7A6E' },
        lineStyle: { width: 2.5, color: '#2A7A6E' },
        symbol: 'circle',
        symbolSize: 5,
        label: {
          show: true,
          position: 'bottom',
          formatter: function(params) {
            var idx = params.dataIndex;
            if ([1, 2, 3].indexOf(idx) !== -1) return params.value + '%';
            return '';
          },
          color: '#2A7A6E',
          fontSize: 10,
          fontWeight: 'bold'
        },
        markLine: {
          silent: true,
          symbol: 'none',
          data: [
            {
              xAxis: '20%',
              lineStyle: { color: '#E8553A', width: 2, type: 'dashed' }
            }
          ],
          label: {
            formatter: 'Top 20% → 50%',
            color: '#E8553A',
            fontSize: 12,
            fontWeight: 'bold',
            position: 'end'
          }
        }
      }
    ]
  };

  rightChart.setOption(rightOption);


  // ============================================================
  // Responsive
  // ============================================================
  window.addEventListener('resize', function() {
    leftChart.resize();
    rightChart.resize();
  });

})();
</script>
</body>
</html>
