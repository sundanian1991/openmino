<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C级坐席四项子得分热力图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #FAF7F5;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 20px;
}
.container {
    max-width: 1100px;
    width: 100%;
    background: #FFFFFF;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 32px 28px 28px;
}
#chart {
    width: 100%;
    height: 760px;
}
.annotation {
    margin-top: 20px;
    padding: 16px 20px;
    background: #FFF8F4;
    border-left: 4px solid #2A7A6E;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.6;
    color: #4A4A4A;
}
.annotation::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 18px;
    margin-right: 8px;
    background: #E8A87C;
    clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
    vertical-align: middle;
}
</style>
</head>
<body>
<div class="container">
    <div id="chart"></div>
    <div class="annotation">
        <strong>C级坐席普遍转化率得分和T0GMV得分偏低</strong> —— 需确认客户分配规则是否公平，否则对比无效
    </div>
</div>

<script>
(function() {
    var agents = [
        '刘效林','李俊杰','张茹','武丽娟','赵奇','朱红芳','刘林',
        '何卢双','王新意','戴俊平','陈欣雨','朱大伟','秦恰恰',
        '郝运华','郭海艳','钱莹莹','杨然','高鹏','王君松','董倩',
        '张春艳','蒋红妍'
    ];

    var metrics = ['ATT得分', '转化率得分', 'T0GMV得分', '通时得分'];

    // Raw data: [ATT, 转化率, T0GMV, 通时] in same order as agents
    var raw = [
        [ 2.1,  0.9,  0.9, 14.7],  // 刘效林
        [ 2.6,  4.1, 17.1, 27.9],  // 李俊杰
        [ 1.7,  4.3, 28.2, 17.5],  // 张茹
        [10.9,  0.4,  1.7, 54.2],  // 武丽娟
        [19.4,  8.5, 20.0, 16.8],  // 赵奇
        [ 8.7,  3.4,  6.8, 55.7],  // 朱红芳
        [ 6.4,  7.5, 30.5, 28.6],  // 刘林
        [55.0,  1.3, 18.6, 20.7],  // 何卢双
        [ 4.5, 13.9, 31.8, 27.5],  // 王新意
        [19.2,  0.6,  2.4, 77.4],  // 戴俊平
        [51.6,  2.8,  1.1, 59.1],  // 陈欣雨
        [ 9.8, 10.4, 37.1, 48.6],  // 朱大伟
        [ 0.2, 28.4, 38.2, 14.9],  // 秦恰恰
        [28.6, 29.8,  8.5, 20.5],  // 郝运华
        [61.8, 19.4,  1.3, 32.0],  // 郭海艳
        [55.6, 13.2, 24.5, 32.8],  // 钱莹莹
        [74.8,  8.9, 10.5, 42.9],  // 杨然
        [74.0,  4.7, 26.0, 41.6],  // 高鹏
        [52.5, 16.9,  9.4, 50.8],  // 王君松
        [ 8.1, 37.3, 31.1, 18.8],  // 董倩
        [73.6,  5.6, 20.9, 55.4],  // 张春艳
        [51.0, 18.6,  8.1, 57.6]   // 蒋红妍
    ];

    // Build heatmap data: [row, col, value]
    var heatData = [];
    for (var r = 0; r < raw.length; r++) {
        for (var c = 0; c < raw[r].length; c++) {
            heatData.push([r, c, raw[r][c]]);
        }
    }

    var chart = echarts.init(document.getElementById('chart'));

    var option = {
        backgroundColor: '#FFFFFF',
        title: {
            text: 'C级坐席四项子得分——ATT和通时并非显著瓶颈',
            subtext: '伽玛首贷线22名C级坐席 | 近30天',
            left: 'center',
            top: 10,
            textStyle: {
                fontSize: 17,
                fontWeight: 600,
                color: '#2C2C2C',
                fontFamily: 'system-ui, -apple-system, sans-serif'
            },
            subtextStyle: {
                fontSize: 13,
                color: '#888',
                fontFamily: 'system-ui, -apple-system, sans-serif'
            }
        },
        tooltip: {
            trigger: 'item',
            formatter: function(params) {
                var val = params.value[2];
                var agent = agents[params.value[0]];
                var metric = metrics[params.value[1]];
                return '<strong>' + agent + '</strong><br/>' + metric + '：<strong>' + val + '</strong>';
            },
            backgroundColor: 'rgba(255,255,255,0.96)',
            borderColor: '#DDD',
            borderWidth: 1,
            textStyle: { fontSize: 13 }
        },
        grid: {
            left: 90,
            right: 50,
            top: 90,
            bottom: 90
        },
        xAxis: {
            type: 'category',
            data: metrics,
            splitArea: { show: true },
            axisLabel: {
                fontSize: 13,
                fontWeight: 700,
                color: '#3A3A3A',
                fontFamily: 'system-ui, -apple-system, sans-serif'
            },
            axisLine: { lineStyle: { color: '#DDD' } },
            axisTick: { show: false }
        },
        yAxis: {
            type: 'category',
            data: agents,
            splitArea: { show: true },
            axisLabel: {
                fontSize: 12,
                color: '#3A3A3A',
                fontFamily: 'system-ui, -apple-system, sans-serif'
            },
            axisLine: { show: false },
            axisTick: { show: false }
        },
        visualMap: {
            min: 0,
            max: 80,
            calculable: true,
            orient: 'horizontal',
            right: 40,
            bottom: 16,
            itemWidth: 14,
            itemHeight: 140,
            text: ['高', '低'],
            textStyle: {
                fontSize: 11,
                color: '#888'
            },
            inRange: {
                color: ['#EAEAEA', '#E8A87C', '#2A7A6E']
            }
        },
        series: [{
            name: '子得分',
            type: 'heatmap',
            data: heatData,
            label: {
                show: true,
                fontSize: 11,
                fontFamily: 'system-ui, -apple-system, sans-serif',
                formatter: function(params) {
                    var v = params.value[2];
                    // Round to 1 decimal
                    return v % 1 === 0 ? v.toString() : v.toFixed(1);
                },
                color: function(params) {
                    var v = params.value[2];
                    if (v > 50) return '#FFFFFF';
                    if (v > 30) return '#3A3A3A';
                    return '#666';
                }
            },
            emphasis: {
                itemStyle: {
                    shadowBlur: 8,
                    shadowColor: 'rgba(0,0,0,0.2)'
                }
            },
            itemStyle: {
                borderColor: '#FFFFFF',
                borderWidth: 1.5
            }
        }]
    };

    chart.setOption(option);

    window.addEventListener('resize', function() {
        chart.resize();
    });
})();
</script>
</body>
</html>
