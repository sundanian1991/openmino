<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820">
<defs>
  <style>
    @keyframes dash-flow { to { stroke-dashoffset: -40; } }
    @keyframes dash-flow-slow { to { stroke-dashoffset: -40; } }
    .flow-primary { stroke-dasharray: 10 6; animation: dash-flow 2s linear infinite; }
    .flow-secondary { stroke-dasharray: 8 8; animation: dash-flow 2.4s linear infinite; }
    .flow-feedback { stroke-dasharray: 6 10; animation: dash-flow-slow 3s linear infinite; }
    text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; }
    .title { font-size: 24px; font-weight: 600; fill: #2d2926; }
    .subtitle { font-size: 13px; fill: #7a6f66; letter-spacing: 0.04em; }
    .group-title { font-size: 11px; font-weight: 600; fill: #7a6f66; letter-spacing: 0.08em; text-transform: uppercase; }
    .node-label { font-size: 15px; font-weight: 600; fill: #2d2926; }
    .node-caption { font-size: 11px; fill: #7a6f66; }
    .edge-label { font-size: 12px; font-weight: 500; }
    .edge-label-bg { rx: 6; }
    .node-bg { stroke: #2d2926; stroke-width: 1.5; }
    .node-bg-ghost { stroke: #2d2926; stroke-width: 1; opacity: 0.3; }
  </style>
  <marker id="arrow-coral" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,4 L0,8 Z" fill="#f36b3c"/>
  </marker>
  <marker id="arrow-sky" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,4 L0,8 Z" fill="#2f7cf6"/>
  </marker>
  <marker id="arrow-mint" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,4 L0,8 Z" fill="#24b36b"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,4 L0,8 Z" fill="#d79210"/>
  </marker>
</defs>

<!-- Background -->
<rect width="1440" height="820" fill="#fcfbf7"/>

<!-- Title -->
<text x="80" y="52" class="title">Joyclaw 智能工作流架构</text>
<text x="80" y="74" class="subtitle">电销策略组 — AI Agent 自动化工作流平台</text>

<!-- Group: 输入层 -->
<rect x="60" y="130" width="240" height="560" rx="16" fill="none" stroke="#e8e1d7" stroke-width="1.5" stroke-dasharray="4 4"/>
<text x="80" y="156" class="group-title">输入层</text>

<!-- Group: 核心引擎层 -->
<rect x="370" y="130" width="340" height="560" rx="16" fill="none" stroke="#e8e1d7" stroke-width="1.5" stroke-dasharray="4 4"/>
<text x="390" y="156" class="group-title">核心引擎层</text>

<!-- Group: 工作流层 -->
<rect x="780" y="130" width="280" height="560" rx="16" fill="none" stroke="#e8e1d7" stroke-width="1.5" stroke-dasharray="4 4"/>
<text x="800" y="156" class="group-title">工作流层</text>

<!-- Group: 输出层 -->
<rect x="1130" y="130" width="250" height="560" rx="16" fill="none" stroke="#e8e1d7" stroke-width="1.5" stroke-dasharray="4 4"/>
<text x="1150" y="156" class="group-title">输出层</text>

<!-- ====== NODES ====== -->

<!-- 用户 -->
<rect x="88" y="352" width="184" height="76" rx="38" fill="#fff0cf" class="node-bg"/>
<rect x="91" y="355" width="184" height="76" rx="38" fill="none" class="node-bg-ghost"/>
<text x="180" y="386" class="node-label" text-anchor="middle">业务人员</text>
<text x="180" y="404" class="node-caption" text-anchor="middle">自然语言描述需求</text>

<!-- Joyclaw 引擎 -->
<rect x="415" y="310" width="250" height="110" rx="18" fill="#ffe0d7" class="node-bg"/>
<rect x="418" y="313" width="250" height="110" rx="18" fill="none" class="node-bg-ghost"/>
<text x="540" y="360" class="node-label" text-anchor="middle">Joyclaw</text>
<text x="540" y="380" class="node-label" text-anchor="middle">智能引擎</text>
<text x="540" y="400" class="node-caption" text-anchor="middle">核心驱动</text>

<!-- 自然语言转工作流 -->
<rect x="395" y="500" width="170" height="76" rx="16" fill="#dff7e8" class="node-bg"/>
<rect x="398" y="503" width="170" height="76" rx="16" fill="none" class="node-bg-ghost"/>
<text x="480" y="534" class="node-label" text-anchor="middle">自然语言</text>
<text x="480" y="552" class="node-label" text-anchor="middle">转工作流</text>
<text x="480" y="570" class="node-caption" text-anchor="middle">自动搭建</text>

<!-- 提示词自动优化 -->
<rect x="600" y="500" width="170" height="76" rx="16" fill="#dff7e8" class="node-bg"/>
<rect x="603" y="503" width="170" height="76" rx="16" fill="none" class="node-bg-ghost"/>
<text x="685" y="534" class="node-label" text-anchor="middle">提示词</text>
<text x="685" y="552" class="node-label" text-anchor="middle">自动优化</text>
<text x="685" y="570" class="node-caption" text-anchor="middle">适配效率 80%+</text>

<!-- 全生命周期迭代 -->
<rect x="500" y="610" width="180" height="76" rx="16" fill="#dff7e8" class="node-bg"/>
<rect x="503" y="613" width="180" height="76" rx="16" fill="none" class="node-bg-ghost"/>
<text x="590" y="644" class="node-label" text-anchor="middle">全生命周期</text>
<text x="590" y="662" class="node-label" text-anchor="middle">自动迭代</text>
<text x="590" y="680" class="node-caption" text-anchor="middle">维护成本降低 90%+</text>

<!-- 电销运营自动化 -->
<rect x="810" y="250" width="220" height="86" rx="16" fill="#dcebff" class="node-bg"/>
<rect x="813" y="253" width="220" height="86" rx="16" fill="none" class="node-bg-ghost"/>
<text x="920" y="286" class="node-label" text-anchor="middle">电销运营</text>
<text x="920" y="304" class="node-label" text-anchor="middle">自动化</text>
<text x="920" y="322" class="node-caption" text-anchor="middle">出勤 / 作业数据</text>

<!-- 业务数据智能分析 -->
<rect x="810" y="440" width="220" height="86" rx="16" fill="#dcebff" class="node-bg"/>
<rect x="813" y="443" width="220" height="86" rx="16" fill="none" class="node-bg-ghost"/>
<text x="920" y="476" class="node-label" text-anchor="middle">业务数据</text>
<text x="920" y="494" class="node-label" text-anchor="middle">智能分析</text>
<text x="920" y="512" class="node-caption" text-anchor="middle">KPI / 预测 / 缺口</text>

<!-- 实时播报 -->
<rect x="1155" y="255" width="180" height="76" rx="38" fill="#ffe8b5" class="node-bg"/>
<rect x="1158" y="258" width="180" height="76" rx="38" fill="none" class="node-bg-ghost"/>
<text x="1245" y="290" class="node-label" text-anchor="middle">实时播报</text>
<text x="1245" y="310" class="node-caption" text-anchor="middle">企微 / 邮件 / 钉钉</text>

<!-- 分析报告 -->
<rect x="1155" y="445" width="180" height="76" rx="38" fill="#ffe8b5" class="node-bg"/>
<rect x="1158" y="448" width="180" height="76" rx="38" fill="none" class="node-bg-ghost"/>
<text x="1245" y="480" class="node-label" text-anchor="middle">分析报告</text>
<text x="1245" y="500" class="node-caption" text-anchor="middle">风险预警 + 追赶建议</text>

<!-- ====== EDGES ====== -->

<!-- 用户 → Joyclaw (primary) -->
<path d="M272,390 Q345,390 415,365" fill="none" stroke="#f36b3c" stroke-width="4" class="flow-primary" marker-end="url(#arrow-coral)"/>
<rect x="310" y="358" width="70" height="22" fill="#fcfbf7" class="edge-label-bg"/>
<text x="345" y="374" class="edge-label" fill="#f36b3c" text-anchor="middle">描述需求</text>

<!-- Joyclaw → 电销运营 (primary) -->
