<!-- 提示词优化 → 全生命周期 (secondary) -->
<path d="M685,576 Q650,600 680,610" fill="none" stroke="#24b36b" stroke-width="3" class="flow-secondary" marker-end="url(#arrow-mint)"/>
<rect x="636" y="584" width="60" height="22" fill="#fcfbf7" class="edge-label-bg"/>
<text x="666" y="600" class="edge-label" fill="#24b36b" text-anchor="middle">结果反馈</text>

<!-- 实时播报 → 全生命周期 (feedback) -->
<path d="M1245,331 Q1245,720 680,680" fill="none" stroke="#d79210" stroke-width="2.5" class="flow-feedback" marker-end="url(#arrow-amber)"/>
<rect x="920" y="700" width="80" height="22" fill="#fcfbf7" class="edge-label-bg"/>
