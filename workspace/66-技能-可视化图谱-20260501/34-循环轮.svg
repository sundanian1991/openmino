<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Cycle wheel: circular arrow segments -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="#e0c9b0" stroke-width="2"/>
  <!-- Arrow arc -->
  <path d="M100,55 A45,45 0 1,1 95,55" fill="none" stroke="#c98a6a" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="100,50 92,60 108,60" fill="#c98a6a"/>
  <!-- Segment markers -->
  <circle cx="145" cy="100" r="8" fill="#c98a6a"/>
  <circle cx="100" cy="145" r="8" fill="#c98a6a" opacity="0.7"/>
  <circle cx="55" cy="100" r="8" fill="#c98a6a" opacity="0.5"/>
  <circle cx="100" cy="55" r="8" fill="#c98a6a" opacity="0.3"/>
</svg>
