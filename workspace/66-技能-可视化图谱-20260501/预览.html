<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可视化图谱 — 72 种可视化模式</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #faf9f7; padding: 40px; }
  h1 { font-size: 28px; font-weight: 600; color: #6b3410; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: #857d74; margin-bottom: 36px; }
  .category { margin-bottom: 48px; }
  .category-title { font-size: 18px; font-weight: 600; color: #c98a6a; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #f0e0d4; }
  .category-desc { font-size: 12px; color: #857d74; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e0c9b0; padding: 16px; text-align: center; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 4px 16px rgba(201,138,106,0.15); }
  .card svg { width: 120px; height: 120px; }
  .card .name { font-size: 13px; color: #6b3410; margin-top: 10px; font-weight: 600; }
  .card .num { font-size: 11px; color: #857d74; margin-top: 4px; }
</style>
</head>
<body>
<h1>可视化图谱</h1>
<p class="subtitle">72 种可视化模式 · Warm 色系 · 线性克制风格</p>

<div class="category">
  <div class="category-title">图表（Charts）— 数据驱动的图形表达</div>
  <div class="category-desc">1–30：从基础统计图到复杂网络图，用图形直接编码数据</div>
  <div class="grid" id="charts"></div>
</div>

<div class="category">
  <div class="category-title">抽象类比（Abstract Metaphors）— 用抽象结构类比关系</div>
  <div class="category-desc">31–48：金字塔、漏斗、齿轮等，用抽象形态表达层级、流程、平衡</div>
  <div class="grid" id="abstract"></div>
</div>

<div class="category">
  <div class="category-title">模拟类比（Simulation Metaphors）— 用现实物象模拟概念</div>
  <div class="category-desc">49–60：冰山、高山、宇宙等，用熟悉的自然物象类比抽象概念</div>
  <div class="grid" id="simulation"></div>
</div>

<div class="category">
  <div class="category-title">寓言（Allegories）— 用场景叙事传递深层含义</div>
  <div class="category-desc">61–72：建筑、城市、马拉松等，用生活场景讲述系统性故事</div>
  <div class="grid" id="allegory"></div>
</div>

<script>
const files = [
  "01-饼图","02-维恩图","03-同心图","04-圆形图","05-气泡图","06-气泡演变图",
  "07-折线图","08-面积图","09-散点图","10-旭日图","11-扇形图","12-风玫瑰图",
  "13-柱状图","14-磁带图","15-甘特图","16-矩形树图","17-网格图","18-元素周期表",
  "19-弧线图","20-桑基图","21-弦线图","22-雷达图","23-极坐标网格图","24-螺旋图",
  "25-时间线","26-并列比较","27-抽象树","28-思维导图","29-决策树","30-方框图"
];
const abstracts = [
  "31-金字塔","32-漏斗","33-辐轮","34-循环轮","35-楼梯","36-ISOTYPE",
  "37-地铁路线图","38-速度仪表","39-齿轮","40-拼图","41-杠杆","42-天平",
  "43-切尔诺夫脸谱图","44-头部轮廓","45-系谱树","46-组成结构","47-迷宫","48-地图"
];
const simulations = [
  "49-冰山","50-高山","51-岛屿","52-三明治","53-宇宙","54-钟面",
  "55-层次","56-过山车","57-书架","58-根源","59-树","60-循环系统"
];
const allegories = [
  "61-建筑中的活动","62-城市生活","63-马拉松","64-进化","65-食物链","66-聚集",
  "67-实验","68-工厂","69-成套工具","70-传送带","71-道路","72-机器"
];

function render(containerId, items) {
  const el = document.getElementById(containerId);
  items.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const img = document.createElement('img');
    img.src = name + '.svg';
    img.alt = name;
    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = 'No.' + (i + 1 + (containerId === 'abstract' ? 30 : containerId === 'simulation' ? 48 : containerId === 'allegory' ? 60 : 0));
    const title = document.createElement('div');
    title.className = 'name';
    title.textContent = name.replace(/^\d+-/, '');
    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(num);
    el.appendChild(card);
  });
}

render('charts', files);
render('abstract', abstracts);
render('simulation', simulations);
render('allegory', allegories);
</script>
</body>
</html>
