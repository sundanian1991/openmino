<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6"/>

  <!-- Title -->
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">最后他们怎么样了？🚢</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c"/>

  <!-- Rescue Story -->
  <rect x="80" y="140" width="1120" height="140" rx="20" fill="#F0FAF9"/>
  <rect x="80" y="140" width="8" height="140" rx="4" fill="#2ec4b6"/>
  <text x="120" y="185" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#2ec4b6">🆘 奇迹般的救援</text>
  <text x="120" y="220" font-family="Microsoft YaHei" font-size="18" fill="#333333">在最绝望的时候，"邓肯号"轮船赶来了！</text>
  <text x="120" y="250" font-family="Microsoft YaHei" font-size="18" fill="#333333">是尼摩船长之前发出的信号，指引他们来救援的</text>

  <!-- Three outcomes -->
  <rect x="80" y="310" width="350" height="280" rx="16" fill="#FFF3E0"/>
  <rect x="80" y="310" width="6" height="280" rx="3" fill="#ff9f1c"/>
  <text x="255" y="365" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="50">💀</text>
  <text x="120" y="420" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">尼摩船长</text>
  <text x="100" y="455" font-family="Microsoft YaHei" font-size="15" fill="#666666">在救援前去世了，</text>
  <text x="100" y="480" font-family="Microsoft YaHei" font-size="15" fill="#666666">他是一个印度王子</text>
  <text x="100" y="505" font-family="Microsoft YaHei" font-size="15" fill="#666666">叫达卡王子</text>
  <text x="120" y="555" font-family="Microsoft YaHei" font-size="13" fill="#999999">真正的无名英雄</text>

  <rect x="460" y="310" width="350" height="280" rx="16" fill="#F0FAF9"/>
  <rect x="460" y="310" width="6" height="280" rx="3" fill="#2ec4b6"/>
  <text x="635" y="365" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="50">🏡</text>
  <text x="500" y="420" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">回到美国</text>
  <text x="480" y="455" font-family="Microsoft YaHei" font-size="15" fill="#666666">他们带着尼摩船长</text>
  <text x="480" y="480" font-family="Microsoft YaHei" font-size="15" fill="#666666">留下的财宝回到了</text>
  <text x="480" y="505" font-family="Microsoft YaHei" font-size="15" fill="#666666">美国，在爱荷华州</text>
  <text x="480" y="530" font-family="Microsoft YaHei" font-size="15" fill="#666666">建立了新家园</text>
  <text x="500" y="555" font-family="Microsoft YaHei" font-size="13" fill="#999999">重新开始生活！</text>

  <rect x="840" y="310" width="360" height="280" rx="16" fill="#FFF8E1"/>
  <rect x="840" y="310" width="6" height="280" rx="3" fill="#ffbf69"/>
  <text x="1020" y="365" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="50">🌍</text>
  <text x="880" y="420" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">永远的林肯岛</text>
  <text x="860" y="455" font-family="Microsoft YaHei" font-size="15" fill="#666666">虽然离开了荒岛，</text>
  <text x="860" y="480" font-family="Microsoft YaHei" font-size="15" fill="#666666">但他们永远记得在</text>
  <text x="860" y="505" font-family="Microsoft YaHei" font-size="15" fill="#666666">岛上奋斗的日子</text>
  <text x="880" y="555" font-family="Microsoft YaHei" font-size="13" fill="#999999">那是他们最骄傲的时光</text>

  <!-- Bottom tag -->
  <rect x="80" y="620" width="1120" height="50" rx="16" fill="#FFFFFF" stroke="#2ec4b6" stroke-width="1"/>
  <text x="640" y="650" text-anchor="middle" font-family="Microsoft YaHei" font-size="17" fill="#2ec4b6" font-weight="700">📖 凡尔纳还写了《格兰特船长的儿女》和《海底两万里》，三部曲可以连着读！</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="90" r="8" fill="#2ec4b6" fill-opacity="0.3"/>

  <!-- Page badge -->
  <rect x="1180" y="660" width="36" height="28" rx="6" fill="#2ec4b6"/>
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">9</text>
</svg>
