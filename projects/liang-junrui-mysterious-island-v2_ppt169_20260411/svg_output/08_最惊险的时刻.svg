<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6"/>

  <!-- Title -->
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#ff9f1c">最惊险的时刻！😱</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c"/>

  <!-- Subtitle -->
  <text x="80" y="140" font-family="Microsoft YaHei" font-size="18" fill="#666666">两个大危机，每一个都让他们差点丢掉性命！</text>

  <!-- Crisis 1: Pirate Attack -->
  <rect x="80" y="170" width="1120" height="230" rx="20" fill="#FFF3E0"/>
  <rect x="80" y="170" width="8" height="230" rx="4" fill="#ff9f1c"/>
  <text x="120" y="220" font-family="Microsoft YaHei" font-size="26" font-weight="700" fill="#ff9f1c">🏴‍☠️ 危机一：海盗进攻</text>
  <text x="120" y="260" font-family="Microsoft YaHei" font-size="18" fill="#333333">一帮凶残的海盗发现了林肯岛，想要占领它！</text>

  <!-- Pirate timeline -->
  <rect x="120" y="285" width="1040" height="90" rx="12" fill="#FFFFFF"/>
  <text x="160" y="315" font-family="Microsoft YaHei" font-size="15" fill="#666666">海盗登陆 → 烧杀抢掠 → 他们躲进花岗岩宫 → 尼摩船长用炸药炸沉海盗船</text>
  <text x="160" y="345" font-family="Microsoft YaHei" font-size="15" fill="#2ec4b6" font-weight="700">💡 虽然击退了海盗，但岛上已经伤痕累累……</text>

  <!-- Crisis 2: Volcano -->
  <rect x="80" y="430" width="1120" height="200" rx="20" fill="#F0FAF9"/>
  <rect x="80" y="430" width="8" height="200" rx="4" fill="#2ec4b6"/>
  <text x="120" y="480" font-family="Microsoft YaHei" font-size="26" font-weight="700" fill="#2ec4b6">🌋 危机二：火山爆发</text>
  <text x="120" y="520" font-family="Microsoft YaHei" font-size="18" fill="#333333">林肯岛上的火山突然爆发，岩浆四处流淌，整个岛即将被毁灭！</text>

  <!-- Volcano impact -->
  <rect x="120" y="545" width="500" height="70" rx="12" fill="#FFF8E1"/>
  <text x="150" y="575" font-family="Microsoft YaHei" font-size="15" fill="#666666">🔥 花岗岩宫被岩浆吞没</text>
  <text x="150" y="600" font-family="Microsoft YaHei" font-size="15" fill="#666666">🏔️ 整个岛屿开始下沉</text>

  <rect x="650" y="545" width="500" height="70" rx="12" fill="#FFF8E1"/>
  <text x="680" y="575" font-family="Microsoft YaHei" font-size="15" fill="#666666">🌊 他们被困在一块小岩石上</text>
  <text x="680" y="600" font-family="Microsoft YaHei" font-size="15" fill="#666666">⏰ 随时可能被海水淹没！</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="90" r="8" fill="#ff9f1c" fill-opacity="0.3"/>

  <!-- Page badge -->
  <rect x="1180" y="660" width="36" height="28" rx="6" fill="#ff9f1c"/>
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">8</text>
</svg>
