<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6"/>

  <!-- Title -->
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">岛上的神秘事件 🔍</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c"/>

  <!-- Intro text -->
  <rect x="80" y="130" width="1120" height="70" rx="16" fill="#FFF3E0"/>
  <text x="120" y="165" font-family="Microsoft YaHei" font-size="18" fill="#333333">岛上发生了很多奇怪的事，总有一个"神秘人"在暗中帮助他们……</text>

  <!-- Mystery Event 1 -->
  <rect x="80" y="230" width="350" height="200" rx="16" fill="#F0FAF9"/>
  <rect x="80" y="230" width="6" height="200" rx="3" fill="#2ec4b6"/>
  <text x="100" y="275" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="40">🔫</text>
  <text x="120" y="320" font-family="Microsoft YaHei" font-size="17" font-weight="700" fill="#2ec4b6">事件一：托普获救</text>
  <text x="100" y="355" font-family="Microsoft YaHei" font-size="15" fill="#666666">狗"托普"掉进海里，被一</text>
  <text x="100" y="378" font-family="Microsoft YaHei" font-size="15" fill="#666666">个看不见的力量拉回了岸边</text>
  <text x="100" y="405" font-family="Microsoft YaHei" font-size="13" fill="#999999">谁救了它？</text>

  <!-- Mystery Event 2 -->
  <rect x="460" y="230" width="350" height="200" rx="16" fill="#FFF3E0"/>
  <rect x="460" y="230" width="6" height="200" rx="3" fill="#ff9f1c"/>
  <text x="480" y="275" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="40">📦</text>
  <text x="500" y="320" font-family="Microsoft YaHei" font-size="17" font-weight="700" fill="#ff9f1c">事件二：神秘箱子</text>
  <text x="480" y="355" font-family="Microsoft YaHei" font-size="15" fill="#666666">海滩上出现了一个装满工具</text>
  <text x="480" y="378" font-family="Microsoft YaHei" font-size="15" fill="#666666">和药品的箱子，正好是他们</text>
  <text x="480" y="401" font-family="Microsoft YaHei" font-size="15" fill="#666666">最需要的东西！</text>
  <text x="500" y="405" font-family="Microsoft YaHei" font-size="13" fill="#999999">谁送的？</text>

  <!-- Mystery Event 3 -->
  <rect x="840" y="230" width="360" height="200" rx="16" fill="#FFF8E1"/>
  <rect x="840" y="230" width="6" height="200" rx="3" fill="#ffbf69"/>
  <text x="860" y="275" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="40">💥</text>
  <text x="880" y="320" font-family="Microsoft YaHei" font-size="17" font-weight="700" fill="#ffbf69">事件三：炸死海盗</text>
  <text x="860" y="355" font-family="Microsoft YaHei" font-size="15" fill="#666666">海盗来进攻，他们的船突然</text>
  <text x="860" y="378" font-family="Microsoft YaHei" font-size="15" fill="#666666">被炸毁了！五个海盗瞬间被</text>
  <text x="860" y="401" font-family="Microsoft YaHei" font-size="15" fill="#666666">消灭，救了大家的命</text>
  <text x="880" y="405" font-family="Microsoft YaHei" font-size="13" fill="#999999">谁干的？！</text>

  <!-- Reveal section -->
  <rect x="80" y="470" width="1120" height="160" rx="20" fill="#2ec4b6"/>
  <text x="640" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="28" font-weight="700" fill="#FFFFFF">🌊 谜底揭晓：他是尼摩船长！</text>
  <text x="640" y="560" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" fill="#E0F7F5">《海底两万里》的主角！他住在岛附近的潜艇"鹦鹉螺号"里</text>
  <text x="640" y="595" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" fill="#E0F7F5">默默守护着这群落难者，帮了他们很多次！</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="90" r="8" fill="#ffbf69" fill-opacity="0.5"/>

  <!-- Page badge -->
  <rect x="1180" y="660" width="36" height="28" rx="6" fill="#2ec4b6"/>
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">7</text>
</svg>
