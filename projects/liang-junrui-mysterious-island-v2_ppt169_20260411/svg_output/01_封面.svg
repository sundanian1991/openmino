<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6"/>

  <!-- Large decorative circle -->
  <circle cx="1020" cy="220" r="160" fill="#F0FAF9" stroke="#2ec4b6" stroke-width="3" fill-opacity="0.5"/>
  <!-- Small circle -->
  <circle cx="160" cy="500" r="50" fill="#ff9f1c" fill-opacity="0.35"/>
  <!-- Small dots -->
  <circle cx="280" cy="120" r="12" fill="#2ec4b6"/>
  <circle cx="180" cy="200" r="8" fill="#ffbf69"/>
  <circle cx="950" cy="520" r="10" fill="#2ec4b6"/>
  <!-- Diamond -->
  <polygon points="1050,480 1060,470 1070,480 1060,490" fill="#ff9f1c"/>

  <!-- Island emoji large -->
  <text x="1020" y="250" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="80">🏝️</text>

  <!-- Title -->
  <text x="100" y="280" font-family="Microsoft YaHei" font-size="80" font-weight="700" fill="#2ec4b6">神秘岛</text>
  <!-- Subtitle -->
  <text x="100" y="340" font-family="Microsoft YaHei" font-size="26" fill="#ff9f1c">一本让你不想放下的冒险书</text>
  <!-- Divider -->
  <rect x="100" y="365" width="120" height="3" fill="#ffbf69"/>
  <!-- Presenter -->
  <text x="100" y="410" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#2ec4b6">六年级12班 梁峻睿</text>
  <text x="100" y="440" font-family="Microsoft YaHei" font-size="14" fill="#999999">给二年级小朋友的好书分享</text>

  <!-- Page badge -->
  <rect x="1180" y="660" width="36" height="28" rx="6" fill="#2ec4b6"/>
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
</svg>
