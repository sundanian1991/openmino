<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6"/>

  <!-- Large decorative circles -->
  <circle cx="200" cy="360" r="120" fill="#F0FAF9" fill-opacity="0.8"/>
  <circle cx="1080" cy="360" r="80" fill="#FFF3E0" fill-opacity="0.8"/>
  <circle cx="640" cy="200" r="60" fill="#FFF8E1" fill-opacity="0.5"/>

  <!-- Center emoji -->
  <text x="640" y="260" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="80">📚</text>

  <!-- Main text -->
  <text x="640" y="360" text-anchor="middle" font-family="Microsoft YaHei" font-size="52" font-weight="700" fill="#2ec4b6">谢谢大家！</text>

  <!-- Subtitle -->
  <rect x="340" y="400" width="600" height="60" rx="30" fill="#F0FAF9"/>
  <text x="640" y="438" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" fill="#333333">希望大家也能读一读《神秘岛》</text>

  <!-- Call to action -->
  <rect x="340" y="490" width="600" height="60" rx="30" fill="#FFF3E0"/>
  <text x="640" y="528" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" fill="#ff9f1c" font-weight="700">🏝️ 一起去冒险吧！</text>

  <!-- Presenter info -->
  <rect x="440" y="580" width="400" height="60" rx="30" fill="#FFFFFF" stroke="#ffbf69" stroke-width="2"/>
  <text x="640" y="615" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" fill="#666666">六年级 12 班  梁峻睿</text>

  <!-- Decorative dots -->
  <circle cx="150" cy="120" r="6" fill="#ff9f1c" fill-opacity="0.4"/>
  <circle cx="1120" cy="150" r="6" fill="#2ec4b6" fill-opacity="0.4"/>
  <circle cx="100" cy="600" r="5" fill="#ffbf69" fill-opacity="0.4"/>

  <!-- Page badge -->
  <rect x="1180" y="660" width="36" height="28" rx="6" fill="#2ec4b6"/>
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">11</text>
</svg>
