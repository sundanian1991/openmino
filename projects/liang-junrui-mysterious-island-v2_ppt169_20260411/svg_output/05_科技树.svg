<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6"/>

  <!-- Title -->
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">他们用科学改变了荒岛 🔬</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c"/>

  <!-- Horizontal timeline -->
  <line x1="100" y1="210" x2="1180" y2="210" stroke="#ffbf69" stroke-width="4" stroke-linecap="round"/>

  <!-- Step 1: Fire -->
  <circle cx="140" cy="210" r="26" fill="#2ec4b6"/>
  <text x="140" y="218" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="20">🔥</text>
  <rect x="60" y="260" width="170" height="320" rx="16" fill="#F0FAF9"/>
  <text x="145" y="300" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#2ec4b6">生火</text>
  <text x="80" y="340" font-family="Microsoft YaHei" font-size="14" fill="#666666">用两块玻璃做</text>
  <text x="80" y="360" font-family="Microsoft YaHei" font-size="14" fill="#666666">凸透镜，聚焦阳</text>
  <text x="80" y="380" font-family="Microsoft YaHei" font-size="14" fill="#666666">光点燃干草</text>
  <text x="100" y="430" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="36">🔍</text>
  <text x="145" y="500" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">没有火柴</text>
  <text x="145" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">也能生火！</text>
  <text x="145" y="555" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#2ec4b6" font-weight="700">第一步</text>

  <!-- Arrow -->
  <polygon points="250,205 280,210 250,215" fill="#ff9f1c"/>

  <!-- Step 2: Pottery -->
  <circle cx="320" cy="210" r="26" fill="#ff9f1c"/>
  <text x="320" y="218" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="20">🏺</text>
  <rect x="250" y="260" width="170" height="320" rx="16" fill="#FFF3E0"/>
  <text x="335" y="300" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#ff9f1c">陶器</text>
  <text x="270" y="340" font-family="Microsoft YaHei" font-size="14" fill="#666666">用黏土做锅碗</text>
  <text x="270" y="360" font-family="Microsoft YaHei" font-size="14" fill="#666666">瓢盆，烧制出</text>
  <text x="270" y="380" font-family="Microsoft YaHei" font-size="14" fill="#666666">可以煮饭的容器</text>
  <text x="290" y="430" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="36">🥣</text>
  <text x="335" y="500" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">能做饭了</text>
  <text x="335" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">不再吃生的！</text>
  <text x="335" y="555" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#ff9f1c" font-weight="700">第二步</text>

  <!-- Arrow -->
  <polygon points="440,205 470,210 440,215" fill="#ff9f1c"/>

  <!-- Step 3: Bricks -->
  <circle cx="510" cy="210" r="26" fill="#ffbf69"/>
  <text x="510" y="218" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="20">🧱</text>
  <rect x="440" y="260" width="170" height="320" rx="16" fill="#FFF8E1"/>
  <text x="525" y="300" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#ffbf69">砖块</text>
  <text x="460" y="340" font-family="Microsoft YaHei" font-size="14" fill="#666666">找到黏土和沙</text>
  <text x="460" y="360" font-family="Microsoft YaHei" font-size="14" fill="#666666">子，烧制出结实</text>
  <text x="460" y="380" font-family="Microsoft YaHei" font-size="14" fill="#666666">的砖头</text>
  <text x="480" y="430" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="36">🏗️</text>
  <text x="525" y="500" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">能盖房子</text>
  <text x="525" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">不怕风雨了</text>
  <text x="525" y="555" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#ffbf69" font-weight="700">第三步</text>

  <!-- Arrow -->
  <polygon points="630,205 660,210 630,215" fill="#ff9f1c"/>

  <!-- Step 4: Iron -->
  <circle cx="700" cy="210" r="26" fill="#2ec4b6"/>
  <text x="700" y="218" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="20">⚙️</text>
  <rect x="630" y="260" width="170" height="320" rx="16" fill="#F0FAF9"/>
  <text x="715" y="300" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#2ec4b6">铁器</text>
  <text x="650" y="340" font-family="Microsoft YaHei" font-size="14" fill="#666666">找到铁矿石，用</text>
  <text x="650" y="360" font-family="Microsoft YaHei" font-size="14" fill="#666666">高温炼出了铁工</text>
  <text x="650" y="380" font-family="Microsoft YaHei" font-size="14" fill="#666666">具和武器</text>
  <text x="670" y="430" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="36">🔧</text>
  <text x="715" y="500" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">工具升级</text>
  <text x="715" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">效率翻倍！</text>
  <text x="715" y="555" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#2ec4b6" font-weight="700">第四步</text>

  <!-- Arrow -->
  <polygon points="820,205 850,210 820,215" fill="#ff9f1c"/>

  <!-- Step 5: Telegraph -->
  <circle cx="890" cy="210" r="26" fill="#ff9f1c"/>
  <text x="890" y="218" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="20">📡</text>
  <rect x="820" y="260" width="170" height="320" rx="16" fill="#FFF3E0"/>
  <text x="905" y="300" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#ff9f1c">电报</text>
  <text x="840" y="340" font-family="Microsoft YaHei" font-size="14" fill="#666666">用电池和电线</text>
  <text x="840" y="360" font-family="Microsoft YaHei" font-size="14" fill="#666666">建了简易电报机</text>
  <text x="840" y="380" font-family="Microsoft YaHei" font-size="14" fill="#666666">可以远距离通讯</text>
  <text x="860" y="430" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="36">⚡</text>
  <text x="905" y="500" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">在荒岛上</text>
  <text x="905" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">有了高科技！</text>
  <text x="905" y="555" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#ff9f1c" font-weight="700">第五步</text>

  <!-- Arrow -->
  <polygon points="1010,205 1040,210 1010,215" fill="#ff9f1c"/>

  <!-- Step 6: Ship -->
  <circle cx="1080" cy="210" r="26" fill="#2ec4b6"/>
  <text x="1080" y="218" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="20">🚢</text>
  <rect x="1010" y="260" width="200" height="320" rx="16" fill="#F0FAF9"/>
  <text x="1110" y="300" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#2ec4b6">造船</text>
  <text x="1030" y="340" font-family="Microsoft YaHei" font-size="14" fill="#666666">造了"乘风破</text>
  <text x="1030" y="360" font-family="Microsoft YaHei" font-size="14" fill="#666666">浪号"，绕岛航</text>
  <text x="1030" y="380" font-family="Microsoft YaHei" font-size="14" fill="#666666">行，探索大海</text>
  <text x="1050" y="430" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="36">⛵</text>
  <text x="1110" y="500" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">能出海了</text>
  <text x="1110" y="520" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#999999">太厉害了！</text>
  <text x="1110" y="555" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#2ec4b6" font-weight="700">第六步</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="90" r="8" fill="#2ec4b6" fill-opacity="0.3"/>
  <circle cx="1150" cy="130" r="5" fill="#ffbf69" fill-opacity="0.5"/>

  <!-- Page badge -->
  <rect x="1180" y="660" width="36" height="28" rx="6" fill="#2ec4b6"/>
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">5</text>
</svg>
