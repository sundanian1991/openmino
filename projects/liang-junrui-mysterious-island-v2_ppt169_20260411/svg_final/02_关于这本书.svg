<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6" />

  
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">关于这本书 📖</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c" />

  
  <path fill="#F0FAF9" d="M96,140 H614 A16,16 0 0 1 630,156 V224 A16,16 0 0 1 614,240 H96 A16,16 0 0 1 80,224 V156 A16,16 0 0 1 96,140 Z" />
  <path fill="#2ec4b6" d="M83,140 H83 A3,3 0 0 1 86,143 V237 A3,3 0 0 1 83,240 H83 A3,3 0 0 1 80,237 V143 A3,3 0 0 1 83,140 Z" />
  <text x="120" y="180" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#333333">作者：儒勒·凡尔纳（法国）</text>
  <text x="120" y="210" font-family="Microsoft YaHei" font-size="16" fill="#666666">1828 - 1905 · 被称为"科幻小说之父"</text>

  
  <path fill="#FFF3E0" d="M96,265 H614 A16,16 0 0 1 630,281 V389 A16,16 0 0 1 614,405 H96 A16,16 0 0 1 80,389 V281 A16,16 0 0 1 96,265 Z" />
  <path fill="#ff9f1c" d="M83,265 H83 A3,3 0 0 1 86,268 V402 A3,3 0 0 1 83,405 H83 A3,3 0 0 1 80,402 V268 A3,3 0 0 1 83,265 Z" />
  <text x="120" y="305" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">科幻三部曲</text>
  <text x="120" y="335" font-family="Microsoft YaHei" font-size="16" fill="#666666">①《格兰特船长的儿女》</text>
  <text x="120" y="360" font-family="Microsoft YaHei" font-size="16" fill="#666666">②《海底两万里》</text>
  <text x="120" y="385" font-family="Microsoft YaHei" font-size="16" fill="#ff9f1c" font-weight="700">③《神秘岛》 ← 就是这本！</text>

  
  <path fill="#FFF8E1" d="M96,430 H614 A16,16 0 0 1 630,446 V484 A16,16 0 0 1 614,500 H96 A16,16 0 0 1 80,484 V446 A16,16 0 0 1 96,430 Z" />
  <text x="120" y="460" font-family="Microsoft YaHei" font-size="18" fill="#333333">📅 1874 年出版，已经 150 多年了！</text>

  
  <path fill="#FFFFFF" stroke="#2ec4b6" stroke-width="2" d="M676,140 H1184 A16,16 0 0 1 1200,156 V504 A16,16 0 0 1 1184,520 H676 A16,16 0 0 1 660,504 V156 A16,16 0 0 1 676,140 Z" />
  <path fill="#2ec4b6" d="M663,140 H1197 A3,3 0 0 1 1200,143 V143 A3,3 0 0 1 1197,146 H663 A3,3 0 0 1 660,143 V143 A3,3 0 0 1 663,140 Z" />

  
  <text x="720" y="230" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="60">📖</text>

  
  <text x="800" y="210" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#2ec4b6">一句话介绍</text>
  <text x="700" y="270" font-family="Microsoft YaHei" font-size="22" fill="#333333">五个遇难的人，飘到荒岛上。</text>
  <text x="700" y="310" font-family="Microsoft YaHei" font-size="22" fill="#333333">他们什么都有——</text>
  <text x="700" y="350" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#ff9f1c">智慧和双手，</text>
  <text x="700" y="390" font-family="Microsoft YaHei" font-size="22" fill="#333333">把荒岛变成了美丽的家园！</text>

  
  <circle cx="1100" cy="90" r="8" fill="#ffbf69" fill-opacity="0.5" />
  <circle cx="1150" cy="130" r="5" fill="#2ec4b6" fill-opacity="0.3" />

  
