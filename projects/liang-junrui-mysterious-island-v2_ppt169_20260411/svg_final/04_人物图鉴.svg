<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6" />

  
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">认识岛上的英雄们 ⭐</text>

  
  <path fill="#F0FAF9" d="M76,120 H424 A16,16 0 0 1 440,136 V224 A16,16 0 0 1 424,240 H76 A16,16 0 0 1 60,224 V136 A16,16 0 0 1 76,120 Z" />
