  <circle cx="115" cy="165" r="28" fill="#2ec4b6" fill-opacity="0.15" />
  <text x="115" y="174" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="28">🧠</text>
  <text x="160" y="160" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">赛勒斯·史密斯</text>
  <text x="160" y="185" font-family="Microsoft YaHei" font-size="14" fill="#666666">铁路工程师，知识渊博，团队的大脑</text>
  <text x="160" y="210" font-family="Microsoft YaHei" font-size="12" fill="#2ec4b6" font-weight="700">团队领导者</text>

  <path fill="#FFF3E0" d="M476,120 H824 A16,16 0 0 1 840,136 V224 A16,16 0 0 1 824,240 H476 A16,16 0 0 1 460,224 V136 A16,16 0 0 1 476,120 Z" />
  <path fill="#ff9f1c" d="M463,120 H463 A3,3 0 0 1 466,123 V237 A3,3 0 0 1 463,240 H463 A3,3 0 0 1 460,237 V123 A3,3 0 0 1 463,120 Z" />
  <circle cx="515" cy="165" r="28" fill="#ff9f1c" fill-opacity="0.15" />
  <text x="515" y="174" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="28">📝</text>
  <text x="560" y="160" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">吉丁·史佩莱</text>
  <text x="560" y="185" font-family="Microsoft YaHei" font-size="14" fill="#666666">通讯记者，什么都写下来</text>
  <text x="560" y="210" font-family="Microsoft YaHei" font-size="12" fill="#ff9f1c" font-weight="700">记录者</text>

  <path fill="#FFF8E1" d="M876,120 H1204 A16,16 0 0 1 1220,136 V224 A16,16 0 0 1 1204,240 H876 A16,16 0 0 1 860,224 V136 A16,16 0 0 1 876,120 Z" />
  <path fill="#ffbf69" d="M863,120 H863 A3,3 0 0 1 866,123 V237 A3,3 0 0 1 863,240 H863 A3,3 0 0 1 860,237 V123 A3,3 0 0 1 863,120 Z" />
  <circle cx="915" cy="165" r="28" fill="#ffbf69" fill-opacity="0.15" />
  <text x="915" y="174" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="28">🍳</text>
  <text x="960" y="160" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">纳布</text>
  <text x="960" y="185" font-family="Microsoft YaHei" font-size="14" fill="#666666">史密斯的仆人，忠心耿耿</text>
  <text x="960" y="210" font-family="Microsoft YaHei" font-size="12" fill="#ffbf69" font-weight="700">温暖守护</text>

  
  <path fill="#F0FAF9" d="M76,270 H424 A16,16 0 0 1 440,286 V374 A16,16 0 0 1 424,390 H76 A16,16 0 0 1 60,374 V286 A16,16 0 0 1 76,270 Z" />
  <path fill="#2ec4b6" d="M63,270 H63 A3,3 0 0 1 66,273 V387 A3,3 0 0 1 63,390 H63 A3,3 0 0 1 60,387 V273 A3,3 0 0 1 63,270 Z" />
  <circle cx="115" cy="315" r="28" fill="#2ec4b6" fill-opacity="0.15" />
  <text x="115" y="324" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="28">⚓</text>
  <text x="160" y="310" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">潘克洛夫</text>
  <text x="160" y="335" font-family="Microsoft YaHei" font-size="14" fill="#666666">水手，意志坚定，造船高手</text>
  <text x="160" y="360" font-family="Microsoft YaHei" font-size="12" fill="#2ec4b6" font-weight="700">动手达人</text>

  <path fill="#FFF3E0" d="M476,270 H824 A16,16 0 0 1 840,286 V374 A16,16 0 0 1 824,390 H476 A16,16 0 0 1 460,374 V286 A16,16 0 0 1 476,270 Z" />
  <path fill="#ff9f1c" d="M463,270 H463 A3,3 0 0 1 466,273 V387 A3,3 0 0 1 463,390 H463 A3,3 0 0 1 460,387 V273 A3,3 0 0 1 463,270 Z" />
  <circle cx="515" cy="315" r="28" fill="#ff9f1c" fill-opacity="0.15" />
  <text x="515" y="324" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="28">🧒</text>
  <text x="560" y="310" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">赫伯特</text>
  <text x="560" y="335" font-family="Microsoft YaHei" font-size="14" fill="#666666">15 岁少年，勇敢好学</text>
  <text x="560" y="360" font-family="Microsoft YaHei" font-size="12" fill="#ff9f1c" font-weight="700">和你差不多大！</text>

  <path fill="#FFF8E1" d="M876,270 H1204 A16,16 0 0 1 1220,286 V374 A16,16 0 0 1 1204,390 H876 A16,16 0 0 1 860,374 V286 A16,16 0 0 1 876,270 Z" />
  <path fill="#ffbf69" d="M863,270 H863 A3,3 0 0 1 866,273 V387 A3,3 0 0 1 863,390 H863 A3,3 0 0 1 860,387 V273 A3,3 0 0 1 863,270 Z" />
  <circle cx="915" cy="315" r="28" fill="#ffbf69" fill-opacity="0.15" />
  <text x="915" y="324" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="28">🤝</text>
  <text x="960" y="310" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">艾尔通</text>
  <text x="960" y="335" font-family="Microsoft YaHei" font-size="14" fill="#666666">后来加入，改过自新</text>
  <text x="960" y="360" font-family="Microsoft YaHei" font-size="12" fill="#ffbf69" font-weight="700">迷途知返</text>

  
  <path fill="#F0FAF9" stroke="#2ec4b6" stroke-width="1" d="M76,420 H604 A16,16 0 0 1 620,436 V484 A16,16 0 0 1 604,500 H76 A16,16 0 0 1 60,484 V436 A16,16 0 0 1 76,420 Z" />
  <text x="100" y="468" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="40">🐕</text>
  <text x="160" y="458" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">托普</text>
  <text x="160" y="485" font-family="Microsoft YaHei" font-size="15" fill="#666666">忠诚的狗，救了主人的命！</text>

  
  <path fill="#FFF3E0" stroke="#ff9f1c" stroke-width="1" d="M666,420 H1204 A16,16 0 0 1 1220,436 V484 A16,16 0 0 1 1204,500 H666 A16,16 0 0 1 650,484 V436 A16,16 0 0 1 666,420 Z" />
  <text x="690" y="468" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="40">🦧</text>
  <text x="750" y="458" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">朱普</text>
  <text x="750" y="485" font-family="Microsoft YaHei" font-size="15" fill="#666666">被驯养的猩猩，会帮忙干活，像家里的小成员！</text>

  
  <path fill="#FFF8E1" d="M96,540 H1184 A16,16 0 0 1 1200,556 V584 A16,16 0 0 1 1184,600 H96 A16,16 0 0 1 80,584 V556 A16,16 0 0 1 96,540 Z" />
  <text x="140" y="575" font-family="Microsoft YaHei" font-size="17" fill="#666666">💡 赫伯特 15 岁，比二年级的哥哥姐姐大一些，他可勇敢了！</text>

  
