<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6" />

  
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">我学到的道理 💡</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c" />

  
  <path fill="#F0FAF9" d="M96,140 H604 A16,16 0 0 1 620,156 V284 A16,16 0 0 1 604,300 H96 A16,16 0 0 1 80,284 V156 A16,16 0 0 1 96,140 Z" />
  <path fill="#2ec4b6" d="M83,140 H83 A3,3 0 0 1 86,143 V297 A3,3 0 0 1 83,300 H83 A3,3 0 0 1 80,297 V143 A3,3 0 0 1 83,140 Z" />
  <text x="120" y="185" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#2ec4b6">1. 团结就是力量</text>
  <text x="100" y="225" font-family="Microsoft YaHei" font-size="16" fill="#333333">六个人从一无所有到建立家园，</text>
  <text x="100" y="250" font-family="Microsoft YaHei" font-size="16" fill="#333333">靠的不是一个人厉害，而是</text>
  <text x="100" y="275" font-family="Microsoft YaHei" font-size="16" fill="#2ec4b6" font-weight="700">每个人发挥自己的特长！</text>

  
  <path fill="#FFF3E0" d="M676,140 H1184 A16,16 0 0 1 1200,156 V284 A16,16 0 0 1 1184,300 H676 A16,16 0 0 1 660,284 V156 A16,16 0 0 1 676,140 Z" />
  <path fill="#ff9f1c" d="M663,140 H663 A3,3 0 0 1 666,143 V297 A3,3 0 0 1 663,300 H663 A3,3 0 0 1 660,297 V143 A3,3 0 0 1 663,140 Z" />
  <text x="700" y="185" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#ff9f1c">2. 知识改变命运</text>
  <text x="680" y="225" font-family="Microsoft YaHei" font-size="16" fill="#333333">工程师用科学方法生火、制陶、</text>
  <text x="680" y="250" font-family="Microsoft YaHei" font-size="16" fill="#333333">炼铁、造船——知识是最强的</text>
  <text x="680" y="275" font-family="Microsoft YaHei" font-size="16" fill="#ff9f1c" font-weight="700">"超能力"！</text>

  
  <path fill="#FFF8E1" d="M96,330 H604 A16,16 0 0 1 620,346 V474 A16,16 0 0 1 604,490 H96 A16,16 0 0 1 80,474 V346 A16,16 0 0 1 96,330 Z" />
  <path fill="#ffbf69" d="M83,330 H83 A3,3 0 0 1 86,333 V487 A3,3 0 0 1 83,490 H83 A3,3 0 0 1 80,487 V333 A3,3 0 0 1 83,330 Z" />
  <text x="120" y="375" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#ffbf69">3. 永不放弃</text>
  <text x="100" y="415" font-family="Microsoft YaHei" font-size="16" fill="#333333">荒岛上没有食物、没有房子、</text>
  <text x="100" y="440" font-family="Microsoft YaHei" font-size="16" fill="#333333">还有海盗和火山……但他们</text>
  <text x="100" y="465" font-family="Microsoft YaHei" font-size="16" fill="#ffbf69" font-weight="700">从来没有说"算了吧"！</text>

  
  <path fill="#F0FAF9" d="M676,330 H1184 A16,16 0 0 1 1200,346 V474 A16,16 0 0 1 1184,490 H676 A16,16 0 0 1 660,474 V346 A16,16 0 0 1 676,330 Z" />
  <path fill="#2ec4b6" d="M663,330 H663 A3,3 0 0 1 666,333 V487 A3,3 0 0 1 663,490 H663 A3,3 0 0 1 660,487 V333 A3,3 0 0 1 663,330 Z" />
  <text x="700" y="375" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#2ec4b6">4. 善意会有回报</text>
  <text x="680" y="415" font-family="Microsoft YaHei" font-size="16" fill="#333333">他们救了艾尔通，后来艾尔通</text>
  <text x="680" y="440" font-family="Microsoft YaHei" font-size="16" fill="#333333">成了最忠实的伙伴。尼摩船长</text>
  <text x="680" y="465" font-family="Microsoft YaHei" font-size="16" fill="#2ec4b6" font-weight="700">默默帮助他们，因为值得！</text>

  
  <path fill="#2ec4b6" d="M100,530 H1180 A20,20 0 0 1 1200,550 V640 A20,20 0 0 1 1180,660 H100 A20,20 0 0 1 80,640 V550 A20,20 0 0 1 100,530 Z" />
  <text x="640" y="575" text-anchor="middle" font-family="Microsoft YaHei" font-size="26" font-weight="700" fill="#FFFFFF">🙋 互动时间！</text>
  <text x="640" y="615" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" fill="#E0F7F5">如果你流落荒岛，你最想带什么东西？为什么？</text>

  
  <circle cx="1100" cy="90" r="8" fill="#2ec4b6" fill-opacity="0.3" />

  
  <path fill="#2ec4b6" d="M1186,660 H1210 A6,6 0 0 1 1216,666 V682 A6,6 0 0 1 1210,688 H1186 A6,6 0 0 1 1180,682 V666 A6,6 0 0 1 1186,660 Z" />
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">10</text>
</svg>