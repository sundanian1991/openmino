<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6" />

  
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">他们住在哪？🏠</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c" />

  
  <path fill="#F0FAF9" d="M96,150 H594 A16,16 0 0 1 610,166 V394 A16,16 0 0 1 594,410 H96 A16,16 0 0 1 80,394 V166 A16,16 0 0 1 96,150 Z" />
  <path fill="#2ec4b6" d="M83,150 H83 A3,3 0 0 1 86,153 V407 A3,3 0 0 1 83,410 H83 A3,3 0 0 1 80,407 V153 A3,3 0 0 1 83,150 Z" />
  <text x="120" y="195" font-family="Microsoft YaHei" font-size="18" fill="#2ec4b6" font-weight="700">一开始</text>

  
  <text x="340" y="290" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="80">⛺</text>
  <text x="120" y="280" font-family="Microsoft YaHei" font-size="16" fill="#666666">用树枝和帆布</text>
  <text x="120" y="305" font-family="Microsoft YaHei" font-size="16" fill="#666666">搭了临时帐篷</text>
  <text x="120" y="330" font-family="Microsoft YaHei" font-size="16" fill="#666666">只能遮风挡雨</text>

  
  <text x="640" y="300" text-anchor="middle" font-family="Arial" font-size="40" fill="#ff9f1c" font-weight="700">→</text>

  
  <path fill="#FFF3E0" d="M696,150 H1184 A16,16 0 0 1 1200,166 V394 A16,16 0 0 1 1184,410 H696 A16,16 0 0 1 680,394 V166 A16,16 0 0 1 696,150 Z" />
  <path fill="#ff9f1c" d="M683,150 H683 A3,3 0 0 1 686,153 V407 A3,3 0 0 1 683,410 H683 A3,3 0 0 1 680,407 V153 A3,3 0 0 1 683,150 Z" />
  <text x="720" y="195" font-family="Microsoft YaHei" font-size="18" fill="#ff9f1c" font-weight="700">后来</text>

  
  <text x="940" y="290" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="80">🏛️</text>
  <text x="720" y="280" font-family="Microsoft YaHei" font-size="16" fill="#666666">发现悬崖上的大洞穴</text>
  <text x="720" y="305" font-family="Microsoft YaHei" font-size="16" fill="#666666">改造成了"花岗岩宫"</text>
  <text x="720" y="330" font-family="Microsoft YaHei" font-size="16" fill="#666666">有客厅、卧室、仓库！</text>

  
  <path fill="#FFF8E1" d="M96,440 H594 A16,16 0 0 1 610,456 V544 A16,16 0 0 1 594,560 H96 A16,16 0 0 1 80,544 V456 A16,16 0 0 1 96,440 Z" />
  <text x="120" y="480" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">🦧 朱普的家</text>
  <text x="120" y="510" font-family="Microsoft YaHei" font-size="16" fill="#666666">他们驯养了一只猩猩叫"朱普"</text>
  <text x="120" y="535" font-family="Microsoft YaHei" font-size="16" fill="#666666">朱普会帮忙干活，端盘子、擦桌子</text>
  <text x="120" y="480" text-anchor="start" />

  <path fill="#F0FAF9" d="M646,440 H1184 A16,16 0 0 1 1200,456 V544 A16,16 0 0 1 1184,560 H646 A16,16 0 0 1 630,544 V456 A16,16 0 0 1 646,440 Z" />
  <text x="670" y="480" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#333333">🪟 花岗岩宫长什么样？</text>
  <text x="670" y="510" font-family="Microsoft YaHei" font-size="16" fill="#666666">建在悬崖峭壁上，外面看不到里面</text>
  <text x="670" y="535" font-family="Microsoft YaHei" font-size="16" fill="#666666">有绳梯进出，非常安全！</text>

  
  <path fill="#FFFFFF" stroke="#2ec4b6" stroke-width="1" d="M96,590 H1184 A16,16 0 0 1 1200,606 V624 A16,16 0 0 1 1184,640 H96 A16,16 0 0 1 80,624 V606 A16,16 0 0 1 96,590 Z" />
  <text x="640" y="620" text-anchor="middle" font-family="Microsoft YaHei" font-size="17" fill="#2ec4b6" font-weight="700">💡 花岗岩宫 = Granite House，是他们在岛上的大本营</text>

  
  <circle cx="1100" cy="90" r="8" fill="#2ec4b6" fill-opacity="0.3" />

  
  <path fill="#2ec4b6" d="M1186,660 H1210 A6,6 0 0 1 1216,666 V682 A6,6 0 0 1 1210,688 H1186 A6,6 0 0 1 1180,682 V666 A6,6 0 0 1 1186,660 Z" />
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">6</text>
</svg>