<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="4" fill="#2ec4b6" />

  
  <text x="80" y="80" font-family="Microsoft YaHei" font-size="40" font-weight="700" fill="#2ec4b6">故事是怎么开始的？</text>
  <rect x="80" y="100" width="100" height="4" fill="#ff9f1c" />

  
  <path fill="#FFF3E0" d="M96,140 H1184 A16,16 0 0 1 1200,156 V214 A16,16 0 0 1 1184,230 H96 A16,16 0 0 1 80,214 V156 A16,16 0 0 1 96,140 Z" />
  <circle cx="140" cy="185" r="30" fill="#ff9f1c" />
  <text x="140" y="194" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="24">⚔️</text>
  <text x="190" y="180" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#333333">1865 年，美国南北战争</text>
  <text x="190" y="210" font-family="Microsoft YaHei" font-size="16" fill="#666666">五个北方俘虏被困在南方的城市里士满</text>

  
  <text x="630" y="265" text-anchor="middle" font-family="Arial" font-size="30" fill="#ff9f1c" font-weight="700">↓</text>

  
  <path fill="#F0FAF9" d="M96,280 H1184 A16,16 0 0 1 1200,296 V354 A16,16 0 0 1 1184,370 H96 A16,16 0 0 1 80,354 V296 A16,16 0 0 1 96,280 Z" />
  <circle cx="140" cy="325" r="30" fill="#2ec4b6" />
  <text x="140" y="334" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="24">🎈</text>
  <text x="190" y="320" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#333333">趁乱偷了一个热气球，想飞回北方</text>
  <text x="190" y="350" font-family="Microsoft YaHei" font-size="16" fill="#666666">结果遇到了可怕的大风暴，被吹到了太平洋上</text>

  
  <text x="630" y="405" text-anchor="middle" font-family="Arial" font-size="30" fill="#ff9f1c" font-weight="700">↓</text>

  
  <path fill="#FFF8E1" d="M96,425 H1184 A16,16 0 0 1 1200,441 V499 A16,16 0 0 1 1184,515 H96 A16,16 0 0 1 80,499 V441 A16,16 0 0 1 96,425 Z" />
  <circle cx="140" cy="470" r="30" fill="#ffbf69" />
  <text x="140" y="479" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji" font-size="24">🏝️</text>
  <text x="190" y="465" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#333333">落在了一个谁也没去过的荒岛上</text>
  <text x="190" y="495" font-family="Microsoft YaHei" font-size="16" fill="#666666">他们给这座岛取名"林肯岛"，纪念林肯总统</text>

  
  <text x="630" y="550" text-anchor="middle" font-family="Arial" font-size="30" fill="#2ec4b6" font-weight="700">↓</text>

  
  <path fill="#FFFFFF" stroke="#2ec4b6" stroke-width="2" d="M96,565 H1184 A16,16 0 0 1 1200,581 V629 A16,16 0 0 1 1184,645 H96 A16,16 0 0 1 80,629 V581 A16,16 0 0 1 96,565 Z" />
  <path fill="#2ec4b6" d="M83,565 H1197 A3,2.50 0 0 1 1200,567.50 V567.50 A3,2.50 0 0 1 1197,570 H83 A3,2.50 0 0 1 80,567.50 V567.50 A3,2.50 0 0 1 83,565 Z" />
  <text x="140" y="605" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#2ec4b6">💪 他们没有害怕，说："我们一起努力！"</text>

  
  <circle cx="1100" cy="90" r="8" fill="#2ec4b6" fill-opacity="0.3" />

  
  <path fill="#2ec4b6" d="M1186,660 H1210 A6,6 0 0 1 1216,666 V682 A6,6 0 0 1 1210,688 H1186 A6,6 0 0 1 1180,682 V666 A6,6 0 0 1 1186,660 Z" />
  <text x="1198" y="679" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
</svg>