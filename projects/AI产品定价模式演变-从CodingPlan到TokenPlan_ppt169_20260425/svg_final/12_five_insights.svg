<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="6" fill="#10B981" />

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#10B981" letter-spacing="2">INSIGHTS</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A1A2E">
        五条可复用的定价模式规律
    </text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        
        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M72,125 H418 A12,12 0 0 1 430,137 V353 A12,12 0 0 1 418,365 H72 A12,12 0 0 1 60,353 V137 A12,12 0 0 1 72,125 Z" />
        <path fill="#D97757" d="M63,125 H427 A3,3 0 0 1 430,128 V128 A3,3 0 0 1 427,131 H63 A3,3 0 0 1 60,128 V128 A3,3 0 0 1 63,125 Z" />
        <text x="90" y="165" font-size="18" font-weight="bold" fill="#D97757">01</text>
        <text x="90" y="195" font-size="18" font-weight="bold" fill="#1A1A2E">计量单位即定价权</text>
        <text x="90" y="225" font-size="14" fill="#64748B">谁定义计量单位，谁就掌握定价权。</text>
        <text x="90" y="248" font-size="14" fill="#64748B">MiniMax从Prompt转Token、Kimi从</text>
        <text x="90" y="268" font-size="14" fill="#64748B">Prompt转Token，都在争夺定义权。</text>
        <path fill="#D97757" fill-opacity="0.1" d="M104,305 H196 A14,14 0 0 1 210,319 V319 A14,14 0 0 1 196,333 H104 A14,14 0 0 1 90,319 V319 A14,14 0 0 1 104,305 Z" />
        <text x="150" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">模糊→透明</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M462,125 H808 A12,12 0 0 1 820,137 V353 A12,12 0 0 1 808,365 H462 A12,12 0 0 1 450,353 V137 A12,12 0 0 1 462,125 Z" />
        <path fill="#4A90D9" d="M453,125 H817 A3,3 0 0 1 820,128 V128 A3,3 0 0 1 817,131 H453 A3,3 0 0 1 450,128 V128 A3,3 0 0 1 453,125 Z" />
        <text x="480" y="165" font-size="18" font-weight="bold" fill="#4A90D9">02</text>
        <text x="480" y="195" font-size="18" font-weight="bold" fill="#1A1A2E">补贴-收紧-分层</text>
        <text x="480" y="225" font-size="14" fill="#64748B">所有互联网赛道定价都走这三步。</text>
        <text x="480" y="248" font-size="14" fill="#64748B">先补贴跑量，再收紧测试弹性，</text>
        <text x="480" y="268" font-size="14" fill="#64748B">最后精细分层最大化利润。</text>
        <path fill="#4A90D9" fill-opacity="0.1" d="M494,305 H586 A14,14 0 0 1 600,319 V319 A14,14 0 0 1 586,333 H494 A14,14 0 0 1 480,319 V319 A14,14 0 0 1 494,305 Z" />
        <text x="540" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">经典三段式</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M852,125 H1208 A12,12 0 0 1 1220,137 V353 A12,12 0 0 1 1208,365 H852 A12,12 0 0 1 840,353 V137 A12,12 0 0 1 852,125 Z" />
        <path fill="#10B981" d="M843,125 H1217 A3,3 0 0 1 1220,128 V128 A3,3 0 0 1 1217,131 H843 A3,3 0 0 1 840,128 V128 A3,3 0 0 1 843,125 Z" />
        <text x="870" y="165" font-size="18" font-weight="bold" fill="#10B981">03</text>
        <text x="870" y="195" font-size="18" font-weight="bold" fill="#1A1A2E">入口到生态</text>
        <text x="870" y="225" font-size="14" fill="#64748B">Coding是获客入口，Token是生态载体。</text>
        <text x="870" y="248" font-size="14" fill="#64748B">用编程高频刚需获客，用多媒体低频</text>
        <text x="870" y="268" font-size="14" fill="#64748B">高价值场景提高ARPU。</text>
        <path fill="#10B981" fill-opacity="0.1" d="M884,305 H976 A14,14 0 0 1 990,319 V319 A14,14 0 0 1 976,333 H884 A14,14 0 0 1 870,319 V319 A14,14 0 0 1 884,305 Z" />
        <text x="930" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">工具→生态</text>

        
        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M72,385 H608 A12,12 0 0 1 620,397 V613 A12,12 0 0 1 608,625 H72 A12,12 0 0 1 60,613 V397 A12,12 0 0 1 72,385 Z" />
        <path fill="#D97757" d="M63,385 H617 A3,3 0 0 1 620,388 V388 A3,3 0 0 1 617,391 H63 A3,3 0 0 1 60,388 V388 A3,3 0 0 1 63,385 Z" />
        <text x="90" y="425" font-size="18" font-weight="bold" fill="#D97757">04</text>
        <text x="90" y="455" font-size="18" font-weight="bold" fill="#1A1A2E">国内外定价逻辑根本差异</text>
        <text x="90" y="485" font-size="14" fill="#64748B">国内：7家同池打价格战，比谁更便宜</text>
        <text x="90" y="510" font-size="14" fill="#64748B">海外：面对Claude/GPT三巨头，需要证明"我不差"</text>
        <text x="90" y="535" font-size="14" fill="#64748B">同一产品两套价格体系的合理性来源于竞争环境差异。</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M652,385 H1208 A12,12 0 0 1 1220,397 V613 A12,12 0 0 1 1208,625 H652 A12,12 0 0 1 640,613 V397 A12,12 0 0 1 652,385 Z" />
        <path fill="#EF4444" d="M643,385 H1217 A3,3 0 0 1 1220,388 V388 A3,3 0 0 1 1217,391 H643 A3,3 0 0 1 640,388 V388 A3,3 0 0 1 643,385 Z" />
        <text x="670" y="425" font-size="18" font-weight="bold" fill="#EF4444">05</text>
        <text x="670" y="455" font-size="18" font-weight="bold" fill="#1A1A2E">Agent 时代成本不可逆增长</text>
        <text x="670" y="485" font-size="14" fill="#64748B">70% coding agent token 是浪费</text>
        <text x="670" y="510" font-size="14" fill="#64748B">一个开发者8个月消耗100亿Token，API价$15,000+</text>
        <text x="670" y="535" font-size="14" fill="#64748B">实际账单是标价的2-5倍，订阅费是地板不是天花板</text>
    </g>

    <text x="640" y="660" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#1A1A2E">这些规律不仅适用于AI定价，也适用于所有"算力即服务"的商业模式</text>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">12 / 15</text>
</svg>