<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="6" fill="#D97757" />

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="2">THREE-PHASE</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A1A2E">
        补贴 → 收紧 → 分层：互联网定价经典三段式
    </text>

    <path fill="#D97757" fill-opacity="0.08" d="M66,112 H1154 A6,6 0 0 1 1160,118 V138 A6,6 0 0 1 1154,144 H66 A6,6 0 0 1 60,138 V118 A6,6 0 0 1 66,112 Z" />
    <text x="610" y="134" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#D97757" font-weight="600">所有互联网赛道都走这三步，AI也不例外</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        
        <path fill="#F8FAFC" stroke="#4A90D9" stroke-width="2" d="M74,170 H406 A14,14 0 0 1 420,184 V516 A14,14 0 0 1 406,530 H74 A14,14 0 0 1 60,516 V184 A14,14 0 0 1 74,170 Z" />
        <path fill="#4A90D9" d="M64,170 H416 A4,4 0 0 1 420,174 V174 A4,4 0 0 1 416,178 H64 A4,4 0 0 1 60,174 V174 A4,4 0 0 1 64,170 Z" />

        <circle cx="240" cy="215" r="30" fill="#4A90D9" fill-opacity="0.15" />
        <text x="240" y="223" text-anchor="middle" font-size="20" font-weight="bold" fill="#4A90D9">1</text>

        <text x="240" y="275" text-anchor="middle" font-size="24" font-weight="bold" fill="#4A90D9">补贴期</text>
        <text x="240" y="300" text-anchor="middle" font-size="15" fill="#64748B">2024 - 2025</text>

        <rect x="85" y="320" width="310" height="2" fill="#E2E8F0" />

        <text x="85" y="350" font-size="16" font-weight="600" fill="#1A1A2E">目的：抢用户规模</text>
        <text x="85" y="380" font-size="14" fill="#1A1A2E">百万 Token 几毛钱</text>
        <text x="85" y="405" font-size="14" fill="#1A1A2E">首月 7.9 元入局</text>
        <text x="85" y="430" font-size="14" fill="#1A1A2E">建立使用习惯</text>
        <text x="85" y="455" font-size="14" fill="#1A1A2E">跑量验证需求</text>

        <path fill="#4A90D9" fill-opacity="0.1" d="M99,475 H171 A14,14 0 0 1 185,489 V489 A14,14 0 0 1 171,503 H99 A14,14 0 0 1 85,489 V489 A14,14 0 0 1 99,475 Z" />
        <text x="135" y="494" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">关键词：获客</text>

        
        <polygon points="440,350 430,340 430,360" fill="#64748B" />
        <line x1="430" y1="350" x2="420" y2="350" stroke="#64748B" stroke-width="3" />

        
        <path fill="#F8FAFC" stroke="#D97757" stroke-width="2" d="M474,170 H806 A14,14 0 0 1 820,184 V516 A14,14 0 0 1 806,530 H474 A14,14 0 0 1 460,516 V184 A14,14 0 0 1 474,170 Z" />
        <path fill="#D97757" d="M464,170 H816 A4,4 0 0 1 820,174 V174 A4,4 0 0 1 816,178 H464 A4,4 0 0 1 460,174 V174 A4,4 0 0 1 464,170 Z" />

        <circle cx="640" cy="215" r="30" fill="#D97757" fill-opacity="0.15" />
        <text x="640" y="223" text-anchor="middle" font-size="20" font-weight="bold" fill="#D97757">2</text>

        <text x="640" y="275" text-anchor="middle" font-size="24" font-weight="bold" fill="#D97757">收紧期</text>
        <text x="640" y="300" text-anchor="middle" font-size="15" fill="#64748B">2025 H2 - 至今</text>

        <rect x="485" y="320" width="310" height="2" fill="#E2E8F0" />

        <text x="485" y="350" font-size="16" font-weight="600" fill="#1A1A2E">目的：测试价格弹性</text>
        <text x="485" y="380" font-size="14" fill="#1A1A2E">取消首购优惠</text>
        <text x="485" y="405" font-size="14" fill="#1A1A2E">停售低档套餐</text>
        <text x="485" y="430" font-size="14" fill="#1A1A2E">每天10:30限时抢购</text>
        <text x="485" y="455" font-size="14" fill="#1A1A2E">筛选付费用户</text>

        <path fill="#D97757" fill-opacity="0.1" d="M499,475 H571 A14,14 0 0 1 585,489 V489 A14,14 0 0 1 571,503 H499 A14,14 0 0 1 485,489 V489 A14,14 0 0 1 499,475 Z" />
        <text x="535" y="494" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">关键词：测试</text>

        
        <polygon points="840,350 830,340 830,360" fill="#64748B" />
        <line x1="830" y1="350" x2="820" y2="350" stroke="#64748B" stroke-width="3" />

        
        <path fill="#F8FAFC" stroke="#10B981" stroke-width="2" d="M874,170 H1206 A14,14 0 0 1 1220,184 V516 A14,14 0 0 1 1206,530 H874 A14,14 0 0 1 860,516 V184 A14,14 0 0 1 874,170 Z" />
        <path fill="#10B981" d="M864,170 H1216 A4,4 0 0 1 1220,174 V174 A4,4 0 0 1 1216,178 H864 A4,4 0 0 1 860,174 V174 A4,4 0 0 1 864,170 Z" />

        <circle cx="1040" cy="215" r="30" fill="#10B981" fill-opacity="0.15" />
        <text x="1040" y="223" text-anchor="middle" font-size="20" font-weight="bold" fill="#10B981">3</text>

        <text x="1040" y="275" text-anchor="middle" font-size="24" font-weight="bold" fill="#10B981">分层期</text>
        <text x="1040" y="300" text-anchor="middle" font-size="15" fill="#64748B">2026 - 现在</text>

        <rect x="885" y="320" width="310" height="2" fill="#E2E8F0" />

        <text x="885" y="350" font-size="16" font-weight="600" fill="#1A1A2E">目的：利润最大化</text>
        <text x="885" y="380" font-size="14" fill="#1A1A2E">极速版 ¥98-899</text>
        <text x="885" y="405" font-size="14" fill="#1A1A2E">Kimi Allegro ¥559</text>
        <text x="885" y="430" font-size="14" fill="#1A1A2E">企业版 ¥198-1398</text>
        <text x="885" y="455" font-size="14" fill="#1A1A2E">精细分层收割</text>

        <path fill="#10B981" fill-opacity="0.1" d="M899,475 H971 A14,14 0 0 1 985,489 V489 A14,14 0 0 1 971,503 H899 A14,14 0 0 1 885,489 V489 A14,14 0 0 1 899,475 Z" />
        <text x="935" y="494" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">关键词：收割</text>
    </g>

    <path fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="1" d="M72,560 H1208 A12,12 0 0 1 1220,572 V618 A12,12 0 0 1 1208,630 H72 A12,12 0 0 1 60,618 V572 A12,12 0 0 1 72,560 Z" />
    <text x="90" y="588" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#4A90D9">可复用模式</text>
    <text x="90" y="615" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#1A1A2E">进入新市场时，不要一开始就想好定价。先补贴跑量，再收紧测试弹性，最后精细分层。</text>

    <text x="60" y="670" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">数据来源：各厂商官方公告、产品定价页面 2026-04</text>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">10 / 15</text>
</svg>