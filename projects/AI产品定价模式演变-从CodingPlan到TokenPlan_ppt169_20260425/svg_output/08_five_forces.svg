<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="6" fill="#D97757"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="2">FIVE FORCES</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A1A2E">
        五力竞争分析：行业内竞争极高，买方议价力强
    </text>

    <rect x="60" y="112" width="1100" height="32" fill="#D97757" fill-opacity="0.08" rx="6"/>
    <text x="610" y="134" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#D97757" font-weight="600">七家平台同池竞争，用户切换成本几乎为零</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <!-- Center box - Industry competition -->
        <rect x="440" y="165" width="400" height="160" fill="#D97757" fill-opacity="0.08" stroke="#D97757" stroke-width="2" rx="12"/>
        <text x="640" y="200" text-anchor="middle" font-size="18" font-weight="bold" fill="#D97757">行业内竞争</text>
        <text x="640" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#EF4444">极高</text>
        <text x="640" y="250" text-anchor="middle" font-size="14" fill="#1A1A2E">7家同池价格战</text>
        <text x="640" y="272" text-anchor="middle" font-size="14" fill="#64748B">首月7.9元起，全线跟进</text>
        <text x="640" y="294" text-anchor="middle" font-size="14" fill="#64748B">补贴期全面重叠</text>
        <text x="640" y="316" text-anchor="middle" font-size="13" fill="#EF4444" font-weight="600">★★★★★</text>

        <!-- Top - Supplier power -->
        <rect x="440" y="165" width="400" height="160" fill="#4A90D9" fill-opacity="0.05" stroke="#4A90D9" stroke-width="1" rx="12"/>
        <text x="640" y="200" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A90D9">行业内竞争</text>
        <text x="640" y="230" text-anchor="middle" font-size="24" font-weight="bold" fill="#D97757">极高</text>
        <text x="640" y="258" text-anchor="middle" font-size="14" fill="#1A1A2E">7家同池价格战</text>
        <text x="640" y="280" text-anchor="middle" font-size="14" fill="#64748B">首月7.9元起</text>
        <text x="640" y="302" text-anchor="middle" font-size="14" fill="#64748B">全线跟进补贴</text>
        <text x="640" y="324" text-anchor="middle" font-size="13" fill="#EF4444" font-weight="600">★★★★★</text>

        <!-- Left - Buyer power -->
        <rect x="40" y="265" width="370" height="140" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="2" rx="12"/>
        <text x="225" y="300" text-anchor="middle" font-size="17" font-weight="bold" fill="#10B981">买方议价力</text>
        <text x="225" y="325" text-anchor="middle" font-size="24" font-weight="bold" fill="#10B981">强</text>
        <text x="70" y="355" font-size="13" fill="#1A1A2E">7+平台可选，切换成本极低</text>
        <text x="70" y="375" font-size="13" fill="#1A1A2E">API Key一换即走</text>
        <text x="70" y="395" font-size="13" fill="#64748B">用户迁移零成本</text>

        <!-- Right - Substitute threat -->
        <rect x="870" y="265" width="370" height="140" fill="#D97757" fill-opacity="0.08" stroke="#D97757" stroke-width="2" rx="12"/>
        <text x="1055" y="300" text-anchor="middle" font-size="17" font-weight="bold" fill="#D97757">替代品威胁</text>
        <text x="1055" y="325" text-anchor="middle" font-size="24" font-weight="bold" fill="#D97757">高</text>
        <text x="900" y="355" font-size="13" fill="#1A1A2E">开源模型+本地部署</text>
        <text x="900" y="375" font-size="13" fill="#1A1A2E">DeepSeek V4开源</text>
        <text x="900" y="395" font-size="13" fill="#64748B">持续压制定价上限</text>

        <!-- Top - New entrant -->
        <rect x="440" y="165" width="400" height="140" fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="2" rx="12"/>
        <text x="640" y="200" text-anchor="middle" font-size="17" font-weight="bold" fill="#4A90D9">新进入者威胁</text>
        <text x="640" y="225" text-anchor="middle" font-size="24" font-weight="bold" fill="#4A90D9">中</text>
        <text x="470" y="255" font-size="13" fill="#1A1A2E">门槛高（百亿融资+算力）</text>
        <text x="470" y="275" font-size="13" fill="#1A1A2E">小米等新玩家仍在进入</text>
        <text x="470" y="295" font-size="13" fill="#64748B">$1/$3极低价破局</text>

        <!-- Bottom - Supplier power -->
        <rect x="440" y="425" width="400" height="140" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-width="2" rx="12"/>
        <text x="640" y="460" text-anchor="middle" font-size="17" font-weight="bold" fill="#EF4444">供应商议价力</text>
        <text x="640" y="485" text-anchor="middle" font-size="24" font-weight="bold" fill="#EF4444">中偏高</text>
        <text x="470" y="515" font-size="13" fill="#1A1A2E">GPU是刚性成本</text>
        <text x="470" y="535" font-size="13" fill="#1A1A2E">但国产芯片替代降低依赖</text>
        <text x="470" y="555" font-size="13" fill="#64748B">华为昇腾950量产中</text>

        <!-- Arrows connecting center to sides -->
        <polygon points="430,335 420,328 420,342" fill="#64748B"/>
        <polygon points="850,335 860,328 860,342" fill="#64748B"/>
        <line x1="420" y1="335" x2="410" y2="335" stroke="#64748B" stroke-width="2"/>
        <line x1="860" y1="335" x2="870" y2="335" stroke="#64748B" stroke-width="2"/>

        <line x1="640" y1="165" x2="640" y2="305" stroke="#64748B" stroke-width="2"/>
        <polygon points="640,305 634,293 646,293" fill="#64748B"/>

        <line x1="640" y1="425" x2="640" y2="305" stroke="#64748B" stroke-width="2"/>
        <polygon points="640,305 634,317 646,317" fill="#64748B"/>
    </g>

    <rect x="60" y="595" width="1100" height="50" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1" rx="10"/>
    <text x="90" y="618" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#10B981">核心判断</text>
    <text x="90" y="638" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1A1A2E">七家同池价格战 + 用户零切换成本 = 买方强势，定价权争夺白热化</text>

    <text x="640" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">8 / 15</text>
</svg>
