<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="6" fill="#4A90D9"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A90D9" letter-spacing="2">DRIVERS</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A1A2E">
        定价模式演进的三层驱动逻辑
    </text>

    <rect x="60" y="112" width="1100" height="32" fill="#4A90D9" fill-opacity="0.08" rx="6"/>
    <text x="610" y="134" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#4A90D9" font-weight="600">从底层算力到生态价值，三层驱动同时作用</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <!-- Layer 1: Cost-driven -->
        <rect x="60" y="170" width="1160" height="130" fill="#F8FAFC" stroke="#4A90D9" stroke-width="1" rx="12"/>
        <rect x="60" y="170" width="1160" height="6" fill="#4A90D9" rx="3"/>

        <circle cx="130" cy="210" r="32" fill="#4A90D9" fill-opacity="0.15"/>
        <text x="130" y="218" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A90D9">1</text>

        <text x="185" y="205" font-size="20" font-weight="bold" fill="#1A1A2E">成本驱动</text>
        <text x="185" y="230" font-size="15" fill="#64748B">算力成本 → Token成本 → 套餐定价</text>

        <rect x="600" y="185" width="580" height="100" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" rx="8"/>
        <text x="620" y="212" font-size="13" font-weight="600" fill="#4A90D9">关键要素</text>
        <text x="620" y="235" font-size="13" fill="#1A1A2E">国产芯片放量(华为950) → 算力成本下降 → Token定价空间打开</text>
        <text x="620" y="258" font-size="13" fill="#1A1A2E">DeepSeek V4开源 → MoE架构效率革命 → 1.6T参数仅激活49B</text>
        <text x="620" y="281" font-size="13" fill="#64748B">推理芯片竞争加剧 → 推理成本持续下降</text>

        <!-- Layer 2: Competition-driven -->
        <rect x="60" y="320" width="1160" height="130" fill="#F8FAFC" stroke="#D97757" stroke-width="1" rx="12"/>
        <rect x="60" y="320" width="1160" height="6" fill="#D97757" rx="3"/>

        <circle cx="130" cy="360" r="32" fill="#D97757" fill-opacity="0.15"/>
        <text x="130" y="368" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97757">2</text>

        <text x="185" y="355" font-size="20" font-weight="bold" fill="#1A1A2E">竞争驱动</text>
        <text x="185" y="380" font-size="15" fill="#64748B">价格战 → 补贴圈用户 → 收紧利润</text>

        <rect x="600" y="335" width="580" height="100" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" rx="8"/>
        <text x="620" y="362" font-size="13" font-weight="600" fill="#D97757">关键要素</text>
        <text x="620" y="385" font-size="13" fill="#1A1A2E">2024-2025 补贴期：百万Token几毛钱，首月7.9元获客</text>
        <text x="620" y="408" font-size="13" fill="#1A1A2E">2025H2 收紧期：限购、停售低档、限时抢购测试价格弹性</text>
        <text x="620" y="431" font-size="13" fill="#64748B">2026 分层期：极速版¥98-899，利润最大化</text>

        <!-- Layer 3: Value-driven -->
        <rect x="60" y="470" width="1160" height="130" fill="#F8FAFC" stroke="#10B981" stroke-width="1" rx="12"/>
        <rect x="60" y="470" width="1160" height="6" fill="#10B981" rx="3"/>

        <circle cx="130" cy="510" r="32" fill="#10B981" fill-opacity="0.15"/>
        <text x="130" y="518" text-anchor="middle" font-size="16" font-weight="bold" fill="#10B981">3</text>

        <text x="185" y="505" font-size="20" font-weight="bold" fill="#1A1A2E">价值驱动</text>
        <text x="185" y="530" font-size="15" fill="#64748B">从卖Token → 卖工作流 → 卖生态</text>

        <rect x="600" y="485" width="580" height="100" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" rx="8"/>
        <text x="620" y="512" font-size="13" font-weight="600" fill="#10B981">关键要素</text>
        <text x="620" y="535" font-size="13" fill="#1A1A2E">用编程高频刚需获客 → 用多媒体低频高价值场景提高ARPU</text>
        <text x="620" y="558" font-size="13" fill="#1A1A2E">MiniMax Token Plan打包图片/语音/音乐/视频</text>
        <text x="620" y="581" font-size="13" fill="#64748B">从"编程工具"升级为"AI多媒体工作室"</text>
    </g>

    <text x="640" y="640" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#1A1A2E">三层驱动同时作用，决定定价模式的演变方向与速度</text>

    <text x="60" y="680" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">分析框架：成本-竞争-价值三层驱动模型 | 数据来源：各厂商公告、IDC、伯恩斯坦</text>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">9 / 15</text>
</svg>
