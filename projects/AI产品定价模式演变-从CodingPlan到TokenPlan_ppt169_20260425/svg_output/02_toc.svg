<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="sideAccent" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#D97757"/>
            <stop offset="100%" stop-color="#E8956F"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>

    <rect x="0" y="0" width="8" height="720" fill="url(#sideAccent)"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="2">AGENDA</text>

    <text x="60" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold" fill="#1A1A2E">
        目录
    </text>

    <line x1="60" y1="130" x2="300" y2="130" stroke="#E2E8F0" stroke-width="2"/>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <g>
            <circle cx="90" cy="200" r="24" fill="#D97757"/>
            <text x="90" y="207" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
            <text x="130" y="195" font-size="20" font-weight="600" fill="#1A1A2E">发生了什么</text>
            <text x="130" y="218" font-size="15" fill="#64748B">事实层 — 时间线、定价对比、计量体系</text>
        </g>

        <g>
            <circle cx="90" cy="285" r="24" fill="#4A90D9"/>
            <text x="90" y="292" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
            <text x="130" y="280" font-size="20" font-weight="600" fill="#1A1A2E">为什么这么演变</text>
            <text x="130" y="303" font-size="15" fill="#64748B">框架层 — 五力分析、三段式节奏</text>
        </g>

        <g>
            <circle cx="90" cy="370" r="24" fill="#10B981"/>
            <text x="90" y="377" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
            <text x="130" y="365" font-size="20" font-weight="600" fill="#1A1A2E">能提炼什么</text>
            <text x="130" y="388" font-size="15" fill="#64748B">洞察层 — 五条可复用模式</text>
        </g>

        <g>
            <circle cx="90" cy="455" r="24" fill="#D97757"/>
            <text x="90" y="462" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
            <text x="130" y="450" font-size="20" font-weight="600" fill="#1A1A2E">未来预判</text>
            <text x="130" y="473" font-size="15" fill="#64748B">趋势与核心结论</text>
        </g>
    </g>

    <g transform="translate(780, 160)">
        <rect x="0" y="0" width="400" height="360" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="16"/>

        <text x="200" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#1A1A2E" text-anchor="middle">定价模式演进路径</text>

        <rect x="30" y="70" width="340" height="50" fill="#4A90D9" fill-opacity="0.1" stroke="#4A90D9" stroke-width="2" rx="8"/>
        <text x="200" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#4A90D9" text-anchor="middle">API 按量计费（2024）</text>

        <path d="M200,120 L200,148" stroke="#64748B" stroke-width="2"/>
        <polygon points="200,158 194,146 206,146" fill="#64748B"/>

        <rect x="30" y="165" width="340" height="50" fill="#D97757" fill-opacity="0.15" stroke="#D97757" stroke-width="2" rx="8"/>
        <text x="200" y="197" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#D97757" text-anchor="middle">Coding Plan 订阅（2025）</text>

        <path d="M200,215 L200,243" stroke="#64748B" stroke-width="2"/>
        <polygon points="200,253 194,241 206,241" fill="#64748B"/>

        <rect x="30" y="260" width="340" height="50" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="2" rx="8"/>
        <text x="200" y="292" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#10B981" text-anchor="middle">Token Plan 精细计量（2026）</text>

        <text x="200" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">从模糊打包 → 透明计费 → 按需选择</text>
    </g>

    <text x="640" y="695" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">2 / 15</text>
</svg>
