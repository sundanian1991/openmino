<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="6" fill="#10B981"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#10B981" letter-spacing="2">FUTURE TRENDS</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A1A2E">
        四大趋势预判与核心结论
    </text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <!-- Trend 1 -->
        <rect x="60" y="125" width="570" height="180" fill="#F8FAFC" stroke="#4A90D9" stroke-width="1" rx="12"/>
        <rect x="60" y="125" width="570" height="6" fill="#4A90D9" rx="3"/>
        <text x="90" y="165" font-size="20" font-weight="bold" fill="#4A90D9">趋势一</text>
        <text x="90" y="195" font-size="17" font-weight="600" fill="#1A1A2E">Token 成本将持续下降</text>
        <text x="90" y="225" font-size="14" fill="#64748B">国产芯片放量（华为950年内75万片）</text>
        <text x="90" y="248" font-size="14" fill="#64748B">DeepSeek V4 MoE效率革命</text>
        <text x="90" y="271" font-size="14" fill="#64748B">推理芯片竞争（NVIDIA/Google/华为）</text>
        <rect x="90" y="285" width="160" height="10" fill="#4A90D9" rx="5"/>
        <text x="260" y="294" font-size="13" font-weight="600" fill="#4A90D9">利润来自服务溢价</text>

        <!-- Trend 2 -->
        <rect x="650" y="125" width="570" height="180" fill="#F8FAFC" stroke="#10B981" stroke-width="1" rx="12"/>
        <rect x="650" y="125" width="570" height="6" fill="#10B981" rx="3"/>
        <text x="680" y="165" font-size="20" font-weight="bold" fill="#10B981">趋势二</text>
        <text x="680" y="195" font-size="17" font-weight="600" fill="#1A1A2E">国产芯片替代加速</text>
        <text x="680" y="225" font-size="14" fill="#64748B">英伟达市占率 66%→54%→50%以下</text>
        <text x="680" y="248" font-size="14" fill="#64748B">华为+寒武纪+平头哥算力三角</text>
        <text x="680" y="271" font-size="14" fill="#64748B">CUDA→CANN迁移效率超90%</text>
        <rect x="680" y="285" width="180" height="10" fill="#10B981" rx="5"/>
        <text x="870" y="294" font-size="13" font-weight="600" fill="#10B981">定价策略可更激进</text>

        <!-- Trend 3 -->
        <rect x="60" y="325" width="570" height="180" fill="#F8FAFC" stroke="#D97757" stroke-width="1" rx="12"/>
        <rect x="60" y="325" width="570" height="6" fill="#D97757" rx="3"/>
        <text x="90" y="365" font-size="20" font-weight="bold" fill="#D97757">趋势三</text>
        <text x="90" y="395" font-size="17" font-weight="600" fill="#1A1A2E">开源模型重塑定价权</text>
        <text x="90" y="425" font-size="14" fill="#64748B">DeepSeek模式：开源+极致低价+不卖订阅</text>
        <text x="90" y="448" font-size="14" fill="#64748B">V3.2在OpenRouter月调用5.35万亿token</text>
        <text x="90" y="471" font-size="14" fill="#64748B">开源模型的免费部署能力压制定价上限</text>

        <!-- Trend 4 -->
        <rect x="650" y="325" width="570" height="180" fill="#F8FAFC" stroke="#EF4444" stroke-width="1" rx="12"/>
        <rect x="650" y="325" width="570" height="6" fill="#EF4444" rx="3"/>
        <text x="680" y="365" font-size="20" font-weight="bold" fill="#EF4444">趋势四</text>
        <text x="680" y="395" font-size="17" font-weight="600" fill="#1A1A2E">Agent成本指数增长不可逆</text>
        <text x="680" y="425" font-size="14" fill="#64748B">推理需求2026年已达训练的4-5倍</text>
        <text x="680" y="448" font-size="14" fill="#64748B">IDC预测2028年推理工作负载占比73%</text>
        <text x="680" y="471" font-size="14" fill="#64748B">不限量模式不可持续，必须精细计量</text>

        <!-- Core Conclusion -->
        <rect x="60" y="535" width="1160" height="100" fill="#1A1A2E" rx="14"/>
        <text x="640" y="570" text-anchor="middle" font-size="18" font-weight="600" fill="#D97757">核心结论</text>
        <text x="640" y="600" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">Coding Plan 是过渡产品，Token Plan 是终态</text>
        <text x="640" y="625" text-anchor="middle" font-size="15" fill="#FFFFFF" fill-opacity="0.7">核心学到三件事：计量单位即定价权、补贴-收紧-分层节奏、入口到生态升级路径</text>
    </g>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">14 / 15</text>
</svg>
