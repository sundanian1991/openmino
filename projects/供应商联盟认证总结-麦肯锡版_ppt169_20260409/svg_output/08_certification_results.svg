<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587"/>
            <stop offset="100%" style="stop-color:#0076A8"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)"/>
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="60" y="22" width="50" height="40" fill="#005587" rx="4"/>
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">02</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">认证评分规则与结果</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">认证结果</text>

    <rect x="60" y="100" width="1160" height="50" fill="#FFF8E1" stroke="#F5A623" stroke-width="1" rx="4"/>
    <rect x="60" y="100" width="5" height="50" fill="#F5A623" rx="2"/>
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">5家供应商全部通过认证，岐力91分领跑，结构可落地性占比最高（50分）</text>

    <!-- Left: Scoring Rules -->
    <g transform="translate(60, 170)">
        <rect width="500" height="450" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="4" height="450" fill="#005587" rx="2"/>
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#005587">评分规则</text>

        <!-- Score item 1 -->
        <rect x="20" y="55" width="455" height="70" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" rx="6"/>
        <text x="40" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">清晰表达有自己观点</text>
        <text x="40" y="110" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">表达逻辑、观点深度、独立思考能力</text>
        <rect x="390" y="70" width="70" height="40" fill="#005587" rx="4"/>
        <text x="425" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">25分</text>

        <!-- Score item 2 -->
        <rect x="20" y="145" width="455" height="70" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" rx="6"/>
        <text x="40" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">内容完整贴合主题</text>
        <text x="40" y="200" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">内容覆盖度、与培训主题的匹配度</text>
        <rect x="390" y="160" width="70" height="40" fill="#005587" rx="4"/>
        <text x="425" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">25分</text>

        <!-- Score item 3 -->
        <rect x="20" y="235" width="455" height="70" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" rx="6"/>
        <text x="40" y="265" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">结构清晰可落地</text>
        <text x="40" y="290" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">方案结构、可执行性、时间节点明确</text>
        <rect x="390" y="250" width="70" height="40" fill="#F5A623" rx="4"/>
        <text x="425" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">50分</text>

        <!-- Bonus -->
        <rect x="20" y="330" width="455" height="100" fill="#FFF8E1" stroke="#F5A623" stroke-width="1" rx="6"/>
        <text x="40" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E89207">加分项</text>
        <text x="40" y="385" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">抓住底层逻辑、有延伸思考</text>
        <text x="40" y="410" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">落地可行性高、方案清晰</text>

        <!-- Time rule -->
        <rect x="20" y="415" width="455" height="25" fill="none" stroke="none"/>
        <text x="40" y="440" font-family="Arial, sans-serif" font-size="13" fill="#95A5A6">汇报8分钟 + 提问2分钟，单家最长10分钟 | 四位评委打分，满分100，80分通过</text>
    </g>

    <!-- Right: Results -->
    <g transform="translate(600, 170)">
        <rect width="620" height="450" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="4" height="450" fill="#27AE60" rx="2"/>
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#27AE60">认证结果 — 全部通过</text>

        <!-- Rank 1 -->
        <rect x="20" y="55" width="580" height="100" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" rx="6"/>
        <circle cx="55" cy="105" r="28" fill="#F5A623"/>
        <text x="55" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="100" y="95" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">岐力</text>
        <text x="100" y="120" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">准入端话术模式表 + 三阶段落地计划 + 专项保障小组</text>
        <rect x="480" y="75" width="100" height="60" fill="#F5A623" rx="6"/>
        <text x="530" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">91</text>
        <text x="530" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">分</text>

        <!-- Rank 2 -->
        <rect x="20" y="170" width="580" height="100" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" rx="6"/>
        <circle cx="55" cy="220" r="28" fill="#005587"/>
        <text x="55" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="100" y="210" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">汇讯</text>
        <text x="100" y="235" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">BI看板已落地 + 共享话术库提议 + 管理工具需求明确</text>
        <rect x="480" y="190" width="100" height="60" fill="#005587" rx="6"/>
        <text x="530" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">88</text>
        <text x="530" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">分</text>

        <!-- Rank 3 -->
        <rect x="20" y="285" width="580" height="100" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" rx="6"/>
        <circle cx="55" cy="335" r="28" fill="#0076A8"/>
        <text x="55" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="100" y="325" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">赛维斯</text>
        <text x="100" y="350" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">结构完整、方案可落地、有独立思考</text>
        <rect x="480" y="305" width="100" height="60" fill="#0076A8" rx="6"/>
        <text x="530" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">86</text>
        <text x="530" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">分</text>

        <!-- Others -->
        <text x="25" y="415" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">华讯、广达、瀚锐、华道 均已通过认证（80分以上）</text>
    </g>

    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1"/>
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 313上午供应商联盟认证总结会 | 四位评委打分，满分100分，80分通过</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">可落地性占50分权重，方案执行力是认证核心</text>
    <rect x="1140" y="655" width="80" height="30" fill="#005587" rx="4"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">08</text>
</svg>
