<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587"/>
            <stop offset="100%" style="stop-color:#0076A8"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)"/>
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="60" y="22" width="50" height="40" fill="#005587" rx="4"/>
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">03</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">各供应商核心收获与落地方向</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">落地方案</text>

    <rect x="60" y="100" width="1160" height="50" fill="#FFF8E1" stroke="#F5A623" stroke-width="1" rx="4"/>
    <rect x="60" y="100" width="5" height="50" fill="#F5A623" rx="2"/>
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">各供应商从不同切入点补强短板：华啸重数据、广重运营、瀚锐重新人、华道重团队</text>

    <!-- Supplier cards in 2x2 grid -->
    <!-- 华啸 -->
    <g transform="translate(60, 170)">
        <rect width="560" height="210" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="4" height="210" fill="#005587" rx="2"/>
        <text x="25" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#005587">华啸</text>
        <text x="25" y="55" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">核心：数据驱动 + SOP标准化</text>
        <line x1="15" y1="65" x2="545" y2="65" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="90" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 建立清晰坐席画像，结构化面试+试岗</text>
        <text x="25" y="112" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 名产分层精细化，按额度/活跃度分层</text>
        <text x="25" y="134" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 动态话术入库更新机制</text>
        <text x="25" y="156" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 引入自动化报表做实时监测</text>
        <text x="25" y="190" font-family="Arial, sans-serif" font-size="12" fill="#F5A623" font-weight="bold">三个月：名产打标 → SOP框架 → 数据体系 → 复盘验证</text>
    </g>

    <!-- 广达 -->
    <g transform="translate(660, 170)">
        <rect width="560" height="210" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="4" height="210" fill="#0076A8" rx="2"/>
        <text x="25" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0076A8">广达</text>
        <text x="25" y="55" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">核心：人员培养 + 运营模块优化</text>
        <line x1="15" y1="65" x2="545" y2="65" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="90" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 补充抗压能力测试、工作稳定性考察</text>
        <text x="25" y="112" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 师徒带教二对一+复盘闭环</text>
        <text x="25" y="134" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 补充午会机制+夕会清问题闭环</text>
        <text x="25" y="156" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 优化拨打时段划分+客户全标签打标</text>
        <text x="25" y="190" font-family="Arial, sans-serif" font-size="12" fill="#F5A623" font-weight="bold">18号前：人员培养/分层/拨打策略优化 | 20号前：异议处理+数据库</text>
    </g>

    <!-- 瀚锐 -->
    <g transform="translate(60, 400)">
        <rect width="560" height="210" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="4" height="210" fill="#004D5C" rx="2"/>
        <text x="25" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#004D5C">瀚锐</text>
        <text x="25" y="55" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">核心：招聘策略调整 + 老团队激活</text>
        <line x1="15" y1="65" x2="545" y2="65" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="90" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 从"挖经验"转向"招服从性/执行力强"</text>
        <text x="25" y="112" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 30天成长计划纸质表，主管签字确认</text>
        <text x="25" y="134" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 师傅从Top员工改为中等+有耐心热情</text>
        <text x="25" y="156" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 晨会话术接龙，坐席自己总结分享</text>
        <text x="25" y="190" font-family="Arial, sans-serif" font-size="12" fill="#F5A623" font-weight="bold">新团队全面执行新标准，倒逼老团队改变，外呼SOP已执行一周见效</text>
    </g>

    <!-- 华道 -->
    <g transform="translate(660, 400)">
        <rect width="560" height="210" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="4" height="210" fill="#F5A623" rx="2"/>
        <text x="25" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F5A623">华道</text>
        <text x="25" y="55" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">核心：晨会优化 + 师徒PK机制</text>
        <line x1="15" y1="65" x2="545" y2="65" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="90" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 晨会以坐席个人汇报为主</text>
        <text x="25" y="112" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 公开最高最低业绩，不批评尾部</text>
        <text x="25" y="134" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 师傅班组PK机制+验收环节</text>
        <text x="25" y="156" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">- 60秒非有效名单统一回收至中乾</text>
        <text x="25" y="190" font-family="Arial, sans-serif" font-size="12" fill="#F5A623" font-weight="bold">实操通关三次机会 | 上岗后30天每日培训 | 从新人阶段精准客户打标</text>
    </g>

    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1"/>
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 313上午供应商联盟认证总结会 | 各供应商学习收获与落地计划</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">各供应商差异化补强：华啸重数据、广达重运营、瀚锐重新人、华道重团队</text>
    <rect x="1140" y="655" width="80" height="30" fill="#005587" rx="4"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">11</text>
</svg>
