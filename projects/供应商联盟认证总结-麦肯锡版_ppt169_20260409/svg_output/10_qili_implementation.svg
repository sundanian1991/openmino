<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587"/>
            <stop offset="100%" style="stop-color:#0076A8"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)"/>
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="60" y="22" width="50" height="40" fill="#005587" rx="4"/>
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">03</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">岐力 — 三阶段落地实施方案</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">认证第一名（91分）</text>

    <rect x="60" y="100" width="1160" height="50" fill="#FFF8E1" stroke="#F5A623" stroke-width="1" rx="4"/>
    <rect x="60" y="100" width="5" height="50" fill="#F5A623" rx="2"/>
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">从准入管控到培优打造再到全面标准化，循序渐进实现管理升级</text>

    <!-- Phase 1 -->
    <g transform="translate(60, 170)">
        <rect width="350" height="300" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="350" height="50" fill="#005587" rx="6"/>
        <rect x="0" y="30" width="350" height="20" fill="#005587"/>
        <text x="175" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第一阶段：准入管控</text>

        <circle cx="40" cy="85" r="18" fill="#005587"/>
        <text x="40" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="75" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">目标</text>
        <text x="75" y="110" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">新员工手动流数据降低50%</text>
        <text x="75" y="132" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">管理层养成每日数据查看习惯</text>

        <line x1="20" y1="150" x2="330" y2="150" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">关键动作</text>
        <text x="25" y="200" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 执行话术模式表和人员画像要求</text>
        <text x="25" y="222" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 新人新办法老人老办法</text>
        <text x="25" y="244" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 管控准入端，建立初步认知</text>

        <text x="25" y="280" font-family="Arial, sans-serif" font-size="13" fill="#F5A623" font-weight="bold">周期：第1个月</text>
    </g>

    <!-- Phase 2 -->
    <g transform="translate(465, 170)">
        <rect width="350" height="300" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="350" height="50" fill="#F5A623" rx="6"/>
        <rect x="0" y="30" width="350" height="20" fill="#F5A623"/>
        <text x="175" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第二阶段：培优打造</text>

        <circle cx="40" cy="85" r="18" fill="#F5A623"/>
        <text x="40" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="75" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">目标</text>
        <text x="75" y="110" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">覆盖25%-40%员工培优</text>
        <text x="75" y="132" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">打造核心团队，安排专项预算</text>

        <line x1="20" y1="150" x2="330" y2="150" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">关键动作</text>
        <text x="25" y="200" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 分模块赋能培训</text>
        <text x="25" y="222" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 引入轻量级管理工具</text>
        <text x="25" y="244" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 适配性底线标准</text>
        <text x="25" y="266" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 标准化制度管理核心盘</text>

        <text x="25" y="280" font-family="Arial, sans-serif" font-size="13" fill="#F5A623" font-weight="bold">周期：第2-3个月</text>
    </g>

    <!-- Phase 3 -->
    <g transform="translate(870, 170)">
        <rect width="350" height="300" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="6"/>
        <rect x="0" y="0" width="350" height="50" fill="#0076A8" rx="6"/>
        <rect x="0" y="30" width="350" height="20" fill="#0076A8"/>
        <text x="175" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第三阶段：全面标准化</text>

        <circle cx="40" cy="85" r="18" fill="#0076A8"/>
        <text x="40" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="75" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">目标</text>
        <text x="75" y="110" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">全团队标准化管理</text>
        <text x="75" y="132" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">成熟制度全项目推广</text>

        <line x1="20" y1="150" x2="330" y2="150" stroke="#E5E7EB" stroke-width="1"/>
        <text x="25" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">关键动作</text>
        <text x="25" y="200" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 验证成熟的制度迭代推广</text>
        <text x="25" y="222" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 管理工具全项目覆盖</text>
        <text x="25" y="244" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 常态化业务流程演练</text>
        <text x="25" y="266" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">- 预算向30%潜力员工倾斜</text>

        <text x="25" y="280" font-family="Arial, sans-serif" font-size="13" fill="#F5A623" font-weight="bold">周期：第4-6个月</text>
    </g>

    <!-- Bottom: Challenges and safeguards -->
    <g transform="translate(60, 490)">
        <rect width="560" height="130" fill="#FFF5F5" stroke="#E74C3C" stroke-width="1" rx="6"/>
        <rect x="0" y="0" width="4" height="130" fill="#E74C3C" rx="2"/>
        <text x="25" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E74C3C">现存挑战</text>
        <text x="25" y="55" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">- 先天规模化交付供给不足</text>
        <text x="25" y="78" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">- 存量人员不满足标准</text>
        <text x="25" y="101" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">- 短周期考核要求稳定交付</text>
        <text x="25" y="120" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">需平衡规模交付与质量标准</text>
    </g>

    <g transform="translate(660, 490)">
        <rect width="560" height="130" fill="#F0F9FF" stroke="#0076A8" stroke-width="1" rx="6"/>
        <rect x="0" y="0" width="4" height="130" fill="#0076A8" rx="2"/>
        <text x="25" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0076A8">保障措施</text>
        <text x="25" y="55" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">- 启动专项小组，组织发展部和合规部牵头</text>
        <text x="25" y="78" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">- 分阶段由不同部门推进</text>
        <text x="25" y="101" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">- 所有任务绑定绩效考核</text>
        <text x="25" y="120" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">组织保障 + 绩效绑定 = 落地确定性</text>
    </g>

    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1"/>
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 313上午供应商联盟认证总结会 | 岐力落地实施方案汇报</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">三阶段递进：准入管控 → 培优打造 → 全面标准化</text>
    <rect x="1140" y="655" width="80" height="30" fill="#005587" rx="4"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">10</text>
</svg>
