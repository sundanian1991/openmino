<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587" />
            <stop offset="100%" style="stop-color:#0076A8" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)" />
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC" />
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1" />
    <path fill="#005587" d="M64,22 H106 A4,4 0 0 1 110,26 V58 A4,4 0 0 1 106,62 H64 A4,4 0 0 1 60,58 V26 A4,4 0 0 1 64,22 Z" />
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">02</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">ABC分级竞争机制与失败教训</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">核心方法论</text>

    <path fill="#FFF8E1" stroke="#F5A623" stroke-width="1" d="M64,100 H1216 A4,4 0 0 1 1220,104 V146 A4,4 0 0 1 1216,150 H64 A4,4 0 0 1 60,146 V104 A4,4 0 0 1 64,100 Z" />
    <path fill="#F5A623" d="M62,100 H63 A2,2 0 0 1 65,102 V148 A2,2 0 0 1 63,150 H62 A2,2 0 0 1 60,148 V102 A2,2 0 0 1 62,100 Z" />
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">同等级竞争保证公平感，但固定名单额度导致"阶层固化"是失败核心原因</text>

    
    <g transform="translate(60, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H444 A6,6 0 0 1 450,6 V444 A6,6 0 0 1 444,450 H6 A6,6 0 0 1 0,444 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V448 A2,2 0 0 1 2,450 H2 A2,2 0 0 1 0,448 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#005587">核心原则</text>

        
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,55 H424 A6,6 0 0 1 430,61 V159 A6,6 0 0 1 424,165 H26 A6,6 0 0 1 20,159 V61 A6,6 0 0 1 26,55 Z" />
        <circle cx="50" cy="110" r="24" fill="#005587" />
        <text x="50" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="90" y="95" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2C3E50">同等级竞争</text>
        <text x="90" y="125" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">C级不越级A级，保证竞争信心</text>
        <text x="90" y="148" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">C打赢C升B，B打赢B升A</text>

        
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,185 H424 A6,6 0 0 1 430,191 V289 A6,6 0 0 1 424,295 H26 A6,6 0 0 1 20,289 V191 A6,6 0 0 1 26,185 Z" />
        <circle cx="50" cy="240" r="24" fill="#005587" />
        <text x="50" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="90" y="225" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2C3E50">名单量差异化</text>
        <text x="90" y="255" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">A级比C级多15条</text>
        <text x="90" y="278" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">额外奖励给能力突出的批次</text>

        
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,315 H424 A6,6 0 0 1 430,321 V419 A6,6 0 0 1 424,425 H26 A6,6 0 0 1 20,419 V321 A6,6 0 0 1 26,315 Z" />
        <circle cx="50" cy="370" r="24" fill="#005587" />
        <text x="50" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="90" y="355" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2C3E50">5S管理 + 可视化激励</text>
        <text x="90" y="385" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">龙虎榜、追踪榜、光榜</text>
        <text x="90" y="408" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">明确个人和团队排名位置</text>
    </g>

    
    <g transform="translate(540, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H674 A6,6 0 0 1 680,6 V444 A6,6 0 0 1 674,450 H6 A6,6 0 0 1 0,444 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#E74C3C" d="M2,0 H2 A2,2 0 0 1 4,2 V448 A2,2 0 0 1 2,450 H2 A2,2 0 0 1 0,448 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E74C3C">失败教训：王者荣耀段位分级</text>

        
        <line x1="60" y1="70" x2="60" y2="380" stroke="#E5E7EB" stroke-width="2" />

        
        <circle cx="60" cy="90" r="16" fill="#27AE60" />
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M106,70 H634 A6,6 0 0 1 640,76 V144 A6,6 0 0 1 634,150 H106 A6,6 0 0 1 100,144 V76 A6,6 0 0 1 106,70 Z" />
        <text x="120" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27AE60">初期效果很好</text>
        <text x="120" y="125" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">坐席主动加班冲业绩，段位晋升激励明显</text>
        <text x="120" y="140" font-family="Arial, sans-serif" font-size="13" fill="#7F8C8D">按周度业绩升降档，对应不同名单额度</text>

        
        <circle cx="60" cy="210" r="16" fill="#F5A623" />
        <path fill="#FFF8E1" stroke="#F5A623" stroke-width="1" d="M106,190 H634 A6,6 0 0 1 640,196 V264 A6,6 0 0 1 634,270 H106 A6,6 0 0 1 100,264 V196 A6,6 0 0 1 106,190 Z" />
        <text x="120" y="220" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E89207">问题逐渐暴露</text>
        <text x="120" y="245" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">分级后直接对应固定名单额度</text>
        <text x="120" y="260" font-family="Arial, sans-serif" font-size="13" fill="#7F8C8D">低段位坐席认为永远升不上去，产生不公平感</text>

        
        <circle cx="60" cy="330" r="16" fill="#E74C3C" />
        <path fill="#FFF5F5" stroke="#E74C3C" stroke-width="1" d="M106,310 H634 A6,6 0 0 1 640,316 V384 A6,6 0 0 1 634,390 H106 A6,6 0 0 1 100,384 V316 A6,6 0 0 1 106,310 Z" />
        <text x="120" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E74C3C">效果逐渐下滑</text>
        <text x="120" y="365" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">产生倦怠情绪，激励效果消退</text>
        <text x="120" y="380" font-family="Arial, sans-serif" font-size="13" fill="#7F8C8D">慢慢失去动力，整体效果不如预期</text>
    </g>

    
    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC" />
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1" />
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 312下午供应商联盟分享材料 | 过往段位分级失败案例分析</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">固定名单额度 → 阶层固化 → 动力消退</text>
    <path fill="#005587" d="M1144,655 H1216 A4,4 0 0 1 1220,659 V681 A4,4 0 0 1 1216,685 H1144 A4,4 0 0 1 1140,681 V659 A4,4 0 0 1 1144,655 Z" />
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">05</text>
</svg>