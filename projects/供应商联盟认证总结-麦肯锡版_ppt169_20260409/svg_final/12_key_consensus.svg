<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587" />
            <stop offset="100%" style="stop-color:#0076A8" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)" />
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC" />
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1" />
    <path fill="#005587" d="M64,22 H106 A4,4 0 0 1 110,26 V58 A4,4 0 0 1 106,62 H64 A4,4 0 0 1 60,58 V26 A4,4 0 0 1 64,22 Z" />
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">03</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">关键共识：规模交付与质量平衡</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">落地方案</text>

    <path fill="#FFF8E1" stroke="#F5A623" stroke-width="1" d="M64,100 H1216 A4,4 0 0 1 1220,104 V146 A4,4 0 0 1 1216,150 H64 A4,4 0 0 1 60,146 V104 A4,4 0 0 1 64,100 Z" />
    <path fill="#F5A623" d="M62,100 H63 A2,2 0 0 1 65,102 V148 A2,2 0 0 1 63,150 H62 A2,2 0 0 1 60,148 V102 A2,2 0 0 1 62,100 Z" />
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">规模与质量是跷跷板关系，当前阶段优先上规模，入场后逐步培育到合格标准</text>

    
    <g transform="translate(60, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H554 A6,6 0 0 1 560,6 V444 A6,6 0 0 1 554,450 H6 A6,6 0 0 1 0,444 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V448 A2,2 0 0 1 2,450 H2 A2,2 0 0 1 0,448 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#005587">管理SOP三维框架</text>

        
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,55 H529 A6,6 0 0 1 535,61 V164 A6,6 0 0 1 529,170 H26 A6,6 0 0 1 20,164 V61 A6,6 0 0 1 26,55 Z" />
        <path fill="#005587" d="M22,55 H24 A2,2 0 0 1 26,57 V168 A2,2 0 0 1 24,170 H22 A2,2 0 0 1 20,168 V57 A2,2 0 0 1 22,55 Z" />
        <text x="45" y="85" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2C3E50">人员维度</text>
        <text x="45" y="112" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">团队搭建从0到1：选人 → 育人 → 留人 → 淘汰人</text>
        <text x="45" y="138" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">先明确招聘标准，教会员工赚钱，能力培养后价值绑定</text>
        <text x="45" y="160" font-family="Arial, sans-serif" font-size="13" fill="#95A5A6">淘汰不合格人员，保证团队整体质量</text>

        
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,190 H529 A6,6 0 0 1 535,196 V299 A6,6 0 0 1 529,305 H26 A6,6 0 0 1 20,299 V196 A6,6 0 0 1 26,190 Z" />
        <path fill="#0076A8" d="M22,190 H24 A2,2 0 0 1 26,192 V303 A2,2 0 0 1 24,305 H22 A2,2 0 0 1 20,303 V192 A2,2 0 0 1 22,190 Z" />
        <text x="45" y="220" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2C3E50">职场维度</text>
        <text x="45" y="247" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">目标拆解从100到1：将甲方整体目标逐层拆解</text>
        <text x="45" y="273" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">每个班、每个组长、每个坐席都有明确目标</text>
        <text x="45" y="295" font-family="Arial, sans-serif" font-size="13" fill="#95A5A6">通过细节落地实现全员同频</text>

        
        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,325 H529 A6,6 0 0 1 535,331 V434 A6,6 0 0 1 529,440 H26 A6,6 0 0 1 20,434 V331 A6,6 0 0 1 26,325 Z" />
        <path fill="#F5A623" d="M22,325 H24 A2,2 0 0 1 26,327 V438 A2,2 0 0 1 24,440 H22 A2,2 0 0 1 20,438 V327 A2,2 0 0 1 22,325 Z" />
        <text x="45" y="355" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2C3E50">资源维度</text>
        <text x="45" y="382" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">客户名单全周期管理 + 激励体系升级为管理架构</text>
        <text x="45" y="408" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">日/周/月/年不同周期激励规则明确</text>
        <text x="45" y="430" font-family="Arial, sans-serif" font-size="13" fill="#95A5A6">最大化利用往期资源，避免名单过期浪费</text>
    </g>

    
    <g transform="translate(660, 170)">
        
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H554 A6,6 0 0 1 560,6 V214 A6,6 0 0 1 554,220 H6 A6,6 0 0 1 0,214 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#27AE60" d="M2,0 H2 A2,2 0 0 1 4,2 V218 A2,2 0 0 1 2,220 H2 A2,2 0 0 1 0,218 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#27AE60">当前阶段策略</text>

        <path fill="#F0FFF0" stroke="#27AE60" stroke-width="1" d="M26,55 H529 A6,6 0 0 1 535,61 V119 A6,6 0 0 1 529,125 H26 A6,6 0 0 1 20,119 V61 A6,6 0 0 1 26,55 Z" />
        <text x="40" y="82" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">优先上规模，入场后逐步培育</text>
        <text x="40" y="108" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">在不突破底线标准前提下适当降低准入标准</text>

        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,140 H529 A6,6 0 0 1 535,146 V199 A6,6 0 0 1 529,205 H26 A6,6 0 0 1 20,199 V146 A6,6 0 0 1 26,140 Z" />
        <text x="40" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">核心原则：追求产能而非堆人头</text>
        <text x="40" y="190" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">五险一金标准提高后，更需要聚焦产能达标</text>

        
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,240 H554 A6,6 0 0 1 560,246 V434 A6,6 0 0 1 554,440 H6 A6,6 0 0 1 0,434 V246 A6,6 0 0 1 6,240 Z" />
        <path fill="#004D5C" d="M2,240 H2 A2,2 0 0 1 4,242 V438 A2,2 0 0 1 2,440 H2 A2,2 0 0 1 0,438 V242 A2,2 0 0 1 2,240 Z" />
        <text x="25" y="275" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#004D5C">00后团队管理经验</text>

        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M26,290 H254 A6,6 0 0 1 260,296 V419 A6,6 0 0 1 254,425 H26 A6,6 0 0 1 20,419 V296 A6,6 0 0 1 26,290 Z" />
        <text x="35" y="315" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2C3E50">选人策略</text>
        <text x="35" y="342" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">优先选择执行力强</text>
        <text x="35" y="362" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">踏实的候选人</text>
        <text x="35" y="382" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">用团队氛围感染新人</text>
        <text x="35" y="402" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">减少负面情绪传播</text>

        <path fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1" d="M291,290 H529 A6,6 0 0 1 535,296 V419 A6,6 0 0 1 529,425 H291 A6,6 0 0 1 285,419 V296 A6,6 0 0 1 291,290 Z" />
        <text x="300" y="315" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2C3E50">管理技巧</text>
        <text x="300" y="342" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">明确知道每个坐席行为</text>
        <text x="300" y="362" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">开会点出问题不点名</text>
        <text x="300" y="382" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">让问题坐席自我调节</text>
        <text x="300" y="402" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">维持团队正面氛围</text>
    </g>

    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC" />
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1" />
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 313上午供应商联盟认证总结会 | 关键共识与冲突解决方案</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">人员+职场+资源三维框架，当前阶段优先上规模后培育</text>
    <path fill="#005587" d="M1144,655 H1216 A4,4 0 0 1 1220,659 V681 A4,4 0 0 1 1216,685 H1144 A4,4 0 0 1 1140,681 V659 A4,4 0 0 1 1144,655 Z" />
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">12</text>
</svg>