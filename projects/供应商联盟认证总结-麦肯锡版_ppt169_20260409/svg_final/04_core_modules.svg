<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587" />
            <stop offset="100%" style="stop-color:#0076A8" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)" />
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC" />
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1" />
    <path fill="#005587" d="M64,22 H106 A4,4 0 0 1 110,26 V58 A4,4 0 0 1 106,62 H64 A4,4 0 0 1 60,58 V26 A4,4 0 0 1 64,22 Z" />
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">01</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">电销管理六大核心模块</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">核心方法论</text>

    
    <path fill="#FFF8E1" stroke="#F5A623" stroke-width="1" d="M64,100 H1216 A4,4 0 0 1 1220,104 V146 A4,4 0 0 1 1216,150 H64 A4,4 0 0 1 60,146 V104 A4,4 0 0 1 64,100 Z" />
    <path fill="#F5A623" d="M62,100 H63 A2,2 0 0 1 65,102 V148 A2,2 0 0 1 63,150 H62 A2,2 0 0 1 60,148 V102 A2,2 0 0 1 62,100 Z" />
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">六大模块相互支撑形成闭环：人、资源、执行、动力四维一体</text>

    
    
    <g transform="translate(60, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H344 A6,6 0 0 1 350,6 V134 A6,6 0 0 1 344,140 H6 A6,6 0 0 1 0,134 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V138 A2,2 0 0 1 2,140 H2 A2,2 0 0 1 0,138 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#005587">坐席分级管理</text>
        <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">ABC分级竞争机制，同等级竞争</text>
        <text x="25" y="80" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">清晰晋升路径，名单量差异化</text>
        <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#F5A623" font-weight="bold">A级比C级多15条名单</text>
    </g>

    <g transform="translate(465, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H344 A6,6 0 0 1 350,6 V134 A6,6 0 0 1 344,140 H6 A6,6 0 0 1 0,134 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V138 A2,2 0 0 1 2,140 H2 A2,2 0 0 1 0,138 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#005587">话术沉淀体系</text>
        <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">7类专项话术库，月度迭代更新</text>
        <text x="25" y="80" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">节日/老客/金额/存量分类等</text>
        <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#F5A623" font-weight="bold">绩优分享标准化流程</text>
    </g>

    <g transform="translate(870, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H344 A6,6 0 0 1 350,6 V134 A6,6 0 0 1 344,140 H6 A6,6 0 0 1 0,134 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V138 A2,2 0 0 1 2,140 H2 A2,2 0 0 1 0,138 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#005587">团队激励方案</text>
        <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">日周维度即时激励，PK活动为主</text>
        <text x="25" y="80" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">可视化排名，追踪榜/光榜</text>
        <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#F5A623" font-weight="bold">团队PK比现金更有效</text>
    </g>

    
    <g transform="translate(60, 330)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H344 A6,6 0 0 1 350,6 V134 A6,6 0 0 1 344,140 H6 A6,6 0 0 1 0,134 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#0076A8" d="M2,0 H2 A2,2 0 0 1 4,2 V138 A2,2 0 0 1 2,140 H2 A2,2 0 0 1 0,138 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0076A8">三会管理流程</text>
        <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">早会15分钟：复盘/目标/动作</text>
        <text x="25" y="80" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">午会10分钟：缺口告知/叫醒</text>
        <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#F5A623" font-weight="bold">晚会不限时：复盘培训/问题解决</text>
    </g>

    <g transform="translate(465, 330)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H344 A6,6 0 0 1 350,6 V134 A6,6 0 0 1 344,140 H6 A6,6 0 0 1 0,134 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#0076A8" d="M2,0 H2 A2,2 0 0 1 4,2 V138 A2,2 0 0 1 2,140 H2 A2,2 0 0 1 0,138 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0076A8">名单管控规则</text>
        <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">新名单静置2-3天，拨打≤40次</text>
        <text x="25" y="80" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">周末全量回收，ABCD客户分级</text>
        <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#F5A623" font-weight="bold">5万+高价值名单匹配最优坐席</text>
    </g>

    <g transform="translate(870, 330)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H344 A6,6 0 0 1 350,6 V134 A6,6 0 0 1 344,140 H6 A6,6 0 0 1 0,134 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#0076A8" d="M2,0 H2 A2,2 0 0 1 4,2 V138 A2,2 0 0 1 2,140 H2 A2,2 0 0 1 0,138 V2 A2,2 0 0 1 2,0 Z" />
        <text x="25" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0076A8">分时段拨打策略</text>
        <text x="25" y="60" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">9:00-9:30 回拨高意向客户</text>
        <text x="25" y="80" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">18:30-19:30 黄金时段打新名单</text>
        <text x="25" y="105" font-family="Arial, sans-serif" font-size="14" fill="#F5A623" font-weight="bold">接通率第二高的黄金时段</text>
    </g>

    
    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC" />
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1" />
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 312下午供应商联盟分享材料 | 成熟自建电销职场管理经验</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">标准化运营是提升电销产能的关键</text>
    <path fill="#005587" d="M1144,655 H1216 A4,4 0 0 1 1220,659 V681 A4,4 0 0 1 1216,685 H1144 A4,4 0 0 1 1140,681 V659 A4,4 0 0 1 1144,655 Z" />
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">04</text>
</svg>