<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587" />
            <stop offset="100%" style="stop-color:#0076A8" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="5" fill="url(#headerGrad)" />
    <rect x="0" y="5" width="1280" height="75" fill="#FAFBFC" />
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E7EB" stroke-width="1" />
    <path fill="#005587" d="M64,22 H106 A4,4 0 0 1 110,26 V58 A4,4 0 0 1 106,62 H64 A4,4 0 0 1 60,58 V26 A4,4 0 0 1 64,22 Z" />
    <text x="85" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">03</text>
    <text x="130" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">名单全生命周期管理</text>
    <text x="1160" y="52" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">核心方法论</text>

    <path fill="#FFF8E1" stroke="#F5A623" stroke-width="1" d="M64,100 H1216 A4,4 0 0 1 1220,104 V146 A4,4 0 0 1 1216,150 H64 A4,4 0 0 1 60,146 V104 A4,4 0 0 1 64,100 Z" />
    <path fill="#F5A623" d="M62,100 H63 A2,2 0 0 1 65,102 V148 A2,2 0 0 1 63,150 H62 A2,2 0 0 1 60,148 V102 A2,2 0 0 1 62,100 Z" />
    <text x="85" y="132" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E89207">KEY INSIGHT</text>
    <text x="220" y="132" font-family="Arial, sans-serif" font-size="15" fill="#5D6D7E">精细化名单管控是提升转化效率的关键，从静置到拨打到回收形成完整闭环</text>

    
    
    <g transform="translate(60, 170)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H1154 A6,6 0 0 1 1160,6 V59 A6,6 0 0 1 1154,65 H6 A6,6 0 0 1 0,59 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V63 A2,2 0 0 1 2,65 H2 A2,2 0 0 1 0,63 V2 A2,2 0 0 1 2,0 Z" />
        <circle cx="40" cy="32" r="16" fill="#005587" />
        <text x="40" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="75" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">新名单静置</text>
        <text x="75" y="50" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">2-3天不动用，给名单"冷静期"，避免过早浪费</text>
    </g>

    
    <g transform="translate(60, 250)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H1154 A6,6 0 0 1 1160,6 V59 A6,6 0 0 1 1154,65 H6 A6,6 0 0 1 0,59 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#005587" d="M2,0 H2 A2,2 0 0 1 4,2 V63 A2,2 0 0 1 2,65 H2 A2,2 0 0 1 0,63 V2 A2,2 0 0 1 2,0 Z" />
        <circle cx="40" cy="32" r="16" fill="#005587" />
        <text x="40" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="75" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">拨打频次控制</text>
        <text x="75" y="50" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">单名单拨打频次 ≤ 40次，超频停止拨打，避免投诉违规</text>
    </g>

    
    <g transform="translate(60, 330)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H1154 A6,6 0 0 1 1160,6 V59 A6,6 0 0 1 1154,65 H6 A6,6 0 0 1 0,59 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#F5A623" d="M2,0 H2 A2,2 0 0 1 4,2 V63 A2,2 0 0 1 2,65 H2 A2,2 0 0 1 0,63 V2 A2,2 0 0 1 2,0 Z" />
        <circle cx="40" cy="32" r="16" fill="#F5A623" />
        <text x="40" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="75" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">黄金时段策略</text>
        <text x="75" y="50" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">18:30-19:30 接通率第二高，全部拨打新名单，疑难客户跟进</text>
    </g>

    
    <g transform="translate(60, 410)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H1154 A6,6 0 0 1 1160,6 V59 A6,6 0 0 1 1154,65 H6 A6,6 0 0 1 0,59 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#0076A8" d="M2,0 H2 A2,2 0 0 1 4,2 V63 A2,2 0 0 1 2,65 H2 A2,2 0 0 1 0,63 V2 A2,2 0 0 1 2,0 Z" />
        <circle cx="40" cy="32" r="16" fill="#0076A8" />
        <text x="40" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">4</text>
        <text x="75" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">周末全量回收</text>
        <text x="75" y="50" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">周一全量清零手中名单，请假直接清零，保证名单资源不被闲置</text>
    </g>

    
    <g transform="translate(60, 490)">
        <path fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" d="M6,0 H1154 A6,6 0 0 1 1160,6 V59 A6,6 0 0 1 1154,65 H6 A6,6 0 0 1 0,59 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#0076A8" d="M2,0 H2 A2,2 0 0 1 4,2 V63 A2,2 0 0 1 2,65 H2 A2,2 0 0 1 0,63 V2 A2,2 0 0 1 2,0 Z" />
        <circle cx="40" cy="32" r="16" fill="#0076A8" />
        <text x="40" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">5</text>
        <text x="75" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">客户分级 + 高价值匹配</text>
        <text x="75" y="50" font-family="Arial, sans-serif" font-size="14" fill="#5D6D7E">ABCD标签体系，5万+额度名单优先分配给态度/能力/结果指标最优的坐席</text>
    </g>

    
    <rect x="0" y="640" width="1280" height="80" fill="#FAFBFC" />
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E7EB" stroke-width="1" />
    <text x="60" y="675" font-family="Arial, sans-serif" font-size="12" fill="#95A5A6">Source: 312下午供应商联盟分享材料 | 名单管控规则与分时段拨打策略</text>
    <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#BDC3C7">名单资源不被闲置，高价值资源匹配高能力坐席</text>
    <path fill="#005587" d="M1144,655 H1216 A4,4 0 0 1 1220,659 V681 A4,4 0 0 1 1216,685 H1144 A4,4 0 0 1 1140,681 V659 A4,4 0 0 1 1144,655 Z" />
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">06</text>
</svg>