<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商结算 · 杜邦金字塔</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:#1a1a2e;padding:20px;max-width:1200px;margin:0 auto}
.header{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:700}
.header h1 span{color:#64748b;font-weight:400;font-size:13px;margin-left:6px}
.hint{font-size:12px;color:#94a3b8;margin-top:2px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.controls select{padding:5px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;background:#fff;cursor:pointer;min-width:150px}
.controls select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.pyramid{background:#fff;border-radius:12px;padding:18px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab-bar{display:flex;gap:0;margin-bottom:14px;background:#f1f5f9;border-radius:8px;overflow:hidden}
.tab-btn{padding:8px 18px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;color:#64748b;transition:all .2s;flex:1;text-align:center}
.tab-btn.active{background:#2563eb;color:#fff}
.tab-btn:hover:not(.active){background:#e2e8f0}
.layer-toggle{display:none;position:relative}
.layer-toggle.active{display:block}
.layer-switch{text-align:center;color:#94a3b8;font-size:14px;margin:8px 0}
.layer-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.l0-card{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border-radius:12px;padding:14px 32px;text-align:center;cursor:pointer;transition:transform .2s;display:inline-block}
.l0-card:hover{transform:translateY(-2px)}
.l0-card .l{font-size:11px;opacity:.8}
.l0-card .v{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.3}
.l0-card .u{font-size:11px;opacity:.7}
.l0-card .s{font-size:11px;opacity:.55;margin-top:4px}
.l1-card{background:#f8fafc;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;text-align:center;cursor:pointer;transition:all .2s;flex:1;min-width:120px;max-width:180px}
.l1-card:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.08);border-color:#2563eb}
.l1-card.active{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.l1-card .l{font-size:11px;color:#64748b;margin-bottom:2px}
.l1-card .v{font-size:17px;font-weight:700}
.l1-card .u{font-size:10px;color:#94a3b8}
.l1-card .rank{font-size:10px;margin-top:4px;padding:1px 6px;border-radius:4px;display:inline-block}
.rank-h{background:#dcfce7;color:#16a34a}
.rank-m{background:#fef9c3;color:#a16207}
.rank-l{background:#fef2f2;color:#dc2626}
.op{color:#94a3b8;font-size:16px;font-weight:300;display:flex;align-items:center;padding:0 2px}
.l2-section{background:#fafafa;border-radius:10px;padding:12px;margin-bottom:8px}
.l2-section .st{font-size:12px;font-weight:600;color:#475569;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.l2-grid{display:flex;gap:8px;flex-wrap:wrap}
.l2-card{background:#fff;border:1px dashed #cbd5e1;border-radius:8px;padding:8px 12px;text-align:center;flex:1;min-width:90px}
.l2-card .l{font-size:10px;color:#94a3b8;margin-bottom:2px}
.l2-card .v{font-size:13px;font-weight:600}
.l2-card .u{font-size:10px;color:#94a3b8}
.detail-panel{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:none}
.detail-panel.visible{display:block}
.detail-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.detail-hdr h2{font-size:15px;font-weight:600}
.detail-hdr .close{background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:2px 8px;border-radius:4px}
.detail-hdr .close:hover{background:#f1f5f9}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.dc{background:#f8fafc;border-radius:8px;padding:10px 12px}
.dc .l{font-size:11px;color:#64748b}
.dc .v{font-size:16px;font-weight:700}
.dc .h{font-size:11px;color:#64748b;margin-top:2px}
.chart-wrap{height:220px;margin-top:10px}
.rank-wrap{margin-top:14px}
.rank-wrap h3{font-size:13px;font-weight:600;margin-bottom:8px;color:#475569}
.rank-tbl{width:100%;border-collapse:collapse;font-size:12px}
.rank-tbl th{text-align:left;padding:6px 10px;background:#f8fafc;color:#64748b;font-weight:500;border-bottom:2px solid #e2e8f0}
.rank-tbl td{padding:6px 10px;border-bottom:1px solid #f1f5f9}
.rank-tbl tr:hover{background:#f8fafc}
.rn{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;border-radius:5px;font-size:10px;font-weight:600}
.r1{background:#fef9c3;color:#a16207}
.r2{background:#f1f5f9;color:#475569}
.r3{background:#fef2f2;color:#dc2626}
.bar-wrap{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin-top:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bg-g{background:#22c55e}
.bg-b{background:#2563eb}
.bg-r{background:#ef4444}
#trendSection .chart-wrap{height:250px}
.trend-checks{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin-bottom:10px}
.trend-checks label{display:flex;align-items:center;gap:4px;cursor:pointer}
@media(max-width:640px){.l1-card{min-width:70px;max-width:100%}.detail-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<div class="header">

  </div>
  <div class="controls">
    <label style="font-size:12px;color:#64748b">职场</label>
    <select id="wpSelect"></select>
  </div>
</div>

<div class="pyramid">
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-layer="l0">L0 · 顶层</button>
    <button class="tab-btn" data-layer="l1">L1 · 人均因子</button>
    <button class="tab-btn" data-layer="l2">L2 · 因子拆解</button>
  </div>

  <!-- L0: 顶层 -->
  <div class="layer-toggle active" id="layerL0">
    <div style="text-align:center">
      <div class="l0-card" onclick="showDetail('L0')">
        <div class="l">总结算价值</div>
        <div class="v" id="vL0">—</div>
        <div class="u">元（税后到手薪资总额）</div>
        <div class="s" id="sL0">▼ 点击查看排名</div>
      </div>
    </div>
    <div class="layer-switch">= 人均到手薪资 × 数据人力</div>
    <div class="layer-grid" style="gap:12px">
      <div style="background:#f0f9ff;border-radius:8px;padding:10px 24px;text-align:center">
        <div style="font-size:11px;color:#64748b">人均到手薪资</div>
        <div style="font-size:15px;font-weight:700;color:#0369a1" id="vL0_p1">—</div>
      </div>
      <div style="color:#94a3b8;display:flex;align-items:center;font-size:16px">×</div>
      <div style="background:#f0f9ff;border-radius:8px;padding:10px 24px;text-align:center">
        <div style="font-size:11px;color:#64748b">数据人力</div>
        <div style="font-size:15px;font-weight:700;color:#0369a1" id="vL0_p2">—</div>
      </div>
    </div>
  </div>

  <!-- L1: 人均因子 -->
  <div class="layer-toggle" id="layerL1">
    <div class="layer-grid" id="l1Cards"></div>
    <div class="layer-switch" style="margin-top:10px">人均到手薪资 = 人均资源规模 × 转化效率 × 客单价 × 净值率</div>
  </div>

  <!-- L2: 因子拆解 -->
  <div class="layer-toggle" id="layerL2">
    <div class="l2-section">
      <div class="st"><span style="background:#2563eb;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px">拆</span> 转化效率 → 首/复贷转化率</div>
      <div class="l2-grid" id="l2Conv"></div>
      <div class="st" style="margin-top:8px"><span style="background:#2563eb;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px">拆</span> 客单价 → 首/复贷客单价</div>
      <div class="l2-grid" id="l2Ticket"></div>
      <div class="st" style="margin-top:8px"><span style="background:#f59e0b;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px">拆</span> 费率 → 净值率四因子</div>
      <div class="l2-grid" id="l2Rate"></div>
    </div>
  </div>
</div>

<!-- 详情面板 -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-hdr">
    <h2 id="dTitle">详情</h2>
    <button class="close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-grid" id="dGrid"></div>
  <div class="chart-wrap"><canvas id="dChart"></canvas></div>
  <div class="rank-wrap"><h3 id="rankTitle">排名</h3>
    <table class="rank-tbl"><thead><tr><th>#</th><th>职场</th><th>值</th><th>对比</th></tr></thead>
      <tbody id="rankBody"></tbody>
    </table>
  </div>
</div>

<!-- 趋势 -->
<div class="pyramid" id="trendSection">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:14px;font-weight:600">毅航合肥 · 月度趋势</h2>
    <div class="trend-checks">
      <label><input type="checkbox" data-k="r5" checked> 人均到手薪资</label>
      <label><input type="checkbox" data-k="r2"> 转化效率</label>
      <label><input type="checkbox" data-k="r3"> 客单价</label>
      <label><input type="checkbox" data-k="r4"> 净值率</label>
      <label><input type="checkbox" data-k="d6"> 费率</label>
      <label><input type="checkbox" data-k="d7"> 净到手率</label>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="tChart"></canvas></div>
</div>

    let card=document.createElement('div');
    card.className='l1-card';card.onclick=()=>showDetail(m.k,wpName);
    card.innerHTML=`<div class="l">${m.l}</div><div class="v">${fmtL1(m,wp)}</div><div class="u">${m.u}</div><div class="rank ${rkC}">${rk<=5?'▲':rk>=tl-4?'▼':''} 第${rk}/${tl}</div>`;
    c.appendChild(card);
    if(i<L1_META.length-1){let op=document.createElement('div');op.className='op';op.textContent='×';c.appendChild(op)}
  });
}

// ====== L2 渲染 ======
function renderL2(wpName){
  let wp=getWP(wpName);if(!wp)return;
  let conv=document.getElementById('l2Conv');conv.innerHTML='';
  L2_CONV.forEach(m=>{
    let v=wp[m.k];let cls=m.k==='d5'?'rank-'+ (v>50?'h':v>20?'m':'l'):'';
    conv.innerHTML+=`<div class="l2-card"><div class="l">${m.l}</div><div class="v">${v}${m.u?' <span style="font-size:10px;color:#94a3b8">'+m.u+'</span>':''}</div><div class="u">${m.d}</div></div>`;
  });
  let t=document.getElementById('l2Ticket');t.innerHTML='';
  L2_TICKET.forEach(m=>{
    t.innerHTML+=`<div class="l2-card"><div class="l">${m.l}</div><div class="v">${m.k==='d3'||m.k==='d4'?Math.round(v).toLocaleString():v} <span style="font-size:10px;color:#94a3b8">${m.u}</span></div><div class="u">${m.d}</div></div>`;
  });
  let r=document.getElementById('l2Rate');r.innerHTML='';
  L2_RATE.forEach(m=>{
    let v=wp[m.k];let fmt=m.k==='d6'||m.k==='d9'?v.toFixed(2):m.k==='d8'?v.toFixed(3):v;
    r.innerHTML+=`<div class="l2-card" style="border-color:#fde68a"><div class="l">${m.l}</div><div class="v">${fmt}<span style="font-size:10px;color:#94a3b8">${m.u}</span></div><div class="u">${m.d}</div></div>`;
  });
}

// ====== L0 渲染 ======
function renderL0(wpName){
  let wp=getWP(wpName);if(!wp)return;
  document.getElementById('vL0').textContent=wp.L0.toLocaleString();
  document.getElementById('vL0_p1').textContent=wp.r5.toLocaleString()+' 元/人';
  document.getElementById('vL0_p2').textContent=Math.round(wp.r5>0?wp.L0/wp.r5:0).toLocaleString()+' 人';
  let rk=getRank(wp,'L0');let tl=D.w.length;
  document.getElementById('sL0').textContent=`排名 ${rk}/${tl} · 高于均值 ${wp.L0>D.avg.L0?'+'+Math.round((wp.L0-D.avg.L0)/D.avg.L0*100):Math.round((wp.L0-D.avg.L0)/D.avg.L0*100)}%`;
}

// ====== Tab ======
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.layer-toggle').forEach(l=>l.classList.remove('active'));
    document.getElementById('layer'+this.dataset.layer.toUpperCase()).classList.add('active');
    closeDetail();
  });
});

// ====== 初始化选择器 ======
let sel=document.getElementById('wpSelect');
D.w.forEach(w=>{
  let o=document.createElement('option');o.value=w.n;o.textContent=w.n.replace('管户金条-','');sel.appendChild(o);
});
sel.value=curWP;
sel.onchange=function(){
  curWP=this.value;renderL0(curWP);renderL1(curWP);renderL2(curWP);closeDetail();
};

// ====== 详情面板 ======
function showDetail(key,wpName){
  let wp=getWP(wpName);if(!wp)return;
  let meta=[...L1_META,...L2_CONV,...L2_TICKET,...L2_RATE].find(m=>m.k===key);
  if(!meta){showDetail('L0');return}
  let v=wp[key],avg=D.avg[key],rk=getRank(wp,key),sorted=rankAll(key);
  let maxV=sorted[0][key],minV=sorted[sorted.length-1][key];
  let maxW=sorted[0].n,minW=sorted[sorted.length-1].n;
  let pct=maxV>0?(v/maxV*100).toFixed(1):0;
  document.getElementById('dTitle').textContent=meta.l+' · 详细分析';
  let fmtV=meta.f?meta.f(v):(v.toLocaleString?.()||v);
  let fmtMax=meta.f?meta.f(maxV):(maxV.toLocaleString?.()||maxV);
  let fmtMin=meta.f?meta.f(minV):(minV.toLocaleString?.()||minV);
  let pctVsAvg=v>avg?'+'+((v-avg)/avg*100).toFixed(1)+'%':((v-avg)/avg*100).toFixed(1)+'%';
  document.getElementById('dGrid').innerHTML=`
    <div class="dc"><div class="l">当前值</div><div class="v">${fmtV}</div><div class="h">排名 ${rk}/${sorted.length}</div></div>
    <div class="dc"><div class="l">全部均值</div><div class="v">${fmtV===fmtMax?'—':(avg.toFixed?avg.toFixed(3):avg.toLocaleString())}</div><div class="h">vs 均值 ${pctVsAvg}</div></div>
    <div class="dc"><div class="l">最优</div><div class="v">${fmtMax}</div><div class="h">${maxW.replace('管户金条-','')} · 达最优 ${pct}%</div></div>
    <div class="dc"><div class="l">最低</div><div class="v">${fmtMin}</div><div class="h">${minW.replace('管户金条-','')}</div></div>
  `;
  let body=document.getElementById('rankBody');body.innerHTML='';
  sorted.forEach((w,i)=>{
    let rc=i===0?'r1':i===1?'r2':i===sorted.length-1?'r3':'';
    let p=maxV>0?(w[key]/maxV*100).toFixed(0):0;
    let sel=w.n===wpName;
    body.innerHTML+=`<tr${sel?' style="background:#eff6ff;font-weight:600"':''}><td><span class="rn ${rc}">${i+1}</span></td><td>${w.n.replace('管户金条-','')}</td><td>${meta.f?meta.f(w[key]):w[key]}</td><td><div class="bar-wrap"><div class="bar-fill ${i<3?'bg-g':i>sorted.length-4?'bg-r':'bg-b'}" style="width:${p}%"></div></div></td></tr>`;
  });
  let ctx=document.getElementById('dChart').getContext('2d');
  if(dChartInst)dChartInst.destroy();
  let labels=sorted.map(w=>w.n.replace('管户金条-',''));
  let vals=sorted.map(w=>w[key]);
  let colors=vals.map((v,i)=>v===wp[key]?'#2563eb':(i<3?'#22c55e':i>sorted.length-4?'#ef4444':'#e2e8f0'));
  dChartInst=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:meta.l,data:vals,backgroundColor:colors,borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y.toLocaleString()}}},scales:{y:{grid:{color:'#f1f5f9'},beginAtZero:false},x:{ticks:{font:{size:9},maxRotation:45}}}}});
  document.getElementById('detailPanel').classList.add('visible');
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'});
}
function closeDetail(){document.getElementById('detailPanel').classList.remove('visible');}

// ====== 趋势图 ======
function renderTrend(){
  let t=D.t;if(!t)return;
  let ctx=document.getElementById('tChart').getContext('2d');
  let checked=[...document.querySelectorAll('input[data-k]:checked')].map(el=>el.dataset.k);
  let colors={'r5':'#2563eb','r2':'#16a34a','r3':'#f59e0b','r4':'#ef4444','d6':'#8b5cf6','d7':'#ec4899'} ;
  let labels={r5:'人均到手薪资',r2:'转化效率',r3:'客单价',r4:'净值率',d6:'费率',d7:'净到手率'};
  if(tChartInst)tChartInst.destroy();
  let datasets=checked.map(k=>({label:labels[k]||k,data:t[k],borderColor:colors[k]||'#2563eb',backgroundColor:colors[k]||'#2563eb',yAxisID:'y',tension:0.3,borderWidth:2,pointRadius:3,pointHoverRadius:5}));
  tChartInst=new Chart(ctx,{type:'line',data:{labels:t.m,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{y:{type:'linear',display:true,position:'left',grid:{color:'#f1f5f9'},ticks:{font:{size:10}}}}}});
}

document.querySelectorAll('input[data-k]').forEach(el=>el.addEventListener('change',renderTrend));

// ====== 启动 ======
renderL0(curWP);renderL1(curWP);renderL2(curWP);renderTrend();
</script>
</body>
</html>
