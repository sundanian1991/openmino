<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#1a1a2e;padding:20px;max-width:1000px;margin:0 auto;font-size:14px}
.hdr{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:17px;font-weight:700}
.hdr h1 span{color:#64748b;font-weight:400;font-size:12px;margin-left:6px}
.ctl select{padding:5px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;min-width:160px}
.card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:14px;margin-bottom:12px}
.l0-card{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border-radius:12px;padding:16px 36px;display:inline-block;cursor:pointer;min-width:280px;text-align:center}
.l0-card .v{font-size:30px;font-weight:700}
.l1-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.l1-card{background:#f8fafc;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;text-align:center;cursor:pointer;flex:1;min-width:110px;max-width:180px}
.l1-card:hover{border-color:#2563eb}
.l1-card .v{font-size:18px;font-weight:700;margin:4px 0}
.l2-card{background:#fff;border:1px dashed #cbd5e1;border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:80px}
.l2-card .v{font-size:13px;font-weight:600}
.l2-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.l2-row:last-child{margin-bottom:0}
.dp{display:none}.dp.show{display:block}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.dc{background:#f8fafc;border-radius:8px;padding:10px 14px}
.dc .v{font-size:17px;font-weight:700}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt td,.rt th{padding:6px 10px;border-bottom:1px solid #f1f5f9}
.chk label{font-size:11px;cursor:pointer;margin-right:12px}
.small{font-size:11px;color:#64748b}
.gap{margin-top:2px}
</style>
</head>

<div style="color:#94a3b8;font-size:18px">×</div>
<div style="background:#f0f9ff;border-radius:8px;padding:8px 20px;text-align:center"><div class="small">数据人力</div><div style="font-weight:700;color:#0369a1;font-size:16px" id="vP2">—</div></div>
</div></div>

<div class="card">
<h3>L1 · 人均到手薪资 <span style="color:#94a3b8;font-weight:400;font-size:12px">= 人均资源规模 × 转化效率 × 客单价 × 净值率</span></h3>
<div class="l1-row" id="l1Cards"></div>
</div>

<div class="card">
<h3>L2 · 因子拆解</h3>
<div style="color:#2563eb;font-size:12px;font-weight:600;margin-bottom:6px">▶ 转化效率 → 首贷转化率 / 复贷转化率 / 首贷户占比</div>

<div class="l2-row" id="l2Ticket"></div>
<div style="color:#f59e0b;font-size:12px;font-weight:600;margin-bottom:6px">▶ 净值率 → 费率 × 净到手率 × 还款系数 × 线路费率</div>
<div class="l2-row" id="l2Rate"></div>
</div>

<div class="card dp" id="dp">
<div style="display:flex;justify-content:space-between"><h3 id="dTitle"></h3><button onclick="clsD()" class="ctl" style="border:none;font-size:16px;cursor:pointer">✕</button></div>
<div class="dg" id="dGrid"></div>
<div style="height:200px"><canvas id="dChart"></canvas></div>
<div style="margin-top:14px"><h3>全部职场排名</h3><table class="rt"><thead><tr><th>#</th><th>职场</th><th>值</th><th>对比</th></tr></thead><tbody id="rankB"></tbody></table></div>
</div>

<label><input type="checkbox" data-k="d6"> 费率</label>

<div style="height:240px"><canvas id="tChart"></canvas></div>

<script>
var D = JSON.parse(document.getElementById('dupont-data').textContent);
var cur = "管户金条-毅航合肥职场";
var dc = null, tc = null;

function gw(n){for(var i=0;i<D.wp.length;i++){if(D.wp[i].n===n)return D.wp[i];}return null;}
function rk(k){var a=[];for(var i=0;i<D.wp.length;i++){if(D.wp[i][k])a.push(D.wp[i]);}a.sort(function(x,y){return y[k]-x[k];});return a;}
function gr(w,k){var s=rk(k);for(var i=0;i<s.length;i++){if(s[i].n===w.n)return i+1;}return s.length;}

function fmt(k,v){
  if(v===null||v===undefined)return"0";
  if(k==="r1"||k==="r3"||k==="r5"||k==="L0"||k==="d3"||k==="d4"||k==="hr")return Math.round(v).toLocaleString();
  if(k==="r2"||k==="d1"||k==="d2"||k==="d5")return v.toFixed(2);
  if(k==="r4"||k==="d6")return v.toFixed(3);
  if(k==="d7"||k==="d9")return v.toFixed(1);
  if(k==="d8")return v.toFixed(3);
  return String(v);
}

function rL0(n){
  var w=gw(n);if(!w)return;
  document.getElementById("vL0").textContent=w.L0.toLocaleString();
  document.getElementById("vP1").textContent=fmt("r5",w.r5)+" 元/人";
  document.getElementById("vP2").textContent=w.hr.toLocaleString()+" 人";
  var p=w.L0>D.avg.L0?"+"+((w.L0-D.avg.L0)/D.avg.L0*100).toFixed(1):((w.L0-D.avg.L0)/D.avg.L0*100).toFixed(1);
  document.getElementById("sL0").textContent="排名 "+gr(w,"L0")+"/"+D.wp.length+"  vs 均值 "+p+"%";
}

function rL1(n){
  var w=gw(n);if(!w)return;
  var c=document.getElementById("l1Cards");c.innerHTML="";
  var ms=[{k:"r1",l:"人均资源规模",u:"元"},{k:"r2",l:"转化效率",u:"%"},{k:"r3",l:"客单价",u:"元"},{k:"r4",l:"净值率",u:"%"}];
  for(var i=0;i<ms.length;i++){
    var m=ms[i];var v=w[m.k];var r=gr(w,m.k);var t=D.wp.length;
    var d=document.createElement("div");d.className="l1-card";
    d.innerHTML="<div class=\"small\">"+m.l+"</div><div class=\"v\">"+fmt(m.k,v)+"</div><div class=\"small\">"+m.u+" &middot; 第"+r+"/"+t+"</div>";
    d.onclick=(function(kk){return function(){showD(kk,n);};})(m.k);
    c.appendChild(d);
    if(i<ms.length-1){var op=document.createElement("span");op.style.cssText="color:#94a3b8;font-size:18px;display:flex;align-items:center;padding:0 4px";op.textContent="×";c.appendChild(op);}
  }
}

function rL2(n){
  var w=gw(n);if(!w)return;
  document.getElementById("l2Conv").innerHTML="<div class=\"l2-card\"><div class=\"small\">首贷转化率</div><div class=\"v\">"+fmt("r2",w.d1)+"%</div></div><div class=\"l2-card\"><div class=\"small\">复贷转化率</div><div class=\"v\">"+fmt("r2",w.d2)+"%</div></div><div class=\"l2-card\"><div class=\"small\">首贷户占比</div><div class=\"v\">"+fmt("r2",w.d5)+"%</div></div>";
  document.getElementById("l2Ticket").innerHTML="<div class=\"l2-card\"><div class=\"small\">首贷客单价</div><div class=\"v\">"+fmt("d3",w.d3)+" 元</div></div><div class=\"l2-card\"><div class=\"small\">复贷客单价</div><div class=\"v\">"+fmt("d4",w.d4)+" 元</div></div>";
  document.getElementById("l2Rate").innerHTML="<div class=\"l2-card\" style=\"border-color:#fde68a\"><div class=\"small\">费率</div><div class=\"v\">"+fmt("d6",w.d6)+"%</div></div><div class=\"l2-card\" style=\"border-color:#fde68a\"><div class=\"small\">净到手率</div><div class=\"v\">"+fmt("d7",w.d7)+"%</div></div><div class=\"l2-card\" style=\"border-color:#fde68a\"><div class=\"small\">还款系数</div><div class=\"v\">"+fmt("d8",w.d8)+"</div></div><div class=\"l2-card\" style=\"border-color:#fde68a\"><div class=\"small\">线路费率</div><div class=\"v\">"+fmt("d9",w.d9)+"%</div></div>";
}

function showD(key,n){
  var w=gw(n);if(!w)return;
  var ml={L0:"总结算价值",r1:"人均资源规模",r2:"转化效率",r3:"客单价",r4:"净值率",r5:"人均到手薪资",d1:"首贷转化率",d2:"复贷转化率",d3:"首贷客单价",d4:"复贷客单价",d5:"首贷户占比",d6:"费率",d7:"净到手率",d8:"还款系数",d9:"线路费率"}[key];
  if(!ml)return;
  document.getElementById("dTitle").textContent=ml+" · 详细分析";
  var v=w[key],a=D.avg[key],s=rk(key),mx=s[0][key],mn=s[s.length-1][key];
  var pct=mx>0?(v/mx*100).toFixed(1):0;
  document.getElementById("dGrid").innerHTML="<div class=\"dc\"><div class=\"small\">当前值</div><div class=\"v\">"+fmt(key,v)+"</div><div class=\"small gap\">排名 "+gr(w,key)+"/"+s.length+"</div></div><div class=\"dc\"><div class=\"small\">全部均值</div><div class=\"v\">"+fmt(key,a)+"</div><div class=\"small gap\">"+(v>a?"+":"")+((v-a)/a*100).toFixed(1)+"% vs 均值</div></div><div class=\"dc\"><div class=\"small\">最优值</div><div class=\"v\">"+fmt(key,mx)+"</div><div class=\"small gap\">"+s[0].n.replace("管户金条-","")+" · 达最优 "+pct+"%</div></div><div class=\"dc\"><div class=\"small\">最低值</div><div class=\"v\">"+fmt(key,mn)+"</div><div class=\"small gap\">"+s[s.length-1].n.replace("管户金条-","")+"</div></div>";
  var bd=document.getElementById("rankB");bd.innerHTML="";
  for(var i=0;i<s.length;i++){var x=s[i];var p=mx>0?(x[key]/mx*100).toFixed(0):0;
    bd.innerHTML+="<tr"+(x.n===n?" style=\"background:#eff6ff\"":"")+"><td>"+(i+1)+"</td><td>"+x.n.replace("管户金条-","")+"</td><td>"+fmt(key,x[key])+"</td><td><div style=\"background:#e2e8f0;height:5px;border-radius:3px\"><div style=\"background:#2563eb;height:100%;border-radius:3px;width:"+p+"%\"></div></div></td></tr>";}
  var ctx=document.getElementById("dChart").getContext("2d");
  if(dc){dc.destroy();dc=null;}
  var lbs=[],vs=[],cols=[];
  for(var i=0;i<s.length;i++){lbs.push(s[i].n.replace("管户金条-",""));vs.push(s[i][key]);cols.push(s[i][key]===w[key]?"#2563eb":"#e2e8f0");}
  dc=new Chart(ctx,{type:"bar",data:{labels:lbs,datasets:[{label:ml,data:vs,backgroundColor:cols,borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false},x:{ticks:{font:{size:9},maxRotation:45}}}}});
  document.getElementById("dp").classList.add("show");
}

function clsD(){document.getElementById("dp").classList.remove("show");}

function rTrend(){
  if(!D.t)return;
  var ctx=document.getElementById("tChart").getContext("2d");
  var cbs=document.querySelectorAll("input[data-k]:checked");var ck=[];for(var i=0;i<cbs.length;i++)ck.push(cbs[i].dataset.k);
  var clr={r5:"#2563eb",r2:"#16a34a",r3:"#f59e0b",r4:"#ef4444",d6:"#8b5cf6",d7:"#ec4899"};
  var lbl={r5:"人均到手薪资",r2:"转化效率",r3:"客单价",r4:"净值率",d6:"费率",d7:"净到手率"};
  if(tc){tc.destroy();tc=null;}
  var ds=[];for(var i=0;i<ck.length;i++){var k=ck[i];ds.push({label:lbl[k]||k,data:D.t[k],borderColor:clr[k]||"#2563eb",backgroundColor:clr[k]||"#2563eb",tension:0.3,borderWidth:2,pointRadius:3});}
  tc=new Chart(ctx,{type:"line",data:{labels:D.t.m,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{position:"bottom"}},scales:{y:{grid:{color:"#f1f5f9"}}}}});
}

var ckEls=document.querySelectorAll("input[data-k]");for(var i=0;i<ckEls.length;i++){ckEls[i].addEventListener("change",rTrend);}
var sel=document.getElementById("wpSel");
for(var i=0;i<D.wp.length;i++){var o=document.createElement("option");o.value=D.wp[i].n;o.textContent=D.wp[i].n.replace("管户金条-","");sel.appendChild(o);}
sel.value=cur;
sel.onchange=function(){cur=this.value;rL0(cur);rL1(cur);rL2(cur);clsD();};
rL0(cur);rL1(cur);rL2(cur);rTrend();
</script>
</body>
</html>
