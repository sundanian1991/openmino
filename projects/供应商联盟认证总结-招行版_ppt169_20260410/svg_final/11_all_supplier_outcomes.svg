<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="75" fill="#C41230" />
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962" />
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962" />

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3" />
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2" />
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25" />

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">03 各供应商核心收获与落地方向</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3" />
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15" />

    <rect x="40" y="95" width="4" height="24" fill="#C41230" />
    <circle cx="42" cy="119" r="2" fill="#C9A962" />
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">各供应商从不同切入点补强短板：华啸重数据、广重运营、瀚锐重新人、华道重团队</text>

    
    <g transform="translate(60, 155)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H556 A4,4 0 0 1 560,4 V236 A4,4 0 0 1 556,240 H4 A4,4 0 0 1 0,236 V4 A4,4 0 0 1 4,0 Z" />
        <rect x="0" y="0" width="4" height="240" fill="#C41230" />
        <text x="25" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41230">华啸</text>
        <text x="100" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#999999">数据驱动 + SOP标准化</text>
        <line x1="15" y1="50" x2="545" y2="50" stroke="#F0EDE8" stroke-width="1" />
        <text x="25" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 建立清晰坐席画像，结构化面试+试岗</text>
        <text x="25" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 名产分层精细化，按额度/活跃度分层</text>
        <text x="25" y="126" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 动态话术入库更新机制</text>
        <text x="25" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 引入自动化报表做实时监测</text>
        <text x="25" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#C9A962" font-weight="bold">三个月：名产打标 → SOP框架 → 数据体系 → 复盘验证</text>
    </g>

    
    <g transform="translate(660, 155)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H556 A4,4 0 0 1 560,4 V236 A4,4 0 0 1 556,240 H4 A4,4 0 0 1 0,236 V4 A4,4 0 0 1 4,0 Z" />
        <rect x="0" y="0" width="4" height="240" fill="#C9A962" />
        <text x="25" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C9A962">广达</text>
        <text x="90" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#999999">人员培养 + 运营模块优化</text>
        <line x1="15" y1="50" x2="545" y2="50" stroke="#F0EDE8" stroke-width="1" />
        <text x="25" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 补充抗压能力测试、工作稳定性考察</text>
        <text x="25" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 师徒带教二对一+复盘闭环</text>
        <text x="25" y="126" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 补充午会机制+夕会清问题闭环</text>
        <text x="25" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 优化拨打时段划分+客户全标签打标</text>
        <text x="25" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#C9A962" font-weight="bold">18号前：人员培养/分层/拨打策略 | 20号前：异议处理+数据库</text>
    </g>

    
    <g transform="translate(60, 415)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H556 A4,4 0 0 1 560,4 V206 A4,4 0 0 1 556,210 H4 A4,4 0 0 1 0,206 V4 A4,4 0 0 1 4,0 Z" />
        <rect x="0" y="0" width="4" height="210" fill="#333333" />
        <text x="25" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333333">瀚锐</text>
        <text x="95" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#999999">招聘策略调整 + 老团队激活</text>
        <line x1="15" y1="50" x2="545" y2="50" stroke="#F0EDE8" stroke-width="1" />
        <text x="25" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 从"挖经验"转向"招服从性/执行力强"</text>
        <text x="25" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 30天成长计划纸质表，主管签字确认</text>
        <text x="25" y="126" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 师傅从Top员工改为中等+有耐心热情</text>
        <text x="25" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 晨会话术接龙，坐席自己总结分享</text>
        <text x="25" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#C9A962" font-weight="bold">新团队全面执行新标准，倒逼老团队改变，外呼SOP已执行一周见效</text>
    </g>

    
    <g transform="translate(660, 415)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H556 A4,4 0 0 1 560,4 V206 A4,4 0 0 1 556,210 H4 A4,4 0 0 1 0,206 V4 A4,4 0 0 1 4,0 Z" />
        <rect x="0" y="0" width="4" height="210" fill="#C41230" fill-opacity="0.7" />
        <text x="25" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41230">华道</text>
        <text x="95" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#999999">晨会优化 + 师徒PK机制</text>
        <line x1="15" y1="50" x2="545" y2="50" stroke="#F0EDE8" stroke-width="1" />
        <text x="25" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 晨会以坐席个人汇报为主</text>
        <text x="25" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 公开最高最低业绩，不批评尾部</text>
        <text x="25" y="126" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 师傅班组PK机制+验收环节</text>
        <text x="25" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 60秒非有效名单统一回收至中乾</text>
        <text x="25" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#C9A962" font-weight="bold">实操通关三次机会 | 上岗后30天每日培训 | 从新人阶段精准客户打标</text>
    </g>

    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1" />
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：313上午供应商联盟认证总结会 | 各供应商学习收获与落地计划</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">落地方案</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">11</text>
</svg>