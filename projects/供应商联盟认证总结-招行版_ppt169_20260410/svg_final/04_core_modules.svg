<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="75" fill="#C41230" />
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962" />
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962" />

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3" />
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2" />
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25" />

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">01 电销管理六大核心模块</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3" />
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15" />

    <rect x="40" y="95" width="4" height="24" fill="#C41230" />
    <circle cx="42" cy="119" r="2" fill="#C9A962" />
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">六大模块相互支撑形成闭环：人、资源、执行、动力四维一体</text>

    
    
    <g transform="translate(60, 155)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H356 A4,4 0 0 1 360,4 V141 A4,4 0 0 1 356,145 H4 A4,4 0 0 1 0,141 V4 A4,4 0 0 1 4,0 Z" />
        <path fill="#C41230" d="M4,0 H356 A4,2 0 0 1 360,2 V2 A4,2 0 0 1 356,4 H4 A4,2 0 0 1 0,2 V2 A4,2 0 0 1 4,0 Z" />
        <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#C41230">坐席分级管理</text>
        <text x="20" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">ABC分级竞争机制，同等级竞争</text>
        <text x="20" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">清晰晋升路径，名单量差异化</text>
        <text x="20" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">A级比C级多15条名单</text>
    </g>

    
    <g transform="translate(460, 155)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H356 A4,4 0 0 1 360,4 V141 A4,4 0 0 1 356,145 H4 A4,4 0 0 1 0,141 V4 A4,4 0 0 1 4,0 Z" />
        <path fill="#C41230" d="M4,0 H356 A4,2 0 0 1 360,2 V2 A4,2 0 0 1 356,4 H4 A4,2 0 0 1 0,2 V2 A4,2 0 0 1 4,0 Z" />
        <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#C41230">话术沉淀体系</text>
        <text x="20" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">7类专项话术库，月度迭代更新</text>
        <text x="20" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">节日/老客/金额/存量分类等</text>
        <text x="20" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">绩优分享标准化流程</text>
    </g>

    
    <g transform="translate(860, 155)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H356 A4,4 0 0 1 360,4 V141 A4,4 0 0 1 356,145 H4 A4,4 0 0 1 0,141 V4 A4,4 0 0 1 4,0 Z" />
        <path fill="#C41230" d="M4,0 H356 A4,2 0 0 1 360,2 V2 A4,2 0 0 1 356,4 H4 A4,2 0 0 1 0,2 V2 A4,2 0 0 1 4,0 Z" />
        <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#C41230">团队激励方案</text>
        <text x="20" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">日周维度即时激励，PK活动为主</text>
        <text x="20" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">可视化排名，追踪榜/光榜</text>
        <text x="20" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">团队PK比现金更有效</text>
    </g>

    
    <g transform="translate(60, 320)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H356 A4,4 0 0 1 360,4 V141 A4,4 0 0 1 356,145 H4 A4,4 0 0 1 0,141 V4 A4,4 0 0 1 4,0 Z" />
        <path fill="#C9A962" d="M4,0 H356 A4,2 0 0 1 360,2 V2 A4,2 0 0 1 356,4 H4 A4,2 0 0 1 0,2 V2 A4,2 0 0 1 4,0 Z" />
        <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">三会管理流程</text>
        <text x="20" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">早会15分钟：复盘/目标/动作</text>
        <text x="20" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">午会10分钟：缺口告知/叫醒</text>
        <text x="20" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">晚会不限时：复盘培训/问题解决</text>
    </g>

    
    <g transform="translate(460, 320)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H356 A4,4 0 0 1 360,4 V141 A4,4 0 0 1 356,145 H4 A4,4 0 0 1 0,141 V4 A4,4 0 0 1 4,0 Z" />
        <path fill="#C9A962" d="M4,0 H356 A4,2 0 0 1 360,2 V2 A4,2 0 0 1 356,4 H4 A4,2 0 0 1 0,2 V2 A4,2 0 0 1 4,0 Z" />
        <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">名单管控规则</text>
        <text x="20" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">新名单静置2-3天，拨打≤40次</text>
        <text x="20" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">周末全量回收，ABCD客户分级</text>
        <text x="20" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">5万+高价值名单匹配最优坐席</text>
    </g>

    
    <g transform="translate(860, 320)">
        <path fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" d="M4,0 H356 A4,4 0 0 1 360,4 V141 A4,4 0 0 1 356,145 H4 A4,4 0 0 1 0,141 V4 A4,4 0 0 1 4,0 Z" />
        <path fill="#C9A962" d="M4,0 H356 A4,2 0 0 1 360,2 V2 A4,2 0 0 1 356,4 H4 A4,2 0 0 1 0,2 V2 A4,2 0 0 1 4,0 Z" />
        <text x="20" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">分时段拨打策略</text>
        <text x="20" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">9:00-9:30 回拨高意向客户</text>
        <text x="20" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">18:30-19:30 黄金时段打新名单</text>
        <text x="20" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">接通率第二高的黄金时段</text>
    </g>

    
    <text x="640" y="510" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">标准化运营是提升电销产能的关键 | 成熟自建电销职场管理经验提炼</text>

    
    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5" />

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1" />
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：312下午供应商联盟分享材料</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">核心方法论</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">04</text>
</svg>