<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="75" fill="#C41230"/>
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962"/>
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962"/>

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25"/>

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">01 ABC分级竞争机制</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3"/>
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15"/>

    <rect x="40" y="95" width="4" height="24" fill="#C41230"/>
    <circle cx="42" cy="119" r="2" fill="#C9A962"/>
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">同等级竞争保证公平感，但固定名单额度导致"阶层固化"是失败核心原因</text>

    <!-- Left: Core Principles -->
    <g transform="translate(60, 150)">
        <rect width="480" height="480" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="480" fill="#C41230"/>
        <text x="25" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C41230">核心原则</text>

        <!-- Principle 1 -->
        <rect x="20" y="55" width="435" height="125" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <circle cx="55" cy="90" r="20" fill="#C41230"/>
        <text x="55" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="90" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">同等级竞争</text>
        <text x="90" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">C级不越级A级，保证竞争信心</text>
        <text x="90" y="135" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">C打赢C升B，B打赢B升A</text>
        <text x="90" y="160" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">清晰晋升路径，不跨级挑战</text>

        <!-- Principle 2 -->
        <rect x="20" y="195" width="435" height="125" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <circle cx="55" cy="230" r="20" fill="#C9A962"/>
        <text x="55" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="90" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">名单量差异化</text>
        <text x="90" y="250" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">A级比C级多15条名单</text>
        <text x="90" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">额外奖励给能力突出的批次</text>
        <text x="90" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">手动+预测外呼均差异化</text>

        <!-- Principle 3 -->
        <rect x="20" y="335" width="435" height="125" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <circle cx="55" cy="370" r="20" fill="#333333"/>
        <text x="55" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="90" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">5S管理 + 可视化激励</text>
        <text x="90" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">龙虎榜、追踪榜、光榜</text>
        <text x="90" y="415" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">明确个人和团队排名位置</text>
        <text x="90" y="440" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">从小的执行要求入手训练执行力</text>
    </g>

    <!-- Right: Failure Analysis Timeline -->
    <g transform="translate(570, 150)">
        <rect width="650" height="480" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="480" fill="#C9A962"/>
        <text x="25" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C9A962">失败教训：王者荣耀段位分级</text>

        <line x1="55" y1="65" x2="55" y2="420" stroke="#C9A962" stroke-width="2" stroke-opacity="0.3"/>

        <!-- Phase 1: Success -->
        <circle cx="55" cy="95" r="14" fill="#C41230"/>
        <text x="55" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">!</text>
        <rect x="85" y="70" width="530" height="90" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="85" y="70" width="4" height="90" fill="#C41230" rx="2"/>
        <text x="105" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C41230">初期效果很好</text>
        <text x="105" y="125" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">坐席主动加班冲业绩，段位晋升激励明显</text>
        <text x="105" y="148" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">按周度业绩升降档，对应不同名单额度</text>

        <!-- Phase 2: Problem -->
        <circle cx="55" cy="225" r="14" fill="#C9A962"/>
        <text x="55" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">?</text>
        <rect x="85" y="200" width="530" height="90" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="85" y="200" width="4" height="90" fill="#C9A962" rx="2"/>
        <text x="105" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C9A962">问题逐渐暴露</text>
        <text x="105" y="255" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">分级后直接对应固定名单额度</text>
        <text x="105" y="278" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">低段位坐席认为"永远升不上去"，产生不公平感</text>

        <!-- Phase 3: Decline -->
        <circle cx="55" cy="355" r="14" fill="#9A0E26"/>
        <text x="55" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">x</text>
        <rect x="85" y="330" width="530" height="90" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="85" y="330" width="4" height="90" fill="#9A0E26" rx="2"/>
        <text x="105" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#9A0E26">效果逐渐下滑</text>
        <text x="105" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">产生倦怠情绪，激励效果消退</text>
        <text x="105" y="408" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">慢慢失去动力，整体效果不如预期</text>
    </g>

    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1"/>
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：312下午供应商联盟分享材料 | 过往段位分级失败案例分析</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">核心方法论</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">05</text>
</svg>
