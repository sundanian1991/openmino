<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="75" fill="#C41230"/>
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962"/>
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962"/>

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25"/>

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">01 名单全生命周期管理</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3"/>
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15"/>

    <rect x="40" y="95" width="4" height="24" fill="#C41230"/>
    <circle cx="42" cy="119" r="2" fill="#C9A962"/>
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">精细化名单管控是提升转化效率的关键，从静置到拨打到回收形成完整闭环</text>

    <!-- 5 items vertical -->
    <!-- Item 1 -->
    <g transform="translate(60, 155)">
        <rect width="1160" height="75" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="75" fill="#C41230" rx="2"/>
        <circle cx="45" cy="37" r="22" fill="#C41230"/>
        <text x="45" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="85" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">新名单静置</text>
        <text x="85" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">2-3天不动用，给名单"冷静期"，避免过早浪费</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(60, 245)">
        <rect width="1160" height="75" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="75" fill="#C41230" rx="2"/>
        <circle cx="45" cy="37" r="22" fill="#C41230"/>
        <text x="45" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="85" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">拨打频次控制</text>
        <text x="85" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">单名单拨打频次 ≤ 40次，超频停止拨打，避免投诉违规</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(60, 335)">
        <rect width="1160" height="75" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="75" fill="#C9A962" rx="2"/>
        <circle cx="45" cy="37" r="22" fill="#C9A962"/>
        <text x="45" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="85" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">黄金时段策略</text>
        <text x="85" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">18:30-19:30 接通率第二高，全部拨打新名单，疑难客户跟进</text>
    </g>

    <!-- Item 4 -->
    <g transform="translate(60, 425)">
        <rect width="1160" height="75" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="75" fill="#333333" rx="2"/>
        <circle cx="45" cy="37" r="22" fill="#333333"/>
        <text x="45" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>
        <text x="85" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">周末全量回收</text>
        <text x="85" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">周一全量清零手中名单，请假直接清零，保证名单资源不被闲置</text>
    </g>

    <!-- Item 5 -->
    <g transform="translate(60, 515)">
        <rect width="1160" height="75" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="75" fill="#333333" rx="2"/>
        <circle cx="45" cy="37" r="22" fill="#333333"/>
        <text x="45" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
        <text x="85" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold" fill="#333333">客户分级 + 高价值匹配</text>
        <text x="85" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">ABCD标签体系，5万+额度名单优先分配给态度/能力/结果指标最优的坐席</text>
    </g>

    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1"/>
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：312下午供应商联盟分享材料 | 名单管控规则与分时段拨打策略</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">核心方法论</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">06</text>
</svg>
