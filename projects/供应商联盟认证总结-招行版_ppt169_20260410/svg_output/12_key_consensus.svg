<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="75" fill="#C41230"/>
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962"/>
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962"/>

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25"/>

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">03 关键共识：规模与质量平衡</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3"/>
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15"/>

    <rect x="40" y="95" width="4" height="24" fill="#C41230"/>
    <circle cx="42" cy="119" r="2" fill="#C9A962"/>
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">规模与质量是跷跷板关系，当前阶段优先上规模，入场后逐步培育到合格标准</text>

    <!-- Left: 3D Framework -->
    <g transform="translate(60, 155)">
        <rect width="560" height="480" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="480" fill="#C41230"/>
        <text x="25" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C41230">管理SOP三维框架</text>

        <!-- Dimension 1 -->
        <rect x="20" y="55" width="515" height="130" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="20" y="55" width="5" height="130" fill="#C41230" rx="2"/>
        <text x="45" y="88" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333333">人员维度</text>
        <text x="45" y="115" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">团队搭建从0到1：选人 → 育人 → 留人 → 淘汰人</text>
        <text x="45" y="140" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">明确招聘标准，教会员工赚钱，能力培养后价值绑定</text>
        <text x="45" y="168" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">淘汰不合格人员，保证团队整体质量</text>

        <!-- Dimension 2 -->
        <rect x="20" y="200" width="515" height="130" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="20" y="200" width="5" height="130" fill="#C9A962" rx="2"/>
        <text x="45" y="233" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333333">职场维度</text>
        <text x="45" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">目标拆解从100到1：将甲方整体目标逐层拆解</text>
        <text x="45" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">每个班、每个组长、每个坐席都有明确目标</text>
        <text x="45" y="313" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">通过细节落地实现全员同频</text>

        <!-- Dimension 3 -->
        <rect x="20" y="345" width="515" height="130" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="20" y="345" width="5" height="130" fill="#333333" rx="2"/>
        <text x="45" y="378" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333333">资源维度</text>
        <text x="45" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">客户名单全周期管理 + 激励体系升级为管理架构</text>
        <text x="45" y="430" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">日/周/月/年不同周期激励规则明确</text>
        <text x="45" y="458" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">最大化利用往期资源，避免名单过期浪费</text>
    </g>

    <!-- Right -->
    <g transform="translate(660, 155)">
        <!-- Current strategy -->
        <rect width="560" height="230" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="230" fill="#C41230"/>
        <text x="25" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C41230">当前阶段策略</text>

        <rect x="20" y="55" width="515" height="75" fill="#FDFCFA" stroke="#C41230" stroke-width="1" rx="4"/>
        <text x="40" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C41230">优先上规模，入场后逐步培育</text>
        <text x="40" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">不突破底线标准前提下适当降低准入标准</text>

        <rect x="20" y="145" width="515" height="70" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <text x="40" y="172" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">核心原则：追求产能而非堆人头</text>
        <text x="40" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">五险一金标准提高后，更需要聚焦产能达标而非人数</text>

        <!-- Gen-Z -->
        <rect x="0" y="255" width="560" height="220" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="255" width="4" height="220" fill="#C9A962"/>
        <text x="25" y="293" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C9A962">00后团队管理经验</text>

        <rect x="20" y="310" width="245" height="150" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <text x="35" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">选人策略</text>
        <text x="35" y="368" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">优先选择执行力强</text>
        <text x="35" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">踏实的候选人</text>
        <text x="35" y="412" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">用团队氛围感染新人</text>
        <text x="35" y="434" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">减少负面情绪传播</text>

        <rect x="290" y="310" width="245" height="150" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <text x="305" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">管理技巧</text>
        <text x="305" y="368" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">明确知道每个坐席行为</text>
        <text x="305" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">开会点出问题不点名</text>
        <text x="305" y="412" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">让问题坐席自我调节</text>
        <text x="305" y="434" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">维持团队正面氛围</text>
    </g>

    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1"/>
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：313上午供应商联盟认证总结会 | 关键共识与冲突解决方案</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">落地方案</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">12</text>
</svg>
