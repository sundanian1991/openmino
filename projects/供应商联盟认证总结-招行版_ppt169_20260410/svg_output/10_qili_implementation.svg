<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="75" fill="#C41230"/>
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962"/>
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962"/>

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25"/>

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">03 岐力 — 三阶段落地方案</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3"/>
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15"/>

    <rect x="40" y="95" width="4" height="24" fill="#C41230"/>
    <circle cx="42" cy="119" r="2" fill="#C9A962"/>
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">从准入管控到培优打造再到全面标准化，循序渐进实现管理升级</text>

    <!-- Phase 1 -->
    <g transform="translate(60, 155)">
        <rect width="360" height="320" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="360" height="45" fill="#C41230" rx="4"/>
        <text x="180" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第一阶段：准入管控</text>

        <text x="25" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">目标</text>
        <text x="25" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">新员工手动流数据降低50%</text>
        <text x="25" y="122" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">管理层养成每日数据查看习惯</text>

        <line x1="20" y1="140" x2="340" y2="140" stroke="#F0EDE8" stroke-width="1"/>
        <text x="25" y="165" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">关键动作</text>
        <text x="25" y="192" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 执行话术模式表和人员画像</text>
        <text x="25" y="214" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 新人新办法老人老办法</text>
        <text x="25" y="236" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 管控准入端建立初步认知</text>

        <text x="25" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">周期：第1个月</text>
    </g>

    <!-- Phase 2 -->
    <g transform="translate(460, 155)">
        <rect width="360" height="320" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="360" height="45" fill="#C9A962" rx="4"/>
        <text x="180" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第二阶段：培优打造</text>

        <text x="25" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">目标</text>
        <text x="25" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">覆盖25%-40%员工培优</text>
        <text x="25" y="122" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">打造核心团队，专项预算支持</text>

        <line x1="20" y1="140" x2="340" y2="140" stroke="#F0EDE8" stroke-width="1"/>
        <text x="25" y="165" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">关键动作</text>
        <text x="25" y="192" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 分模块赋能培训</text>
        <text x="25" y="214" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 引入轻量级管理工具</text>
        <text x="25" y="236" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 适配性底线标准</text>
        <text x="25" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 标准化制度管理核心盘</text>

        <text x="25" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">周期：第2-3个月</text>
    </g>

    <!-- Phase 3 -->
    <g transform="translate(860, 155)">
        <rect width="360" height="320" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="360" height="45" fill="#333333" rx="4"/>
        <text x="180" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第三阶段：全面标准化</text>

        <text x="25" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">目标</text>
        <text x="25" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">全团队标准化管理</text>
        <text x="25" y="122" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">成熟制度全项目推广</text>

        <line x1="20" y1="140" x2="340" y2="140" stroke="#F0EDE8" stroke-width="1"/>
        <text x="25" y="165" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">关键动作</text>
        <text x="25" y="192" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 验证成熟的制度迭代推广</text>
        <text x="25" y="214" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 管理工具全项目覆盖</text>
        <text x="25" y="236" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 常态化业务流程演练</text>
        <text x="25" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#666666">- 预算向30%潜力员工倾斜</text>

        <text x="25" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C9A962" font-weight="bold">周期：第4-6个月</text>
    </g>

    <!-- Bottom row -->
    <g transform="translate(60, 500)">
        <rect width="560" height="130" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="130" fill="#9A0E26"/>
        <text x="25" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#9A0E26">现存挑战</text>
        <text x="25" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 先天规模化交付供给不足</text>
        <text x="25" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 存量人员不满足标准</text>
        <text x="25" y="101" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 短周期考核要求稳定交付</text>
        <text x="25" y="120" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#999999">需平衡规模交付与质量标准</text>
    </g>

    <g transform="translate(660, 500)">
        <rect width="560" height="130" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="130" fill="#C9A962"/>
        <text x="25" y="30" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C9A962">保障措施</text>
        <text x="25" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 启动专项小组，组织发展部和合规部牵头</text>
        <text x="25" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 分阶段由不同部门推进</text>
        <text x="25" y="101" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">- 所有任务绑定绩效考核</text>
        <text x="25" y="120" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#999999">组织保障 + 绩效绑定 = 落地确定性</text>
    </g>

    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1"/>
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：313上午供应商联盟认证总结会 | 岐力落地实施方案汇报</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">落地方案</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">10</text>
</svg>
