<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="75" fill="#C41230"/>
    <rect x="0" y="71" width="1280" height="1" fill="#C9A962"/>
    <rect x="0" y="74" width="1280" height="3" fill="#C9A962"/>

    <circle cx="25" cy="38" r="18" fill="none" stroke="#C9A962" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="25" cy="38" r="8" fill="none" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="25" cy="38" r="3" fill="#C9A962" fill-opacity="0.25"/>

    <text x="55" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">02 认证评分规则与结果</text>
    <text x="1220" y="45" text-anchor="end" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">BPO ALLIANCE</text>
    <path d="M1280 0 L1280 45 L1235 0 Z" fill="#9A0E26" fill-opacity="0.3"/>
    <path d="M1280 0 L1280 25 L1255 0 Z" fill="#C9A962" fill-opacity="0.15"/>

    <rect x="40" y="95" width="4" height="24" fill="#C41230"/>
    <circle cx="42" cy="119" r="2" fill="#C9A962"/>
    <text x="55" y="114" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-style="italic">5家供应商全部通过认证，岐力91分领跑，结构可落地性占比最高（50分）</text>

    <!-- Left: Scoring Rules -->
    <g transform="translate(60, 150)">
        <rect width="460" height="480" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="480" fill="#C41230"/>
        <text x="25" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C41230">评分规则</text>

        <!-- Score 1 -->
        <rect x="20" y="55" width="420" height="75" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <text x="35" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333">清晰表达有自己观点</text>
        <text x="35" y="110" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">表达逻辑、观点深度、独立思考能力</text>
        <rect x="355" y="65" width="70" height="40" fill="#C41230" rx="4"/>
        <text x="390" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">25分</text>

        <!-- Score 2 -->
        <rect x="20" y="145" width="420" height="75" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <text x="35" y="175" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333">内容完整贴合主题</text>
        <text x="35" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">内容覆盖度、与培训主题的匹配度</text>
        <rect x="355" y="155" width="70" height="40" fill="#C41230" rx="4"/>
        <text x="390" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">25分</text>

        <!-- Score 3 -->
        <rect x="20" y="235" width="420" height="75" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <text x="35" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333">结构清晰可落地</text>
        <text x="35" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">方案结构、可执行性、时间节点明确</text>
        <rect x="355" y="245" width="70" height="40" fill="#C9A962" rx="4"/>
        <text x="390" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">50分</text>

        <!-- Time rule -->
        <text x="25" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#999999">汇报8分钟 + 提问2分钟，单家最长10分钟</text>
        <text x="25" y="375" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#999999">四位评委打分，满分100，80分通过</text>

        <!-- Bonus -->
        <rect x="20" y="400" width="420" height="60" fill="#FDFCFA" stroke="#C9A962" stroke-width="1" rx="4"/>
        <text x="35" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C9A962">加分项：抓住底层逻辑、有延伸思考</text>
        <text x="35" y="448" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">落地可行性高、方案清晰</text>
    </g>

    <!-- Right: Results -->
    <g transform="translate(560, 150)">
        <rect width="660" height="480" fill="#FFFFFF" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <rect x="0" y="0" width="4" height="480" fill="#C9A962"/>
        <text x="25" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C9A962">认证结果 — 全部通过</text>

        <!-- Rank 1 -->
        <rect x="20" y="55" width="620" height="110" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <circle cx="55" cy="110" r="30" fill="#C41230"/>
        <text x="55" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="105" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">岐力</text>
        <text x="105" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">准入端话术模式表 + 三阶段落地计划 + 专项保障小组</text>
        <text x="105" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">认证第一名，方案完整且可执行性强</text>
        <rect x="530" y="75" width="90" height="70" fill="#C41230" rx="6"/>
        <text x="575" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF">91</text>
        <text x="575" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">分</text>

        <!-- Rank 2 -->
        <rect x="20" y="185" width="620" height="110" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <circle cx="55" cy="240" r="30" fill="#C9A962"/>
        <text x="55" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="105" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">汇讯</text>
        <text x="105" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">BI看板已落地 + 共享话术库提议 + 管理工具需求明确</text>
        <text x="105" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">认证第二名，数字化管理领先</text>
        <rect x="530" y="205" width="90" height="70" fill="#C9A962" rx="6"/>
        <text x="575" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF">88</text>
        <text x="575" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">分</text>

        <!-- Rank 3 -->
        <rect x="20" y="315" width="620" height="110" fill="#FDFCFA" stroke="#F0EDE8" stroke-width="1" rx="4"/>
        <circle cx="55" cy="370" r="30" fill="#333333"/>
        <text x="55" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="105" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">赛维斯</text>
        <text x="105" y="388" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#666666">结构完整、方案可落地、有独立思考</text>
        <text x="105" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#999999">认证第三名，基础扎实</text>
        <rect x="530" y="335" width="90" height="70" fill="#333333" rx="6"/>
        <text x="575" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF">86</text>
        <text x="575" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">分</text>
    </g>

    <path d="M40 140 L50 140 M40 140 L40 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 140 L1230 140 M1240 140 L1240 150" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M40 650 L50 650 M40 650 L40 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M1240 650 L1230 650 M1240 650 L1240 640" stroke="#C9A962" stroke-width="1" stroke-opacity="0.5"/>

    <line x1="40" y1="665" x2="1240" y2="665" stroke="#EAEAEA" stroke-width="1"/>
    <text x="40" y="695" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">数据来源：313上午供应商联盟认证总结会 | 四位评委打分，满分100分，80分通过</text>
    <text x="640" y="695" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">认证结果</text>
    <text x="1220" y="695" text-anchor="end" fill="#777777" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">08</text>
</svg>
