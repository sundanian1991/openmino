<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9" />
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">SUPPLIER MANAGEMENT</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">供应商管理</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四种驱动方式，让供应商自己动起来</text>
    
    
    <path fill="#FFFFFF" d="M52,155 H318 A12,12 0 0 1 330,167 V573 A12,12 0 0 1 318,585 H52 A12,12 0 0 1 40,573 V167 A12,12 0 0 1 52,155 Z" />
    <circle cx="185" cy="210" r="35" fill="#B91C1C" fill-opacity="0.1" />
    <text x="185" y="218" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="28" font-weight="bold">?</text>
    <text x="185" y="270" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">质问式</text>
    <text x="65" y="310" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">"汰换机制是什么？"</text>
    <line x1="65" y1="325" x2="305" y2="325" stroke="#F1F5F9" stroke-width="1" />
    <text x="65" y="360" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">直接提问，制造</text>
    <text x="65" y="382" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"必须回答"的压力</text>
    <text x="65" y="430" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">可学：精准提问</text>
    <path fill="#F1F5F9" d="M73,500 H297 A8,8 0 0 1 305,508 V547 A8,8 0 0 1 297,555 H73 A8,8 0 0 1 65,547 V508 A8,8 0 0 1 73,500 Z" />
    <text x="80" y="520" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不给模糊空间</text>
    <path fill="#B91C1C" fill-opacity="0.1" d="M76,560 H134 A11,11 0 0 1 145,571 V571 A11,11 0 0 1 134,582 H76 A11,11 0 0 1 65,571 V571 A11,11 0 0 1 76,560 Z" /><text x="105" y="575" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险：高</text>

    
    <path fill="#FFFFFF" d="M362,155 H628 A12,12 0 0 1 640,167 V573 A12,12 0 0 1 628,585 H362 A12,12 0 0 1 350,573 V167 A12,12 0 0 1 362,155 Z" />
    <circle cx="495" cy="210" r="35" fill="#F97316" fill-opacity="0.1" />
    <text x="495" y="218" text-anchor="middle" fill="#F97316" font-family="Arial, sans-serif" font-size="28" font-weight="bold">▶</text>
    <text x="495" y="270" text-anchor="middle" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">驱动式</text>
    <text x="375" y="310" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">"3.4亿才有奖金"</text>
    <line x1="375" y1="325" x2="615" y2="325" stroke="#F1F5F9" stroke-width="1" />
    <text x="375" y="360" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用利益让供应商</text>
    <text x="375" y="382" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">自己急，"为自己干"</text>
    <text x="375" y="430" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">利益绑定比命令有效</text>
    <path fill="#F1F5F9" d="M383,500 H607 A8,8 0 0 1 615,508 V547 A8,8 0 0 1 607,555 H383 A8,8 0 0 1 375,547 V508 A8,8 0 0 1 383,500 Z" />
    <text x="390" y="520" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不是"为我干"而是</text>
    <text x="390" y="540" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">"为自己干"</text>
    <path fill="#D97706" fill-opacity="0.1" d="M386,560 H444 A11,11 0 0 1 455,571 V571 A11,11 0 0 1 444,582 H386 A11,11 0 0 1 375,571 V571 A11,11 0 0 1 386,560 Z" /><text x="415" y="575" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险：中</text>

    
    <path fill="#FFFFFF" d="M672,155 H938 A12,12 0 0 1 950,167 V573 A12,12 0 0 1 938,585 H672 A12,12 0 0 1 660,573 V167 A12,12 0 0 1 672,155 Z" />
    <circle cx="805" cy="210" r="35" fill="#C5960C" fill-opacity="0.1" />
    <text x="805" y="218" text-anchor="middle" fill="#C5960C" font-family="Arial, sans-serif" font-size="28" font-weight="bold">✓</text>
    <text x="805" y="270" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">要求式</text>
    <text x="685" y="310" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">"本月人力计划"</text>
    <line x1="685" y1="325" x2="925" y2="325" stroke="#F1F5F9" stroke-width="1" />
    <text x="685" y="360" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">要求具体计划，不模糊</text>
    <text x="685" y="382" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">明确时间节点和交付物</text>
    <text x="685" y="430" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">要求要具体可考核</text>
    <path fill="#F1F5F9" d="M693,500 H917 A8,8 0 0 1 925,508 V547 A8,8 0 0 1 917,555 H693 A8,8 0 0 1 685,547 V508 A8,8 0 0 1 693,500 Z" />
    <text x="700" y="520" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">明确时间节点</text>
    <text x="700" y="540" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">和交付物</text>
    <path fill="#22C55E" fill-opacity="0.1" d="M696,560 H754 A11,11 0 0 1 765,571 V571 A11,11 0 0 1 754,582 H696 A11,11 0 0 1 685,571 V571 A11,11 0 0 1 696,560 Z" /><text x="725" y="575" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险：低</text>

    
    <path fill="#FFFFFF" stroke="#22C55E" stroke-width="2" d="M982,155 H1228 A12,12 0 0 1 1240,167 V573 A12,12 0 0 1 1228,585 H982 A12,12 0 0 1 970,573 V167 A12,12 0 0 1 982,155 Z" />
    <circle cx="1105" cy="210" r="35" fill="#22C55E" fill-opacity="0.1" />
    <text x="1105" y="218" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="28" font-weight="bold">★</text>
    <text x="1105" y="265" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">改进式</text>
    <text x="1105" y="285" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">最值得学</text>
    <text x="995" y="320" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">三要素法</text>
    <text x="995" y="342" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">原因+目标+举措</text>
    <text x="995" y="385" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让供应商自己承诺</text>
    <text x="995" y="430" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">最成熟的管理手法</text>
    <path fill="#22C55E" fill-opacity="0.05" d="M1003,500 H1207 A8,8 0 0 1 1215,508 V547 A8,8 0 0 1 1207,555 H1003 A8,8 0 0 1 995,547 V508 A8,8 0 0 1 1003,500 Z" />
    <text x="1010" y="520" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">完不成有把柄</text>
    <text x="1010" y="540" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">干不好有据可查</text>
    <path fill="#22C55E" fill-opacity="0.15" d="M1006,560 H1064 A11,11 0 0 1 1075,571 V571 A11,11 0 0 1 1064,582 H1006 A11,11 0 0 1 995,571 V571 A11,11 0 0 1 1006,560 Z" /><text x="1035" y="575" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险低</text>
    
    <text x="40" y="630" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">关键洞察：</text>
    <text x="130" y="630" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">质问制造压力 → 驱动绑定利益 → 要求明确交付 → 改进让对方承诺</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">07</text>
</svg>