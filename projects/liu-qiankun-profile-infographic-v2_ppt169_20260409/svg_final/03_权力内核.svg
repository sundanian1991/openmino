<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9" />
    
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">POWER CORE</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">权力内核</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">他想要什么？三个核心诉求缺一不可</text>
    
    
    <path fill="#FFFFFF" stroke="#E2725B" stroke-width="2" d="M76,160 H444 A16,16 0 0 1 460,176 V424 A16,16 0 0 1 444,440 H76 A16,16 0 0 1 60,424 V176 A16,16 0 0 1 76,160 Z" />
    <circle cx="110" cy="210" r="30" fill="#E2725B" fill-opacity="0.1" />
    <text x="110" y="218" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="24" font-weight="bold">1</text>
    <text x="160" y="205" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold">控制权</text>
    <text x="160" y="228" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">NO.1 需求</text>
    <line x1="90" y1="245" x2="430" y2="245" stroke="#F1F5F9" stroke-width="1" />
    <text x="90" y="280" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">刚接手新业务时频繁宣布新规则</text>
    <text x="90" y="310" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">立规矩、阻断信息、责任下放</text>
    <text x="90" y="340" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">建立"我在管"的信号</text>
    <text x="90" y="390" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">应对：确认合理性，不盲目接受</text>
    
    <path fill="#FFFFFF" stroke="#F97316" stroke-width="2" d="M496,160 H864 A16,16 0 0 1 880,176 V424 A16,16 0 0 1 864,440 H496 A16,16 0 0 1 480,424 V176 A16,16 0 0 1 496,160 Z" />
    <circle cx="530" cy="210" r="30" fill="#F97316" fill-opacity="0.1" />
    <text x="530" y="218" text-anchor="middle" fill="#F97316" font-family="Arial, sans-serif" font-size="24" font-weight="bold">2</text>
    <text x="580" y="205" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold">展示权</text>
    <text x="580" y="228" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">最在意</text>
    <line x1="510" y1="245" x2="850" y2="245" stroke="#F1F5F9" stroke-width="1" />
    <text x="510" y="280" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">群聊中高频@上级，汇报"进展"</text>
    <text x="510" y="310" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">群内表演、打鸡血、CC上级</text>
    <text x="510" y="340" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">表演给上级看，不是给平级看</text>
    <text x="510" y="390" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">应对：不抢戏，专注自身边界</text>
    
    <path fill="#FFFFFF" stroke="#B91C1C" stroke-width="2" d="M76,460 H1204 A16,16 0 0 1 1220,476 V604 A16,16 0 0 1 1204,620 H76 A16,16 0 0 1 60,604 V476 A16,16 0 0 1 76,460 Z" />
    <circle cx="120" cy="510" r="30" fill="#B91C1C" fill-opacity="0.1" />
    <text x="120" y="518" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="24" font-weight="bold">3</text>
    <text x="170" y="505" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold">安全感</text>
    <text x="170" y="528" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">底层恐惧</text>
    <text x="170" y="560" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">怕被替代，所以要让别人依赖自己。信息管控就是掌控不可替代性。</text>
    <text x="170" y="590" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">应对：建立独立渠道，不依赖他拿数据</text>
    
    <path fill="#E2725B" fill-opacity="0.08" d="M80,640 H640 A20,20 0 0 1 660,660 V660 A20,20 0 0 1 640,680 H80 A20,20 0 0 1 60,660 V660 A20,20 0 0 1 80,640 Z" />
    <text x="90" y="665" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">控制权是基础 → 展示权是最在意 → 安全感是底线</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">03</text>
</svg>