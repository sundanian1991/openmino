<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9" />
    
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">POWER SOURCES</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">权力来源</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">从底层规则到表层施压，层层递进</text>
    
    
    <path fill="#FFFFFF" stroke="#C5960C" stroke-width="2" d="M108,160 H1172 A8,8 0 0 1 1180,168 V232 A8,8 0 0 1 1172,240 H108 A8,8 0 0 1 100,232 V168 A8,8 0 0 1 108,160 Z" />
    <text x="140" y="205" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">规则权</text>
    <text x="300" y="205" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">立规矩、机制先行 → "按规则办事"而非"个人施压"</text>
    <text x="1080" y="205" text-anchor="end" fill="#C5960C" font-family="Arial, sans-serif" font-size="14" font-weight="bold">TOP</text>
    
    <path fill="#FFFFFF" stroke="#D4AF37" stroke-width="1.5" d="M168,255 H1112 A8,8 0 0 1 1120,263 V327 A8,8 0 0 1 1112,335 H168 A8,8 0 0 1 160,327 V263 A8,8 0 0 1 168,255 Z" />
    <text x="200" y="300" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">信息权</text>
    <text x="340" y="300" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">两头堵、阻断信息 → 对手只能依赖自己</text>
    <text x="1020" y="300" text-anchor="end" fill="#D4AF37" font-family="Arial, sans-serif" font-size="14">↑</text>
    
    <path fill="#FFFFFF" stroke="#E2725B" stroke-width="1.5" d="M228,350 H1052 A8,8 0 0 1 1060,358 V422 A8,8 0 0 1 1052,430 H228 A8,8 0 0 1 220,422 V358 A8,8 0 0 1 228,350 Z" />
    <text x="260" y="395" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">关系权</text>
    <text x="400" y="395" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">拉拢圈人、人情债 → 用关系绑定利益</text>
    <text x="960" y="395" text-anchor="end" fill="#E2725B" font-family="Arial, sans-serif" font-size="14">↑</text>
    
    <path fill="#FFFFFF" stroke="#F97316" stroke-width="1.5" d="M288,445 H992 A8,8 0 0 1 1000,453 V517 A8,8 0 0 1 992,525 H288 A8,8 0 0 1 280,517 V453 A8,8 0 0 1 288,445 Z" />
    <text x="320" y="490" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">注意权</text>
    <text x="460" y="490" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">群内表演、打鸡血 → 刷存在感给上级看</text>
    <text x="900" y="490" text-anchor="end" fill="#F97316" font-family="Arial, sans-serif" font-size="14">↑</text>
    
    <path fill="#FFFFFF" stroke="#B91C1C" stroke-width="2" d="M348,540 H932 A8,8 0 0 1 940,548 V612 A8,8 0 0 1 932,620 H348 A8,8 0 0 1 340,612 V548 A8,8 0 0 1 348,540 Z" />
    <text x="380" y="585" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">施压权</text>
    <text x="520" y="585" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">公开锁定、高压管理 → 制造回复压力</text>
    <text x="840" y="585" text-anchor="end" fill="#B91C1C" font-family="Arial, sans-serif" font-size="14" font-weight="bold">底层</text>
    
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#CBD5E1" stroke-width="0.5" />
    <text x="40" y="690" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">04</text>
</svg>