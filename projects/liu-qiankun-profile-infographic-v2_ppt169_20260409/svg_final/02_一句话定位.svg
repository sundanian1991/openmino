<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9" />
    
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">POSITIONING</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">一句话定位</text>
    
    <path fill="#FFFFFF" stroke="#E2725B" stroke-width="2" d="M72,130 H548 A12,12 0 0 1 560,142 V378 A12,12 0 0 1 548,390 H72 A12,12 0 0 1 60,378 V142 A12,12 0 0 1 72,130 Z" />
    <text x="100" y="180" fill="#E2725B" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill-opacity="0.15">"</text>
    <text x="100" y="240" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">高压管理型业管</text>
    <text x="100" y="285" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">擅长<tspan fill="#E2725B" font-weight="bold"> 立规矩 + 三要素法</tspan></text>
    <text x="100" y="330" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">对上表演 · 对下施压 · 信息管控</text>
    
    
    <circle cx="880" cy="190" r="60" fill="#FFFFFF" stroke="#E2725B" stroke-width="3" />
    <text x="880" y="185" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">控制权</text>
    <text x="880" y="210" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">NO.1 需求</text>
    
    <circle cx="770" cy="330" r="50" fill="#FFFFFF" stroke="#F97316" stroke-width="2" />
    <text x="770" y="325" text-anchor="middle" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">展示权</text>
    <text x="770" y="348" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">最在意</text>
    
    <circle cx="990" cy="330" r="50" fill="#FFFFFF" stroke="#B91C1C" stroke-width="2" />
    <text x="990" y="325" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">安全感</text>
    <text x="990" y="348" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">底层恐惧</text>
    
    <line x1="880" y1="250" x2="770" y2="285" stroke="#E2725B" stroke-width="1" stroke-opacity="0.3" />
    <line x1="880" y1="250" x2="990" y2="285" stroke="#E2725B" stroke-width="1" stroke-opacity="0.3" />
    
    <path fill="#FFFFFF" d="M68,420 H422 A8,8 0 0 1 430,428 V612 A8,8 0 0 1 422,620 H68 A8,8 0 0 1 60,612 V428 A8,8 0 0 1 68,420 Z" />
    <text x="85" y="460" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">控制权 · 第一需求</text>
    <text x="85" y="490" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刚接手新业务时，通过立规矩、阻断信</text>
    <text x="85" y="510" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">息、责任下放来建立"我在管"的信号</text>
    <text x="85" y="550" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">秩序是安全感的基础</text>

    <path fill="#FFFFFF" d="M458,420 H812 A8,8 0 0 1 820,428 V612 A8,8 0 0 1 812,620 H458 A8,8 0 0 1 450,612 V428 A8,8 0 0 1 458,420 Z" />
    <text x="475" y="460" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">展示权 · 最在意</text>
    <text x="475" y="490" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内表演、打鸡血、CC上级，观众从来</text>
    <text x="475" y="510" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">不是平级而是上级</text>
    <text x="475" y="550" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"老板知不知道"比解决本身更重要</text>

    <path fill="#FFFFFF" d="M848,420 H1212 A8,8 0 0 1 1220,428 V612 A8,8 0 0 1 1212,620 H848 A8,8 0 0 1 840,612 V428 A8,8 0 0 1 848,420 Z" />
    <text x="865" y="460" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">安全感 · 底层恐惧</text>
    <text x="865" y="490" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">怕被替代，所以要让别人依赖自己。信</text>
    <text x="865" y="510" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">息管控就是掌控不可替代性</text>
    <text x="865" y="550" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"别找供应商，我来对接"</text>
    
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#CBD5E1" stroke-width="0.5" />
    <text x="40" y="690" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">02</text>
</svg>