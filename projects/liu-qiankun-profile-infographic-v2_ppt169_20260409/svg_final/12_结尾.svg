<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">CONCLUSION</text>
    <text x="60" y="100" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">总结三句话</text>
    <!-- 大字排版: 三句话纵向 -->
    <!-- 01 -->
    <text x="640" y="200" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill-opacity="0.08">01</text>
    <text x="640" y="240" text-anchor="middle" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold">他不是在管理，是在表演管理</text>
    <text x="640" y="275" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">最在意的是"老板知不知道我在解决"</text>
    <line x1="200" y1="310" x2="1080" y2="310" stroke="#E2E8F0" stroke-width="0.5"/>
    <!-- 02 -->
    <text x="640" y="380" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill-opacity="0.08">02</text>
    <text x="640" y="420" text-anchor="middle" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold">边界清晰是最好的防御</text>
    <text x="640" y="455" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">周末不接@，工作日按流程，信息独立</text>
    <line x1="200" y1="490" x2="1080" y2="490" stroke="#E2E8F0" stroke-width="0.5"/>
    <!-- 03 -->
    <text x="640" y="560" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill-opacity="0.08">03</text>
    <text x="640" y="600" text-anchor="middle" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold">取其精华，做温和但坚定的管理者</text>
    <text x="640" y="635" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">学立规矩、三要素法、数据说话；加上给支持、长期合作</text>
    <!-- 底部 -->
    <text x="60" y="690" fill="#94A3B8" font-family="Arial, sans-serif" font-size="10">v10.2 · 年老师建档 · 2026-03-19 · 刘乾坤人物深度分析报告</text>
    <text x="1220" y="690" text-anchor="end" fill="#E2725B" font-family="Arial, sans-serif" font-size="11">END</text>
</svg>
