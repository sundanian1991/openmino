<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <!-- 大字报风格封面 -->
    <text x="60" y="60" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">CORE PROFILE</text>
    <!-- 超大字号 -->
    <text x="60" y="200" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="80" font-weight="bold">刘乾坤</text>
    <!-- 装饰线 -->
    <rect x="60" y="230" width="120" height="4" fill="#E2725B"/>
    <text x="60" y="280" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24">人物深度分析报告</text>
    <!-- 右侧装饰圆形 -->
    <circle cx="1050" cy="350" r="180" fill="#FFFFFF" stroke="#E2725B" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="1050" cy="350" r="120" fill="none" stroke="#E2725B" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="1050" cy="350" r="60" fill="none" stroke="#E2725B" stroke-width="1" stroke-opacity="0.15"/>
    <text x="1050" y="340" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">权力框架</text>
    <text x="1050" y="365" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">行为模式</text>
    <text x="1050" y="385" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">应对策略</text>
    <!-- 底部信息 -->
    <line x1="60" y1="620" x2="1220" y2="620" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="60" y="660" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">v10.2 · 年老师建档 · 2026-03-19</text>
    <text x="640" y="660" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="660" text-anchor="end" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">2026-04-09</text>
    <!-- 四个关键词 -->
    <rect x="60" y="480" width="200" height="80" rx="40" fill="#FFFFFF" stroke="#E2725B" stroke-width="1"/>
    <text x="160" y="515" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">权力框架</text>
    <text x="160" y="540" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">POWER FRAME</text>

    <rect x="290" y="480" width="200" height="80" rx="40" fill="#FFFFFF" stroke="#E2725B" stroke-width="1"/>
    <text x="390" y="515" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">行为模式</text>
    <text x="390" y="540" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">BEHAVIOR</text>

    <rect x="520" y="480" width="200" height="80" rx="40" fill="#FFFFFF" stroke="#E2725B" stroke-width="1"/>
    <text x="620" y="515" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">应对策略</text>
    <text x="620" y="540" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">STRATEGY</text>

    <rect x="750" y="480" width="200" height="80" rx="40" fill="#FFFFFF" stroke="#E2725B" stroke-width="1"/>
    <text x="850" y="515" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">可学习内容</text>
    <text x="850" y="540" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">LEARNABLE</text>
</svg>
