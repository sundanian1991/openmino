<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">COUNTER STRATEGIES</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">应对策略</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">他说 vs 你回 — 每句都有对照</text>
    <!-- 左侧: 四大原则竖条 -->
    <rect x="40" y="150" width="260" height="470" rx="12" fill="#FFFFFF"/>
    <circle cx="170" cy="200" r="25" fill="#E2725B" fill-opacity="0.1"/>
    <text x="170" y="206" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="20" font-weight="bold">4</text>
    <text x="70" y="250" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">四大核心原则</text>
    <line x1="70" y1="265" x2="270" y2="265" stroke="#F1F5F9" stroke-width="1"/>
    <text x="70" y="300" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">1 不主动背锅</text>
    <text x="70" y="322" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">问题直接传递</text>
    <text x="70" y="360" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">2 边界清晰</text>
    <text x="70" y="382" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">周末不接@</text>
    <text x="70" y="420" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">3 信息独立</text>
    <text x="70" y="442" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">建独立渠道</text>
    <text x="70" y="480" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">4 学习技巧</text>
    <text x="70" y="502" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">立规矩+三要素法</text>
    <!-- 右侧: 话术对照卡片 -->
    <!-- Card 1 -->
    <rect x="330" y="150" width="450" height="130" rx="12" fill="#FFFFFF"/>
    <circle cx="360" cy="180" r="16" fill="#B91C1C" fill-opacity="0.1"/>
    <text x="360" y="185" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="390" y="180" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"帮我看下，我该如何解答"</text>
    <line x1="350" y1="200" x2="760" y2="200" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="360" cy="230" r="16" fill="#22C55E" fill-opacity="0.1"/>
    <text x="360" y="235" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="390" y="230" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"你的想法是什么？我先听你的"</text>
    <text x="390" y="255" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不接任务，反问回去</text>
    <!-- Card 2 -->
    <rect x="800" y="150" width="440" height="130" rx="12" fill="#FFFFFF"/>
    <circle cx="830" cy="180" r="16" fill="#B91C1C" fill-opacity="0.1"/>
    <text x="830" y="185" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="860" y="180" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">周末@处理供应商问题</text>
    <line x1="820" y1="200" x2="1220" y2="200" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="830" cy="230" r="16" fill="#22C55E" fill-opacity="0.1"/>
    <text x="830" y="235" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="860" y="230" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"收到，周一处理"</text>
    <text x="860" y="255" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">边界清晰，不解释</text>
    <!-- Card 3 -->
    <rect x="330" y="300" width="450" height="130" rx="12" fill="#FFFFFF"/>
    <circle cx="360" cy="330" r="16" fill="#B91C1C" fill-opacity="0.1"/>
    <text x="360" y="335" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="390" y="330" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"别找供应商，他们不如我们清楚"</text>
    <line x1="350" y1="350" x2="760" y2="350" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="360" cy="380" r="16" fill="#22C55E" fill-opacity="0.1"/>
    <text x="360" y="385" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="390" y="380" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"理解，但我需要一线真实反馈"</text>
    <text x="390" y="405" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">建立独立渠道</text>
    <!-- Card 4 -->
    <rect x="800" y="300" width="440" height="130" rx="12" fill="#FFFFFF"/>
    <circle cx="830" cy="330" r="16" fill="#B91C1C" fill-opacity="0.1"/>
    <text x="830" y="335" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="860" y="330" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"辛苦兄弟多费心"</text>
    <line x1="820" y1="350" x2="1220" y2="350" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="830" cy="380" r="16" fill="#22C55E" fill-opacity="0.1"/>
    <text x="830" y="385" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="860" y="380" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"8个供应商，担心盯不细"</text>
    <text x="860" y="405" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">示弱加边界，刘乾坤会退让</text>
    <!-- Card 5 - wide -->
    <rect x="330" y="450" width="910" height="100" rx="12" fill="#FFFFFF"/>
    <circle cx="360" cy="480" r="16" fill="#B91C1C" fill-opacity="0.1"/>
    <text x="360" y="485" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="390" y="480" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">危机渲染 + 责任锁定</text>
    <line x1="350" y1="500" x2="1220" y2="500" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="360" cy="530" r="16" fill="#22C55E" fill-opacity="0.1"/>
    <text x="360" y="535" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="390" y="530" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">事实压危机、锁定卡点、踢球给方案</text>
    <text x="390" y="555" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">用专业语言说话</text>
    <!-- 底部 -->
    <text x="60" y="620" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">核心策略：</text>
    <text x="135" y="620" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不接球 → 不模糊 → 不依赖 → 学技巧</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">09</text>
</svg>
