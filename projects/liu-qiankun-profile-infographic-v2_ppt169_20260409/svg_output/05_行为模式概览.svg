<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">BEHAVIOR PATTERNS</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">行为模式概览</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">18种模式，按风险等级热力分布</text>
    <!-- 5x4 热力网格 -->
    <!-- 表头 -->
    <rect x="60" y="150" width="1160" height="40" rx="6" fill="#0F172A"/>
    <text x="100" y="176" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">权力来源</text>
    <text x="350" y="176" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">行为模式</text>
    <text x="750" y="176" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">风险</text>
    <text x="950" y="176" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">一句话</text>
    <!-- 行1: 规则权 -->
    <rect x="60" y="195" width="1160" height="55" rx="4" fill="#FFFFFF"/>
    <circle cx="90" cy="222" r="10" fill="#22C55E" fill-opacity="0.2"/><text x="90" y="227" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="9" font-weight="bold">学</text>
    <text x="120" y="225" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">规则权</text>
    <text x="350" y="225" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">立规矩</text>
    <rect x="750" y="210" width="80" height="24" rx="12" fill="#22C55E" fill-opacity="0.1"/><text x="790" y="227" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">值得学</text>
    <text x="950" y="225" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">先定规则后办事</text>
    <!-- 行2: 信息权 -->
    <rect x="60" y="255" width="1160" height="55" rx="4" fill="#FFFFFF"/>
    <circle cx="90" cy="282" r="10" fill="#B91C1C" fill-opacity="0.2"/><text x="90" y="287" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="9" font-weight="bold">!</text>
    <text x="120" y="285" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">信息权</text>
    <text x="350" y="285" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">两头堵、阻断信息</text>
    <rect x="750" y="270" width="80" height="24" rx="12" fill="#B91C1C" fill-opacity="0.1"/><text x="790" y="287" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">高危险</text>
    <text x="950" y="285" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">阻断信息渠道</text>
    <!-- 行3: 关系权 -->
    <rect x="60" y="315" width="1160" height="55" rx="4" fill="#FFFFFF"/>
    <circle cx="90" cy="342" r="10" fill="#D97706" fill-opacity="0.2"/><text x="90" y="347" text-anchor="middle" fill="#D97706" font-family="Arial, sans-serif" font-size="9" font-weight="bold">▲</text>
    <text x="120" y="345" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">关系权</text>
    <text x="350" y="345" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">拉拢圈人、人情债</text>
    <rect x="750" y="330" width="80" height="24" rx="12" fill="#D97706" fill-opacity="0.1"/><text x="790" y="347" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压</text>
    <text x="950" y="345" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让利换配合</text>
    <!-- 行4: 注意权 -->
    <rect x="60" y="375" width="1160" height="55" rx="4" fill="#FFFFFF"/>
    <circle cx="90" cy="402" r="10" fill="#D97706" fill-opacity="0.2"/><text x="90" y="407" text-anchor="middle" fill="#D97706" font-family="Arial, sans-serif" font-size="9" font-weight="bold">▲</text>
    <text x="120" y="405" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">注意权</text>
    <text x="350" y="405" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内表演、任务下放+CC</text>
    <rect x="750" y="390" width="80" height="24" rx="12" fill="#D97706" fill-opacity="0.1"/><text x="790" y="407" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压</text>
    <text x="950" y="405" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">刷存在感</text>
    <!-- 行5: 施压权 -->
    <rect x="60" y="435" width="1160" height="55" rx="4" fill="#FFFFFF"/>
    <circle cx="90" cy="462" r="10" fill="#B91C1C" fill-opacity="0.2"/><text x="90" y="467" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="9" font-weight="bold">!</text>
    <text x="120" y="465" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">施压权</text>
    <text x="350" y="465" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">公开锁定、高压管理、追责转嫁</text>
    <rect x="750" y="450" width="80" height="24" rx="12" fill="#B91C1C" fill-opacity="0.1"/><text x="790" y="467" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">高危险</text>
    <text x="950" y="465" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">密集施压区域</text>
    <!-- 组合拳区域 -->
    <text x="60" y="530" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">组合拳</text>
    <rect x="60" y="545" width="370" height="55" rx="6" fill="#FFFFFF"/>
    <text x="80" y="578" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">抛问题、正面对冲、借力打力</text>
    <rect x="340" y="560" width="60" height="22" rx="11" fill="#6B7280" fill-opacity="0.1"/><text x="370" y="575" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10">中性</text>
    <rect x="450" y="545" width="370" height="55" rx="6" fill="#FFFFFF"/>
    <text x="470" y="578" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群聊闹事、选择性攻击</text>
    <rect x="730" y="560" width="60" height="22" rx="11" fill="#B91C1C" fill-opacity="0.1"/><text x="760" y="575" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10">高危</text>
    <rect x="840" y="545" width="380" height="55" rx="6" fill="#FFFFFF"/>
    <text x="860" y="578" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">质疑数据降温、挖人试探、镜像过敏</text>
    <rect x="1120" y="560" width="60" height="22" rx="11" fill="#6B7280" fill-opacity="0.1"/><text x="1150" y="575" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10">中性</text>
    <!-- 底部统计 -->
    <rect x="60" y="630" width="250" height="50" rx="8" fill="#FFFFFF"/>
    <text x="80" y="650" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">6种</text>
    <text x="130" y="650" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">高危险手法</text>
    <text x="80" y="670" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">33% 的总模式</text>

    <rect x="330" y="630" width="250" height="50" rx="8" fill="#FFFFFF"/>
    <text x="350" y="650" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">4种</text>
    <text x="400" y="650" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">施压手法</text>
    <text x="350" y="670" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">22% 的总模式</text>

    <rect x="600" y="630" width="250" height="50" rx="8" fill="#FFFFFF"/>
    <text x="620" y="650" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">3种</text>
    <text x="670" y="650" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">值得学习</text>
    <text x="620" y="670" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">17% 的总模式</text>

    <rect x="870" y="630" width="350" height="50" rx="8" fill="#FFFFFF"/>
    <text x="890" y="660" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">施压密集区：注意权 + 施压权</text>

    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">05</text>
</svg>
