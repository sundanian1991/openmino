    <text x="145" y="635" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">用事实反击，态度强硬，他就会退</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">11</text>
