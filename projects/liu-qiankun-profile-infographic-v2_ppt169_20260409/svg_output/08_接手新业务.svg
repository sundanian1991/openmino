<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">ONBOARDING PLAYBOOK</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">接手新业务</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四步建立管理基础，每一步都有清晰动作</text>
    <!-- 时间轴: 水平箭头贯穿 -->
    <line x1="80" y1="340" x2="1200" y2="340" stroke="#CBD5E1" stroke-width="2"/>
    <polygon points="1200,332 1220,340 1200,348" fill="#CBD5E1"/>
    <!-- Step 1: 立规矩 -->
    <circle cx="170" cy="340" r="30" fill="#B91C1C" fill-opacity="0.1" stroke="#B91C1C" stroke-width="2"/>
    <text x="170" y="348" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="24" font-weight="bold">1</text>
    <!-- 上方卡片 -->
    <rect x="60" y="150" width="220" height="150" rx="12" fill="#FFFFFF"/>
    <text x="80" y="190" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">立规矩</text>
    <text x="80" y="220" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">宣布7条规则</text>
    <text x="80" y="242" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">30分钟回复、10点报出勤</text>
    <text x="80" y="260" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">昵称格式、数据日报格式</text>
    <text x="80" y="282" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">→ 后续"按规则办事"</text>
    <!-- 连接线 -->
    <line x1="170" y1="310" x2="170" y2="300" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Step 2: 数据切入 -->
    <circle cx="460" cy="340" r="30" fill="#F97316" fill-opacity="0.1" stroke="#F97316" stroke-width="2"/>
    <text x="460" y="348" text-anchor="middle" fill="#F97316" font-family="Arial, sans-serif" font-size="24" font-weight="bold">2</text>
    <!-- 下方卡片 -->
    <rect x="350" y="380" width="220" height="170" rx="12" fill="#FFFFFF"/>
    <text x="370" y="420" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">数据切入</text>
    <text x="370" y="450" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">5分钟连发两条数据</text>
    <text x="370" y="472" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">精确到小数点</text>
    <text x="370" y="490" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">摆数据，不出结论</text>
    <text x="370" y="510" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">责任完美分散</text>
    <text x="370" y="532" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">→ 让别人背锅，自己居功</text>
    <!-- 连接线 -->
    <line x1="460" y1="370" x2="460" y2="380" stroke="#F97316" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Step 3: 公开锁定 -->
    <circle cx="750" cy="340" r="30" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
    <text x="750" y="348" text-anchor="middle" fill="#3B82F6" font-family="Arial, sans-serif" font-size="24" font-weight="bold">3</text>
    <!-- 上方卡片 -->
    <rect x="640" y="150" width="220" height="150" rx="12" fill="#FFFFFF"/>
    <text x="660" y="190" fill="#3B82F6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">公开锁定</text>
    <text x="660" y="220" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群里@具体人</text>
    <text x="660" y="242" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">所有人看着不得不接</text>
    <text x="660" y="260" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不私聊，连环追加施压</text>
    <text x="660" y="282" fill="#3B82F6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">→ 制造回复压力</text>
    <!-- 连接线 -->
    <line x1="750" y1="310" x2="750" y2="300" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Step 4: 建立预期 -->
    <circle cx="1040" cy="340" r="30" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-width="2"/>
    <text x="1040" y="348" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="24" font-weight="bold">4</text>
    <!-- 下方卡片 -->
    <rect x="930" y="380" width="220" height="170" rx="12" fill="#FFFFFF"/>
    <text x="950" y="420" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">建立预期</text>
    <text x="950" y="450" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">按规则办事形象确立</text>
    <text x="950" y="472" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">引用初始规则</text>
    <text x="950" y="490" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">持续执行</text>
    <text x="950" y="510" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">从"个人意志"变"按章办事"</text>
    <text x="950" y="532" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">→ 规则比人更持久</text>
    <!-- 连接线 -->
    <line x1="1040" y1="370" x2="1040" y2="380" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- 底部洞察 -->
    <text x="60" y="620" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">关键洞察：</text>
    <text x="135" y="620" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">后续所有管理行为都是"执行既定规则"，不是"个人施压"</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">08</text>
</svg>
