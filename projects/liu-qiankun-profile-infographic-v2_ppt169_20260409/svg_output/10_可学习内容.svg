<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">LEARNABLE SKILLS</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">可学习内容</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四种核心技巧，从基础到进阶</text>
    <!-- 四步进阶: 大数字+卡片水平排列 -->
    <!-- Skill 1 -->
    <rect x="40" y="160" width="290" height="340" rx="12" fill="#FFFFFF"/>
    <circle cx="185" cy="210" r="30" fill="#B91C1C" fill-opacity="0.08"/>
    <text x="185" y="220" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="36" font-weight="bold">1</text>
    <text x="185" y="270" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">立规矩</text>
    <line x1="70" y1="285" x2="300" y2="285" stroke="#F1F5F9" stroke-width="1"/>
    <text x="65" y="315" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">先定规则后办事</text>
    <text x="65" y="340" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">后续是"执行既定规则"</text>
    <text x="65" y="380" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">规则越具体越好</text>
    <text x="65" y="400" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可考核可追溯</text>
    <rect x="65" y="430" width="100" height="28" rx="14" fill="#B91C1C" fill-opacity="0.08"/>
    <text x="115" y="449" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">接手新业务</text>
    <rect x="65" y="465" width="100" height="22" rx="11" fill="#F1F5F9"/>
    <text x="115" y="480" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">基础</text>
    <!-- Skill 2 -->
    <rect x="350" y="160" width="290" height="340" rx="12" fill="#FFFFFF"/>
    <circle cx="495" cy="210" r="30" fill="#F97316" fill-opacity="0.08"/>
    <text x="495" y="220" text-anchor="middle" fill="#F97316" font-family="Arial, sans-serif" font-size="36" font-weight="bold">2</text>
    <text x="495" y="270" text-anchor="middle" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">三要素法</text>
    <line x1="380" y1="285" x2="610" y2="285" stroke="#F1F5F9" stroke-width="1"/>
    <text x="375" y="315" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">问题→原因+目标+举措</text>
    <text x="375" y="340" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让别人承诺</text>
    <text x="375" y="380" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让对方承诺比直接</text>
    <text x="375" y="400" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">给方案更有约束力</text>
    <rect x="375" y="430" width="100" height="28" rx="14" fill="#F97316" fill-opacity="0.08"/>
    <text x="425" y="449" text-anchor="middle" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">供应商管理</text>
    <rect x="375" y="465" width="100" height="22" rx="11" fill="#F1F5F9"/>
    <text x="425" y="480" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">进阶</text>
    <!-- Skill 3 -->
    <rect x="660" y="160" width="290" height="340" rx="12" fill="#FFFFFF"/>
    <circle cx="805" cy="210" r="30" fill="#3B82F6" fill-opacity="0.08"/>
    <text x="805" y="220" text-anchor="middle" fill="#3B82F6" font-family="Arial, sans-serif" font-size="36" font-weight="bold">3</text>
    <text x="805" y="270" text-anchor="middle" fill="#3B82F6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">数据说话</text>
    <line x1="690" y1="285" x2="920" y2="285" stroke="#F1F5F9" stroke-width="1"/>
    <text x="685" y="315" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">精确数据展示+公开施压</text>
    <text x="685" y="340" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">数据是最好的武器</text>
    <text x="685" y="380" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">比任何道理都有力</text>
    <rect x="685" y="430" width="100" height="28" rx="14" fill="#3B82F6" fill-opacity="0.08"/>
    <text x="735" y="449" text-anchor="middle" fill="#3B82F6" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">汇报/驱动</text>
    <rect x="685" y="465" width="100" height="22" rx="11" fill="#F1F5F9"/>
    <text x="735" y="480" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">进阶</text>
    <!-- Skill 4 -->
    <rect x="970" y="160" width="270" height="340" rx="12" fill="#FFFFFF" stroke="#22C55E" stroke-width="2"/>
    <circle cx="1105" cy="210" r="30" fill="#22C55E" fill-opacity="0.08"/>
    <text x="1105" y="220" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="36" font-weight="bold">4</text>
    <text x="1105" y="270" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">机制先行</text>
    <line x1="995" y1="285" x2="1215" y2="285" stroke="#F0FDF4" stroke-width="1"/>
    <text x="995" y="315" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">先建机制再谈业务</text>
    <text x="995" y="340" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">干不好有把柄</text>
    <text x="995" y="380" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">建立长期管理体系</text>
    <rect x="995" y="430" width="100" height="28" rx="14" fill="#22C55E" fill-opacity="0.08"/>
    <text x="1045" y="449" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">长期管理</text>
    <rect x="995" y="465" width="100" height="22" rx="11" fill="#22C55E" fill-opacity="0.08"/>
    <text x="1045" y="480" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">高阶 ★</text>
    <!-- 底部: 对比 -->
    <rect x="40" y="540" width="570" height="100" rx="12" fill="#FFFFFF"/>
    <text x="70" y="570" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">刘乾坤</text>
    <text x="70" y="598" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 施压 → 让供应商自己想办法</text>
    <text x="70" y="622" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压型管理</text>
    <rect x="630" y="540" width="610" height="100" rx="12" fill="#FFFFFF"/>
    <text x="660" y="570" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">年老师</text>
    <text x="660" y="598" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 提要求 → 给支持 → 长期合作</text>
    <text x="660" y="622" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">伙伴型管理</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">10</text>
</svg>
