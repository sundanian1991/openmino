<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#F1F5F9"/>
    <text x="60" y="50" fill="#E2725B" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" font-weight="bold">RELATIONSHIP MAP</text>
    <text x="60" y="90" fill="#0F172A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">关系网络</text>
    <text x="60" y="120" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">以他为中心的星系轨道，每段关系都有策略</text>
    <!-- 中心恒星 -->
    <circle cx="640" cy="340" r="45" fill="#E2725B" fill-opacity="0.15" stroke="#E2725B" stroke-width="2"/>
    <text x="640" y="335" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">刘乾坤</text>
    <text x="640" y="355" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">权力核心</text>
    <!-- 轨道1: 内圈 -->
    <ellipse cx="640" cy="340" rx="160" ry="110" fill="none" stroke="#E2725B" stroke-width="0.5" stroke-opacity="0.25"/>
    <!-- 轨道2: 中圈 -->
    <ellipse cx="640" cy="340" rx="280" ry="180" fill="none" stroke="#E2725B" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- 轨道3: 外圈 -->
    <ellipse cx="640" cy="340" rx="400" ry="260" fill="none" stroke="#94A3B8" stroke-width="0.5" stroke-opacity="0.12"/>
    <!-- 内圈节点: 上级 -->
    <circle cx="640" cy="175" r="32" fill="#FFFFFF" stroke="#E2725B" stroke-width="2"/>
    <text x="640" y="172" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">王易人</text>
    <text x="640" y="187" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">服务组负责人</text>
    <line x1="640" y1="207" x2="640" y2="295" stroke="#E2725B" stroke-width="0.8" stroke-dasharray="3,3"/>
    <!-- 中圈节点: 同盟 -->
    <circle cx="420" cy="260" r="28" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
    <text x="420" y="257" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">郭鑫</text>
    <text x="420" y="272" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">前同事</text>
    <line x1="448" y1="275" x2="610" y2="315" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="860" cy="260" r="28" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
    <text x="860" y="257" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">马贵贤</text>
    <text x="860" y="272" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">前同事</text>
    <line x1="832" y1="275" x2="670" y2="315" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- 中圈节点: 师承 -->
    <circle cx="370" cy="430" r="28" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
    <text x="370" y="427" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">刘伟佳</text>
    <text x="370" y="442" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">策略组</text>
    <line x1="398" y1="420" x2="610" y2="370" stroke="#94A3B8" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- 外圈节点: 配合 -->
    <circle cx="240" cy="230" r="30" fill="#FFFFFF" stroke="#C5960C" stroke-width="1"/>
    <text x="240" y="227" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">年老师</text>
    <text x="240" y="242" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">拉拢+人情债</text>
    <line x1="270" y1="240" x2="610" y2="320" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- 外圈节点: 对手 -->
    <circle cx="1040" cy="230" r="30" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1"/>
    <text x="1040" y="227" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">李吉斌</text>
    <text x="1040" y="242" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">前任</text>
    <line x1="1010" y1="240" x2="670" y2="320" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- 外圈节点: 下属 -->
    <circle cx="920" cy="500" r="28" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
    <text x="920" y="497" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">张世跃</text>
    <text x="920" y="512" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">实习生</text>
    <line x1="892" y1="490" x2="670" y2="370" stroke="#94A3B8" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- 外圈节点: 供应商 -->
    <circle cx="500" cy="570" r="32" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
    <text x="500" y="567" text-anchor="middle" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">供应商群</text>
    <text x="500" y="582" text-anchor="middle" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="9">利益驱动</text>
    <line x1="520" y1="550" x2="620" y2="385" stroke="#94A3B8" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- 底部图例 -->
    <rect x="60" y="630" width="30" height="12" rx="2" fill="#22C55E"/><text x="100" y="640" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">同盟</text>
    <rect x="150" y="630" width="30" height="12" rx="2" fill="#E2725B"/><text x="190" y="640" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">上级</text>
    <rect x="240" y="630" width="30" height="12" rx="2" fill="#C5960C"/><text x="280" y="640" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">配合</text>
    <rect x="330" y="630" width="30" height="12" rx="2" fill="#B91C1C"/><text x="370" y="640" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">对手</text>
    <rect x="420" y="630" width="30" height="12" rx="2" fill="#94A3B8"/><text x="460" y="640" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">下属</text>
    <text x="1220" y="690" text-anchor="end" fill="#94A3B8" font-family="Arial, sans-serif" font-size="11">06</text>
</svg>
