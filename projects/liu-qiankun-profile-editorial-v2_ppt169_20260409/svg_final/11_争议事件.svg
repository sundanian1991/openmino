        <text x="20" y="180" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">夸大其词：实际"不会出现批量离职"</text>
        <text x="20" y="210" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">教训：核实数据，不被情绪带节奏</text>
        <text x="470" y="33" fill="#B91C1C" font-family="Arial, sans-serif" font-size="11" font-weight="bold">HIGH RISK</text>
