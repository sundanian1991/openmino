    <ellipse cx="640" cy="360" rx="260" ry="170" fill="none" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.15"/>
    <ellipse cx="640" cy="360" rx="370" ry="240" fill="none" stroke="#9CA3AF" stroke-width="0.5" stroke-opacity="0.1"/>
    <!-- 内圈: 上级 -->
