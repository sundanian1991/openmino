    <text x="430" y="291" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">前同事</text>
    <line x1="456" y1="295" x2="610" y2="340" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
