<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <radialGradient id="coreGlow" cx="50%" cy="50%" r="30%">
            <stop offset="0%" stop-color="#C5960C" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#FDF8F0" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#coreGlow)"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">RELATIONSHIP GALAXY</text>
    <line x1="60" y1="65" x2="240" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">关系网络</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">以他为中心的星系，每段关系都有策略</text>
    <!-- 中心恒星 -->
    <circle cx="640" cy="360" r="40" fill="#C5960C" fill-opacity="0.15" stroke="#C5960C" stroke-width="2"/>
