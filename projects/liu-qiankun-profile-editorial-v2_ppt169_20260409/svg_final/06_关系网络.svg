    <text x="640" y="207" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">王易人</text>
    <text x="640" y="221" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">服务组负责人</text>
    <line x1="640" y1="240" x2="640" y2="320" stroke="#C5960C" stroke-width="1" stroke-dasharray="3,3"/>
