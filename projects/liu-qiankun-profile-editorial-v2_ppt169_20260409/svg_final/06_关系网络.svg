    <text x="60" y="675" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">策略洞察：</text>
    <text x="140" y="675" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">同盟用嘴出力 · 上级是最终观众 · 对手公开攻击 · 年老师拉拢+人情债</text>
    <text x="60" y="700" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="1220" y="700" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">06 / 12</text>
</svg>
