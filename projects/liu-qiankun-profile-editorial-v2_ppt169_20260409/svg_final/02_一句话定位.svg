<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <radialGradient id="coreGlow" cx="50%" cy="50%" r="40%">
            <stop offset="0%" stop-color="#C5960C" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#FDF8F0" stop-opacity="0" />
        </radialGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0" />
    <rect x="0" y="0" width="1280" height="720" fill="url(#coreGlow)" />
    
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">ONE-LINE POSITIONING</text>
    <line x1="60" y1="65" x2="300" y2="65" stroke="#C5960C" stroke-width="1" />
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">一句话定位</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">高压管理型业管，三个核心诉求驱动一切行为</text>
    
    <path fill="#FFFFFF" stroke="#C5960C" stroke-width="1" d="M68,170 H552 A8,8 0 0 1 560,178 V282 A8,8 0 0 1 552,290 H68 A8,8 0 0 1 60,282 V178 A8,8 0 0 1 68,170 Z" />
    <text x="80" y="210" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心定位</text>
    <text x="80" y="245" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">高压管理型业管</text>
    <text x="80" y="272" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">擅长立规矩+三要素法，对上表演、对下施压、信息管控</text>
    
    
    <path fill="#FFFFFF" stroke="#E8DFD0" stroke-width="0.5" d="M608,170 H852 A8,8 0 0 1 860,178 V462 A8,8 0 0 1 852,470 H608 A8,8 0 0 1 600,462 V178 A8,8 0 0 1 608,170 Z" />
    <circle cx="730" cy="220" r="30" fill="#C5960C" fill-opacity="0.1" />
    <text x="730" y="225" text-anchor="middle" fill="#C5960C" font-family="Arial, sans-serif" font-size="20" font-weight="bold">C</text>
    <text x="630" y="280" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">控制权</text>
    <text x="630" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">立规矩、阻断信息</text>
    <text x="630" y="330" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">责任下放</text>
    <text x="630" y="370" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">第一需求：秩序是安全感的基础</text>
    
    <path fill="#FFFFFF" stroke="#E8DFD0" stroke-width="0.5" d="M898,170 H1142 A8,8 0 0 1 1150,178 V462 A8,8 0 0 1 1142,470 H898 A8,8 0 0 1 890,462 V178 A8,8 0 0 1 898,170 Z" />
    <circle cx="1020" cy="220" r="30" fill="#D4AF37" fill-opacity="0.1" />
    <text x="1020" y="225" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="20" font-weight="bold">S</text>
    <text x="920" y="280" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">展示权</text>
    <text x="920" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群内表演、打鸡血</text>
    <text x="920" y="330" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">CC上级</text>
    <text x="920" y="370" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">观众不是平级而是上级</text>
    
    <path fill="#FFFFFF" stroke="#E8DFD0" stroke-width="0.5" d="M68,320 H852 A8,8 0 0 1 860,328 V462 A8,8 0 0 1 852,470 H68 A8,8 0 0 1 60,462 V328 A8,8 0 0 1 68,320 Z" />
    <circle cx="120" cy="395" r="30" fill="#9CA3AF" fill-opacity="0.1" />
    <text x="120" y="400" text-anchor="middle" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="20" font-weight="bold">S</text>
    <text x="170" y="380" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">安全感</text>
    <text x="170" y="410" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">怕被替代，所以要让别人依赖自己</text>
    <text x="170" y="440" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">信息管控就是掌控不可替代性。他需要成为那个"什么都知道"的人，这样就没有人能绕过他。</text>
    
    <text x="60" y="530" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">行为逻辑链</text>
    <line x1="60" y1="545" x2="1220" y2="545" stroke="#E8DFD0" stroke-width="0.5" />
    <text x="60" y="580" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">先要控制权（立规矩）→ 再要展示权（表演给上级看）→ 最终追求安全感（让别人离不开他）</text>
    <text x="60" y="620" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">理解了这个链条，就理解了他所有行为的动机</text>
    
    <text x="60" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 一句话定位章节</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">02 / 12</text>
</svg>