<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37" />
            <stop offset="100%" stop-color="#F2D06B" />
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0" />
    
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">LEARNABLE SKILLS</text>
    <line x1="60" y1="65" x2="210" y2="65" stroke="#C5960C" stroke-width="1" />
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">可学习内容</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四种核心技巧 + 核心差异对比</text>
    
    
    <path fill="#FFFFFF" stroke="#C5960C" stroke-width="1" d="M68,480 H332 A8,8 0 0 1 340,488 V632 A8,8 0 0 1 332,640 H68 A8,8 0 0 1 60,632 V488 A8,8 0 0 1 68,480 Z" />
    <text x="80" y="520" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">立规矩</text>
    <text x="80" y="548" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">先定规则后办事</text>
    <text x="80" y="570" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">后续是"执行既定规则"</text>
    <text x="80" y="610" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">接手新业务、管理新团队</text>
    
    <polygon points="350,500 370,470 370,530" fill="#C5960C" fill-opacity="0.2" />
    
    <path fill="#FFFFFF" stroke="#F2D06B" stroke-width="1" d="M388,360 H652 A8,8 0 0 1 660,368 V512 A8,8 0 0 1 652,520 H388 A8,8 0 0 1 380,512 V368 A8,8 0 0 1 388,360 Z" />
    <text x="400" y="400" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">三要素法</text>
    <text x="400" y="428" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">问题→原因+目标+举措</text>
    <text x="400" y="450" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让别人承诺，完不成有把柄</text>
    <text x="400" y="490" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">供应商管理、推动执行</text>
    
    <polygon points="670,380 690,350 690,410" fill="#C5960C" fill-opacity="0.2" />
    
    <path fill="#FFFFFF" stroke="#C5960C" stroke-width="1" d="M708,240 H972 A8,8 0 0 1 980,248 V392 A8,8 0 0 1 972,400 H708 A8,8 0 0 1 700,392 V248 A8,8 0 0 1 708,240 Z" />
    <text x="720" y="280" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">数据说话</text>
    <text x="720" y="308" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">精确数据展示+公开施压</text>
    <text x="720" y="330" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">数据是最好的武器</text>
    <text x="720" y="370" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">汇报、驱动、施压</text>
    
    <polygon points="990,260 1010,230 1010,290" fill="#C5960C" fill-opacity="0.2" />
    
    <path fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5" d="M1028,120 H1232 A8,8 0 0 1 1240,128 V272 A8,8 0 0 1 1232,280 H1028 A8,8 0 0 1 1020,272 V128 A8,8 0 0 1 1028,120 Z" />
    <text x="1030" y="160" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">机制先行 ★</text>
    <text x="1030" y="188" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">先建机制再谈业务</text>
    <text x="1030" y="210" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">干不好有把柄</text>
    <text x="1030" y="250" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">建立长期管理体系</text>
    
    <path fill="#FFFFFF" stroke="#B91C1C" stroke-width="0.5" d="M68,160 H592 A8,8 0 0 1 600,168 V272 A8,8 0 0 1 592,280 H68 A8,8 0 0 1 60,272 V168 A8,8 0 0 1 68,160 Z" />
    <path fill="#B91C1C" d="M62,160 H62 A2,2 0 0 1 64,162 V278 A2,2 0 0 1 62,280 H62 A2,2 0 0 1 60,278 V162 A2,2 0 0 1 62,160 Z" />
    <text x="80" y="195" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">刘乾坤 · 施压型</text>
    <text x="80" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 施压 → 让供应商自己想办法</text>
    <text x="80" y="255" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压型管理</text>
    <path fill="#FFFFFF" stroke="#22C55E" stroke-width="0.5" d="M628,160 H1152 A8,8 0 0 1 1160,168 V272 A8,8 0 0 1 1152,280 H628 A8,8 0 0 1 620,272 V168 A8,8 0 0 1 628,160 Z" />
    <path fill="#22C55E" d="M622,160 H622 A2,2 0 0 1 624,162 V278 A2,2 0 0 1 622,280 H622 A2,2 0 0 1 620,278 V162 A2,2 0 0 1 622,160 Z" />
    <text x="640" y="195" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">年老师 · 伙伴型</text>
    <text x="640" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 提要求 → 给支持 → 长期合作</text>
    <text x="640" y="255" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">伙伴型管理</text>
    
    <line x1="60" y1="665" x2="1220" y2="665" stroke="#E8DFD0" stroke-width="0.5" />
    <text x="60" y="695" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">进化方向：</text>
    <text x="145" y="695" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">学他的术（立规矩、三要素法、数据说话），用年老师的心（给支持、温和但坚决）</text>
    <text x="1220" y="695" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">10 / 12</text>
</svg>