<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">POWER SOURCES</text>
    <line x1="60" y1="65" x2="230" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">权力来源</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">5 种权力来源，从底层规则到表层施压</text>
    <!-- 水平瀑布流 - 从右到左 -->
    <!-- 施压权 (最底层) -->
    <rect x="1000" y="200" width="220" height="400" rx="8" fill="#FFFFFF" stroke="#B91C1C" stroke-width="2"/>
    <text x="1110" y="250" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">施压权</text>
    <text x="1110" y="285" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">最底层的权力</text>
    <line x1="1030" y1="305" x2="1190" y2="305" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="1030" y="340" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">公开锁定</text>
    <text x="1030" y="365" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">高压管理</text>
    <text x="1030" y="390" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">加压链</text>
    <text x="1030" y="415" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">追责转嫁</text>
    <text x="1030" y="460" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">制造回复压力</text>
    <text x="1030" y="550" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">反问回去，不接任务</text>
    <!-- 注意权 -->
    <rect x="760" y="240" width="220" height="360" rx="8" fill="#FFFFFF" stroke="#C41E3A" stroke-width="1.5"/>
    <text x="870" y="290" text-anchor="middle" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">注意权</text>
    <text x="870" y="325" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">刷存在感</text>
    <line x1="790" y1="345" x2="950" y2="345" stroke="#C41E3A" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="790" y="380" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群内表演</text>
    <text x="790" y="405" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">打鸡血</text>
    <text x="790" y="430" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">任务下放+CC</text>
    <text x="790" y="475" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">在上级面前建立形象</text>
    <text x="790" y="560" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不抢戏，专注边界</text>
    <!-- 关系权 -->
    <rect x="520" y="280" width="220" height="320" rx="8" fill="#FFFFFF" stroke="#C5960C" stroke-width="1" stroke-opacity="0.6"/>
    <text x="630" y="330" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">关系权</text>
    <text x="630" y="365" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">人情债</text>
    <line x1="550" y1="385" x2="710" y2="385" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="550" y="420" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">拉拢圈人</text>
    <text x="550" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">人情债管理</text>
    <text x="550" y="490" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">用关系绑定利益</text>
    <text x="550" y="560" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">接受但不欠人情</text>
    <!-- 信息权 -->
    <rect x="280" y="320" width="220" height="280" rx="8" fill="#FFFFFF" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
    <text x="390" y="370" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">信息权</text>
    <text x="390" y="405" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">信息管控</text>
    <line x1="310" y1="425" x2="470" y2="425" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="310" y="460" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">两头堵</text>
    <text x="310" y="485" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">阻断信息</text>
    <text x="310" y="530" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">对手只能依赖自己</text>
    <text x="310" y="560" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">建立独立渠道</text>
    <!-- 规则权 (最顶层) -->
    <rect x="60" y="360" width="200" height="240" rx="8" fill="#FFFFFF" stroke="#C5960C" stroke-width="1.5"/>
    <text x="160" y="410" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">规则权</text>
    <text x="160" y="445" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">顶层权力</text>
    <line x1="85" y1="465" x2="235" y2="465" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="85" y="500" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">立规矩</text>
    <text x="85" y="525" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">机制先行</text>
    <text x="85" y="570" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">确认合理性</text>
    <!-- 连接箭头 -->
    <polygon points="995,400 980,390 980,410" fill="#C5960C" fill-opacity="0.4"/>
    <polygon points="755,420 740,410 740,430" fill="#C5960C" fill-opacity="0.3"/>
    <polygon points="515,440 500,430 500,450" fill="#C5960C" fill-opacity="0.25"/>
    <polygon points="275,460 260,450 260,470" fill="#C5960C" fill-opacity="0.2"/>
    <!-- 底部 -->
    <line x1="60" y1="650" x2="1220" y2="650" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="60" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 权力框架章节</text>
    <text x="640" y="690" text-anchor="middle" fill="#C5960C" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">04 / 12</text>
</svg>
