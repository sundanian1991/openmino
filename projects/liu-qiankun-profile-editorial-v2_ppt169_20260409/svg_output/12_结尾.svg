<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#F2D06B"/>
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#C5960C" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#FDF8F0" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <!-- 背景 + 中心光晕 -->
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#centerGlow)"/>
    <!-- 顶部装饰线 -->
    <line x1="60" y1="60" x2="1220" y2="60" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- 左上角标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">CONCLUSION</text>
    <!-- 大字：总结三句话 -->
    <text x="100" y="140" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">总结三句话</text>
    <!-- 第一句话 -->
    <rect x="100" y="170" width="1080" height="120" rx="4" fill="#FFFFFF" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="140" y="220" fill="#C5960C" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill-opacity="0.2">01</text>
    <text x="240" y="220" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">他不是在管理，是在表演管理</text>
    <text x="240" y="260" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">最在意的是"老板知不知道我在解决"</text>
    <!-- 第二句话 -->
    <rect x="100" y="310" width="1080" height="120" rx="4" fill="#FFFFFF" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="140" y="360" fill="#D4AF37" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill-opacity="0.2">02</text>
    <text x="240" y="360" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">边界清晰是最好的防御</text>
    <text x="240" y="400" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">周末不接@，工作日按流程，信息独立</text>
    <!-- 第三句话 -->
    <rect x="100" y="450" width="1080" height="120" rx="4" fill="#FFFFFF" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.1"/>
    <text x="140" y="500" fill="#C5960C" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill-opacity="0.2">03</text>
    <text x="240" y="500" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">取其精华，做温和但坚定的管理者</text>
    <text x="240" y="540" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">学立规矩、三要素法、数据说话；加上给支持、长期合作</text>
    <!-- 底部 -->
    <line x1="60" y1="610" x2="1220" y2="610" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="60" y="650" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">v10.2 · 年老师建档 · 2026-03-19 · 刘乾坤人物深度分析报告</text>
    <text x="640" y="650" text-anchor="middle" fill="#C5960C" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="650" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">12 / 12</text>
</svg>
