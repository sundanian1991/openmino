<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C5960C"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">ONBOARDING PLAYBOOK</text>
    <line x1="60" y1="65" x2="260" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">接手新业务</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四步建立管理基础</text>
    <!-- S曲线时间线 -->
    <path d="M 160 380 Q 360 240 560 340 Q 760 440 960 290 Q 1060 230 1140 290" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-dasharray="6,4"/>
    <!-- 节点 1: 立规矩 (上方卡片) -->
    <circle cx="160" cy="380" r="22" fill="#C5960C" fill-opacity="0.2" stroke="#C5960C" stroke-width="2"/>
    <text x="160" y="385" text-anchor="middle" fill="#C5960C" font-family="Arial, sans-serif" font-size="16" font-weight="bold">1</text>
    <rect x="60" y="160" width="240" height="180" rx="8" fill="#FFFFFF" stroke="#C5960C" stroke-width="0.5"/>
    <text x="80" y="195" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">立规矩</text>
    <text x="80" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">宣布7条规则：</text>
    <text x="80" y="247" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">30分钟回复 · 10点报出勤</text>
    <text x="80" y="269" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">昵称格式规范 · 数据日报格式</text>
    <text x="80" y="291" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群内沟通规范</text>
    <text x="80" y="320" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">后续变成"按规则办事"</text>
    <line x1="180" y1="340" x2="165" y2="360" stroke="#C5960C" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- 节点 2: 数据切入 (下方卡片) -->
    <circle cx="560" cy="340" r="22" fill="#FFFFFF" stroke="#F2D06B" stroke-width="1.5"/>
    <text x="560" y="345" text-anchor="middle" fill="#F2D06B" font-family="Arial, sans-serif" font-size="16" font-weight="bold">2</text>
    <rect x="440" y="420" width="240" height="190" rx="8" fill="#FFFFFF" stroke="#F2D06B" stroke-width="0.5"/>
    <text x="460" y="455" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">数据切入</text>
    <text x="460" y="485" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">5分钟连发两条数据</text>
    <text x="460" y="507" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">精确到小数点</text>
    <text x="460" y="529" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">摆数据，不出结论</text>
    <text x="460" y="551" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">责任完美分散</text>
    <text x="460" y="585" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">让别人背锅，自己居功</text>
    <line x1="560" y1="362" x2="560" y2="420" stroke="#F2D06B" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- 节点 3: 公开锁定 (上方卡片) -->
    <circle cx="960" cy="290" r="22" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1.5"/>
    <text x="960" y="295" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="16" font-weight="bold">3</text>
    <rect x="840" y="140" width="240" height="170" rx="8" fill="#FFFFFF" stroke="#B91C1C" stroke-width="0.5"/>
    <text x="860" y="175" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">公开锁定</text>
    <text x="860" y="205" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群里@具体人</text>
    <text x="860" y="227" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">所有人看着不得不接</text>
    <text x="860" y="249" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不私聊，连环追加施压</text>
    <text x="860" y="285" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">制造回复压力</text>
    <line x1="960" y1="270" x2="960" y2="310" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- 节点 4: 建立预期 (下方卡片) -->
    <circle cx="1140" cy="290" r="22" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
    <text x="1140" y="295" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="16" font-weight="bold">4</text>
    <rect x="940" y="380" width="240" height="170" rx="8" fill="#FFFFFF" stroke="#22C55E" stroke-width="0.5"/>
    <text x="960" y="415" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">建立预期</text>
    <text x="960" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">按规则办事形象确立</text>
    <text x="960" y="467" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">引用初始规则，持续执行</text>
    <text x="960" y="510" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">从"个人意志"变为</text>
    <text x="960" y="530" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">"按章办事"</text>
    <line x1="1140" y1="312" x2="1140" y2="380" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- 底部洞察 -->
    <rect x="60" y="640" width="580" height="40" rx="6" fill="#C5960C" fill-opacity="0.08" stroke="#C5960C" stroke-width="0.5"/>
    <text x="80" y="665" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">高明：后续所有管理都是"执行既定规则"，不是"个人施压"</text>
    <text x="60" y="700" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="1220" y="700" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">08 / 12</text>
</svg>
