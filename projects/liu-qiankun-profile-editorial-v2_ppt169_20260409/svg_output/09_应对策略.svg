<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C5960C"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">COUNTER STRATEGIES</text>
    <line x1="60" y1="65" x2="210" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">应对策略</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">话术对照 — 他说什么 vs 你怎么回</text>
    <!-- 左侧: 盾牌造型 四大核心原则 -->
    <path d="M 60 170 L 440 170 L 440 360 L 250 430 L 60 360 Z" fill="#FFFFFF" stroke="#C5960C" stroke-width="1.5"/>
    <text x="250" y="210" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">四大核心原则</text>
    <line x1="100" y1="225" x2="400" y2="225" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="100" y="260" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">1 不主动背锅 — 问题直接传递</text>
    <text x="100" y="295" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">2 边界清晰 — 周末不接@</text>
    <text x="100" y="330" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">3 信息独立 — 建独立渠道</text>
    <text x="100" y="365" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">4 学习技巧 — 立规矩+三要素法</text>
    <!-- 右侧: 话术对照表 -->
    <text x="500" y="195" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">话术对照表</text>
    <line x1="500" y1="205" x2="1220" y2="205" stroke="#E8DFD0" stroke-width="0.5"/>
    <!-- Row 1 -->
    <rect x="500" y="220" width="700" height="80" rx="6" fill="#FFFFFF"/>
    <text x="515" y="245" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="515" y="265" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"帮我看下，我该如何解答"</text>
    <line x1="860" y1="230" x2="860" y2="290" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="875" y="245" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="875" y="265" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"你的想法是什么？我先听你的"</text>
    <text x="875" y="288" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">不接任务，反问回去</text>
    <!-- Row 2 -->
    <rect x="500" y="310" width="700" height="80" rx="6" fill="#FFFFFF"/>
    <text x="515" y="335" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="515" y="355" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">周末@处理供应商问题</text>
    <line x1="860" y1="320" x2="860" y2="380" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="875" y="335" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="875" y="355" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"收到，周一处理"</text>
    <text x="875" y="378" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">边界清晰，不解释</text>
    <!-- Row 3 -->
    <rect x="500" y="400" width="700" height="80" rx="6" fill="#FFFFFF"/>
    <text x="515" y="425" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="515" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"别找供应商，他们不如我们清楚"</text>
    <line x1="860" y1="410" x2="860" y2="470" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="875" y="425" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="875" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"理解，但我需要一线真实反馈"</text>
    <text x="875" y="468" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">建立独立渠道</text>
    <!-- Row 4 -->
    <rect x="500" y="490" width="700" height="80" rx="6" fill="#FFFFFF"/>
    <text x="515" y="515" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="515" y="535" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"辛苦兄弟多费心"</text>
    <line x1="860" y1="500" x2="860" y2="560" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="875" y="515" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="875" y="535" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"8个供应商，担心盯不细"</text>
    <text x="875" y="558" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">示弱加边界，刘乾坤会退让</text>
    <!-- Row 5 -->
    <rect x="500" y="580" width="700" height="80" rx="6" fill="#FFFFFF"/>
    <text x="515" y="605" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="515" y="625" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">危机渲染 + 责任锁定</text>
    <line x1="860" y1="590" x2="860" y2="650" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="875" y="605" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="875" y="625" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">事实压危机、锁定卡点、踢球给方案</text>
    <text x="875" y="648" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">用专业语言说话</text>
    <!-- 底部 -->
    <text x="60" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 应对策略章节</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">09 / 12</text>
</svg>
