<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C5960C"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">SUPPLIER MANAGEMENT</text>
    <line x1="60" y1="65" x2="280" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">供应商管理</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四种驱动方式，让供应商自己动起来</text>
    <!-- 2x2 矩阵 -->
    <!-- 左上: 质问式 -->
    <rect x="60" y="170" width="560" height="230" rx="10" fill="#FFFFFF"/>
    <rect x="60" y="170" width="6" height="230" rx="3" fill="#B91C1C"/>
    <text x="100" y="210" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">质问式</text>
    <text x="100" y="240" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"汰换机制是什么？"</text>
    <line x1="100" y1="255" x2="580" y2="255" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="100" y="285" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">直接提问，制造"必须回答"的压力</text>
    <text x="100" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让供应商解释问题，不给模糊空间</text>
    <text x="100" y="355" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可学：精准提问，不给模糊空间</text>
    <text x="100" y="385" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：高</text>
    <!-- 右上: 驱动式 -->
    <rect x="660" y="170" width="560" height="230" rx="10" fill="#FFFFFF"/>
    <rect x="660" y="170" width="6" height="230" rx="3" fill="#D97706"/>
    <text x="700" y="210" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">驱动式</text>
    <text x="700" y="240" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"3.4亿才有奖金"</text>
    <line x1="700" y1="255" x2="1180" y2="255" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="700" y="285" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用利益让供应商自己急</text>
    <text x="700" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"为自己干"不是"为我干"</text>
    <text x="700" y="355" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">利益绑定比命令更有效</text>
    <text x="700" y="385" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：中</text>
    <!-- 左下: 要求式 -->
    <rect x="60" y="420" width="560" height="230" rx="10" fill="#FFFFFF"/>
    <rect x="60" y="420" width="6" height="230" rx="3" fill="#D4AF37"/>
    <text x="100" y="460" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">要求式</text>
    <text x="100" y="490" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"本月人力计划、周度计划"</text>
    <line x1="100" y1="505" x2="580" y2="505" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="100" y="535" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">要求具体计划，不模糊</text>
    <text x="100" y="560" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">明确时间节点和交付物</text>
    <text x="100" y="605" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">要求要具体可考核</text>
    <text x="100" y="635" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：低</text>
    <!-- 右下: 改进式 -->
    <rect x="660" y="420" width="560" height="230" rx="10" fill="#FFFFFF"/>
    <rect x="660" y="420" width="6" height="230" rx="3" fill="#22C55E"/>
    <text x="700" y="460" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">改进式 ★ 最值得学</text>
    <text x="700" y="490" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">三要素法：原因+提升目标+举措</text>
    <line x1="700" y1="505" x2="1180" y2="505" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="700" y="535" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让供应商自己承诺</text>
    <text x="700" y="560" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">完不成有把柄</text>
    <text x="700" y="605" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">最成熟的管理手法</text>
    <text x="700" y="635" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：低，效果：高</text>
    <!-- 底部 -->
    <text x="60" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 供应商管理章节</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">07 / 12</text>
</svg>
