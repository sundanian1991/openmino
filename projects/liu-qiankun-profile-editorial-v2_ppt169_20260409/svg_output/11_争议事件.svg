<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C5960C"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">CONTROVERSIAL CASES</text>
    <line x1="60" y1="65" x2="255" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">争议事件</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">三个事件暴露真实性格</text>
    <!-- 证据板式布局 - 卡片错落分布 -->
    <!-- Event 1: 双重标准 -->
    <g transform="translate(60, 180)">
        <rect width="540" height="200" rx="6" fill="#FFFFFF" stroke="#E8DFD0" stroke-width="0.5"/>
        <rect x="0" y="30" width="4" height="140" rx="2" fill="#B91C1C"/>
        <rect x="20" y="16" width="80" height="24" rx="4" fill="#B91C1C" fill-opacity="0.1"/>
        <text x="30" y="33" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">03-25</text>
        <text x="20" y="70" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">双重标准</text>
        <text x="20" y="105" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">自己违规推动供应商拿钱被内审查过</text>
        <text x="20" y="130" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">反过来质疑李吉斌的激励方案</text>
        <text x="20" y="170" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">年老师："挺可怕的，真的不可交"</text>
        <text x="470" y="33" fill="#B91C1C" font-family="Arial, sans-serif" font-size="11" font-weight="bold">HIGH RISK</text>
    </g>
    <!-- Event 2: 公开攻击前任 -->
    <g transform="translate(640, 180)">
        <rect width="580" height="200" rx="6" fill="#FFFFFF" stroke="#E8DFD0" stroke-width="0.5"/>
        <rect x="0" y="30" width="4" height="140" rx="2" fill="#D97706"/>
        <rect x="20" y="16" width="100" height="24" rx="4" fill="#D97706" fill-opacity="0.1"/>
        <text x="30" y="33" fill="#D97706" font-family="Arial, sans-serif" font-size="12" font-weight="bold">03-25 深夜</text>
        <text x="20" y="70" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">公开攻击前任</text>
        <text x="20" y="105" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">@李吉斌+CC上级，让前任难堪</text>
        <text x="20" y="130" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刚接手就甩锅，李吉斌反击后软化退让</text>
        <text x="20" y="170" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">教训：面对强硬反击，他会退让</text>
        <text x="510" y="33" fill="#D97706" font-family="Arial, sans-serif" font-size="11" font-weight="bold">MEDIUM</text>
    </g>
    <!-- Event 3: 开门红带节奏 -->
    <g transform="translate(60, 420)">
        <rect width="540" height="220" rx="6" fill="#FFFFFF" stroke="#E8DFD0" stroke-width="0.5"/>
        <rect x="0" y="30" width="4" height="160" rx="2" fill="#B91C1C"/>
        <rect x="20" y="16" width="80" height="24" rx="4" fill="#B91C1C" fill-opacity="0.1"/>
        <text x="30" y="33" fill="#B91C1C" font-family="Arial, sans-serif" font-size="12" font-weight="bold">03-29</text>
        <text x="20" y="70" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">开门红带节奏</text>
        <text x="20" y="105" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内密集同步激励问题</text>
        <text x="20" y="130" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">道德绑架"影响1400个制鞋工人"</text>
        <text x="20" y="155" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">选择性攻击：只攻击服务组，不攻击策略组</text>
        <text x="20" y="180" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">夸大其词：实际"不会出现批量离职"</text>
        <text x="20" y="210" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">教训：核实数据，不被情绪带节奏</text>
        <text x="470" y="33" fill="#B91C1C" font-family="Arial, sans-serif" font-size="11" font-weight="bold">HIGH RISK</text>
    </g>
    <!-- 右侧核心洞察 -->
    <g transform="translate(640, 420)">
        <rect width="580" height="220" rx="8" fill="#FFFFFF" stroke="#C5960C" stroke-width="1.5"/>
        <text x="30" y="45" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">核心洞察</text>
        <line x1="30" y1="60" x2="550" y2="60" stroke="#E8DFD0" stroke-width="0.5"/>
        <text x="30" y="95" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">他对别人做的事，自己可能也在做</text>
        <text x="30" y="130" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">双重标准是最大破绽</text>
        <text x="30" y="165" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">面对事实反击和强硬态度，他会退让</text>
        <text x="30" y="200" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">用事实反击，态度强硬，他就会退</text>
    </g>
    <!-- 底部 -->
    <text x="60" y="680" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 争议事件章节</text>
    <text x="1220" y="680" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">11 / 12</text>
</svg>
