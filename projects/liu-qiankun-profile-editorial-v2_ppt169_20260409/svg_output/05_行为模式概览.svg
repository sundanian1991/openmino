<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C5960C"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="#FDF8F0"/>
    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#C5960C" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">BEHAVIOR PATTERNS</text>
    <line x1="60" y1="65" x2="250" y2="65" stroke="#C5960C" stroke-width="1"/>
    <text x="60" y="105" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">行为模式概览</text>
    <text x="60" y="135" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">18种模式，按权力来源 + 风险等级分布</text>
    <!-- 雷达图 - 居中 -->
    <!-- 背景网格 -->
    <g transform="translate(640, 390)" stroke="#E8DFD0" stroke-width="0.5" fill="none">
        <polygon points="220,0 110,190.5 -110,190.5 -220,0 -110,-190.5 110,-190.5"/>
        <polygon points="165,0 82.5,142.9 -82.5,142.9 -165,0 -82.5,-142.9 82.5,-142.9"/>
        <polygon points="110,0 55,95.3 -55,95.3 -110,0 -55,-95.3 55,-95.3"/>
        <polygon points="55,0 27.5,47.6 -27.5,47.6 -55,0 -27.5,-47.6 27.5,-47.6"/>
    </g>
    <!-- 轴线 -->
    <g transform="translate(640, 390)" stroke="#E8DFD0" stroke-width="0.5">
        <line x1="0" y1="0" x2="220" y2="0"/>
        <line x1="0" y1="0" x2="110" y2="190.5"/>
        <line x1="0" y1="0" x2="-110" y2="190.5"/>
        <line x1="0" y1="0" x2="-220" y2="0"/>
        <line x1="0" y1="0" x2="-110" y2="-190.5"/>
        <line x1="0" y1="0" x2="110" y2="-190.5"/>
    </g>
    <!-- 数据区域 -->
    <g transform="translate(640, 390)">
        <polygon points="132,0 77,133.4 -66,114.3 -154,0 -44,-76.2 66,-114.3" fill="#C5960C" fill-opacity="0.15" stroke="#C5960C" stroke-width="1.5"/>
    </g>
    <!-- 轴标签 -->
    <text x="640" y="170" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">施压权 · 5</text>
    <text x="810" y="600" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">注意权 · 3</text>
    <text x="470" y="600" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">关系权 · 2</text>
    <text x="400" y="400" text-anchor="end" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">信息权 · 2</text>
    <text x="510" y="200" text-anchor="middle" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">规则权 · 1</text>
    <text x="770" y="200" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">组合拳 · 5</text>
    <!-- 右侧图例 -->
    <rect x="1000" y="220" width="220" height="280" rx="6" fill="#FFFFFF" stroke="#C5960C" stroke-width="0.5"/>
    <text x="1020" y="260" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">风险等级</text>
    <line x1="1020" y1="275" x2="1200" y2="275" stroke="#E8DFD0" stroke-width="0.5"/>
    <rect x="1020" y="295" width="12" height="12" rx="2" fill="#B91C1C"/>
    <text x="1045" y="306" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">高危险 · 6种</text>
    <text x="1170" y="306" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">33%</text>
    <rect x="1020" y="325" width="12" height="12" rx="2" fill="#D97706"/>
    <text x="1045" y="336" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压手法 · 4种</text>
    <text x="1170" y="336" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">22%</text>
    <rect x="1020" y="355" width="12" height="12" rx="2" fill="#C5960C"/>
    <text x="1045" y="366" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">中性手法 · 5种</text>
    <text x="1170" y="366" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">28%</text>
    <rect x="1020" y="385" width="12" height="12" rx="2" fill="#22C55E"/>
    <text x="1045" y="396" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">值得学习 · 3种</text>
    <text x="1170" y="396" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">17%</text>
    <line x1="1020" y1="420" x2="1200" y2="420" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="1020" y="445" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压密集区：注意权+施压权</text>
    <text x="1020" y="465" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">最值得学：立规矩+三要素法</text>
    <!-- 底部 -->
    <line x1="60" y1="650" x2="1220" y2="650" stroke="#E8DFD0" stroke-width="0.5"/>
    <text x="60" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 行为模式章节</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">05 / 12</text>
</svg>
