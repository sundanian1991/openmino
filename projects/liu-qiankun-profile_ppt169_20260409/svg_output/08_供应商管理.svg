<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">08</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        供应商管理手法 — 刘乾坤的四招
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">施压强度递增</text>
    <text x="220" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">从质问式到改进式，施压强度逐步递进，核心是让供应商"自己承诺"</text>

    <!-- 施压强度箭头 -->
    <text x="1100" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#C41E3A" font-weight="bold">施压强度  →→→→</text>

    <!-- 四列卡片 -->
    <!-- 卡片1: 质问式 -->
    <rect x="60" y="170" width="285" height="410" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="170" width="285" height="55" fill="#6B7280"/>

    <g transform="translate(80, 180)">
        <path d="M20,2 L2,38 L38,38 Z" fill="#FFFFFF" fill-opacity="0.9"/>
        <text x="20" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6B7280">!</text>
    </g>
    <text x="130" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">质问式</text>

    <rect x="80" y="245" width="245" height="70" fill="#F5F5F5"/>
    <text x="95" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">原话示例</text>
    <text x="95" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">"汰换机制是什么？"</text>

    <text x="80" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">核心手法</text>
    <text x="80" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">让供应商解释问题，</text>
    <text x="80" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">暴露管理短板</text>

    <text x="80" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">施压强度</text>
    <rect x="80" y="440" width="40" height="10" fill="#6B7280"/>
    <rect x="125" y="440" width="40" height="10" fill="#E5E5E5"/>
    <rect x="170" y="440" width="40" height="10" fill="#E5E5E5"/>
    <rect x="215" y="440" width="40" height="10" fill="#E5E5E5"/>

    <text x="80" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">目的</text>
    <text x="80" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">测试供应商反应能力</text>
    <text x="80" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">和准备充分度</text>

    <!-- 卡片2: 驱动式 -->
    <rect x="365" y="170" width="285" height="410" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="365" y="170" width="285" height="55" fill="#E2725B"/>

    <g transform="translate(385, 180)">
        <polygon points="20,2 38,12 38,32 20,42 2,32 2,12" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="435" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">驱动式</text>

    <rect x="385" y="245" width="245" height="70" fill="#FFF8F0"/>
    <text x="400" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">原话示例</text>
    <text x="400" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">"3.4亿才有奖金"</text>

    <text x="385" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">核心手法</text>
    <text x="385" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">用利益驱动供应商</text>
    <text x="385" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">自己急，不用他催</text>

    <text x="385" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">施压强度</text>
    <rect x="385" y="440" width="40" height="10" fill="#E2725B"/>
    <rect x="430" y="440" width="40" height="10" fill="#E2725B"/>
    <rect x="475" y="440" width="40" height="10" fill="#E5E5E5"/>
    <rect x="520" y="440" width="40" height="10" fill="#E5E5E5"/>

    <text x="385" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">目的</text>
    <text x="385" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">让供应商为目标主动</text>
    <text x="385" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">投入资源</text>

    <!-- 卡片3: 要求式 -->
    <rect x="670" y="170" width="285" height="410" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="670" y="170" width="285" height="55" fill="#C41E3A"/>

    <g transform="translate(690, 180)">
        <rect x="5" y="5" width="30" height="30" fill="none" stroke="#FFFFFF" stroke-width="3" fill-opacity="0.9"/>
        <line x1="15" y1="15" x2="25" y2="25" stroke="#FFFFFF" stroke-width="3"/>
    </g>
    <text x="740" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">要求式</text>

    <rect x="690" y="245" width="245" height="70" fill="#FFF5F5"/>
    <text x="705" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">原话示例</text>
    <text x="705" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">"本月人力计划、周度计划"</text>

    <text x="690" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">核心手法</text>
    <text x="690" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">要求具体计划和产出</text>
    <text x="690" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">有明确交付物</text>

    <text x="690" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">施压强度</text>
    <rect x="690" y="440" width="40" height="10" fill="#C41E3A"/>
    <rect x="735" y="440" width="40" height="10" fill="#C41E3A"/>
    <rect x="780" y="440" width="40" height="10" fill="#C41E3A"/>
    <rect x="825" y="440" width="40" height="10" fill="#E5E5E5"/>

    <text x="690" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">目的</text>
    <text x="690" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">建立节奏感，按节点</text>
    <text x="690" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">检查执行情况</text>

    <!-- 卡片4: 改进式 (三要素法) -->
    <rect x="975" y="170" width="245" height="410" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1.5"/>
    <rect x="975" y="170" width="245" height="55" fill="#B91C1C"/>

    <g transform="translate(995, 180)">
        <polygon points="20,2 38,38 2,38" fill="#FFFFFF" fill-opacity="0.9"/>
        <text x="20" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C">!</text>
    </g>
    <text x="1045" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">改进式</text>

    <rect x="995" y="245" width="205" height="70" fill="#FFF5F5"/>
    <text x="1010" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#B91C1C">三要素法</text>
    <text x="1010" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">原因、目标、举措</text>

    <text x="995" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">核心手法</text>
    <text x="995" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">让供应商自己承诺</text>
    <text x="995" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">承诺即约束</text>

    <text x="995" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">施压强度</text>
    <rect x="995" y="440" width="40" height="10" fill="#B91C1C"/>
    <rect x="1040" y="440" width="40" height="10" fill="#B91C1C"/>
    <rect x="1085" y="440" width="40" height="10" fill="#B91C1C"/>
    <rect x="1130" y="440" width="40" height="10" fill="#B91C1C"/>

    <text x="995" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#B91C1C">可学</text>
    <text x="995" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">让供应商自己说，比</text>
    <text x="995" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">你告诉他更有效</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 供应商管理手法</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">08</text>
</svg>
