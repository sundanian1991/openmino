<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">12</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        核心结论
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">三条行动要点</text>
    <text x="240" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">看懂他 · 应对他 · 学习他</text>

    <!-- 三条行动要点卡片 -->
    <!-- 卡片1: 看懂他 -->
    <rect x="60" y="170" width="1160" height="110" fill="#FFFFFF" stroke="#C41E3A" stroke-width="1.5"/>
    <rect x="60" y="170" width="8" height="110" fill="#C41E3A"/>

    <text x="90" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#C41E3A">看懂他</text>

    <text x="90" y="250" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#2D2D2D">控制权 + 展示权 + 安全感 — 一切行为从这三个诉求出发</text>
    <text x="90" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#6B7280">不理解诉求，就会被他的动作带着走</text>

    <!-- 卡片2: 应对他 -->
    <rect x="60" y="300" width="1160" height="110" fill="#FFFFFF" stroke="#E2725B" stroke-width="1.5"/>
    <rect x="60" y="300" width="8" height="110" fill="#E2725B"/>

    <text x="90" y="340" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#E2725B">应对他</text>

    <text x="90" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#2D2D2D">不背锅、守边界、信息独立、学习技巧</text>
    <text x="90" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#6B7280">不接他的问题，不回他的节奏，不依赖他的信息</text>

    <!-- 卡片3: 学习他 -->
    <rect x="60" y="430" width="1160" height="110" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
    <rect x="60" y="430" width="8" height="110" fill="#16A34A"/>

    <text x="90" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#16A34A">学习他</text>

    <text x="90" y="510" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#2D2D2D">规则先行、三要素法、数据说话、机制先行</text>
    <text x="90" y="535" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#6B7280">学其手法，改其风格 — 温和但坚决，长期而非短期</text>

    <!-- 底部破绽提示 -->
    <rect x="60" y="560" width="1160" height="55" fill="#FFF5F5" stroke="#B91C1C" stroke-width="1"/>
    <rect x="60" y="560" width="5" height="55" fill="#B91C1C"/>

    <text x="85" y="585" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C">破绽</text>
    <text x="135" y="585" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2D2D2D">表演型管理 → 真实能力可能不足  |  信息管控 → 长期合作困难  |  施压过度 → 容易引发抵触</text>
    <text x="135" y="605" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">理解破绽，才能不被他牵着走。</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 年老师内部参考</text>

    <rect x="1080" y="655" width="140" height="28" fill="#C41E3A" fill-opacity="0.08" rx="4"/>
    <text x="1150" y="675" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#C41E3A" letter-spacing="1">
        CONFIDENTIAL
    </text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">12</text>
</svg>
