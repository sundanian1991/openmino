<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">07</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        关系网络 — 他在和谁互动？
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心洞察</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">他对不同人的互动策略完全不同，但核心逻辑一致：用最小的成本换取最大的价值</text>

    <!-- 手绘风格关系网络图 -->
    <!-- 中心节点：刘乾坤 -->
    <circle cx="640" cy="340" r="55" fill="#C41E3A"/>
    <circle cx="640" cy="340" r="52" fill="none" stroke="#E2725B" stroke-width="1" stroke-opacity="0.4"/>
    <text x="640" y="335" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">刘乾坤</text>
    <text x="640" y="355" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.8">中心</text>

    <!-- 郭鑫 - 左上 -->
    <line x1="600" y1="300" x2="260" y2="230" stroke="#C41E3A" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="150" y="200" width="180" height="60" fill="#FFFFFF" stroke="#C41E3A" stroke-width="1.5"/>
    <rect x="150" y="200" width="4" height="60" fill="#C41E3A"/>
    <text x="170" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41E3A">郭鑫</text>
    <text x="170" y="248" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">"鑫鑫"·用你的嘴出我的力</text>

    <!-- 马贵贤 - 右上 -->
    <line x1="680" y1="300" x2="960" y2="230" stroke="#C41E3A" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="890" y="200" width="180" height="60" fill="#FFFFFF" stroke="#E2725B" stroke-width="1.5"/>
    <rect x="890" y="200" width="4" height="60" fill="#E2725B"/>
    <text x="910" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2725B">马贵贤</text>
    <text x="910" y="248" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">"你的工作我的成果"</text>

    <!-- 年老师 - 左 -->
    <line x1="585" y1="340" x2="260" y2="340" stroke="#16A34A" stroke-width="2.5" stroke-opacity="0.5"/>
    <rect x="80" y="310" width="180" height="60" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
    <rect x="80" y="310" width="4" height="60" fill="#16A34A"/>
    <text x="100" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#16A34A">年老师</text>
    <text x="100" y="358" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">配合关系·"兄弟"称呼</text>

    <!-- 张世跃 - 右 -->
    <line x1="695" y1="340" x2="1010" y2="340" stroke="#E2725B" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="1020" y="310" width="180" height="60" fill="#FFFFFF" stroke="#E2725B" stroke-width="1.5"/>
    <rect x="1020" y="310" width="4" height="60" fill="#E2725B"/>
    <text x="1040" y="335" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2725B">张世跃</text>
    <text x="1040" y="358" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">实习生·任务下放+功劳上报</text>

    <!-- 供应商 - 左下 -->
    <line x1="600" y1="380" x2="260" y2="460" stroke="#B91C1C" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="150" y="440" width="180" height="60" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1.5"/>
    <rect x="150" y="440" width="4" height="60" fill="#B91C1C"/>
    <text x="170" y="465" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#B91C1C">供应商</text>
    <text x="170" y="488" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">利益驱动+责任下放</text>

    <!-- 刘伟佳 - 右下 -->
    <line x1="680" y1="380" x2="960" y2="460" stroke="#6B7280" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="890" y="440" width="180" height="60" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/>
    <rect x="890" y="440" width="4" height="60" fill="#6B7280"/>
    <text x="910" y="465" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6B7280">刘伟佳</text>
    <text x="910" y="488" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">师承关系·高级版 vs 初级版</text>

    <!-- 底部说明 -->
    <text x="640" y="560" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#6B7280">
        连线颜色表示关系性质：
    </text>

    <line x1="250" y1="585" x2="280" y2="585" stroke="#16A34A" stroke-width="2.5"/>
    <text x="290" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">配合</text>

    <line x1="360" y1="585" x2="390" y2="585" stroke="#C41E3A" stroke-width="2"/>
    <text x="400" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">利用</text>

    <line x1="460" y1="585" x2="490" y2="585" stroke="#E2725B" stroke-width="2"/>
    <text x="500" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">工具化</text>

    <line x1="590" y1="585" x2="620" y2="585" stroke="#B91C1C" stroke-width="2"/>
    <text x="630" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">施压</text>

    <line x1="700" y1="585" x2="730" y2="585" stroke="#6B7280" stroke-width="2"/>
    <text x="740" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">师承</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 关系网络章节</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">07</text>
</svg>
