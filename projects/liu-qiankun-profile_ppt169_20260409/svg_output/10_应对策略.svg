<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">10</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        年老师应对策略 — 核心原则
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心原则</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">不背锅、守边界、信息独立、学技巧 — 四条原则缺一不可</text>

    <!-- 四象限矩阵 -->
    <!-- 象限1: 不主动背锅 -->
    <rect x="60" y="170" width="580" height="210" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="170" width="580" height="45" fill="#C41E3A"/>
    <text x="85" y="198" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">不主动背锅</text>

    <text x="80" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">刘乾坤的问题直接传递，不接"帮我看下"</text>
    <text x="80" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">他的问题不是我的问题，不替他扛责任</text>

    <text x="80" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">话术："你的想法是什么？"  — 反问回去，不接任务</text>

    <!-- 象限2: 边界清晰 -->
    <rect x="660" y="170" width="560" height="210" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="660" y="170" width="560" height="45" fill="#E2725B"/>
    <text x="685" y="198" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">边界清晰</text>

    <text x="680" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">周末不接@，工作日按流程</text>
    <text x="680" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">不被他的节奏带偏，守住自己的节奏</text>

    <text x="680" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">话术："收到，周一处理" — 不因周末@打乱节奏</text>

    <!-- 象限3: 信息独立 -->
    <rect x="60" y="400" width="580" height="170" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="400" width="580" height="45" fill="#B91C1C"/>
    <text x="85" y="428" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">信息独立</text>

    <text x="80" y="468" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">建立独立渠道，不依赖他拿数据</text>
    <text x="80" y="493" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">不听"别找供应商"，直接要一线真实反馈</text>

    <text x="80" y="540" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">话术："我需要一线真实反馈" — 绕过他的信息管控</text>

    <!-- 象限4: 学习技巧 -->
    <rect x="660" y="400" width="560" height="170" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="660" y="400" width="560" height="45" fill="#16A34A"/>
    <text x="685" y="428" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">学习技巧</text>

    <text x="680" y="468" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">立规矩、三要素法、数据说话</text>
    <text x="680" y="493" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">学他的手法，改良为自己的方式</text>

    <text x="680" y="540" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">目标：温和但坚决，长期伙伴而非高压</text>

    <!-- 话术表 -->
    <rect x="60" y="600" width="1160" height="15" fill="none"/>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 应对策略章节</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">10</text>
</svg>
