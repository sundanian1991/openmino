<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">05</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        核心行为模式 — 18 种战术动作
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">全景概览</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">18 种模式按权力来源分组，风险等级用颜色区分</text>

    <!-- 图例 -->
    <rect x="950" y="100" width="12" height="12" fill="#B91C1C"/>
    <text x="966" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">风险</text>
    <rect x="1010" y="100" width="12" height="12" fill="#E2725B"/>
    <text x="1026" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">施压</text>
    <rect x="1070" y="100" width="12" height="12" fill="#6B7280"/>
    <text x="1086" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">中性</text>
    <rect x="1130" y="100" width="12" height="12" fill="#16A34A"/>
    <text x="1146" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">可学</text>

    <!-- 四列布局 -->
    <!-- 列1: 规则权 -->
    <rect x="60" y="160" width="285" height="460" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="160" width="285" height="40" fill="#E2725B"/>
    <text x="202" y="187" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">规则权</text>

    <rect x="75" y="215" width="255" height="35" fill="#FFF8F0"/>
    <rect x="75" y="215" width="3" height="35" fill="#16A34A"/>
    <text x="90" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">7. 立规矩</text>

    <!-- 列2: 信息权 + 关系权 -->
    <rect x="365" y="160" width="285" height="460" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="365" y="160" width="285" height="40" fill="#C41E3A"/>
    <text x="507" y="187" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">信息权 · 关系权</text>

    <rect x="380" y="215" width="255" height="35" fill="#FFF5F5"/>
    <rect x="380" y="215" width="3" height="35" fill="#B91C1C"/>
    <text x="395" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">13. 两头堵</text>

    <rect x="380" y="265" width="255" height="35" fill="#FFF5F5"/>
    <rect x="380" y="265" width="3" height="35" fill="#E2725B"/>
    <text x="395" y="288" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">8. 拉拢圈人</text>

    <rect x="380" y="315" width="255" height="35" fill="#FFF5F5"/>
    <rect x="380" y="315" width="3" height="35" fill="#E2725B"/>
    <text x="395" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">12. 人情债管理</text>

    <!-- 列3: 注意权 + 施压权 -->
    <rect x="670" y="160" width="285" height="460" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="670" y="160" width="285" height="40" fill="#B91C1C"/>
    <text x="812" y="187" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">注意权 · 施压权</text>

    <rect x="685" y="215" width="255" height="35" fill="#FFF5F5"/>
    <rect x="685" y="215" width="3" height="35" fill="#E2725B"/>
    <text x="700" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">2. 群内表演</text>

    <rect x="685" y="265" width="255" height="35" fill="#FFF5F5"/>
    <rect x="685" y="265" width="3" height="35" fill="#E2725B"/>
    <text x="700" y="288" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">6. 任务下放+CC展示</text>

    <rect x="685" y="315" width="255" height="35" fill="#FFF5F5"/>
    <rect x="685" y="315" width="3" height="35" fill="#B91C1C"/>
    <text x="700" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">3. 公开锁定</text>

    <rect x="685" y="365" width="255" height="35" fill="#FFF5F5"/>
    <rect x="685" y="365" width="3" height="35" fill="#B91C1C"/>
    <text x="700" y="388" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">4. 高压管理</text>

    <rect x="685" y="415" width="255" height="35" fill="#FFF5F5"/>
    <rect x="685" y="415" width="3" height="35" fill="#B91C1C"/>
    <text x="700" y="438" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">9. 追责转嫁</text>

    <rect x="685" y="465" width="255" height="35" fill="#FFF5F5"/>
    <rect x="685" y="465" width="3" height="35" fill="#B91C1C"/>
    <text x="700" y="488" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">10. 加压链</text>

    <!-- 列4: 组合拳 -->
    <rect x="975" y="160" width="245" height="460" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="975" y="160" width="245" height="40" fill="#6B7280"/>
    <text x="1097" y="187" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">组合拳</text>

    <rect x="990" y="215" width="215" height="35" fill="#F5F5F5"/>
    <rect x="990" y="215" width="3" height="35" fill="#6B7280"/>
    <text x="1005" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">1. 抛问题</text>

    <rect x="990" y="265" width="215" height="35" fill="#F5F5F5"/>
    <rect x="990" y="265" width="3" height="35" fill="#6B7280"/>
    <text x="1005" y="288" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">5. 正面对冲</text>

    <rect x="990" y="315" width="215" height="35" fill="#F5F5F5"/>
    <rect x="990" y="315" width="3" height="35" fill="#6B7280"/>
    <text x="1005" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">11. 借力打力</text>

    <rect x="990" y="365" width="215" height="35" fill="#FFF5F5"/>
    <rect x="990" y="365" width="3" height="35" fill="#B91C1C"/>
    <text x="1005" y="388" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">14. 群聊闹事</text>

    <rect x="990" y="415" width="215" height="35" fill="#FFF5F5"/>
    <rect x="990" y="415" width="3" height="35" fill="#B91C1C"/>
    <text x="1005" y="438" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">15. 选择性攻击</text>

    <rect x="990" y="465" width="215" height="35" fill="#F5F5F5"/>
    <rect x="990" y="465" width="3" height="35" fill="#6B7280"/>
    <text x="1005" y="488" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">16. 质疑数据降温</text>

    <rect x="990" y="515" width="215" height="35" fill="#F5F5F5"/>
    <rect x="990" y="515" width="3" height="35" fill="#6B7280"/>
    <text x="1005" y="538" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">17. 挖人试探</text>

    <rect x="990" y="565" width="215" height="35" fill="#F5F5F5"/>
    <rect x="990" y="565" width="3" height="35" fill="#6B7280"/>
    <text x="1005" y="588" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">18. 镜像过敏</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 18 种行为模式</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">05</text>
</svg>
