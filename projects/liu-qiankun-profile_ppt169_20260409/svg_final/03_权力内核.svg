<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">03</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        权力内核 — 他想要什么？
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <!-- 核心观点条 -->
    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心结论</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">刘乾坤的一切行为围绕三个核心诉求展开，缺一不可</text>

    <!-- 三列卡片 -->
    <!-- 卡片1: 控制权 -->
    <rect x="60" y="170" width="373" height="410" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="170" width="373" height="60" fill="#C41E3A"/>

    <!-- crown icon -->
    <g transform="translate(80, 182)">
        <path d="M5,35 L10,10 L20,25 L30,5 L40,25 L50,10 L55,35 Z" fill="#FFFFFF" fill-opacity="0.9"/>
        <rect x="5" y="37" width="50" height="5" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="150" y="218" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">控制权</text>

    <rect x="80" y="250" width="3" height="300" fill="#C41E3A"/>

    <text x="100" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41E3A">典型动作</text>
    <text x="100" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">立规矩、阻断信息、责任下放</text>

    <text x="100" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41E3A">动机</text>
    <text x="100" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">刚接手需要"我在管"的信号，</text>
    <text x="100" y="415" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">建立秩序是首要任务</text>

    <text x="100" y="465" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41E3A">识别信号</text>
    <text x="100" y="495" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">刚接管业务时频繁宣布新规则</text>
    <text x="100" y="520" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">强调"按规则办事"</text>

    <text x="100" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">应对：确认合理性，不盲目接受</text>

    <!-- 卡片2: 展示权 -->
    <rect x="453" y="170" width="374" height="410" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="453" y="170" width="374" height="60" fill="#E2725B"/>

    <!-- eye icon -->
    <g transform="translate(473, 182)">
        <ellipse cx="30" cy="22" rx="28" ry="18" fill="none" stroke="#FFFFFF" stroke-width="3" fill-opacity="0.9"/>
        <circle cx="30" cy="22" r="8" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="543" y="218" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">展示权</text>

    <rect x="473" y="250" width="3" height="300" fill="#E2725B"/>

    <text x="493" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2725B">典型动作</text>
    <text x="493" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">群内表演、打鸡血、CC上级</text>

    <text x="493" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2725B">动机</text>
    <text x="493" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">最在意"老板知不知道我在解决"</text>
    <text x="493" y="415" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">表演给上级看，不是给平级看</text>

    <text x="493" y="465" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#E2725B">识别信号</text>
    <text x="493" y="495" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">群聊中高频@上级，汇报"进展"</text>
    <text x="493" y="520" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">语气偏向"我在推动解决"</text>

    <text x="493" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">应对：不抢戏，专注自身边界</text>

    <!-- 卡片3: 安全感 -->
    <rect x="847" y="170" width="373" height="410" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="847" y="170" width="373" height="60" fill="#B91C1C"/>

    <!-- shield icon -->
    <g transform="translate(867, 182)">
        <path d="M30,2 L55,12 L55,30 C55,42 42,52 30,58 C18,52 5,42 5,30 L5,12 Z" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="937" y="218" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">安全感</text>

    <rect x="867" y="250" width="3" height="300" fill="#B91C1C"/>

    <text x="887" y="280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#B91C1C">典型动作</text>
    <text x="887" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">信息管控、建立依赖</text>

    <text x="887" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#B91C1C">动机</text>
    <text x="887" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">怕被替代，让别人依赖自己</text>
    <text x="887" y="415" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">掌控信息就是掌控不可替代性</text>

    <text x="887" y="465" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#B91C1C">识别信号</text>
    <text x="887" y="495" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">阻断他与上级的直接沟通</text>
    <text x="887" y="520" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">"别找供应商，我来对接"</text>

    <text x="887" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#16A34A">应对：建立独立渠道，不依赖他</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 权力内核章节</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">03</text>
</svg>
