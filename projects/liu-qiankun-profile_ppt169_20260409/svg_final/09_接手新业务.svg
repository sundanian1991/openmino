<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">09</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        接手新业务的四步棋
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心洞察</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">每一步都在为后续动作铺垫，四步走完，"按规则办事"的形象就立住了</text>

    <!-- 手绘风格四步流程 -->
    <!-- 步骤1: 立规矩 -->
    <rect x="60" y="170" width="280" height="300" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="170" width="280" height="60" fill="#C41E3A"/>
    <text x="80" y="195" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" fill-opacity="0.3">1</text>
    <text x="120" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">立规矩</text>

    <rect x="80" y="250" width="240" height="90" fill="#FFF8F0"/>
    <text x="95" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">具体动作</text>
    <text x="95" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">宣布 7 条规则，确立</text>
    <text x="95" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">"按规则办事"基调</text>

    <text x="80" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C41E3A">高明之处</text>
    <text x="80" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">后续是"按规则办事"，</text>
    <text x="80" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不是"我在针对你"</text>

    <text x="80" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C41E3A">目的</text>
    <text x="80" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">建立秩序，后续引用</text>

    <!-- 箭头1 -->
    <polygon points="345,320 365,312 365,328" fill="#C41E3A"/>
    <polygon points="345,320 360,310 360,330" fill="#C41E3A" fill-opacity="0.5"/>

    <!-- 步骤2: 数据切入 -->
    <rect x="370" y="170" width="280" height="300" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="370" y="170" width="280" height="60" fill="#E2725B"/>
    <text x="390" y="195" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" fill-opacity="0.3">2</text>
    <text x="430" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">数据切入</text>

    <rect x="390" y="250" width="240" height="90" fill="#FFF8F0"/>
    <text x="405" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">具体动作</text>
    <text x="405" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">摆数据不出结论，</text>
    <text x="405" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">用数据说话</text>

    <text x="390" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#E2725B">高明之处</text>
    <text x="390" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">责任分散，自己居功</text>
    <text x="390" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">数据客观，不背锅</text>

    <text x="390" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#E2725B">目的</text>
    <text x="390" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">找到问题，但不定责</text>

    <!-- 箭头2 -->
    <polygon points="655,320 675,312 675,328" fill="#E2725B"/>
    <polygon points="655,320 670,310 670,330" fill="#E2725B" fill-opacity="0.5"/>

    <!-- 步骤3: 公开锁定 -->
    <rect x="680" y="170" width="280" height="300" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="680" y="170" width="280" height="60" fill="#B91C1C"/>
    <text x="700" y="195" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" fill-opacity="0.3">3</text>
    <text x="740" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">公开锁定</text>

    <rect x="700" y="250" width="240" height="90" fill="#FFF5F5"/>
    <text x="715" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">具体动作</text>
    <text x="715" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">群里@具体人，</text>
    <text x="715" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">点名要回复</text>

    <text x="700" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C">高明之处</text>
    <text x="700" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">制造回复压力，</text>
    <text x="700" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不回复就是默认</text>

    <text x="700" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C">目的</text>
    <text x="700" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">逼人表态，锁定责任</text>

    <!-- 箭头3 -->
    <polygon points="965,320 985,312 985,328" fill="#B91C1C"/>
    <polygon points="965,320 980,310 980,330" fill="#B91C1C" fill-opacity="0.5"/>

    <!-- 步骤4: 建立预期 -->
    <rect x="990" y="170" width="230" height="300" fill="#FFFFFF" stroke="#C41E3A" stroke-width="1.5"/>
    <rect x="990" y="170" width="230" height="60" fill="#C41E3A"/>
    <text x="1010" y="195" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" fill-opacity="0.3">4</text>
    <text x="1050" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">建立预期</text>

    <rect x="1010" y="250" width="190" height="90" fill="#FFF5F5"/>
    <text x="1025" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D">具体动作</text>
    <text x="1025" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">塑造"按规则办事"</text>
    <text x="1025" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">的公共形象</text>

    <text x="1010" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C41E3A">高明之处</text>
    <text x="1010" y="405" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">后续一切动作都能</text>
    <text x="1010" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">引用初始规则</text>

    <text x="1010" y="450" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C41E3A">目的</text>
    <text x="1010" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">长期引用，持续合法</text>

    <!-- 底部总结 -->
    <rect x="60" y="510" width="1160" height="100" fill="#FFFFFF" stroke="#C41E3A" stroke-width="1.5"/>
    <rect x="60" y="510" width="5" height="100" fill="#C41E3A"/>

    <text x="85" y="545" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C41E3A">整体逻辑</text>
    <text x="85" y="575" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">
        四步走完，"按规则办事"的形象就立住了。后续一切动作都可以说"这是按初始规则来的"——不是我在针对你，是规则如此。
    </text>
    <text x="85" y="600" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">
        这就是为什么刚接手时的动作最重要——初始规则一旦确立，后续引用就是"合法"的。
    </text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 工作手法全景</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">09</text>
</svg>
