    <text x="200" y="132" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">他的所有行为，都围绕三个诉求展开</text>

    
    <g transform="translate(200, 240)">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#C41E3A" stroke-width="3" />
