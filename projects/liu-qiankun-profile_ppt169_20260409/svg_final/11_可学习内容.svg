<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">11</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        能学什么？年老师改进了什么？
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心差异</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">学其手法，改其风格 — 技巧可学，但风格需要改良</text>

    <!-- 左侧：刘乾坤六步评价 -->
    <rect x="60" y="170" width="580" height="250" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="170" width="580" height="45" fill="#C41E3A"/>
    <text x="85" y="198" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">刘乾坤六步法评价</text>

    <!-- 进度条评价 -->
    <text x="80" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">定边界</text>
    <rect x="200" y="228" width="380" height="16" fill="#E5E5E5"/>
    <rect x="200" y="228" width="350" height="16" fill="#16A34A"/>
    <text x="590" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16A34A">✅</text>

    <text x="80" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">查病灶</text>
    <rect x="200" y="263" width="380" height="16" fill="#E5E5E5"/>
    <rect x="200" y="263" width="340" height="16" fill="#16A34A"/>
    <text x="590" y="275" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16A34A">✅</text>

    <text x="80" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">谈到位</text>
    <rect x="200" y="298" width="380" height="16" fill="#E5E5E5"/>
    <rect x="200" y="298" width="320" height="16" fill="#16A34A"/>
    <text x="590" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16A34A">✅</text>

    <text x="80" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">强执行</text>
    <rect x="200" y="333" width="380" height="16" fill="#E5E5E5"/>
    <rect x="200" y="333" width="260" height="16" fill="#B91C1C"/>
    <text x="590" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C">⚠️</text>

    <text x="80" y="380" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2D2D2D">树标杆</text>
    <rect x="200" y="368" width="380" height="16" fill="#E5E5E5"/>
    <rect x="200" y="368" width="240" height="16" fill="#B91C1C"/>
    <text x="590" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C">⚠️</text>

    <text x="80" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">⚠️ 施压过度，短期有效但长期损害信任</text>

    <!-- 右侧：年老师改进 -->
    <rect x="660" y="170" width="560" height="250" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
    <rect x="660" y="170" width="560" height="45" fill="#16A34A"/>
    <text x="685" y="198" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">年老师的改进</text>

    <text x="680" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">加一步：给支持</text>
    <text x="680" y="265" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">不是只提要求，还告诉供应商</text>
    <text x="680" y="285" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">"我这边可以给你什么支持"</text>

    <text x="680" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">温和但坚决</text>
    <text x="680" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">边界清晰但不生硬，</text>
    <text x="680" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">态度温和但原则不妥协</text>

    <text x="680" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">长期伙伴关系</text>
    <text x="680" y="425" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">不是高压驱动，是长期合作</text>

    <!-- 核心差异对比 -->
    <rect x="60" y="440" width="1160" height="170" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

    <text x="640" y="475" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D2D2D">核心差异对比</text>

    <line x1="60" y1="490" x2="1220" y2="490" stroke="#E5E5E5" stroke-width="1"/>

    <!-- 刘乾坤路径 -->
    <text x="80" y="520" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">刘乾坤</text>
    <text x="200" y="520" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">摆问题 → 施压 → 让供应商自己想</text>

    <!-- 年老师路径 -->
    <text x="80" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#16A34A">年老师</text>
    <text x="200" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">摆问题 → 提要求 → <tspan font-weight="bold" fill="#16A34A">给支持</tspan> → 让供应商自己想 → <tspan font-weight="bold" fill="#16A34A">长期合作</tspan></text>

    <text x="80" y="598" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">关键差异在"给支持"和"长期合作" — 刘乾坤是短期驱动，年老师是长期驱动</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 可学习内容</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">11</text>
</svg>
