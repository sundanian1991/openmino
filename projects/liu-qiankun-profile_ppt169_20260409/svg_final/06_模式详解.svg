<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">06</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        模式组合拳 — 什么时候用什么招？
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心逻辑</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">不同阶段触发不同模式组合，目标明确、手法连贯</text>

    <!-- 手绘风格流程图 - 四行 -->

    <!-- 场景1: 刚接手 -->
    <rect x="60" y="170" width="1160" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="170" width="5" height="100" fill="#C41E3A"/>

    <!-- 触发标签 -->
    <rect x="80" y="185" width="100" height="30" fill="#C41E3A"/>
    <text x="130" y="206" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">刚接手</text>

    <!-- 箭头 -->
    <polygon points="195,200 215,192 215,208" fill="#C41E3A"/>

    <!-- 模式组合 -->
    <rect x="230" y="185" width="130" height="30" fill="#E2725B"/>
    <text x="295" y="206" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">立规矩</text>

    <text x="375" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#C41E3A">+</text>

    <rect x="400" y="185" width="130" height="30" fill="#E2725B"/>
    <text x="465" y="206" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">数据切入</text>

    <text x="550" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">预期效果：</text>
    <text x="630" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2D2D2D">建立"按规则办事"形象，数据切入找抓手</text>

    <text x="80" y="250" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">高明之处：先立规矩再动手，后续一切动作都有据可依</text>

    <!-- 场景2: 日常运营 -->
    <rect x="60" y="290" width="1160" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="290" width="5" height="100" fill="#E2725B"/>

    <rect x="80" y="305" width="100" height="30" fill="#E2725B"/>
    <text x="130" y="326" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">日常运营</text>

    <polygon points="195,320 215,312 215,328" fill="#E2725B"/>

    <rect x="230" y="305" width="130" height="30" fill="#C41E3A" fill-opacity="0.8"/>
    <text x="295" y="326" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">群内表演</text>

    <text x="375" y="326" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#C41E3A">+</text>

    <rect x="400" y="305" width="130" height="30" fill="#C41E3A" fill-opacity="0.8"/>
    <text x="465" y="326" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">三要素法</text>

    <text x="550" y="326" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">预期效果：</text>
    <text x="630" y="326" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2D2D2D">让供应商自己承诺原因、目标、举措</text>

    <text x="80" y="370" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">高明之处：不自己说，让供应商自己说，承诺即约束</text>

    <!-- 场景3: 遇到阻力 -->
    <rect x="60" y="410" width="1160" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="410" width="5" height="100" fill="#B91C1C"/>

    <rect x="80" y="425" width="100" height="30" fill="#B91C1C"/>
    <text x="130" y="446" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">遇到阻力</text>

    <polygon points="195,440 215,432 215,448" fill="#B91C1C"/>

    <rect x="230" y="425" width="130" height="30" fill="#B91C1C"/>
    <text x="295" y="446" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">高压管理</text>

    <text x="375" y="446" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#B91C1C">+</text>

    <rect x="400" y="425" width="130" height="30" fill="#B91C1C"/>
    <text x="465" y="446" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">公开锁定</text>

    <text x="550" y="446" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">预期效果：</text>
    <text x="630" y="446" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2D2D2D">群里@具体人，制造回复压力，逼人表态</text>

    <text x="80" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">高明之处：公开施压，不回复就是默认，回复就被锁定</text>

    <!-- 场景4: 需要上级支持 -->
    <rect x="60" y="530" width="1160" height="90" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="530" width="5" height="90" fill="#6B7280"/>

    <rect x="80" y="545" width="140" height="30" fill="#6B7280"/>
    <text x="150" y="566" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">需要上级支持</text>

    <polygon points="235,560 255,552 255,568" fill="#6B7280"/>

    <rect x="270" y="545" width="130" height="30" fill="#C41E3A" fill-opacity="0.7"/>
    <text x="335" y="566" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">打鸡血</text>

    <text x="415" y="566" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#C41E3A">+</text>

    <rect x="440" y="545" width="130" height="30" fill="#C41E3A" fill-opacity="0.7"/>
    <text x="505" y="566" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">道德绑架</text>

    <text x="590" y="566" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#6B7280">预期效果：</text>
    <text x="670" y="566" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2D2D2D">向上级展示"我在全力推动"，获取资源倾斜</text>

    <text x="80" y="600" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">高明之处：表演给上级看，"我在解决问题，需要更多支持"</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 行为模式分析</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">06</text>
</svg>
