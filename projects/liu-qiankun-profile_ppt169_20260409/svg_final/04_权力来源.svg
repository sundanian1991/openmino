<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="50%" stop-color="#E2725B"/>
            <stop offset="100%" stop-color="#F8F5F2" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#F8F5F2"/>
    <rect x="0" y="0" width="1280" height="5" fill="url(#topBarGrad)"/>

    <rect x="0" y="5" width="1280" height="75" fill="#FFFFFF"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#E5E5E5" stroke-width="1"/>

    <rect x="60" y="22" width="40" height="40" fill="#C41E3A"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">04</text>

    <text x="120" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2D2D2D">
        权力来源 — 权力从哪来？
    </text>

    <text x="1160" y="52" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#9CA3AF">人物深度分析</text>

    <!-- 核心观点条 -->
    <rect x="60" y="100" width="1160" height="45" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="100" width="5" height="45" fill="#C41E3A"/>
    <text x="90" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">核心结论</text>
    <text x="190" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">5 种权力来源，从底层规则到表层施压，层层递进</text>

    <!-- 左侧：手绘风格金字塔 -->
    <g transform="translate(60, 160)">
        <!-- 金字塔 - 手绘风格不规则线条 -->
        <!-- 第5层 (底层): 施压权 -->
        <path d="M 30,350 L 520,350 L 515,355 L 25,355 Z" fill="#B91C1C"/>
        <text x="275" y="335" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">施压权</text>

        <!-- 第4层: 注意权 -->
        <path d="M 80,275 L 470,275 L 520,348 L 30,348 Z" fill="#C41E3A" fill-opacity="0.85"/>
        <text x="275" y="315" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">注意权</text>

        <!-- 第3层: 关系权 -->
        <path d="M 130,200 L 420,200 L 470,273 L 80,273 Z" fill="#C41E3A" fill-opacity="0.7"/>
        <text x="275" y="240" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">关系权</text>

        <!-- 第2层: 信息权 -->
        <path d="M 180,125 L 370,125 L 420,198 L 130,198 Z" fill="#E2725B" fill-opacity="0.8"/>
        <text x="275" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">信息权</text>

        <!-- 第1层 (顶层): 规则权 -->
        <path d="M 230,50 L 320,50 L 370,123 L 180,123 Z" fill="#E2725B"/>
        <text x="275" y="90" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">规则权</text>

        <!-- 手绘抖动边框 -->
        <path d="M 230,48 L 228,52 L 232,50 L 230,48" fill="#C41E3A" fill-opacity="0.4"/>
        <path d="M 320,48 L 322,52 L 318,50 L 320,48" fill="#C41E3A" fill-opacity="0.4"/>
    </g>

    <!-- 右侧：5种权力表格 -->
    <rect x="540" y="160" width="680" height="440" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

    <!-- 表头 -->
    <rect x="540" y="160" width="200" height="40" fill="#C41E3A"/>
    <text x="640" y="186" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">权力类型</text>

    <rect x="740" y="160" width="240" height="40" fill="#C41E3A" fill-opacity="0.8"/>
    <text x="860" y="186" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">典型手法</text>

    <rect x="980" y="160" width="240" height="40" fill="#C41E3A" fill-opacity="0.6"/>
    <text x="1100" y="186" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">应对策略</text>

    <!-- 行1: 规则权 -->
    <rect x="540" y="200" width="680" height="72" fill="#FFF8F0"/>
    <rect x="540" y="200" width="4" height="72" fill="#E2725B"/>
    <text x="640" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">规则权</text>
    <text x="640" y="248" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">（顶层）</text>
    <text x="860" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">立规矩、机制先行</text>
    <text x="860" y="248" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">"按规则办事"的底气</text>
    <text x="1100" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">确认合理性</text>
    <text x="1100" y="248" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不盲目接受所有规则</text>

    <!-- 行2: 信息权 -->
    <rect x="540" y="272" width="680" height="72" fill="#FFFFFF"/>
    <text x="640" y="297" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">信息权</text>
    <text x="860" y="297" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">两头堵、阻断信息</text>
    <text x="860" y="320" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">控制信息流动</text>
    <text x="1100" y="297" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">建立独立渠道</text>
    <text x="1100" y="320" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不依赖他拿数据</text>

    <!-- 行3: 关系权 -->
    <rect x="540" y="344" width="680" height="72" fill="#FFFFFF"/>
    <text x="640" y="369" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">关系权</text>
    <text x="860" y="369" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">拉拢圈人、人情债</text>
    <text x="860" y="392" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">用关系绑定利益</text>
    <text x="1100" y="369" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">接受但不欠人情</text>
    <text x="1100" y="392" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">区分工作与私交</text>

    <!-- 行4: 注意权 -->
    <rect x="540" y="416" width="680" height="72" fill="#FFFFFF"/>
    <text x="640" y="441" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D2D2D">注意权</text>
    <text x="860" y="441" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">群内表演、打鸡血</text>
    <text x="860" y="464" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">刷存在感给上级看</text>
    <text x="1100" y="441" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">不抢戏</text>
    <text x="1100" y="464" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">专注自身边界</text>

    <!-- 行5: 施压权 -->
    <rect x="540" y="488" width="680" height="72" fill="#FFF5F5"/>
    <rect x="540" y="488" width="4" height="72" fill="#B91C1C"/>
    <text x="640" y="513" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#B91C1C">施压权</text>
    <text x="640" y="536" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">（底层）</text>
    <text x="860" y="513" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2D2D2D">公开锁定、高压管理</text>
    <text x="860" y="536" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">制造回复压力</text>
    <text x="1100" y="513" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#B91C1C">反问回去</text>
    <text x="1100" y="536" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不接任务</text>

    <!-- 页脚 -->
    <rect x="0" y="640" width="1280" height="80" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="1280" y2="640" stroke="#E5E5E5" stroke-width="1"/>

    <text x="60" y="675" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 刘乾坤档案 v10.2 · 权力框架章节</text>

    <rect x="1140" y="655" width="80" height="30" fill="#C41E3A"/>
    <text x="1180" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">04</text>
</svg>
