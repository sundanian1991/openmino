<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37" />
            <stop offset="100%" stop-color="#F2D06B" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#1A1A2E" />

    
    <text x="60" y="50" fill="#D4AF37" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">COUNTER STRATEGIES</text>
    <line x1="60" y1="65" x2="210" y2="65" stroke="#D4AF37" stroke-width="1" />

    <text x="60" y="105" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">应对策略</text>
    <text x="60" y="135" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">话术对照 — 他说什么 vs 你怎么回</text>

    
    <path d="M 60 170 L 460 170 L 460 370 L 260 440 L 60 370 Z" fill="#1F2937" stroke="#D4AF37" stroke-width="1.5" />
    <text x="260" y="210" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">四大核心原则</text>
    <line x1="100" y1="225" x2="420" y2="225" stroke="#2D2D44" stroke-width="0.5" />

    <text x="100" y="260" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">1 不主动背锅 — 问题直接传递</text>
    <text x="100" y="295" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">2 边界清晰 — 周末不接@</text>
    <text x="100" y="330" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">3 信息独立 — 建独立渠道</text>
    <text x="100" y="365" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">4 学习技巧 — 立规矩+三要素法</text>

    
    <text x="540" y="195" fill="#F2D06B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">话术对照表</text>
    <line x1="540" y1="205" x2="1220" y2="205" stroke="#2D2D44" stroke-width="0.5" />

    
    <path fill="#1F2937" d="M546,220 H1194 A6,6 0 0 1 1200,226 V294 A6,6 0 0 1 1194,300 H546 A6,6 0 0 1 540,294 V226 A6,6 0 0 1 546,220 Z" />
    <text x="555" y="245" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="555" y="265" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"帮我看下，我该如何解答"</text>
    <line x1="880" y1="230" x2="880" y2="290" stroke="#374151" stroke-width="0.5" />
    <text x="895" y="245" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="895" y="265" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"你的想法是什么？我先听你的"</text>
    <text x="895" y="288" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">不接任务，反问回去</text>

    
    <path fill="#1F2937" d="M546,310 H1194 A6,6 0 0 1 1200,316 V384 A6,6 0 0 1 1194,390 H546 A6,6 0 0 1 540,384 V316 A6,6 0 0 1 546,310 Z" />
    <text x="555" y="335" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="555" y="355" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">周末@处理供应商问题</text>
    <line x1="880" y1="320" x2="880" y2="380" stroke="#374151" stroke-width="0.5" />
    <text x="895" y="335" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="895" y="355" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"收到，周一处理"</text>
    <text x="895" y="378" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">边界清晰，不解释</text>

    
    <path fill="#1F2937" d="M546,400 H1194 A6,6 0 0 1 1200,406 V474 A6,6 0 0 1 1194,480 H546 A6,6 0 0 1 540,474 V406 A6,6 0 0 1 546,400 Z" />
    <text x="555" y="425" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="555" y="445" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"别找供应商，他们不如我们清楚"</text>
    <line x1="880" y1="410" x2="880" y2="470" stroke="#374151" stroke-width="0.5" />
    <text x="895" y="425" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="895" y="445" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"理解，但我需要一线真实反馈"</text>
    <text x="895" y="468" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">建立独立渠道</text>

    
    <path fill="#1F2937" d="M546,490 H1194 A6,6 0 0 1 1200,496 V564 A6,6 0 0 1 1194,570 H546 A6,6 0 0 1 540,564 V496 A6,6 0 0 1 546,490 Z" />
    <text x="555" y="515" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="555" y="535" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"辛苦兄弟多费心"</text>
    <line x1="880" y1="500" x2="880" y2="560" stroke="#374151" stroke-width="0.5" />
    <text x="895" y="515" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="895" y="535" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"8个供应商，担心盯不细"</text>
    <text x="895" y="558" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">示弱加边界，刘乾坤会退让</text>

    
    <path fill="#1F2937" d="M546,580 H1194 A6,6 0 0 1 1200,586 V654 A6,6 0 0 1 1194,660 H546 A6,6 0 0 1 540,654 V586 A6,6 0 0 1 546,580 Z" />
    <text x="555" y="605" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说</text>
    <text x="555" y="625" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">危机渲染 + 责任锁定</text>
    <line x1="880" y1="590" x2="880" y2="650" stroke="#374151" stroke-width="0.5" />
    <text x="895" y="605" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回</text>
    <text x="895" y="625" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">事实压危机、锁定卡点、踢球给方案</text>
    <text x="895" y="648" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">用专业语言说话</text>

    
    <text x="60" y="690" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 应对策略章节</text>
    <text x="640" y="690" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">09 / 12</text>
</svg>