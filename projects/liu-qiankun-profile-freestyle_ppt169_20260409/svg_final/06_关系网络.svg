<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <radialGradient id="coreGlow" cx="50%" cy="50%" r="30%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1280" height="720" fill="#1A1A2E"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#coreGlow)"/>

    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#D4AF37" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">RELATIONSHIP GALAXY</text>
    <line x1="60" y1="65" x2="240" y2="65" stroke="#D4AF37" stroke-width="1"/>

    <text x="60" y="105" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">关系网络</text>
    <text x="60" y="135" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">以他为中心的星系，每段关系都有策略</text>

    <!-- 中心恒星 -->
    <circle cx="640" cy="360" r="40" fill="#D4AF37" fill-opacity="0.3" stroke="#D4AF37" stroke-width="2"/>
    <text x="640" y="355" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">刘乾坤</text>
    <text x="640" y="373" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10">权力核心</text>

    <!-- 轨道 1: 内圈（直接关系） -->
    <ellipse cx="640" cy="360" rx="150" ry="100" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 轨道 2: 中圈 -->
    <ellipse cx="640" cy="360" rx="260" ry="170" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- 轨道 3: 外圈 -->
    <ellipse cx="640" cy="360" rx="370" ry="240" fill="none" stroke="#6B7280" stroke-width="0.5" stroke-opacity="0.15"/>

    <!-- 内圈节点: 上级 -->
    <circle cx="640" cy="210" r="30" fill="#1F2937" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="640" y="207" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">王易人</text>
    <text x="640" y="221" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">服务组负责人</text>
    <!-- 连接线 -->
    <line x1="640" y1="240" x2="640" y2="320" stroke="#D4AF37" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- 中圈节点: 同盟 -->
    <circle cx="430" cy="280" r="26" fill="#1F2937" stroke="#22C55E" stroke-width="1"/>
    <text x="430" y="277" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">郭鑫</text>
    <text x="430" y="291" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">前同事</text>
    <line x1="456" y1="295" x2="610" y2="340" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.4"/>

    <circle cx="850" cy="280" r="26" fill="#1F2937" stroke="#22C55E" stroke-width="1"/>
    <text x="850" y="277" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">马贵贤</text>
    <text x="850" y="291" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">前同事</text>
    <line x1="824" y1="295" x2="670" y2="340" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.4"/>

    <!-- 中圈节点: 师承 -->
    <circle cx="390" cy="440" r="26" fill="#1F2937" stroke="#9CA3AF" stroke-width="1"/>
    <text x="390" y="437" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">刘伟佳</text>
    <text x="390" y="451" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">策略组</text>
    <line x1="416" y1="430" x2="610" y2="380" stroke="#9CA3AF" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 外圈节点: 配合 -->
    <circle cx="270" cy="260" r="28" fill="#1F2937" stroke="#F2D06B" stroke-width="1"/>
    <text x="270" y="257" text-anchor="middle" fill="#F2D06B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">年老师</text>
    <text x="270" y="271" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">拉拢+人情债</text>
    <line x1="298" y1="270" x2="610" y2="340" stroke="#F2D06B" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- 外圈节点: 下属 -->
    <circle cx="890" cy="500" r="26" fill="#1F2937" stroke="#6B7280" stroke-width="1"/>
    <text x="890" y="497" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">张世跃</text>
    <text x="890" y="511" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">实习生</text>
    <line x1="864" y1="490" x2="670" y2="390" stroke="#6B7280" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- 外圈节点: 对手 -->
    <circle cx="1010" cy="260" r="28" fill="#1F2937" stroke="#B91C1C" stroke-width="1"/>
    <text x="1010" y="257" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">李吉斌</text>
    <text x="1010" y="271" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">前任</text>
    <line x1="982" y1="270" x2="670" y2="350" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 外圈节点: 供应商群体 -->
    <circle cx="500" cy="560" r="30" fill="#1F2937" stroke="#6B7280" stroke-width="1"/>
    <text x="500" y="557" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" font-weight="bold">供应商群</text>
    <text x="500" y="571" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8">利益驱动</text>
    <line x1="520" y1="540" x2="620" y2="400" stroke="#6B7280" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- 底部 -->
    <line x1="60" y1="640" x2="1220" y2="640" stroke="#2D2D44" stroke-width="0.5"/>
    <text x="60" y="675" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">策略洞察：</text>
    <text x="140" y="675" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">同盟用嘴出力 · 上级是最终观众 · 对手公开攻击 · 年老师拉拢+人情债</text>
    <text x="60" y="700" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="1220" y="700" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">06 / 12</text>
</svg>
