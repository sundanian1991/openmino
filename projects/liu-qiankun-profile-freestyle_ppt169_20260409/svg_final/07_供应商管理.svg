<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37" />
            <stop offset="100%" stop-color="#F2D06B" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#1A1A2E" />

    
    <text x="60" y="50" fill="#D4AF37" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">SUPPLIER MANAGEMENT</text>
    <line x1="60" y1="65" x2="280" y2="65" stroke="#D4AF37" stroke-width="1" />

    <text x="60" y="105" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">供应商管理</text>
    <text x="60" y="135" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四种驱动方式，让供应商自己动起来</text>

    
    
    <path fill="#1F2937" d="M70,170 H610 A10,10 0 0 1 620,180 V390 A10,10 0 0 1 610,400 H70 A10,10 0 0 1 60,390 V180 A10,10 0 0 1 70,170 Z" />
    <path fill="#B91C1C" d="M63,170 H63 A3,3 0 0 1 66,173 V397 A3,3 0 0 1 63,400 H63 A3,3 0 0 1 60,397 V173 A3,3 0 0 1 63,170 Z" />
    <text x="100" y="210" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">质问式</text>
    <text x="100" y="240" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"汰换机制是什么？"</text>
    <line x1="100" y1="255" x2="580" y2="255" stroke="#374151" stroke-width="0.5" />
    <text x="100" y="285" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">直接提问，制造"必须回答"的压力</text>
    <text x="100" y="310" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让供应商解释问题，不给模糊空间</text>
    <text x="100" y="355" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可学：精准提问，不给模糊空间</text>
    <text x="100" y="385" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：高</text>

    
    <path fill="#1F2937" d="M670,170 H1210 A10,10 0 0 1 1220,180 V390 A10,10 0 0 1 1210,400 H670 A10,10 0 0 1 660,390 V180 A10,10 0 0 1 670,170 Z" />
    <path fill="#D97706" d="M663,170 H663 A3,3 0 0 1 666,173 V397 A3,3 0 0 1 663,400 H663 A3,3 0 0 1 660,397 V173 A3,3 0 0 1 663,170 Z" />
    <text x="700" y="210" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">驱动式</text>
    <text x="700" y="240" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"3.4亿才有奖金"</text>
    <line x1="700" y1="255" x2="1180" y2="255" stroke="#374151" stroke-width="0.5" />
    <text x="700" y="285" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用利益让供应商自己急</text>
    <text x="700" y="310" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"为自己干"不是"为我干"</text>
    <text x="700" y="355" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">利益绑定比命令更有效</text>
    <text x="700" y="385" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：中</text>

    
    <path fill="#1F2937" d="M70,420 H610 A10,10 0 0 1 620,430 V640 A10,10 0 0 1 610,650 H70 A10,10 0 0 1 60,640 V430 A10,10 0 0 1 70,420 Z" />
    <path fill="#F2D06B" d="M63,420 H63 A3,3 0 0 1 66,423 V647 A3,3 0 0 1 63,650 H63 A3,3 0 0 1 60,647 V423 A3,3 0 0 1 63,420 Z" />
    <text x="100" y="460" fill="#F2D06B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">要求式</text>
    <text x="100" y="490" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"本月人力计划、周度计划"</text>
    <line x1="100" y1="505" x2="580" y2="505" stroke="#374151" stroke-width="0.5" />
    <text x="100" y="535" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">要求具体计划，不模糊</text>
    <text x="100" y="560" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">明确时间节点和交付物</text>
    <text x="100" y="605" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">要求要具体可考核</text>
    <text x="100" y="635" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：低</text>

    
    <path fill="#1F2937" d="M670,420 H1210 A10,10 0 0 1 1220,430 V640 A10,10 0 0 1 1210,650 H670 A10,10 0 0 1 660,640 V430 A10,10 0 0 1 670,420 Z" />
    <path fill="#22C55E" d="M663,420 H663 A3,3 0 0 1 666,423 V647 A3,3 0 0 1 663,650 H663 A3,3 0 0 1 660,647 V423 A3,3 0 0 1 663,420 Z" />
    <text x="700" y="460" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">改进式 ★ 最值得学</text>
    <text x="700" y="490" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">三要素法：原因+提升目标+举措</text>
    <line x1="700" y1="505" x2="1180" y2="505" stroke="#374151" stroke-width="0.5" />
    <text x="700" y="535" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让供应商自己承诺</text>
    <text x="700" y="560" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">完不成有把柄</text>
    <text x="700" y="605" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">最成熟的管理手法</text>
    <text x="700" y="635" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">风险：低，效果：高</text>

    
    <text x="60" y="690" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 供应商管理章节</text>
    <text x="640" y="690" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">07 / 12</text>
</svg>