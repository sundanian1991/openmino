<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1280" height="720" fill="#1A1A2E"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#centerGlow)"/>

    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#D4AF37" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">CORE INSIGHT</text>
    <line x1="60" y1="65" x2="200" y2="65" stroke="#D4AF37" stroke-width="1"/>

    <!-- 大字定位 -->
    <text x="60" y="110" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">一句话定位</text>

    <text x="60" y="165" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">高压管理型业管，擅长 <tspan fill="#D4AF37" font-weight="bold">立规矩 + 三要素法</tspan></text>

    <!-- 同心圆设计 - 核心在右侧 -->
    <!-- 外层圆: 安全感 -->
    <circle cx="900" cy="340" r="200" fill="#1F2937" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="8,6"/>
    <text x="900" y="170" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">安全感</text>
    <text x="900" y="190" text-anchor="middle" fill="#4B5563" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">怕被替代 · 建立依赖</text>

    <!-- 中层圆: 展示权 -->
    <circle cx="900" cy="340" r="135" fill="#1F2937" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="900" y="230" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">展示权</text>
    <text x="900" y="250" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">最在意"老板知不知道"</text>

    <!-- 内层圆: 控制权 -->
    <circle cx="900" cy="340" r="75" fill="#D4AF37" fill-opacity="0.2" stroke="#D4AF37" stroke-width="2"/>
    <text x="900" y="335" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">控制权</text>
    <text x="900" y="360" text-anchor="middle" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">首要需求</text>

    <!-- 左侧说明文字 -->
    <text x="60" y="240" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">三个核心诉求</text>

    <text x="60" y="280" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">他所有行为都围绕这三个</text>
    <text x="60" y="305" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">核心诉求展开，缺一不可。</text>

    <text x="60" y="350" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">控制权是基础——刚接手需要</text>
    <text x="60" y="375" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">建立"我在管"的信号，秩序</text>
    <text x="60" y="400" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">是安全感的基础。</text>

    <text x="60" y="450" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">展示权是最在意的——"老板</text>
    <text x="60" y="475" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">知不知道我在解决"比解决</text>
    <text x="60" y="500" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">本身更重要。表演给上级看。</text>

    <text x="60" y="550" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">安全感是最底层的——怕被替</text>
    <text x="60" y="575" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">代，所以要让别人依赖自己。</text>
    <text x="60" y="600" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">信息管控就是掌控不可替代性。</text>

    <!-- 底部 -->
    <line x1="60" y1="660" x2="1220" y2="660" stroke="#2D2D44" stroke-width="0.5"/>
    <text x="60" y="690" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="690" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">02 / 12</text>
</svg>
