<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#F2D06B"/>
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <!-- 深色背景 -->
    <rect width="1280" height="720" fill="#1A1A2E"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#centerGlow)"/>

    <!-- 右侧渐变光带 -->
    <rect x="900" y="0" width="380" height="720" fill="url(#sideGrad)"/>

    <!-- 同心圆装饰 -->
    <circle cx="640" cy="360" r="300" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="640" cy="360" r="250" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.1"/>
    <circle cx="640" cy="360" r="200" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.07"/>

    <!-- 顶部细线 -->
    <line x1="100" y1="100" x2="1180" y2="100" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 主标题 -->
    <text x="640" y="220" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="12" letter-spacing="6" font-weight="bold">CONFIDENTIAL PROFILE</text>

    <text x="640" y="310" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">刘乾坤</text>

    <!-- 金色分隔线 -->
    <line x1="540" y1="340" x2="740" y2="340" stroke="url(#goldGrad)" stroke-width="2"/>

    <text x="640" y="390" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" letter-spacing="2">人物深度分析报告</text>

    <!-- 底部信息 -->
    <text x="640" y="520" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">权力框架 · 行为模式 · 应对策略 · 可学习内容</text>

    <text x="100" y="660" fill="#4B5563" font-family="Arial, sans-serif" font-size="12">v10.2 · 年老师建档 · 2026-03-19</text>
    <text x="640" y="660" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1180" y="660" text-anchor="end" fill="#4B5563" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Mino · 2026-04-09</text>
</svg>
