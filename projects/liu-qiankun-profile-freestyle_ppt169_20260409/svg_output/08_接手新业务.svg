<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#F2D06B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#1A1A2E"/>

    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#D4AF37" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">ONBOARDING PLAYBOOK</text>
    <line x1="60" y1="65" x2="260" y2="65" stroke="#D4AF37" stroke-width="1"/>

    <text x="60" y="105" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">接手新业务</text>
    <text x="60" y="135" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">四步建立管理基础</text>

    <!-- S曲线时间线 -->
    <!-- S曲线 -->
    <path d="M 160 400 Q 360 250 560 350 Q 760 450 960 300 Q 1060 240 1140 300" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-dasharray="6,4"/>

    <!-- 节点 1: 立规矩 -->
    <circle cx="160" cy="400" r="22" fill="#D4AF37" fill-opacity="0.3" stroke="#D4AF37" stroke-width="2"/>
    <text x="160" y="396" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="bold">1</text>
    <text x="160" y="414" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="10" font-weight="bold"></text>

    <!-- 节点 1 上方卡片 -->
    <rect x="80" y="170" width="240" height="180" rx="8" fill="#1F2937" stroke="#D4AF37" stroke-width="1"/>
    <text x="100" y="210" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">立规矩</text>
    <text x="100" y="240" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">宣布7条规则：</text>
    <text x="100" y="262" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">30分钟回复</text>
    <text x="100" y="284" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">10点报出勤</text>
    <text x="100" y="306" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">昵称格式规范</text>
    <text x="100" y="328" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">数据日报格式</text>
    <text x="100" y="350" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">后续变成"按规则办事"</text>

    <!-- 连接线 -->
    <line x1="200" y1="350" x2="165" y2="380" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 节点 2: 数据切入 -->
    <circle cx="560" cy="350" r="22" fill="#1F2937" stroke="#F2D06B" stroke-width="1.5"/>
    <text x="560" y="355" text-anchor="middle" fill="#F2D06B" font-family="Arial, sans-serif" font-size="18" font-weight="bold">2</text>

    <!-- 节点 2 卡片 -->
    <rect x="440" y="440" width="240" height="180" rx="8" fill="#1F2937" stroke="#F2D06B" stroke-width="1"/>
    <text x="460" y="480" fill="#F2D06B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">数据切入</text>
    <text x="460" y="510" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">5分钟连发两条数据</text>
    <text x="460" y="532" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">精确到小数点</text>
    <text x="460" y="554" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">责任完美分散</text>
    <text x="460" y="576" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">摆数据，不出结论</text>
    <text x="460" y="600" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">让别人背锅，自己居功</text>

    <!-- 连接线 -->
    <line x1="560" y1="372" x2="560" y2="440" stroke="#F2D06B" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 节点 3: 公开锁定 -->
    <circle cx="960" cy="300" r="22" fill="#1F2937" stroke="#B91C1C" stroke-width="1.5"/>
    <text x="960" y="305" text-anchor="middle" fill="#B91C1C" font-family="Arial, sans-serif" font-size="18" font-weight="bold">3</text>

    <!-- 节点 3 卡片 -->
    <rect x="840" y="170" width="240" height="180" rx="8" fill="#1F2937" stroke="#B91C1C" stroke-width="1"/>
    <text x="860" y="210" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">公开锁定</text>
    <text x="860" y="240" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群里@具体人</text>
    <text x="860" y="262" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">所有人看着不得不接</text>
    <text x="860" y="284" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不私聊，公开@</text>
    <text x="860" y="306" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">连环追加施压</text>
    <text x="860" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">制造回复压力</text>

    <!-- 连接线 -->
    <line x1="960" y1="280" x2="960" y2="350" stroke="#B91C1C" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 节点 4: 建立预期 -->
    <circle cx="1140" cy="300" r="22" fill="#1F2937" stroke="#22C55E" stroke-width="1.5"/>
    <text x="1140" y="305" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="18" font-weight="bold">4</text>

    <!-- 节点 4 卡片 -->
    <rect x="940" y="440" width="240" height="180" rx="8" fill="#1F2937" stroke="#22C55E" stroke-width="1"/>
    <text x="960" y="480" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">建立预期</text>
    <text x="960" y="510" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">按规则办事的形象确立</text>
    <text x="960" y="532" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">后续引用初始规则</text>
    <text x="960" y="554" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">持续执行</text>
    <text x="960" y="590" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">从"个人意志"变</text>
    <text x="960" y="610" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">为"按章办事"</text>

    <!-- 底部洞察 -->
    <rect x="60" y="650" width="600" height="40" rx="6" fill="#D4AF37" fill-opacity="0.1" stroke="#D4AF37" stroke-width="0.5"/>
    <text x="80" y="675" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">高明：后续所有管理都是"执行既定规则"，不是"个人施压"</text>

    <text x="60" y="705" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="1220" y="705" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">08 / 12</text>
</svg>
