<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#F2D06B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#1A1A2E"/>

    <!-- 顶部标签 -->
    <text x="60" y="50" fill="#D4AF37" font-family="Arial, sans-serif" font-size="11" letter-spacing="4" font-weight="bold">POWER CORE</text>
    <line x1="60" y1="65" x2="195" y2="65" stroke="#D4AF37" stroke-width="1"/>

    <text x="60" y="105" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">权力内核</text>
    <text x="60" y="135" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">他想要什么？</text>

    <!-- 对角线三角形布局 -->
    <!-- 控制权 - 左上 -->
    <polygon points="80,200 420,200 420,420" fill="#D4AF37" fill-opacity="0.08" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="120" y="260" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">控制权</text>
    <text x="120" y="295" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">立规矩、阻断信息、责任下放</text>
    <text x="120" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刚接手新业务，需要建立</text>
    <text x="120" y="350" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"我在管"的信号</text>
    <text x="120" y="395" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">应对：确认合理性，不盲目接受</text>

    <!-- 展示权 - 右上 -->
    <polygon points="460,180 800,180 800,400 460,400" fill="#D4AF37" fill-opacity="0.05" stroke="#F2D06B" stroke-width="1"/>
    <text x="500" y="240" fill="#F2D06B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">展示权</text>
    <text x="500" y="275" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">群内表演、打鸡血、CC上级</text>
    <text x="500" y="310" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">最在意"老板知不知道我在解决"</text>
    <text x="500" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">表演给上级看，不是给平级看</text>
    <text x="500" y="375" fill="#F2D06B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">应对：不抢戏，专注自身边界</text>

    <!-- 安全感 - 底部 -->
    <polygon points="300,440 960,440 960,560 300,560" fill="#1F2937" stroke="#6B7280" stroke-width="1" stroke-opacity="0.5"/>
    <text x="340" y="485" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">安全感</text>
    <text x="340" y="515" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">信息管控、建立依赖 — 怕被替代，让别人依赖自己</text>
    <text x="340" y="540" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">应对：建立独立渠道，不依赖他拿数据</text>

    <!-- 左侧装饰文字 -->
    <text x="1180" y="200" text-anchor="end" fill="#D4AF37" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill-opacity="0.05">POWER</text>
    <text x="1180" y="320" text-anchor="end" fill="#D4AF37" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill-opacity="0.03">CORE</text>

    <!-- 底部 -->
    <line x1="60" y1="610" x2="1220" y2="610" stroke="#2D2D44" stroke-width="0.5"/>
    <text x="60" y="650" fill="#D4AF37" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">破绽：</text>
    <text x="120" y="650" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">表演型管理→真实能力可能不足 · 信息管控→信任缺失 · 施压过度→易引发抵触</text>
    <text x="60" y="690" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 权力内核章节</text>
    <text x="640" y="690" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="10" letter-spacing="3">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">03 / 12</text>
</svg>
