<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <!-- 头部 Takeaway Bar -->
    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">关系网络</text>
    <text x="170" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">他身边的关键人与关系网</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">刘乾坤的关系网络 — 同盟、下属、对手、外部</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">06 / 12</text>

    <!-- 中心节点 - 刘乾坤 -->
    <rect x="540" y="270" width="200" height="60" rx="8" fill="#C41E3A"/>
    <text x="640" y="307" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">刘乾坤</text>

    <!-- 连接线到各节点 -->
    <!-- 到郭鑫 -->
    <line x1="540" y1="285" x2="300" y2="160" stroke="#C41E3A" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到马贵贤 -->
    <line x1="540" y1="285" x2="100" y2="280" stroke="#C41E3A" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到年老师 -->
    <line x1="540" y1="285" x2="300" y2="420" stroke="#E2725B" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到张世跃 -->
    <line x1="540" y1="285" x2="980" y2="160" stroke="#6B7280" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到王易人 -->
    <line x1="740" y1="285" x2="1050" y2="280" stroke="#16A34A" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到供应商 -->
    <line x1="740" y1="310" x2="980" y2="420" stroke="#6B7280" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到刘伟佳 -->
    <line x1="740" y1="270" x2="1050" y2="160" stroke="#16A34A" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 到李吉斌 -->
    <line x1="540" y1="330" x2="100" y2="420" stroke="#B91C1C" stroke-width="2" stroke-opacity="0.5"/>

    <!-- 同盟（红色） -->
    <rect x="220" y="140" width="160" height="50" rx="6" fill="#161B22" stroke="#C41E3A" stroke-width="2"/>
    <text x="300" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">郭鑫（前同事）</text>
    <text x="300" y="182" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">"用你的嘴，出我的力"</text>

    <rect x="20" y="260" width="160" height="50" rx="6" fill="#161B22" stroke="#C41E3A" stroke-width="2"/>
    <text x="100" y="285" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C41E3A">马贵贤（前同事）</text>
    <text x="100" y="302" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">"你的工作，我的成果"</text>

    <rect x="970" y="140" width="160" height="50" rx="6" fill="#161B22" stroke="#16A34A" stroke-width="2"/>
    <text x="1050" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#16A34A">刘伟佳（策略组）</text>
    <text x="1050" y="182" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">师承关系，高级版</text>

    <!-- 上级（绿色） -->
    <rect x="970" y="260" width="160" height="50" rx="6" fill="#161B22" stroke="#16A34A" stroke-width="2"/>
    <text x="1050" y="285" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#16A34A">王易人（上级）</text>
    <text x="1050" y="302" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">服务组负责人，CC对象</text>

    <!-- 配合（橙色） -->
    <rect x="220" y="400" width="160" height="50" rx="6" fill="#161B22" stroke="#E2725B" stroke-width="2"/>
    <text x="300" y="425" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#E2725B">年老师（配合）</text>
    <text x="300" y="442" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">"兄弟"称呼+拉拢</text>

    <!-- 下属（灰色） -->
    <rect x="900" y="400" width="160" height="50" rx="6" fill="#161B22" stroke="#6B7280" stroke-width="2"/>
    <text x="980" y="425" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6B7280">供应商（外部）</text>
    <text x="980" y="442" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">利益驱动+责任下放</text>

    <rect x="900" y="140" width="160" height="50" rx="6" fill="#161B22" stroke="#6B7280" stroke-width="2"/>
    <text x="980" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#6B7280">张世跃（实习生）</text>
    <text x="980" y="182" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">任务下放+功劳上报</text>

    <!-- 对手（深红） -->
    <rect x="20" y="400" width="160" height="50" rx="6" fill="#161B22" stroke="#B91C1C" stroke-width="2"/>
    <text x="100" y="425" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#B91C1C">李吉斌（前任）</text>
    <text x="100" y="442" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#9CA3AF">公开质疑+双重标准</text>

    <!-- 图例 -->
    <rect x="60" y="540" width="12" height="12" fill="#161B22" stroke="#C41E3A" stroke-width="2"/>
    <text x="78" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">同盟</text>
    <rect x="130" y="540" width="12" height="12" fill="#161B22" stroke="#E2725B" stroke-width="2"/>
    <text x="148" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">配合</text>
    <rect x="200" y="540" width="12" height="12" fill="#161B22" stroke="#16A34A" stroke-width="2"/>
    <text x="218" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">上级/师承</text>
    <rect x="300" y="540" width="12" height="12" fill="#161B22" stroke="#6B7280" stroke-width="2"/>
    <text x="318" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">下属/外部</text>
    <rect x="410" y="540" width="12" height="12" fill="#161B22" stroke="#B91C1C" stroke-width="2"/>
    <text x="428" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#9CA3AF">对手/前任</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 关系网络</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">06</text>
</svg>
