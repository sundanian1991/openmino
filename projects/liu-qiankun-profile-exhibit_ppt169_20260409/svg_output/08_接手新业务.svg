<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">关键步骤</text>
    <text x="170" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">接手新业务 — 先定规则后办事</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">4 步建立管理基础，后续所有行为都是"执行既定规则"</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">08 / 12</text>

    <!-- 四步流程 - 横向排列 -->
    <!-- Step 1 -->
    <rect x="60" y="130" width="285" height="45" fill="#C41E3A"/>
    <text x="202" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第一步：立规矩</text>

    <rect x="60" y="195" width="285" height="220" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="80" y="225" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刚接手宣布 7 条规则：</text>
    <text x="80" y="255" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 30 分钟回复</text>
    <text x="80" y="280" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 10 点报出勤</text>
    <text x="80" y="305" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 昵称格式规范</text>
    <text x="80" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 数据日报格式</text>
    <text x="80" y="355" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 群内沟通规范</text>

    <rect x="80" y="380" width="245" height="25" fill="#16A34A" fill-opacity="0.15"/>
    <text x="95" y="398" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">目的：后续是"按规则办事"</text>

    <!-- 箭头 1→2 -->
    <polygon points="355,260 390,250 390,270" fill="#E2725B"/>

    <!-- Step 2 -->
    <rect x="405" y="130" width="285" height="45" fill="#E2725B"/>
    <text x="547" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第二步：数据切入</text>

    <rect x="405" y="195" width="285" height="220" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="425" y="225" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆数据不出结论，让别人背锅</text>
    <text x="425" y="255" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 5 分钟连发两条数据</text>
    <text x="425" y="280" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 精确到小数点</text>
    <text x="425" y="305" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 责任完美分散</text>
    <text x="425" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 自己居功</text>
    <text x="425" y="355" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• "一元批次下降50%"</text>

    <rect x="425" y="380" width="245" height="25" fill="#16A34A" fill-opacity="0.15"/>
    <text x="440" y="398" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">目的：数据驱动，不主观判断</text>

    <!-- 箭头 2→3 -->
    <polygon points="700,260 735,250 735,270" fill="#E2725B"/>

    <!-- Step 3 -->
    <rect x="750" y="130" width="285" height="45" fill="#B91C1C"/>
    <text x="892" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第三步：公开锁定</text>

    <rect x="750" y="195" width="285" height="220" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="770" y="225" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群里@具体人，所有人看着不得不接</text>
    <text x="770" y="255" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 不私聊，公开@</text>
    <text x="770" y="280" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 制造回复压力</text>
    <text x="770" y="305" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• @郭鑫+@马贵贤</text>
    <text x="770" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 连环追加施压</text>
    <text x="770" y="355" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">• 测试处理速度</text>

    <rect x="770" y="380" width="245" height="25" fill="#16A34A" fill-opacity="0.15"/>
    <text x="785" y="398" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">目的：公开场合不得不接</text>

    <!-- 箭头 3→4 -->
    <polygon points="1045,260 1080,250 1080,270" fill="#E2725B"/>

    <!-- Step 4 -->
    <rect x="1095" y="130" width="140" height="45" fill="#6B7280"/>
    <text x="1165" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">第四步</text>

    <rect x="1095" y="195" width="140" height="220" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="1105" y="225" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">建立预期</text>
    <text x="1105" y="255" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"按规则办事"</text>
    <text x="1105" y="280" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">形象确立</text>
    <text x="1105" y="305" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">后续引用</text>
    <text x="1105" y="330" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">初始规则</text>
    <text x="1105" y="355" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">持续执行</text>

    <rect x="1105" y="380" width="120" height="25" fill="#16A34A" fill-opacity="0.15"/>
    <text x="1110" y="398" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">管理有据可依</text>

    <!-- 底部关键洞察 -->
    <rect x="60" y="480" width="1160" height="100" fill="#161B22" stroke="#E2725B" stroke-width="1"/>
    <rect x="60" y="480" width="6" height="100" fill="#E2725B"/>
    <text x="90" y="515" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">高明之处</text>
    <text x="90" y="545" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">后续所有管理行为都是"执行既定规则"，不是"个人施压"。规则一旦建立，管理就变成"按章办事"而非"个人意志"。</text>
    <text x="90" y="570" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">03-18 金条人工接手 — 7 条规则 = 后续管理的合法性基础</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 工作手法</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">08</text>
</svg>
