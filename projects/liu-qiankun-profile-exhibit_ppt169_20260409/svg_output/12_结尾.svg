<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <!-- 装饰网格 -->
    <g stroke="#C41E3A" stroke-width="0.5" stroke-opacity="0.15">
        <line x1="200" y1="100" x2="200" y2="600"/>
        <line x1="400" y1="100" x2="400" y2="600"/>
        <line x1="640" y1="100" x2="640" y2="600"/>
        <line x1="880" y1="100" x2="880" y2="600"/>
        <line x1="1080" y1="100" x2="1080" y2="600"/>
        <line x1="100" y1="200" x2="1180" y2="200"/>
        <line x1="100" y1="350" x2="1180" y2="350"/>
        <line x1="100" y1="500" x2="1180" y2="500"/>
    </g>

    <!-- 中心内容 -->
    <text x="640" y="230" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" letter-spacing="3" font-weight="bold">THANK YOU</text>

    <text x="640" y="310" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="bold">深度观察 · 理性应对</text>

    <text x="640" y="370" text-anchor="middle" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22">看懂他的行为逻辑，不被带着走，学该学的</text>

    <!-- 分隔线 -->
    <line x1="540" y1="410" x2="740" y2="410" stroke="#E2725B" stroke-width="2"/>

    <!-- 三句总结 -->
    <text x="640" y="460" text-anchor="middle" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">他不是在管理，是在表演管理</text>
    <text x="640" y="500" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">边界清晰是最好的防御</text>
    <text x="640" y="540" text-anchor="middle" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">取其精华，做温和但坚定的管理者</text>

    <!-- 底部信息 -->
    <line x1="120" y1="620" x2="1160" y2="620" stroke="#1F2937" stroke-width="1"/>
    <text x="120" y="670" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="670" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="12">CONFIDENTIAL</text>
    <text x="1160" y="670" text-anchor="end" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">年老师 · Mino</text>
</svg>
