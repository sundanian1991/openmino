<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">管理手法</text>
    <text x="170" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">供应商管理 — 4 种驱动方式</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">质问、驱动、要求、改进 — 让供应商自己动起来</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">07 / 12</text>

    <!-- 四列暗色卡片 -->
    <!-- 卡片1: 质问式 -->
    <rect x="60" y="110" width="285" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="60" y="110" width="285" height="50" fill="#B91C1C"/>
    <text x="202" y="142" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">质问式</text>

    <text x="80" y="190" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="80" y="215" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-style="italic">"汰换机制是什么？"</text>

    <text x="80" y="265" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">做法</text>
    <text x="80" y="290" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">直接提问，让供应商解释问题</text>
    <text x="80" y="315" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">制造"必须回答"的压力</text>

    <text x="80" y="365" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">案例</text>
    <text x="80" y="390" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">03-24 要求袁浩淇发</text>
    <text x="80" y="410" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">MOB1目标、汰换机制</text>

    <rect x="80" y="450" width="245" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="95" y="470" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可学：精准提问，不给模糊空间</text>

    <!-- 卡片2: 驱动式 -->
    <rect x="365" y="110" width="285" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="365" y="110" width="285" height="50" fill="#C41E3A"/>
    <text x="507" y="142" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">驱动式</text>

    <text x="385" y="190" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="385" y="215" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-style="italic">"3.4 亿才有奖金"</text>

    <text x="385" y="265" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">做法</text>
    <text x="385" y="290" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用利益让供应商自己急</text>
    <text x="385" y="315" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"为自己干"不是"为我干"</text>

    <text x="385" y="365" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">案例</text>
    <text x="385" y="390" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">03-20 月末冲刺，4个问题</text>
    <text x="385" y="410" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让供应商自己安排</text>

    <rect x="385" y="450" width="245" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="400" y="470" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可学：利益绑定比命令更有效</text>

    <!-- 卡片3: 要求式 -->
    <rect x="670" y="110" width="285" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="670" y="110" width="285" height="50" fill="#E2725B"/>
    <text x="812" y="142" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">要求式</text>

    <text x="690" y="190" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="690" y="215" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-style="italic">"本月人力计划、周度计划"</text>

    <text x="690" y="265" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">做法</text>
    <text x="690" y="290" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">要求具体计划，不模糊</text>
    <text x="690" y="315" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">明确时间节点和交付物</text>

    <text x="690" y="365" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">案例</text>
    <text x="690" y="390" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">03-20 @5家供应商反馈</text>
    <text x="690" y="410" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">面试/培训/入职数据</text>

    <rect x="690" y="450" width="245" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="705" y="470" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可学：要求要具体可考核</text>

    <!-- 卡片4: 改进式 -->
    <rect x="975" y="110" width="245" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="975" y="110" width="245" height="50" fill="#C41E3A"/>
    <text x="1097" y="142" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">改进式 ★</text>

    <text x="995" y="190" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="995" y="215" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-style="italic">"原因+目标+举措"</text>

    <text x="995" y="265" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">做法</text>
    <text x="995" y="290" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">三要素法：让供应商自己承诺</text>
    <text x="995" y="315" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">完不成有把柄</text>

    <text x="995" y="365" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">案例</text>
    <text x="995" y="390" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">03-20 @2家通时不达标</text>
    <text x="995" y="410" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">03-24 5家×2问复盘</text>

    <rect x="995" y="450" width="205" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="1010" y="470" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">★ 最值得学的手法</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 供应商管理手法</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">07</text>
</svg>
