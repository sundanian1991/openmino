<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心结论</text>
    <text x="150" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">权力来源 — 权力从哪来？</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">5 种权力来源，从底层规则到表层施压，层层递进</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">04 / 12</text>

    <!-- 左侧：金字塔（暗色背景适配） -->
    <g transform="translate(60, 100)">
        <!-- 第5层(底层): 施压权 -->
        <rect x="30" y="430" width="460" height="70" fill="#B91C1C"/>
        <text x="260" y="475" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">施压权</text>

        <!-- 第4层: 注意权 -->
        <rect x="80" y="350" width="410" height="70" fill="#C41E3A"/>
        <text x="285" y="395" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">注意权</text>

        <!-- 第3层: 关系权 -->
        <rect x="130" y="270" width="360" height="70" fill="#C41E3A" fill-opacity="0.75"/>
        <text x="310" y="315" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">关系权</text>

        <!-- 第2层: 信息权 -->
        <rect x="180" y="190" width="310" height="70" fill="#E2725B"/>
        <text x="335" y="235" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">信息权</text>

        <!-- 第1层(顶层): 规则权 -->
        <rect x="230" y="110" width="260" height="70" fill="#E2725B" fill-opacity="0.85"/>
        <text x="360" y="155" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">规则权</text>
    </g>

    <!-- 右侧：5种权力表格（暗色） -->
    <rect x="600" y="100" width="620" height="520" fill="#161B22" stroke="#30363D" stroke-width="1"/>

    <!-- 表头 -->
    <rect x="600" y="100" width="180" height="40" fill="#C41E3A"/>
    <text x="690" y="126" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">权力类型</text>
    <rect x="780" y="100" width="220" height="40" fill="#C41E3A" fill-opacity="0.8"/>
    <text x="890" y="126" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">典型手法</text>
    <rect x="1000" y="100" width="220" height="40" fill="#C41E3A" fill-opacity="0.6"/>
    <text x="1110" y="126" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">应对策略</text>

    <!-- 行1: 规则权 -->
    <rect x="600" y="140" width="620" height="72" fill="#1C2128"/>
    <rect x="600" y="140" width="4" height="72" fill="#E2725B"/>
    <text x="690" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#E5E7EB">规则权</text>
    <text x="690" y="190" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">（顶层）</text>
    <text x="890" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#E5E7EB">立规矩、机制先行</text>
    <text x="890" y="190" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">"按规则办事"的底气</text>
    <text x="1110" y="165" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">确认合理性</text>
    <text x="1110" y="190" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不盲目接受所有规则</text>

    <!-- 行2: 信息权 -->
    <rect x="600" y="212" width="620" height="72" fill="#0D1117"/>
    <text x="690" y="237" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#E5E7EB">信息权</text>
    <text x="890" y="237" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#E5E7EB">两头堵、阻断信息</text>
    <text x="890" y="262" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">控制信息流动</text>
    <text x="1110" y="237" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">建立独立渠道</text>
    <text x="1110" y="262" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不依赖他拿数据</text>

    <!-- 行3: 关系权 -->
    <rect x="600" y="284" width="620" height="72" fill="#0D1117"/>
    <text x="690" y="309" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#E5E7EB">关系权</text>
    <text x="890" y="309" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#E5E7EB">拉拢圈人、人情债</text>
    <text x="890" y="334" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">用关系绑定利益</text>
    <text x="1110" y="309" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">接受但不欠人情</text>
    <text x="1110" y="334" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">区分工作与私交</text>

    <!-- 行4: 注意权 -->
    <rect x="600" y="356" width="620" height="72" fill="#0D1117"/>
    <text x="690" y="381" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#E5E7EB">注意权</text>
    <text x="890" y="381" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#E5E7EB">群内表演、打鸡血</text>
    <text x="890" y="406" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">刷存在感给上级看</text>
    <text x="1110" y="381" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#16A34A">不抢戏</text>
    <text x="1110" y="406" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">专注自身边界</text>

    <!-- 行5: 施压权 -->
    <rect x="600" y="428" width="620" height="72" fill="#1C2128"/>
    <rect x="600" y="428" width="4" height="72" fill="#B91C1C"/>
    <text x="690" y="453" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#B91C1C">施压权</text>
    <text x="690" y="478" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">（底层）</text>
    <text x="890" y="453" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#E5E7EB">公开锁定、高压管理</text>
    <text x="890" y="478" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">制造回复压力</text>
    <text x="1110" y="453" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#B91C1C">反问回去</text>
    <text x="1110" y="478" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">不接任务</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 权力框架章节</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">04</text>
</svg>
