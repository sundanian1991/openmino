<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心结论</text>
    <text x="150" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">权力内核 — 他想要什么？</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">一切行为围绕三个核心诉求展开，缺一不可</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">03 / 12</text>

    <!-- 三列暗色卡片 -->
    <!-- 控制权 -->
    <rect x="60" y="110" width="380" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="60" y="110" width="380" height="70" fill="#C41E3A"/>
    <g transform="translate(80, 122)">
        <path d="M5,35 L10,10 L20,25 L30,5 L40,25 L50,10 L55,35 Z" fill="#FFFFFF" fill-opacity="0.9"/>
        <rect x="5" y="37" width="50" height="5" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="155" y="155" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">控制权</text>

    <text x="85" y="210" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">典型动作</text>
    <text x="85" y="240" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">立规矩、阻断信息、责任下放</text>

    <text x="85" y="295" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">动机</text>
    <text x="85" y="325" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">刚接手需要"我在管"的信号，</text>
    <text x="85" y="350" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">建立秩序是首要任务</text>

    <text x="85" y="405" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">识别信号</text>
    <text x="85" y="435" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">刚接管业务时频繁宣布新规则</text>
    <text x="85" y="460" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">强调"按规则办事"</text>

    <rect x="85" y="500" width="330" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="100" y="520" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">应对：确认合理性，不盲目接受</text>

    <!-- 展示权 -->
    <rect x="460" y="110" width="380" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="460" y="110" width="380" height="70" fill="#E2725B"/>
    <g transform="translate(480, 122)">
        <ellipse cx="30" cy="22" rx="28" ry="18" fill="none" stroke="#FFFFFF" stroke-width="3"/>
        <circle cx="30" cy="22" r="8" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="555" y="155" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">展示权</text>

    <text x="485" y="210" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">典型动作</text>
    <text x="485" y="240" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">群内表演、打鸡血、CC上级</text>

    <text x="485" y="295" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">动机</text>
    <text x="485" y="325" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">最在意"老板知不知道我在解决"</text>
    <text x="485" y="350" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">表演给上级看，不是给平级看</text>

    <text x="485" y="405" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">识别信号</text>
    <text x="485" y="435" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">群聊中高频@上级，汇报"进展"</text>
    <text x="485" y="460" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">语气偏向"我在推动解决"</text>

    <rect x="485" y="500" width="330" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="500" y="520" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">应对：不抢戏，专注自身边界</text>

    <!-- 安全感 -->
    <rect x="860" y="110" width="360" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="860" y="110" width="360" height="70" fill="#B91C1C"/>
    <g transform="translate(880, 122)">
        <path d="M30,2 L55,12 L55,30 C55,42 42,52 30,58 C18,52 5,42 5,30 L5,12 Z" fill="#FFFFFF" fill-opacity="0.9"/>
    </g>
    <text x="950" y="155" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">安全感</text>

    <text x="885" y="210" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">典型动作</text>
    <text x="885" y="240" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">信息管控、建立依赖</text>

    <text x="885" y="295" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">动机</text>
    <text x="885" y="325" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">怕被替代，让别人依赖自己</text>
    <text x="885" y="350" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">掌控信息就是掌控不可替代性</text>

    <text x="885" y="405" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">识别信号</text>
    <text x="885" y="435" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">阻断他与上级的直接沟通</text>
    <text x="885" y="460" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">"别找供应商，我来对接"</text>

    <rect x="885" y="500" width="310" height="30" fill="#16A34A" fill-opacity="0.15"/>
    <text x="900" y="520" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">应对：建立独立渠道，不依赖他</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 权力内核章节</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">03</text>
</svg>
