<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心洞察</text>
    <text x="150" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">一句话定位</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">他的所有行为，都围绕三个诉求展开：控制权、展示权、安全感</text>

    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">02 / 12</text>

    <!-- 暗色背景上的大字 -->
    <text x="120" y="200" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" letter-spacing="2">POSITIONING STATEMENT</text>

    <!-- 大字主体 -->
    <text x="120" y="270" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="40" font-weight="bold">
        高压管理型业管
    </text>

    <text x="120" y="330" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24">
        擅长 <tspan fill="#E2725B" font-weight="bold">立规矩 + 三要素法</tspan>
    </text>

    <text x="120" y="380" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22">
        对上表演 · 对下施压 · 信息管控
    </text>

    <!-- 三个诉求卡片 -->
    <rect x="120" y="440" width="300" height="120" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="120" y="440" width="4" height="120" fill="#C41E3A"/>
    <text x="145" y="480" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">控制权</text>
    <text x="145" y="510" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">立规矩、阻断信息、责任下放</text>
    <text x="145" y="535" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">动机：刚接手需要"我在管"的信号</text>

    <rect x="450" y="440" width="300" height="120" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="450" y="440" width="4" height="120" fill="#E2725B"/>
    <text x="475" y="480" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">展示权</text>
    <text x="475" y="510" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">群内表演、打鸡血、CC上级</text>
    <text x="475" y="535" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">动机：最在意"老板知不知道"</text>

    <rect x="780" y="440" width="300" height="120" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="780" y="440" width="4" height="120" fill="#B91C1C"/>
    <text x="805" y="480" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">安全感</text>
    <text x="805" y="510" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">信息管控、建立依赖</text>
    <text x="805" y="535" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">动机：怕被替代，让别人依赖自己</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">02</text>
</svg>
