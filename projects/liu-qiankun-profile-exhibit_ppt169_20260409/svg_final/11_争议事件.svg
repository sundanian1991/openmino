<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">关键案例</text>
    <text x="170" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">争议事件 — 暴露真实性格</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">从争议事件看透他的底线：双重标准、公开攻击前任、选择性攻击</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">11 / 12</text>

    <!-- 三个争议事件卡片 -->
    <!-- 事件1: 双重标准 -->
    <rect x="60" y="110" width="1160" height="130" fill="#161B22" stroke="#B91C1C" stroke-width="1"/>
    <rect x="60" y="110" width="6" height="130" fill="#B91C1C"/>
    <text x="90" y="135" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">事件一：双重标准（03-25）</text>

    <text x="90" y="165" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刘乾坤自己当业管时，曾违规推动供应商拿钱，被内审查过。现在反过来 @李吉斌 质疑激励方案"基本是没用的方案"。自己干过更严重的事，用同样的事攻击前任。</text>

    <text x="90" y="200" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">手法：公开质疑 + 道德绑架 + CC上级 + 暗示"我接手后才发现的问题"</text>
    <text x="800" y="200" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">风险等级：★★★★★</text>

    <text x="90" y="225" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">年老师感受："挺可怕的，真的不可交"</text>

    <!-- 事件2: 公开攻击前任 -->
    <rect x="60" y="260" width="1160" height="130" fill="#161B22" stroke="#C41E3A" stroke-width="1"/>
    <rect x="60" y="260" width="6" height="130" fill="#C41E3A"/>
    <text x="90" y="285" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">事件二：公开攻击前任（03-25 深夜）</text>

    <text x="90" y="315" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">22:10 @李吉斌 + CC 上级，让前任在所有人面前难堪。刚接手就甩锅，暗示"遗留问题不是我的"。"当初怎么考虑的呢？"= 决策拷问，长期效果是"不如让我参与制定"。</text>

    <text x="90" y="350" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">李吉斌反击："这个方案当时是大家一起定的" + "你有什么资格说方案没用" → 刘乾坤软化</text>
    <text x="800" y="350" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">风险等级：★★★★</text>

    <text x="90" y="375" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">教训：面对强硬反击，他会退让</text>

    <!-- 事件3: 开门红带节奏 -->
    <rect x="60" y="410" width="1160" height="130" fill="#161B22" stroke="#E2725B" stroke-width="1"/>
    <rect x="60" y="410" width="6" height="130" fill="#E2725B"/>
    <text x="90" y="435" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">事件三：开门红带节奏（03-29）</text>

    <text x="90" y="465" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内密集同步激励问题，"激励拿不到钱，供应商就会大量流失"。道德绑架："影响1400个制鞋工人、5000多个家庭"。选择性攻击：只攻击服务组，不攻击策略组（激励是策略组定的）。</text>

    <text x="90" y="500" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">保护关系网：和刘伟佳关系好，策略组才是制定方，完全不提。夸大其词：实际"不会出现批量离职"</text>
    <text x="800" y="500" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">风险等级：★★★</text>

    <text x="90" y="525" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">教训：核实数据，不被情绪带节奏</text>

    <!-- 底部洞察 -->
    <rect x="60" y="570" width="1160" height="60" fill="#161B22" stroke="#E2725B" stroke-width="1"/>
    <rect x="60" y="570" width="6" height="60" fill="#E2725B"/>
    <text x="90" y="600" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">核心洞察：</text>
    <text x="195" y="600" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">他对别人做的事，自己可能也在做。双重标准是最大破绽。面对事实反击和强硬态度，他会退让。</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 争议事件</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">11</text>
</svg>
