<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">应对策略</text>
    <text x="170" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">年老师应对策略 — 见招拆招</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">核心原则：不接任务、边界清晰、信息独立、学习技巧</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">09 / 12</text>

    <!-- 左侧：核心原则 -->
    <rect x="60" y="110" width="360" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="60" y="110" width="360" height="45" fill="#C41E3A"/>
    <text x="240" y="140" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">核心原则</text>

    <rect x="80" y="175" width="320" height="60" fill="#1C2128"/>
    <rect x="80" y="175" width="4" height="60" fill="#C41E3A"/>
    <text x="100" y="200" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">1. 不主动背锅</text>
    <text x="100" y="225" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刘乾坤的问题直接传递</text>

    <rect x="80" y="250" width="320" height="60" fill="#1C2128"/>
    <rect x="80" y="250" width="4" height="60" fill="#E2725B"/>
    <text x="100" y="275" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">2. 边界清晰</text>
    <text x="100" y="300" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">周末不接@，工作日按流程</text>

    <rect x="80" y="325" width="320" height="60" fill="#1C2128"/>
    <rect x="80" y="325" width="4" height="60" fill="#E2725B"/>
    <text x="100" y="350" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">3. 信息独立</text>
    <text x="100" y="375" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">建立独立渠道，不依赖他拿数据</text>

    <rect x="80" y="400" width="320" height="60" fill="#1C2128"/>
    <rect x="80" y="400" width="4" height="60" fill="#16A34A"/>
    <text x="100" y="425" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">4. 学习技巧</text>
    <text x="100" y="450" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">立规矩、三要素法、数据说话</text>

    <!-- 右侧：话术对照表 -->
    <rect x="440" y="110" width="780" height="510" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="440" y="110" width="780" height="45" fill="#E2725B"/>
    <text x="830" y="140" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">话术对照 — 他怎么说 vs 我怎么回</text>

    <!-- 表头 -->
    <rect x="460" y="170" width="380" height="35" fill="#1C2128"/>
    <text x="650" y="193" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C41E3A">他的手法</text>
    <rect x="840" y="170" width="360" height="35" fill="#1C2128"/>
    <text x="1020" y="193" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#16A34A">年老师回应</text>

    <!-- 行1 -->
    <rect x="460" y="215" width="740" height="65" fill="#0D1117"/>
    <text x="480" y="240" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"帮我看下，我该如何解答"</text>
    <text x="480" y="265" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">抛问题，试探性转嫁</text>
    <text x="860" y="240" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">"你的想法是什么？我先听你的"</text>
    <text x="860" y="265" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不接任务，反问回去</text>

    <!-- 行2 -->
    <rect x="460" y="290" width="740" height="65" fill="#1C2128"/>
    <text x="480" y="315" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">周末@处理供应商问题</text>
    <text x="480" y="340" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">试探边界感</text>
    <text x="860" y="315" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">"收到，周一处理"</text>
    <text x="860" y="340" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">边界清晰，不解释</text>

    <!-- 行3 -->
    <rect x="460" y="365" width="740" height="65" fill="#0D1117"/>
    <text x="480" y="390" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"别找供应商，他们不如我们清楚"</text>
    <text x="480" y="415" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">两头堵，阻断信息</text>
    <text x="860" y="390" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">"理解，但我需要一线真实反馈"</text>
    <text x="860" y="415" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">建立独立渠道</text>

    <!-- 行4 -->
    <rect x="460" y="440" width="740" height="65" fill="#1C2128"/>
    <text x="480" y="465" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"辛苦兄弟多费心"（责任转嫁）</text>
    <text x="480" y="490" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">人情债+责任分散</text>
    <text x="860" y="465" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">"8个供应商，担心盯不细"</text>
    <text x="860" y="490" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">示弱+边界 ✅ 刘退让</text>

    <!-- 行5 -->
    <rect x="460" y="515" width="740" height="80" fill="#0D1117"/>
    <text x="480" y="540" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">危机渲染+责任锁定</text>
    <text x="480" y="565" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">升级为系统性问题</text>
    <text x="860" y="540" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">事实压危机 + 锁定卡点 + 踢球给方案</text>
    <text x="860" y="565" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">用专业语言说话，变"失控"为"具体流程问题"</text>
    <text x="860" y="583" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不接他的框架</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 应对策略</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">09</text>
</svg>
