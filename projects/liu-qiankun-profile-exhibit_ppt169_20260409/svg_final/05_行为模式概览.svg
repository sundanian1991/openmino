<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#E2725B"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">全景概览</text>
    <text x="150" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">核心行为模式 — 18 种战术动作</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">18 种模式按权力来源分组，风险等级用颜色区分</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">05 / 12</text>

    <!-- 图例 -->
    <rect x="960" y="100" width="12" height="12" fill="#B91C1C"/>
    <text x="976" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">风险</text>
    <rect x="1020" y="100" width="12" height="12" fill="#E2725B"/>
    <text x="1036" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">施压</text>
    <rect x="1090" y="100" width="12" height="12" fill="#6B7280"/>
    <text x="1106" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">中性</text>
    <rect x="1160" y="100" width="12" height="12" fill="#16A34A"/>
    <text x="1176" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#6B7280">可学</text>

    <!-- 四列暗色卡片 -->
    <!-- 列1: 规则权 -->
    <rect x="60" y="130" width="285" height="490" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="60" y="130" width="285" height="45" fill="#E2725B"/>
    <text x="202" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">规则权</text>

    <rect x="75" y="195" width="255" height="40" fill="#1C2128"/>
    <rect x="75" y="195" width="3" height="40" fill="#16A34A"/>
    <text x="90" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">7. 立规矩</text>

    <!-- 列2: 信息权 + 关系权 -->
    <rect x="365" y="130" width="285" height="490" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="365" y="130" width="285" height="45" fill="#C41E3A"/>
    <text x="507" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">信息权 · 关系权</text>

    <rect x="380" y="195" width="255" height="40" fill="#1C2128"/>
    <rect x="380" y="195" width="3" height="40" fill="#B91C1C"/>
    <text x="395" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">13. 两头堵</text>

    <rect x="380" y="250" width="255" height="40" fill="#1C2128"/>
    <rect x="380" y="250" width="3" height="40" fill="#E2725B"/>
    <text x="395" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">8. 拉拢圈人</text>

    <rect x="380" y="305" width="255" height="40" fill="#1C2128"/>
    <rect x="380" y="305" width="3" height="40" fill="#E2725B"/>
    <text x="395" y="330" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">12. 人情债管理</text>

    <!-- 列3: 注意权 + 施压权 -->
    <rect x="670" y="130" width="285" height="490" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="670" y="130" width="285" height="45" fill="#B91C1C"/>
    <text x="812" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">注意权 · 施压权</text>

    <rect x="685" y="195" width="255" height="40" fill="#1C2128"/>
    <rect x="685" y="195" width="3" height="40" fill="#E2725B"/>
    <text x="700" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">2. 群内表演</text>

    <rect x="685" y="250" width="255" height="40" fill="#1C2128"/>
    <rect x="685" y="250" width="3" height="40" fill="#E2725B"/>
    <text x="700" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">6. 任务下放+CC展示</text>

    <rect x="685" y="305" width="255" height="40" fill="#1C2128"/>
    <rect x="685" y="305" width="3" height="40" fill="#B91C1C"/>
    <text x="700" y="330" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">3. 公开锁定</text>

    <rect x="685" y="360" width="255" height="40" fill="#1C2128"/>
    <rect x="685" y="360" width="3" height="40" fill="#B91C1C"/>
    <text x="700" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">4. 高压管理</text>

    <rect x="685" y="415" width="255" height="40" fill="#1C2128"/>
    <rect x="685" y="415" width="3" height="40" fill="#B91C1C"/>
    <text x="700" y="440" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">9. 追责转嫁</text>

    <rect x="685" y="470" width="255" height="40" fill="#1C2128"/>
    <rect x="685" y="470" width="3" height="40" fill="#B91C1C"/>
    <text x="700" y="495" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">10. 加压链</text>

    <!-- 列4: 组合拳 -->
    <rect x="975" y="130" width="245" height="490" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="975" y="130" width="245" height="45" fill="#6B7280"/>
    <text x="1097" y="160" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">组合拳</text>

    <rect x="990" y="195" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="195" width="3" height="40" fill="#6B7280"/>
    <text x="1005" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">1. 抛问题</text>

    <rect x="990" y="250" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="250" width="3" height="40" fill="#6B7280"/>
    <text x="1005" y="275" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">5. 正面对冲</text>

    <rect x="990" y="305" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="305" width="3" height="40" fill="#6B7280"/>
    <text x="1005" y="330" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">11. 借力打力</text>

    <rect x="990" y="360" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="360" width="3" height="40" fill="#B91C1C"/>
    <text x="1005" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">14. 群聊闹事</text>

    <rect x="990" y="415" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="415" width="3" height="40" fill="#B91C1C"/>
    <text x="1005" y="440" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">15. 选择性攻击</text>

    <rect x="990" y="470" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="470" width="3" height="40" fill="#6B7280"/>
    <text x="1005" y="495" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">16. 质疑数据降温</text>

    <rect x="990" y="525" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="525" width="3" height="40" fill="#6B7280"/>
    <text x="1005" y="550" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">17. 挖人试探</text>

    <rect x="990" y="580" width="215" height="40" fill="#1C2128"/>
    <rect x="990" y="580" width="3" height="40" fill="#6B7280"/>
    <text x="1005" y="605" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#E5E7EB">18. 镜像过敏</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 18 种行为模式</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">05</text>
</svg>
