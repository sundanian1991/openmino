<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C41E3A"/>
            <stop offset="100%" stop-color="#E2725B"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#0D1117"/>
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)"/>

    <rect x="40" y="20" width="1200" height="60" fill="#161B22"/>
    <rect x="40" y="20" width="6" height="60" fill="#16A34A"/>
    <text x="60" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">可学内容</text>
    <text x="170" y="48" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">可学习内容 — 取其精华，去其糟粕</text>
    <text x="60" y="72" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">从刘乾坤身上可以学到什么？4 种核心技巧 + 与年老师风格的差异</text>
    <text x="1200" y="65" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">10 / 12</text>

    <!-- 四列暗色卡片 - 可学技巧 -->
    <!-- 卡片1: 立规矩 -->
    <rect x="60" y="110" width="285" height="350" fill="#161B22" stroke="#16A34A" stroke-width="1"/>
    <rect x="60" y="110" width="285" height="45" fill="#16A34A"/>
    <text x="202" y="140" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">立规矩 ✓</text>

    <text x="80" y="185" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">先定规则后办事</text>

    <text x="80" y="220" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">后续管理是"执行既定规则"</text>
    <text x="80" y="245" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">不是"个人施压"，管理有</text>
    <text x="80" y="270" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">合法性基础</text>

    <text x="80" y="320" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">适用场景</text>
    <text x="80" y="345" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">接手新业务、管理新团队</text>
    <text x="80" y="370" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">建立长期管理机制</text>

    <rect x="80" y="400" width="245" height="40" fill="#16A34A" fill-opacity="0.15"/>
    <text x="95" y="417" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">规则越具体越好，</text>
    <text x="95" y="435" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">可考核可追溯</text>

    <!-- 卡片2: 三要素法 -->
    <rect x="365" y="110" width="285" height="350" fill="#161B22" stroke="#16A34A" stroke-width="1"/>
    <rect x="365" y="110" width="285" height="45" fill="#16A34A"/>
    <text x="507" y="140" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">三要素法 ✓</text>

    <text x="385" y="185" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">问题 → 原因+目标+举措</text>

    <text x="385" y="220" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让供应商自己承诺，</text>
    <text x="385" y="245" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">完不成有把柄。不替别人</text>
    <text x="385" y="270" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">给方案，让对方自己想办法</text>

    <text x="385" y="320" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">适用场景</text>
    <text x="385" y="345" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">供应商管理、推动执行</text>
    <text x="385" y="370" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">绩效不达标的整改</text>

    <rect x="385" y="400" width="245" height="40" fill="#16A34A" fill-opacity="0.15"/>
    <text x="400" y="417" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让对方承诺比直接</text>
    <text x="400" y="435" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">给方案更有约束力</text>

    <!-- 卡片3: 数据说话 -->
    <rect x="670" y="110" width="285" height="350" fill="#161B22" stroke="#16A34A" stroke-width="1"/>
    <rect x="670" y="110" width="285" height="45" fill="#16A34A"/>
    <text x="812" y="140" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">数据说话 ✓</text>

    <text x="690" y="185" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">精确数据展示+公开施压</text>

    <text x="690" y="220" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用数据代替主观判断，</text>
    <text x="690" y="245" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">精确到小数点。数据面前</text>
    <text x="690" y="270" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">没人能反驳事实</text>

    <text x="690" y="320" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">适用场景</text>
    <text x="690" y="345" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">汇报、驱动、施压</text>
    <text x="690" y="370" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">任何需要说服的场景</text>

    <rect x="690" y="400" width="245" height="40" fill="#16A34A" fill-opacity="0.15"/>
    <text x="705" y="417" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">数据是最好的武器，</text>
    <text x="705" y="435" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">比任何道理都有力</text>

    <!-- 卡片4: 机制先行 -->
    <rect x="975" y="110" width="245" height="350" fill="#161B22" stroke="#16A34A" stroke-width="1"/>
    <rect x="975" y="110" width="245" height="45" fill="#16A34A"/>
    <text x="1097" y="140" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">机制先行 ✓</text>

    <text x="995" y="185" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">先建机制再谈业务</text>

    <text x="995" y="220" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">不急于谈业务增长，</text>
    <text x="995" y="245" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">先要人员培养、汰换、</text>
    <text x="995" y="270" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">数据追踪、策略、荣誉</text>

    <text x="995" y="320" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">适用场景</text>
    <text x="995" y="345" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">建立长期管理体系</text>
    <text x="995" y="370" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">让供应商自己建系统</text>

    <rect x="995" y="400" width="205" height="40" fill="#16A34A" fill-opacity="0.15"/>
    <text x="1010" y="417" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">干不好有把柄，</text>
    <text x="1010" y="435" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">体系自运转</text>

    <!-- 底部：刘乾坤 vs 年老师 对比 -->
    <rect x="60" y="500" width="1160" height="120" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="640" y="530" text-anchor="middle" fill="#E2725B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">刘乾坤 vs 年老师 — 核心差异</text>

    <text x="80" y="565" fill="#C41E3A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">刘乾坤：</text>
    <text x="160" y="565" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 施压 → 让供应商自己想办法</text>

    <text x="80" y="600" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">年老师：</text>
    <text x="160" y="600" fill="#E5E7EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 提要求 → 给支持 → 让供应商自己想办法 → 长期合作</text>

    <line x1="40" y1="660" x2="1240" y2="660" stroke="#21262D" stroke-width="1"/>
    <text x="40" y="695" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 可学习内容</text>
    <text x="640" y="695" text-anchor="middle" fill="#E2725B" font-family="Arial, sans-serif" font-size="10">CONFIDENTIAL</text>
    <text x="1220" y="695" text-anchor="end" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">10</text>
</svg>
