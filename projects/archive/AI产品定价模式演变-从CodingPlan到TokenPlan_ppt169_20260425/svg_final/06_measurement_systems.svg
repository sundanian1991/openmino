    <path fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="1" d="M70,560 H1150 A10,10 0 0 1 1160,570 V630 A10,10 0 0 1 1150,640 H70 A10,10 0 0 1 60,630 V570 A10,10 0 0 1 70,560 Z" />
