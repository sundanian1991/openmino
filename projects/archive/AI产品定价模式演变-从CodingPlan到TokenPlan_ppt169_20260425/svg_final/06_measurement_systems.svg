    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A1A2E">
        五种计量体系并存 — 最大信息壁垒
    </text>

    <path fill="#EF4444" fill-opacity="0.08" d="M66,115 H1154 A6,6 0 0 1 1160,121 V141 A6,6 0 0 1 1154,147 H66 A6,6 0 0 1 60,141 V121 A6,6 0 0 1 66,115 Z" />
