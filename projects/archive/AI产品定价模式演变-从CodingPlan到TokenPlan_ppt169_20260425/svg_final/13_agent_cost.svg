<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="6" fill="#EF4444" />

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#EF4444" letter-spacing="2">COST STRUCTURE</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A1A2E">
        Agent 场景下，订阅费是地板不是天花板
    </text>

    <path fill="#EF4444" fill-opacity="0.08" d="M66,112 H1154 A6,6 0 0 1 1160,118 V138 A6,6 0 0 1 1154,144 H66 A6,6 0 0 1 60,138 V118 A6,6 0 0 1 66,112 Z" />
    <text x="610" y="134" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#EF4444" font-weight="600">实际账单往往是标价的 2-5 倍</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        
        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M70,170 H230 A10,10 0 0 1 240,180 V280 A10,10 0 0 1 230,290 H70 A10,10 0 0 1 60,280 V180 A10,10 0 0 1 70,170 Z" />
        <text x="150" y="205" text-anchor="middle" font-size="13" fill="#64748B">8个月消耗</text>
        <text x="150" y="245" text-anchor="middle" font-size="36" font-weight="bold" fill="#D97757">100亿</text>
        <text x="150" y="270" text-anchor="middle" font-size="13" fill="#64748B">Token</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M270,170 H430 A10,10 0 0 1 440,180 V280 A10,10 0 0 1 430,290 H270 A10,10 0 0 1 260,280 V180 A10,10 0 0 1 270,170 Z" />
        <text x="350" y="205" text-anchor="middle" font-size="13" fill="#64748B">API 价格</text>
        <text x="350" y="245" text-anchor="middle" font-size="36" font-weight="bold" fill="#EF4444">$15K+</text>
        <text x="350" y="270" text-anchor="middle" font-size="13" fill="#64748B">USD</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M470,170 H630 A10,10 0 0 1 640,180 V280 A10,10 0 0 1 630,290 H470 A10,10 0 0 1 460,280 V180 A10,10 0 0 1 470,170 Z" />
        <text x="550" y="205" text-anchor="middle" font-size="13" fill="#64748B">Max Plan 花费</text>
        <text x="550" y="245" text-anchor="middle" font-size="36" font-weight="bold" fill="#10B981">$800</text>
        <text x="550" y="270" text-anchor="middle" font-size="13" fill="#10B981">省 93%</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M670,170 H830 A10,10 0 0 1 840,180 V280 A10,10 0 0 1 830,290 H670 A10,10 0 0 1 660,280 V180 A10,10 0 0 1 670,170 Z" />
        <text x="750" y="205" text-anchor="middle" font-size="13" fill="#64748B">Token 浪费率</text>
        <text x="750" y="245" text-anchor="middle" font-size="36" font-weight="bold" fill="#EF4444">70%</text>
        <text x="750" y="270" text-anchor="middle" font-size="13" fill="#64748B">DEV Community</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M870,170 H1030 A10,10 0 0 1 1040,180 V280 A10,10 0 0 1 1030,290 H870 A10,10 0 0 1 860,280 V180 A10,10 0 0 1 870,170 Z" />
        <text x="950" y="205" text-anchor="middle" font-size="13" fill="#64748B">超支案例</text>
        <text x="950" y="245" text-anchor="middle" font-size="36" font-weight="bold" fill="#D97757">$350</text>
        <text x="950" y="270" text-anchor="middle" font-size="13" fill="#64748B">Cursor 一周超支</text>

        
        <text x="60" y="330" font-size="20" font-weight="bold" fill="#1A1A2E">Agent 场景 Token 消耗构成</text>

        <path fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" d="M72,350 H1208 A12,12 0 0 1 1220,362 V558 A12,12 0 0 1 1208,570 H72 A12,12 0 0 1 60,558 V362 A12,12 0 0 1 72,350 Z" />

        
        <g>
            <text x="100" y="385" font-size="14" fill="#64748B">文件读取</text>
            <path fill="#D97757" d="M204,372 H776 A4,4 0 0 1 780,376 V388 A4,4 0 0 1 776,392 H204 A4,4 0 0 1 200,388 V376 A4,4 0 0 1 204,372 Z" />
            <text x="790" y="387" font-size="14" font-weight="600" fill="#D97757">35-45%</text>

            <text x="100" y="420" font-size="14" fill="#64748B">工具输出</text>
            <path fill="#4A90D9" d="M204,407 H506 A4,4 0 0 1 510,411 V423 A4,4 0 0 1 506,427 H204 A4,4 0 0 1 200,423 V411 A4,4 0 0 1 204,407 Z" />
            <text x="520" y="422" font-size="14" font-weight="600" fill="#4A90D9">15-25%</text>

            <text x="100" y="455" font-size="14" fill="#64748B">上下文重发</text>
            <path fill="#10B981" d="M204,442 H476 A4,4 0 0 1 480,446 V458 A4,4 0 0 1 476,462 H204 A4,4 0 0 1 200,458 V446 A4,4 0 0 1 204,442 Z" />
            <text x="490" y="457" font-size="14" font-weight="600" fill="#10B981">15-20%</text>

            <text x="100" y="490" font-size="14" fill="#64748B">推理计算</text>
            <path fill="#64748B" d="M204,477 H376 A4,4 0 0 1 380,481 V493 A4,4 0 0 1 376,497 H204 A4,4 0 0 1 200,493 V481 A4,4 0 0 1 204,477 Z" />
            <text x="390" y="492" font-size="14" font-weight="600" fill="#64748B">10-15%</text>

            <text x="100" y="525" font-size="14" fill="#64748B">代码生成</text>
            <path fill="#E2E8F0" d="M204,512 H296 A4,4 0 0 1 300,516 V528 A4,4 0 0 1 296,532 H204 A4,4 0 0 1 200,528 V516 A4,4 0 0 1 204,512 Z" />
            <text x="310" y="527" font-size="14" font-weight="600" fill="#64748B">5-15%</text>
        </g>

        <text x="850" y="380" font-size="13" fill="#EF4444" font-weight="600">仅 5-15% 用于代码生成</text>
        <text x="850" y="405" font-size="13" fill="#64748B">85-95% 是 Agent 上下文开销</text>
    </g>

    <path fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-width="1" d="M70,600 H1210 A10,10 0 0 1 1220,610 V645 A10,10 0 0 1 1210,655 H70 A10,10 0 0 1 60,645 V610 A10,10 0 0 1 70,600 Z" />
    <text x="90" y="625" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#EF4444">含义</text>
    <text x="90" y="645" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1A1A2E">Agent 时代，用户成本会指数级增长。定价模式必须适应这个现实。Cursor 2025-06 转 credit-based 引发退款风波就是证明。</text>

    <text x="60" y="685" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">数据来源：DEV Community 研究、Cursor 官方公告、用户社区报告</text>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">13 / 15</text>
</svg>