<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="barGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D97757"/>
            <stop offset="100%" stop-color="#E8956F"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="6" fill="#D97757"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="2">PRICING</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A1A2E">
        六大平台入门档定价全景图
    </text>

    <rect x="60" y="115" width="1100" height="32" fill="#D97757" fill-opacity="0.08" rx="6"/>
    <text x="610" y="137" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#D97757" font-weight="600">同样 ¥40-50/月，实际可用量差异巨大 — 直接比数字毫无意义</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <text x="80" y="200" font-size="16" font-weight="600" fill="#1A1A2E">平台</text>
        <text x="350" y="200" font-size="16" font-weight="600" fill="#1A1A2E">月费</text>
        <text x="450" y="200" font-size="16" font-weight="600" fill="#1A1A2E">计量方式</text>
        <text x="780" y="200" font-size="16" font-weight="600" fill="#1A1A2E">额度</text>
        <text x="1020" y="200" font-size="16" font-weight="600" fill="#1A1A2E">实际等效</text>

        <line x1="60" y1="210" x2="1200" y2="210" stroke="#E2E8F0" stroke-width="1"/>

        <rect x="60" y="218" width="1140" height="52" fill="#F8FAFC" rx="8"/>
        <text x="80" y="250" font-size="16" font-weight="600" fill="#1A1A2E">MiniMax Starter</text>
        <text x="350" y="250" font-size="18" font-weight="bold" fill="#D97757">¥29</text>
        <text x="450" y="250" font-size="15" fill="#64748B">Prompt (5h窗口)</text>
        <text x="780" y="250" font-size="14" fill="#1A1A2E">40 prompts/5h</text>
        <text x="1020" y="250" font-size="13" fill="#64748B">连续每5h 40次</text>

        <rect x="60" y="278" width="1140" height="52" fill="#FFFFFF" rx="8"/>
        <text x="80" y="310" font-size="16" font-weight="600" fill="#1A1A2E">腾讯云 Token Lite</text>
        <text x="350" y="310" font-size="18" font-weight="bold" fill="#D97757">¥39</text>
        <text x="450" y="310" font-size="15" fill="#64748B">Token</text>
        <text x="780" y="310" font-size="14" fill="#1A1A2E">3500万 Token</text>
        <text x="1020" y="310" font-size="13" fill="#64748B">~70轮深度问答</text>

        <rect x="60" y="338" width="1140" height="52" fill="#F8FAFC" rx="8"/>
        <text x="80" y="370" font-size="16" font-weight="600" fill="#1A1A2E">小米 MiMo Lite</text>
        <text x="350" y="370" font-size="18" font-weight="bold" fill="#D97757">¥39</text>
        <text x="450" y="370" font-size="15" fill="#64748B">Credit (2x倍率)</text>
        <text x="780" y="370" font-size="14" fill="#1A1A2E">6000万 Credits</text>
        <text x="1020" y="370" font-size="13" fill="#64748B">~3000万Token等效</text>

        <rect x="60" y="398" width="1140" height="52" fill="#FFFFFF" rx="8"/>
        <text x="80" y="430" font-size="16" font-weight="600" fill="#1A1A2E">阿里百炼 Lite</text>
        <text x="350" y="430" font-size="18" font-weight="bold" fill="#D97757">¥40</text>
        <text x="450" y="430" font-size="15" fill="#64748B">API请求</text>
        <text x="780" y="430" font-size="14" fill="#1A1A2E">18000次/月</text>
        <text x="1020" y="430" font-size="13" fill="#64748B">~20-120次提问/天</text>

        <rect x="60" y="458" width="1140" height="52" fill="#F8FAFC" rx="8"/>
        <text x="80" y="490" font-size="16" font-weight="600" fill="#1A1A2E">Kimi Andante</text>
        <text x="350" y="490" font-size="18" font-weight="bold" fill="#D97757">¥49</text>
        <text x="450" y="490" font-size="15" fill="#64748B">Token (3倍活动)</text>
        <text x="780" y="490" font-size="14" fill="#1A1A2E">未公开</text>
        <text x="1020" y="490" font-size="13" fill="#64748B">按Token消耗</text>

        <rect x="60" y="518" width="1140" height="52" fill="#FFFFFF" rx="8"/>
        <text x="80" y="550" font-size="16" font-weight="600" fill="#1A1A2E">智谱 GLM Lite</text>
        <text x="350" y="550" font-size="18" font-weight="bold" fill="#D97757">¥49</text>
        <text x="450" y="550" font-size="15" fill="#64748B">Prompt (5h窗口)</text>
        <text x="780" y="550" font-size="14" fill="#1A1A2E">~80 prompts/5h, 2400/月</text>
        <text x="1020" y="550" font-size="13" fill="#64748B">每天~80次提问</text>
    </g>

    <rect x="60" y="595" width="1100" height="65" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-width="1" rx="10"/>
    <text x="90" y="620" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#EF4444">关键发现</text>
    <text x="90" y="645" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#1A1A2E">同样 ¥40-50/月，阿里百炼给18000次API请求 vs MiniMax给40 prompts/5h（≈1200 API/5h），看起来百炼多15倍，但实际消耗完全不同</text>

    <text x="60" y="680" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">数据来源：各厂商官方公告 2026-04 | 90%开发者在计量对比上踩坑</text>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">5 / 15</text>
</svg>
