<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#F8FAFC"/>
        </linearGradient>
        <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D97757"/>
            <stop offset="50%" stop-color="#4A90D9"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="6" fill="#D97757"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="2">TIMELINE</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A1A2E">
        两年七阶段，定价模式快速演进
    </text>

    <rect x="60" y="120" width="1100" height="36" fill="#D97757" fill-opacity="0.08" rx="6"/>
    <text x="610" y="143" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#D97757" font-weight="600">核心结论：Coding Plan是过渡产品，Token Plan是终态</text>

    <line x1="100" y1="200" x2="1180" y2="200" stroke="url(#timelineGrad)" stroke-width="4" stroke-linecap="round"/>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <circle cx="100" cy="200" r="12" fill="#D97757"/>
        <text x="100" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="100" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">2024Q4</text>
        <text x="100" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">DeepSeek带头降价</text>
        <text x="100" y="248" text-anchor="middle" font-size="11" fill="#64748B">百万Token几毛钱</text>

        <circle cx="255" cy="200" r="12" fill="#D97757"/>
        <text x="255" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="255" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">2025Q4</text>
        <text x="255" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">智谱推出Coding Plan</text>
        <text x="255" y="248" text-anchor="middle" font-size="11" fill="#64748B">固定月费订阅制</text>

        <circle cx="410" cy="200" r="12" fill="#D97757"/>
        <text x="410" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="410" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">2025H2</text>
        <text x="410" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">补贴收紧</text>
        <text x="410" y="248" text-anchor="middle" font-size="11" fill="#64748B">限购/停售低档</text>

        <circle cx="565" cy="200" r="12" fill="#4A90D9"/>
        <text x="565" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">4</text>
        <text x="565" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">2026-01</text>
        <text x="565" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">Kimi切换Token计量</text>
        <text x="565" y="248" text-anchor="middle" font-size="11" fill="#64748B">从Prompt到Token</text>

        <circle cx="720" cy="200" r="12" fill="#4A90D9"/>
        <text x="720" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">5</text>
        <text x="720" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">2026-02</text>
        <text x="720" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">OpenClaw爆火</text>
        <text x="720" y="248" text-anchor="middle" font-size="11" fill="#64748B">Token消耗6-10倍</text>

        <circle cx="875" cy="200" r="12" fill="#4A90D9"/>
        <text x="875" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">6</text>
        <text x="875" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">2026-03</text>
        <text x="875" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">MiniMax更名Token Plan</text>
        <text x="875" y="248" text-anchor="middle" font-size="11" fill="#64748B">腾讯最后入局</text>

        <circle cx="1040" cy="200" r="12" fill="#10B981"/>
        <text x="1040" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">7</text>
        <text x="1040" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">2026-04</text>
        <text x="1040" y="230" text-anchor="middle" font-size="12" fill="#1A1A2E">阿里企业版Token Plan</text>
        <text x="1040" y="248" text-anchor="middle" font-size="11" fill="#64748B">小米极低价入局</text>
    </g>

    <text x="60" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E">关键驱动事件</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <rect x="60" y="335" width="560" height="100" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="60" y="335" width="560" height="4" fill="#D97757" rx="2"/>
        <text x="90" y="370" font-size="18" font-weight="600" fill="#1A1A2E">OpenClaw 爆火</text>
        <text x="90" y="395" font-size="15" fill="#64748B">GitHub 355K stars，Agent自动循环调用</text>
        <text x="90" y="418" font-size="15" fill="#64748B">Token消耗增长6-10倍，阿里云算力告急</text>

        <rect x="660" y="335" width="560" height="100" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="660" y="335" width="560" height="4" fill="#EF4444" rx="2"/>
        <text x="690" y="370" font-size="18" font-weight="600" fill="#1A1A2E">Anthropic 收缩</text>
        <text x="690" y="395" font-size="15" fill="#64748B">2026-04 从标准订阅移除OpenClaw访问</text>
        <text x="690" y="418" font-size="15" fill="#64748B">Agent成本撑不住了，标志性收紧事件</text>

        <rect x="60" y="460" width="560" height="100" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="60" y="460" width="560" height="4" fill="#4A90D9" rx="2"/>
        <text x="90" y="495" font-size="18" font-weight="600" fill="#1A1A2E">DeepSeek V4 发布</text>
        <text x="90" y="520" font-size="15" fill="#64748B">1.6T参数仅激活49B，成本暴降73%</text>
        <text x="90" y="543" font-size="15" fill="#64748B">适配华为昇腾+寒武纪，开源重塑定价权</text>

        <rect x="660" y="460" width="560" height="100" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="660" y="460" width="560" height="4" fill="#10B981" rx="2"/>
        <text x="690" y="495" font-size="18" font-weight="600" fill="#1A1A2E">华为昇腾 950 量产</text>
        <text x="690" y="520" font-size="15" fill="#64748B">FP4算力2.87倍H20，定价仅1/3</text>
        <text x="690" y="543" font-size="15" fill="#64748B">芯片供给直接绑定定价天花板</text>
    </g>

    <text x="60" y="610" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#64748B">数据来源：各厂商官方公告、OpenRouter、IDC预测、伯恩斯坦研究</text>

    <text x="640" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">4 / 15</text>
</svg>
