    </text>

    <text x="640" y="310" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF">
        谢谢
    </text>

    <rect x="540" y="350" width="200" height="3" fill="url(#accentGradient)" rx="1.5"/>

    <text x="640" y="410" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.7">
