    </text>

    <rect x="440" y="460" width="400" height="120" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" rx="12"/>

    <text x="640" y="505" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" fill-opacity="0.85">
        核心三件事
    </text>
    <text x="640" y="532" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.65">
