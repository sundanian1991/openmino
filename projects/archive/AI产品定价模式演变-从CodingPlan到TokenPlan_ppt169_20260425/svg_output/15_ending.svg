    </text>
    <text x="640" y="558" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.5">
        2026-04-25
    </text>

    <rect x="60" y="640" width="1160" height="1" fill="#FFFFFF" fill-opacity="0.1"/>

    <text x="60" y="680" font-family="Arial, sans-serif" font-size="14" fill="#64748B">基于国内AI大模型厂商定价策略分析</text>
    <text x="1220" y="680" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#64748B">AI Pricing Evolution 2026</text>
