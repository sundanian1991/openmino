<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="6" fill="#D97757"/>

    <text x="60" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#D97757" letter-spacing="2">METRICS</text>

    <text x="60" y="95" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A1A2E">
        五种计量体系并存 — 最大信息壁垒
    </text>

    <rect x="60" y="115" width="1100" height="32" fill="#EF4444" fill-opacity="0.08" rx="6"/>
    <text x="610" y="137" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#EF4444" font-weight="600">直接比数字毫无意义，90%开发者踩坑</text>

    <g font-family="Microsoft YaHei, Arial, sans-serif">
        <rect x="60" y="170" width="220" height="190" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="60" y="170" width="220" height="5" fill="#EF4444" rx="2"/>
        <text x="170" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#EF4444">API 请求次数</text>
        <text x="80" y="235" font-size="13" fill="#1A1A2E">采用者：阿里/火山/腾讯</text>
        <text x="80" y="260" font-size="13" fill="#64748B">1提问 = 5-30次API</text>
        <text x="80" y="285" font-size="13" fill="#64748B">数字大但消耗不透明</text>
        <rect x="80" y="310" width="60" height="24" fill="#EF4444" fill-opacity="0.1" rx="12"/>
        <text x="110" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#EF4444">透明度:低</text>

        <rect x="300" y="170" width="220" height="190" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="300" y="170" width="220" height="5" fill="#D97757" rx="2"/>
        <text x="410" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#D97757">Prompt 次数</text>
        <text x="320" y="235" font-size="13" fill="#1A1A2E">采用者：智谱/MiniMax早期</text>
        <text x="320" y="260" font-size="13" fill="#64748B">1 Prompt≈1200-1600 API</text>
        <text x="320" y="285" font-size="13" fill="#64748B">比API次数直观</text>
        <rect x="320" y="310" width="60" height="24" fill="#D97757" fill-opacity="0.1" rx="12"/>
        <text x="350" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#D97757">透明度:中</text>

        <rect x="540" y="170" width="220" height="190" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="540" y="170" width="220" height="5" fill="#10B981" rx="2"/>
        <text x="650" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#10B981">Token 计量</text>
        <text x="560" y="235" font-size="13" fill="#1A1A2E">采用者：Kimi/MiniMax新版</text>
        <text x="560" y="260" font-size="13" fill="#64748B">按输入输出Token计费</text>
        <text x="560" y="285" font-size="13" fill="#64748B">最透明，用户难预估</text>
        <rect x="560" y="310" width="60" height="24" fill="#10B981" fill-opacity="0.1" rx="12"/>
        <text x="590" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981">透明度:高</text>

        <rect x="780" y="170" width="220" height="190" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="780" y="170" width="220" height="5" fill="#4A90D9" rx="2"/>
        <text x="890" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#4A90D9">Credit 计量</text>
        <text x="800" y="235" font-size="13" fill="#1A1A2E">采用者：Cursor/小米/阿里</text>
        <text x="800" y="260" font-size="13" fill="#64748B">统一Credit池，不同倍率</text>
        <text x="800" y="285" font-size="13" fill="#64748B">抽象但可预测</text>
        <rect x="800" y="310" width="60" height="24" fill="#4A90D9" fill-opacity="0.1" rx="12"/>
        <text x="830" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">透明度:中</text>

        <rect x="1020" y="170" width="220" height="190" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="1020" y="170" width="220" height="5" fill="#64748B" rx="2"/>
        <text x="1130" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#64748B">时间窗口配额</text>
        <text x="1040" y="235" font-size="13" fill="#1A1A2E">采用者：智谱/Claude</text>
        <text x="1040" y="260" font-size="13" fill="#64748B">每5小时限额+周/月上限</text>
        <text x="1040" y="285" font-size="13" fill="#64748B">限制节奏而非总量</text>
        <rect x="1040" y="310" width="60" height="24" fill="#64748B" fill-opacity="0.1" rx="12"/>
        <text x="1070" y="327" text-anchor="middle" font-size="12" font-weight="600" fill="#64748B">透明度:中</text>
    </g>

    <text x="60" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E">计量单位演变趋势</text>

    <g>
        <rect x="60" y="420" width="1160" height="60" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="10"/>
        <rect x="60" y="420" width="290" height="60" fill="#4A90D9" fill-opacity="0.1" rx="10"/>
        <text x="205" y="455" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#4A90D9">API 请求次数</text>
        <polygon points="370,455 358,448 358,462" fill="#64748B"/>
        <text x="370" y="450" text-anchor="middle" font-size="10" fill="#64748B"></text>

        <rect x="380" y="420" width="290" height="60" fill="#D97757" fill-opacity="0.1" rx="10"/>
        <text x="525" y="455" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#D97757">Prompt 次数</text>

        <polygon points="690,455 678,448 678,462" fill="#64748B"/>

        <rect x="700" y="420" width="290" height="60" fill="#10B981" fill-opacity="0.1" rx="10"/>
        <text x="845" y="455" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#10B981">Token / Credit</text>

        <polygon points="1010,455 998,448 998,462" fill="#64748B"/>

        <rect x="1020" y="420" width="200" height="60" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="2" rx="10"/>
        <text x="1120" y="455" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#10B981">统一 Credits</text>
    </g>

    <text x="640" y="530" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="600" fill="#1A1A2E">方向：越来越透明、越来越可预测</text>

    <rect x="60" y="560" width="1100" height="80" fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="1" rx="10"/>
    <text x="90" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#4A90D9">Agent 场景消耗</text>
    <text x="90" y="615" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#1A1A2E">文件读取 35-45% | 工具输出 15-25% | 上下文重发 15-20% | 推理 10-15% | 代码生成仅 5-15%</text>

    <text x="60" y="670" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#64748B">数据来源：DEV Community 研究、OpenRouter 公开数据、Cursor 官方</text>

    <text x="640" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">6 / 15</text>
</svg>
