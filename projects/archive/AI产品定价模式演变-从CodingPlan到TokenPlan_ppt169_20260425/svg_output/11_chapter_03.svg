<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A1A2E"/>
            <stop offset="50%" stop-color="#16213E"/>
            <stop offset="100%" stop-color="#0F0F1A"/>
        </linearGradient>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#4A90D9"/>
        </linearGradient>
        <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1280" height="720" fill="url(#bgGradient)"/>

    <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1">
        <line x1="0" y1="180" x2="1280" y2="180"/>
        <line x1="0" y1="360" x2="1280" y2="360"/>
        <line x1="0" y1="540" x2="1280" y2="540"/>
        <line x1="320" y1="0" x2="320" y2="720"/>
        <line x1="640" y1="0" x2="640" y2="720"/>
        <line x1="960" y1="0" x2="960" y2="720"/>
    </g>

    <ellipse cx="640" cy="360" rx="400" ry="300" fill="url(#glowGreen)"/>

    <circle cx="200" cy="200" r="80" fill="#10B981" fill-opacity="0.05"/>
    <circle cx="1080" cy="520" r="100" fill="#D97757" fill-opacity="0.05"/>

    <text x="640" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="#FFFFFF" fill-opacity="0.03">03</text>

    <text x="640" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#10B981" letter-spacing="4">SECTION 03</text>

    <rect x="540" y="320" width="200" height="3" fill="url(#accentGradient)" rx="1.5"/>

    <text x="640" y="390" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">
        能提炼什么
    </text>

    <text x="640" y="445" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.7">
        洞察层 — 五条可复用的定价模式规律
    </text>

    <rect x="60" y="650" width="1160" height="1" fill="#FFFFFF" fill-opacity="0.1"/>
    <text x="640" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748B">11 / 15</text>
</svg>
