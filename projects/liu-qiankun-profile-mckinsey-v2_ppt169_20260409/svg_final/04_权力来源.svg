<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <!-- Takeaway bar -->
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">权力来源</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">五种权力来源，从底层规则到表层施压</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">04 / 12</text>
    <!-- 五列卡片 -->
    <rect x="40" y="90" width="240" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="40" y="90" width="240" height="50" fill="#7B1E3B"/>
    <text x="60" y="122" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">规则权</text>
    <text x="60" y="170" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">立规矩</text>
    <text x="60" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">机制先行，让后续变成"按规则办事"</text>
    <text x="60" y="255" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">应对</text>
    <text x="60" y="285" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">确认规则合理性</text>

    <rect x="300" y="90" width="240" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="300" y="90" width="240" height="50" fill="#9B2C2C"/>
    <text x="320" y="122" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">信息权</text>
    <text x="320" y="170" fill="#9B2C2C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">两头堵</text>
    <text x="320" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">阻断信息，让对手只能依赖自己获取数据</text>
    <text x="320" y="255" fill="#9B2C2C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">应对</text>
    <text x="320" y="285" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">建立独立信息渠道</text>

    <rect x="560" y="90" width="240" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="560" y="90" width="240" height="50" fill="#B91C1C"/>
    <text x="580" y="122" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">关系权</text>
    <text x="580" y="170" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">人情债</text>
    <text x="580" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">拉拢圈人、人情债管理，主动让利换配合</text>
    <text x="580" y="255" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">应对</text>
    <text x="580" y="285" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">接受但不欠人情</text>

    <rect x="820" y="90" width="240" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="820" y="90" width="240" height="50" fill="#DC2626"/>
    <text x="840" y="122" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">注意权</text>
    <text x="840" y="170" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">刷存在感</text>
    <text x="840" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内表演、打鸡血，消息多发在有上级的群</text>
    <text x="840" y="255" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">应对</text>
    <text x="840" y="285" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不抢戏，专注边界</text>

    <rect x="1080" y="90" width="160" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="1080" y="90" width="160" height="50" fill="#B91C1C"/>
    <text x="1095" y="122" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">施压权</text>
    <text x="1095" y="170" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">高压管理</text>
    <text x="1095" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">公开锁定、制造回复压力</text>
    <text x="1095" y="255" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">应对</text>
    <text x="1095" y="285" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">反问回去，不接任务</text>

    <!-- 底部 -->
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 权力框架章节</text>
    <text x="640" y="690" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">04</text>
</svg>
