<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA" />
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B" />
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">供应商管理</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">四种驱动方式，让供应商自己动起来</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">07 / 12</text>
    
    <rect x="40" y="90" width="300" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <rect x="40" y="90" width="300" height="60" fill="#B91C1C" />
    <text x="60" y="130" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">质问式</text>
    <text x="60" y="180" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="60" y="205" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-style="italic">"汰换机制是什么？"</text>
    <text x="60" y="255" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">手法</text>
    <text x="60" y="285" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">直接提问，制造"必须回答"的压力</text>
    <text x="60" y="340" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">可学</text>
    <text x="60" y="370" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">精准提问，不给模糊空间</text>
    <path fill="#B91C1C" fill-opacity="0.1" d="M71,420 H109 A11,11 0 0 1 120,431 V431 A11,11 0 0 1 109,442 H71 A11,11 0 0 1 60,431 V431 A11,11 0 0 1 71,420 Z" /><text x="90" y="435" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险：高</text>

    <rect x="360" y="90" width="300" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <rect x="360" y="90" width="300" height="60" fill="#D97706" />
    <text x="380" y="130" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">驱动式</text>
    <text x="380" y="180" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="380" y="205" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-style="italic">"3.4亿才有奖金"</text>
    <text x="380" y="255" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">手法</text>
    <text x="380" y="285" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用利益让供应商自己急</text>
    <text x="380" y="340" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">可学</text>
    <text x="380" y="370" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">利益绑定比命令更有效</text>
    <path fill="#D97706" fill-opacity="0.1" d="M391,420 H429 A11,11 0 0 1 440,431 V431 A11,11 0 0 1 429,442 H391 A11,11 0 0 1 380,431 V431 A11,11 0 0 1 391,420 Z" /><text x="410" y="435" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险：中</text>

    <rect x="680" y="90" width="300" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <rect x="680" y="90" width="300" height="60" fill="#F2D06B" />
    <text x="700" y="130" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold">要求式</text>
    <text x="700" y="180" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">核心话术</text>
    <text x="700" y="205" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-style="italic">"本月人力计划、周度计划"</text>
    <text x="700" y="255" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">手法</text>
    <text x="700" y="285" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">要求具体计划，不模糊</text>
    <text x="700" y="340" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">可学</text>
    <text x="700" y="370" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">要求要具体可考核</text>
    <path fill="#22C55E" fill-opacity="0.1" d="M711,420 H749 A11,11 0 0 1 760,431 V431 A11,11 0 0 1 749,442 H711 A11,11 0 0 1 700,431 V431 A11,11 0 0 1 711,420 Z" /><text x="730" y="435" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险：低</text>

    <rect x="1000" y="90" width="240" height="540" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" />
    <rect x="1000" y="90" width="240" height="60" fill="#22C55E" />
    <text x="1015" y="125" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">改进式 ★</text>
    <text x="1015" y="170" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">最值得学</text>
    <text x="1015" y="205" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">三要素法</text>
    <text x="1015" y="230" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">原因+提升目标+举措</text>
    <text x="1015" y="280" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">手法</text>
    <text x="1015" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让供应商自己承诺</text>
    <text x="1015" y="365" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">可学</text>
    <text x="1015" y="395" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">最成熟的管理手法</text>
    <path fill="#22C55E" fill-opacity="0.15" d="M1026,440 H1074 A11,11 0 0 1 1085,451 V451 A11,11 0 0 1 1074,462 H1026 A11,11 0 0 1 1015,451 V451 A11,11 0 0 1 1026,440 Z" /><text x="1050" y="455" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">风险低</text>
    <text x="1015" y="485" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">效果：高</text>

    
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5" />
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="690" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">07</text>
</svg>