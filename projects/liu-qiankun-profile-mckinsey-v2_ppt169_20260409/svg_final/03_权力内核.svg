<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <!-- Takeaway bar -->
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">权力内核 — 他想要什么？</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">一切行为围绕三个核心诉求展开，缺一不可</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">03 / 12</text>
    <!-- 三列卡片 -->
    <!-- 控制权 -->
    <rect x="60" y="90" width="380" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="60" y="90" width="380" height="70" fill="#7B1E3B"/>
    <text x="85" y="135" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">控制权</text>
    <text x="85" y="195" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">典型动作</text>
    <text x="85" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">立规矩、阻断信息、责任下放</text>
    <text x="85" y="280" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">动机</text>
    <text x="85" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">刚接手需要"我在管"的信号，</text>
    <text x="85" y="335" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">建立秩序是首要任务</text>
    <text x="85" y="390" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">识别信号</text>
    <text x="85" y="420" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">刚接管业务时频繁宣布新规则</text>
    <text x="85" y="445" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">强调"按规则办事"</text>
    <rect x="85" y="490" width="330" height="30" fill="#16A34A" fill-opacity="0.08"/>
    <text x="100" y="510" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">应对：确认合理性，不盲目接受</text>
    <!-- 展示权 -->
    <rect x="460" y="90" width="380" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="460" y="90" width="380" height="70" fill="#DC2626"/>
    <text x="485" y="135" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">展示权</text>
    <text x="485" y="195" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">典型动作</text>
    <text x="485" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">群内表演、打鸡血、CC上级</text>
    <text x="485" y="280" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">动机</text>
    <text x="485" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">最在意"老板知不知道我在解决"</text>
    <text x="485" y="335" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">表演给上级看，不是给平级看</text>
    <text x="485" y="390" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">识别信号</text>
    <text x="485" y="420" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">群聊中高频@上级，汇报"进展"</text>
    <text x="485" y="445" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">语气偏向"我在推动解决"</text>
    <rect x="485" y="490" width="330" height="30" fill="#16A34A" fill-opacity="0.08"/>
    <text x="500" y="510" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">应对：不抢戏，专注自身边界</text>
    <!-- 安全感 -->
    <rect x="860" y="90" width="360" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="860" y="90" width="360" height="70" fill="#B91C1C"/>
    <text x="885" y="135" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">安全感</text>
    <text x="885" y="195" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">典型动作</text>
    <text x="885" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">信息管控、建立依赖</text>
    <text x="885" y="280" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">动机</text>
    <text x="885" y="310" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">怕被替代，让别人依赖自己</text>
    <text x="885" y="335" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">掌控信息就是掌控不可替代性</text>
    <text x="885" y="390" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">识别信号</text>
    <text x="885" y="420" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">阻断他与上级的直接沟通</text>
    <text x="885" y="445" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">"别找供应商，我来对接"</text>
    <rect x="885" y="490" width="310" height="30" fill="#16A34A" fill-opacity="0.08"/>
    <text x="900" y="510" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">应对：建立独立渠道，不依赖他</text>
    <!-- 底部 -->
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 权力内核章节</text>
    <text x="640" y="690" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">03</text>
</svg>
