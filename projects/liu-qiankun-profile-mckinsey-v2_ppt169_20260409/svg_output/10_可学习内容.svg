<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">可学习内容</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">四种核心技巧 + 核心差异对比</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">10 / 12</text>
    <!-- 四列卡片: 阶梯上升 -->
    <!-- Card 1: 立规矩 -->
    <rect x="40" y="460" width="280" height="180" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="40" y="460" width="280" height="35" fill="#B91C1C"/>
    <text x="55" y="485" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">立规矩</text>
    <text x="60" y="515" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">先定规则后办事</text>
    <text x="60" y="540" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">后续是"执行既定规则"</text>
    <text x="60" y="580" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">场景：接手新业务、管理新团队</text>
    <!-- Arrow up-right -->
    <polygon points="330,470 345,445 345,495" fill="#E5E7EB"/>
    <!-- Card 2: 三要素法 -->
    <rect x="350" y="350" width="280" height="180" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="350" y="350" width="280" height="35" fill="#D97706"/>
    <text x="365" y="375" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">三要素法</text>
    <text x="370" y="405" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">问题→原因+目标+举措</text>
    <text x="370" y="430" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让别人承诺，完不成有把柄</text>
    <text x="370" y="470" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">场景：供应商管理、推动执行</text>
    <!-- Arrow up-right -->
    <polygon points="640,360 655,335 655,385" fill="#E5E7EB"/>
    <!-- Card 3: 数据说话 -->
    <rect x="660" y="240" width="280" height="180" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="660" y="240" width="280" height="35" fill="#2563EB"/>
    <text x="675" y="265" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">数据说话</text>
    <text x="680" y="295" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">精确数据展示+公开施压</text>
    <text x="680" y="320" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">数据是最好的武器</text>
    <text x="680" y="360" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">场景：汇报、驱动、施压</text>
    <!-- Arrow up-right -->
    <polygon points="950,250 965,225 965,275" fill="#E5E7EB"/>
    <!-- Card 4: 机制先行 -->
    <rect x="970" y="130" width="270" height="180" rx="4" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
    <rect x="970" y="130" width="270" height="35" fill="#22C55E"/>
    <text x="985" y="155" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">机制先行 ★</text>
    <text x="990" y="185" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">先建机制再谈业务</text>
    <text x="990" y="210" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让供应商自己建系统，干不好有把柄</text>
    <text x="990" y="250" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">场景：建立长期管理体系</text>
    <!-- 底部: 核心差异对比 -->
    <rect x="40" y="80" width="560" height="140" rx="6" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1"/>
    <rect x="40" y="80" width="4" height="140" rx="2" fill="#B91C1C"/>
    <text x="60" y="110" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">刘乾坤 · 施压型</text>
    <text x="60" y="140" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 施压 → 让供应商自己想办法</text>
    <text x="60" y="180" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">施压型管理：制造压力，不给支持</text>
    <rect x="620" y="80" width="580" height="140" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1"/>
    <rect x="620" y="80" width="4" height="140" rx="2" fill="#22C55E"/>
    <text x="640" y="110" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">年老师 · 伙伴型</text>
    <text x="640" y="140" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">摆问题 → 提要求 → 给支持 → 长期合作</text>
    <text x="640" y="180" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">伙伴型管理：温和但坚定，长期共赢</text>
    <!-- 底部 -->
    <line x1="40" y1="670" x2="1240" y2="670" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="695" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">进化方向：</text>
    <text x="125" y="695" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">学他的术（立规矩、三要素法、数据说话），用年老师的心（给支持、温和但坚决）</text>
</svg>
