<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">争议事件</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">三个争议事件暴露真实性格</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">11 / 12</text>
    <!-- 三列事件卡片 -->
    <!-- Event 1: 双重标准 -->
    <rect x="40" y="90" width="380" height="280" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="40" y="90" width="380" height="40" fill="#B91C1C"/>
    <rect x="55" y="98" width="70" height="22" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>
    <text x="62" y="114" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="11" font-weight="bold">03-25</text>
    <text x="140" y="115" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">双重标准</text>
    <text x="60" y="160" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">自己违规推动供应商拿钱被内审查过</text>
    <text x="60" y="185" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">反过来质疑李吉斌的激励方案</text>
    <rect x="60" y="210" width="340" height="40" rx="4" fill="#FEF2F2"/>
    <text x="70" y="235" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">年老师："挺可怕的，真的不可交"</text>
    <text x="330" y="160" fill="#B91C1C" font-family="Arial, sans-serif" font-size="10" font-weight="bold">HIGH RISK</text>
    <!-- Event 2: 公开攻击前任 -->
    <rect x="440" y="90" width="380" height="280" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="440" y="90" width="380" height="40" fill="#D97706"/>
    <rect x="455" y="98" width="90" height="22" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>
    <text x="462" y="114" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="11" font-weight="bold">03-25 深夜</text>
    <text x="560" y="115" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">公开攻击前任</text>
    <text x="460" y="160" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">@李吉斌+CC上级，让前任难堪</text>
    <text x="460" y="185" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">刚接手就甩锅，李吉斌反击后软化</text>
    <rect x="460" y="210" width="340" height="40" rx="4" fill="#FFFBEB"/>
    <text x="470" y="235" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">教训：面对强硬反击，他会退让</text>
    <text x="730" y="160" fill="#D97706" font-family="Arial, sans-serif" font-size="10" font-weight="bold">MEDIUM</text>
    <!-- Event 3: 开门红带节奏 -->
    <rect x="840" y="90" width="400" height="280" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1.5"/>
    <rect x="840" y="90" width="400" height="40" fill="#B91C1C"/>
    <rect x="855" y="98" width="70" height="22" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>
    <text x="862" y="114" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="11" font-weight="bold">03-29</text>
    <text x="940" y="115" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">开门红带节奏</text>
    <text x="860" y="160" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内密集同步激励问题</text>
    <text x="860" y="185" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">道德绑架"影响1400个制鞋工人"</text>
    <text x="860" y="210" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">选择性攻击：只攻击服务组</text>
    <text x="860" y="235" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">夸大其词：实际"不会出现批量离职"</text>
    <rect x="860" y="260" width="360" height="40" rx="4" fill="#FEF2F2"/>
    <text x="870" y="285" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-style="italic">教训：核实数据，不被情绪带节奏</text>
    <text x="1150" y="160" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="10" font-weight="bold">HIGH RISK</text>
    <!-- 右侧核心洞察 -->
    <rect x="40" y="400" width="1200" height="230" fill="#FFFFFF" stroke="#7B1E3B" stroke-width="1.5"/>
    <rect x="40" y="400" width="1200" height="50" fill="#7B1E3B"/>
    <text x="60" y="435" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">核心洞察</text>
    <text x="80" y="490" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">他对别人做的事，自己可能也在做</text>
    <text x="80" y="525" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">双重标准是最大破绽</text>
    <text x="80" y="560" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">面对事实反击和强硬态度，他会退让</text>
    <text x="80" y="605" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">用事实反击，态度强硬，他就会退</text>
    <!-- 底部 -->
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2 · 争议事件章节</text>
</svg>
