<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">关系网络</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">以他为中心的权力关系映射</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">06 / 12</text>
    <!-- 组织结构图风格 - 层级 -->
    <!-- 顶部: 刘伟佳(师承) -->
    <rect x="540" y="90" width="200" height="50" rx="6" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1"/>
    <text x="640" y="122" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">刘伟佳 · 策略组</text>
    <!-- 连接线 -->
    <line x1="640" y1="140" x2="640" y2="160" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- 第二层: 王易人(上级) -->
    <rect x="540" y="160" width="200" height="50" rx="6" fill="#7B1E3B"/>
    <text x="640" y="192" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">王易人 · 服务组负责人</text>
    <line x1="640" y1="210" x2="640" y2="250" stroke="#7B1E3B" stroke-width="1.5"/>
    <!-- 中心: 刘乾坤 -->
    <rect x="540" y="250" width="200" height="60" rx="6" fill="#7B1E3B" stroke="#7B1E3B" stroke-width="3"/>
    <text x="640" y="280" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">刘乾坤</text>
    <text x="640" y="300" text-anchor="middle" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">权力核心</text>
    <!-- 分支: 左同盟、右对手、下配合、下属 -->
    <line x1="540" y1="280" x2="200" y2="380" stroke="#22C55E" stroke-width="1"/>
    <line x1="740" y1="280" x2="1080" y2="380" stroke="#B91C1C" stroke-width="1"/>
    <line x1="590" y1="310" x2="350" y2="420" stroke="#C5960C" stroke-width="1"/>
    <line x1="690" y1="310" x2="930" y2="420" stroke="#9CA3AF" stroke-width="1"/>
    <!-- 左: 同盟 -->
    <text x="80" y="370" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">同盟</text>
    <rect x="80" y="385" width="220" height="45" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1"/>
    <text x="95" y="413" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">郭鑫（前同事）— "用你的嘴，出我的力"</text>
    <rect x="80" y="440" width="220" height="45" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1"/>
    <text x="95" y="468" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">马贵贤（前同事）— "你的工作，我的成果"</text>
    <!-- 右: 对手 -->
    <text x="980" y="370" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">对手</text>
    <rect x="980" y="385" width="220" height="45" rx="6" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1"/>
    <text x="995" y="413" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">李吉斌（前任）— 公开质疑+双重标准</text>
    <text x="995" y="435" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">刚接手就甩锅，反击后退让</text>
    <!-- 左下: 配合 -->
    <text x="250" y="420" fill="#C5960C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">配合</text>
    <rect x="250" y="435" width="200" height="45" rx="6" fill="#FFFFFF" stroke="#C5960C" stroke-width="1"/>
    <text x="265" y="463" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">年老师 — "兄弟"称呼+拉拢</text>
    <text x="265" y="483" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">接受但不欠人情，合作不依赖</text>
    <!-- 右下: 下属 -->
    <text x="830" y="420" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">下属</text>
    <rect x="830" y="435" width="200" height="45" rx="6" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
    <text x="845" y="463" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">张世跃（实习生）— 任务下放+功劳上报</text>
    <rect x="830" y="490" width="200" height="45" rx="6" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
    <text x="845" y="518" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">供应商 — 利益驱动+责任下放</text>
    <!-- 底部洞察 -->
    <rect x="80" y="580" width="1120" height="60" rx="8" fill="#7B1E3B" fill-opacity="0.05" stroke="#7B1E3B" stroke-width="0.5"/>
    <text x="100" y="610" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">策略洞察：</text>
    <text x="200" y="610" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">同盟用嘴出力 · 上级是最终观众 · 对手公开攻击 · 年老师拉拢+人情债</text>
    <!-- 底部 -->
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="690" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">06</text>
</svg>
