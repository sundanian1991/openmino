<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">应对策略</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">话术对照 — 他说什么 vs 你怎么回</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">09 / 12</text>
    <!-- 左侧: 四大核心原则 -->
    <rect x="40" y="90" width="380" height="540" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="40" y="90" width="380" height="45" fill="#7B1E3B"/>
    <text x="60" y="120" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">四大核心原则</text>
    <!-- 原则1 -->
    <rect x="60" y="155" width="340" height="80" rx="6" fill="#FEF2F2"/>
    <rect x="60" y="155" width="4" height="80" rx="2" fill="#B91C1C"/>
    <text x="75" y="185" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">1 不主动背锅</text>
    <text x="75" y="210" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">问题直接传递，不接"帮我看下"</text>
    <!-- 原则2 -->
    <rect x="60" y="245" width="340" height="80" rx="6" fill="#FEF3C7"/>
    <rect x="60" y="245" width="4" height="80" rx="2" fill="#D97706"/>
    <text x="75" y="275" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">2 边界清晰</text>
    <text x="75" y="300" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">周末不接@，工作日按流程</text>
    <!-- 原则3 -->
    <rect x="60" y="335" width="340" height="80" rx="6" fill="#EFF6FF"/>
    <rect x="60" y="335" width="4" height="80" rx="2" fill="#2563EB"/>
    <text x="75" y="365" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">3 信息独立</text>
    <text x="75" y="390" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">建立独立渠道，不依赖他拿数据</text>
    <!-- 原则4 -->
    <rect x="60" y="425" width="340" height="80" rx="6" fill="#F0FDF4"/>
    <rect x="60" y="425" width="4" height="80" rx="2" fill="#22C55E"/>
    <text x="75" y="455" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">4 学习技巧</text>
    <text x="75" y="480" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">立规矩、三要素法、数据说话</text>
    <!-- 右侧: 话术对照表 -->
    <text x="460" y="115" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">话术对照</text>
    <line x1="460" y1="125" x2="1240" y2="125" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- 表头 -->
    <rect x="460" y="135" width="390" height="30" fill="#F3F4F6"/>
    <text x="470" y="155" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">他说（刘乾坤）</text>
    <rect x="850" y="135" width="390" height="30" fill="#F3F4F6"/>
    <text x="860" y="155" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold">你回（年老师）</text>
    <!-- Row 1 -->
    <rect x="460" y="170" width="780" height="80" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
    <rect x="460" y="170" width="4" height="80" rx="2" fill="#B91C1C"/>
    <text x="475" y="198" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"帮我看下，我该如何解答"</text>
    <text x="475" y="225" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 不接任务，反问回去</text>
    <text x="865" y="198" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"你的想法是什么？我先听你的"</text>
    <text x="865" y="225" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 把球踢回去</text>
    <!-- Row 2 -->
    <rect x="460" y="260" width="780" height="80" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
    <rect x="460" y="260" width="4" height="80" rx="2" fill="#D97706"/>
    <text x="475" y="288" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">周末@处理供应商问题</text>
    <text x="475" y="315" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 边界模糊，随时被打扰</text>
    <text x="865" y="288" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"收到，周一处理"</text>
    <text x="865" y="315" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 边界清晰，不解释</text>
    <!-- Row 3 -->
    <rect x="460" y="350" width="780" height="80" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
    <rect x="460" y="350" width="4" height="80" rx="2" fill="#2563EB"/>
    <text x="475" y="378" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"别找供应商，他们不如我们清楚"</text>
    <text x="475" y="405" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 试图切断你的独立渠道</text>
    <text x="865" y="378" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"理解，但我需要一线真实反馈"</text>
    <text x="865" y="405" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 建立独立渠道</text>
    <!-- Row 4 -->
    <rect x="460" y="440" width="780" height="80" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
    <rect x="460" y="440" width="4" height="80" rx="2" fill="#22C55E"/>
    <text x="475" y="468" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"辛苦兄弟多费心"</text>
    <text x="475" y="495" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 情感绑架，模糊边界</text>
    <text x="865" y="468" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">"8个供应商，担心盯不细"</text>
    <text x="865" y="495" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 示弱加边界，他会退让</text>
    <!-- Row 5 -->
    <rect x="460" y="530" width="780" height="80" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
    <rect x="460" y="530" width="4" height="80" rx="2" fill="#7B1E3B"/>
    <text x="475" y="558" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">危机渲染 + 责任锁定</text>
    <text x="475" y="585" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 制造恐慌，锁定你的责任</text>
    <text x="865" y="558" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">事实压危机、锁定卡点、踢球给方案</text>
    <text x="865" y="585" fill="#9CA3AF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">→ 用专业语言说话</text>
    <!-- 底部 -->
    <line x1="40" y1="650" x2="1240" y2="650" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="685" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">策略核心：</text>
    <text x="120" y="685" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不接球、不模糊、不依赖、学技巧</text>
</svg>
