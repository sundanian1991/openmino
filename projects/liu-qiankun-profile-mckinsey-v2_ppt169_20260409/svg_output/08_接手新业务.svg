<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">接手新业务</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">四步建立管理基础</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">08 / 12</text>
    <!-- 四步横向流程 -->
    <!-- Step 1 -->
    <rect x="40" y="90" width="280" height="520" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="40" y="90" width="280" height="50" fill="#B91C1C"/>
    <text x="55" y="125" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="32" font-weight="bold">01</text>
    <text x="115" y="125" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">立规矩</text>
    <text x="60" y="175" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">具体动作</text>
    <text x="60" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">30分钟回复</text>
    <text x="60" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">10点报出勤</text>
    <text x="60" y="250" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">昵称格式规范</text>
    <text x="60" y="275" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">数据日报格式</text>
    <text x="60" y="300" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群内沟通规范</text>
    <text x="60" y="350" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">目的</text>
    <text x="60" y="375" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">后续变成"按规则办事"</text>
    <text x="60" y="400" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不是"个人施压"</text>
    <rect x="60" y="450" width="80" height="22" rx="11" fill="#B91C1C" fill-opacity="0.1"/>
    <text x="100" y="465" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">Step 1</text>

    <!-- Step 2 -->
    <rect x="340" y="90" width="280" height="520" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="340" y="90" width="280" height="50" fill="#D97706"/>
    <text x="355" y="125" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="32" font-weight="bold">02</text>
    <text x="415" y="125" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">数据切入</text>
    <text x="360" y="175" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">具体动作</text>
    <text x="360" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">5分钟连发两条数据</text>
    <text x="360" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">精确到小数点</text>
    <text x="360" y="250" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">摆数据，不出结论</text>
    <text x="360" y="275" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">责任完美分散</text>
    <text x="360" y="325" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">目的</text>
    <text x="360" y="350" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">让别人背锅，自己居功</text>
    <rect x="360" y="450" width="80" height="22" rx="11" fill="#D97706" fill-opacity="0.1"/>
    <text x="400" y="465" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">Step 2</text>

    <!-- Step 3 -->
    <rect x="640" y="90" width="280" height="520" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="640" y="90" width="280" height="50" fill="#2563EB"/>
    <text x="655" y="125" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="32" font-weight="bold">03</text>
    <text x="715" y="125" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">公开锁定</text>
    <text x="660" y="175" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">具体动作</text>
    <text x="660" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群里@具体人</text>
    <text x="660" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">所有人看着不得不接</text>
    <text x="660" y="250" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">不私聊，公开@</text>
    <text x="660" y="275" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">连环追加施压</text>
    <text x="660" y="325" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">目的</text>
    <text x="660" y="350" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">制造回复压力</text>
    <rect x="660" y="450" width="80" height="22" rx="11" fill="#2563EB" fill-opacity="0.1"/>
    <text x="700" y="465" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">Step 3</text>

    <!-- Step 4 -->
    <rect x="940" y="90" width="300" height="520" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
    <rect x="940" y="90" width="300" height="50" fill="#22C55E"/>
    <text x="955" y="125" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="32" font-weight="bold">04</text>
    <text x="1015" y="125" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">建立预期</text>
    <text x="960" y="175" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">具体动作</text>
    <text x="960" y="200" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">按规则办事形象确立</text>
    <text x="960" y="225" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">引用初始规则</text>
    <text x="960" y="250" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">持续执行</text>
    <text x="960" y="300" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">目的</text>
    <text x="960" y="325" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">从"个人意志"变为</text>
    <text x="960" y="350" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">"按章办事"</text>
    <rect x="960" y="450" width="80" height="22" rx="11" fill="#22C55E" fill-opacity="0.1"/>
    <text x="1000" y="465" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">Step 4</text>

    <!-- 底部洞察 -->
    <line x1="40" y1="650" x2="1240" y2="650" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="685" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">核心逻辑：</text>
    <text x="125" y="685" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">规则一旦建立，管理就变成"按章办事"而非"个人意志"</text>
</svg>
