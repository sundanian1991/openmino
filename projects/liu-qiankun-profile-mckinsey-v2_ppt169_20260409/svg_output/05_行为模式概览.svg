<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">行为模式概览</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">18种模式按权力来源分组，风险等级用颜色区分</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">05 / 12</text>
    <!-- 分类表格 -->
    <rect x="40" y="90" width="1200" height="40" fill="#7B1E3B"/>
    <text x="60" y="117" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">权力来源</text>
    <text x="300" y="117" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">行为模式</text>
    <text x="700" y="117" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">风险等级</text>
    <text x="1000" y="117" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">说明</text>
    <!-- Row 1 -->
    <rect x="40" y="130" width="1200" height="55" fill="#FFFFFF"/>
    <text x="60" y="163" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">规则权</text>
    <text x="300" y="163" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">立规矩</text>
    <rect x="700" y="148" width="70" height="22" rx="11" fill="#22C55E" fill-opacity="0.15"/><text x="735" y="163" text-anchor="middle" fill="#22C55E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">值得学</text>
    <text x="1000" y="163" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">先定规则后办事</text>
    <!-- Row 2 -->
    <rect x="40" y="185" width="1200" height="55" fill="#F9FAFB"/>
    <text x="60" y="218" fill="#9B2C2C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">信息权</text>
    <text x="300" y="218" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">两头堵、阻断信息</text>
    <rect x="700" y="203" width="70" height="22" rx="11" fill="#B91C1C" fill-opacity="0.15"/><text x="735" y="218" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">高危险</text>
    <text x="1000" y="218" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">阻断信息渠道</text>
    <!-- Row 3 -->
    <rect x="40" y="240" width="1200" height="55" fill="#FFFFFF"/>
    <text x="60" y="273" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">关系权</text>
    <text x="300" y="273" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">拉拢圈人、人情债管理</text>
    <rect x="700" y="258" width="55" height="22" rx="11" fill="#D97706" fill-opacity="0.15"/><text x="727" y="273" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">施压</text>
    <text x="1000" y="273" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">主动让利换取配合</text>
    <!-- Row 4 -->
    <rect x="40" y="295" width="1200" height="55" fill="#F9FAFB"/>
    <text x="60" y="328" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">注意权</text>
    <text x="300" y="328" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">群内表演、任务下放+CC</text>
    <rect x="700" y="313" width="55" height="22" rx="11" fill="#D97706" fill-opacity="0.15"/><text x="727" y="328" text-anchor="middle" fill="#D97706" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">施压</text>
    <text x="1000" y="328" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">刷存在感给上级看</text>
    <!-- Row 5 -->
    <rect x="40" y="350" width="1200" height="55" fill="#FFFFFF"/>
    <text x="60" y="383" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">施压权</text>
    <text x="300" y="383" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">公开锁定、高压管理、追责转嫁、加压链</text>
    <rect x="700" y="368" width="70" height="22" rx="11" fill="#B91C1C" fill-opacity="0.15"/><text x="735" y="383" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">高危险</text>
    <text x="1000" y="383" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">密集施压区域</text>
    <!-- Row 6: 组合拳 -->
    <rect x="40" y="420" width="1200" height="40" fill="#7B1E3B" fill-opacity="0.08"/>
    <text x="60" y="447" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">组合拳</text>
    <!-- 组合拳子项 -->
    <rect x="40" y="460" width="1200" height="50" fill="#FFFFFF"/>
    <text x="60" y="490" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">抛问题、正面对冲、借力打力</text>
    <rect x="700" y="475" width="55" height="22" rx="11" fill="#6B7280" fill-opacity="0.15"/><text x="727" y="490" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">中性</text>
    <text x="1000" y="490" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">中性手法</text>
    <rect x="40" y="510" width="1200" height="50" fill="#F9FAFB"/>
    <text x="60" y="540" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">群聊闹事、选择性攻击</text>
    <rect x="700" y="525" width="70" height="22" rx="11" fill="#B91C1C" fill-opacity="0.15"/><text x="735" y="540" text-anchor="middle" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">高危险</text>
    <text x="1000" y="540" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">高危险手法</text>
    <rect x="40" y="560" width="1200" height="50" fill="#FFFFFF"/>
    <text x="60" y="590" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">质疑数据降温、挖人试探、镜像过敏</text>
    <rect x="700" y="575" width="55" height="22" rx="11" fill="#6B7280" fill-opacity="0.15"/><text x="727" y="590" text-anchor="middle" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="11">中性</text>
    <text x="1000" y="590" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">中性手法</text>
    <!-- 底部 -->
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="690" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">05</text>
</svg>
