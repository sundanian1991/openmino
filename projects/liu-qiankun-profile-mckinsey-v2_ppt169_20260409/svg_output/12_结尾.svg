<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">总结</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">12 / 12</text>
    <!-- 三句话: 大卡片纵向排列 -->
    <!-- 第一句 -->
    <rect x="80" y="100" width="1120" height="140" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="80" y="100" width="6" height="140" rx="3" fill="#7B1E3B"/>
    <text x="120" y="155" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill-opacity="0.15">01</text>
    <text x="220" y="150" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">他不是在管理，是在表演管理</text>
    <text x="220" y="190" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">最在意的是"老板知不知道我在解决"</text>
    <!-- 第二句 -->
    <rect x="80" y="270" width="1120" height="140" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="80" y="270" width="6" height="140" rx="3" fill="#C5960C"/>
    <text x="120" y="325" fill="#C5960C" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill-opacity="0.15">02</text>
    <text x="220" y="320" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">边界清晰是最好的防御</text>
    <text x="220" y="360" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">周末不接@，工作日按流程，信息独立</text>
    <!-- 第三句 -->
    <rect x="80" y="440" width="1120" height="140" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="80" y="440" width="6" height="140" rx="3" fill="#22C55E"/>
    <text x="120" y="495" fill="#22C55E" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill-opacity="0.15">03</text>
    <text x="220" y="490" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">取其精华，做温和但坚定的管理者</text>
    <text x="220" y="530" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">学立规矩、三要素法、数据说话；加上给支持、温和但坚决、长期合作的伙伴关系</text>
    <!-- 底部 -->
    <line x1="80" y1="620" x2="1200" y2="620" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="80" y="660" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">v10.2 · 年老师建档 · 2026-03-19 · 刘乾坤人物深度分析报告</text>
    <text x="640" y="660" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1200" y="660" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">END</text>
</svg>
