<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <!-- McKinsey Takeaway Bar -->
    <rect x="0" y="0" width="1280" height="60" fill="#7B1E3B"/>
    <text x="40" y="38" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">一句话定位</text>
    <text x="40" y="52" fill="#F9D0D9" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">他的所有行为，都围绕三个核心诉求展开：控制权、展示权、安全感</text>
    <text x="1200" y="38" text-anchor="end" fill="#F9D0D9" font-family="Arial, sans-serif" font-size="13">02 / 12</text>
    <!-- 大字定位 -->
    <text x="80" y="150" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold">核心定位</text>
    <text x="80" y="210" fill="#1A1A2E" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="bold">高压管理型业管</text>
    <text x="80" y="260" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22">擅长 <tspan fill="#7B1E3B" font-weight="bold">立规矩 + 三要素法</tspan></text>
    <text x="80" y="300" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">对上表演 · 对下施压 · 信息管控</text>
    <!-- 三列卡片 -->
    <rect x="80" y="360" width="360" height="280" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="80" y="360" width="4" height="280" fill="#7B1E3B"/>
    <text x="110" y="410" fill="#7B1E3B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">控制权</text>
    <text x="110" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">立规矩、阻断信息、责任下放</text>
    <text x="110" y="480" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">动机：刚接手需要"我在管"的信号</text>
    <rect x="110" y="520" width="300" height="30" fill="#16A34A" fill-opacity="0.08"/>
    <text x="120" y="540" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">应对：确认合理性，不盲目接受</text>

    <rect x="460" y="360" width="360" height="280" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="460" y="360" width="4" height="280" fill="#DC2626"/>
    <text x="490" y="410" fill="#DC2626" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">展示权</text>
    <text x="490" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">群内表演、打鸡血、CC上级</text>
    <text x="490" y="480" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">动机：最在意"老板知不知道"</text>
    <rect x="490" y="520" width="300" height="30" fill="#16A34A" fill-opacity="0.08"/>
    <text x="500" y="540" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">应对：不抢戏，专注自身边界</text>

    <rect x="840" y="360" width="360" height="280" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="840" y="360" width="4" height="280" fill="#B91C1C"/>
    <text x="870" y="410" fill="#B91C1C" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold">安全感</text>
    <text x="870" y="445" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">信息管控、建立依赖</text>
    <text x="870" y="480" fill="#6B7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">动机：怕被替代，让别人依赖自己</text>
    <rect x="870" y="520" width="300" height="30" fill="#16A34A" fill-opacity="0.08"/>
    <text x="880" y="540" fill="#16A34A" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">应对：建立独立渠道，不依赖他</text>

    <!-- 底部 -->
    <line x1="40" y1="660" x2="1240" y2="660" stroke="#E5E7EB" stroke-width="0.5"/>
    <text x="40" y="690" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Source: 刘乾坤档案 v10.2</text>
    <text x="640" y="690" text-anchor="middle" fill="#7B1E3B" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">CONFIDENTIAL</text>
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11">02</text>
</svg>
