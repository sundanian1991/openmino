<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">名单全生命周期管理</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心洞察：精细化的名单管控是提升转化效率的关键，从静置到拨打到回收形成闭环</text>

  <!-- 2x3 Grid of strategy cards -->
  <!-- Row 1 -->
  <g transform="translate(60, 160)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <!-- icon: chunk/clock -->
  <g transform="translate(20.0, 20.0) scale(2.5)" fill="#005587">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM7 3V8.41421L10.2929 11.7071L11.7071 10.2929L9 7.58579V3H7Z"/>
  </g>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">新名单静置</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">2-3天不动用</text>
    <text x="20" y="120" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">让名单"冷静期"</text>
    <text x="20" y="150" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">避免过早浪费</text>
  </g>

  <g transform="translate(460, 160)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/rotate-clockwise" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">拨打频次控制</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">单名单 ≤ 40次</text>
    <text x="20" y="120" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">超频停止拨打</text>
    <text x="20" y="150" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">避免投诉违规</text>
  </g>

  <g transform="translate(860, 160)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon:chunk/sun="20" y="20" width="40" height="40" fill="#D04A02"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#D04A02">黄金时段</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">18:30-19:30</text>
    <text x="20" y="120" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">接通率第二高</text>
    <text x="20" y="150" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">全部拨打新名单</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(60, 370)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/calendar-refresh" x="20" y="20" width="40" height="40" fill="#0076A8"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#0076A8">周末全量回收</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">周一清零手中名单</text>
    <text x="20" y="120" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">请假直接清零</text>
    <text x="20" y="150" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">保证资源不闲置</text>
  </g>

  <g transform="translate(460, 370)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <!-- icon: chunk/tag -->
  <g transform="translate(20.0, 20.0) scale(2.5)" fill="#0076A8">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M16 8L8 0H0V8L8 16L16 8ZM4.5 6C5.32843 6 6 5.32843 6 4.5C6 3.67157 5.32843 3 4.5 3C3.67157 3 3 3.67157 3 4.5C3 5.32843 3.67157 6 4.5 6Z"/>
  </g>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#0076A8">客户分级</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">ABCD标签体系</text>
    <text x="20" y="120" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">优先A级客户</text>
    <text x="20" y="150" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">提升整体产能</text>
  </g>

  <g transform="translate(860, 370)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <!-- icon: chunk/star -->
  <g transform="translate(20.0, 20.0) scale(2.5)" fill="#D04A02">
    <path d="M9.00001 0H7.00001L5.51292 4.57681L0.700554 4.57682L0.0825195 6.47893L3.97581 9.30756L2.48873 13.8843L4.10677 15.0599L8.00002 12.2313L11.8933 15.0599L13.5113 13.8843L12.0242 9.30754L15.9175 6.47892L15.2994 4.57681L10.4871 4.57681L9.00001 0Z"/>
  </g>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#D04A02">高价值匹配</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">5万+额度名单</text>
    <text x="20" y="120" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">匹配最优坐席</text>
    <text x="20" y="150" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">最大化名单产出</text>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">06 | 名单全生命周期管理</text>
</svg>
