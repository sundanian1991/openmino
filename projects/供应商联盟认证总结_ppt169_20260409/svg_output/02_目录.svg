<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F8FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#005587" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">今日议程</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Three cards -->
  <!-- Card 1: 核心方法论 -->
  <g transform="translate(60, 120)">
    <rect width="360" height="280" rx="12" fill="url(#cardGradient)" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
    <rect width="360" height="6" rx="3" fill="#005587" transform="translate(0, 0)"/>

    <use data-icon="chunk/git-branch" x="30" y="30" width="48" height="48" fill="#005587"/>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#005587">核心方法论分享</text>

    <g transform="translate(30, 130)">
      <circle cx="8" cy="8" r="4" fill="#0076A8"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">坐席分级管理</text>
    </g>
    <g transform="translate(30, 165)">
      <circle cx="8" cy="8" r="4" fill="#0076A8"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">激励体系设计</text>
    </g>
    <g transform="translate(30, 200)">
      <circle cx="8" cy="8" r="4" fill="#0076A8"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">三会管理流程</text>
    </g>
    <g transform="translate(30, 235)">
      <circle cx="8" cy="8" r="4" fill="#0076A8"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">名单管控策略</text>
    </g>
  </g>

  <!-- Card 2: 供应商认证 -->
  <g transform="translate(460, 120)">
    <rect width="360" height="280" rx="12" fill="url(#cardGradient)" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
    <rect width="360" height="6" rx="3" fill="#0076A8" transform="translate(0, 0)"/>

    <use data-icon="chunk/check-circle" x="30" y="30" width="48" height="48" fill="#0076A8"/>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#0076A8">供应商认证与收获</text>

    <g transform="translate(30, 130)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">认证规则与结果</text>
    </g>
    <g transform="translate(30, 165)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">岐力落地三阶段</text>
    </g>
    <g transform="translate(30, 200)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">汇讯管理工具优化</text>
    </g>
    <g transform="translate(30, 235)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">各供应商核心收获</text>
    </g>
  </g>

  <!-- Card 3: 落地方案 -->
  <g transform="translate(860, 120)">
    <rect width="360" height="280" rx="12" fill="url(#cardGradient)" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
    <rect width="360" height="6" rx="3" fill="#D04A02" transform="translate(0, 0)"/>

    <use data-icon="chunk/target" x="30" y="30" width="48" height="48" fill="#D04A02"/>
    <text x="30" y="100" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#D04A02">落地方案与展望</text>

    <g transform="translate(30, 130)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">三个月推进计划</text>
    </g>
    <g transform="translate(30, 165)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">关键成功要素</text>
    </g>
    <g transform="translate(30, 200)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">标准化落地指标</text>
    </g>
    <g transform="translate(30, 235)">
      <circle cx="8" cy="8" r="4" fill="#005587"/>
      <text x="24" y="14" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#333333">携手推进共创价值</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">02 | 今日议程</text>
</svg>
