<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">三会标准流程</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心洞察：三会各有定位，早会对齐目标、午会唤醒状态、晚会复盘培训</text>

  <!-- Three meeting cards horizontally -->
  <!-- 早会 -->
  <g transform="translate(60, 160)">
    <rect width="360" height="480" rx="12" fill="#F0F8FF" stroke="#B3D9FF" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#005587"/>

    <use data-icon="chunk/sun" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="28" fill="#005587">早会</text>
    <text x="300" y="48" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#666666">15分钟</text>

    <!-- Time indicator -->
    <rect x="20" y="70" width="320" height="40" rx="8" fill="#005587" fill-opacity="0.1"/>
    <text x="180" y="97" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">工作开始前</text>

    <!-- Core purposes -->
    <text x="20" y="140" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">核心三件事</text>

    <g transform="translate(20, 165)">
      <rect width="320" height="60" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="30" r="12" fill="#005587"/>
      <text x="25" y="35" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">1</text>
      <text x="50" y="37" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">复盘昨日业绩数据</text>
    </g>

    <g transform="translate(20, 240)">
      <rect width="320" height="60" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="30" r="12" fill="#005587"/>
      <text x="25" y="35" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">2</text>
      <text x="50" y="37" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">拆解今日目标</text>
    </g>

    <g transform="translate(20, 315)">
      <rect width="320" height="60" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="30" r="12" fill="#005587"/>
      <text x="25" y="35" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">3</text>
      <text x="50" y="37" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">明确今日关键动作</text>
    </g>

    <!-- Key principles -->
    <rect x="20" y="400" width="320" height="60" rx="8" fill="#FFF3E0" stroke="#FFE0B2" stroke-width="1"/>
    <text x="30" y="425" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#D04A02">✓ 不安排培训</text>
    <text x="30" y="448" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#D04A02">✓ 不说负面问题</text>
  </g>

  <!-- 午会 -->
  <g transform="translate(460, 160)">
    <rect width="360" height="480" rx="12" fill="#FFF8E1" stroke="#FFE082" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#F57C00"/>

    <use data-icon:chunk/sun-horizon="20" y="20" width="40" height="40" fill="#F57C00"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="28" fill="#F57C00">午会</text>
    <text x="300" y="48" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#666666">10分钟</text>

    <!-- Time indicator -->
    <rect x="20" y="70" width="320" height="40" rx="8" fill="#F57C00" fill-opacity="0.1"/>
    <text x="180" y="97" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#F57C00">午休结束后</text>

    <!-- Core purpose -->
    <text x="20" y="140" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">核心目的</text>

    <g transform="translate(20, 165)">
      <rect width="320" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="20" y="40" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">告知下午业绩缺口</text>
      <text x="20" y="70" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">做叫醒动作</text>
    </g>

    <!-- Key features -->
    <text x="20" y="300" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">关键特点</text>

    <g transform="translate(20, 325)">
      <rect width="320" height="50" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="20" y="32" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">全员站着开</text>
    </g>

    <g transform="translate(20, 390)">
      <rect width="320" height="50" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="20" y="32" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">周五增加小游戏提神</text>
    </g>
  </g>

  <!-- 晚会 -->
  <g transform="translate(860, 160)">
    <rect width="360" height="480" rx="12" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#7B1FA2"/>

    <use data-icon="chunk/moon" x="20" y="20" width="40" height="40" fill="#7B1FA2"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="28" fill="#7B1FA2">晚会</text>
    <text x="300" y="48" font-family="Microsoft YaHei, Calibri" font-size="18" fill="#666666">不限时</text>

    <!-- Time indicator -->
    <rect x="20" y="70" width="320" height="40" rx="8" fill="#7B1FA2" fill-opacity="0.1"/>
    <text x="180" y="97" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#7B1FA2">下班前</text>

    <!-- Core purposes -->
    <text x="20" y="140" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">核心四件事</text>

    <g transform="translate(20, 165)">
      <rect width="320" height="55" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="27" r="12" fill="#7B1FA2"/>
      <text x="25" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">1</text>
      <text x="50" y="34" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">分析最高/最低业绩</text>
    </g>

    <g transform="translate(20, 235)">
      <rect width="320" height="55" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="27" r="12" fill="#7B1FA2"/>
      <text x="25" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">2</text>
      <text x="50" y="34" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">听录音做辅导</text>
    </g>

    <g transform="translate(20, 305)">
      <rect width="320" height="55" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="27" r="12" fill="#7B1FA2"/>
      <text x="25" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">3</text>
      <text x="50" y="34" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">筛选次日名单</text>
    </g>

    <g transform="translate(20, 375)">
      <rect width="320" height="55" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="25" cy="27" r="12" fill="#7B1FA2"/>
      <text x="25" y="32" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">4</text>
      <text x="50" y="34" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">逐个解决问题</text>
    </g>

    <!-- Key note -->
    <rect x="20" y="450" width="320" height="20" rx="4" fill="#7B1FA2" fill-opacity="0.1"/>
    <text x="180" y="465" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="12" fill="#7B1FA2">不遗留问题到第二天</text>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">07 | 三会标准流程</text>
</svg>
