<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">ABC分级竞争机制</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心原则：同等级竞争保证公平感，清晰的晋升路径维持长期动力</text>

  <!-- Left: 核心原则 (40%) -->
  <g transform="translate(60, 160)">
    <rect width="450" height="480" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
    <rect width="450" height="6" rx="3" fill="#005587"/>

    <text x="30" y="45" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#005587">核心原则</text>

    <!-- Principle 1 -->
    <g transform="translate(30, 80)">
      <rect width="390" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="30" cy="50" r="20" fill="#005587" fill-opacity="0.15"/>
      <text x="30" y="57" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">1</text>
      <text x="65" y="40" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">同等级竞争</text>
      <text x="65" y="70" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">C级不越级A级，保证竞争信心</text>
    </g>

    <!-- Principle 2 -->
    <g transform="translate(30, 200)">
      <rect width="390" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="30" cy="50" r="20" fill="#005587" fill-opacity="0.15"/>
      <text x="30" y="57" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">2</text>
      <text x="65" y="40" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">清晰晋升路径</text>
      <text x="65" y="70" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">C→B→A，每级都有明确目标</text>
    </g>

    <!-- Principle 3 -->
    <g transform="translate(30, 320)">
      <rect width="390" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="30" cy="50" r="20" fill="#005587" fill-opacity="0.15"/>
      <text x="30" y="57" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">3</text>
      <text x="65" y="40" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">名单量差异化</text>
      <text x="65" y="70" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">A级比C级多15条，奖励能力者</text>
    </g>
  </g>

  <!-- Right: 失败教训 (60%) -->
  <g transform="translate(540, 160)">
    <rect width="680" height="480" rx="12" fill="#FFF5F5" stroke="#FFCCCC" stroke-width="1" filter="url(#shadow)"/>
    <rect width="680" height="6" rx="3" fill="#D04A02"/>

    <text x="30" y="45" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#D04A02">失败教训：王者荣耀段位分级尝试</text>

    <!-- Timeline of failure -->
    <g transform="translate(30, 80)">
      <!-- Phase 1: 初期效果 -->
      <rect width="620" height="80" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="40" cy="40" r="16" fill="#2E7D32"/>
      <text x="40" y="46" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">✓</text>
      <text x="70" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">初期效果很好</text>
      <text x="70" y="58" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">坐席主动加班冲业绩，段位晋升激励明显</text>
    </g>

    <!-- Arrow down -->
    <polygon points="370,175 385,195 355,195" fill="#D04A02" transform="translate(0, -5)"/>

    <!-- Phase 2: 问题暴露 -->
    <g transform="translate(30, 200)">
      <rect width="620" height="80" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="40" cy="40" r="16" fill="#C62828"/>
      <text x="40" y="46" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">!</text>
      <text x="70" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">问题逐渐暴露</text>
      <text x="70" y="58" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">分级后直接对应固定名单额度，低段位坐席产生不公平感</text>
    </g>

    <!-- Arrow down -->
    <polygon points="370,295 385,315 355,315" fill="#D04A02" transform="translate(0, -5)"/>

    <!-- Phase 3: 效果下滑 -->
    <g transform="translate(30, 320)">
      <rect width="620" height="80" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="40" cy="40" r="16" fill="#C62828"/>
      <text x="40" y="46" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">✗</text>
      <text x="70" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">效果逐渐下滑</text>
      <text x="70" y="58" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">低段位坐席认为永远升不上去，产生倦怠情绪</text>
    </g>

    <!-- Key insight box -->
    <g transform="translate(30, 420)">
      <rect width="620" height="40" rx="8" fill="#D04A02" fill-opacity="0.1"/>
      <text x="20" y="27" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#D04A02">核心问题：固定名单额度导致"阶层固化"，破坏了竞争公平性</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">04 | ABC分级竞争机制</text>
</svg>
