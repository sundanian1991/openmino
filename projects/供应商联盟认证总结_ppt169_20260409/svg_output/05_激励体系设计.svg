<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">日周维度即时激励</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心洞察：即时正向反馈提升内驱力，但需控制频率避免激励价值稀释</text>

  <!-- Top: 日维度激励 -->
  <g transform="translate(60, 160)">
    <rect width="1160" height="200" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="1160" height="6" rx="3" fill="#005587"/>

    <use data-icon="chunk/gift" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#005587">日维度：分段激励</text>

    <!-- Three reward tiers -->
    <g transform="translate(30, 70)">
      <!-- Morning -->
      <rect width="350" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="20" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#005587">上午开单</text>
      <text x="20" y="65" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">开出 <tspan font-weight="bold" fill="#D04A02">2单</tspan> → 抽红包</text>
      <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#999999">金额：16-88元</text>
    </g>

    <g transform="translate(400, 70)">
      <!-- Afternoon 1 -->
      <rect width="350" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="20" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#005587">下午第一轮</text>
      <text x="20" y="65" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">开出 <tspan font-weight="bold" fill="#D04A02">3单</tspan> → 再抽一次</text>
      <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#999999">金额：16-88元</text>
    </g>

    <g transform="translate(770, 70)">
      <!-- Afternoon 2 -->
      <rect width="350" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <text x="20" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#005587">下午第二轮</text>
      <text x="20" y="65" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">开出 <tspan font-weight="bold" fill="#D04A02">6单</tspan> → 再抽一次</text>
      <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#999999">金额：16-88元</text>
    </g>
  </g>

  <!-- Bottom Left: 周维度激励 -->
  <g transform="translate(60, 390)">
    <rect width="560" height="250" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="560" height="6" rx="3" fill="#0076A8"/>

    <use data-icon="chunk/calendar" x="20" y="20" width="40" height="40" fill="#0076A8"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#0076A8">周维度：大额奖励</text>

    <g transform="translate(30, 75)">
      <rect width="500" height="140" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <text x="20" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">触发条件</text>
      <text x="20" y="65" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">大盘人均不到 <tspan font-weight="bold" fill="#D04A02">2单</tspan> 的周期</text>
      <text x="20" y="95" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">个人周开 <tspan font-weight="bold" fill="#D04A02">12单</tspan> 即可参与</text>

      <text x="280" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">奖励</text>
      <text x="280" y="65" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">抽一次奖品</text>
      <text x="280" y="95" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">金额：<tspan font-weight="bold" fill="#D04A02">50-300元</tspan></text>
    </g>
  </g>

  <!-- Bottom Right: 关键原则 -->
  <g transform="translate(660, 390)">
    <rect width="560" height="250" rx="12" fill="#FFF8F0" stroke="#FFE0B2" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="560" height="6" rx="3" fill="#D04A02"/>

    <use data-icon="chunk/alert-triangle" x="20" y="20" width="40" height="40" fill="#D04A02"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#D04A02">关键原则</text>

    <g transform="translate(30, 75)">
      <!-- Principle 1 -->
      <g transform="translate(0, 0)">
        <circle cx="12" cy="12" r="12" fill="#D04A02"/>
        <text x="12" y="17" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">1</text>
        <text x="35" y="18" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">不要天天做激励</text>
      </g>

      <!-- Principle 2 -->
      <g transform="translate(0, 45)">
        <circle cx="12" cy="12" r="12" fill="#D04A02"/>
        <text x="12" y="17" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">2</text>
        <text x="35" y="18" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">放在月头第一周、月尾做</text>
      </g>

      <!-- Principle 3 -->
      <g transform="translate(0, 90)">
        <circle cx="12" cy="12" r="12" fill="#D04A02"/>
        <text x="12" y="17" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">3</text>
        <text x="35" y="18" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">高频会降低激励价值</text>
      </g>

      <!-- Principle 4 -->
      <g transform="translate(0, 135)">
        <circle cx="12" cy="12" r="12" fill="#D04A02"/>
        <text x="12" y="17" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">4</text>
        <text x="35" y="18" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">团队PK比现金更有效</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">05 | 日周维度即时激励</text>
</svg>
