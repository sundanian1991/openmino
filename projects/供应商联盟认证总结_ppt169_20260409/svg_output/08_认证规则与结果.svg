<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">认证规则与结果</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">认证结果：所有供应商均通过认证，岐力以91分获得第一名</text>

  <!-- Left: 评分规则 -->
  <g transform="translate(60, 160)">
    <rect width="560" height="480" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="560" height="6" rx="3" fill="#005587"/>

    <use data-icon="chunk/check-circle" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#005587">评分规则</text>

    <!-- Total score -->
    <g transform="translate(30, 80)">
      <rect width="500" height="50" rx="8" fill="#005587" fill-opacity="0.1"/>
      <text x="20" y="32" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#005587">满分100分 | 80分以上通过认证</text>
    </g>

    <!-- Scoring breakdown -->
    <text x="30" y="165" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">评分构成</text>

    <!-- Item 1 -->
    <g transform="translate(30, 190)">
      <rect width="500" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <rect width="8" height="70" rx="4" fill="#005587"/>
      <text x="25" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">清晰表达有观点</text>
      <text x="25" y="55" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">25分</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(30, 275)">
      <rect width="500" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <rect width="8" height="70" rx="4" fill="#0076A8"/>
      <text x="25" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">内容完整贴合主题</text>
      <text x="25" y="55" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">25分</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(30, 360)">
      <rect width="500" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
      <rect width="8" height="70" rx="4" fill="#D04A02"/>
      <text x="25" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">结构清晰可落地</text>
      <text x="25" y="55" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">50分</text>
    </g>

    <!-- Bonus points -->
    <g transform="translate(30, 450)">
      <rect width="500" height="20" rx="4" fill="#D04A02" fill-opacity="0.1"/>
      <text x="250" y="15" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="12" fill="#D04A02">加分项：底层逻辑、延伸思考、落地可行性高</text>
    </g>
  </g>

  <!-- Right: 认证结果 -->
  <g transform="translate(660, 160)">
    <rect width="560" height="480" rx="12" fill="#FFF8E1" stroke="#FFE082" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="560" height="6" rx="3" fill="#D04A02"/>

    <use data-icon="chunk/trophy" x="20" y="20" width="40" height="40" fill="#D04A02"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#D04A02">认证结果</text>

    <!-- Top 3 podium -->
    <g transform="translate(30, 80)">
      <!-- 2nd place -->
      <g transform="translate(0, 60)">
        <rect width="140" height="140" rx="12" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="2"/>
        <text x="70" y="30" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="48" fill="#BDBDBD">2</text>
        <text x="70" y="70" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#333333">汇讯</text>
        <text x="70" y="100" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="28" font-weight="bold" fill="#757575">88分</text>
      </g>

      <!-- 1st place -->
      <g transform="translate(180, 0)">
        <rect width="160" height="200" rx="12" fill="url(#goldGradient)" stroke="#FF8C00" stroke-width="2"/>
        <use data-icon="chunk/star" x="60" y="10" width="40" height="40" fill="#FFFFFF"/>
        <text x="80" y="70" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="56" fill="#FFFFFF">1</text>
        <text x="80" y="120" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#FFFFFF">岐力</text>
        <text x="80" y="160" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="32" font-weight="bold" fill="#FFFFFF">91分</text>
      </g>

      <!-- 3rd place -->
      <g transform="translate(370, 90)">
        <rect width="140" height="110" rx="12" fill="#FFE0B2" stroke="#FFB74D" stroke-width="2"/>
        <text x="70" y="30" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="48" fill="#FF8C00">3</text>
        <text x="70" y="65" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#333333">赛维斯</text>
        <text x="70" y="95" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="28" font-weight="bold" fill="#E65100">86分</text>
      </g>
    </g>

    <!-- All passed message -->
    <g transform="translate(30, 320)">
      <rect width="500" height="140" rx="12" fill="#4CAF50" fill-opacity="0.1" stroke="#4CAF50" stroke-width="2"/>
      <use data-icon="chunk/check-circle" x="20" y="20" width="40" height="40" fill="#4CAF50"/>
      <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#2E7D32">所有供应商均通过认证</text>

      <text x="30" y="85" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">• 岐力：91分（第一名）</text>
      <text x="30" y="110" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">• 汇讯：88分（第二名）</text>
      <text x="280" y="85" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">• 赛维斯：86分（第三名）</text>
      <text x="280" y="110" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">• 华啸、广达、瀚锐均通过</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">08 | 认证规则与结果</text>
</svg>
