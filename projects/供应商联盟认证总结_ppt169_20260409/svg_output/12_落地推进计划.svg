<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">三个月推进计划</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">推进策略：新人团队全面执行新标准，老团队逐步推进，用新成果倒逼老团队改变</text>

  <!-- Three month timeline -->
  <!-- Month 1 -->
  <g transform="translate(60, 160)">
    <rect width="360" height="480" rx="12" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#1976D2"/>

    <!-- Month badge -->
    <rect x="20" y="15" width="100" height="35" rx="17" fill="#1976D2"/>
    <text x="70" y="40" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#FFFFFF">第一个月</text>

    <text x="20" y="80" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#1976D2">基础搭建</text>

    <!-- Tasks -->
    <g transform="translate(20, 110)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/tag" x="15" y="15" width="30" height="30" fill="#1976D2"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">名产梳理打标</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">客户ABCD分级</text>
    </g>

    <g transform="translate(20, 195)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/list-details" x="15" y="15" width="30" height="30" fill="#1976D2"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">搭建标准化SOP</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">话术库框架</text>
    </g>

    <g transform="translate(20, 280)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/bar-chart" x="15" y="15" width="30" height="30" fill="#1976D2"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">建立数据体系</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">评估标准</text>
    </g>

    <!-- Focus note -->
    <g transform="translate(20, 375)">
      <rect width="320" height="85" rx="8" fill="#1976D2" fill-opacity="0.1"/>
      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#1976D2">核心目标</text>
      <text x="20" y="55" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#333333">完成基础数据梳理</text>
      <text x="20" y="75" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#333333">建立标准化框架</text>
    </g>
  </g>

  <!-- Month 2 -->
  <g transform="translate(460, 160)">
    <rect width="360" height="480" rx="12" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#7B1FA2"/>

    <!-- Month badge -->
    <rect x="20" y="15" width="100" height="35" rx="17" fill="#7B1FA2"/>
    <text x="70" y="40" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#FFFFFF">第二个月</text>

    <text x="20" y="80" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#7B1FA2">落地执行</text>

    <!-- Tasks -->
    <g transform="translate(20, 110)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/play-circle" x="15" y="15" width="30" height="30" fill="#7B1FA2"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">落地新流程</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">执行标准化SOP</text>
    </g>

    <g transform="translate(20, 195)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon:chunk/users="15" y="15" width="30" height="30" fill="#7B1FA2"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">新人团队全面执行</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">新标准100%覆盖</text>
    </g>

    <g transform="translate(20, 280)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/git-branch" x="15" y="15" width="30" height="30" fill="#7B1FA2"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">老团队逐步推进</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">可落地措施优先</text>
    </g>

    <!-- Focus note -->
    <g transform="translate(20, 375)">
      <rect width="320" height="85" rx="8" fill="#7B1FA2" fill-opacity="0.1"/>
      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#7B1FA2">核心目标</text>
      <text x="20" y="55" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#333333">新团队全面执行</text>
      <text x="20" y="75" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#333333">老团队逐步跟进</text>
    </g>
  </g>

  <!-- Month 3 -->
  <g transform="translate(860, 160)">
    <rect width="360" height="480" rx="12" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#388E3C"/>

    <!-- Month badge -->
    <rect x="20" y="15" width="100" height="35" rx="17" fill="#388E3C"/>
    <text x="70" y="40" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#FFFFFF">第三个月</text>

    <text x="20" y="80" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#388E3C">复盘优化</text>

    <!-- Tasks -->
    <g transform="translate(20, 110)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/refresh" x="15" y="15" width="30" height="30" fill="#388E3C"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">建立复盘机制</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">定期数据回顾</text>
    </g>

    <g transform="translate(20, 195)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/check-circle" x="15" y="15" width="30" height="30" fill="#388E3C"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">完成试点验证</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">总结成功经验</text>
    </g>

    <g transform="translate(20, 280)">
      <rect width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/trending-up" x="15" y="15" width="30" height="30" fill="#388E3C"/>
      <text x="55" y="37" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">新成果倒逼老团队</text>
      <text x="55" y="58" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#666666">用数据说话</text>
    </g>

    <!-- Focus note -->
    <g transform="translate(20, 375)">
      <rect width="320" height="85" rx="8" fill="#388E3C" fill-opacity="0.1"/>
      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#388E3C">核心目标</text>
      <text x="20" y="55" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#333333">验证效果形成闭环</text>
      <text x="20" y="75" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#333333">全面推广准备就绪</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">12 | 三个月推进计划</text>
</svg>
