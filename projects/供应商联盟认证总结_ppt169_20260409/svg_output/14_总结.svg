<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005587"/>
      <stop offset="100%" stop-color="#0076A8"/>
    </linearGradient>
    <radialGradient id="decorGlow" cx="20%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect width="1280" height="720" fill="url(#decorGlow)"/>

  <!-- Decorative top bar -->
  <rect x="0" y="0" width="1280" height="8" fill="#D04A02"/>

  <!-- Main content centered -->
  <g transform="translate(640, 280)">
    <!-- Icon badge -->
    <circle cx="0" cy="-120" r="56" fill="#FFFFFF" fill-opacity="0.15"/>
    <circle cx="0" cy="-120" r="48" fill="#FFFFFF" fill-opacity="0.25"/>
    <use data-icon="chunk/users" x="-24" y="-144" width="48" height="48" fill="#FFFFFF"/>

    <!-- Main title -->
    <text text-anchor="middle" y="20" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="56" fill="#FFFFFF">携手推进，共创价值</text>

    <!-- Subtitle -->
    <text text-anchor="middle" y="70" font-family="Microsoft YaHei, Calibri" font-size="22" fill="#FFFFFF" fill-opacity="0.9">BPO供应商联盟 · 标准化运营落地</text>
  </g>

  <!-- Three key points -->
  <g transform="translate(190, 400)">
    <rect width="280" height="180" rx="16" fill="#FFFFFF" fill-opacity="0.15"/>
    <rect width="280" height="180" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2"/>

    <use data-icon="chunk/check-circle" x="30" y="25" width="40" height="40" fill="#FFFFFF"/>
    <text x="85" y="53" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#FFFFFF">认证通过</text>

    <text x="30" y="100" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">所有供应商</text>
    <text x="30" y="130" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">均通过认证</text>
    <text x="30" y="160" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">明确改进方向</text>
  </g>

  <g transform="translate(500, 400)">
    <rect width="280" height="180" rx="16" fill="#FFFFFF" fill-opacity="0.15"/>
    <rect width="280" height="180" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2"/>

    <use data-icon="chunk/target" x="30" y="25" width="40" height="40" fill="#FFFFFF"/>
    <text x="85" y="53" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#FFFFFF">落地方案</text>

    <text x="30" y="100" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">差异化改进</text>
    <text x="30" y="130" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">三阶段推进</text>
    <text x="30" y="160" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">可量化指标</text>
  </g>

  <g transform="translate(810, 400)">
    <rect width="280" height="180" rx="16" fill="#FFFFFF" fill-opacity="0.15"/>
    <rect width="280" height="180" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2"/>

    <use data-icon="chunk/trending-up" x="30" y="25" width="40" height="40" fill="#FFFFFF"/>
    <text x="85" y="53" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#FFFFFF">持续开放</text>

    <text x="30" y="100" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">联盟持续共享</text>
    <text x="30" y="130" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">提升整体产能</text>
    <text x="30" y="160" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#FFFFFF" fill-opacity="0.9">携手共进发展</text>
  </g>

  <!-- Bottom accent -->
  <rect x="540" y="650" width="200" height="4" rx="2" fill="#D04A02"/>

  <!-- Footer info -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#FFFFFF" fill-opacity="0.7">供应商联盟认证总结会 | 2026年4月</text>
  <text x="1220" y="695" text-anchor="end" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#FFFFFF" fill-opacity="0.7">14</text>
</svg>
