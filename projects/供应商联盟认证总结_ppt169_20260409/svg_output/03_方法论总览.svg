<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">电销管理六大核心模块</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心洞察：标准化运营是提升电销产能的关键，六大模块相互支撑形成闭环管理体系</text>

  <!-- Six module cards in 2x3 grid -->
  <!-- Row 1 -->
  <g transform="translate(60, 160)">
    <rect width="350" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/users" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">坐席分级管理</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">ABC分级竞争机制</text>
    <text x="20" y="118" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">同等级竞争晋升路径</text>
    <text x="20" y="146" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">名单量差异化分配</text>
  </g>

  <g transform="translate(465, 160)">
    <rect width="350" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/list-details" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">话术沉淀体系</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">7类专项话术库</text>
    <text x="20" y="118" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">月度迭代更新</text>
    <text x="20" y="146" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">绩优分享标准化</text>
  </g>

  <g transform="translate(870, 160)">
    <rect width="350" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/gift" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#005587">团队激励方案</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">日周维度即时激励</text>
    <text x="20" y="118" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">团队PK活动</text>
    <text x="20" y="146" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">可视化排名体系</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(60, 360)">
    <rect width="350" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/calendar-clock" x="20" y="20" width="40" height="40" fill="#0076A8"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#0076A8">三会管理流程</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">早会15分钟结果对齐</text>
    <text x="20" y="118" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">午会10分钟叫醒</text>
    <text x="20" y="146" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">晚会复盘培训</text>
  </g>

  <g transform="translate(465, 360)">
    <rect width="350" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/database" x="20" y="20" width="40" height="40" fill="#0076A8"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#0076A8">名单管控规则</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">新名单静置2-3天</text>
    <text x="20" y="118" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">单名单拨打≤40次</text>
    <text x="20" y="146" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">周末全量回收清零</text>
  </g>

  <g transform="translate(870, 360)">
    <rect width="350" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <use data-icon="chunk/clock" x="20" y="20" width="40" height="40" fill="#0076A8"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="20" fill="#0076A8">分时段拨打策略</text>
    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">9:00-9:30回拨高意向</text>
    <text x="20" y="118" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">18:30-19:30黄金时段</text>
    <text x="20" y="146" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#666666">客户ABCD分级优先</text>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">03 | 电销管理六大核心模块</text>
</svg>
