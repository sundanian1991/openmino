<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">汇讯：管理工具优化方向</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心收获：已落地BI看板和WPS智能看板，需补充夕会记录表和新人成长记录表</text>

  <!-- Left: 现有工具 (40%) -->
  <g transform="translate(60, 160)">
    <rect width="450" height="480" rx="12" fill="#F1F8E9" stroke="#C5E1A5" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="450" height="6" rx="3" fill="#4CAF50"/>

    <use data-icon="chunk/check-circle" x="20" y="20" width="40" height="40" fill="#4CAF50"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#4CAF50">现有工具</text>

    <!-- Tool 1: BI看板 -->
    <g transform="translate(25, 85)">
      <rect width="400" height="120" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/bar-chart" x="15" y="15" width="35" height="35" fill="#4CAF50"/>
      <text x="65" y="40" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">BI看板</text>

      <g transform="translate(15, 60)">
        <text x="0" y="0" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 多维度数据追踪</text>
        <text x="0" y="25" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 分周期统计分析</text>
        <text x="0" y="50" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 分组到人数据监控</text>
      </g>
    </g>

    <!-- Tool 2: WPS智能看板 -->
    <g transform="translate(25, 220)">
      <rect width="400" height="120" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <use data-icon="chunk/device-mobile" x="15" y="15" width="35" height="35" fill="#4CAF50"/>
      <text x="65" y="40" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">WPS智能看板</text>

      <g transform="translate(15, 60)">
        <text x="0" y="0" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 钉钉绑定推送</text>
        <text x="0" y="25" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 定时数据报告</text>
        <text x="0" y="50" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 移动端查看</text>
      </g>
    </g>

    <!-- Planned addition -->
    <g transform="translate(25, 355)">
      <rect width="400" height="100" rx="10" fill="#4CAF50" fill-opacity="0.1" stroke="#4CAF50" stroke-width="1"/>

      <use data-icon="chunk/plus-circle" x="15" y="15" width="35" height="35" fill="#4CAF50"/>
      <text x="65" y="40" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#4CAF50">待补充</text>

      <text x="15" y="75" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">• 现场大屏实时展示</text>
    </g>
  </g>

  <!-- Right: 待补充工具 (60%) -->
  <g transform="translate(540, 160)">
    <rect width="680" height="480" rx="12" fill="#FFF3E0" stroke="#FFE0B2" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="680" height="6" rx="3" fill="#F57C00"/>

    <use data-icon="chunk/plus-circle" x="20" y="20" width="40" height="40" fill="#F57C00"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#F57C00">待补充管理工具</text>

    <!-- Missing tools grid -->
    <!-- Tool 1 -->
    <g transform="translate(30, 85)">
      <rect width="620" height="80" rx="10" fill="#FFFFFF" stroke="#FFE0B2" stroke-width="1"/>

      <circle cx="40" cy="40" r="20" fill="#F57C00" fill-opacity="0.2"/>
      <text x="40" y="47" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#F57C00">1</text>

      <text x="75" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">夕会问题记录表</text>
      <text x="75" y="60" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#666666">记录每日问题，确保闭环解决</text>
    </g>

    <!-- Tool 2 -->
    <g transform="translate(30, 180)">
      <rect width="620" height="80" rx="10" fill="#FFFFFF" stroke="#FFE0B2" stroke-width="1"/>

      <circle cx="40" cy="40" r="20" fill="#F57C00" fill-opacity="0.2"/>
      <text x="40" y="47" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#F57C00">2</text>

      <text x="75" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">新人30天成长记录表</text>
      <text x="75" y="60" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#666666">追踪新人培训进度和能力成长</text>
    </g>

    <!-- Tool 3 -->
    <g transform="translate(30, 275)">
      <rect width="620" height="80" rx="10" fill="#FFFFFF" stroke="#FFE0B2" stroke-width="1"/>

      <circle cx="40" cy="40" r="20" fill="#F57C00" fill-opacity="0.2"/>
      <text x="40" y="47" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#F57C00">3</text>

      <text x="75" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">60秒非有效名单回收流程</text>
      <text x="75" y="60" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#666666">提升坐席名单使用效率</text>
    </g>

    <!-- Tool 4 -->
    <g transform="translate(30, 370)">
      <rect width="620" height="80" rx="10" fill="#FFFFFF" stroke="#FFE0B2" stroke-width="1"/>

      <circle cx="40" cy="40" r="20" fill="#F57C00" fill-opacity="0.2"/>
      <text x="40" y="47" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#F57C00">4</text>

      <text x="75" y="35" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#333333">标准化质检流程</text>
      <text x="75" y="60" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#666666">第一时间同步问题解决方案</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">10 | 汇讯：管理工具优化方向</text>
</svg>
