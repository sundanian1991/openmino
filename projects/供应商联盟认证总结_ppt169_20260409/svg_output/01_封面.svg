<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005587"/>
      <stop offset="100%" stop-color="#0076A8"/>
    </linearGradient>
    <radialGradient id="bgDecor" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#005587" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#005587" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bgDecor)"/>

  <!-- Decorative top bar -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#titleGradient)"/>

  <!-- Main content centered -->
  <g transform="translate(640, 320)">
    <!-- Icon badge -->
    <circle cx="0" cy="-140" r="48" fill="#005587" fill-opacity="0.1"/>
    <use data-icon="chunk/users" x="-24" y="-164" width="48" height="48" fill="#005587"/>

    <!-- Main title -->
    <text text-anchor="middle" y="0" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="60" fill="#005587">BPO 供应商联盟认证总结会</text>

    <!-- Subtitle -->
    <text text-anchor="middle" y="50" font-family="Microsoft YaHei, Calibri" font-size="28" fill="#666666">标准化运营方法论与落地实践</text>

    <!-- Date -->
    <text text-anchor="middle" y="110" font-family="Microsoft YaHei, Calibri" font-size="22" fill="#999999">2026年4月</text>
  </g>

  <!-- Bottom accent -->
  <rect x="540" y="650" width="200" height="4" rx="2" fill="#D04A02"/>

  <!-- Footer info -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">供应商联盟认证总结 | 2026</text>
</svg>
