<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">岐力：标准化落地三阶段</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心策略：分阶段推进，先建立认知，再培优覆盖，最后全团队推广</text>

  <!-- Three phase cards horizontally -->
  <!-- Phase 1 -->
  <g transform="translate(60, 160)">
    <rect width="360" height="480" rx="12" fill="#F0F8FF" stroke="#B3D9FF" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#005587"/>

    <!-- Phase badge -->
    <rect x="20" y="15" width="80" height="30" rx="15" fill="#005587"/>
    <text x="60" y="36" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">第一阶段</text>

    <text x="20" y="75" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#005587">建立初步认知</text>

    <!-- Focus area -->
    <g transform="translate(20, 100)">
      <rect width="320" height="180" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">管控重点</text>

      <g transform="translate(20, 50)">
        <circle cx="8" cy="8" r="6" fill="#005587"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">管控准入端</text>
      </g>

      <g transform="translate(20, 85)">
        <circle cx="8" cy="8" r="6" fill="#005587"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">执行话术模式表</text>
      </g>

      <g transform="translate(20, 120)">
        <circle cx="8" cy="8" r="6" fill="#005587"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">人员画像要求</text>
      </g>

      <g transform="translate(20, 155)">
        <circle cx="8" cy="8" r="6" fill="#005587"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">新人新办法老人老办法</text>
      </g>
    </g>

    <!-- Target metrics -->
    <g transform="translate(20, 300)">
      <rect width="320" height="160" rx="8" fill="#005587" fill-opacity="0.05"/>

      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#005587">目标</text>

      <g transform="translate(20, 55)">
        <text x="0" y="0" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">新员工手动流数据</text>
        <text x="0" y="30" font-family="Microsoft YaHei, Calibri" font-weight="bold" font-size="28" fill="#D04A02">降低 50%</text>
      </g>

      <line x1="20" y1="100" x2="300" y2="100" stroke="#E0E0E0" stroke-width="1"/>

      <text x="20" y="130" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">管理层养成每日数据查看习惯</text>
    </g>
  </g>

  <!-- Phase 2 -->
  <g transform="translate(460, 160)">
    <rect width="360" height="480" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#0076A8"/>

    <!-- Phase badge -->
    <rect x="20" y="15" width="80" height="30" rx="15" fill="#0076A8"/>
    <text x="60" y="36" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">第二阶段</text>

    <text x="20" y="75" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#0076A8">培优覆盖</text>

    <!-- Time box -->
    <rect x="20" y="95" width="320" height="35" rx="8" fill="#0076A8" fill-opacity="0.1"/>
    <text x="180" y="120" text-anchor="middle" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#0076A8">2-3个月</text>

    <!-- Focus area -->
    <g transform="translate(20, 145)">
      <rect width="320" height="200" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">推进重点</text>

      <g transform="translate(20, 55)">
        <rect width="280" height="35" rx="6" fill="#0076A8" fill-opacity="0.1"/>
        <text x="15" y="24" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">覆盖 <tspan font-weight="bold" fill="#0076A8">25%-40%</tspan> 员工</text>
      </g>

      <g transform="translate(20, 100)">
        <rect width="280" height="35" rx="6" fill="#0076A8" fill-opacity="0.1"/>
        <text x="15" y="24" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">标准化制度管理</text>
      </g>

      <g transform="translate(20, 145)">
        <rect width="280" height="35" rx="6" fill="#0076A8" fill-opacity="0.1"/>
        <text x="15" y="24" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">打造核心团队</text>
      </g>
    </g>

    <!-- Budget note -->
    <g transform="translate(20, 365)">
      <rect width="320" height="95" rx="8" fill="#FFF3E0" stroke="#FFE0B2" stroke-width="1"/>
      <use data-icon="chunk/dollar" x="15" y="15" width="30" height="30" fill="#F57C00"/>
      <text x="55" y="38" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#F57C00">专项预算支持</text>
      <text x="20" y="70" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">给存量30%潜力员工</text>
      <text x="20" y="88" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">倾斜资源</text>
    </g>
  </g>

  <!-- Phase 3 -->
  <g transform="translate(860, 160)">
    <rect width="360" height="480" rx="12" fill="#F1F8E9" stroke="#C5E1A5" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#4CAF50"/>

    <!-- Phase badge -->
    <rect x="20" y="15" width="80" height="30" rx="15" fill="#4CAF50"/>
    <text x="60" y="36" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="14" fill="#FFFFFF">第三阶段</text>

    <text x="20" y="75" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="24" fill="#4CAF50">全团队推广</text>

    <!-- Focus area -->
    <g transform="translate(20, 100)">
      <rect width="320" height="245" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

      <text x="20" y="30" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#333333">推进重点</text>

      <g transform="translate(20, 55)">
        <circle cx="8" cy="8" r="6" fill="#4CAF50"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">验证成熟的管理制度</text>
      </g>

      <g transform="translate(20, 90)">
        <circle cx="8" cy="8" r="6" fill="#4CAF50"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">工具迭代后推广</text>
      </g>

      <g transform="translate(20, 125)">
        <circle cx="8" cy="8" r="6" fill="#4CAF50"/>
        <text x="25" y="13" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">实现全团队标准化</text>
      </g>

      <line x1="20" y1="155" x2="300" y2="155" stroke="#E0E0E0" stroke-width="1"/>

      <text x="20" y="185" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="16" fill="#4CAF50">最终目标</text>
      <text x="20" y="215" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">所有员工按标准执行</text>
      <text x="20" y="235" font-family="Microsoft YaHei, Calibri" font-size="15" fill="#333333">管理动作系统化</text>
    </g>
  </g>

  <!-- Bottom: 保障措施 -->
  <g transform="translate(60, 670)">
    <rect width="1160" height="1" fill="#E0E0E0"/>
    <text x="0" y="-15" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">保障措施：已启动专项小组，由组织发展部和合规部牵头，所有任务绑定绩效考核</text>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">09 | 岐力：标准化落地三阶段</text>
</svg>
