<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#005587" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="60" y="55" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="36" fill="#005587">标准化落地关键指标</text>
  <line x1="60" y1="75" x2="1220" y2="75" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Takeaway box -->
  <rect x="60" y="95" width="1160" height="40" rx="8" fill="#005587" fill-opacity="0.08"/>
  <text x="80" y="122" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#005587">核心目标：通过可量化的指标体系，确保标准化运营落地效果可追踪、可验证</text>

  <!-- KPI Cards - 2 rows of 3 -->
  <!-- Row 1 -->
  <!-- Card 1: 人员管理 -->
  <g transform="translate(60, 160)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#005587"/>

    <use data-icon="chunk/users" x="20" y="20" width="40" height="40" fill="#005587"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#005587">人员管理</text>

    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">ABC梯队建设覆盖率</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="42" fill="#005587">100%</text>

    <use data-icon="chunk/arrow-trend-up" x="250" y="100" width="30" height="30" fill="#4CAF50"/>
  </g>

  <!-- Card 2: 激励体系 -->
  <g transform="translate(460, 160)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#0076A8"/>

    <use data-icon="chunk/gift" x="20" y="20" width="40" height="40" fill="#0076A8"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#0076A8">激励体系</text>

    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">日周月分层激励参与率</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="42" fill="#0076A8">&gt;80%</text>

    <use data-icon="chunk/arrow-trend-up" x="250" y="100" width="30" height="30" fill="#4CAF50"/>
  </g>

  <!-- Card 3: 数据驱动 -->
  <g transform="translate(860, 160)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#D04A02"/>

    <use data-icon="chunk/bar-chart" x="20" y="20" width="40" height="40" fill="#D04A02"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#D04A02">数据驱动</text>

    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">每日数据查看执行率</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="42" fill="#D04A02">100%</text>

    <use data-icon="chunk/check-circle" x="250" y="100" width="30" height="30" fill="#4CAF50"/>
  </g>

  <!-- Row 2 -->
  <!-- Card 4: 话术迭代 -->
  <g transform="translate(60, 370)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#4CAF50"/>

    <use data-icon="chunk/list-details" x="20" y="20" width="40" height="40" fill="#4CAF50"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#4CAF50">话术迭代</text>

    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">月度话术更新及时率</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="42" fill="#4CAF50">100%</text>

    <use data-icon="chunk/check-circle" x="250" y="100" width="30" height="30" fill="#4CAF50"/>
  </g>

  <!-- Card 5: 三会执行 -->
  <g transform="translate(460, 370)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#7B1FA2"/>

    <use data-icon="chunk/calendar-clock" x="20" y="20" width="40" height="40" fill="#7B1FA2"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#7B1FA2">三会执行</text>

    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">早会午会晚会达标率</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="42" fill="#7B1FA2">&gt;95%</text>

    <use data-icon="chunk/arrow-trend-up" x="250" y="100" width="30" height="30" fill="#4CAF50"/>
  </g>

  <!-- Card 6: 名单效率 -->
  <g transform="translate(860, 370)">
    <rect width="360" height="180" rx="12" fill="#F5F8FA" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
    <rect width="360" height="6" rx="3" fill="#F57C00"/>

    <use data-icon="chunk/database" x="20" y="20" width="40" height="40" fill="#F57C00"/>
    <text x="75" y="48" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#F57C00">名单效率</text>

    <text x="20" y="90" font-family="Microsoft YaHei, Calibri" font-size="14" fill="#666666">名单利用率提升</text>
    <text x="20" y="130" font-family="Microsoft YaHei, Arial" font-weight="bold" font-size="42" fill="#F57C00">&gt;30%</text>

    <use data-icon="chunk/arrow-trend-up" x="250" y="100" width="30" height="30" fill="#4CAF50"/>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 580)">
    <rect width="1160" height="60" rx="12" fill="#005587" fill-opacity="0.05"/>
    <use data-icon="chunk/info" x="20" y="15" width="30" height="30" fill="#005587"/>
    <text x="65" y="38" font-family="Microsoft YaHei, Calibri" font-size="16" fill="#333333">指标说明：以上指标为标准化运营落地的关键成功要素，需定期追踪、公开公示、与绩效挂钩</text>
  </g>

  <!-- Footer -->
  <text x="60" y="695" font-family="Microsoft YaHei, Calibri" font-size="13" fill="#999999">13 | 标准化落地关键指标</text>
</svg>
