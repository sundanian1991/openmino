<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
  <rect width="680" height="420" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="34" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">Subagent context flow</text>
  <text x="40" y="50" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">What gets passed when spawning a subagent</text>

  <!-- LEFT — Parent Agent container -->
  <rect x="40" y="60" width="260" height="300" rx="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="52" y="82" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Parent Agent</text>

  <!-- Inside Parent -->
  <!-- system prompt -->
  <rect x="52" y="94" width="236" height="28" rx="4" fill="#e8e4dc" stroke="#d4d1c7" stroke-width="1"/>
  <text x="60" y="113" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">system prompt</text>

  <!-- CLAUDE.md -->
  <rect x="52" y="128" width="236" height="25" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="60" y="145" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">CLAUDE.md</text>

  <!-- conversation -->
  <rect x="52" y="159" width="236" height="45" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="60" y="177" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">conversation</text>
  <text x="60" y="193" font-family="Georgia, serif" font-size="10" fill="#999">... multi-turn exchange ...</text>

  <!-- tool calls -->
  <rect x="52" y="210" width="236" height="35" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="60" y="228" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">tool calls</text>
  <text x="60" y="241" font-family="Georgia, serif" font-size="10" fill="#999">read_file, grep, glob...</text>

  <!-- file reads -->
  <rect x="52" y="251" width="236" height="35" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="60" y="269" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">file reads</text>
  <!-- Sub-items -->
  <rect x="68" y="275" width="56" height="10" rx="2" fill="#e8e4dc"/>
  <text x="72" y="283" font-family="Georgia, serif" font-size="8" fill="#6b6b6b">grep src/</text>
  <rect x="130" y="275" width="60" height="10" rx="2" fill="#e8e4dc"/>
  <text x="134" y="283" font-family="Georgia, serif" font-size="8" fill="#6b6b6b">grep docs/</text>
  <rect x="196" y="275" width="72" height="10" rx="2" fill="#e8e4dc"/>
  <text x="200" y="283" font-family="Georgia, serif" font-size="8" fill="#6b6b6b">read config</text>

  <!-- dead ends -->
  <rect x="52" y="292" width="236" height="30" rx="4" fill="#faf9f7" stroke="#e8e4dc" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="60" y="309" font-family="Georgia, serif" font-size="10" fill="#999">dead ends</text>
  <!-- Sub-items -->
  <rect x="68" y="314" width="48" height="6" rx="2" fill="#e8e4dc"/>
  <text x="72" y="319" font-family="Georgia, serif" font-size="7" fill="#999">20 file reads</text>
  <rect x="122" y="314" width="32" height="6" rx="2" fill="#e8e4dc"/>
  <text x="126" y="319" font-family="Georgia, serif" font-size="7" fill="#999">12 greps</text>
  <rect x="160" y="314" width="42" height="6" rx="2" fill="#e8e4dc"/>
  <text x="164" y="319" font-family="Georgia, serif" font-size="7" fill="#999">3 dead ends</text>

  <!-- RIGHT — Subagent container -->
  <rect x="400" y="60" width="240" height="300" rx="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="412" y="82" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Subagent</text>

  <!-- Inside Subagent -->
  <!-- system prompt -->
  <rect x="412" y="94" width="216" height="28" rx="4" fill="#e8e4dc" stroke="#d4d1c7" stroke-width="1"/>
  <text x="420" y="113" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">system prompt</text>

  <!-- task instruction -->
  <rect x="412" y="128" width="216" height="35" rx="4" fill="#f0ece4" stroke="#d4d1c7" stroke-width="1"/>
  <text x="420" y="146" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">task instruction</text>
  <text x="420" y="160" font-family="Georgia, serif" font-size="10" fill="#999">focused directive</text>

  <!-- relevant files -->
  <rect x="412" y="169" width="216" height="35" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="420" y="187" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">relevant files</text>
  <rect x="428" y="193" width="52" height="8" rx="2" fill="#e8e4dc"/>
  <text x="432" y="200" font-family="Georgia, serif" font-size="8" fill="#6b6b6b">config.ts</text>
  <rect x="486" y="193" width="56" height="8" rx="2" fill="#e8e4dc"/>
  <text x="490" y="200" font-family="Georgia, serif" font-size="8" fill="#6b6b6b">utils.ts</text>

  <!-- conversation snippet -->
  <rect x="412" y="210" width="216" height="25" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="420" y="227" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">conversation snippet</text>

  <!-- Empty space label -->
  <text x="420" y="280" font-family="Georgia, serif" font-size="10" fill="#999" font-style="italic">Exploration noise stays in parent</text>
  <text x="420" y="296" font-family="Georgia, serif" font-size="10" fill="#999" font-style="italic">dead ends, retries, false paths</text>

  <!-- Arrow: parent -> subagent (spawn) -->
  <line x1="310" y1="120" x2="396" y2="120" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="338" y="112" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">spawn</text>

  <!-- Arrow: subagent -> parent (result returns) -->
  <line x1="396" y1="280" x2="310" y2="280" stroke="#c98a6a" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <text x="310" y="272" font-family="Georgia, serif" font-size="11" fill="#6b6b6b" text-anchor="middle">only result returns</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c98a6a"/>
    </marker>
    <marker id="arrowLeft" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#c98a6a"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="340" y="395" font-family="Georgia, serif" font-size="10" fill="#6b6b6b" font-style="italic" text-anchor="middle">The exploration noise is garbage-collected when the subagent exits.</text>
</svg>
