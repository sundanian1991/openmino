<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" width="680" height="380">
  <rect width="680" height="380" fill="#faf9f7"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">Session history vs What Claude sees</text>
  <text x="340" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">Not everything in the session makes it into the context window</text>

  <!-- LEFT SIDE — Session history -->
  <text x="40" y="55" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Session history</text>
  <rect x="40" y="60" width="280" height="280" rx="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Left items -->
  <rect x="52" y="72" width="256" height="30" rx="4" fill="#e8e4dc" stroke="#d4d1c7" stroke-width="1"/>
  <text x="64" y="92" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">system prompt</text>

  <rect x="52" y="106" width="256" height="25" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="64" y="123" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">CLAUDE.md</text>

  <rect x="52" y="135" width="256" height="35" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="64" y="158" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">user message 1</text>

  <rect x="52" y="174" width="256" height="35" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="64" y="197" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">assistant response</text>

  <rect x="52" y="213" width="256" height="40" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="64" y="238" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">tool call + result</text>

  <rect x="52" y="257" width="256" height="30" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="64" y="277" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">user message 2</text>

  <rect x="52" y="291" width="256" height="25" rx="4" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="64" y="308" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">file read (dead end)</text>

  <rect x="52" y="320" width="256" height="25" rx="4" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="64" y="337" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">grep output</text>

  <!-- Arrow between containers -->
  <line x1="328" y1="200" x2="352" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="352,195 362,200 352,205" fill="#1a1a1a"/>
  <text x="345" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6b6b6b">context</text>
  <text x="345" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6b6b6b">window</text>

  <!-- RIGHT SIDE — What Claude sees -->
  <text x="360" y="55" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">What Claude sees</text>
  <rect x="360" y="60" width="280" height="280" rx="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Right items -->
  <rect x="372" y="72" width="256" height="30" rx="4" fill="#e8e4dc" stroke="#d4d1c7" stroke-width="1"/>
  <text x="384" y="92" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">system prompt</text>

  <rect x="372" y="106" width="256" height="25" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="384" y="123" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">CLAUDE.md</text>

  <rect x="372" y="135" width="256" height="20" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="384" y="149" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">user message 1</text>

  <rect x="372" y="159" width="256" height="20" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="384" y="173" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">assistant summary</text>

  <rect x="372" y="183" width="256" height="35" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="384" y="206" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">tool call + result</text>

  <rect x="372" y="222" width="256" height="30" rx="4" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="384" y="242" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">user message 2</text>

  <rect x="372" y="256" width="256" height="40" rx="4" fill="#faf9f7" stroke="none"/>
  <text x="500" y="281" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#999999">compacted</text>

  <!-- Bottom note -->
  <text x="340" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6b6b6b">Dead-end explorations and tool outputs that aren't referenced may be dropped</text>
</svg>