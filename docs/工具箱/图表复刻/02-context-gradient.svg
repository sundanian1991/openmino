<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
  <!-- Background -->
  <rect width="680" height="420" fill="#faf9f7"/>

  <!-- Title -->
  <text x="40" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">Context changes as the window fills up</text>

  <!-- Subtitle -->
  <text x="40" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">The model's ability to reason about earlier context degrades</text>

  <!-- Gradient bar segments -->
  <rect x="40" y="60" width="80" height="30" fill="#2d2d3a" rx="4" ry="0"/>
  <rect x="120" y="60" width="60" height="30" fill="#4a4a5a"/>
  <rect x="180" y="60" width="140" height="30" fill="#6a6a7a"/>
  <rect x="320" y="60" width="160" height="30" fill="#9a9aaa"/>
  <rect x="480" y="60" width="160" height="30" fill="#c8c8d0" rx="0" ry="4"/>

  <!-- Gradient bar text labels -->
  <text x="80" y="80" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">system</text>
  <text x="150" y="79" font-family="system-ui, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">CLAUDE.md</text>
  <text x="250" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#d0d0d0" text-anchor="middle">early conversation</text>
  <text x="400" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">recent turns</text>
  <text x="560" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#707070" text-anchor="middle">too far back</text>

  <!-- Below gradient bar labels -->
  <text x="110" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a" text-anchor="middle">sharp</text>
  <text x="290" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b" text-anchor="middle">rotting</text>
  <text x="560" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="middle">gone</text>

  <!-- Card 1 -->
  <rect x="40" y="140" width="600" height="80" rx="6" fill="#ffffff" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="40" y="140" width="3" height="80" fill="#c98a6a" rx="1.5"/>
  <text x="58" y="165" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Context window is not all equal</text>
  <text x="58" y="187" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">Recent context is more useful than early context. The model reasons</text>
  <text x="58" y="203" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">better about things near the end of the window.</text>

  <!-- Card 2 -->
  <rect x="40" y="235" width="600" height="80" rx="6" fill="#ffffff" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="40" y="235" width="3" height="80" fill="#8f9b7f" rx="1.5"/>
  <text x="58" y="260" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Compacting old context</text>
  <text x="58" y="282" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">Summarize earlier parts of the conversation to free up space.</text>
  <text x="58" y="298" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">Keep recent context detailed.</text>

  <!-- Card 3 -->
  <rect x="40" y="325" width="600" height="80" rx="6" fill="#ffffff" stroke="#d4d1c7" stroke-width="1"/>
  <rect x="40" y="325" width="3" height="80" fill="#6b7fa3" rx="1.5"/>
  <text x="58" y="350" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Strategic placement</text>
  <text x="58" y="372" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">Put critical instructions at the end of the prompt. The model</text>
  <text x="58" y="388" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">attends to recent text more carefully.</text>
</svg>
