<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340">
  <rect width="680" height="340" fill="#faf9f7"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">Five context management strategies</text>
  <text x="340" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">From least to most aggressive</text>

  <!-- Spectrum axis line -->
  <line x1="80" y1="60" x2="590" y2="60" stroke="#d4d1c7" stroke-width="2"/>
  <!-- Arrow at right end -->
  <polygon points="590,55 600,60 590,65" fill="#d4d1c7"/>

  <!-- Axis labels -->
  <text x="80" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6b6b6b">Preserve</text>
  <text x="590" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6b6b6b">Compact</text>

  <!-- Card 1: Do nothing -->
  <rect x="50" y="80" width="90" height="180" rx="6" fill="#f0ece4" stroke="#d4d1c7" stroke-width="1"/>
  <circle cx="95" cy="100" r="5" fill="#d4d1c7"/>
  <text x="95" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1a1a1a">Do nothing</text>
  <text x="95" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Let the window fill</text>
  <text x="95" y="164" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">naturally. Oldest</text>
  <text x="95" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">context drops off</text>
  <text x="95" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">first.</text>

  <!-- Card 2: Manual trim -->
  <rect x="158" y="80" width="90" height="180" rx="6" fill="#e8e4dc" stroke="#c9b896" stroke-width="1"/>
  <circle cx="203" cy="100" r="5" fill="#c9b896"/>
  <text x="203" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1a1a1a">Manual trim</text>
  <text x="203" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Periodically summa-</text>
  <text x="203" y="164" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">rize or remove old</text>
  <text x="203" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">context yourself.</text>

  <!-- Card 3: Auto compact -->
  <rect x="266" y="80" width="90" height="180" rx="6" fill="#e4e0d4" stroke="#b8a88a" stroke-width="1"/>
  <circle cx="311" cy="100" r="5" fill="#b8a88a"/>
  <text x="311" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1a1a1a">Auto compact</text>
  <text x="311" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Use built-in context</text>
  <text x="311" y="164" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">compaction when</text>
  <text x="311" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">nearing the limit.</text>

  <!-- Card 4: Selective keep -->
  <rect x="374" y="80" width="90" height="180" rx="6" fill="#ddd8ca" stroke="#a89878" stroke-width="1"/>
  <circle cx="419" cy="100" r="5" fill="#a89878"/>
  <text x="419" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1a1a1a">Selective keep</text>
  <text x="419" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Mark critical context</text>
  <text x="419" y="164" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">to preserve while</text>
  <text x="419" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">compacting the rest.</text>

  <!-- Card 5: Full rewrite -->
  <rect x="482" y="80" width="90" height="180" rx="6" fill="#d4ceb8" stroke="#98886a" stroke-width="1"/>
  <circle cx="527" cy="100" r="5" fill="#98886a"/>
  <text x="527" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1a1a1a">Full rewrite</text>
  <text x="527" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">Reconstruct the</text>
  <text x="527" y="164" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">entire context from</text>
  <text x="527" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">scratch at each</text>
  <text x="527" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#333">turn.</text>

  <!-- Bottom note box -->
  <rect x="80" y="280" width="520" height="40" rx="4" fill="rgba(201,138,106,0.12)"/>
  <line x1="80" y1="280" x2="80" y2="320" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <text x="95" y="304" font-family="Georgia, serif" font-size="11" fill="#6b6b6b">Most projects start with #1. The most efficient ones use #3 or #4.</text>
</svg>
