<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDP 折线柱形组合图 — 麦肯锡风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F4F7F9; margin: 0; padding: 2rem; }
        .chart-card { background: #fff; max-width: 1000px; margin: 0 auto; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        h2 { font-size: 1.25rem; font-weight: 600; color: #051c2c; margin-bottom: 1.5rem; }
        .source { font-size: 0.75rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="chart-card">
        <h2>中国 GDP 总量与增长率 (2015-2024)</h2>
        <div id="chart" style="width:100%;height:500px;"></div>
        <p class="source">数据来源：国家统计局 | 制图：麦肯锡图表套件</p>
    </div>
    <script>
        const chart = echarts.init(document.getElementById('chart'), null, {renderer: 'canvas'});
        chart.setOption({
            backgroundColor: '#fff',
            tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', textStyle: {color:'#333'}, borderColor: '#ddd' },
            legend: { bottom: 10, icon: 'circle', itemWidth: 10, itemHeight: 10, textStyle: {color:'#666'} },
            grid: { top: 60, bottom: 80, left: 80, right: 80, containLabel: true },
            xAxis: {
                type: 'category',
                data: ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'],
                axisLabel: { fontSize: 12, interval: 0 }
            },
            yAxis: [
                {
                    type: 'value',
                    name: 'GDP (十亿元)',
                    axisLabel: { formatter: v => (v/1000).toFixed(0) + '万亿' },
                    splitLine: { lineStyle: { type: 'dashed', color: '#e2e8f0' } }
                },
                {
                    type: 'value',
                    name: '增长率 (%)',
                    splitLine: { show: false }
                }
            ],
            series: [
                {
                    name: 'GDP (十亿元)',
                    type: 'bar',
                    data: [702511.5,761193.0,847382.9,936010.1,1005872.4,1034867.6,1173823.0,1234029.4,1294271.7,1349083.55],
                    barWidth: '45%',
                    itemStyle: { color: '#051c2c' },
                    label: { show: true, position: 'top', fontSize: 11, formatter: p => (p.value/10000).toFixed(1)+'万亿' }
                },
                {
                    name: '增长率 (%)',
                    type: 'line',
                    yAxisIndex: 1,
                    data: [7.0,6.8,6.9,6.8,6.1,2.3,8.6,3.1,5.4,5.0],
                    itemStyle: { color: '#00A9E0' },
                    lineStyle: { width: 3 },
                    symbol: 'circle',
                    symbolSize: 8,
                    label: { show: true, position: 'top', fontSize: 11, formatter: p => p.value+'%' }
                }
            ]
        });
    </script>
</body>
</html>
