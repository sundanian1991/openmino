<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国 GDP 数据验证 — 麦肯锡图表模板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* 顶部标题栏 */
  .header {
    background: #051c2c;
    color: #ffffff;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .header .subtitle {
    font-size: 13px;
    color: #8fa3bf;
    font-weight: 400;
    margin-left: 12px;
  }

  /* Tab + 导出区域 */
  .toolbar {
    background: #ffffff;
    border-bottom: 1px solid #e2e4e9;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tabs {
    display: flex;
    gap: 0;
  }
  .tab-btn {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    color: #5a6578;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: #051c2c; }
  .tab-btn.active {
    color: #051c2c;
    border-bottom-color: #00A9E0;
  }

  .export-group {
    display: flex;
    gap: 8px;
  }
  .export-btn {
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #051c2c;
    background: #ffffff;
    border: 1px solid #c8cdd5;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .export-btn:hover {
    background: #f0f2f5;
    border-color: #051c2c;
  }

  /* 图表卡片 */
  .chart-container {
    display: flex;
    justify-content: center;
    padding: 32px;
  }
  .chart-card {
    background: #ffffff;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 24px;
    width: 1248px;
  }
  .chart-panel { display: none; }
  .chart-panel.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:baseline;">
    <h1>中国 GDP 数据验证</h1>
    <span class="subtitle">麦肯锡图表模板 / ECharts 5.4.3</span>
  </div>
</div>

<div class="toolbar">
  <div class="tabs">
    <button class="tab-btn active" data-tab="line_bar">GDP 总量与增速</button>
    <button class="tab-btn" data-tab="area_stacked">产业结构变化</button>
  </div>
  <div class="export-group">
    <button class="export-btn" id="btn-png-4k">导出 4K PNG</button>
    <button class="export-btn" id="btn-svg">导出 SVG</button>
  </div>
</div>

<div class="chart-container">
  <div class="chart-card">
    <div class="chart-panel active" id="panel-line_bar">
      <div id="chart-line_bar" style="width:1200px;height:700px;"></div>
    </div>
    <div class="chart-panel" id="panel-area_stacked">
      <div id="chart-area_stacked" style="width:1200px;height:700px;"></div>
    </div>
  </div>
</div>

<script>
// ==================== GDP 数据 ====================
const DATA = [
  { year: 2015, gdp_cny_billion: 702511.5,  gdp_growth_pct: 7.0, services_pct: 51.7, industry_pct: 40.0 },
  { year: 2016, gdp_cny_billion: 761193.0,  gdp_growth_pct: 6.8, services_pct: 53.3, industry_pct: 38.8 },
  { year: 2017, gdp_cny_billion: 847382.9,  gdp_growth_pct: 6.9, services_pct: 53.5, industry_pct: 39.1 },
  { year: 2018, gdp_cny_billion: 936010.1,  gdp_growth_pct: 6.8, services_pct: 54.1, industry_pct: 39.0 },
  { year: 2019, gdp_cny_billion: 1005872.4, gdp_growth_pct: 6.1, services_pct: 55.2, industry_pct: 37.8 },
  { year: 2020, gdp_cny_billion: 1034867.6, gdp_growth_pct: 2.3, services_pct: 55.5, industry_pct: 36.9 },
  { year: 2021, gdp_cny_billion: 1173823.0, gdp_growth_pct: 8.6, services_pct: 54.8, industry_pct: 38.1 },
  { year: 2022, gdp_cny_billion: 1234029.4, gdp_growth_pct: 3.1, services_pct: 55.0, industry_pct: 37.9 },
  { year: 2023, gdp_cny_billion: 1294271.7, gdp_growth_pct: 5.4, services_pct: 56.3, industry_pct: 36.8 },
  { year: 2024, gdp_cny_billion: 1349083.55,gdp_growth_pct: 5.0, services_pct: 56.7, industry_pct: 36.5 },
];

const years = DATA.map(d => d.year);
const gdpTrillion = DATA.map(d => +(d.gdp_cny_billion / 10000).toFixed(1));
const growthPct = DATA.map(d => d.gdp_growth_pct);
const servicesPct = DATA.map(d => d.services_pct);
const industryPct = DATA.map(d => d.industry_pct);

// ==================== 麦肯锡基础样式 ====================
const mcBase = {
  fontFamily: 'Inter, -apple-system, BlinkMacSystemFont, sans-serif',
  titleColor: '#051c2c',
  axisLineColor: '#c8cdd5',
  splitLineColor: '#e2e4e9',
  labelColor: '#5a6578',
};

// ==================== Tab 1: 折线+柱形 ====================
const chart1 = echarts.init(document.getElementById('chart-line_bar'));
chart1.setOption({
  title: {
    text: '2015-2024 中国 GDP 总量与增速',
    left: 0,
    top: 0,
    textStyle: {
      fontFamily: mcBase.fontFamily,
      fontSize: 18,
      fontWeight: 600,
      color: mcBase.titleColor,
    },
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#ffffff',
    borderColor: '#e2e4e9',
    borderWidth: 1,
    textStyle: { fontFamily: mcBase.fontFamily, color: '#1a1a2e', fontSize: 13 },
    formatter: function(params) {
      const bar = params.find(p => p.seriesIndex === 0);
      const line = params.find(p => p.seriesIndex === 1);
      let html = '<div style="font-weight:600;margin-bottom:4px;">' + params[0].axisValue + ' 年</div>';
      if (bar) html += '<div>GDP 总量：<b>' + bar.value + '</b> 万亿元</div>';
      if (line) html += '<div>GDP 增速：<b>' + line.value + '</b>%</div>';
      return html;
    },
  },
  grid: { left: 80, right: 80, top: 60, bottom: 50 },
  xAxis: {
    type: 'category',
    data: years,
    axisLine: { lineStyle: { color: mcBase.axisLineColor } },
    axisTick: { show: false },
    axisLabel: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12 },
  },
  yAxis: [
    {
      type: 'value',
      name: 'GDP 总量（万亿元）',
      nameTextStyle: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12, padding: [0,0,0,0] },
      min: 60, max: 140, interval: 20,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12 },
      splitLine: { lineStyle: { type: 'dashed', color: mcBase.splitLineColor } },
    },
    {
      type: 'value',
      name: '增长率（%）',
      nameTextStyle: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12 },
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12, formatter: '{value}%' },
      splitLine: { show: false },
    },
  ],
  series: [
    {
      name: 'GDP 总量',
      type: 'bar',
      yAxisIndex: 0,
      barWidth: '50%',
      data: gdpTrillion,
      itemStyle: { color: '#051c2c', borderRadius: [2, 2, 0, 0] },
      label: {
        show: true,
        position: 'top',
        fontFamily: mcBase.fontFamily,
        fontSize: 11,
        color: '#5a6578',
        formatter: '{c}',
      },
    },
    {
      name: 'GDP 增速',
      type: 'line',
      yAxisIndex: 1,
      data: growthPct,
      smooth: false,
      symbol: 'circle',
      symbolSize: 7,
      lineStyle: { width: 2.5, color: '#00A9E0' },
      itemStyle: { color: '#00A9E0', borderWidth: 2, borderColor: '#ffffff' },
      label: {
        show: true,
        position: 'top',
        fontFamily: mcBase.fontFamily,
        fontSize: 11,
        color: '#00A9E0',
        formatter: '{c}%',
      },
    },
  ],
});

// ==================== Tab 2: 堆叠面积 ====================
const chart2 = echarts.init(document.getElementById('chart-area_stacked'));
chart2.setOption({
  title: {
    text: '2015-2024 中国 GDP 产业结构变化',
    left: 0,
    top: 0,
    textStyle: {
      fontFamily: mcBase.fontFamily,
      fontSize: 18,
      fontWeight: 600,
      color: mcBase.titleColor,
    },
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#ffffff',
    borderColor: '#e2e4e9',
    borderWidth: 1,
    textStyle: { fontFamily: mcBase.fontFamily, color: '#1a1a2e', fontSize: 13 },
    formatter: function(params) {
      let html = '<div style="font-weight:600;margin-bottom:4px;">' + params[0].axisValue + ' 年</div>';
      params.forEach(function(p) {
        html += '<div>' + p.marker + ' ' + p.seriesName + '：<b>' + p.data + '</b>%</div>';
      });
      return html;
    },
  },
  legend: {
    top: 4,
    right: 0,
    textStyle: { fontFamily: mcBase.fontFamily, color: '#5a6578', fontSize: 12 },
    itemWidth: 14, itemHeight: 10,
  },
  grid: { left: 80, right: 40, top: 60, bottom: 50 },
  xAxis: {
    type: 'category',
    data: years,
    boundaryGap: false,
    axisLine: { lineStyle: { color: mcBase.axisLineColor } },
    axisTick: { show: false },
    axisLabel: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12 },
  },
  yAxis: {
    type: 'value',
    name: '占比（%）',
    min: 0,
    max: 100,
    interval: 20,
    nameTextStyle: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12 },
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { fontFamily: mcBase.fontFamily, color: mcBase.labelColor, fontSize: 12, formatter: '{value}%' },
    splitLine: { lineStyle: { type: 'dashed', color: mcBase.splitLineColor } },
  },
  series: [
    {
      name: '服务业',
      type: 'line',
      stack: 'gdp',
      areaStyle: { color: 'rgba(0, 169, 224, 0.35)' },
      lineStyle: { width: 2, color: '#00A9E0' },
      itemStyle: { color: '#00A9E0' },
      symbol: 'circle', symbolSize: 5,
      data: servicesPct,
      label: {
        show: true,
        position: 'inside',
        fontFamily: mcBase.fontFamily,
        fontSize: 11,
        color: '#051c2c',
        formatter: '{c}%',
      },
    },
    {
      name: '工业',
      type: 'line',
      stack: 'gdp',
      areaStyle: { color: 'rgba(5, 28, 44, 0.3)' },
      lineStyle: { width: 2, color: '#051c2c' },
      itemStyle: { color: '#051c2c' },
      symbol: 'circle', symbolSize: 5,
      data: industryPct,
      label: {
        show: true,
        position: 'inside',
        fontFamily: mcBase.fontFamily,
        fontSize: 11,
        color: '#ffffff',
        formatter: '{c}%',
      },
    },
  ],
});

// ==================== Tab 切换 ====================
const tabBtns = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.chart-panel');

tabBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    tabBtns.forEach(function(b) { b.classList.remove('active'); });
    panels.forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    var target = btn.getAttribute('data-tab');
    document.getElementById('panel-' + target).classList.add('active');
    // 延迟 resize 确保容器可见后再刷新
    setTimeout(function() {
      if (target === 'line_bar') chart1.resize();
      else chart2.resize();
    }, 50);
  });
});

// ==================== 导出功能 ====================
function getActiveChart() {
  var active = document.querySelector('.tab-btn.active');
  return active.getAttribute('data-tab') === 'line_bar' ? chart1 : chart2;
}

function getActiveTitle() {
  var active = document.querySelector('.tab-btn.active');
  return active.getAttribute('data-tab') === 'line_bar'
    ? 'GDP总量与增速'
    : 'GDP产业结构变化';
}

// 导出 4K PNG
document.getElementById('btn-png-4k').addEventListener('click', function() {
  var chart = getActiveChart();
  var url = chart.getDataURL({
    type: 'png',
    pixelRatio: 4,
    backgroundColor: '#ffffff',
  });
  var a = document.createElement('a');
  a.href = url;
  a.download = getActiveTitle() + '_4K.png';
  a.click();
});

// 导出 SVG
document.getElementById('btn-svg').addEventListener('click', function() {
  var chart = getActiveChart();
  var svgStr = chart.renderToSVGString();
  var blob = new Blob([svgStr], { type: 'image/svg+xml' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = getActiveTitle() + '.svg';
  a.click();
  URL.revokeObjectURL(url);
});

// ==================== 窗口 resize ====================
window.addEventListener('resize', function() {
  chart1.resize();
  chart2.resize();
});
</script>

</body>
</html>
