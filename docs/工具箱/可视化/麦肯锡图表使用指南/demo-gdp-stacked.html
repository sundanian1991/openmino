<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDP 产业结构堆叠图 — 麦肯锡风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F4F7F9; margin: 0; padding: 2rem; }
        .chart-card { background: #fff; max-width: 1000px; margin: 0 auto; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        h2 { font-size: 1.25rem; font-weight: 600; color: #051c2c; margin-bottom: 1.5rem; }
        .source { font-size: 0.75rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="chart-card">
        <h2>中国 GDP 产业结构变迁 (2015-2024)</h2>
        <div id="chart" style="width:100%;height:500px;"></div>
        <p class="source">数据来源：国家统计局 | 制图：麦肯锡图表套件</p>
    </div>
    <script>
        const chart = echarts.init(document.getElementById('chart'), null, {renderer: 'canvas'});
        chart.setOption({
            backgroundColor: '#fff',
            tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', textStyle: {color:'#333'}, borderColor: '#ddd' },
            legend: { bottom: 10, icon: 'circle', itemWidth: 10, itemHeight: 10, textStyle: {color:'#666'} },
            grid: { top: 60, bottom: 80, left: 60, right: 60, containLabel: true },
            xAxis: {
                type: 'category',
                data: ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'],
                axisLabel: { fontSize: 12, interval: 0 }
            },
            yAxis: {
                type: 'value',
                name: '占比 (%)',
                max: 100,
                splitLine: { lineStyle: { type: 'dashed', color: '#e2e8f0' } }
            },
            series: [
                {
                    name: '服务业',
                    type: 'bar',
                    stack: 'total',
                    data: [51.7,53.3,53.5,54.1,55.2,55.5,54.8,55.0,56.3,56.7],
                    itemStyle: { color: '#051c2c' },
                    label: { show: true, position: 'inside', fontSize: 11, color: '#fff', formatter: p => p.value+'%' }
                },
                {
                    name: '工业',
                    type: 'bar',
                    stack: 'total',
                    data: [40.0,38.8,39.1,39.0,37.8,36.9,38.1,37.9,36.8,36.5],
                    itemStyle: { color: '#00A9E0' },
                    label: { show: true, position: 'inside', fontSize: 11, color: '#fff', formatter: p => p.value+'%' }
                },
                {
                    name: '其他',
                    type: 'bar',
                    stack: 'total',
                    data: [8.3,7.9,7.4,6.9,7.0,7.6,7.1,7.1,6.9,6.8],
                    itemStyle: { color: '#D1D5DB' },
                    label: { show: true, position: 'inside', fontSize: 10, formatter: p => p.value+'%' }
                }
            ]
        });
    </script>
</body>
</html>
