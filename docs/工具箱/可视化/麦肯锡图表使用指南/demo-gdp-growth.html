<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDP 增长率趋势 — 麦肯锡风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F4F7F9; margin: 0; padding: 2rem; }
        .chart-card { background: #fff; max-width: 1000px; margin: 0 auto; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        h2 { font-size: 1.25rem; font-weight: 600; color: #051c2c; margin-bottom: 1.5rem; }
        .source { font-size: 0.75rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="chart-card">
        <h2>中国 GDP 增长率趋势 (2015-2024)</h2>
        <div id="chart" style="width:100%;height:500px;"></div>
        <p class="source">数据来源：国家统计局 | 制图：麦肯锡图表套件</p>
    </div>
    <script>
        const chart = echarts.init(document.getElementById('chart'), null, {renderer: 'canvas'});
        const growthData = [7.0,6.8,6.9,6.8,6.1,2.3,8.6,3.1,5.4,5.0];
        chart.setOption({
            backgroundColor: '#fff',
            tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', textStyle: {color:'#333'}, borderColor: '#ddd' },
            grid: { top: 60, bottom: 60, left: 60, right: 60, containLabel: true },
            xAxis: {
                type: 'category',
                data: ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'],
                axisLabel: { fontSize: 12, interval: 0 },
                boundaryGap: false
            },
            yAxis: {
                type: 'value',
                name: '增长率 (%)',
                min: 0,
                max: 10,
                interval: 2,
                splitLine: { lineStyle: { type: 'dashed', color: '#e2e8f0' } }
            },
            series: [
                {
                    type: 'line',
                    data: growthData,
                    symbol: 'circle',
                    symbolSize: 10,
                    lineStyle: { width: 3, color: '#051c2c' },
                    itemStyle: { color: '#051c2c' },
                    areaStyle: {
                        color: {
                            type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: 'rgba(5,28,44,0.15)' },
                                { offset: 1, color: 'rgba(5,28,44,0.01)' }
                            ]
                        }
                    },
                    markPoint: {
                        data: [
                            { type: 'min', name: '最低点', symbolSize: 50, label: { fontSize: 10 } },
                            { type: 'max', name: '最高点', symbolSize: 50, label: { fontSize: 10 } }
                        ],
                        itemStyle: { color: '#C62828' }
                    },
                    markLine: {
                        data: [{ type: 'average', name: '平均值' }],
                        lineStyle: { color: '#94a3b8', type: 'dashed' },
                        label: { formatter: '均值: {c}%', fontSize: 11 }
                    },
                    label: { show: true, position: 'top', fontSize: 11, formatter: p => p.value+'%' }
                }
            ]
        });
    </script>
</body>
</html>
