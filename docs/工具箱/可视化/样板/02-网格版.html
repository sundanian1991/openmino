<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>02-网格版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    background: #e8e4dd;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .frame {
    background: #faf8f5;
    border-radius: 16px;
    padding: 28px;
    position: relative;
    background-image: radial-gradient(circle, #e8e4dd 1px, transparent 1px);
    background-size: 20px 20px;
    max-width: 480px;
    width: 100%;
  }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .dot { width: 8px; height: 8px; background: #c26d3a; border-radius: 50%; }
  .title { font-size: 16px; font-weight: 600; color: #2e2c2a; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .metric {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    border: 1px solid rgba(214,210,201,0.5);
  }
  .metric .val { font-size: 24px; font-weight: 600; color: #2e2c2a; }
  .metric .lbl { font-size: 11px; color: #ada599; }
  .metric .trend { font-size: 11px; font-weight: 600; margin-top: 4px; }
  .trend-up { color: #2e8b6e; }
  .trend-down { color: #c25030; }
  .meta { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(214,210,201,0.4); }
  .meta h3 { font-size: 12px; font-weight: 600; color: #454240; margin-bottom: 6px; }
  .meta p { font-size: 11px; color: #857d74; }
</style>
</head>
<body>
<div class="frame">
  <div class="header">
    <div class="dot"></div>
    <div class="title">供应商绩效仪表盘</div>
  </div>
  <div class="grid">
    <div class="metric"><div class="val">92%</div><div class="lbl">综合履约率</div><div class="trend trend-up">↑ 3.2%</div></div>
    <div class="metric"><div class="val">1,247</div><div class="lbl">本月工单</div><div class="trend trend-up">↑ 12%</div></div>
    <div class="metric"><div class="val">4.8h</div><div class="lbl">平均响应</div><div class="trend trend-down">↓ 1.2h</div></div>
    <div class="metric"><div class="val">6</div><div class="lbl">预警供应商</div><div class="trend trend-down">↑ 2</div></div>
  </div>
  <div class="meta">
    <h3>可定制变量</h3>
    <p>网格背景：#faf8f5 | 网格点：#e8e4dd | 间距：20px | 指标卡：#fff | 上涨：#2e8b6e | 下跌：#c25030</p>
    <p>场景：多指标仪表盘 / 实时监控面板 / 供应商对比看板</p>
  </div>
</div>
</body>
</html>
