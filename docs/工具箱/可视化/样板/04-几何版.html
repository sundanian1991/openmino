<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04-几何版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    background: #e8e4dd;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .frame {
    background: #f8f6f2;
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    max-width: 480px;
    width: 100%;
  }
  .geo { position: absolute; top: 10px; right: 10px; width: 60px; height: 60px; }
  .title { font-size: 16px; font-weight: 600; color: #2e2c2a; margin: 0 0 12px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar { height: 8px; border-radius: 4px; }
  .label { font-size: 11px; color: #857d74; width: 60px; }
  .val { font-size: 11px; font-weight: 600; color: #454240; }
  .meta { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(214,210,201,0.4); }
  .meta h3 { font-size: 12px; font-weight: 600; color: #454240; margin-bottom: 6px; }
  .meta p { font-size: 11px; color: #857d74; }
</style>
</head>
<body>
<div class="frame">
  <svg class="geo" viewBox="0 0 60 60">
    <circle cx="15" cy="15" r="6" fill="#f0d9bf" opacity="0.4"/>
    <rect x="35" y="10" width="12" height="12" rx="3" fill="#d4a574" opacity="0.3" transform="rotate(15 41 16)"/>
    <circle cx="45" cy="40" r="8" fill="#f0d9bf" opacity="0.3"/>
    <rect x="10" y="35" width="8" height="8" rx="2" fill="#d4a574" opacity="0.2" transform="rotate(-20 14 39)"/>
  </svg>
  <div class="title">供应商 TOP5</div>
  <div class="row"><span class="label">毅航</span><div class="bar" style="width:80%;background:#c26d3a;"></div><span class="val">92%</span></div>
  <div class="row"><span class="label">毛毛虫</span><div class="bar" style="width:70%;background:#d4a574;"></div><span class="val">85%</span></div>
  <div class="row"><span class="label">伽玛</span><div class="bar" style="width:65%;background:#d4a574;"></div><span class="val">81%</span></div>
  <div class="row"><span class="label">赛维斯</span><div class="bar" style="width:55%;background:#ada599;"></div><span class="val">72%</span></div>
  <div class="row"><span class="label">岐力</span><div class="bar" style="width:48%;background:#ada599;"></div><span class="val">65%</span></div>
  <div class="meta">
    <h3>可定制变量</h3>
    <p>背景：#f8f6f2 | 装饰圆：#f0d9bf | 装饰方：#d4a574 | 条颜色：#c26d3a → #ada599 | 透明度：0.2-0.4</p>
    <p>场景：创意报告 / 产品介绍 / 非正式分享</p>
  </div>
</div>
</body>
</html>
