<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05-极简版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    background: #e8e4dd;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .frame {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #e8e4dd;
    max-width: 480px;
    width: 100%;
  }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .title { font-size: 14px; font-weight: 600; color: #2e2c2a; margin: 0; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 9999px; background: #faf0e6; color: #c26d3a; font-weight: 600; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .m { text-align: center; }
  .m .num { font-size: 22px; font-weight: 600; color: #2e2c2a; }
  .m .label { font-size: 10px; color: #ada599; margin-top: 2px; }
  .divider { height: 1px; background: #f2f0eb; margin: 12px 0; }
  .note { font-size: 10px; color: #ada599; }
  .meta { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f2f0eb; }
  .meta h3 { font-size: 12px; font-weight: 600; color: #454240; margin-bottom: 6px; }
  .meta p { font-size: 11px; color: #857d74; }
</style>
</head>
<body>
<div class="frame">
  <div class="header">
    <div class="title">月度关键指标</div>
    <div class="badge">2026-04</div>
  </div>
  <div class="metrics">
    <div class="m"><div class="num">92%</div><div class="label">履约率</div></div>
    <div class="m"><div class="num">1,247</div><div class="label">工单数</div></div>
    <div class="m"><div class="num">4.8h</div><div class="label">响应时间</div></div>
  </div>
  <div class="divider"></div>
  <div class="note">数据来源：供应商管理系统 · 统计周期 2026-04-01 至 04-26</div>
  <div class="meta">
    <h3>可定制变量</h3>
    <p>背景：#fff | 边框：#e8e4dd | 分隔线：#f2f0eb | 数字：#2e2c2a | 标签：#ada599 | 角标：#faf0e6 + #c26d3a</p>
    <p>场景：正式汇报 / 对外文档 / 高管摘要 / 邮件报告</p>
  </div>
</div>
</body>
</html>
