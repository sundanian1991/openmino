<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03-波浪版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
    background: #e8e4dd;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .frame {
    background: #faf0e6;
    border-radius: 16px;
    padding: 28px 28px 0;
    position: relative;
    overflow: hidden;
    max-width: 560px;
    width: 100%;
  }
  .content { position: relative; z-index: 1; }
  .title { font-size: 18px; font-weight: 600; color: #2e2c2a; margin: 0 0 8px; }
  .stats { display: flex; gap: 24px; }
  .stats .item { text-align: center; }
  .stats .num { font-size: 28px; font-weight: 600; color: #c26d3a; }
  .stats .label { font-size: 10px; color: #857d74; }
  .wave { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; }
  .meta { position: relative; z-index: 1; padding: 20px 0 16px; border-top: 1px solid rgba(214,210,201,0.4); margin-top: 48px; }
  .meta h3 { font-size: 12px; font-weight: 600; color: #454240; margin-bottom: 6px; }
  .meta p { font-size: 11px; color: #857d74; }
</style>
</head>
<body>
<div class="frame">
  <div class="content">
    <div class="title">Q4 业绩总览</div>
    <div class="stats">
      <div class="item"><div class="num">3.2亿</div><div class="label">总营收</div></div>
      <div class="item"><div class="num">87%</div><div class="label">达成率</div></div>
      <div class="item"><div class="num">Top3</div><div class="label">排名</div></div>
    </div>
  </div>
  <svg class="wave" viewBox="0 0 560 40" preserveAspectRatio="none">
    <path d="M0,20 Q70,0 140,20 T280,20 T420,20 T560,20 L560,40 L0,40 Z" fill="#fff" opacity="0.5"/>
  </svg>
  <div class="meta">
    <h3>可定制变量</h3>
    <p>背景：#faf0e6 | 波浪：#fff opacity 0.5 | 数字：#c26d3a | 振幅：Q70,0（调大更起伏）</p>
    <p>场景：业绩汇报封面 / 季度总结 / 数据报告首页</p>
  </div>
</div>
</body>
</html>
