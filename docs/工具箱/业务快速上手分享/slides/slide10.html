<div class="wrap">
<p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #b8782a; letter-spacing: 2pt; margin-bottom: 6pt;">STEP 04 — OUTPUT</p>
<h1 style="font-size: 24pt; color: #a85a1a; font-weight: bold; margin-bottom: 12pt;">强迫自己给出三个结论</h1>
<div class="item">
<p style="font-family: 'Courier New', monospace; font-size: 20pt; font-weight: bold; color: #a85a1a; width: 30pt; flex-shrink: 0; margin: 0;">01</p>
<p style="font-size: 13pt; color: #2c2217; line-height: 1.5;">这个业务最关键的 <b style="color: #8b4513;">3个成功要素</b> 是什么？</p>
</div>
<div class="item">
<p style="font-family: 'Courier New', monospace; font-size: 20pt; font-weight: bold; color: #a85a1a; width: 30pt; flex-shrink: 0; margin: 0;">02</p>
<p style="font-size: 13pt; color: #2c2217; line-height: 1.5;">如果我去负责，第一个月我会解决 <b style="color: #8b4513;">哪个具体问题</b>？</p>
</div>
<div class="item">
<p style="font-family: 'Courier New', monospace; font-size: 20pt; font-weight: bold; color: #a85a1a; width: 30pt; flex-shrink: 0; margin: 0;">03</p>
<p style="font-size: 13pt; color: #2c2217; line-height: 1.5;">用 <b style="color: #8b4513;">一句话</b> 向陌生人解释清楚这个业务。</p>
</div>
<div style="margin-top: 12pt; padding-left: 14pt; border-left: 2pt solid rgba(140,90,30,0.3);">
<p style="font-size: 11pt; color: #7a6b58; line-height: 1.5;">结论的价值在于<b style="color: #2c2217;">强迫你从观察者变成判断者</b>。</p>
</div>
</div>
