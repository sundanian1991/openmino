<!DOCTYPE html>
<html><head><style>
html { background: #ffffff; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #f0e6d3; font-family: Arial, sans-serif; display: flex; }
.wrap { margin: 32pt 40pt; width: 640pt; }
.cols { display: flex; border: 1pt solid rgba(140,90,30,0.25); margin-top: 16pt; }
.col { flex: 1; padding: 18pt 16pt; }
.col + .col { border-left: 1pt solid rgba(140,90,30,0.2); }
</style></head><body>
<div class="wrap">
<p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #b8782a; letter-spacing: 2pt; margin-bottom: 8pt;">STEP 02 — PART 1/2</p>
<h1 style="font-size: 26pt; color: #a85a1a; font-weight: bold; margin-bottom: 4pt;">穿透式问题</h1>
<p style="font-size: 13pt; color: #7a6b58;">针对每个维度，准备一组灵魂拷问</p>
<div class="cols">
<div class="col">
<p style="font-size: 14pt; font-weight: bold; color: #8b4513; margin-bottom: 3pt;">价值与需求</p>
<p style="font-size: 10pt; color: #7a6b58; margin-bottom: 10pt;">验证需求是否真实存在</p>
<ul style="font-size: 11pt; color: #2c2217; line-height: 1.65; padding-left: 14pt;">
<li>客户不买这个产品，现在用什么替代方案？替代方案哪里不好？</li>
<li>如果明天涨价50%，客户会骂着接受还是直接换对手？</li>
<li>这个业务解决了"必须满足"的需求还是"锦上添花"？</li>
</ul>
</div>
<div class="col">
<p style="font-size: 14pt; font-weight: bold; color: #8b4513; margin-bottom: 3pt;">流程与运转</p>
<p style="font-size: 10pt; color: #7a6b58; margin-bottom: 10pt;">画出关键链路的每个环节</p>
<ul style="font-size: 11pt; color: #2c2217; line-height: 1.65; padding-left: 14pt;">
<li>从客户第一次知道我们到持续使用，必须经过哪5-7个步骤？</li>
<li>当前哪一步最慢/成本最高/最容易出异常？</li>
<li>内部必须靠哪个岗位决策？外部必须靠哪个供应商活着？</li>
</ul>
</div>
</div>
</div>
</body></html>
