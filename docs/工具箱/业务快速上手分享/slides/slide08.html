body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #f0e6d3; font-family: Arial, sans-serif; display: flex; }

.block { padding: 14pt 0; border-bottom: 1pt solid rgba(140,90,30,0.15); }

<div class="wrap">
<p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #b8782a; letter-spacing: 2pt; margin-bottom: 8pt;">STEP 03 — B &amp; C</p>
<h1 style="font-size: 26pt; color: #a85a1a; font-weight: bold; margin-bottom: 12pt;">看数据 + 代入角色实操</h1>
<div class="block">
<p style="font-size: 13pt; font-weight: bold; color: #8b4513; margin-bottom: 8pt;">B. 看数据 — 重点找「反常」</p>
<ul style="font-size: 11pt; color: #2c2217; line-height: 1.65; padding-left: 14pt;">
<li>看近6个月核心指标趋势：收入、毛利、活跃客户数、流失率</li>
<li>看分布：20%客户是否贡献80%收入？高度依赖大客户是风险</li>
<li>看运营快照：今天的订单/工单/库存/现金流，有没有积压或异常</li>
<li>没有内部数据时：行业报告（艾瑞/易观/券商研报）、竞品发布会</li>
</ul>
</div>
<div class="block">
<p style="font-size: 13pt; font-weight: bold; color: #8b4513; margin-bottom: 8pt;">C. 代入角色实操 — 走一遍</p>
<ul style="font-size: 11pt; color: #2c2217; line-height: 1.65; padding-left: 14pt;">
<li>电商：作为新用户注册、浏览、加购、付款、申请售后</li>
<li>B2B软件：模拟销售从找线索到签约回款全过程</li>
<li>制造业：从采购单到成品出库，追踪一份工单的一天</li>
</ul>
</div>
</div>
</body></html>
