<!DOCTYPE html>
<html><head><style>
html { background: #ffffff; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: #f0e6d3; font-family: Arial, sans-serif; display: flex; }
.wrap { margin: 32pt 40pt; width: 640pt; }
.cols { display: flex; border: 1pt solid rgba(140,90,30,0.25); margin-top: 16pt; }
.col { flex: 1; padding: 18pt 16pt; }
.col + .col { border-left: 1pt solid rgba(140,90,30,0.2); }
</style></head><body>
<div class="wrap">
<p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #b8782a; letter-spacing: 2pt; margin-bottom: 8pt;">STEP 02 — PART 2/2</p>
<h1 style="font-size: 26pt; color: #a85a1a; font-weight: bold; margin-bottom: 4pt;">穿透式问题</h1>
<p style="font-size: 13pt; color: #7a6b58;">财务和风险维度 — 最容易被忽略但最致命</p>
<div class="cols">
<div class="col">
<p style="font-size: 14pt; font-weight: bold; color: #8b4513; margin-bottom: 3pt;">财务与数字</p>
<p style="font-size: 10pt; color: #7a6b58; margin-bottom: 10pt;">找到增长的核心杠杆</p>
<ul style="font-size: 11pt; color: #2c2217; line-height: 1.65; padding-left: 14pt;">
<li>增长靠"更多客户"还是"更贵客单价"还是"更高复购"？</li>
<li>单客户经济：收到的钱减去直接成本，是正还是负？</li>
<li>人均产出、库存周转天数、回款周期 — 和行业比？</li>
</ul>
</div>
<div class="col">
<p style="font-size: 14pt; font-weight: bold; color: #8b4513; margin-bottom: 3pt;">风险与不确定性</p>
<p style="font-size: 10pt; color: #7a6b58; margin-bottom: 10pt;">找到那颗最大的雷</p>
<ul style="font-size: 11pt; color: #2c2217; line-height: 1.65; padding-left: 14pt;">
<li>如果发生什么事件，业务会在3个月内崩溃？</li>
<li>竞对最可能从哪里抄袭并击败我们？价格、体验还是捆绑？</li>
</ul>
</div>
</div>
</div>
</body></html>
