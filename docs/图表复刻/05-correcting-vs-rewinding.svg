<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360">
  <rect width="680" height="360" fill="#faf9f7" rx="8"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1a1a1a">Correcting vs Rewinding</text>
  <text x="340" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6b6b">Two approaches to handling context errors</text>

  <!-- LEFT: Correcting -->
  <rect x="40" y="55" width="280" height="260" rx="6" fill="#fff" stroke="#d4d1c7" stroke-width="1"/>
  <path d="M40 61 A6 6 0 0 1 46 55 H314 A6 6 0 0 1 320 61 V75 H40 Z" fill="#f0ebe4"/>
  <text x="180" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#c98a6a">Correcting</text>

  <!-- Item 1: Keep existing context + checkmark -->
  <circle cx="58" cy="100" r="7" fill="#8f9b7f"/>
  <path d="M54 100 L57 103 L62 97" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="74" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333">Keep existing context</text>

  <!-- Item 2: Add correction message -->
  <rect x="56" y="116" width="180" height="22" rx="4" fill="#e8e4dc"/>
  <text x="64" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333">Add correction message</text>

  <!-- Item 3: Model re-processes with fix -->
  <text x="56" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333">Model re-processes with fix</text>

  <!-- Item 4: Original context stays -->
  <text x="56" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6b6b">&#8635; Original context stays</text>

  <!-- Item 5: New turn appended -->
  <text x="56" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6b6b">&#8635; New turn appended</text>

  <!-- Bottom label -->
  <text x="180" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8f9b7f">Lower cost, same window</text>

  <!-- RIGHT: Rewinding -->
  <rect x="360" y="55" width="280" height="260" rx="6" fill="#fff" stroke="#d4d1c7" stroke-width="1"/>
  <path d="M360 61 A6 6 0 0 1 366 55 H634 A6 6 0 0 1 640 61 V75 H360 Z" fill="#e4e8f0"/>
  <text x="500" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#6b7fa3">Rewinding</text>

  <!-- Item 1: Discard recent context + warning -->
  <circle cx="378" cy="100" r="7" fill="#d9a05b"/>
  <text x="378" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#fff">!</text>
  <text x="394" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333">Discard recent context</text>

  <!-- Item 2: Rebuild from scratch -->
  <rect x="376" y="116" width="160" height="22" rx="4" fill="#f0ece4"/>
  <text x="384" y="131" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333">Rebuild from scratch</text>

  <!-- Item 3: Send new prompt sequence -->
  <text x="376" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333">Send new prompt sequence</text>

  <!-- Item 4: Full context reconstruction -->
  <text x="376" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6b6b">&#8634; Full context reconstruction</text>

  <!-- Item 5: Higher token cost -->
  <text x="376" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6b6b">&#8634; Higher token cost</text>

  <!-- Bottom label -->
  <text x="500" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7fa3">Higher cost, cleaner state</text>

  <!-- VS Badge -->
  <circle cx="340" cy="170" r="16" fill="#faf9f7" stroke="#d4d1c7" stroke-width="1"/>
  <text x="340" y="174" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#999">vs</text>

  <!-- Bottom comparison -->
  <text x="180" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b6b6b">Use correcting when: the error is fixable with clarification</text>
  <text x="500" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b6b6b">Use rewinding when: the context has accumulated too many errors</text>
</svg>
