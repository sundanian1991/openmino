<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200">
  <rect width="680" height="200" fill="#faf9f7" rx="4"/>

  <!-- Title -->
  <text x="40" y="32" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1a1a1a">The context window</text>
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#6b6b6b">Everything the model can see when it generates the next response</text>

  <!-- Main container -->
  <rect x="40" y="80" width="600" height="70" rx="10" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

  <!-- Cards -->
  <rect x="46" y="86" width="70" height="42" rx="5" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="81" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">system prompt</text>

  <rect x="120" y="86" width="50" height="42" rx="5" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="145" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">CLAUDE.md</text>

  <rect x="174" y="86" width="100" height="42" rx="5" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="224" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">conversation so far</text>

  <rect x="278" y="86" width="140" height="42" rx="5" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="348" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">tool calls + outputs</text>

  <rect x="422" y="86" width="90" height="42" rx="5" fill="#f5f4f1" stroke="#d4d1c7" stroke-width="1"/>
  <text x="467" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a1a">files read</text>

  <rect x="516" y="86" width="118" height="42" rx="5" fill="#faf9f7" stroke="#e8e4dc" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="575" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">free</text>

  <!-- Axis -->
  <line x1="40" y1="165" x2="640" y2="165" stroke="#d4d1c7" stroke-width="1"/>
  <line x1="40" y1="160" x2="40" y2="170" stroke="#d4d1c7" stroke-width="1.5"/>
  <text x="40" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">0</text>
  <line x1="640" y1="160" x2="640" y2="170" stroke="#d4d1c7" stroke-width="1.5"/>
  <text x="640" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b6b6b">1,000,000 tokens</text>
  <text x="640" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#999">hard cutoff</text>
</svg>
