<svg width="680" height="300" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="220" y="10" width="240" height="40" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="340" y="28" text-anchor="middle" font-size="12" font-weight="600" fill="#6b2010">"对接人又换了"</text>
<text x="340" y="42" text-anchor="middle" font-size="10" fill="#8b3018">关键岗位频繁更换 · 业务断层</text>

<line x1="340" y1="50" x2="190" y2="80" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr2)"/>
<line x1="340" y1="50" x2="490" y2="80" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr2)"/>
<text x="245" y="68" font-size="10" fill="#857d74">个人原因？</text>
<text x="430" y="68" font-size="10" fill="#857d74">组织问题？</text>

<rect x="10" y="85" width="320" height="46" rx="10" fill="#f0d68a" stroke="#b88018" stroke-width="1.5"/>
<text x="20" y="102" font-size="11" font-weight="600" fill="#6a4005">个人因素（对接人自身）</text>
<text x="20" y="118" font-size="10" fill="#8a5a0a">升职调岗？离职？个人能力不匹配？</text>

<line x1="170" y1="131" x2="170" y2="150" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr2)"/>
<text x="185" y="144" font-size="10" fill="#857d74">追问</text>

<rect x="10" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="20" y="174" font-size="10" font-weight="600" fill="#454240">更换原因</text>
<text x="20" y="190" font-size="9" fill="#5f5a54">升职还是离职</text>
<text x="20" y="204" font-size="9" fill="#5f5a54">是个别还是普遍</text>

<rect x="120" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="130" y="174" font-size="10" font-weight="600" fill="#454240">交接安排</text>
<text x="130" y="190" font-size="9" fill="#5f5a54">有没有交接期</text>
<text x="130" y="204" font-size="9" fill="#5f5a54">新对接人何时到位</text>

<rect x="230" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="240" y="174" font-size="10" font-weight="600" fill="#454240">频率判断</text>
<text x="240" y="190" font-size="9" fill="#5f5a54">换了几次了</text>
<text x="240" y="204" font-size="9" fill="#5f5a54">是偶发还是规律</text>

<rect x="350" y="85" width="320" height="46" rx="10" fill="#f0d9bf" stroke="#c26d3a" stroke-width="1.5"/>
<text x="360" y="102" font-size="11" font-weight="600" fill="#6b3410">组织因素（供应商内部管理）</text>
<text x="360" y="118" font-size="10" fill="#8b4513">岗位不稳定？权责不匹配？团队整体流失？</text>

<line x1="510" y1="131" x2="510" y2="150" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr2)"/>
<text x="525" y="144" font-size="10" fill="#857d74">追问</text>

<rect x="350" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="360" y="174" font-size="10" font-weight="600" fill="#454240">岗位权责</text>
<text x="360" y="190" font-size="9" fill="#5f5a54">对接人决策权</text>
<text x="360" y="204" font-size="9" fill="#5f5a54">有多大</text>

<rect x="460" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="470" y="174" font-size="10" font-weight="600" fill="#454240">整体流失</text>
<text x="470" y="190" font-size="9" fill="#5f5a54">团队流失率</text>
<text x="470" y="204" font-size="9" fill="#5f5a54">是否超标</text>

<rect x="570" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="580" y="174" font-size="10" font-weight="600" fill="#454240">锁定决策层</text>
<text x="580" y="190" font-size="9" fill="#5f5a54">要求对接更高层</text>
<text x="580" y="204" font-size="9" fill="#5f5a54">负责人</text>

<rect x="10" y="225" width="660" height="65" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="24" y="244" font-size="10" font-weight="600" fill="#0f5040">年老师追问话术</text>
<text x="24" y="262" font-size="10" fill="#1a6b50">"这是第几次换人了？之前的人去哪了？是个人原因还是普遍现象？"</text>
<text x="24" y="280" font-size="10" fill="#1a6b50">"我需要一个稳定的对接人，最好能直接和你这边负责人沟通，以后有事不绕弯。"</text>
</svg>