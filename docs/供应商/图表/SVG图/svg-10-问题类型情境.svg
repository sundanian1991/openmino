<svg width="680" height="420" xmlns="http://www.w3.org/2000/svg">

<title>供应商问题类型 — 情境驱动版</title>

<!-- Title -->
<text x="340" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0f5040">供应商问题类型 — 情境驱动版</text>
<text x="340" y="38" text-anchor="middle" font-size="9" fill="#857d74">不是教科书分类，是年老师每天真实遇到的场景和内心独白</text>

<!-- 8 scenario cards in 2 columns -->

<!-- Row 1 -->
<rect x="10" y="52" width="320" height="80" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.2"/>
<text x="24" y="72" font-size="11" font-weight="600" fill="#6b2010">场景一："这个月又是倒数"</text>
<text x="24" y="90" font-size="9" fill="#8b3018">表面：排名连续垫底，承诺目标未达成</text>
<text x="24" y="106" font-size="9" fill="#8b3018">根因分支：客观因素（名单/系统/团队结构）vs 主观因素（管理/激励/执行力）</text>
<text x="24" y="122" font-size="9" fill="#0f5040" font-weight="600">对应六盒：目标 · 激励 · 领导</text>

<rect x="350" y="52" width="320" height="80" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.2"/>
<text x="364" y="72" font-size="11" font-weight="600" fill="#6b2010">场景二："对接人又换了"</text>
<text x="364" y="90" font-size="9" fill="#8b3018">表面：关键岗位频繁更换，业务断层</text>
<text x="364" y="106" font-size="9" fill="#8b3018">根因分支：个人因素（升职/离职/能力不匹配）vs 组织因素（岗位不稳定/整体流失）</text>
<text x="364" y="122" font-size="9" fill="#0f5040" font-weight="600">对应六盒：结构 · 领导 · 关系</text>

<!-- Row 2 -->
<rect x="10" y="142" width="320" height="80" rx="8" fill="#f0d9bf" stroke="#c26d3a" stroke-width="1.2"/>
<text x="24" y="162" font-size="11" font-weight="600" fill="#6b3410">场景三："他去找军哥了"</text>
<text x="24" y="180" font-size="9" fill="#8b4513">表面：跳级施压，绕过你找上级</text>
<text x="24" y="196" font-size="9" fill="#8b4513">根因分支：正常诉求（确实没响应）vs 施压策略（试探底线/借上级压你）</text>
<text x="24" y="212" font-size="9" fill="#1a5a90" font-weight="600">对应六盒：关系 · 领导 · 结构</text>

<rect x="350" y="142" width="320" height="80" rx="8" fill="#f0d9bf" stroke="#c26d3a" stroke-width="1.2"/>
<text x="364" y="162" font-size="11" font-weight="600" fill="#6b3410">场景四："出勤一直上不去"</text>
<text x="364" y="180" font-size="9" fill="#8b4513">表面：日均出勤不足，人力缺口</text>
<text x="364" y="196" font-size="9" fill="#8b4513">根因分支：招不到人（能力/资源）vs 不愿投入（意愿/动力）</text>
<text x="364" y="212" font-size="9" fill="#1a5a90" font-weight="600">对应六盒：激励 · 结构 · 领导</text>

<!-- Row 3 -->
<rect x="10" y="232" width="320" height="80" rx="8" fill="#f0d68a" stroke="#b88018" stroke-width="1.2"/>
<text x="24" y="252" font-size="11" font-weight="600" fill="#6a4005">场景五："质量突然崩了"</text>
<text x="24" y="270" font-size="9" fill="#8a5a0a">表面：合规踩线，投诉暴增</text>
<text x="24" y="286" font-size="9" fill="#8a5a0a">根因分支：名单/系统问题 vs 人的问题（培训/管理松懈）</text>
<text x="24" y="302" font-size="9" fill="#3a4a30" font-weight="600">对应六盒：工具 · 领导 · 关系</text>

<rect x="350" y="232" width="320" height="80" rx="8" fill="#f0d68a" stroke="#b88018" stroke-width="1.2"/>
<text x="364" y="252" font-size="11" font-weight="600" fill="#6a4005">场景六："干不了，要退出"</text>
<text x="364" y="270" font-size="9" fill="#8a5a0a">表面：威胁退出，消极怠工</text>
<text x="364" y="286" font-size="9" fill="#8a5a0a">根因分支：真干不了（经营困难）vs 要挟策略（用退出要筹码）</text>
<text x="364" y="302" font-size="9" fill="#3a4a30" font-weight="600">对应六盒：激励 · 领导 · 关系</text>

<!-- Row 4 -->
<rect x="10" y="322" width="320" height="80" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.2"/>
<text x="24" y="342" font-size="11" font-weight="600" fill="#0e4070">场景七："消息总是不灵"</text>
<text x="24" y="360" font-size="9" fill="#1a5a90">表面：信息滞后，不同步，事后才知道</text>
<text x="24" y="376" font-size="9" fill="#1a5a90">根因分支：机制缺失（无固定渠道）vs 态度问题（不重视/选择性接收）</text>
<text x="24" y="392" font-size="9" fill="#4a6040" font-weight="600">对应六盒：关系 · 工具 · 领导</text>

<rect x="350" y="322" width="320" height="80" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.2"/>
<text x="364" y="342" font-size="11" font-weight="600" fill="#0e4070">场景八："说了改，没见改"</text>
<text x="364" y="360" font-size="9" fill="#1a5a90">表面：改进无效，承诺不兑现</text>
<text x="364" y="376" font-size="9" fill="#1a5a90">根因分支：改了但没效果 vs 根本没改（敷衍/拖延）</text>
<text x="364" y="392" font-size="9" fill="#4a6040" font-weight="600">对应六盒：领导 · 激励 · 关系</text>

</svg>
