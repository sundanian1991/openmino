<svg width="680" height="360" xmlns="http://www.w3.org/2000/svg">

<title>六盒诊断在全生命周期的定位</title>

<!-- Title -->
<text x="340" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0f5040">六盒诊断在全生命周期的定位</text>
<text x="340" y="38" text-anchor="middle" font-size="9" fill="#857d74">六盒不是每个阶段都要用的工具，而是在特定阶段发挥最大价值的"深度诊断"</text>

<!-- Phase timeline bar -->
<rect x="10" y="50" width="165" height="32" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="92" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#0f5040">准入期</text>

<rect x="175" y="50" width="165" height="32" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="257" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#0e4070">成长期</text>

<rect x="340" y="50" width="165" height="32" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="422" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#3a4a30">稳定期</text>

<rect x="505" y="50" width="165" height="32" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="587" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#6b2010">退出期</text>

<!-- Usage labels on each phase -->
<rect x="10" y="86" width="165" height="28" rx="6" fill="#f0d68a" stroke="#b88018" stroke-width="1"/>
<text x="92" y="104" text-anchor="middle" font-size="9" fill="#6a4005">准入尽调 → 4盒重点用</text>

<rect x="175" y="86" width="165" height="28" rx="6" fill="#f0d68a" stroke="#b88018" stroke-width="1"/>
<text x="257" y="104" text-anchor="middle" font-size="9" fill="#6a4005">深度诊断 → 6盒全用</text>

<rect x="340" y="86" width="165" height="28" rx="6" fill="#f0d68a" stroke="#b88018" stroke-width="1"/>
<text x="422" y="104" text-anchor="middle" font-size="9" fill="#6a4005">深度诊断 → 6盒全用</text>

<rect x="505" y="86" width="165" height="28" rx="6" fill="#f0d68a" stroke="#b88018" stroke-width="1"/>
<text x="587" y="104" text-anchor="middle" font-size="9" fill="#6a4005">退出评估 → 3盒重点用</text>

<!-- Detail cards -->

<!-- Phase 1 -->
<rect x="10" y="126" width="165" height="220" rx="8" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1"/>
<text x="20" y="146" font-size="10" font-weight="600" fill="#0f5040">准入期（4盒）</text>
<text x="20" y="164" font-size="8" fill="#1a6b50">✓ 目标：双方期望一致吗</text>
<text x="20" y="180" font-size="8" fill="#1a6b50">✓ 结构：对接体系靠谱吗</text>
<text x="20" y="196" font-size="8" fill="#1a6b50">✓ 激励：他愿投入吗</text>
<text x="20" y="212" font-size="8" fill="#1a6b50">✓ 领导：负责人能力态度</text>
<text x="20" y="234" font-size="8" fill="#6b3410">关系/工具→合作中验证</text>
<text x="20" y="250" font-size="8" fill="#6b3410">不用全量，效率优先</text>
<text x="20" y="272" font-size="9" fill="#0f5040" font-weight="600">目的：排除不靠谱的</text>
<text x="20" y="288" font-size="8" fill="#1a6b50">不追求完美，只排除红线</text>
<text x="20" y="304" font-size="8" fill="#1a6b50">现场考察3维度替代工具</text>
<text x="20" y="336" font-size="9" fill="#0f5040" font-weight="600">一句话：选对人比培养人重要</text>

<!-- Phase 2 -->
<rect x="185" y="126" width="160" height="220" rx="8" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1"/>
<text x="195" y="146" font-size="10" font-weight="600" fill="#0e4070">成长期（6盒全用）</text>
<text x="195" y="164" font-size="8" fill="#1a5a90">✓ 目标：KPI传导到一线了吗</text>
<text x="195" y="180" font-size="8" fill="#1a5a90">✓ 结构：对接人频繁换吗</text>
<text x="195" y="196" font-size="8" fill="#1a5a90">✓ 关系：信息同步及时吗</text>
<text x="195" y="212" font-size="8" fill="#1a5a90">✓ 激励：他重视你这个客户吗</text>
<text x="195" y="228" font-size="8" fill="#1a5a90">✓ 领导：负责人靠谱吗</text>
<text x="195" y="244" font-size="8" fill="#1a5a90">✓ 工具：培训/系统到位吗</text>
<text x="195" y="266" font-size="9" fill="#0e4070" font-weight="600">目的：找到卡住的那个齿轮</text>
<text x="195" y="282" font-size="8" fill="#1a5a90">问题最多发生在成长期</text>
<text x="195" y="298" font-size="8" fill="#1a5a90">必须6盒全查，不能漏</text>
<text x="195" y="336" font-size="9" fill="#0e4070" font-weight="600">一句话：六盒的主战场在这里</text>

<!-- Phase 3 -->
<rect x="355" y="126" width="160" height="220" rx="8" fill="#f0f2ec" stroke="#6f8660" stroke-width="1"/>
<text x="365" y="146" font-size="10" font-weight="600" fill="#3a4a30">稳定期（6盒全用）</text>
<text x="365" y="164" font-size="8" fill="#4a6040">✓ 目标：业务重点变了同步吗</text>
<text x="365" y="180" font-size="8" fill="#4a6040">✓ 结构：组织是否还匹配规模</text>
<text x="365" y="196" font-size="8" fill="#4a6040">✓ 关系：协作是否有摩擦累积</text>
<text x="365" y="212" font-size="8" fill="#4a6040">✓ 激励：有没有躺平风险</text>
<text x="365" y="228" font-size="8" fill="#4a6040">✓ 领导：负责人有没有变化</text>
<text x="365" y="244" font-size="8" fill="#4a6040">✓ 工具：系统/培训还够用吗</text>
<text x="365" y="266" font-size="9" fill="#3a4a30" font-weight="600">目的：防微杜渐，提前预警</text>
<text x="365" y="282" font-size="8" fill="#4a6040">稳定期问题隐蔽、积累慢</text>
<text x="365" y="298" font-size="8" fill="#4a6040">定期巡检用六盒做框架</text>
<text x="365" y="336" font-size="9" fill="#3a4a30" font-weight="600">一句话：防止温水煮青蛙</text>

<!-- Phase 4 -->
<rect x="525" y="126" width="150" height="220" rx="8" fill="#faeae5" stroke="#c25030" stroke-width="1"/>
<text x="535" y="146" font-size="10" font-weight="600" fill="#6b2010">退出期（3盒）</text>
<text x="535" y="164" font-size="8" fill="#8b3018">✓ 目标：目标已不适用</text>
<text x="535" y="180" font-size="8" fill="#8b3018">✗ 结构/关系：不是重点</text>
<text x="535" y="196" font-size="8" fill="#8b3018">✓ 激励：退出动机要验证</text>
<text x="535" y="212" font-size="8" fill="#8b3018">✓ 领导：负责人态度决策</text>
<text x="535" y="228" font-size="8" fill="#8b3018">✗ 工具：不再相关</text>
<text x="535" y="250" font-size="9" fill="#6b2010" font-weight="600">目的：验证退出是否正当</text>
<text x="535" y="266" font-size="8" fill="#8b3018">威胁退出时：重点查激励</text>
<text x="535" y="282" font-size="8" fill="#8b3018">真清退时：重点查领导态度</text>
<text x="535" y="298" font-size="8" fill="#8b3018">判断真假退出，决定策略</text>
<text x="535" y="336" font-size="9" fill="#6b2010" font-weight="600">一句话：别被供应商绑架</text>

</svg>
