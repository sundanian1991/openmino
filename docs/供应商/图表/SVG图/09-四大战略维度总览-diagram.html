<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四大战略维度总览 · Strategy Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f4ed;
      --color-ink:     #0b0d0b;
      --color-muted:   #52534e;
      --color-accent:  #f7591f;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Strategy · Diagram Design</p>
    <h1>四大战略维度总览</h1>

    <svg viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#52534e"/></marker>
          <marker id="arrow-cycle" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f7591f"/></marker>
        </defs>

        <rect width="100%" height="100%" fill="#f5f4ed"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

        <!-- ===== ARROWS (vertical stack, drawn first) ===== -->

        <!-- D1 → D2 (down) -->
        <line x1="480" y1="176" x2="480" y2="240" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- D2 → D3 (down) -->
        <line x1="480" y1="336" x2="480" y2="400" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- D3 → D4 (down) -->
        <line x1="480" y1="496" x2="480" y2="560" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- D4 → D1 (cycle back up, curved) -->
        <path d="M 480 656 C 480 680, 480 80, 480 120" fill="none" stroke="#f7591f" stroke-width="1.4" marker-end="url(#arrow-cycle)"/>

        <!-- Arrow label for cycle -->
        <rect x="508" y="368" width="48" height="12" rx="2" fill="#f5f4ed"/>
        <text x="532" y="380" fill="#f7591f" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">CYCLE</text>

        <!-- ===== STRATEGY DIMENSION BOXES (vertical stack) ===== -->

        <!-- D1: 战略选择 (top) -->
        <rect x="320" y="48" width="320" height="88" rx="8" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
        <rect x="328" y="56" width="28" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
        <text x="344" y="64" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DIM 01</text>
        <text x="480" y="92" fill="#0b0d0b" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">战略选择</text>
        <text x="480" y="108" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">strategy selection</text>
        <line x1="344" y1="124" x2="616" y2="124" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="136" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">头部集中度 55% → 符合预期</text>

        <!-- D2: 供应商培育 -->
        <rect x="320" y="248" width="320" height="88" rx="8" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
        <rect x="328" y="256" width="28" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
        <text x="344" y="268" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DIM 02</text>
        <text x="480" y="292" fill="#0b0d0b" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">供应商培育</text>
        <text x="480" y="308" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">supplier development</text>
        <line x1="344" y1="324" x2="616" y2="324" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="336" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">新增 2 家进入爬坡期 → 进行中</text>

        <!-- D3: 动态调整 -->
        <rect x="320" y="448" width="320" height="88" rx="8" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
        <rect x="328" y="456" width="28" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
        <text x="344" y="468" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DIM 03</text>
        <text x="480" y="492" fill="#0b0d0b" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">动态调整</text>
        <text x="480" y="508" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">dynamic adjustment</text>
        <line x1="344" y1="524" x2="616" y2="524" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="536" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">无清退/份额调整 → 正常</text>

        <!-- D4: 合规风控 (bottom) -->
        <rect x="320" y="648" width="320" height="88" rx="8" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
        <rect x="328" y="656" width="28" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
        <text x="344" y="668" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DIM 04</text>
        <text x="480" y="692" fill="#0b0d0b" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">合规风控</text>
        <text x="480" y="708" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">compliance &amp; risk</text>
        <line x1="344" y1="724" x2="616" y2="724" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="736" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">华啸预警，已处理 → 已解决</text>

        <!-- ===== ARROW LABELS ===== -->
        <rect x="456" y="260" width="36" height="12" rx="2" fill="#f5f4ed"/>
        <text x="476" y="268" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NEXT</text>

        <rect x="456" y="420" width="36" height="12" rx="2" fill="#f5f4ed"/>
        <text x="476" y="428" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NEXT</text>

        <rect x="456" y="580" width="36" height="12" rx="2" fill="#f5f4ed"/>
        <text x="476" y="588" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NEXT</text>

        <!-- ===== LEGEND ===== -->
        <line x1="40" y1="772" x2="920" y2="772" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
        <text x="40" y="788" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="40" y="804" width="24" height="12" rx="6" fill="rgba(11,13,11,0.03)" stroke="rgba(11,13,11,0.30)" stroke-width="1"/>
        <text x="72" y="816" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Start / end</text>

        <line x1="140" y1="812" x2="168" y2="812" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="176" y="816" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Flow</text>

        <line x1="240" y1="812" x2="268" y2="812" stroke="#f7591f" stroke-width="1.4" marker-end="url(#arrow-cycle)"/>
        <text x="276" y="816" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Cycle</text>

        <rect x="344" y="804" width="24" height="12" rx="2" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
        <text x="376" y="816" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Strategy box</text>

        <!-- ===== EDITORIAL ASIDE (bottom right, below cycle curve) ===== -->
        <text x="640" y="628" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">四个维度形成闭环，</text>
        <text x="640" y="648" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">每月迭代一轮，持续优化。</text>
      </svg>
  </div>
</body>
</html>
