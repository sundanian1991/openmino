<text x="580" y="204" font-size="9" fill="#5f5a54">是第一次还是老毛病</text>

<rect x="10" y="225" width="660" height="65" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="24" y="244" font-size="10" font-weight="600" fill="#0f5040">年老师应对策略（机制补漏+书面化，不靠口头传达）</text>
<text x="24" y="262" font-size="10" fill="#1a6b50">机制问题→建立固定同步机制：日报+周报+月例会，关键通知必须书面确认</text>
<text x="24" y="280" font-size="10" fill="#1a6b50">态度问题→"以后重要事项我发邮件/群消息，你回复确认。不回复=默认知晓，出问题按制度处理。"</text>
