<text x="240" y="190" font-size="9" fill="#5f5a54">其他供应商信</text>
<text x="240" y="204" font-size="9" fill="#5f5a54">息同步及时吗</text>

<rect x="350" y="85" width="320" height="46" rx="10" fill="#f0d9bf" stroke="#c26d3a" stroke-width="1.5"/>
<text x="360" y="102" font-size="11" font-weight="600" fill="#6b3410">态度问题（不重视/选择性接收）</text>
<text x="360" y="118" font-size="10" fill="#8b4513">消息看到了不执行？选择性接收对自己有利的？故意装不知道？</text>

