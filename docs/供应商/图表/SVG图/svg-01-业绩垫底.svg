<svg width="680" height="300" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Surface -->
<rect x="220" y="10" width="240" height="40" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="340" y="28" text-anchor="middle" font-size="12" font-weight="600" fill="#6b2010">"这个月又是倒数"</text>
<text x="340" y="42" text-anchor="middle" font-size="10" fill="#8b3018">排名连续垫底 · 承诺目标未达成</text>

<!-- Split -->
<line x1="340" y1="50" x2="190" y2="80" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr1)"/>
<line x1="340" y1="50" x2="490" y2="80" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr1)"/>
<text x="240" y="68" font-size="10" fill="#857d74">真努力了？</text>
<text x="430" y="68" font-size="10" fill="#857d74">没真用力？</text>

<!-- Left: External factors -->
<rect x="10" y="85" width="320" height="46" rx="10" fill="#f0d68a" stroke="#b88018" stroke-width="1.5"/>
<text x="20" y="102" font-size="11" font-weight="600" fill="#6a4005">客观因素（外部/资源问题）</text>
<text x="20" y="118" font-size="10" fill="#8a5a0a">名单质量差？系统故障？老员工流失？新人消化不了？</text>

<line x1="170" y1="131" x2="170" y2="150" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr1)"/>
<text x="185" y="144" font-size="10" fill="#857d74">追问</text>

<rect x="10" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="20" y="174" font-size="10" font-weight="600" fill="#454240">名单/系统</text>
<text x="20" y="190" font-size="9" fill="#5f5a54">这批名单转化率</text>
<text x="20" y="204" font-size="9" fill="#5f5a54">和其他供应商比</text>

<rect x="120" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="130" y="174" font-size="10" font-weight="600" fill="#454240">团队结构</text>
<text x="130" y="190" font-size="9" fill="#5f5a54">老人占比多少</text>
<text x="130" y="204" font-size="9" fill="#5f5a54">新人上了多久</text>

<rect x="230" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="240" y="174" font-size="10" font-weight="600" fill="#454240">排名验证</text>
<text x="240" y="190" font-size="9" fill="#5f5a54">是绝对垫底</text>
<text x="240" y="204" font-size="9" fill="#5f5a54">还是大家都差</text>

<!-- Right: Internal factors -->
<rect x="350" y="85" width="320" height="46" rx="10" fill="#f0d9bf" stroke="#c26d3a" stroke-width="1.5"/>
<text x="360" y="102" font-size="11" font-weight="600" fill="#6b3410">主观因素（管理/动力问题）</text>
<text x="360" y="118" font-size="10" fill="#8b4513">管理松懈？激励失效？主管不作为？目标传导断层？</text>

<line x1="510" y1="131" x2="510" y2="150" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr1)"/>
<text x="525" y="144" font-size="10" fill="#857d74">追问</text>

<rect x="350" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="360" y="174" font-size="10" font-weight="600" fill="#454240">管理动作</text>
<text x="360" y="190" font-size="9" fill="#5f5a54">做了什么管理</text>
<text x="360" y="204" font-size="9" fill="#5f5a54">动作要具体</text>

<rect x="460" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="470" y="174" font-size="10" font-weight="600" fill="#454240">改进承诺</text>
<text x="470" y="190" font-size="9" fill="#5f5a54">上次承诺做到了</text>
<text x="470" y="204" font-size="9" fill="#5f5a54">吗，有没有跟踪</text>

<rect x="570" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="580" y="174" font-size="10" font-weight="600" fill="#454240">投入意愿</text>
<text x="580" y="190" font-size="9" fill="#5f5a54">主动提过改进</text>
<text x="580" y="204" font-size="9" fill="#5f5a54">方案吗</text>

<!-- Bottom script -->
<rect x="10" y="225" width="660" height="65" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="24" y="244" font-size="10" font-weight="600" fill="#0f5040">年老师追问话术（三要素法，让供应商自己承诺）</text>
<text x="24" y="262" font-size="10" fill="#1a6b50">"这个月你的产能排名最后，原因是什么？下个月目标是多少？具体举措是什么？"</text>
<text x="24" y="280" font-size="10" fill="#1a6b50">（原因太笼统→追问具体环节；目标模糊→要具体数字；举措空泛→要周计划、责任人）</text>
</svg>