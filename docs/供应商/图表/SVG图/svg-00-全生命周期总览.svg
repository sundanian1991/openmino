<svg width="680" height="420" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#857d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<title>供应商全生命周期管理框架</title>

<!-- Phase flow -->
<rect x="10" y="20" width="140" height="56" rx="12" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="80" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="#0f5040">准入期</text>
<text x="80" y="62" text-anchor="middle" font-size="10" fill="#1a6b50">资质审核·试单验证</text>

<line x1="155" y1="48" x2="195" y2="48" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="175" y="42" text-anchor="middle" font-size="9" fill="#857d74">试单通过</text>

<rect x="200" y="20" width="140" height="56" rx="12" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="270" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="#0e4070">成长期</text>
<text x="270" y="62" text-anchor="middle" font-size="10" fill="#1a5a90">培训赋能·资源倾斜</text>

<line x1="345" y1="48" x2="385" y2="48" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="365" y="42" text-anchor="middle" font-size="9" fill="#857d74">KPI持续达标</text>

<rect x="390" y="20" width="140" height="56" rx="12" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="460" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4a30">稳定期</text>
<text x="460" y="62" text-anchor="middle" font-size="10" fill="#4a6040">份额管理·风险监控</text>

<line x1="535" y1="48" x2="575" y2="48" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="555" y="42" text-anchor="middle" font-size="9" fill="#857d74">连续3月不达标</text>

<rect x="580" y="20" width="90" height="56" rx="12" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="625" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="#6b2010">退出期</text>
<text x="625" y="62" text-anchor="middle" font-size="10" fill="#8b3018">清退·交接</text>

<!-- 4 phase detail cards -->
<!-- 准入期 -->
<rect x="10" y="96" width="320" height="140" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="24" y="116" font-size="11" font-weight="600" fill="#0f5040">阶段一：准入期（选）</text>
<text x="24" y="134" font-size="9" fill="#1a6b50">管理重点：资质审核 · 能力评估 · 试单验证</text>
<text x="24" y="152" font-size="9" fill="#1a6b50">分析框架：准入诊断6问 + 现场考察3维度</text>
<text x="24" y="168" font-size="9" fill="#1a6b50">预设要求：注册资本≥1000万 · 呼叫中心许可证</text>
<text x="24" y="184" font-size="9" fill="#1a6b50">一票否决：资质造假 · 重大违规 · 财务恶化</text>
<text x="24" y="200" font-size="9" fill="#1a6b50">核心策略：宽进严出 · 多家试单PK · 不依赖数标</text>
<text x="24" y="222" font-size="9" fill="#0f5040" font-weight="600">核心问题：为什么必须是这家？3年后还需要吗？</text>

<!-- 成长期 -->
<rect x="350" y="96" width="320" height="140" rx="10" fill="#e8f1fa" stroke="#3a7ab8" stroke-width="1.5"/>
<text x="364" y="116" font-size="11" font-weight="600" fill="#0e4070">阶段二：成长期（育）</text>
<text x="364" y="134" font-size="9" fill="#1a5a90">管理重点：培训赋能 · 资源倾斜 · 快速反应</text>
<text x="364" y="152" font-size="9" fill="#1a5a90">分析框架：业绩诊断6问 + 人力效应洞察</text>
<text x="364" y="168" font-size="9" fill="#1a5a90">预设要求：KPI持续达标 · 进入中上游排名</text>
<text x="364" y="184" font-size="9" fill="#1a5a90">关键指标：转化率 · 通时 · 人均产出 · MOB3留存</text>
<text x="364" y="200" font-size="9" fill="#1a5a90">核心策略：新业务优先中腰部 · 结算分层</text>
<text x="364" y="222" font-size="9" fill="#0e4070" font-weight="600">核心问题：根本原因是什么？能改进吗要什么？</text>

<!-- 稳定期 -->
<rect x="10" y="250" width="320" height="140" rx="10" fill="#f0f2ec" stroke="#6f8660" stroke-width="1.5"/>
<text x="24" y="270" font-size="11" font-weight="600" fill="#3a4a30">阶段三：稳定期（留）</text>
<text x="24" y="288" font-size="9" fill="#4a6040">管理重点：稳定性维护 · 深度绑定 · 防止躺平</text>
<text x="24" y="306" font-size="9" fill="#4a6040">分析框架：10大风险维度 + 赛马排名</text>
<text x="24" y="322" font-size="9" fill="#4a6040">预设要求：连续3-6月稳定前30% · 集中度管控</text>
<text x="24" y="338" font-size="9" fill="#4a6040">红线：单供应商≤15%人力 · ≤20%产能占比</text>
<text x="24" y="354" font-size="9" fill="#4a6040">核心策略：培育第二梯队 · 差异化定价</text>
<text x="24" y="376" font-size="9" fill="#3a4a30" font-weight="600">核心问题：谁有绑架能力？第二梯队是否就位？</text>

<!-- 退出期 -->
<rect x="350" y="250" width="320" height="140" rx="10" fill="#faeae5" stroke="#c25030" stroke-width="1.5"/>
<text x="364" y="270" font-size="11" font-weight="600" fill="#6b2010">阶段四：退出期（汰）</text>
<text x="364" y="288" font-size="9" fill="#8b3018">管理重点：风险预警 · 清退准备 · 替代方案</text>
<text x="364" y="306" font-size="9" fill="#8b3018">触发条件：连续3月不达标 · 重大合规违规</text>
<text x="364" y="322" font-size="9" fill="#8b3018">预设要求：书面依据 · 替代方案 · 结算清楚</text>
<text x="364" y="338" font-size="9" fill="#8b3018">清退红线：数据造假 · 录音篡改 · 信息泄露</text>
<text x="364" y="354" font-size="9" fill="#8b3018">核心策略：渐进式替换 · 先减份额再退出</text>
<text x="364" y="376" font-size="9" fill="#6b2010" font-weight="600">核心问题：真的触发清退了吗？替代方案是什么？</text>

<!-- Bottom principle bar -->
<rect x="10" y="400" width="660" height="14" rx="4" fill="#faf0e6" stroke="#c26d3a" stroke-width="1"/>
<text x="340" y="411" text-anchor="middle" font-size="9" fill="#6b3410" font-weight="600">核心原则：排名思维 · 三要素法 · 诊断驱动 · 培养悖论 · 梯队备份 · 六步法闭环</text>
</svg>