<text x="24" y="244" font-size="10" font-weight="600" fill="#0f5040">年老师追问话术（先给再问，不给供应商模糊空间）</text>
<text x="24" y="262" font-size="10" fill="#1a6b50">"我看你们这个月出勤一直只有XX人，比承诺少了XX。我问了几个同城市的供应商，他们人力都在涨。"</text>
<text x="24" y="280" font-size="10" fill="#1a6b50">"是当地招人确实难，还是你们有其他考虑？你实话告诉我，我好判断怎么帮你。"</text>
