<line x1="340" y1="50" x2="490" y2="80" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr5)"/>
<text x="240" y="68" font-size="10" fill="#857d74">名单/系统问题？</text>
<text x="430" y="68" font-size="10" fill="#857d74">人的问题？</text>

<rect x="10" y="85" width="320" height="46" rx="10" fill="#f0d68a" stroke="#b88018" stroke-width="1.5"/>
<text x="20" y="102" font-size="11" font-weight="600" fill="#6a4005">名单/系统问题（非人的原因）</text>
<text x="20" y="118" font-size="10" fill="#8a5a0a">这批名单本身就差？系统有bug？政策有调整？</text>

<line x1="170" y1="131" x2="170" y2="150" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr5)"/>
<text x="185" y="144" font-size="10" fill="#857d74">追问</text>

<rect x="10" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="20" y="174" font-size="10" font-weight="600" fill="#454240">横向对比</text>
<text x="20" y="190" font-size="9" fill="#5f5a54">其他供应商这</text>
<text x="20" y="204" font-size="9" fill="#5f5a54">批名单也差吗</text>

<rect x="120" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="130" y="174" font-size="10" font-weight="600" fill="#454240">时间关联</text>
<text x="130" y="190" font-size="9" fill="#5f5a54">什么时候开始</text>
<text x="130" y="204" font-size="9" fill="#5f5a54">差的，有触发事件吗</text>

<rect x="230" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="240" y="174" font-size="10" font-weight="600" fill="#454240">范围判断</text>
<text x="240" y="190" font-size="9" fill="#5f5a54">是个别人/站点</text>
<text x="240" y="204" font-size="9" fill="#5f5a54">还是大面积</text>

<rect x="350" y="85" width="320" height="46" rx="10" fill="#f0d9bf" stroke="#c26d3a" stroke-width="1.5"/>
<text x="360" y="102" font-size="11" font-weight="600" fill="#6b3410">人的问题（管理松懈/培训缺失）</text>
<text x="360" y="118" font-size="10" fill="#8b4513">新人没培训就上岗？主管放松管理？老员工带坏风气？</text>

<line x1="510" y1="131" x2="510" y2="150" stroke="#857d74" stroke-width="1.5" marker-end="url(#arr5)"/>
<text x="525" y="144" font-size="10" fill="#857d74">追问</text>

<rect x="350" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="360" y="174" font-size="10" font-weight="600" fill="#454240">培训验证</text>
<text x="360" y="190" font-size="9" fill="#5f5a54">新人培训了多久</text>
<text x="360" y="204" font-size="9" fill="#5f5a54">有没有考核上岗</text>

<rect x="460" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
