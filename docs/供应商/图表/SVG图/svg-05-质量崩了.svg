<text x="470" y="190" font-size="9" fill="#5f5a54">发现问题后他</text>
<text x="470" y="204" font-size="9" fill="#5f5a54">们第一反应是什么</text>

<rect x="570" y="155" width="100" height="55" rx="8" fill="#f2f0eb" stroke="#ada599" stroke-width="1"/>
<text x="580" y="174" font-size="10" font-weight="600" fill="#454240">红线意识</text>
<text x="580" y="190" font-size="9" fill="#5f5a54">有没有碰四条</text>
<text x="580" y="204" font-size="9" fill="#5f5a54">红线（品牌/代客等）</text>

<rect x="10" y="225" width="660" height="65" rx="10" fill="#e6f5f0" stroke="#2e8b6e" stroke-width="1.5"/>
<text x="24" y="244" font-size="10" font-weight="600" fill="#0f5040">年老师应对策略（先定性再处置，区分名单问题和人的问题）</text>
<text x="24" y="262" font-size="10" fill="#1a6b50">名单问题→24小时整改+7天复查，帮他协调名单质量</text>
<text x="24" y="280" font-size="10" fill="#1a6b50">人的问题→踩红线直接熔断，培训不到位要求重新培训上岗，主管问责</text>
