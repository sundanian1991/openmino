<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商准入分流流程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #faf0e6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .container {
    width: 1280px;
    height: 720px;
    background: #fff;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  /* narration bar */
  .narration {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2e2c2a;
    color: #f5f0eb;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    z-index: 10;
    transition: opacity 0.3s;
  }
  .narration span { opacity: 0; transition: opacity 0.4s; }
  .narration span.visible { opacity: 1; }

  /* SVG canvas */
  .canvas-wrap {
    position: absolute;
    top: 56px;
    left: 0; right: 0; bottom: 52px;
  }
  .canvas-wrap svg { width: 100%; height: 100%; }

  /* controls */
  .controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: #f8f5f0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-top: 1px solid #e8e4de;
  }
  .btn {
    background: none;
    border: 1px solid #ada599;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    color: #857d74;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #e8e4de; color: #2e2c2a; }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.play { border-color: #c26d3a; color: #c26d3a; }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #d4cdc4;
    transition: all 0.3s;
  }
  .dot.active { background: #c26d3a; transform: scale(1.3); }
  .dot.done { background: #857d74; }

  /* SVG node styles */
  .node-rect { rx: 8; ry: 8; }
  .node-text {
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
    fill: #fff;
  }
  .node-sub {
    font-size: 10px;
    font-weight: 400;
    fill: rgba(255,255,255,0.75);
  }
  .edge-path {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }
  .edge-label {
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 10px;
    fill: #857d74;
    text-anchor: middle;
  }
  .orb {
    fill: #c26d3a;
    filter: drop-shadow(0 0 4px rgba(194,109,58,0.5));
  }
</style>
</head>
<body>
<div class="container">
  <div class="narration"><span id="narrationText"></span></div>
  <div class="canvas-wrap">
    <svg id="svgCanvas" viewBox="0 0 1280 612" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#ada599"/>
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#3a7ab8"/>
        </marker>
        <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#c26d3a"/>
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#2e8b6e"/>
        </marker>
        <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="#c25030"/>
        </marker>
      </defs>
    </svg>
  </div>
  <div class="controls">
    <button class="btn" id="btnPrev" onclick="prevStep()" disabled>上一步</button>
    <div class="dots" id="dots"></div>
    <button class="btn play" id="btnPlay" onclick="togglePlay()">自动播放</button>
    <button class="btn" id="btnNext" onclick="nextStep()">下一步</button>
  </div>
</div>

<script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svgCanvas');

// ── Color system ──
const COLORS = {
  neutral: { fill: '#4a4540', stroke: '#3a3530' },
  blue:    { fill: '#3a7ab8', stroke: '#2e6090' },
  orange:  { fill: '#c26d3a', stroke: '#a0552a' },
  green:   { fill: '#2e8b6e', stroke: '#1f6b52' },
  red:     { fill: '#c25030', stroke: '#9a3820' },
  gateway: { fill: '#5a524a', stroke: '#4a423a' },
};
const EDGE_COLORS = {
  main_flow: '#ada599',
  branch_out: '#857d74',
  fan_in: '#857d74',
  blue: '#3a7ab8',
  orange: '#c26d3a',
  green: '#2e8b6e',
  red: '#c25030',
  green_done: '#2e8b6e',
};

// ── Node definitions ──
const NODES = {
  N1:  { x: 80,  y: 280, w: 120, h: 48, label: '业务提需求', type: 'neutral' },
  N2:  { x: 260, y: 280, w: 120, h: 48, label: '服务组初审', type: 'neutral' },
  N3:  { x: 440, y: 280, w: 120, h: 48, label: '路径判定',   type: 'gateway' },
  N4:  { x: 640, y: 120, w: 130, h: 48, label: '标准通道',   sub: '全量审查', type: 'blue' },
  N5:  { x: 640, y: 280, w: 130, h: 48, label: '快速通道',   sub: '总监担保', type: 'orange' },
  N6:  { x: 640, y: 440, w: 130, h: 48, label: '扩产线',     sub: '增量审查', type: 'green' },
  N7:  { x: 870, y: 200, w: 120, h: 48, label: '合规终审',   type: 'gateway' },
  N8:  { x: 870, y: 340, w: 120, h: 48, label: '上线+标记',  type: 'orange' },
  N9:  { x: 1050, y: 340, w: 110, h: 48, label: '3月补审',   type: 'orange' },
  N10: { x: 1050, y: 480, w: 110, h: 48, label: '自动清退',  type: 'red' },
};

// ── Edge definitions ──
const EDGES = [
  { id: 'e12', from: 'N1', to: 'N2', color: 'main_flow', arrow: 'arrowGray' },
  { id: 'e23', from: 'N2', to: 'N3', color: 'main_flow', arrow: 'arrowGray' },
  { id: 'e34', from: 'N3', to: 'N4', color: 'blue', arrow: 'arrowBlue', label: '新供应商', curve: -80 },
  { id: 'e35', from: 'N3', to: 'N5', color: 'orange', arrow: 'arrowOrange', label: '紧急+总监签字' },
  { id: 'e36', from: 'N3', to: 'N6', color: 'green', arrow: 'arrowGreen', label: '现有扩线', curve: 80 },
  { id: 'e47', from: 'N4', to: 'N7', color: 'blue', arrow: 'arrowBlue', curve: -40 },
  { id: 'e67', from: 'N6', to: 'N7', color: 'green', arrow: 'arrowGreen', curve: 40 },
  { id: 'e58', from: 'N5', to: 'N8', color: 'orange', arrow: 'arrowOrange' },
  { id: 'e89', from: 'N8', to: 'N9', color: 'orange', arrow: 'arrowOrange', label: '3个月内', orb: true },
  { id: 'e97', from: 'N9', to: 'N7', color: 'green_done', arrow: 'arrowGreen', label: '补审通过', curve: -70 },
  { id: 'e910', from: 'N9', to: 'N10', color: 'red', arrow: 'arrowRed', label: '未完成', dashed: true, curve: 70 },
];

// ── Animation steps ──
const STEPS = [
  { narration: '业务提出供应商需求', nodes: ['N1'], edges: [] },
  { narration: '服务组统一受理，做初步筛查', nodes: ['N2'], edges: ['e12'] },
  { narration: '根据情况判定走哪条准入路径', nodes: ['N3'], edges: ['e23'] },
  { narration: '三种通道：标准全审 / 快速担保 / 增量审查', nodes: ['N4','N5','N6'], edges: ['e34','e35','e36'] },
  { narration: '标准通道和扩产线汇聚到合规终审', nodes: ['N7'], edges: ['e47','e67'] },
  { narration: '快速通道：总监担保后先上线，加标记', nodes: ['N8'], edges: ['e58'] },
  { narration: '三个月内必须补完全部合规审查', nodes: ['N9'], edges: ['e89'] },
  { narration: '补审通过归位合规终审，未完成则自动清退', nodes: ['N10'], edges: ['e97','e910'] },
];

// ── State ──
let currentStep = -1;
let playing = false;
let playTimer = null;
const shownNodes = new Set();
const shownEdges = new Set();
const nodeElements = {};
const edgeElements = {};

// ── Build SVG elements ──
function createNode(id, n) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('opacity', '0');
  g.style.transition = 'opacity 0.5s';

  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('x', n.x);
  rect.setAttribute('y', n.y);
  rect.setAttribute('width', n.w);
  rect.setAttribute('height', n.h);
  rect.setAttribute('class', 'node-rect');
  const c = COLORS[n.type];
  rect.setAttribute('fill', c.fill);
  rect.setAttribute('stroke', c.stroke);
  rect.setAttribute('stroke-width', '1.5');
  g.appendChild(rect);

  const text = document.createElementNS(NS, 'text');
  text.setAttribute('x', n.x + n.w / 2);
  text.setAttribute('y', n.y + (n.sub ? n.h / 2 - 7 : n.h / 2));
  text.setAttribute('class', 'node-text');
  text.textContent = n.label;
  g.appendChild(text);

  if (n.sub) {
    const sub = document.createElementNS(NS, 'text');
    sub.setAttribute('x', n.x + n.w / 2);
    sub.setAttribute('y', n.y + n.h / 2 + 9);
    sub.setAttribute('class', 'node-text node-sub');
    sub.textContent = n.sub;
    g.appendChild(sub);
  }

  svg.appendChild(g);
  nodeElements[id] = g;
}

function getEdgePath(e) {
  const from = NODES[e.from];
  const to = NODES[e.to];
  const fx = from.x + from.w;
  const fy = from.y + from.h / 2;
  const tx = to.x;
  const ty = to.y + to.h / 2;

  if (e.curve) {
    const mx = (fx + tx) / 2;
    const my = (fy + ty) / 2 + e.curve;
    return `M${fx},${fy} Q${mx},${my} ${tx},${ty}`;
  }
  return `M${fx},${fy} L${tx},${ty}`;
}

function createEdge(e) {
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('opacity', '0');
  g.style.transition = 'opacity 0.5s';

  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', getEdgePath(e));
  path.setAttribute('class', 'edge-path');
  path.setAttribute('stroke', EDGE_COLORS[e.color] || '#ada599');
  path.setAttribute('marker-end', `url(#${e.arrow})`);
  if (e.dashed) {
    path.setAttribute('stroke-dasharray', '6,4');
    path.setAttribute('stroke', '#c25030');
  }
  g.appendChild(path);

  if (e.label) {
    const from = NODES[e.from];
    const to = NODES[e.to];
    const lx = (from.x + from.w + to.x) / 2;
    const ly = (from.y + from.h / 2 + to.y + to.h / 2) / 2 + (e.curve ? e.curve * 0.4 : -12);
    const label = document.createElementNS(NS, 'text');
    label.setAttribute('x', lx);
    label.setAttribute('y', ly);
    label.setAttribute('class', 'edge-label');
    label.textContent = e.label;
    g.appendChild(label);
  }

  svg.appendChild(g);
  edgeElements[e.id] = g;
}

// Init
Object.entries(NODES).forEach(([id, n]) => createNode(id, n));
EDGES.forEach(e => createEdge(e));

// Dots
const dotsEl = document.getElementById('dots');
STEPS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  dotsEl.appendChild(d);
});

// ── Step control ──
function setStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  currentStep = idx;
  const step = STEPS[idx];

  // reveal nodes
  step.nodes.forEach(id => {
    if (!shownNodes.has(id)) {
      shownNodes.add(id);
      nodeElements[id].setAttribute('opacity', '1');
    }
  });

  // reveal edges
  step.edges.forEach(eid => {
    if (!shownEdges.has(eid)) {
      shownEdges.add(eid);
      const eg = edgeElements[eid];
      eg.setAttribute('opacity', '1');
      // orb animation for e89
      if (eid === 'e89') {
        animateOrb(EDGES.find(e => e.id === eid));
      }
    }
  });

  // narration
  const narrSpan = document.getElementById('narrationText');
  narrSpan.classList.remove('visible');
  setTimeout(() => {
    narrSpan.textContent = step.narration;
    narrSpan.classList.add('visible');
  }, 100);

  // dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  });

  // buttons
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === STEPS.length - 1;
}

function nextStep() {
  if (currentStep < STEPS.length - 1) setStep(currentStep + 1);
  else if (playing) togglePlay();
}

function prevStep() {
  if (currentStep > 0) {
    // reset and replay up to idx-1
    const target = currentStep - 1;
    resetAll();
    for (let i = 0; i <= target; i++) {
      STEPS[i].nodes.forEach(id => {
        shownNodes.add(id);
        nodeElements[id].setAttribute('opacity', '1');
      });
      STEPS[i].edges.forEach(eid => {
        shownEdges.add(eid);
        edgeElements[eid].setAttribute('opacity', '1');
      });
    }
    setStep(target);
  }
}

function resetAll() {
  Object.values(nodeElements).forEach(el => el.setAttribute('opacity', '0'));
  Object.values(edgeElements).forEach(el => el.setAttribute('opacity', '0'));
  // remove orbs
  document.querySelectorAll('.orb').forEach(o => o.remove());
  shownNodes.clear();
  shownEdges.clear();
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btnPlay');
  if (playing) {
    btn.textContent = '暂停';
    if (currentStep >= STEPS.length - 1) {
      resetAll();
      currentStep = -1;
    }
    nextStep();
    playTimer = setInterval(() => {
      if (currentStep < STEPS.length - 1) nextStep();
      else togglePlay();
    }, 2200);
  } else {
    btn.textContent = '自动播放';
    clearInterval(playTimer);
  }
}

// ── Orb animation ──
function animateOrb(edgeDef) {
  const from = NODES[edgeDef.from];
  const to = NODES[edgeDef.to];
  const orb = document.createElementNS(NS, 'circle');
  orb.setAttribute('r', '5');
  orb.setAttribute('class', 'orb');
  svg.appendChild(orb);

  const fx = from.x + from.w;
  const fy = from.y + from.h / 2;
  const tx = to.x;
  const ty = to.y + to.h / 2;

  let t = 0;
  const duration = 600;
  const start = performance.now();

  function tick(now) {
    t = Math.min((now - start) / duration, 1);
    const cx = fx + (tx - fx) * t;
    const cy = fy + (ty - fy) * t;
    orb.setAttribute('cx', cx);
    orb.setAttribute('cy', cy);
    if (t < 1) requestAnimationFrame(tick);
    else setTimeout(() => orb.setAttribute('opacity', '0'), 800);
  }
  requestAnimationFrame(tick);
}

// ── Start ──
nextStep();
</script>
</body>
</html>
