<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度状态分类矩阵 · Matrix</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f4ed;
      --color-ink:     #0b0d0b;
      --color-muted:   #52534e;
      --color-accent:  #f7591f;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Matrix · Diagram Design</p>
    <h1>月度状态分类矩阵</h1>

    <svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="#f5f4ed"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

        <!-- ===== TWO-COLUMN CARD LAYOUT ===== -->

        <!-- Left card: 需行动 (focal,焦橙背景20%) -->
        <rect x="80" y="120" width="360" height="360" rx="12" fill="rgba(247,89,31,0.20)" stroke="#f7591f" stroke-width="1.5"/>
        <!-- Header -->
        <rect x="80" y="120" width="360" height="48" rx="12" fill="rgba(247,89,31,0.20)"/>
        <rect x="88" y="128" width="16" height="16" rx="4" fill="#f7591f"/>
        <text x="112" y="140" fill="#0b0d0b" font-size="11" font-weight="600" font-family="'Geist', sans-serif">需行动 · P0</text>
        <text x="112" y="152" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace">ACTION REQUIRED</text>
        <!-- Action count highlight -->
        <rect x="300" y="128" width="64" height="24" rx="6" fill="#f7591f"/>
        <text x="332" y="144" fill="#ffffff" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">2 家</text>

        <!-- Supplier 1 -->
        <rect x="96" y="192" width="328" height="56" rx="6" fill="#ffffff" stroke="rgba(247,89,31,0.50)" stroke-width="1.2"/>
        <text x="116" y="220" fill="#0b0d0b" font-size="14" font-weight="600" font-family="'Geist', sans-serif">华啸</text>
        <text x="116" y="236" fill="#52534e" font-size="9" font-family="'Geist', sans-serif">峰值比 58% · 连续 4 月下滑</text>

        <!-- Supplier 2 -->
        <rect x="96" y="260" width="328" height="56" rx="6" fill="#ffffff" stroke="rgba(247,89,31,0.50)" stroke-width="1.2"/>
        <text x="116" y="288" fill="#0b0d0b" font-size="14" font-weight="600" font-family="'Geist', sans-serif">岐力</text>
        <text x="116" y="304" fill="#52534e" font-size="9" font-family="'Geist', sans-serif">排名 Bottom 3 · 连续 3 月</text>

        <!-- Action hint -->
        <line x1="96" y1="336" x2="424" y2="336" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="96" y="352" fill="#f7591f" font-size="10" font-family="'Geist', sans-serif">本周约谈 + 30 天整改跟踪</text>

        <!-- Right card: 维持观察 (暖灰) -->
        <rect x="520" y="120" width="360" height="360" rx="12" fill="rgba(11,13,11,0.03)" stroke="rgba(11,13,11,0.30)" stroke-width="1"/>
        <rect x="520" y="120" width="360" height="48" rx="12" fill="rgba(11,13,11,0.03)"/>
        <rect x="528" y="128" width="16" height="16" rx="4" fill="#52534e"/>
        <text x="552" y="140" fill="#0b0d0b" font-size="11" font-weight="600" font-family="'Geist', sans-serif">维持观察 · P1-P2</text>
        <text x="552" y="152" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace">MONITOR ONLY</text>
        <!-- Count badge -->
        <rect x="724" y="128" width="72" height="24" rx="6" fill="rgba(11,13,11,0.08)"/>
        <text x="760" y="144" fill="#52534e" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">8 家</text>

        <!-- Supplier grid (2×4) -->
        <rect x="528" y="192" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="548" y="220" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">毅航</text>

        <rect x="696" y="192" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="716" y="220" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">毛毛虫</text>

        <rect x="528" y="252" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="548" y="280" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">伽玛</text>

        <rect x="696" y="252" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="716" y="280" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">赛维斯</text>

        <rect x="528" y="312" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="548" y="340" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">广达</text>

        <rect x="696" y="312" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="716" y="340" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">XX</text>

        <rect x="528" y="372" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="548" y="400" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">YY</text>

        <rect x="696" y="372" width="160" height="48" rx="4" fill="#ffffff" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
        <text x="716" y="400" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">ZZ</text>

        <!-- Resource allocation hint -->
        <line x1="80" y1="500" x2="880" y2="500" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="96" y="516" fill="#52534e" font-size="9" font-family="'Geist', sans-serif">资源分配：需行动 80% · 维持观察 20%</text>

        <!-- ===== LEGEND ===== -->
        <line x1="40" y1="532" x2="920" y2="532" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
        <text x="40" y="548" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="40" y="564" width="24" height="12" rx="6" fill="rgba(247,89,31,0.20)" stroke="#f7591f" stroke-width="1.5"/>
        <text x="72" y="576" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">P0 Action required</text>

        <rect x="220" y="564" width="24" height="12" rx="6" fill="rgba(11,13,11,0.03)" stroke="rgba(11,13,11,0.30)" stroke-width="1"/>
        <text x="252" y="576" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">P1-P2 Monitor only</text>

        <!-- ===== EDITORIAL ASIDE (bottom right, clear area) ===== -->
        <text x="640" y="480" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">80/20 法则：2 家消耗 80%</text>
        <text x="640" y="500" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">精力，其余 8 家仅需 20%。</text>
      </svg>
  </div>
</body>
</html>
