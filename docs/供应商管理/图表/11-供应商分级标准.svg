<svg viewBox="0 0 960 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="#f5f4ed"/>
        <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

        <!-- ===== VERTICAL TIER LIST (4 levels) ===== -->

        <!-- Tier S (top, 橄榄绿边框 1.5px) -->
        <rect x="280" y="80" width="400" height="120" rx="8" fill="#ffffff" stroke="#5a8f5a" stroke-width="1.5"/>
        <rect x="288" y="88" width="28" height="12" rx="2" fill="transparent" stroke="rgba(90,143,90,0.50)" stroke-width="0.8"/>
        <text x="304" y="96" fill="#5a8f5a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">TIER S</text>
        <text x="480" y="124" fill="#0b0d0b" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">S 级 · 战略供应商</text>
        <text x="480" y="144" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">STRATEGIC PARTNER</text>
        <!-- Score range -->
        <line x1="304" y1="164" x2="656" y2="164" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="180" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">得分 ≥ 90 | 月沟通 1 次深度</text>
        <!-- Supplier names -->
        <text x="300" y="212" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">毅航 · 毛毛虫</text>

        <!-- Tier A (olive green border) -->
        <rect x="280" y="220" width="400" height="120" rx="8" fill="#ffffff" stroke="#5a8f5a" stroke-width="1.5"/>
        <rect x="288" y="228" width="28" height="12" rx="2" fill="transparent" stroke="rgba(90,143,90,0.40)" stroke-width="0.8"/>
        <text x="304" y="236" fill="#5a8f5a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">TIER A</text>
        <text x="480" y="264" fill="#0b0d0b" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">A 级 · 核心供应商</text>
        <text x="480" y="284" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">CORE SUPPLIER</text>
        <line x1="304" y1="304" x2="656" y2="304" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="320" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">得分 80-89 | 月沟通 1 次电话</text>
        <text x="300" y="352" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">广达 · 伽玛 · 赛维斯</text>

        <!-- Tier B (neutral border) -->
        <rect x="280" y="360" width="400" height="120" rx="8" fill="#ffffff" stroke="#52534e" stroke-width="1"/>
        <rect x="288" y="368" width="28" height="12" rx="2" fill="transparent" stroke="rgba(82,83,78,0.40)" stroke-width="0.8"/>
        <text x="304" y="376" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">TIER B</text>
        <text x="480" y="404" fill="#0b0d0b" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">B 级 · 合格供应商</text>
        <text x="480" y="424" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">QUALIFIED</text>
        <line x1="304" y1="444" x2="656" y2="444" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="460" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">得分 70-79 | 双月沟通 1 次</text>
        <text x="300" y="492" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">部分中小供应商</text>

        <!-- Tier C (焦橙边框 1.5px) -->
        <rect x="280" y="500" width="400" height="120" rx="8" fill="#ffffff" stroke="#f7591f" stroke-width="1.5"/>
        <rect x="288" y="508" width="28" height="12" rx="2" fill="transparent" stroke="rgba(247,89,31,0.50)" stroke-width="0.8"/>
        <text x="304" y="516" fill="#f7591f" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">TIER C</text>
        <text x="480" y="544" fill="#0b0d0b" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">C 级 · 观察供应商</text>
        <text x="480" y="564" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">UNDER REVIEW</text>
        <line x1="304" y1="584" x2="656" y2="584" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
        <text x="480" y="600" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">得分 < 70 | 按需沟通</text>
        <text x="300" y="632" fill="#0b0d0b" font-size="12" font-family="'Geist', sans-serif">翰锐 · 岐力 · XX</text>

        <!-- ===== ASCENDING INDICATOR ARROWS (between tiers) ===== -->
        <!-- S → A (up arrow between) -->
        <line x1="660" y1="140" x2="660" y2="200" stroke="#5a8f5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
        <!-- A → B -->
        <line x1="660" y1="280" x2="660" y2="340" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <!-- B → C -->
        <line x1="660" y1="440" x2="660" y2="500" stroke="#f7591f" stroke-width="1.2" marker-end="url(#arrow-accent)"/>

        <!-- ===== COMMUNICATION FREQUENCY LEGEND ===== -->
        <line x1="80" y1="664" x2="880" y2="664" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
        <text x="80" y="680" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">COMMUNICATION FREQUENCY</text>

        <rect x="80" y="696" width="20" height="10" rx="2" fill="transparent" stroke="#5a8f5a" stroke-width="1"/>
        <text x="108" y="704" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">S-tier 每月 1 次深度</text>

        <rect x="300" y="696" width="20" height="10" rx="2" fill="transparent" stroke="#52534e" stroke-width="1"/>
        <text x="328" y="704" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">A-tier 每月 1 次电话</text>

        <rect x="520" y="696" width="20" height="10" rx="2" fill="transparent" stroke="#52534e" stroke-width="1"/>
        <text x="548" y="704" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">B-tier 双月 1 次</text>

        <rect x="740" y="696" width="20" height="10" rx="2" fill="transparent" stroke="#f7591f" stroke-width="1"/>
        <text x="768" y="704" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">C-tier 按需沟通</text>

        <!-- ===== EDITORIAL ASIDE ===== -->
        <text x="720" y="640" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">优胜劣汰，动态升降级。</text>
        <text x="720" y="660" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">每月重评，逐级调整。</text>

        <!-- Green arrow marker def (add to defs) -->
        <defs>
          <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#5a8f5a"/></marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f7591f"/></marker>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#52534e"/></marker>
        </defs>
      </svg>