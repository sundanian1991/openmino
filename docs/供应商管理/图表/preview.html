<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>供应商管理方法论 - 图表预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #1e40af;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 20px;
      max-width: 1800px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      color: #334155;
      font-size: 14px;
    }
    .card-body {
      padding: 16px;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
    }
    .card-body canvas, .card-body img {
      max-width: 100%;
      height: auto;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
    }
    .error {
      color: #dc2626;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }
    .loading {
      color: #64748b;
      font-size: 14px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-bottom: 20px;
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    #status {
      text-align: center;
      color: #64748b;
      margin-bottom: 15px;
      font-size: 13px;
    }
  </style>
  <!-- Excalidraw 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/excalidraw.development.js"></script>
</head>
<body>
  <a href="../README.md" class="back-link">← 返回图表索引</a>
  <h1>供应商管理方法论 · 28张图表预览</h1>
  <div id="status">正在加载 Excalidraw 渲染器...</div>
  <div class="grid" id="grid"></div>

  <script>
    const charts = [
      { file: "01-整体架构三层模型.excalidraw", name: "01 整体架构三层模型" },
      { file: "02-22个Plan模板体系分类.excalidraw", name: "02 22个Plan模板体系分类" },
      { file: "03-供应商触发规则状态机.excalidraw", name: "03 供应商触发规则状态机" },
      { file: "04-产能双维度诊断矩阵.excalidraw", name: "04 产能双维度诊断矩阵" },
      { file: "05-Plan模板调用决策树.excalidraw", name: "05 Plan模板调用决策树" },
      { file: "06-模板与工具箱衔接矩阵.excalidraw", name: "06 模板与工具箱衔接矩阵" },
      { file: "07-工具箱19章结构树.excalidraw", name: "07 工具箱19章结构树" },
      { file: "08-供应商全生命周期SOP.excalidraw", name: "08 供应商全生命周期SOP" },
      { file: "09-10大高频场景地图.excalidraw", name: "09 10大高频场景地图" },
      { file: "10-预警约谈四步法流程.excalidraw", name: "10 预警约谈四步法流程" },
      { file: "11-整改计划评估流程.excalidraw", name: "11 整改计划评估流程" },
      { file: "12-新供应商6个月里程碑时间轴.excalidraw", name: "12 新供应商6个月里程碑时间轴" },
      { file: "13-数据真实性防控5机制流程.excalidraw", name: "13 数据真实性防控5机制流程" },
      { file: "14-双指标卡片8类型散点图.excalidraw", name: "14 双指标卡片8类型散点图" },
      { file: "15-主管胜任5项指标雷达图.excalidraw", name: "15 主管胜任5项指标雷达图" },
      { file: "16-四大战略维度雷达图.excalidraw", name: "16 四大战略维度雷达图" },
      { file: "17-异常信号31个热力图.excalidraw", name: "17 异常信号31个热力图" },
      { file: "18-月工作196小时拆解图.excalidraw", name: "18 月工作196小时拆解图" },
      { file: "19-S-A-B-C-D层级分布柱状图.excalidraw", name: "19 S/A/B/C/D层级分布柱状图" },
      { file: "20-5维度加权排名构成堆叠图.excalidraw", name: "20 5维度加权排名构成堆叠图" },
      { file: "21-数据源37个分布饼图.excalidraw", name: "21 数据源37个分布饼图" },
      { file: "22-AI可提效vs人工保留对比.excalidraw", name: "22 AI可提效vs人工保留对比" },
      { file: "23-9种触发规则速查表.excalidraw", name: "23 9种触发规则速查表" },
      { file: "24-22模板调用条件热力图.excalidraw", name: "24 22模板调用条件热力图" },
      { file: "25-人力拆分规则速查卡.excalidraw", name: "25 人力拆分规则速查卡" },
      { file: "26-供应商管理方法论全景图.excalidraw", name: "26 供应商管理方法论全景图" },
      { file: "27-Plan模板库使用指南卡片.excalidraw", name: "27 Plan模板库使用指南卡片" },
      { file: "28-196小时工作拆解信息图.excalidraw", name: "28 196小时工作拆解信息图" },
    ];

    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    let loaded = 0;

    // 渲染单个图表到 canvas
    async function renderChart(chart, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">${chart.name}</div>
        <div class="card-body">
          <span class="loading">加载中... (${index + 1}/${charts.length})</span>
        </div>
      `;
      grid.appendChild(card);

      try {
        const response = await fetch(chart.file);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();

        const container = card.querySelector('.card-body');
        container.innerHTML = '';

        // 创建 canvas
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);

        // 使用 Excalidraw 渲染
        if (typeof Excalidraw !== 'undefined' && Excalidraw.renderToCanvas) {
          await Excalidraw.renderToCanvas(
            canvas,
            data.elements || [],
            data.appState || {},
            data.files || {},
            {
              preserveAspectRatio: true,
              viewBackgroundColor: data.appState?.viewBackgroundColor || '#ffffff'
            }
          );
        } else {
          // 降级方案：显示 JSON 摘要
          container.innerHTML = `
            <div style="text-align:center;padding:20px;">
              <p style="color:#64748b;margin-bottom:10px;">Excalidraw 库未加载</p>
              <p style="color:#94a3b8;font-size:12px;">元素数: ${(data.elements || []).length}</p>
              <a href="${chart.file}" target="_blank" style="color:#2563eb;">在 Excalidraw 打开 →</a>
            </div>
          `;
        }

        loaded++;
        status.textContent = `已加载 ${loaded}/${charts.length} 张图表`;

      } catch (err) {
        card.querySelector('.card-body').innerHTML =
          `<span class="error">加载失败: ${err.message}</span>`;
      }
    }

    // 启动渲染
    async function init() {
      // 等待 Excalidraw 库加载
      if (typeof Excalidraw === 'undefined') {
        await new Promise(resolve => {
          const check = () => {
            if (typeof Excalidraw !== 'undefined') resolve();
            else setTimeout(check, 100);
          };
          check();
        });
      }

      status.textContent = 'Excalidraw 已就绪，开始渲染...';

      // 并行渲染所有图表（限制并发数避免卡顿）
      const concurrency = 4;
      for (let i = 0; i < charts.length; i += concurrency) {
        const batch = charts.slice(i, i + concurrency);
        await Promise.all(batch.map((chart, idx) => renderChart(chart, i + idx)));
      }

      status.textContent = `完成：已加载 ${loaded}/${charts.length} 张图表`;
      status.style.color = '#059669';
    }

    init();
  </script>
</body>
</html>
