<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新供应商成长曲线 · Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f4ed;
      --color-ink:     #0b0d0b;
      --color-muted:   #52534e;
      --color-accent:  #f7591f;
      --color-link:    #1a70c7;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Timeline · Diagram Design</p>
    <h1>新供应商成长曲线</h1>

    <svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ===== MAIN TIMELINE AXIS ===== -->
      <line x1="80" y1="200" x2="880" y2="200" stroke="#0b0d0b" stroke-width="1.2"/>
      <polygon points="880,200 868,195 868,205" fill="#0b0d0b"/>
      <text x="900" y="204" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">time</text>

      <!-- ===== MILESTONE 1: M1 准入期 ===== -->
      <line x1="200" y1="192" x2="200" y2="208" stroke="#0b0d0b" stroke-width="1.2"/>
      <circle cx="200" cy="200" r="6" fill="#0b0d0b"/>
      <text x="200" y="228" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">M1</text>
      <text x="200" y="244" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">month 1</text>

      <!-- M1 card above -->
      <rect x="100" y="60" width="200" height="100" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="108" y="68" width="56" height="14" rx="3" fill="rgba(11,13,11,0.06)"/>
      <text x="136" y="76" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">ONBOARDING</text>
      <text x="200" y="104" fill="#0b0d0b" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">目标 0–30%</text>
      <text x="200" y="120" fill="#52534e" font-size="10" font-family="'Geist', sans-serif" text-anchor="middle">熟悉流程、系统培训</text>
      <line x1="116" y1="132" x2="284" y2="132" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
      <text x="200" y="148" fill="#0b0d0b" font-size="11" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">实际 25%</text>
      <rect x="268" y="68" width="56" height="14" rx="3" fill="rgba(11,13,11,0.06)"/>
      <text x="296" y="76" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">ON TRACK</text>
      <line x1="200" y1="160" x2="200" y2="192" stroke="#52534e" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- ===== MILESTONE 2: M3 爬坡期 ===== -->
      <line x1="480" y1="192" x2="480" y2="208" stroke="#0b0d0b" stroke-width="1.2"/>
      <circle cx="480" cy="200" r="6" fill="#f7591f"/>
      <text x="480" y="228" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">M3</text>
      <text x="480" y="244" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">month 3</text>

      <!-- M3 card above (coral = lagging) -->
      <rect x="380" y="60" width="200" height="100" rx="6" fill="#ffffff" stroke="#f7591f" stroke-width="1.2"/>
      <rect x="388" y="68" width="56" height="14" rx="3" fill="rgba(247,89,31,0.10)"/>
      <text x="416" y="76" fill="#f7591f" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">RAMP-UP</text>
      <text x="480" y="104" fill="#0b0d0b" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">目标 30–70%</text>
      <text x="480" y="120" fill="#52534e" font-size="10" font-family="'Geist', sans-serif" text-anchor="middle">独立作业、质量爬坡</text>
      <line x1="396" y1="132" x2="564" y2="132" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
      <text x="480" y="148" fill="#f7591f" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">实际 45%</text>
      <rect x="520" y="68" width="56" height="14" rx="3" fill="rgba(247,89,31,0.12)"/>
      <text x="548" y="76" fill="#f7591f" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">LAGGING</text>
      <line x1="480" y1="160" x2="480" y2="192" stroke="#f7591f" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- ===== MILESTONE 3: M6 达标期 ===== -->
      <line x1="760" y1="192" x2="760" y2="208" stroke="#0b0d0b" stroke-width="1.2"/>
      <circle cx="760" cy="200" r="6" fill="#0b0d0b"/>
      <text x="760" y="228" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">M6</text>
      <text x="760" y="244" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">month 6</text>

      <!-- M6 card above -->
      <rect x="660" y="60" width="200" height="100" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="668" y="68" width="56" height="14" rx="3" fill="rgba(11,13,11,0.06)"/>
      <text x="696" y="76" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">TARGET</text>
      <text x="760" y="104" fill="#0b0d0b" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">目标 ≥80%</text>
      <text x="760" y="120" fill="#52534e" font-size="10" font-family="'Geist', sans-serif" text-anchor="middle">全面达标、稳定产出</text>
      <line x1="676" y1="132" x2="844" y2="132" stroke="rgba(11,13,11,0.08)" stroke-width="0.8"/>
      <text x="760" y="148" fill="#0b0d0b" font-size="11" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">待验证</text>
      <rect x="788" y="68" width="56" height="14" rx="3" fill="rgba(11,13,11,0.06)"/>
      <text x="816" y="76" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">GOAL</text>
      <line x1="760" y1="160" x2="760" y2="192" stroke="#52534e" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- ===== PROGRESS BAR (below timeline) ===== -->
      <rect x="80" y="280" width="800" height="12" rx="6" fill="rgba(11,13,11,0.06)"/>
      <rect x="80" y="280" width="120" height="12" rx="6" fill="rgba(11,13,11,0.15)"/>
      <rect x="200" y="280" width="240" height="12" fill="rgba(247,89,31,0.25)"/>
      <rect x="440" y="280" width="40" height="12" fill="rgba(247,89,31,0.10)" stroke="#f7591f" stroke-width="0.8" stroke-dasharray="2,2"/>
      <rect x="480" y="280" width="280" height="12" rx="0" fill="rgba(11,13,11,0.04)"/>
      <line x1="760" y1="276" x2="760" y2="296" stroke="#0b0d0b" stroke-width="1.2"/>

      <text x="80" y="316" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.10em">0%</text>
      <text x="200" y="316" fill="#0b0d0b" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">25%</text>
      <text x="480" y="316" fill="#f7591f" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">45%</text>
      <text x="880" y="316" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.10em">100%</text>

      <!-- ===== INTERVENTION CALLOUT ===== -->
      <rect x="360" y="340" width="240" height="64" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
      <rect x="368" y="348" width="56" height="14" rx="2" fill="rgba(247,89,31,0.15)"/>
      <text x="396" y="356" fill="#f7591f" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ALERT</text>
      <text x="480" y="380" fill="#0b0d0b" font-size="10" font-weight="500" font-family="'Geist', sans-serif" text-anchor="middle">M3 滞后需干预</text>
      <text x="480" y="392" fill="#52534e" font-size="8" font-family="'Geist', sans-serif" text-anchor="middle">加训 + 资源倾斜 + 周度追踪</text>
      <line x1="480" y1="328" x2="480" y2="340" stroke="#f7591f" stroke-width="1" marker-end="url(#arrow-accent)"/>

      <!-- ===== LEGEND ===== -->
      <line x1="80" y1="432" x2="880" y2="432" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
      <text x="80" y="448" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <circle cx="92" cy="468" r="5" fill="#0b0d0b"/>
      <text x="104" y="472" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">On-track milestone</text>

      <circle cx="268" cy="468" r="5" fill="#f7591f"/>
      <text x="280" y="472" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Lagging milestone</text>

      <rect x="432" y="464" width="24" height="12" rx="2" fill="rgba(247,89,31,0.10)" stroke="#f7591f" stroke-width="0.8" stroke-dasharray="2,2"/>
      <text x="464" y="472" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Gap to target</text>

      <rect x="612" y="464" width="24" height="12" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
      <text x="644" y="472" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Intervention callout</text>

      <!-- ===== EDITORIAL ASIDE ===== -->
      <text x="620" y="504" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">M3 实际 45% 低于爬坡期下限</text>
      <text x="620" y="524" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">(30%)，结合业务节奏判断是否加速。</text>
    </svg>
  </div>
</body>
</html>
