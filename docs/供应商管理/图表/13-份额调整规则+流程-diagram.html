<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>份额调整规则+流程 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f4ed;
      --color-ink:     #0b0d0b;
      --color-muted:   #52534e;
      --color-accent:  #f7591f;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Diagram Design</p>
    <h1>份额调整规则 + 流程</h1>

    <svg viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(11,13,11,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#f7591f"/>
        </marker>
        <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5a8f5a"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ===== SECTION 1: DECISION MATRIX ===== -->
      <text x="40" y="36" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">DECISION MATRIX</text>

      <!-- Matrix container -->
      <rect x="40" y="48" width="880" height="200" rx="8" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>

      <!-- Column headers -->
      <rect x="40" y="48" width="440" height="40" rx="8" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
      <text x="260" y="76" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">产能充足</text>

      <rect x="480" y="48" width="440" height="40" rx="0" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
      <text x="700" y="76" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">产能不足</text>

      <!-- Row headers -->
      <rect x="40" y="88" width="200" height="80" rx="0" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
      <text x="140" y="128" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">表现好</text>
      <text x="140" y="144" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">KPI + ranking</text>

      <rect x="40" y="168" width="200" height="80" rx="0" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.20)" stroke-width="0.8"/>
      <text x="140" y="208" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">表现差</text>
      <text x="140" y="224" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">KPI + ranking</text>

      <!-- Quadrants -->
      <rect x="240" y="88" width="240" height="80" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
      <text x="360" y="120" fill="#f7591f" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">加份额 +3%</text>
      <text x="360" y="136" fill="#52534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">激励优秀</text>

      <rect x="680" y="88" width="240" height="80" rx="6" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="800" y="120" fill="#52534e" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">继续观察</text>
      <text x="800" y="136" fill="#52534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">产能限制潜力</text>

      <rect x="240" y="168" width="240" height="80" rx="6" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="360" y="200" fill="#52534e" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">继续观察</text>
      <text x="360" y="216" fill="#52534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">潜力未释放</text>

      <rect x="680" y="168" width="240" height="80" rx="6" fill="rgba(247,89,31,0.15)" stroke="#f7591f" stroke-width="1.5"/>
      <text x="800" y="200" fill="#f7591f" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">减份额 -2%</text>
      <text x="800" y="216" fill="#52534e" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">降本 + 退出准备</text>

      <!-- Matrix legend -->
      <text x="40" y="268" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">MATRIX LEGEND</text>
      <rect x="40" y="276" width="12" height="12" rx="3" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1.2"/>
      <text x="60" y="284" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Increase share</text>

      <rect x="220" y="276" width="12" height="12" rx="3" fill="rgba(11,13,11,0.04)" stroke="rgba(11,13,11,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="240" y="284" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Hold / monitor</text>

      <!-- ===== SECTION 2: 6-STEP PROCESS FLOW ===== -->
      <text x="40" y="320" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">WORKFLOW (6 STEPS)</text>

      <!-- Step 1 -->
      <rect x="80" y="344" width="140" height="72" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="88" y="352" width="24" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="100" y="360" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 1</text>
      <text x="152" y="384" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">评估表现</text>
      <text x="152" y="400" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">performance review</text>

      <!-- Arrow 1→2 -->
      <line x1="220" y1="380" x2="240" y2="380" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Step 2 -->
      <rect x="248" y="344" width="140" height="72" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="256" y="352" width="24" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="268" y="360" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 2</text>
      <text x="320" y="384" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">决策矩阵</text>
      <text x="320" y="400" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">apply matrix</text>

      <!-- Arrow 2→3 -->
      <line x1="388" y1="380" x2="408" y2="380" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Step 3 (focal) -->
      <rect x="416" y="344" width="140" height="72" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
      <rect x="424" y="352" width="24" height="12" rx="2" fill="rgba(247,89,31,0.15)"/>
      <text x="436" y="360" fill="#f7591f" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 3</text>
      <text x="488" y="384" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">审批</text>
      <text x="488" y="400" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">manager approval</text>

      <!-- Arrow 3→4 -->
      <line x1="556" y1="380" x2="576" y2="380" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Step 4 -->
      <rect x="584" y="344" width="140" height="72" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="592" y="352" width="24" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="604" y="360" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 4</text>
      <text x="656" y="384" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">通知供应商</text>
      <text x="656" y="400" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">notify supplier</text>

      <!-- Arrow 4→5 -->
      <line x1="724" y1="380" x2="744" y2="380" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Step 5 -->
      <rect x="752" y="344" width="140" height="72" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <rect x="760" y="352" width="24" height="12" rx="2" fill="transparent" stroke="rgba(11,13,11,0.40)" stroke-width="0.8"/>
      <text x="772" y="360" fill="#52534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STEP 5</text>
      <text x="824" y="384" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">执行调整</text>
      <text x="824" y="400" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">execute change</text>

      <!-- Arrow 5→End (down) -->
      <line x1="822" y1="416" x2="822" y2="448" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- End state -->
      <rect x="756" y="448" width="136" height="52" rx="26" fill="rgba(11,13,11,0.03)" stroke="rgba(11,13,11,0.30)" stroke-width="1"/>
      <text x="824" y="476" fill="#0b0d0b" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">下月生效</text>
      <text x="824" y="492" fill="#52534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">effective next month</text>

      <!-- ===== LEGEND ===== -->
      <line x1="40" y1="528" x2="920" y2="528" stroke="rgba(11,13,11,0.10)" stroke-width="0.8"/>
      <text x="40" y="544" fill="#52534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="40" y="560" width="24" height="12" rx="6" fill="rgba(247,89,31,0.08)" stroke="#f7591f" stroke-width="1"/>
      <text x="72" y="572" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Focal / incentive</text>

      <rect x="220" y="560" width="24" height="12" rx="6" fill="#ffffff" stroke="#0b0d0b" stroke-width="1"/>
      <text x="252" y="572" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Process step</text>

      <rect x="400" y="560" width="24" height="12" rx="6" fill="rgba(11,13,11,0.03)" stroke="rgba(11,13,11,0.30)" stroke-width="1"/>
      <text x="432" y="572" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">End state</text>

      <line x1="544" y1="568" x2="572" y2="568" stroke="#52534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="580" y="572" fill="#52534e" font-size="8.5" font-family="'Geist', sans-serif">Flow</text>

      <!-- ===== EDITORIAL ASIDE ===== -->
      <text x="620" y="508" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">加分激励，减分止损。</text>
      <text x="620" y="528" fill="#52534e" font-size="13" font-family="'Instrument Serif', serif" font-style="italic">每月评估，逐级调整，不突变。</text>

      <!-- Green arrow marker definition -->
      <defs>
        <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#5a8f5a"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f7591f"/></marker>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#52534e"/></marker>
      </defs>
    </svg>
  </div>
</body>
</html>
