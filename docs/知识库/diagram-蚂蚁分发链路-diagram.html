<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蚂蚁分发链路 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--sans); background: var(--paper); color: var(--ink);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: var(--mono); font-size: 8px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem;
    }
    h1 {
      font-family: var(--serif); font-size: 14px; font-weight: 400;
      letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Distribution Chain</p>
    <h1>蚂蚁分发链路</h1>

    <svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--muted)"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="var(--paper)"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== CENTRAL FLOW (4 nodes) ===== -->

      <!-- Node 1: 蚂蚁智信 (focal) with mask -->
      <rect x="220" y="32" width="240" height="56" rx="8" fill="var(--paper)"/>
      <rect x="220" y="32" width="240" height="56" rx="8" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="1.5"/>
      <rect x="228" y="40" width="28" height="12" rx="2" fill="transparent" stroke="var(--accent)" stroke-width="0.8" opacity="0.50"/>
      <text x="242" y="49" fill="var(--accent)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 1</text>
      <text x="340" y="68" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">蚂蚁智信（统一分发）</text>
      <text x="340" y="84" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">新客授信通过率 ≥ 80%</text>

      <!-- Arrow 1 → 2 -->
      <line x1="340" y1="88" x2="340" y2="116" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 2: 新客优先 · 消金满表 -->
      <rect x="220" y="120" width="240" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="228" y="128" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="242" y="137" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 2</text>
      <text x="340" y="152" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">新客优先 · 消金满表</text>
      <text x="340" y="168" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">消金自营 + 联营 3000亿</text>

      <!-- Arrow 2 → 3 -->
      <line x1="340" y1="176" x2="340" y2="204" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 3: 信托 -->
      <rect x="220" y="208" width="240" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="228" y="216" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="242" y="225" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 3</text>
      <text x="340" y="240" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">信托</text>
      <text x="340" y="256" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">信托出资 3000亿</text>

      <!-- Arrow 3 → 4 -->
      <line x1="340" y1="264" x2="340" y2="292" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 4: 助贷及浮动分润 -->
      <rect x="220" y="296" width="240" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="228" y="304" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="242" y="313" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 4</text>
      <text x="340" y="328" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">助贷及浮动分润</text>
      <text x="340" y="344" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">机构出资 8000亿</text>

      <!-- ===== LEFT PANEL: 融资结构 ===== -->
      <rect x="20" y="60" width="180" height="200" rx="8" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="110" y="84" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">融资结构</text>
      <line x1="36" y1="96" x2="184" y2="96" stroke="var(--rule)" stroke-width="0.8"/>

      <text x="36" y="120" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">信托出资</text>
      <text x="36" y="136" fill="var(--ink)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">3000 亿</text>

      <text x="36" y="164" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">消金自营 + 联营</text>
      <text x="36" y="180" fill="var(--ink)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">3000 亿</text>

      <text x="36" y="208" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">机构出资</text>
      <text x="36" y="224" fill="var(--accent)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">8000 亿</text>

      <line x1="36" y1="240" x2="184" y2="240" stroke="var(--rule)" stroke-width="0.8"/>
      <text x="110" y="258" fill="var(--ink)" font-size="11" font-weight="600" font-family="'Geist', sans-serif">合计 ≈ 1.4 万亿</text>

      <!-- Arrow to Node 2 -->
      <line x1="200" y1="178" x2="218" y2="178" stroke="var(--muted)" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ===== RIGHT PANEL: 对客定价 & 分润 ===== -->
      <rect x="480" y="60" width="180" height="200" rx="8" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="570" y="84" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">对客定价 · 分润</text>
      <line x1="492" y1="96" x2="648" y2="96" stroke="var(--rule)" stroke-width="0.8"/>

      <text x="492" y="120" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">借呗 1 期：定价 20% / 分润 29.5%</text>
      <text x="492" y="140" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">借呗 3 期：定价 12% / 分润 29.5%</text>
      <text x="492" y="160" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">消金联贷：定价 14% / 分润 29.5%</text>
      <text x="492" y="180" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">借呗 Pro：定价 6% / 分润 15%</text>
      <text x="492" y="200" fill="var(--accent)" font-size="9" font-family="'Geist Mono', monospace">花呗：靠档分润 18% ~ 22%</text>

      <!-- Arrow to Node 2 -->
      <line x1="452" y1="178" x2="478" y2="178" stroke="var(--muted)" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="512" x2="660" y2="512" stroke="var(--rule)" stroke-width="0.8"/>
      <text x="20" y="528" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="536" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="1"/>
      <text x="40" y="544" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Focal node</text>

      <rect x="140" y="536" width="14" height="10" rx="2" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <text x="160" y="544" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Standard node</text>

      <rect x="280" y="536" width="14" height="10" rx="2" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="300" y="544" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Info panel</text>

      <!-- Editorial aside -->
      <text x="500" y="492" fill="var(--ink)" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">4 节点链路 · 融资 1.4 万亿</text>
    </svg>
  </div>
</body>
</html>
