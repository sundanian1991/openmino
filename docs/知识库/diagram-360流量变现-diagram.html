<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360流量变现体系 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--sans); background: var(--paper); color: var(--ink);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: var(--mono); font-size: 8px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem;
    }
    h1 {
      font-family: var(--serif); font-size: 14px; font-weight: 400;
      letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Traffic Monetization</p>
    <h1>360流量变现体系</h1>

    <svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--muted)"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="var(--paper)"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== TITLE: 左分支 ===== -->
      <text x="170" y="28" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">智信流量变现</text>

      <!-- ===== LEFT BRANCH: 360智信流量入口 ===== -->

      <!-- Left entry node -->
      <rect x="40" y="36" width="260" height="48" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="48" y="44" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="62" y="53" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">L1</text>
      <text x="170" y="64" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">360 智信流量入口</text>
      <text x="170" y="80" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">智信余额 390 亿</text>

      <!-- Split arrows -->
      <line x1="120" y1="84" x2="80" y2="116" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="220" y1="84" x2="260" y2="116" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Left child: H5 + 半流程 -->
      <rect x="10" y="120" width="140" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="18" y="128" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="32" y="137" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">L2-A</text>
      <text x="80" y="152" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">H5 + 半流程</text>
      <text x="80" y="168" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">H5(60%) + 半流程(40%)</text>

      <!-- Right child: API 分发 -->
      <rect x="190" y="120" width="140" height="56" rx="8" fill="var(--paper)"/>
      <rect x="190" y="120" width="140" height="56" rx="8" fill="rgba(181,82,58,0.08)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="198" y="128" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="212" y="137" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">L2-B</text>
      <text x="260" y="152" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">API 分发</text>
      <text x="260" y="168" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">日均放款 2000 万</text>

      <!-- H5 → 日均收入 -->
      <line x1="80" y1="176" x2="80" y2="208" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>
      <rect x="10" y="212" width="140" height="48" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="18" y="220" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="32" y="229" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">L3-A</text>
      <text x="80" y="240" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">日均收入</text>
      <text x="80" y="256" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">10 万元 / 日</text>

      <!-- API → 金条日均交易 -->
      <line x1="260" y1="176" x2="260" y2="208" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>
      <rect x="190" y="212" width="140" height="48" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="198" y="220" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="212" y="229" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">L3-B</text>
      <text x="260" y="240" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">金条日均交易</text>
      <text x="260" y="256" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">500 万元 / 日</text>

      <!-- Left branch highlight (with mask) -->
      <rect x="10" y="280" width="320" height="36" rx="8" fill="var(--paper)"/>
      <rect x="10" y="280" width="320" height="36" rx="8" fill="rgba(181,82,58,0.06)" stroke="var(--accent)" stroke-width="1"/>
      <text x="170" y="302" fill="var(--ink)" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">360 智信变现体系大盘排名第一</text>

      <!-- ===== TITLE: 右分支 ===== -->
      <text x="510" y="28" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">24+ 资产压降与转型</text>

      <!-- ===== RIGHT BRANCH: 24+ 资产入口 ===== -->
      <rect x="408" y="36" width="260" height="48" rx="8" fill="var(--paper)"/>
      <rect x="416" y="44" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8" opacity="0.50"/>
      <text x="430" y="53" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">R1</text>
      <text x="540" y="64" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">24+ 资产（9 号文后保留）</text>
      <text x="540" y="80" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">日均放款 2000 万 · 余额约 30 亿</text>

      <!-- R1 → 暂停 -->
      <line x1="540" y1="84" x2="540" y2="112" stroke="var(--accent)" stroke-width="2" marker-end="url(#arrow)"/>

      <!-- 暂停节点 (focal) with mask -->
      <rect x="408" y="122" width="260" height="48" rx="8" fill="var(--paper)"/>
      <rect x="408" y="122" width="260" height="48" rx="8" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="2"/>
      <rect x="416" y="130" width="28" height="12" rx="2" fill="transparent" stroke="var(--accent)" stroke-width="0.8" opacity="0.50"/>
      <text x="430" y="139" fill="var(--accent)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">R2</text>
      <text x="540" y="152" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">2026.05.10 彻底暂停</text>
      <text x="540" y="168" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">9 号文合规要求</text>

      <!-- 暂停 → 转型 -->
      <line x1="540" y1="170" x2="540" y2="196" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- 转型：转半流程 H5 -->
      <rect x="408" y="208" width="260" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="416" y="216" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="430" y="225" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">R3</text>
      <text x="540" y="240" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">转半流程 H5（按进件结算）</text>
      <text x="540" y="256" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">6 元 / 进件</text>

      <!-- Right branch highlight (panel, non-focal) -->
      <rect x="408" y="280" width="260" height="36" rx="8" fill="var(--paper)"/>
      <rect x="408" y="280" width="260" height="36" rx="8" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="540" y="302" fill="var(--ink)" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">360 借条余额 1150 亿 · ABS 月新增 80 亿</text>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="380" x2="660" y2="380" stroke="var(--rule)" stroke-width="0.8"/>
      <text x="20" y="396" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="404" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="1"/>
      <text x="40" y="412" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Focal node</text>

      <rect x="120" y="404" width="14" height="10" rx="2" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <text x="140" y="412" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Standard node</text>

      <rect x="240" y="404" width="14" height="10" rx="2" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="260" y="412" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Highlight box</text>

      <!-- Editorial aside -->
      <text x="520" y="324" fill="var(--ink)" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">双分支：智信变现 · 24+压降转型</text>
    </svg>
  </div>
</body>
</html>
