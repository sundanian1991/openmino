// ============================================================
// 数值提取：用于条件格式热力
// ============================================================
function extractNum(val) {
  if (typeof val !== 'string') return null;
  const m = val.match(/(\d+\.?\d*)/);
  return m ? parseFloat(m[1]) : null;
}

// ============================================================
// S2 Options — 条件格式 + 交互
// ============================================================
const s2Options = {
  width: 1400,
  height: 720,
  hierarchyType: 'grid',
  cornerExtraFieldText: '指标值',

  // 条件格式：数值热力着色
  conditions: {
    background: [
      {
        field: 'value',
        mapping(fieldValue) {
          const num = extractNum(fieldValue);
          if (num === null || num === 0) return null;

          // 分段颜色：小值冷色，大值暖色
          let ratio;
          if (num <= 100) {
            // 百分比类（0-100）：映射到 0-1
            ratio = num / 100;
          } else if (num <= 5000) {
            // 中等规模
            ratio = num / 5000;
          } else {
            // 大规模
            ratio = Math.min(num / 13700, 1);
          }

          // 蓝色渐变：浅蓝 → 深蓝
          const r = Math.round(220 - ratio * 190);
          const g = Math.round(235 - ratio * 155);
          const b = Math.round(255 - ratio * 55);
          return {
            fill: `rgb(${r},${g},${b})`,
            intelligentReverseTextColor: true,
          };
        },
      },
    ],
    text: [
      {
        field: 'value',
        mapping(fieldValue) {
          const num = extractNum(fieldValue);
          if (num === null) return null;
          // 大额数值加粗
          if (num >= 1000) {
            return { fontWeight: 'bold' };
          }
          return null;
        },
      },
    ],
  },

  interaction: {
    copy: { enable: true, withFormat: true, withHeader: true },
    hoverHighlight: true,
    multiSelection: true,
    resize: { enable: true },
  },

  frozen: {
    rowHeader: true,
  },

  style: {
    colCell: {
      height: 36,
    },
    dataCell: {
      height: 32,
    },
  },
};

  await s2.render();
}
