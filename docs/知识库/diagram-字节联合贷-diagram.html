<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字节联合贷创新模式 · Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2; --paper-2: #f2ede4; --ink: #1c1917;
      --muted: #57534e; --soft: #78716c; --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.08); --link: #2563eb;
      --rule: rgba(28,25,23,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--sans); background: var(--paper); color: var(--ink);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem;
    }
    .frame { max-width: 720px; width: 100%; }
    .eyebrow {
      font-family: var(--mono); font-size: 8px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.375rem;
    }
    h1 {
      font-family: var(--serif); font-size: 14px; font-weight: 400;
      letter-spacing: -0.02em; line-height: 1.15; color: var(--ink); margin-bottom: 1.5rem;
    }
    svg { width: 100%; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Joint Loan Innovation</p>
    <h1>字节联合贷创新模式</h1>

    <svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="var(--muted)"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="var(--paper)"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ===== CENTRAL FLOW (5 nodes) ===== -->

      <!-- Node 1: 字节流量入口 (focal) -->
      <rect x="220" y="32" width="240" height="56" rx="8" fill="var(--paper)"/>
      <rect x="220" y="32" width="240" height="56" rx="8" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="1.5"/>
      <rect x="228" y="40" width="28" height="12" rx="2" fill="transparent" stroke="var(--accent)" stroke-width="0.8" opacity="0.50"/>
      <text x="242" y="49" fill="var(--accent)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 1</text>
      <text x="340" y="68" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">字节跳动流量入口</text>
      <text x="340" y="84" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">豆包 / 番茄 / 红果 / 汽水</text>

      <!-- Arrow 1 → 2 -->
      <line x1="340" y1="88" x2="340" y2="116" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 2: 牵头消金公司 -->
      <rect x="220" y="120" width="240" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="228" y="128" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="242" y="137" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 2</text>
      <text x="340" y="148" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">牵头消金公司</text>
      <text x="340" y="164" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">中融小贷增资至 190 亿</text>

      <!-- Arrow 2 → 3 -->
      <line x1="340" y1="168" x2="340" y2="196" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 3: 引入联合贷机构 (≤4家) -->
      <rect x="220" y="200" width="240" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="228" y="208" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="242" y="217" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 3</text>
      <text x="340" y="232" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">引入联合贷机构（≤4 家）</text>
      <text x="340" y="248" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">杭银 / 招联 / 中邮 / 中原 &gt; 100 亿</text>

      <!-- Arrow 3 → 4 -->
      <line x1="340" y1="256" x2="340" y2="284" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 4: 牵头行主风控 (focal) -->
      <rect x="220" y="288" width="240" height="56" rx="8" fill="var(--paper)"/>
      <rect x="220" y="288" width="240" height="56" rx="8" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="1.5"/>
      <rect x="228" y="296" width="28" height="12" rx="2" fill="transparent" stroke="var(--accent)" stroke-width="0.8" opacity="0.50"/>
      <text x="242" y="305" fill="var(--accent)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 4</text>
      <text x="340" y="320" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">牵头行主风控</text>
      <text x="340" y="336" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">确定各家头寸 · 路由优先级</text>

      <!-- Arrow 4 → 5 -->
      <line x1="340" y1="344" x2="340" y2="372" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Node 5: 字节统一路由分发 -->
      <rect x="220" y="376" width="240" height="56" rx="8" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <rect x="228" y="384" width="28" height="12" rx="2" fill="transparent" stroke="var(--muted)" stroke-width="0.8"/>
      <text x="242" y="393" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NODE 5</text>
      <text x="340" y="408" fill="var(--ink)" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">字节统一路由分发</text>
      <text x="340" y="424" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">按优先级分配到各机构</text>

      <!-- ===== LEFT PANEL: 放心借规模 ===== -->
      <rect x="20" y="40" width="180" height="200" rx="8" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="110" y="64" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">放心借规模（助贷 4800 亿）</text>
      <line x1="36" y1="76" x2="184" y2="76" stroke="var(--rule)" stroke-width="0.8"/>

      <text x="36" y="100" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">放心借</text>
      <text x="36" y="116" fill="var(--ink)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">4800 亿</text>

      <text x="36" y="144" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">星选</text>
      <text x="36" y="160" fill="var(--ink)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">1400 亿</text>

      <text x="36" y="188" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">小微业务</text>
      <text x="36" y="204" fill="var(--ink)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">1600 亿</text>

      <text x="36" y="232" fill="var(--muted)" font-size="10" font-family="'Geist', sans-serif">月付</text>
      <text x="36" y="248" fill="var(--ink)" font-size="14" font-weight="600" font-family="'Geist Mono', monospace">1200 亿</text>

      <line x1="36" y1="260" x2="184" y2="260" stroke="var(--rule)" stroke-width="0.8"/>
      <text x="110" y="278" fill="var(--ink)" font-size="11" font-weight="600" font-family="'Geist', sans-serif">合计 9000 亿</text>

      <!-- Arrow to Node 2 -->
      <line x1="200" y1="140" x2="218" y2="140" stroke="var(--muted)" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ===== RIGHT PANEL: 定价 & 分润 ===== -->
      <rect x="480" y="40" width="180" height="200" rx="8" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="570" y="64" fill="var(--ink)" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">定价 · 分润</text>
      <line x1="492" y1="76" x2="648" y2="76" stroke="var(--rule)" stroke-width="0.8"/>

      <text x="492" y="100" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">放心借：定价 14-15% / 分润 32.5%</text>
      <text x="492" y="120" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">联合贷：分润 31.5%</text>
      <text x="492" y="140" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">固收：3.2% ~ 3.5%</text>
      <text x="492" y="160" fill="var(--muted)" font-size="9" font-family="'Geist Mono', monospace">大盘风险目标 5.5%</text>

      <!-- Arrow to Node 2 -->
      <line x1="452" y1="140" x2="478" y2="140" stroke="var(--muted)" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ===== LEGEND STRIP ===== -->
      <line x1="20" y1="512" x2="660" y2="512" stroke="var(--rule)" stroke-width="0.8"/>
      <text x="20" y="528" fill="var(--muted)" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <rect x="20" y="536" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="var(--accent)" stroke-width="1"/>
      <text x="40" y="544" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Focal node</text>

      <rect x="140" y="536" width="14" height="10" rx="2" fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
      <text x="160" y="544" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Standard node</text>

      <rect x="280" y="536" width="14" height="10" rx="2" fill="var(--paper-2)" stroke="var(--rule)" stroke-width="1"/>
      <text x="300" y="544" fill="var(--muted)" font-size="9" font-family="'Geist', sans-serif">Info panel</text>

      <!-- Editorial aside -->
      <text x="520" y="492" fill="var(--ink)" font-size="14" font-family="'Instrument Serif', serif" font-style="italic">4 节点链路 · 融资 1.4 万亿</text>
    </svg>
  </div>
</body>
</html>
