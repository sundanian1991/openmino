<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- 李诞虾风格 — 杯子 -->
  <!-- 主体：陶土色（陶瓷杯） -->
  <!-- 高光：米白（杯子边缘反光） -->
  <!-- 阴影：深陶土（杯底、把手内侧） -->
  <!-- 描边：墨黑统一 -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 杯身主体（陶土色） -->
    <path d="m85 60c5-2 15-1 20 0 25 5 35 15 40 30 45 50 48 65 50 80 48 95 45 105 40 115 35 120 30 125 25 125 15 125 5 120 0 115 0 105 0 95 5 85 20 75 35 65 50 60 60 55 70 52 80 50 90 52 100 55 105 60 110 70 108 85 105 95 100 105 95" fill="#D6654B"/>

    <!-- 把手（陶土色） -->
    <path d="m125 65c15-5 30-3 40 0 10 8 15 20 15 35 5 50-5 55-15 5-25 10-35 5-40 5-10-10-15-20-15-35-5-50 5-55 15-5 25-10 35-5 40 5 10 10 15 20 15 35" fill="#D6654B"/>

    <!-- 杯底阴影（深陶土） -->
    <ellipse cx="105" cy="125" rx="35" ry="8" fill="#B03A21" stroke="none"/>

    <!-- 把手内侧阴影（深陶土） -->
    <path d="m130 75c10-3 20-2 25 0 5 5 8 10 8 18" fill="#B03A21" stroke="none"/>

    <!-- 高光（米白） -->
    <path d="m90 70c8 2 15 3 20 2" fill="#FEFFFE" stroke="none"/>
    <path d="m88 95c10 3 20 4 25 3" fill="#FEFFFE" stroke="none"/>
    <path d="m85 120c12 4 25 5 30 4" fill="#FEFFFE" stroke="none"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#1A1612" stroke-linecap="round" stroke-linejoin="round">
    <!-- 杯口轮廓（4.0px） -->
    <ellipse cx="105" cy="62" rx="25" ry="6" stroke-width="4.0"/>

    <!-- 杯身左侧（4.0px） -->
    <path d="m82 65c0 25 3 50 8 75" stroke-width="4.0"/>

    <!-- 杯身右侧（4.0px） -->
    <path d="m128 65c0 25-3 50-8 75" stroke-width="4.0"/>

    <!-- 杯底（4.5px） -->
    <path d="m70 140c5-5 20-8 35-8 30 0 65 3 70 8" stroke-width="4.5"/>

    <!-- 把手外轮廓（3.8px） -->
    <path d="m128 68c15-5 30-3 42 0 12 8 18 22 18 38" stroke-width="3.8"/>

    <!-- 把手内轮廓（3.5px） -->
    <path d="m132 72c10-3 18-2 22 0 4 4 6 10 6 18" stroke-width="3.5"/>

    <!-- 杯口内侧（3.0px） -->
    <ellipse cx="105" cy="62" rx="18" ry="4" stroke-width="3.0"/>

    <!-- 杯身纹理线（2.0px，左侧3条） -->
    <path d="m80 85c2 15 4 30 6 45" stroke-width="2.0"/>
    <path d="m78 105c1.5 15 3 25 4 30" stroke-width="2.0"/>
    <path d="m77 120c1 12 2 20 3 25" stroke-width="2.0"/>

    <!-- 杯身纹理线（2.0px，右侧3条） -->
    <path d="m130 85c-2 15-4 30-6 45" stroke-width="2.0"/>
    <path d="m132 105c-1.5 15-3 25-4 30" stroke-width="2.0"/>
    <path d="m133 120c-1 12-2 20-3 25" stroke-width="2.0"/>
  </g>
</svg>
