<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Genealogy tree: family tree with 3 generations -->
  <!-- Generation 1 (top) -->
  <rect x="85" y="20" width="30" height="20" rx="3" fill="#c98a6a"/>
  <!-- Generation 2 -->
  <line x1="100" y1="40" x2="55" y2="65" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="100" y1="40" x2="145" y2="65" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="40" y="65" width="30" height="20" rx="3" fill="#c98a6a" opacity="0.6"/>
  <rect x="130" y="65" width="30" height="20" rx="3" fill="#c98a6a" opacity="0.6"/>
  <!-- Generation 3 -->
  <line x1="55" y1="85" x2="30" y2="110" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="55" y1="85" x2="70" y2="110" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="145" y1="85" x2="120" y2="110" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="145" y1="85" x2="160" y2="110" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="15" y="110" width="30" height="20" rx="3" fill="#c98a6a" opacity="0.35"/>
  <rect x="55" y="110" width="30" height="20" rx="3" fill="#c98a6a" opacity="0.35"/>
  <rect x="105" y="110" width="30" height="20" rx="3" fill="#c98a6a" opacity="0.35"/>
  <rect x="145" y="110" width="30" height="20" rx="3" fill="#c98a6a" opacity="0.35"/>
  <!-- Generation 4 -->
  <line x1="30" y1="130" x2="25" y2="155" stroke="#c98a6a" stroke-width="1"/>
  <line x1="30" y1="130" x2="40" y2="155" stroke="#c98a6a" stroke-width="1"/>
  <line x1="70" y1="130" x2="60" y2="155" stroke="#c98a6a" stroke-width="1"/>
  <line x1="70" y1="130" x2="80" y2="155" stroke="#c98a6a" stroke-width="1"/>
  <circle cx="25" cy="160" r="4" fill="#c98a6a" opacity="0.25"/>
  <circle cx="40" cy="160" r="4" fill="#c98a6a" opacity="0.25"/>
  <circle cx="60" cy="160" r="4" fill="#c98a6a" opacity="0.25"/>
  <circle cx="80" cy="160" r="4" fill="#c98a6a" opacity="0.25"/>
</svg>
