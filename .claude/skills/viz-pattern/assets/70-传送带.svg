<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Conveyor belt: rollers with boxes moving -->
  <!-- Belt surface -->
  <rect x="30" y="90" width="140" height="6" rx="3" fill="#c98a6a" opacity="0.5"/>
  <!-- Rollers -->
  <circle cx="45" cy="105" r="8" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="70" cy="105" r="8" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="95" cy="105" r="8" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="120" cy="105" r="8" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="145" cy="105" r="8" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <circle cx="170" cy="105" r="8" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Boxes on belt -->
  <rect x="40" y="72" width="18" height="18" rx="2" fill="#c98a6a"/>
  <rect x="70" y="72" width="18" height="18" rx="2" fill="#c98a6a" opacity="0.7"/>
  <rect x="130" y="72" width="18" height="18" rx="2" fill="#c98a6a" opacity="0.4"/>
  <!-- Direction arrow -->
  <line x1="100" y1="75" x2="120" y2="75" stroke="#c98a6a" stroke-width="1.5"/>
  <polygon points="120,72 128,75 120,78" fill="#c98a6a"/>
</svg>
