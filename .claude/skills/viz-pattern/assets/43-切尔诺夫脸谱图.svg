<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Chernoff faces: 4 faces with different expressions -->
  <!-- Face 1: happy -->
  <circle cx="55" cy="60" r="20" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="48" cy="56" r="2" fill="#c98a6a"/>
  <circle cx="62" cy="56" r="2" fill="#c98a6a"/>
  <path d="M47,66 Q55,74 63,66" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Face 2: neutral -->
  <circle cx="145" cy="60" r="20" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="138" cy="56" r="2" fill="#c98a6a"/>
  <circle cx="152" cy="56" r="2" fill="#c98a6a"/>
  <line x1="140" y1="68" x2="150" y2="68" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Face 3: concerned -->
  <circle cx="55" cy="140" r="20" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="48" cy="136" r="2" fill="#c98a6a"/>
  <circle cx="62" cy="136" r="2" fill="#c98a6a"/>
  <path d="M48,146 Q55,142 62,146" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Face 4: worried -->
  <circle cx="145" cy="140" r="20" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="138" cy="136" r="2" fill="#c98a6a"/>
  <circle cx="152" cy="136" r="2" fill="#c98a6a"/>
  <path d="M47,148 Q55,152 63,148" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <path d="M140,148 Q145,144 150,148" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
</svg>
