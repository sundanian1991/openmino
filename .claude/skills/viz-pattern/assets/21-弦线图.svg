<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Chord diagram: circle with curved ribbons between nodes -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#f0e0d4" stroke-width="1"/>
  <!-- Node segments on circle -->
  <path d="M100,35 A65,65 0 0,1 155,55" fill="none" stroke="#c98a6a" stroke-width="5"/>
  <path d="M155,55 A65,65 0 0,1 165,120" fill="none" stroke="#c98a6a" stroke-width="5" opacity="0.7"/>
  <path d="M165,120 A65,65 0 0,1 100,165" fill="none" stroke="#c98a6a" stroke-width="5" opacity="0.5"/>
  <path d="M100,165 A65,65 0 0,1 45,145" fill="none" stroke="#c98a6a" stroke-width="5" opacity="0.8"/>
  <path d="M45,145 A65,65 0 0,1 35,80" fill="none" stroke="#c98a6a" stroke-width="5" opacity="0.6"/>
  <path d="M35,80 A65,65 0 0,1 100,35" fill="none" stroke="#c98a6a" stroke-width="5" opacity="0.4"/>
  <!-- Inner chords -->
  <path d="M100,40 Q70,70 35,80" fill="#c98a6a" opacity="0.15"/>
  <path d="M155,58 Q130,80 165,118" fill="#c98a6a" opacity="0.15"/>
  <path d="M45,140 Q60,120 100,160" fill="#c98a6a" opacity="0.15"/>
</svg>
