<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Circulatory system: network of connected circles -->
  <!-- Central heart -->
  <circle cx="100" cy="100" r="15" fill="#c98a6a" opacity="0.8"/>
  <!-- Arteries (outgoing) -->
  <line x1="85" y1="100" x2="40" y2="70" stroke="#c98a6a" stroke-width="3"/>
  <line x1="115" y1="100" x2="160" y2="70" stroke="#c98a6a" stroke-width="3"/>
  <line x1="100" y1="115" x2="100" y2="160" stroke="#c98a6a" stroke-width="3"/>
  <line x1="100" y1="85" x2="100" y2="40" stroke="#c98a6a" stroke-width="3"/>
  <!-- Veins (returning) -->
  <line x1="40" y1="130" x2="85" y2="105" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="130" x2="115" y2="105" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="160" x2="100" y2="160" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="160" x2="100" y2="160" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <!-- Organ nodes -->
  <circle cx="40" cy="70" r="8" fill="#c98a6a" opacity="0.3"/>
  <circle cx="160" cy="70" r="8" fill="#c98a6a" opacity="0.3"/>
  <circle cx="100" cy="40" r="8" fill="#c98a6a" opacity="0.3"/>
  <circle cx="40" cy="130" r="8" fill="#c98a6a" opacity="0.2"/>
  <circle cx="160" cy="130" r="8" fill="#c98a6a" opacity="0.2"/>
</svg>
