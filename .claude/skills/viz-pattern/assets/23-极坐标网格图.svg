<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Polar grid: concentric circles with radial lines -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#f0e0d4" stroke-width="1"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#e0c9b0" stroke-width="1"/>
  <circle cx="100" cy="100" r="25" fill="none" stroke="#e0c9b0" stroke-width="1"/>
  <!-- Radial lines (8 directions) -->
  <line x1="100" y1="35" x2="100" y2="165" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="35" y1="100" x2="165" y2="100" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="54" y1="54" x2="146" y2="146" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="146" y1="54" x2="54" y2="146" stroke="#e0c9b0" stroke-width="0.5"/>
  <!-- Highlighted sector -->
  <path d="M100,100 L100,35 A65,65 0 0,1 146,54 Z" fill="#c98a6a" opacity="0.2"/>
</svg>
