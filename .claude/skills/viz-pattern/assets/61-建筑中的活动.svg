<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Life of a building: cross-section with rooms -->
  <!-- Building outline -->
  <rect x="40" y="30" width="120" height="140" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <!-- Floors -->
  <line x1="40" y1="77" x2="160" y2="77" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="40" y1="124" x2="160" y2="124" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Room 1: living room -->
  <circle cx="75" cy="55" r="5" fill="#c98a6a" opacity="0.4"/>
  <rect x="105" y="45" width="20" height="15" rx="2" fill="#c98a6a" opacity="0.3"/>
  <!-- Room 2: office -->
  <rect x="55" y="90" width="18" height="14" rx="2" fill="#c98a6a" opacity="0.5"/>
  <circle cx="120" cy="97" r="6" fill="#c98a6a" opacity="0.35"/>
  <!-- Room 3: meeting -->
  <rect x="60" y="135" width="30" height="20" rx="2" fill="#c98a6a" opacity="0.4"/>
  <circle cx="130" cy="145" r="5" fill="#c98a6a" opacity="0.3"/>
  <!-- Door -->
  <rect x="90" y="155" width="20" height="15" rx="2" fill="#c98a6a" opacity="0.6"/>
</svg>
