<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Universe: sun with orbiting rings -->
  <circle cx="100" cy="100" r="12" fill="#c98a6a"/>
  <!-- Orbit rings -->
  <ellipse cx="100" cy="100" rx="40" ry="15" fill="none" stroke="#c98a6a" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="100" rx="60" ry="22" fill="none" stroke="#c98a6a" stroke-width="1" opacity="0.4"/>
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="#c98a6a" stroke-width="0.8" opacity="0.25"/>
  <!-- Orbiting planets -->
  <circle cx="140" cy="100" r="4" fill="#c98a6a" opacity="0.8"/>
  <circle cx="55" cy="90" r="3" fill="#c98a6a" opacity="0.6"/>
  <circle cx="160" cy="120" r="3" fill="#c98a6a" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="45" cy="45" r="1.5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="155" cy="50" r="1.5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="40" cy="155" r="1.5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="160" cy="155" r="1.5" fill="#c98a6a" opacity="0.3"/>
</svg>
