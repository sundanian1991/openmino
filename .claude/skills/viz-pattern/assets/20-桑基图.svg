<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Sankey chart: flow from left to right with varying width -->
  <!-- Left nodes -->
  <rect x="30" y="40" width="25" height="40" rx="3" fill="#c98a6a"/>
  <rect x="30" y="100" width="25" height="60" rx="3" fill="#c98a6a" opacity="0.7"/>
  <!-- Right nodes -->
  <rect x="145" y="35" width="25" height="30" rx="3" fill="#c98a6a" opacity="0.6"/>
  <rect x="145" y="80" width="25" height="50" rx="3" fill="#c98a6a" opacity="0.5"/>
  <rect x="145" y="145" width="25" height="20" rx="3" fill="#c98a6a" opacity="0.4"/>
  <!-- Flow paths -->
  <path d="M55,60 Q100,50 145,50" fill="none" stroke="#c98a6a" stroke-width="18" opacity="0.3"/>
  <path d="M55,80 Q100,110 145,105" fill="none" stroke="#c98a6a" stroke-width="22" opacity="0.3"/>
  <path d="M55,120 Q100,140 145,155" fill="none" stroke="#c98a6a" stroke-width="14" opacity="0.3"/>
</svg>
