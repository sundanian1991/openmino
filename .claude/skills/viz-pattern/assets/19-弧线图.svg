<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Arc diagram: nodes on a line with curved connections -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="#d4c4b0" stroke-width="2"/>
  <circle cx="45" cy="100" r="5" fill="#c98a6a"/>
  <circle cx="70" cy="100" r="5" fill="#c98a6a"/>
  <circle cx="95" cy="100" r="5" fill="#c98a6a"/>
  <circle cx="120" cy="100" r="5" fill="#c98a6a"/>
  <circle cx="145" cy="100" r="5" fill="#c98a6a"/>
  <!-- Arcs -->
  <path d="M45,100 Q57,55 70,100" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <path d="M70,100 Q82,45 95,100" fill="none" stroke="#c98a6a" stroke-width="2" opacity="0.6"/>
  <path d="M95,100 Q107,55 120,100" fill="none" stroke="#c98a6a" stroke-width="2" opacity="0.4"/>
  <path d="M120,100 Q132,55 145,100" fill="none" stroke="#c98a6a" stroke-width="2" opacity="0.7"/>
  <path d="M45,100 Q85,25 120,100" fill="none" stroke="#c98a6a" stroke-width="1.5" opacity="0.3"/>
</svg>
