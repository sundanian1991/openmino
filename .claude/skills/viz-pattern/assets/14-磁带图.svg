<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Tape diagram: horizontal bar segments -->
  <rect x="30" y="80" width="140" height="30" rx="4" fill="#f0e0d4"/>
  <rect x="30" y="80" width="45" height="30" rx="4" fill="#c98a6a"/>
  <line x1="75" y1="80" x2="75" y2="110" stroke="#c98a6a" stroke-width="0.5"/>
  <line x1="110" y1="80" x2="110" y2="110" stroke="#c98a6a" stroke-width="0.5"/>
  <line x1="140" y1="80" x2="140" y2="110" stroke="#c98a6a" stroke-width="0.5"/>
  <!-- Second tape below -->
  <rect x="30" y="120" width="140" height="30" rx="4" fill="#f0e0d4"/>
  <rect x="30" y="120" width="70" height="30" rx="4" fill="#c98a6a"/>
  <line x1="100" y1="120" x2="100" y2="150" stroke="#c98a6a" stroke-width="0.5"/>
  <line x1="130" y1="120" x2="130" y2="150" stroke="#c98a6a" stroke-width="0.5"/>
</svg>
