<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空间分布 — 金条业务全国职场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@700&family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F5F5;--card:#FFFFFF;--border:#E8E8E8;--border-v:#CCCCCC;
  --tx1:#1A1A1A;--tx2:#666666;--tx3:#999999;
  --accent:#D71921;--success:#4A9E5C;--warning:#D4A843;
}
body{background:var(--bg);color:var(--tx1);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:400;min-height:100vh;padding:48px 64px}
.page{max-width:1080px;margin:0 auto}

/* HEADER */
.header{display:flex;align-items:baseline;gap:16px;margin-bottom:64px;border-bottom:1px solid var(--border);padding-bottom:32px}
.hero-num{font-family:'Doto','Space Mono',monospace;font-size:64px;font-weight:700;line-height:1;color:var(--tx1);letter-spacing:-0.03em}
.hero-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx3)}
.hero-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--tx1);margin-left:auto}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 280px;gap:48px;align-items:start}

/* MAP */
.map-wrap{position:relative}
.map-wrap svg{width:100%;height:auto}

/* CITY MARKERS */
.city-group{cursor:default}
.city-ring{fill:transparent;stroke:var(--tx1);stroke-width:1.5;opacity:0.2}
.city-core{fill:var(--tx1)}
.city-label{font-family:'Space Mono',monospace;font-size:10px;fill:var(--tx2);letter-spacing:0.04em}
.city-val{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;fill:var(--tx1)}
.city-pct{font-family:'Space Mono',monospace;font-size:9px;fill:var(--tx3)}

/* Connecting lines */
.connect-line{stroke:var(--border);stroke-width:1;stroke-dasharray:3 3;fill:none}

/* Hefei highlight */
.city-hefei .city-core{fill:var(--tx1)}
.city-hefei .city-ring{stroke:var(--tx1);opacity:0.3;stroke-width:2}
.city-hefei .city-val{fill:var(--tx1)}

/* SIDEBAR */
.sidebar{}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-idx{font-family:'Space Mono',monospace;font-size:11px;color:var(--tx3);width:18px;text-align:right;letter-spacing:0.04em}
.rank-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--tx1);width:40px}
.rank-bar-wrap{flex:1;height:8px;background:var(--border);position:relative}
.rank-bar{height:100%;transition:width 0.3s ease-out}
.rank-bar.met{background:var(--success)}
.rank-bar.mid{background:var(--tx1)}
.rank-bar.weak{background:var(--warning)}
.rank-rate{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;width:52px;text-align:right}
.rank-rate.met{color:var(--success)}
.rank-rate.mid{color:var(--tx1)}
.rank-rate.weak{color:var(--warning)}

.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-top:24px}
.stat-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.stat-value{font-family:'Doto','Space Mono',monospace;font-size:28px;font-weight:700;color:var(--tx1);line-height:1}
.stat-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--tx2);margin-top:4px;letter-spacing:0.04em}

/* FOOTER */
.footer{margin-top:48px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
.footer-text{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--tx3)}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <span class="hero-num">8</span>
    <div>
      <div class="hero-label">Active Workplaces</div>
    </div>
    <span class="hero-title">金条业务全国职场分布</span>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- MAP -->
    <div class="map-wrap">
      <svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
        <!-- Simplified China outline -->
        <path d="M120,80 L180,50 L260,40 L340,50 L400,45 L440,70 L470,90 L480,130 L490,170 L500,210 L480,250 L460,280 L440,310 L420,340 L400,370 L370,390 L340,410 L300,420 L260,430 L220,420 L180,400 L150,370 L130,340 L110,300 L100,260 L95,220 L100,180 L110,140 L120,110 Z" fill="none" stroke="#E8E8E8" stroke-width="1.5"/>
        <path d="M400,45 L430,55 L450,80 L460,120 L470,160 L480,200 L490,240 L480,270 L460,300 L440,330 L430,360 L420,380" fill="none" stroke="#E8E8E8" stroke-width="1"/>

        <!-- Connect lines (Hefei as hub) -->
        <line class="connect-line" x1="410" y1="195" x2="350" y2="250"/>
        <line class="connect-line" x1="410" y1="195" x2="280" y2="290"/>
        <line class="connect-line" x1="410" y1="195" x2="310" y2="175"/>
        <line class="connect-line" x1="410" y1="195" x2="360" y2="145"/>
        <line class="connect-line" x1="410" y1="195" x2="400" y2="260"/>
        <line class="connect-line" x1="410" y1="195" x2="260" y2="230"/>
        <line class="connect-line" x1="410" y1="195" x2="300" y2="330"/>

        <!-- HEFEI — 43%, 101% — LARGEST -->
        <g class="city-group city-hefei">
          <circle class="city-ring" cx="410" cy="195" r="32"/>
          <circle class="city-core" cx="410" cy="195" r="14"/>
          <text class="city-label" x="410" y="155" text-anchor="middle">HEFEI</text>
          <text class="city-val" x="410" y="245" text-anchor="middle">43%</text>
          <text class="city-pct" x="410" y="258" text-anchor="middle">101%</text>
        </g>

        <!-- WUHAN — 18%, 98% -->
        <g class="city-group">
          <circle class="city-ring" cx="350" cy="250" r="22"/>
          <circle class="city-core" cx="350" cy="250" r="8"/>
          <text class="city-label" x="350" y="220" text-anchor="middle">WUHAN</text>
          <text class="city-val" x="350" y="283" text-anchor="middle">18%</text>
          <text class="city-pct" x="350" y="296" text-anchor="middle">98%</text>
        </g>

        <!-- CHENGDU — 12%, 105% -->
        <g class="city-group">
          <circle class="city-ring" cx="280" cy="290" r="18"/>
          <circle class="city-core" cx="280" cy="290" r="7"/>
          <text class="city-label" x="280" y="263" text-anchor="middle">CHENGDU</text>
          <text class="city-val" x="280" y="320" text-anchor="middle" fill="#4A9E5C">105%</text>
        </g>

        <!-- XI'AN — 9%, 87% -->
        <g class="city-group">
          <circle class="city-ring" cx="310" cy="175" r="16"/>
          <circle class="city-core" cx="310" cy="175" r="6"/>
          <text class="city-label" x="310" y="150" text-anchor="middle">XI'AN</text>
          <text class="city-val" x="310" y="203" text-anchor="middle">87%</text>
        </g>

        <!-- ZHENGZHOU — 7%, 92% -->
        <g class="city-group">
          <circle class="city-ring" cx="360" cy="145" r="14"/>
          <circle class="city-core" cx="360" cy="145" r="5"/>
          <text class="city-label" x="360" y="122" text-anchor="middle">ZHENGZHOU</text>
          <text class="city-val" x="360" y="170" text-anchor="middle">92%</text>
        </g>

        <!-- CHANGSHA — 5%, 76% -->
        <g class="city-group">
          <circle class="city-ring" cx="400" cy="260" r="12"/>
          <circle class="city-core" cx="400" cy="260" r="4"/>
          <text class="city-label" x="430" y="258" text-anchor="start">CHANGSHA</text>
          <text class="city-val" x="400" y="283" text-anchor="middle" fill="#D4A843">76%</text>
        </g>

        <!-- CHONGQING — 4%, 112% -->
        <g class="city-group">
          <circle class="city-ring" cx="260" cy="230" r="11"/>
          <circle class="city-core" cx="260" cy="230" r="4"/>
          <text class="city-label" x="230" y="225" text-anchor="end">CHONGQING</text>
          <text class="city-val" x="260" y="253" text-anchor="middle" fill="#4A9E5C">112%</text>
        </g>

        <!-- KUNMING — 2%, 68% -->
        <g class="city-group">
          <circle class="city-ring" cx="300" cy="330" r="9"/>
          <circle class="city-core" cx="300" cy="330" r="3"/>
          <text class="city-label" x="300" y="315" text-anchor="middle">KUNMING</text>
          <text class="city-val" x="300" y="355" text-anchor="middle" fill="#D71921">68%</text>
        </g>

      </svg>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="rank-item">
        <span class="rank-idx">01</span>
        <span class="rank-name">合肥</span>
        <div class="rank-bar-wrap"><div class="rank-bar met" style="width:43%"></div></div>
        <span class="rank-rate met">101%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">02</span>
        <span class="rank-name">武汉</span>
        <div class="rank-bar-wrap"><div class="rank-bar mid" style="width:18%"></div></div>
        <span class="rank-rate mid">98%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">03</span>
        <span class="rank-name">成都</span>
        <div class="rank-bar-wrap"><div class="rank-bar met" style="width:12%"></div></div>
        <span class="rank-rate met">105%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">04</span>
        <span class="rank-name">西安</span>
        <div class="rank-bar-wrap"><div class="rank-bar mid" style="width:9%"></div></div>
        <span class="rank-rate mid">87%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">05</span>
        <span class="rank-name">郑州</span>
        <div class="rank-bar-wrap"><div class="rank-bar mid" style="width:7%"></div></div>
        <span class="rank-rate mid">92%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">06</span>
        <span class="rank-name">长沙</span>
        <div class="rank-bar-wrap"><div class="rank-bar weak" style="width:5%"></div></div>
        <span class="rank-rate weak">76%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">07</span>
        <span class="rank-name">重庆</span>
        <div class="rank-bar-wrap"><div class="rank-bar met" style="width:4%"></div></div>
        <span class="rank-rate met">112%</span>
      </div>
      <div class="rank-item">
        <span class="rank-idx">08</span>
        <span class="rank-name">昆明</span>
        <div class="rank-bar-wrap"><div class="rank-bar weak" style="width:2%"></div></div>
        <span class="rank-rate weak" style="color:#D71921">68%</span>
      </div>

      <div class="stat-card">
        <div class="stat-label">Total Output</div>
        <div class="stat-value">¥312M</div>
        <div class="stat-sub">vs Target ¥308M · <span style="color:#4A9E5C">+1.3%</span></div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-text">金条B端企业主贷 · 8职场 · 2026 Q1</span>
    <span class="footer-text">Circle Size = Volume · Color = Achievement Rate</span>
  </div>

</div>
</body>
</html>
