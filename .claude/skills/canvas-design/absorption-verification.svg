<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2000" width="1600" height="2000">
  <defs>
    <pattern id="verification-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#E0E0E0" opacity="0.5"/>
    </pattern>

    <style>
      .bg { fill: #FAFAFA; }
      .pattern-zone { fill: url(#verification-pattern); }
      .workflow-main { stroke: #1A1A1A; stroke-width: 3; fill: none; stroke-linecap: round; }
      .workflow-branch { stroke: #1A1A1A; stroke-width: 1.5; fill: none; stroke-dasharray: 4 4; }
      .verification-zone { stroke: #C65D3B; stroke-width: 1.5; fill: none; opacity: 0.3; }
      .proof-trace { stroke: #C65D3B; stroke-width: 1; fill: none; opacity: 0.6; }
      .proof-solid { stroke: #C65D3B; stroke-width: 2; fill: none; opacity: 0.9; }
      .proof-point { fill: #C65D3B; opacity: 0.85; }
      .halo { fill: #E8D4CE; opacity: 0.4; }

      .title { font-family: Arial, sans-serif; font-weight: 700; font-size: 64px; fill: #1A1A1A; text-anchor: middle; letter-spacing: 3px; }
      .subtitle { font-family: Georgia, serif; font-style: italic; font-size: 12px; fill: #C65D3B; text-anchor: middle; letter-spacing: 0.5px; }
      .label-primary { font-family: Arial, sans-serif; font-weight: 600; font-size: 9px; fill: #1A1A1A; text-anchor: middle; }
      .label-secondary { font-family: Georgia, serif; font-style: italic; font-size: 7px; fill: #C65D3B; text-anchor: middle; }
      .proof-count { font-family: Courier, monospace; font-weight: 700; font-size: 11px; fill: #C65D3B; text-anchor: end; }
      .meta { font-family: Courier, monospace; font-size: 7px; fill: #888888; letter-spacing: 0.5px; }
      .corner { font-family: Courier, monospace; font-size: 10px; fill: #1A1A1A; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect class="bg" width="1600" height="2000"/>

  <!-- 验证区域 - Canvas-Design 哲学居住区 -->
  <g id="verification-zones">
    <!-- Zone 1: 概念提取 -->
    <rect x="150" y="400" width="400" height="250" rx="20" class="verification-zone"/>
    <rect x="155" y="405" width="390" height="240" rx="18" class="pattern-zone" opacity="0.3"/>

    <!-- Zone 2: 哲学宣言 -->
    <rect x="600" y="700" width="400" height="250" rx="20" class="verification-zone"/>
    <rect x="605" y="705" width="390" height="240" rx="18" class="pattern-zone" opacity="0.3"/>

    <!-- Zone 3: 工艺检查 -->
    <rect x="1050" y="400" width="400" height="250" rx="20" class="verification-zone"/>
    <rect x="1055" y="405" width="390" height="240" rx="18" class="pattern-zone" opacity="0.3"/>
  </g>

  <!-- 工作流路径 - 必须穿过验证区 -->
  <g id="workflow">
    <!-- 主路径 -->
    <path class="workflow-main" d="M 100 1800 L 100 525 L 550 525"/>
    <path class="workflow-main" d="M 650 525 L 600 525 L 600 700"/>
    <path class="workflow-main" d="M 600 950 L 600 1150 L 800 1150 L 800 825 L 1000 825 L 1000 525 L 1050 525"/>
    <path class="workflow-main" d="M 1250 525 L 1400 525 L 1400 1800"/>

    <!-- 分支到输出 -->
    <path class="workflow-branch" d="M 800 1150 L 800 1400"/>
  </g>

  <!-- 证明追踪线 - 每次穿越留下的痕迹 -->
  <g id="proof-traces">
    <!-- Zone 1 穿越 -->
    <circle class="halo" cx="350" cy="525" r="40"/>
    <line class="proof-trace" x1="150" y1="500" x2="550" y2="500"/>
    <line class="proof-trace" x1="150" y1="550" x2="550" y2="550"/>
    <circle class="proof-point" cx="350" cy="525" r="6"/>

    <!-- Zone 2 穿越 -->
    <circle class="halo" cx="800" cy="825" r="45"/>
    <line class="proof-trace" x1="600" y1="790" x2="1000" y2="790"/>
    <line class="proof-trace" x1="600" y1="860" x2="1000" y2="860"/>
    <circle class="proof-point" cx="800" cy="825" r="8"/>

    <!-- Zone 3 穿越 -->
    <circle class="halo" cx="1250" cy="525" r="40"/>
    <line class="proof-trace" x1="1050" y1="500" x2="1450" y2="500"/>
    <line class="proof-trace" x1="1050" y1="550" x2="1450" y2="550"/>
    <circle class="proof-point" cx="1250" cy="525" r="6"/>
  </g>

  <!-- 输出签名区域 -->
  <g id="output-signature">
    <rect x="550" y="1400" width="500" height="300" rx="15" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>

    <!-- 输出标签 -->
    <text x="800" y="1450" class="label-primary">DESIGN OUTPUT</text>
    <text x="800" y="1580" class="label-primary">HTML / CSS</text>

    <!-- 哲学签名 -->
    <text x="800" y="1480" class="label-secondary">Philosophy: Conceptual Absorption</text>
    <text x="800" y="1610" class="label-secondary">Method: Design DNA Extraction</text>
    <text x="800" y="1640" class="label-secondary">Standard: Craft Checklist (11 criteria)</text>
  </g>

  <!-- 证明计数器 -->
  <g id="proof-counter">
    <text x="1520" y="120" class="proof-count">PROOF POINTS: 3</text>
    <line x1="1350" y1="130" x2="1520" y2="130" stroke="#C65D3B" stroke-width="2"/>
  </g>

  <!-- 排版 -->
  <g id="typography">
    <text x="800" y="1900" class="title">VERIFICATION</text>

    <text x="800" y="1830" class="subtitle">Architecture of Validated Integration</text>

    <!-- 验证区标签 -->
    <text x="350" y="360" class="label-primary">EXTRACTION</text>
    <text x="350" y="375" class="label-secondary">Conceptual DNA</text>

    <text x="800" y="660" class="label-primary">MANIFESTO</text>
    <text x="800" y="675" class="label-secondary">3-Sentence Philosophy</text>

    <text x="1250" y="360" class="label-primary">CRAFT</text>
    <text x="1250" y="375" class="label-secondary">11-Item Checklist</text>

    <!-- 元数据 -->
    <text x="80" y="80" class="meta">MINO-FRONTEND v1.4</text>
    <text x="80" y="95" class="meta">SOURCE: CANVAS-DESIGN</text>
    <text x="1520" y="80" class="meta" text-anchor="end">2026.03.24</text>
  </g>

  <!-- 角落标记 -->
  <g id="corners">
    <text x="20" y="1975" class="corner">┌</text>
    <text x="1580" y="1975" class="corner">┐</text>
    <text x="20" y="35" class="corner">└</text>
    <text x="1580" y="35" class="corner">┘</text>
  </g>

  <!-- 流程指示箭头 -->
  <g id="flow-arrows">
    <path d="M 100 1700 L 120 1700 L 115 1695 M 120 1700 L 115 1705" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
    <path d="M 1400 1700 L 1420 1700 L 1415 1695 M 1420 1700 L 1415 1705" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>
  </g>
</svg>
