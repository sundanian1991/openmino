<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2000" width="1600" height="2000">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .grid-line { stroke: #EBEBEB; stroke-width: 0.4; opacity: 0.35; }
      .tracer { stroke: #C65D3B; stroke-width: 0.6; fill: none; opacity: 0.6; }
      .tracer-bold { stroke: #C65D3B; stroke-width: 1.2; fill: none; opacity: 0.85; }
      .halo { fill: #E8D4CE; opacity: 0.4; }
      .main-stroke { stroke: #1A1A1A; stroke-width: 2; fill: none; }
      .module-stroke { stroke: #1A1A1A; stroke-width: 0.8; fill: #FAFAFA; }

      .title { font-family: Arial, sans-serif; font-weight: 700; font-size: 72px; fill: #1A1A1A; text-anchor: middle; letter-spacing: 4px; }
      .subtitle { font-family: Georgia, serif; font-style: italic; font-size: 13px; fill: #C65D3B; text-anchor: middle; letter-spacing: 0.8px; }
      .label { font-family: Arial, sans-serif; font-weight: 400; font-size: 7px; fill: #2A2A2A; text-anchor: middle; letter-spacing: 1px; }
      .insight { font-family: Georgia, serif; font-style: italic; font-weight: 400; font-size: 10px; fill: #C65D3B; text-anchor: middle; letter-spacing: 0.5px; }
      .insight-sub { font-family: Arial, sans-serif; font-weight: 300; font-size: 8px; fill: #3A3A3A; text-anchor: middle; letter-spacing: 3px; }
      .meta { font-family: Courier, monospace; font-size: 7px; fill: #888888; letter-spacing: 0.5px; }
      .corner { font-family: Courier, monospace; font-size: 11px; fill: #1A1A1A; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect class="bg" width="1600" height="2000"/>

  <!-- 底层幽灵网格 - 更精简的原始哲学结构 -->
  <g id="grid">
    <line class="grid-line" x1="300" y1="300" x2="300" y2="1700"/>
    <line class="grid-line" x1="500" y1="300" x2="500" y2="1700"/>
    <line class="grid-line" x1="700" y1="300" x2="700" y2="1700"/>
    <line class="grid-line" x1="900" y1="300" x2="900" y2="1700"/>
    <line class="grid-line" x1="1100" y1="300" x2="1100" y2="1700"/>
    <line class="grid-line" x1="1300" y1="300" x2="1300" y2="1700"/>

    <line class="grid-line" x1="100" y1="500" x2="1500" y2="500"/>
    <line class="grid-line" x1="100" y1="800" x2="1500" y2="800"/>
    <line class="grid-line" x1="100" y1="1100" x2="1500" y2="1100"/>
    <line class="grid-line" x1="100" y1="1400" x2="1500" y2="1400"/>
  </g>

  <!-- 概念追踪线 - 精简后的吸收关系 -->
  <g id="tracers">
    <!-- 垂直连接 - 从底层到顶层 -->
    <path class="tracer" d="M 275 1300 L 275 1650"/>
    <path class="tracer" d="M 800 1000 L 800 400"/>

    <!-- 对角线 - 跨层连接 -->
    <path class="tracer" d="M 475 1145 L 300 500"/>

    <!-- 强调线 - 核心吸收路径 -->
    <path class="tracer-bold" d="M 1175 1400 L 1175 1650"/>
  </g>

  <!-- 记忆光晕 - 精简到关键对齐点 -->
  <circle class="halo" cx="275" cy="1300" r="25"/>
  <circle class="halo" cx="1175" cy="1400" r="28"/>
  <circle class="halo" cx="800" cy="1000" r="35"/>

  <!-- 主要几何系统 - 新能力结构 -->
  <g id="main-structure">
    <!-- 核心外框 -->
    <rect x="200" y="750" width="1200" height="750" rx="16" class="main-stroke"/>

    <!-- 内部模块 - 精简布局 -->
    <rect x="250" y="1220" width="350" height="180" rx="12" class="module-stroke"/>
    <rect x="650" y="1220" width="300" height="180" rx="12" class="module-stroke"/>
    <rect x="1020" y="1220" width="330" height="180" rx="12" class="module-stroke"/>
    <rect x="250" y="920" width="400" height="230" rx="12" class="module-stroke"/>
    <rect x="700" y="920" width="300" height="230" rx="12" class="module-stroke"/>
    <rect x="1050" y="920" width="300" height="230" rx="12" class="module-stroke"/>
  </g>

  <!-- 排版 - 更精确的字间距和行距 -->
  <g id="typography">
    <!-- 主标题 -->
    <text x="800" y="1870" class="title">ABSORPTION</text>

    <!-- 副标题 -->
    <text x="800" y="1795" class="subtitle">Converse Design → Mino Frontend</text>

    <!-- 模块标签 -->
    <text x="425" y="1320" class="label">DESIGN SYSTEMS</text>
    <text x="800" y="1320" class="label">STYLES</text>
    <text x="1185" y="1313" class="label">AESTHETIC</text>
    <text x="1185" y="1324" class="label">JUDGMENT</text>
    <text x="450" y="1045" class="label">ASSETS</text>
    <text x="850" y="1045" class="label">FLOW</text>
    <text x="1200" y="1045" class="label">OUTPUT</text>

    <!-- 核心洞察 - 更多呼吸空间 -->
    <text x="800" y="600" class="insight">THE ORIGINAL BECOMES INVISIBLE</text>
    <text x="800" y="530" class="insight-sub">PRESENT EVERYWHERE NOWHERE EXPLICITLY</text>

    <!-- 元数据 -->
    <text x="80" y="90" class="meta">PHILOSOPHY INTEGRATION v2.0</text>
    <text x="1520" y="90" class="meta" text-anchor="end">2026.03.24</text>

    <!-- 考古学注释 - 旋转优化 -->
    <text x="55" y="1100" class="meta" text-anchor="end" transform="rotate(-90, 55, 1100)">SOURCE: CANVAS-DESIGN</text>
    <text x="1545" y="1100" class="meta" text-anchor="start" transform="rotate(90, 1545, 1100)">RESULT: MINO-FRONTEND v1.4</text>
  </g>

  <!-- 角落标记 -->
  <g id="corners">
    <text x="25" y="1975" class="corner">┌</text>
    <text x="1575" y="1975" class="corner">┐</text>
    <text x="25" y="35" class="corner">└</text>
    <text x="1575" y="35" class="corner">┘</text>
  </g>
</svg>
