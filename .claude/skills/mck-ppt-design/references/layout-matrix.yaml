## Usage in Gates

**S2 结构门禁**：检查版式分配是否在 Max Items 范围内。

**S3 内容门禁**：检查每个文本块字符数是否在 char_budget 内。

```python
# S3 门禁示例伪代码
for slide in content['slides']:
    layout = slide['layout']
    for field, text in slide['text_fields'].items():
        limit = LAYOUT_MATRIX[layout]['char_budget'].get(field, 80)
        if len(text) > limit:
            return GateFail(f"Slide {slide['idx']} {field}: {len(text)} > {limit} chars")
```
