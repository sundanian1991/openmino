# ═══ nian-decision-card 输出 · 岐力职场复贷 SABC 诊断 ═══
# 产自 nian-decision-card 技能 · 数据分支
# 上游：viz-data-storytelling 叙事大纲 + viz-design 7图产物
# 下游：nian-design 施工

branch: data

# ── 气质（决策A）──
# 选 Numeral：首屏是核心判断（39%参评/39%C级双红灯），单一震撼指标开屏
# 后续 section 走 Dashboard 的格子卡逻辑承载多图，但主气质定为 Numeral
visualStream: Numeral
structuralStream: null              # 数据报告，<1500字导航需求弱，不用结构型

# ── 骨架（决策B）── 三幕叙事映射
layoutSequence:
  # 第一幕 铺放（图1-2）：整体不健康 → 具体哪里不健康
  - { section: 开场判决, layout: S03, role: hero }        # 图1 KPI仪表盘：4项指标2项红灯
  - { section: 等级构成, layout: S09, role: evidence }     # 图2 S/A/B/C条形：底部膨胀
  # 第二幕 冲突（图3-5）：新人问题 → 管理盲区 → 头部薄弱
  - { section: 根因定位, layout: S11, role: evidence }     # 图3 热力图：MOB1-3占C级60%
  - { section: 盲区对比, layout: S14, role: evidence }     # 图4 对比表 + 图5 GMV分布（格子卡承载）
  # 第三幕 决议（图6-7）：谁需要动 → 怎么动
  - { section: 预警名单, layout: S11, role: evidence }     # 图6 12人名单
  - { section: 行动建议, layout: S21, role: closure }      # 图7 三条建议收束

# ── 组件 + Hero + 打破（决策C）──
heroType: V6-Numeral                # 由 visualStream 决定：3-5个KPI横排开屏
components:
  - { id: "13 WIDGETS", purpose: 图1 KPI仪表盘四指标卡 }
  - { id: "12a Bar Chart", purpose: 图2 S/A/B/C水平条形 }
  - { id: "12 MINI CHARTS", purpose: 图3 司龄×等级热力图容器 }
  - { id: "05 TABLES", purpose: 图4 参评vs非参评对比表 + 图6 12人预警名单 }
  - { id: "12a Bar Chart", purpose: 图5 GMV分布条形（复用，浅色版） }
  - { id: "20 ASYMMETRIC COMPARISON", purpose: 第二幕盲区对比的非对称呈现 }
  - { id: "23 DECORATIVE NUMBER HEADER", purpose: 图7 行动卡片编号01/02/03 }
  - { id: "22 CHECKLIST", purpose: 图7 三条行动建议清单 }
breakPoint:
  section: 开场判决
  method: 超大数字                   # Big Idea 核心数值 39%
  spec:
    value: "39%"
    font: Playfair Display
    size: min(18vw, 22vh)
    color: var(--orange)            # 红灯用 orange 信号色（nian 7色），非 coral

# ── 配色 ──
# viz-design 用 Stone+olive/earth/coral/yellow，与 nian 7色兼容
# coral→orange 信号色映射，stone 系→nian 中性灰
palette:
  primary: darkgray                 # 数据报告偏权威深色（标题/重点数字）
  accent: orange                    # 红灯/警示（参评率39%、C级率39%）
  baseMode: light                   # 数据图强制浅色背景（见 feedback_chart_light_theme）

# ── 数据图位置（决策C · dataCharts）──
# viz-design 7图作为素材嵌入对应 section
dataCharts:
  - { chartId: 图1-KPI仪表盘, embedSection: 开场判决, size: full, source: viz-design-render/04-charts.html#kpi, type: html-component }
  - { chartId: 图2-等级条形, embedSection: 等级构成, size: full, source: viz-design-render/04-charts.html#grade-bar, type: echarts }
  - { chartId: 图3-司龄热力, embedSection: 根因定位, size: full, source: viz-design-render/04-charts.html#heatmap, type: echarts }
  - { chartId: 图4-参评对比, embedSection: 盲区对比, size: half, source: viz-design-render/04-charts.html#compare, type: html-component }
  - { chartId: 图5-GMV分布, embedSection: 盲区对比, size: half, source: viz-design-render/04-charts.html#gmv, type: echarts, note: 原spec深色背景→施工转浅色 }
  - { chartId: 图6-预警名单, embedSection: 预警名单, size: full, source: viz-design-render/04-charts.html#alert, type: html-component }
  - { chartId: 图7-行动建议, embedSection: 行动建议, size: full, source: viz-design-render/04-charts.html#actions, type: html-component }

# ── 上游溯源 ──
source:
  narrative: myagents_files/sabc-output/01-narrative-outline-岐力.md
  audience: 决策者                    # 供应商管理岗（年老师）
  bigIdea: "118人中仅39%达参评标准，C级率39%远超警戒线，MOB1-3新人占78%且贡献60%C级，建议立即启动新人培训+低活跃激活"
  dataCutoff: 2026-05-12

# ── 施工约束（给 nian-design 的额外说明）──
constraints:
  - 图5 原 viz-design spec 用深色背景，施工时必须转浅色（数据图禁深色）
  - coral-500(#E55B2B) 映射为 nian 的 --orange 信号色，不自造新色
  - 7张图中4张是纯HTML组件（KPI/对比/名单/行动），3张是ECharts（条形/热力/条形）
  - 三幕节奏：第一幕紧凑判决、第二幕展开冲突、第三幕落地行动
