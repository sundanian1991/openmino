<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题→后果→应对闭环</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #faf9f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .canvas {
            width: 680px;
            background: #faf9f7;
        }
        .title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 11px;
            color: #6b6b6b;
            margin-bottom: 20px;
        }
        .loop-container {
            position: relative;
            width: 600px;
            height: 320px;
        }
        .phase-card {
            position: absolute;
            background: #f5f4f1;
            border: 1px solid #d4d1c7;
            border-radius: 8px;
            padding: 12px 16px;
            width: 160px;
        }
        .phase-card .phase-title {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .phase-card .phase-desc {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 10px;
            color: #6b6b6b;
            line-height: 1.4;
        }
        .phase-card .phase-tag {
            display: inline-block;
            font-size: 8px;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 6px;
        }
        .tag-issue { background: #d4845a; }
        .tag-consequence { background: #c98a6a; }
        .tag-response { background: #8f9b7f; }
        .arrow-path {
            position: absolute;
            fill: none;
            stroke: #c98a6a;
            stroke-width: 1;
        }
        .arrow-label {
            position: absolute;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 9px;
            color: #c98a6a;
            background: #faf9f7;
            padding: 2px 4px;
        }
        .phase-number {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1a1a1a;
            color: #fff;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footnote {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 10px;
            font-style: italic;
            color: #6b6b6b;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="title">问题→后果→应对闭环</div>
        <div class="subtitle">供应商异常管理的完整信息流回路</div>

        <div class="loop-container">
            <!-- Phase 1: 问题识别 -->
            <div class="phase-card" style="top: 0; left: 0;">
                <div class="phase-number" style="top: -12px; left: -12px;">1</div>
                <div class="phase-title">问题识别</div>
                <div class="phase-desc">数据指标触发阈值<br>人工观察发现异常</div>
                <div class="phase-tag tag-issue">P0/P1/P2</div>
            </div>

            <!-- Phase 2: 根因分析 -->
            <div class="phase-card" style="top: 0; left: 220px;">
                <div class="phase-number" style="top: -12px; left: -12px;">2</div>
                <div class="phase-title">根因分析</div>
                <div class="phase-desc">约谈供应商<br>收集数据与证据<br>定位问题源头</div>
            </div>

            <!-- Phase 3: 后果评估 -->
            <div class="phase-card" style="top: 0; left: 440px;">
                <div class="phase-number" style="top: -12px; left: -12px;">3</div>
                <div class="phase-title">后果评估</div>
                <div class="phase-desc">业务影响量化<br>客户体验损失<br>财务损失估算</div>
                <div class="phase-tag tag-consequence">影响等级</div>
            </div>

            <!-- Phase 4: 制定方案 -->
            <div class="phase-card" style="bottom: 0; left: 440px;">
                <div class="phase-number" style="bottom: -12px; left: -12px;">4</div>
                <div class="phase-title">制定方案</div>
                <div class="phase-desc">整改计划制定<br>时间节点确认<br>责任人明确</div>
                <div class="phase-tag tag-response">行动导向</div>
            </div>

            <!-- Phase 5: 执行验证 -->
            <div class="phase-card" style="bottom: 0; left: 220px;">
                <div class="phase-number" style="bottom: -12px; left: -12px;">5</div>
                <div class="phase-title">执行验证</div>
                <div class="phase-desc">第1/2/4/8周<br>分阶段验收<br>数据持续监控</div>
            </div>

            <!-- Phase 6: 闭环归档 -->
            <div class="phase-card" style="bottom: 0; left: 0;">
                <div class="phase-number" style="bottom: -12px; left: -12px;">6</div>
                <div class="phase-title">闭环归档</div>
                <div class="phase-desc">经验沉淀<br>流程优化<br>案例库更新</div>
                <div class="phase-tag" style="background: #6a8fb5;">知识沉淀</div>
            </div>

            <!-- Connection Arrows -->
            <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                        <polygon points="0 0, 10 3, 0 6" fill="#c98a6a"/>
                    </marker>
                </defs>
                <!-- 1 to 2 -->
                <path class="arrow-path" d="M 160 44 L 210 44" marker-end="url(#arrowhead)"/>
                <!-- 2 to 3 -->
                <path class="arrow-path" d="M 380 44 L 430 44" marker-end="url(#arrowhead)"/>
                <!-- 3 to 4 -->
                <path class="arrow-path" d="M 520 92 L 520 148" marker-end="url(#arrowhead)"/>
                <!-- 4 to 5 -->
                <path class="arrow-path" d="M 440 200 L 390 200" marker-end="url(#arrowhead)"/>
                <!-- 5 to 6 -->
                <path class="arrow-path" d="M 220 200 L 170 200" marker-end="url(#arrowhead)"/>
                <!-- 6 to 1 (return loop) -->
                <path class="arrow-path" d="M 80 148 Q 40 120 80 92" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowhead)"/>
            </svg>

            <!-- Arrow Labels -->
            <div class="arrow-label" style="top: 38px; left: 175px;">触发</div>
            <div class="arrow-label" style="top: 38px; left: 395px;">评估</div>
            <div class="arrow-label" style="top: 115px; right: 90px;">应对</div>
            <div class="arrow-label" style="top: 194px; left: 375px;">验证</div>
            <div class="arrow-label" style="top: 194px; left: 175px;">归档</div>
            <div class="arrow-label" style="top: 105px; left: 20px;">持续监控</div>
        </div>

        <div class="footnote">完整闭环确保每个异常都有始有终，避免问题遗漏或重复发生</div>
    </div>
</body>
</html>
