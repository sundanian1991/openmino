<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清退决策树</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #faf9f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .canvas {
            width: 680px;
            background: #faf9f7;
        }
        .title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 11px;
            color: #6b6b6b;
            margin-bottom: 20px;
        }
        .decision-container {
            border: 1.5px solid #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            background: transparent;
        }
        .tree-level {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
        }
        .tree-level::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: #c98a6a;
            transform: translateX(-50%);
        }
        .tree-level:last-child::after {
            display: none;
        }
        .decision-node {
            background: #f5f4f1;
            border: 1px solid #d4d1c7;
            border-radius: 8px;
            padding: 12px 16px;
            text-align: center;
            position: relative;
        }
        .decision-node.root {
            background: #faf9f7;
            border-color: #1a1a1a;
            border-width: 1.5px;
            min-width: 200px;
        }
        .decision-node.yes {
            border-color: #8f9b7f;
            background: #faf9f7;
        }
        .decision-node.no {
            border-color: #d4845a;
            background: #faf9f7;
        }
        .decision-node.result {
            min-width: 140px;
        }
        .decision-node.result-keep {
            background: #8f9b7f;
            border-color: #8f9b7f;
        }
        .decision-node.result-exit {
            background: #d4845a;
            border-color: #d4845a;
        }
        .decision-node.result-review {
            background: #c98a6a;
            border-color: #c98a6a;
        }
        .node-label {
            font-size: 11px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .node-label.light {
            color: #fff;
        }
        .node-desc {
            font-size: 9px;
            color: #6b6b6b;
            line-height: 1.4;
        }
        .node-desc.light {
            color: rgba(255,255,255,0.9);
        }
        .branch-label {
            position: absolute;
            font-size: 8px;
            color: #c98a6a;
            font-weight: 500;
            background: #faf9f7;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .branch-yes {
            color: #8f9b7f;
        }
        .branch-no {
            color: #d4845a;
        }

        .legend-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #d4d1c7;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .legend-text {
            font-size: 9px;
            color: #6b6b6b;
        }

        .footnote {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 10px;
            font-style: italic;
            color: #6b6b6b;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="title">清退决策树</div>
        <div class="subtitle">供应商终止合作标准化决策流程</div>

        <div class="decision-container">
            <!-- Level 1: Root -->
            <div class="tree-level" style="margin-bottom: 24px;">
                <div class="decision-node root">
                    <div class="node-label">触发清退评估</div>
                    <div class="node-desc">连续3个月P1级预警 或 发生重大业务事故</div>
                </div>
            </div>

            <!-- Level 2 -->
            <div class="tree-level">
                <div class="decision-node" style="flex: 1; max-width: 280px;">
                    <div class="node-label">整改意愿评估</div>
                    <div class="node-desc">供应商是否积极配合整改方案？</div>
                </div>
            </div>

            <!-- Level 3 -->
            <div class="tree-level" style="gap: 40px;">
                <div class="decision-node yes" style="flex: 1;">
                    <div class="node-label">整改效果评估</div>
                    <div class="node-desc">整改后指标是否明显改善？</div>
                </div>
                <div class="decision-node no" style="flex: 1;">
                    <div class="node-label">业务依赖评估</div>
                    <div class="node-desc">是否有可替代供应商？</div>
                </div>
            </div>

            <!-- Level 4 -->
            <div class="tree-level" style="gap: 24px;">
                <div class="decision-node result result-keep">
                    <div class="node-label light">继续合作</div>
                    <div class="node-desc light">持续监控，降低风险等级</div>
                </div>
                <div class="decision-node result result-review">
                    <div class="node-label light">限期整改</div>
                    <div class="node-desc light">3个月观察期，无改善则清退</div>
                </div>
                <div class="decision-node result result-exit">
                    <div class="node-label light">启动清退</div>
                    <div class="node-desc light">启动备选方案，终止合作</div>
                </div>
                <div class="decision-node result result-review">
                    <div class="node-label light">缓冲清退</div>
                    <div class="node-desc light">培养替代期间限制新单</div>
                </div>
            </div>

            <div class="legend-bar">
                <div class="legend-item">
                    <div class="legend-dot" style="background: #8f9b7f;"></div>
                    <span class="legend-text">继续合作</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #c98a6a;"></div>
                    <span class="legend-text">观察期/缓冲</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #d4845a;"></div>
                    <span class="legend-text">立即清退</span>
                </div>
            </div>
        </div>

        <div class="footnote">清退是最后手段，决策前需评估备选方案成熟度和业务切换成本</div>
    </div>
</body>
</html>
