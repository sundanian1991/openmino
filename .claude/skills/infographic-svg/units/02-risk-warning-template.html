<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风险预警模板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #faf9f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .canvas {
            width: 680px;
            background: #faf9f7;
        }
        .title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 11px;
            color: #6b6b6b;
            margin-bottom: 20px;
        }
        .warning-container {
            border: 1.5px solid #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            background: transparent;
        }
        .warning-level {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .level-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .level-tab.p0 { background: #d4845a; }
        .level-tab.p1 { background: #c98a6a; }
        .level-tab.p2 { background: #8a8580; }
        .level-tab.inactive { opacity: 0.4; }
        .level-tab.active { opacity: 1; box-shadow: 0 0 0 2px #1a1a1a; }

        .warning-card {
            background: #f5f4f1;
            border: 1px solid #d4d1c7;
            border-radius: 8px;
            padding: 16px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #d4d1c7;
        }
        .card-title {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: #1a1a1a;
        }
        .card-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            color: #fff;
        }
        .badge-p0 { background: #d4845a; }
        .badge-p1 { background: #c98a6a; }
        .badge-p2 { background: #8a8580; }

        .card-section {
            margin-bottom: 12px;
        }
        .section-label {
            font-size: 10px;
            color: #6b6b6b;
            margin-bottom: 4px;
        }
        .section-value {
            font-size: 11px;
            color: #1a1a1a;
            font-weight: 500;
        }
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .action-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .action-tag {
            font-size: 9px;
            padding: 4px 8px;
            background: #faf9f7;
            border: 1px solid #d4d1c7;
            border-radius: 4px;
            color: #6b6b6b;
        }
        .footnote {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 10px;
            font-style: italic;
            color: #6b6b6b;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="title">风险预警模板</div>
        <div class="subtitle">P0/P1/P2三级预警标准与响应动作</div>

        <div class="warning-container">
            <!-- Level Tabs -->
            <div class="warning-level">
                <div class="level-tab p0 active">
                    <div style="font-size: 14px; font-weight: 700;">P0</div>
                    <div style="font-size: 9px; opacity: 0.9;">紧急</div>
                </div>
                <div class="level-tab p1">
                    <div style="font-size: 14px; font-weight: 700;">P1</div>
                    <div style="font-size: 9px; opacity: 0.9;">重要</div>
                </div>
                <div class="level-tab p2">
                    <div style="font-size: 14px; font-weight: 700;">P2</div>
                    <div style="font-size: 9px; opacity: 0.9;">一般</div>
                </div>
            </div>

            <!-- P0 Warning Card -->
            <div class="warning-card">
                <div class="card-header">
                    <div class="card-title">P0级预警标准</div>
                    <div class="card-badge badge-p0">立即响应</div>
                </div>

                <div class="card-grid">
                    <div class="card-section">
                        <div class="section-label">触发条件</div>
                        <div class="section-value">客诉率 &gt; 5% 或 连续3天无响应</div>
                    </div>
                    <div class="card-section">
                        <div class="section-label">响应时限</div>
                        <div class="section-value">2小时内介入</div>
                    </div>
                    <div class="card-section">
                        <div class="section-label">业务影响</div>
                        <div class="section-value">客户流失 / 资金损失</div>
                    </div>
                    <div class="card-section">
                        <div class="section-label">升级路径</div>
                        <div class="section-value">直接上报管理层</div>
                    </div>
                </div>

                <div class="card-section" style="margin-top: 12px;">
                    <div class="section-label">强制动作</div>
                    <div class="action-list">
                        <span class="action-tag">立即约谈</span>
                        <span class="action-tag">暂停新单</span>
                        <span class="action-tag">日报跟踪</span>
                        <span class="action-tag">风险评估</span>
                        <span class="action-tag">备选启动</span>
                    </div>
                </div>
            </div>

            <!-- P1/P2 Indicators -->
            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <div style="flex: 1; background: #faf9f7; border: 1px dashed #e8e4dc; border-radius: 8px; padding: 12px;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                        <div style="width: 24px; height: 24px; background: #c98a6a; border-radius: 4px; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;">P1</div>
                        <div style="font-size: 11px; font-weight: 500; color: #1a1a1a;">重要预警</div>
                    </div>
                    <div style="font-size: 10px; color: #6b6b6b; line-height: 1.5;">
                        客诉率 2%-5% 或 关键指标连续下滑<br>
                        24小时内响应 / 每周跟踪
                    </div>
                </div>
                <div style="flex: 1; background: #faf9f7; border: 1px dashed #e8e4dc; border-radius: 8px; padding: 12px;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                        <div style="width: 24px; height: 24px; background: #8a8580; border-radius: 4px; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;">P2</div>
                        <div style="font-size: 11px; font-weight: 500; color: #1a1a1a;">一般预警</div>
                    </div>
                    <div style="font-size: 10px; color: #6b6b6b; line-height: 1.5;">
                        客诉率 &lt; 2% 或 单项指标异常<br>
                        3个工作日内响应 / 常规监控
                    </div>
                </div>
            </div>
        </div>

        <div class="footnote">预警等级根据业务影响程度和紧急程度综合判定，触发后自动进入对应响应流程</div>
    </div>
</body>
</html>
