<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异常模式识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #faf9f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .canvas {
            width: 680px;
            background: #faf9f7;
        }
        .title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 11px;
            color: #6b6b6b;
            margin-bottom: 20px;
        }
        .patterns-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .pattern-card {
            background: #f5f4f1;
            border: 1px solid #d4d1c7;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            gap: 16px;
        }
        .pattern-visual {
            flex-shrink: 0;
            width: 180px;
            height: 100px;
            background: #faf9f7;
            border: 1px solid #e8e4dc;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }
        .pattern-chart {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            height: 84px;
        }
        .pattern-info {
            flex: 1;
        }
        .pattern-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .pattern-badge {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        .badge-critical { background: #d4845a; color: #fff; }
        .badge-warning { background: #c98a6a; color: #fff; }
        .badge-attention { background: #8a8580; color: #fff; }
        .pattern-name {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: #1a1a1a;
        }
        .pattern-desc {
            font-size: 10px;
            color: #6b6b6b;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .pattern-indicators {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .indicator-tag {
            font-size: 9px;
            padding: 3px 6px;
            background: #faf9f7;
            border: 1px solid #d4d1c7;
            border-radius: 3px;
            color: #6b6b6b;
        }
        .chart-line {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
        }
        .chart-grid {
            stroke: #e8e4dc;
            stroke-width: 0.5;
        }
        .chart-dot {
            fill: #c98a6a;
        }
        .footnote {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 10px;
            font-style: italic;
            color: #6b6b6b;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="title">异常模式识别</div>
        <div class="subtitle">3种典型供应商表现恶化模式</div>

        <div class="patterns-container">
            <!-- Pattern 1: 阶梯下滑 -->
            <div class="pattern-card">
                <div class="pattern-visual">
                    <svg class="pattern-chart" viewBox="0 0 160 80">
                        <!-- Grid -->
                        <line class="chart-grid" x1="0" y1="20" x2="160" y2="20"/>
                        <line class="chart-grid" x1="0" y1="40" x2="160" y2="40"/>
                        <line class="chart-grid" x1="0" y1="60" x2="160" y2="60"/>
                        <!-- Step down line -->
                        <path class="chart-line" stroke="#d4845a" d="M 8 12 L 50 12 L 50 32 L 90 32 L 90 52 L 152 52"/>
                        <!-- Dots -->
                        <circle class="chart-dot" cx="8" cy="12" r="3"/>
                        <circle class="chart-dot" cx="50" cy="12" r="3"/>
                        <circle class="chart-dot" cx="50" cy="32" r="3"/>
                        <circle class="chart-dot" cx="90" cy="32" r="3"/>
                        <circle class="chart-dot" cx="90" cy="52" r="3"/>
                        <circle class="chart-dot" cx="152" cy="52" r="3"/>
                    </svg>
                </div>
                <div class="pattern-info">
                    <div class="pattern-header">
                        <span class="pattern-badge badge-critical">P0紧急</span>
                        <span class="pattern-name">阶梯下滑模式</span>
                    </div>
                    <div class="pattern-desc">
                        指标呈阶梯状逐级下跌，每次下跌后维持低位。通常由核心问题未解决引发连锁反应。
                    </div>
                    <div class="pattern-indicators">
                        <span class="indicator-tag">连续多周下滑</span>
                        <span class="indicator-tag">跨品类恶化</span>
                        <span class="indicator-tag">无反弹迹象</span>
                        <span class="indicator-tag">立即约谈</span>
                    </div>
                </div>
            </div>

            <!-- Pattern 2: 波动震荡 -->
            <div class="pattern-card">
                <div class="pattern-visual">
                    <svg class="pattern-chart" viewBox="0 0 160 80">
                        <!-- Grid -->
                        <line class="chart-grid" x1="0" y1="20" x2="160" y2="20"/>
                        <line class="chart-grid" x1="0" y1="40" x2="160" y2="40"/>
                        <line class="chart-grid" x1="0" y1="60" x2="160" y2="60"/>
                        <!-- Oscillating line -->
                        <path class="chart-line" stroke="#c98a6a" d="M 8 20 Q 30 8 50 20 T 90 25 T 130 35 T 152 40"/>
                        <!-- Dots -->
                        <circle class="chart-dot" cx="8" cy="20" r="3"/>
                        <circle class="chart-dot" cx="50" cy="20" r="3"/>
                        <circle class="chart-dot" cx="90" cy="25" r="3"/>
                        <circle class="chart-dot" cx="130" cy="35" r="3"/>
                        <circle class="chart-dot" cx="152" cy="40" r="3"/>
                    </svg>
                </div>
                <div class="pattern-info">
                    <div class="pattern-header">
                        <span class="pattern-badge badge-warning">P1重要</span>
                        <span class="pattern-name">波动震荡模式</span>
                    </div>
                    <div class="pattern-desc">
                        指标上下波动但整体呈下降趋势。反映出供应商能力不稳定，需深入分析波动原因。
                    </div>
                    <div class="pattern-indicators">
                        <span class="indicator-tag">忽高忽低</span>
                        <span class="indicator-tag">方差增大</span>
                        <span class="indicator-tag">偶发性异常</span>
                        <span class="indicator-tag">需跟踪观察</span>
                    </div>
                </div>
            </div>

            <!-- Pattern 3: 断崖下跌 -->
            <div class="pattern-card">
                <div class="pattern-visual">
                    <svg class="pattern-chart" viewBox="0 0 160 80">
                        <!-- Grid -->
                        <line class="chart-grid" x1="0" y1="20" x2="160" y2="20"/>
                        <line class="chart-grid" x1="0" y1="40" x2="160" y2="40"/>
                        <line class="chart-grid" x1="0" y1="60" x2="160" y2="60"/>
                        <!-- Cliff drop line -->
                        <path class="chart-line" stroke="#d4845a" d="M 8 12 L 70 12 L 85 68 L 152 68"/>
                        <!-- Dots -->
                        <circle class="chart-dot" cx="8" cy="12" r="3"/>
                        <circle class="chart-dot" cx="70" cy="12" r="3"/>
                        <circle class="chart-dot" cx="85" cy="68" r="3"/>
                        <circle class="chart-dot" cx="152" cy="68" r="3"/>
                        <!-- Alert indicator -->
                        <line x1="77" y1="20" x2="77" y2="60" stroke="#d4845a" stroke-width="1" stroke-dasharray="3 2"/>
                    </svg>
                </div>
                <div class="pattern-info">
                    <div class="pattern-header">
                        <span class="pattern-badge badge-critical">P0紧急</span>
                        <span class="pattern-name">断崖下跌模式</span>
                    </div>
                    <div class="pattern-desc">
                        指标突然急剧下跌，通常由突发事件引发（人员变动、系统故障、资金问题）。
                    </div>
                    <div class="pattern-indicators">
                        <span class="indicator-tag">单日暴跌</span>
                        <span class="indicator-tag">触达阈值</span>
                        <span class="indicator-tag">需紧急介入</span>
                        <span class="indicator-tag">2小时响应</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footnote">模式识别基于过去8周数据趋势，结合业务场景判断触发对应的预警级别和响应动作</div>
    </div>
</body>
</html>
