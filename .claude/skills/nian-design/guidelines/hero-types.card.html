<!-- @dsCard group="Hero" viewport="700x360" subtitle="6 Hero variants — V1经典/V2数据/V3品牌/V4宣言/V5极简/V6水印" name="Hero Types" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .hero{border:1px solid var(--border);padding:14px;background:var(--surface);position:relative;overflow:hidden;min-height:90px}
  .hero-label{font-size:8px;font-family:var(--font-data);letter-spacing:.06em;text-transform:uppercase;color:var(--text-disabled);margin-bottom:6px}
  .hero-title{font-family:var(--font-display);color:var(--text-display);line-height:1.1;margin-bottom:4px}
  .hero-sub{font-size:9px;color:var(--text-secondary);line-height:1.3}
  .hero-tag{font-size:7px;font-family:var(--font-data);letter-spacing:.04em;text-transform:uppercase;position:absolute;top:8px;right:8px;padding:2px 5px;border-radius:2px;background:var(--surface-raised);color:var(--text-disabled)}
  .desc{font-size:10px;color:var(--text-secondary);line-height:1.5;margin-top:12px}
  .desc b{color:var(--text-primary);font-weight:600}
</style>
</head>
<body>
<div class="title">Hero Types</div>
<div class="grid">
  <div class="hero">
    <div class="hero-tag">V1</div>
    <div class="hero-label">经典居中</div>
    <div class="hero-title" style="font-size:20px;font-weight:300;text-align:center">品牌宣言</div>
    <div class="hero-sub" style="text-align:center">大字号 + 居中 + 留白</div>
  </div>
  <div class="hero">
    <div class="hero-tag">V2</div>
    <div class="hero-label">数据驱动</div>
    <div class="hero-title" style="font-size:18px;font-weight:500">96px 数字</div>
    <div class="hero-sub">KPI 大数字 + Ghost 水印</div>
  </div>
  <div class="hero">
    <div class="hero-tag">V3</div>
    <div class="hero-label">品牌展示</div>
    <div class="hero-title" style="font-size:16px;font-weight:400">色卡 + 标识</div>
    <div class="hero-sub">品牌色卡矩阵 + dot-matrix</div>
  </div>
  <div class="hero">
    <div class="hero-tag">V4</div>
    <div class="hero-label">宣言对齐</div>
    <div class="hero-title" style="font-size:18px;font-weight:600;letter-spacing:-.02em">一句断言</div>
    <div class="hero-sub">粗体宣言 + 左对齐 + 支撑句</div>
  </div>
  <div class="hero">
    <div class="hero-tag">V5</div>
    <div class="hero-label">极简留白</div>
    <div class="hero-title" style="font-size:14px;font-weight:300;color:var(--text-secondary)">极简</div>
    <div class="hero-sub">最小元素 + 最大留白</div>
  </div>
  <div class="hero" style="background:var(--surface-raised)">
    <div class="hero-tag">V6</div>
    <div class="hero-label">水印为主</div>
    <div style="position:absolute;font-family:var(--font-display);font-size:48px;font-weight:700;color:var(--text-display);opacity:.04;right:4px;bottom:2px;line-height:.8;pointer-events:none">KPI</div>
    <div class="hero-title" style="font-size:14px;font-weight:500">数据报告</div>
    <div class="hero-sub">Ghost 水印为主角</div>
  </div>
</div>
<div class="desc">选 Hero 类型看内容调性：品牌展示→V1/V3，数据报告→V2/V6，分析决策→V4，知识沉淀→V5。<b>每页只用一种 Hero 类型</b>。</div>
</body>
</html>
