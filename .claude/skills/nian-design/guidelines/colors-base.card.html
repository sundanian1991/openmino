<!-- @dsCard group="Colors" viewport="700x280" subtitle="7-color Brand DNA — Primary 80% + Accent 10% + Scene 10%" name="Base Palette" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .group{margin-bottom:14px}
  .group-label{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-disabled);margin-bottom:6px}
  .row{display:flex;gap:8px;margin-bottom:4px}
  .swatch{width:56px;height:40px;border-radius:2px;display:flex;align-items:flex-end;padding:3px 5px}
  .swatch span{font-size:8px;font-family:var(--font-data);letter-spacing:.02em;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
  .swatch--light span{color:var(--text-primary);text-shadow:none}
  .desc{font-size:10px;color:var(--text-secondary);line-height:1.5;margin-top:12px}
  .desc b{color:var(--text-primary);font-weight:600}
</style>
</head>
<body>
<div class="title">Base Palette</div>
<div class="group">
  <div class="group-label">Primary — 80%</div>
  <div class="row">
    <div class="swatch" style="background:var(--darkgray)"><span>--darkgray</span></div>
    <div class="swatch" style="background:var(--olive)"><span>--olive</span></div>
    <div class="swatch" style="background:var(--earth)"><span>--earth</span></div>
  </div>
</div>
<div class="group">
  <div class="group-label">Accent — 10%</div>
  <div class="row">
    <div class="swatch swatch--light" style="background:var(--yellow)"><span>--yellow</span></div>
    <div class="swatch" style="background:var(--orange)"><span>--orange</span></div>
  </div>
</div>
<div class="group">
  <div class="group-label">Scene — 10%</div>
  <div class="row">
    <div class="swatch" style="background:var(--glacier)"><span>--glacier</span></div>
    <div class="swatch swatch--light" style="background:var(--rock)"><span>--rock</span></div>
  </div>
</div>
<div class="desc"><b>--darkgray</b> 为全局基底色，不单独选为页面主色。<b>--yellow</b> 仅用于关键数据高亮和标签点缀，禁止做大面积背景。</div>
</body>
</html>
