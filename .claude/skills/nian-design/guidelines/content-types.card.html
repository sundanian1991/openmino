<!-- @dsCard group="Layout" viewport="700x200" subtitle="4 content types — 品牌展示/数据报告/分析决策/知识沉淀" name="Content Types" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .types{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .type{border:1px solid var(--border);padding:12px;background:var(--surface)}
  .type-name{font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
  .type-meta{font-size:9px;color:var(--text-secondary);line-height:1.5}
  .type-meta span{display:block}
  .type-hero{font-family:var(--font-display);color:var(--text-display);margin-top:6px;line-height:1}
  .desc{font-size:10px;color:var(--text-secondary);line-height:1.5;margin-top:12px}
  .desc b{color:var(--text-primary);font-weight:600}
</style>
</head>
<body>
<div class="title">Content Types</div>
<div class="types">
  <div class="type">
    <div class="type-name">品牌展示</div>
    <div class="type-meta"><span>5-10 页</span><span>低密度</span><span>Hero 96-120px</span></div>
    <div class="type-hero" style="font-size:20px;font-weight:300">V1/V3</div>
  </div>
  <div class="type">
    <div class="type-name">数据报告</div>
    <div class="type-meta"><span>10-20 页</span><span>高密度</span><span>Hero 48-64px</span></div>
    <div class="type-hero" style="font-size:16px;font-weight:500">V2/V6</div>
  </div>
  <div class="type">
    <div class="type-name">分析决策</div>
    <div class="type-meta"><span>8-15 页</span><span>中密度</span><span>Hero 48-64px</span></div>
    <div class="type-hero" style="font-size:16px;font-weight:600;letter-spacing:-.01em">V4</div>
  </div>
  <div class="type">
    <div class="type-name">知识沉淀</div>
    <div class="type-meta"><span>15-30 页</span><span>中密度</span><span>Hero 48-64px</span></div>
    <div class="type-hero" style="font-size:14px;font-weight:300;color:var(--text-secondary)">V5</div>
  </div>
</div>
<div class="desc">选内容类型决定<b>页数、信息密度、Hero 字号</b>。同一报告中内容类型可混合（前几页品牌展示，中间数据报告，最后分析决策）。</div>
</body>
</html>
