<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nian-design 组件审查台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --olive: #4A5D3A;
  --earth: #8B7355;
  --glacier: #2A4A5A;
  --orange: #E55B2B;
  --yellow: #FFD100;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --raised: #F5F5F0;
  --border: #E5E5E0;
  --border-vis: #C0C0B8;
  --text-display: #2C2C2C;
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-disabled: #A0A0A0;
  --keep: #2E7D32;
  --delete: #C62828;
  --review: #E65100;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased}

/* NAV */
.nav{position:sticky;top:0;background:rgba(250,250,248,0.95);border-bottom:1px solid var(--border);z-index:100;padding:0 24px;backdrop-filter:blur(8px)}
.nav-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-brand .wordmark{font-family:Georgia,serif;font-size:15px;font-weight:700;letter-spacing:0.02em;color:var(--text-display)}
.nav-stats{display:flex;gap:16px;align-items:center}
.stat-pill{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:3px 10px;border-radius:4px;display:inline-flex;align-items:center;gap:5px}
.stat-pill--keep{background:rgba(46,125,50,0.08);color:var(--keep);border:1px solid rgba(46,125,50,0.2)}
.stat-pill--delete{background:rgba(198,40,40,0.08);color:var(--delete);border:1px solid rgba(198,40,40,0.2)}
.stat-pill--review{background:rgba(230,81,0,0.08);color:var(--review);border:1px solid rgba(230,81,0,0.2)}
.stat-pill--total{background:var(--raised);color:var(--text-secondary);border:1px solid var(--border)}

/* HERO */
.page-hero{max-width:1120px;margin:0 auto;padding:48px 40px 32px;border-bottom:1px solid var(--border)}
.page-hero h1{font-family:Georgia,serif;font-size:32px;font-weight:700;color:var(--text-display);line-height:1.2;margin-bottom:8px}
.page-hero p{font-size:14px;color:var(--text-secondary);max-width:640px}
.page-hero .actions{display:flex;gap:12px;margin-top:20px}
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all 150ms ease-out;background:var(--surface);color:var(--text-primary)}
.btn:hover{background:var(--raised)}
.btn--primary{background:var(--olive);color:#fff;border-color:var(--olive)}
.btn--primary:hover{background:#3d4f30}
.btn--danger{background:transparent;color:var(--delete);border-color:rgba(198,40,40,0.3)}
.btn--danger:hover{background:rgba(198,40,40,0.06)}

/* LEVEL SECTION */
.level-section{max-width:1120px;margin:0 auto;padding:32px 40px}
.level-header{display:flex;align-items:baseline;gap:16px;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.level-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--earth);padding:3px 8px;border:1px solid rgba(139,115,85,0.3);border-radius:4px}
.level-title{font-family:Georgia,serif;font-size:24px;font-weight:700;color:var(--text-display)}
.level-desc{font-size:13px;color:var(--text-secondary)}
.level-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-disabled);margin-left:auto}

/* STRUCTURE GROUP */
.struct-group{margin-bottom:32px}
.struct-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.struct-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px}
.struct-tag--dual{background:rgba(74,93,58,0.08);color:var(--olive);border:1px solid rgba(74,93,58,0.2)}
.struct-tag--grid{background:rgba(42,74,90,0.08);color:var(--glacier);border:1px solid rgba(42,74,90,0.2)}
.struct-tag--chain{background:rgba(139,115,85,0.08);color:var(--earth);border:1px solid rgba(139,115,85,0.2)}
.struct-tag--bar{background:rgba(229,91,43,0.08);color:var(--orange);border:1px solid rgba(229,91,43,0.2)}
.struct-tag--num{background:rgba(74,93,58,0.08);color:var(--olive);border:1px solid rgba(74,93,58,0.2)}
.struct-tag--compact{background:rgba(42,74,90,0.08);color:var(--glacier);border:1px solid rgba(42,74,90,0.2)}
.struct-tag--area{background:rgba(139,115,85,0.08);color:var(--earth);border:1px solid rgba(139,115,85,0.2)}
.struct-tag--radial{background:rgba(42,74,90,0.08);color:var(--glacier);border:1px solid rgba(42,74,90,0.2)}
.struct-tag--polygon{background:rgba(229,91,43,0.08);color:var(--orange);border:1px solid rgba(229,91,43,0.2)}
.struct-tag--organic{background:rgba(74,93,58,0.08);color:var(--olive);border:1px solid rgba(74,93,58,0.2)}
.struct-tag--weave{background:rgba(139,115,85,0.08);color:var(--earth);border:1px solid rgba(139,115,85,0.2)}
.struct-tag--iso{background:rgba(42,74,90,0.08);color:var(--glacier);border:1px solid rgba(42,74,90,0.2)}
.struct-tag--fold{background:rgba(229,91,43,0.08);color:var(--orange);border:1px solid rgba(229,91,43,0.2)}
.struct-tag--deco{background:var(--raised);color:var(--text-secondary);border:1px solid var(--border)}
.struct-name{font-size:13px;font-weight:500;color:var(--text-secondary)}

/* COMPONENT CARD */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.comp-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 150ms ease-out}
.comp-card:hover{border-color:var(--border-vis)}
.comp-card[data-state="keep"]{border-color:rgba(46,125,50,0.4);background:rgba(46,125,50,0.02)}
.comp-card[data-state="delete"]{border-color:rgba(198,40,40,0.4);background:rgba(198,40,40,0.02);opacity:0.7}
.comp-card[data-state="review"]{border-color:rgba(230,81,0,0.4);background:rgba(230,81,0,0.02)}
.comp-card__head{padding:14px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.comp-code{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--olive);padding:2px 6px;border:1px solid rgba(74,93,58,0.25);border-radius:3px;white-space:nowrap}
.comp-name{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--text-display);line-height:1.3}
.comp-card__body{padding:10px 16px}
.comp-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.comp-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.meta-tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;padding:2px 6px;border-radius:2px;background:var(--raised);color:var(--text-secondary);border:1px solid var(--border)}
.meta-tag--css{background:rgba(42,74,90,0.06);color:var(--glacier);border-color:rgba(42,74,90,0.15)}
.meta-tag--anchor{background:rgba(139,115,85,0.06);color:var(--earth);border-color:rgba(139,115,85,0.15)}
.meta-tag--showcase{background:rgba(74,93,58,0.06);color:var(--olive);border-color:rgba(74,93,58,0.15)}
.meta-tag--svg{background:rgba(229,91,43,0.06);color:var(--orange);border-color:rgba(229,91,43,0.15)}
.comp-note{font-size:11px;color:var(--text-disabled);font-style:italic;margin-top:4px;line-height:1.5}

/* ACTION BUTTONS */
.comp-actions{display:flex;gap:0;border-top:1px solid var(--border)}
.comp-actions button{flex:1;padding:8px 0;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;border:none;background:transparent;cursor:pointer;transition:all 150ms ease-out;color:var(--text-secondary)}
.comp-actions button+button{border-left:1px solid var(--border)}
.comp-actions .btn-keep:hover{background:rgba(46,125,50,0.1);color:var(--keep)}
.comp-actions .btn-delete:hover{background:rgba(198,40,40,0.1);color:var(--delete)}
.comp-actions .btn-review:hover{background:rgba(230,81,0,0.1);color:var(--review)}
.comp-card[data-state="keep"] .btn-keep{background:rgba(46,125,50,0.15);color:var(--keep)}
.comp-card[data-state="delete"] .btn-delete{background:rgba(198,40,40,0.15);color:var(--delete)}
.comp-card[data-state="review"] .btn-review{background:rgba(230,81,0,0.15);color:var(--review)}

/* OUTPUT */
.output-section{max-width:1120px;margin:0 auto;padding:32px 40px 96px}
.output-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;position:relative}
.output-box h3{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--text-display);margin-bottom:12px}
.output-box pre{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--text-primary);white-space:pre-wrap;word-break:break-all;background:var(--raised);padding:16px;border-radius:6px;border:1px solid var(--border);max-height:400px;overflow-y:auto}
.output-box .copy-btn{position:absolute;top:16px;right:16px}

/* LEVEL FILTER */
.level-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);cursor:pointer;transition:all 150ms ease-out}
.filter-btn:hover{background:var(--raised)}
.filter-btn.active{background:var(--olive);color:#fff;border-color:var(--olive)}

/* SVG TEMPLATES SECTION */
.svg-section{max-width:1120px;margin:0 auto;padding:32px 40px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="wordmark">nian-design</span>
      <span style="font-size:11px;color:var(--text-disabled);font-weight:500">组件审查台</span>
    </div>
    <div class="nav-stats">
      <span class="stat-pill stat-pill--total" id="stat-total">0 组件</span>
      <span class="stat-pill stat-pill--keep" id="stat-keep">0 保留</span>
      <span class="stat-pill stat-pill--delete" id="stat-delete">0 删除</span>
      <span class="stat-pill stat-pill--review" id="stat-review">0 待定</span>
    </div>
  </div>
</nav>

<div class="page-hero">
  <h1>组件审查台</h1>
  <p>逐个审查 nian-design 全部组件。标记保留/删除/待定，完成后复制审查结果给年老师。</p>
  <div class="actions">
    <button class="btn btn--primary" onclick="markAll('keep')">全部保留</button>
    <button class="btn btn--danger" onclick="markAll('delete')">全部删除</button>
    <button class="btn" onclick="markAll('')">全部重置</button>
    <button class="btn" onclick="scrollToOutput()">查看结果</button>
  </div>
</div>

<div id="app"></div>

<div class="output-section" id="output">
  <div class="output-box">
    <h3>审查结果</h3>
    <button class="btn copy-btn" onclick="copyOutput()">复制</button>
    <pre id="output-text">标记组件后自动生成...</pre>
  </div>
</div>

<script>
const DATA = [
  // ==================== HERO 级 ====================
  {id:"HF-01",name:"Full-width Statement",level:"hero",struct:"宣言",
   desc:"全幅文字声明。Georgia 超大字（96-120px），浅色背景，数据推到下方或边缘。",
   css:".hero-statement, .hero-statement-text",anchor:"宣言",
   note:"当核心信息是一个理念、立场、判断时选用。",
   showcase:"design-tokens.html"},
  {id:"HF-02",name:"Split View",level:"hero",struct:"双栏对照",
   desc:"左右分区。一侧文字叙事，另一侧视觉元素（大数字/图像/对比块）。",
   css:".hero-split, .hero-split-text, .hero-split-visual",anchor:"数据矩阵/对比/图像",
   note:"Hero 区需要同时呈现叙事和量化证据时选用。",
   showcase:"design-tokens.html, core-components.html"},
  {id:"HF-03",name:"Numeral Grid / LED Card",level:"hero",struct:"方阵排列",
   desc:"方阵排列的大数字卡片。JetBrains Mono 48-120px，每个数字上方小标签，下方上下文行。",
   css:".hero-numeral, .metric-card",anchor:"数据矩阵",
   note:"2-4 个硬数据需要同时亮相时选用。",
   showcase:"core-components.html"},
  {id:"HF-04",name:"Dark Statement",level:"hero",struct:"宣言",
   desc:"深色背景全幅声明。场景色做底，白色文字，仪式感强。",
   css:".hero-dark, .hero-dark--glacier/--olive/--gray",anchor:"宣言/对比",
   note:"品牌宣言墙、关键原理声明。慎用——暗色 Hero 用多则廉价。",
   showcase:"design-tokens.html"},
  {id:"HF-05",name:"Scale Jump",level:"hero",struct:"大数字+小标签",
   desc:"尺度跳跃。同一视口 8px 到 200px，无过渡。font-weight:200 超细大数字。",
   css:".scale-jump, .scale-jump__macro--mono",anchor:"宣言/数据矩阵",
   note:"Polestar spec-as-identity。一个数字撑满视口，旁边注释小到几乎看不见。",
   showcase:"extended-components.html"},
  {id:"HF-06",name:"Seismic Wave",level:"hero",struct:"宣言",
   desc:"连续振动波 Hero。OLED 暗底 + 多层正弦波叠加，波形即品牌。",
   css:".hero-seismic, .hero-seismic__waves, .hero-seismic__leds",anchor:"宣言/数据矩阵",
   note:"波形不是装饰，是数据。8 层正弦波叠加，暗底上的波形 = 地震仪上的品牌宣言。",
   showcase:"2026-05-31-component-showcase.html"},

  // 扩展 Hero
  {id:"H1",name:"Hero Split (ext)",level:"hero",struct:"双栏对照",
   desc:"双栏：左文字右深色面板，ghost 水印。",
   css:".hero-split",anchor:"品牌宣言/阅读+分析",
   showcase:"extended-components.html"},
  {id:"H2",name:"Hero Pulse",level:"hero",struct:"宣言",
   desc:"全屏深色 + 动画扫描线 + 三栏指标条。",
   css:".hero-pulse",anchor:"数据分析中心",
   showcase:"extended-components.html"},
  {id:"H3",name:"Hero Runway",level:"hero",struct:"双栏对照",
   desc:"双栏：左声明右深色面板 + ghost 年份。",
   css:".hero-runway",anchor:"时尚/产品",
   showcase:"extended-components.html"},
  {id:"H4",name:"Hero Sky",level:"hero",struct:"双栏对照",
   desc:"双栏：左文字右深蓝面板+航线标签。",
   css:".hero-sky",anchor:"航空/旅行",
   showcase:"extended-components.html"},
  {id:"H5",name:"Hero Bottle",level:"hero",struct:"三栏",
   desc:"三栏：左文字+中瓶型线框+右年份。",
   css:".hero-bottle",anchor:"烈酒/包装产品",
   showcase:"extended-components.html"},
  {id:"H6",name:"Hero Scoreboard",level:"hero",struct:"方阵排列",
   desc:"深色全屏 + 比分牌三栏布局。",
   css:".hero-scoreboard",anchor:"体育/竞赛",
   showcase:"stadium-sport.html"},
  {id:"H7",name:"Hero Entrance",level:"hero",struct:"宣言",
   desc:"浅色留白 + 底部文字 + 圆形封印。",
   css:".hero-entrance",anchor:"博物馆/展览",
   showcase:"moderna-museet.html"},
  {id:"H8",name:"Hero Infra",level:"hero",struct:"宣言",
   desc:"深色全屏 + 60px 网格线背景。",
   css:".hero-infra",anchor:"电信/基础设施",
   showcase:"ericsson-infra.html"},
  {id:"H9",name:"Hero Reveal",level:"hero",struct:"宣言",
   desc:"深色全屏 + 水平速度线 + 右下徽章。",
   css:".hero-reveal",anchor:"汽车/产品发布",
   showcase:"f1-telemetry.html"},

  // ==================== SECTION 级 ====================
  {id:"SF-01",name:"Tension Grid",level:"section",struct:"双栏对照",
   desc:"2x2 网格，深浅双色块承载对立力量。中间可插跨列行标注核心矛盾。",
   css:".tension-grid",anchor:"对比/张力",
   note:"两股对立力量需要同屏展示时，最克制也最有力的形式。",
   showcase:"core-components.html"},
  {id:"SF-02",name:"Pipeline / VS",level:"section",struct:"双栏对照",
   desc:"左右双列 + 中间分隔线（VS 或竖线）。一侧一个阵营，项目对列。",
   css:".flow-pipeline",anchor:"对比/张力",
   note:"比文字列表更有对抗感，比 Tension Grid 更适合项目化内容。",
   showcase:"core-components.html"},
  {id:"SF-03",name:"Timeline Track",level:"section",struct:"链式节点",
   desc:"垂直/水平时间轴 + 节点。每个节点含阶段标签、标题、描述、度量值。",
   css:".timeline-track",anchor:"时间线",
   note:"有先后顺序的内容首选。时间线本身就是叙事。",
   showcase:"core-components.html"},
  {id:"SF-04",name:"Bento Grid",level:"section",struct:"不等分网格",
   desc:"不等分网格。部分单元格跨列或跨行，信息密度和视觉节奏同时最大化。",
   css:".bento-grid",anchor:"结构/体系",
   note:"信息块多且需要同时展示时首选。跨列打破常规。",
   showcase:"extended-components.html"},
  {id:"SF-05",name:"Layer Stack",level:"section",struct:"不等分网格",
   desc:"纵向分层卡片。每层一个颜色标记，展示层级关系。",
   css:".layer-stack",anchor:"结构/体系",
   note:"有明确上下层级关系时选用。比 Bento 更强调从底到顶的顺序。",
   showcase:"core-components.html"},
  {id:"SF-06",name:"Comparison Block",level:"section",struct:"双栏对照",
   desc:"旧/新、前/后对比。左色块 + 右色块，中间分隔线。",
   css:".comparison",anchor:"对比/张力",
   note:"有明确 before/after 结构时选用。比 Tension Grid 更适合规则对比。",
   showcase:"core-components.html"},
  {id:"SF-07",name:"Card Triad / Quad",level:"section",struct:"方阵排列",
   desc:"3 或 4 张等宽卡片，每张卡片顶部彩色边框，内部层级分明。",
   css:".card-triad, .card-quad",anchor:"数据矩阵/结构",
   note:"平行概念需要并列展示时首选。",
   showcase:"core-components.html"},
  {id:"SF-08",name:"Level Track",level:"section",struct:"链式节点",
   desc:"水平进度轨道。圆形节点 + 连线 + 标签，展示阶段/能力/成熟度。",
   css:".level-track",anchor:"时间线/结构",
   note:"有明确阶段递进关系时选用。比 Timeline 更强调当前位置。",
   showcase:"core-components.html"},
  {id:"SF-09",name:"Typography Showcase",level:"section",struct:"锚点+列表",
   desc:"左固定锚点 + 右延伸内容。左侧字体/风格标签，右侧实际排版效果。",
   css:".typo-showcase",anchor:"结构/体系",
   note:"品牌规范页、字体展示页首选。",
   showcase:"design-tokens.html"},
  {id:"SF-10",name:"Step Sequence",level:"section",struct:"锚点+列表",
   desc:"左固定步骤号 + 右延伸步骤内容。垂直连线串联各步骤。",
   css:".step-sequence",anchor:"时间线/结构",
   note:"有明确步骤顺序但不需要时间轴的精确时间点时选用。",
   showcase:"extended-components.html"},
  {id:"SF-17",name:"Kinetic Layers",level:"section",struct:"不等分网格",
   desc:"动能分层。层叠透明度创造深度，前景全不透明，后景渐隐。",
   css:".kinetic-layers",anchor:"层级关系",
   note:"Sana Labs 渐变原生 + SDL Sigma 包装。",
   showcase:"sdl-design-principles.html"},
  {id:"SF-18",name:"Fjord Silhouette Profile",level:"section",struct:"面积填充",

    const items = DATA.filter(d => d.level === level.key);
    if (!items.length) return;

    html += `<div class="level-section" id="level-${level.key}">`;
    html += `<div class="level-header">`;
    html += `<span class="level-num">${level.num}</span>`;
    html += `<span class="level-title">${level.label}</span>`;
    html += `<span class="level-desc">${level.desc}</span>`;
    html += `<span class="level-count">${items.length} 组件</span>`;
    html += `</div>`;

    // Group by structure
    const groups = {};
    items.forEach(item => {
      const s = item.struct || '其他';
      if (!groups[s]) groups[s] = [];
      groups[s].push(item);
    });

    Object.entries(groups).forEach(([structName, comps]) => {
      const tagClass = STRUCT_TAGS[structName] || 'deco';
      html += `<div class="struct-group">`;
      html += `<div class="struct-header"><span class="struct-tag struct-tag--${tagClass}">${structName}</span><span class="struct-name">${comps.length} 个同族组件</span></div>`;
      html += `<div class="comp-grid">`;

      comps.forEach(comp => {
        const st = states[comp.id] || "";
        html += `<div class="comp-card" data-id="${comp.id}" data-state="${st}">`;
        html += `<div class="comp-card__head">`;
        html += `<div><span class="comp-code">${comp.id}</span></div>`;
        html += `<span class="comp-name">${comp.name}</span>`;
        html += `</div>`;
        html += `<div class="comp-card__body">`;
        html += `<div class="comp-desc">${comp.desc}</div>`;
        html += `<div class="comp-meta">`;
        if (comp.css) comp.css.split(', ').forEach(c => html += `<span class="meta-tag meta-tag--css">${c}</span>`);
        if (comp.anchor) html += `<span class="meta-tag meta-tag--anchor">${comp.anchor}</span>`;
        if (comp.showcase) comp.showcase.split(', ').forEach(s => {
          const cls = comp.isSvg ? 'meta-tag--svg' : 'meta-tag--showcase';
          html += `<span class="meta-tag ${cls}">${s.replace('svg-templates/','')}</span>`;
        });
        html += `</div>`;
        if (comp.note) html += `<div class="comp-note">${comp.note}</div>`;
        html += `</div>`;
        html += `<div class="comp-actions">`;
        html += `<button class="btn-keep" onclick="mark('${comp.id}','keep')">保留</button>`;
        html += `<button class="btn-delete" onclick="mark('${comp.id}','delete')">删除</button>`;
        html += `<button class="btn-review" onclick="mark('${comp.id}','review')">待定</button>`;
        html += `</div>`;
        html += `</div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
  });

  // SVG section header
  const svgItems = DATA.filter(d => d.isSvg);
  if (svgItems.length) {
    // Already included in detail level above
  }

  app.innerHTML = html;
  updateStats();
  updateOutput();
}

function mark(id, state) {
  if (states[id] === state) {
    states[id] = "";
  } else {
    states[id] = state;
  }
  const card = document.querySelector(`.comp-card[data-id="${id}"]`);
  if (card) card.dataset.state = states[id];
  updateStats();
  updateOutput();
}

function markAll(state) {
  DATA.forEach(d => states[d.id] = state);
  document.querySelectorAll('.comp-card').forEach(card => card.dataset.state = state);
  updateStats();
  updateOutput();
}

function updateStats() {
  const total = DATA.length;
  const keep = Object.values(states).filter(s => s === 'keep').length;
  const del = Object.values(states).filter(s => s === 'delete').length;
  const rev = Object.values(states).filter(s => s === 'review').length;
  document.getElementById('stat-total').textContent = `${total} 组件`;
  document.getElementById('stat-keep').textContent = `${keep} 保留`;
  document.getElementById('stat-delete').textContent = `${del} 删除`;
  document.getElementById('stat-review').textContent = `${rev} 待定`;
}

function updateOutput() {
  const keeps = DATA.filter(d => states[d.id] === 'keep');
  const deletes = DATA.filter(d => states[d.id] === 'delete');
  const reviews = DATA.filter(d => states[d.id] === 'review');
  const undecided = DATA.filter(d => !states[d.id]);

  let out = '';
  out += `=== nian-design 组件审查结果 ===\n`;
  out += `总计: ${DATA.length} | 保留: ${keeps.length} | 删除: ${deletes.length} | 待定: ${reviews.length} | 未标记: ${undecided.length}\n\n`;

  if (keeps.length) {
    out += `--- 保留 ---\n`;
    LEVELS.forEach(level => {
      const levelKeeps = keeps.filter(k => k.level === level.key);
      if (!levelKeeps.length) return;
      out += `\n[${level.label}]\n`;
      levelKeeps.forEach(k => out += `  ${k.id} · ${k.name}\n`);
    });
    out += '\n';
  }

  if (deletes.length) {
    out += `--- 删除 ---\n`;
    LEVELS.forEach(level => {
      const levelDels = deletes.filter(k => k.level === level.key);
      if (!levelDels.length) return;
      out += `\n[${level.label}]\n`;
      levelDels.forEach(k => out += `  ${k.id} · ${k.name}\n`);
    });
    out += '\n';
  }

  if (reviews.length) {
    out += `--- 待定 ---\n`;
    LEVELS.forEach(level => {
      const levelRevs = reviews.filter(k => k.level === level.key);
      if (!levelRevs.length) return;
      out += `\n[${level.label}]\n`;
      levelRevs.forEach(k => out += `  ${k.id} · ${k.name}\n`);
    });
    out += '\n';
  }

  if (undecided.length) {
    out += `--- 未标记 ---\n`;
    LEVELS.forEach(level => {
      const levelUn = undecided.filter(k => k.level === level.key);
      if (!levelUn.length) return;
      out += `\n[${level.label}]\n`;
      levelUn.forEach(k => out += `  ${k.id} · ${k.name}\n`);
    });
  }

  document.getElementById('output-text').textContent = out;
}

function scrollToOutput() {
  document.getElementById('output').scrollIntoView({behavior:'smooth'});
}

function copyOutput() {
  const text = document.getElementById('output-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

render();
</script>
</body>
</html>
