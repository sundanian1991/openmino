<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nian-design Component Review R2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#F5F5F0;color:#1A1A1A;min-height:100vh}

/* Sticky Nav */
.nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #E5E5E0;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.nav h1{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;letter-spacing:-.02em;white-space:nowrap}
.nav-sep{width:1px;height:24px;background:#E5E5E0}

/* Category tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border:1px solid #E5E5E0;border-radius:4px;background:#fff;color:#6B6B6B;cursor:pointer;transition:all .15s ease;white-space:nowrap}
.tab:hover{border-color:#2C2C2C;color:#1A1A1A}
.tab.active{background:#2C2C2C;color:#fff;border-color:#2C2C2C}
.tab .count{font-weight:600;margin-left:4px}

/* Filters */
.filters{display:flex;gap:8px;align-items:center;margin-left:auto}
.filter-select{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;padding:6px 10px;border:1px solid #E5E5E0;border-radius:4px;background:#fff;color:#1A1A1A;cursor:pointer}
.status-filters{display:flex;gap:2px;border:1px solid #E5E5E0;border-radius:4px;overflow:hidden}
.sf-btn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:6px 10px;background:#fff;border:none;color:#6B6B6B;cursor:pointer;transition:all .15s ease}
.sf-btn:hover{background:#F5F5F0}
.sf-btn.active{background:#2C2C2C;color:#fff}

/* Main grid */
.main{padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:20px;padding-bottom:100px}

/* Card */
.card{background:#fff;border:1px solid #E5E5E0;border-radius:8px;overflow:hidden;transition:border-color .15s ease}
.card:hover{border-color:#CCC}
.card[data-status="keep"]{border-left:4px solid #2E7D32}
.card[data-status="drop"]{border-left:4px solid #C62828}

.card-head{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #F0F0EC}
.card-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:#999;letter-spacing:.04em}
.card-info{flex:1;margin-left:8px}
.card-name{font-size:13px;font-weight:600;color:#1A1A1A;line-height:1.3}
.card-source{font-family:'JetBrains Mono',monospace;font-size:9px;color:#999;letter-spacing:.02em;margin-top:2px}
.card-cat{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid #E5E5E0;border-radius:3px;color:#6B6B6B;white-space:nowrap}
.card-cat.hero{color:#4A5D3A;border-color:#4A5D3A}
.card-cat.section{color:#2A4A5A;border-color:#2A4A5A}
.card-cat.chart{color:#8B7355;border-color:#8B7355}
.card-cat.detail{color:#6B4C8A;border-color:#6B4C8A}
.card-cat.decorative{color:#E55B2B;border-color:#E55B2B}

/* Iframe container */
.card-frame{height:200px;background:#FAFAF8;position:relative;overflow:hidden}
.card-frame iframe{width:100%;height:100%;border:none}
.card-frame .js-badge{position:absolute;top:8px;right:8px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;background:rgba(229,91,43,.1);color:#E55B2B;padding:2px 6px;border-radius:2px}
.card-frame .placeholder{display:flex;align-items:center;justify-content:center;height:100%;font-family:'JetBrains Mono',monospace;font-size:10px;color:#CCC;letter-spacing:.04em}

/* Status buttons */
.card-actions{padding:8px 12px;display:flex;gap:6px;background:#FAFAF8}
.status-btn{flex:1;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 0;border:1px solid #E5E5E0;border-radius:4px;background:#fff;cursor:pointer;transition:all .15s ease;text-align:center;color:#6B6B6B}
.status-btn:hover{border-color:#999}
.status-btn.keep.active{background:#2E7D32;color:#fff;border-color:#2E7D32}
.status-btn.drop.active{background:#C62828;color:#fff;border-color:#C62828}
.status-btn.undecided.active{background:#F57F17;color:#fff;border-color:#F57F17}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid #E5E5E0;padding:12px 24px;display:flex;align-items:center;gap:24px}
.stats{display:flex;gap:16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B6B6B}
.stats .stat-val{font-weight:600;color:#1A1A1A}
.stats .stat-keep{color:#2E7D32}.stats .stat-drop{color:#C62828}.stats .stat-undecided{color:#F57F17}
.export-btn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;background:#2C2C2C;color:#fff;border:none;border-radius:4px;cursor:pointer;transition:opacity .15s ease}
.export-btn:hover{opacity:.85}

@media(max-width:900px){.main{grid-template-columns:1px;padding:16px}.nav{padding:8px 16px}}
</style>
</head>
<body>

<nav class="nav">
  <h1>nian-design R2</h1>
  <div class="nav-sep"></div>
  <div class="tabs" id="categoryTabs"></div>
  <div class="filters">
    <div class="status-filters" id="statusFilters">
      <button class="sf-btn active" data-status="all">All</button>

    </div>
    <select class="filter-select" id="sourceFilter">
      <option value="all">All Sources</option>

      <option value="ft-pink-charts.html">ft-pink-charts.html</option>
      <option value="haglofs-brand-analytics.html">haglofs-brand-analytics.html</option>

      <option value="wastberg-lighting.html">wastberg-lighting.html</option>
      <option value="供应商分量策略与方法论.html">供应商分量策略与方法论.html</option>
      <option value="供应商分量策略与方法论.html, 2026-05-31-#004-racing-rules.html, core-components.html">供应商分量策略与方法论.html, 2026-05-31-#004-racing-rules.html, core-components.html</option>
      <option value="岐力职场-数据.html">岐力职场-数据.html</option>
      <option value="岐力职场-绩效报告.html">岐力职场-绩效报告.html</option>
      <option value="岐力职场-绩效诊断.html">岐力职场-绩效诊断.html</option>
      <option value="数据讲故事视觉设计实战手册.html">数据讲故事视觉设计实战手册.html</option>
    </select>
  </div>
</nav>

<div class="main" id="grid"></div>

<div class="bottom-bar">
  <div class="stats">
    <span>Total: <span class="stat-val" id="totalCount">0</span></span>
    <span>Keep: <span class="stat-keep" id="keepCount">0</span></span>
    <span>Drop: <span class="stat-drop" id="dropCount">0</span></span>
    <span>Pending: <span class="stat-undecided" id="pendingCount">0</span></span>
    <span>Showing: <span class="stat-val" id="showCount">0</span></span>
  </div>
  <button class="export-btn" id="exportBtn">Export JSON</button>
</div>

<script src="srcdocs-r2.js"></script>
<script>
(function() {
  const STORAGE_KEY = 'nian-component-review-r2';
  const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function setStatus(id, status) {
    if (status === 'undecided') {
      delete state[id];
    } else {
      state[id] = status;
    }
    saveState();
    updateCardStatus(id);
    updateStats();
  }

  function updateCardStatus(id) {
    const card = document.querySelector('[data-id="' + id + '"]');
    if (!card) return;
    const s = state[id] || 'undecided';
    card.dataset.status = s;
    card.querySelectorAll('.status-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.action === s);
    });
  }

  function updateStats() {
    const total = COMPONENTS.length;
    let keep = 0, drop = 0;
    for (const k in state) {
      if (state[k] === 'keep') keep++;
      else if (state[k] === 'drop') drop++;
    }
    document.getElementById('totalCount').textContent = total;
    document.getElementById('keepCount').textContent = keep;
    document.getElementById('dropCount').textContent = drop;
    document.getElementById('pendingCount').textContent = total - keep - drop;
  }

  // Build category tabs
  const catCounts = { all: COMPONENTS.length };
  COMPONENTS.forEach(c => { catCounts[c.category] = (catCounts[c.category] || 0) + 1; });
  const catOrder = ['all', 'hero', 'section', 'chart', 'detail', 'decorative'];
  const tabsEl = document.getElementById('categoryTabs');
  catOrder.forEach(cat => {
    if (catCounts[cat] === undefined) return;
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === 'all' ? ' active' : '');
    btn.dataset.category = cat;
    btn.innerHTML = cat + '<span class="count">' + catCounts[cat] + '</span>';
    btn.onclick = () => {
      tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    tabsEl.appendChild(btn);
  });

  // Status filter
  let activeStatus = 'all';
  document.querySelectorAll('.sf-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = btn.dataset.status;
      renderGrid();
    };
  });

  // Source filter
  let activeSource = 'all';
  document.getElementById('sourceFilter').onchange = function() {
    activeSource = this.value;
    renderGrid();
  };

  // makeSrcdoc
  function makeSrcdoc(comp) {
    const designTokens = ':root{--primary-darkgray:#2C2C2C;--primary-olive:#4A5D3A;--primary-earth:#8B7355;--accent-orange:#E55B2B;--scene-glacier:#2A4A5A;--scene-moss:#3A5A3A;--scene-sand:#C4A35A;--bg:#FAFAF8;--surface:#FFFFFF;--surface-raised:#F5F5F0;--text-display:#1A1A1A;--text-primary:#2C2C2C;--text-secondary:#6B6B6B;--text-disabled:#999;--border:#E5E5E0;--border-visible:#CCC;--success:#2E7D32;--warning:#F57F17;--error:#C62828;--font-display:Georgia,serif;--font-body:\'Inter\',sans-serif;--font-mono:\'JetBrains Mono\',monospace;--r4:4px;--s1:4px;--s2:8px;--s3:12px;--s4:16px;--s6:24px;--s8:32px;--s10:40px;--s12:48px;--xs:10px;--sm:12px;--base:14px;--lg:18px;--xl:24px;--2xl:32px;--4xl:48px;--5xl:64px;--df:150ms;--dn:300ms;--eo:cubic-bezier(.4,0,.2,1);--td:var(--text-display);--tda:var(--text-disabled);--ts:var(--text-secondary);--bd:var(--border);--bdv:var(--border-visible);--olive:var(--primary-olive);--earth:var(--primary-earth);--pk:var(--text-display);--sr:var(--surface-raised);--sf:var(--surface);--sl:var(--text-secondary);--sv:var(--text-display);--fm:var(--font-mono);--fd:var(--font-display);--fb:var(--font-body)}';

    const css = comp.css || '';
    const html = comp.html || '';

    return '<!DOCTYPE html><html><head>' +
      '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">' +
      '<style>' + designTokens +
      '*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}' +
      'body{font-family:\'Inter\',sans-serif;background:#FAFAF8;color:#1A1A1A;display:flex;align-items:center;justify-content:center;min-height:100%;padding:12px;}' +
      css +
      '</style></head><body>' + html + '</body></html>';
  }

  // Render grid
  let visibleComps = [];

  function renderGrid() {
    const activeCat = document.querySelector('.tab.active')?.dataset.category || 'all';
    const grid = document.getElementById('grid');

    visibleComps = COMPONENTS.filter(c => {
      if (activeCat !== 'all' && c.category !== activeCat) return false;
      if (activeSource !== 'all' && c.source !== activeSource) return false;
      const s = state[c.id] || 'undecided';
      if (activeStatus !== 'all' && s !== activeStatus) return false;
      return true;
    });

    grid.innerHTML = '';
    document.getElementById('showCount').textContent = visibleComps.length;

    visibleComps.forEach(comp => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = comp.id;
      card.dataset.status = state[comp.id] || 'undecided';

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="card-num">#' + comp.id + '</span>' +
          '<div class="card-info">' +
            '<div class="card-name">' + escHtml(comp.name) + '</div>' +
            '<div class="card-source">' + escHtml(comp.source) + '</div>' +
          '</div>' +
          '<span class="card-cat ' + comp.category + '">' + comp.category + '</span>' +
        '</div>' +
        '<div class="card-frame" data-srcdoc="' + comp.id + '">' +
          '<div class="placeholder">Scroll to load</div>' +
          (comp.hasJS ? '<span class="js-badge">JS</span>' : '') +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="status-btn keep" data-action="keep">Keep</button>' +
          '<button class="status-btn undecided" data-action="undecided">--</button>' +
          '<button class="status-btn drop" data-action="drop">Drop</button>' +
        '</div>';

      // Status button events
      card.querySelectorAll('.status-btn').forEach(btn => {
        btn.onclick = () => setStatus(comp.id, btn.dataset.action);
      });

      // Restore status
      updateCardStatus(comp.id);
      grid.appendChild(card);
    });

    // Observe for lazy loading
    observeLazyLoad();
    updateStats();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Intersection Observer for lazy iframe loading
  function observeLazyLoad() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const frame = entry.target;
        const id = parseInt(frame.dataset.srcdoc);
        const comp = COMPONENTS.find(c => c.id === id);
        if (!comp || frame.dataset.loaded) return;

        const iframe = document.createElement('iframe');
        iframe.srcdoc = makeSrcdoc(comp);
        iframe.loading = 'lazy';
        frame.innerHTML = '';
        if (comp.hasJS) {
          const badge = document.createElement('span');
          badge.className = 'js-badge';
          badge.textContent = 'JS';
          frame.appendChild(badge);
        }
        frame.appendChild(iframe);
        frame.dataset.loaded = '1';
        observer.unobserve(frame);
      });
    }, { rootMargin: '200px' });

    document.querySelectorAll('.card-frame[data-srcdoc]').forEach(el => observer.observe(el));
  }

  // Export
  document.getElementById('exportBtn').onclick = function() {
    const result = {};
    COMPONENTS.forEach(c => {
      result[c.name] = state[c.id] || 'undecided';
    });
    const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'component-review-r2.json';
    a.click();
  };

  // Init
  renderGrid();
})();
</script>
</body>
</html>
