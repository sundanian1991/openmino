<!--
  Box Plot
  线段 + 矩形（须线 + 箱体 + 中位数 + 端帽）
  用法：修改每组的 whisker/box/median/cap 坐标，增减组数
  CSS 容器：.boxplot-chart
  结构特征：方阵排列 | Detail 级
-->
<div class="boxplot-chart">
  <svg viewBox="0 0 400 200" fill="none" style="font-family:var(--font-mono)">
    <!-- 坐标轴 -->
    <line x1="50" y1="170" x2="380" y2="170" stroke="var(--border)" stroke-width="1"/>
    <!-- 网格线 -->
    <line x1="50" y1="130" x2="380" y2="130" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="50" y1="90" x2="380" y2="90" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="50" y1="50" x2="380" y2="50" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>

    <!-- Box 1 -->
    <line x1="100" y1="30" x2="100" y2="160" stroke="var(--text-disabled)" stroke-width="1"/>
    <rect x="85" y="60" width="30" height="70" fill="var(--surface-raised)" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="85" y1="100" x2="115" y2="100" stroke="var(--text-display)" stroke-width="2"/>
    <line x1="92" y1="30" x2="108" y2="30" stroke="var(--text-disabled)" stroke-width="1"/>
    <line x1="92" y1="160" x2="108" y2="160" stroke="var(--text-disabled)" stroke-width="1"/>

    <!-- Box 2 -->
    <line x1="180" y1="45" x2="180" y2="150" stroke="var(--text-disabled)" stroke-width="1"/>
    <rect x="165" y="70" width="30" height="55" fill="var(--surface-raised)" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="165" y1="95" x2="195" y2="95" stroke="var(--text-display)" stroke-width="2"/>
    <line x1="172" y1="45" x2="188" y2="45" stroke="var(--text-disabled)" stroke-width="1"/>
    <line x1="172" y1="150" x2="188" y2="150" stroke="var(--text-disabled)" stroke-width="1"/>

    <!-- Box 3 -->
    <line x1="260" y1="20" x2="260" y2="165" stroke="var(--text-disabled)" stroke-width="1"/>
    <rect x="245" y="50" width="30" height="80" fill="var(--surface-raised)" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="245" y1="85" x2="275" y2="85" stroke="var(--text-display)" stroke-width="2"/>
    <line x1="252" y1="20" x2="268" y2="20" stroke="var(--text-disabled)" stroke-width="1"/>
    <line x1="252" y1="165" x2="268" y2="165" stroke="var(--text-disabled)" stroke-width="1"/>

    <!-- Box 4 -->
    <line x1="340" y1="55" x2="340" y2="145" stroke="var(--text-disabled)" stroke-width="1"/>
    <rect x="325" y="75" width="30" height="50" fill="var(--surface-raised)" stroke="var(--text-secondary)" stroke-width="1"/>
    <line x1="325" y1="100" x2="355" y2="100" stroke="var(--text-display)" stroke-width="2"/>
    <line x1="332" y1="55" x2="348" y2="55" stroke="var(--text-disabled)" stroke-width="1"/>
    <line x1="332" y1="145" x2="348" y2="145" stroke="var(--text-disabled)" stroke-width="1"/>

    <!-- 标签 -->
    <text x="100" y="190" fill="var(--text-secondary)" font-size="10" text-anchor="middle">组 A</text>
    <text x="180" y="190" fill="var(--text-secondary)" font-size="10" text-anchor="middle">组 B</text>
    <text x="260" y="190" fill="var(--text-secondary)" font-size="10" text-anchor="middle">组 C</text>
    <text x="340" y="190" fill="var(--text-secondary)" font-size="10" text-anchor="middle">组 D</text>
  </svg>
</div>
