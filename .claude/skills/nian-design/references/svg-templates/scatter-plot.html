<!--
  Scatter Plot
  XY 定位 + 圆面积编码
  用法：修改 circle 的 cx/cy/r 定位和大小，accent 色标记焦点数据点
  CSS 容器：.scatter-chart
  结构特征：方阵排列 | Detail 级
-->
<div class="scatter-chart">
  <svg viewBox="0 0 400 250" fill="none" style="font-family:var(--font-mono)">
    <!-- 坐标轴 -->
    <line x1="40" y1="210" x2="390" y2="210" stroke="var(--border)" stroke-width="1"/>
    <line x1="40" y1="210" x2="40" y2="10" stroke="var(--border)" stroke-width="1"/>
    <!-- 网格线 -->
    <line x1="40" y1="160" x2="390" y2="160" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="40" y1="110" x2="390" y2="110" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="40" y1="60" x2="390" y2="60" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <!-- 数据点（灰度常规 + accent 焦点） -->
    <circle cx="70" cy="180" r="5" fill="var(--text-disabled)" opacity="0.5"/>
    <circle cx="110" cy="170" r="6" fill="var(--text-disabled)" opacity="0.6"/>
    <circle cx="170" cy="130" r="7" fill="var(--text-disabled)" opacity="0.5"/>
    <circle cx="230" cy="95" r="6" fill="var(--text-disabled)" opacity="0.5"/>
    <circle cx="290" cy="55" r="8" fill="var(--accent-orange)" opacity="0.7"/>
    <circle cx="350" cy="25" r="6" fill="var(--text-disabled)" opacity="0.6"/>
    <!-- 轴标签 -->
    <text x="215" y="235" fill="var(--text-secondary)" font-size="10" text-anchor="middle">X 轴标签</text>
    <text x="15" y="115" fill="var(--text-secondary)" font-size="10" text-anchor="middle" transform="rotate(-90,15,115)">Y 轴标签</text>
  </svg>
</div>
