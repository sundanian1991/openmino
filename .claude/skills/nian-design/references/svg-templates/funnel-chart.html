<!--
  Funnel Chart
  梯形递减
  用法：修改每层 polygon 的 points 控制宽度递减，调整 opacity 递减梯度
  CSS 容器：.funnel-chart
  结构特征：段状条 | Detail 级
-->
<div class="funnel-chart">
  <svg viewBox="0 0 400 240" fill="none" style="font-family:var(--font-mono)">
    <!-- 漏斗层级（梯形递减，opacity 递减） -->
    <polygon points="50,10 350,10 330,50 70,50" fill="var(--scene-glacier)" opacity="0.6"/>
    <polygon points="70,55 330,55 305,95 95,95" fill="var(--scene-glacier)" opacity="0.4"/>
    <polygon points="95,100 305,100 275,140 125,140" fill="var(--scene-glacier)" opacity="0.25"/>
    <polygon points="125,145 275,145 250,185 150,185" fill="var(--scene-glacier)" opacity="0.15"/>
    <polygon points="150,190 250,190 240,215 160,215" fill="var(--scene-glacier)" opacity="0.08"/>
    <!-- 层级标签（顶部白字，中间深色字，底部浅色字） -->
    <text x="200" y="35" fill="#fff" font-size="11" text-anchor="middle" font-weight="600">阶段 1</text>
    <text x="200" y="78" fill="#fff" font-size="11" text-anchor="middle" font-weight="600">阶段 2</text>
    <text x="200" y="123" fill="var(--text-primary)" font-size="11" text-anchor="middle" font-weight="600">阶段 3</text>
    <text x="200" y="168" fill="var(--text-secondary)" font-size="11" text-anchor="middle" font-weight="600">阶段 4</text>
    <text x="200" y="207" fill="var(--text-secondary)" font-size="11" text-anchor="middle" font-weight="600">阶段 5</text>
    <!-- 右侧数值 -->
    <text x="365" y="35" fill="var(--text-secondary)" font-size="10" text-anchor="start">100%</text>
    <text x="340" y="78" fill="var(--text-secondary)" font-size="10" text-anchor="start">62%</text>
    <text x="315" y="123" fill="var(--text-secondary)" font-size="10" text-anchor="start">38%</text>
    <text x="285" y="168" fill="var(--text-secondary)" font-size="10" text-anchor="start">15%</text>
    <text x="255" y="207" fill="var(--text-secondary)" font-size="10" text-anchor="start">4%</text>
  </svg>
</div>
