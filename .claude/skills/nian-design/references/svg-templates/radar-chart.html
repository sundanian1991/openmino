<!--
  Radar Chart
  正多边形底框 + 数据多边形
  用法：修改数据 polygon 的 points 坐标，增减维度数量（默认5维）
  CSS 容器：.radar-chart
  结构特征：方阵排列 | Detail 级
-->
<div class="radar-chart">
  <svg viewBox="0 0 300 280" fill="none" style="font-family:var(--font-mono)">
    <!-- 5 层同心五边形底框 -->
    <polygon points="150,30 263,113 220,242 80,242 37,113" stroke="var(--border)" stroke-width="0.5" fill="none"/>
    <polygon points="150,54 238,120 201,222 99,222 62,120" stroke="var(--border)" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polygon points="150,78 213,127 182,202 118,202 87,127" stroke="var(--border)" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polygon points="150,102 188,134 163,182 137,182 112,134" stroke="var(--border)" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polygon points="150,126 163,141 144,162 156,162 137,141" stroke="var(--border)" stroke-width="0.5" fill="none" opacity="0.5"/>
    <!-- 轴线 -->
    <line x1="150" y1="150" x2="150" y2="30" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>
    <line x1="150" y1="150" x2="263" y2="113" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>
    <line x1="150" y1="150" x2="220" y2="242" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>
    <line x1="150" y1="150" x2="80" y2="242" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>
    <line x1="150" y1="150" x2="37" y2="113" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>
    <!-- 数据多边形 -->
    <polygon points="150,45 245,118 205,230 90,215 55,120"
             stroke="var(--scene-glacier)" stroke-width="1.5"
             fill="var(--scene-glacier)" fill-opacity="0.08"/>
    <!-- 数据点 -->
    <circle cx="150" cy="45" r="3" fill="var(--scene-glacier)"/>
    <circle cx="245" cy="118" r="3" fill="var(--scene-glacier)"/>
    <circle cx="205" cy="230" r="3" fill="var(--scene-glacier)"/>
    <circle cx="90" cy="215" r="3" fill="var(--scene-glacier)"/>
    <circle cx="55" cy="120" r="3" fill="var(--scene-glacier)"/>
    <!-- 维度标签 -->
    <text x="150" y="20" fill="var(--text-secondary)" font-size="10" text-anchor="middle">维度 1</text>
    <text x="275" y="113" fill="var(--text-secondary)" font-size="10" text-anchor="start">维度 2</text>
    <text x="230" y="255" fill="var(--text-secondary)" font-size="10" text-anchor="start">维度 3</text>
    <text x="70" y="255" fill="var(--text-secondary)" font-size="10" text-anchor="end">维度 4</text>
    <text x="25" y="113" fill="var(--text-secondary)" font-size="10" text-anchor="end">维度 5</text>
  </svg>
</div>
