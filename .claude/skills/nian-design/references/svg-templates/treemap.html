<!--
  Treemap
  嵌套矩形面积映射
  用法：修改 rect 的 x/y/width/height 定义分块大小和位置，opacity 区分层级深浅
  CSS 容器：.treemap-chart
  结构特征：不等分网格 | Detail 级
-->
<div class="treemap-chart">
  <svg viewBox="0 0 400 240" fill="none" style="font-family:var(--font-mono)">
    <!-- 外框 -->
    <rect x="0" y="0" width="400" height="240" rx="4" stroke="var(--border)" stroke-width="1" fill="var(--surface-raised)"/>
    <!-- 第一层分割 -->
    <rect x="2" y="2" width="238" height="236" rx="3" fill="var(--scene-glacier)" opacity="0.12" stroke="var(--border)" stroke-width="1"/>
    <rect x="242" y="2" width="156" height="118" rx="3" fill="var(--scene-glacier)" opacity="0.06" stroke="var(--border)" stroke-width="1"/>
    <rect x="242" y="122" width="156" height="116" rx="3" fill="var(--scene-glacier)" opacity="0.08" stroke="var(--border)" stroke-width="1"/>
    <!-- 第二层：左侧内部分割 -->
    <rect x="4" y="4" width="117" height="115" rx="2" fill="var(--scene-glacier)" opacity="0.18" stroke="var(--border)" stroke-width="0.5"/>
    <rect x="123" y="4" width="115" height="115" rx="2" fill="var(--scene-glacier)" opacity="0.10" stroke="var(--border)" stroke-width="0.5"/>
    <rect x="4" y="121" width="234" height="115" rx="2" fill="var(--scene-glacier)" opacity="0.07" stroke="var(--border)" stroke-width="0.5"/>
    <!-- 标签（大块 = 标题+百分比，小块 = 仅标题） -->
    <text x="62" y="65" fill="var(--text-primary)" font-size="12" font-weight="600" text-anchor="middle">分类 A</text>
    <text x="62" y="80" fill="var(--text-secondary)" font-size="10" text-anchor="middle">42%</text>
    <text x="180" y="65" fill="var(--text-primary)" font-size="11" font-weight="600" text-anchor="middle">分类 B</text>
    <text x="180" y="80" fill="var(--text-secondary)" font-size="10" text-anchor="middle">28%</text>
    <text x="320" y="65" fill="var(--text-primary)" font-size="10" font-weight="600" text-anchor="middle">分类 C</text>
    <text x="320" y="78" fill="var(--text-secondary)" font-size="9" text-anchor="middle">18%</text>
    <text x="320" y="175" fill="var(--text-primary)" font-size="10" font-weight="600" text-anchor="middle">分类 D</text>
    <text x="320" y="188" fill="var(--text-secondary)" font-size="9" text-anchor="middle">12%</text>
    <text x="121" y="190" fill="var(--text-primary)" font-size="11" font-weight="600" text-anchor="middle">分类 E</text>
    <text x="121" y="205" fill="var(--text-secondary)" font-size="10" text-anchor="middle">35%</text>
  </svg>
</div>
