<!--
  Area Chart + Hatching
  装饰性面积图，对角线条纹填充
  用法：修改 path d 属性的曲线点，调整 hatch pattern 的旋转角度/间距
  CSS 容器：.dataviz-area
  结构特征：方阵排列 | Detail 级
-->
<div class="dataviz-area">
  <svg viewBox="0 0 300 180" fill="none" style="font-family:var(--font-mono)">
    <defs>
      <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="6" stroke="var(--text-disabled)" stroke-width="0.8"/>
      </pattern>
      <clipPath id="area-clip">
        <path d="M0,160 C50,155 100,140 150,110 C200,80 250,30 300,10 L300,180 L0,180Z"/>
      </clipPath>
    </defs>
    <!-- 条纹填充区域 -->
    <rect width="300" height="180" fill="url(#hatch)" clip-path="url(#area-clip)" opacity="0.5"/>
    <!-- 曲线轮廓 -->
    <path d="M0,160 C50,155 100,140 150,110 C200,80 250,30 300,10" stroke="var(--text-disabled)" stroke-width="1.5" fill="none"/>
    <!-- 基线 -->
    <line x1="0" y1="180" x2="300" y2="180" stroke="var(--border)" stroke-width="1"/>
  </svg>
</div>
