<!--
  Gantt Chart
  横向条 + 时间轴
  用法：修改每行 rect 的 x/width 定位时间跨度，虚线边框=计划中，实线=已完成
  CSS 容器：.gantt-chart
  结构特征：链式节点 | Detail 级
-->
<div class="gantt-chart">
  <svg viewBox="0 0 400 180" fill="none" style="font-family:var(--font-mono)">
    <!-- 时间轴竖线 -->
    <line x1="100" y1="10" x2="100" y2="170" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="160" y1="10" x2="160" y2="170" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="220" y1="10" x2="220" y2="170" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="280" y1="10" x2="280" y2="170" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="340" y1="10" x2="340" y2="170" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <!-- 月份标签 -->
    <text x="100" y="178" fill="var(--text-secondary)" font-size="9" text-anchor="middle">1月</text>
    <text x="160" y="178" fill="var(--text-secondary)" font-size="9" text-anchor="middle">2月</text>
    <text x="220" y="178" fill="var(--text-secondary)" font-size="9" text-anchor="middle">3月</text>
    <text x="280" y="178" fill="var(--text-secondary)" font-size="9" text-anchor="middle">4月</text>
    <text x="340" y="178" fill="var(--text-secondary)" font-size="9" text-anchor="middle">5月</text>

    <!-- 任务行（已完成 = brand 色，计划中 = 虚线边框） -->
    <text x="95" y="30" fill="var(--text-primary)" font-size="10" text-anchor="end">调研</text>
    <rect x="100" y="20" width="80" height="16" rx="3" fill="var(--primary-olive)" opacity="0.6"/>

    <text x="95" y="60" fill="var(--text-primary)" font-size="10" text-anchor="end">设计</text>
    <rect x="140" y="50" width="100" height="16" rx="3" fill="var(--primary-olive)" opacity="0.4"/>

    <text x="95" y="90" fill="var(--text-primary)" font-size="10" text-anchor="end">开发</text>
    <rect x="190" y="80" width="140" height="16" rx="3" fill="var(--primary-olive)" opacity="0.25"/>

    <text x="95" y="120" fill="var(--text-primary)" font-size="10" text-anchor="end">测试</text>
    <rect x="280" y="110" width="80" height="16" rx="3" fill="none" stroke="var(--text-disabled)" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

    <text x="95" y="150" fill="var(--text-primary)" font-size="10" text-anchor="end">上线</text>
    <rect x="340" y="140" width="40" height="16" rx="3" fill="none" stroke="var(--text-disabled)" stroke-width="1" stroke-dasharray="4,2" opacity="0.3"/>

    <!-- 图例 -->
    <rect x="100" y="8" width="8" height="8" rx="2" fill="var(--primary-olive)" opacity="0.6"/>
    <text x="112" y="16" fill="var(--text-secondary)" font-size="8">已完成</text>
    <rect x="145" y="8" width="8" height="8" rx="2" fill="var(--primary-olive)" opacity="0.3"/>
    <text x="157" y="16" fill="var(--text-secondary)" font-size="8">进行中</text>
    <rect x="210" y="8" width="8" height="8" rx="2" fill="none" stroke="var(--text-disabled)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="222" y="16" fill="var(--text-secondary)" font-size="8">计划中</text>
  </svg>
</div>
