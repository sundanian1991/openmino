<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>进度汇报</title>
<style>
:root{--bg:#F6F6F0;--sf:#EDEDE0;--sd:#E2E0D0;--stone:#A09888;--mt:#6A6558;--bk:#1A1816;--olive:#4A5D3A;--moss:#6B8B5E;--glacier:#2A4A5A;--rock:#808080;--gold:#BF9B5A;--clay:#C66B4B;--red:#E93C10;--sky:#4A80C0;--ff-d:'Georgia','Times New Roman',serif;--ff-b:-apple-system,'Inter','Helvetica Neue',sans-serif;--ff-m:'JetBrains Mono','SF Mono',monospace}
body{font-family:var(--ff-b);background:var(--bg);color:var(--bk);margin:0;line-height:1.6}
.hero{min-height:60vh;display:flex;flex-direction:column;justify-content:center;padding:40px;background:var(--bk);color:#fff}
.hero h1{font-family:var(--ff-d);font-size:clamp(36px,6vw,72px);font-weight:400}
.hero .sub{font-size:clamp(14px,2vw,18px);color:var(--rock);margin-top:8px}
.section{padding:clamp(60px,10vh,120px) 40px;max-width:1200px;margin:0 auto}
.section--dark{background:var(--bk);color:#fff;max-width:none}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.kpi-card__value{font-family:var(--ff-d);font-size:clamp(32px,4vw,56px)}
.kpi-card__label{font-size:13px;color:var(--mt)}
.card{background:#fff;border:1px solid var(--sd);border-radius:6px;padding:20px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:13px;color:var(--mt)}
.tag{font-family:var(--ff-m);font-size:10px;padding:2px 8px;border-radius:3px;background:var(--sf)}
.tag--red{background:#fde8e4;color:var(--orange)}
.tag--gold{background:#f5edd6;color:#8a7030}
.answer{font-family:var(--ff-d);font-size:clamp(28px,3vw,48px)}
.arg{font-size:14px;color:var(--mt)}
.ev{font-family:var(--ff-m);font-size:11px;color:var(--stone)}
.footer{padding:40px;font-size:12px;color:var(--stone);text-align:center;border-top:1px solid var(--sd)}
@media(max-width:800px){.grid-4,.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hero">
  <h1 data-edit>汇报标题</h1>
  <div class="sub" data-edit>一句话结论 · 周期</div>
</header>
<section class="section">
  <div class="grid-4">
    <div><div class="kpi-card__value" style="color:var(--olive)" data-edit>—</div><div class="kpi-card__label" data-edit>指标一</div></div>
    <div><div class="kpi-card__value" style="color:var(--yellow)" data-edit>—</div><div class="kpi-card__label" data-edit>指标二</div></div>
    <div><div class="kpi-card__value" style="color:var(--glacier)" data-edit>—</div><div class="kpi-card__label" data-edit>指标三</div></div>
    <div><div class="kpi-card__value" data-edit>—</div><div class="kpi-card__label" data-edit>指标四</div></div>
  </div>
</section>
<section class="section">
  <h2 class="answer" data-edit>进度</h2>
  <div class="grid-2">
    <div class="card"><div class="card-title" data-edit>已完成</div><div class="card-desc" data-edit>项目描述</div><span class="tag tag--gold">进行中</span></div>
    <div class="card"><div class="card-title" data-edit>进行中</div><div class="card-desc" data-edit>项目描述</div><span class="tag tag--red">需关注</span></div>
  </div>
</section>
<section class="section--dark section" style="text-align:center">
  <div class="answer" data-edit>下周计划</div>
  <div class="arg" style="color:var(--rock)" data-edit>行动项</div>
</section>
<div class="footer" data-edit>周期 · 负责人</div>
<script>document.querySelectorAll('[data-edit]').forEach(e=>e.contentEditable=true)</script>
</body></html>
