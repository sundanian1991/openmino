<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Speedometer chart: semi-circular gauge -->
  <path d="M40,130 A60,60 0 0,1 160,130" fill="none" stroke="#f0e0d4" stroke-width="12" stroke-linecap="round"/>
  <path d="M40,130 A60,60 0 0,1 100,70" fill="none" stroke="#c98a6a" stroke-width="12" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="100" y1="130" x2="60" y2="85" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="100" cy="130" r="5" fill="#c98a6a"/>
  <!-- Tick marks -->
  <line x1="40" y1="135" x2="40" y2="140" stroke="#c98a6a" stroke-width="1"/>
  <line x1="55" y1="78" x2="53" y2="83" stroke="#c98a6a" stroke-width="1"/>
  <line x1="100" y1="65" x2="100" y2="70" stroke="#c98a6a" stroke-width="1"/>
  <line x1="145" y1="78" x2="147" y2="83" stroke="#c98a6a" stroke-width="1"/>
  <line x1="160" y1="135" x2="160" y2="140" stroke="#c98a6a" stroke-width="1"/>
</svg>
