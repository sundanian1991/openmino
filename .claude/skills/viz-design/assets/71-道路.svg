<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Road: winding path -->
  <path d="M40,160 Q50,130 70,120 Q90,110 100,80 Q110,50 140,40 Q160,35 170,50" fill="none" stroke="#c98a6a" stroke-width="8" stroke-linecap="round"/>
  <!-- Center dashed line -->
  <path d="M40,160 Q50,130 70,120 Q90,110 100,80 Q110,50 140,40 Q160,35 170,50" fill="none" stroke="#faf9f7" stroke-width="1" stroke-dasharray="4,6"/>
  <!-- Road signs -->
  <line x1="85" y1="100" x2="85" y2="75" stroke="#c98a6a" stroke-width="1.5"/>
  <polygon points="80,75 90,75 85,65" fill="#c98a6a" opacity="0.6"/>
  <line x1="130" y1="55" x2="130" y2="35" stroke="#c98a6a" stroke-width="1.5"/>
  <polygon points="125,35 135,35 130,25" fill="#c98a6a" opacity="0.6"/>
</svg>
