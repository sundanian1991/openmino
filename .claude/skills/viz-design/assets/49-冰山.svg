<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Iceberg: triangle with waterline -->
  <polygon points="100,20 60,120 140,120" fill="#c98a6a" opacity="0.5" stroke="#c98a6a" stroke-width="2"/>
  <line x1="30" y1="120" x2="170" y2="120" stroke="#c98a6a" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Below water: larger triangle -->
  <polygon points="100,180 40,120 160,120" fill="#c98a6a" opacity="0.15" stroke="#c98a6a" stroke-width="1" opacity="0.4"/>
</svg>
