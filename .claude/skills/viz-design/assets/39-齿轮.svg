<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Gears: two interlocking gears -->
  <!-- Large gear -->
  <circle cx="85" cy="100" r="35" fill="none" stroke="#c98a6a" stroke-width="2.5"/>
  <circle cx="85" cy="100" r="10" fill="#c98a6a" opacity="0.3"/>
  <!-- Gear teeth (8 teeth) -->
  <line x1="85" y1="65" x2="85" y2="55" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="100" x2="130" y2="100" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="135" x2="85" y2="145" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="100" x2="40" y2="100" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="75" x2="118" y2="67" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="125" x2="118" y2="133" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="75" x2="52" y2="67" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="125" x2="52" y2="133" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <!-- Small gear -->
  <circle cx="140" cy="65" r="22" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="140" cy="65" r="6" fill="#c98a6a" opacity="0.3"/>
  <line x1="140" y1="43" x2="140" y2="36" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="162" y1="65" x2="169" y2="65" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="87" x2="140" y2="94" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="118" y1="65" x2="111" y2="65" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
</svg>
