<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Windrose chart: petals at different angles and lengths -->
  <circle cx="100" cy="100" r="15" fill="none" stroke="#e0c9b0" stroke-width="1"/>
  <line x1="100" y1="85" x2="100" y2="35" stroke="#c98a6a" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="115" y1="100" x2="155" y2="80" stroke="#c98a6a" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="115" x2="120" y2="155" stroke="#c98a6a" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="85" y1="100" x2="55" y2="115" stroke="#c98a6a" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
</svg>
