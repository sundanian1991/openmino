<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Roller coaster: curved track with supports -->
  <!-- Track -->
  <path d="M30,120 Q50,40 70,80 Q90,120 100,60 Q110,20 130,70 Q150,110 160,80 Q170,50 180,100" fill="none" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- Supports -->
  <line x1="50" y1="50" x2="50" y2="160" stroke="#c98a6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="70" y1="80" x2="70" y2="160" stroke="#c98a6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="60" x2="100" y2="160" stroke="#c98a6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="70" x2="130" y2="160" stroke="#c98a6a" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="80" x2="160" y2="160" stroke="#c98a6a" stroke-width="1.5" opacity="0.4"/>
  <!-- Ground line -->
  <line x1="30" y1="160" x2="180" y2="160" stroke="#c98a6a" stroke-width="1.5" opacity="0.3"/>
</svg>
