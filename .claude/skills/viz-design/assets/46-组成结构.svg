<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Anatomy: human body outline with highlighted regions -->
  <!-- Head -->
  <ellipse cx="100" cy="40" rx="18" ry="22" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <!-- Body -->
  <path d="M82,62 Q75,100 78,130 L82,155" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <path d="M118,62 Q125,100 122,130 L118,155" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <!-- Arms -->
  <line x1="82" y1="75" x2="55" y2="110" stroke="#c98a6a" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="75" x2="145" y2="110" stroke="#c98a6a" stroke-width="2" stroke-linecap="round"/>
  <!-- Highlighted circles -->
  <circle cx="100" cy="90" r="15" fill="#c98a6a" opacity="0.15" stroke="#c98a6a" stroke-width="1"/>
  <circle cx="100" cy="125" r="12" fill="#c98a6a" opacity="0.1" stroke="#c98a6a" stroke-width="1"/>
  <circle cx="55" cy="110" r="5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="145" cy="110" r="5" fill="#c98a6a" opacity="0.3"/>
</svg>
