<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Island: oval shape with palm tree -->
  <!-- Water -->
  <ellipse cx="100" cy="130" rx="80" ry="30" fill="#c98a6a" opacity="0.1"/>
  <!-- Island -->
  <ellipse cx="100" cy="120" rx="60" ry="20" fill="#c98a6a" opacity="0.3" stroke="#c98a6a" stroke-width="2"/>
  <!-- Mountain -->
  <polygon points="100,60 70,110 130,110" fill="#c98a6a" opacity="0.5"/>
  <!-- Palm tree -->
  <line x1="80" y1="105" x2="80" y2="80" stroke="#c98a6a" stroke-width="2"/>
  <line x1="80" y1="80" x2="65" y2="72" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="95" y2="72" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="75" y2="65" stroke="#c98a6a" stroke-width="1.5"/>
</svg>
