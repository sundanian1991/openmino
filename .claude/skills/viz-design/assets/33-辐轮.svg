<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Spoke wheel: center with radiating spokes -->
  <circle cx="100" cy="100" r="15" fill="#c98a6a"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#e0c9b0" stroke-width="2"/>
  <!-- 8 spokes -->
  <line x1="100" y1="85" x2="100" y2="45" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="100" x2="155" y2="100" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="100" y2="155" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="100" x2="45" y2="100" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="111" y1="89" x2="139" y2="61" stroke="#c98a6a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="111" y1="111" x2="139" y2="139" stroke="#c98a6a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="89" y1="89" x2="61" y2="61" stroke="#c98a6a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="89" y1="111" x2="61" y2="139" stroke="#c98a6a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- End dots -->
  <circle cx="100" cy="45" r="5" fill="#c98a6a"/>
  <circle cx="155" cy="100" r="5" fill="#c98a6a"/>
  <circle cx="100" cy="155" r="5" fill="#c98a6a"/>
  <circle cx="45" cy="100" r="5" fill="#c98a6a"/>
</svg>
