<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Decision tree: diamond decision nodes with branches -->
  <rect x="80" y="25" width="40" height="28" rx="4" fill="#c98a6a"/>
  <!-- Left branch -->
  <line x1="90" y1="53" x2="55" y2="85" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="35" y="85" width="40" height="28" rx="4" fill="#c98a6a" opacity="0.6"/>
  <line x1="45" y1="113" x2="35" y2="145" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="20" y="145" width="30" height="22" rx="4" fill="#c98a6a" opacity="0.35"/>
  <line x1="65" y1="113" x2="75" y2="145" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="60" y="145" width="30" height="22" rx="4" fill="#c98a6a" opacity="0.35"/>
  <!-- Right branch -->
  <line x1="110" y1="53" x2="145" y2="85" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="125" y="85" width="40" height="28" rx="4" fill="#c98a6a" opacity="0.6"/>
  <line x1="135" y1="113" x2="125" y2="145" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="110" y="145" width="30" height="22" rx="4" fill="#c98a6a" opacity="0.35"/>
  <line x1="155" y1="113" x2="165" y2="145" stroke="#c98a6a" stroke-width="1.5"/>
  <rect x="150" y="145" width="30" height="22" rx="4" fill="#c98a6a" opacity="0.35"/>
</svg>
