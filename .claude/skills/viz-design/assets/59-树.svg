<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Tree: trunk with branching canopy -->
  <!-- Trunk -->
  <line x1="100" y1="160" x2="100" y2="90" stroke="#c98a6a" stroke-width="5" stroke-linecap="round"/>
  <!-- Canopy -->
  <circle cx="100" cy="65" r="30" fill="#c98a6a" opacity="0.2"/>
  <circle cx="75" cy="75" r="22" fill="#c98a6a" opacity="0.15"/>
  <circle cx="125" cy="75" r="22" fill="#c98a6a" opacity="0.15"/>
  <!-- Branches -->
  <line x1="100" y1="90" x2="80" y2="70" stroke="#c98a6a" stroke-width="2"/>
  <line x1="100" y1="90" x2="120" y2="70" stroke="#c98a6a" stroke-width="2"/>
  <line x1="100" y1="100" x2="70" y2="95" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="130" y2="95" stroke="#c98a6a" stroke-width="1.5"/>
</svg>
