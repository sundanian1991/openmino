<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Scales: balance scale -->
  <!-- Base -->
  <rect x="90" y="160" width="20" height="10" rx="2" fill="#c98a6a"/>
  <line x1="100" y1="160" x2="100" y2="60" stroke="#c98a6a" stroke-width="3"/>
  <!-- Top beam -->
  <line x1="45" y1="60" x2="155" y2="60" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- Left pan -->
  <line x1="45" y1="60" x2="45" y2="90" stroke="#c98a6a" stroke-width="1.5"/>
  <path d="M30,90 L60,90 L55,105 L35,105 Z" fill="#c98a6a" opacity="0.5"/>
  <!-- Left weight -->
  <circle cx="45" cy="82" r="6" fill="#c98a6a"/>
  <!-- Right pan -->
  <line x1="155" y1="60" x2="155" y2="90" stroke="#c98a6a" stroke-width="1.5"/>
  <path d="M140,90 L170,90 L165,105 L145,105 Z" fill="#c98a6a" opacity="0.5"/>
  <!-- Right weights (2 smaller) -->
  <circle cx="150" cy="80" r="5" fill="#c98a6a" opacity="0.6"/>
  <circle cx="160" cy="80" r="5" fill="#c98a6a" opacity="0.6"/>
</svg>
