<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250">
  <!-- ============================================================ -->
  <!-- 杯子 - 简单图标风格 -->
  <!-- ============================================================ -->

  <!-- 填充层 -->
  <g id="fill-layer">
    <!-- 杯身主体 -->
    <path d="m85.5 65h80c6.6 0 12 5.4 12 12v100c0 6.6-5.4 12-12 12h-80c-6.6 0-12-5.4-12-12v-100c0-6.6 5.4-12 12-12z" fill="#FEFFFE"/>

    <!-- 陶土色把手 -->
    <path d="m165.5 85c8 0 14 6 14 14v32c0 8-6 14-14 14" fill="none"/>
    <path d="m165.5 85c8 0 14 6 14 14v32c0 8-6 14-14 14s-14-6-14-14v-32c0-8 6-14 14-14z" fill="#D6654B"/>
    <!-- 把手内镂空 -->
    <ellipse cx="165.5" cy="105" rx="6" ry="12" fill="#FEFFFE"/>
  </g>

  <!-- 描边层 -->
  <g id="stroke-layer" fill="none" stroke="#140A05" stroke-linecap="round" stroke-linejoin="round">
    <!-- 杯身外轮廓（主线条 1.8px） -->
    <path d="m85.5 65h80c6.6 0 12 5.4 12 12v100c0 6.6-5.4 12-12 12h-80c-6.6 0-12-5.4-12-12v-100c0-6.6 5.4-12 12-12z" stroke-width="1.8"/>

    <!-- 杯口椭圆（结构线 1.5px） -->
    <ellipse cx="125.5" cy="65" rx="46" ry="12" stroke-width="1.5"/>

    <!-- 杯身中间水平线（结构线 1.5px） -->
    <path d="m85.5 130h80" stroke-width="1.5"/>

    <!-- 杯底弧线（结构线 1.5px） -->
    <path d="m91.5 175c6 2 20 3.5 34 3.5s28-1.5 34-3.5" stroke-width="1.5"/>

    <!-- 把手外轮廓（中线条 1.5px） -->
    <path d="m165.5 85c8 0 14 6 14 14v32c0 8-6 14-14 14s-14-6-14-14v-32c0-8 6-14 14-14z" stroke-width="1.5"/>

    <!-- 杯身竖线细节（细节线 1.3px） -->
    <path d="m100.5 78v8" stroke-width="1.3"/>
    <path d="m150.5 78v8" stroke-width="1.3"/>
    <path d="m100.5 155v8" stroke-width="1.3"/>
    <path d="m150.5 155v8" stroke-width="1.3"/>
  </g>
</svg>