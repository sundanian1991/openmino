## 约束条件（决策边界）

constraints:
  - id: C1
    type: compliance
    desc: 合规视角：有规可依、合理、充分共识

  - id: C2
    type: ecosystem
    desc: 生态视角：不是单点优化，是系统激活

  - id: C3
    type: data
    desc: 数据背书：决策需要数据支撑

  - id: C4
    type: time
    desc: 时间分配：50% 搭体系 / 30% 沟通 / 10% 反思 / 10% 玩

---

## Check-in 机制

check_in:
  daily:
    trigger: 用户说「今天怎么安排」或会话启动
    output: 生成 4-5 项推进任务（按优先级排序）
    format: memory/daily/YYYY-MM-DD.md

  weekly:
    trigger: 周一 09:00
    output: 5311 时间分配评估 + 本周重点

  monthly:
    trigger: 每月 20 日
    output: 职业资产清算 + 目标进度复盘

---

## 决策授权边界

authorization:
  auto_approve:
    - 单文件编辑（不覆盖历史数据）
    - 搜索信息（tavily / Grep）
    - 文档起草（Markdown 格式）

  require_confirm:
    - 删除/覆盖操作
    - 多文件架构修改
    - 对外发送材料

  require_explicit:
    - 涉及合规风险决策
    - 供应商清退相关
    - 向上汇报材料

---
