# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 0
temperature = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix
# tier       = "lazy"   # lazy|background|eager

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "ToolName" or "ToolName(glob)"; '*' matches any run, '?' one char.
mode  = "ask"
# deny = ["bash(rm -rf*)", "bash(git push*)"]   # hard-blocked in every mode
allow = ["bash=cat > /Users/sundanian/Documents/projects/ai-agents/my-agent/workspace/nian-design-skill-map.html << 'ENDOFFILE'\n<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>nian-design · 技能地图</title>\n<style>\n/* ===== 全局重置 & nian 令牌 ===== */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n:root {\n  --bg: #F6F6F0;\n  --sf: #EDEDE0;\n  --sd: #E2E0D0;\n  --stone: #A09888;\n  --mt: #6A6558;\n  --bk: #1A1816;\n  --forest: #3D5A35;\n  --moss: #6B8B5E;\n  --slate: #4E627C;\n  --steel: #7A8B9B;\n  --gold: #BF9B5A;\n  --clay: #C66B4B;\n  --red: #E93C10;\n  --sky: #4A80C0;\n  --ff-display: 'Georgia', 'Times New Roman', serif;\n  --ff-body: -apple-system, 'Inter', 'Helvetica Neue', sans-serif;\n  --ff-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;\n  --gap: 24px;\n  --radius: 6px;\n}\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: var(--ff-body);\n  background: var(--bg);\n  color: var(--bk);\n  line-height: 1.6;\n  padding: 0;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ===== 布局 ===== */\n.page-header {\n  background: var(--bk);\n  color: var(--bg);\n  padding: 64px 40px 48px;\n  position: relative;\n  overflow: hidden;\n}\n.page-header::after {\n  content: 'nian';\n  position: absolute;\n  right: -20px;\n  bottom: -30px;\n  font-family: var(--ff-display);\n  font-size: clamp(120px, 20vw, 260px);\n  color: rgba(255,255,255,0.04);\n  line-height: 1;\n  pointer-events: none;\n  letter-spacing: -0.04em;\n}\n.page-header h1 {\n  font-family: var(--ff-display);\n  font-size: clamp(36px, 5vw, 56px);\n  font-weight: 400;\n  letter-spacing: -0.02em;\n  margin-bottom: 8px;\n}\n.page-header .sub {\n  color: var(--gold);\n  font-size: 18px;\n  font-weight: 400;\n  margin-bottom: 16px;\n}\n.page-header .desc {\n  max-width: 640px;\n  font-size: 15px;\n  color: var(--steel);\n  line-height: 1.7;\n}\n\n/* ===== 导航 Tab 栏 ===== */\n.tab-bar {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 0;\n  background: var(--sd);\n  border-bottom: 1px solid var(--stone);\n  position: sticky;\n  top: 0;\n  z-index: 100;\n}\n.tab-btn {\n  font-family: var(--ff-mono);\n  font-size: 12px;\n  padding: 14px 22px;\n  background: transparent;\n  border: none;\n  border-bottom: 2px solid transparent;\n  color: var(--mt);\n  cursor: pointer;\n  transition: all 0.2s;\n  white-space: nowrap;\n  letter-spacing: 0.02em;\n}\n.tab-btn:hover { color: var(--bk); background: rgba(0,0,0,0.03); }\n.tab-btn.active {\n  color: var(--forest);\n  border-bottom-color: var(--forest);\n  background: var(--bg);\n}\n\n/* ===== 内容容器 ===== */\n.tab-content { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; }\n.tab-content.active { display: block; }\n\n/* ===== 通用组件 ===== */\nh2 {\n  font-family: var(--ff-display);\n  font-size: 28px;\n  font-weight: 400;\n  margin-bottom: 20px;\n  color: var(--bk);\n  letter-spacing: -0.01em;\n}\nh3 {\n  font-family: var(--ff-display);\n  font-size: 20px;\n  font-weight: 400;\n  margin: 32px 0 12px;\n  color: var(--forest);\n}\nh4 {\n  font-family: var(--ff-body);\n  font-size: 14px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  color: var(--mt);\n  margin: 24px 0 8px;\n}\n.card {\n  background: white;\n  border: 1px solid var(--sd);\n  border-radius: var(--radius);\n  padding: 24px;\n  margin-bottom: 16px;\n  transition: box-shadow 0.2s;\n}\n.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }\n.card-title {\n  font-family: var(--ff-body);\n  font-size: 15px;\n  font-weight: 600;\n  margin-bottom: 4px;\n}\n.card-desc { font-size: 13px; color: var(--mt); line-height: 1.6; }\n.card-meta {\n  font-family: var(--ff-mono);\n  font-size: 11px;\n  color: var(--steel);\n  margin-top: 8px;\n}\n.tag {\n  display: inline-block;\n  font-family: var(--ff-mono);\n  font-size: 10px;\n  padding: 2px 8px;\n  border-radius: 3px;\n  margin: 2px;\n  letter-spacing: 0.02em;\n}\n.tag-rd { background: #f0eee8; color: var(--mt); }\n.tag-cog { background: #e8f0e6; color: var(--forest); }\n.tag-file { background: #e6ecf2; color: var(--slate); }\n.tag-step { background: var(--bk); color: var(--bg); }\n.tag-red { background: #fde8e4; color: var(--red); }\n.tag-gold { background: #f5edd6; color: #8a7030; }\n.tag-blue { background: #e4edf5; color: var(--slate); }\n\n/* ===== 流程图 ===== */\n.flow-row {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  flex-wrap: wrap;\n  margin: 24px 0;\n}\n.flow-step {\n  flex: 1;\n  min-width: 160px;\n  background: white;\n  border: 1px solid var(--sd);\n  border-radius: var(--radius);\n  padding: 18px 20px;\n  text-align: center;\n  cursor: pointer;\n  transition: all 0.25s;\n  position: relative;\n}\n.flow-step:hover {\n  border-color: var(--forest);\n  transform: translateY(-2px);\n  box-shadow: 0 4px 16px rgba(61,90,53,0.12);\n}\n.flow-step .step-label {\n  font-family: var(--ff-mono);\n  font-size: 11px;\n  color: var(--steel);\n  letter-spacing: 0.08em;\n  margin-bottom: 4px;\n}\n.flow-step .step-name {\n  font-family: var(--ff-display);\n  font-size: 18px;\n  color: var(--bk);\n}\n.flow-step .step-count {\n  font-family: var(--ff-mono);\n  font-size: 10px;\n  color: var(--stone);\n  margin-top: 4px;\n}\n.flow-arrow {\n  font-family: var(--ff-mono);\n  font-size: 20px;\n  color: var(--stone);\n  flex-shrink: 0;\n}\n.flow-step .badge {\n  position: absolute;\n  top: -8px;\n  right: -8px;\n  width: 24px;\n  height: 24px;\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--ff-mono);\n  font-size: 10px;\n  font-weight: 700;\n  color: white;\n}\n.badge-a { background: var(--slate); }\n.badge-b { background: var(--forest); }\n.badge-c { background: var(--gold); }\n\n/* ===== 可展开详情 ===== */\n.detail-box { display: none; margin: 8px 0 16px 36px; border-left: 2px solid var(--sd); padding-left: 20px; }\n.detail-box.open { display: block; }\n.toggle-btn {\n  font-family: var(--ff-mono);\n  font-size: 12px;\n  color: var(--mt);\n  background: none;\n  border: 1px solid var(--sd);\n  border-radius: 4px;\n  padding: 4px 12px;\n  cursor: pointer;\n  transition: 0.2s;\n  margin-bottom: 8px;\n}\n.toggle-btn:hover { border-color: var(--stone); color: var(--bk); }\n.toggle-btn::before { content: '▸ '; }\n.toggle-btn.open::before { content: '▾ '; }\n\n/* ===== 表格 ===== */\ntable {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 13px;\n  margin: 16px 0;\n}\nth {\n  text-align: left;\n  font-family: var(--ff-mono);\n  font-size: 11px;\n  color: var(--mt);\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  padding: 8px 12px;\n  border-bottom: 1px solid var(--sd);\n  font-weight: 600;\n}\ntd {\n  padding: 8px 12px;\n  border-bottom: 1px solid var(--sd);\n  vertical-align: top;\n  line-height: 1.5;\n}\ntr:hover td { background: rgba(0,0,0,0.02); }\ntd:first-child { font-weight: 500; }\n\n/* ===== 网格 ===== */\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }\n.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }\n@media (max-width: 800px) {\n  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }\n  .tab-content { padding: 20px; }\n  .tab-btn { padding: 10px 14px; font-size: 11px; }\n  .page-header { padding: 40px 20px 32px; }\n}\n\n/* ===== 颜色色块 ===== */\n.swatch {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--ff-mono);\n  font-size: 11px;\n  padding: 4px 10px 4px 4px;\n  border-radius: 4px;\n  background: white;\n  border: 1px solid var(--sd);\n}\n.swatch-dot {\n  width: 16px; height: 16px;\n  border-radius: 3px;\n  flex-shrink: 0;\n}\n\n/* ===== 高亮框 ===== */\n.insight {\n  background: #f8f7f2;\n  border-left: 3px solid var(--gold);\n  padding: 16px 20px;\n  margin: 20px 0;\n  border-radius: 0 var(--radius) var(--radius) 0;\n  font-size: 14px;\n  line-height: 1.7;\n}\n.insight strong { color: var(--forest); }\n\n/* ===== 折叠面板 ===== */\n.accordion {}\n.accordion-item {\n  border: 1px solid var(--sd);\n  border-radius: var(--radius);\n  margin-bottom: 8px;\n  overflow: hidden;\n}\n.accordion-header {\n  padding: 14px 18px;\n  font-size: 14px;\n  font-weight: 600;\n  cursor: pointer;\n  background: white;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  transition: background 0.2s;\n}\n.accordion-header:hover { background: #fafaf5; }\n.accordion-header .arrow { font-family: var(--ff-mono); color: var(--stone); transition: transform 0.2s; }\n.accordion-item.open .accordion-header .arrow { transform: rotate(90deg); }\n.accordion-body {\n  display: none;\n  padding: 0 18px 18px;\n  font-size: 13px;\n  line-height: 1.7;\n  color: var(--mt);\n}\n.accordion-item.open .accordion-body { display: block; }\n\n/* ===== 引用标记 ===== */\n.ref-pill {\n  font-family: var(--ff-mono);\n  font-size: 10px;\n  background: #f0eee8;\n  border-radius: 3px;\n  padding: 1px 6px;\n  color: var(--mt);\n  white-space: nowrap;\n}\n\n/* ===== 交互状态 ===== */\n.clickable { cursor: pointer; }\n.selected { outline: 2px solid var(--forest); outline-offset: 2px; }\n.muted { opacity: 0.4; }\n</style>\n</head>\n<body>\n\n<!-- ===== 头部 ===== -->\n<header class=\"page-header\">\n  <h1>nian-design · 技能地图</h1>\n  <div class=\"sub\">Landscape and signal. Three typefaces, one voice.</div>\n  <div class=\"desc\">\n    一个完整的品牌设计系统工作流。三步循环（A → B → C）、9 种认知操作、160+ 组件、\n    6 层场景配方、14 色系统。点击任意节点展开细节，表格可横向滚动。\n  </div>\n</header>\n\n<!-- ===== Tab 导航 ===== -->\n<nav class=\"tab-bar\" id=\"tabBar\">\n  <button class=\"tab-btn active\" data-tab=\"overview\">⛰ 总览</button>\n  <button class=\"tab-btn\" data-tab=\"stepA\">A · 读索引</button>\n  <button class=\"tab-btn\" data-tab=\"stepB\">B · 集中决策</button>\n  <button class=\"tab-btn\" data-tab=\"stepC\">C · 写码+自检</button>\n  <button class=\"tab-btn\" data-tab=\"decision-path\">决策路径</button>\n  <button class=\"tab-btn\" data-tab=\"components\">组件选型</button>\n  <button class=\"tab-btn\" data-tab=\"color\">色彩体系</button>\n  <button class=\"tab-btn\" data-tab=\"refs\">参考文件</button>\n</nav>\n\n<!-- ============================================================ -->\n<!-- TAB 0: 总览 -->\n<!-- ============================================================ -->\n<section class=\"tab-content active\" id=\"tab-overview\">\n\n<h2>三步循环 · 总览</h2>\n<p style=\"color:var(--mt);margin-bottom:24px;\">\n  不边读边决策。先读完所有规范建立全局认知，再一次性做出所有决策写进决策卡，\n  之后写码和检查全部基于决策卡，不再回头翻文件。\n</p>\n\n<div class=\"flow-row\">\n  <div class=\"flow-step\" onclick=\"scrollToTab('stepA')\">\n    <span class=\"badge badge-a\">A</span>\n    <div class=\"step-label\">Step A</div>\n    <div class=\"step-name\">读索引</div>\n    <div class=\"step-count\">7 个文件 · 必读 5 + 按需 2</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" onclick=\"scrollToTab('stepB')\">\n    <span class=\"badge badge-b\">B</span>\n    <div class=\"step-label\">Step B</div>\n    <div class=\"step-name\">集中决策</div>\n    <div class=\"step-count\">B1→B2→B3→B4</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" onclick=\"scrollToTab('stepC')\">\n    <span class=\"badge badge-c\">C</span>\n    <div class=\"step-label\">Step C</div>\n    <div class=\"step-name\">写码 + 自检</div>\n    <div class=\"step-count\">C-1→C-2→C-3→C-4</div>\n  </div>\n</div>\n\n<div class=\"insight\">\n  <strong>核心原则</strong>：配⽅给的是 <strong>认知操作</strong>（9 种），不是具体组件。\n  同⼀认知操作下组件可互换，⻅ <span class=\"ref-pill\">intent-index.md</span> 完整映射（120+ 组件，含替代条件）。\n</div>\n\n<h3>三个分支维度</h3>\n<div class=\"grid-3\">\n  <div class=\"card\">\n    <div class=\"card-title\">① 场景维度</div>\n    <div class=\"card-desc\">内容类型映射到 6 场景：感知 / 决策 / 计划 / 执行 / 沉淀 / 对外。每个场景锁定默认视觉身份（Hero/签名/导航/布局）。</div>\n    <div class=\"card-meta\">→ decision-path.md</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"card-title\">② 深度维度</div>\n    <div class=\"card-desc\">L2 快速梳理 / L3 结构化整理 / L4 知识重构。深度决定信息密度和配方复杂度。</div>\n    <div class=\"card-meta\">→ recipe-book.md 每个场景下分 L2/L3/L4</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"card-title\">③ 三轴旋钮</div>\n    <div class=\"card-desc\">F 正式度 1-5 / D 数据密度 1-5 / BV 品牌可见度 1-5。旋钮值影响 Hero 类型和组件选型。</div>\n    <div class=\"card-meta\">→ SKILL.md Step B1</div>\n  </div>\n</div>\n\n<h3>内容完整度 → 降级路径</h3>\n<div class=\"grid-3\">\n  <div class=\"card\" style=\"border-left: 3px solid var(--steel);\">\n    <div class=\"card-title\">骨架级 · 0-3 分</div>\n    <div class=\"card-desc\">仅输出节奏表 + 决策卡，内容标注「待填充」。Hero 统一降为 V6 水印。</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--gold);\">\n    <div class=\"card-title\">占位级 · 4-7 分</div>\n    <div class=\"card-desc\">输出完整 HTML，数据和文案用示例内容标注。仍需满足 P0 红线和布局/颜色/字体规则。</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--forest);\">\n    <div class=\"card-title\">完整级 · 8-10 分</div>\n    <div class=\"card-desc\">走完整三步流程，输出交付级 HTML。逐段审查文案。</div>\n  </div>\n</div>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 1: Step A 读索引 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-stepA\">\n\n<h2>Step A · 读索引</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  按顺序读完，建立全局认知。只读不做决策。读完应知道所有可选范围（6 Hero、9 认知操作、32 布局、~160 组件）。\n</p>\n\n<div class=\"insight\" style=\"border-left-color: var(--slate);\">\n  <strong>效率原则</strong>：决策路径相关文件（<span class=\"ref-pill\">decision-path.md</span>）标记为「按需」— Step A 先不读，到 Step B2 锁定决策时再读。\n  避免 AI 在规范阶段就陷入 Hero 选型细节。\n</div>\n\n<table>\n  <tr><th>顺序</th><th>文件</th><th>用途</th><th>类型</th></tr>\n  <tr>\n    <td>1</td>\n    <td><span class=\"ref-pill\">brand-dna.md</span></td>\n    <td>品牌基因、气质、Craft Rules</td>\n    <td><span class=\"tag tag-rd\">必读</span></td>\n  </tr>\n  <tr>\n    <td>2</td>\n    <td><span class=\"ref-pill\">references/tokens.md</span></td>\n    <td>字体/颜色/间距/圆角精确值</td>\n    <td><span class=\"tag tag-rd\">必读</span></td>\n  </tr>\n  <tr>\n    <td>3</td>\n    <td><span class=\"ref-pill\">references/recipe-book.md</span></td>\n    <td>配方手册（6 场景 × 3 深度配方，含组件选型映射）</td>\n    <td><span class=\"tag tag-rd\">必读</span></td>\n  </tr>\n  <tr>\n    <td>4</td>\n    <td><span class=\"ref-pill\">references/decision-path.md</span></td>\n    <td>决策路径速查表 + 视觉身份公式</td>\n    <td><span class=\"tag tag-blue\">按需</span><br><span style=\"font-size:11px;color:var(--mt);\">Step B2 锁定决策时读</span></td>\n  </tr>\n  <tr>\n    <td>5</td>\n    <td><span class=\"ref-pill\">references/intent-index.md</span></td>\n    <td>组件选型速查表（认知操作 → 数据形态 → 组件，含替代条件）</td>\n    <td><span class=\"tag tag-rd\">必读</span></td>\n  </tr>\n  <tr>\n    <td>6</td>\n    <td><span class=\"ref-pill\">showcase/H/H102-hero.html</span></td>\n    <td>核心 6 种 Hero 的 CSS 代码结构</td>\n    <td><span class=\"tag tag-rd\">必读</span></td>\n  </tr>\n  <tr>\n    <td>7</td>\n    <td><span class=\"ref-pill\">references/components/INDEX.md</span></td>\n    <td>组件目录（知道有什么，不读详情）</td>\n    <td><span class=\"tag tag-rd\">必读</span></td>\n  </tr>\n  <tr>\n    <td>8</td>\n    <td><span class=\"ref-pill\">references/extended-layouts.md</span></td>\n    <td>32 种布局目录</td>\n    <td><span class=\"tag tag-blue\">按需初读</span></td>\n  </tr>\n  <tr>\n    <td>9</td>\n    <td>扩展库目录<br>(entrances / typography / textures)</td>\n    <td>知道扩展能力范围</td>\n    <td><span class=\"tag tag-blue\">按需初读</span></td>\n  </tr>\n</table>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 2: Step B 集中决策 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-stepB\">\n\n<h2>Step B · 集中决策</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  基于 Step A 的全局认知，一次性做出所有决策。填完决策卡前不进 Step C。\n</p>\n\n<div class=\"flow-row\">\n  <div class=\"flow-step\" style=\"min-width:120px;\">\n    <div class=\"step-label\" style=\"font-size:10px;\">B1</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">基础参数</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" style=\"min-width:120px;\">\n    <div class=\"step-label\" style=\"font-size:10px;\">B2</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">决策路径</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" style=\"min-width:120px;\">\n    <div class=\"step-label\" style=\"font-size:10px;\">B3</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">装饰+打破</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" style=\"min-width:120px;\">\n    <div class=\"step-label\" style=\"font-size:10px;\">B4</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">输出决策卡</div>\n  </div>\n</div>\n\n<h3>B1 · 基础参数</h3>\n<div class=\"grid-4\">\n  <div class=\"card\"><div class=\"card-title\">场景</div><div class=\"card-desc\">感知 / 决策 / 计划 / 执行 / 沉淀 / 对外</div></div>\n  <div class=\"card\"><div class=\"card-title\">深度</div><div class=\"card-desc\">L2 快速梳理 / L3 结构化整理 / L4 知识重构</div></div>\n  <div class=\"card\"><div class=\"card-title\">载体</div><div class=\"card-desc\">文档（默认）或 Slide</div></div>\n  <div class=\"card\"><div class=\"card-title\">三轴旋钮</div><div class=\"card-desc\">F 1-5 · D 1-5 · BV 1-5</div></div>\n</div>\n\n<h3>B2 · 决策路径速查表 ← 核心</h3>\n<p style=\"font-size:13px;color:var(--mt);margin-bottom:12px;\">\n  查 <span class=\"ref-pill\">references/decision-path.md</span>，按场景 + 内容特征一键锁定。~85% 场景走此表，剩余 ~15% 走备用触发 + 打破条款。\n</p>\n\n<div class=\"accordion\" id=\"acc-b2\">\n  <div class=\"accordion-item open\">\n    <div class=\"accordion-header\" onclick=\"toggleAccordion(this)\">\n      感知层 · 数据报告 / 行业全景\n      <span class=\"arrow\">▸</span>\n    </div>\n    <div class=\"accordion-body\">\n      <table style=\"margin:0;\">\n        <tr><td><strong>默认 Hero</strong></td><td>V6 水印 或 V2 中心劈开</td></tr>\n        <tr><td><strong>切换条件</strong></td><td>对比结构 → V2 · 单一叙事 → V6</td></tr>\n        <tr><td><strong>备用触发</strong></td><td>D≥4 且 >6 个指标 → Data 或 Dashboard</td></tr>\n        <tr><td><strong>签名</strong></td><td>Line 2px（固定）</td></tr>\n        <tr><td><strong>导航</strong></td><td>顶栏极简（固定）</td></tr>\n        <tr><td><strong>布局范围</strong></td><td>段状条 L23-L25 · 方阵排列 L06-L09 · 双栏对照 L01-L05</td></tr>\n      </table>\n    </div>\n  </div>\n  <div class=\"accordion-item\">\n    <div class=\"accordion-header\" onclick=\"toggleAccordion(this)\">\n      决策层 · 方案选型 / 预算申请\n      <span class=\"arrow\">▸</span>\n    </div>\n    <div class=\"accordion-body\">默认 V6 水印；风险紧迫 → V5 左斜切；A/B 对比 → V2 中心劈开；签名 Line 2px；顶栏极简。</div>\n  </div>\n  <div class=\"accordion-item\">\n    <div class=\"accordion-header\" onclick=\"toggleAccordion(this)\">\n      计划层 · SOP / 流程文档\n      <span class=\"arrow\">▸</span>\n    </div>\n    <div class=\"accordion-body\">默认 V5 左斜切（唯一优先）；多分支 → V3 上下劈开；签名 Bar；结构固定：步骤序列 → 验收清单。</div>\n  </div>\n  <div class=\"accordion-item\">\n    <div class=\"accordion-header\" onclick=\"toggleAccordion(this)\">\n      执行层 · 周报 / 进度 / 会议纪要\n      <span class=\"arrow\">▸</span>\n    </div>\n    <div class=\"accordion-body\">默认 V2 中心劈开；指标 >4 → V4 四分之一；风险预警 → V5 左斜切；纯文字 → V6 水印；签名 Bar。</div>\n  </div>\n  <div class=\"accordion-item\">\n    <div class=\"accordion-header\" onclick=\"toggleAccordion(this)\">\n      沉淀层 · 笔记 / 复盘 / 知识管理\n      <span class=\"arrow\">▸</span>\n    </div>\n    <div class=\"accordion-body\">默认 V6 水印；打破认知 → V1 对角线；结构化分类 → V2 中心劈开；签名 Ghost。</div>\n  </div>\n  <div class=\"accordion-item\">\n    <div class=\"accordion-header\" onclick=\"toggleAccordion(this)\">\n      对外层 · 品牌展示 / 提案\n      <span class=\"arrow\">▸</span>\n    </div>\n    <div class=\"accordion-body\">默认 V6 水印；品牌数据 → V4 四分之一；竞品对比 → V2 中心劈开；最强宣言 → V1 对角线；侧栏导航。</div>\n  </div>\n</div>\n\n<h3>B3 · 装饰 + 打破</h3>\n<p style=\"font-size:13px;color:var(--mt);\">\n  规划 <strong>2-3 处</strong> 装饰元素（ghost-text / seal / dot-pattern / decorative-number 等）。\n  确认恰好 <strong>1 处</strong> 打破（突破配方默认，需标注理由）。\n</p>\n\n<h3>B4 · 输出设计决策卡</h3>\n<p style=\"font-size:13px;color:var(--mt);\">\n  填完 <span class=\"ref-pill\">references/design-decision-card.md</span> 所有字段。\n  决策卡包含：Hero 类型 / Nature-Signal 色 / 签名设备 / 导航 / 布局范围 / 组件安全候选 / 装饰规划。\n  <strong>填卡完成前，不进 Step C。</strong>\n</p>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 3: Step C 写码+自检 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-stepC\">\n\n<h2>Step C · 写码 + 自检</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  所有决策已在决策卡中。这一步只执行，不决策。\n</p>\n\n<div class=\"flow-row\">\n  <div class=\"flow-step\" style=\"min-width:140px;\">\n    <div class=\"step-label\">C-1</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">节奏规划</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" style=\"min-width:140px;\">\n    <div class=\"step-label\">C-2</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">查组件代码</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" style=\"min-width:140px;\">\n    <div class=\"step-label\">C-3</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">写代码</div>\n  </div>\n  <div class=\"flow-arrow\">→</div>\n  <div class=\"flow-step\" style=\"min-width:140px;\">\n    <div class=\"step-label\">C-4</div>\n    <div class=\"step-name\" style=\"font-size:15px;\">自检+打破验证</div>\n  </div>\n</div>\n\n<h3>C-1 · 节奏规划</h3>\n<p style=\"font-size:13px;color:var(--mt);margin-bottom:12px;\">\n  基于决策卡的布局范围和认知操作序列，输出节奏表。\n</p>\n<div style=\"background:#f8f7f2;border-radius:var(--radius);padding:16px;font-family:var(--ff-mono);font-size:12px;overflow-x:auto;margin-bottom:16px;\">\n<pre style=\"margin:0;\">\n| Section | 锚点     | 认知操作 | 具体组件     | 底色 | 布局 |\n|---------|----------|---------|-------------|------|------|\n| Hero    | 宣言     | —       | V6 水印     | bg   | —    |\n| 指标    | 数据矩阵 | 扫      | numeral-grid| sf   | L23  |\n| 对比    | 供应商   | 比      | comparison  | —    | L15  |\n| ...     | ...      | ...     | ...         | ...  | ...  |\n</pre>\n</div>\n<p style=\"font-size:13px;color:var(--mt);\"><strong>组件选型</strong>：按决策卡的认知操作，查 <span class=\"ref-pill\">references/intent-index.md</span>（3 步：认知操作 → 数据形态 → 首选组件）。</p>\n\n<h4>布局多样性检查</h4>\n<ul style=\"font-size:13px;color:var(--mt);line-height:2;margin-left:20px;\">\n  <li>相邻 section 认知操作不同？</li>\n  <li>Hero 仅一处？</li>\n  <li>每 3 个 section 至少换一次布局家族？</li>\n  <li>相邻 section 底色、分栏数、组件类型至少两项不同？</li>\n</ul>\n\n<h3>C-2 · 查组件代码</h3>\n<table>\n  <tr><th>要查的</th><th>从哪里取</th></tr>\n  <tr><td>Hero CSS（核心 6 种）</td><td><span class=\"ref-pill\">showcase/H/H102-hero.html</span>（强制）</td></tr>\n  <tr><td>组件选型对照</td><td><span class=\"ref-pill\">references/intent-index.md</span></td></tr>\n  <tr><td>组件 HTML+CSS</td><td><span class=\"ref-pill\">references/components/INDEX.md</span> → 对应分类</td></tr>\n  <tr><td>布局 CSS</td><td><span class=\"ref-pill\">references/extended-layouts.md</span></td></tr>\n  <tr><td>SVG 图表</td><td><span class=\"ref-pill\">references/haglofs-components.md</span></td></tr>\n  <tr><td>装饰/纹理</td><td><span class=\"ref-pill\">references/textures.md</span> / <span class=\"ref-pill\">visual-elements-ext.md</span></td></tr>\n</table>\n<p style=\"font-size:12px;color:var(--mt);margin-top:8px;\">⚠ 只读需要的，不读全部。数据可视化必读 <span class=\"ref-pill\">references/chart-patterns.md</span>。</p>\n\n<h3>C-3 · 写代码</h3>\n<div class=\"insight\">\n  <strong>三层金字塔</strong>（每个 section）：<br>\n  <strong>Answer</strong> — 唯一结论，Playfair Display 96-120px<br>\n  <strong>Argument</strong> — 支撑上下文，Inter body 12-14px<br>\n  <strong>Evidence</strong> — 元数据/参数，JetBrains Mono，推到边缘<br><br>\n  <strong>8:1 硬约束</strong>：Hero 字号 ÷ 正文 ≥ 8。达不到的不算 Hero。\n</div>\n\n<h4>Hero 代码规则（强制）</h4>\n<p style=\"font-size:13px;color:var(--mt);\">只允许改：标题文字、指标数据、背景色。不允许改：布局结构、字号比例、间距。</p>\n\n<h3>C-4 · 自检 + 打破验证</h3>\n<table>\n  <tr><th>验证项</th><th>来源</th></tr>\n  <tr><td>Hero 类型是否与决策卡一致？</td><td>决策卡 Hero 层</td></tr>\n  <tr><td>签名设备是否与决策卡一致？</td><td>决策卡身份层</td></tr>\n  <tr><td>导航是否与决策卡一致？</td><td>决策卡身份层</td></tr>\n  <tr><td>Nature/Signal 色是否与决策卡一致？</td><td>决策卡颜色层</td></tr>\n  <tr><td>布局是否在指定范围内？</td><td>决策卡布局层</td></tr>\n  <tr><td>组件是否在安全候选中？</td><td>决策卡组件层</td></tr>\n  <tr><td>装饰数量是否 2-3 处？</td><td>决策卡装饰层</td></tr>\n</table>\n\n<h4>P4 审美自测</h4>\n<p style=\"font-size:13px;color:var(--mt);\">眯眼验证需输出具体数值，不答「通过」：</p>\n<div style=\"font-family:var(--ff-mono);font-size:12px;background:#f8f7f2;padding:12px 16px;border-radius:var(--radius);line-height:2;\">\n  Hero 96px / Body 12px = 8:1 ✅<br>\n  Answer #2D2A26 / Argument #1A1816 / Evidence #8A7D6E ✅<br>\n  打破处：第 3 section 的 120px 圆形元素 ✅\n</div>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 4: 决策路径 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-decision-path\">\n\n<h2>决策路径 · 全景</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  从 <span class=\"ref-pill\">references/decision-path.md</span> 提取。场景 → 默认视觉身份 → Hero/签名/导航/布局 一链锁定。\n</p>\n\n<h3>场景 → 默认视觉身份</h3>\n<div style=\"overflow-x:auto;\">\n<table>\n  <tr><th>场景</th><th>配色</th><th>主导色</th><th>Hero 底色</th><th>Hero 切割</th><th>信息层</th><th>签名</th><th>导航</th></tr>\n  <tr><td>感知层</td><td>建筑</td><td>Slate</td><td>深色</td><td>V6 水印</td><td>数据型</td><td>Line 2px</td><td>顶栏极简</td></tr>\n  <tr><td>决策层</td><td>建筑</td><td>Slate+暖橙</td><td>浅色</td><td>V6 水印</td><td>混合型</td><td>Line 2px</td><td>顶栏极简</td></tr>\n  <tr><td>计划层</td><td>建筑</td><td>Slate</td><td>浅色</td><td>V5 左斜切</td><td>陈述型</td><td>Line</td><td>顶栏极简</td></tr>\n  <tr><td>执行层</td><td>暖橙</td><td>Slate+暖橙</td><td>深色</td><td>V2 中心劈开</td><td>混合型</td><td>Bar</td><td>顶栏极简</td></tr>\n  <tr><td>沉淀层</td><td>留白</td><td>暖米+暖橙</td><td>浅色</td><td>V6 水印</td><td>陈述型</td><td>Ghost</td><td>顶栏极简</td></tr>\n  <tr><td>对外层</td><td>自然</td><td>Forest（低饱和）</td><td>深色</td><td>V1 对角线</td><td>混合型</td><td>Ghost+Line</td><td>侧栏</td></tr>\n</table>\n</div>\n\n<h3>视觉身份公式</h3>\n<p style=\"font-size:13px;color:var(--mt);margin-bottom:16px;\">\n  公式接受 4 个输入（Scene / Tone / D / F），覆盖 900 种组合，实际输出约 30-50 种。\n</p>\n\n<div class=\"grid-2\">\n  <div>\n    <h4>8 条分段函数</h4>\n    <div style=\"font-family:var(--ff-mono);font-size:12px;background:#f8f7f2;padding:16px;border-radius:var(--radius);line-height:2.2;\">\n      ① 配⾊路线 = f(Scene)<br>\n      ② Nature主⾊ = g(路线)<br>\n      ③ Signal⾊ = h(路线, 情绪)<br>\n      ④ Hero布局 = i(Scene)<br>\n      ⑤ Hero切割 = j(F, Scene, Tone)<br>\n      ⑥ 信息层 = k(D)<br>\n      ⑦ 签名 = l(Scene)<br>\n      ⑧ 导航 = m(F, Scene)\n    </div>\n  </div>\n  <div>\n    <h4>已知局限</h4>\n    <div style=\"font-size:12px;line-height:1.8;color:var(--mt);\">\n      🔸 Tone 模糊 — 强制选一边<br>\n      🔸 ⽆跨⻚记忆 — 多⻚统⼀⽤⾸⻚<br>\n      🔸 确定性单调 — 靠打破+轮转<br>\n      🔸 场景边界模糊 — ⼿动覆盖<br>\n      🔸 F=3 中间值 — D⾼时改对⻆线\n    </div>\n  </div>\n</div>\n\n<h3>Hero 6 种核心 + 13 种备用</h3>\n<div style=\"overflow-x:auto;\">\n<table>\n  <tr><th>类型</th><th>名称</th><th>CSS 特征</th><th>地位</th></tr>\n  <tr><td>V1</td><td>Diagonal 对角线</td><td><span style=\"font-family:var(--ff-mono);font-size:11px;\">clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%)</span></td><td><span class=\"tag tag-gold\">核心</span></td></tr>\n  <tr><td>V2</td><td>Split 中心劈开</td><td><span style=\"font-family:var(--ff-mono);font-size:11px;\">grid-template-columns: 1fr 1fr</span> 左浅右深</td><td><span class=\"tag tag-gold\">核心</span></td></tr>\n  <tr><td>V3</td><td>Horizontal 上下劈开</td><td><span style=\"font-family:var(--ff-mono);font-size:11px;\">grid-template-rows: 1fr 1fr</span> 上浅下深</td><td><span class=\"tag tag-gold\">核心</span></td></tr>\n  <tr><td>V4</td><td>Quadrant 四分之一</td><td><span style=\"font-family:var(--ff-mono);font-size:11px;\">grid</span> + 右上深⾊⽅块</td><td><span class=\"tag tag-gold\">核心</span></td></tr>\n  <tr><td>V5</td><td>Bevel 左斜切</td><td><span style=\"font-family:var(--ff-mono);font-size:11px;\">clip-path: polygon(40% 0, 100% 0, 100% 100%, 0% 100%)</span></td><td><span class=\"tag tag-gold\">核心</span></td></tr>\n  <tr><td>V6</td><td>Watermark 水印声明</td><td>居中 + 超⼤透明 ghost 字衬底</td><td><span class=\"tag tag-gold\">核心</span></td></tr>\n  <tr><td>—</td><td>Before/After</td><td>grid 1fr 1fr 双⾊面板</td><td><span class=\"tag tag-blue\">备用</span></td></tr>\n  <tr><td>—</td><td>Numeral ⼤数字</td><td>96-120px JetBrains Mono 数字为主视觉</td><td><span class=\"tag tag-blue\">备用</span></td></tr>\n  <tr><td>—</td><td>Dashboard 仪表盘</td><td>浅⾊底 + 2×2 指标⽹格</td><td><span class=\"tag tag-blue\">备用</span></td></tr>\n  <tr><td>—</td><td>Terminal 终端</td><td>JetBrains Mono 全⻚ + 信号⾊</td><td><span class=\"tag tag-blue\">备用</span></td></tr>\n  <tr><td>—</td><td>Pulse 脉冲</td><td>顶部脉冲扫描线 + 深⾊底</td><td><span class=\"tag tag-blue\">备用</span></td></tr>\n</table>\n</div>\n\n<h3>轮转机制</h3>\n<p style=\"font-size:13px;color:var(--mt);\">\n  多页时，Hero 切割 / 签名 / 导航各⾃独⽴偏移，避免同步重复。\n  <span style=\"display:block;margin-top:8px;font-family:var(--ff-mono);font-size:12px;color:var(--steel);\">\n    hero_index = (全局计数器 - 1) % hero_pool.length<br>\n    sig_index  = (全局计数器 - 1 + 2) % sig_pool.length<br>\n    nav_index  = (全局计数器 - 1 + 1) % nav_pool.length\n  </span>\n</p>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 5: 组件选型 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-components\">\n\n<h2>9 种认知操作 · 组件选型</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  配方给的是\"认知操作\"，不是具体组件。同一操作下组件可互换。\n  完整映射（120+ 组件，含替代条件）⻅ <span class=\"ref-pill\">references/intent-index.md</span>。\n</p>\n\n<div class=\"grid-3\">\n  <div class=\"card\" style=\"border-left: 3px solid var(--slate);\">\n    <div class=\"card-title\">扫 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 概览</span></div>\n    <div class=\"card-desc\">stat-block / numeral-grid / bento-grid / metric-card / kpi-card / dashboard-grid</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--forest);\">\n    <div class=\"card-title\">比 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 对比</span></div>\n    <div class=\"card-desc\">comparison / tension-grid / data-table / spec-table / light-dark-switch / principle-card</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--gold);\">\n    <div class=\"card-title\">排 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 排名</span></div>\n    <div class=\"card-desc\">rank-bar / seg-bar / numeral-grid / stacked-bar / progress-bar / weight-bar / donut chart</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--sky);\">\n    <div class=\"card-title\">读 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 流程</span></div>\n    <div class=\"card-desc\">timeline-track / flow-pipeline / step-sequence / funnel / level-track / phase-bar</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--red);\">\n    <div class=\"card-title\">量 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 度量</span></div>\n    <div class=\"card-desc\">gauge-arc / sparkline / bullet-chart / block-bar / line chart / area chart</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--clay);\">\n    <div class=\"card-title\">解 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 解读</span></div>\n    <div class=\"card-desc\">callout / pull-quote / marginalia / brand-statement / annotated-highlight / action-list</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--steel);\">\n    <div class=\"card-title\">信 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 证据</span></div>\n    <div class=\"card-desc\">logo-wall / source-row / tag / single-huge-quote / code-panel / nameplate-label</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--moss);\">\n    <div class=\"card-title\">展 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 展开</span></div>\n    <div class=\"card-desc\">accordion / tab-switcher / flip-card / detail-panel / carousel / stacked-cards</div>\n  </div>\n  <div class=\"card\" style=\"border-left: 3px solid var(--stone);\">\n    <div class=\"card-title\">感 <span style=\"font-weight:400;color:var(--stone);font-family:var(--ff-mono);font-size:11px;\">· 氛围</span></div>\n    <div class=\"card-desc\">ghost-text / seal / dot-pattern / decorative-number / spinning-ring / device-shell</div>\n  </div>\n</div>\n\n<div class=\"insight\">\n  <strong>组件选型路径</strong>：<br>\n  决策卡中的认知操作 → 查 <span class=\"ref-pill\">intent-index.md</span> → 定位数据形态 → 选首选组件 → 如不适合，同操作下互换<br>\n  <span style=\"font-size:12px;\">例：场景说\"关键指标概览\"→ 认知操作\"扫\"→ intent-index 推荐 stat-block → 想换？同操作下 numeral-grid，节奏不变组件变了。</span>\n</div>\n\n<h3>数据可视化 → 双路径</h3>\n<div style=\"overflow-x:auto;\">\n<table>\n  <tr><th>认知操作</th><th>组件路径（CSS）</th><th>图表路径（ECharts/SVG）</th><th>切换条件</th></tr>\n  <tr><td>排→排名</td><td>rank-bar</td><td>rank-bar chart</td><td>数据 >10 条或需动态排序</td></tr>\n  <tr><td>排→比例</td><td>seg-bar</td><td>donut chart</td><td>分段 >6 个</td></tr>\n  <tr><td>量→趋势</td><td>sparkline</td><td>line/area chart</td><td>需详细时间轴</td></tr>\n  <tr><td>比→对比</td><td>comparison</td><td>grouped-bar / radar</td><td>多个交叉维度</td></tr>\n  <tr><td>量→仪表</td><td>gauge-arc</td><td>gauge chart</td><td>需精确刻度</td></tr>\n  <tr><td>读→流程</td><td>timeline-track</td><td>gantt chart</td><td>需时间跨度</td></tr>\n</table>\n</div>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 6: 色彩体系 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-color\">\n\n<h2>14 色系统</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  Neutral 6 阶 · Nature 4 色 · Signal 4 色。无渐变、无阴影、无毛玻璃。\n</p>\n\n<h3>Neutral 中性色 6 阶</h3>\n<div class=\"grid-3\" style=\"margin-bottom:24px;\">\n  <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:16px;\">\n    <div style=\"width:40px;height:40px;border-radius:4px;background:#F6F6F0;border:1px solid #ddd;\"></div>\n    <div><strong>Off-white</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#F6F6F0 · 页面背景</span></div>\n  </div>\n  <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:16px;\">\n    <div style=\"width:40px;height:40px;border-radius:4px;background:#EDEDE0;border:1px solid #ddd;\"></div>\n    <div><strong>Cream</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#EDEDE0 · 表面层</span></div>\n  </div>\n  <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:16px;\">\n    <div style=\"width:40px;height:40px;border-radius:4px;background:#E2E0D0;border:1px solid #ddd;\"></div>\n    <div><strong>Sand</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#E2E0D0 · 边缘</span></div>\n  </div>\n  <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:16px;\">\n    <div style=\"width:40px;height:40px;border-radius:4px;background:#A09888;border:1px solid #ddd;\"></div>\n    <div><strong>Stone</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#A09888 · 置灰</span></div>\n  </div>\n  <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:16px;\">\n    <div style=\"width:40px;height:40px;border-radius:4px;background:#6A6558;\"></div>\n    <div><strong>Magnetite</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#6A6558 · 次要</span></div>\n  </div>\n  <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;padding:16px;\">\n    <div style=\"width:40px;height:40px;border-radius:4px;background:#1A1816;\"></div>\n    <div><strong>Black</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#1A1816 · 正文</span></div>\n  </div>\n</div>\n\n<h3>Nature 自然色 4 色</h3>\n<div class=\"grid-4\" style=\"margin-bottom:24px;\">\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--forest);margin-bottom:8px;\"></div>\n    <strong>Forest</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#3D5A35</span>\n  </div>\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--moss);margin-bottom:8px;\"></div>\n    <strong>Moss</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#6B8B5E</span>\n  </div>\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--slate);margin-bottom:8px;\"></div>\n    <strong>Slate</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#4E627C</span>\n  </div>\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--steel);margin-bottom:8px;\"></div>\n    <strong>Steel</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#7A8B9B</span>\n  </div>\n</div>\n\n<h3>Signal 信号色 4 色</h3>\n<div class=\"grid-4\" style=\"margin-bottom:24px;\">\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--gold);margin-bottom:8px;\"></div>\n    <strong>Gold</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#BF9B5A</span>\n  </div>\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--clay);margin-bottom:8px;\"></div>\n    <strong>Clay</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#C66B4B</span>\n  </div>\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--red);margin-bottom:8px;\"></div>\n    <strong>Red</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#E93C10</span>\n  </div>\n  <div class=\"card\" style=\"text-align:center;\">\n    <div style=\"width:100%;height:60px;border-radius:4px;background:var(--sky);margin-bottom:8px;\"></div>\n    <strong>Sky</strong><br><span style=\"font-family:var(--ff-mono);font-size:11px;color:var(--stone);\">#4A80C0</span>\n  </div>\n</div>\n\n<h3>Nature × Signal 固定配对</h3>\n<div style=\"overflow-x:auto;\">\n<table>\n  <tr><th>Nature</th><th>Signal 锚定</th><th>情绪基调</th></tr>\n  <tr><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--forest)\"></span>Forest</span></td><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--gold)\"></span>Gold</span></td><td>权威、增长、活⼒</td></tr>\n  <tr><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--moss)\"></span>Moss</span></td><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--clay)\"></span>Clay</span></td><td>温暖、怀旧、质感</td></tr>\n  <tr><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--slate)\"></span>Slate</span></td><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--sky)\"></span>Sky</span></td><td>冷峻、精确、距离感</td></tr>\n  <tr><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--steel)\"></span>Steel</span></td><td><span class=\"swatch\"><span class=\"swatch-dot\" style=\"background:var(--red)\"></span>Red</span></td><td>⼯业、严谨、边界</td></tr>\n</table>\n</div>\n\n</section>\n\n<!-- ============================================================ -->\n<!-- TAB 7: 参考文件 -->\n<!-- ============================================================ -->\n<section class=\"tab-content\" id=\"tab-refs\">\n\n<h2>参考文件索引</h2>\n<p style=\"color:var(--mt);margin-bottom:20px;\">\n  所有参考文件按读取时机分类。共 15+ 文件，~6 MB 知识体。\n</p>\n\n<h3>Step A · 必读（5 个）</h3>\n<table>\n  <tr><th>文件</th><th>位置</th><th>用途</th></tr>\n  <tr><td><span class=\"ref-pill\">brand-dna.md</span></td><td>./</td><td>品牌基因、气质、Craft Rules</td></tr>\n  <tr><td><span class=\"ref-pill\">references/tokens.md</span></td><td>./references/</td><td>字体/颜色/间距/圆角精确值</td></tr>\n  <tr><td><span class=\"ref-pill\">references/recipe-book.md</span></td><td>./references/</td><td>配方手册（6 场景 × 3 深度）</td></tr>\n  <tr><td><span class=\"ref-pill\">references/intent-index.md</span></td><td>./references/</td><td>组件选型速查表（120+ 组件）</td></tr>\n  <tr><td><span class=\"ref-pill\">showcase/H/H102-hero.html</span></td><td>./showcase/H/</td><td>核心 6 种 Hero CSS</td></tr>\n  <tr><td><span class=\"ref-pill\">references/components/INDEX.md</span></td><td>./references/components/</td><td>组件目录索引</td></tr>\n</table>\n\n<h3>Step B · 按需（1 个）</h3>\n<table>\n  <tr><th>文件</th><th>位置</th><th>何时读</th></tr>\n  <tr><td><span class=\"ref-pill\">references/decision-path.md</span></td><td>./references/</td><td>Step B2 锁定决策时</td></tr>\n  <tr><td><span class=\"ref-pill\">references/design-decision-card.md</span></td><td>./references/</td><td>Step B4 填写 + C 步骤对照</td></tr>\n</table>\n\n<h3>Step C · 按需（8+ 个）</h3>\n<table>\n  <tr><th>文件</th><th>位置</th><th>用途</th></tr>\n  <tr><td><span class=\"ref-pill\">references/extended-layouts.md</span></td><td>./references/</td><td>32 种布局 CSS</td></tr>\n  <tr><td><span class=\"ref-pill\">references/entrances.md</span></td><td>./references/</td><td>15 种入场效果</td></tr>\n  <tr><td><span class=\"ref-pill\">references/typography-treatments.md</span></td><td>./references/</td><td>25 种文字处理</td></tr>\n  <tr><td><span class=\"ref-pill\">references/textures.md</span></td><td>./references/</td><td>15 种 CSS 材质</td></tr>\n  <tr><td><span class=\"ref-pill\">references/visual-elements-ext.md</span></td><td>./references/</td><td>20 种装饰元素</td></tr>\n  <tr><td><span class=\"ref-pill\">references/chart-patterns.md</span></td><td>./references/</td><td>8 种图表 + ECharts/SVG 双路径</td></tr>\n  <tr><td><span class=\"ref-pill\">references/hero-standards.md</span></td><td>./references/</td><td>备用 13 种 Hero 参数</td></tr>\n  <tr><td><span class=\"ref-pill\">references/checklist.md</span></td><td>./references/</td><td>25 项 P0-P4 质量检查</td></tr>\n  <tr><td><span class=\"ref-pill\">references/visual-forms.md</span></td><td>./references/</td><td>8 结构特征 × 4 级组件清单</td></tr>\n  <tr><td><span class=\"ref-pill\">references/design-rules.md</span></td><td>./references/</td><td>详细设计规则</td></tr>\n  <tr><td><span class=\"ref-pill\">references/haglofs-components.md</span></td><td>./references/</td><td>SVG 图表（过渡用）</td></tr>\n</table>\n\n<h3>展示与模板</h3>\n<table>\n  <tr><th>位置</th><th>数量</th><th>索引</th></tr>\n  <tr><td><span class=\"ref-pill\">references/showcase/H/</span></td><td>73 个素材池</td><td>按 Hero 类型命名</td></tr>\n  <tr><td><span class=\"ref-pill\">references/showcase/R/</span></td><td>36 个精选案例</td><td><span class=\"ref-pill\">SCENE-INDEX.md</span></td></tr>\n  <tr><td><span class=\"ref-pill\">references/templates/</span></td><td>19 个幻灯片模板</td><td>{Name}-nian.html</td></tr>\n</table>\n\n</section>\n\n<!-- ===== JS ===== -->\n<script>\n// Tab 切换\nconst tabs = document.querySelectorAll('.tab-btn');\ntabs.forEach(btn => {\n  btn.addEventListener('click', () => {\n    tabs.forEach(b => b.classList.remove('active'));\n    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));\n    btn.classList.add('active');\n    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');\n  });\n});\n\n// 从总览跳转到指定 tab\nfunction scrollToTab(id) {\n  const btn = document.querySelector(`[data-tab=\"${id}\"]`);\n  if (btn) btn.click();\n}\n\n// Accordion\nfunction toggleAccordion(header) {\n  const item = header.parentElement;\n  item.classList.toggle('open');\n}\n\n// Highlight 路径\ndocument.querySelectorAll('.flow-step').forEach(el => {\n  el.addEventListener('click', function() {\n    this.style.outline = '2px solid var(--forest)';\n    setTimeout(() => this.style.outline = '', 600);\n  });\n});\n</script>\n\n</body>\n</html>\nENDOFFILE\necho \"Done. Size: $(wc -c < /Users/sundanian/Documents/projects/ai-agents/my-agent/workspace/nian-design-skill-map.html) bytes\"", "bash=open /Users/sundanian/Documents/projects/ai-agents/my-agent/workspace/nian-design-skill-map.html", "explore", "bash=ls -la .claude/skills/ | head -40", "bash=ls -d .claude/skills/nothing-design 2>/dev/null; ls -d .reasonix/skills/nothing-design 2>/dev/null; ls -d .agents/skills/nothing-design 2>/dev/null", "bash=ls .claude/skills/ | sort", "bash=ls .claude/skills/ | grep -i '^design$'; ls .reasonix/skills/ 2>/dev/null | grep -i '^design$'", "write_file=workspace/2026-06-07-设计复刻-showcase/01-联盟分享会毅航合肥.html", "edit_file=workspace/2026-06-05-供应商AI转型方案/Task3-供应商管理数字化.md", "bash=ls -la ~/.myagent/ 2>/dev/null; echo \"---EXIT:$?---\"", "bash=# 搜索可能的 myagent 相关目录或配置文件\nfind ~ -maxdepth 3 -type d -iname \"*myagent*\" 2>/dev/null\nfind ~ -maxdepth 3 -type f -iname \"*myagent*\" 2>/dev/null\n# 也看看常见的 AI 助手配置目录\nls -d ~/.claude ~/.cursor ~/.windsurf ~/.openclaw ~/.chatgpt ~/.gemini ~/.copilot 2>/dev/null\necho \"---DONE---\"", "bash=# 查看 myagents 配置文件结构\necho \"=== ~/.myagents/ 目录树 ===\"\nfind ~/.myagents -maxdepth 3 -type f 2>/dev/null | head -60\n\necho \"\"\necho \"=== 配置文件 ===\"\ncat ~/.myagents/myagents_files/global.json 2>/dev/null || echo \"global.json not found\"\n\necho \"\"\necho \"=== 技能文件 ===\"\nls -la ~/.myagents/skills/ 2>/dev/null\n\necho \"\"\necho \"=== MEMORY.md ===\"\ncat ~/.myagents/MEMORY.md 2>/dev/null || echo \"not found\"\n\necho \"\"\necho \"=== AGENTS.md ===\"\ncat ~/.myagents/AGENTS.md 2