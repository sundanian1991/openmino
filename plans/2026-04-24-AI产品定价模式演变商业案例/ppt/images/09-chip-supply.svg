<text x="220" y="338" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="600" fill="#f1f3f5">FP4 算力</text>
<text x="370" y="338" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="600" fill="#f1f3f5">定价</text>
<text x="500" y="338" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="600" fill="#f1f3f5">状态</text>

<!-- Row 1: H20 -->
<rect x="60" y="351" width="560" height="32" fill="#f5f7fa"/>
<text x="80" y="372" font-family="'Noto Sans SC',sans-serif" font-size="11" fill="#3a5a7a">H20</text>
<text x="220" y="372" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#4a6a8a">0.54 PFLOPS</text>
