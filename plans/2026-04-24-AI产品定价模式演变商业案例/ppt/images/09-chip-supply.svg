<text x="340" y="477" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#2a4a6a">算力是 H20 的 2.87 倍，价格是 H200 的 1/3 —— 国产自研 HBM 突破供应链限制</text>

<!-- Connection arrows from charts to table -->
<path d="M175 270 C175 290,200 300,250 310" fill="none" stroke="#c25030" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#a2)" opacity="0.5"/>
<path d="M505 270 C505 290,480 300,440 310" fill="none" stroke="#2e8b6e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#a2)" opacity="0.5"/>

