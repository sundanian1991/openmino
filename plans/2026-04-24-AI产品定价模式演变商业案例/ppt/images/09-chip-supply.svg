<text x="500" y="404" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#c25030">禁售</text>

<!-- Row 3: 950PR (highlighted) -->
<rect x="60" y="415" width="560" height="40" rx="4" fill="#0a1f3d"/>
<text x="80" y="440" font-family="'Noto Sans SC',sans-serif" font-size="12" font-weight="600" fill="#f1f3f5">昇腾 950PR</text>
<text x="220" y="440" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="600" fill="#70b0e0">1.56 PFLOPS</text>
