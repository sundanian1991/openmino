<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0a0a0f; }
      .number { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 72px; font-weight: 700; fill: #c98a6a; }
      .label { font-family: 'Noto Serif SC', 'Georgia', serif; font-size: 14px; fill: #857d74; }
      .badge-teal { font-family: 'JetBrains Mono', monospace; font-size: 16px; fill: #2a9d8f; }
      .badge-teal-box { fill: none; stroke: #2a9d8f; stroke-width: 1.5; rx: 6; }
      .badge-coral { font-family: 'JetBrains Mono', monospace; font-size: 16px; fill: #e76f51; }
      .badge-coral-box { fill: none; stroke: #e76f51; stroke-width: 1.5; rx: 6; }
      .vs { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #555; }
      .subtitle { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #857d74; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="700"/>

  <!-- Main Number: 10,000,000,000 -->
  <text x="600" y="340" text-anchor="middle" class="number">10,000,000,000</text>

  <!-- Bottom label -->
  <text x="600" y="400" text-anchor="middle" class="label">一个开发者 x 8 个月 x Claude Code</text>

  <!-- Subtitle above number -->
  <text x="600" y="280" text-anchor="middle" class="subtitle">一个开发者 8 个月消耗 100 亿 Token</text>

  <!-- Right side badges -->
  <rect x="820" y="300" width="140" height="36" class="badge-teal-box"/>
  <text x="890" y="324" text-anchor="middle" class="badge-teal">¥40 订阅</text>

  <text x="890" y="360" text-anchor="middle" class="vs">vs</text>

  <rect x="820" y="380" width="160" height="36" class="badge-coral-box"/>
  <text x="900" y="404" text-anchor="middle" class="badge-coral">API 价 $15,000+</text>

  <!-- Corner annotation -->
  <text x="40" y="670" class="label" style="font-size: 11px;">数据：2026 | 一个开发者 8 个月 Token 消耗估算</text>
</svg>
