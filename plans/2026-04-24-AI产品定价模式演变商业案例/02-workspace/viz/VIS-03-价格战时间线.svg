<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #faf9f7; }
      .axis-line { stroke: #d4cdc4; stroke-width: 1; }
      .event { rx: 6; }
      .event-coral { fill: #fde8e0; stroke: #e76f51; stroke-width: 1.2; }
      .event-teal { fill: #e0f5ef; stroke: #2a9d8f; stroke-width: 1.2; }
      .event-sky { fill: #e0eff8; stroke: #87bfcf; stroke-width: 1.2; }
      .event-warm { fill: #f0ddd4; stroke: #c98a6a; stroke-width: 1.2; }
      .event-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #6b3410; font-weight: 600; }
      .event-text { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; fill: #333; }
      .event-bold { font-weight: 600; }
      .title { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #6b3410; font-weight: 600; }
      .subtitle { font-family: 'Noto Sans SC', sans-serif; font-size: 12px; fill: #857d74; }
      .timeline-main { stroke: #c98a6a; stroke-width: 2.5; fill: none; }
      .causal-arrow { stroke: #e76f51; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
      .causal-label { font-family: 'Noto Sans SC', sans-serif; font-size: 10px; fill: #e76f51; font-style: italic; }
      .legend-item { font-size: 10px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="960" height="440"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" class="title">18 个月的价格战争地图</text>
  <text x="480" y="56" text-anchor="middle" class="subtitle">2024 Q4 → 2026 Q4 | 国内 AI 大模型定价演变</text>

  <!-- Timeline axis -->
  <line x1="60" y1="120" x2="920" y2="120" class="axis-line"/>
  <line class="timeline-main" x1="60" y1="118" x2="920" y2="118"/>

  <!-- Time labels -->
  <text x="60" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2024 Q4</text>
  <text x="220" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2025 Q2</text>
  <text x="380" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2025 H2</text>
  <text x="520" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2026-01</text>
  <text x="640" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2026-02</text>
  <text x="740" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2026-03</text>
  <text x="860" y="140" text-anchor="middle" class="event-date" style="font-size:10px;">2026-04</text>

  <!-- Events on the timeline (above axis) -->
  <!-- 2024 Q4: DeepSeek 带头降价 -->
  <rect x="30" y="60" width="100" height="48" class="event event-coral"/>
  <text x="80" y="82" text-anchor="middle" class="event-text" style="font-size:10px;">DeepSeek 带头降价</text>
  <text x="80" y="97" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">百万 Token 几十元→几毛</text>

  <!-- 2025 Q4: 智谱 GLM Coding Plan -->
  <rect x="190" y="60" width="90" height="48" class="event event-teal"/>
  <text x="235" y="82" text-anchor="middle" class="event-text" style="font-size:10px;">智谱首推</text>
  <text x="235" y="97" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">Coding Plan</text>

  <!-- 2025 H2: 收紧 -->
  <rect x="340" y="60" width="100" height="48" class="event event-coral"/>
  <text x="390" y="82" text-anchor="middle" class="event-text" style="font-size:10px;">首购取消·低档停售</text>
  <text x="390" y="97" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">限时抢购</text>

  <!-- 2026-01: Kimi Token -->
  <rect x="490" y="60" width="80" height="48" class="event event-sky"/>
  <text x="530" y="82" text-anchor="middle" class="event-text" style="font-size:10px;">Kimi 切换</text>
  <text x="530" y="97" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">Token 计量</text>

  <!-- 2026-02: OpenClaw 爆火 (HIGHLIGHT) -->
  <rect x="590" y="30" width="110" height="78" class="event event-coral" style="stroke-width:2;"/>
  <text x="645" y="55" text-anchor="middle" class="event-text event-bold" style="font-size:12px;fill:#e76f51;">OpenClaw 爆火</text>
  <text x="645" y="72" text-anchor="middle" class="event-text" style="font-size:10px;">Token 消耗 6-10x</text>
  <text x="645" y="90" text-anchor="middle" class="event-text" style="font-size:9px;fill:#e76f51;font-style:italic;">催化剂</text>

  <!-- 2026-03: MiniMax Token Plan -->
  <rect x="710" y="60" width="80" height="48" class="event event-teal"/>
  <text x="750" y="82" text-anchor="middle" class="event-text" style="font-size:10px;">MiniMax 更名</text>
  <text x="750" y="97" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">Token Plan</text>

  <!-- 2026-03-05: 腾讯云 -->
  <rect x="800" y="60" width="70" height="48" class="event event-sky"/>
  <text x="835" y="82" text-anchor="middle" class="event-text" style="font-size:10px;">腾讯云入局</text>
  <text x="835" y="97" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">六大全上线</text>

  <!-- Events below the timeline -->
  <!-- 2026-04: 百炼 Lite 下架 -->
  <rect x="830" y="150" width="80" height="48" class="event event-coral"/>
  <text x="870" y="172" text-anchor="middle" class="event-text" style="font-size:10px;">百炼 Lite</text>
  <text x="870" y="187" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">下架</text>

  <!-- 2026-04: 百炼企业版 -->
  <rect x="730" y="150" width="80" height="48" class="event event-teal"/>
  <text x="770" y="172" text-anchor="middle" class="event-text" style="font-size:10px;">百炼企业版</text>
  <text x="770" y="187" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">Token Plan</text>

  <!-- 2026-04: 小米 MiMo -->
  <rect x="630" y="150" width="80" height="48" class="event event-coral"/>
  <text x="670" y="172" text-anchor="middle" class="event-text" style="font-size:10px;">小米 $1/$3</text>
  <text x="670" y="187" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">极低价入局</text>

  <!-- 2026-04: Anthropic 移除 -->
  <rect x="530" y="150" width="80" height="48" class="event event-coral"/>
  <text x="570" y="172" text-anchor="middle" class="event-text" style="font-size:10px;">Anthropic 移除</text>
  <text x="570" y="187" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">OpenClaw 访问</text>

  <!-- 2026-04-24: DeepSeek V4 -->
  <rect x="430" y="150" width="80" height="48" class="event event-teal" style="stroke-width:1.8;"/>
  <text x="470" y="172" text-anchor="middle" class="event-text event-bold" style="font-size:10px;">DeepSeek V4</text>
  <text x="470" y="187" text-anchor="middle" class="event-text" style="font-size:9px;fill:#857d74;">开源·成本降 73%</text>

  <!-- Causal arrow: OpenClaw → Coding Plan 承压 → Token Plan -->
  <path class="causal-arrow" d="M 645,108 Q 700,130 750,108"/>
  <text x="700" y="145" text-anchor="middle" class="causal-label">催化转向 Token Plan</text>

  <!-- Legend -->
  <rect x="40" y="230" width="12" height="12" class="event-coral" rx="3"/>
  <text x="58" y="241" class="legend-item" fill="#857d74;">收紧 / 催化</text>
  <rect x="140" y="230" width="12" height="12" class="event-teal" rx="3"/>
  <text x="158" y="241" class="legend-item" fill="#857d74;">新形态 / 终态</text>
  <rect x="240" y="230" width="12" height="12" class="event-sky" rx="3"/>
  <text x="258" y="241" class="legend-item" fill="#857d74;">切换 / 全面</text>

  <text x="480" y="420" text-anchor="middle" class="subtitle" style="font-size:10px;">高亮：OpenClaw 爆火（催化剂）→ Token Plan 更名（终态信号）</text>
</svg>
