<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 320" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #faf9f7; }
      .metric-card { fill: #ffffff; stroke: #e8e0d8; stroke-width: 1; rx: 10; }
      .metric-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
      .metric-label { font-family: 'Noto Sans SC', sans-serif; font-size: 12px; fill: #857d74; }
      .title { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #6b3410; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="840" height="320"/>

  <!-- Title -->
  <text x="420" y="36" text-anchor="middle" class="title">18 个月的价格战，四个关键数字</text>

  <!-- Card 1: 7+ 参战平台 -->
  <rect x="20" y="60" width="190" height="220" class="metric-card"/>
  <text x="115" y="140" text-anchor="middle" class="metric-num" style="font-size:42px;fill:#c98a6a;">7+</text>
  <text x="115" y="170" text-anchor="middle" class="metric-label">参战平台</text>

  <!-- Card 2: 5 种计量 -->
  <rect x="226" y="60" width="190" height="220" class="metric-card"/>
  <text x="321" y="140" text-anchor="middle" class="metric-num" style="font-size:42px;fill:#857d74;">5</text>
  <text x="321" y="170" text-anchor="middle" class="metric-label">种计量方式</text>

  <!-- Card 3: 70% 浪费 (HIGHLIGHT - Coral) -->
  <rect x="432" y="60" width="190" height="220" class="metric-card" style="stroke:#e76f51;stroke-width:2;"/>
  <text x="527" y="140" text-anchor="middle" class="metric-num" style="font-size:52px;fill:#e76f51;">70%</text>
  <text x="527" y="170" text-anchor="middle" class="metric-label" style="fill:#e76f51;font-weight:600;">Token 浪费率</text>

  <!-- Card 4: 93% 节省 -->
  <rect x="638" y="60" width="190" height="220" class="metric-card" style="stroke:#2a9d8f;stroke-width:1.5;"/>
  <text x="733" y="140" text-anchor="middle" class="metric-num" style="font-size:42px;fill:#2a9d8f;">93%</text>
  <text x="733" y="170" text-anchor="middle" class="metric-label" style="fill:#2a9d8f;">订阅节省比例</text>

  <!-- Footer -->
  <text x="420" y="305" text-anchor="middle" class="metric-label" style="font-size:10px;">参战平台多、计量混乱、浪费严重，但订阅能省大钱</text>
</svg>
