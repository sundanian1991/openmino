<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VIS-07 芯片供给即定价天花板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #faf9f7; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  .title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: #6b3410; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #857d74; margin-bottom: 24px; }
  #chart { width: 650px; height: 320px; }
  .footnote { font-size: 11px; color: #857d74; margin-top: 16px; }
</style>
</head>
<body>
<div class="title">华为昇腾每多出货一片，Token 就便宜一分</div>
<div class="subtitle">2024-2028 芯片市占率演变 | 国产替代 = 成本下降</div>
<div id="chart"></div>
<div class="footnote">来源：伯恩斯坦预测 + 公开数据 | E 表示估算值</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  grid: { left: 50, right: 50, top: 30, bottom: 30 },
  xAxis: {
    type: 'category',
    data: ['2024', '2025', '2026E', '2027E', '2028E'],
    axisLine: { lineStyle: { color: '#d4cdc4' } },
    axisTick: { show: false },
    axisLabel: { textStyle: { color: '#857d74', fontSize: 12 } }
  },
  yAxis: {
    type: 'value',
    name: '市占率 %',
    max: 100,
    nameTextStyle: { color: '#857d74', fontSize: 11, padding: [0, 0, 0, 40] },
    splitLine: { lineStyle: { color: '#e8e0d8', type: 'dashed' } },
    axisLabel: { formatter: '{value}%', textStyle: { color: '#857d74', fontSize: 11 } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  tooltip: { trigger: 'item' },
  series: [
    {
      name: '英伟达',
      type: 'line',
      data: [66, 54, 45, 40, 35],
      smooth: true,
      lineStyle: { color: '#857d74', width: 2, type: 'dashed' },
      itemStyle: { color: '#857d74' },
      label: { show: true, position: 'top', formatter: '{c}%', textStyle: { color: '#857d74', fontSize: 10 } }
    },
    {
      name: '华为昇腾',
      type: 'line',
      data: [10, 20, 32, 40, 45],
      smooth: true,
      lineStyle: { color: '#c98a6a', width: 3 },
      itemStyle: { color: '#c98a6a' },
      label: { show: true, position: 'top', formatter: '{c}%', textStyle: { color: '#c98a6a', fontSize: 11, fontWeight: 600 } },
      markPoint: {
        data: [{ coord: ['2026E', 32], value: '交叉窗口', itemStyle: { color: '#c98a6a' }, label: { color: '#6b3410', fontSize: 10 } }],
        symbol: 'circle',
        symbolSize: 8,
        symbolOffset: [0, -20]
      }
    },
    {
      name: '国产合计',
      type: 'line',
      data: [30, 41, 52, 55, 60],
      smooth: true,
      lineStyle: { color: '#2a9d8f', width: 2, type: 'dashed' },
      itemStyle: { color: '#2a9d8f' },
      label: { show: true, position: 'bottom', formatter: '{c}%', textStyle: { color: '#2a9d8f', fontSize: 10 } }
    }
  ]
};
chart.setOption(option);
</script>
</body>
</html>
