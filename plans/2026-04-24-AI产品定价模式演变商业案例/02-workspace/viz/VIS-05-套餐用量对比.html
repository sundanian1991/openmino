<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VIS-05 套餐实际用量对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #faf9f7; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
  .title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: #6b3410; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #857d74; margin-bottom: 24px; }
  #chart { width: 800px; height: 420px; }
  .footnote { font-size: 11px; color: #857d74; margin-top: 16px; }
</style>
</head>
<body>
<div class="title">同样 ¥40/月，实际可用量差距最大 15 倍</div>
<div class="subtitle">入门档套餐对比 | 2026-04 价格</div>
<div id="chart"></div>
<div class="footnote">数据截至 2026-04-24，实际等效为每日提问次数估算</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  grid: { left: 140, right: 100, top: 20, bottom: 20 },
  xAxis: {
    type: 'value',
    name: '每日等效提问次数',
    nameLocation: 'end',
    nameTextStyle: { color: '#857d74', fontSize: 11, padding: [0, 0, 0, 0] },
    splitLine: { lineStyle: { color: '#e8e0d8', type: 'dashed' } },
    axisLabel: { textStyle: { color: '#857d74', fontSize: 11 } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'category',
    data: ['Cursor Pro', '小米 MiMo Lite', '阿里百炼 Lite', '智谱 GLM Lite', '腾讯云 Lite', 'MiniMax Starter', 'Kimi Andante'],
    inverse: true,
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { textStyle: { color: '#333', fontSize: 12, fontWeight: 500 } }
  },
  tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
  series: [{
    type: 'bar',
    data: [
      { value: 225, itemStyle: { color: '#2a9d8f' }, label: { show: true, position: 'right', formatter: '~225次\n(无限 Auto)', textStyle: { color: '#2a9d8f', fontSize: 11 } } },
      { value: 100, itemStyle: { color: '#e76f51' }, label: { show: true, position: 'right', formatter: '~100次', textStyle: { color: '#857d74', fontSize: 11 } } },
      {
        value: 70,
        itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color: '#c98a6a' }, { offset: 1, color: '#e8e0d8' }] } },
        label: { show: true, position: 'right', formatter: '~20-120次', textStyle: { color: '#e76f51', fontSize: 11, fontWeight: 600 } }
      },
      { value: 80, itemStyle: { color: '#e76f51' }, label: { show: true, position: 'right', formatter: '~80次', textStyle: { color: '#857d74', fontSize: 11 } } },
      { value: 70, itemStyle: { color: '#e76f51' }, label: { show: true, position: 'right', formatter: '~70次', textStyle: { color: '#857d74', fontSize: 11 } } },
      { value: 190, itemStyle: { color: '#c9a84c' }, label: { show: true, position: 'right', formatter: '~190次', textStyle: { color: '#857d74', fontSize: 11 } } },
      { value: 0, itemStyle: { color: '#d4cdc4' }, label: { show: true, position: 'right', formatter: '不确定 ?', textStyle: { color: '#857d74', fontSize: 11, fontStyle: 'italic' } } }
    ],
    barWidth: 28,
    markLine: {
      silent: true,
      lineStyle: { color: '#c98a6a', type: 'dashed', width: 1.5 },
      data: [{ xAxis: 70 }],
      label: { show: false }
    }
  }]
};
chart.setOption(option);
</script>
</body>
</html>
