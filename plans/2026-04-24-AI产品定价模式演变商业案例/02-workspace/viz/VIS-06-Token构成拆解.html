<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VIS-06 Token 构成拆解</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #faf9f7; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; font-family: 'Noto Sans SC', sans-serif; }
  .title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 600; color: #6b3410; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #857d74; margin-bottom: 24px; }
  #chart { width: 800px; height: 220px; }
  .footnote { font-size: 11px; color: #857d74; margin-top: 16px; }
</style>
</head>
<body>
<div class="title">Agent 消耗的 Token 里，只有 5-15% 是代码生成</div>
<div class="subtitle">一个开发者的 Token 消耗构成 | 2026</div>
<div id="chart"></div>
<div class="footnote">数据基于开发者实测估算 | 总 Token 消耗 = 输入 + 输出</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  grid: { left: 20, right: 120, top: 30, bottom: 30 },
  xAxis: {
    type: 'value',
    max: 100,
    axisLabel: { formatter: '{value}%', textStyle: { color: '#857d74', fontSize: 11 } },
    splitLine: { lineStyle: { color: '#e8e0d8', type: 'dashed' } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'category',
    data: ['Token 构成'],
    axisLine: { show: false },
    axisTick: { show: false },
    axisLabel: { show: false }
  },
  tooltip: {
    trigger: 'item',
    formatter: function(p) { return p.seriesName + ': ' + p.value + '%'; }
  },
  series: [
    {
      name: '文件读取',
      type: 'bar',
      stack: 'total',
      data: [40],
      itemStyle: { color: '#857d74' },
      label: { show: true, position: 'inside', formatter: '文件读取 35-45%', textStyle: { color: '#fff', fontSize: 11 } },
      barWidth: 48
    },
    {
      name: '工具输出',
      type: 'bar',
      stack: 'total',
      data: [20],
      itemStyle: { color: '#b5ad9e' },
      label: { show: true, position: 'inside', formatter: '工具输出 15-25%', textStyle: { color: '#fff', fontSize: 11 } }
    },
    {
      name: '上下文重发',
      type: 'bar',
      stack: 'total',
      data: [17],
      itemStyle: { color: '#e76f51' },
      label: { show: true, position: 'inside', formatter: '上下文重发 15-20%', textStyle: { color: '#fff', fontSize: 11 } },
      markPoint: {
        data: [{ coord: [0, 0], value: '纯浪费', itemStyle: { color: '#e76f51' }, label: { color: '#fff', fontSize: 11 } }],
        symbol: 'pin',
        symbolSize: 50,
        symbolOffset: [0, -30]
      }
    },
    {
      name: '推理计算',
      type: 'bar',
      stack: 'total',
      data: [13],
      itemStyle: { color: '#c98a6a' },
      label: { show: true, position: 'inside', formatter: '推理计算 10-15%', textStyle: { color: '#fff', fontSize: 11 } }
    },
    {
      name: '代码生成',
      type: 'bar',
      stack: 'total',
      data: [10],
      itemStyle: { color: '#2a9d8f' },
      label: {
        show: true,
        position: 'right',
        formatter: '代码生成 5-15%\n你真正想要的',
        textStyle: { color: '#2a9d8f', fontSize: 12, fontWeight: 600 }
      }
    }
  ]
};
chart.setOption(option);
</script>
</body>
</html>
