<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #faf9f7; }
      .panel { fill: #ffffff; stroke: #e8e0d8; stroke-width: 1; rx: 10; }
      .title { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #6b3410; font-weight: 600; letter-spacing: 1; }
      .formula { font-family: 'Noto Sans SC', sans-serif; font-size: 13px; fill: #857d74; }
      .formula-highlight { fill: #c98a6a; font-weight: 600; }
      .dot { r: 5; }
      .dot-green { fill: #2a9d8f; }
      .dot-yellow { fill: #e9c46a; }
      .dot-red { fill: #e76f51; }
      .trans-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5; }
      .trans-green { fill: #2a9d8f; }
      .trans-yellow { fill: #c9a84c; }
      .trans-red { fill: #e76f51; }
      .main-title { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #6b3410; font-weight: 600; }
      .sub-title { font-family: 'Noto Sans SC', sans-serif; font-size: 12px; fill: #857d74; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="960" height="380"/>

  <!-- Main Title -->
  <text x="480" y="36" text-anchor="middle" class="main-title">五种计量单位 = 五种语言，直接比数字毫无意义</text>
  <text x="480" y="56" text-anchor="middle" class="sub-title">90% 开发者在 ¥40-50 区间踩坑</text>

  <!-- 5 Panels -->
  <!-- Panel 1: API 请求 -->
  <rect x="20" y="76" width="164" height="270" class="panel"/>
  <text x="102" y="104" text-anchor="middle" class="title">API 请求</text>
  <text x="102" y="150" text-anchor="middle" class="formula">18000 次 API</text>
  <text x="102" y="170" text-anchor="middle" class="formula">≈ 每天 <tspan class="formula-highlight">600 次</tspan></text>
  <text x="102" y="200" text-anchor="middle" class="formula" style="font-size:11px;">采用者</text>
  <text x="102" y="218" text-anchor="middle" class="formula" style="font-size:11px;">阿里百炼、火山、腾讯</text>
  <text x="102" y="258" text-anchor="middle" class="formula" style="font-size:11px;">18000 次 ≠ 18000 次提问</text>
  <!-- Transparency indicator -->
  <circle cx="102" cy="300" class="dot dot-red"/>
  <text x="102" y="318" text-anchor="middle" class="trans-label trans-red">透明度：低</text>

  <!-- Panel 2: Prompt -->
  <rect x="204" y="76" width="164" height="270" class="panel"/>
  <text x="286" y="104" text-anchor="middle" class="title">PROMPT</text>
  <text x="286" y="150" text-anchor="middle" class="formula">1 Prompt ≈</text>
  <text x="286" y="170" text-anchor="middle" class="formula"><tspan class="formula-highlight">1200-1600</tspan> API 请求</text>
  <text x="286" y="200" text-anchor="middle" class="formula" style="font-size:11px;">采用者</text>
  <text x="286" y="218" text-anchor="middle" class="formula" style="font-size:11px;">智谱 GLM、MiniMax</text>
  <!-- Transparency indicator -->
  <circle cx="286" cy="300" class="dot dot-yellow"/>
  <text x="286" y="318" text-anchor="middle" class="trans-label trans-yellow">透明度：中</text>

  <!-- Panel 3: Token -->
  <rect x="388" y="76" width="164" height="270" class="panel"/>
  <text x="470" y="104" text-anchor="middle" class="title">TOKEN</text>
  <text x="470" y="150" text-anchor="middle" class="formula">直接按输入</text>
  <text x="470" y="170" text-anchor="middle" class="formula">输出<tspan class="formula-highlight">计费</tspan></text>
  <text x="470" y="200" text-anchor="middle" class="formula" style="font-size:11px;">采用者</text>
  <text x="470" y="218" text-anchor="middle" class="formula" style="font-size:11px;">Kimi、MiniMax</text>
  <!-- Transparency indicator -->
  <circle cx="470" cy="300" class="dot dot-green"/>
  <text x="470" y="318" text-anchor="middle" class="trans-label trans-green">透明度：高</text>

  <!-- Panel 4: Credit -->
  <rect x="572" y="76" width="164" height="270" class="panel"/>
  <text x="654" y="104" text-anchor="middle" class="title">CREDIT</text>
  <text x="654" y="150" text-anchor="middle" class="formula">统一池，不同</text>
  <text x="654" y="170" text-anchor="middle" class="formula">模型<tspan class="formula-highlight">不同倍率</tspan></text>
  <text x="654" y="200" text-anchor="middle" class="formula" style="font-size:11px;">采用者</text>
  <text x="654" y="218" text-anchor="middle" class="formula" style="font-size:11px;">Cursor、MiMo、百炼</text>
  <!-- Transparency indicator -->
  <circle cx="654" cy="300" class="dot dot-yellow"/>
  <text x="654" y="318" text-anchor="middle" class="trans-label trans-yellow">透明度：中</text>

  <!-- Panel 5: 时间窗口 -->
  <rect x="756" y="76" width="164" height="270" class="panel"/>
  <text x="838" y="104" text-anchor="middle" class="title">时间窗口</text>
  <text x="838" y="150" text-anchor="middle" class="formula">限制节奏</text>
  <text x="838" y="170" text-anchor="middle" class="formula">而非<tspan class="formula-highlight">总量</tspan></text>
  <text x="838" y="200" text-anchor="middle" class="formula" style="font-size:11px;">采用者</text>
  <text x="838" y="218" text-anchor="middle" class="formula" style="font-size:11px;">智谱 5h、Claude Code</text>
  <!-- Transparency indicator -->
  <circle cx="838" cy="300" class="dot dot-yellow"/>
  <text x="838" y="318" text-anchor="middle" class="trans-label trans-yellow">透明度：中</text>

  <!-- Footer -->
  <text x="480" y="370" text-anchor="middle" class="sub-title" style="font-size:10px;">比数字之前，先统一计量单位</text>
</svg>
