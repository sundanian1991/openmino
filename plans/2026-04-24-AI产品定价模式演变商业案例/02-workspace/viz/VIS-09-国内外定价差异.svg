<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #faf9f7; }
      .panel { rx: 10; }
      .panel-domestic { fill: #fff8f6; stroke: #e76f51; stroke-width: 1.5; }
      .panel-overseas { fill: #f0ddd4; stroke: #c98a6a; stroke-width: 1.5; }
      .panel-title { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; }
      .dim-label { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; fill: #857d74; }
      .domestic-value { font-family: 'Noto Sans SC', sans-serif; font-size: 13px; fill: #e76f51; }
      .overseas-value { font-family: 'Noto Sans SC', sans-serif; font-size: 13px; fill: #c98a6a; }
      .divider { stroke: #d4cdc4; stroke-width: 1; }
      .title { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #6b3410; font-weight: 600; }
      .subtitle { font-family: 'Noto Sans SC', sans-serif; font-size: 12px; fill: #857d74; }
      .highlight-price { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
      .vs-line { stroke: #857d74; stroke-width: 1; stroke-dasharray: 3 3; }
      .note { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; fill: #e76f51; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="640" height="380"/>

  <!-- Title -->
  <text x="320" y="32" text-anchor="middle" class="title">同一产品，两套价格体系</text>
  <text x="320" y="52" text-anchor="middle" class="subtitle">国内 7 家抢池子 vs 海外 3 巨头护城河</text>

  <!-- Left panel: Domestic -->
  <rect x="20" y="76" width="280" height="260" class="panel panel-domestic"/>
  <text x="160" y="106" text-anchor="middle" class="panel-title" fill="#e76f51;">国内</text>

  <!-- Domestic rows -->
  <text x="40" y="138" class="dim-label">竞争环境</text>
  <text x="280" y="138" text-anchor="end" class="domestic-value">7 家同池价格战</text>

  <text x="40" y="168" class="dim-label">定价策略</text>
  <text x="280" y="168" text-anchor="end" class="domestic-value">比谁更便宜</text>

  <text x="40" y="198" class="dim-label">用户预期</text>
  <text x="280" y="198" text-anchor="end" class="domestic-value">"有人在替你卷"</text>

  <text x="40" y="228" class="dim-label">入门价</text>
  <text x="280" y="228" text-anchor="end" class="highlight-price" fill="#e76f51;">¥29-49</text>

  <text x="40" y="262" class="dim-label">Token 计划</text>
  <text x="280" y="262" text-anchor="end" class="domestic-value">Coding Plan / Token Plan</text>

  <text x="40" y="298" class="dim-label">最新动态</text>
  <text x="280" y="298" text-anchor="end" class="domestic-value">低档停售 · 限时抢购</text>

  <!-- Right panel: Overseas -->
  <rect x="340" y="76" width="280" height="260" class="panel panel-overseas"/>
  <text x="480" y="106" text-anchor="middle" class="panel-title" fill="#c98a6a;">海外</text>

  <!-- Overseas rows -->
  <text x="360" y="138" class="dim-label">竞争环境</text>
  <text x="600" y="138" text-anchor="end" class="overseas-value">Claude/GPT/Gemini 三巨头</text>

  <text x="360" y="168" class="dim-label">定价策略</text>
  <text x="600" y="168" text-anchor="end" class="overseas-value">证明"我不比 Claude 差"</text>

  <text x="360" y="198" class="dim-label">用户预期</text>
  <text x="600" y="198" text-anchor="end" class="overseas-value">为质量和生态付费</text>

  <text x="360" y="228" class="dim-label">入门价</text>
  <text x="600" y="228" text-anchor="end" class="highlight-price" fill="#c98a6a;">$20-200</text>

  <text x="360" y="262" class="dim-label">Token 计划</text>
  <text x="600" y="262" text-anchor="end" class="overseas-value">Pro / Team / Enterprise</text>

  <text x="360" y="298" class="dim-label">最新动态</text>
  <text x="600" y="298" text-anchor="end" class="overseas-value">移除 OpenClaw 访问</text>

  <!-- Divider line -->
  <line x1="320" y1="76" x2="320" y2="336" class="divider"/>

  <!-- Price gap highlight -->
  <text x="320" y="360" text-anchor="middle" class="note">国内便宜的真相：卷 — ¥39 vs $20（约 5 倍差距）</text>
</svg>
