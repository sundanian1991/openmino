<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 280" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #faf9f7; }
      .title { font-family: 'Noto Serif SC', serif; font-size: 16px; fill: #6b3410; font-weight: 600; }
      .subtitle { font-family: 'Noto Sans SC', sans-serif; font-size: 12px; fill: #857d74; }
      .stage-name { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 600; }
      .stage-case { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; fill: #555; }
      .stage-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #857d74; }
      .arrow { fill: #857d74; }
      .note { font-family: 'Noto Sans SC', sans-serif; font-size: 11px; fill: #857d74; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="740" height="280"/>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" class="title">所有互联网赛道的定价，都走这三步</text>
  <text x="370" y="52" text-anchor="middle" class="subtitle">AI 也不例外</text>

  <!-- Stage 1: 补贴 -->
  <rect x="20" y="76" width="200" height="140" rx="10" fill="#e0f5ef" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="120" y="108" text-anchor="middle" class="stage-name" fill="#2a9d8f;">补贴</text>
  <text x="120" y="132" text-anchor="middle" class="stage-case">百万 Token 几毛钱</text>
  <text x="120" y="150" text-anchor="middle" class="stage-case">首月 7.9 元</text>
  <text x="120" y="176" text-anchor="middle" class="stage-time">2024-2025</text>
  <text x="120" y="200" text-anchor="middle" class="stage-case" style="font-style:italic;">抢用户规模</text>

  <!-- Arrow 1 -->
  <polygon points="232,146 252,136 252,156" class="arrow"/>

  <!-- Stage 2: 收紧 -->
  <rect x="264" y="88" width="190" height="120" rx="10" fill="#fde8e0" stroke="#e76f51" stroke-width="1.5"/>
  <text x="359" y="118" text-anchor="middle" class="stage-name" fill="#e76f51;">收紧</text>
  <text x="359" y="140" text-anchor="middle" class="stage-case">限购、停售低档</text>
  <text x="359" y="158" text-anchor="middle" class="stage-case">限时抢购</text>
  <text x="359" y="182" text-anchor="middle" class="stage-time">2025 H2</text>
  <text x="359" y="200" text-anchor="middle" class="stage-case" style="font-style:italic;">测试价格弹性</text>

  <!-- Arrow 2 -->
  <polygon points="466,148 482,140 482,156" class="arrow"/>

  <!-- Stage 3: 分层 -->
  <rect x="494" y="100" width="180" height="100" rx="10" fill="#f0ddd4" stroke="#c98a6a" stroke-width="1.5"/>
  <text x="584" y="130" text-anchor="middle" class="stage-name" fill="#c98a6a;">分层</text>
  <text x="584" y="152" text-anchor="middle" class="stage-case">极速版 ¥98-899</text>
  <text x="584" y="172" text-anchor="middle" class="stage-time">2026</text>
  <text x="584" y="192" text-anchor="middle" class="stage-case" style="font-style:italic;">利润最大化</text>

  <!-- Annotation -->
  <text x="370" y="246" text-anchor="middle" class="note">你在哪一步？——大部分厂商正在收紧</text>
  <text x="370" y="266" text-anchor="middle" class="note">进入新市场：先跑量 → 测弹性 → 精分层</text>
</svg>
