# AI 产品定价模式演变：从 Coding Plan 到 Token Plan

> 2026 年 4 月 | 国内 AI 大模型厂商定价策略商业逻辑深度分析

---

## 一、价格战时间线：从降价到收紧

国内 AI 定价经历了完整的"补贴 → 收紧 → 分层"三段式周期。

### 阶段演进

**价格战启动期**（[2024 Q4](time_desc) - [2025 Q2](time_desc)）：[DeepSeek](dim_value) 带头拉低价格，百万 Token 价格从 [几十元](metric_value) 暴降到 [几毛钱](metric_value)，降幅超过 [99%](ratio_value, origin=0.99, assessment="negative")。

**Coding Plan 涌现期**（[2025 Q4](time_desc) - [2026 Q1](time_desc)）：[智谱 GLM](dim_value) 率先推出固定月费 Coding Plan，[阿里百炼](dim_value) 以 [7.9 元](metric_value, origin=7.9, unit="元") 首月入局，开启订阅模式竞争。

**全面铺开期**（[2026 Q1](time_desc)）：[腾讯云](dim_value) 于 [2026-03-05](time_desc) 最后入局，[六大平台](metric_value, origin=6) 全部上线，竞争格局成型。

**收紧分层期**（[2025 H2](time_desc) 至今）：限购、涨价、停售低档、首购优惠变"每天 10:30 抢购"，从获客转向筛选。

**命名转变期**（[2026-03](time_desc)）：[MiniMax](dim_value) 官方将 "Coding Plan" 更名为 "Token Plan"，标志从场景绑定向通用算力的转变。

---

## 二、模型能力跃升：Token 消耗的底层驱动

模型能力决定了 Token 消耗的上限。[2026 年](time_desc) 是国产大模型集体跨越的一年。

### 模型进步时间线

| 时间 | 模型 | 参数量 | 意义 |
|------|------|--------|------|

| [2026-02](time_desc) | [MiniMax M2.5](dim_value) | [229B](metric_value) | 小参数高效路线 |
| [2026-04-23](time_desc) | [MiMo-V2.5-Pro](dim_value) | - | 对标 [Opus 4.6](dim_value)，小米进入高端 |

**传导链条**：模型能力跃升 → Agent 可用性提高 → Token 消耗指数级增长 → Coding Plan 承压 → Token Plan 成为必然。

**DeepSeek V4 的效率革命**：MoE 架构下 [1.6T](metric_value, origin=1600) 总参数仅激活 [49B](metric_value, origin=49)，长上下文场景单 token 推理计算量仅为 V3.2 的 [27%](ratio_value, origin=0.27)，KV Cache 占用降至 [10%](ratio_value, origin=0.10)。官方明确说"预计下半年 [昇腾 950](dim_value) 批量上市后价格大幅下调"。

## 三、芯片供给线：算力成本的底层变量

定价天花板由算力成本决定，算力成本由芯片供给决定。

### 英伟达在中国的退缩

[英伟达](dim_value) 在华市占率：[2024 年](time_desc) [66%](ratio_value, origin=0.66) → [2025 年](time_desc) [54%](ratio_value, origin=0.54) → 年底跌破 [60%](ratio_value, origin=0.60) 关口。[2025-04](time_desc) 全面禁止所有 AI GPU 对华出口，后续松绑 [H20](dim_value) / [H200](dim_value) 但采购限制严苛。

### 华为昇腾的崛起

[华为昇腾](dim_value) [2025 年](time_desc) 累计交付 [81.2 万片](metric_value, origin=812000)，市占率约 [20%](ratio_value, origin=0.20)，国产第一。

**950PR 芯片**（[2026 Q1](time_desc) 量产）：FP4 算力 [1.56 PFLOPS](metric_value)（[H20](dim_value) 的 [2.87 倍](ratio_value, origin=2.87)），定价约 [7 万元](metric_value, origin=70000)（[H200](dim_value) 的 [1/3](proportion, origin=0.33)）。

**三年路线图**：[950PR](dim_value)（[26Q1](time_desc)）→ [950DT](dim_value)（[26Q4](time_desc)）→ [960](dim_value)（[27Q4](time_desc)）→ [970](dim_value)（[28Q4](time_desc)）。[2026 年](time_desc) 目标：AI 芯片市占率 [50%](ratio_value, origin=0.50)，出货 [75-100 万片](metric_value)，营收超 [800 亿](metric_value, origin=80000000000, unit="元")。

**国产芯片整体格局**：[2025 年](time_desc) 国产自给率 [41%](ratio_value, origin=0.41)（英伟达 [55%](ratio_value, origin=0.55)，[AMD](dim_value) [4%](ratio_value, origin=0.04)）。[伯恩斯坦](dim_value) 预测：[2027 年](time_desc) 国产化率从 [2023 年](time_desc) [17%](ratio_value, origin=0.17) → [55%](ratio_value, origin=0.55)。

**算力成本下降对定价的影响**：国产芯片性价比提升 → 算力成本下降 → Token 成本下降空间打开。[推理需求](metric_name) [2026 年](time_desc) 已达训练的 [4-5 倍](ratio_value)，且在加速。

## 四、IPO 与资本化：定价策略的财务约束

上市公司的定价不能只考虑获客，必须证明商业可持续性。

### 智谱 GLM（2513.HK）

[2026-01-08](time_desc) 港交所上市，IPO 市值超 [511 亿港元](metric_value, origin=51100000000)，募资 [43 亿港元](metric_value, origin=4300000000)。[2025 年](time_desc) 营收 [7.24 亿元](metric_value, origin=724000000)（[+132%](ratio_value, origin=1.32, assessment="positive")），[API 业务](metric_name) [+293%](ratio_value, origin=2.93, assessment="positive")，[ARR](metric_name) 达 [17 亿元](metric_value, origin=1700000000)（[+60 倍](ratio_value, origin=60, assessment="positive")）。[Coding Plan](metric_name) 上线两个月付费开发者超 [15 万](metric_value, origin=150000)，ARR 快速破 [1 亿元](metric_value, origin=100000000)。

### MiniMax（MMX）

[2026 年 1 月](time_desc) 港交所上市，成立到 IPO 仅 [4 年](metric_value)，全球最快 AI 上市公司。[2025 年](time_desc) 营收 [7904 万美元](metric_value, origin=79040000)（[+159%](ratio_value, origin=1.59, assessment="positive")），[海外收入占比](ratio_value) [73%](ratio_value, origin=0.73)，毛利率转正 [25.4%](ratio_value, origin=0.254)。[2.12 亿](metric_value, origin=212000000) 用户，[200+](metric_value) 国家，[10 万+](metric_value) 企业客户。

**资本市场对定价的影响**：招股书披露的 [毛利率](metric_name)、[ARR](metric_name)、[用户数](metric_name) 直接影响市场预期 → 定价不能太激进也不能太保守。[智谱](dim_value) Coding Plan 两个月 ARR 破亿 → 证明固定月费模式有市场需求 → 其他厂商跟进。[MiniMax](dim_value) 海外收入 [73%](ratio_value, origin=0.73) → Token Plan 的定价逻辑要考虑全球化。

## 五、五种计量体系并存：定价权的争夺

各平台采用完全不同的计量单位，直接比较数字毫无意义。

### 计量体系对比

**API 请求次数**（[阿里百炼](dim_value)、[火山方舟](dim_value)、[腾讯云](dim_value)、[百度千帆](dim_value)）：[1 次](metric_value) 用户提问 = [5-30 次](metric_value) API 请求。透明度 **低**——数字大但实际消耗不透明。

**Prompt 次数**（[智谱 GLM](dim_value)、[MiniMax](dim_value) 早期）：[1 Prompt](metric_value) ≈ [15-20 次](metric_value) 模型调用 = [1200-1600](metric_value) API 请求。透明度 **中**——比 API 次数直观。

**Token 计量**（[Kimi](dim_value) [2026.1.28](time_desc) 切换后、[MiniMax](dim_value) Token Plan）：直接按输入输出 Token 计费，仅统计未命中缓存的 Token。透明度 **高**——最透明，但用户难预估。

**Credit 计量**（[Cursor](dim_value)、[小米 MiMo](dim_value)、[阿里百炼](dim_value) Token Plan）：统一 Credit 池，不同模型不同倍率（MiMo: Omni [1x](ratio_value), Pro 256k [2x](ratio_value), Pro 1M [4x](ratio_value)）。透明度 **中**——抽象了一层但可预测。

**时间窗口配额**（[智谱 GLM](dim_value) [5h 窗口](time_desc)、[Claude Code](dim_value) [5h+7d 双层](time_desc)）：每 [5 小时](metric_value) 限额 + 每周/每月上限。透明度 **中**——限制节奏而非总量。

**演变方向**：API 次数 → Prompt 次数 → Token/Credit → 统一 Credits。方向是越来越透明、越来越可预测。

## 八、OpenClaw 效应：Agent 时代的成本放大器

[OpenClaw](dim_value) [2026-02](time_desc) GitHub [355K stars](metric_value, origin=355000)，Agent 自动循环调用 → Token 消耗 [6-10 倍](ratio_value) 增长，直接催热 Coding Plan 需求。

**消耗构成**（Agent 场景下）：
- 文件读取：[35-45%](ratio_value)
- 工具输出：[15-25%](ratio_value)
- 上下文重发：[15-20%](ratio_value)
- 推理：[10-15%](ratio_value)
- 代码生成仅：[5-15%](ratio_value)

**浪费比例**：DEV Community 研究显示 [70%](ratio_value, origin=0.70) coding agent token 是浪费。[MiniMax M2](dim_value) token 用量：[2 月](time_desc) vs [12 月](time_desc) 增长 [6 倍](ratio_value, origin=6)，Coding Plan 消耗增长 [10 倍+](ratio_value, origin=10)。[Anthropic](dim_value) [2026-04](time_desc) 从标准订阅移除 OpenClaw 访问 —— 成本撑不住了。

**含义**：Agent 框架是定价模式的颠覆者。一个 Agent 任务 = [几十次](metric_value) 模型调用。"不限量订阅"在 Agent 时代不可持续，必须转向 Token 精细计量。

## 九、未来预判：四个必然趋势

### 趋势 1: Token 成本将持续下降

驱动力：[国产芯片放量](metric_name)（华为 [950](dim_value) 年内 [75 万片](metric_value, origin=750000)）→ 算力成本下降。[DeepSeek V4](dim_value) 开源 → MoE 架构效率革命。[推理专用芯片](metric_name) 竞争 → 推理成本加速下降。

结果：Token Plan 的价格战会继续，但利润空间来自"服务溢价"而非"算力差价"。

### 趋势 2: 国产芯片替代加速

[英伟达](dim_value) 市占率持续下降（[66%](ratio_value, origin=0.66) → [54%](ratio_value, origin=0.54) → 可能低于 [50%](ratio_value, origin=0.50)）。[华为昇腾](dim_value) + [寒武纪](dim_value) + [阿里平头哥](dim_value) 形成国产算力三角。软件生态从 CUDA 迁移到 CANN，迁移效率已超 [90%](ratio_value, origin=0.90)。

### 趋势 3: 开源模型重塑定价权

[DeepSeek](dim_value) 模式：开源 + 极致低价 + 不卖订阅。[V3.2](dim_value) 在 [OpenRouter](dim_value) 月调用 [5.35 万亿 token](metric_value, origin=5350000000000)，全球 [第三](rank, detail=[5350000000000])。开源模型占所有开源 Token 的 [一半以上](proportion, origin=0.50)。

冲击：开源模型的免费部署能力，会持续压制定价上限。定价权来自"服务便利性"而非"模型独占性"。

### 趋势 4: Agent 时代成本指数级增长不可逆

[推理需求](metric_name) [2026 年](time_desc) 已达训练的 [4-5 倍](ratio_value)。[IDC](dim_value) 预测 [2028 年](time_desc) 推理工作负载占比 [73%](ratio_value, origin=0.73)。谁先转 Token 精细计量谁主动，谁后转谁被动（[Cursor](dim_value) 2025-06 的教训）。

## 十、核心判断

> **Coding Plan → Token Plan 的转变，本质上是从"卖工具使用权"到"卖算力资源包"的商业模式升级。**

类比：Coding Plan ≈ 手机合约机（绑定特定工具/场景），Token Plan ≈ 手机流量包（通用算力资源，不限场景）。

[MiniMax](dim_value) 改名 Token Plan 的逻辑：不只卖编程能力，卖的是全模态 AI 能力的"算力通票"。

**跨越鸿沟的挑战**：[Gartner](dim_value) 数据——[90%](ratio_value, origin=0.90) 企业推进 AI 实验，仅 [41%](ratio_value, origin=0.41) 成功落地生产环境。预计 [2027 年](time_desc) [40%](ratio_value, origin=0.40) Agentic AI 项目因无法证明 ROI 被终止。[斯坦福 2026 AI 指数报告](dim_value)："能力-准备度鸿沟"，AI 事故年增 [55%](ratio_value, origin=0.55)。

**对定价的含义**：企业在实验阶段愿意尝试低价/免费的 Coding Plan → 但进入生产环境后需要 SLA、稳定性、合规性 → 这是 Token Plan 企业版溢价的基础。跨越鸿沟的关键不是模型能力，而是"可信赖度"。
