<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <rect width="700" height="300" fill="#faf7f2"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="16" fill="#2c2420" font-weight="700">别一开始就想好定价——所有赛道都走这三步</text>

  <!-- Stage 1: 补贴 (widest) -->
  <rect x="30" y="65" width="190" height="140" rx="8" fill="#5a8a5a" opacity="0.12" stroke="#5a8a5a" stroke-width="1.5"/>
  <text x="125" y="110" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="20" fill="#5a8a5a" font-weight="700">补贴</text>
  <text x="125" y="135" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#8b7355" font-weight="600">2024-2025</text>
  <text x="125" y="160" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">百万Token几毛钱</text>
  <text x="125" y="180" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">首月7.9元</text>

  <!-- Arrow 1→2 -->
  <text x="235" y="140" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="16" fill="#c4956a">→</text>

  <!-- Stage 2: 收紧 (medium) -->
  <rect x="260" y="80" width="160" height="120" rx="8" fill="#c4705a" opacity="0.1" stroke="#c4705a" stroke-width="1.5"/>
  <text x="340" y="120" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="20" fill="#c4705a" font-weight="700">收紧</text>
  <text x="340" y="145" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#8b7355" font-weight="600">2025 H2</text>
  <text x="340" y="170" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">限购、停售低档</text>
  <text x="340" y="187" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">限时抢购</text>

  <!-- Arrow 2→3 -->
  <text x="435" y="145" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="16" fill="#c4956a">→</text>

  <!-- Stage 3: 分层 (narrowest) -->
  <rect x="460" y="95" width="140" height="100" rx="8" fill="#c4956a" opacity="0.12" stroke="#c4956a" stroke-width="1.5"/>
  <text x="530" y="130" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="20" fill="#c4956a" font-weight="700">分层</text>
  <text x="530" y="155" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#8b7355" font-weight="600">2026</text>
  <text x="530" y="175" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">极速版¥98-899</text>
  <text x="530" y="190" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">Kimi ¥559</text>

  <!-- Bottom annotation -->
  <line x1="180" y1="260" x2="520" y2="260" stroke="#c4956a" stroke-width="0.5" opacity="0.3"/>
  <text x="350" y="280" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-weight="600">可复用节奏：先跑量 → 测弹性 → 精分层</text>
</svg>
