<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <rect width="900" height="340" fill="#faf7f2"/>

  <!-- Title: conclusion -->
  <text x="450" y="32" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="16" fill="#2c2420" font-weight="700">直接比数字毫无意义——先统一"汇率"</text>
  <text x="450" y="52" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">五种计量单位 = 五种语言 | 90% 开发者在 ¥40-50 区间踩坑</text>

  <!-- Separator -->
  <line x1="0" y1="72" x2="900" y2="72" stroke="#c4956a" stroke-width="1" opacity="0.3"/>

  <!-- Vertical separators -->
  <line x1="180" y1="80" x2="180" y2="300" stroke="#c4956a" stroke-width="1" opacity="0.2"/>
  <line x1="360" y1="80" x2="360" y2="300" stroke="#c4956a" stroke-width="1" opacity="0.2"/>
  <line x1="540" y1="80" x2="540" y2="300" stroke="#c4956a" stroke-width="1" opacity="0.2"/>
  <line x1="720" y1="80" x2="720" y2="300" stroke="#c4956a" stroke-width="1" opacity="0.2"/>

  <!-- Column 1: API 请求 -->
  <text x="90" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', monospace" font-size="13" fill="#8b7355" font-weight="600" letter-spacing="1">API 请求</text>
  <text x="90" y="145" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">18000次/月</text>
  <text x="90" y="168" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">每天20-120次提问</text>
  <circle cx="150" cy="135" r="5" fill="#c4705a"/>

  <!-- Column 2: Prompt -->
  <text x="270" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', monospace" font-size="13" fill="#8b7355" font-weight="600" letter-spacing="1">Prompt</text>
  <text x="270" y="145" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">1次 ≈ 1200-1600次</text>
  <text x="270" y="168" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">API请求</text>
  <circle cx="330" cy="135" r="5" fill="#d4a843"/>

  <!-- Column 3: Token -->
  <text x="450" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', monospace" font-size="13" fill="#8b7355" font-weight="600" letter-spacing="1">Token</text>
  <text x="450" y="145" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">直接按输入输出计费</text>
  <text x="450" y="168" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">最透明</text>
  <circle cx="510" cy="135" r="5" fill="#5a8a5a"/>

  <!-- Column 4: Credit -->
  <text x="630" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', monospace" font-size="13" fill="#8b7355" font-weight="600" letter-spacing="1">Credit</text>
  <text x="630" y="145" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">统一Credit池</text>
  <text x="630" y="168" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">不同模型不同倍率</text>
  <circle cx="690" cy="135" r="5" fill="#d4a843"/>

  <!-- Column 5: 时间窗口 -->
  <text x="810" y="110" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', monospace" font-size="12" fill="#8b7355" font-weight="600" letter-spacing="1">时间窗口</text>
  <text x="810" y="145" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#ada599">5小时/周/月</text>
  <text x="810" y="168" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">分层限额</text>
  <circle cx="870" cy="135" r="5" fill="#d4a843"/>

  <!-- Transparency legend -->
  <text x="450" y="240" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599">透明度</text>
  <circle cx="380" cy="238" r="4" fill="#c4705a"/>
  <text x="380" y="260" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="9" fill="#ada599">低</text>
  <circle cx="450" cy="238" r="4" fill="#d4a843"/>
  <text x="450" y="260" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="9" fill="#ada599">中</text>
  <circle cx="520" cy="238" r="4" fill="#5a8a5a"/>
  <text x="520" y="260" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="9" fill="#ada599">高</text>

  <!-- Source -->
  <text x="450" y="300" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-style="italic">谁定义计量单位，谁掌握定价权</text>
</svg>
