<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <rect width="800" height="280" fill="#faf7f2"/>

  <!-- Title: conclusion -->
  <text x="400" y="32" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="16" fill="#2c2420" font-weight="700">18 个月的价格战，四个关键数字</text>
  <text x="400" y="52" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">混乱、浪费，但订阅是目前唯一的解法</text>

  <!-- Horizontal separator -->
  <line x1="0" y1="72" x2="800" y2="72" stroke="#c4956a" stroke-width="1" opacity="0.3"/>
  <!-- Vertical separator -->
  <line x1="400" y1="72" x2="400" y2="260" stroke="#c4956a" stroke-width="1" opacity="0.3"/>

  <!-- Card 1: Top-Left -->
  <text x="200" y="128" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="36" fill="#c4956a" font-weight="700">7+</text>
  <text x="200" y="150" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">参战平台</text>

  <!-- Card 2: Top-Right -->
  <text x="600" y="128" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="36" fill="#ada599" font-weight="700">5 种</text>
  <text x="600" y="150" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">计量方式</text>

  <!-- Card 3: Bottom-Left -->
  <text x="200" y="212" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="36" fill="#c4705a" font-weight="700">70%</text>
  <text x="200" y="234" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">Token 浪费率</text>

  <!-- Card 4: Bottom-Right -->
  <text x="600" y="212" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="36" fill="#5a8a5a" font-weight="700">93%</text>
  <text x="600" y="234" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">订阅节省</text>
</svg>
