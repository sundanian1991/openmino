<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="#faf7f2"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="16" fill="#2c2420" font-weight="700">国内便宜的真相——卷</text>
  <text x="300" y="52" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#ada599">同一产品，两套价格体系 | 7家抢池子 vs 3家护城河</text>

  <!-- Vertical center separator -->
  <line x1="300" y1="72" x2="300" y2="290" stroke="#c4956a" stroke-width="1.5" opacity="0.4"/>

  <!-- Left column: 国内 -->
  <text x="150" y="100" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="20" fill="#c4956a" font-weight="700">国内</text>

  <text x="150" y="130" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-weight="600" letter-spacing="1">竞争环境</text>
  <text x="150" y="148" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355">7家同池价格战</text>

  <text x="150" y="178" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-weight="600" letter-spacing="1">定价策略</text>
  <text x="150" y="196" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355">比谁更便宜</text>

  <text x="150" y="224" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-weight="600" letter-spacing="1">用户预期</text>
  <text x="150" y="242" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355">有人在替你卷</text>

  <text x="150" y="278" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="28" fill="#c4956a" font-weight="700">¥29-49</text>

  <!-- Right column: 海外 -->
  <text x="450" y="100" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="20" fill="#8b7355" font-weight="700">海外</text>

  <text x="450" y="130" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-weight="600" letter-spacing="1">竞争环境</text>
  <text x="450" y="148" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355">Claude/GPT/Gemini三巨头</text>

  <text x="450" y="178" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-weight="600" letter-spacing="1">定价策略</text>
  <text x="450" y="196" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355">证明"我不比Claude差"</text>

  <text x="450" y="224" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#ada599" font-weight="600" letter-spacing="1">用户预期</text>
  <text x="450" y="242" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="13" fill="#8b7355">为质量和生态付费</text>

  <text x="450" y="278" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="28" fill="#8b7355" font-weight="700">$20-200</text>

  <!-- Bottom annotation -->
  <line x1="200" y1="310" x2="400" y2="310" stroke="#c4956a" stroke-width="0.5" opacity="0.3"/>
  <text x="300" y="330" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="11" fill="#8b7355" font-style="italic">5倍价格差 = 竞争环境的根本差异</text>
</svg>
