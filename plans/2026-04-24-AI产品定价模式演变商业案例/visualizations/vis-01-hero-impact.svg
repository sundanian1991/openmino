<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <rect width="900" height="450" fill="#faf7f2"/>

  <!-- Title: conclusion -->
  <text x="450" y="48" text-anchor="middle" font-family="'Noto Serif SC', 'Georgia', serif" font-size="22" fill="#2c2420" font-weight="700">10,000,000,000</text>
  <text x="450" y="74" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="14" fill="#6b5e52">一个开发者 8 个月消耗的 Token 数</text>

  <!-- Copper gold separator line -->
  <line x1="350" y1="92" x2="550" y2="92" stroke="#c4956a" stroke-width="1" opacity="0.5"/>

  <!-- Left annotation: ¥40 订阅 -->
  <text x="280" y="155" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#5a8a5a">¥40 订阅</text>

  <!-- Right annotation: API 实际价值 $15,000+ -->
  <text x="620" y="155" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#c4705a">API 实际价值 $15,000+</text>

  <!-- Annotation arrow -->
  <line x1="380" y1="150" x2="420" y2="150" stroke="#c4956a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="148" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#ada599">差距</text>
  <line x1="480" y1="150" x2="520" y2="150" stroke="#c4956a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Subtitle below -->
  <text x="450" y="200" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#9a8e82">订阅省了 93%，但 70% 的 Token 被浪费在 Agent 自身的开销上</text>

  <!-- Copper divider -->
  <line x1="350" y1="220" x2="550" y2="220" stroke="#c4956a" stroke-width="1" opacity="0.3"/>

  <!-- Source -->
  <text x="450" y="250" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#ada599">来源：Claude Code 使用数据, 2026</text>
</svg>
