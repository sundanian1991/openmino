<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Style C: Terminal Green</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #0d1117; }
.slide {
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    color: #c9d1d9;
    position: relative;
}
/* Scanlines */
.slide::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
}
.content {
    position: relative; z-index: 1;
    width: min(85vw, 900px);
    padding: clamp(1rem, 3vw, 2rem);
}
.prompt {
    color: #39d353;
    font-size: clamp(0.7rem, 1.2vw, 0.9rem);
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
    animation: fadeIn 0.5s ease-out both;
}
.title {
    font-size: clamp(1.5rem, 3.5vw, 3rem);
    font-weight: 800;
    color: #e6edf3;
    line-height: 1.3;
    animation: typeIn 0.8s 0.3s ease-out both;
    overflow: hidden;
    white-space: nowrap;
    border-right: 3px solid #39d353;
    width: fit-content;
    max-width: 100%;
}
.cursor-blink {
    display: inline-block;
    width: clamp(2px, 0.3vw, 3px);
    height: 1em;
    background: #39d353;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }
@keyframes typeIn {
    from { max-width: 0; }
    to { max-width: 100%; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.subtitle {
    font-size: clamp(0.65rem, 1.1vw, 0.85rem);
    color: #8b949e;
    margin-top: clamp(0.75rem, 2vw, 1.5rem);
    line-height: 1.6;
    animation: fadeIn 0.5s 1s ease-out both;
}
.data-row {
    display: flex; gap: clamp(1rem, 3vw, 2rem);
    margin-top: clamp(1rem, 2.5vw, 2rem);
    animation: fadeIn 0.5s 1.3s ease-out both;
    flex-wrap: wrap;
}
.data-item {
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: clamp(0.4rem, 1vw, 0.75rem) clamp(0.5rem, 1.5vw, 1rem);
}
.data-label {
    font-size: clamp(0.55rem, 0.9vw, 0.7rem);
    color: #484f58;
    margin-bottom: 0.2em;
}
.data-value {
    font-size: clamp(0.9rem, 1.8vw, 1.4rem);
    font-weight: 800;
    color: #39d353;
}
.green { color: #39d353; }
.dim { color: #484f58; }
.tag {
    display: inline-block;
    border: 1px solid #21262d;
    border-radius: 12px;
    padding: 0.15em 0.5em;
    font-size: clamp(0.5rem, 0.8vw, 0.65rem);
    color: #8b949e;
    margin-right: 0.4rem;
    animation: fadeIn 0.5s 1.5s ease-out both;
}
</style>
</head>
<body>
<div class="slide">
    <div class="content">
        <div class="prompt">$ cat report/ai-pricing-evolution.md</div>
        <div class="title">AI 产品定价模式演变<span class="cursor-blink"></span></div>
        <p class="subtitle">
            <span class="green">#</span> 从 Coding Plan 到 Token Plan<br>
            <span class="green">#</span> 国内大模型厂商定价策略的商业逻辑深度分析
        </p>
        <div class="data-row">
            <div class="data-item">
                <div class="data-label">TOKEN_PRICE_CHANGE</div>
                <div class="data-value">¥几十 → ¥0.几</div>
            </div>
            <div class="data-item">
                <div class="data-label">PLATFORMS</div>
                <div class="data-value">6 大平台</div>
            </div>
            <div class="data-item">
                <div class="data-label">AGENT_MULTIPLIER</div>
                <div class="data-value">6-10x</div>
            </div>
            <div class="data-item">
                <div class="data-label">DATE</div>
                <div class="data-value">2026-04-24</div>
            </div>
        </div>
        <div style="margin-top: 1rem;" class="tag">商业案例</div>
        <div class="tag">定价策略</div>
        <div class="tag">Agent 经济学</div>
    </div>
</div>
</body>
</html>
