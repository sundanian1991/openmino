<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Style B: Swiss Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Nunito:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
.slide {
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff;
    font-family: 'Nunito', sans-serif;
    color: #1a1a1a;
}
.slide::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
}
.content {
    position: relative; z-index: 1;
    width: min(90vw, 1100px);
    padding: clamp(1.5rem, 4vw, 3rem);
}
.top-line {
    width: 100%; height: 3px;
    background: #1a1a1a;
    margin-bottom: clamp(1rem, 3vw, 2rem);
    animation: growLine 0.6s ease-out both;
}
@keyframes growLine {
    from { transform: scaleX(0); transform-origin: left; }
    to { transform: scaleX(1); transform-origin: left; }
}
.meta {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #ff3300;
    margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
    animation: fadeUp 0.5s 0.3s ease-out both;
}
.title {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    color: #1a1a1a;
    animation: fadeUp 0.6s 0.4s ease-out both;
}
.red { color: #ff3300; }
.divider {
    width: clamp(3rem, 8vw, 6rem); height: 4px;
    background: #ff3300;
    margin: clamp(1rem, 2.5vw, 2rem) 0;
    animation: growLine 0.4s 0.6s ease-out both;
}
.subtitle {
    font-size: clamp(0.85rem, 1.5vw, 1.15rem);
    color: #555; max-width: 600px;
    line-height: 1.5;
    animation: fadeUp 0.6s 0.7s ease-out both;
}
.bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: clamp(1.5rem, 4vw, 3rem);
    animation: fadeUp 0.6s 0.9s ease-out both;
}
.date {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(0.7rem, 1.1vw, 0.9rem);
    font-weight: 700;
    color: #999;
}
.big-num {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(6rem, 18vw, 14rem);
    font-weight: 900;
    color: rgba(0,0,0,0.03);
    position: absolute;
    bottom: calc(-1 * clamp(1rem, 3vw, 2rem));
    right: clamp(0.5rem, 2vw, 2rem);
    line-height: 1;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="slide">
    <div class="content">
        <div class="top-line"></div>
        <div class="meta">商业案例研究 · 001</div>
        <h1 class="title">AI 产品<br>定价模式演变</h1>
        <div class="divider"></div>
        <p class="subtitle">从 <strong>Coding Plan</strong> 到 <strong>Token Plan</strong><br>国内大模型厂商定价策略的商业逻辑深度分析</p>
        <div class="bottom-row">
            <span class="date">2026-04-24</span>
        </div>
        <div class="big-num">00</div>
    </div>
</div>
</body>
</html>
