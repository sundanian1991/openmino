# ops/config.yaml -- 知识系统配置
# 查看 ops/derivation.md 了解每个配置的由来

---
dimensions:
  granularity: atomic
  organization: flat
  linking: explicit+implicit
  processing: heavy
  navigation: 3-tier
  maintenance: condition-based
  schema: moderate
  automation: full

features:
  semantic-search: true
  processing-pipeline: true
  sleep-processing: true
  voice-capture: false

processing_tier: auto

processing:
  depth: standard
  chaining: suggested
  extraction:
    selectivity: moderate
    categories: auto
  verification:
    description_test: true
    schema_check: true
    link_check: true
  reweave:
    scope: related
    frequency: after_create

provenance: full

personality:
  enabled: false

research:
  primary: tavily
  fallback: web-search
  last_resort: web-search
  default_depth: moderate

# L3 智能自动层配置
maintenance:
  # 健康检查阈值
  thresholds:
    orphan_notes: 5      # Orphan notes > 5 → 触发 /connect
    stale_notes: 10      # Stale notes > 10 → 触发 /maintain
    dangling_links: 3    # Dangling links > 3 → 提醒用户
    health_score_min: 60 # 健康分数 < 60 → 提醒用户

  # 自动触发规则
  auto_trigger:
    orphan_notes:
      enabled: true
      command: /connect
      priority: medium
    stale_notes:
      enabled: true
      command: /maintain
      priority: medium
    dangling_links:
      enabled: true
      command: null  # 用户手动修复
      priority: high
    low_health_score:
      enabled: true
      command: null  # 用户手动决定
      priority: medium

  # 健康检查脚本
  health_check:
    script: scripts/maintenance/health-checks.js
    output: ops/queue/health-report.json

  # 自动维护脚本
  auto_maintenance:
    script: scripts/maintenance/auto-maintenance.js
    queue: ops/queue/queue.json
