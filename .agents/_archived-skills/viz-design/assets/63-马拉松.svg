<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Marathon: running figures in sequence -->
  <!-- Runner 1 -->
  <circle cx="45" cy="85" r="6" fill="#c98a6a"/>
  <line x1="45" y1="91" x2="45" y2="115" stroke="#c98a6a" stroke-width="2"/>
  <line x1="45" y1="95" x2="35" y2="105" stroke="#c98a6a" stroke-width="2"/>
  <line x1="45" y1="95" x2="55" y2="105" stroke="#c98a6a" stroke-width="2"/>
  <line x1="45" y1="115" x2="35" y2="130" stroke="#c98a6a" stroke-width="2"/>
  <line x1="45" y1="115" x2="55" y2="128" stroke="#c98a6a" stroke-width="2"/>
  <!-- Runner 2 -->
  <circle cx="90" cy="80" r="6" fill="#c98a6a" opacity="0.7"/>
  <line x1="90" y1="86" x2="90" y2="110" stroke="#c98a6a" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="90" x2="80" y2="100" stroke="#c98a6a" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="90" x2="100" y2="100" stroke="#c98a6a" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="110" x2="80" y2="125" stroke="#c98a6a" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="110" x2="100" y2="123" stroke="#c98a6a" stroke-width="2" opacity="0.7"/>
  <!-- Runner 3 -->
  <circle cx="135" cy="78" r="6" fill="#c98a6a" opacity="0.5"/>
  <line x1="135" y1="84" x2="135" y2="108" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="135" y1="88" x2="125" y2="98" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="135" y1="88" x2="145" y2="98" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="135" y1="108" x2="125" y2="123" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <line x1="135" y1="108" x2="145" y2="121" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <!-- Finish line -->
  <line x1="175" y1="60" x2="175" y2="140" stroke="#c98a6a" stroke-width="2" stroke-dasharray="4,4"/>
</svg>
