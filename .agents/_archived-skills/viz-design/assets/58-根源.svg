<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Root: tree root system spreading downward -->
  <!-- Trunk top -->
  <line x1="100" y1="20" x2="100" y2="70" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <!-- Branching roots -->
  <line x1="100" y1="70" x2="70" y2="110" stroke="#c98a6a" stroke-width="3"/>
  <line x1="100" y1="70" x2="100" y2="120" stroke="#c98a6a" stroke-width="3"/>
  <line x1="100" y1="70" x2="130" y2="110" stroke="#c98a6a" stroke-width="3"/>
  <!-- Sub-branches -->
  <line x1="70" y1="110" x2="45" y2="145" stroke="#c98a6a" stroke-width="2"/>
  <line x1="70" y1="110" x2="75" y2="150" stroke="#c98a6a" stroke-width="2"/>
  <line x1="100" y1="120" x2="85" y2="155" stroke="#c98a6a" stroke-width="2"/>
  <line x1="100" y1="120" x2="115" y2="155" stroke="#c98a6a" stroke-width="2"/>
  <line x1="130" y1="110" x2="125" y2="150" stroke="#c98a6a" stroke-width="2"/>
  <line x1="130" y1="110" x2="155" y2="145" stroke="#c98a6a" stroke-width="2"/>
  <!-- Root tips -->
  <circle cx="45" cy="148" r="3" fill="#c98a6a" opacity="0.5"/>
  <circle cx="75" cy="153" r="3" fill="#c98a6a" opacity="0.5"/>
  <circle cx="85" cy="158" r="3" fill="#c98a6a" opacity="0.5"/>
  <circle cx="115" cy="158" r="3" fill="#c98a6a" opacity="0.5"/>
  <circle cx="125" cy="153" r="3" fill="#c98a6a" opacity="0.5"/>
  <circle cx="155" cy="148" r="3" fill="#c98a6a" opacity="0.5"/>
</svg>
