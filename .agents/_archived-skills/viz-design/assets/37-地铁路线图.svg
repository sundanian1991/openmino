<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Subway map: intersecting colored lines with stations -->
  <!-- Line 1: red-ish -->
  <path d="M30,60 L80,60 L120,100 L160,100" fill="none" stroke="#c98a6a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="30" cy="60" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="80" cy="60" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="120" cy="100" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="160" cy="100" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2"/>
  <!-- Line 2: lighter -->
  <path d="M60,30 L60,90 L100,130 L100,170" fill="none" stroke="#c98a6a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <circle cx="60" cy="30" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <circle cx="60" cy="90" r="5" fill="#c98a6a"/>
  <circle cx="100" cy="130" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="170" r="5" fill="#faf9f7" stroke="#c98a6a" stroke-width="2" opacity="0.5"/>
</svg>
