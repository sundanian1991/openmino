<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Side-by-side comparison: two vertical dot plots connected -->
  <!-- Left group -->
  <line x1="65" y1="30" x2="65" y2="170" stroke="#d4c4b0" stroke-width="1"/>
  <circle cx="65" cy="50" r="5" fill="#c98a6a"/>
  <circle cx="65" cy="80" r="5" fill="#c98a6a" opacity="0.7"/>
  <circle cx="65" cy="110" r="5" fill="#c98a6a" opacity="0.5"/>
  <circle cx="65" cy="140" r="5" fill="#c98a6a" opacity="0.3"/>
  <!-- Right group -->
  <line x1="135" y1="30" x2="135" y2="170" stroke="#d4c4b0" stroke-width="1"/>
  <circle cx="135" cy="45" r="5" fill="#c98a6a"/>
  <circle cx="135" cy="75" r="5" fill="#c98a6a" opacity="0.7"/>
  <circle cx="135" cy="120" r="5" fill="#c98a6a" opacity="0.5"/>
  <circle cx="135" cy="150" r="5" fill="#c98a6a" opacity="0.3"/>
  <!-- Connecting lines -->
  <line x1="65" y1="50" x2="135" y2="45" stroke="#c98a6a" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="80" x2="135" y2="75" stroke="#c98a6a" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="110" x2="135" y2="120" stroke="#c98a6a" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="140" x2="135" y2="150" stroke="#c98a6a" stroke-width="1" opacity="0.4"/>
</svg>
