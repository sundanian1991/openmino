<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Maze: simple maze-like pattern -->
  <path d="M30,30 L170,30 L170,170 L30,170 L30,30" fill="none" stroke="#f0e0d4" stroke-width="2"/>
  <path d="M30,50 L150,50 L150,150 L50,150 L50,70 L130,70 L130,130 L70,130 L70,90 L110,90 L110,110 L90,110" fill="none" stroke="#c98a6a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Start and end -->
  <circle cx="30" cy="40" r="5" fill="#c98a6a"/>
  <circle cx="90" cy="110" r="5" fill="#c98a6a" opacity="0.5"/>
</svg>
