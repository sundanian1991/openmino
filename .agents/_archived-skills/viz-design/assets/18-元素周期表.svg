<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Periodic table: mini grid with colored cells -->
  <rect x="30" y="30" width="140" height="140" fill="none" stroke="#e0c9b0" stroke-width="1"/>
  <!-- Row 1: 2 cells -->
  <rect x="30" y="30" width="28" height="20" fill="#c98a6a" rx="1"/>
  <rect x="142" y="30" width="28" height="20" fill="#c98a6a" opacity="0.5" rx="1"/>
  <!-- Row 2-3: full rows -->
  <rect x="30" y="52" width="28" height="20" fill="#c98a6a" opacity="0.8" rx="1"/>
  <rect x="60" y="52" width="80" height="20" fill="#c98a6a" opacity="0.6" rx="1"/>
  <rect x="30" y="74" width="28" height="20" fill="#c98a6a" opacity="0.7" rx="1"/>
  <rect x="60" y="74" width="80" height="20" fill="#c98a6a" opacity="0.5" rx="1"/>
  <!-- Row 4: mixed -->
  <rect x="30" y="96" width="28" height="20" fill="#c98a6a" opacity="0.3" rx="1"/>
  <rect x="60" y="96" width="18" height="20" fill="#c98a6a" opacity="0.4" rx="1"/>
  <rect x="80" y="96" width="18" height="20" fill="#c98a6a" opacity="0.6" rx="1"/>
  <rect x="100" y="96" width="18" height="20" fill="#c98a6a" opacity="0.5" rx="1"/>
  <rect x="120" y="96" width="18" height="20" fill="#c98a6a" opacity="0.3" rx="1"/>
  <rect x="140" y="96" width="28" height="20" fill="#c98a6a" opacity="0.4" rx="1"/>
  <!-- Row 5 -->
  <rect x="30" y="118" width="28" height="20" fill="#c98a6a" opacity="0.25" rx="1"/>
  <rect x="60" y="118" width="18" height="20" fill="#c98a6a" opacity="0.35" rx="1"/>
  <rect x="80" y="118" width="18" height="20" fill="#c98a6a" opacity="0.45" rx="1"/>
  <rect x="100" y="118" width="18" height="20" fill="#c98a6a" opacity="0.55" rx="1"/>
  <rect x="120" y="118" width="18" height="20" fill="#c98a6a" opacity="0.2" rx="1"/>
  <rect x="140" y="118" width="28" height="20" fill="#c98a6a" opacity="0.3" rx="1"/>
  <!-- Row 6 -->
  <rect x="30" y="140" width="28" height="20" fill="#c98a6a" opacity="0.2" rx="1"/>
  <rect x="60" y="140" width="80" height="20" fill="#c98a6a" opacity="0.3" rx="1"/>
</svg>
