<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Factory: industrial buildings with smoke -->
  <!-- Main building -->
  <rect x="40" y="100" width="80" height="60" rx="2" fill="#c98a6a" opacity="0.6"/>
  <!-- Chimney -->
  <rect x="55" y="55" width="12" height="45" rx="1" fill="#c98a6a" opacity="0.7"/>
  <!-- Smoke -->
  <circle cx="61" cy="45" r="8" fill="#c98a6a" opacity="0.15"/>
  <circle cx="58" cy="32" r="10" fill="#c98a6a" opacity="0.1"/>
  <circle cx="63" cy="18" r="12" fill="#c98a6a" opacity="0.06"/>
  <!-- Windows -->
  <rect x="48" y="115" width="12" height="12" rx="2" fill="#faf9f7" opacity="0.4"/>
  <rect x="65" y="115" width="12" height="12" rx="2" fill="#faf9f7" opacity="0.4"/>
  <rect x="82" y="115" width="12" height="12" rx="2" fill="#faf9f7" opacity="0.4"/>
  <!-- Side building -->
  <rect x="125" y="120" width="45" height="40" rx="2" fill="#c98a6a" opacity="0.4"/>
  <rect x="130" y="130" width="10" height="10" rx="2" fill="#faf9f7" opacity="0.3"/>
  <rect x="145" y="130" width="10" height="10" rx="2" fill="#faf9f7" opacity="0.3"/>
  <!-- Ground -->
  <line x1="30" y1="160" x2="180" y2="160" stroke="#c98a6a" stroke-width="2" opacity="0.4"/>
</svg>
