<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Evolution: silhouettes progressing left to right -->
  <!-- Figure 1: ape-like, crouched -->
  <circle cx="45" cy="120" r="6" fill="#c98a6a" opacity="0.3"/>
  <path d="M45,126 L45,140 L35,155 L55,155" fill="none" stroke="#c98a6a" stroke-width="2.5" opacity="0.3"/>
  <!-- Figure 2: hunched -->
  <circle cx="75" cy="105" r="6" fill="#c98a6a" opacity="0.45"/>
  <path d="M75,111 L75,130 L68,150 L82,150" fill="none" stroke="#c98a6a" stroke-width="2.5" opacity="0.45"/>
  <!-- Figure 3: upright -->
  <circle cx="105" cy="90" r="6" fill="#c98a6a" opacity="0.6"/>
  <path d="M105,96 L105,120 L98,145 L112,145" fill="none" stroke="#c98a6a" stroke-width="2.5" opacity="0.6"/>
  <!-- Figure 4: modern human -->
  <circle cx="140" cy="80" r="6" fill="#c98a6a"/>
  <path d="M140,86 L140,115 L132,145 L148,145" fill="none" stroke="#c98a6a" stroke-width="2.5"/>
  <!-- Progression arrow -->
  <line x1="55" y1="155" x2="145" y2="155" stroke="#c98a6a" stroke-width="1" opacity="0.3"/>
  <polygon points="145,152 155,155 145,158" fill="#c98a6a" opacity="0.3"/>
</svg>
