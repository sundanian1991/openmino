<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Concentration: scattered dots converging to center -->
  <!-- Outer scattered dots -->
  <circle cx="40" cy="50" r="4" fill="#c98a6a" opacity="0.15"/>
  <circle cx="160" cy="45" r="4" fill="#c98a6a" opacity="0.15"/>
  <circle cx="35" cy="155" r="4" fill="#c98a6a" opacity="0.15"/>
  <circle cx="165" cy="155" r="4" fill="#c98a6a" opacity="0.15"/>
  <circle cx="60" cy="170" r="4" fill="#c98a6a" opacity="0.15"/>
  <circle cx="145" cy="170" r="4" fill="#c98a6a" opacity="0.15"/>
  <!-- Mid ring -->
  <circle cx="65" cy="75" r="5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="135" cy="75" r="5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="65" cy="130" r="5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="135" cy="130" r="5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="80" cy="155" r="5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="120" cy="155" r="5" fill="#c98a6a" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="85" cy="90" r="6" fill="#c98a6a" opacity="0.5"/>
  <circle cx="115" cy="90" r="6" fill="#c98a6a" opacity="0.5"/>
  <circle cx="85" cy="115" r="6" fill="#c98a6a" opacity="0.5"/>
  <circle cx="115" cy="115" r="6" fill="#c98a6a" opacity="0.5"/>
  <!-- Center -->
  <circle cx="100" cy="100" r="10" fill="#c98a6a"/>
</svg>
