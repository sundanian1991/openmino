<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Tool set: wrench, screwdriver, hammer -->
  <!-- Wrench -->
  <rect x="35" y="80" width="35" height="8" rx="2" fill="#c98a6a" opacity="0.6"/>
  <circle cx="35" cy="84" r="10" fill="none" stroke="#c98a6a" stroke-width="3" opacity="0.6"/>
  <!-- Screwdriver -->
  <rect x="85" y="65" width="6" height="60" rx="2" fill="#c98a6a" opacity="0.5"/>
  <rect x="83" y="60" width="10" height="15" rx="3" fill="#c98a6a" opacity="0.7"/>
  <polygon points="88,65 85,72 91,72" fill="#faf9f7"/>
  <!-- Hammer -->
  <rect x="125" y="80" width="6" height="60" rx="2" fill="#c98a6a" opacity="0.5"/>
  <rect x="118" y="75" width="20" height="12" rx="3" fill="#c98a6a" opacity="0.7"/>
  <!-- Plate -->
  <ellipse cx="100" cy="145" rx="45" ry="12" fill="none" stroke="#c98a6a" stroke-width="2" opacity="0.3"/>
</svg>
