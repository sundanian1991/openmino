<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Lever: pivot with bar and weights -->
  <!-- Pivot triangle -->
  <polygon points="100,140 90,155 110,155" fill="#c98a6a" opacity="0.6"/>
  <!-- Lever bar (tilted) -->
  <line x1="40" y1="120" x2="160" y2="140" stroke="#c98a6a" stroke-width="4" stroke-linecap="round"/>
  <!-- Left weight -->
  <rect x="30" y="110" width="20" height="25" rx="3" fill="#c98a6a"/>
  <!-- Right weight -->
  <rect x="150" y="130" width="20" height="25" rx="3" fill="#c98a6a" opacity="0.5"/>
</svg>
