<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 360"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .text-primary { fill: #2C2C2A; }
    .text-secondary { fill: #5F5E5A; }
    .text-tertiary { fill: #888780; }
    .grid-line { stroke: rgba(0,0,0,0.08); stroke-width: 0.5; }
    @media (prefers-color-scheme: dark) {
      .text-primary { fill: #e0e0e0; }
      .text-secondary { fill: #a0a0a0; }
      .text-tertiary { fill: #707070; }
      .grid-line { stroke: rgba(255,255,255,0.08); }
    }
  </style>

  <!-- Chart title -->
  <text x="80" y="30" font-size="16" font-weight="500" class="text-primary">Quarterly revenue by product line</text>

  <!-- Y-axis grid lines and labels -->
  <line x1="80" y1="60" x2="640" y2="60" class="grid-line"/>
  <text x="70" y="60" text-anchor="end" dominant-baseline="central" class="text-tertiary" font-size="11">$50M</text>

  <line x1="80" y1="105" x2="640" y2="105" class="grid-line"/>
  <text x="70" y="105" text-anchor="end" dominant-baseline="central" class="text-tertiary" font-size="11">$40M</text>

  <line x1="80" y1="150" x2="640" y2="150" class="grid-line"/>
  <text x="70" y="150" text-anchor="end" dominant-baseline="central" class="text-tertiary" font-size="11">$30M</text>

  <line x1="80" y1="195" x2="640" y2="195" class="grid-line"/>
  <text x="70" y="195" text-anchor="end" dominant-baseline="central" class="text-tertiary" font-size="11">$20M</text>

  <line x1="80" y1="240" x2="640" y2="240" class="grid-line"/>
  <text x="70" y="240" text-anchor="end" dominant-baseline="central" class="text-tertiary" font-size="11">$10M</text>

  <!-- Baseline -->
  <line x1="80" y1="285" x2="640" y2="285" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="70" y="285" text-anchor="end" dominant-baseline="central" class="text-tertiary" font-size="11">$0</text>

  <!-- Q1 group -->
  <rect x="108" y="114" width="28" height="171" rx="3" fill="#534AB7"/>
  <rect x="140" y="150" width="28" height="135" rx="3" fill="#1D9E75"/>
  <rect x="172" y="195" width="28" height="90"  rx="3" fill="#D85A30"/>
  <text x="152" y="302" text-anchor="middle" class="text-secondary" font-size="12">Q1</text>

  <!-- Q2 group -->
  <rect x="238" y="96"  width="28" height="189" rx="3" fill="#534AB7"/>
  <rect x="270" y="132" width="28" height="153" rx="3" fill="#1D9E75"/>
  <rect x="302" y="168" width="28" height="117" rx="3" fill="#D85A30"/>
  <text x="282" y="302" text-anchor="middle" class="text-secondary" font-size="12">Q2</text>

  <!-- Q3 group -->
  <rect x="368" y="78"  width="28" height="207" rx="3" fill="#534AB7"/>
  <rect x="400" y="105" width="28" height="180" rx="3" fill="#1D9E75"/>
  <rect x="432" y="150" width="28" height="135" rx="3" fill="#D85A30"/>
  <text x="412" y="302" text-anchor="middle" class="text-secondary" font-size="12">Q3</text>

  <!-- Q4 group -->
  <rect x="498" y="60"  width="28" height="225" rx="3" fill="#534AB7"/>
  <rect x="530" y="87"  width="28" height="198" rx="3" fill="#1D9E75"/>
  <rect x="562" y="123" width="28" height="162" rx="3" fill="#D85A30"/>
  <text x="542" y="302" text-anchor="middle" class="text-secondary" font-size="12">Q4</text>

  <!-- Legend -->
  <rect x="80" y="330" width="10" height="10" rx="2" fill="#534AB7"/>
  <text x="96" y="335" dominant-baseline="central" class="text-secondary" font-size="12">SaaS platform</text>

  <rect x="220" y="330" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="236" y="335" dominant-baseline="central" class="text-secondary" font-size="12">Professional services</text>

  <rect x="410" y="330" width="10" height="10" rx="2" fill="#D85A30"/>
  <text x="426" y="335" dominant-baseline="central" class="text-secondary" font-size="12">Licensing</text>
</svg>
