<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 720"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .text-primary { fill: #2C2C2A; }
    .text-secondary { fill: #5F5E5A; }
    .text-tertiary { fill: #888780; }
    .connector { stroke: #888780; stroke-width: 0.5; fill: none; }
    .connector-teal { stroke: #0F6E56; stroke-width: 0.5; fill: none; }
    .dashed { stroke-dasharray: 6 4; }
    @media (prefers-color-scheme: dark) {
      .text-primary { fill: #e0e0e0; }
      .text-secondary { fill: #a0a0a0; }
      .text-tertiary { fill: #707070; }
      .connector { stroke: #B4B2A9; }
      .connector-teal { stroke: #5DCAA5; }
      .fill-purple { fill: #3C3489; stroke: #AFA9EC; }
      .fill-purple .title { fill: #CECBF6; }
      .fill-purple .sub { fill: #AFA9EC; }
      .fill-teal { fill: #085041; stroke: #5DCAA5; }
      .fill-teal .title { fill: #9FE1CB; }
      .fill-teal .sub { fill: #5DCAA5; }
      .fill-coral { fill: #712B13; stroke: #F0997B; }
      .fill-coral .title { fill: #F5C4B3; }
      .fill-coral .sub { fill: #F0997B; }
      .fill-gray { fill: #444441; stroke: #B4B2A9; }
      .fill-gray .title { fill: #D3D1C7; }
      .fill-gray .sub { fill: #B4B2A9; }
      .fill-pink { fill: #72243E; stroke: #ED93B1; }
      .fill-pink .title { fill: #F4C0D1; }
      .fill-pink .sub { fill: #ED93B1; }
      .container-purple { fill: #26215C; stroke: #AFA9EC; }
      .container-teal { fill: #04342C; stroke: #5DCAA5; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ====== Title area ====== -->
  <text x="340" y="32" text-anchor="middle" font-size="16" font-weight="500" class="text-primary">OpenClaw: open-source AI agent via messaging</text>
  <text x="340" y="52" text-anchor="middle" font-size="12" class="text-secondary">By Peter Steinberger, 2025 — 300k+ GitHub stars</text>

  <!-- ====== Layer 1: User / messaging platforms ====== -->
  <g class="fill-purple">
    <rect x="60" y="80" width="120" height="56" rx="8"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="title" x="120" y="98" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#3C3489">Signal</text>
    <text class="sub" x="120" y="118" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#534AB7">End-to-end encrypted</text>
  </g>

  <g class="fill-purple">
    <rect x="200" y="80" width="120" height="56" rx="8"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="title" x="260" y="98" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#3C3489">Telegram</text>
    <text class="sub" x="260" y="118" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#534AB7">Bot API interface</text>
  </g>

  <g class="fill-purple">
    <rect x="340" y="80" width="120" height="56" rx="8"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="title" x="400" y="98" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#3C3489">Discord</text>
    <text class="sub" x="400" y="118" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#534AB7">Server channels</text>
  </g>

  <g class="fill-purple">
    <rect x="480" y="80" width="140" height="56" rx="8"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="title" x="550" y="98" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#3C3489">WhatsApp</text>
    <text class="sub" x="550" y="118" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#534AB7">Business API</text>
  </g>

  <!-- Label -->
  <text x="40" y="112" text-anchor="end" dominant-baseline="central"
        font-size="11" class="text-tertiary" transform="rotate(-90 40 112)">User</text>

  <!-- Arrows from messaging down to OpenClaw core -->
  <line x1="120" y1="136" x2="120" y2="170" class="connector" marker-end="url(#arrow)"/>
  <line x1="260" y1="136" x2="260" y2="170" class="connector" marker-end="url(#arrow)"/>
  <line x1="400" y1="136" x2="400" y2="170" class="connector" marker-end="url(#arrow)"/>
  <line x1="550" y1="136" x2="550" y2="170" class="connector" marker-end="url(#arrow)"/>

  <!-- ====== Layer 2: OpenClaw core (structural container) ====== -->
  <rect x="50" y="170" width="580" height="260" rx="20"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" class="container-teal"/>
  <text x="72" y="196" font-size="14" font-weight="500" fill="#085041" class="title">OpenClaw core (runs locally)</text>

  <!-- Sub-module: message router -->
  <g class="fill-teal">
    <rect x="80" y="215" width="220" height="56" rx="8"
          fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="title" x="190" y="233" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Message router</text>
    <text class="sub" x="190" y="253" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">Parse, queue, dispatch</text>
  </g>

  <!-- Sub-module: agent engine -->
  <g class="fill-teal">
    <rect x="330" y="215" width="270" height="56" rx="8"
          fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="title" x="465" y="233" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Autonomous agent engine</text>
    <text class="sub" x="465" y="253" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">Plan, execute, loop</text>
  </g>

  <!-- Arrow between router and engine -->
  <line x1="300" y1="243" x2="330" y2="243" class="connector-teal" marker-end="url(#arrow)"/>

  <!-- Sub-module: tool integration -->
  <g class="fill-teal">
    <rect x="80" y="295" width="160" height="56" rx="8"
          fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="title" x="160" y="313" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Tool integrations</text>
    <text class="sub" x="160" y="333" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">File, web, code exec</text>
  </g>

  <!-- Sub-module: memory / context -->
  <g class="fill-teal">
    <rect x="265" y="295" width="160" height="56" rx="8"
          fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="title" x="345" y="313" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Context memory</text>
    <text class="sub" x="345" y="333" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">Session and long-term</text>
  </g>

  <!-- Sub-module: config -->
  <g class="fill-teal">
    <rect x="450" y="295" width="150" height="56" rx="8"
          fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="title" x="525" y="313" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Config layer</text>
    <text class="sub" x="525" y="333" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">YAML / env setup</text>
  </g>

  <!-- Internal arrows: engine down to tools/memory/config -->
  <path d="M 400 271 L 400 280 L 160 280 L 160 295" class="connector-teal" marker-end="url(#arrow)"/>
  <line x1="465" y1="271" x2="345" y2="295" class="connector-teal" marker-end="url(#arrow)"/>
  <line x1="525" y1="271" x2="525" y2="295" class="connector-teal" marker-end="url(#arrow)"/>

  <!-- Sub-module: LLM connector (bottom of core) -->
  <g class="fill-gray">
    <rect x="180" y="375" width="280" height="44" rx="8"
          fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text class="title" x="320" y="397" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#444441">LLM API connector (multi-provider)</text>
  </g>

  <!-- Arrow from engine to LLM connector -->
  <line x1="320" y1="351" x2="320" y2="375" class="connector" marker-end="url(#arrow)"/>

  <!-- ====== Layer 3: external LLM providers ====== -->
  <!-- Arrow down from core to LLMs -->
  <line x1="320" y1="419" x2="320" y2="450" class="connector" marker-end="url(#arrow)"/>

  <!-- Dashed container for LLM providers -->
  <rect x="50" y="460" width="580" height="76" rx="12"
        fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="72" y="480" font-size="11" class="text-tertiary">External LLM providers (API)</text>

  <g class="fill-coral">
    <rect x="80" y="492" width="130" height="34" rx="6"
          fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="title" x="145" y="509" text-anchor="middle" dominant-baseline="central"
          font-size="13" font-weight="500" fill="#712B13">Claude</text>
  </g>

  <g class="fill-coral">
    <rect x="230" y="492" width="130" height="34" rx="6"
          fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="title" x="295" y="509" text-anchor="middle" dominant-baseline="central"
          font-size="13" font-weight="500" fill="#712B13">GPT-4o / o3</text>
  </g>

  <g class="fill-coral">
    <rect x="380" y="492" width="130" height="34" rx="6"
          fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="title" x="445" y="509" text-anchor="middle" dominant-baseline="central"
          font-size="13" font-weight="500" fill="#712B13">DeepSeek</text>
  </g>

  <g class="fill-gray">
    <rect x="530" y="492" width="80" height="34" rx="6"
          fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text class="title" x="570" y="509" text-anchor="middle" dominant-baseline="central"
          font-size="13" font-weight="500" fill="#444441">Other</text>
  </g>

  <!-- ====== Layer 4: key facts timeline ====== -->
  <text x="340" y="576" text-anchor="middle" font-size="14" font-weight="500" class="text-primary">Key milestones</text>

  <!-- Timeline spine -->
  <line x1="80" y1="606" x2="600" y2="606" stroke="#B4B2A9" stroke-width="0.5"/>

  <!-- Milestone 1 -->
  <circle cx="120" cy="606" r="5" fill="#534AB7"/>
  <text x="120" y="592" text-anchor="middle" font-size="11" fill="#534AB7">Nov 2025</text>
  <text x="120" y="624" text-anchor="middle" font-size="11" class="text-secondary">Launched as</text>
  <text x="120" y="638" text-anchor="middle" font-size="11" class="text-secondary">Clawdbot</text>

  <!-- Milestone 2 -->
  <circle cx="260" cy="606" r="5" fill="#D85A30"/>
  <text x="260" y="592" text-anchor="middle" font-size="11" fill="#D85A30">Jan 2026</text>
  <text x="260" y="624" text-anchor="middle" font-size="11" class="text-secondary">Renamed to</text>
  <text x="260" y="638" text-anchor="middle" font-size="11" class="text-secondary">OpenClaw</text>

  <!-- Milestone 3 -->
  <circle cx="400" cy="606" r="5" fill="#1D9E75"/>
  <text x="400" y="592" text-anchor="middle" font-size="11" fill="#1D9E75">Feb 2026</text>
  <text x="400" y="624" text-anchor="middle" font-size="11" class="text-secondary">300k+ stars</text>
  <text x="400" y="638" text-anchor="middle" font-size="11" class="text-secondary">Non-profit plan</text>

  <!-- Milestone 4 -->
  <circle cx="540" cy="606" r="5" fill="#D4537E"/>
  <text x="540" y="592" text-anchor="middle" font-size="11" fill="#D4537E">2026+</text>
  <text x="540" y="624" text-anchor="middle" font-size="11" class="text-secondary">Foundation</text>
  <text x="540" y="638" text-anchor="middle" font-size="11" class="text-secondary">stewardship</text>

  <!-- ====== Footer legend ====== -->
  <rect x="80" y="672" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="96" y="677" dominant-baseline="central" class="text-tertiary" font-size="11">Messaging platforms</text>

  <rect x="230" y="672" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="246" y="677" dominant-baseline="central" class="text-tertiary" font-size="11">OpenClaw core modules</text>

  <rect x="410" y="672" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="426" y="677" dominant-baseline="central" class="text-tertiary" font-size="11">LLM providers</text>

  <circle cx="555" cy="677" r="4" fill="#534AB7"/>
  <text x="565" y="677" dominant-baseline="central" class="text-tertiary" font-size="11">Milestones</text>
</svg>
