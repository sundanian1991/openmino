<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .text-primary { fill: #2C2C2A; }
    .text-secondary { fill: #5F5E5A; }
    .connector { stroke: #888780; stroke-width: 0.5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .text-primary { fill: #e0e0e0; }
      .text-secondary { fill: #a0a0a0; }
      .connector { stroke: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Node 1: user request (purple) -->
  <g>
    <rect x="220" y="30" width="240" height="56" rx="8"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="48" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#3C3489">User submits request</text>
    <text x="340" y="68" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#534AB7">Via API or web form</text>
  </g>

  <line x1="340" y1="86" x2="340" y2="120" class="connector" marker-end="url(#arrow)"/>

  <!-- Node 2: authentication (teal) -->
  <g>
    <rect x="220" y="120" width="240" height="56" rx="8"
          fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="138" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Authenticate</text>
    <text x="340" y="158" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">Verify token and permissions</text>
  </g>

  <line x1="340" y1="176" x2="340" y2="210" class="connector" marker-end="url(#arrow)"/>

  <!-- Node 3: validation (teal) -->
  <g>
    <rect x="220" y="210" width="240" height="56" rx="8"
          fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="228" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#085041">Validate input</text>
    <text x="340" y="248" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#0F6E56">Schema check and sanitize</text>
  </g>

  <!-- Branch: success path -->
  <line x1="340" y1="266" x2="340" y2="310" class="connector" marker-end="url(#arrow)"/>

  <!-- Branch: error path (to the right) -->
  <path d="M 460 238 L 540 238 L 540 310" class="connector" marker-end="url(#arrow)"/>
  <text x="500" y="225" text-anchor="middle" font-size="11" fill="#A32D2D">invalid</text>

  <!-- Node 4: process (gray) -->
  <g>
    <rect x="220" y="310" width="240" height="56" rx="8"
          fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="340" y="328" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#444441">Process request</text>
    <text x="340" y="348" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#5F5E5A">Execute business logic</text>
  </g>

  <!-- Node 5: error handler (red) -->
  <g>
    <rect x="460" y="310" width="180" height="56" rx="8"
          fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="550" y="328" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#791F1F">Return error</text>
    <text x="550" y="348" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#A32D2D">4xx response code</text>
  </g>

  <line x1="340" y1="366" x2="340" y2="400" class="connector" marker-end="url(#arrow)"/>

  <!-- Node 6: response (purple) -->
  <g>
    <rect x="220" y="400" width="240" height="56" rx="8"
          fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="418" text-anchor="middle" dominant-baseline="central"
          font-size="14" font-weight="500" fill="#3C3489">Return response</text>
    <text x="340" y="438" text-anchor="middle" dominant-baseline="central"
          font-size="12" fill="#534AB7">200 with JSON payload</text>
  </g>
</svg>
