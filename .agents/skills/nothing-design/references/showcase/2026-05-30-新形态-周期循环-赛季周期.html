<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛季考核周期</title>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5F5F5;
    font-family: 'Space Grotesk', sans-serif;
    color: #1A1A1A;
    min-height: 100vh;
    padding: 48px 40px;
  }

  /* Typography scale */
  .display { font-family: 'Doto', sans-serif; font-weight: 700; }
  .body-text { font-family: 'Space Grotesk', sans-serif; }
  .label { font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.07em; }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
  }
  .hero-number {
    font-size: 64px;
    line-height: 1;
    color: #1A1A1A;
  }
  .hero-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
  }

  /* Ring section */
  .ring-section {
    display: flex;
    justify-content: center;
    margin-bottom: 48px;
  }
  .ring-container {
    position: relative;
    width: 400px;
    height: 400px;
  }
  .ring-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-center-phase {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #D71921;
    margin-bottom: 4px;
  }
  .ring-center-week {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #666;
  }

  /* Arc labels */
  .arc-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    fill: #666;
  }
  .arc-label-active {
    fill: #D71921;
  }

  /* Cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .card {
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    border-radius: 4px;
    padding: 16px;
    position: relative;
  }
  .card-active {
    border-left: 3px solid #D71921;
  }
  .card-inactive {
    border-left: 3px solid #E8E8E8;
  }
  .card-phase {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    margin-bottom: 8px;
  }
  .card-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 12px;
    color: #1A1A1A;
  }
  .card-active .card-name {
    color: #D71921;
  }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .card-row-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
  }
  .card-row-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    color: #1A1A1A;
  }
</style>
</head>
<body>

<div class="header">
  <h1>赛季考核周期</h1>
  <span class="hero-number display">4</span>
  <span class="hero-label label">PHASES</span>
</div>

<div class="ring-section">
  <div class="ring-container">
    <svg viewBox="0 0 400 400" width="400" height="400">
      <!-- Ring parameters: center 200,200 | radius 150 | stroke-width 28 -->
      <!-- Circumference = 2*pi*150 = 942.48 -->
      <!-- Gap between arcs: 6px each, total gaps = 24px -->
      <!-- Usable arc length = 942.48 - 24 = 918.48 -->
      <!-- Phase proportions by weeks: 6:2:8:4 = 20 total -->
      <!-- Phase 1: 6/20 * 918.48 = 275.54 -->
      <!-- Phase 2: 2/20 * 918.48 = 91.85 -->
      <!-- Phase 3: 8/20 * 918.48 = 367.39 -->
      <!-- Phase 4: 4/20 * 918.48 = 183.70 -->

      <!-- Phase 1: 储备池准入 — #E8E8E8 -->
      <circle cx="200" cy="200" r="150"
        fill="none" stroke="#E8E8E8" stroke-width="28"
        stroke-dasharray="275.54 666.94"
        stroke-dashoffset="0"
        transform="rotate(-90 200 200)" />

      <!-- Phase 2: 入围赛述标 — #B0B0B0 -->
      <circle cx="200" cy="200" r="150"
        fill="none" stroke="#B0B0B0" stroke-width="28"
        stroke-dasharray="91.85 850.63"
        stroke-dashoffset="-281.54"
        transform="rotate(-90 200 200)" />

      <!-- Phase 3: 新秀赛竞技 — accent #D71921, thicker -->
      <circle cx="200" cy="200" r="150"
        fill="none" stroke="#D71921" stroke-width="34"
        stroke-dasharray="367.39 575.09"
        stroke-dashoffset="-379.39"
        transform="rotate(-90 200 200)" />

      <!-- Phase 4: 升降级对决 — #1A1A1A -->
      <circle cx="200" cy="200" r="150"
        fill="none" stroke="#1A1A1A" stroke-width="28"
        stroke-dasharray="183.70 758.78"
        stroke-dashoffset="-752.78"
        transform="rotate(-90 200 200)" />

      <!-- Arc labels positioned along arcs -->
      <!-- Phase 1 label: center of arc ~ 275.54/2 = 137.77 from start -->
      <!-- Angle: 137.77/942.48 * 360 = 52.6 deg from top -->
      <text x="320" y="105" class="arc-label" text-anchor="middle">储备池准入</text>

      <!-- Phase 2 label: center of arc -->
      <text x="358" y="228" class="arc-label" text-anchor="middle">入围赛述标</text>

      <!-- Phase 3 label: center of arc -->
      <text x="170" y="358" class="arc-label arc-label-active" text-anchor="middle">新秀赛竞技</text>

      <!-- Phase 4 label: center of arc -->
      <text x="72" y="248" class="arc-label" text-anchor="middle">升降级对决</text>
    </svg>

    <div class="ring-center">
      <div class="ring-center-phase">新秀赛</div>
      <div class="ring-center-week">第3周</div>
    </div>
  </div>
</div>

<div class="cards">
  <div class="card card-inactive">
    <div class="card-phase label">Phase 01</div>
    <div class="card-name">储备池准入</div>
    <div class="card-row">
      <span class="card-row-label label">周期</span>
      <span class="card-row-value">Q1初 / 6周</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">关键动作</span>
      <span class="card-row-value">资质审查+入库</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">责任岗</span>
      <span class="card-row-value">供应商管理</span>
    </div>
  </div>

  <div class="card card-inactive">
    <div class="card-phase label">Phase 02</div>
    <div class="card-name">入围赛述标</div>
    <div class="card-row">
      <span class="card-row-label label">周期</span>
      <span class="card-row-value">Q1末 / 2周</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">关键动作</span>
      <span class="card-row-value">方案陈述+答辩</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">责任岗</span>
      <span class="card-row-value">评审委员会</span>
    </div>
  </div>

  <div class="card card-active">
    <div class="card-phase label">Phase 03</div>
    <div class="card-name">新秀赛竞技</div>
    <div class="card-row">
      <span class="card-row-label label">周期</span>
      <span class="card-row-value">Q2 / 8周</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">关键动作</span>
      <span class="card-row-value">实战交付+考核</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">责任岗</span>
      <span class="card-row-value">业务负责人</span>
    </div>
  </div>

  <div class="card card-inactive">
    <div class="card-phase label">Phase 04</div>
    <div class="card-name">升降级对决</div>
    <div class="card-row">
      <span class="card-row-label label">周期</span>
      <span class="card-row-value">Q2末 / 4周</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">关键动作</span>
      <span class="card-row-value">排名+升降级</span>
    </div>
    <div class="card-row">
      <span class="card-row-label label">责任岗</span>
      <span class="card-row-value">决策层</span>
    </div>
  </div>
</div>

</body>
</html>
