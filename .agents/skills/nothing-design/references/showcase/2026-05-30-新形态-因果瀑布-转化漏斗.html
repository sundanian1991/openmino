<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线索到放款转化瀑布</title>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5F5F5;
    font-family: 'Space Grotesk', sans-serif;
    color: #1A1A1A;
    min-height: 100vh;
    padding: 48px 40px;
  }

  .display { font-family: 'Doto', sans-serif; font-weight: 700; }
  .label { font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.07em; }

  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
  }
  .hero-number {
    font-size: 64px;
    line-height: 1;
    color: #1A1A1A;
  }
  .hero-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
  }

  .waterfall-section {
    margin-bottom: 40px;
  }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .summary-card {
    background: #FFFFFF;
    border: 1px solid #E8E8E8;
    border-radius: 4px;
    padding: 20px;
  }
  .summary-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    margin-bottom: 8px;
  }
  .summary-value {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #1A1A1A;
  }
  .summary-value.red { color: #D71921; }
  .summary-value.green { color: #4A9E5C; }
</style>
</head>
<body>

<div class="header">
  <h1>线索到放款转化瀑布</h1>
  <span class="hero-number display">2.8%</span>
  <span class="hero-label label">FINAL CONVERSION</span>
</div>

<div class="waterfall-section">
  <svg viewBox="0 0 960 420" width="960" height="420">
    <!--
      Layout: 6 bars, each 80px wide, spacing 56px between bars
      Total width: 6*80 + 5*56 = 480+280 = 760
      Left offset: (960-760)/2 = 100
      Max height: 300px (for 100,000)
      Bar bottom y: 350

      Heights:
      100,000 → 300px
      42,000 → 126px
      18,500 → 55.5px
      8,200 → 24.6px
      4,100 → 12.3px
      2,800 → 8.4px

      Bar x positions:
      1: 100
      2: 236 (100+80+56)
      3: 372
      4: 508
      5: 644
      6: 780

      Bottom y: 350
    -->

    <!-- Connection bands (trapezoids) between bars -->
    <!-- Band 1→2: full bar1 top to retained bar2 top -->
    <polygon points="180,50 236,224 236,350 180,350" fill="#E8E8E8" />
    <!-- Band 2→3 -->
    <polygon points="316,224 372,294.5 372,350 316,350" fill="#E8E8E8" />
    <!-- Band 3→4 -->
    <polygon points="452,294.5 508,325.4 508,350 452,350" fill="#E8E8E8" />
    <!-- Band 4→5 -->
    <polygon points="588,325.4 644,337.7 644,350 588,350" fill="#E8E8E8" />
    <!-- Band 5→6 -->
    <polygon points="724,337.7 780,341.6 780,350 724,350" fill="#E8E8E8" />

    <!-- Bar 1: 线索池 100,000 — full height #1A1A1A -->
    <rect x="100" y="50" width="80" height="300" fill="#1A1A1A" />

    <!-- Bar 2: 有效触达 42,000 — #1A1A1A -->
    <rect x="236" y="224" width="80" height="126" fill="#1A1A1A" />

    <!-- Bar 3: 意向客户 18,500 — #1A1A1A -->
    <rect x="372" y="294.5" width="80" height="55.5" fill="#1A1A1A" />

    <!-- Bar 4: 授信通过 8,200 — #1A1A1A -->
    <rect x="508" y="325.4" width="80" height="24.6" fill="#1A1A1A" />

    <!-- Bar 5: 提款客户 4,100 — #1A1A1A -->
    <rect x="644" y="337.7" width="80" height="12.3" fill="#1A1A1A" />

    <!-- Bar 6: 大额放款 2,800 — green highlight -->
    <rect x="780" y="341.6" width="80" height="8.4" fill="#4A9E5C" />

    <!-- Bar labels (above bars) -->
    <text x="140" y="40" text-anchor="middle" font-family="Space Mono, monospace" font-size="11px" font-weight="700" fill="#1A1A1A">100,000</text>
    <text x="276" y="214" text-anchor="middle" font-family="Space Mono, monospace" font-size="11px" font-weight="700" fill="#1A1A1A">42,000</text>
    <text x="412" y="284" text-anchor="middle" font-family="Space Mono, monospace" font-size="11px" font-weight="700" fill="#1A1A1A">18,500</text>
    <text x="548" y="315" text-anchor="middle" font-family="Space Mono, monospace" font-size="11px" font-weight="700" fill="#1A1A1A">8,200</text>
    <text x="684" y="328" text-anchor="middle" font-family="Space Mono, monospace" font-size="11px" font-weight="700" fill="#1A1A1A">4,100</text>
    <text x="820" y="332" text-anchor="middle" font-family="Space Mono, monospace" font-size="11px" font-weight="700" fill="#4A9E5C">2,800</text>

    <!-- Bar names (below bars) -->
    <text x="140" y="370" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" text-transform="uppercase" letter-spacing="0.07em" fill="#666">线索池</text>
    <text x="276" y="370" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" text-transform="uppercase" letter-spacing="0.07em" fill="#666">有效触达</text>
    <text x="412" y="370" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" text-transform="uppercase" letter-spacing="0.07em" fill="#666">意向客户</text>
    <text x="548" y="370" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" text-transform="uppercase" letter-spacing="0.07em" fill="#666">授信通过</text>
    <text x="684" y="370" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" text-transform="uppercase" letter-spacing="0.07em" fill="#666">提款客户</text>
    <text x="820" y="370" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" text-transform="uppercase" letter-spacing="0.07em" fill="#4A9E5C">大额放款</text>

    <!-- Loss rate labels between bars -->
    <!-- 1→2: -58% -->
    <text x="208" y="190" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#D71921">-58%</text>
    <!-- 2→3: -56% -->
    <text x="344" y="260" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#D71921">-56%</text>
    <!-- 3→4: -56% -->
    <text x="480" y="310" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#D71921">-56%</text>
    <!-- 4→5: -50% -->
    <text x="616" y="332" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#D71921">-50%</text>
    <!-- 5→6: -32% -->
    <text x="752" y="340" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#D71921">-32%</text>

    <!-- Step number indicators -->
    <text x="140" y="395" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#999" letter-spacing="0.07em">01</text>
    <text x="276" y="395" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#999" letter-spacing="0.07em">02</text>
    <text x="412" y="395" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#999" letter-spacing="0.07em">03</text>
    <text x="548" y="395" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#999" letter-spacing="0.07em">04</text>
    <text x="684" y="395" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#999" letter-spacing="0.07em">05</text>
    <text x="820" y="395" text-anchor="middle" font-family="Space Mono, monospace" font-size="10px" fill="#4A9E5C" letter-spacing="0.07em">06</text>
  </svg>
</div>

<div class="summary-row">
  <div class="summary-card">
    <div class="summary-label label">总转化率</div>
    <div class="summary-value">2.8%</div>
  </div>
  <div class="summary-card">
    <div class="summary-label label">最大流失环节</div>
    <div class="summary-value red">线索 → 触达 (-58%)</div>
  </div>
  <div class="summary-card">
    <div class="summary-label label">关键提升点</div>
    <div class="summary-value green">授信通过率 45% (高于行业均值)</div>
  </div>
</div>

</body>
</html>
