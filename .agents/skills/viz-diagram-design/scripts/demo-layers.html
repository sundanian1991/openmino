<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统技术架构</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geist',system-ui,sans-serif;background:#faf7f2;color:#1c1917;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 32px}
.frame{max-width:1200px;width:100%}
.header-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.eyebrow{font-family:'Geist Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#57534e;flex:1}
h1{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;line-height:1.08;letter-spacing:-.02em;margin-bottom:8px}
.subtitle{color:#57534e;font-size:14px;line-height:1.5;max-width:720px;margin-bottom:24px}
svg{width:100%;min-width:900px;display:block}
.toolbar{display:flex;gap:4px;flex-shrink:0}
.toolbar-toggle{background:transparent;border:none;color:#57534e;cursor:pointer;font-size:18px;line-height:1;padding:2px 8px;border-radius:4px;transition:color .2s,background .2s}
.toolbar-toggle:hover{color:#1c1917;background:rgba(28,25,23,.06)}
.toolbar-actions{display:none;gap:4px}
.toolbar.expanded .toolbar-actions{display:flex}
.toolbar-actions button{background:rgba(28,25,23,.04);border:1px solid rgba(28,25,23,0.12);color:#57534e;padding:4px 10px;border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.toolbar-actions button:hover{background:rgba(28,25,23,.08);color:#1c1917;border-color:#57534e}
@media print{.toolbar{display:none!important}}
@media(max-width:860px){body{display:block;padding:32px 20px}.frame{overflow-x:auto}}
</style>
</head>
<body>
<div id="diagram-container" class="frame">
<div class="header-row">
<p class="eyebrow">Diagram · 系统技术架构</p>
<div class="toolbar">
<div class="toolbar-actions">
<button onclick="exportPNG(this)">PNG</button>
<button onclick="exportPDF(this)">PDF</button>
</div>
<button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export">⋯</button>
</div>
</div>
<h1>系统技术架构</h1>
<p class="subtitle">金条结算平台 · 六层架构</p>
<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img">

<defs>
<marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
<polygon points="0 0,8 3,0 6" fill="#57534e"/>
</marker>
<marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
<polygon points="0 0,8 3,0 6" fill="#b5523a"/>
</marker>
<marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
<polygon points="0 0,8 3,0 6" fill="#2563eb"/>
</marker>
<pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
<circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.1)"/>
</pattern>
</defs>

<rect width="100%" height="100%" fill="#faf7f2"/>
<rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

<rect x="40" y="100" width="720" height="48" rx="4" fill="#faf7f2"/>
<rect x="40" y="100" width="720" height="48" rx="4" fill="rgba(181,82,58,0.05)" stroke="rgba(181,82,58,0.50)" stroke-width="1"/>
<text x="60" y="128" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist',sans-serif">接入层</text>
<text x="740" y="128" fill="#57534e" font-size="9" font-family="'Geist Mono',monospace" text-anchor="end">API Gateway · 负载均衡</text>
<rect x="40" y="152" width="720" height="48" rx="4" fill="#faf7f2"/>
<rect x="40" y="152" width="720" height="48" rx="4" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
<text x="60" y="180" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist',sans-serif">应用层</text>
<text x="740" y="180" fill="#57534e" font-size="9" font-family="'Geist Mono',monospace" text-anchor="end">结算引擎 · 因子计算</text>
<rect x="40" y="204" width="720" height="48" rx="4" fill="#faf7f2"/>
<rect x="40" y="204" width="720" height="48" rx="4" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
<text x="60" y="232" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist',sans-serif">服务层</text>
<text x="740" y="232" fill="#57534e" font-size="9" font-family="'Geist Mono',monospace" text-anchor="end">供应商 · 合同 · 对账</text>
<rect x="40" y="256" width="720" height="48" rx="4" fill="#faf7f2"/>
<rect x="40" y="256" width="720" height="48" rx="4" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
<text x="60" y="284" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist',sans-serif">数据层</text>
<text x="740" y="284" fill="#57534e" font-size="9" font-family="'Geist Mono',monospace" text-anchor="end">MySQL · ClickHouse</text>
<rect x="40" y="308" width="720" height="48" rx="4" fill="#faf7f2"/>
<rect x="40" y="308" width="720" height="48" rx="4" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
<text x="60" y="336" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist',sans-serif">基础设施</text>
<text x="740" y="336" fill="#57534e" font-size="9" font-family="'Geist Mono',monospace" text-anchor="end">K8s · Docker · 监控</text>

</svg>
</div>

<script>
async function getCanvas() {
  const el = document.getElementById('diagram-container');
  const r = el.getBoundingClientRect();
  const pad = 24;
  return html2canvas(document.body, {
    backgroundColor: '#faf7f2', scale: 2, useCORS: true,
    ignoreElements: e => e.classList && e.classList.contains('toolbar'),
    x: r.left + window.scrollX - pad,
    y: r.top + window.scrollY - pad,
    width: r.width + pad * 2,
    height: r.height + pad * 2
  });
}
async function exportPNG(btn) {
  const orig = btn.textContent;
  btn.textContent = '...';
  try {
    const canvas = await getCanvas();
    const link = document.createElement('a');
    link.download = 'diagram.png'; link.href = canvas.toDataURL('image/png'); link.click();
    btn.textContent = 'OK';
  } catch(e) { btn.textContent = 'FAIL'; }
  setTimeout(() => btn.textContent = orig, 1500);
}
async function exportPDF(btn) {
  const orig = btn.textContent;
  btn.textContent = '...';
  try {
    const canvas = await getCanvas();
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/png');
    const ori = canvas.width > canvas.height ? 'landscape' : 'portrait';
    const pdf = new jsPDF({ orientation: ori, unit: 'px', format: [canvas.width, canvas.height], hotfixes: ['px_scaling'] });
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
    pdf.save('diagram.pdf');
    btn.textContent = 'OK';
  } catch(e) { btn.textContent = 'FAIL'; }
  setTimeout(() => btn.textContent = orig, 1500);
}
</script>

</body>
</html>
