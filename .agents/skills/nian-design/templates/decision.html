<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>选型评估</title>
<style>
:root{--bg:#F6F6F0;--sf:#EDEDE0;--sd:#E2E0D0;--stone:#A09888;--mt:#6A6558;--bk:#1A1816;--olive:#4A5D3A;--moss:#6B8B5E;--glacier:#2A4A5A;--rock:#808080;--gold:#BF9B5A;--clay:#C66B4B;--red:#E93C10;--sky:#4A80C0;--ff-d:'Georgia','Times New Roman',serif;--ff-b:-apple-system,'Inter','Helvetica Neue',sans-serif;--ff-m:'JetBrains Mono','SF Mono',monospace}
body{font-family:var(--ff-b);background:var(--bg);color:var(--bk);margin:0;line-height:1.6}
.hero{min-height:70vh;display:flex;flex-direction:column;justify-content:center;padding:40px;max-width:900px;margin:0 auto}
.hero h1{font-family:var(--ff-d);font-size:clamp(36px,6vw,72px);font-weight:400}
.hero .sub{font-size:clamp(14px,2vw,18px);color:var(--mt);margin-top:8px}
.section{padding:clamp(60px,10vh,120px) 40px;max-width:1200px;margin:0 auto}
.section--dark{background:var(--bk);color:#fff;max-width:none}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:#fff;border:1px solid var(--sd);border-radius:6px;padding:24px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:13px;color:var(--mt)}
.answer{font-family:var(--ff-d);font-size:clamp(36px,4vw,64px)}
.arg{font-size:14px;color:var(--mt)}
.ev{font-family:var(--ff-m);font-size:11px;color:var(--stone)}
.tag{font-family:var(--ff-m);font-size:10px;padding:2px 8px;border-radius:3px;background:var(--sf)}
.footer{padding:40px;font-size:12px;color:var(--stone);text-align:center;border-top:1px solid var(--sd)}
@media(max-width:800px){.grid-3,.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hero">
  <h1 data-edit>结论</h1>
  <div class="sub" data-edit>一句话推荐 · 关键数字</div>
</header>
<section class="section">
  <h2 class="answer" data-edit>方案对比</h2>
  <div class="grid-3">
    <div class="card"><div class="card-title" data-edit>方案A</div><div class="card-desc" data-edit>优势·成本·风险</div></div>
    <div class="card"><div class="card-title" data-edit>方案B</div><div class="card-desc" data-edit>优势·成本·风险</div></div>
    <div class="card"><div class="card-title" data-edit>方案C</div><div class="card-desc" data-edit>优势·成本·风险</div></div>
  </div>
</section>
<section class="section--dark section" style="text-align:center">
  <div class="answer" data-edit>推荐方案</div>
  <div class="arg" style="color:var(--rock)" data-edit>核心理由</div>
</section>
<div class="footer" data-edit>来源·日期</div>
<script>document.querySelectorAll('[data-edit]').forEach(e=>e.contentEditable=true)</script>
</body></html>
