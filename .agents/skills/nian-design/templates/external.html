<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>品牌展示</title>
<style>
:root{--bg:#F6F6F0;--sf:#EDEDE0;--sd:#E2E0D0;--stone:#A09888;--mt:#6A6558;--bk:#1A1816;--olive:#4A5D3A;--moss:#6B8B5E;--glacier:#2A4A5A;--rock:#808080;--gold:#BF9B5A;--clay:#C66B4B;--red:#E93C10;--sky:#4A80C0;--ff-d:'Georgia','Times New Roman',serif;--ff-b:-apple-system,'Inter','Helvetica Neue',sans-serif;--ff-m:'JetBrains Mono','SF Mono',monospace}
body{font-family:var(--ff-b);background:var(--bg);color:var(--bk);margin:0;line-height:1.6}
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:60px;background:var(--bk);color:#fff}
.hero-right{background:var(--olive)}
.hero-left h1{font-family:var(--ff-d);font-size:clamp(36px,6vw,72px);font-weight:400}
.hero-left .sub{font-size:clamp(14px,2vw,18px);color:var(--yellow);margin-top:8px}
.section{padding:clamp(80px,12vh,160px) 40px;max-width:1200px;margin:0 auto}
.section--dark{background:var(--bk);color:#fff;max-width:none}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:#fff;border:1px solid var(--sd);border-radius:6px;padding:24px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:13px;color:var(--mt)}
.answer{font-family:var(--ff-d);font-size:clamp(36px,4vw,64px)}
.arg{font-size:14px;color:var(--mt)}
.swatch{display:inline-block;width:48px;height:48px;border-radius:4px;margin:4px}
.footer{padding:40px;font-size:12px;color:var(--stone);text-align:center;border-top:1px solid var(--sd)}
@media(max-width:800px){.hero{grid-template-columns:1fr}.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hero">
  <div class="hero-left">
    <h1 data-edit>品牌宣言</h1>
    <div class="sub" data-edit>副标题</div>
  </div>
  <div class="hero-right"></div>
</header>
<section class="section">
  <div class="grid-3">
    <div class="card"><div class="card-title" data-edit>理念一</div><div class="card-desc" data-edit>描述</div></div>
    <div class="card"><div class="card-title" data-edit>理念二</div><div class="card-desc" data-edit>描述</div></div>
    <div class="card"><div class="card-title" data-edit>理念三</div><div class="card-desc" data-edit>描述</div></div>
  </div>
</section>
<section class="section--dark section" style="text-align:center">
  <div class="answer" data-edit>原则</div>
  <div class="arg" style="color:var(--rock)" data-edit>Do / Don't</div>
</section>
<section class="section" style="text-align:center">
  <div class="answer" style="font-size:clamp(24px,3vw,40px);color:var(--mt)" data-edit">信任证据</div>
  <div class="arg" data-edit>客户/案例/数据</div>
</section>
<div class="footer" data-edit>© Brand</div>
<script>document.querySelectorAll('[data-edit]').forEach(e=>e.contentEditable=true)</script>
</body></html>
