<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景二：数据分析</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --brand-primary: #4A6741;
  --brand-secondary: #7A9B6D;
  --signal-warning: #E87A3C;
  --bg: #F5F3EF;
  --surface: #FFFFFF;
  --surface-alt: #F5F5F0;
  --border: #C4B8A8;
  --border-strong: #8A7D6E;
  --text-display: #2D2A26;
  --text-primary: #1A1816;
  --text-secondary: #8A7D6E;
  --text-disabled: #C4B8A8;
  --success: #4A6741;
  --error: #E8453C;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.6; }

/* HERO — 深色背景 + 大数字 */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 120px;
  background: var(--text-display);
  color: var(--bg);
}
.hero-content { max-width: 800px; }
.hero-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 40px;
}
.hero h1 {
  font-family: 'Georgia', serif;
  font-size: 72px;
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -2px;
  margin-bottom: 40px;
  color: var(--bg);
}
.hero-stats {
  display: flex;
  gap: 60px;
  margin-top: 40px;
}
.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hero-stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.hero-stat {
  font-family: 'Georgia', serif;
  font-size: 48px;
  font-weight: 300;
  color: var(--bg);
}
.hero-stat.success { color: #52B788; }
.hero-stat.accent { color: var(--signal-warning); }
.hero-bar {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.hero-bar-track {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
.hero-bar-fill {
  height: 100%;
  background: var(--brand-primary);
  border-radius: 4px;
}
.hero-bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 12px;
}
.hero-bar-label strong { color: var(--bg); }

/* SECTION */
section { padding: 120px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 60px;
}
.section-title {
  font-family: 'Georgia', serif;
  font-size: 42px;
  font-weight: 300;
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 60px;
  color: var(--text-display);
}
.section-title strong { font-weight: 600; }

/* RANK CARD */
.rank-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
}
.rank-card-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.rank-row {
  display: grid;
  grid-template-columns: 80px 1fr 60px 60px;
  gap: 12px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.rank-row:last-child { border-bottom: none; }
.rk-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.rk-track { height: 6px; background: var(--surface-alt); border-radius: 3px; overflow: hidden; }
.rk-fill { height: 100%; border-radius: 3px; }
.rk-fill.up { background: var(--brand-primary); }
.rk-fill.down { background: var(--signal-warning); }
.rk-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); text-align: right; }
.rk-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; text-align: right; }
.rk-pct.up { color: var(--brand-primary); }
.rk-pct.down { color: var(--signal-warning); }

/* DATA TABLE */
.data-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-top: 48px;
}
.data-table-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}
.data-table-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 12px 24px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-disabled);
  background: var(--surface-alt);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface-alt); }

/* FOOTER */
.footer {
  background: var(--text-display);
  color: rgba(255,255,255,0.3);
  padding: 60px 120px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer__left { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.footer__right { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* RESPONSIVE */
@media (max-width: 1024px) {
  .hero, section, .footer { padding-left: 40px; padding-right: 40px; }
  .hero h1 { font-size: 48px; }
}
@media (max-width: 768px) {
  .hero, section, .footer { padding-left: 24px; padding-right: 24px; }
  .hero { min-height: 80vh; }
  .hero h1 { font-size: 36px; }
  .hero-stats { flex-wrap: wrap; gap: 32px; }
  .hero-stat { font-size: 36px; }
  .rank-row { grid-template-columns: 60px 1fr 50px 50px; }
  .footer { flex-direction: column; gap: 16px; text-align: center; }
}
</style>
</head>
<body>

<!-- HERO — 深色背景 + Georgia 大数字 -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-tag">主贷大额 · 拉新</div>
    <h1>3月达成率</h1>
    <div class="hero-stats">
      <div class="hero-stat">
        <span class="hero-stat-label">总达成率</span>
        <span class="hero-stat">101.3%</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-label">达标</span>
        <span class="hero-stat success">3 / 8</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-label">最高</span>
        <span class="hero-stat">132.5%</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-label">最低</span>
        <span class="hero-stat accent">68.2%</span>
      </div>
    </div>
    <div class="hero-bar">
      <div class="hero-bar-track">
        <div class="hero-bar-fill" style="width: 101.3%"></div>
      </div>
      <div class="hero-bar-label"><strong>286.3M</strong> 实际 / <strong>282.5M</strong> 目标</div>
    </div>
  </div>
</section>

<!-- SECTION: 排名 -->
<section>
  <div class="section-label">职场达成排名</div>

  <div class="rank-card">
    <div class="rank-card-title">达成率排名</div>
    <div class="rank-row">
      <span class="rk-name">汇讯</span>
      <div class="rk-track"><div class="rk-fill up" style="width: 100%"></div></div>
      <span class="rk-val">8,699</span>
      <span class="rk-pct up">132.5%</span>
    </div>
    <div class="rank-row">
      <span class="rk-name">新动力</span>
      <div class="rk-track"><div class="rk-fill up" style="width: 80%"></div></div>
      <span class="rk-val">6,126</span>
      <span class="rk-pct up">105.8%</span>
    </div>
    <div class="rank-row">
      <span class="rk-name">锦瑞</span>
      <div class="rk-track"><div class="rk-fill up" style="width: 78%"></div></div>
      <span class="rk-val">2,755</span>
      <span class="rk-pct up">103.9%</span>
    </div>
    <div class="rank-row">
      <span class="rk-name">德辰</span>
      <div class="rk-track"><div class="rk-fill down" style="width: 71%"></div></div>
      <span class="rk-val">2,805</span>
      <span class="rk-pct down">93.9%</span>
    </div>
    <div class="rank-row">
      <span class="rk-name">广达</span>
      <div class="rk-track"><div class="rk-fill down" style="width: 64%"></div></div>
      <span class="rk-val">3,588</span>
      <span class="rk-pct down">85.3%</span>
    </div>
  </div>

  <div class="data-table-wrap">
    <div class="data-table-header">
      <div class="data-table-title">放款构成 · 拉新 vs 促提</div>
    </div>
    <table class="data-table">
      <thead>
        <tr><th>职场</th><th>拉新</th><th>促提</th><th>拉新占比</th></tr>
      </thead>
      <tbody>
        <tr><td>汇讯</td><td>7,824</td><td>874</td><td>90%</td></tr>
        <tr><td>新动力</td><td>4,416</td><td>1,709</td><td>72%</td></tr>
        <tr><td>锦瑞</td><td>2,160</td><td>595</td><td>78%</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer__left">主贷大额拉新 · 2026年3月</div>
  <div class="footer__right">累计放款 286.3M</div>
</footer>

</body>
</html>
