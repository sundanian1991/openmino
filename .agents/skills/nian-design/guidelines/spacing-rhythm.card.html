<!-- @dsCard group="Layout" viewport="700x300" subtitle="Section background rhythm — 明→暗→白交替，不连续3同色" name="Background Rhythm" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .rhythm{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);overflow:hidden}
  .sec{padding:12px 16px;display:flex;align-items:center;gap:12px}
  .sec-idx{font-size:9px;font-family:var(--font-data);color:var(--text-disabled);width:20px;flex-shrink:0}
  .sec-name{font-size:11px;font-weight:500;color:var(--text-primary)}
  .sec-tag{font-size:8px;font-family:var(--font-data);letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:2px;flex-shrink:0}
  .sec--white{background:var(--surface)}
  .sec--alt{background:var(--surface-raised)}
  .sec--dark{background:var(--darkgray)}
  .sec--dark .sec-name{color:#fff}
  .sec--dark .sec-idx{color:rgba(255,255,255,.4)}
  .tag-hero{background:var(--olive);color:#fff}
  .tag-data{background:var(--surface);color:var(--text-primary);border:1px solid var(--border)}
  .tag-quote{background:var(--earth);color:#fff}
  .tag-end{background:var(--glacier);color:#fff}
  .desc{font-size:10px;color:var(--text-secondary);line-height:1.5;margin-top:12px}
  .desc b{color:var(--text-primary);font-weight:600}
</style>
</head>
<body>
<div class="title">Background Rhythm</div>
<div class="rhythm">
  <div class="sec sec--alt"><span class="sec-idx">01</span><span class="sec-name">开屏 Hero</span><span class="sec-tag tag-hero">Hero</span></div>
  <div class="sec sec--white"><span class="sec-idx">02</span><span class="sec-name">核心数据</span><span class="sec-tag tag-data">数据</span></div>
  <div class="sec sec--alt"><span class="sec-idx">03</span><span class="sec-name">趋势分析</span><span class="sec-tag tag-data">数据</span></div>
  <div class="sec sec--white"><span class="sec-idx">04</span><span class="sec-name">金句转场</span><span class="sec-tag tag-quote">金句</span></div>
  <div class="sec sec--alt"><span class="sec-idx">05</span><span class="sec-name">详细对比</span><span class="sec-tag tag-data">数据</span></div>
  <div class="sec sec--white"><span class="sec-idx">06</span><span class="sec-name">行动建议</span><span class="sec-tag tag-data">数据</span></div>
  <div class="sec sec--dark"><span class="sec-idx">07</span><span class="sec-name">收束结论</span><span class="sec-tag tag-end">收尾</span></div>
</div>
<div class="desc"><b>不连续 3 个同色 section</b>。深色 section ≤ 总数 1/3。每 3-4 个 section 插金句转场。数据展示用 --surface。<b>最后一个 section 必须深色收尾</b>（--darkgray 或 --glacier）。</div>
</body>
</html>
