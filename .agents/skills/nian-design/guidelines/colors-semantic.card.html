<!-- @dsCard group="Colors" viewport="700x240" subtitle="Surface + Text + Semantic aliases" name="Semantic Tokens" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 32px}
  .row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(26,26,26,.06)}
  .dot{width:24px;height:24px;border-radius:2px;flex-shrink:0}
  .dot--ring{border:1.5px solid rgba(26,26,26,.2)}
  .info{display:flex;flex-direction:column;gap:1px}
  .token{font-size:10px;font-weight:600;color:var(--text-primary);font-family:var(--font-data)}
  .role{font-size:9px;color:var(--text-secondary)}
  .border-row{display:flex;align-items:center;gap:14px;margin-top:14px}
  .line{height:2px;width:60px}
  .blabel{font-size:9px;color:var(--text-secondary);font-family:var(--font-data)}
</style>
</head>
<body>
<div class="title">Semantic Tokens</div>
<div class="grid">
  <div class="row"><div class="dot dot--ring" style="background:var(--bg)"></div><div class="info"><span class="token">--bg</span><span class="role">页面主背景</span></div></div>
  <div class="row"><div class="dot" style="background:var(--text-primary)"></div><div class="info"><span class="token">--text-primary</span><span class="role">正文 · 主要内容</span></div></div>
  <div class="row"><div class="dot" style="background:var(--surface)"></div><div class="info"><span class="token">--surface</span><span class="role">卡片/组件背景</span></div></div>
  <div class="row"><div class="dot" style="background:var(--text-secondary)"></div><div class="info"><span class="token">--text-secondary</span><span class="role">标签 · 说明</span></div></div>
  <div class="row"><div class="dot" style="background:var(--surface-raised)"></div><div class="info"><span class="token">--surface-raised</span><span class="role">次级背景</span></div></div>
  <div class="row"><div class="dot" style="background:var(--text-disabled)"></div><div class="info"><span class="token">--text-disabled</span><span class="role">禁用态 · 时间戳</span></div></div>
  <div class="row"><div class="dot" style="background:var(--olive)"></div><div class="info"><span class="token">--olive</span><span class="role">品牌强调色</span></div></div>
  <div class="row"><div class="dot" style="background:var(--text-display)"></div><div class="info"><span class="token">--text-display</span><span class="role">Hero 标题</span></div></div>
</div>
<div class="border-row">
  <div class="line" style="background:var(--border-default)"></div><span class="blabel">--border-default</span>
  <div class="line" style="background:var(--border-subtle)"></div><span class="blabel">--border-subtle</span>
  <div class="line" style="background:var(--border-chip)"></div><span class="blabel">--border-chip</span>
</div>
</body>
</html>
