<!-- @dsCard group="Effects" viewport="700x240" subtitle="Ghost watermark — oversized near-invisible typography for spatial depth" name="Ghost Watermark" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;min-height:200px}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px;position:relative;z-index:2}
  .demo{position:relative;z-index:2;border:1px solid var(--border);padding:20px;background:var(--surface);margin-bottom:12px}
  .demo-label{font-size:9px;font-family:var(--font-data);letter-spacing:.06em;text-transform:uppercase;color:var(--text-disabled);margin-bottom:8px}
  .ghost{position:absolute;font-family:var(--font-display);font-weight:300;line-height:1;pointer-events:none;user-select:none}
  .ghost-1{font-size:clamp(60px,12vw,160px);opacity:.03;right:20px;top:30px;color:var(--text-display)}
  .ghost-2{font-size:clamp(40px,8vw,100px);opacity:.05;left:20px;bottom:20px;color:var(--text-display)}
  .desc{font-size:10px;color:var(--text-secondary);line-height:1.5;position:relative;z-index:2}
  .desc b{color:var(--text-primary);font-weight:600}
</style>
</head>
<body>
<div class="ghost ghost-1">KPI</div>
<div class="ghost ghost-2">2026</div>
<div class="title">Ghost Watermark</div>
<div class="demo">
  <div class="demo-label">Opacity 0.03 — Hero background</div>
  <div style="font-family:var(--font-display);font-size:24px;font-weight:400;color:var(--text-display)">业务数据看板</div>
  <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Dashboard · June 2026</div>
</div>
<div class="demo">
  <div class="demo-label">Opacity 0.05 — Section accent</div>
  <div style="font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--text-display)">供应商月度报告</div>
</div>
<div class="desc"><b>每 section 最多 1 个 ghost</b>。opacity &lt; 0.08——手臂距离能看到就太浓了。内容用年份数字、品牌首字母或单个词。<b>绝对定位</b>，不影响布局。</div>
</body>
</html>
