<!-- @dsCard group="Effects" viewport="700x200" subtitle="1px border + surface color — no shadows, no blur, no drop-shadow" name="Border System" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .compare{display:flex;gap:16px}
  .card{flex:1;padding:16px;background:var(--surface)}
  .card-label{font-size:9px;font-family:var(--font-data);letter-spacing:.06em;text-transform:uppercase;color:var(--text-disabled);margin-bottom:8px}
  .card-title{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--text-display);margin-bottom:4px}
  .card-body{font-size:12px;color:var(--text-secondary);line-height:1.4}
  .card--correct{border:1px solid var(--border)}
  .card--wrong{border:none;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .desc{font-size:10px;color:var(--text-secondary);line-height:1.5;margin-top:12px}
  .desc b{color:var(--text-primary);font-weight:600}
</style>
</head>
<body>
<div class="title">Border System</div>
<div class="compare">
  <div class="card card--correct">
    <div class="card-label">✅ 正确 — 1px border</div>
    <div class="card-title">供应商月度报告</div>
    <div class="card-body">用 1px solid --border 定义卡片边界，干净利落</div>
  </div>
  <div class="card card--wrong">
    <div class="card-label">❌ 错误 — box-shadow</div>
    <div class="card-title">供应商月度报告</div>
    <div class="card-body">阴影制造浮层感，违背扁平设计原则</div>
  </div>
</div>
<div class="desc">Nian 用<b>边框对比度 + 背景色切换</b>制造层级，不用阴影。三级深度：默认(--surface) → 悬停(--surface-raised + --border) → 聚焦(--surface + --border-strong)。</div>
</body>
</html>
