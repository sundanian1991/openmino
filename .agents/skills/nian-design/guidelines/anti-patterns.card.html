<!-- @dsCard group="Rules" viewport="700x240" subtitle="红线清单 — 这些绝不能出现" name="Anti-Patterns" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);padding:24px 28px;font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .item{display:flex;align-items:flex-start;gap:8px;padding:8px;border:1px solid var(--border);background:var(--surface)}
  .item-icon{font-size:14px;flex-shrink:0;line-height:1}
  .item-text{font-size:11px;color:var(--text-primary);line-height:1.4}
  .item-text code{font-family:var(--font-data);font-size:9px;background:var(--surface-raised);padding:1px 4px;border-radius:2px}
  .sep{grid-column:1/-1;font-size:9px;font-family:var(--font-data);letter-spacing:.06em;text-transform:uppercase;color:var(--text-disabled);padding:8px 0 2px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<div class="title">Anti-Patterns</div>
<div class="grid">
  <div class="sep">视觉红线</div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">无 <code>box-shadow</code></span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">无 <code>linear-gradient</code></span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">无 <code>backdrop-filter</code></span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">圆角 ≤ <code>8px</code></span></div>
  <div class="sep">色彩红线</div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">Accent 色面积 < 10%</span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text"><code>--yellow</code> 禁止大面积背景</span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">连续 3 个同色 section</span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">最后 section 非深色收尾</span></div>
  <div class="sep">内容红线</div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">无 AI 套话（赋能/抓手/闭环）</span></div>
  <div class="item"><span class="item-icon">✗</span><span class="item-text">眯眼测试：20% 缩放可辨层级</span></div>
</div>
</body>
</html>
