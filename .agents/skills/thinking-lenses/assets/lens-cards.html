<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思维透镜 — 25 Thinking Lenses</title>
<style>
  :root {
    --primary: #CC6B1E;
    --primary-dark: #B85F1A;
    --warm-white: #FAF8F5;
    --accent-bg: #FFF8F0;
    --light-bg: #F0EEEB;
    --neutral-gray: #B8B8B8;
    --dark: #333333;
    --card-border: #E5E2DE;
    --selected-border: #CC6B1E;
    --selected-bg: #FFF8F0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--warm-white);
    color: var(--dark);
    line-height: 1.6;
    padding: 24px 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--primary);
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 8px;
  }
  header p {
    color: var(--neutral-gray);
    font-size: 14px;
  }
  header .subtitle {
    color: var(--primary);
    font-weight: 600;
    font-size: 15px;
    margin-top: 4px;
  }

  /* Control Panel */
  .control-panel {
    background: var(--accent-bg);
    border: 1px solid var(--card-border);
    padding: 20px;
    margin-bottom: 24px;
  }
  .control-panel h2 {
    font-size: 16px;
    margin-bottom: 12px;
    color: var(--dark);
  }
  .btn-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  button {
    padding: 10px 20px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary {
    background: var(--light-bg);
    color: var(--dark);
  }
  .btn-secondary:hover { background: #E0DDD8; }
  .btn-active {
    background: var(--dark);
    color: white;
  }

  /* Match Input */
  .match-input {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .match-input input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border: 1px solid var(--card-border);
    background: white;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .match-input input:focus {
    border-color: var(--primary);
  }

  /* Result Area */
  .result-area {
    background: white;
    border: 1px solid var(--card-border);
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }
  .result-area.show { display: block; }
  .result-area h3 {
    font-size: 15px;
    margin-bottom: 12px;
    color: var(--primary);
  }
  .combo-pair {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .combo-pair .mini-card {
    flex: 1;
    min-width: 200px;
    background: var(--selected-bg);
    border: 2px solid var(--selected-border);
    padding: 16px;
  }
  .combo-pair .mini-card .num {
    font-size: 12px;
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .combo-pair .mini-card .name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .combo-pair .mini-card .question {
    font-size: 13px;
    color: #555;
    font-style: italic;
  }
  .combo-prompt {
    background: var(--light-bg);
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
  }
  .combo-prompt strong {
    color: var(--primary);
  }

  /* Match Result */
  .match-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .match-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--warm-white);
    border-left: 3px solid var(--primary);
  }
  .match-item .score {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    min-width: 40px;
  }
  .match-item .name {
    font-weight: 600;
    font-size: 14px;
  }
  .match-item .tag {
    font-size: 12px;
    color: var(--neutral-gray);
    margin-left: auto;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: white;
    border: 1px solid var(--card-border);
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--neutral-gray);
  }
  .card.selected {
    border: 2px solid var(--selected-border);
    background: var(--selected-bg);
  }
  .card.dimmed {
    opacity: 0.35;
  }
  .card .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--primary);
    padding-bottom: 8px;
  }
  .card .num {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
  }
  .card .name-en {
    font-size: 12px;
    color: var(--neutral-gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card .name-cn {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--dark);
  }
  .card .question {
    font-size: 13px;
    color: #555;
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .card .scenes {
    font-size: 12px;
    color: var(--neutral-gray);
    line-height: 1.5;
  }
  .card .scenes::before {
    content: "适用：";
    font-weight: 600;
    color: var(--dark);
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--card-border);
    font-size: 12px;
    color: var(--neutral-gray);
  }

  /* Responsive */
  @media (max-width: 640px) {
    body { padding: 16px 12px; }
    header h1 { font-size: 22px; }
    .grid { grid-template-columns: 1fr; }
    .btn-group { justify-content: center; }
    .combo-pair { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>思维透镜 Thinking Lenses</h1>
  <p class="subtitle">25个跨职业思考工具 — 问题重构引擎</p>
  <p>人的最大思维陷阱，是误以为自己看到的就是全部。</p>
</header>

<section class="control-panel">
  <h2>快速操作</h2>
  <div class="btn-group">
    <button class="btn-primary" onclick="drawRandom(2)">🎲 随机抽两张</button>
    <button class="btn-secondary" onclick="drawRandom(3)">🎲 抽三张</button>
    <button class="btn-secondary" onclick="forceCrossover()">⚡ 强制跨界组合</button>
    <button class="btn-secondary" onclick="resetAll()">↺ 重置</button>
  </div>

  <h2>问题匹配</h2>
  <div class="match-input">
    <input type="text" id="problemInput" placeholder="描述你当前的问题、困惑或决策... 例如：供应商不配合、方案写不下去、团队激励失效">
    <button class="btn-primary" onclick="matchProblem()">🔍 匹配透镜</button>
  </div>
</section>

<section class="result-area" id="resultArea">
  <h3 id="resultTitle">组合结果</h3>
  <div id="resultContent"></div>
</section>

<section class="grid" id="cardGrid"></section>

<footer>
  <p>基于 Scott H. Young "Twenty-Five Useful Thinking Tools" | 思维透镜 Skill 交互组件</p>
</footer>

<script>
const lenses = [
  { id: 1, en: "Artist", cn: "艺术家", q: "What if Creativity Were the Priority?", scenes: "创意瓶颈、方案同质化、差异化竞争、品牌设计", tags: "创意 差异化 创新 设计 独特" },
  { id: 2, en: "Economist", cn: "经济学家", q: "How Do People React to Incentives?", scenes: "团队激励、政策设计、行为预测、制度激励对齐", tags: "激励 行为 反应 政策 制度 团队" },
  { id: 3, en: "Engineer", cn: "工程师", q: "Can I Model This and Calculate?", scenes: "模糊决策、量化评估、风险评估、建模分析", tags: "量化 模型 计算 数据 评估 风险" },
  { id: 4, en: "Entrepreneur", cn: "企业家", q: "Do a Lot of Things; See What Works", scenes: "资源有限、方向不明、快速验证、MVP设计", tags: "验证 原型 测试 快速 资源 方向" },
  { id: 5, en: "Doctor", cn: "医生", q: "What's the Diagnosis?", scenes: "故障排查、根因分析、症状复杂、问题诊断", tags: "诊断 根因 症状 排查 故障 病因" },
  { id: 6, en: "Journalist", cn: "记者", q: "Just the Facts", scenes: "信息混乱、事实核查、会议纪要、去情绪化", tags: "事实 核查 信息 客观 纪要 真相" },
  { id: 7, en: "Scientist", cn: "科学家", q: "Make a Hypothesis and Test It", scenes: "假设验证、因果推断、实验设计、A/B测试", tags: "假设 验证 实验 测试 因果 科学" },
  { id: 8, en: "Mathematician", cn: "数学家", q: "You Don't Know Until You Can Prove It", scenes: "逻辑严谨性、证明标准、漏洞排查、结论验证", tags: "证明 严谨 逻辑 漏洞 数学 标准" },
  { id: 9, en: "Programmer", cn: "程序员", q: "What's the Pattern I Can Automate?", scenes: "流程自动化、重复劳动、模式抽象、标准化", tags: "自动化 模式 重复 流程 代码 效率" },
  { id: 10, en: "Architect", cn: "建筑师", q: "Envisioning the Future", scenes: "长期规划、愿景设计、大项目、阶段性里程碑", tags: "规划 愿景 未来 设计 项目 长期" },
  { id: 11, en: "Salesperson", cn: "销售", q: "Understand Their Minds Better than They Do", scenes: "谈判准备、客户洞察、说服策略、动机分析", tags: "谈判 说服 客户 动机 洞察 需求" },
  { id: 12, en: "Soldier", cn: "军人", q: "Routine and Discipline Prevent Deadly Mistakes", scenes: "关键流程、安全合规、checklist设计、纪律执行", tags: "纪律 流程 checklist 安全 执行 规范" },
  { id: 13, en: "Chess Master", cn: "象棋大师", q: "See The Moves In Your Mind's Eye", scenes: "竞争策略、多步推演、预判对手、风险评估", tags: "推演 预判 竞争 策略 对手 步骤" },
  { id: 14, en: "Designer", cn: "设计师", q: "The Things You Make Communicate For You", scenes: "用户体验、信息设计、自解释文档、表达优化", tags: "设计 体验 表达 信息 用户 沟通" },
  { id: 15, en: "Teacher", cn: "教师", q: "Can You See What it is Like Not to Know?", scenes: "知识诅咒、沟通障碍、培训设计、受众理解", tags: "教学 知识 沟通 理解 受众 培训" },
  { id: 16, en: "Anthropologist", cn: "人类学家", q: "Can You Immerse and Join Another Culture?", scenes: "跨部门协作、文化差异、陌生领域、沉浸式理解", tags: "文化 沉浸 跨部门 协作 陌生 融入" },
  { id: 17, en: "Psychologist", cn: "心理学家", q: "Test Your Understanding of Other People", scenes: "人际冲突、动机分析、行为预测、认知偏差", tags: "心理 动机 冲突 行为 偏差 理解" },
  { id: 18, en: "Critic", cn: "评论家", q: "Can You Build on The Work of Others?", scenes: "创新不足、二次创作、深度解读、竞品分析", tags: "评论 创新 解读 竞品 二次 深度" },
  { id: 19, en: "Philosopher", cn: "哲学家", q: "What are the Unexpected Consequences?", scenes: "直觉检验、极限推演、潜在风险、二阶效应", tags: "哲学 推演 极限 后果 风险 直觉" },
  { id: 20, en: "Accountant", cn: "会计师", q: "Watch the Ratios", scenes: "数据诊断、效率评估、比率分析、隐藏问题", tags: "数据 比率 效率 诊断 隐藏 评估" },
  { id: 21, en: "Politician", cn: "政治家", q: "What Will People Believe?", scenes: "舆论管理、利益相关者、感知现实、预期管理", tags: "政治 舆论 利益 感知 相信 管理" },
  { id: 22, en: "Novelist", cn: "小说家", q: "Does Your Story Make Sense?", scenes: "叙事结构、品牌故事、说服力、起承转合", tags: "故事 叙事 说服 结构 品牌 逻辑" },
  { id: 23, en: "Actor", cn: "演员", q: "The Best Way to Pretend is to Be Real", scenes: "状态管理、情绪调节、角色代入、自信构建", tags: "情绪 状态 角色 自信 管理 调节" },
  { id: 24, en: "Plumber", cn: "水管工", q: "Take it Apart and See What's Broken", scenes: "系统拆解、动手实践、恐惧面对、故障排查", tags: "拆解 动手 实践 故障 恐惧 维修" },
  { id: 25, en: "Hacker", cn: "黑客", q: "What's Really Going on Underneath?", scenes: "深层机制、系统漏洞、表象之下、unintended features", tags: "黑客 底层 机制 漏洞 表象 深层" }
];

const crossoverPrompts = [
  "如果把 {A} 的思维方式和 {B} 的思维方式强行结合，会看到什么？这个组合中最冲突的地方，恰恰可能是最大盲区的所在。",
  "想象一下：一个 {A} 和一个 {B} 在同一个房间里争论你的问题。他们各自会说什么？争论的焦点是什么？",
  "{A} 关注 {A_focus}，{B} 关注 {B_focus}。这两个关注点在你的问题上有没有被同时忽略的区域？",
  "最反直觉的视角：{A} 会说'{A_q}'，而 {B} 会问'{B_q}'。把这两个问题放在一起回答。",
  "如果你必须同时满足 {A} 和 {B} 的标准，你的方案会变成什么样？这个约束会逼出什么新思路？"
];

function renderGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = lenses.map(l => `
    <div class="card" id="card-${l.id}" onclick="toggleSelect(${l.id})">
      <div class="top-bar">
        <span class="num">#${String(l.id).padStart(2,'0')}</span>
        <span class="name-en">${l.en}</span>
      </div>
      <div class="name-cn">${l.cn}</div>
      <div class="question">${l.q}</div>
      <div class="scenes">${l.scenes}</div>
    </div>
  `).join('');
}

let selectedIds = [];

function toggleSelect(id) {
  const idx = selectedIds.indexOf(id);
  if (idx > -1) {
    selectedIds.splice(idx, 1);
  } else {
    selectedIds.push(id);
  }
  updateCardStyles();
}

function updateCardStyles() {
  lenses.forEach(l => {
    const card = document.getElementById(`card-${l.id}`);
    card.classList.remove('selected', 'dimmed');
    if (selectedIds.length > 0) {
      if (selectedIds.includes(l.id)) {
        card.classList.add('selected');
      } else {
        card.classList.add('dimmed');
      }
    }
  });
}

function drawRandom(n) {
  resetAll();
  const shuffled = [...lenses].sort(() => Math.random() - 0.5);
  selectedIds = shuffled.slice(0, n).map(l => l.id);
  updateCardStyles();
  showComboResult(shuffled.slice(0, n), `随机抽取 ${n} 个透镜`);
}

function forceCrossover() {
  resetAll();
  // Pick two from opposite "domains"
  const domains = [
    [1,14,18,22,23], // creative
    [2,20,21], // numbers/politics
    [3,8,9,10,25], // tech/systems
    [5,12,24], // hands-on/fixing
    [6,7,15,16,17], // people/understanding
    [4,11,13,19] // strategy
  ];
  const d1 = Math.floor(Math.random() * domains.length);
  let d2 = Math.floor(Math.random() * domains.length);
  while (d2 === d1) d2 = Math.floor(Math.random() * domains.length);
  const id1 = domains[d1][Math.floor(Math.random() * domains[d1].length)];
  const id2 = domains[d2][Math.floor(Math.random() * domains[d2].length)];
  selectedIds = [id1, id2];
  updateCardStyles();
  const l1 = lenses.find(l => l.id === id1);
  const l2 = lenses.find(l => l.id === id2);
  showCrossoverResult(l1, l2);
}

function showComboResult(items, title) {
  const area = document.getElementById('resultArea');
  const content = document.getElementById('resultContent');
  document.getElementById('resultTitle').textContent = title;

  content.innerHTML = `
    <div class="combo-pair">
      ${items.map(l => `
        <div class="mini-card">
          <div class="num">#${String(l.id).padStart(2,'0')} ${l.en}</div>
          <div class="name">${l.cn}</div>
          <div class="question">${l.q}</div>
        </div>
      `).join('')}
    </div>
    <div class="combo-prompt">
      <strong>组合思考：</strong><br>
      ${items.map(l => `• 用 <strong>${l.cn}</strong> 的视角：${l.q} 这个问题会如何改变你的判断？`).join('<br>')}
      <br><br>
      <strong>下一步：</strong>试着同时回答这两个问题，看看有没有冲突或意外的交集。
    </div>
  `;
  area.classList.add('show');
}

function showCrossoverResult(l1, l2) {
  const area = document.getElementById('resultArea');
  const content = document.getElementById('resultContent');
  document.getElementById('resultTitle').textContent = `⚡ 强制跨界组合`;

  const promptTemplate = crossoverPrompts[Math.floor(Math.random() * crossoverPrompts.length)];
  const prompt = promptTemplate
    .replace(/{A}/g, l1.cn)
    .replace(/{B}/g, l2.cn)
    .replace(/{A_focus}/g, l1.scenes.split('、')[0])
    .replace(/{B_focus}/g, l2.scenes.split('、')[0])
    .replace(/{A_q}/g, l1.q)
    .replace(/{B_q}/g, l2.q);

  content.innerHTML = `
    <div class="combo-pair">
      <div class="mini-card">
        <div class="num">#${String(l1.id).padStart(2,'0')} ${l1.en}</div>
        <div class="name">${l1.cn}</div>
        <div class="question">${l1.q}</div>
      </div>
      <div class="mini-card">
        <div class="num">#${String(l2.id).padStart(2,'0')} ${l2.en}</div>
        <div class="name">${l2.cn}</div>
        <div class="question">${l2.q}</div>
      </div>
    </div>
    <div class="combo-prompt">
      <strong>${prompt}</strong>
      <br><br>
      这个组合很反直觉——正是为了打破你的思维定势。不要急着否定，先写下来两个视角各自会说的话。
    </div>
  `;
  area.classList.add('show');
}

function matchProblem() {
  const input = document.getElementById('problemInput').value.trim();
  if (!input) return;

  resetAll();
  const keywords = input.toLowerCase().split(/\s+/);

  const scored = lenses.map(l => {
    let score = 0;
    const text = (l.tags + ' ' + l.scenes + ' ' + l.q + ' ' + l.cn).toLowerCase();
    keywords.forEach(k => {
      if (text.includes(k)) score += 3;
    });
    // Bonus for scene match
    const sceneWords = l.scenes.toLowerCase().split(/[、，,\s]+/);
    keywords.forEach(k => {
      sceneWords.forEach(s => { if (s.includes(k) || k.includes(s)) score += 2; });
    });
    return { ...l, score };
  }).sort((a, b) => b.score - a.score);

  const top = scored.slice(0, 5).filter(s => s.score > 0);

  const area = document.getElementById('resultArea');
  const content = document.getElementById('resultContent');
  document.getElementById('resultTitle').textContent = `🔍 问题匹配结果：「${input.substring(0, 20)}${input.length > 20 ? '...' : ''}」`;

  if (top.length === 0) {
    content.innerHTML = `<div class="combo-prompt">没有直接匹配的透镜。试试用更通用的关键词，或直接点击卡片探索。</div>`;
  } else {
    content.innerHTML = `
      <div class="match-list">
        ${top.map(l => `
          <div class="match-item">
            <span class="score">${l.score}分</span>
            <span class="name">#${String(l.id).padStart(2,'0')} ${l.cn}（${l.en}）</span>
            <span class="tag">${l.scenes.split('、').slice(0,2).join('、')}</span>
          </div>
        `).join('')}
      </div>
      <div class="combo-prompt" style="margin-top:12px;">
        <strong>建议：</strong>点击上方卡片深入探索，或使用「随机抽两张」获得组合视角。
      </div>
    `;
    // Highlight top 3
    top.slice(0, 3).forEach(l => {
      const card = document.getElementById(`card-${l.id}`);
      if (card) card.classList.add('selected');
    });
  }
  area.classList.add('show');
}

function resetAll() {
  selectedIds = [];
  updateCardStyles();
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('problemInput').value = '';
}

// Init
renderGrid();
</script>
