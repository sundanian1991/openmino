<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Venn diagram: two overlapping circles -->
  <circle cx="85" cy="100" r="45" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="115" cy="100" r="45" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="85" cy="100" r="45" fill="#c98a6a" opacity="0.15"/>
  <circle cx="115" cy="100" r="45" fill="#c98a6a" opacity="0.15"/>
</svg>
