<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Gantt chart: horizontal bars at different positions -->
  <line x1="30" y1="40" x2="170" y2="40" stroke="#f0e0d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="40" x2="110" y2="40" stroke="#c98a6a" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="70" x2="170" y2="70" stroke="#f0e0d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="140" y2="70" stroke="#c98a6a" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#f0e0d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="50" y1="100" x2="160" y2="100" stroke="#c98a6a" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="130" x2="170" y2="130" stroke="#f0e0d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="130" x2="90" y2="130" stroke="#c98a6a" stroke-width="8" stroke-linecap="round"/>
  <line x1="30" y1="160" x2="170" y2="160" stroke="#f0e0d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="80" y1="160" x2="150" y2="160" stroke="#c98a6a" stroke-width="8" stroke-linecap="round"/>
</svg>
