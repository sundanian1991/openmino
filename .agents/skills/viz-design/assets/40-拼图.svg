<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Puzzle: interlocking pieces -->
  <!-- Top-left piece -->
  <path d="M35,35 L90,35 L90,55 Q100,45 110,55 L110,90 L90,90 L90,110 L35,110 Z" fill="#c98a6a" opacity="0.6"/>
  <line x1="35" y1="35" x2="90" y2="35" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="90" y1="35" x2="90" y2="55" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="110" y1="55" x2="110" y2="90" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="90" y1="90" x2="90" y2="110" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="90" y1="110" x2="35" y2="110" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="35" y1="110" x2="35" y2="35" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Top-right piece -->
  <path d="M110,35 L165,35 L165,110 L110,110 L110,90 Q100,80 110,55 Z" fill="#c98a6a" opacity="0.4"/>
  <!-- Bottom-left piece -->
  <rect x="35" y="115" width="55" height="50" rx="3" fill="#c98a6a" opacity="0.3"/>
  <!-- Bottom-right piece -->
  <rect x="110" y="115" width="55" height="50" rx="3" fill="#c98a6a" opacity="0.2"/>
</svg>
