<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Machine: simplified engine with gears and pipes -->
  <!-- Main body -->
  <rect x="50" y="60" width="100" height="70" rx="8" fill="none" stroke="#c98a6a" stroke-width="2.5"/>
  <!-- Inner gear -->
  <circle cx="85" cy="95" r="18" fill="none" stroke="#c98a6a" stroke-width="2"/>
  <circle cx="85" cy="95" r="5" fill="#c98a6a" opacity="0.5"/>
  <!-- Gear teeth -->
  <line x1="85" y1="77" x2="85" y2="72" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="103" y1="95" x2="108" y2="95" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="113" x2="85" y2="118" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="67" y1="95" x2="62" y2="95" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- Output pipe -->
  <line x1="150" y1="80" x2="170" y2="80" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="105" x2="170" y2="105" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- Output dots -->
  <circle cx="175" cy="82" r="3" fill="#c98a6a" opacity="0.4"/>
  <circle cx="182" cy="88" r="2.5" fill="#c98a6a" opacity="0.3"/>
  <circle cx="175" cy="107" r="3" fill="#c98a6a" opacity="0.4"/>
  <circle cx="182" cy="112" r="2.5" fill="#c98a6a" opacity="0.3"/>
  <!-- Control knob -->
  <circle cx="125" cy="75" r="6" fill="none" stroke="#c98a6a" stroke-width="1.5"/>
  <line x1="125" y1="75" x2="129" y2="71" stroke="#c98a6a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
