<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Life of a building: city skyline -->
  <rect x="45" y="60" width="25" height="110" rx="2" fill="#c98a6a" opacity="0.7"/>
  <rect x="75" y="40" width="20" height="130" rx="2" fill="#c98a6a" opacity="0.85"/>
  <rect x="100" y="80" width="18" height="90" rx="2" fill="#c98a6a" opacity="0.55"/>
  <rect x="123" y="50" width="22" height="120" rx="2" fill="#c98a6a" opacity="0.75"/>
  <rect x="150" y="70" width="15" height="100" rx="2" fill="#c98a6a" opacity="0.4"/>
  <!-- Windows -->
  <rect x="50" y="70" width="6" height="6" rx="1" fill="#faf9f7" opacity="0.5"/>
  <rect x="60" y="70" width="6" height="6" rx="1" fill="#faf9f7" opacity="0.5"/>
  <rect x="50" y="85" width="6" height="6" rx="1" fill="#faf9f7" opacity="0.5"/>
