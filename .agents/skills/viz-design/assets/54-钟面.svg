<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Clock face -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#c98a6a" stroke-width="2.5"/>
  <!-- Hour marks -->
  <line x1="100" y1="42" x2="100" y2="50" stroke="#c98a6a" stroke-width="2"/>
  <line x1="100" y1="150" x2="100" y2="158" stroke="#c98a6a" stroke-width="2"/>
  <line x1="42" y1="100" x2="50" y2="100" stroke="#c98a6a" stroke-width="2"/>
  <line x1="150" y1="100" x2="158" y2="100" stroke="#c98a6a" stroke-width="2"/>
  <!-- Minor marks -->
  <line x1="128" y1="46" x2="130" y2="53" stroke="#c98a6a" stroke-width="1"/>
  <line x1="70" y1="46" x2="72" y2="53" stroke="#c98a6a" stroke-width="1"/>
  <line x1="128" y1="154" x2="130" y2="147" stroke="#c98a6a" stroke-width="1"/>
  <line x1="70" y1="154" x2="72" y2="147" stroke="#c98a6a" stroke-width="1"/>
  <!-- Hour hand -->
  <line x1="100" y1="100" x2="100" y2="62" stroke="#c98a6a" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="100" y1="100" x2="130" y2="85" stroke="#c98a6a" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="4" fill="#c98a6a"/>
</svg>
