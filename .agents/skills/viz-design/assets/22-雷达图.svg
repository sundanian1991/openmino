<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Radar chart: pentagon with data polygon -->
  <!-- Grid pentagons -->
  <polygon points="100,30 157,65 140,135 60,135 43,65" fill="none" stroke="#f0e0d4" stroke-width="1"/>
  <polygon points="100,55 138,78 128,118 72,118 62,78" fill="none" stroke="#e0c9b0" stroke-width="1"/>
  <!-- Axes -->
  <line x1="100" y1="100" x2="100" y2="30" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="157" y2="65" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="140" y2="135" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="60" y2="135" stroke="#e0c9b0" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="43" y2="65" stroke="#e0c9b0" stroke-width="0.5"/>
  <!-- Data polygon -->
  <polygon points="100,45 145,72 135,120 70,125 50,80" fill="#c98a6a" opacity="0.25" stroke="#c98a6a" stroke-width="2"/>
</svg>
