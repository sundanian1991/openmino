<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Bubble race chart: circles in 3 stages -->
  <!-- Stage 1 -->
  <circle cx="50" cy="60" r="8" fill="#c98a6a"/>
  <circle cx="50" cy="100" r="12" fill="#c98a6a"/>
  <circle cx="50" cy="140" r="6" fill="#c98a6a"/>
  <!-- Stage 2 -->
  <circle cx="100" cy="55" r="12" fill="#c98a6a" opacity="0.6"/>
  <circle cx="100" cy="100" r="8" fill="#c98a6a" opacity="0.6"/>
  <circle cx="100" cy="145" r="14" fill="#c98a6a" opacity="0.6"/>
  <!-- Stage 3 -->
  <circle cx="155" cy="50" r="14" fill="#c98a6a" opacity="0.3"/>
  <circle cx="155" cy="100" r="10" fill="#c98a6a" opacity="0.3"/>
  <circle cx="155" cy="145" r="8" fill="#c98a6a" opacity="0.3"/>
</svg>
