<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#faf9f7" rx="8"/>
  <!-- Food chain: big fish eats small fish -->
  <!-- Small fish -->
  <ellipse cx="60" cy="100" rx="20" ry="10" fill="#c98a6a" opacity="0.4"/>
  <polygon points="40,100 25,92 25,108" fill="#c98a6a" opacity="0.4"/>
  <circle cx="70" cy="98" r="2" fill="#faf9f7"/>
  <!-- Medium fish -->
  <ellipse cx="110" cy="100" rx="25" ry="13" fill="#c98a6a" opacity="0.6"/>
  <polygon points="85,100 70,90 70,110" fill="#c98a6a" opacity="0.6"/>
  <circle cx="125" cy="97" r="3" fill="#faf9f7"/>
  <!-- Big fish -->
  <ellipse cx="165" cy="100" rx="28" ry="16" fill="#c98a6a"/>
  <polygon points="137,100 120,85 120,115" fill="#c98a6a"/>
  <circle cx="180" cy="96" r="3" fill="#faf9f7"/>
  <!-- Arrow from small to medium -->
  <line x1="80" y1="100" x2="85" y2="100" stroke="#c98a6a" stroke-width="1.5"/>
  <!-- Arrow from medium to big -->
  <line x1="135" y1="100" x2="140" y2="100" stroke="#c98a6a" stroke-width="1.5"/>
</svg>
