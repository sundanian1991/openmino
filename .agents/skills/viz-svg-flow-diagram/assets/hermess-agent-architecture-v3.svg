<svg xmlns="http://www.w3.org/2000/svg" width="1780" height="980" viewBox="0 0 1780 980" role="img" aria-labelledby="diagram-title diagram-subtitle">
  <title id="diagram-title">Hermes Agent 架构图</title>
  <desc id="diagram-subtitle">请求入口 -&gt; 编排推理 -&gt; 安全约束 -&gt; 工具执行 -&gt; 结果回传</desc>
  <defs>
    <pattern id="paper-dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="var(--grid)" opacity="0.45" />
      <circle cx="16" cy="12" r="0.8" fill="var(--grid)" opacity="0.28" />
      <circle cx="10" cy="22" r="0.9" fill="var(--grid)" opacity="0.22" />
    </pattern>
    <marker id="pipe-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <style>
    :root {
      --bg-paper: #FCFBF7;
      --ink: #2D2926;
      --muted: #7A6F66;
      --grid: #E8E1D7;
      --sand: #FFF0CF;
      --mint: #DFF7E8;
      --sky: #DCEBFF;
      --coral: #FFE0D7;
      --amber: #FFE8B5;
      --graphite: #EAE6E1;
      --flow-mint: #24B36B;
      --flow-sky: #2F7CF6;
      --flow-coral: #F36B3C;
      --flow-amber: #D79210;
      --font-hand: Virgil, "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive;
      --font-sans: "Avenir Next", "Segoe UI", sans-serif;
    }

    .canvas-bg {
      fill: var(--bg-paper);
    }

    .canvas-grain {
      fill: url(#paper-dots);
    }

    .title {
      fill: var(--ink);
      font-family: var(--font-hand);
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .subtitle {
      fill: var(--muted);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .group-frame {
      fill: none;
      stroke: var(--grid);
      stroke-width: 2;
      stroke-dasharray: 10 12;
    }

    .group-title {
      fill: var(--muted);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .node-fill {
      stroke: none;
    }

    .node-stroke {
      fill: none;
      stroke: var(--ink);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .node-stroke.ghost {
      opacity: 0.38;
    }

    .node-label {
      fill: var(--ink);
      font-family: var(--font-hand);
      font-size: 18px;
      font-weight: 600;
      text-anchor: middle;
    }

    .node-caption {
      fill: var(--muted);
      font-family: var(--font-sans);
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-anchor: middle;
      text-transform: uppercase;
    }

    .pipe-flow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      marker-end: url(#pipe-arrow);
      animation: flow linear infinite;
    }

    .edge-label-bg {
      fill: rgba(252, 251, 247, 0.96);
      stroke: rgba(45, 41, 38, 0.12);
      stroke-width: 1;
    }

    .edge-label {
      fill: var(--ink);
      font-family: var(--font-hand);
      font-size: 13.5px;
      font-weight: 600;
      text-anchor: middle;
    }

    @keyframes flow {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -44;
      }
    }
  </style>
  <rect class="canvas-bg" x="0" y="0" width="1780" height="980" />
  <rect class="canvas-grain" x="0" y="0" width="1780" height="980" />
